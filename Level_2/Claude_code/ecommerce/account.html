<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account – Order History, Addresses &amp; Settings | NovaMart</title>
  <meta name="description" content="Manage your NovaMart account. View order history, manage saved addresses, payment methods, wishlist, and account settings." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *:focus-visible { outline: 3px solid #facc15 !important; outline-offset: 2px !important; }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0; }

</head>
<body class="bg-gray-50 text-gray-900 font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

function getCartCount() {
  try { return (JSON.parse(localStorage.getItem('novamart_cart')||'[]')).reduce((s,i)=>s+i.quantity,0); } catch { return 0; }
}

/* ─── Mock data ─── */

  { id:'NM-2024-7841', date:'March 10, 2024', status:'Delivered', total:279.99, items:[{name:'Sony WH-1000XM5 Wireless Headphones',qty:1,price:279.99}] },
  { id:'NM-2024-7206', date:'February 22, 2024', status:'Delivered', total:134.94, items:[{name:"Instant Pot Duo 7-in-1 Pressure Cooker",qty:1,price:89.99},{name:"Resistance Bands Set (11-Piece)",qty:1,price:29.99},{name:"Manduka PRO Premium Yoga Mat",qty:1,price:14.96}] },

  { id:2, label:'Work', name:'Alex Johnson', line1:'456 Market Street', line2:'Suite 800', city:'San Francisco', state:'CA', zip:'94105', default:false },

const PAYMENT = [
  { id:1, type:'Visa', last4:'4242', exp:'09/26', default:true },

  { id:12, name:'Canon EOS Rebel SL3 DSLR Camera',             price:699.99, orig:849.99, hue:"4f46e5", cat:"Electronics" },
  { id:17, name:'Bowflex SelectTech 552 Adjustable Dumbbells',  price:349.99, orig:429.99, hue:"9333ea", cat:"Sports"      },

function Header() {
  const count = getCartCount();
  return (
    <header className="bg-blue-900 text-white sticky top-0 z-50 shadow-lg">
      <a href="#main-content" className="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:bg-yellow-400 focus:text-blue-900 focus:px-4 focus:py-2 focus:rounded-md focus:font-semibold focus:z-50">Skip to main content</a>
      <div className="container mx-auto px-4">
        <div className="flex items-center gap-4 py-3">
          <a href="index.html" className="flex-shrink-0 text-2xl font-bold text-yellow-400 hover:text-yellow-300 rounded px-1 focus:outline-none focus:ring-2 focus:ring-yellow-400" aria-label="NovaMart – Go to homepage">NovaMart</a>

              <button type="submit" className="bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-semibold px-5 py-2 rounded-r focus:outline-none focus:ring-2 focus:ring-yellow-300 transition-colors" aria-label="Submit search">
                <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>

            </form>

          <nav aria-label="User account and shopping" className="flex items-center gap-1">
            <a href="account.html" aria-current="page" className="flex flex-col items-center text-sm text-yellow-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 rounded px-2 py-1" aria-label="My account, currently viewing">
              <svg aria-hidden="true" className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              <span aria-hidden="true" className="hidden md:block text-xs">Account</span>
            </a>
            <a href="cart.html" className="relative flex flex-col items-center text-sm hover:text-yellow-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 rounded px-2 py-1 transition-colors" aria-label={`Shopping cart, ${count} item${count!==1?'s':''}`}>
              <svg aria-hidden="true" className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
              <span aria-hidden="true" className="hidden md:block text-xs">Cart</span>
              {count>0 && <span aria-hidden="true" className="absolute -top-1 right-0 bg-yellow-400 text-blue-900 text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">{count>99?'99+':count}</span>}
            </a>
          </nav>
        </div>
        <nav aria-label="Main navigation" className="border-t border-blue-800">
          <ul className="flex gap-1 py-2 overflow-x-auto" role="list">
            {[['Home','index.html'],['Products','products.html'],['Electronics','products.html'],['Kitchen','products.html'],['Clothing','products.html'],['Sports','products.html']].map(([l,h])=>(
              <li key={l}><a href={h} className="whitespace-nowrap text-sm hover:text-yellow-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 rounded px-3 py-1 block transition-colors">{l}</a></li>
            ))}

}

function Footer() {
  return (
    <footer className="bg-blue-900 text-white mt-12" role="contentinfo">
      <div className="container mx-auto px-4 py-10">
        <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
          <div><p className="text-yellow-400 font-bold text-xl mb-3">NovaMart</p><p className="text-blue-200 text-sm">Your modern marketplace for electronics, home goods, and apparel.</p></div>

          ))}

        <div className="border-t border-blue-800 mt-8 pt-6 text-center"><p className="text-blue-200 text-sm">© 2024 NovaMart, Inc. All rights reserved.</p></div>

}

/* ─── Section components ─── */
function OrderHistory() {
  const [expanded, setExpanded] = useState(null);
  return (
    <section aria-labelledby="orders-heading">
      <h2 id="orders-heading" className="text-xl font-bold text-gray-800 mb-4">Order History</h2>
      {ORDERS.length===0 ? (
        <div className="text-center py-12 bg-gray-50 rounded-xl">
          <p className="text-gray-500">No orders yet. <a href="products.html" className="text-blue-700 underline focus:outline-none focus:ring-1 focus:ring-blue-500 rounded">Start shopping</a></p>
        </div>
      ) : (
        <ul className="space-y-4" role="list">
          {ORDERS.map(order=>(
            <li key={order.id}>
              <article className="border border-gray-200 rounded-xl overflow-hidden" aria-label={`Order ${order.id}, placed ${order.date}, status ${order.status}`}>
                <div className="flex items-center justify-between p-4 bg-gray-50 border-b border-gray-200 flex-wrap gap-3">
                  <div className="flex flex-wrap gap-6 text-sm">
                    <div><p className="text-gray-500 text-xs uppercase tracking-wide font-medium">Order #</p><p className="font-semibold text-gray-800">{order.id}</p></div>
                    <div><p className="text-gray-500 text-xs uppercase tracking-wide font-medium">Date placed</p><p className="font-semibold text-gray-800">{order.date}</p></div>
                    <div><p className="text-gray-500 text-xs uppercase tracking-wide font-medium">Total</p><p className="font-semibold text-blue-800">${order.total.toFixed(2)}</p></div>
                    <div><p className="text-gray-500 text-xs uppercase tracking-wide font-medium">Status</p><span className={`inline-block px-2 py-0.5 rounded text-xs font-bold ${STATUS_COLOR[order.status]||'bg-gray-100 text-gray-600'}`}>{order.status}</span></div>
                  </div>
                  <div className="flex gap-2 flex-shrink-0">
                    <button onClick={()=>setExpanded(expanded===order.id?null:order.id)}
                      aria-expanded={expanded===order.id}
                      aria-controls={`order-details-${order.id}`}
                      className="text-sm text-blue-700 hover:text-blue-900 border border-blue-200 rounded-lg px-3 py-1.5 hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                      {expanded===order.id?'Hide details':'View details'}
                    </button>
                    <button className="text-sm text-gray-600 hover:text-gray-800 border border-gray-200 rounded-lg px-3 py-1.5 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
                      aria-label={`Buy again items from order ${order.id}`}>
                      Buy again
                    </button>
                  </div>
                </div>
                {expanded===order.id && (
                  <div id={`order-details-${order.id}`} className="p-4">
                    <h3 className="font-semibold text-gray-700 mb-3 text-sm">Items in this order</h3>
                    <ul className="space-y-2" role="list">
                      {order.items.map((item,i)=>(
                        <li key={i} className="flex justify-between text-sm py-2 border-b border-gray-100 last:border-0">
                          <span className="text-gray-700">{item.name} <span className="text-gray-400">×{item.qty}</span></span>
                          <span className="font-semibold text-gray-800">${item.price.toFixed(2)}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                )}
              </article>
            </li>
          ))}
        </ul>
      )}
    </section>
  );
}

function SavedAddresses() {
  const [addresses, setAddresses] = useState(ADDRESSES);
  const [msg, setMsg] = useState('');
  const announce = t => { setMsg(t); setTimeout(()=>setMsg(''),3000); };
  const setDefault = id => { setAddresses(prev=>prev.map(a=>({...a,default:a.id===id}))); announce('Default address updated.'); };
  const remove = id => { setAddresses(prev=>prev.filter(a=>a.id!==id)); announce('Address removed.'); };
  return (
    <section aria-labelledby="addresses-heading">
      <div role="status" aria-live="polite" className="sr-only">{msg}</div>
      <div className="flex items-center justify-between mb-4">
        <h2 id="addresses-heading" className="text-xl font-bold text-gray-800">Saved Addresses</h2>
        <button className="text-sm bg-blue-800 text-white px-4 py-2 rounded-lg hover:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" aria-label="Add a new shipping address">
          + Add Address
        </button>
      </div>
      <div className="grid sm:grid-cols-2 gap-4">
        {addresses.map(addr=>(
          <article key={addr.id} className={`border-2 rounded-xl p-4 relative ${addr.default?'border-blue-500 bg-blue-50':'border-gray-200 bg-white'}`} aria-label={`${addr.label} address for ${addr.name}${addr.default?' (default)':''}`}>
            {addr.default && <span className="absolute top-3 right-3 bg-blue-600 text-white text-xs font-bold px-2 py-0.5 rounded">Default</span>}
            <p className="font-bold text-gray-700 mb-1 text-sm uppercase tracking-wide">{addr.label}</p>
            <address className="not-italic text-sm text-gray-700 leading-relaxed">
              <span className="font-semibold">{addr.name}</span><br/>
              {addr.line1}<br/>
              {addr.line2 && <>{addr.line2}<br/></>}
              {addr.city}, {addr.state} {addr.zip}
            </address>
            <div className="mt-3 flex gap-3">
              <button className="text-xs text-blue-700 hover:text-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded transition-colors" aria-label={`Edit ${addr.label} address`}>Edit</button>
              {!addr.default && (
                <>
                  <button onClick={()=>setDefault(addr.id)} className="text-xs text-blue-700 hover:text-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded transition-colors" aria-label={`Set ${addr.label} address as default`}>Set as default</button>
                  <button onClick={()=>remove(addr.id)} className="text-xs text-red-600 hover:text-red-800 focus:outline-none focus:ring-2 focus:ring-red-400 rounded transition-colors" aria-label={`Remove ${addr.label} address`}>Remove</button>
                </>
              )}
            </div>
          </article>
        ))}
      </div>
    </section>
  );
}

function PaymentMethods() {
  const [cards, setCards] = useState(PAYMENT);
  const [msg, setMsg] = useState('');
  const announce = t => { setMsg(t); setTimeout(()=>setMsg(''),3000); };
  const setDefault = id => { setCards(prev=>prev.map(c=>({...c,default:c.id===id}))); announce('Default payment method updated.'); };
  const remove = id => { setCards(prev=>prev.filter(c=>c.id!==id)); announce('Payment method removed.'); };
  return (
    <section aria-labelledby="payment-heading">
      <div role="status" aria-live="polite" className="sr-only">{msg}</div>
      <div className="flex items-center justify-between mb-4">
        <h2 id="payment-heading" className="text-xl font-bold text-gray-800">Payment Methods</h2>
        <button className="text-sm bg-blue-800 text-white px-4 py-2 rounded-lg hover:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" aria-label="Add a new payment method">
          + Add Payment
        </button>
      </div>
      <div className="space-y-3">
        {cards.map(card=>(
          <div key={card.id} className={`border-2 rounded-xl p-4 flex items-center justify-between ${card.default?'border-blue-500 bg-blue-50':'border-gray-200 bg-white'}`} role="region" aria-label={`${card.type} card ending in ${card.last4}${card.default?' (default)':''}`}>
            <div className="flex items-center gap-4">
              <div className={`w-10 h-6 rounded flex items-center justify-center text-white text-xs font-bold ${card.type==='Visa'?'bg-blue-700':card.type==='Mastercard'?'bg-orange-600':'bg-gray-600'}`} aria-hidden="true">
                {card.type==='Visa'?'VISA':card.type==='Mastercard'?'MC':'AMEX'}
              </div>
              <div>
                <p className="font-semibold text-sm text-gray-800">{card.type} ending in {card.last4}</p>
                <p className="text-xs text-gray-500">Expires {card.exp}</p>
              </div>
              {card.default && <span className="ml-2 bg-blue-600 text-white text-xs font-bold px-2 py-0.5 rounded">Default</span>}
            </div>
            <div className="flex gap-2">
              {!card.default && <button onClick={()=>setDefault(card.id)} className="text-xs text-blue-700 hover:text-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded transition-colors" aria-label={`Set ${card.type} ending in ${card.last4} as default payment`}>Set default</button>}
              <button onClick={()=>remove(card.id)} className="text-xs text-red-600 hover:text-red-800 focus:outline-none focus:ring-2 focus:ring-red-400 rounded transition-colors" aria-label={`Remove ${card.type} card ending in ${card.last4}`}>Remove</button>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

function Wishlist() {
  const [items, setItems] = useState(WISHLIST_ITEMS);
  const [msg, setMsg] = useState('');
  const announce = t => { setMsg(t); setTimeout(()=>setMsg(''),3000); };
  const remove = (id,name) => { setItems(prev=>prev.filter(i=>i.id!==id)); announce(`${name} removed from wishlist.`); };
  const addCart = (item) => { const cart = JSON.parse(localStorage.getItem('novamart_cart')||'[]'); const idx=cart.findIndex(i=>i.id===item.id); if(idx>=0)cart[idx].quantity+=1;else cart.push({...item,quantity:1}); localStorage.setItem('novamart_cart',JSON.stringify(cart)); announce(`${item.name} added to cart.`); };
  const makeImg = p => { const s=`<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect width="200" height="200" fill="#${p.hue}18"/><rect x="55" y="45" width="90" height="90" rx="12" fill="#${p.hue}35"/><text x="100" y="102" font-family="Arial" font-size="52" font-weight="bold" fill="#${p.hue}" text-anchor="middle" dominant-baseline="middle">${p.name[0]}</text></svg>`; return `data:image/svg+xml,${encodeURIComponent(s)}`; };
  return (
    <section aria-labelledby="wishlist-heading">
      <div role="status" aria-live="polite" className="sr-only">{msg}</div>
      <h2 id="wishlist-heading" className="text-xl font-bold text-gray-800 mb-4">Wishlist ({items.length} item{items.length!==1?'s':''})</h2>
      {items.length===0 ? (
        <div className="text-center py-12 bg-gray-50 rounded-xl"><p className="text-gray-500">Your wishlist is empty. <a href="products.html" className="text-blue-700 underline focus:outline-none focus:ring-1 focus:ring-blue-500 rounded">Browse products</a> to save items.</p></div>
      ) : (
        <div className="grid sm:grid-cols-2 gap-4">
          {items.map(item=>(
            <article key={item.id} className="bg-white border border-gray-200 rounded-xl overflow-hidden flex gap-3 p-3" aria-label={`Wishlist item: ${item.name}`}>
              <a href="product-detail.html" aria-label={`View details for ${item.name}`} className="flex-shrink-0 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-lg">
                <img src={makeImg(item)} alt={`${item.name} product image`} className="w-20 h-20 object-cover rounded-lg border border-gray-100" loading="lazy"/>
              </a>
              <div className="flex-1 min-w-0">
                <a href="product-detail.html" className="focus:outline-none focus:ring-2 focus:ring-blue-500 rounded">
                  <h3 className="font-semibold text-gray-800 text-sm line-clamp-2 hover:text-blue-700 leading-snug">{item.name}</h3>
                </a>
                <div className="mt-1 flex items-baseline gap-2">
                  <span className="text-blue-800 font-bold">${item.price.toFixed(2)}</span>
                  <span className="text-gray-400 text-xs line-through">${item.orig.toFixed(2)}</span>
                </div>
                <div className="mt-2 flex gap-2">
                  <button onClick={()=>addCart(item)} className="flex-1 py-1.5 bg-yellow-400 hover:bg-yellow-500 text-blue-900 text-xs font-semibold rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-colors" aria-label={`Add ${item.name} to cart from wishlist`}>
                    Add to Cart
                  </button>
                  <button onClick={()=>remove(item.id,item.name)} className="py-1.5 px-2 border border-gray-300 text-gray-500 hover:text-red-600 hover:border-red-300 text-xs rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400 transition-colors" aria-label={`Remove ${item.name} from wishlist`}>
                    <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  </button>
                </div>
              </div>
            </article>
          ))}
        </div>
      )}
    </section>
  );
}

function AccountSettings() {
  const [nameVal, setNameVal] = useState('Alex Johnson');
  const [emailVal, setEmailVal] = useState('alex.johnson@email.com');
  const [nameErr, setNameErr] = useState('');
  const [emailErr, setEmailErr] = useState('');
  const [saved, setSaved] = useState(false);
  const [msg, setMsg] = useState('');
  const nameRef = useRef(null);
  const emailRef = useRef(null);

  const save = e => {
    e.preventDefault();
    let valid = true;
    setNameErr(''); setEmailErr('');
    if (!nameVal.trim()) { setNameErr('Full name is required. Please enter your name.'); valid=false; setTimeout(()=>nameRef.current?.focus(),50); }
    else if (nameVal.trim().length<2) { setNameErr('Name must be at least 2 characters long.'); valid=false; setTimeout(()=>nameRef.current?.focus(),50); }
    if (!emailVal.trim()) { setEmailErr('Email address is required.'); if(valid){ valid=false; setTimeout(()=>emailRef.current?.focus(),50); } }
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) { setEmailErr('Please enter a valid email address (e.g. name@example.com).'); if(valid){ valid=false; setTimeout(()=>emailRef.current?.focus(),50); } }
    if (!valid) return;
    setSaved(true);
    setMsg('Account settings saved successfully.');
    setTimeout(()=>{ setSaved(false); setMsg(''); }, 3000);
  };

  return (
    <section aria-labelledby="settings-heading">
      <div role="status" aria-live="polite" className="sr-only">{msg}</div>
      <h2 id="settings-heading" className="text-xl font-bold text-gray-800 mb-4">Account Settings</h2>
      <div className="max-w-lg">
        <form onSubmit={save} noValidate aria-label="Account settings form">
          {/* Avatar */}
          <div className="flex items-center gap-4 mb-6 p-4 bg-blue-50 rounded-xl border border-blue-100">
            <div className="w-16 h-16 bg-blue-800 rounded-full flex items-center justify-center text-white text-2xl font-bold flex-shrink-0" aria-hidden="true">A</div>
            <div>
              <p className="font-semibold text-gray-800">Alex Johnson</p>
              <p className="text-sm text-gray-500">Member since January 2022</p>
              <button type="button" className="text-xs text-blue-700 hover:text-blue-900 mt-1 focus:outline-none focus:ring-1 focus:ring-blue-500 rounded transition-colors" aria-label="Change profile photo">Change photo</button>
            </div>
          </div>

          <fieldset className="space-y-4">
            <legend className="font-semibold text-gray-700 mb-2">Personal Information</legend>

            <div>
              <label htmlFor="full-name" className="block text-sm font-medium text-gray-700 mb-1">
                Full Name <span aria-hidden="true" className="text-red-500">*</span>
              </label>
              <input id="full-name" ref={nameRef} type="text" value={nameVal} onChange={e=>{setNameVal(e.target.value);setNameErr('');}}
                required aria-required="true"
                aria-describedby={nameErr?'name-error':undefined}
                aria-invalid={!!nameErr}
                className={`w-full px-4 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 ${nameErr?'border-red-500 bg-red-50':'border-gray-300'}`}/>
              {nameErr && <p id="name-error" role="alert" className="mt-1 text-xs text-red-600"><span aria-hidden="true">⚠ </span>{nameErr}</p>}
            </div>

            <div>
              <label htmlFor="email" className="block text-sm font-medium text-gray-700 mb-1">
                Email Address <span aria-hidden="true" className="text-red-500">*</span>
              </label>
              <input id="email" ref={emailRef} type="email" value={emailVal} onChange={e=>{setEmailVal(e.target.value);setEmailErr('');}}
                required aria-required="true"
                aria-describedby={emailErr?'email-error':undefined}
                aria-invalid={!!emailErr}
                className={`w-full px-4 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 ${emailErr?'border-red-500 bg-red-50':'border-gray-300'}`}/>
              {emailErr && <p id="email-error" role="alert" className="mt-1 text-xs text-red-600"><span aria-hidden="true">⚠ </span>{emailErr}</p>}
            </div>

            <div>
              <label htmlFor="phone" className="block text-sm font-medium text-gray-700 mb-1">Phone Number <span className="text-gray-400 font-normal">(optional)</span></label>
              <input id="phone" type="tel" defaultValue="+1 (415) 555-0182" placeholder="+1 (555) 000-0000"
                className="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" aria-describedby="phone-hint"/>
              <p id="phone-hint" className="mt-1 text-xs text-gray-400">Used for delivery updates and account security.</p>
            </div>
          </fieldset>

          <fieldset className="mt-5 space-y-3">
            <legend className="font-semibold text-gray-700 mb-2">Email Preferences</legend>
            <label className="flex items-start gap-3 cursor-pointer">
              <input type="checkbox" defaultChecked className="mt-0.5 rounded text-blue-600 focus:ring-blue-500 w-4 h-4" aria-label="Receive promotional emails and exclusive deals"/>
              <span className="text-sm text-gray-700">Promotional emails and exclusive deals</span>
            </label>
            <label className="flex items-start gap-3 cursor-pointer">
              <input type="checkbox" defaultChecked className="mt-0.5 rounded text-blue-600 focus:ring-blue-500 w-4 h-4" aria-label="Receive order updates and shipping notifications"/>
              <span className="text-sm text-gray-700">Order updates and shipping notifications</span>
            </label>
            <label className="flex items-start gap-3 cursor-pointer">
              <input type="checkbox" className="mt-0.5 rounded text-blue-600 focus:ring-blue-500 w-4 h-4" aria-label="Receive weekly product recommendations"/>
              <span className="text-sm text-gray-700">Weekly product recommendations</span>
            </label>
          </fieldset>

          <div className="mt-6 flex gap-3">
            <button type="submit" className={`px-6 py-2.5 rounded-lg font-semibold text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 ${saved?'bg-green-600 text-white focus:ring-green-500':'bg-blue-800 hover:bg-blue-900 text-white focus:ring-blue-500'}`}
              aria-label="Save account settings changes">
              {saved?'✓ Saved!':'Save Changes'}
            </button>
            <button type="button" className="px-6 py-2.5 rounded-lg font-semibold text-sm border border-gray-300 text-gray-600 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" aria-label="Cancel and discard changes">
              Cancel
            </button>
          </div>
          <p className="text-xs text-gray-400 mt-2"><span aria-hidden="true">*</span> Required fields</p>
        </form>

        {/* Danger zone */}
        <div className="mt-8 border border-red-200 rounded-xl p-4 bg-red-50">
          <h3 className="font-semibold text-red-700 mb-2">Danger Zone</h3>
          <p className="text-sm text-gray-600 mb-3">Permanently delete your account and all associated data. This action cannot be undone.</p>
          <button className="text-sm text-red-600 border border-red-300 hover:bg-red-100 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 transition-colors font-medium" aria-label="Delete NovaMart account permanently">
            Delete Account
          </button>
        </div>
      </div>
    </section>
  );
}

/* ─── App ─── */
const NAV_ITEMS = [
  { id:'orders',   label:'Order History',    icon:'📦' },
  { id:'addresses',label:'Saved Addresses',  icon:'📍' },
  { id:'payment',  label:'Payment Methods',  icon:'💳' },
  { id:'wishlist', label:'Wishlist',         icon:'❤️' },
  { id:'settings', label:'Account Settings', icon:'⚙️' },
];

function App() {
  const [section, setSection] = useState('orders');
  const contentRef = useRef(null);

  const navigate = id => {
    setSection(id);
    setTimeout(()=>contentRef.current?.focus(),50);
  };

  return (
    <div className="min-h-screen flex flex-col">
      <Header/>
      <main id="main-content" className="flex-1 container mx-auto px-4 py-6" tabIndex="-1">
        {/* Breadcrumb */}
        <nav aria-label="Breadcrumb" className="mb-4">
          <ol className="flex items-center gap-2 text-sm text-gray-500" role="list">
            <li><a href="index.html" className="hover:text-blue-700 focus:outline-none focus:ring-1 focus:ring-blue-500 rounded">Home</a></li>
            <li aria-hidden="true" className="text-gray-300">/</li>
            <li aria-current="page" className="text-gray-800 font-medium">My Account</li>
          </ol>
        </nav>

        <h1 className="text-2xl font-bold text-gray-800 mb-6">My Account</h1>

        <div className="flex gap-6">
          {/* Sidebar navigation */}
          <aside aria-label="Account navigation" className="w-56 flex-shrink-0 hidden md:block">
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="p-4 bg-blue-800 text-white">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center text-blue-900 font-bold text-lg flex-shrink-0" aria-hidden="true">A</div>
                  <div>
                    <p className="font-semibold text-sm">Alex Johnson</p>
                    <p className="text-xs text-blue-200">Member since 2022</p>
                  </div>
                </div>
              </div>
              <nav aria-label="Account sections" className="p-2">
                <ul role="list">
                  {NAV_ITEMS.map(item=>(
                    <li key={item.id}>
                      <button onClick={()=>navigate(item.id)}
                        aria-current={section===item.id?'page':undefined}
                        className={`w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 flex items-center gap-2 ${section===item.id?'bg-blue-50 text-blue-800':'text-gray-700 hover:bg-gray-100'}`}
                        aria-label={`Go to ${item.label} section`}>
                        <span aria-hidden="true">{item.icon}</span>
                        {item.label}
                      </button>
                    </li>
                  ))}
                </ul>
                <div className="border-t border-gray-100 mt-2 pt-2">
                  <button className="w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium text-red-600 hover:bg-red-50 transition-colors focus:outline-none focus:ring-2 focus:ring-red-400 flex items-center gap-2" aria-label="Sign out of your NovaMart account">
                    <span aria-hidden="true">🚪</span> Sign Out
                  </button>
                </div>
              </nav>
            </div>
          </aside>

          {/* Mobile section tabs */}
          <div className="md:hidden w-full mb-4">
            <div className="overflow-x-auto pb-1">
              <div className="flex gap-2" role="list" aria-label="Account section tabs">
                {NAV_ITEMS.map(item=>(
                  <div key={item.id} role="listitem">
                    <button onClick={()=>navigate(item.id)}
                      aria-current={section===item.id?'page':undefined}
                      className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 ${section===item.id?'bg-blue-800 text-white':'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`}
                      aria-label={`Go to ${item.label} section`}>
                      {item.icon} {item.label}
                    </button>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Main content area */}
          <div className="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 p-6" ref={contentRef} tabIndex="-1">
            {section==='orders'    && <OrderHistory/>}
            {section==='addresses' && <SavedAddresses/>}
            {section==='payment'   && <PaymentMethods/>}
            {section==='wishlist'  && <Wishlist/>}
            {section==='settings'  && <AccountSettings/>}
          </div>
        </div>
      </main>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
