<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart (3 items) | NovaMart</title>
  <meta name="description" content="Review and manage the items in your NovaMart shopping cart before proceeding to checkout." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *:focus-visible { outline: 3px solid #facc15 !important; outline-offset: 2px !important; }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0; }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── Default cart items shown on first load ─── */
const DEFAULT_ITEMS = [
  { id:1,  name:"Sony WH-1000XM5 Wireless Headphones",       price:279.99, orig:399.99, hue:"1e40af", cat:"Electronics", color:"Midnight Black", quantity:1 },
  { id:4,  name:"Instant Pot Duo 7-in-1 Pressure Cooker",    price:89.99,  orig:119.99, hue:"d97706", cat:"Kitchen",     color:"Standard",      quantity:2 },
  { id:16, name:"Hydro Flask 32oz Insulated Water Bottle",   price:44.95,  orig:49.95,  hue:"0284c7", cat:"Sports",      color:"Pacific Blue",   quantity:1 },
];

function productImg(item) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect width="200" height="200" fill="#${item.hue}18"/><rect x="55" y="45" width="90" height="90" rx="12" fill="#${item.hue}35"/><text x="100" y="102" font-family="Arial" font-size="52" font-weight="bold" fill="#${item.hue}" text-anchor="middle" dominant-baseline="middle">${item.name[0]}</text></svg>`;
  return `data:image/svg+xml,${encodeURIComponent(svg)}`;
}

function getCartCount() {
  try { return (JSON.parse(localStorage.getItem('novamart_cart')||'[]')).reduce((s,i)=>s+i.quantity,0); } catch { return 0; }
}

function Header({ count }) {
  return (
    <header className="bg-blue-900 text-white sticky top-0 z-50 shadow-lg">
      <a href="#main-content" className="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:bg-yellow-400 focus:text-blue-900 focus:px-4 focus:py-2 focus:rounded-md focus:font-semibold focus:z-50">Skip to main content</a>
      <div className="container mx-auto px-4">
        <div className="flex items-center gap-4 py-3">
          <a href="index.html" className="flex-shrink-0 text-2xl font-bold text-yellow-400 hover:text-yellow-300 rounded px-1 focus:outline-none focus:ring-2 focus:ring-yellow-400" aria-label="NovaMart – Go to homepage">NovaMart</a>
          <div className="flex-1 max-w-2xl">
            <form role="search" onSubmit={e=>e.preventDefault()} className="flex">
              <label htmlFor="site-search" className="sr-only">Search NovaMart products</label>
              <input id="site-search" type="search" placeholder="Search products, brands, categories…" className="flex-1 px-4 py-2 rounded-l text-gray-900 focus:outline-none focus:ring-2 focus:ring-yellow-400 border-2 border-transparent"/>
              <button type="submit" className="bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-semibold px-5 py-2 rounded-r focus:outline-none focus:ring-2 focus:ring-yellow-300 transition-colors" aria-label="Submit search">
                <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              </button>
            </form>
          </div>
          <nav aria-label="User account and shopping" className="flex items-center gap-1">
            <a href="account.html" className="flex flex-col items-center text-sm hover:text-yellow-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 rounded px-2 py-1 transition-colors" aria-label="My account">
              <svg aria-hidden="true" className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              <span aria-hidden="true" className="hidden md:block text-xs">Account</span>
            </a>
            <a href="cart.html" className="relative flex flex-col items-center text-sm text-yellow-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 rounded px-2 py-1" aria-label={`Shopping cart, ${count} item${count!==1?'s':''}, currently viewing`} aria-current="page">
              <svg aria-hidden="true" className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
              <span aria-hidden="true" className="hidden md:block text-xs">Cart</span>
              {count>0 && <span aria-hidden="true" className="absolute -top-1 right-0 bg-yellow-400 text-blue-900 text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">{count>99?'99+':count}</span>}
            </a>
          </nav>
        </div>
        <nav aria-label="Main navigation" className="border-t border-blue-800">
          <ul className="flex gap-1 py-2 overflow-x-auto" role="list">
            {[['Home','index.html'],['Products','products.html'],['Electronics','products.html'],['Kitchen','products.html'],['Clothing','products.html'],['Sports','products.html']].map(([l,h])=>(
              <li key={l}><a href={h} className="whitespace-nowrap text-sm hover:text-yellow-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 rounded px-3 py-1 block transition-colors">{l}</a></li>
            ))}
          </ul>
        </nav>
      </div>
    </header>
  );
}

function Footer() {
  return (
    <footer className="bg-blue-900 text-white mt-12" role="contentinfo">
      <div className="container mx-auto px-4 py-10">
        <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
          <div><p className="text-yellow-400 font-bold text-xl mb-3">NovaMart</p><p className="text-blue-200 text-sm">Your modern marketplace for electronics, home goods, and apparel.</p></div>
          {[['Shop',['Electronics','Kitchen','Clothing','Sports']],['Service',['Help Center','Returns','Order Tracking','Contact Us']],['Company',['About NovaMart','Careers','Press','Privacy Policy']]].map(([h,ls])=>(
            <div key={h}><h2 className="font-semibold mb-3 text-base">{h}</h2><ul className="space-y-2 text-blue-200 text-sm" role="list">{ls.map(l=><li key={l}><a href="#" className="hover:text-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400 rounded transition-colors">{l}</a></li>)}</ul></div>
          ))}
        </div>
        <div className="border-t border-blue-800 mt-8 pt-6 text-center"><p className="text-blue-200 text-sm">© 2024 NovaMart, Inc. All rights reserved.</p></div>
      </div>
    </footer>
  );
}

/* ─── App ─── */
function App() {
  const [items, setItems] = useState(DEFAULT_ITEMS);
  const [promo, setPromo] = useState('');
  const [promoApplied, setPromoApplied] = useState(null);
  const [promoError, setPromoError] = useState('');
  const [msg, setMsg] = useState('');
  const [checkoutClicked, setCheckoutClicked] = useState(false);
  const promoRef = useRef(null);
  const promoErrorRef = useRef(null);

  const count = items.reduce((s,i)=>s+i.quantity, 0);

  const announce = text => { setMsg(text); setTimeout(()=>setMsg(''),4000); };

  const updateQty = (id, delta) => {
    setItems(prev=>{
      const next = prev.map(item=>{
        if (item.id!==id) return item;
        const newQty = Math.max(1, Math.min(99, item.quantity+delta));
        announce(`${item.name} quantity updated to ${newQty}.`);
        return { ...item, quantity:newQty };
      });
      return next;
    });
  };

  const setQtyDirect = (id, val) => {
    const qty = Math.max(1, Math.min(99, parseInt(val)||1));
    setItems(prev=>prev.map(item=>item.id===id?{...item,quantity:qty}:item));
  };

  const removeItem = (id, name) => {
    setItems(prev=>prev.filter(i=>i.id!==id));
    announce(`${name} has been removed from your cart.`);
  };

  const subtotal = items.reduce((s,i)=>s+(i.price*i.quantity),0);
  const shipping = subtotal > 35 ? 0 : 4.99;
  const discount = promoApplied ? subtotal * 0.1 : 0;
  const total = subtotal + shipping - discount;

  const VALID_PROMOS = { 'SAVE10':'10% off your order', 'NOVA10':'10% off your order' };
  const applyPromo = () => {
    setPromoError('');
    const code = promo.trim().toUpperCase();
    if (!code) {
      setPromoError('Please enter a promo code before applying.');
      promoRef.current?.focus();
      return;
    }
    if (VALID_PROMOS[code]) {
      setPromoApplied(code);
      announce(`Promo code ${code} applied! ${VALID_PROMOS[code]}.`);
    } else {
      setPromoApplied(null);
      setPromoError(`"${promo}" is not a valid promo code. Please check the code and try again.`);
      setTimeout(()=>promoErrorRef.current?.focus(),50);
    }
  };

  return (
    <div className="min-h-screen flex flex-col">
      <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{msg}</div>
      <Header count={count}/>
      <main id="main-content" className="flex-1 container mx-auto px-4 py-6" tabIndex="-1">
        {/* Breadcrumb */}
        <nav aria-label="Breadcrumb" className="mb-4">
          <ol className="flex items-center gap-2 text-sm text-gray-500" role="list">
            <li><a href="index.html" className="hover:text-blue-700 focus:outline-none focus:ring-1 focus:ring-blue-500 rounded">Home</a></li>
            <li aria-hidden="true" className="text-gray-300">/</li>
            <li aria-current="page" className="text-gray-800 font-medium">Shopping Cart</li>
          </ol>
        </nav>

        <h1 className="text-2xl font-bold text-gray-800 mb-6">
          Shopping Cart
          <span className="ml-2 text-base font-normal text-gray-500" aria-live="polite">{count} item{count!==1?'s':''}</span>
        </h1>

        {items.length===0 ? (
          <div className="text-center py-20 bg-white rounded-2xl shadow-sm border border-gray-100">
            <p className="text-6xl mb-4" aria-hidden="true">🛒</p>
            <h2 className="text-xl font-bold text-gray-700 mb-2">Your cart is empty</h2>
            <p className="text-gray-500 mb-6">Browse our products and find something you'll love.</p>
            <a href="products.html" className="inline-block bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-bold px-8 py-3 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:ring-offset-2" aria-label="Browse all products">
              Continue Shopping
            </a>
          </div>
        ) : (
          <div className="grid lg:grid-cols-3 gap-6">
            {/* Cart Items */}
            <div className="lg:col-span-2 space-y-4">
              <section aria-label="Cart items list">
                <ul role="list" className="space-y-4">
                  {items.map(item=>(
                    <li key={item.id}>
                      <article className="bg-white rounded-xl shadow-sm border border-gray-100 p-4" aria-label={`Cart item: ${item.name}`}>
                        <div className="flex gap-4">
                          <a href="product-detail.html" aria-label={`View details for ${item.name}`} className="flex-shrink-0 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-lg">
                            <img src={productImg(item)} alt={`${item.name} product image`} className="w-24 h-24 object-cover rounded-lg border border-gray-100" loading="lazy"/>
                          </a>
                          <div className="flex-1 min-w-0">
                            <div className="flex justify-between gap-2">
                              <div>
                                <p className="text-xs text-gray-400 mb-0.5">{item.cat}</p>
                                <a href="product-detail.html" className="focus:outline-none focus:ring-2 focus:ring-blue-500 rounded">
                                  <h2 className="font-semibold text-gray-800 hover:text-blue-700 transition-colors leading-snug">{item.name}</h2>
                                </a>
                                {item.color && <p className="text-xs text-gray-500 mt-0.5">Color: {item.color}</p>}
                              </div>
                              <div className="text-right flex-shrink-0">
                                <p className="font-bold text-blue-800 text-lg">${(item.price*item.quantity).toFixed(2)}</p>
                                <p className="text-xs text-gray-400">${item.price.toFixed(2)} each</p>
                              </div>
                            </div>
                            <div className="mt-3 flex items-center justify-between flex-wrap gap-3">
                              {/* Quantity control */}
                              <div role="group" aria-label={`Quantity for ${item.name}`} className="flex items-center gap-2">
                                <button onClick={()=>updateQty(item.id,-1)}
                                  aria-label={`Decrease quantity of ${item.name}`}
                                  className="w-8 h-8 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base font-bold transition-colors flex items-center justify-center">−</button>
                                <input type="number" min="1" max="99" value={item.quantity}
                                  onChange={e=>setQtyDirect(item.id,e.target.value)}
                                  aria-label={`Quantity of ${item.name}, currently ${item.quantity}`}
                                  className="w-12 text-center border border-gray-300 rounded-lg py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-800 font-semibold"/>
                                <button onClick={()=>updateQty(item.id,1)}
                                  aria-label={`Increase quantity of ${item.name}`}
                                  className="w-8 h-8 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base font-bold transition-colors flex items-center justify-center">+</button>
                              </div>
                              <div className="flex gap-3">
                                <button className="text-sm text-blue-700 hover:text-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded transition-colors" aria-label={`Save ${item.name} to wishlist`}>
                                  Save for later
                                </button>
                                <button onClick={()=>removeItem(item.id, item.name)}
                                  className="text-sm text-red-600 hover:text-red-800 focus:outline-none focus:ring-2 focus:ring-red-400 rounded transition-colors"
                                  aria-label={`Remove ${item.name} from cart`}>
                                  Remove
                                </button>
                              </div>
                            </div>
                          </div>
                        </div>
                      </article>
                    </li>
                  ))}
                </ul>
              </section>
              <div className="text-right">
                <a href="products.html" className="text-blue-700 hover:text-blue-900 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 rounded transition-colors" aria-label="Continue shopping and add more products">
                  ← Continue Shopping
                </a>
              </div>
            </div>

            {/* Order Summary */}
            <aside aria-label="Order summary" className="lg:col-span-1">
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sticky top-24">
                <h2 className="text-lg font-bold text-gray-800 mb-4">Order Summary</h2>
                <dl className="space-y-2 text-sm">
                  <div className="flex justify-between">
                    <dt className="text-gray-600">Subtotal ({count} item{count!==1?'s':''})</dt>
                    <dd className="font-semibold text-gray-800">${subtotal.toFixed(2)}</dd>
                  </div>
                  <div className="flex justify-between">
                    <dt className="text-gray-600">Shipping estimate</dt>
                    <dd className={`font-semibold ${shipping===0?'text-green-700':'text-gray-800'}`}>
                      {shipping===0?'Free':  `$${shipping.toFixed(2)}`}
                    </dd>
                  </div>
                  {shipping>0 && <div className="text-xs text-blue-700 -mt-1">Add ${(35-subtotal).toFixed(2)} more for free shipping</div>}
                  {promoApplied && (
                    <div className="flex justify-between text-green-700">
                      <dt>Promo: {promoApplied} <button onClick={()=>{setPromoApplied(null);setPromo('');announce('Promo code removed.');}} className="text-xs underline hover:no-underline focus:outline-none focus:ring-1 focus:ring-green-500 rounded" aria-label={`Remove promo code ${promoApplied}`}>(remove)</button></dt>
                      <dd className="font-semibold">−${discount.toFixed(2)}</dd>
                    </div>
                  )}
                  <div className="border-t border-gray-200 pt-2 flex justify-between text-base">
                    <dt className="font-bold text-gray-800">Order Total</dt>
                    <dd className="font-bold text-blue-800 text-lg">${total.toFixed(2)}</dd>
                  </div>
                </dl>

                {/* Promo Code */}
                <div className="mt-4">
                  <p className="text-sm font-semibold text-gray-700 mb-2">Promo Code</p>
                  <div className="flex gap-2">
                    <div className="flex-1">
                      <label htmlFor="promo-code" className="sr-only">Enter promo code</label>
                      <input id="promo-code" ref={promoRef} type="text" value={promo} onChange={e=>{setPromo(e.target.value);setPromoError('');}}
                        placeholder="e.g. SAVE10"
                        aria-required="false"
                        aria-describedby={promoError?'promo-error':'promo-hint'}
                        aria-invalid={!!promoError}
                        className={`w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 ${promoError?'border-red-500':'border-gray-300'}`}
                        onKeyDown={e=>e.key==='Enter'&&applyPromo()}/>
                    </div>
                    <button onClick={applyPromo} className="px-4 py-2 bg-blue-800 hover:bg-blue-900 text-white text-sm font-semibold rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" aria-label="Apply promo code">
                      Apply
                    </button>
                  </div>
                  {!promoError && !promoApplied && <p id="promo-hint" className="text-xs text-gray-400 mt-1">Try SAVE10 for 10% off</p>}
                  {promoApplied && <p className="text-xs text-green-700 mt-1 font-semibold" role="status">✓ {VALID_PROMOS[promoApplied]}</p>}
                  {promoError && (
                    <p id="promo-error" ref={promoErrorRef} role="alert" tabIndex="-1" className="text-xs text-red-600 mt-1 font-medium" aria-live="assertive">
                      <span aria-hidden="true">⚠ </span>{promoError}
                    </p>
                  )}
                </div>

                {/* Checkout */}
                <button
                  onClick={()=>{ setCheckoutClicked(true); announce('Proceeding to checkout. Redirecting to payment page.'); }}
                  className={`mt-5 w-full py-3 rounded-full font-bold text-base transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 ${checkoutClicked?'bg-green-600 text-white focus:ring-green-500':'bg-yellow-400 hover:bg-yellow-500 text-blue-900 focus:ring-yellow-400'}`}
                  aria-label={`Proceed to checkout with ${count} item${count!==1?'s':''}, total $${total.toFixed(2)}`}>
                  {checkoutClicked?'Redirecting…':'Proceed to Checkout'}
                </button>
                <p className="text-xs text-gray-400 text-center mt-2">
                  <svg aria-hidden="true" className="w-3 h-3 inline mr-1" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clipRule="evenodd"/></svg>
                  Secure checkout powered by NovaMart
                </p>

                {/* Accepted payments */}
                <div className="mt-4 pt-4 border-t border-gray-100">
                  <p className="text-xs text-gray-400 text-center mb-2">We accept</p>
                  <div className="flex justify-center gap-2 flex-wrap" role="list" aria-label="Accepted payment methods">
                    {['Visa','MC','Amex','PayPal','Apple Pay'].map(p=>(
                      <span key={p} role="listitem" className="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded font-medium">{p}</span>
                    ))}
                  </div>
                </div>
              </div>
            </aside>
          </div>
        )}
      </main>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
