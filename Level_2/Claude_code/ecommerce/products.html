function productImg(p) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect width="400" height="400" fill="#${p.hue}18"/><rect x="140" y="110" width="120" height="120" rx="16" fill="#${p.hue}35"/><text x="200" y="190" font-family="Arial" font-size="72" font-weight="bold" fill="#${p.hue}" text-anchor="middle">${p.name[0]}</text><text x="200" y="330" font-family="Arial,sans-serif" font-size="15" fill="#${p.hue}aa" text-anchor="middle">${p.cat}</text></svg>`;
  return `data:image/svg+xml,${encodeURIComponent(svg)}`;
}

function getCartCount() {
  try { return (JSON.parse(localStorage.getItem('novamart_cart')||'[]')).reduce((s,i)=>s+i.quantity,0); } catch { return 0; }
}
function addToCart(product, qty=1) {
  try {
    const cart = JSON.parse(localStorage.getItem('novamart_cart')||'[]');
    const idx = cart.findIndex(i=>i.id===product.id);
    if (idx>=0) cart[idx].quantity+=qty; else cart.push({...product,quantity:qty});
    localStorage.setItem('novamart_cart', JSON.stringify(cart));
    return true;
  } catch { return false; }
}

      <span className="text-gray-500 text-xs">({reviews.toLocaleString()})</span>
    </div>
  );
}

/* ─── Filter Panel ─── */
const BRANDS = ['Sony','Apple','Samsung','Nike','Levi\'s','Adidas','Fitbit','Canon','KitchenAid','Cuisinart','Lodge','Under Armour','Hydro Flask','Logitech','Amazon','Patagonia','Columbia','NordicTrack'];
const PRICE_RANGES = [{label:'Under $50',min:0,max:50},{label:'$50 – $100',min:50,max:100},{label:'$100 – $250',min:100,max:250},{label:'$250+',min:250,max:Infinity}];
const RATING_OPTS = [{label:'4 Stars & Up',val:4},{label:'3 Stars & Up',val:3},{label:'2 Stars & Up',val:2}];

function FilterPanel({ filters, onChange }) {
  const toggle = (key, val) => {
    const cur = filters[key]||[];
    onChange({ ...filters, [key]: cur.includes(val) ? cur.filter(v=>v!==val) : [...cur, val] });
  };
  return (
    <aside aria-label="Product filters" className="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
      <h2 className="font-bold text-lg text-gray-800 mb-5">Filters</h2>

      {/* Category */}
      <fieldset className="mb-5">
        <legend className="font-semibold text-gray-700 mb-3 text-sm uppercase tracking-wide">Department</legend>
        <div className="space-y-2">
          {['Electronics','Kitchen','Clothing','Sports'].map(c=>(
            <label key={c} className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer hover:text-blue-700">
              <input type="checkbox" checked={(filters.cats||[]).includes(c)} onChange={()=>toggle('cats',c)}
                className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4" aria-label={`Filter by ${c} department`}/>
              {c}
            </label>
          ))}
        </div>
      </fieldset>

      {/* Price */}
      <fieldset className="mb-5">
        <legend className="font-semibold text-gray-700 mb-3 text-sm uppercase tracking-wide">Price Range</legend>
        <div className="space-y-2">
          {PRICE_RANGES.map(r=>(
            <label key={r.label} className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer hover:text-blue-700">
              <input type="checkbox" checked={(filters.prices||[]).includes(r.label)} onChange={()=>toggle('prices',r.label)}
                className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4" aria-label={`Filter by price range ${r.label}`}/>
              {r.label}
            </label>
          ))}
        </div>
      </fieldset>

      {/* Brand */}
      <fieldset className="mb-5">
        <legend className="font-semibold text-gray-700 mb-3 text-sm uppercase tracking-wide">Brand</legend>
        <div className="space-y-2 max-h-48 overflow-y-auto pr-1">
          {BRANDS.map(b=>(
            <label key={b} className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer hover:text-blue-700">
              <input type="checkbox" checked={(filters.brands||[]).includes(b)} onChange={()=>toggle('brands',b)}
                className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4" aria-label={`Filter by brand ${b}`}/>
              {b}
            </label>
          ))}
        </div>
      </fieldset>

      {/* Rating */}
      <fieldset className="mb-5">
        <legend className="font-semibold text-gray-700 mb-3 text-sm uppercase tracking-wide">Customer Rating</legend>
        <div className="space-y-2">
          {RATING_OPTS.map(r=>(
            <label key={r.label} className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer hover:text-blue-700">
              <input type="radio" name="rating-filter" checked={(filters.minRating||0)===r.val} onChange={()=>onChange({...filters,minRating:r.val})}
                className="text-blue-600 focus:ring-blue-500 w-4 h-4" aria-label={`Show products rated ${r.label}`}/>
              <span className="text-yellow-400 text-xs">{'★'.repeat(r.val)}</span> {r.label}
            </label>
          ))}
          <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer hover:text-blue-700">
            <input type="radio" name="rating-filter" checked={!filters.minRating} onChange={()=>onChange({...filters,minRating:0})}
              className="text-blue-600 focus:ring-blue-500 w-4 h-4" aria-label="Show all ratings"/>
            All ratings
          </label>
        </div>
      </fieldset>

      {/* Availability */}
      <fieldset>
        <legend className="font-semibold text-gray-700 mb-3 text-sm uppercase tracking-wide">Availability</legend>
        <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer hover:text-blue-700">
          <input type="checkbox" checked={filters.inStockOnly||false} onChange={e=>onChange({...filters,inStockOnly:e.target.checked})}
            className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4" aria-label="Show in-stock items only"/>
          In Stock Only
        </label>
      </fieldset>

      <button onClick={()=>onChange({})} className="mt-6 w-full py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" aria-label="Clear all product filters">
        Clear All Filters
      </button>
    </aside>
  );
}

/* ─── Product Card ─── */
function ProductCard({ product, onAddToCart }) {
  const [added, setAdded] = useState(false);
  const handleAdd = () => {
    addToCart(product);
    setAdded(true);
    document.dispatchEvent(new Event('novamart:cartupdate'));
    onAddToCart && onAddToCart(product.name);
    setTimeout(()=>setAdded(false),1500);
  };
  return (
    <article className="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow overflow-hidden border border-gray-100 flex flex-col h-full" aria-label={product.name}>
      <a href="product-detail.html" className="block relative focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500" aria-label={`View details for ${product.name}`}>
        <div className="relative">
          <img src={productImg(product)} alt={`${product.name} product image`} className="w-full h-44 object-cover" loading="lazy"/>
          {product.badge && <span aria-label={`Label: ${product.badge}`} className="absolute top-2 left-2 bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded">{product.badge}</span>}
          {product.disc>0 && <span aria-hidden="true" className="absolute top-2 right-2 bg-green-600 text-white text-xs font-bold px-2 py-0.5 rounded">-{product.disc}%</span>}
          {!product.stock && <div aria-hidden="true" className="absolute inset-0 bg-gray-900/50 flex items-center justify-center"><span className="bg-white text-gray-700 font-semibold px-3 py-1 rounded text-sm">Out of Stock</span></div>}
        </div>
      </a>
      <div className="p-3 flex flex-col flex-1">
        <p className="text-xs text-gray-400 mb-1">{product.brand} · {product.cat}</p>
        <a href="product-detail.html" className="focus:outline-none focus:ring-2 focus:ring-blue-500 rounded">
          <h3 className="font-semibold text-gray-800 text-sm line-clamp-2 hover:text-blue-700 transition-colors leading-snug">{product.name}</h3>
        </a>
        <div className="mt-1"><Stars rating={product.rating} reviews={product.reviews}/></div>
        <div className="mt-2 flex items-baseline gap-2">
          <span className="text-blue-800 font-bold text-lg">${product.price.toFixed(2)}</span>
          {product.orig>product.price && <span className="text-gray-400 text-sm line-through" aria-label={`Original price $${product.orig.toFixed(2)}`}>${product.orig.toFixed(2)}</span>}
        </div>
        <div className="mt-auto pt-3">
          <button onClick={handleAdd} disabled={!product.stock||added}
            className={`w-full py-2 px-3 rounded-lg text-sm font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 ${!product.stock?'bg-gray-200 text-gray-500 cursor-not-allowed':added?'bg-green-600 text-white focus:ring-green-500':'bg-yellow-400 hover:bg-yellow-500 text-blue-900 focus:ring-yellow-500'}`}
            aria-label={product.stock?`Add ${product.name} to cart`:`${product.name} is out of stock`}
            aria-disabled={!product.stock}>
            {added?'✓ Added to Cart':product.stock?'Add to Cart':'Out of Stock'}
          </button>
        </div>
      </div>
    </article>
  );
}

/* ─── App ─── */
function App() {
  const [filters, setFilters] = useState({});
  const [sort, setSort] = useState('best');
  const [msg, setMsg] = useState('');
  const [loading, setLoading] = useState(false);
  const resultsRef = useRef(null);

  const handleAdd = name => {
    setMsg(`${name} has been added to your cart.`);
    setTimeout(()=>setMsg(''),3000);
  };

  const handleFilterChange = newFilters => {
    setLoading(true);
    setFilters(newFilters);
    setTimeout(()=>{
      setLoading(false);
      setMsg(`Filters updated. Showing ${filtered.length} products.`);
      setTimeout(()=>setMsg(''),3000);
    },300);
  };

  const filtered = useMemo(()=>{
    let list = [...PRODUCTS];
    if (filters.cats?.length) list = list.filter(p=>filters.cats.includes(p.cat));
    if (filters.brands?.length) list = list.filter(p=>filters.brands.includes(p.brand));
    if (filters.prices?.length) {
      list = list.filter(p=>filters.prices.some(label=>{
        const r = PRICE_RANGES.find(x=>x.label===label);
        return r && p.price>=r.min && p.price<r.max;
      }));
    }
    if (filters.minRating) list = list.filter(p=>p.rating>=filters.minRating);
    if (filters.inStockOnly) list = list.filter(p=>p.stock);
    if (sort==='price-asc') list.sort((a,b)=>a.price-b.price);
    else if (sort==='price-desc') list.sort((a,b)=>b.price-a.price);
    else if (sort==='rating') list.sort((a,b)=>b.rating-a.rating);
    else if (sort==='discount') list.sort((a,b)=>b.disc-a.disc);
    return list;
  },[filters, sort]);

  const activeCount = (filters.cats?.length||0)+(filters.brands?.length||0)+(filters.prices?.length||0)+(filters.minRating?1:0)+(filters.inStockOnly?1:0);

  return (
    <div className="min-h-screen flex flex-col">
      <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{msg}</div>
      <Header/>
      <main id="main-content" className="flex-1 container mx-auto px-4 py-6" tabIndex="-1">
        {/* Breadcrumb */}
        <nav aria-label="Breadcrumb" className="mb-4">
          <ol className="flex items-center gap-2 text-sm text-gray-500" role="list">
            <li><a href="index.html" className="hover:text-blue-700 focus:outline-none focus:ring-1 focus:ring-blue-500 rounded">Home</a></li>
            <li aria-hidden="true" className="text-gray-300">/</li>
            <li aria-current="page" className="text-gray-800 font-medium">All Products</li>
          </ol>
        </nav>

        <h1 className="text-2xl font-bold text-gray-800 mb-6">
          All Products
          {activeCount>0 && <span className="ml-2 text-sm font-normal text-blue-700">({activeCount} filter{activeCount!==1?'s':''} active)</span>}
        </h1>

        <div className="flex gap-6">
          {/* Sidebar */}
          <div className="w-60 flex-shrink-0 hidden md:block">
            <FilterPanel filters={filters} onChange={handleFilterChange}/>
          </div>

          {/* Main content */}
          <div className="flex-1">
            {/* Sort + result count */}
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-5 bg-white rounded-xl p-3 shadow-sm border border-gray-100">
              <p className="text-sm text-gray-600" aria-live="polite" aria-atomic="true">
                Showing <strong>{filtered.length}</strong> of <strong>{PRODUCTS.length}</strong> products
              </p>
              <fieldset>
                <legend className="sr-only">Sort products</legend>
                <div className="flex items-center gap-2">
                  <span className="text-sm text-gray-600 font-medium" aria-hidden="true">Sort:</span>
                  {[['best','Best Match'],['price-asc','Price: Low to High'],['price-desc','Price: High to Low'],['rating','Customer Rating'],['discount','Biggest Discount']].map(([v,l])=>(
                    <button key={v} onClick={()=>setSort(v)}
                      className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 ${sort===v?'bg-blue-800 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                      aria-pressed={sort===v} aria-label={`Sort by ${l}`}>
                      {l}
                    </button>
                  ))}
                </div>
              </fieldset>
            </div>

            {/* Results */}
            <div ref={resultsRef} aria-busy={loading} aria-live="polite">
              {loading && <p className="sr-only" aria-live="assertive">Loading filtered results…</p>}
              {filtered.length===0 ? (
                <div className="text-center py-20">
                  <p className="text-5xl mb-4" aria-hidden="true">🔍</p>
                  <h2 className="text-xl font-bold text-gray-700 mb-2">No products found</h2>
                  <p className="text-gray-500 mb-4">Try adjusting your filters to see more results.</p>
                  <button onClick={()=>setFilters({})} className="bg-blue-800 text-white px-6 py-2 rounded-lg hover:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" aria-label="Clear all filters and show all products">
                    Clear All Filters
                  </button>
                </div>
              ) : (
                <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                  {filtered.map(p=><ProductCard key={p.id} product={p} onAddToCart={handleAdd}/>)}
                </div>
              )}
            </div>
          </div>
        </div>
      </main>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
