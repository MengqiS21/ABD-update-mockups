];

function getCartCount() {
  try { return (JSON.parse(localStorage.getItem('novamart_cart')||'[]')).reduce((s,i)=>s+i.quantity,0); } catch { return 0; }
}
function addToCart(product, qty=1) {
  try {
    const cart = JSON.parse(localStorage.getItem('novamart_cart')||'[]');
    const idx = cart.findIndex(i=>i.id===product.id);
    if (idx>=0) cart[idx].quantity+=qty; else cart.push({...product,quantity:qty});
    localStorage.setItem('novamart_cart', JSON.stringify(cart));
    return true;
  } catch { return false; }
}

function Stars({ rating, reviews, size='sm' }) {
  return (
    <div className="flex items-center gap-1">

      </span>
      {reviews && <span className="text-gray-500 text-sm">({reviews.toLocaleString()} reviews)</span>}
    </div>
  );
}

              <span aria-hidden="true" className="hidden md:block text-xs">Cart</span>

        <nav aria-label="Main navigation" className="border-t border-blue-800">

/* ─── Related Product Card ─── */

/* ─── Main App ─── */
function App() {

  const tabPanelRef = useRef(null);

  const announce = text => { setMsg(text); setTimeout(()=>setMsg(''),3500); };

  const handleAddToCart = () => {
    addToCart({...PRODUCT, color, price:PRODUCT.price}, qty);
    setCartAdded(true);
    document.dispatchEvent(new Event('novamart:cartupdate'));
    announce(`${PRODUCT.name} (${color}, qty ${qty}) has been added to your cart.`);
    setTimeout(()=>setCartAdded(false),2000);

  const toggleWishlist = () => {
    const next = !wishlist;
    setWishlist(next);
    announce(next ? `${PRODUCT.name} has been saved to your wishlist.` : `${PRODUCT.name} has been removed from your wishlist.`);
  };

    { id:'description', label:'Description' },
    { id:'specs', label:'Specifications' },
    { id:'reviews', label:`Reviews (${REVIEWS.length})` },
  ];

  const handleTabKey = e => {
    const tabEls = document.querySelectorAll('[role="tab"]');
    const idx = [...tabEls].findIndex(el=>el===document.activeElement);
    if (e.key==='ArrowRight') { e.preventDefault(); tabEls[(idx+1)%tabEls.length].focus(); }

              <li aria-current="page" className="text-gray-800 font-medium truncate max-w-xs">Sony WH-1000XM5</li>
            </ol>

              <div className="relative rounded-xl overflow-hidden bg-gray-50 mb-3 border border-gray-100">
                <img src={GALLERY[activeImg].src} alt={GALLERY[activeImg].alt} className="w-full h-80 object-contain p-4"/>
              </div>
              <div className="flex gap-2" role="list" aria-label="Product image thumbnails">
                {GALLERY.map((img,i)=>(
                  <div key={img.id} role="listitem">
                    <button
                      onClick={()=>setActiveImg(i)}
                      aria-label={`View ${img.alt}`}
                      aria-pressed={i===activeImg}
                      className={`rounded-lg overflow-hidden border-2 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 ${i===activeImg?'border-blue-600':'border-gray-200 hover:border-gray-400'}`}>
                      <img src={img.src} alt="" aria-hidden="true" className="w-16 h-16 object-cover"/>
                    </button>
                  </div>

              </div>
            </section>

            {/* Product Info */}
            <section aria-label="Product information and purchase options">
              <div className="flex items-start justify-between gap-3">
                <div>
                  <p className="text-sm text-blue-700 font-semibold mb-1">
                    <a href="products.html" className="hover:underline focus:outline-none focus:ring-1 focus:ring-blue-500 rounded">Sony</a> · Electronics
                  </p>
                  <h1 className="text-2xl font-bold text-gray-900 leading-tight">{PRODUCT.name}</h1>
                </div>
                <button onClick={toggleWishlist}

                      {c}

                  {PRODUCT.features.map(f=>(
                    <li key={f} className="flex items-start gap-2 text-sm text-gray-700">
                      <svg aria-hidden="true" className="w-4 h-4 text-green-600 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>
                      {f}
                    </li>
                  ))}
                </ul>
              </div>
            </section>
          </div>

          {/* Tabs: Description / Specs / Reviews */}
          <div className="mt-8 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div role="tablist" aria-label="Product information tabs" className="flex border-b border-gray-200" onKeyDown={handleTabKey}>
              {tabs.map(t=>(
                <button key={t.id} role="tab" id={`tab-${t.id}`} aria-selected={tab===t.id} aria-controls={`tabpanel-${t.id}`}
                  onClick={()=>{ setTab(t.id); setTimeout(()=>tabPanelRef.current?.focus(),50); }}
                  className={`px-6 py-4 text-sm font-semibold border-b-2 transition-colors focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500 ${tab===t.id?'border-blue-600 text-blue-700':'border-transparent text-gray-600 hover:text-gray-800 hover:border-gray-300'}`}>
                  {t.label}
                </button>
              ))}
            </div>

            {tab==='description' && (
              <div id="tabpanel-description" role="tabpanel" aria-labelledby="tab-description" ref={tabPanelRef} tabIndex="0" className="p-6">
                <h2 className="text-xl font-bold text-gray-800 mb-4">Product Description</h2>
                {PRODUCT.description.split('\n\n').map((para,i)=>(
                  <p key={i} className="text-gray-700 leading-relaxed mb-4">{para}</p>
                ))}
              </div>
            )}
            {tab==='specs' && (
              <div id="tabpanel-specs" role="tabpanel" aria-labelledby="tab-specs" ref={tabPanelRef} tabIndex="0" className="p-6">
                <h2 className="text-xl font-bold text-gray-800 mb-4">Technical Specifications</h2>
                <table className="w-full text-sm border-collapse" aria-label="Sony WH-1000XM5 technical specifications">
                  <caption className="sr-only">Technical specifications for Sony WH-1000XM5 Wireless Headphones</caption>
                  <tbody>
                    {PRODUCT.specs.map(([k,v],i)=>(
                      <tr key={k} className={i%2===0?'bg-gray-50':''}>
                        <th scope="row" className="py-3 px-4 text-left font-semibold text-gray-700 w-1/3">{k}</th>
                        <td className="py-3 px-4 text-gray-600">{v}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
            {tab==='reviews' && (
              <div id="tabpanel-reviews" role="tabpanel" aria-labelledby="tab-reviews" ref={tabPanelRef} tabIndex="0" className="p-6">
                <div className="flex items-center justify-between mb-6">
                  <h2 className="text-xl font-bold text-gray-800">Customer Reviews</h2>
                  <div className="flex items-center gap-3">
                    <Stars rating={PRODUCT.rating} reviews={PRODUCT.reviews} size="lg"/>
                  </div>
                </div>
                <div className="space-y-6">
                  {REVIEWS.map(r=>(
                    <article key={r.id} className="border-b border-gray-100 pb-6 last:border-0" aria-label={`Review by ${r.author}: ${r.title}`}>
                      <div className="flex items-start justify-between gap-4">
                        <div>
                          <p className="font-semibold text-gray-800">{r.author} {r.verified && <span className="text-green-600 text-xs font-normal ml-1">✓ Verified Purchase</span>}</p>
                          <Stars rating={r.rating} size="sm"/>
                          <h3 className="font-semibold text-gray-700 mt-1">{r.title}</h3>
                        </div>
                        <time dateTime={r.date} className="text-xs text-gray-400 flex-shrink-0">{r.date}</time>
                      </div>
                      <p className="text-gray-600 text-sm mt-2 leading-relaxed">{r.body}</p>
                    </article>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Related Products */}
          <section aria-labelledby="related-heading" className="mt-10">
            <h2 id="related-heading" className="text-xl font-bold text-gray-800 mb-5">Customers Also Viewed</h2>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              {RELATED.map(p=><RelatedCard key={p.id} p={p} onAddToCart={name=>{announce(`${name} added to cart.`);}}/>)}
            </div>
          </section>
        </div>
      </main>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
