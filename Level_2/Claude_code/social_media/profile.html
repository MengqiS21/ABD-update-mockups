function PostItem({ post }) {
  const [liked, setLiked] = useState(post.liked);
  const [likes, setLikes] = useState(post.likes);
  return (
    <article aria-label="Post" className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 mb-3">
      <h3 className="sr-only">Post by Alex Johnson</h3>
      <p className="text-gray-800 text-sm leading-relaxed mb-3">{post.text}</p>
      {post.tags.length > 0 && (
        <div className="flex flex-wrap gap-1.5 mb-3">
          {post.tags.map(t => <a key={t} href="explore.html" className="text-indigo-600 text-sm hover:underline">#{t}</a>)}
        </div>
      )}
      <div className="flex items-center gap-2 pt-2 border-t border-gray-50">
        <button onClick={() => { const n = !liked; setLiked(n); setLikes(c => n ? c+1 : c-1); }}

function EditProfileModal({ onClose }) {
  const modalRef = useRef(null);
  const prevFocus = useRef(document.activeElement);
  useEffect(() => {
    modalRef.current?.querySelector('input')?.focus();
    const trap = (e) => {
      if (e.key !== 'Tab') return;
      const els = modalRef.current.querySelectorAll('button, input, textarea, [tabindex]:not([tabindex="-1"])');
      const first = els[0], last = els[els.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    };
    const esc = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', trap);
    document.addEventListener('keydown', esc);
    return () => { document.removeEventListener('keydown', trap); document.removeEventListener('keydown', esc); prevFocus.current?.focus(); };
  }, [onClose]);
  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="edit-profile-title">
      <div ref={modalRef} className="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6 max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-6">
          <h2 id="edit-profile-title" className="text-lg font-bold text-gray-900">Edit Profile</h2>
          <button onClick={onClose} aria-label="Close edit profile dialog" className="text-gray-400 hover:text-gray-700 rounded-lg p-1 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path fillRule="evenodd" d="M5.47 5.47a.75.75 0 011.06 0L12 10.94l5.47-5.47a.75.75 0 111.06 1.06L13.06 12l5.47 5.47a.75.75 0 11-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 01-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 010-1.06z" clipRule="evenodd"/></svg>
          </button>
        </div>
        <div className="space-y-4">
          {[['display-name','Display name','Alex Johnson'],['handle','Username','@alexj'],['bio-edit','Bio','Software engineer & open-source advocate. Building accessible, beautiful products. he/him']].map(([id, label, val]) => (
            <div key={id}>
              <label htmlFor={id} className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
              {id === 'bio-edit' ? (
                <textarea id={id} defaultValue={val} rows={3} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none" />
              ) : (
                <input id={id} type="text" defaultValue={val} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
              )}
            </div>
          ))}
          <div>
            <label htmlFor="website" className="block text-sm font-medium text-gray-700 mb-1">Website</label>
            <input id="website" type="url" defaultValue="alexj.dev" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
        </div>
        <div className="flex gap-3 justify-end mt-6">
          <button onClick={onClose} className="px-5 py-2 border border-gray-200 rounded-xl text-gray-700 font-medium hover:bg-gray-50 transition-colors">Cancel</button>

    </div>
  );
}

function ProfilePage() {

          </div>
          <div className="flex gap-2 mt-14">
            <button aria-label="Send message to Alex Johnson" className="p-2 border border-gray-200 rounded-xl text-gray-600 hover:bg-gray-50 transition-colors">
              <IconChatBubble />
            </button>
            <button onClick={() => setShowEditModal(true)}
              aria-label="Edit your profile"
              className="flex items-center gap-1.5 px-4 py-2 border border-gray-200 rounded-xl text-gray-700 font-medium hover:bg-gray-50 transition-colors text-sm">
              <IconPencil /> Edit Profile
            </button>
          </div>
        </div>

        <h1 className="text-xl font-bold text-gray-900">Alex Johnson</h1>
        <p className="text-gray-500 text-sm">@alexj</p>
        <p className="text-gray-700 text-sm mt-2 leading-relaxed">Software engineer & open-source advocate. Building accessible, beautiful products. he/him ✨</p>

        <div className="flex flex-wrap gap-x-4 gap-y-1 mt-3 text-sm text-gray-500">
          <span className="flex items-center gap-1"><IconLink /> <a href="#" className="text-indigo-600 hover:underline">alexj.dev</a></span>
          <span className="flex items-center gap-1"><IconCalendar /> Joined January 2019</span>
        </div>

        <div className="flex gap-5 mt-3">
          <button aria-label="1,284 following — view following list" className="text-sm hover:underline">
            <span className="font-bold text-gray-900">1,284</span> <span className="text-gray-500">Following</span>
          </button>
          <button aria-label="28,403 followers — view followers list" className="text-sm hover:underline">
            <span className="font-bold text-gray-900">28.4K</span> <span className="text-gray-500">Followers</span>
          </button>
        </div>
      </section>

      {/* Tabs */}
      <div className="bg-white border-b border-gray-100 sticky top-0 z-10">
        <div role="tablist" aria-label="Profile content" className="flex">
          {PROFILE_TABS.map(tab => (
            <button key={tab}
              ref={el => tabRefs.current[tab] = el}
              role="tab"
              aria-selected={activeTab === tab}
              aria-controls={`profile-panel-${tab}`}
              id={`profile-tab-${tab}`}
              tabIndex={activeTab === tab ? 0 : -1}
              onClick={() => setActiveTab(tab)}
              onKeyDown={e => handleTabKey(e, tab)}
              className={`flex-1 py-3.5 text-sm font-semibold transition-colors ${activeTab === tab ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
              {tab}
            </button>
          ))}
        </div>
      </div>

      {/* Tab panels */}
      <div className="px-4 py-4 pb-24 lg:pb-6">
        <div role="tabpanel" id="profile-panel-Posts" aria-labelledby="profile-tab-Posts" hidden={activeTab !== 'Posts'}>
          {activeTab === 'Posts' && (
            <section aria-label="Alex Johnson's posts">
              {POSTS.map(p => <PostItem key={p.id} post={p} />)}
            </section>
          )}
        </div>
        <div role="tabpanel" id="profile-panel-Replies" aria-labelledby="profile-tab-Replies" hidden={activeTab !== 'Replies'}>
          {activeTab === 'Replies' && (
            <div className="text-center py-16">
              <p className="text-gray-400 text-sm">Replies will appear here.</p>
            </div>
          )}
        </div>
        <div role="tabpanel" id="profile-panel-Media" aria-labelledby="profile-tab-Media" hidden={activeTab !== 'Media'}>
          {activeTab === 'Media' && (
            <section aria-label="Alex Johnson's media posts">
              <div className="grid grid-cols-3 gap-1">
                {MEDIA_POSTS.map(m => (
                  <button key={m.id} aria-label={`View photo: ${m.alt}`} className="aspect-square overflow-hidden rounded-lg focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                    <img src={m.img} alt={m.alt} className="w-full h-full object-cover hover:opacity-90 transition-opacity" loading="lazy" />
                  </button>
                ))}
              </div>
            </section>
          )}
        </div>
        <div role="tabpanel" id="profile-panel-Likes" aria-labelledby="profile-tab-Likes" hidden={activeTab !== 'Likes'}>
          {activeTab === 'Likes' && (
            <div className="text-center py-16">
              <p className="text-gray-400 text-sm">Liked posts will appear here.</p>
            </div>
          )}
        </div>
      </div>

      {showEditModal && <EditProfileModal onClose={() => setShowEditModal(false)} />}
    </main>
  );
}

function App() {
  return (
    <div className="min-h-screen bg-gray-50">
      <Sidebar activePage="profile" />
      <div className="lg:ml-64 pb-20 lg:pb-0">
        <ProfilePage />
      </div>
      <MobileNav activePage="profile" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
