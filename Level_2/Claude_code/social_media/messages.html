const EMOJIS = ['😀','😂','😍','🥰','😊','🎉','🔥','💯','👍','❤️','✨','🙌','💪','🤔','😮','🚀'];

function EmojiPicker({ onSelect, onClose }) {
  const ref = useRef(null);
  useEffect(() => { ref.current?.querySelector('button')?.focus(); }, []);
  const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
  return (
    <div ref={ref} role="dialog" aria-label="Emoji picker" onKeyDown={handleKey}
      className="absolute bottom-12 left-0 bg-white border border-gray-200 rounded-xl shadow-xl p-3 z-50 w-64">
      <div className="flex items-center justify-between mb-2">
        <span className="text-xs font-semibold text-gray-600">Choose an emoji</span>
        <button onClick={onClose} aria-label="Close emoji picker" className="text-gray-400 hover:text-gray-700 rounded p-0.5"><IconX /></button>
      </div>
      <div className="grid grid-cols-8 gap-0.5">
        {EMOJIS.map(e => (
          <button key={e} onClick={() => { onSelect(e); onClose(); }}
            aria-label={`Add ${e} emoji`}
            className="w-7 h-7 flex items-center justify-center text-base hover:bg-gray-100 rounded">
            {e}
          </button>
        ))}
      </div>
    </div>
  );
}

function MessageBubble({ msg, isMe }) {
  return (
    <div className={`flex ${isMe ? 'justify-end' : 'justify-start'} mb-2`}>
      <div className={`max-w-xs lg:max-w-md px-4 py-2.5 rounded-2xl text-sm leading-relaxed ${isMe ? 'bg-indigo-600 text-white rounded-br-sm' : 'bg-gray-100 text-gray-800 rounded-bl-sm'}`}>
        {msg.text}
        <div className={`text-xs mt-1 ${isMe ? 'text-indigo-200' : 'text-gray-400'}`} aria-label={`Sent at ${msg.time}`}>{msg.time}</div>
      </div>
    </div>
  );
}

function ChatPanel({ conv, onSendMessage }) {
  const [input, setInput] = useState('');
  const [showEmoji, setShowEmoji] = useState(false);
  const inputRef = useRef(null);
  const messagesEndRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [conv?.messages?.length]);

  const handleSend = () => {
    if (!input.trim()) return;
    onSendMessage(conv.id, input.trim());
    setInput('');
    // Focus remains in input (cat_5)
    inputRef.current?.focus();
    document.getElementById('live-region').textContent = `Message sent to ${conv.user.name}`;
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  };

  if (!conv) {
    return (
      <div className="flex-1 flex items-center justify-center bg-gray-50">
        <div className="text-center">
          <div className="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <span className="text-indigo-600"><IconChat /></span>
          </div>
          <h2 className="text-lg font-semibold text-gray-700">Select a conversation</h2>
          <p className="text-gray-500 text-sm mt-1">Choose a conversation to start messaging</p>
        </div>
      </div>
    );
  }

  // Group by date
  const dateGroups = {};
  conv.messages.forEach(m => {
    if (!dateGroups[m.date]) dateGroups[m.date] = [];
    dateGroups[m.date].push(m);
  });

  return (
    <section aria-label={`Chat with ${conv.user.name}`} className="flex-1 flex flex-col bg-white">
      {/* Chat header */}
      <header className="flex items-center gap-3 px-4 py-3 border-b border-gray-100 bg-white">
        <img src={conv.user.avatar} alt={`${conv.user.name}'s avatar`} className="w-9 h-9 rounded-full object-cover" />
        <div>
          <a href="profile.html" className="font-semibold text-gray-900 text-sm hover:underline">{conv.user.name}</a>
          <p className="text-xs text-green-500 font-medium">● Active now</p>
        </div>
      </header>

      {/* Messages */}
      <div className="flex-1 overflow-y-auto messages-scroll px-4 py-4" aria-live="polite" aria-label="Message thread">
        {Object.entries(dateGroups).map(([date, msgs]) => (
          <div key={date}>
            <div className="flex items-center gap-3 my-4" aria-label={`Messages from ${date}`} role="separator">
              <div className="flex-1 h-px bg-gray-100" aria-hidden="true"></div>
              <time dateTime={date} className="text-xs text-gray-400 px-2">{date === '2026-03-17' ? 'Today' : date === '2026-03-16' ? 'Yesterday' : date}</time>
              <div className="flex-1 h-px bg-gray-100" aria-hidden="true"></div>
            </div>
            {msgs.map(msg => <MessageBubble key={msg.id} msg={msg} isMe={msg.from === 'me'} />)}
          </div>
        ))}
        <div ref={messagesEndRef} />
      </div>

      {/* Input */}
      <div className="border-t border-gray-100 px-4 py-3 bg-white relative">
        <div className="flex items-end gap-2">
          <div className="relative flex-1">
            {showEmoji && <EmojiPicker onSelect={e => setInput(v => v + e)} onClose={() => { setShowEmoji(false); inputRef.current?.focus(); }} />}
            <label htmlFor="message-input" className="sr-only">Message {conv.user.name}</label>
            <textarea
              id="message-input"
              ref={inputRef}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
              placeholder={`Message ${conv.user.name}…`}
              rows={1}
              aria-describedby="message-hint"
              className="w-full resize-none bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 max-h-32"
              style={{ overflowY: 'auto' }}
            />
          </div>
          <div className="flex items-center gap-1 pb-1 flex-shrink-0">
            <button onClick={() => setShowEmoji(v => !v)}
              aria-label="Open emoji picker" aria-expanded={showEmoji} aria-haspopup="dialog"
              className="p-2 text-gray-400 hover:text-indigo-600 rounded-lg transition-colors">
              <IconSmile />
            </button>
            <label>
              <input type="file" accept="image/*" className="sr-only" aria-label="Attach image to message" />
              <span role="button" tabIndex={0}
                onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') e.currentTarget.previousSibling.click(); }}
                aria-label="Attach an image"
                className="p-2 text-gray-400 hover:text-indigo-600 rounded-lg transition-colors inline-flex cursor-pointer">
                <IconImage />
              </span>
            </label>
            <button onClick={handleSend} disabled={!input.trim()}
              aria-label={`Send message to ${conv.user.name}`}
              className="p-2.5 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-xl transition-colors">
              <IconSend />
            </button>
          </div>
        </div>
        <span id="message-hint" className="sr-only">Press Enter to send, Shift+Enter for new line.</span>
      </div>
    </section>
  );
}

function MessagesPage() {
  const [conversations, setConversations] = useState(CONVERSATIONS);
  const [activeId, setActiveId] = useState(1);
  const activeConv = conversations.find(c => c.id === activeId);

  const handleSend = (convId, text) => {
    setConversations(prev => prev.map(c => c.id === convId
      ? { ...c, messages: [...c.messages, { id: Date.now(), from: 'me', text, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), date: '2026-03-17' }], unread: 0 }
      : c
    ));
  };

  const totalUnread = conversations.reduce((sum, c) => sum + c.unread, 0);

  return (
    <div id="main-content" className="flex h-screen overflow-hidden" style={{ height: 'calc(100vh - 0px)' }}>
      {/* Conversation list */}
      <nav aria-label="Conversations" className="w-80 flex-shrink-0 bg-white border-r border-gray-100 flex flex-col overflow-hidden">
        <header className="px-4 py-4 border-b border-gray-100">
          <div className="flex items-center justify-between">
            <h1 className="text-xl font-bold text-gray-900">
              Messages
              {totalUnread > 0 && (
                <span className="ml-2 bg-indigo-600 text-white text-xs font-bold rounded-full px-2 py-0.5" aria-live="polite" aria-label={`${totalUnread} unread messages`}>{totalUnread}</span>
              )}
            </h1>
            <button aria-label="New message" className="w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-100 flex items-center justify-center transition-colors">
              <IconPlus />
            </button>
          </div>
        </header>
        <ul role="list" className="flex-1 overflow-y-auto">
          {conversations.map(conv => {
            const lastMsg = conv.messages[conv.messages.length - 1];
            return (
              <li key={conv.id}>
                <button
                  onClick={() => setActiveId(conv.id)}
                  aria-label={`Conversation with ${conv.user.name}${conv.unread > 0 ? `, ${conv.unread} unread` : ''}`}
                  aria-current={activeId === conv.id ? 'true' : 'false'}
                  className={`w-full flex items-center gap-3 px-4 py-3.5 text-left hover:bg-gray-50 transition-colors border-b border-gray-50 ${activeId === conv.id ? 'bg-indigo-50/50' : ''}`}>
                  <div className="relative flex-shrink-0">
                    <img src={conv.user.avatar} alt={`${conv.user.name}'s avatar`} className="w-11 h-11 rounded-full object-cover" />
                    {conv.unread > 0 && (
                      <span className="absolute -top-0.5 -right-0.5 w-4 h-4 bg-indigo-600 rounded-full flex items-center justify-center" aria-hidden="true">
                        <span className="text-white text-[9px] font-bold">{conv.unread}</span>
                      </span>
                    )}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between">
                      <span className={`text-sm ${conv.unread > 0 ? 'font-bold text-gray-900' : 'font-medium text-gray-800'}`}>{conv.user.name}</span>
                      <time className="text-xs text-gray-400 flex-shrink-0 ml-2">{lastMsg.time}</time>
                    </div>
                    <p className={`text-xs truncate ${conv.unread > 0 ? 'text-gray-700 font-medium' : 'text-gray-500'}`}>
                      {lastMsg.from === 'me' ? 'You: ' : ''}{lastMsg.text}
                    </p>
                  </div>
                </button>
              </li>
            );
          })}
        </ul>
      </nav>

      {/* Chat panel */}
      <ChatPanel conv={activeConv} onSendMessage={handleSend} />
    </div>
  );
}

function App() {
  return (
    <div className="min-h-screen bg-gray-50 flex">
      <Sidebar activePage="messages" />
      <div className="lg:ml-64 flex-1 pb-20 lg:pb-0 overflow-hidden" style={{ height: '100vh' }}>
        <MessagesPage />
      </div>
      <MobileNav activePage="messages" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
