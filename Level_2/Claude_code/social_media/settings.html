function Toggle({ id, checked, onChange, label }) {
  return (
    <button
      id={id}
      role="switch"
      aria-checked={checked}
      aria-label={label}
      onClick={() => onChange(!checked)}
      className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 ${checked ? 'bg-indigo-600' : 'bg-gray-200'}`}>
      <span className={`inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform ${checked ? 'translate-x-6' : 'translate-x-1'}`} aria-hidden="true" />
    </button>
  );
}

function FieldError({ id, msg }) {
  if (!msg) return null;
  return <p id={id} role="alert" className="text-xs text-red-500 mt-1 flex items-center gap-1"><IconExclamation />{msg}</p>;
}

function SettingsCard({ children, className = '' }) {
  return <div className={`bg-white rounded-2xl border border-gray-100 shadow-sm ${className}`}>{children}</div>;
}

function DeleteAccountModal({ onClose }) {
  const modalRef = useRef(null);
  const prevFocus = useRef(document.activeElement);
  const [confirmText, setConfirmText] = useState('');
  const [error, setError] = useState('');
  useEffect(() => {
    modalRef.current?.querySelector('input')?.focus();
    const trap = (e) => {
      if (e.key !== 'Tab') return;
      const els = modalRef.current.querySelectorAll('button, input, [tabindex]:not([tabindex="-1"])');
      const first = els[0], last = els[els.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    };
    const esc = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', trap);
    document.addEventListener('keydown', esc);
    return () => { document.removeEventListener('keydown', trap); document.removeEventListener('keydown', esc); prevFocus.current?.focus(); };
  }, [onClose]);
  const handleDelete = () => {
    if (confirmText !== 'DELETE') { setError('Please type DELETE exactly to confirm'); return; }
    onClose();
    document.getElementById('live-region').textContent = 'Account deletion requested.';
  };
  return (
    <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="delete-account-title" aria-describedby="delete-account-desc">
      <div ref={modalRef} className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6">
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center text-red-600 flex-shrink-0"><IconExclamation /></div>
          <h2 id="delete-account-title" className="text-lg font-bold text-gray-900">Delete Account</h2>
        </div>
        <p id="delete-account-desc" className="text-sm text-gray-600 mb-4">This will permanently delete your account, all your posts, followers, and data. This cannot be undone.</p>
        <div>
          <label htmlFor="confirm-delete" className="block text-sm font-medium text-gray-700 mb-1">
            Type <strong>DELETE</strong> to confirm
          </label>
          <input
            id="confirm-delete"
            type="text"
            value={confirmText}
            onChange={e => { setConfirmText(e.target.value); setError(''); }}
            aria-describedby={error ? 'delete-confirm-error' : undefined}
            aria-invalid={!!error}
            placeholder="DELETE"
            className={`w-full border rounded-xl px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-500 ${error ? 'border-red-400' : 'border-gray-200'}`}
          />
          <FieldError id="delete-confirm-error" msg={error} />
        </div>
        <div className="flex gap-3 justify-end mt-6">
          <button onClick={onClose} className="px-5 py-2 border border-gray-200 rounded-xl text-gray-700 font-medium hover:bg-gray-50">Cancel</button>
          <button onClick={handleDelete} className="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl font-semibold transition-colors">Delete Account</button>
        </div>
      </div>
    </div>
  );
}

function SettingsPage() {
  // Account
  const [username, setUsername] = useState('alexj');
  const [email, setEmail] = useState('alex.johnson@example.com');
  const [usernameError, setUsernameError] = useState('');
  const [emailError, setEmailError] = useState('');
  const [pwCurrent, setPwCurrent] = useState('');
  const [pwNew, setPwNew] = useState('');
  const [pwConfirm, setPwConfirm] = useState('');
  const [pwError, setPwError] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [accountSaved, setAccountSaved] = useState(false);

  // Privacy
  const [whoCanSee, setWhoCanSee] = useState('everyone');
  const [dmPermission, setDmPermission] = useState('followers');

  // Notifications
  const [emailLikes, setEmailLikes] = useState(true);
  const [emailFollows, setEmailFollows] = useState(true);
  const [emailMentions, setEmailMentions] = useState(false);
  const [pushAll, setPushAll] = useState(true);
  const [pushDMs, setPushDMs] = useState(true);
  const [pushTrending, setPushTrending] = useState(false);

  // Appearance
  const [darkMode, setDarkMode] = useState(false);
  const [fontSize, setFontSize] = useState('medium');

  // Danger zone modal
  const [showDeleteModal, setShowDeleteModal] = useState(false);

  const validateAccount = () => {
    let valid = true;
    if (!username.trim()) { setUsernameError('Username is required'); valid = false; }
    else if (username.length < 3) { setUsernameError('Username must be at least 3 characters'); valid = false; }
    else setUsernameError('');
    if (!email.trim()) { setEmailError('Email address is required'); valid = false; }
    else if (!/\S+@\S+\.\S+/.test(email)) { setEmailError('Enter a valid email address'); valid = false; }
    else setEmailError('');
    return valid;
  };

  const handleAccountSave = (e) => {
    e.preventDefault();
    if (!validateAccount()) return;
    setAccountSaved(true);
    document.getElementById('live-region').textContent = 'Account settings saved successfully.';
    setTimeout(() => setAccountSaved(false), 3000);
  };

  const handlePasswordSave = (e) => {
    e.preventDefault();
    if (!pwCurrent) { setPwError('Current password is required'); return; }
    if (pwNew.length < 8) { setPwError('New password must be at least 8 characters'); return; }
    if (pwNew !== pwConfirm) { setPwError('Passwords do not match'); return; }
    setPwError('');
    setPwCurrent(''); setPwNew(''); setPwConfirm('');
    document.getElementById('live-region').textContent = 'Password changed successfully.';
  };

  return (
    <main id="main-content" className="max-w-2xl mx-auto px-4 py-6 pb-28 lg:pb-8" aria-label="Settings">
      <h1 className="text-2xl font-bold text-gray-900 mb-6">Settings</h1>

      {/* ── Account ── */}
      <SettingsCard className="mb-6 overflow-hidden">
        <div className="px-6 py-4 border-b border-gray-100 flex items-center gap-2">
          <span className="text-indigo-600"><IconUser /></span>
          <h2 className="text-base font-bold text-gray-900">Account</h2>
        </div>
        <form onSubmit={handleAccountSave} noValidate className="px-6 py-5 space-y-5" aria-label="Account settings form">
          <div>
            <label htmlFor="username" className="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <div className="relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm" aria-hidden="true">@</span>
              <input
                id="username" type="text" value={username}
                onChange={e => { setUsername(e.target.value); setUsernameError(''); }}
                aria-describedby={usernameError ? 'username-error' : 'username-hint'}
                aria-invalid={!!usernameError}
                required
                className={`w-full pl-8 pr-3 py-2.5 border rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 ${usernameError ? 'border-red-400' : 'border-gray-200'}`}
              />
            </div>
            <p id="username-hint" className="text-xs text-gray-400 mt-1">Only letters, numbers and underscores. Min 3 characters.</p>
            <FieldError id="username-error" msg={usernameError} />
          </div>
          <div>
            <label htmlFor="email" className="block text-sm font-medium text-gray-700 mb-1">Email address</label>
            <input
              id="email" type="email" value={email}
              onChange={e => { setEmail(e.target.value); setEmailError(''); }}
              aria-describedby={emailError ? 'email-error' : undefined}
              aria-invalid={!!emailError}
              required
              className={`w-full px-3 py-2.5 border rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 ${emailError ? 'border-red-400' : 'border-gray-200'}`}
            />
            <FieldError id="email-error" msg={emailError} />
          </div>
          <div className="flex items-center justify-between pt-2">
            {accountSaved && <p role="status" className="text-sm text-green-600 flex items-center gap-1"><IconCheck /> Saved!</p>}
            <button type="submit" className="ml-auto bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-xl transition-colors text-sm">
              Save changes
            </button>
          </div>
        </form>

        {/* Password */}
        <div className="border-t border-gray-100 px-6 py-5">
          <h3 className="text-sm font-bold text-gray-900 mb-4">Change Password</h3>
          <form onSubmit={handlePasswordSave} noValidate className="space-y-4" aria-label="Change password form">
            {[
              { id: 'pw-current', label: 'Current password', val: pwCurrent, set: v => { setPwCurrent(v); setPwError(''); } },
              { id: 'pw-new', label: 'New password', val: pwNew, set: v => { setPwNew(v); setPwError(''); } },
              { id: 'pw-confirm', label: 'Confirm new password', val: pwConfirm, set: v => { setPwConfirm(v); setPwError(''); } },
            ].map(f => (
              <div key={f.id}>
                <label htmlFor={f.id} className="block text-sm font-medium text-gray-700 mb-1">{f.label}</label>
                <div className="relative">
                  <input id={f.id} type={showPw ? 'text' : 'password'} value={f.val}
                    onChange={e => f.set(e.target.value)}
                    aria-describedby={pwError ? 'pw-error' : f.id === 'pw-new' ? 'pw-hint' : undefined}
                    aria-invalid={!!pwError && (f.id === 'pw-new' || f.id === 'pw-confirm')}
                    className={`w-full pr-10 px-3 py-2.5 border rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 ${pwError && f.id !== 'pw-current' ? 'border-red-400' : 'border-gray-200'}`}
                  />
                  {f.id === 'pw-new' && (
                    <button type="button" onClick={() => setShowPw(v => !v)}
                      aria-label={showPw ? 'Hide passwords' : 'Show passwords'}
                      className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700">
                      {showPw ? <IconEyeOff /> : <IconEye />}
                    </button>
                  )}
                </div>
                {f.id === 'pw-new' && <p id="pw-hint" className="text-xs text-gray-400 mt-1">Minimum 8 characters.</p>}
              </div>
            ))}
            <FieldError id="pw-error" msg={pwError} />
            <div className="flex justify-end">
              <button type="submit" className="bg-gray-900 hover:bg-gray-700 text-white font-semibold py-2 px-5 rounded-xl transition-colors text-sm">
                Update password
              </button>
            </div>
          </form>
        </div>
      </SettingsCard>

      {/* ── Privacy ── */}
      <SettingsCard className="mb-6 overflow-hidden">
        <div className="px-6 py-4 border-b border-gray-100 flex items-center gap-2">
          <span className="text-indigo-600"><IconShield /></span>
          <h2 className="text-base font-bold text-gray-900">Privacy</h2>
        </div>
        <div className="px-6 py-5 space-y-5">
          <fieldset>
            <legend className="text-sm font-medium text-gray-700 mb-2">Who can see your posts?</legend>
            <div className="space-y-2">
              {[['everyone', 'Everyone', 'Public — anyone on Pulse'], ['followers', 'Followers only', 'Only people who follow you'], ['private', 'Only me', 'Keep your posts private']].map(([val, label, desc]) => (
                <label key={val} className="flex items-start gap-3 p-3 rounded-xl border border-gray-100 hover:border-indigo-200 cursor-pointer transition-colors">
                  <input type="radio" name="post-visibility" value={val} checked={whoCanSee === val} onChange={() => setWhoCanSee(val)}
                    className="mt-0.5 accent-indigo-600" />
                  <div>
                    <div className="text-sm font-medium text-gray-800">{label}</div>
                    <div className="text-xs text-gray-500">{desc}</div>
                  </div>
                </label>
              ))}
            </div>
          </fieldset>
          <fieldset>
            <legend className="text-sm font-medium text-gray-700 mb-2">Who can send you direct messages?</legend>
            <div className="space-y-2">
              {[['everyone', 'Everyone'], ['followers', 'Followers only'], ['nobody', 'Nobody']].map(([val, label]) => (
                <label key={val} className="flex items-center gap-3 p-3 rounded-xl border border-gray-100 hover:border-indigo-200 cursor-pointer transition-colors">
                  <input type="radio" name="dm-permission" value={val} checked={dmPermission === val} onChange={() => setDmPermission(val)} className="accent-indigo-600" />
                  <span className="text-sm text-gray-800">{label}</span>
                </label>
              ))}
            </div>
          </fieldset>
        </div>
      </SettingsCard>

      {/* ── Notifications ── */}
      <SettingsCard className="mb-6 overflow-hidden">
        <div className="px-6 py-4 border-b border-gray-100 flex items-center gap-2">
          <span className="text-indigo-600"><IconBell /></span>
          <h2 className="text-base font-bold text-gray-900">Notifications</h2>
        </div>
        <div className="px-6 py-5">
          <h3 className="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-3">Email Notifications</h3>
          <div className="space-y-3 mb-6">
            {[
              ['email-likes', 'Likes on your posts', emailLikes, setEmailLikes],
              ['email-follows', 'New followers', emailFollows, setEmailFollows],
              ['email-mentions', 'Mentions and replies', emailMentions, setEmailMentions],
            ].map(([id, label, val, setter]) => (
              <div key={id} className="flex items-center justify-between py-1">
                <label htmlFor={id} className="text-sm text-gray-700">{label}</label>
                <Toggle id={id} checked={val} onChange={setter} label={`${val ? 'Disable' : 'Enable'} email notifications for ${label.toLowerCase()}`} />
              </div>
            ))}
          </div>
          <h3 className="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-3">Push Notifications</h3>
          <div className="space-y-3">
            {[
              ['push-all', 'All activity', pushAll, setPushAll],
              ['push-dms', 'Direct messages', pushDMs, setPushDMs],
              ['push-trending', 'Trending topics you follow', pushTrending, setPushTrending],
            ].map(([id, label, val, setter]) => (
              <div key={id} className="flex items-center justify-between py-1">
                <label htmlFor={id} className="text-sm text-gray-700">{label}</label>
                <Toggle id={id} checked={val} onChange={setter} label={`${val ? 'Disable' : 'Enable'} push notifications for ${label.toLowerCase()}`} />
              </div>
            ))}
          </div>
        </div>
      </SettingsCard>

      {/* ── Appearance ── */}
      <SettingsCard className="mb-6 overflow-hidden">
        <div className="px-6 py-4 border-b border-gray-100 flex items-center gap-2">
          <span className="text-indigo-600"><IconSun /></span>
          <h2 className="text-base font-bold text-gray-900">Appearance</h2>
        </div>
        <div className="px-6 py-5 space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <p className="text-sm font-medium text-gray-800">Dark mode</p>
              <p className="text-xs text-gray-500 mt-0.5">Switch between light and dark interface</p>
            </div>
            <div className="flex items-center gap-2">
              <span className="text-gray-400"><IconSun /></span>
              <Toggle id="dark-mode" checked={darkMode} onChange={v => { setDarkMode(v); document.getElementById('live-region').textContent = v ? 'Dark mode enabled' : 'Light mode enabled'; }}
                label={darkMode ? 'Switch to light mode' : 'Switch to dark mode'} />
              <span className="text-gray-400"><IconMoon /></span>
            </div>
          </div>
          <div>
            <p className="text-sm font-medium text-gray-800 mb-2">Font size</p>
            <div className="flex gap-2">
              {[['small','Small','text-xs'],['medium','Medium','text-sm'],['large','Large','text-base']].map(([val, label, cls]) => (
                <button key={val} onClick={() => setFontSize(val)}
                  aria-label={`Set font size to ${label}`}
                  aria-pressed={fontSize === val}
                  className={`flex-1 py-2 px-3 rounded-xl border text-center transition-colors ${fontSize === val ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 text-gray-600 hover:border-gray-300'}`}>
                  <span className={cls}>{label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      </SettingsCard>

      {/* ── Danger Zone ── */}
      <SettingsCard className="overflow-hidden border-red-100">
        <div className="px-6 py-4 border-b border-red-100 flex items-center gap-2">
          <span className="text-red-600"><IconExclamation /></span>
          <h2 className="text-base font-bold text-red-700">Danger Zone</h2>
        </div>
        <div className="px-6 py-5 space-y-4">
          <div className="flex items-start justify-between gap-4">
            <div>
              <p className="text-sm font-semibold text-gray-800">Deactivate account</p>
              <p className="text-xs text-gray-500 mt-0.5">Temporarily disable your account. You can reactivate anytime.</p>
            </div>
            <button className="flex-shrink-0 px-4 py-2 border border-amber-300 text-amber-700 bg-amber-50 hover:bg-amber-100 rounded-xl text-sm font-semibold transition-colors">
              Deactivate
            </button>
          </div>
          <hr className="border-red-100" />
          <div className="flex items-start justify-between gap-4">
            <div>
              <p className="text-sm font-semibold text-red-700">Delete account</p>
              <p className="text-xs text-gray-500 mt-0.5">Permanently delete your account and all data. This cannot be undone.</p>
            </div>
            <button onClick={() => setShowDeleteModal(true)}
              className="flex-shrink-0 px-4 py-2 border border-red-300 text-red-600 bg-red-50 hover:bg-red-100 rounded-xl text-sm font-semibold transition-colors">
              Delete account
            </button>
          </div>
        </div>
      </SettingsCard>

      {showDeleteModal && <DeleteAccountModal onClose={() => setShowDeleteModal(false)} />}
    </main>
  );
}

function App() {
  return (
    <div className="min-h-screen bg-gray-50">
      <Sidebar activePage="settings" />
      <div className="lg:ml-64">
        <SettingsPage />
      </div>
      <MobileNav activePage="settings" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
