<!DOCTYPE html>

</head>
<body class="bg-gray-50 min-h-screen">

const IconPlus = () => <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path fillRule="evenodd" d="M12 3.75a.75.75 0 01.75.75v6.75h6.75a.75.75 0 010 1.5h-6.75v6.75a.75.75 0 01-1.5 0v-6.75H4.5a.75.75 0 010-1.5h6.75V4.5a.75.75 0 01.75-.75z" clipRule="evenodd"/></svg>;
const IconBolt = () => <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-7 h-7"><path fillRule="evenodd" d="M14.615 1.595a.75.75 0 01.359.852L12.982 9.75h7.268a.75.75 0 01.548 1.262l-10.5 11.25a.75.75 0 01-1.272-.71l1.992-7.302H3.75a.75.75 0 01-.548-1.262l10.5-11.25a.75.75 0 01.913-.143z" clipRule="evenodd"/></svg>;

function Sidebar({ activePage = 'explore' }) {
  const navItems = [
    { id: 'feed', label: 'Home', href: 'index.html', icon: <IconHome /> },
    { id: 'explore', label: 'Explore', href: 'explore.html', icon: <IconCompass /> },
    { id: 'notifications', label: 'Notifications', href: 'notifications.html', icon: <IconBell />, badge: 5 },
    { id: 'messages', label: 'Messages', href: 'messages.html', icon: <IconChat />, badge: 2 },
    { id: 'profile', label: 'Profile', href: 'profile.html', icon: <IconUser /> },
    { id: 'settings', label: 'Settings', href: 'settings.html', icon: <IconCog /> },
  ];
  return (
    <nav aria-label="Main navigation" className="fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-100 flex flex-col py-6 px-4 z-40 hidden lg:flex">
      <a href="index.html" className="flex items-center gap-2 px-2 mb-8" aria-label="Pulse home">
        <span className="text-indigo-600"><IconBolt /></span>
        <span className="text-2xl font-bold text-gray-900">Pulse</span>
      </a>
      <ul className="flex flex-col gap-1 flex-1" role="list">
        {navItems.map(item => (
          <li key={item.id}>
            <a href={item.href} aria-current={activePage === item.id ? 'page' : undefined}
              className={`flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-colors relative ${activePage === item.id ? 'bg-indigo-50 text-indigo-700' : 'text-gray-700 hover:bg-gray-50 hover:text-gray-900'}`}>
              <span className={activePage === item.id ? 'text-indigo-600' : 'text-gray-500'}>{item.icon}</span>
              <span>{item.label}</span>
              {item.badge && <span className="ml-auto bg-indigo-600 text-white text-xs font-bold rounded-full min-w-[20px] h-5 flex items-center justify-center px-1" aria-label={`${item.badge} unread`}>{item.badge}</span>}
            </a>
          </li>
        ))}
      </ul>
      <button className="mt-4 flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition-colors w-full" aria-label="Create new post">
        <IconPlus /> New Post
      </button>
      <a href="profile.html" className="mt-6 flex items-center gap-3 px-2 py-2 rounded-xl hover:bg-gray-50 transition-colors">
        <img src="https://i.pravatar.cc/40?img=11" alt="Alex Johnson — your profile" className="w-9 h-9 rounded-full object-cover" />
        <div className="flex-1 min-w-0">
          <p className="text-sm font-semibold text-gray-900 truncate">Alex Johnson</p>
          <p className="text-xs text-gray-500 truncate">@alexj</p>
        </div>
      </a>
    </nav>
  );
}

function MobileNav({ activePage = 'explore' }) {
  const items = [
    { id: 'feed', label: 'Home', href: 'index.html', icon: <IconHome /> },
    { id: 'explore', label: 'Explore', href: 'explore.html', icon: <IconCompass /> },
    { id: 'notifications', label: 'Alerts', href: 'notifications.html', icon: <IconBell /> },
    { id: 'messages', label: 'Messages', href: 'messages.html', icon: <IconChat /> },
    { id: 'profile', label: 'Profile', href: 'profile.html', icon: <IconUser /> },
  ];
  return (
    <nav aria-label="Mobile navigation" className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex lg:hidden z-40">
      {items.map(item => (
        <a key={item.id} href={item.href} aria-current={activePage === item.id ? 'page' : undefined}
          className={`flex-1 flex flex-col items-center py-3 text-xs font-medium transition-colors ${activePage === item.id ? 'text-indigo-600' : 'text-gray-500 hover:text-gray-700'}`}>
          {item.icon}<span className="mt-0.5">{item.label}</span>
        </a>
      ))}
    </nav>
  );
}

const TRENDING_TAGS = [
  { tag: 'ClimateWeek', posts: '84K', color: 'bg-emerald-50 text-emerald-700 border-emerald-200' },
  { tag: 'TechLayoffs', posts: '52K', color: 'bg-orange-50 text-orange-700 border-orange-200' },
  { tag: 'WorldCup2026', posts: '210K', color: 'bg-blue-50 text-blue-700 border-blue-200' },
  { tag: 'AIArt', posts: '31K', color: 'bg-purple-50 text-purple-700 border-purple-200' },
  { tag: 'MarsUpdate', posts: '18K', color: 'bg-rose-50 text-rose-700 border-rose-200' },
  { tag: 'IndieHacking', posts: '14K', color: 'bg-amber-50 text-amber-700 border-amber-200' },
  { tag: 'a11y', posts: '9.2K', color: 'bg-indigo-50 text-indigo-700 border-indigo-200' },
  { tag: 'Photography', posts: '67K', color: 'bg-pink-50 text-pink-700 border-pink-200' },
];

const SUGGESTED_USERS = [
  { name: 'Dr. Amara Osei', handle: '@amaraosei', avatar: 'https://i.pravatar.cc/80?img=20', bio: 'Climate scientist · UN advisor', followers: '128K' },
  { name: 'Kai Yamamoto', handle: '@kaiyama', avatar: 'https://i.pravatar.cc/80?img=33', bio: 'Full-stack dev · Open source', followers: '45.2K' },
  { name: 'Sofia Reyes', handle: '@sofiareyes', avatar: 'https://i.pravatar.cc/80?img=47', bio: 'Travel & food photographer 📸', followers: '212K' },
  { name: 'Darius Okafor', handle: '@dariusok', avatar: 'https://i.pravatar.cc/80?img=60', bio: 'Sports analyst · #WorldCup2026', followers: '89K' },
  { name: 'Lena Kowalski', handle: '@lenakowal', avatar: 'https://i.pravatar.cc/80?img=25', bio: 'Product design at Nextly', followers: '31K' },
  { name: 'Marcus Webb', handle: '@marcwebb', avatar: 'https://i.pravatar.cc/80?img=8', bio: 'Founder @ CodePulse · ex-FAANG', followers: '76K' },
];

const POPULAR_POSTS = [
  { id: 1, img: 'https://picsum.photos/seed/pop1/400/400', author: 'Sofia Reyes', handle: '@sofiareyes', likes: 8421, alt: 'Aerial view of a colorful coastal village at sunset' },
  { id: 2, img: 'https://picsum.photos/seed/pop2/400/600', author: 'Kai Yamamoto', handle: '@kaiyama', likes: 3201, alt: 'Close-up of mechanical keyboard with RGB lighting' },
  { id: 3, img: 'https://picsum.photos/seed/pop3/400/300', author: 'Darius Okafor', handle: '@dariusok', likes: 12055, alt: 'Football stadium lit up at night with crowd cheering' },
  { id: 4, img: 'https://picsum.photos/seed/pop4/400/500', author: 'Lena Kowalski', handle: '@lenakowal', likes: 5603, alt: 'Minimalist desk setup with soft lamp and plant' },
  { id: 5, img: 'https://picsum.photos/seed/pop5/400/350', author: 'Dr. Amara Osei', handle: '@amaraosei', likes: 7892, alt: 'Wind turbines against a dramatic orange sky' },
  { id: 6, img: 'https://picsum.photos/seed/pop6/400/450', author: 'Marcus Webb', handle: '@marcwebb', likes: 4110, alt: 'Futuristic city skyline with neon lights at dusk' },
];

function SuggestedUserCard({ user }) {
  const [following, setFollowing] = useState(false);
  const toggle = () => {
    const next = !following;
    setFollowing(next);
    document.getElementById('live-region').textContent = next ? `You are now following ${user.name}` : `You unfollowed ${user.name}`;
  };
  return (
    <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 flex flex-col items-center text-center gap-3">
      <img src={user.avatar} alt={`${user.name}'s avatar`} className="w-16 h-16 rounded-full object-cover" />
      <div>
        <p className="font-semibold text-gray-900 text-sm">{user.name}</p>
        <p className="text-gray-500 text-xs">{user.handle}</p>
        <p className="text-gray-600 text-xs mt-1 leading-snug">{user.bio}</p>
        <p className="text-xs text-indigo-600 font-medium mt-1">{user.followers} followers</p>
      </div>
      <button onClick={toggle}
        aria-label={following ? `Unfollow ${user.name}` : `Follow ${user.name}`}
        aria-pressed={following}
        className={`w-full py-2 px-4 rounded-xl text-sm font-semibold transition-colors ${following ? 'bg-gray-100 text-gray-700 hover:bg-gray-200' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
        {following ? 'Following' : 'Follow'}
      </button>
    </div>
  );
}

function PopularPostCard({ post }) {
  const [liked, setLiked] = useState(false);
  const [count, setCount] = useState(post.likes);
  return (
    <article aria-label={`Popular post by ${post.author}`} className="relative rounded-2xl overflow-hidden group cursor-pointer">
      <img src={post.img} alt={post.alt} className="w-full h-full object-cover" loading="lazy" />
      <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 group-focus-within:opacity-100 transition-opacity flex flex-col justify-end p-3">
        <p className="text-white text-xs font-semibold truncate">{post.author}</p>
        <button onClick={() => { const n = !liked; setLiked(n); setCount(c => n ? c+1 : c-1); }}
          aria-label={`Like photo by ${post.author} — ${count} likes`}
          aria-pressed={liked}
          className={`mt-1 flex items-center gap-1 text-xs font-medium transition-colors ${liked ? 'text-rose-400' : 'text-white/80 hover:text-rose-300'}`}>
          <IconHeart />
          <span aria-hidden="true">{count >= 1000 ? (count/1000).toFixed(1)+'K' : count}</span>
        </button>
      </div>
    </article>
  );
}

function ExplorePage() {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState(null);
  const inputRef = useRef(null);

  const handleSearch = (e) => {
    e.preventDefault();
    if (query.trim()) {
      setResults(query);
      document.getElementById('live-region').textContent = `Showing results for ${query}`;
    }
  };

  return (
    <main id="main-content" className="max-w-5xl mx-auto px-4 py-6" aria-label="Explore Pulse">
      <h1 className="text-2xl font-bold text-gray-900 mb-6">Explore</h1>

      {/* Search */}
      <section aria-label="Search Pulse" className="mb-8">
        <form onSubmit={handleSearch} role="search" className="relative">
          <label htmlFor="explore-search" className="sr-only">Search Pulse</label>
          <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"><IconSearch /></span>
          <input
            id="explore-search"
            ref={inputRef}
            type="search"
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search posts, people, hashtags…"
            aria-label="Search Pulse"
            className="w-full pl-12 pr-32 py-4 rounded-2xl border border-gray-200 bg-white shadow-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-base"
          />
          <button type="submit" className="absolute right-3 top-1/2 -translate-y-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-5 py-2 rounded-xl transition-colors text-sm">
            Search
          </button>
        </form>
        {results && (
          <p role="status" className="mt-3 text-sm text-gray-600">Showing results for <strong>"{results}"</strong></p>
        )}
      </section>

      {/* Trending hashtags */}
      <section aria-labelledby="trending-tags-heading" className="mb-8">
        <h2 id="trending-tags-heading" className="text-lg font-bold text-gray-900 mb-4">Trending Topics</h2>
        <ul role="list" className="flex flex-wrap gap-2">
          {TRENDING_TAGS.map(t => (
            <li key={t.tag}>
              <a href="#" onClick={e => { e.preventDefault(); setQuery('#'+t.tag); inputRef.current?.focus(); }}
                className={`inline-flex items-center gap-2 px-4 py-2 rounded-full border text-sm font-semibold transition-colors hover:shadow-sm ${t.color}`}
                aria-label={`Explore #${t.tag} — ${t.posts} posts`}>
                #{t.tag}
                <span className="text-xs font-normal opacity-70">{t.posts}</span>
              </a>
            </li>
          ))}
        </ul>
      </section>

      {/* Suggested users */}
      <section aria-labelledby="suggested-users-heading" className="mb-8">
        <h2 id="suggested-users-heading" className="text-lg font-bold text-gray-900 mb-4">Suggested for You</h2>
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
          {SUGGESTED_USERS.map(u => <SuggestedUserCard key={u.handle} user={u} />)}
        </div>
      </section>

      {/* Popular posts grid */}
      <section aria-labelledby="popular-posts-heading">
        <h2 id="popular-posts-heading" className="text-lg font-bold text-gray-900 mb-4">Popular Right Now</h2>
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 auto-rows-[200px]">
          {POPULAR_POSTS.map((post, i) => (
            <div key={post.id} className={i === 0 ? 'row-span-2' : i === 3 ? 'col-span-1 row-span-1' : ''}>
              <PopularPostCard post={post} />
            </div>
          ))}
        </div>
      </section>
    </main>
  );
}

function App() {
  return (
    <div className="min-h-screen bg-gray-50">
      <Sidebar activePage="explore" />
      <div className="lg:ml-64 pb-20 lg:pb-0">
        <ExplorePage />
      </div>
      <MobileNav activePage="explore" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
