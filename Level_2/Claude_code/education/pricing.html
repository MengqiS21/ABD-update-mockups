<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plans & Pricing | LearnPath</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *:focus-visible { outline: 3px solid #4f46e5; outline-offset: 3px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    [role="tab"][aria-selected="true"] { color: #4f46e5; border-bottom: 2px solid #4f46e5; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef } = React;

    const NAV_LINKS = [
      { href: 'courses.html', label: 'Courses' },
      { href: 'pricing.html', label: 'Pricing' },
      { href: 'dashboard.html', label: 'Dashboard' },
    ];

    function Header({ current }) {
      const [open, setOpen] = useState(false);
      return (
        <header className="bg-white border-b border-gray-200 sticky top-0 z-40" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16">
              <a href="index.html" className="flex items-center gap-2 rounded-md" aria-label="LearnPath — Go to homepage">
                <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center" aria-hidden="true">
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="white"><path d="M10.394 2.08a1 1 0 00-.788 0l-7 3a1 1 0 000 1.84L5.25 8.051a.999.999 0 01.356-.257l4-1.714a1 1 0 11.788 1.838L7.667 9.088l1.94.831a1 1 0 00.787 0l7-3a1 1 0 000-1.838l-7-3z"/><path d="M3.31 9.397L5 10.12v4.102a8.969 8.969 0 00-1.05-.174 1 1 0 01-.89-.89 11.115 11.115 0 01.25-3.762zM9.3 16.573A9.026 9.026 0 007 14.935v-3.957l1.818.78a3 3 0 002.364 0l5.508-2.361a11.026 11.026 0 01.25 3.762 1 1 0 01-.89.89 8.968 8.968 0 00-5.35 2.524 1 1 0 01-1.4 0z"/></svg>
                </div>
                <span className="text-xl font-bold text-indigo-600">LearnPath</span>
              </a>
              <nav aria-label="Main navigation" className="hidden md:flex items-center gap-8">
                {NAV_LINKS.map(l => (
                  <a key={l.href} href={l.href} aria-current={current === l.href ? 'page' : undefined}
                    className={`font-medium transition-colors ${current === l.href ? 'text-indigo-600' : 'text-gray-600 hover:text-indigo-600'}`}>
                    {l.label}
                  </a>
                ))}
              </nav>
              <div className="hidden md:flex items-center gap-3">
                <a href="dashboard.html" className="text-gray-600 hover:text-indigo-600 font-medium px-2 py-1 rounded-md transition-colors">Sign In</a>
                <a href="#plans" className="bg-indigo-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">Get Started</a>
              </div>
              <button onClick={() => setOpen(o => !o)} aria-expanded={open} aria-controls="mobile-menu" aria-label={open ? 'Close menu' : 'Open menu'}
                className="md:hidden p-2 rounded-md text-gray-600">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  {open ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/> : <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
            {open && (
              <div id="mobile-menu" className="md:hidden py-4 border-t border-gray-100">
                <nav aria-label="Mobile navigation" className="flex flex-col gap-4">
                  {NAV_LINKS.map(l => <a key={l.href} href={l.href} className="text-gray-600 hover:text-indigo-600 font-medium px-2">{l.label}</a>)}
                  <div className="flex gap-3 px-2 pt-3 border-t border-gray-100 mt-1">
                    <a href="dashboard.html" className="text-gray-600 font-medium">Sign In</a>
                    <a href="#plans" className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-semibold">Get Started</a>
                  </div>
                </nav>
              </div>
            )}
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="bg-gray-900 text-gray-400" role="contentinfo">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
              <div>
                <a href="index.html" className="flex items-center gap-2 mb-4 rounded-md" aria-label="LearnPath — Go to homepage">
                  <div className="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center" aria-hidden="true"><span className="text-white font-bold text-xs">LP</span></div>
                  <span className="text-white font-bold">LearnPath</span>
                </a>
                <p className="text-sm">Empowering learners worldwide.</p>
              </div>
              <div><h3 className="text-white font-semibold mb-3">Learn</h3><ul className="space-y-2 text-sm"><li><a href="courses.html" className="hover:text-white">Browse Courses</a></li><li><a href="study.html" className="hover:text-white">Study Tools</a></li></ul></div>
              <div><h3 className="text-white font-semibold mb-3">Plans</h3><ul className="space-y-2 text-sm"><li><a href="pricing.html" className="hover:text-white">Pricing</a></li><li><a href="pricing.html" className="hover:text-white">For Teams</a></li></ul></div>
              <div><h3 className="text-white font-semibold mb-3">Company</h3><ul className="space-y-2 text-sm"><li><a href="#" className="hover:text-white">About</a></li><li><a href="#" className="hover:text-white">Careers</a></li></ul></div>
            </div>
            <div className="border-t border-gray-800 mt-8 pt-6 flex flex-col md:flex-row justify-between items-center gap-4 text-sm">
              <p>© 2026 LearnPath, Inc. All rights reserved.</p>
              <div className="flex gap-6"><a href="#" className="hover:text-white">Privacy</a><a href="#" className="hover:text-white">Terms</a><a href="#" className="hover:text-white">Accessibility</a></div>
            </div>
          </div>
        </footer>
      );
    }

    const PLANS = [
      {
        id: 'free', name: 'Free', price: '$0', period: 'forever', cta: 'Get Started Free', popular: false, color: 'border-gray-200',
        desc: 'Access select courses and start your learning journey at no cost.',
        features: [
          { text: 'Access to 200+ free courses', included: true },
          { text: 'Community Q&A forums', included: true },
          { text: 'Mobile app access', included: true },
          { text: 'Certificate of completion', included: false },
          { text: 'Full course library (8,500+)', included: false },
          { text: 'Downloadable resources', included: false },
          { text: 'Offline viewing', included: false },
          { text: 'Priority support', included: false },
          { text: 'Team admin dashboard', included: false },
        ],
      },
      {
        id: 'pro', name: 'Pro', price: '$19', period: '/month', cta: 'Start 7-Day Free Trial', popular: true, color: 'border-indigo-500',
        desc: 'Unlimited access to the full library. The most popular plan for individuals.',
        features: [
          { text: 'Access to 200+ free courses', included: true },
          { text: 'Community Q&A forums', included: true },
          { text: 'Mobile app access', included: true },
          { text: 'Certificate of completion', included: true },
          { text: 'Full course library (8,500+)', included: true },
          { text: 'Downloadable resources', included: true },
          { text: 'Offline viewing', included: true },
          { text: 'Priority support', included: false },
          { text: 'Team admin dashboard', included: false },
        ],
      },
      {
        id: 'teams', name: 'Teams', price: '$49', period: '/seat/month', cta: 'Start Team Trial', popular: false, color: 'border-violet-400',
        desc: 'Everything in Pro, plus an admin dashboard for managing your entire team.',
        features: [
          { text: 'Access to 200+ free courses', included: true },
          { text: 'Community Q&A forums', included: true },
          { text: 'Mobile app access', included: true },
          { text: 'Certificate of completion', included: true },
          { text: 'Full course library (8,500+)', included: true },
          { text: 'Downloadable resources', included: true },
          { text: 'Offline viewing', included: true },
          { text: 'Priority support', included: true },
          { text: 'Team admin dashboard', included: true },
        ],
      },
    ];

    const FAQS = [
      { q: 'Can I switch plans at any time?', a: 'Yes. You can upgrade, downgrade, or cancel your plan at any time from your account settings. Changes take effect at the next billing cycle.' },
      { q: 'What does the 30-day money-back guarantee cover?', a: 'If you\'re not satisfied with your Pro or Teams subscription within the first 30 days, contact our support team for a full refund — no questions asked.' },
      { q: 'Do certificates expire?', a: 'No. Once you earn a certificate of completion, it\'s yours permanently. You can share it on LinkedIn or download a PDF copy at any time.' },
      { q: 'Is there a discount for students or nonprofits?', a: 'Yes! We offer 50% discounts for verified students and registered nonprofit organizations. Contact support@learnpath.com with your credentials.' },
      { q: 'How does the Teams plan work?', a: 'You purchase seats (minimum 5) and invite team members. An admin dashboard lets you assign courses, track progress, and generate completion reports.' },
      { q: 'Can I use LearnPath offline?', a: 'Pro and Teams subscribers can download course videos to the LearnPath mobile app for offline viewing.' },
    ];

    const TESTIMONIALS = [
      { name: 'Jordan M.', role: 'Software Engineer at Stripe', text: 'LearnPath Pro helped me upskill in machine learning while working full-time. The course library is incredible and the quality is top-notch.', avatar: '👨‍💻' },
      { name: 'Priya S.', role: 'UX Designer at Airbnb', text: 'I completed three design certifications in one month. The instructors are genuine experts and the projects are real-world relevant.', avatar: '👩‍🎨' },
      { name: 'Carlos R.', role: 'Head of L&D at TechCorp', text: 'The Teams plan made it trivial to roll out learning programs across our 200-person engineering org. Admin dashboard is excellent.', avatar: '👨‍💼' },
    ];

    const FEATURES = [
      'Free courses access', 'Full library access', 'Certificates', 'Downloadable resources', 'Offline viewing', 'Priority support', 'Admin dashboard', 'Team analytics',
    ];
    const FEATURE_MATRIX = {
      'Free courses access': ['✓', '✓', '✓'],
      'Full library access': ['200+ only', '8,500+', '8,500+'],
      'Certificates': ['—', '✓', '✓'],
      'Downloadable resources': ['—', '✓', '✓'],
      'Offline viewing': ['—', '✓', '✓'],
      'Priority support': ['—', '—', '✓'],
      'Admin dashboard': ['—', '—', '✓'],
      'Team analytics': ['—', '—', '✓'],
    };

    function FAQItem({ item, index }) {
      const [open, setOpen] = useState(false);
      const btnId = `faq-btn-${index}`;
      const panelId = `faq-panel-${index}`;
      return (
        <div className="border border-gray-200 rounded-xl overflow-hidden">
          <h3>
            <button id={btnId} aria-expanded={open} aria-controls={panelId}
              onClick={() => setOpen(o => !o)}
              onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setOpen(o => !o); } }}
              className="w-full flex items-center justify-between px-5 py-4 text-left bg-white hover:bg-gray-50 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-inset">
              <span className="font-semibold text-gray-900">{item.q}</span>
              <svg className={`w-5 h-5 text-gray-500 transition-transform shrink-0 ml-4 ${open ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
          </h3>
          {open && (
            <div id={panelId} role="region" aria-labelledby={btnId} className="px-5 pb-5 bg-white">
              <p className="text-gray-600 leading-relaxed">{item.a}</p>
            </div>
          )}
        </div>
      );
    }

    function PricingPage() {
      const [billing, setBilling] = useState('monthly');

      return (
        <>
          {/* Hero */}
          <section className="text-center py-16 px-4 bg-gradient-to-br from-indigo-50 to-white" aria-labelledby="pricing-hero">
            <h1 id="pricing-hero" className="text-4xl md:text-5xl font-extrabold text-gray-900 mb-4">
              Simple, Transparent Pricing
            </h1>
            <p className="text-gray-500 text-lg max-w-xl mx-auto mb-8">
              Choose the plan that fits your goals. Upgrade or cancel anytime, no questions asked.
            </p>

            {/* Billing toggle */}
            <div className="inline-flex items-center bg-gray-100 rounded-full p-1 mb-10" role="group" aria-label="Billing period">
              <button onClick={() => setBilling('monthly')} aria-pressed={billing === 'monthly'}
                className={`px-5 py-2 rounded-full text-sm font-semibold transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 ${billing === 'monthly' ? 'bg-white text-indigo-600 shadow' : 'text-gray-600 hover:text-gray-800'}`}>
                Monthly
              </button>
              <button onClick={() => setBilling('annual')} aria-pressed={billing === 'annual'}
                className={`px-5 py-2 rounded-full text-sm font-semibold transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 ${billing === 'annual' ? 'bg-white text-indigo-600 shadow' : 'text-gray-600 hover:text-gray-800'}`}>
                Annual <span className="text-emerald-600 font-bold">Save 30%</span>
              </button>
            </div>
          </section>

          {/* Plans */}
          <section id="plans" className="px-4 pb-16 -mt-4" aria-label="Pricing plans">
            <div className="max-w-5xl mx-auto grid md:grid-cols-3 gap-6">
              {PLANS.map((plan, i) => {
                const annualPrice = plan.id === 'free' ? '$0' : plan.id === 'pro' ? '$13' : '$34';
                const displayPrice = billing === 'annual' && plan.id !== 'free' ? annualPrice : plan.price;
                return (
                  <article key={plan.id} className={`bg-white rounded-2xl border-2 ${plan.color} ${plan.popular ? 'shadow-2xl shadow-indigo-100 scale-105' : 'shadow-sm'} overflow-hidden relative`}
                    aria-label={`${plan.name} plan${plan.popular ? ' — Most Popular' : ''}`}>
                    {plan.popular && (
                      <div className="bg-indigo-600 text-white text-xs font-bold text-center py-2 tracking-wide">
                        MOST POPULAR
                      </div>
                    )}
                    <div className="p-6">
                      <h2 className="text-xl font-bold text-gray-900 mb-1">{plan.name}</h2>
                      <p className="text-gray-500 text-sm mb-4 leading-relaxed">{plan.desc}</p>
                      <div className="flex items-end gap-1 mb-6">
                        <span className="text-4xl font-extrabold text-gray-900" aria-label={`${displayPrice} ${plan.id === 'free' ? 'forever' : billing === 'annual' ? 'per month billed annually' : plan.period}`}>
                          {displayPrice}
                        </span>
                        {plan.id !== 'free' && <span className="text-gray-500 text-sm mb-1">{billing === 'annual' ? '/mo, billed annually' : plan.period}</span>}
                      </div>
                      <a href="dashboard.html"
                        className={`block w-full text-center font-bold py-3 rounded-xl mb-6 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 ${plan.popular ? 'bg-indigo-600 text-white hover:bg-indigo-700 focus-visible:ring-indigo-500' : 'border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50 focus-visible:ring-indigo-500'}`}
                        aria-label={`${plan.cta} — ${plan.name} plan`}>
                        {plan.cta}
                      </a>
                      <ul className="space-y-2.5" aria-label={`${plan.name} plan features`}>
                        {plan.features.map(f => (
                          <li key={f.text} className="flex items-center gap-2.5 text-sm">
                            {f.included ? (
                              <span className="w-5 h-5 bg-emerald-100 rounded-full flex items-center justify-center shrink-0" aria-label="Included">
                                <svg className="w-3 h-3 text-emerald-600" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>
                              </span>
                            ) : (
                              <span className="w-5 h-5 bg-gray-100 rounded-full flex items-center justify-center shrink-0" aria-label="Not included">
                                <svg className="w-3 h-3 text-gray-400" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true"><path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd"/></svg>
                              </span>
                            )}
                            <span className={f.included ? 'text-gray-700' : 'text-gray-400'}>{f.text}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  </article>
                );
              })}
            </div>
          </section>

          {/* Money-back guarantee */}
          <section className="text-center py-8 px-4" aria-label="Money-back guarantee">
            <div className="inline-flex items-center gap-3 bg-emerald-50 border border-emerald-200 rounded-2xl px-8 py-5">
              <span className="text-3xl" role="img" aria-label="Shield with checkmark">🛡️</span>
              <div className="text-left">
                <p className="font-bold text-emerald-800">30-Day Money-Back Guarantee</p>
                <p className="text-sm text-emerald-700">Not satisfied? Get a full refund within 30 days. No questions asked.</p>
              </div>
            </div>
          </section>

          {/* Comparison table */}
          <section className="py-12 px-4" aria-labelledby="comparison-heading">
            <div className="max-w-4xl mx-auto">
              <h2 id="comparison-heading" className="text-2xl font-bold text-gray-900 mb-8 text-center">Full Feature Comparison</h2>
              <div className="overflow-x-auto">
                <table className="w-full border-collapse bg-white rounded-2xl shadow-sm overflow-hidden" aria-label="Feature comparison across Free, Pro, and Teams plans">
                  <thead>
                    <tr className="border-b-2 border-gray-200">
                      <th scope="col" className="text-left px-4 py-4 font-semibold text-gray-700 w-1/2">Feature</th>
                      <th scope="col" className="text-center px-4 py-4 font-semibold text-gray-700">Free</th>
                      <th scope="col" className="text-center px-4 py-4 font-bold text-indigo-600 bg-indigo-50">Pro</th>
                      <th scope="col" className="text-center px-4 py-4 font-semibold text-gray-700">Teams</th>
                    </tr>
                  </thead>
                  <tbody>
                    {FEATURES.map((feat, i) => (
                      <tr key={feat} className={`border-b border-gray-100 ${i % 2 === 1 ? 'bg-gray-50' : 'bg-white'}`}>
                        <td className="px-4 py-3 text-sm text-gray-700">{feat}</td>
                        {FEATURE_MATRIX[feat].map((val, j) => (
                          <td key={j} className={`px-4 py-3 text-center text-sm ${j === 1 ? 'bg-indigo-50' : ''}`}>
                            {val === '✓' ? (
                              <span aria-label="Included">
                                <svg className="w-5 h-5 text-emerald-500 mx-auto" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>
                              </span>
                            ) : val === '—' ? (
                              <span className="text-gray-300" aria-label="Not included">—</span>
                            ) : (
                              <span className="text-gray-600 font-medium">{val}</span>
                            )}
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          {/* Testimonials */}
          <section className="bg-indigo-900 py-16 px-4" aria-labelledby="testimonials-heading">
            <div className="max-w-5xl mx-auto">
              <h2 id="testimonials-heading" className="text-2xl font-bold text-white mb-10 text-center">What Our Learners Say</h2>
              <div className="grid md:grid-cols-3 gap-6">
                {TESTIMONIALS.map(t => (
                  <figure key={t.name} className="bg-indigo-800 rounded-2xl p-6">
                    <blockquote className="text-indigo-100 text-sm leading-relaxed mb-4">"{t.text}"</blockquote>
                    <figcaption className="flex items-center gap-3">
                      <span className="text-2xl" role="img" aria-label={`${t.name} avatar`}>{t.avatar}</span>
                      <div>
                        <p className="font-semibold text-white text-sm">{t.name}</p>
                        <p className="text-indigo-300 text-xs">{t.role}</p>
                      </div>
                    </figcaption>
                  </figure>
                ))}
              </div>
            </div>
          </section>

          {/* FAQ */}
          <section className="py-16 px-4" aria-labelledby="faq-heading">
            <div className="max-w-3xl mx-auto">
              <h2 id="faq-heading" className="text-2xl font-bold text-gray-900 mb-8 text-center">Frequently Asked Questions</h2>
              <div className="space-y-3">
                {FAQS.map((item, i) => <FAQItem key={i} item={item} index={i} />)}
              </div>
              <div className="text-center mt-10">
                <p className="text-gray-500 mb-4">Still have questions?</p>
                <a href="#" className="bg-indigo-600 text-white font-bold px-8 py-3 rounded-xl hover:bg-indigo-700 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 inline-block">
                  Contact Support
                </a>
              </div>
            </div>
          </section>
        </>
      );
    }

    function App() {
      return (
        <div className="flex flex-col min-h-screen">
          <a href="#main-content" className="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-indigo-600 text-white px-4 py-2 rounded-lg z-50">Skip to main content</a>
          <Header current="pricing.html" />
          <main id="main-content" className="flex-1">
            <PricingPage />
          </main>
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
