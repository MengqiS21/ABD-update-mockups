<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opinion | The Meridian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Playfair Display', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .ticker-track { animation: ticker-scroll 40s linear infinite; }
    .ticker-paused .ticker-track { animation-play-state: paused; }
    .skip-link { position: absolute; top: -100%; left: 0; padding: 0.5rem 1rem; background: #7f1d1d; color: #fff; z-index: 9999; font-weight: 600; text-decoration: none; }
    .skip-link:focus { top: 0; }
    html { scroll-padding-top: 76px; }
    :focus-visible { outline: 3px solid #b91c1c; outline-offset: 2px; }
    .sticky-header { position: sticky; top: 0; z-index: 100; }
    .essay-body p { margin-bottom: 1.5rem; line-height: 1.85; font-size: 1.1rem; color: #374151; }
  </style>
</head>
<body class="bg-white text-gray-900 font-sans">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function CookieBanner() {
      const [dismissed, setDismissed] = useState(false);
      const btnRef = useRef(null);
      useEffect(() => { if (!dismissed && btnRef.current) btnRef.current.focus(); }, []);
      if (dismissed) return null;
      return (
        <div role="region" aria-label="Cookie consent"
          className="fixed bottom-0 left-0 right-0 z-50 bg-gray-900 text-white px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-3 shadow-2xl"
          onKeyDown={e => e.key === 'Escape' && setDismissed(true)}>
          <p className="text-sm">We use cookies to improve your experience. See our <a href="#" className="underline hover:text-gray-200">Cookie Policy</a>.</p>
          <div className="flex gap-2 flex-shrink-0">
            <button ref={btnRef} onClick={() => setDismissed(true)} className="px-4 py-1.5 text-sm bg-white text-gray-900 rounded font-semibold hover:bg-gray-100">Accept</button>
            <button onClick={() => setDismissed(true)} aria-label="Decline cookies and close banner" className="px-4 py-1.5 text-sm border border-gray-500 rounded hover:border-white">Decline</button>
          </div>
        </div>
      );
    }

    function Header({ current }) {
      const [open, setOpen] = useState(false);
      const today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const nav = [
        { label: 'World', href: 'world.html' },
        { label: 'Politics', href: '#' },
        { label: 'Tech', href: '#' },
        { label: 'Culture', href: '#' },
        { label: 'Opinion', href: 'opinion.html' },
      ];
      return (
        <header className="sticky-header bg-gray-950 text-white">
          <div className="border-b border-gray-800">
            <div className="max-w-7xl mx-auto px-4 py-1.5 flex justify-between text-xs text-gray-400">
              <span>{today}</span>
              <div className="flex gap-4">
                {['Twitter','Facebook','Instagram'].map(s => (
                  <a key={s} href="#" aria-label={`Follow The Meridian on ${s}`} className="hover:text-white transition-colors">{s}</a>
                ))}
              </div>
            </div>
          </div>
          <div className="max-w-7xl mx-auto px-4">
            <div className="flex items-center justify-between py-3">
              <a href="index.html" className="font-serif text-3xl font-black tracking-tight hover:text-gray-200">THE MERIDIAN</a>
              <nav aria-label="Main navigation" className="hidden md:flex items-center gap-0.5">
                {nav.map(({ label, href }) => (
                  <a key={label} href={href}
                    className={`px-3 py-2 text-sm font-medium rounded transition-colors ${current === label.toLowerCase() ? 'bg-gray-700 text-white' : 'text-gray-300 hover:bg-gray-800 hover:text-white'}`}
                    aria-current={current === label.toLowerCase() ? 'page' : undefined}>{label}</a>
                ))}
                <a href="subscription.html" className="ml-3 px-4 py-2 text-sm font-bold bg-red-700 text-white rounded hover:bg-red-600 transition-colors">Subscribe</a>
              </nav>
              <button className="md:hidden p-2 rounded hover:bg-gray-700" onClick={() => setOpen(!open)}
                aria-expanded={open} aria-controls="mobile-nav" aria-label="Toggle navigation menu">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={open ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'} />
                </svg>
              </button>
            </div>
          </div>
          {open && (
            <nav id="mobile-nav" aria-label="Mobile navigation" className="md:hidden border-t border-gray-800 pb-2">
              {nav.map(({ label, href }) => (
                <a key={label} href={href} className="block px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800 hover:text-white">{label}</a>
              ))}
              <a href="subscription.html" className="block px-4 py-2.5 text-sm font-bold text-red-400 hover:bg-gray-800">Subscribe</a>
            </nav>
          )}
        </header>
      );
    }

    function BreakingNewsTicker() {
      const [paused, setPaused] = useState(false);
      const items = [
        'BREAKING: UN Emergency Session Called Over Red Sea Tensions',
        'Markets Rally as Fed Signals Pause in Rate Hikes',
        'Climate Summit: 140 Nations Sign Historic Emissions Pact',
      ];
      const text = items.join('   ·   ') + '   ·   ' + items.join('   ·   ');
      return (
        <div role="region" aria-label="Breaking news ticker" className={`flex items-stretch bg-red-700 text-white overflow-hidden ${paused ? 'ticker-paused' : ''}`}>
          <div className="flex-shrink-0 bg-red-900 px-4 py-2 flex items-center">
            <span className="text-xs font-black tracking-widest uppercase">Breaking</span>
          </div>
          <div className="flex-1 overflow-hidden relative" aria-live="off">
            <div className="ticker-track whitespace-nowrap py-2 px-4 text-sm font-medium" aria-hidden={!paused}>{text}</div>
            {paused && <p className="absolute inset-0 flex items-center px-4 text-sm font-medium bg-red-700" aria-live="polite">{items[0]}</p>}
          </div>
          <button onClick={() => setPaused(p => !p)} aria-pressed={paused}
            aria-label={paused ? 'Resume breaking news ticker' : 'Pause breaking news ticker'}
            className="flex-shrink-0 px-4 py-2 bg-red-800 hover:bg-red-900 text-xs font-semibold transition-colors">
            {paused ? '▶ Resume' : '⏸ Pause'}
          </button>
        </div>
      );
    }

    function Footer() {
      const [email, setEmail] = useState('');
      const [submitted, setSubmitted] = useState(false);
      const [error, setError] = useState('');
      const handleSubmit = e => {
        e.preventDefault();
        if (!email || !/\S+@\S+\.\S+/.test(email)) { setError('Please enter a valid email address.'); return; }
        setError(''); setSubmitted(true);
      };
      return (
        <footer className="bg-gray-950 text-gray-400 mt-16">
          <div className="border-b border-gray-800">
            <div className="max-w-7xl mx-auto px-4 py-10 grid md:grid-cols-2 gap-8 items-center">
              <div>
                <h2 className="font-serif text-2xl text-white font-bold mb-2">Stay Informed</h2>
                <p className="text-sm">Get The Meridian's top stories delivered to your inbox every morning.</p>
              </div>
              <div>
                <div aria-live="polite" aria-atomic="true">
                  {submitted && <p className="text-green-400 text-sm mb-2">✓ You've been added to our newsletter.</p>}
                  {error && <p className="text-red-400 text-sm mb-2" id="nl-err">{error}</p>}
                </div>
                {!submitted && (
                  <form onSubmit={handleSubmit} noValidate className="flex gap-2">
                    <div className="flex-1">
                      <label htmlFor="footer-email" className="sr-only">Your email address</label>
                      <input id="footer-email" type="email" value={email} onChange={e => setEmail(e.target.value)}
                        placeholder="your@email.com" aria-required="true" aria-describedby={error ? 'nl-err' : undefined}
                        className="w-full px-3 py-2 rounded bg-gray-800 text-white placeholder-gray-500 border border-gray-700 focus:outline-none focus:border-red-500 text-sm" />
                    </div>
                    <button type="submit" className="px-4 py-2 bg-red-700 text-white rounded text-sm font-bold hover:bg-red-600 transition-colors">Subscribe</button>
                  </form>
                )}
              </div>
            </div>
          </div>
          <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between text-xs text-gray-600">
            <span>© 2026 The Meridian. All rights reserved.</span>
            <span>Independent journalism since 2008</span>
          </div>
        </footer>
      );
    }

    /* ─── Columnist Card ─── */
    function ColumnistCard({ columnist }) {
      return (
        <li>
          <article className="group">
            <a href="#" className="block" aria-label={`Read opinion by ${columnist.name}`}>
              <div className="flex flex-col items-center text-center mb-4">
                <img src={columnist.avatar} alt={`${columnist.name}, ${columnist.title}`}
                  className="w-20 h-20 rounded-full object-cover mb-3 ring-2 ring-transparent group-hover:ring-red-200 transition-all" />
                <h3 className="font-bold text-sm">{columnist.name}</h3>
                <p className="text-xs text-gray-500">{columnist.title}</p>
              </div>
              <p className="text-sm font-serif font-bold leading-snug text-center text-gray-800 group-hover:text-red-700 transition-colors">{columnist.latestHeadline}</p>
            </a>
          </article>
        </li>
      );
    }

    /* ─── Opinion Piece Card ─── */
    function OpinionCard({ piece }) {
      return (
        <li>
          <article className="flex gap-4">
            <img src={piece.avatar} alt={`${piece.author}, opinion columnist`}
              className="w-12 h-12 rounded-full object-cover flex-shrink-0 mt-0.5" />
            <div>
              <h3 className="font-serif font-bold text-base leading-snug mb-1">
                <a href="#" className="hover:text-red-700 transition-colors">{piece.headline}</a>
              </h3>
              <p className="text-xs text-gray-500 mb-1.5">{piece.author} · <time>{piece.date}</time></p>
              <p className="text-sm text-gray-600 leading-relaxed">{piece.summary}</p>
            </div>
          </article>
        </li>
      );
    }

    /* ─── Main App ─── */
    function App() {
      const [letterName, setLetterName] = useState('');
      const [letterText, setLetterText] = useState('');
      const [letterEmail, setLetterEmail] = useState('');
      const [letterErrors, setLetterErrors] = useState({});
      const [letterSubmitted, setLetterSubmitted] = useState(false);

      const columnists = [
        { name: 'Eleanor Hart', title: 'Foreign Policy Analyst', latestHeadline: 'The West Must Confront Its Own Fragility', avatar: 'https://picsum.photos/seed/eleanorhart/160/160' },
        { name: 'Dr. Kwame Asante', title: 'Climate & Geopolitics', latestHeadline: 'Why Climate Denial Is Now a Geopolitical Strategy', avatar: 'https://picsum.photos/seed/kwameasante/160/160' },
        { name: 'Margot Lefebvre', title: 'Media Critic', latestHeadline: 'In Defense of Slow Journalism', avatar: 'https://picsum.photos/seed/margot/160/160' },
        { name: 'James Okafor', title: 'Economic Policy', latestHeadline: 'The IMF Is Getting Africa Wrong', avatar: 'https://picsum.photos/seed/jamesokafor/160/160' },
        { name: 'Dr. Yuna Sato', title: 'Technology & Society', latestHeadline: 'Democracy Cannot Outsource Its Thinking to AI', avatar: 'https://picsum.photos/seed/yunasato/160/160' },
        { name: 'Rafael Medina', title: 'Latin America Correspondent', latestHeadline: 'Bolsonaro is Gone. His Movement is Not.', avatar: 'https://picsum.photos/seed/rafaelmed/160/160' },
      ];

      const recentPieces = [
        { headline: "China's Economic Slowdown Is Everyone's Problem", author: 'Eleanor Hart', date: 'March 16', summary: 'The structural weakness in Chinese demand is not a domestic concern. It threatens to reshape global trade flows in ways policymakers are not prepared for.', avatar: 'https://picsum.photos/seed/eleanorhart/80/80' },
        { headline: 'The Afghan Women the World Forgot', author: 'Margot Lefebvre', date: 'March 15', summary: 'Three years since the Taliban reclaimed Kabul, international media has largely moved on. The women living under the regime have not.', avatar: 'https://picsum.photos/seed/margot/80/80' },
        { headline: 'On Nuclear Deterrence and the Illusion of Control', author: 'Dr. Kwame Asante', date: 'March 14', summary: 'The logic of deterrence was built for a bipolar world. In the multipolar reality of 2026, its assumptions are dangerously outdated.', avatar: 'https://picsum.photos/seed/kwameasante/80/80' },
        { headline: "Africa's Youth Dividend Is Real — But Squandered", author: 'James Okafor', date: 'March 13', summary: "The continent's demographic advantage will turn into instability unless governments and international partners radically rethink their approach to education and jobs.", avatar: 'https://picsum.photos/seed/jamesokafor/80/80' },
        { headline: 'Why I Changed My Mind on Open-Source AI', author: 'Dr. Yuna Sato', date: 'March 12', summary: 'For years I argued that open models were democratizing innovation. I no longer believe that story is as simple as I thought.', avatar: 'https://picsum.photos/seed/yunasato/80/80' },
        { headline: 'The New Authoritarians Are Not What You Think', author: 'Rafael Medina', date: 'March 11', summary: 'The twenty-first-century autocrat does not seize power in a coup. They are elected, and then they hollow out the institutions around them.', avatar: 'https://picsum.photos/seed/rafaelmed/80/80' },
      ];

      const validateLetter = () => {
        const e = {};
        if (!letterName.trim()) e.name = 'Please enter your full name.';
        if (!letterEmail.trim() || !/\S+@\S+\.\S+/.test(letterEmail)) e.email = 'Please enter a valid email address.';
        if (!letterText.trim() || letterText.trim().length < 50) e.text = 'Your letter must be at least 50 characters long.';
        return e;
      };

      const handleLetterSubmit = e => {
        e.preventDefault();
        const errs = validateLetter();
        setLetterErrors(errs);
        if (Object.keys(errs).length === 0) setLetterSubmitted(true);
      };

      return (
        <>
          <a href="#main-content" className="skip-link">Skip to main content</a>
          <CookieBanner />
          <Header current="opinion" />
          <BreakingNewsTicker />

          <main id="main-content">
            {/* Page header */}
            <div className="bg-gray-950 text-white">
              <div className="max-w-7xl mx-auto px-4 py-10">
                <p className="text-red-400 text-xs font-black uppercase tracking-widest mb-2">Section</p>
                <h1 className="font-serif text-5xl font-black">Opinion</h1>
                <p className="text-gray-400 mt-2 max-w-xl">Independent voices on the issues that matter. Our columnists bring depth, provocation, and perspective to the news.</p>
              </div>
            </div>

            <div className="max-w-7xl mx-auto px-4 py-10">

              {/* Featured Essay */}
              <section aria-labelledby="featured-essay-heading" className="mb-16 grid lg:grid-cols-2 gap-10 items-start">
                <div>
                  <p className="text-xs font-black text-red-700 uppercase tracking-widest mb-3">Featured Essay</p>
                  <h2 id="featured-essay-heading" className="font-serif text-4xl md:text-5xl font-black leading-tight mb-4">
                    <a href="#" className="hover:text-red-700 transition-colors">The West Must Confront Its Own Fragility</a>
                  </h2>
                  <div className="flex items-center gap-4 mb-6">
                    <img src="https://picsum.photos/seed/eleanorhart/120/120" alt="Eleanor Hart, Foreign Policy Analyst"
                      className="w-14 h-14 rounded-full object-cover" />
                    <div>
                      <p className="font-bold">Eleanor Hart</p>
                      <p className="text-sm text-gray-500">Foreign Policy Analyst · March 17, 2026</p>
                    </div>
                  </div>
                  <div className="essay-body">
                    <p>The liberal order, we were told, was durable. Built from the rubble of the Second World War, reinforced by decades of mutual economic dependence, it would hold. And yet every week brings fresh evidence that what seemed like bedrock is, in fact, a set of agreements contingent on circumstances that no longer fully exist.</p>
                    <p>The Red Sea crisis is not merely a shipping problem. It is a stress test of the West's ability to project coherence. When a coalition of powerful democracies cannot deter a non-state actor from disrupting global trade, the question is not just operational. It is existential.</p>
                    <p>We must ask ourselves honestly: have we confused the stability of the postwar order with our own permanence? And if the answer is yes — as I believe it is — what are we prepared to do about it?</p>
                  </div>
                  <a href="#" className="inline-flex items-center gap-2 text-sm font-bold text-red-700 hover:text-red-800 mt-2">
                    Read full essay →
                  </a>
                </div>
                <div>
                  <img src="https://picsum.photos/seed/westessay/700/500" alt="Illustration representing the fragility of Western democratic institutions"
                    className="w-full rounded-xl object-cover h-80 md:h-96" />
                </div>
              </section>

              {/* Columnists Grid — cat_2: ul > li with article */}
              <section aria-labelledby="columnists-heading" className="mb-16">
                <div className="flex items-center justify-between border-b-2 border-gray-900 pb-2 mb-8">
                  <h2 id="columnists-heading" className="font-serif text-2xl font-bold">Our Columnists</h2>
                </div>
                {/* cat_2: opinion columnist grid as list with semantic markup */}
                <ul className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-6" role="list" aria-label="Opinion columnists">
                  {columnists.map((c, i) => <ColumnistCard key={i} columnist={c} />)}
                </ul>
              </section>

              {/* Recent Opinion Pieces — cat_2: list */}
              <section aria-labelledby="recent-opinions-heading" className="mb-16">
                <div className="flex items-center justify-between border-b-2 border-gray-900 pb-2 mb-8">
                  <h2 id="recent-opinions-heading" className="font-serif text-2xl font-bold">Recent Essays</h2>
                </div>
                <ul className="grid md:grid-cols-2 gap-8" role="list" aria-label="Recent opinion pieces">
                  {recentPieces.map((p, i) => <OpinionCard key={i} piece={p} />)}
                </ul>
              </section>

              {/* Letters to the Editor */}
              <section aria-labelledby="letters-heading" className="bg-gray-50 rounded-2xl p-8 mb-16">
                <div className="max-w-2xl">
                  <p className="text-xs font-black text-red-700 uppercase tracking-widest mb-2">Community</p>
                  <h2 id="letters-heading" className="font-serif text-3xl font-bold mb-2">Letters to the Editor</h2>
                  <p className="text-gray-600 mb-8 leading-relaxed">We welcome letters on any topic covered in The Meridian. Selected letters are published each Friday. Please keep submissions under 300 words.</p>

                  {/* Published letters */}
                  <div className="mb-10 space-y-6">
                    {[
                      { from: 'Maria G., Chicago', text: 'Eleanor Hart\'s essay on Western fragility is the most honest piece I\'ve read in years. We keep pretending the rules-based order will sustain itself by inertia alone. It will not.' },
                      { from: 'David T., London', text: 'Dr. Asante is right that climate denial has become a geopolitical tool, but the piece underestimates the role of domestic economic anxiety in driving that denial. People don\'t reject climate science; they reject the cost.' },
                      { from: 'Amina B., Nairobi', text: 'As someone who lives in a country the IMF has "helped," James Okafor\'s column resonated deeply. The conditionalities attached to structural adjustment have real human costs that never appear in the models.' },
                    ].map((letter, i) => (
                      <blockquote key={i} className="border-l-4 border-gray-300 pl-4">
                        <p className="text-sm text-gray-700 italic mb-1.5">"{letter.text}"</p>
                        <cite className="text-xs text-gray-500 not-italic font-semibold">— {letter.from}</cite>
                      </blockquote>
                    ))}
                  </div>

                  {/* Submit letter form */}
                  <h3 className="font-bold text-base mb-4" id="submit-letter-heading">Submit a Letter</h3>

                  <div aria-live="polite" aria-atomic="true">
                    {letterSubmitted && (
                      <p className="text-green-700 bg-green-50 border border-green-200 rounded px-4 py-3 text-sm mb-4">
                        ✓ Thank you! Your letter has been received and is under review for publication.
                      </p>
                    )}
                  </div>

                  {!letterSubmitted && (
                    <form onSubmit={handleLetterSubmit} noValidate aria-labelledby="submit-letter-heading" className="space-y-4">
                      <div className="grid sm:grid-cols-2 gap-4">
                        <div>
                          <label htmlFor="letter-name" className="block text-sm font-semibold mb-1">
                            Full Name <span className="text-red-600" aria-hidden="true">*</span>
                          </label>
                          <input id="letter-name" type="text" value={letterName} onChange={e => setLetterName(e.target.value)}
                            aria-required="true" aria-describedby={letterErrors.name ? 'letter-name-err' : undefined}
                            aria-invalid={!!letterErrors.name}
                            className={`w-full px-3 py-2 border rounded text-sm focus:outline-none focus:border-red-500 ${letterErrors.name ? 'border-red-500 bg-red-50' : 'border-gray-300 bg-white'}`} />
                          {letterErrors.name && (
                            <p id="letter-name-err" className="text-red-600 text-xs mt-1" role="alert">{letterErrors.name}</p>
                          )}
                        </div>
                        <div>
                          <label htmlFor="letter-email" className="block text-sm font-semibold mb-1">
                            Email <span className="text-red-600" aria-hidden="true">*</span>
                          </label>
                          <input id="letter-email" type="email" value={letterEmail} onChange={e => setLetterEmail(e.target.value)}
                            aria-required="true" aria-describedby={letterErrors.email ? 'letter-email-err' : undefined}
                            aria-invalid={!!letterErrors.email}
                            className={`w-full px-3 py-2 border rounded text-sm focus:outline-none focus:border-red-500 ${letterErrors.email ? 'border-red-500 bg-red-50' : 'border-gray-300 bg-white'}`} />
                          {letterErrors.email && (
                            <p id="letter-email-err" className="text-red-600 text-xs mt-1" role="alert">{letterErrors.email}</p>
                          )}
                        </div>
                      </div>
                      <div>
                        <label htmlFor="letter-text" className="block text-sm font-semibold mb-1">
                          Your Letter <span className="text-red-600" aria-hidden="true">*</span>
                          <span className="text-gray-400 font-normal ml-1">(max 300 words)</span>
                        </label>
                        <textarea id="letter-text" rows={5} value={letterText} onChange={e => setLetterText(e.target.value)}
                          aria-required="true" aria-describedby={letterErrors.text ? 'letter-text-err' : 'letter-text-hint'}
                          aria-invalid={!!letterErrors.text}
                          className={`w-full px-3 py-2 border rounded text-sm focus:outline-none focus:border-red-500 resize-none ${letterErrors.text ? 'border-red-500 bg-red-50' : 'border-gray-300 bg-white'}`} />
                        <p id="letter-text-hint" className="text-xs text-gray-400 mt-1">Minimum 50 characters. We may edit for length and clarity.</p>
                        {letterErrors.text && (
                          <p id="letter-text-err" className="text-red-600 text-xs mt-1" role="alert">{letterErrors.text}</p>
                        )}
                      </div>
                      <button type="submit" className="px-6 py-2.5 bg-gray-900 text-white rounded font-bold text-sm hover:bg-gray-700 transition-colors">
                        Submit Letter
                      </button>
                    </form>
                  )}
                </div>
              </section>
            </div>
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
