    function CookieBanner() {

    function BreakingNewsTicker() {

    function Footer() {

      const [submitted, setSubmitted] = useState(false);
      const [error, setError] = useState('');
      const handleSubmit = e => {
        e.preventDefault();
        if (!email || !/\S+@\S+\.\S+/.test(email)) { setError('Please enter a valid email address.'); return; }
        setError(''); setSubmitted(true);
      };
      return (
        <footer className="bg-gray-950 text-gray-400 mt-16">

    /* ─── Share Buttons ─── */
    function ShareButtons({ title }) {

    /* ─── Comments ─── */
    function CommentsSection() {
      const [comment, setComment] = useState('');
      const [name, setName] = useState('');
      const [submitted, setSubmitted] = useState(false);
      const [errors, setErrors] = useState({});

      const validate = () => {
        const e = {};
        if (!name.trim()) e.name = 'Please enter your name.';
        if (!comment.trim()) e.comment = 'Please enter a comment.';
        return e;
      };

      const handleSubmit = e => {
        e.preventDefault();
        const errs = validate();
        setErrors(errs);
        if (Object.keys(errs).length === 0) setSubmitted(true);
      };

      const preloadedComments = [
        { name: 'Alexander Thompson', time: '1 hour ago', text: 'This is a critical moment for global trade. The insurance costs alone will ripple through every supply chain on earth.' },
        { name: 'Priya Iyer', time: '2 hours ago', text: 'The longer this continues, the more the global south suffers. Rerouting adds costs that developing economies cannot absorb.' },
        { name: 'Tobias Richter', time: '3 hours ago', text: 'Excellent reporting, Sarah. Would love to see a follow-up on what European gas suppliers are doing to hedge against this.' },
      ];

      return (
        <section aria-labelledby="comments-heading" className="mt-12 border-t border-gray-200 pt-10">
          <h2 id="comments-heading" className="font-serif text-2xl font-bold mb-8">Comments ({preloadedComments.length})</h2>
          <ul className="space-y-6 mb-10">
            {preloadedComments.map((c, i) => (
              <li key={i} className="flex gap-4">
                <div className="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-sm font-bold text-gray-600 flex-shrink-0" aria-hidden="true">
                  {c.name.split(' ').map(w => w[0]).join('')}
                </div>
                <div>
                  <div className="flex gap-2 items-baseline mb-1">
                    <span className="font-semibold text-sm">{c.name}</span>
                    <time className="text-xs text-gray-400">{c.time}</time>
                  </div>
                  <p className="text-sm text-gray-700 leading-relaxed">{c.text}</p>
                </div>
              </li>
            ))}
          </ul>

          <div aria-live="polite" aria-atomic="true">
            {submitted && (
              <p className="text-green-700 bg-green-50 border border-green-200 rounded px-4 py-3 text-sm mb-4">
                ✓ Your comment has been submitted for review.
              </p>
            )}
          </div>

          {!submitted && (
            <form onSubmit={handleSubmit} noValidate aria-labelledby="comment-form-heading">
              <h3 id="comment-form-heading" className="font-semibold text-base mb-4">Leave a Comment</h3>
              <div className="grid sm:grid-cols-2 gap-4 mb-4">
                <div>
                  <label htmlFor="comment-name" className="block text-sm font-semibold mb-1">
                    Name <span className="text-red-600" aria-hidden="true">*</span>
                  </label>
                  <input id="comment-name" type="text" value={name} onChange={e => setName(e.target.value)}
                    aria-required="true" aria-describedby={errors.name ? 'name-err' : undefined}
                    aria-invalid={!!errors.name}
                    className={`w-full px-3 py-2 border rounded text-sm focus:outline-none focus:border-red-500 ${errors.name ? 'border-red-500' : 'border-gray-300'}`} />
                  {errors.name && <p id="name-err" className="text-red-600 text-xs mt-1" role="alert">{errors.name} Please enter your first and last name.</p>}
                </div>
                <div>
                  <label htmlFor="comment-email" className="block text-sm font-semibold mb-1">Email (optional)</label>
                  <input id="comment-email" type="email" className="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-red-500" />
                </div>
              </div>
              <div className="mb-4">
                <label htmlFor="comment-text" className="block text-sm font-semibold mb-1">
                  Comment <span className="text-red-600" aria-hidden="true">*</span>
                </label>
                <textarea id="comment-text" rows={4} value={comment} onChange={e => setComment(e.target.value)}
                  aria-required="true" aria-describedby={errors.comment ? 'comment-err' : undefined}
                  aria-invalid={!!errors.comment}
                  className={`w-full px-3 py-2 border rounded text-sm focus:outline-none focus:border-red-500 resize-none ${errors.comment ? 'border-red-500' : 'border-gray-300'}`} />
                {errors.comment && <p id="comment-err" className="text-red-600 text-xs mt-1" role="alert">{errors.comment} Please write your comment before submitting.</p>}
              </div>
              <button type="submit" className="px-6 py-2.5 bg-gray-900 text-white rounded font-bold text-sm hover:bg-gray-700 transition-colors">
                Post Comment
              </button>
            </form>
          )}
        </section>
      );
    }

    function App() {

        { headline: 'France Faces Political Void After PM Resignation', author: 'Céline Dupont', timestamp: '20h ago', image: 'https://picsum.photos/seed/france2/300/200', imageAlt: 'French parliament', href: '#' },
        { headline: "Brazil's Amazon Deforestation Drops to Decade Low", author: 'Carlos Lima', timestamp: '12h ago', image: 'https://picsum.photos/seed/amazon2/300/200', imageAlt: 'Amazon rainforest aerial view', href: '#' },

      return (

                    <ol className="flex items-center gap-2 text-sm text-gray-500">
                      <li><a href="index.html" className="hover:text-gray-900">Home</a></li>

                  {/* Category */}

                  {/* h1 — FIRST in DOM (cat_10) */}

                    {ARTICLE_TITLE}
                  </h1>

                  {/* Subheadline */}
                  <p className="text-xl text-gray-600 leading-relaxed mb-6 font-light">
                    Global supply chains brace for disruption as Houthi attacks force carriers to reroute around Cape of Good Hope, adding weeks and billions in costs.
                  </p>

                  {/* Byline — after headline (cat_10) */}
                  <div className="flex items-center gap-4 mb-6 pb-6 border-b border-gray-200">
                    <img src="https://picsum.photos/seed/sarahchen/80/80" alt="Sarah Chen, World Affairs Correspondent"
                      className="w-12 h-12 rounded-full object-cover" />
                    <div>

                      <p className="text-xs text-gray-500">World Affairs Correspondent</p>
                    </div>
                    <div className="ml-auto text-right text-xs text-gray-500">
                      <time dateTime="2026-03-17T10:00:00Z">March 17, 2026</time>

                    </div>
                  </div>

                  {/* Share buttons */}

                  {/* Hero image — after byline (cat_10) */}

                    <img src="https://picsum.photos/seed/redsea3/900/500" alt="Container ships navigating through the Indian Ocean after rerouting from the Red Sea"
                      className="w-full rounded-lg object-cover" style={{maxHeight: '520px'}} />
                    <figcaption className="text-xs text-gray-500 mt-2 leading-relaxed">
                      Container ships navigate the Indian Ocean after major carriers announced suspension of Red Sea routes following increased Houthi drone activity. <em>Photo: AP / Mohamed Huwais</em>
                    </figcaption>
                  </figure>

                  {/* Article body — after image (cat_10) */}
                  <div className="article-body">
                    <p>
                      <strong>ADEN, Yemen</strong> — In a move that sent shockwaves through the global shipping industry, three of the world's five largest container carriers announced Monday they were suspending all transits through the Red Sea and Gulf of Aden indefinitely, citing an unacceptable level of risk following a wave of drone and missile attacks by Houthi forces on commercial vessels.
                    </p>

                    <p>
                      The announcements from Maersk, MSC, and CMA CGM came within hours of each other after a Houthi drone struck a Liberian-flagged cargo vessel carrying grain from Ukraine, killing two crew members and triggering a fire that burned for nearly six hours before being extinguished by a US Navy patrol vessel.
                    </p>

                    {/* Inline related article — within body */}
                    <aside className="border-l-4 border-red-700 pl-4 my-6 bg-red-50 py-3 pr-4 rounded-r-lg" aria-label="Related article">
                      <p className="text-xs font-bold text-red-700 uppercase tracking-wider mb-1">Related</p>
                      <a href="#" className="font-serif font-bold text-base text-gray-900 hover:text-red-700 leading-snug">
                        How the Red Sea Became a Flashpoint for Global Conflict
                      </a>
                    </aside>

                    <h2>A New Cape of Good Hope Detour</h2>
                    <p>
                      Ships are now diverting to the Cape of Good Hope route around southern Africa — the same passage that dominated global trade before the Suez Canal opened in 1869. The detour adds between 10 and 14 days to voyages between Asia and Europe, and costs an estimated $1 million in additional fuel per round trip for a large container vessel.
                    </p>

                    {/* Pull quote */}
                    <blockquote className="my-8 px-6 py-5 border-l-4 border-gray-900 bg-gray-50 rounded-r-xl" aria-label="Pull quote">
                      <p className="font-serif text-xl md:text-2xl font-bold text-gray-900 leading-snug mb-3">
                        "Every day this continues, the world economy pays a tax it didn't budget for. And the poorest nations pay the most."
                      </p>
                      <cite className="text-sm text-gray-600 not-italic">— Dr. Anita Sharma, Senior Fellow, Global Trade Institute</cite>
                    </blockquote>

                    <p>
                      The freight market reacted swiftly. The Shanghai Containerized Freight Index jumped 18 percent on Monday, its largest single-day move since the COVID-19 pandemic disrupted global supply chains in 2021. Spot rates on the Asia-to-Europe corridor surged to $5,200 per 40-foot container, more than double the level seen just three weeks ago.
                    </p>

                    <h2>Diplomatic Efforts Stall</h2>
                    <p>
                      A US-led naval coalition, Operation Prosperity Guardian, has been patrolling the Red Sea since December with limited success in deterring the attacks. The coalition has intercepted dozens of drones and missiles, but the sheer volume of inexpensive weapons being deployed by Houthi forces has strained the cost calculus — each interceptor missile costs several times more than the drones it destroys.
                    </p>

                    <p>
                      The UN Security Council held an emergency session on Tuesday but ended without a resolution, with Russia and China vetoing a Western-backed statement calling for an immediate cessation of Houthi attacks on commercial shipping. Diplomatic channels involving Oman, which brokered a 2023 ceasefire agreement between the Houthis and Saudi Arabia, are described as "active but inconclusive."
                    </p>

                  {/* Author bio */}
                  <div className="mt-8 p-6 bg-gray-50 rounded-xl flex gap-4">

                  {/* Most Read */}

                    <h2 id="most-read-sidebar" className="font-serif text-xl font-bold border-b-2 border-gray-900 pb-2 mb-4">Most Read</h2>
                    <ol className="space-y-3">
                      {[
                        'Inside the Chaos of the UN Emergency Session',
                        'The Geopolitics of Undersea Cables',
                        'How AI Is Rewriting the Rules of Disinformation',
                        'The Collapse of the Petrodollar',
                        'When Democracy Becomes a Brand',

                        <li key={i} className="flex gap-3 items-start">
                          <span className="font-serif text-2xl font-black text-gray-200 leading-none w-6 flex-shrink-0" aria-hidden="true">{i+1}</span>

            {/* More from World */}
            <section aria-labelledby="more-from-world-heading" className="border-t border-gray-200 mt-8">

                  <h2 id="more-from-world-heading" className="font-serif text-2xl font-bold">More from World</h2>
                  <a href="world.html" className="text-sm font-semibold text-red-700 hover:text-red-800">All World News →</a>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                  {moreFromWorld.map((art, i) => (
                    <article key={i}>
                      <div className="overflow-hidden rounded-lg mb-3">
                        <img src={art.image} alt={art.imageAlt} loading="lazy"

                      </div>
                      <h3 className="font-serif text-base font-bold leading-snug mb-1.5">
                        <a href={art.href} className="hover:text-red-700 transition-colors">{art.headline}</a>
                      </h3>
                      <p className="text-xs text-gray-400">By {art.author} · {art.timestamp}</p>

              </div>
            </section>
          </main>
