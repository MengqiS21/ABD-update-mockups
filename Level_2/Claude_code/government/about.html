<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Lakewood | City of Lakewood</title>
  <meta name="description" content="Learn about the City of Lakewood, Colorado — our history, city leadership, mission statement, and annual reports." />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #skip-link { position:absolute; top:-48px; left:0; background:#1e3a8a; color:#fff; padding:10px 20px; font-weight:700; font-size:.875rem; text-decoration:none; z-index:9999; border-radius:0 0 6px 0; transition:top .1s; }
    #skip-link:focus { top:0; }
    :focus-visible { outline:3px solid #f59e0b; outline-offset:2px; }
    :focus:not(:focus-visible) { outline:none; }
    #main-content:focus { outline:none; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <a href="#main-content" id="skip-link">Skip to main content</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function CityHeader({ currentPage }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const links = [{href:'index.html',label:'Home',id:'home'},{href:'services.html',label:'Services',id:'services'},{href:'about.html',label:'About',id:'about'},{href:'contact.html',label:'Contact',id:'contact'}];
      return (
        <header className="bg-blue-900 shadow-md" role="banner">
          <div className="bg-blue-950 text-blue-300 text-xs"><div className="max-w-7xl mx-auto px-4 py-1.5 flex items-center justify-between"><span>Official Website of the City of Lakewood, Colorado</span><div className="flex items-center gap-4"><a href="#" className="hover:text-white underline rounded focus:outline-none focus:ring-1 focus:ring-amber-400">Translate</a><span aria-hidden="true" className="text-blue-600">|</span><a href="#" className="hover:text-white underline rounded focus:outline-none focus:ring-1 focus:ring-amber-400">Accessibility</a></div></div></div>
          <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
            <a href="index.html" className="flex items-center gap-3 rounded-lg p-1 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2 focus:ring-offset-blue-900" aria-label="City of Lakewood — Return to homepage">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none" aria-hidden="true"><circle cx="24" cy="24" r="23" fill="white" stroke="#1e3a8a" strokeWidth="1"/><circle cx="24" cy="24" r="20" fill="#1e3a8a"/><polygon points="24,9 26.9,17.6 36,17.6 28.5,22.8 31.4,31.5 24,26.2 16.6,31.5 19.5,22.8 12,17.6 21.1,17.6" fill="#f59e0b"/><text x="24" y="39" textAnchor="middle" fill="white" fontSize="3.8" fontFamily="Arial,sans-serif" fontWeight="bold">LAKEWOOD</text></svg>
              <div><div className="text-white font-bold text-xl leading-tight tracking-tight">City of Lakewood</div><div className="text-blue-300 text-xs tracking-widest uppercase font-medium">Colorado · Est. 1969</div></div>
            </a>
            <nav aria-label="Main navigation" className="hidden md:flex items-center gap-1">
              {links.map(l=><a key={l.id} href={l.href} className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2 focus:ring-offset-blue-900 ${currentPage===l.id?'bg-white text-blue-900 font-semibold':'text-blue-100 hover:bg-blue-800 hover:text-white'}`} aria-current={currentPage===l.id?'page':undefined}>{l.label}</a>)}
              <a href="pay-bill.html" className="ml-2 bg-amber-500 hover:bg-amber-400 text-white px-4 py-2 rounded-lg text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-blue-900" aria-label="Pay your city utility bill online">Pay a Bill</a>
            </nav>
            <button onClick={()=>setMenuOpen(o=>!o)} aria-expanded={menuOpen} aria-controls="mobile-menu" aria-label={menuOpen?'Close navigation menu':'Open navigation menu'} className="md:hidden text-white p-2 rounded-lg hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-amber-400">
              <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true">{menuOpen?<path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/>:<path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16"/>}</svg>
            </button>
          </div>
          {menuOpen && <nav id="mobile-menu" aria-label="Mobile navigation" className="md:hidden border-t border-blue-800"><ul className="px-4 py-3 space-y-1" role="list">{links.map(l=><li key={l.id}><a href={l.href} className={`block px-4 py-2.5 rounded-lg text-sm font-medium focus:outline-none focus:ring-2 focus:ring-amber-400 ${currentPage===l.id?'bg-white text-blue-900 font-semibold':'text-blue-100 hover:bg-blue-800'}`} aria-current={currentPage===l.id?'page':undefined}>{l.label}</a></li>)}<li><a href="pay-bill.html" className="block px-4 py-2.5 bg-amber-500 text-white rounded-lg text-sm font-semibold hover:bg-amber-400 mt-2 focus:outline-none focus:ring-2 focus:ring-white">Pay a Bill</a></li></ul></nav>}
        </header>
      );
    }

    function CityFooter() {
      return (
        <footer className="bg-blue-950 text-white" role="contentinfo">
          <div className="max-w-7xl mx-auto px-4 py-10">
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-8">
              <div><a href="index.html" className="inline-flex items-center gap-2 mb-3 rounded focus:outline-none focus:ring-2 focus:ring-amber-400" aria-label="City of Lakewood homepage"><svg width="32" height="32" viewBox="0 0 48 48" fill="none" aria-hidden="true"><circle cx="24" cy="24" r="23" fill="white"/><circle cx="24" cy="24" r="20" fill="#1e3a8a"/><polygon points="24,9 26.9,17.6 36,17.6 28.5,22.8 31.4,31.5 24,26.2 16.6,31.5 19.5,22.8 12,17.6 21.1,17.6" fill="#f59e0b"/></svg><span className="font-bold">City of Lakewood</span></a><address className="not-italic text-blue-300 text-sm">480 S. Allison Pkwy, Lakewood CO 80226<br/><a href="tel:+13039877000" className="text-blue-200 hover:text-white focus:outline-none focus:ring-2 focus:ring-amber-400 rounded">(303) 987-7000</a></address></div>
              <nav aria-label="Footer quick links"><h2 className="text-white text-xs font-bold uppercase tracking-widest mb-3">Quick Links</h2><ul className="space-y-2" role="list">{[{l:'Pay a Bill',h:'pay-bill.html'},{l:'All Services',h:'services.html'},{l:'Apply for a Permit',h:'permits.html'},{l:'Contact Us',h:'contact.html'}].map(i=><li key={i.l}><a href={i.h} className="text-blue-300 hover:text-white text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 rounded">{i.l}</a></li>)}</ul></nav>
              <div><h2 className="text-white text-xs font-bold uppercase tracking-widest mb-3">Office Hours</h2><p className="text-blue-300 text-sm">Monday – Friday: 8:00 AM – 5:00 PM<br/>Closed on Federal Holidays</p></div>
            </div>
            <div className="border-t border-blue-800 mt-8 pt-5 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-blue-400">
              <p>© 2024 City of Lakewood, Colorado. All rights reserved.</p>
              <nav aria-label="Legal links"><ul className="flex gap-4" role="list">{['Privacy Policy','Accessibility','Sitemap'].map(i=><li key={i}><a href="#" className="hover:text-blue-200 focus:outline-none focus:ring-2 focus:ring-amber-400 rounded">{i}</a></li>)}</ul></nav>
            </div>
          </div>
        </footer>
      );
    }

    /* ---- Leader Card ---- */
    function LeaderCard({ name, title, since, initials, color }) {
      return (
        <article className="bg-white rounded-xl border border-gray-200 shadow-sm p-5 flex items-start gap-4">
          <div className={`w-16 h-16 rounded-full ${color} flex items-center justify-center flex-shrink-0`} aria-hidden="true">
            <span className="text-xl font-bold text-white">{initials}</span>
          </div>
          <div className="flex-1 min-w-0">
            <h3 className="text-base font-bold text-gray-900">{name}</h3>
            <p className="text-sm text-blue-700 font-medium mt-0.5">{title}</p>
            <p className="text-xs text-gray-400 mt-1">In office since {since}</p>
          </div>
        </article>
      );
    }

    function AboutPage() {
      const leadership = [
        { name:'Mayor Patricia R. Chen', title:'Mayor, City of Lakewood', since:'2021', initials:'PC', color:'bg-blue-700' },
        { name:'Robert Tanner', title:'City Manager', since:'2018', initials:'RT', color:'bg-blue-600' },
        { name:'Councilmember Diana Flores', title:'Ward 1 — City Council', since:'2022', initials:'DF', color:'bg-purple-600' },
        { name:'Councilmember James A. Morrison', title:'Ward 2 — City Council', since:'2020', initials:'JM', color:'bg-purple-600' },
        { name:'Councilmember Taryn Williams', title:'Ward 3 — City Council', since:'2022', initials:'TW', color:'bg-purple-600' },
        { name:'Councilmember Victor Huang', title:'Ward 4 — City Council', since:'2019', initials:'VH', color:'bg-purple-600' },
        { name:'Councilmember Anita Reyes', title:'Ward 5 — City Council', since:'2021', initials:'AR', color:'bg-purple-600' },
        { name:'Councilmember Gregory Novak', title:'At-Large Council', since:'2023', initials:'GN', color:'bg-teal-600' },
      ];

      const milestones = [
        { year:'1969', event:'City of Lakewood incorporated as a home-rule municipality on July 21 — the first in Jefferson County.', highlight:true },
        { year:'1977', event:'Lakewood Cultural Center opens, cementing the city\'s commitment to arts and community.' },
        { year:'1989', event:'Belmar area designated for redevelopment; city creates its first urban renewal authority.' },
        { year:'1998', event:'City Hall complex at 480 S. Allison Parkway completed, centralizing municipal services.' },
        { year:'2004', event:'W-Line light rail service launches, connecting Lakewood to downtown Denver.' },
        { year:'2011', event:'Lakewood\'s Green Mountain area designated as a regional conservation zone.' },
        { year:'2020', event:'City launches digital services portal, enabling online permits and utility payments.' },
        { year:'2024', event:'Lakewood celebrates 55 years of incorporation with a record $485M city budget.', highlight:true },
      ];

      const annualReports = [
        { year:'2023', label:'FY2023 Annual Report', url:'#', size:'4.2 MB' },
        { year:'2022', label:'FY2022 Annual Report', url:'#', size:'3.8 MB' },
        { year:'2021', label:'FY2021 Annual Report', url:'#', size:'3.5 MB' },
      ];

      return (
        <>
          {/* Hero */}
          <div className="bg-gradient-to-br from-blue-950 to-blue-900 text-white py-14 px-4">
            <div className="max-w-7xl mx-auto">
              <nav aria-label="Breadcrumb navigation" className="mb-5">
                <ol className="flex items-center gap-2 text-sm text-blue-300" role="list">
                  <li><a href="index.html" className="hover:text-white focus:outline-none focus:ring-2 focus:ring-amber-400 rounded">Home</a></li>
                  <li aria-hidden="true" className="text-blue-600">/</li>
                  <li><span aria-current="page" className="text-white font-medium">About Lakewood</span></li>
                </ol>
              </nav>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                <div>
                  <h1 className="text-4xl font-bold mb-4 tracking-tight">About the City of Lakewood</h1>
                  <p className="text-blue-200 text-lg leading-relaxed">
                    Colorado's fifth-largest city, proudly serving over 160,000 residents with responsive, transparent government since 1969.
                  </p>
                </div>
                <ul className="grid grid-cols-2 gap-4" role="list" aria-label="City at a glance statistics">
                  {[{v:'160,000+',l:'Residents'},{v:'1969',l:'Incorporated'},{v:'42 sq mi',l:'Area'},{v:'55+',l:'Years of Service'}].map(s=>(
                    <li key={s.l} className="bg-blue-800 bg-opacity-50 rounded-xl p-4 text-center">
                      <span className="block text-3xl font-bold text-amber-400">{s.v}</span>
                      <span className="text-blue-200 text-sm">{s.l}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          </div>

          <main id="main-content" tabIndex={-1} className="focus:outline-none">
            {/* Mission */}
            <section aria-labelledby="mission-heading" className="bg-white py-14 px-4 border-b border-gray-100">
              <div className="max-w-4xl mx-auto text-center">
                <h2 id="mission-heading" className="text-2xl font-bold text-gray-900 mb-4">Our Mission</h2>
                <blockquote className="text-xl text-gray-700 leading-relaxed italic border-l-4 border-blue-600 pl-6 text-left max-w-3xl mx-auto">
                  "To deliver excellent municipal services, foster an inclusive and thriving community, and preserve Lakewood's quality of life through transparent, accountable, and innovative city government."
                </blockquote>
                <p className="mt-6 text-gray-500 text-sm max-w-2xl mx-auto">
                  The City of Lakewood operates as a home-rule municipality under the Council-Manager form of government. The City Council sets policy; the City Manager leads day-to-day operations across all departments.
                </p>
              </div>
            </section>

            {/* City History */}
            <section aria-labelledby="history-heading" className="py-14 px-4 bg-gray-50">
              <div className="max-w-5xl mx-auto">
                <h2 id="history-heading" className="text-2xl font-bold text-gray-900 mb-3">City History</h2>
                <p className="text-gray-600 mb-8 max-w-3xl">From a small residential community on Denver's western border, Lakewood has grown into Colorado's fifth-largest city — a vibrant, diverse community known for its balance of urban amenities and natural beauty.</p>

                <ol className="relative border-l-2 border-blue-200 ml-4 space-y-6" aria-label="City historical timeline" role="list">
                  {milestones.map(m => (
                    <li key={m.year} className={`ml-8 relative ${m.highlight ? '' : ''}`}>
                      <div className={`absolute -left-[2.6rem] w-6 h-6 rounded-full flex items-center justify-center ${m.highlight ? 'bg-blue-700' : 'bg-blue-300'}`} aria-hidden="true">
                        <div className="w-2 h-2 rounded-full bg-white"/>
                      </div>
                      <div className={`p-4 rounded-lg ${m.highlight ? 'bg-blue-50 border border-blue-200' : 'bg-white border border-gray-200'}`}>
                        <time className={`text-xs font-bold uppercase tracking-widest ${m.highlight ? 'text-blue-700' : 'text-gray-400'}`} dateTime={m.year}>{m.year}</time>
                        <p className={`text-sm mt-1 ${m.highlight ? 'text-gray-900 font-medium' : 'text-gray-700'}`}>{m.event}</p>
                      </div>
                    </li>
                  ))}
                </ol>
              </div>
            </section>

            {/* Leadership */}
            <section aria-labelledby="leadership-heading" className="py-14 px-4 bg-white">
              <div className="max-w-7xl mx-auto">
                <div className="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-8">
                  <div>
                    <h2 id="leadership-heading" className="text-2xl font-bold text-gray-900">Mayor &amp; City Council</h2>
                    <p className="text-gray-500 text-sm mt-1">Current elected leadership for the City of Lakewood, Colorado</p>
                  </div>
                  <a href="contact.html" className="text-blue-600 text-sm font-medium hover:underline focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded whitespace-nowrap">
                    Contact Your Representative →
                  </a>
                </div>
                <ul className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" role="list">
                  {leadership.map(leader => (
                    <li key={leader.name}>
                      <LeaderCard {...leader}/>
                    </li>
                  ))}
                </ul>
              </div>
            </section>

            {/* Department heads */}
            <section aria-labelledby="dept-heads-heading" className="py-14 px-4 bg-gray-50">
              <div className="max-w-7xl mx-auto">
                <h2 id="dept-heads-heading" className="text-2xl font-bold text-gray-900 mb-8">City Department Directors</h2>
                <ul className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" role="list">
                  {[
                    {dept:'City Manager\'s Office',name:'Robert Tanner',role:'City Manager'},
                    {dept:'Finance & Budget',name:'Michelle Park',role:'Finance Director'},
                    {dept:'Public Works',name:'David Okonkwo',role:'Public Works Director'},
                    {dept:'Community Development',name:'Sandra Rivera',role:'Planning & Development Director'},
                    {dept:'Parks & Recreation',name:'Tom Whitfield',role:'Parks Director'},
                    {dept:'Police Department',name:'Chief Andrea Marsh',role:'Chief of Police'},
                    {dept:'Fire Department',name:'Chief Luis Vargas',role:'Fire Chief'},
                    {dept:'Human Resources',name:'Keiko Tanaka',role:'HR Director'},
                    {dept:'Information Technology',name:'Marcus Bell',role:'CIO / IT Director'},
                  ].map(d=>(
                    <li key={d.dept}>
                      <article className="bg-white rounded-lg border border-gray-200 p-4 hover:shadow-sm transition-shadow">
                        <h3 className="text-xs font-semibold text-blue-700 uppercase tracking-widest mb-1">{d.dept}</h3>
                        <p className="text-sm font-bold text-gray-900">{d.name}</p>
                        <p className="text-xs text-gray-500 mt-0.5">{d.role}</p>
                      </article>
                    </li>
                  ))}
                </ul>
              </div>
            </section>

            {/* Annual Reports */}
            <section aria-labelledby="reports-heading" className="py-14 px-4 bg-white">
              <div className="max-w-4xl mx-auto">
                <h2 id="reports-heading" className="text-2xl font-bold text-gray-900 mb-2">Annual Reports &amp; Budget Documents</h2>
                <p className="text-gray-600 text-sm mb-8">In the interest of transparency, the City of Lakewood publishes comprehensive annual reports and budget documents for public access.</p>

                <ul className="space-y-3 mb-8" role="list">
                  {annualReports.map(r=>(
                    <li key={r.year}>
                      <a
                        href={r.url}
                        className="flex items-center justify-between p-4 bg-gray-50 border border-gray-200 rounded-xl hover:border-blue-400 hover:shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 group"
                        aria-label={`Download ${r.label} — PDF, ${r.size}`}
                      >
                        <div className="flex items-center gap-4">
                          <div className="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center flex-shrink-0" aria-hidden="true">
                            <svg className="w-6 h-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5} aria-hidden="true">
                              <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                            </svg>
                          </div>
                          <div>
                            <p className="text-sm font-semibold text-gray-900 group-hover:text-blue-700">{r.label}</p>
                            <p className="text-xs text-gray-400 mt-0.5">PDF · {r.size}</p>
                          </div>
                        </div>
                        <div className="flex items-center gap-2 text-blue-600">
                          <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
                          </svg>
                          <span className="text-sm font-medium hidden sm:inline">Download</span>
                        </div>
                      </a>
                    </li>
                  ))}
                </ul>

                <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 flex flex-col sm:flex-row items-start sm:items-center gap-4">
                  <div>
                    <h3 className="text-base font-bold text-gray-900">City Budget Documents</h3>
                    <p className="text-sm text-gray-600 mt-1">Access the current adopted budget, capital improvement plan, and budget amendments.</p>
                  </div>
                  <a href="#" className="flex-shrink-0 bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-semibold hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" aria-label="View City of Lakewood budget documents">
                    View Budget →
                  </a>
                </div>
              </div>
            </section>
          </main>
        </>
      );
    }

    function App() {
      return (
        <div className="min-h-screen flex flex-col">
          <CityHeader currentPage="about"/>
          <AboutPage/>
          <CityFooter/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
