                                        <div className="hidden md:block absolute top-12 left-[60%] w-[80%] h-[2px] border-t-2 border-dashed border-dark-700"></div>
                                    )}
                                    <div className="relative mx-auto w-24 h-24 rounded-2xl bg-dark-800 border border-dark-700 shadow-xl flex items-center justify-center mb-6">
                                        <span className="absolute -top-3 -right-3 w-8 h-8 rounded-full bg-primary-600 flex items-center justify-center text-sm font-bold shadow-lg shadow-primary-500/50">
                                            {step.num}
                                        </span>
                                        <div className={`p-3 rounded-xl ${step.color}`}>
                                            <Icon name={step.icon} size={32} />
                                        </div>
                                    </div>
                                    <h3 className="text-xl font-heading font-bold mb-3">{step.title}</h3>
                                    <p className="text-gray-400 leading-relaxed text-sm lg:text-base">{step.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };
