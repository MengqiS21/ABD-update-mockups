<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse | Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #f5f5f5;
            margin: 0;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        h1,
        h2,
        h3,
        h4,
        .font-display {
            font-family: 'Outfit', 'Inter', sans-serif;
        }

        .env-pb {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Toggle Switch Styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #6366f1;
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: #6366f1;
        }

        .toggle-checkbox {
            right: 0;
            z-index: 1;
            border-color: #404040;
            transition: all 0.3s;
        }

        .toggle-label {
            width: 44px;
            height: 24px;
            background-color: #262626;
            border-radius: 9999px;
            transition: all 0.3s;
        }
    </style>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { indigo: { 500: '#6366f1', 600: '#4f46e5' } } } }
        }
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel" src="shared.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function Toggle({ label, sublabel, defaultChecked }) {
            const [checked, setChecked] = useState(defaultChecked);
            return (
                <label className="flex items-center justify-between cursor-pointer py-3 group">
                    <div className="flex flex-col pr-4">
                        <span className="font-semibold text-[15px] group-hover:text-indigo-300 transition-colors">{label}</span>
                        {sublabel && <span className="text-sm text-neutral-500">{sublabel}</span>}
                    </div>
                    <div className="relative inline-block w-11 mr-2 align-middle select-none transition duration-200 ease-in shrink-0">
                        <input type="checkbox" name="toggle" id="toggle" className={`toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-500/50 ${checked ? 'right-0 border-indigo-500 translate-x-full' : 'left-0 border-neutral-600 border-[3px]'}`} onChange={(e) => setChecked(e.target.checked)} checked={checked} aria-label={label} />
                        <div className={`toggle-label block overflow-hidden h-6 rounded-full cursor-pointer ${checked ? 'bg-indigo-500' : 'bg-neutral-800'}`}></div>
                    </div>
                </label>
            );
        }

        function Section({ title, children }) {
            return (
                <section className="mb-10">
                    <h2 className="text-xl font-extrabold mb-4 pb-2 border-b border-neutral-800/60 text-white font-display">{title}</h2>
                    <div className="space-y-1">
                        {children}
                    </div>
                </section>
            );
        }

        function InputField({ label, type = "text", defaultValue, helpText }) {
            return (
                <div className="mb-4">
                    <label className="block text-sm font-bold text-neutral-300 mb-2">{label}</label>
                    <input
                        type={type}
                        defaultValue={defaultValue}
                        className="w-full bg-neutral-900 border border-neutral-700 text-white rounded-xl py-2.5 px-4 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
                    />
                    {helpText && <p className="text-xs text-neutral-500 mt-1.5">{helpText}</p>}
                </div>
            );
        }

        function SettingsContent() {
            return (
                <div className="flex justify-center w-full min-h-full">
                    <div className="w-full max-w-2xl lg:max-w-3xl border-x-0 sm:border-x sm:border-neutral-800/60 md:px-8 py-6 pb-24 shrink-0 bg-[#0a0a0a]">

                        <header className="px-4 sm:px-0 mb-8 sticky top-0 sm:static bg-[#0a0a0a]/90 backdrop-blur-xl z-10 py-3 sm:py-0 border-b sm:border-0 border-neutral-800/60">
                            <h1 className="font-extrabold text-3xl font-display text-white tracking-tight">Settings</h1>
                            <p className="text-neutral-500 mt-1 hidden sm:block font-medium">Manage your account preferences, privacy, and display options.</p>
                        </header>

                        <div className="px-4 sm:px-0">
                            <Section title="Account">
                                <div className="bg-neutral-900/50 p-5 rounded-2xl border border-neutral-800/60 mb-6">
                                    <InputField label="Username" defaultValue="alexrivers" helpText="Changing your username will update your profile URL. Must be unique." />
                                    <InputField label="Email Address" type="email" defaultValue="alex@pulse.mockup.cx" />
                                    <div className="flex justify-end mt-4">
                                        <button className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-6 rounded-full text-sm transition-colors shadow-lg active:scale-95">Save Changes</button>
                                    </div>
                                </div>

                                <h3 className="font-bold mb-3 text-white">Security</h3>
                                <div className="bg-neutral-900/50 p-5 rounded-2xl border border-neutral-800/60">
                                    <button className="w-full text-left py-3 font-semibold text-[15px] hover:text-indigo-400 transition-colors flex justify-between items-center group">
                                        Change Password
                                        <window.Icons.Search className="w-4 h-4 opacity-0 group-hover:opacity-100" />
                                    </button>
                                    <hr className="border-neutral-800 my-1" />
                                    <button className="w-full text-left py-3 font-semibold text-[15px] hover:text-indigo-400 transition-colors flex justify-between items-center">
                                        Two-Factor Authentication
                                        <span className="bg-neutral-800 text-neutral-300 text-xs px-2 py-1 rounded-md">Off</span>
                                    </button>
                                </div>
                            </Section>

                            <Section title="Privacy & Interactions">
                                <div className="space-y-2">
                                    <Toggle
                                        label="Protect your posts"
                                        sublabel="When selected, only current followers and people you approve in the future will be able to see your posts."
                                        defaultChecked={false}
                                    />
                                    <Toggle
                                        label="Allow direct messages"
                                        sublabel="Let anyone on Pulse send you a direct message."
                                        defaultChecked={true}
                                    />
                                    <Toggle
                                        label="Show online status"
                                        sublabel="Allow other users connected to you to see when you are active."
                                        defaultChecked={true}
                                    />
                                </div>
                            </Section>

                            <Section title="Notifications">
                                <h3 className="font-bold text-sm text-neutral-400 uppercase tracking-widest mb-2 mt-4">Push Notifications</h3>
                                <div className="space-y-1 mb-6">
                                    <Toggle label="Likes & Comments" defaultChecked={true} />
                                    <Toggle label="New Followers" defaultChecked={true} />
                                    <Toggle label="Direct Messages" defaultChecked={true} />
                                    <Toggle label="Pulse Recommendations" defaultChecked={false} />
                                </div>

                                <h3 className="font-bold text-sm text-neutral-400 uppercase tracking-widest mb-2">Email Notifications</h3>
                                <div className="space-y-1">
                                    <Toggle label="Weekly Digest" defaultChecked={true} />
                                    <Toggle label="Security Alerts" defaultChecked={true} />
                                </div>
                            </Section>

                            <Section title="Appearance">
                                <p className="text-sm text-neutral-500 mb-4">Pulse is currently locked to Dark Mode for the sleekest experience.</p>
                                <div className="bg-neutral-800 p-5 rounded-2xl border border-neutral-700/60 opacity-80 cursor-not-allowed">
                                    <Toggle label="Dark Mode" sublabel="Automatically syncs with your system settings" defaultChecked={true} />
                                </div>
                            </Section>

                            <Section title="Danger Zone">
                                <div className="bg-red-950/20 border border-red-900/50 p-5 rounded-2xl space-y-4">
                                    <div>
                                        <h3 className="font-bold text-red-500 mb-1 text-[15px]">Deactivate Account</h3>
                                        <p className="text-xs text-neutral-500 mb-3">Temporarily disable your profile and silence notifications.</p>
                                        <button className="bg-transparent border border-red-500 text-red-500 hover:bg-red-500 hover:text-white font-bold py-2 px-6 rounded-full text-sm transition-colors active:scale-95">Deactivate</button>
                                    </div>
                                    <hr className="border-red-900/30" />
                                    <div>
                                        <h3 className="font-bold text-red-500 mb-1 text-[15px]">Delete Account</h3>
                                        <p className="text-xs text-neutral-500 mb-3">Permanently remove your account and all associated data.</p>
                                        <button className="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-full text-sm transition-colors shadow-lg active:scale-95">Delete Account</button>
                                    </div>
                                </div>
                            </Section>
                        </div>

                    </div>
                </div>
            );
        }

        function App() {
            const [ready, setReady] = useState(false);
            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.SocialLayout && window.Icons) {
                        setReady(true);
                        clearInterval(interval);
                    }
                }, 50);
                return () => clearInterval(interval);
            }, []);

            if (!ready) return <div className="h-screen w-full flex bg-[#0a0a0a]"></div>;

            const SocialLayout = window.SocialLayout;
            return (
                <SocialLayout activePage="Settings">
                    <SettingsContent />
                </SocialLayout>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
