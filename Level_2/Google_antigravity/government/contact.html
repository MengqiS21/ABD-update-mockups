<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | City of Lakewood — Official Government Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdfa', 100: '#ccfbf1', 300: '#5eead4', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a',
                        },
                        navy: { 800: '#1e3a8a', 900: '#1e3a5f', }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'], }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Merriweather', serif;
        }

        *:focus-visible {
            outline: 3px solid #fde047;
            outline-offset: 2px;
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #000;
            color: white;
            padding: 8px;
            z-index: 100;
            transition: top 0.2s;
        }

        .skip-link:focus {
            top: 0;
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 antialiased flex flex-col min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AlertBanner = () => {
            const [visible, setVisible] = useState(true);
            if (!visible) return null;
            return (
                <div role="alert" className="bg-red-700 text-white px-4 py-3 sm:px-6 lg:px-8 flex items-start sm:items-center justify-between shadow-md">
                    <div className="flex items-center space-x-3 max-w-7xl mx-auto w-full">
                        <i data-lucide="alert-triangle" className="w-6 h-6 flex-shrink-0" aria-hidden="true"></i>
                        <span className="font-medium text-sm sm:text-base">
                            <span className="font-bold">Emergency Alert:</span> Road Closure: Main St between 3rd and 5th Ave until Nov 30
                        </span>
                    </div>
                    <button onClick={() => setVisible(false)} aria-label="Dismiss alert" className="text-white hover:text-red-200 focus:outline-none focus:ring-2 focus:ring-white rounded p-1 ml-4 transition-colors">
                        <i data-lucide="x" className="w-6 h-6" aria-hidden="true"></i>
                    </button>
                </div>
            );
        };

        const Header = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            return (
                <header className="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm relative">
                    <a href="#main-content" className="skip-link sr-only focus:not-sr-only p-4 bg-navy-900 text-white font-bold absolute top-0 left-0 z-50 rounded-br">Skip to main content</a>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-20 items-center">
                            <div className="flex items-center space-x-3">
                                <i data-lucide="landmark" className="w-8 h-8 text-navy-800" aria-hidden="true"></i>
                                <a href="index.html" className="text-2xl font-bold text-navy-900 tracking-tight focus:outline-none focus:ring-2 focus:ring-navy-800 rounded px-1 font-serif">
                                    City of Lakewood
                                </a>
                            </div>
                            <nav aria-label="Main Navigation" className="hidden md:flex space-x-8">
                                <a href="index.html" className="text-gray-600 hover:text-navy-800 hover:border-brand-300 font-medium py-2 px-1 border-b-2 border-transparent transition-colors focus:outline-none rounded">Home</a>
                                <a href="services.html" className="text-gray-600 hover:text-navy-800 hover:border-brand-300 font-medium py-2 px-1 border-b-2 border-transparent transition-colors focus:outline-none rounded">Services</a>
                                <a href="about.html" className="text-gray-600 hover:text-navy-800 hover:border-brand-300 font-medium py-2 px-1 border-b-2 border-transparent transition-colors focus:outline-none rounded">About</a>
                                <a href="contact.html" className="text-navy-800 font-semibold border-b-2 border-brand-500 py-2 px-1 focus:outline-none rounded transition-colors" aria-current="page">Contact</a>
                            </nav>
                            <div className="md:hidden">
                                <button aria-expanded={isMenuOpen} aria-label="Toggle navigation menu" onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-gray-600 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-navy-800 rounded p-2">
                                    <i data-lucide={isMenuOpen ? "x" : "menu"} className="w-6 h-6" aria-hidden="true"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    {isMenuOpen && (
                        <nav aria-label="Mobile Navigation" className="md:hidden bg-white border-t border-gray-100 flex flex-col space-y-1 p-4 shadow-inner">
                            <a href="index.html" className="text-gray-600 hover:text-navy-800 hover:bg-gray-50 py-3 px-4 rounded-md">Home</a>
                            <a href="services.html" className="text-gray-600 hover:text-navy-800 hover:bg-gray-50 py-3 px-4 rounded-md">Services</a>
                            <a href="about.html" className="text-gray-600 hover:text-navy-800 hover:bg-gray-50 py-3 px-4 rounded-md">About</a>
                            <a href="contact.html" className="text-navy-800 font-semibold py-3 px-4 bg-brand-50 rounded-md" aria-current="page">Contact</a>
                        </nav>
                    )}
                </header>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-navy-900 text-slate-300 pt-16 pb-8 mt-auto border-t-[6px] border-brand-500">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
                            <div>
                                <div className="flex items-center space-x-2 mb-6 text-white bg-navy-800 inline-block p-2 rounded">
                                    <i data-lucide="landmark" className="w-6 h-6 inline mr-2" aria-hidden="true"></i>
                                    <span className="text-lg font-bold font-serif">City of Lakewood</span>
                                </div>
                                <p className="text-sm text-slate-400 mb-6 leading-relaxed">
                                    Dedicated to serving our 160,000 residents with transparency, efficiency, and community spirit.
                                </p>
                            </div>
                            <div>
                                <h2 className="text-white text-sm font-bold uppercase tracking-wider mb-6 bg-navy-800 inline-block px-2 py-1 rounded">Departments</h2>
                                <ul className="space-y-3">
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Mayor's Office</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Public Works</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Parks & Recreation</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Police Department</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Fire Department</a></li>
                                </ul>
                            </div>
                            <div>
                                <h2 className="text-white text-sm font-bold uppercase tracking-wider mb-6 bg-navy-800 inline-block px-2 py-1 rounded">Quick Links</h2>
                                <ul className="space-y-3">
                                    <li><a href="services.html" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">All Services</a></li>
                                    <li><a href="service-permits.html" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Apply for Permits</a></li>
                                    <li><a href="service-bill.html" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Pay a Bill</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Employment</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">City Council Meetings</a></li>
                                </ul>
                            </div>
                            <div>
                                <h2 className="text-white text-sm font-bold uppercase tracking-wider mb-6 bg-navy-800 inline-block px-2 py-1 rounded">Contact Us</h2>
                                <address className="not-italic text-sm space-y-4 text-slate-400">
                                    <p className="flex items-start">
                                        <i data-lucide="map-pin" className="w-5 h-5 mr-3 flex-shrink-0 text-slate-500" aria-hidden="true"></i>
                                        <span>123 City Hall Plaza<br />Lakewood, ST 12345</span>
                                    </p>
                                    <p className="flex items-center">
                                        <i data-lucide="phone" className="w-5 h-5 mr-3 flex-shrink-0 text-slate-500" aria-hidden="true"></i>
                                        <span>(555) 123-4567</span>
                                    </p>
                                    <p className="flex items-center">
                                        <i data-lucide="mail" className="w-5 h-5 mr-3 flex-shrink-0 text-slate-500" aria-hidden="true"></i>
                                        <a href="mailto:info@lakewood.gov" className="text-white font-bold focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors border-b border-brand-500">info@lakewood.gov</a>
                                    </p>
                                </address>
                            </div>
                        </div>
                        <div className="border-t border-navy-800 pt-8 flex flex-col md:flex-row justify-between items-center text-xs">
                            <p>&copy; {new Date().getFullYear()} City of Lakewood. All rights reserved.</p>
                            <div className="flex space-x-6 mt-4 md:mt-0">
                                <a href="#" className="hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Privacy Policy</a>
                                <a href="#" className="hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Accessibility</a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };

        const PageHeader = () => (
            <div className="bg-navy-800 py-12 border-t border-navy-900">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <nav aria-label="Breadcrumb" className="mb-4">
                        <ol className="flex items-center space-x-2 text-sm text-brand-100">
                            <li><a href="index.html" className="hover:text-white focus:outline-none focus:underline rounded flex items-center"><i data-lucide="home" className="w-4 h-4 mr-1" aria-hidden="true"></i>Home</a></li>
                            <li><i data-lucide="chevron-right" className="w-4 h-4" aria-hidden="true"></i></li>
                            <li aria-current="page" className="text-white font-medium">Contact</li>
                        </ol>
                    </nav>
                    <h1 className="text-4xl font-extrabold text-white font-serif mb-2">Contact Us</h1>
                    <p className="text-lg text-navy-100 max-w-2xl">Get in touch with city departments, submit an inquiry, or locate municipal offices.</p>
                </div>
            </div>
        );

        const ContactForm = () => {
            const [status, setStatus] = useState('idle');
            const successRef = useRef(null);

            const [formData, setFormData] = useState({ name: '', email: '', department: '', message: '' });
            const [errors, setErrors] = useState({});

            useEffect(() => {
                if (status === 'success' && successRef.current) {
                    successRef.current.focus();
                }
            }, [status]);

            const validate = () => {
                const newErrors = {};
                if (!formData.name.trim()) newErrors.name = "Name is required.";
                if (!formData.email.trim() || !/^\S+@\S+\.\S+$/.test(formData.email)) newErrors.email = "Valid email is required.";
                if (!formData.department) newErrors.department = "Please select a department.";
                if (!formData.message.trim() || formData.message.length < 10) newErrors.message = "Message must be at least 10 characters.";
                return newErrors;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const validationErrors = validate();
                if (Object.keys(validationErrors).length > 0) {
                    setErrors(validationErrors);
                    document.getElementById('contact-error-summary').innerText = "Message failed to send. Please fix the highlighted errors.";
                    return;
                }

                setErrors({});
                document.getElementById('contact-error-summary').innerText = "";
                setStatus('submitting');

                setTimeout(() => {
                    setStatus('success');
                }, 1000);
            };

            if (status === 'success') {
                return (
                    <div className="bg-green-50 border border-green-200 rounded-xl p-8 text-center h-full flex flex-col justify-center" role="region" aria-live="polite">
                        <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="check" className="w-8 h-8" aria-hidden="true"></i>
                        </div>
                        <h2 className="text-2xl font-bold text-gray-900 mb-2 font-serif" tabIndex="-1" ref={successRef}>Message Sent Successfully</h2>
                        <p className="text-gray-600 mb-8 max-w-sm mx-auto">Thank you for reaching out to the City of Lakewood. the appropriate department will respond to your inquiry within 48 hours.</p>
                        <button onClick={() => { setStatus('idle'); setFormData({ name: '', email: '', department: '', message: '' }); }} className="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-6 py-2 rounded-md font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm mx-auto">
                            Send Another Message
                        </button>
                    </div>
                );
            }

            return (
                <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden h-full">
                    <div className="bg-gray-50 px-6 py-4 border-b border-gray-200">
                        <h2 className="text-xl font-bold text-navy-900 font-serif" id="contact-form-heading">Send an Inquiry</h2>
                        <p className="text-sm text-gray-500 mt-1">Use this form for general questions. For emergencies, always dial 911.</p>
                    </div>
                    <form className="p-6 md:p-8 space-y-6" onSubmit={handleSubmit} aria-labelledby="contact-form-heading" noValidate>
                        <div id="contact-error-summary" className="sr-only" aria-live="assertive"></div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label htmlFor="contactName" className="block text-sm font-semibold text-gray-900 mb-1">Full Name <span className="text-red-500" aria-hidden="true">*</span></label>
                                <input
                                    type="text"
                                    id="contactName"
                                    name="contactName"
                                    value={formData.name}
                                    onChange={(e) => { setFormData({ ...formData, name: e.target.value }); if (errors.name) setErrors({ ...errors, name: null }); }}
                                    aria-required="true"
                                    aria-invalid={errors.name ? "true" : "false"}
                                    aria-describedby={errors.name ? "c-name-error" : undefined}
                                    className={`block w-full rounded-md py-2 px-3 text-gray-900 shadow-sm ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm sm:leading-6 ${errors.name ? 'ring-red-300 focus:ring-red-500 bg-red-50' : 'ring-gray-300 focus:ring-brand-500'}`}
                                />
                                {errors.name && <p className="mt-2 text-sm text-red-600 flex items-center" id="c-name-error"><i data-lucide="alert-circle" className="w-4 h-4 mr-1" aria-hidden="true"></i>{errors.name}</p>}
                            </div>

                            <div>
                                <label htmlFor="contactEmail" className="block text-sm font-semibold text-gray-900 mb-1">Email Address <span className="text-red-500" aria-hidden="true">*</span></label>
                                <input
                                    type="email"
                                    id="contactEmail"
                                    name="contactEmail"
                                    value={formData.email}
                                    onChange={(e) => { setFormData({ ...formData, email: e.target.value }); if (errors.email) setErrors({ ...errors, email: null }); }}
                                    aria-required="true"
                                    aria-invalid={errors.email ? "true" : "false"}
                                    aria-describedby={errors.email ? "c-email-error" : undefined}
                                    className={`block w-full rounded-md py-2 px-3 text-gray-900 shadow-sm ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm sm:leading-6 ${errors.email ? 'ring-red-300 focus:ring-red-500 bg-red-50' : 'ring-gray-300 focus:ring-brand-500'}`}
                                />
                                {errors.email && <p className="mt-2 text-sm text-red-600 flex items-center" id="c-email-error"><i data-lucide="alert-circle" className="w-4 h-4 mr-1" aria-hidden="true"></i>{errors.email}</p>}
                            </div>
                        </div>

                        <div>
                            <label htmlFor="contactDept" className="block text-sm font-semibold text-gray-900 mb-1">Department to Contact <span className="text-red-500" aria-hidden="true">*</span></label>
                            <select
                                id="contactDept"
                                name="contactDept"
                                value={formData.department}
                                onChange={(e) => { setFormData({ ...formData, department: e.target.value }); if (errors.department) setErrors({ ...errors, department: null }); }}
                                aria-required="true"
                                aria-invalid={errors.department ? "true" : "false"}
                                aria-describedby={errors.department ? "c-dept-error" : undefined}
                                className={`block w-full rounded-md py-2 px-3 text-gray-900 shadow-sm ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm sm:leading-6 bg-white ${errors.department ? 'ring-red-300 focus:ring-red-500 bg-red-50' : 'ring-gray-300 focus:ring-brand-500'}`}
                            >
                                <option value="">Select a department...</option>
                                <option value="general">City Hall (General Inquiry)</option>
                                <option value="public-works">Public Works & Roads</option>
                                <option value="parks">Parks & Recreation</option>
                                <option value="police">Police Department (Non-Emergency)</option>
                                <option value="building">Building Permits & Inspections</option>
                            </select>
                            {errors.department && <p className="mt-2 text-sm text-red-600 flex items-center" id="c-dept-error"><i data-lucide="alert-circle" className="w-4 h-4 mr-1" aria-hidden="true"></i>{errors.department}</p>}
                        </div>

                        <div>
                            <label htmlFor="contactMessage" className="block text-sm font-semibold text-gray-900 mb-1">Message <span className="text-red-500" aria-hidden="true">*</span></label>
                            <textarea
                                id="contactMessage"
                                name="contactMessage"
                                rows="5"
                                value={formData.message}
                                onChange={(e) => { setFormData({ ...formData, message: e.target.value }); if (errors.message) setErrors({ ...errors, message: null }); }}
                                aria-required="true"
                                aria-invalid={errors.message ? "true" : "false"}
                                aria-describedby={errors.message ? "c-msg-error" : undefined}
                                className={`block w-full rounded-md py-2 px-3 text-gray-900 shadow-sm ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm sm:leading-6 ${errors.message ? 'ring-red-300 focus:ring-red-500 bg-red-50' : 'ring-gray-300 focus:ring-brand-500'}`}
                            ></textarea>
                            {errors.message && <p className="mt-2 text-sm text-red-600 flex items-center" id="c-msg-error"><i data-lucide="alert-circle" className="w-4 h-4 mr-1" aria-hidden="true"></i>{errors.message}</p>}
                        </div>

                        <div className="pt-2">
                            <button
                                type="submit"
                                disabled={status === 'submitting'}
                                aria-label="Send Message"
                                className="bg-brand-600 hover:bg-brand-700 disabled:opacity-70 disabled:cursor-not-allowed text-white px-8 py-3 rounded-md font-bold transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 shadow-md flex items-center justify-center w-full sm:w-auto"
                            >
                                {status === 'submitting' ? (
                                    <><i data-lucide="loader-2" className="w-5 h-5 mr-2 animate-spin" aria-hidden="true"></i> Sending...</>
                                ) : (
                                    <><i data-lucide="send" className="w-5 h-5 mr-2" aria-hidden="true"></i> Send Message</>
                                )}
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        const Directory = () => {
            const depts = [
                { name: 'City Hall (Main)', phone: '(555) 123-4567', hours: 'Mon-Fri, 8AM - 5PM', email: 'info@lakewood.gov', icon: 'landmark' },
                { name: 'Building & Permits', phone: '(555) 123-4568', hours: 'Mon-Fri, 8AM - 4PM', email: 'permits@lakewood.gov', icon: 'file-signature' },
                { name: 'Utility Billing', phone: '(555) 123-4569', hours: 'Mon-Fri, 8AM - 5PM', email: 'billing@lakewood.gov', icon: 'droplets' },
                { name: 'Public Works', phone: '(555) 123-4570', hours: 'Mon-Fri, 7AM - 3:30PM', email: 'pw@lakewood.gov', icon: 'cone' },
                { name: 'Parks & Recreation', phone: '(555) 123-4571', hours: 'Mon-Fri, 8AM - 5PM', email: 'parks@lakewood.gov', icon: 'tree-pine' },
                { name: 'Police Department', phone: '(555) 123-4500', hours: '24/7 (Non-Emergency)', email: 'police@lakewood.gov', icon: 'shield-half' },
            ];

            return (
                <section className="bg-white border text-left border-gray-200 rounded-xl overflow-hidden shadow-sm h-full" aria-labelledby="directory-heading">
                    <div className="bg-gray-50 px-6 py-4 border-b border-gray-200">
                        <h2 className="text-xl font-bold text-navy-900 font-serif" id="directory-heading">Department Directory</h2>
                    </div>
                    <ul className="divide-y divide-gray-100">
                        {depts.map((dept, idx) => (
                            <li key={idx} className="p-4 sm:p-6 hover:bg-gray-50 flex items-start transition-colors">
                                <div className="bg-brand-50 p-3 rounded-lg mr-4 text-brand-600 border border-brand-100 flex-shrink-0" aria-hidden="true">
                                    <i data-lucide={dept.icon} className="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h3 className="text-lg font-bold text-gray-900 mb-1">{dept.name}</h3>
                                    <p className="text-sm text-gray-600 flex items-center mb-1"><i data-lucide="phone" className="w-4 h-4 mr-2" aria-hidden="true"></i> {dept.phone}</p>
                                    <p className="text-sm text-gray-600 flex items-center mb-1"><i data-lucide="clock" className="w-4 h-4 mr-2" aria-hidden="true"></i> {dept.hours}</p>
                                    <p className="text-sm text-gray-600 flex items-center"><i data-lucide="mail" className="w-4 h-4 mr-2" aria-hidden="true"></i> <a href={`mailto:${dept.email}`} className="text-brand-600 hover:underline">{dept.email}</a></p>
                                </div>
                            </li>
                        ))}
                    </ul>
                </section>
            );
        };

        const MainContent = () => {
            return (
                <main id="main-content" className="flex-grow focus:outline-none bg-gray-50 pb-20" tabIndex="-1">
                    <PageHeader />

                                    <iframe
                                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d10292.052865922373!2d-105.0815554!3d39.7118182!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x876b86e0c704f5e7%3A0xe7a50787a916a048!2sLakewood%2C%20CO!5e0!3m2!1sen!2sus!4v1715610212345!5m2!1sen!2sus"

            return (
