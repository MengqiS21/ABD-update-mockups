<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse - Settings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <a class="brand" href="index.html">
                <div class="brand-mark">P</div>
                <div>
                    <strong>Pulse</strong>
                    <span>Social mockup</span>
                </div>
            </a>
            <nav class="nav">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="explore.html">Explore</a>
                <a class="nav-link" href="notifications.html">Notifications</a>
                <a class="nav-link" href="messages.html">Messages</a>
                <a class="nav-link" href="profile.html">Profile</a>
                <a class="nav-link active" href="settings.html">Settings</a>
            </nav>
        </aside>

        <main class="page">
            <section class="hero compact">
                <div>
                    <p class="eyebrow">Preferences</p>
                    <h1>Settings</h1>
                    <p class="hero-copy">下面的表单都是纯 HTML，直接打开即可看到完整布局。</p>
                </div>
            </section>

            <section class="panel form-panel">
                <h2>Account</h2>
                <label>
                    Display name
                    <input type="text" value="Alex Morgan">
                </label>
                <label>
                    Username
                    <input type="text" value="@alexm">
                </label>
                <label>
                    Bio
                    <textarea rows="4">Product designer and frontend builder.</textarea>
                </label>
            </section>

            <section class="panel form-panel">
                <h2>Preferences</h2>
                <label class="toggle-row"><span>Email notifications</span><input type="checkbox" checked></label>
                <label class="toggle-row"><span>Push notifications</span><input type="checkbox" checked></label>
                <label class="toggle-row"><span>Private account</span><input type="checkbox"></label>
                <button class="button" type="button">Save changes</button>
            </section>
        </main>
    </div>
</body>
</html>
