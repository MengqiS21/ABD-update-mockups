<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - City of Lakewood</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700;900&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./shared/theme.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>

<body class="bg-gov-neutral-50 text-gov-neutral-900 flex flex-col min-h-screen">
    <div id="root" class="flex flex-col flex-1"></div>

    <script type="text/babel" src="./shared/components.jsx"></script>

    <script type="text/babel">
        const checkShared = setInterval(() => {
            if (window.SharedComponents) {
                clearInterval(checkShared);
                renderApp();
            }
        }, 50);

        function App() {
            const { Header, Footer, Icons } = window.SharedComponents;
            const { PhoneIcon, BuildingIcon } = Icons;

            return (
                <div className="flex flex-col min-h-screen">
                    <Header currentPath="contact.html" />

                    {/* Simple Banner */}
                    <div className="bg-gov-blue-900 py-12">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h1 className="text-4xl font-serif font-bold text-white mb-2">Contact Us</h1>
                            <p className="text-gov-blue-200 text-lg">We are here to help. Reach out to the right department or visit City Hall.</p>
                        </div>
                    </div>

                    <main className="flex-1 py-12">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">

                                {/* Left Col - Form and Quick Info */}
                                <div>
                                    <div className="bg-white rounded-xl shadow-soft border border-gov-neutral-200 p-8 mb-8">
                                        <h2 className="text-2xl font-bold text-gov-neutral-900 mb-6">General Inquiry</h2>
                                        <form className="space-y-5">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                                <div>
                                                    <label className="block text-sm font-medium text-gov-neutral-700 mb-1">Full Name</label>
                                                    <input required type="text" className="w-full border border-gov-neutral-300 rounded-md py-2 px-3 focus:ring-2 focus:ring-gov-blue-500 focus:outline-none" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-gov-neutral-700 mb-1">Email Address</label>
                                                    <input required type="email" className="w-full border border-gov-neutral-300 rounded-md py-2 px-3 focus:ring-2 focus:ring-gov-blue-500 focus:outline-none" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gov-neutral-700 mb-1">Department to Contact</label>
                                                <select className="w-full border border-gov-neutral-300 rounded-md py-2 px-3 focus:ring-2 focus:ring-gov-blue-500 focus:outline-none bg-white">
                                                    <option>General Support / 311</option>
                                                    <option>Billing & Utilities</option>
                                                    <option>Mayor's Office</option>
                                                    <option>Public Works</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gov-neutral-700 mb-1">Message</label>
                                                <textarea required rows="5" className="w-full border border-gov-neutral-300 rounded-md py-2 px-3 focus:ring-2 focus:ring-gov-blue-500 focus:outline-none"></textarea>
                                            </div>
                                            <button type="button" className="bg-gov-blue-700 hover:bg-gov-blue-800 text-white font-bold py-3 px-6 rounded-md transition-colors w-full sm:w-auto">
                                                Send Message
                                            </button>
                                        </form>
                                    </div>

                                    <div className="flex gap-4 p-5 bg-gov-blue-50 border border-gov-blue-200 rounded-xl">
                                        <BuildingIcon className="w-12 h-12 text-gov-blue-700 flex-shrink-0" />
                                        <div>
                                            <h3 className="font-bold text-gov-blue-900 text-lg">City Hall Address</h3>
                                            <p className="text-gov-neutral-700 mt-1">4800 Lakewood Drive<br />Lakewood, OH 44107</p>
                                            <p className="text-sm text-gov-neutral-500 mt-2">Hours: Mon-Fri 8:00 AM - 5:00 PM</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Right Col - Map and Directory */}
                                <div className="space-y-8">

                                    {/* Placeholder Map (Using embedded iframe logic typically for maps) */}
                                    <div className="bg-white rounded-xl shadow-soft border border-gov-neutral-200 p-2 h-64 relative overflow-hidden flex items-center justify-center bg-gov-neutral-200">
                                        <div className="text-center">
                                            <p className="text-gov-neutral-500 font-medium mb-2">Interactive Map Embed Placeholder</p>
                                            <button className="bg-white border border-gov-neutral-300 text-gov-neutral-700 px-4 py-2 rounded shadow-sm text-sm">Get Directions</button>
                                        </div>
                                        {/* In reality, an iframe like this would be used:
                                        <iframe width="100%" height="100%" frameborder="0" style={{border:0}} src="https://www.google.com/maps/embed/v1/place?q=City+Hall,Lakewood,OH" allowfullscreen></iframe>
                                       */}
                                    </div>

                                    {/* Department Directory */}
                                    <div className="bg-white rounded-xl shadow-soft border border-gov-neutral-200 p-8">
                                        <h2 className="text-2xl font-bold text-gov-neutral-900 mb-6 border-b pb-2">Department Directory</h2>
                                        <ul className="space-y-4">
                                            <li className="flex justify-between items-center pb-4 border-b border-gov-neutral-100 last:border-0 last:pb-0">
                                                <div>
                                                    <h4 className="font-bold text-gov-blue-900">General Info / 311</h4>
                                                    <p className="text-sm text-gov-neutral-500">24/7 Support</p>
                                                </div>
                                                <a href="tel:311" className="text-gov-blue-700 font-medium flex items-center gap-2 bg-gov-blue-50 px-3 py-1 rounded hover:bg-gov-blue-100">
                                                    <PhoneIcon className="w-4 h-4" /> 311
                                                </a>
                                            </li>
                                            <li className="flex justify-between items-center pb-4 border-b border-gov-neutral-100 last:border-0 last:pb-0">
                                                <div>
                                                    <h4 className="font-bold text-gov-blue-900">Utility Billing</h4>
                                                    <p className="text-sm text-gov-neutral-500">Water, Sewer, Trash</p>
                                                </div>
                                                <span className="text-gov-neutral-700 font-medium">(216) 555-0100</span>
                                            </li>
                                            <li className="flex justify-between items-center pb-4 border-b border-gov-neutral-100 last:border-0 last:pb-0">
                                                <div>
                                                    <h4 className="font-bold text-gov-blue-900">Building Department</h4>
                                                    <p className="text-sm text-gov-neutral-500">Permits & Scheduling</p>
                                                </div>
                                                <span className="text-gov-neutral-700 font-medium">(216) 555-0210</span>
                                            </li>
                                            <li className="flex justify-between items-center pb-4 border-b border-gov-neutral-100 last:border-0 last:pb-0">
                                                <div>
                                                    <h4 className="font-bold text-gov-blue-900">Police Department (Non-Emergency)</h4>
                                                    <p className="text-sm text-gov-neutral-500">For emergencies dial 911</p>
                                                </div>
                                                <span className="text-gov-neutral-700 font-medium">(216) 555-8000</span>
                                            </li>
                                        </ul>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </main>

                    <Footer />
                </div>
            );
        }

        function renderApp() {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }
    </script>
</body>

</html>
