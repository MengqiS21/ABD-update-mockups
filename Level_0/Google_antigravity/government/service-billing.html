<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay a Bill - City of Lakewood</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700;900&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./shared/theme.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>

<body class="bg-gov-neutral-50 text-gov-neutral-900 flex flex-col min-h-screen">
    <div id="root" class="flex flex-col flex-1"></div>

    <script type="text/babel" src="./shared/components.jsx"></script>

    <script type="text/babel">
        const checkShared = setInterval(() => {
            if (window.SharedComponents) {
                clearInterval(checkShared);
                renderApp();
            }
        }, 50);

        function App() {
            const { Header, Footer, Icons } = window.SharedComponents;
            const { CreditCardIcon, BuildingIcon, ShieldIcon } = Icons;

            const [step, setStep] = React.useState(1); // 1 = Lookup, 2 = Pay, 3 = Confirmation
            const [accountNumber, setAccountNumber] = React.useState('');

            const handleLookup = (e) => {
                e.preventDefault();
                setStep(2);
            };

            const handlePayment = (e) => {
                e.preventDefault();
                setStep(3);
                window.scrollTo(0, 0);
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <Header currentPath="service-billing.html" />

                    {/* Breadcrumbs */}
                    <div className="bg-white border-b border-gov-neutral-200 py-3">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-sm text-gov-neutral-500">
                            <a href="index.html" className="hover:text-gov-blue-700">Home</a>
                            <span className="mx-2">/</span>
                            <a href="services.html" className="hover:text-gov-blue-700">Services</a>
                            <span className="mx-2">/</span>
                            <span className="text-gov-neutral-900 font-medium">Utilities & Billing</span>
                        </div>
                    </div>

                    <main className="flex-1 py-12">
                        <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">

                            <div className="mb-10 text-center">
                                <h1 className="text-4xl font-serif font-bold text-gov-blue-900 mb-4">Pay Utility Bill</h1>
                                <p className="text-lg text-gov-neutral-600">Quickly and securely pay your water, sewer, and property taxes online.</p>
                            </div>

                            <div className="bg-white rounded-xl shadow-float border border-gov-neutral-200 overflow-hidden">

                                {/* Stepper Header */}
                                <div className="bg-gov-neutral-50 border-b border-gov-neutral-200 flex text-sm font-medium">
                                    <div className={`flex-1 py-4 text-center border-r border-gov-neutral-200 ${step >= 1 ? 'text-gov-blue-700 border-b-2 border-b-gov-blue-700 bg-white' : 'text-gov-neutral-500'}`}>
                                        1. Account Lookup
                                    </div>
                                    <div className={`flex-1 py-4 text-center border-r border-gov-neutral-200 ${step >= 2 ? 'text-gov-blue-700 border-b-2 border-b-gov-blue-700 bg-white' : 'text-gov-neutral-500'}`}>
                                        2. Payment
                                    </div>
                                    <div className={`flex-1 py-4 text-center ${step === 3 ? 'text-green-700 border-b-2 border-b-green-700 bg-white' : 'text-gov-neutral-500'}`}>
                                        3. Receipt
                                    </div>
                                </div>

                                <div className="p-8 md:p-12">
                                    {step === 1 && (
                                        <form onSubmit={handleLookup} className="max-w-md mx-auto">
                                            <div className="mb-8">
                                                <label className="block text-sm font-bold text-gov-neutral-800 mb-2">12-Digit Account Number <span className="text-red-500">*</span></label>
                                                <input
                                                    required
                                                    type="text"
                                                    placeholder="e.g. 0000-1234-5678"
                                                    className="w-full border border-gov-neutral-300 rounded-lg py-3 px-4 text-lg focus:outline-none focus:ring-2 focus:ring-gov-blue-500"
                                                    value={accountNumber}
                                                    onChange={(e) => setAccountNumber(e.target.value)}
                                                />
                                                <p className="text-xs text-gov-neutral-500 mt-2">Find this at the top right of your paper bill.</p>
                                            </div>
                                            <div className="mb-8">
                                                <label className="block text-sm font-bold text-gov-neutral-800 mb-2">Service ZIP Code <span className="text-red-500">*</span></label>
                                                <input required type="text" placeholder="44107" className="w-full border border-gov-neutral-300 rounded-lg py-3 px-4 text-lg focus:outline-none focus:ring-2 focus:ring-gov-blue-500" />
                                            </div>
                                            <button type="submit" className="w-full bg-gov-blue-700 hover:bg-gov-blue-800 text-white font-bold py-4 rounded-lg shadow-sm transition-colors text-lg">
                                                Locate Account
                                            </button>
                                        </form>
                                    )}

                                    {step === 2 && (
                                        <div className="max-w-xl mx-auto">
                                            {/* Balance Summary */}
                                            <div className="bg-gov-blue-50 border border-gov-blue-100 rounded-lg p-6 mb-8 flex justify-between items-center">
                                                <div>
                                                    <p className="text-sm font-semibold text-gov-blue-800 uppercase tracking-wide">Current Balance</p>
                                                    <h2 className="text-4xl font-bold text-gov-blue-900 mt-1">$142.50</h2>
                                                    <p className="text-sm text-gov-neutral-600 mt-1">Due by Nov 30, 2026</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-medium text-gov-neutral-800">Jane Doe</p>
                                                    <p className="text-sm text-gov-neutral-600">123 Main St</p>
                                                    <p className="text-sm text-gov-neutral-600 pt-1">Acct: {accountNumber || '0000-1234-5678'}</p>
                                                </div>
                                            </div>

                                            <form onSubmit={handlePayment}>
                                                <h3 className="text-lg font-bold text-gov-neutral-900 mb-4 border-b pb-2">Payment Option</h3>
                                                <div className="grid grid-cols-2 gap-4 mb-8">
                                                    <label className="border-2 border-gov-blue-500 bg-gov-blue-50 cursor-pointer rounded-lg p-4 flex flex-col items-center justify-center relative">
                                                        <input type="radio" name="payment_method" className="absolute top-4 left-4 h-4 w-4 text-gov-blue-600 focus:ring-gov-blue-500 border-gray-300" defaultChecked />
                                                        <CreditCardIcon className="w-8 h-8 text-gov-blue-700 mb-2" />
                                                        <span className="font-semibold text-gov-blue-900">Credit / Debit</span>
                                                        <span className="text-xs text-gov-neutral-500 mt-1">Fee: 2.5%</span>
                                                    </label>
                                                    <label className="border border-gov-neutral-200 hover:border-gov-blue-300 cursor-pointer rounded-lg p-4 flex flex-col items-center justify-center relative transition-colors">
                                                        <input type="radio" name="payment_method" className="absolute top-4 left-4 h-4 w-4 text-gov-blue-600 focus:ring-gov-blue-500 border-gray-300" />
                                                        <BuildingIcon className="w-8 h-8 text-gov-neutral-500 mb-2" />
                                                        <span className="font-semibold text-gov-neutral-700">Bank Transfer (ACH)</span>
                                                        <span className="text-xs text-gov-neutral-500 mt-1">Fee: $0.00</span>
                                                    </label>
                                                </div>

                                                <h3 className="text-lg font-bold text-gov-neutral-900 mb-4 border-b pb-2">Card Details</h3>
                                                <div className="space-y-4 mb-8 text-sm">
                                                    <div>
                                                        <label className="block font-medium text-gov-neutral-700 mb-1">Name on Card <span className="text-red-500">*</span></label>
                                                        <input required type="text" className="w-full border border-gov-neutral-300 rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-gov-blue-500" placeholder="Jane Doe" />
                                                    </div>
                                                    <div>
                                                        <label className="block font-medium text-gov-neutral-700 mb-1">Card Number <span className="text-red-500">*</span></label>
                                                        <input required type="text" className="w-full border border-gov-neutral-300 rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-gov-blue-500" placeholder="0000 0000 0000 0000" />
                                                    </div>
                                                    <div className="flex gap-4">
                                                        <div className="flex-1">
                                                            <label className="block font-medium text-gov-neutral-700 mb-1">Expiry (MM/YY) <span className="text-red-500">*</span></label>
                                                            <input required type="text" className="w-full border border-gov-neutral-300 rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-gov-blue-500" placeholder="MM/YY" />
                                                        </div>
                                                        <div className="flex-1">
                                                            <label className="block font-medium text-gov-neutral-700 mb-1">CVV <span className="text-red-500">*</span></label>
                                                            <input required type="text" className="w-full border border-gov-neutral-300 rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-gov-blue-500" placeholder="123" />
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="flex items-start gap-2 mb-8 text-sm text-gov-neutral-600">
                                                    <Icons.DocumentIcon className="w-5 h-5 flex-shrink-0 text-gov-neutral-400" />
                                                    <p>By clicking "Submit Payment", you agree to the <a href="#" className="text-gov-blue-600 underline">Terms and Conditions</a> and authorize this transaction.</p>
                                                </div>

                                                <div className="flex gap-4">
                                                    <button type="button" onClick={() => setStep(1)} className="flex-1 bg-white border border-gov-neutral-300 text-gov-neutral-700 font-bold py-3 rounded-lg hover:bg-gov-neutral-50 transition-colors">
                                                        Cancel
                                                    </button>
                                                    <button type="submit" className="flex-[2] bg-gov-blue-700 hover:bg-gov-blue-800 text-white font-bold py-3 rounded-lg shadow-md transition-colors text-lg flex justify-center items-center gap-2">
                                                        Submit Payment - $146.06
                                                    </button>
                                                </div>
                                            </form>
                                        </div>
                                    )}

                                    {step === 3 && (
                                        <div className="text-center py-8">
                                            <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 text-green-600">
                                                <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                            </div>
                                            <h2 className="text-3xl font-bold text-gov-blue-900 mb-2">Payment Successful</h2>
                                            <p className="text-lg text-gov-neutral-600 mb-8">Thank you for your payment. Your balance is now $0.00.</p>

                                            <div className="max-w-md mx-auto bg-gov-neutral-50 border border-gov-neutral-200 rounded-lg p-6 text-left mb-8 text-sm">
                                                <div className="flex justify-between py-2 border-b border-gov-neutral-200">
                                                    <span className="text-gov-neutral-600">Confirmation #:</span>
                                                    <span className="font-bold text-gov-neutral-900">#CONF-98231</span>
                                                </div>
                                                <div className="flex justify-between py-2 border-b border-gov-neutral-200">
                                                    <span className="text-gov-neutral-600">Date Paid:</span>
                                                    <span className="font-bold text-gov-neutral-900">Nov 15, 2026</span>
                                                </div>
                                                <div className="flex justify-between py-2 border-b border-gov-neutral-200">
                                                    <span className="text-gov-neutral-600">Original Amount:</span>
                                                    <span className="font-bold text-gov-neutral-900">$142.50</span>
                                                </div>
                                                <div className="flex justify-between py-2 border-b border-gov-neutral-200">
                                                    <span className="text-gov-neutral-600">Processing Fee:</span>
                                                    <span className="font-bold text-gov-neutral-900">$3.56</span>
                                                </div>
                                                <div className="flex justify-between py-2 mt-2">
                                                    <span className="font-bold text-gov-neutral-800 text-base">Total Charged:</span>
                                                    <span className="font-bold text-gov-blue-800 text-lg">$146.06</span>
                                                </div>
                                            </div>

                                            <div className="flex justify-center gap-4">
                                                <button className="bg-white border border-gov-neutral-300 text-gov-neutral-700 font-bold py-2 px-6 rounded hover:bg-gov-neutral-50 transition-colors">Print Receipt</button>
                                                <a href="index.html" className="bg-gov-blue-700 hover:bg-gov-blue-800 text-white font-bold py-2 px-6 rounded transition-colors inline-block">Return Home</a>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>

                    <Footer />
                </div>
            );
        }

        function renderApp() {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }
    </script>
</body>

</html>
