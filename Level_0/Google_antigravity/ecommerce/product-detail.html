    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        indigo: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8',

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script type="text/babel" src="shared.js"></script>
</head>

<body class="bg-white text-gray-900 antialiased font-sans">

                                <span className="text-gray-300">/</span>
                                <a href="products.html" className="hover:text-indigo-600">Electronics</a>

                                            </div>
                                            <button className="text-gray-400 hover:text-red-500 transition-colors p-2 bg-gray-50 rounded-full">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" /></svg>

                                            <button onClick={() => setSelectedColor('black')} className={`w-12 h-12 rounded-full bg-gray-900 border-2 transition-all ${selectedColor === 'black' ? 'border-indigo-600 ring-2 ring-offset-2 ring-indigo-200' : 'border-gray-200 hover:border-gray-300'}`} aria-label="Black"></button>

                                            <button onClick={() => setQuantity(quantity + 1)} className="px-4 text-gray-500 hover:text-black transition-colors font-medium text-lg">+</button>
                                        </div>

                                        <a href="cart.html" className="flex-1 flex items-center justify-center bg-gray-900 hover:bg-gray-800 text-white font-bold text-lg h-14 rounded-xl transition-colors shadow-lg shadow-gray-900/20">

                                                <h4 className="font-semibold text-sm text-gray-900">Free Shipping</h4>

                                            <div>
                                                <h4 className="font-semibold text-sm text-gray-900">Free Returns</h4>
                                                <p className="text-xs text-gray-500 mt-0.5">Within 30 days</p>
                                            </div>
                                        </div>
                                    </div>

                            {/* Tabs Section */}
                            <div className="mt-24" id="reviews">
                                <div className="border-b border-gray-200">
                                    <nav className="flex space-x-8">
                                        {['description', 'specs', 'reviews'].map(tab => (
                                            <button
                                                key={tab}
                                                onClick={() => setActiveTab(tab)}
                                                className={`py-4 px-1 text-lg font-bold border-b-4 transition-colors capitalize ${activeTab === tab ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-gray-500 hover:text-gray-800 hover:border-gray-300'}`}

                                                {tab} {tab === 'reviews' && '(1,245)'}
                                            </button>
                                        ))}
                                    </nav>
                                </div>

                                <div className="py-12">
                                    {activeTab === 'description' && (

                                            <h3 className="text-xl font-bold text-gray-900 mb-3 mt-8">Key Features:</h3>
                                            <ul className="list-disc pl-6 space-y-2 mb-6">
                                                <li>Industry-leading noise cancellation optimized to you.</li>
                                                <li>Magnificent Sound, engineered to perfection.</li>
                                                <li>Crystal clear hands-free calling.</li>
                                                <li>Up to 30-hour battery life with quick charging (3 min charge for 3 hours of playback).</li>
                                                <li>Ultra-comfortable, lightweight design with soft fit leather.</li>
                                            </ul>
                                        </div>
                                    )}

                                    {activeTab === 'specs' && (
                                        <div className="max-w-3xl">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-6 gap-x-8 border-t border-gray-100 py-6">
                                                <div className="text-sm font-semibold text-gray-900 uppercase tracking-wider">Weight</div>
                                                <div className="text-gray-600">Approx. 250g</div>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-6 gap-x-8 border-t border-gray-100 py-6">
                                                <div className="text-sm font-semibold text-gray-900 uppercase tracking-wider">Headphone Type</div>
                                                <div className="text-gray-600">Closed, dynamic</div>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-6 gap-x-8 border-t border-gray-100 py-6">
                                                <div className="text-sm font-semibold text-gray-900 uppercase tracking-wider">Driver Unit</div>
                                                <div className="text-gray-600">30mm, specially designed dome type</div>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-6 gap-x-8 border-t border-gray-100 py-6">
                                                <div className="text-sm font-semibold text-gray-900 uppercase tracking-wider">Frequency Response</div>
                                                <div className="text-gray-600">4 Hz - 40,000 Hz</div>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-6 gap-x-8 border-t border-gray-100 py-6">
                                                <div className="text-sm font-semibold text-gray-900 uppercase tracking-wider">Battery Life</div>
                                                <div className="text-gray-600">Max. 30 hrs (NC ON), Max. 40 hrs (NC OFF)</div>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'reviews' && (
                                        <div className="max-w-4xl">
                                            <div className="flex items-center gap-6 mb-12 bg-gray-50 p-8 rounded-2xl border border-gray-100">
                                                <div className="text-center">
                                                    <span className="text-6xl font-extrabold text-gray-900 tracking-tighter">4.9</span>
                                                    <div className="flex justify-center my-2 text-yellow-400">
                                                        {[1, 2, 3, 4, 5].map(i => <StarIcon key={i} filled={true} />)}
                                                    </div>
                                                    <span className="text-sm text-gray-500 font-medium">1,245 Reviews</span>
                                                </div>
                                                <div className="flex-1 space-y-2">
                                                    {[5, 4, 3, 2, 1].map(stars => (
                                                        <div key={stars} className="flex items-center text-sm">
                                                            <span className="w-12 text-right font-medium text-gray-600">{stars} Stars</span>
                                                            <div className="flex-1 mx-4 h-2.5 bg-gray-200 rounded-full overflow-hidden">
                                                                <div className="bg-yellow-400 h-full rounded-full" style={{ width: stars === 5 ? '85%' : stars === 4 ? '10%' : '1%' }}></div>
                                                            </div>
                                                            <span className="w-12 text-gray-500">{stars === 5 ? '1042' : stars === 4 ? '150' : '10'}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="space-y-10">
                                                {/* Review 1 */}
                                                <div className="border-b border-gray-100 pb-10">
                                                    <div className="flex justify-between mb-4">
                                                        <div className="flex items-center gap-4">
                                                            <div className="w-10 h-10 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center font-bold text-lg">A</div>
                                                            <div>
                                                                <h4 className="font-bold text-gray-900">Alex M.</h4>
                                                                <div className="flex items-center gap-2 mt-1">
                                                                    <div className="flex text-yellow-400"><StarIcon filled /><StarIcon filled /><StarIcon filled /><StarIcon filled /><StarIcon filled /></div>
                                                                    <span className="text-green-600 text-xs font-bold border border-green-200 bg-green-50 px-2 py-0.5 rounded flex items-center gap-1">Verified Buyer</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <span className="text-gray-400 text-sm">Oct 12, 2023</span>
                                                    </div>
                                                    <h5 className="font-bold text-lg mb-2 text-gray-900">Best ANC Headphones on the market</h5>
                                                    <p className="text-gray-600 leading-relaxed">The noise cancellation is just absurd. I use these on flights and in my noisy office, and they completely block out everything. The sound quality is incredible too, very balanced and crisp. They are significantly lighter and more comfortable than the XM4s.</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </main>

                        <window.Footer />
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        setTimeout(() => {
            if (window.Header && window.Footer) { renderApp(); }
            else {
                const interval = setInterval(() => {
                    if (window.Header && window.Footer) {
                        clearInterval(interval);
                        renderApp();
                    }
                }, 100);
            }
        }, 50);
    </script>
</body>

</html>
