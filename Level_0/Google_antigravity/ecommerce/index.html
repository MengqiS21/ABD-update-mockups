<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaMart | The Modern Marketplace</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            indigo: {
              50: '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              300: '#a5b4fc',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#312e81',
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Shared Components -->
  <script type="text/babel" src="shared.js"></script>

  <style>
    /* Hide scrollbar for horizontal scrolling but keep functionality */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    .hero-gradient {
      background: linear-gradient(135deg, #4f46e5 0%, #312e81 100%);
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { Header, Footer } = window;
    
    // Fallback if shared.js takes a moment to load via Babel
    const renderApp = () => {
      const App = () => {
        const StarIcon = ({ filled }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill={filled ? "#fbbf24" : "none"} stroke={filled ? "#fbbf24" : "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-star"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        );

        const ArrowRight = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-arrow-right"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        );

        const categories = [
          { name: "Electronics", image: "https://images.unsplash.com/photo-1498049794561-7780e7231661?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
          { name: "Kitchen", image: "https://images.unsplash.com/photo-1556910103-1c02745a872f?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
          { name: "Clothing", image: "https://images.unsplash.com/photo-1445205170230-053b83016050?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
          { name: "Sports", image: "https://images.unsplash.com/photo-1517649763962-0c623066013b?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
        ];

        const deals = [
          { id: 1, name: "Sony WH-1000XM5 Headphones", price: 279.99, originalPrice: 399.99, rating: 5, reviews: 1245, image: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80", tag: "Save $120" },
          { id: 2, name: "Apple iPad Air (5th Gen)", price: 499.00, originalPrice: 599.00, rating: 4, reviews: 892, image: "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80", tag: "17% off" },
          { id: 3, name: "Ninja Professional Blender", price: 79.99, originalPrice: 99.99, rating: 5, reviews: 3410, image: "https://images.unsplash.com/photo-1585237837777-62f9eb5b1e60?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80", tag: "Hot Deal" },
          { id: 4, name: "Patagonia Micro D Fleece", price: 44.50, originalPrice: 89.00, rating: 4, reviews: 312, image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80", tag: "50% off" },
          { id: 5, name: "Samsung 49\" Odyssey G9", price: 999.99, originalPrice: 1399.99, rating: 5, reviews: 456, image: "https://images.unsplash.com/photo-1527443195645-1133f7f28990?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80", tag: "Save $400" },
        ];

        return (
          <div className="min-h-screen flex flex-col">
            <window.Header active="home" />
            
            <main className="flex-1">
              {/* Hero Banner */}
              <section className="relative hero-gradient text-white overflow-hidden">
                <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80')] bg-cover bg-center mix-blend-overlay opacity-20"></div>
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 md:py-32 relative z-10 flex flex-col items-center md:items-start text-center md:text-left">
                  <span className="inline-block py-1 px-3 rounded-full bg-red-500 text-white text-xs font-bold uppercase tracking-widest mb-6 animate-pulse">Live Now</span>
                  <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 leading-tight max-w-3xl">
                    Flash Sale: <span className="text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">Up to 50% off</span> Electronics
                  </h1>
                  <p className="text-xl md:text-2xl text-indigo-100 mb-10 max-w-2xl font-light">
                    Upgrade your tech with premium gadgets at unbeatable prices. Limited time offer ends soon.
                  </p>
                  <div className="flex flex-col sm:flex-row gap-4">
                    <a href="products.html" className="inline-flex items-center justify-center px-8 py-4 text-lg font-semibold rounded-full text-indigo-900 bg-white hover:bg-gray-50 transition-colors shadow-lg shadow-white/20">
                      Shop the Sale
                    </a>
                    <a href="products.html" className="inline-flex items-center justify-center px-8 py-4 text-lg font-semibold rounded-full text-white bg-indigo-800/50 hover:bg-indigo-800 backdrop-blur-sm border border-indigo-400/30 transition-colors">
                      Explore All Deals
                    </a>
                  </div>
                </div>
              </section>

              {/* Trending Categories */}
              <section className="py-20 bg-white">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-end mb-10">
                    <div>
                      <h2 className="text-3xl font-bold tracking-tight text-gray-900">Trending Categories</h2>
                      <p className="mt-2 text-gray-500">Explore the most popular sections this week.</p>
                    </div>
                    <a href="products.html" className="hidden md:flex items-center text-indigo-600 font-semibold hover:text-indigo-800 transition-colors gap-1">
                      View all categories <ArrowRight />
                    </a>
                  </div>
                  
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    {categories.map((category, idx) => (
                      <a href="products.html" key={idx} className="group relative rounded-2xl overflow-hidden aspect-[4/5] block bg-gray-100">
                        <img 
                          src={category.image} 
                          alt={category.name} 
                          className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                        <div className="absolute bottom-6 left-6 right-6">
                          <h3 className="text-2xl font-bold text-white tracking-wide">{category.name}</h3>
                          <div className="mt-2 text-indigo-300 font-medium opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1">
                            Shop now <ArrowRight />
                          </div>
                        </div>
                      </a>
                    ))}
                  </div>
                </div>
              </section>

              {/* Today's Deals (Horizontal Scroll) */}
              <section className="py-20 bg-gray-50 border-t border-gray-100">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-end mb-10">
                    <div>
                      <h2 className="text-3xl font-bold tracking-tight text-gray-900">Today's Deals</h2>
                      <p className="mt-2 text-gray-500">Incredible offers that won't last long.</p>
                    </div>
                  </div>

                  <div className="flex overflow-x-auto hide-scrollbar gap-6 pb-8 -mx-4 px-4 sm:mx-0 sm:px-0">
                    {deals.map((deal) => (
                      <div key={deal.id} className="min-w-[280px] max-w-[280px] flex-shrink-0 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden group hover:shadow-xl transition-shadow">
                        <a href="product-detail.html" className="block relative aspect-square bg-gray-100 overflow-hidden">
                          <span className="absolute top-3 left-3 bg-red-500 text-white text-xs font-bold px-2.5 py-1 rounded-md z-10 shadow-sm">{deal.tag}</span>
                          <img 
                            src={deal.image} 
                            alt={deal.name}
                            className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" 
                          />
                        </a>
                        <div className="p-5">
                          <div className="flex items-center gap-1 mb-2">
                            {[1, 2, 3, 4, 5].map(star => (
                              <StarIcon key={star} filled={star <= deal.rating} />
                            ))}
                            <span className="text-xs text-gray-500 ml-1">({deal.reviews})</span>
                          </div>
                          <a href="product-detail.html" className="block">
                            <h3 className="text-gray-900 font-medium mb-1 line-clamp-2 hover:text-indigo-600 transition-colors">{deal.name}</h3>
                          </a>
                          <div className="mt-3 flex items-baseline gap-2">
                            <span className="text-xl font-bold text-gray-900">${deal.price.toFixed(2)}</span>
                            <span className="text-sm text-gray-400 line-through">${deal.originalPrice.toFixed(2)}</span>
                          </div>
                          <button className="w-full mt-4 bg-gray-900 hover:bg-indigo-600 text-white font-medium py-2.5 rounded-lg transition-colors shadow-sm">
                            Add to Cart
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </section>

              {/* Value Props */}
              <section className="py-16 bg-white border-t border-gray-100">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-center divide-y md:divide-y-0 md:divide-x divide-gray-100">
                    <div className="p-6">
                      <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1 .4-1 1v10c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
                      </div>
                      <h3 className="text-lg font-semibold text-gray-900 mb-2">Free Delivery</h3>
                      <p className="text-gray-500 text-sm">On all orders over $50. Tracked and insured.</p>
                    </div>
                    <div className="p-6">
                      <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
                      </div>
                      <h3 className="text-lg font-semibold text-gray-900 mb-2">Secure Payment</h3>
                      <p className="text-gray-500 text-sm">100% secure payment with 256-bit encryption.</p>
                    </div>
                    <div className="p-6">
                      <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                      </div>
                      <h3 className="text-lg font-semibold text-gray-900 mb-2">24/7 Support</h3>
                      <p className="text-gray-500 text-sm">Dedicated support anytime you need it.</p>
                    </div>
                  </div>
                </div>
              </section>
            </main>
            
            <window.Footer />
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    };

    // Wait for shared.js to be executed by Babel
    setTimeout(() => {
      if (window.Header && window.Footer) {
        renderApp();
      } else {
        // Poll for it
        const interval = setInterval(() => {
          if (window.Header && window.Footer) {
            clearInterval(interval);
            renderApp();
          }
        }, 100);
      }
    }, 50);
  </script>
</body>
</html>
