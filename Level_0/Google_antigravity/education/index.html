<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnPath | Unlock Your Potential. Learn at Your Own Pace.</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-surface-50 antialiased text-surface-900 selection:bg-primary-500 selection:text-white">
    <div id="root"></div>

    <!-- Shared Components -->
    <script type="text/babel" src="shared.js"></script>

    <!-- Page Component -->
    <script type="text/babel">
        const Hero = () => (
            <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
                <div className="absolute inset-0 bg-gradient-to-br from-primary-900 via-primary-800 to-primary-900">
                    <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80')] mix-blend-overlay opacity-20 bg-cover bg-center"></div>
                    <div className="absolute inset-0 bg-gradient-to-t from-primary-900 via-transparent to-transparent opacity-80"></div>
                </div>
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center animate-fade-in">
                    <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-primary-100 text-sm font-medium mb-8 animate-slide-up">
                        <span className="flex h-2 w-2 rounded-full bg-primary-400"></span>
                        New: Advanced Machine Learning Path Available Now
                    </div>
                    <h1 className="text-5xl md:text-6xl lg:text-7xl font-display font-extrabold text-white tracking-tight mb-8 leading-tight animate-slide-up" style={{ animationDelay: '0.1s' }}>
                        Unlock Your Potential.<br />
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-primary-200 to-primary-400">Learn at Your Own Pace.</span>
                    </h1>
                    <p className="mt-4 max-w-2xl text-xl text-primary-100 mx-auto mb-10 leading-relaxed animate-slide-up" style={{ animationDelay: '0.2s' }}>
                        Master modern skills in technology, business, design, and personal development with structured pathways and expert-led video courses.
                    </p>
                    <div className="flex flex-col sm:flex-row justify-center gap-4 animate-slide-up" style={{ animationDelay: '0.3s' }}>
                        <a href="courses.html">
                            <Button variant="accent" className="w-full sm:w-auto px-8 py-4 text-lg rounded-full shadow-primary-500/25">
                                Browse Courses
                            </Button>
                        </a>
                        <a href="pricing.html">
                            <Button variant="secondary" className="w-full sm:w-auto px-8 py-4 text-lg rounded-full bg-white/10 text-white border-white/20 hover:bg-white/20 hover:border-white/30 backdrop-blur-md">
                                Start Free Trial
                            </Button>
                        </a>
                    </div>
                </div>
            </section>
        );

        const SocialProof = () => (
            <div className="bg-white border-b border-surface-200 py-10 relative z-20 -mt-6 rounded-t-3xl shadow-xl max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="flex flex-col md:flex-row items-center justify-between gap-8">
                    <div className="text-center md:text-left">
                        <p className="text-sm font-bold tracking-widest text-surface-400 uppercase mb-2">Trusted By</p>
                        <h3 className="text-2xl font-display font-bold text-surface-900">Join <span className="text-primary-600">2M+</span> learners worldwide</h3>
                    </div>
                    <div className="flex flex-wrap justify-center gap-8 md:gap-12 opacity-50 grayscale hover:grayscale-0 transition-all duration-500">
                        {/* Simulated company logos */}
                        <i className="fab fa-google text-3xl"></i>
                        <i className="fab fa-amazon text-3xl"></i>
                        <i className="fab fa-microsoft text-3xl"></i>
                        <i className="fab fa-airbnb text-3xl"></i>
                        <i className="fab fa-spotify text-3xl"></i>
                    </div>
                </div>
            </div>
        );

        const Categories = () => {
            const categories = [
                { name: 'Web Development', icon: 'fa-code', color: 'bg-blue-500' },
                { name: 'Data Science', icon: 'fa-chart-pie', color: 'bg-emerald-500' },
                { name: 'UX Design', icon: 'fa-pen-nib', color: 'bg-purple-500' },
                { name: 'Business', icon: 'fa-chart-line', color: 'bg-amber-500' },
                { name: 'Photography', icon: 'fa-camera', color: 'bg-rose-500' },
            ];

            return (
                <section className="py-24 bg-surface-50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-end justify-between mb-12">
                            <div>
                                <h2 className="text-3xl font-display font-bold text-surface-900 mb-4">Explore Top Categories</h2>
                                <p className="text-surface-500 text-lg">Find the perfect course to advance your career.</p>
                            </div>
                            <a href="courses.html" className="hidden sm:flex items-center text-primary-600 font-medium hover:text-primary-700 transition-colors">
                                View All <i className="fas fa-arrow-right ml-2 text-sm"></i>
                            </a>
                        </div>
                        <div className="grid grid-cols-2 lg:grid-cols-5 gap-6">
                            {categories.map((cat, idx) => (
                                <a key={idx} href="courses.html" className="group flex flex-col items-center p-8 bg-white rounded-2xl border border-surface-200 hover:border-primary-200 hover:shadow-xl hover:shadow-primary-100 transition-all duration-300 text-center">
                                    <div className={`w-16 h-16 rounded-2xl ${cat.color} text-white flex items-center justify-center text-2xl mb-6 shadow-lg group-hover:scale-110 transition-transform duration-300`}>
                                        <i className={`fas ${cat.icon}`}></i>
                                    </div>
                                    <h3 className="font-bold text-surface-900 group-hover:text-primary-600 transition-colors">{cat.name}</h3>
                                </a>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const FeaturedCourses = () => {
            const courses = [
                {
                    title: "Python for Data Science — Intermediate",
                    instructor: "Dr. Angela Yu",
                    rating: 4.8,
                    students: "10k+",
                    duration: "24 hours",
                    level: "Intermediate",
                    price: "$89.99",
                    badge: "Bestseller",
                    image: "https://images.unsplash.com/photo-1526379095098-d400fd0bfce8?auto=format&fit=crop&w=800&q=80"
                },
                {
                    title: "Complete Web Developer 2026 Bootcamp",
                    instructor: "Andrei Neagoie",
                    rating: 4.9,
                    students: "50k+",
                    duration: "65 hours",
                    level: "Beginner",
                    price: "$94.99",
                    badge: "Highest Rated",
                    image: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=80"
                },
                {
                    title: "UI/UX Design Masterclass: Strategy to Figma",
                    instructor: "Gary Simon",
                    rating: 4.7,
                    students: "8k+",
                    duration: "18 hours",
                    level: "All Levels",
                    price: "$74.99",
                    image: "https://images.unsplash.com/photo-1561070791-2526d30994b5?auto=format&fit=crop&w=800&q=80"
                },
                {
                    title: "Digital Marketing Strategy for 2026",
                    instructor: "Seth Godin",
                    rating: 4.8,
                    students: "12k+",
                    duration: "12 hours",
                    level: "Intermediate",
                    price: "Free",
                    badge: "New",
                    image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=800&q=80"
                }
            ];

            return (
                <section className="py-24 bg-white relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-1/3 h-full bg-primary-50 transform -skew-x-12 translate-x-1/2 opacity-50"></div>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        <div className="text-center mb-16">
                            <Badge className="mb-4">Popular Choices</Badge>
                            <h2 className="text-3xl font-display font-bold text-surface-900 mb-4">Featured Courses</h2>
                            <p className="text-surface-500 text-lg max-w-2xl mx-auto">Hand-picked by our editors, these courses represent the best learning material currently available on LearnPath.</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                            {courses.map((course, idx) => (
                                <CourseCard key={idx} {...course} />
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const HowItWorks = () => {
            const steps = [
                {
                    number: "01",
                    title: "Find Your Path",
                    desc: "Browse our expansive catalog and choose a learning path tailored to your goals.",
                    icon: "fa-compass"
                },
                {
                    number: "02",
                    title: "Learn by Doing",
                    desc: "Engage with interactive video courses, hands-on projects, and practical assignments.",
                    icon: "fa-laptop-code"
                },
                {
                    number: "03",
                    title: "Earn Credentials",
                    desc: "Get certified upon completion and share your achievements with prospective employers.",
                    icon: "fa-certificate"
                }
            ];

            return (
                <section className="py-24 bg-surface-900 text-white relative">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl font-display font-bold mb-4">How LearnPath Works</h2>
                            <p className="text-surface-400 text-lg">Your journey to mastery in 3 simple steps.</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-12 relative">
                            {/* Connecting line for desktop */}
                            <div className="hidden md:block absolute top-[4rem] left-1/6 right-1/6 h-0.5 bg-gradient-to-r from-primary-500/0 via-primary-500/50 to-primary-500/0"></div>

                            {steps.map((step, idx) => (
                                <div key={idx} className="relative flex flex-col items-center text-center group">
                                    <div className="w-24 h-24 bg-surface-800 rounded-full flex items-center justify-center border-4 border-surface-900 shadow-xl mb-8 relative z-10 group-hover:bg-primary-600 transition-colors duration-500">
                                        <i className={`fas ${step.icon} text-3xl text-primary-400 group-hover:text-white transition-colors duration-500`}></i>
                                        <div className="absolute -top-3 -right-3 w-8 h-8 rounded-full bg-primary-500 text-white font-bold flex items-center justify-center text-sm shadow-lg">
                                            {step.number}
                                        </div>
                                    </div>
                                    <h3 className="text-xl font-bold mb-3">{step.title}</h3>
                                    <p className="text-surface-400 leading-relaxed max-w-sm">{step.desc}</p>
                                </div>
                            ))}
                        </div>

                        <div className="mt-20 text-center">
                            <Button variant="primary" className="px-8 py-4 text-lg rounded-full shadow-primary-500/25">Join LearnPath Today</Button>
                        </div>
                    </div>
                </section>
            );
        };

        const Homepage = () => (
            <div className="flex flex-col min-h-screen">
                <Header />
                <main className="flex-grow">
                    <Hero />
                    <SocialProof />
                    <Categories />
                    <FeaturedCourses />
                    <HowItWorks />
                </main>
                <Footer />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Homepage />);
    </script>
</body>

</html>
