                                <form className="space-y-6" onSubmit={e => e.preventDefault()}>

                                    </div>
                                    <div>
                                        <label className="block font-inter text-sm mb-2 text-gray-300">Password</label>
                                        <input type="password" placeholder="••••••••" className="w-full px-4 py-3 bg-slate-800 border border-slate-700 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 font-inter text-white transition-colors" />
                                    </div>

                                        <label htmlFor="terms" className="font-inter text-xs text-gray-400">I agree to the <a href="#" className="underline hover:text-white">Terms of Service</a> and <a href="#" className="underline hover:text-white">Privacy Policy</a>.</label>

                                </form>
                                <p className="text-center font-inter text-sm text-gray-500 mt-8">

                        </div>

                    </main>

                    <Footer />

            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SubscriptionPage />);
    </script>
