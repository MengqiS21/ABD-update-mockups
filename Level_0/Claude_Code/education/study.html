                            <p className={`text-xs font-medium leading-tight ${isActive ? 'text-indigo-300' : lesson.completed ? 'text-slate-400' : 'text-slate-300'}`}>{lesson.title}</p>
                            <p className="text-xs text-slate-600 mt-0.5">{lesson.duration}</p>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            ))}
          </div>
          <div className="p-4 border-t border-slate-800">
            <a href="course-detail.html" className="block w-full text-center text-xs font-medium text-slate-400 hover:text-white py-2 rounded-lg hover:bg-slate-800 transition-colors">← Back to Course Overview</a>
          </div>
        </div>
      </div>

      {/* Mobile Bottom Nav */}
      <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-slate-950 border-t border-slate-800 flex">
        {[['overview','Overview'],['notes','Notes'],['qa','Q&A'],['resources','Files']].map(([id, label]) => (
          <button key={id} onClick={() => setActiveTab(id)}
            className={`flex-1 py-3 text-xs font-medium transition-colors ${activeTab===id ? 'text-indigo-400' : 'text-slate-500'}`}
          >{label}</button>
        ))}
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
