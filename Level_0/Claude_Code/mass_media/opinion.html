<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opinion — The Meridian</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { serif: ['Playfair Display', 'Georgia', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    };
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .font-serif { font-family: 'Playfair Display', Georgia, serif; }
  </style>
</head>
<body class="bg-white text-gray-900">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function Header() {
  return (
    <header className="bg-slate-900 text-white">
      <div className="border-b border-slate-700">
        <div className="max-w-7xl mx-auto px-4 flex items-center justify-between h-9 text-xs text-slate-400">
          <span>Monday, March 16, 2026</span>
          <div className="flex gap-5">
            <a href="#" className="hover:text-white">Sign In</a>
            <a href="subscribe.html" className="hover:text-white">Subscribe</a>
          </div>
        </div>
      </div>
      <div className="max-w-7xl mx-auto px-4 py-5 flex items-center justify-between">
        <a href="index.html" className="font-serif text-4xl font-black tracking-tight text-white hover:text-slate-200">The Meridian</a>
        <a href="subscribe.html" className="hidden md:block bg-red-700 hover:bg-red-600 text-white text-sm font-semibold px-5 py-2 transition-colors">Subscribe</a>
      </div>
      <nav className="border-t border-slate-700">
        <div className="max-w-7xl mx-auto px-4">
          <ul className="hidden md:flex">
            {[['World', 'world.html'], ['Politics', '#'], ['Technology', '#'], ['Culture', '#'], ['Opinion', 'opinion.html', true], ['Video', '#']].map(([l, h, a]) => (
              <li key={l}><a href={h} className={`block px-4 py-3 text-sm font-medium tracking-wide uppercase transition-colors ${a ? 'text-white border-b-2 border-red-600' : 'text-slate-300 hover:text-white hover:bg-slate-800'}`}>{l}</a></li>
            ))}
          </ul>
        </div>
      </nav>
    </header>
  );
}

const COLUMNISTS = [
  {
    name: 'Isabel Vance',
    role: 'Senior Correspondent',
    seed: 'op1',
    pieces: [
      { title: 'The Internet Has Already Ended. We\'re Just Living In the Ruins.', date: 'March 15', excerpt: 'The attention economy didn\'t collapse — it calcified. What we have now is something worse: infinite scroll with no memory, no consequence, no continuity.', featured: true },
      { title: 'Why We Stopped Believing the Platforms', date: 'March 8' },
      { title: 'Elon\'s Endgame and the Myth of the Open Web', date: 'Feb 28' },
    ],
  },
  {
    name: 'Dr. Kwame Boateng',
    role: 'Contributing Editor',
    seed: 'op2',
    pieces: [
      { title: 'Africa Is Not a Problem to Be Solved. It\'s a Story Being Told Wrong.', date: 'March 14', excerpt: 'Western media coverage continues to flatten a continent of 54 nations, 1.4 billion people, and incalculable complexity into a single narrative of catastrophe and dependency.', featured: true },
      { title: 'The New Scramble: China, the West, and African Sovereignty', date: 'March 6' },
      { title: 'Why Nigeria\'s Tech Diaspora Is Coming Home', date: 'Feb 21' },
    ],
  },
  {
    name: 'Nadia Petrov',
    role: 'Foreign Affairs Editor',
    seed: 'op3',
    pieces: [
      { title: 'Why the West\'s Ukraine Fatigue Is a Gift to Putin', date: 'March 13', excerpt: 'Public opinion is shifting, aid is slowing, and Kyiv\'s partners are quietly looking for exit ramps. Moscow has always played the long game. Now it\'s winning it.', featured: true },
      { title: 'The Postwar Order That Never Quite Was', date: 'March 5' },
      { title: 'How Hungary Became NATO\'s Open Wound', date: 'Feb 18' },
    ],
  },
  {
    name: 'Marcus Bell',
    role: 'Culture Critic',
    seed: 'op4',
    pieces: [
      { title: 'The Novel Is Dead. Long Live the Novel.', date: 'March 12', excerpt: 'The publishing industry declared crisis again this year. But the most ambitious literary fiction is thriving — just not in bookstores.', featured: false },
      { title: 'Streaming\'s Identity Crisis', date: 'March 3' },
      { title: 'Why Cinema Keeps Returning to the 1970s', date: 'Feb 14' },
    ],
  },
];

const LETTERS = [
  { name: 'A. Hartley, Edinburgh', subject: 'On the Red Sea piece', text: 'Osei\'s reporting cuts through the noise better than anything I\'ve read elsewhere. The context around insurance markets was revelatory. This is why I subscribe.' },
  { name: 'J. Mensah, Accra', subject: 'Response to Dr. Boateng', text: 'I appreciate the piece, but the framing still centres Western perception as the problem to be corrected. African readers don\'t need to be told our story is complex. We live it.' },
  { name: 'K. Lindström, Stockholm', subject: 'Ukraine fatigue column', text: 'Petrov is right that fatigue is real, but wrong about why. Europeans are not indifferent to Ukraine — we\'re terrified. And terror does not sustain political will.' },
];

function FeaturedEssay() {
  const c = COLUMNISTS[0];
  const p = c.pieces[0];
  return (
    <section className="max-w-7xl mx-auto px-4 py-12 border-b border-gray-200">
      <div className="grid grid-cols-1 lg:grid-cols-5 gap-10">
        <div className="lg:col-span-3">
          <p className="text-red-700 text-xs font-black tracking-widest uppercase mb-4">Featured Essay</p>
          <div className="flex items-center gap-4 mb-6">
            <img src={`https://picsum.photos/seed/${c.seed}-av/120/120`} alt={c.name} className="w-16 h-16 rounded-full object-cover" />
            <div>
              <div className="font-serif text-xl font-bold text-gray-900">{c.name}</div>
              <div className="text-sm text-gray-500">{c.role}</div>
            </div>
          </div>
          <h2 className="font-serif text-3xl md:text-4xl font-black leading-tight mb-5 text-gray-950">{p.title}</h2>
          <p className="text-gray-600 text-lg leading-relaxed mb-6">{p.excerpt}</p>
          <a href="article.html" className="inline-flex items-center gap-2 text-red-700 font-semibold text-sm hover:text-red-900 transition-colors">
            Read the full essay →
          </a>
          <p className="text-gray-400 text-xs mt-4">{p.date} · 12 min read</p>
        </div>
        <div className="lg:col-span-2 overflow-hidden">
          <img src={`https://picsum.photos/seed/feat-essay/700/520`} alt="" className="w-full h-72 lg:h-full object-cover" />
        </div>
      </div>
    </section>
  );
}

function ColumnistSection({ columnist }) {
  return (
    <div className="border-b border-gray-200 py-8">
      <div className="flex items-center gap-4 mb-5">
        <img src={`https://picsum.photos/seed/${columnist.seed}-av/100/100`} alt={columnist.name} className="w-12 h-12 rounded-full object-cover" />
        <div>
          <div className="font-serif text-lg font-bold text-gray-900">{columnist.name}</div>
          <div className="text-xs text-gray-500">{columnist.role}</div>
        </div>
        <a href="article.html" className="ml-auto text-xs text-gray-500 hover:text-red-700 font-semibold transition-colors">All columns →</a>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
        {columnist.pieces.map((p, i) => (
          <a href="article.html" key={i} className={`group ${i === 0 ? 'md:col-span-2 flex gap-5' : 'flex gap-4'}`}>
            {i === 0 && (
              <div className="shrink-0 overflow-hidden w-40 h-28">
                <img src={`https://picsum.photos/seed/${columnist.seed}-p${i}/400/280`} alt="" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
              </div>
            )}
            <div className={i !== 0 ? 'flex gap-3' : ''}>
              {i !== 0 && (
                <div className="shrink-0 overflow-hidden w-20 h-16">
                  <img src={`https://picsum.photos/seed/${columnist.seed}-p${i}/200/160`} alt="" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                </div>
              )}
              <div>
                <h4 className={`font-serif font-bold leading-snug group-hover:text-slate-600 transition-colors ${i === 0 ? 'text-lg' : 'text-sm'}`}>{p.title}</h4>
                {i === 0 && p.excerpt && <p className="text-gray-500 text-sm mt-1 leading-relaxed line-clamp-2">{p.excerpt}</p>}
                <p className="text-gray-400 text-xs mt-1">{p.date}</p>
              </div>
            </div>
          </a>
        ))}
      </div>
    </div>
  );
}

function LettersSection() {
  return (
    <section className="bg-amber-50 border border-amber-200 p-8 rounded-sm">
      <div className="border-b-2 border-amber-800 pb-2 mb-6">
        <h2 className="font-serif text-2xl font-bold text-amber-900">Letters to the Editor</h2>
        <p className="text-amber-700 text-sm mt-1">A selection of reader correspondence. Letters are edited for length and clarity.</p>
      </div>
      <div className="space-y-6">
        {LETTERS.map((l, i) => (
          <div key={i} className="border-b border-amber-200 pb-6 last:border-0">
            <p className="font-semibold text-sm text-gray-900 mb-0.5">{l.subject}</p>
            <p className="text-gray-600 text-sm leading-relaxed mb-2 italic">"{l.text}"</p>
            <p className="text-amber-800 text-xs font-semibold">— {l.name}</p>
          </div>
        ))}
      </div>
      <a href="#" className="inline-block mt-6 text-xs font-semibold text-amber-800 border-b border-amber-800 hover:text-amber-900 transition-colors">Submit a letter →</a>
    </section>
  );
}

function Footer() {
  return (
    <footer className="bg-slate-950 text-slate-400 py-8 mt-0">
      <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4">
        <a href="index.html" className="font-serif text-2xl font-black text-white">The Meridian</a>
        <div className="flex gap-6 text-xs">
          {['Home', 'World', 'Opinion', 'Subscribe'].map(l => (
            <a key={l} href={l === 'Home' ? 'index.html' : l === 'World' ? 'world.html' : l === 'Subscribe' ? 'subscribe.html' : '#'} className="hover:text-white transition-colors">{l}</a>
          ))}
        </div>
        <p className="text-xs text-slate-600">© 2026 The Meridian Media Group</p>
      </div>
    </footer>
  );
}

function App() {
  return (
    <>
      <Header />
      {/* Section header */}
      <div className="bg-slate-50 border-b border-gray-200">
        <div className="max-w-7xl mx-auto px-4 py-10">
          <p className="text-red-700 text-xs font-black tracking-widest uppercase mb-2">Section</p>
          <h1 className="font-serif text-5xl font-black text-slate-900 leading-none">Opinion</h1>
          <p className="text-gray-500 mt-3 max-w-lg text-sm leading-relaxed">
            Argument, analysis, and dissent from The Meridian's columnists, contributors, and readers. Opinions expressed are the author's own.
          </p>
        </div>
      </div>

      <FeaturedEssay />

      <div className="max-w-7xl mx-auto px-4 py-8">
        <div className="grid grid-cols-1 lg:grid-cols-4 gap-10">
          <main className="lg:col-span-3">
            {/* All columnists */}
            <div className="border-b-2 border-slate-900 pb-2 mb-2">
              <h2 className="font-serif text-xl font-bold">Our Columnists</h2>
            </div>
            {COLUMNISTS.map((c, i) => (
              <ColumnistSection key={i} columnist={c} />
            ))}

            {/* Recent opinions */}
            <div className="mt-10">
              <div className="border-b-2 border-slate-900 pb-2 mb-6">
                <h2 className="font-serif text-xl font-bold">Recent Essays</h2>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                {[
                  { title: 'The Quiet Case for Mandatory Voting', author: 'James Whitfield', cat: 'Politics', seed: 're1', date: 'March 11' },
                  { title: 'Climate Finance Isn\'t Charity — It\'s Insurance', author: 'Dr. Clara Obi', cat: 'Environment', seed: 're2', date: 'March 10' },
                  { title: 'What the SAT\'s Comeback Tells Us About Education Reform', author: 'Sofia Mercer', cat: 'Education', seed: 're3', date: 'March 9' },
                  { title: 'The Case Against Techno-Optimism', author: 'Raj Patel', cat: 'Technology', seed: 're4', date: 'March 7' },
                ].map((o, i) => (
                  <a href="article.html" key={i} className="group flex gap-4">
                    <div className="shrink-0 overflow-hidden w-28 h-20">
                      <img src={`https://picsum.photos/seed/${o.seed}/300/200`} alt="" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                    </div>
                    <div>
                      <span className="text-red-700 text-xs font-black tracking-widest uppercase">{o.cat}</span>
                      <h3 className="font-serif text-sm font-semibold leading-snug mt-1 group-hover:text-slate-600 transition-colors">{o.title}</h3>
                      <p className="text-gray-400 text-xs mt-1">{o.author} · {o.date}</p>
                    </div>
                  </a>
                ))}
              </div>
            </div>
          </main>

          {/* Sidebar */}
          <aside className="border-l border-gray-100 pl-8">
            <div className="mb-10">
              <div className="border-b-2 border-slate-900 pb-2 mb-5">
                <h3 className="font-serif text-base font-bold">Columnists</h3>
              </div>
              {COLUMNISTS.map((c, i) => (
                <div key={i} className="flex items-center gap-3 mb-4 last:mb-0 group cursor-pointer">
                  <img src={`https://picsum.photos/seed/${c.seed}-av/80/80`} alt={c.name} className="w-10 h-10 rounded-full object-cover" />
                  <div>
                    <p className="font-semibold text-sm text-gray-900 group-hover:text-red-700 transition-colors">{c.name}</p>
                    <p className="text-xs text-gray-500">{c.role}</p>
                  </div>
                </div>
              ))}
            </div>

            <div className="mb-8">
              <div className="border-b-2 border-slate-900 pb-2 mb-5">
                <h3 className="font-serif text-base font-bold">Most Debated</h3>
              </div>
              {[
                'Should the US Maintain a Military Presence in the Red Sea?',
                'Is the Two-State Solution Finally Dead?',
                'Regulating AI: Washington\'s Moment to Lead',
                'Does the BBC Still Matter?',
              ].map((t, i) => (
                <a href="article.html" key={i} className="flex gap-3 mb-4 last:mb-0 group items-start">
                  <span className="font-serif text-2xl font-black text-gray-200 leading-none shrink-0 group-hover:text-red-700 transition-colors">{i + 1}</span>
                  <span className="font-serif text-sm font-semibold leading-snug group-hover:text-slate-600 transition-colors">{t}</span>
                </a>
              ))}
            </div>

            {/* Letters teaser */}
            <div className="bg-amber-50 border border-amber-200 p-5">
              <h4 className="font-serif text-base font-bold text-amber-900 mb-2">Write to Us</h4>
              <p className="text-xs text-amber-700 mb-3 leading-relaxed">Have a response to something you read in The Meridian? We publish a selection each week.</p>
              <a href="#" className="block text-center bg-amber-800 hover:bg-amber-700 text-white text-xs font-semibold py-2 transition-colors">Submit a Letter</a>
            </div>
          </aside>
        </div>
      </div>

      {/* Letters section */}
      <div className="max-w-7xl mx-auto px-4 pb-12">
        <LettersSection />
      </div>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
