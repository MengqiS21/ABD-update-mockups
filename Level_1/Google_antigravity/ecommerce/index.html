                                        className="flex-1 min-w-0 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                                        required
                                    />
                                    <button 
                                        type="submit" 
                                        className="bg-primary text-white px-6 py-3 rounded-lg font-semibold shadow hover:bg-primaryDark focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-colors whitespace-nowrap"
                                    >
                                        Join Now
                                    </button>
                                </form>
                            </div>
                            <div className="hidden md:flex w-1/3 justify-center text-primary opacity-20">
                                <i data-lucide="award" className="w-32 h-32"></i>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const App = () => {
            // Initialize Lucide icons on mount
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow">
                        <HomePage />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
