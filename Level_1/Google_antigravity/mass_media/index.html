<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meridian | Global Affairs, Politics, Tech & Culture</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Libre Baskerville', 'serif'],
                    },
                    colors: {
                        meridian: {
                            50: '#fdfdfc',
                            100: '#f6f7f9',
                            800: '#1a1d24',
                            900: '#0f1115',
                            accent: '#d92323', // Red accent
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfdfc;
            color: #1a1d24;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .font-serif {
            font-family: 'Libre Baskerville', serif;
        }

        .focus-visible-outline:focus-visible {
            outline: 2px solid #d92323;
            outline-offset: 2px;
        }

        .hero-image-overlay {
            background: linear-gradient(to top, rgba(15, 17, 21, 0.9) 0%, rgba(15, 17, 21, 0.4) 50%, rgba(15, 17, 21, 0) 100%);
        }

        /* Skip to content link for accessibility */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #d92323;
            color: white;
            padding: 8px;
            z-index: 100;
            transition: top 0.2s;
        }

        .skip-link:focus {
            top: 0;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        // --- SHARED COMPONENTS ---

        const NavLink = ({ href, children, isCurrent, className = "" }) => (
            <a
                href={href}
                className={`text-sm font-semibold tracking-wide uppercase transition-colors focus-visible-outline rounded-sm px-1 ${isCurrent ? 'text-meridian-accent border-b-2 border-meridian-accent pb-1' : 'text-meridian-800 hover:text-meridian-accent'} ${className}`}
                aria-current={isCurrent ? "page" : undefined}
            >
                {children}
            </a>
        );

        const Header = ({ currentPage }) => {
            const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);

            return (
                <header className="border-b border-gray-200 sticky top-0 bg-white z-50 shadow-sm relative">
                    <a href="#main-content" className="skip-link font-sans font-medium">Skip to main content</a>

                    {/* Top Bar for utility/login */}
                    <div className="bg-meridian-900 text-white text-xs py-1.5 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
                        <div className="flex space-x-4">
                            <span className="opacity-80"><i className="fas fa-sun mr-1"></i> Washington, 72°</span>
                            <span className="hidden sm:inline opacity-80">{new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
                        </div>
                        <div className="flex space-x-4">
                            <a href="subscription.html" className="font-semibold text-white hover:text-gray-300 focus-visible-outline">Subscribe</a>
                            <button className="opacity-80 hover:opacity-100 focus-visible-outline">Sign In</button>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-20 sm:h-24">
                            {/* Mobile menu button */}
                            <div className="flex items-center lg:hidden">
                                <button
                                    onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                                    className="p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-meridian-accent"
                                    aria-expanded={mobileMenuOpen}
                                    aria-label="Open menu"
                                >
                                    <i className={`fas ${mobileMenuOpen ? 'fa-times' : 'fa-bars'} text-xl`}></i>
                                </button>
                            </div>

                            {/* Logo */}
                            <div className="flex-shrink-0 flex items-center justify-center lg:justify-start w-full lg:w-auto">
                                <a href="index.html" className="focus-visible-outline" aria-label="The Meridian Home">
                                    <h1 className="font-serif text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight text-meridian-900 leading-none">
                                        The Meridian
                                    </h1>
                                </a>
                            </div>

                            {/* Search and Extra Actions */}
                            <div className="hidden lg:flex items-center space-x-4">
                                <div className="relative">
                                    <input
                                        type="text"
                                        placeholder="Search articles..."
                                        aria-label="Search"
                                        className="w-48 xl:w-64 bg-gray-100 border-transparent focus:bg-white focus:border-meridian-accent focus:ring-2 focus:ring-meridian-accent text-sm rounded-full py-2 px-4 shadow-sm transition-all focus-visible-outline"
                                    />
                                    <i className="fas fa-search absolute right-3 top-2.5 text-gray-400"></i>
                                </div>
                                <a
                                    href="subscription.html"
                                    className="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-sm shadow-sm text-white bg-meridian-accent hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-meridian-accent transition"
                                >
                                    Subscribe Now
                                </a>
                            </div>
                        </div>
                    </div>

                    {/* Primary Desktop Navigation */}
                    <nav aria-label="Primary" className="hidden lg:block border-t border-gray-100 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-center space-x-8 py-4">
                                <NavLink href="index.html" isCurrent={currentPage === 'home'}>Home</NavLink>
                                <NavLink href="category.html" isCurrent={currentPage === 'world'}>World</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'politics'}>Politics</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'tech'}>Tech</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'culture'}>Culture</NavLink>
                                <NavLink href="opinion.html" isCurrent={currentPage === 'opinion'}>Opinion</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'science'}>Science</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'health'}>Health</NavLink>
                            </div>
                        </div>
                    </nav>

                    {/* Mobile Menu Dropdown */}
                    {mobileMenuOpen && (
                        <div className="lg:hidden bg-white border-t border-gray-200 shadow-lg absolute w-full">
                            <nav className="px-2 pt-2 pb-4 space-y-1 sm:px-3" aria-label="Mobile Navigation">
                                <a href="index.html" className="block px-3 py-2 rounded-md text-base font-medium font-serif text-gray-900 hover:bg-gray-50 focus-visible-outline">Home</a>
                                <a href="category.html" className="block px-3 py-2 rounded-md text-base font-medium font-serif text-gray-900 hover:bg-gray-50 focus-visible-outline">World</a>
                                <a href="#" className="block px-3 py-2 rounded-md text-base font-medium font-serif text-gray-900 hover:bg-gray-50 focus-visible-outline">Politics</a>
                                <a href="#" className="block px-3 py-2 rounded-md text-base font-medium font-serif text-gray-900 hover:bg-gray-50 focus-visible-outline">Tech</a>
                                <a href="#" className="block px-3 py-2 rounded-md text-base font-medium font-serif text-gray-900 hover:bg-gray-50 focus-visible-outline">Culture</a>
                                <a href="opinion.html" className="block px-3 py-2 rounded-md text-base font-medium font-serif text-gray-900 hover:bg-gray-50 focus-visible-outline">Opinion</a>
                            </nav>
                        </div>
                    )}
                </header>
            );
        };

        const Footer = () => (
            <footer className="bg-meridian-900 text-white mt-auto pt-16 pb-8 border-t-4 border-meridian-accent" aria-labelledby="footer-heading">
                <h2 id="footer-heading" className="sr-only">Footer</h2>
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12 border-b border-gray-700 pb-12">
                        <div className="md:col-span-1">
                            <h3 className="font-serif text-2xl font-bold mb-4">The Meridian</h3>
                            <p className="text-gray-400 text-sm mb-6 leading-relaxed">
                                Independent journalism for a complex world. We bring you the stories that matter, with depth, context, and clarity.
                            </p>
                            <div className="flex space-x-4">
                                <a href="#" aria-label="Twitter" className="text-gray-400 hover:text-white transition-colors focus-visible-outline"><i className="fab fa-twitter text-lg"></i></a>
                                <a href="#" aria-label="Facebook" className="text-gray-400 hover:text-white transition-colors focus-visible-outline"><i className="fab fa-facebook text-lg"></i></a>
                                <a href="#" aria-label="Instagram" className="text-gray-400 hover:text-white transition-colors focus-visible-outline"><i className="fab fa-instagram text-lg"></i></a>
                                <a href="#" aria-label="LinkedIn" className="text-gray-400 hover:text-white transition-colors focus-visible-outline"><i className="fab fa-linkedin text-lg"></i></a>
                            </div>
                        </div>

                        <div>
                            <h4 className="font-serif font-bold text-lg mb-4 text-gray-200">Sections</h4>
                            <ul className="space-y-2 text-sm text-gray-400">
                                <li><a href="category.html" className="hover:text-white focus-visible-outline">World</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Politics</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Technology</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Culture</a></li>
                                <li><a href="opinion.html" className="hover:text-white focus-visible-outline">Opinion</a></li>
                            </ul>
                        </div>

                        <div>
                            <h4 className="font-serif font-bold text-lg mb-4 text-gray-200">Company</h4>
                            <ul className="space-y-2 text-sm text-gray-400">
                                <li><a href="#" className="hover:text-white focus-visible-outline">About Us</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Careers</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Journalistic Ethics</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Contact Us</a></li>
                            </ul>
                        </div>

                        <div>
                            <h4 className="font-serif font-bold text-lg mb-4 text-gray-200">The Meridian Newsletter</h4>
                            <p className="text-gray-400 text-sm mb-4">Get the day's essential stories delivered directly to your inbox.</p>
                            <form className="flex" aria-label="Newsletter signup">
                                <label htmlFor="newsletter-email" className="sr-only">Email address</label>
                                <input
                                    id="newsletter-email"
                                    type="email"
                                    placeholder="Your email address"
                                    className="px-4 py-2 bg-gray-800 text-white border border-gray-700 rounded-l-sm focus:outline-none focus:ring-1 focus:ring-meridian-accent focus:border-meridian-accent w-full text-sm placeholder-gray-500"
                                    required
                                />
                                <button
                                    type="submit"
                                    className="bg-meridian-accent hover:bg-red-700 text-white px-4 py-2 rounded-r-sm text-sm font-medium focus-visible-outline transition"
                                >
                                    Sign Up
                                </button>
                            </form>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row justify-between items-center text-sm text-gray-500">
                        <p>&copy; {new Date().getFullYear()} The Meridian Media Company. All rights reserved.</p>
                        <div className="flex space-x-6 mt-4 md:mt-0">
                            <a href="#" className="hover:text-white focus-visible-outline">Privacy Policy</a>
                            <a href="#" className="hover:text-white focus-visible-outline">Terms of Service</a>
                            <a href="#" className="hover:text-white focus-visible-outline">Cookie Settings</a>
                            <a href="#" className="hover:text-white focus-visible-outline">Accessibility</a>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const BreakingNews = () => (
            <div className="bg-meridian-accent text-white py-2 px-4 sm:px-6 lg:px-8 relative overflow-hidden flex items-center shadow-md">
                <span className="font-bold text-xs uppercase tracking-widest mr-4 bg-white text-meridian-accent px-2 py-1 rounded-sm shadow-sm flex-shrink-0">Breaking</span>
                <p className="text-sm font-medium truncate flex-grow">
                    <a href="article.html" className="hover:underline focus-visible-outline">UN Emergency Session Called Over Escalating Red Sea Tensions Amid Supply Chain Fears.</a>
                </p>
                <button className="text-white hover:text-gray-200 ml-4 focus-visible-outline" aria-label="Close breaking news banner">
                    <i className="fas fa-times"></i>
                </button>
            </div>
        );

        // --- HOMEPAGE COMPONENTS ---

        const HeroStory = () => (
            <article className="relative group cursor-pointer mb-8 md:mb-12 rounded-sm overflow-hidden shadow-sm" aria-labelledby="hero-title">
                <div className="aspect-w-16 aspect-h-9 md:aspect-h-7 lg:aspect-h-6 w-full relative">
                    <img
                        src="https://images.unsplash.com/photo-1541339907198-e08756dedf3f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80"
                        alt="Delegates seated in a large United Nations assembly hall during an emergency session"
                        className="object-cover w-full h-[60vh] lg:h-[70vh] group-hover:scale-105 transition-transform duration-700 ease-out"
                    />
                    <div className="absolute inset-0 hero-image-overlay"></div>
                </div>
                <div className="absolute bottom-0 left-0 w-full p-6 md:p-10 lg:p-12 z-10 flex flex-col justify-end h-full">
                    <div className="max-w-3xl">
                        <span className="text-meridian-accent font-bold text-xs md:text-sm uppercase tracking-wider mb-2 md:mb-4 block drop-shadow-md">World News</span>
                        <a href="article.html" className="focus-visible-outline block">
                            <h2 id="hero-title" className="text-white font-serif text-3xl md:text-5xl lg:text-6xl font-bold leading-tight mb-4 group-hover:text-gray-200 transition-colors drop-shadow-xl">
                                Historic Summit Fails to Reach Consensus on Climate Finance Targets
                            </h2>
                        </a>
                        <p className="text-gray-200 text-base md:text-xl hidden sm:block mb-6 font-medium leading-relaxed drop-shadow-md">
                            Negotiations break down as developing nations reject the proposed $100 Billion annual framework, demanding more structural commitments from industrialized economies.
                        </p>
                        <div className="flex items-center text-gray-300 text-sm font-medium">
                            <span>By <strong className="text-white">Elena Rodriguez</strong></span>
                            <span className="mx-2">&bull;</span>
                            <span>4 hrs ago</span>
                        </div>
                    </div>
                </div>
            </article>
        );

        const StoryCard = ({ category, title, summary, author, time, image, isLarge = false, href = "article.html" }) => (
            <article className="group flex flex-col h-full bg-white rounded-sm border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                {image && (
                    <div className="aspect-w-16 aspect-h-9 overflow-hidden rounded-t-sm">
                        <a href={href} aria-hidden="true" tabIndex="-1">
                            <img src={image} alt={`Thumbnail for ${title}`} className="object-cover w-full h-48 md:h-56 group-hover:scale-105 transition-transform duration-500 ease-in-out" />
                        </a>
                    </div>
                )}
                <div className="flex flex-col flex-grow p-5">
                    <span className="text-meridian-accent font-bold text-xs uppercase tracking-wide mb-2">{category}</span>
                    <a href={href} className="focus-visible-outline mb-3 group">
                        <h3 className={`font-serif font-bold text-meridian-900 group-hover:text-meridian-accent transition-colors ${isLarge ? 'text-2xl pt-1' : 'text-xl leading-snug'}`}>
                            {title}
                        </h3>
                    </a>
                    {summary && <p className="text-gray-600 text-sm mb-4 line-clamp-3 leading-relaxed flex-grow">{summary}</p>}
                    <div className="flex items-center text-gray-500 text-xs mt-auto pt-4 border-t border-gray-100">
                        {author && <span>{author}</span>}
                        {author && time && <span className="mx-2">&bull;</span>}
                        {time && <span>{time}</span>}
                    </div>
                </div>
            </article>
        );

        const ListStory = ({ category, title, time, index }) => (
            <article className={`py-4 ${index !== 0 ? 'border-t border-gray-100' : ''}`}>
                <span className="text-meridian-accent font-bold text-[10px] uppercase tracking-wider mb-1 block">{category}</span>
                <a href="article.html" className="focus-visible-outline block group">
                    <h3 className="font-serif font-bold text-base text-meridian-900 leading-snug mb-2 group-hover:text-meridian-accent transition-colors">
                        {title}
                    </h3>
                </a>
                <span className="text-gray-500 text-xs">{time}</span>
            </article>
        );

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    <Header currentPage="home" />
                    <BreakingNews />

                    <main id="main-content" className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full" tabIndex="-1">
                        <HeroStory />

                        {/* Top Story Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8 mb-16">
                            <div className="md:col-span-2 lg:col-span-3">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    <StoryCard
                                        category="Politics"
                                        title="Supreme Court to Rule on Digital Data Privacy Act Next Week"
                                        author="Marcus Johnson"
                                        time="2 hrs ago"
                                        image="https://images.unsplash.com/photo-1589829085413-56de8ae18c73?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80"
                                    />
                                    <StoryCard
                                        category="Technology"
                                        title="Silicon Valley Pioneers Break Ranks on AI Regulation Debate"
                                        author="Sarah Chen"
                                        time="5 hrs ago"
                                        image="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80"
                                    />
                                    <StoryCard
                                        category="Economics"
                                        title="Central Bank Navigates Core Inflation Without Inducing Recession"
                                        author="David Brooks"
                                        time="8 hrs ago"
                                        image="https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80"
                                    />
                                </div>
                            </div>

                            {/* "Most Read" Sidebar */}
                            <aside className="bg-white p-6 border border-gray-200 rounded-sm shadow-sm" aria-labelledby="most-read-heading">
                                <h2 id="most-read-heading" className="font-sans font-bold text-sm uppercase tracking-widest text-meridian-900 border-b-2 border-meridian-900 pb-2 mb-4">Most Read</h2>
                                <div className="space-y-1 relative">
                                    <ListStory category="Science" title="Astronomers Detect Anomalous Radio Signatures from Proxima Centauri" time="10 hrs ago" index={0} />
                                    <ListStory category="Culture" title="The Quiet Resurgence of Indie Bookstores in the Post-Digital Age" time="1 day ago" index={1} />
                                    <ListStory category="World" title="Elections in France: Coalition Governments Face Crucial Vote" time="1 day ago" index={2} />
                                    <ListStory category="Health" title="New Study Links Sleep Quality Directly to Cognitive Longevity" time="2 days ago" index={3} />
                                    <ListStory category="Opinion" title="Opinion: The Illusion of Productive Leisure" time="3 days ago" index={4} />
                                </div>
                            </aside>
                        </div>

                        {/* Section Strip: Culture */}
                        <section aria-labelledby="culture-heading" className="mb-16 border-t border-gray-200 pt-8">
                            <div className="flex justify-between items-center mb-8">
                                <h2 id="culture-heading" className="font-serif text-3xl font-bold text-meridian-900 flex items-center">
                                    <span className="w-2 h-8 bg-meridian-accent mr-3 block"></span>
                                    Culture
                                </h2>
                                <a href="#" className="text-sm font-semibold text-meridian-accent hover:underline focus-visible-outline flex items-center">
                                    More in Culture <i className="fas fa-arrow-right ml-1"></i>
                                </a>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                <StoryCard
                                    category="Film"
                                    title="Auteur Cinema's Latest Masterpiece Explores Urban Isolation"
                                    author="Julian Varela"
                                    image="https://images.unsplash.com/photo-1485846234645-a62644f84728?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                />
                                <StoryCard
                                    category="Art"
                                    title="The Renaissance of Modernist Sculpture in European Galleries"
                                    author="Simone Dubois"
                                    image="https://images.unsplash.com/photo-1518998053901-5348d3961a04?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                />
                                <StoryCard
                                    category="Music"
                                    title="Jazz Festivals Return with Record Attendance and Acoustic Innovation"
                                    author="Thomas Reed"
                                    image="https://images.unsplash.com/photo-1511192336575-5a79af67a629?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                />
                                <StoryCard
                                    category="Books"
                                    title="'The Final Argument' Sweeps Literary Awards Season"
                                    author="Elena Rodriguez"
                                    image="https://images.unsplash.com/photo-1544947950-fa07a98d237f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                />
                            </div>
                        </section>

                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
