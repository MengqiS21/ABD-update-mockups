<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay a Bill — City of Lakewood</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f4f8',
                            100: '#d9e2ec',
                            200: '#bcccdc',
                            300: '#9fb3c8',
                            400: '#829ab1',
                            500: '#627d98',
                            600: '#486581',
                            700: '#334e68',
                            800: '#243b53',
                            900: '#102a43',
                            DEFAULT: '#243b53'
                        },
                        accent: {
                            DEFAULT: '#005a9c'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Merriweather', 'serif']
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for in-browser JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap');
    </style>
</head>

<body class="bg-gray-50 text-brand-900 font-sans min-h-screen flex flex-col antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // Icons Components
        const Icon = ({ name, size = 24, className = "" }) => {
            const [iconHtml, setIconHtml] = React.useState('');

            React.useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const iconNode = window.lucide.icons[name];
                    const svgString = `<svg class="lucide lucide-${name} ${className}" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconNode.map(([tag, attrs]) => {
                        const attrsString = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                        return `<${tag} ${attrsString}></${tag}>`;
                    }).join('')}</svg>`;
                    setIconHtml(svgString);
                }
            }, [name, size, className]);

            return <span dangerouslySetInnerHTML={{ __html: iconHtml }} />;
        };

        const Header = () => {
            return (
                <header className="bg-brand-900 text-white shadow-md sticky top-0 z-50">
                    <div className="bg-brand-800 text-sm py-2 px-4 border-b border-brand-700">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <Icon name="flag" size={16} className="text-gray-300" />
                                <span className="opacity-90">Official Website of the City of Lakewood</span>
                            </div>
                            <div className="flex space-x-4 text-xs">
                                <a href="#" className="hover:text-blue-300 transition-colors">Translate</a>
                                <a href="#" className="hover:text-blue-300 transition-colors">Accessibility</a>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 py-4">
                        <div className="flex justify-between items-center">
                            <a href="index.html" className="flex items-center space-x-3 group">
                                <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-accent font-bold text-xl group-hover:scale-105 transition-transform shadow-sm">
                                    L
                                </div>
                                <div>
                                    <div className="font-serif font-bold text-2xl tracking-tight leading-none text-white">Lakewood</div>
                                    <div className="text-xs text-brand-200 tracking-wider uppercase mt-1">Government Portal</div>
                                </div>
                            </a>

                            <div className="hidden md:flex items-center space-x-8">
                                <a href="services.html" className="font-medium hover:text-blue-300 transition-colors text-white py-2">Services</a>
                                <div className="space-x-1 flex group relative">
                                    <a href="permit-application.html" className="font-medium hover:text-blue-300 transition-colors text-white py-2">Permits & Licenses</a>
                                    <a href="pay-bill.html" className="font-medium text-blue-300 transition-colors py-2 border-b-2 border-blue-400">Pay Bills</a>
                                </div>
                                <a href="about.html" className="font-medium hover:text-blue-300 transition-colors text-white py-2">About</a>
                                <a href="contact.html" className="font-medium hover:text-blue-300 transition-colors text-white py-2">Contact</a>
                                <a href="#" className="ml-4 p-2 bg-brand-700 hover:bg-brand-600 rounded-full transition-colors text-white">
                                    <Icon name="search" size={20} />
                                </a>
                            </div>

                            <button className="md:hidden p-2 text-white">
                                <Icon name="menu" size={24} />
                            </button>
                        </div>
                    </div>
                </header>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-brand-900 text-brand-100 py-12 border-t-4 border-accent mt-auto">
                    <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-8">
                        <div>
                            <div className="flex items-center space-x-3 mb-6">
                                <div className="w-8 h-8 bg-white rounded-full flex items-center justify-center text-accent font-bold text-lg shadow-sm">L</div>
                                <span className="font-serif font-bold text-xl text-white">City of Lakewood</span>
                            </div>
                            <p className="text-sm text-brand-200 leading-relaxed mb-4">
                                Dedicated to transparency, public safety, and fostering a vibrant community for our 160,000 residents.
                            </p>
                            <div className="flex space-x-4">
                                <a href="#" className="text-brand-300 hover:text-white transition-colors"><Icon name="twitter" size={20} /></a>
                                <a href="#" className="text-brand-300 hover:text-white transition-colors"><Icon name="facebook" size={20} /></a>
                                <a href="#" className="text-brand-300 hover:text-white transition-colors"><Icon name="youtube" size={20} /></a>
                            </div>
                        </div>

                        <div>
                            <h3 className="text-white font-semibold mb-4 text-lg border-b border-brand-700 pb-2">Quick Links</h3>
                            <ul className="space-y-3 text-sm">
                                <li><a href="index.html" className="hover:text-white transition-colors flex items-center"><Icon name="chevron-right" size={14} className="mr-1" /> City Home</a></li>
                                <li><a href="services.html" className="hover:text-white transition-colors flex items-center"><Icon name="chevron-right" size={14} className="mr-1" /> Services Directory</a></li>
                                <li><a href="about.html" className="hover:text-white transition-colors flex items-center"><Icon name="chevron-right" size={14} className="mr-1" /> About Lakewood</a></li>
                                <li><a href="contact.html" className="hover:text-white transition-colors flex items-center"><Icon name="chevron-right" size={14} className="mr-1" /> Contact Us</a></li>
                            </ul>
                        </div>

                        <div>
                            <h3 className="text-white font-semibold mb-4 text-lg border-b border-brand-700 pb-2">Popular Services</h3>
                            <ul className="space-y-3 text-sm">
                                <li><a href="pay-bill.html" className="hover:text-white transition-colors flex items-center"><Icon name="chevron-right" size={14} className="mr-1" /> Pay Utility Bill</a></li>
                                <li><a href="permit-application.html" className="hover:text-white transition-colors flex items-center"><Icon name="chevron-right" size={14} className="mr-1" /> Apply for Permit</a></li>
                                <li><a href="#" className="hover:text-white transition-colors flex items-center"><Icon name="chevron-right" size={14} className="mr-1" /> Report an Issue</a></li>
                                <li><a href="#" className="hover:text-white transition-colors flex items-center"><Icon name="chevron-right" size={14} className="mr-1" /> Public Records Request</a></li>
                            </ul>
                        </div>

                        <div>
                            <h3 className="text-white font-semibold mb-4 text-lg border-b border-brand-700 pb-2">Contact</h3>
                            <ul className="space-y-4 text-sm">
                                <li className="flex items-start">
                                    <Icon name="map-pin" size={18} className="mr-2 text-brand-300 mt-0.5 shrink-0" />
                                    <span>Lakewood City Hall<br />100 Main Street<br />Lakewood, ST 12345</span>
                                </li>
                                <li className="flex items-center">
                                    <Icon name="phone" size={18} className="mr-2 text-brand-300 shrink-0" />
                                    <span>(555) 123-4567</span>
                                </li>
                                <li className="flex items-center">
                                    <Icon name="mail" size={18} className="mr-2 text-brand-300 shrink-0" />
                                    <a href="mailto:info@lakewood.gov" className="hover:text-white transition-colors">info@lakewood.gov</a>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 mt-12 pt-6 border-t border-brand-800 text-xs text-brand-300 flex flex-col md:flex-row justify-between items-center">
                        <p>&copy; 2026 City of Lakewood. All rights reserved.</p>
                        <div className="flex space-x-4 mt-4 md:mt-0">
                            <a href="#" className="hover:text-white">Privacy Policy</a>
                            <a href="#" className="hover:text-white">Terms of Use</a>
                            <a href="#" className="hover:text-white">Accessibility</a>
                        </div>
                    </div>
                </footer>
            );
        };

        const PayBillPage = () => {
            const [step, setStep] = React.useState(1); // 1: Lookup, 2: Balance/Pay, 3: Confirmation
            const [accountNumber, setAccountNumber] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);

            const handleLookup = (e) => {
                e.preventDefault();
                setIsLoading(true);
                // Simulate network request
                setTimeout(() => {
                    setIsLoading(false);
                    setStep(2);
                }, 1000);
            };

            const handlePayment = (e) => {
                e.preventDefault();
                setIsLoading(true);
                setTimeout(() => {
                    setIsLoading(false);
                    setStep(3);
                }, 1500);
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <Header />

                    <main className="flex-grow">
                        {/* Breadcrumbs */}
                        <div className="bg-white border-b border-gray-200">
                            <div className="max-w-4xl mx-auto px-4 py-3 flex items-center text-sm text-brand-500">
                                <a href="index.html" className="hover:text-accent transition-colors flex items-center"><Icon name="home" size={14} className="mr-1" /> Home</a>
                                <Icon name="chevron-right" size={14} className="mx-2" />
                                <a href="services.html" className="hover:text-accent transition-colors">Services</a>
                                <Icon name="chevron-right" size={14} className="mx-2" />
                                <span className="text-brand-900 font-medium">Utilities & Billing</span>
                            </div>
                        </div>

                        <div className="max-w-4xl mx-auto px-4 py-10">
                            <div className="flex items-center space-x-4 mb-8">
                                <div className="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-accent shrink-0">
                                    <Icon name="credit-card" size={24} />
                                </div>
                                <div>
                                    <h1 className="font-serif text-3xl font-bold text-brand-900">Pay a Utility Bill</h1>
                                    <p className="text-brand-600">Secure online payment portal for water, sewer, and trash collection services.</p>
                                </div>
                            </div>

                            {/* Payment Flow Container */}
                            <div className="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">

                                {/* Progress Steps indicator */}
                                <div className="bg-gray-50 border-b border-gray-200 px-6 py-4">
                                    <div className="flex items-center justify-between sm:justify-start sm:space-x-12">
                                        <div className={`flex items-center space-x-2 ${step >= 1 ? 'text-accent' : 'text-gray-400'}`}>
                                            <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${step >= 1 ? 'bg-accent text-white' : 'bg-gray-200 text-gray-500'}`}>1</div>
                                            <span className="font-semibold text-sm hidden sm:block">Find Account</span>
                                        </div>
                                        <div className={`hidden sm:block h-px w-12 ${step >= 2 ? 'bg-accent' : 'bg-gray-300'}`}></div>
                                        <div className={`flex items-center space-x-2 ${step >= 2 ? 'text-accent' : 'text-gray-400'}`}>
                                            <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${step >= 2 ? 'bg-accent text-white' : 'bg-gray-200 text-gray-500'}`}>2</div>
                                            <span className="font-semibold text-sm hidden sm:block">Payment Method</span>
                                        </div>
                                        <div className={`hidden sm:block h-px w-12 ${step >= 3 ? 'bg-accent' : 'bg-gray-300'}`}></div>
                                        <div className={`flex items-center space-x-2 ${step === 3 ? 'text-accent' : 'text-gray-400'}`}>
                                            <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${step === 3 ? 'bg-accent text-white' : 'bg-gray-200 text-gray-500'}`}>3</div>
                                            <span className="font-semibold text-sm hidden sm:block">Receipt</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-6 sm:p-10">

                                    {/* Step 1: Account Lookup */}
                                    {step === 1 && (
                                        <div className="max-w-md mx-auto">
                                            <h2 className="text-2xl font-bold text-brand-900 mb-6 text-center">Look Up Your Account</h2>

                                            <form onSubmit={handleLookup} className="space-y-6">
                                                <div>
                                                    <label className="block text-brand-700 font-medium mb-2">Account Number</label>
                                                    <div className="relative">
                                                        <input
                                                            type="text"
                                                            required
                                                            placeholder="e.g. 123456789-01"
                                                            value={accountNumber}
                                                            onChange={(e) => setAccountNumber(e.target.value)}
                                                            className="w-full pl-4 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-accent focus:border-accent text-lg"
                                                            disabled={isLoading}
                                                        />
                                                        <Icon name="search" className="absolute right-3 top-3.5 text-gray-400" size={20} />
                                                    </div>
                                                    <p className="text-xs text-brand-500 mt-2 flex items-center">
                                                        <Icon name="info" size={12} className="mr-1" />
                                                        You can find your account number at the top right of your printed bill.
                                                    </p>
                                                </div>

                                                <button
                                                    type="submit"
                                                    disabled={isLoading || !accountNumber}
                                                    className="w-full bg-accent hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium py-3 px-6 rounded-lg transition-colors flex justify-center items-center h-12"
                                                >
                                                    {isLoading ? (
                                                        <span className="flex items-center"><Icon name="loader-2" size={20} className="animate-spin mr-2" /> Searching...</span>
                                                    ) : (
                                                        "View Bill Balance"
                                                    )}
                                                </button>
                                            </form>
                                        </div>
                                    )}

                                    {/* Step 2: Pay Balance */}
                                    {step === 2 && (
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                            <div>
                                                <h2 className="text-xl font-bold text-brand-900 mb-6 border-b border-gray-100 pb-2 flex items-center"><Icon name="file-text" size={20} className="mr-2 text-accent" /> Current Balance</h2>

                                                <div className="bg-blue-50 border border-blue-100 rounded-xl p-6 mb-6">
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div>
                                                            <div className="text-brand-500 text-sm mb-1 uppercase tracking-wider font-semibold">Total Amount Due</div>
                                                            <div className="text-4xl font-bold text-brand-900">$184.50</div>
                                                        </div>
                                                        <div className="text-right">
                                                            <div className="text-brand-500 text-sm mb-1">Due Date</div>
                                                            <div className="font-semibold text-red-600">Nov 15, 2026</div>
                                                        </div>
                                                    </div>
                                                    <div className="text-sm text-brand-700 bg-white p-3 rounded-lg border border-blue-100 space-y-2">
                                                        <div className="flex justify-between"><span>Account Name:</span> <span className="font-semibold text-brand-900">Jane Doe</span></div>
                                                        <div className="flex justify-between"><span>Account Number:</span> <span className="font-mono">{accountNumber || "123456789-01"}</span></div>
                                                        <div className="flex justify-between"><span>Service Address:</span> <span>456 Maple St, Lakewood</span></div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div>
                                                <h2 className="text-xl font-bold text-brand-900 mb-6 border-b border-gray-100 pb-2 flex items-center"><Icon name="wallet" size={20} className="mr-2 text-accent" /> Payment Details</h2>

                                                <form onSubmit={handlePayment} className="space-y-6">
                                                    {/* Payment Method Tabs */}
                                                    <div className="flex bg-gray-100 p-1 rounded-lg">
                                                        <button type="button" className="w-1/2 bg-white text-brand-900 shadow-sm font-medium py-2 rounded-md transition-shadow">Credit Card</button>
                                                        <button type="button" className="w-1/2 text-brand-600 hover:text-brand-900 font-medium py-2 rounded-md transition-colors">Bank Transfer</button>
                                                    </div>

                                                    <div className="space-y-4">
                                                        <div>
                                                            <label className="block text-sm font-medium text-brand-700 mb-1">Name on Card</label>
                                                            <input required type="text" defaultValue="Jane Doe" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-accent focus:border-accent" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm font-medium text-brand-700 mb-1">Card Number</label>
                                                            <input required type="text" placeholder="•••• •••• •••• ••••" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-accent focus:border-accent font-mono" />
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-4">
                                                            <div>
                                                                <label className="block text-sm font-medium text-brand-700 mb-1">Expiration</label>
                                                                <input required type="text" placeholder="MM/YY" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-accent focus:border-accent" />
                                                            </div>
                                                            <div>
                                                                <label className="block text-sm font-medium text-brand-700 mb-1">CVC</label>
                                                                <input required type="text" placeholder="123" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-accent focus:border-accent" />
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <button
                                                        type="submit"
                                                        disabled={isLoading}
                                                        className="w-full bg-accent hover:bg-blue-700 disabled:opacity-50 text-white font-bold py-3 px-6 rounded-lg transition-colors flex justify-center items-center text-lg shadow-md"
                                                    >
                                                        {isLoading ? (
                                                            <span className="flex items-center"><Icon name="loader-2" size={20} className="animate-spin mr-2" /> Processing...</span>
                                                        ) : (
                                                            "Pay $184.50"
                                                        )}
                                                    </button>
                                                    <div className="flex justify-center space-x-2 text-brand-400 mt-2">
                                                        <Icon name="lock" size={14} />
                                                        <span className="text-xs">Secure encryption used for all transactions</span>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    )}

                                    {/* Step 3: Confirmation */}
                                    {step === 3 && (
                                        <div className="text-center py-6">
                                            <div className="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                                <Icon name="check" size={50} />
                                            </div>
                                            <h2 className="text-3xl font-bold text-brand-900 mb-2">Payment Successful!</h2>
                                            <p className="text-brand-600 mb-8 max-w-md mx-auto">Thank you for your payment. Your transaction has been processed and applied to your account.</p>

                                            <div className="bg-gray-50 border border-gray-200 rounded-xl p-6 max-w-sm mx-auto mb-8 text-left">
                                                <div className="flex justify-between items-center mb-4 border-b border-gray-200 pb-3">
                                                    <span className="text-brand-500 font-medium text-sm">Amount Paid</span>
                                                    <span className="text-2xl font-bold text-brand-900">$184.50</span>
                                                </div>
                                                <div className="space-y-3 text-sm text-brand-700">
                                                    <div className="flex justify-between">
                                                        <span>Date / Time:</span>
                                                        <span className="font-semibold text-brand-900">Today, 2:45 PM</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span>Confirmation #:</span>
                                                        <span className="font-mono font-semibold text-brand-900">#CONF-992381</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span>Account Number:</span>
                                                        <span className="font-mono font-semibold text-brand-900">{accountNumber || "123456789-01"}</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span>Payment Method:</span>
                                                        <span className="font-semibold text-brand-900">Visa ending in 4242</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="flex flex-col sm:flex-row justify-center items-center gap-4">
                                                <button className="bg-brand-100 hover:bg-brand-200 text-brand-800 font-medium py-2 px-6 rounded-lg transition-colors flex items-center">
                                                    <Icon name="printer" size={18} className="mr-2" /> Print Receipt
                                                </button>
                                                <a href="pay-bill.html" className="bg-accent hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-colors">
                                                    Pay Another Bill
                                                </a>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            </div>

                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PayBillPage />);
    </script>
</body>

</html>
