<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .hide-scroll::-webkit-scrollbar {
            display: none;
        }

        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-white text-gray-900 dark:bg-darkBg dark:text-gray-100 antialiased transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const currentPath = 'profile.html';

        const Sidebar = () => {
            const navItems = [
                { name: 'Home', path: 'index.html', icon: 'ph-house' },
                { name: 'Explore', path: 'explore.html', icon: 'ph-compass' },
                { name: 'Notifications', path: 'notifications.html', icon: 'ph-bell' },
                { name: 'Messages', path: 'messages.html', icon: 'ph-envelope-simple' },
                { name: 'Profile', path: 'profile.html', icon: 'ph-user' },
                { name: 'Settings', path: 'settings.html', icon: 'ph-gear' },
            ];

            return (
                <nav className="fixed bottom-0 w-full bg-white dark:bg-darkBg border-t border-gray-200 dark:border-gray-800 md:relative md:w-20 lg:w-64 md:h-screen md:border-t-0 md:border-r z-50 flex md:flex-col justify-around md:justify-start px-2 lg:px-6 py-2 md:py-6">
                    <div className="hidden md:flex items-center gap-3 mb-8 lg:px-2 justify-center lg:justify-start cursor-pointer hover:opacity-80 transition-opacity">
                        <i className="ph-fill ph-pulse text-primary text-4xl"></i>
                        <span className="hidden lg:block text-2xl font-bold tracking-tight">Pulse</span>
                    </div>
                    {navItems.map(item => {
                        const isActive = currentPath.includes(item.path);
                        return (
                            <a
                                key={item.name}
                                href={item.path}
                                className={`flex items-center justify-center lg:justify-start gap-4 p-3 lg:px-4 lg:py-3 rounded-full md:mb-2 transition-colors duration-200 w-fit lg:w-full mx-auto lg:mx-0 group
                                    ${isActive
                                        ? 'text-gray-900 dark:text-white font-bold'
                                        : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-900'}`}
                                aria-label={item.name}
                            >
                                <div className="relative">
                                    <i className={`${item.icon} ${isActive ? 'ph-fill' : ''} text-2xl lg:text-3xl transition-transform group-hover:scale-105`}></i>
                                </div>
                                <span className="hidden lg:block text-xl">{item.name}</span>
                            </a>
                        );
                    })}
                    <button className="hidden md:block w-12 h-12 lg:w-full lg:h-auto mt-4 mx-auto lg:mx-0 bg-primary hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-full transition-colors focus:ring-4 focus:ring-blue-300 shadow-md shadow-blue-500/30">
                        <i className="ph ph-plus text-2xl lg:hidden"></i>
                        <span className="hidden lg:block">Post</span>
                    </button>

                    <a href="profile.html" className="hidden md:flex items-center justify-center lg:justify-start gap-3 mt-auto p-3 hover:bg-gray-100 dark:hover:bg-gray-900 rounded-full cursor-pointer transition-colors group mx-auto lg:w-full w-fit">
                        <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Alex Profile" className="w-10 h-10 rounded-full border border-gray-200 dark:border-gray-800 group-hover:opacity-90 transition-opacity" />
                        <div className="hidden lg:block flex-1 min-w-0">
                            <p className="font-bold text-sm truncate">Alex Chen</p>
                            <p className="text-gray-500 text-sm truncate">@alexc</p>
                        </div>
                        <i className="ph ph-dots-three text-xl hidden lg:block ml-auto text-gray-500"></i>
                    </a>
                </nav>
            );
        };

        const RightPanel = () => {
            const suggestions = [
                { name: 'Sarah Drasner', handle: '@sarah_edo', avatar: 'https://i.pravatar.cc/150?u=1' },
                { name: 'Design Co.', handle: '@DesignCo', avatar: 'https://i.pravatar.cc/150?u=2' },
            ];

            const mediaGrid = [
                "https://images.unsplash.com/photo-1498804103079-a6351b050096?auto=format&fit=crop&q=80&w=200",
                "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=200",
                "https://images.unsplash.com/photo-1542435503-956c469947f6?auto=format&fit=crop&q=80&w=200",
                "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&q=80&w=200"
            ];

            return (
                <aside className="hidden lg:block w-80 xl:w-96 p-4 h-screen sticky top-0 overflow-y-auto hide-scroll px-6">
                    <div className="relative mb-4 sticky top-0 bg-white dark:bg-darkBg pt-1 pb-2 z-10">
                        <i className="ph ph-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 -mt-0.5 text-gray-400"></i>
                        <input
                            type="text"
                            placeholder="Search Pulse"
                            className="w-full bg-gray-100 dark:bg-gray-800 rounded-full py-2.5 pl-12 pr-4 text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:bg-white dark:focus:bg-darkBg border border-transparent focus:border-primary transition-all text-gray-900 dark:text-gray-100 placeholder-gray-500"
                            aria-label="Search Pulse"
                        />
                    </div>

                    <div className="bg-gray-50 dark:bg-darkCard rounded-2xl border border-gray-100 dark:border-gray-800 overflow-hidden mb-4 p-4">
                        <h2 className="font-extrabold text-xl mb-3">You might like</h2>
                        {suggestions.map((user, i) => (
                            <div key={i} className="flex items-center justify-between py-3 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors -mx-4 px-4">
                                <a href="profile.html" className="flex items-center gap-3 group min-w-0">
                                    <img src={user.avatar} alt={user.name} className="w-10 h-10 rounded-full group-hover:opacity-90 transition-opacity" />
                                    <div className="truncate pr-2">
                                        <p className="font-bold text-[15px] hover:underline cursor-pointer truncate">{user.name}</p>
                                        <p className="text-gray-500 text-sm truncate">{user.handle}</p>
                                    </div>
                                </a>
                                <button className="bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-sm font-bold py-1.5 px-4 rounded-full hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors">
                                    Follow
                                </button>
                            </div>
                        ))}
                    </div>

                    <div className="bg-gray-50 dark:bg-darkCard rounded-2xl border border-gray-100 dark:border-gray-800 overflow-hidden mb-4 p-4">
                        <h2 className="font-extrabold text-xl mb-3">Media</h2>
                        <div className="grid grid-cols-2 gap-2">
                            {mediaGrid.map((img, i) => (
                                <img key={i} src={img} alt="Recent media" className="w-full h-auto aspect-square object-cover rounded-xl cursor-pointer hover:opacity-90 transition-opacity" />
                            ))}
                        </div>
                    </div>
                </aside>
            );
        };

        const Layout = ({ children }) => {
            return (
                <div className="max-w-[1280px] mx-auto flex min-h-screen">
                    <Sidebar />
                    <main className="flex-1 w-full md:w-[600px] md:max-w-[600px] border-x-0 md:border-r border-gray-100 dark:border-gray-800 pb-20 md:pb-0 shrink-0 relative">
                        {children}
                    </main>
                    <RightPanel />
                </div>
            );
        };

        const PostCard = ({ avatar, name, handle, time, content, image, likes, comments, shares, isPinned }) => (
            <article className="px-4 py-3 border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50/50 dark:hover:bg-gray-800/20 transition-colors cursor-pointer block">
                {isPinned && <div className="text-gray-500 text-xs font-bold flex items-center gap-2 mb-1.5 ml-8"><i className="ph-fill ph-push-pin"></i> Pinned Thread</div>}

                <div className="flex gap-3">
                    <a href="profile.html" className="flex-shrink-0" aria-label={`Go to ${name}'s profile`}>
                        <img src={avatar} alt={`${name}'s avatar`} className="w-10 h-10 rounded-full hover:opacity-90 transition-opacity" />
                    </a>
                    <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-1.5 text-[15px] truncate">
                                <a href="profile.html" className="font-bold hover:underline truncate text-gray-900 dark:text-white">{name}</a>
                                <span className="text-gray-500 truncate">{handle}</span>
                                <span className="text-gray-500">·</span>
                                <span className="text-gray-500 hover:underline">{time}</span>
                            </div>
                            <button className="text-gray-400 hover:text-primary transition-colors p-1 rounded-full hover:bg-blue-50 dark:hover:bg-blue-900/30" aria-label="More actions">
                                <i className="ph ph-dots-three"></i>
                            </button>
                        </div>
                        <p className="text-[15px] mt-0.5 text-gray-900 dark:text-gray-100" style={{ whiteSpace: 'pre-wrap' }}>{content}</p>

                        {image && (
                            <div className="mt-3 rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-800">
                                <img src={image} alt="Post embedded media" className="w-full h-auto object-cover max-h-[500px]" loading="lazy" />
                            </div>
                        )}

                        <div className="flex justify-between items-center mt-3 text-gray-500 max-w-md">
                            <button className="flex items-center gap-2 group hover:text-blue-500 transition-colors" aria-label={`Comment. ${comments} comments`}>
                                <div className="p-2 -m-2 rounded-full group-hover:bg-blue-50 dark:group-hover:bg-blue-900/20 transition-colors"><i className="ph ph-chat-circle text-[18px]"></i></div>
                                <span className="text-[13px]">{comments}</span>
                            </button>
                            <button className="flex items-center gap-2 group hover:text-green-500 transition-colors" aria-label={`Share. ${shares} shares`}>
                                <div className="p-2 -m-2 rounded-full group-hover:bg-green-50 dark:group-hover:bg-green-900/20 transition-colors"><i className="ph ph-arrows-left-right text-[18px]"></i></div>
                                <span className="text-[13px]">{shares}</span>
                            </button>
                            <button className="flex items-center gap-2 group hover:text-pink-600 transition-colors" aria-label={`Like. ${likes} likes`}>
                                <div className="p-2 -m-2 rounded-full group-hover:bg-pink-50 dark:group-hover:bg-pink-900/20 transition-colors"><i className="ph ph-heart text-[18px]"></i></div>
                                <span className="text-[13px]">{likes}</span>
                            </button>
                            <button className="flex items-center gap-2 group hover:text-primary transition-colors" aria-label="Bookmark">
                                <div className="p-2 -m-2 rounded-full group-hover:bg-blue-50 dark:group-hover:bg-blue-900/20 transition-colors"><i className="ph ph-bookmark-simple text-[18px]"></i></div>
                            </button>
                        </div>
                    </div>
                </div>
            </article>
        );

        const App = () => {
            const tabs = ["Posts", "Replies", "Highlights", "Media", "Likes"];
            const [activeTab, setActiveTab] = useState("Posts");

            const posts = [
                {
                    id: 1,
                    isPinned: true,
                    name: "Alex Chen",
                    handle: "@alexc",
                    time: "Oct 12, 2023",
                    avatar: "https://i.pravatar.cc/150?u=a042581f4e29026704d",
                    content: "Hi, I'm Alex! 👋\n\nI'm a frontend developer passionate about React, accessible design, and building beautiful user interfaces. \n\nCurrently building some cool stuff at @Pulse. Follow me for tips, resources, and occasional rants about CSS.",
                    image: null,
                    likes: "4.2K",
                    comments: "156",
                    shares: "892"
                },
                {
                    id: 2,
                    isPinned: false,
                    name: "Alex Chen",
                    handle: "@alexc",
                    time: "3h",
                    avatar: "https://i.pravatar.cc/150?u=a042581f4e29026704d",
                    content: "Just hit a major milestone on my side project! So surreal to see it finally coming together. Next stop: Beta invite wave 1. 🚀",
                    image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=800",
                    likes: "248",
                    comments: "12",
                    shares: "5"
                },
                {
                    id: 3,
                    isPinned: false,
                    name: "Alex Chen",
                    handle: "@alexc",
                    time: "1d",
                    avatar: "https://i.pravatar.cc/150?u=a042581f4e29026704d",
                    content: "Reminder: perfect is the enemy of shipped.",
                    image: null,
                    likes: "1.2K",
                    comments: "45",
                    shares: "210"
                }
            ];

            return (
                <Layout>
                    {/* Header */}
                    <div className="sticky top-0 z-20 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 px-4 py-1 flex items-center gap-6">
                        <a href="index.html" className="p-2 -ml-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors tooltip" aria-label="Back">
                            <i className="ph ph-arrow-left text-xl"></i>
                        </a>
                        <div className="flex flex-col">
                            <h1 className="font-bold text-xl leading-5 mt-1 text-gray-900 dark:text-white">Alex Chen</h1>
                            <span className="text-gray-500 text-[13px]">1,248 posts</span>
                        </div>
                    </div>

                    {/* Profile Banner */}
                    <div className="h-32 md:h-48 bg-gray-200 dark:bg-gray-800 relative w-full overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&q=80&w=1200" alt="Cover photo" className="w-full h-full object-cover" />
                    </div>

                    {/* Profile Info */}
                    <div className="px-4 pb-4">
                        <div className="flex justify-between items-start mb-2">
                            <div className="-mt-12 md:-mt-16 w-24 h-24 md:w-32 md:h-32 rounded-full border-4 border-white dark:border-darkBg overflow-hidden bg-white dark:bg-darkBg relative z-10">
                                <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Alex Profile" className="w-full h-full object-cover" />
                            </div>
                            <div className="mt-3 flex gap-2">
                                <button className="p-1.5 border border-gray-300 dark:border-gray-600 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors tooltip text-gray-900 dark:text-white" aria-label="More options">
                                    <i className="ph ph-dots-three text-xl"></i>
                                </button>
                                <button className="border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white font-bold py-1.5 px-4 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-[15px]">
                                    Edit profile
                                </button>
                            </div>
                        </div>

                        <div>
                            <h1 className="font-extrabold text-xl md:text-2xl text-gray-900 dark:text-white leading-tight">Alex Chen</h1>
                            <p className="text-gray-500 text-[15px] mb-3">@alexc</p>

                            <p className="text-[15px] mb-3 text-gray-900 dark:text-gray-100 max-w-lg">
                                Frontend Developer & UI/UX enthusiast. <br />
                                Building <a href="#" className="text-primary hover:underline">@Pulse</a>. <br />
                                Coffee dependent.
                            </p>

                            <div className="flex flex-wrap gap-x-4 gap-y-1 text-[15px] text-gray-500 mb-3">
                                <span className="flex items-center gap-1.5"><i className="ph ph-briefcase"></i> Pulse Inc.</span>
                                <span className="flex items-center gap-1.5"><i className="ph ph-map-pin"></i> San Francisco, CA</span>
                                <a href="https://alexchen.dev" className="flex items-center gap-1.5 text-primary hover:underline" target="_blank" rel="noopener noreferrer"><i className="ph ph-link"></i> alexchen.dev</a>
                                <span className="flex items-center gap-1.5"><i className="ph ph-calendar-blank"></i> Joined October 2021</span>
                            </div>

                            <div className="flex gap-4 text-[15px]">
                                <a href="#" className="hover:underline text-gray-500"><span className="font-bold text-gray-900 dark:text-white">542</span> Following</a>
                                <a href="#" className="hover:underline text-gray-500"><span className="font-bold text-gray-900 dark:text-white">12.4K</span> Followers</a>
                            </div>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="flex overflow-x-auto hide-scroll px-4 gap-2 font-medium text-[15px] border-b border-gray-100 dark:border-gray-800">
                        {tabs.map(tab => (
                            <button
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`relative py-3.5 px-4 whitespace-nowrap transition-colors flex-1 ${activeTab === tab ? 'text-gray-900 dark:text-white font-bold' : 'text-gray-500 hover:text-gray-900 dark:hover:text-gray-300'}`}
                            >
                                {tab}
                                {activeTab === tab && (
                                    <div className="absolute bottom-0 left-[20%] right-[20%] h-1 bg-primary rounded-t-full"></div>
                                )}
                            </button>
                        ))}
                    </div>

                    {/* Posts List */}
                    <div>
                        {posts.map(post => <PostCard key={post.id} {...post} />)}
                    </div>
                </Layout>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
