<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .hide-scroll::-webkit-scrollbar {
            display: none;
        }

        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-white text-gray-900 dark:bg-darkBg dark:text-gray-100 antialiased transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Sidebar = ({ currentPath }) => {
            const navItems = [
                { name: 'Home', path: 'index.html', icon: 'ph-house' },
                { name: 'Explore', path: 'explore.html', icon: 'ph-compass' },
                { name: 'Notifications', path: 'notifications.html', icon: 'ph-bell' },
                { name: 'Messages', path: 'messages.html', icon: 'ph-envelope-simple' },
                { name: 'Profile', path: 'profile.html', icon: 'ph-user' },
                { name: 'Settings', path: 'settings.html', icon: 'ph-gear' },
            ];

            return (
                <nav className="fixed bottom-0 w-full bg-white dark:bg-darkBg border-t border-gray-200 dark:border-gray-800 md:relative md:w-20 lg:w-64 md:h-screen md:border-t-0 md:border-r z-50 flex md:flex-col justify-around md:justify-start px-2 lg:px-6 py-2 md:py-6">
                    <div className="hidden md:flex items-center gap-3 mb-8 lg:px-2 justify-center lg:justify-start cursor-pointer hover:opacity-80 transition-opacity">
                        <i className="ph-fill ph-pulse text-primary text-4xl"></i>
                        <span className="hidden lg:block text-2xl font-bold tracking-tight">Pulse</span>
                    </div>
                    {navItems.map(item => {
                        const isActive = currentPath.includes(item.path) || (currentPath === '' && item.path === 'index.html');
                        return (
                            <a
                                key={item.name}
                                href={item.path}
                                className={`flex items-center justify-center lg:justify-start gap-4 p-3 lg:px-4 lg:py-3 rounded-full md:mb-2 transition-colors duration-200 w-fit lg:w-full mx-auto lg:mx-0 group
                                    ${isActive
                                        ? 'text-gray-900 dark:text-white font-bold'
                                        : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-900'}`}
                                aria-label={item.name}
                            >
                                <div className="relative">
                                    <i className={`${item.icon} ${isActive ? 'ph-fill' : ''} text-2xl lg:text-3xl transition-transform group-hover:scale-105`}></i>
                                    {item.name === 'Notifications' && <span className="absolute top-0 right-0 w-2.5 h-2.5 bg-primary rounded-full border-2 border-white dark:border-darkBg"></span>}
                                </div>
                                <span className="hidden lg:block text-xl">{item.name}</span>
                            </a>
                        );
                    })}
                    <button className="hidden md:block w-12 h-12 lg:w-full lg:h-auto mt-4 mx-auto lg:mx-0 bg-primary hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-full transition-colors focus:ring-4 focus:ring-blue-300 shadow-md shadow-blue-500/30">
                        <i className="ph ph-plus text-2xl lg:hidden"></i>
                        <span className="hidden lg:block">Post</span>
                    </button>

                    <a href="profile.html" className="hidden md:flex items-center justify-center lg:justify-start gap-3 mt-auto p-3 hover:bg-gray-100 dark:hover:bg-gray-900 rounded-full cursor-pointer transition-colors group mx-auto lg:w-full w-fit">
                        <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Alex Profile" className="w-10 h-10 rounded-full border border-gray-200 dark:border-gray-800 group-hover:opacity-90 transition-opacity" />
                        <div className="hidden lg:block flex-1 min-w-0">
                            <p className="font-bold text-sm truncate">Alex Chen</p>
                            <p className="text-gray-500 text-sm truncate">@alexc</p>
                        </div>
                        <i className="ph ph-dots-three text-xl hidden lg:block ml-auto text-gray-500"></i>
                    </a>
                </nav>
            );
        };

        const RightPanel = () => {
            const trends = [
                { category: 'Technology · Trending', topic: '#React19', posts: '12.4K' },
                { category: 'Climate · Trending', topic: '#ClimateWeek', posts: '84.2K' },
                { category: 'Sports · Live', topic: '#WorldCup2026', posts: '1.2M' },
                { category: 'Business · Trending', topic: '#TechLayoffs', posts: '45.1K' },
            ];

            const suggestions = [
                { name: 'Sarah Drasner', handle: '@sarah_edo', avatar: 'https://i.pravatar.cc/150?u=1' },
                { name: 'Design Co.', handle: '@DesignCo', avatar: 'https://i.pravatar.cc/150?u=2' },
                { name: 'TechCrunch', handle: '@TechCrunch', avatar: 'https://i.pravatar.cc/150?u=3' },
            ];

            return (
                <aside className="hidden lg:block w-80 xl:w-96 p-4 h-screen sticky top-0 overflow-y-auto hide-scroll px-6">
                    <div className="relative mb-4 sticky top-0 bg-white dark:bg-darkBg pt-1 pb-2 z-10">
                        <i className="ph ph-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 -mt-0.5 text-gray-400"></i>
                        <input
                            type="text"
                            placeholder="Search Pulse"
                            className="w-full bg-gray-100 dark:bg-gray-800 rounded-full py-2.5 pl-12 pr-4 text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:bg-white dark:focus:bg-darkBg border border-transparent focus:border-primary transition-all text-gray-900 dark:text-gray-100 placeholder-gray-500"
                            aria-label="Search Pulse"
                        />
                    </div>

                    <div className="bg-gray-50 dark:bg-darkCard rounded-2xl mb-4 border border-gray-100 dark:border-gray-800 overflow-hidden">
                        <h2 className="font-extrabold text-xl p-4 pb-2">What's happening</h2>
                        {trends.map((trend, i) => (
                            <div key={i} className="px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors">
                                <div className="flex justify-between items-start">
                                    <p className="text-xs text-gray-500">{trend.category}</p>
                                    <button aria-label="More options" className="text-gray-500 hover:text-primary transition-colors"><i className="ph ph-dots-three hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-full p-1 -m-1"></i></button>
                                </div>
                                <p className="font-bold text-base mt-0.5">{trend.topic}</p>
                                <p className="text-xs text-gray-500 mt-1">{trend.posts} posts</p>
                            </div>
                        ))}
                        <div className="p-4 pt-2">
                            <a href="explore.html" className="text-primary hover:text-blue-600 text-[15px] transition-colors">Show more</a>
                        </div>
                    </div>

                    <div className="bg-gray-50 dark:bg-darkCard rounded-2xl border border-gray-100 dark:border-gray-800 overflow-hidden">
                        <h2 className="font-extrabold text-xl p-4 pb-2">Suggested for You</h2>
                        {suggestions.map((user, i) => (
                            <div key={i} className="flex items-center justify-between px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                                <a href="profile.html" className="flex items-center gap-3 group min-w-0">
                                    <img src={user.avatar} alt={user.name} className="w-10 h-10 rounded-full group-hover:opacity-90 transition-opacity" />
                                    <div className="truncate pr-2">
                                        <p className="font-bold text-[15px] hover:underline cursor-pointer truncate">{user.name}</p>
                                        <p className="text-gray-500 text-sm truncate">{user.handle}</p>
                                    </div>
                                </a>
                                <button className="bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-sm font-bold py-1.5 px-4 rounded-full hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 dark:focus:ring-offset-darkBg flex-shrink-0">
                                    Follow
                                </button>
                            </div>
                        ))}
                        <div className="p-4 pt-2">
                            <a href="#" className="text-primary hover:text-blue-600 text-[15px] transition-colors">Show more</a>
                        </div>
                    </div>

                    <p className="text-xs text-gray-500 px-4 py-4 flex flex-wrap gap-x-3 gap-y-1">
                        <a href="#" className="hover:underline">Terms of Service</a>
                        <a href="#" className="hover:underline">Privacy Policy</a>
                        <a href="#" className="hover:underline">Cookie Policy</a>
                        <a href="#" className="hover:underline">Accessibility</a>
                        <span>&copy; 2026 Pulse.</span>
                    </p>
                </aside>
            );
        };

        const Layout = ({ children, currentPath = window.location.pathname.split('/').pop() }) => {
            return (
                <div className="max-w-[1280px] mx-auto flex min-h-screen">
                    <Sidebar currentPath={currentPath} />
                    <main className="flex-1 w-full md:w-[600px] md:max-w-[600px] border-x-0 md:border-r border-gray-100 dark:border-gray-800 pb-20 md:pb-0 shrink-0">
                        {children}
                    </main>
                    <RightPanel />
                </div>
            );
        };

        const PostCard = ({ avatar, name, handle, time, content, image, likes, comments, shares }) => (
            <article className="px-4 py-3 border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50/50 dark:hover:bg-gray-800/20 transition-colors cursor-pointer block">
                <div className="flex gap-3">
                    <a href="profile.html" className="flex-shrink-0" aria-label={`Go to ${name}'s profile`}>
                        <img src={avatar} alt={`${name}'s avatar`} className="w-10 h-10 rounded-full hover:opacity-90 transition-opacity" />
                    </a>
                    <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-1.5 text-[15px] truncate">
                                <a href="profile.html" className="font-bold hover:underline truncate text-gray-900 dark:text-white">{name}</a>
                                <span className="text-gray-500 truncate">{handle}</span>
                                <span className="text-gray-500">·</span>
                                <span className="text-gray-500 hover:underline">{time}</span>
                            </div>
                            <button className="text-gray-400 hover:text-primary transition-colors p-1 rounded-full hover:bg-blue-50 dark:hover:bg-blue-900/30" aria-label="More actions">
                                <i className="ph ph-dots-three"></i>
                            </button>
                        </div>
                        <p className="text-[15px] mt-0.5 text-gray-900 dark:text-gray-100" style={{ whiteSpace: 'pre-wrap' }}>{content}</p>

                        {image && (
                            <div className="mt-3 rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-800">
                                <img src={image} alt="Post embedded media" className="w-full h-auto object-cover max-h-[500px]" loading="lazy" />
                            </div>
                        )}

                        <div className="flex justify-between items-center mt-3 text-gray-500 max-w-md">
                            <button className="flex items-center gap-2 group hover:text-blue-500 transition-colors" aria-label={`Comment. ${comments} comments`}>
                                <div className="p-2 -m-2 rounded-full group-hover:bg-blue-50 dark:group-hover:bg-blue-900/20 transition-colors"><i className="ph ph-chat-circle text-[18px]"></i></div>
                                <span className="text-[13px]">{comments}</span>
                            </button>
                            <button className="flex items-center gap-2 group hover:text-green-500 transition-colors" aria-label={`Share. ${shares} shares`}>
                                <div className="p-2 -m-2 rounded-full group-hover:bg-green-50 dark:group-hover:bg-green-900/20 transition-colors"><i className="ph ph-arrows-left-right text-[18px]"></i></div>
                                <span className="text-[13px]">{shares}</span>
                            </button>
                            <button className="flex items-center gap-2 group hover:text-pink-600 transition-colors" aria-label={`Like. ${likes} likes`}>
                                <div className="p-2 -m-2 rounded-full group-hover:bg-pink-50 dark:group-hover:bg-pink-900/20 transition-colors"><i className="ph ph-heart text-[18px]"></i></div>
                                <span className="text-[13px]">{likes}</span>
                            </button>
                            <button className="flex items-center gap-2 group hover:text-primary transition-colors" aria-label="Bookmark">
                                <div className="p-2 -m-2 rounded-full group-hover:bg-blue-50 dark:group-hover:bg-blue-900/20 transition-colors"><i className="ph ph-bookmark-simple text-[18px]"></i></div>
                            </button>
                        </div>
                    </div>
                </div>
            </article>
        );

        const App = () => {
            const [posts, setPosts] = useState([
                {
                    id: 1,
                    name: "Maya Jenkins",
                    handle: "@mayaj",
                    time: "2h",
                    avatar: "https://i.pravatar.cc/150?u=4",
                    content: "Just launched my new design system kit! 🎉 Super excited to see what everyone builds with it. The focus was heavily on accessibility and dark mode support from day one.",
                    image: "https://images.unsplash.com/photo-1561070791-2526d30994b5?auto=format&fit=crop&q=80&w=800",
                    likes: "2.4K",
                    comments: "148",
                    shares: "482"
                },
                {
                    id: 2,
                    name: "David Kim",
                    handle: "@dkim_tech",
                    time: "4h",
                    avatar: "https://i.pravatar.cc/150?u=5",
                    content: "If you're not using semantic html, what are you even doing? 🤯 #AccessibilityFirst",
                    image: null,
                    likes: "842",
                    comments: "42",
                    shares: "105"
                },
                {
                    id: 3,
                    name: "Elena Rodriguez",
                    handle: "@elena_creates",
                    time: "5h",
                    avatar: "https://i.pravatar.cc/150?u=6",
                    content: "Morning coffee + debugging = my favorite kind of Tuesday morning ☕️💻",
                    image: "https://images.unsplash.com/photo-1498804103079-a6351b050096?auto=format&fit=crop&q=80&w=800",
                    likes: "4.1K",
                    comments: "256",
                    shares: "89"
                }
            ]);

            const [content, setContent] = useState("");

            const handlePost = () => {
                if (!content.trim()) return;

                const newPost = {
                    id: Date.now(),
                    name: "Alex Chen",
                    handle: "@alexc",
                    time: "Just now",
                    avatar: "https://i.pravatar.cc/150?u=a042581f4e29026704d",
                    content: content,
                    image: null,
                    likes: "0",
                    comments: "0",
                    shares: "0"
                };

                setPosts([newPost, ...posts]);
                setContent('');
            };

            return (
                <Layout>
                    <div className="sticky top-0 z-20 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 p-4 font-bold text-xl cursor-pointer">
                        Home
                    </div>

                    {/* Composer */}
                    <div className="px-4 py-3 border-b border-gray-100 dark:border-gray-800 flex gap-3">
                        <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Alex Profile" className="w-10 h-10 rounded-full flex-shrink-0" />
                        <div className="flex-1 min-w-0">
                            <textarea
                                placeholder="What's happening?"
                                className="w-full bg-transparent text-xl mb-2 focus:outline-none resize-none placeholder-gray-500 dark:text-white"
                                rows="2"
                                value={content}
                                onChange={(e) => setContent(e.target.value)}
                                aria-label="Post composer text area"
                            ></textarea>

                            <div className="border-t border-gray-100 dark:border-gray-800 pt-3 flex justify-between items-center mt-2">
                                <div className="flex items-center gap-1 -ml-2">
                                    <button className="text-primary hover:bg-blue-50 dark:hover:bg-blue-900/30 p-2 rounded-full transition-colors tooltip" aria-label="Add Media"><i className="ph ph-image text-xl"></i></button>
                                    <button className="text-primary hover:bg-blue-50 dark:hover:bg-blue-900/30 p-2 rounded-full transition-colors tooltip" aria-label="Add GIF"><i className="ph ph-gif text-xl"></i></button>
                                    <button className="hidden sm:block text-primary hover:bg-blue-50 dark:hover:bg-blue-900/30 p-2 rounded-full transition-colors tooltip" aria-label="Add Poll"><i className="ph ph-list-numbers text-xl"></i></button>
                                    <button className="text-primary hover:bg-blue-50 dark:hover:bg-blue-900/30 p-2 rounded-full transition-colors tooltip" aria-label="Add Emoji"><i className="ph ph-smiley text-xl"></i></button>
                                    <button className="hidden sm:block text-primary hover:bg-blue-50 dark:hover:bg-blue-900/30 p-2 rounded-full transition-colors tooltip" aria-label="Schedule Post"><i className="ph ph-calendar-blank text-xl"></i></button>
                                </div>
                                <button
                                    onClick={handlePost}
                                    disabled={!content.trim()}
                                    className={`font-bold py-1.5 px-4 rounded-full transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 dark:focus:ring-offset-darkBg ${content.trim() ? 'bg-primary hover:bg-blue-600 text-white' : 'bg-primary/50 text-white cursor-not-allowed'}`}
                                >
                                    Post
                                </button>
                            </div>
                        </div>
                    </div>


                    {/* Feed */}
                    <div>
                        {posts.map(post => <PostCard key={post.id} {...post} />)}

                        <div className="p-8 text-center text-gray-500">
                            <i className="ph ph-spinner animate-spin text-2xl mb-2 text-primary mx-auto"></i>
                            <p>Loading more posts...</p>
                        </div>
                    </div>
                </Layout>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
