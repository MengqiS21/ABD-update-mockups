<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnPath | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['"Plus Jakarta Sans"', "sans-serif"] }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="learn-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { Header, Footer, categories, courses, CourseCard } = window.LearnPathShared;

      function App() {
        return (
          <>
            <a href="#main-content" className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0">
              Skip to main content
            </a>
            <Header activePath="index.html" />
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <section className="page-surface rounded-[2rem] p-8 lg:p-12">
                <div className="grid gap-8 lg:grid-cols-[1.1fr_0.9fr] lg:items-center">
                  <div className="space-y-6">
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-blue-800">Guided learning pathways</p>
                    <h1 className="max-w-3xl text-5xl font-extrabold tracking-tight text-slate-950">
                      Unlock Your Potential. Learn at Your Own Pace.
                    </h1>
                    <p className="max-w-2xl text-lg leading-8 text-slate-700">
                      Discover structured online courses taught by experts across technology, business, design, and personal development.
                    </p>
                    <div className="flex flex-wrap gap-3">
                      <a href="courses.html" className="rounded-full bg-slate-950 px-6 py-3 text-sm font-bold text-white no-underline hover:bg-slate-800">
                        Browse Courses
                      </a>
                      <a href="pricing.html" className="rounded-full bg-blue-700 px-6 py-3 text-sm font-bold text-white no-underline hover:bg-blue-800">
                        Start Free Trial
                      </a>
                    </div>
                  </div>
                  <div className="glass-card rounded-[1.75rem] border border-slate-200 p-6">
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Learning snapshot</p>
                    <div className="mt-5 grid gap-4 sm:grid-cols-2">
                      {[
                        ["1,200+", "Structured lessons"],
                        ["350+", "Expert-led courses"],
                        ["95%", "Learner satisfaction"],
                        ["2M+", "Learners worldwide"]
                      ].map(([value, label]) => (
                        <div key={label} className="rounded-2xl bg-slate-50 p-4">
                          <p className="text-2xl font-extrabold text-slate-950">{value}</p>
                          <p className="mt-1 text-sm text-slate-600">{label}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </section>

              <section className="mt-10" aria-labelledby="category-title">
                <div className="flex items-end justify-between gap-4">
                  <div>
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-blue-800">Explore categories</p>
                    <h2 id="category-title" className="mt-2 text-3xl font-extrabold text-slate-950">Start with a subject area</h2>
                  </div>
                </div>
                <div className="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-5">
                  {categories.map((category, index) => (
                    <a key={category.name} href="courses.html" className="category-tile page-surface rounded-[1.5rem] p-5 no-underline transition">
                      <div className={`inline-flex h-12 w-12 items-center justify-center rounded-2xl ${
                        ["bg-blue-100 text-blue-800", "bg-emerald-100 text-emerald-800", "bg-violet-100 text-violet-800", "bg-amber-100 text-amber-800", "bg-rose-100 text-rose-800"][index]
                      }`}>
                        <span className="font-extrabold">{category.name[0]}</span>
                      </div>
                      <h3 className="mt-4 text-xl font-bold text-slate-950">{category.name}</h3>
                      <p className="mt-3 text-sm leading-7 text-slate-600">{category.desc}</p>
                    </a>
                  ))}
                </div>
              </section>

              <section className="mt-10" aria-labelledby="featured-title">
                <div className="flex items-end justify-between gap-4">
                  <div>
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-blue-800">Featured courses</p>
                    <h2 id="featured-title" className="mt-2 text-3xl font-extrabold text-slate-950">Popular learning paths right now</h2>
                  </div>
                  <a href="courses.html" className="text-sm font-semibold text-slate-700 hover:text-slate-950">View all courses</a>
                </div>
                <div className="mt-6 grid gap-5 md:grid-cols-2 xl:grid-cols-3">
                  {courses.slice(0, 3).map((course, index) => (
                    <div key={course.title}>
                      <CourseCard course={course} href={index === 0 ? "course.html" : "courses.html"} />
                      <p className="mt-3 text-sm text-slate-600">{course.enrolled}</p>
                    </div>
                  ))}
                </div>
              </section>

              <section className="mt-10 rounded-[1.75rem] bg-slate-950 px-6 py-5 text-white">
                <div className="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                  <p className="text-lg font-bold">Join 2M+ learners worldwide</p>
                  <p className="text-sm text-slate-300">Trusted by professionals, students, and teams building practical skills with flexible schedules.</p>
                </div>
              </section>

              <section className="mt-10" aria-labelledby="how-title">
                <p className="text-sm font-semibold uppercase tracking-[0.2em] text-blue-800">How it works</p>
                <h2 id="how-title" className="mt-2 text-3xl font-extrabold text-slate-950">A clear path from curiosity to capability</h2>
                <div className="mt-6 grid gap-5 md:grid-cols-3">
                  {[
                    ["1", "Choose a pathway", "Browse curated tracks by subject, level, and career goal."],
                    ["2", "Learn in sequence", "Follow structured lessons, practice exercises, and checkpoints."],
                    ["3", "Show your progress", "Earn certificates, build confidence, and continue with recommendations."]
                  ].map(([step, title, text]) => (
                    <article key={step} className="page-surface rounded-[1.5rem] p-6">
                      <span className="inline-flex h-12 w-12 items-center justify-center rounded-full bg-blue-700 text-lg font-extrabold text-white">{step}</span>
                      <h3 className="mt-4 text-2xl font-bold text-slate-950">{title}</h3>
                      <p className="mt-3 text-sm leading-7 text-slate-600">{text}</p>
                    </article>
                  ))}
                </div>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
