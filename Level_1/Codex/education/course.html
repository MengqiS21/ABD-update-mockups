<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnPath | Python for Data Science</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['"Plus Jakarta Sans"', "sans-serif"] }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="learn-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { Header, Footer, courses } = window.LearnPathShared;
      const course = courses[0];

      function App() {
        return (
          <>
            <a href="#main-content" className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0">
              Skip to main content
            </a>
            <Header activePath="course.html" />
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <section className="grid gap-8 xl:grid-cols-[minmax(0,1fr)_340px]">
                <div className="space-y-8">
                  <section className="page-surface rounded-[2rem] p-8">
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-blue-800">{course.category}</p>
                    <h1 className="mt-3 text-4xl font-extrabold tracking-tight text-slate-950">
                      Python for Data Science — {course.level} · {course.duration}
                    </h1>
                    <p className="mt-4 max-w-3xl text-lg leading-8 text-slate-700">
                      Build practical Python fluency for analytics workflows, data wrangling, visualization, and entry-level machine learning exploration.
                    </p>
                    <div className="mt-5 flex flex-wrap items-center gap-3 text-sm text-slate-600">
                      <span className="font-semibold text-slate-950">{course.instructor}</span>
                      <span>{course.rating.toFixed(1)} ★</span>
                      <span>{course.enrolled}</span>
                    </div>
                  </section>

                  <section className="page-surface rounded-[1.75rem] p-6">
                    <h2 className="text-2xl font-bold text-slate-950">Instructor</h2>
                    <div className="mt-5 flex gap-4">
                      <img src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39?auto=format&fit=crop&w=300&q=80" alt="Portrait of instructor Dr. Amara Singh" className="h-20 w-20 rounded-full object-cover" />
                      <div>
                        <p className="text-lg font-bold text-slate-950">Dr. Amara Singh</p>
                        <p className="mt-1 text-sm leading-7 text-slate-600">
                          Data scientist and educator with 12 years of experience teaching Python, experimentation, and practical analytics systems.
                        </p>
                      </div>
                    </div>
                  </section>

                  <section className="page-surface rounded-[1.75rem] p-6">
                    <h2 className="text-2xl font-bold text-slate-950">This course includes</h2>
                    <div className="mt-5 grid gap-4 md:grid-cols-3">
                      {[
                        ["24 hours", "On-demand video lectures"],
                        ["12 files", "Downloadable resources"],
                        ["Certificate", "Shareable completion credential"]
                      ].map(([title, text]) => (
                        <article key={title} className="rounded-2xl bg-slate-50 p-4">
                          <p className="text-lg font-bold text-slate-950">{title}</p>
                          <p className="mt-2 text-sm text-slate-600">{text}</p>
                        </article>
                      ))}
                    </div>
                  </section>

                  <section className="page-surface rounded-[1.75rem] p-6">
                    <h2 className="text-2xl font-bold text-slate-950">Curriculum</h2>
                    <div className="mt-5 space-y-3">
                      {[
                        "1. Python foundations",
                        "2. Data structures and workflow basics",
                        "3. Cleaning and transforming datasets",
                        "4. Visualization and exploratory analysis",
                        "5. Intro to predictive modeling"
                      ].map((section, index) => (
                        <details key={section} className="rounded-2xl border border-slate-200 bg-white p-4" open={index === 0}>
                          <summary className="cursor-pointer text-sm font-semibold text-slate-950">{section} · {index === 0 ? "7 lessons" : index === 1 ? "6 lessons" : index === 2 ? "8 lessons" : index === 3 ? "5 lessons" : "6 lessons"}</summary>
                          <p className="mt-3 text-sm leading-7 text-slate-600">Structured lessons, code walkthroughs, and applied exercises that build toward a practical project.</p>
                        </details>
                      ))}
                    </div>
                    <p className="mt-4 text-sm text-slate-600">5 sections · 32 lessons</p>
                  </section>

                  <section className="page-surface rounded-[1.75rem] p-6">
                    <div className="flex items-end justify-between gap-4">
                      <div>
                        <h2 className="text-2xl font-bold text-slate-950">Student reviews</h2>
                        <p className="mt-2 text-sm text-slate-600">4.8 average rating from 8,420 reviews</p>
                      </div>
                    </div>
                    <div className="mt-5 space-y-4">
                      {[
                        ["Alyssa P.", "Exactly the right level of rigor for working analysts.", "4.9 ★"],
                        ["Mateo R.", "The pacing is strong and the examples feel relevant.", "4.8 ★"]
                      ].map(([name, text, rating]) => (
                        <article key={name} className="rounded-2xl bg-slate-50 p-4">
                          <div className="flex items-center justify-between gap-3">
                            <p className="font-bold text-slate-950">{name}</p>
                            <p className="text-sm font-semibold text-slate-600">{rating}</p>
                          </div>
                          <p className="mt-3 text-sm leading-7 text-slate-600">{text}</p>
                        </article>
                      ))}
                    </div>
                  </section>
                </div>

                <aside className="space-y-6 xl:sticky xl:top-28 xl:self-start">
                  <div className="page-surface rounded-[1.75rem] p-6">
                    <img src={course.image} alt={course.alt} className="h-52 w-full rounded-[1.25rem] object-cover" />
                    <p className="mt-5 text-3xl font-extrabold text-slate-950">{course.price}</p>
                    <a href="study.html" className="mt-5 inline-flex w-full items-center justify-center rounded-full bg-slate-950 px-5 py-3 text-sm font-bold text-white no-underline hover:bg-slate-800">
                      Enroll Now
                    </a>
                    <div className="mt-5 space-y-3 text-sm text-slate-600">
                      <p>Intermediate level</p>
                      <p>Flexible schedule</p>
                      <p>Certificate included</p>
                    </div>
                  </div>
                </aside>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
