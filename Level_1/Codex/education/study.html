<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnPath | Study</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['"Plus Jakarta Sans"', "sans-serif"] }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="learn-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { useState } = React;
      const { Header, Footer } = window.LearnPathShared;

      function App() {
        const [activeTab, setActiveTab] = useState("Overview");
        const tabs = ["Overview", "Notes", "Q&A", "Resources"];
        return (
          <>
            <a href="#main-content" className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0">
              Skip to main content
            </a>
            <Header activePath="study.html" />
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <section className="page-surface rounded-[1.75rem] p-6">
                <div className="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                  <div>
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-blue-800">Lesson progress</p>
                    <h1 className="mt-2 text-3xl font-extrabold text-slate-950">Lesson 4 of 12 — Module 2: Data Structures</h1>
                  </div>
                  <div className="w-full max-w-sm">
                    <div className="h-3 rounded-full bg-slate-200">
                      <div className="h-3 w-1/3 rounded-full bg-blue-700"></div>
                    </div>
                  </div>
                </div>
              </section>

              <section className="mt-8 grid gap-8 xl:grid-cols-[minmax(0,1fr)_340px]">
                <div className="space-y-6">
                  <div className="page-surface rounded-[1.75rem] p-5">
                    <div className="flex aspect-video items-center justify-center rounded-[1.25rem] bg-slate-950 text-center text-white">
                      <div>
                        <p className="text-sm uppercase tracking-[0.2em] text-slate-300">Video lesson</p>
                        <p className="mt-3 text-2xl font-bold">Understanding lists, tuples, and dictionaries</p>
                      </div>
                    </div>
                  </div>

                  <section className="page-surface rounded-[1.75rem] p-6">
                    <div className="flex flex-wrap gap-2" role="tablist" aria-label="Lesson tabs">
                      {tabs.map((tab) => (
                        <button key={tab} type="button" role="tab" aria-selected={activeTab === tab} onClick={() => setActiveTab(tab)} className="tab-button rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-900">
                          {tab}
                        </button>
                      ))}
                    </div>
                    <div className="mt-6 text-sm leading-7 text-slate-700">
                      {activeTab === "Overview" && <p>This lesson introduces the core collection types in Python and demonstrates when to use each in data workflows.</p>}
                      {activeTab === "Notes" && <p>Key note: dictionaries are ideal for labeled mappings, while tuples work best for immutable grouped data.</p>}
                      {activeTab === "Q&A" && <p>Common learner question: when should a list be converted to a NumPy array? Usually when you need vectorized numeric operations.</p>}
                      {activeTab === "Resources" && <p>Download the lesson notebook, summary sheet, and short practice dataset before moving to the quiz.</p>}
                    </div>
                  </section>
                </div>

                <aside className="page-surface rounded-[1.75rem] p-6" aria-label="Lesson sidebar">
                  <h2 className="text-2xl font-bold text-slate-950">Course lessons</h2>
                  <div className="mt-5 space-y-4">
                    {[
                      "Module 1: Setup and Python basics",
                      "Module 2: Data Structures",
                      "Module 3: Cleaning datasets",
                      "Module 4: Visualization",
                      "Module 5: Project wrap-up"
                    ].map((module, index) => (
                      <div key={module} className="rounded-2xl bg-slate-50 p-4">
                        <p className="font-semibold text-slate-950">{module}</p>
                        <ul className="mt-3 space-y-2 text-sm text-slate-600">
                          {[1, 2, 3].map((lesson) => (
                            <li key={lesson} className="flex items-center gap-2">
                              <span className={`inline-flex h-5 w-5 items-center justify-center rounded-full ${index < 1 || (index === 1 && lesson < 4) ? "bg-green-600 text-white" : "bg-slate-200 text-slate-700"}`}>
                                {index < 1 || (index === 1 && lesson < 4) ? "✓" : lesson}
                              </span>
                              Lesson {lesson}
                            </li>
                          ))}
                        </ul>
                      </div>
                    ))}
                  </div>
                </aside>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
