<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaMart | Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', "sans-serif"]
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="site-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { Header, Footer } = window.NovaMartShared;

      const dashboardSections = [
        {
          title: "Order History",
          text: "Track recent orders, shipment status, and returns from your purchases.",
          meta: "4 active orders"
        },
        {
          title: "Saved Addresses",
          text: "Manage home, office, and gift delivery locations with delivery notes.",
          meta: "3 addresses"
        },
        {
          title: "Payment Methods",
          text: "Review cards, gift balance, and billing preferences for faster checkout.",
          meta: "2 cards on file"
        },
        {
          title: "Wishlist",
          text: "Keep products bookmarked for future sales, seasonal shopping, and gift planning.",
          meta: "18 saved items"
        },
        {
          title: "Account Settings",
          text: "Update profile details, password, communication preferences, and security options.",
          meta: "Security checkup available"
        }
      ];

      function App() {
        return (
          <>
            <a
              href="#main-content"
              className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0"
            >
              Skip to main content
            </a>
            <Header activePath="account.html" />
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <section className="rounded-[2rem] border border-slate-200 bg-white/90 p-8 shadow-sm">
                <div className="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
                  <div>
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-orange-700">Account dashboard</p>
                    <h1 className="mt-3 text-4xl font-extrabold tracking-tight text-slate-950">Welcome back, Jordan</h1>
                    <p className="mt-2 max-w-2xl text-base leading-7 text-slate-600">
                      Manage orders, addresses, payments, and saved items from one place.
                    </p>
                  </div>
                  <div className="rounded-[1.5rem] bg-slate-950 px-6 py-5 text-white shadow-lg">
                    <p className="text-sm text-slate-300">NovaMart Rewards</p>
                    <p className="mt-2 text-3xl font-extrabold">4,820 pts</p>
                    <p className="mt-1 text-sm text-slate-300">Gold tier member</p>
                  </div>
                </div>
              </section>

              <section className="mt-8 grid gap-5 md:grid-cols-2 xl:grid-cols-3" aria-label="Account sections">
                {dashboardSections.map((section) => (
                  <article key={section.title} className="account-card rounded-[1.75rem] border border-slate-200 bg-white p-6 shadow-sm transition">
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">{section.meta}</p>
                    <h2 className="mt-3 text-2xl font-bold text-slate-950">{section.title}</h2>
                    <p className="mt-3 text-sm leading-7 text-slate-600">{section.text}</p>
                    <button
                      type="button"
                      className="mt-6 rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-900 hover:bg-slate-50"
                    >
                      Open section
                    </button>
                  </article>
                ))}
              </section>

              <section className="mt-8 grid gap-6 lg:grid-cols-[1fr_320px]">
                <div className="rounded-[1.75rem] border border-slate-200 bg-white p-6 shadow-sm">
                  <h2 className="text-2xl font-bold text-slate-950">Recent activity</h2>
                  <ol className="mt-6 space-y-4">
                    {[
                      "Order #NM-18420 shipped and arrives Friday.",
                      "Wishlist item Pulse Fitness Watch dropped by 10%.",
                      "New payment method ending in 4242 was added."
                    ].map((item) => (
                      <li key={item} className="rounded-2xl bg-slate-50 p-4 text-sm text-slate-700">
                        {item}
                      </li>
                    ))}
                  </ol>
                </div>
                <aside className="rounded-[1.75rem] border border-slate-200 bg-white p-6 shadow-sm">
                  <h2 className="text-2xl font-bold text-slate-950">Quick links</h2>
                  <nav className="mt-5 space-y-3" aria-label="Account quick links">
                    {[
                      ["Track an order", "products.html"],
                      ["Go to cart", "cart.html"],
                      ["Browse new arrivals", "products.html"]
                    ].map(([label, href]) => (
                      <a
                        key={label}
                        href={href}
                        className="block rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-900 no-underline hover:bg-slate-50"
                      >
                        {label}
                      </a>
                    ))}
                  </nav>
                </aside>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
