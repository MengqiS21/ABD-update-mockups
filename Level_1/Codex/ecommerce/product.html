<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaMart | Sony WH-1000XM5 Headphones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', "sans-serif"]
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="site-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { useState } = React;
      const { Header, Footer, products, productBySlug, formatPrice, renderStars } = window.NovaMartShared;

      const product = productBySlug("sony-wh-1000xm5-headphones");
      const gallery = [product.image, products[11].image, products[22].image];
      const relatedProducts = [products[11], products[22], products[6], products[12]];

      function App() {
        const [selectedImage, setSelectedImage] = useState(gallery[0]);
        const [selectedColor, setSelectedColor] = useState("Black");
        const [selectedSize, setSelectedSize] = useState("Standard Fit");
        const [activeTab, setActiveTab] = useState("description");

        const tabs = {
          description: (
            <div className="space-y-4 text-sm leading-7 text-slate-700">
              <p>
                Sony’s WH-1000XM5 headphones pair premium noise cancellation with balanced sound,
                intuitive touch controls, and all-day battery life for work, travel, and focused listening.
              </p>
              <p>
                The lightweight frame and soft-fit ear cushions are designed for extended wear, while
                multipoint Bluetooth keeps switching between laptop and phone seamless.
              </p>
            </div>
          ),
          specs: (
            <dl className="grid gap-4 text-sm text-slate-700 md:grid-cols-2">
              <div className="rounded-2xl bg-slate-50 p-4">
                <dt className="font-semibold text-slate-950">Battery life</dt>
                <dd className="mt-1">Up to 30 hours with ANC enabled</dd>
              </div>
              <div className="rounded-2xl bg-slate-50 p-4">
                <dt className="font-semibold text-slate-950">Connectivity</dt>
                <dd className="mt-1">Bluetooth 5.2, USB-C charging, 3.5mm audio cable</dd>
              </div>
              <div className="rounded-2xl bg-slate-50 p-4">
                <dt className="font-semibold text-slate-950">Weight</dt>
                <dd className="mt-1">Approx. 250g</dd>
              </div>
              <div className="rounded-2xl bg-slate-50 p-4">
                <dt className="font-semibold text-slate-950">Included</dt>
                <dd className="mt-1">Headphones, travel case, cable, USB-C charging lead</dd>
              </div>
            </dl>
          ),
          reviews: (
            <div className="space-y-4">
              {[
                {
                  author: "Maya P.",
                  title: "Excellent noise cancellation for flights",
                  body: "The sound profile is clean, the controls are easy to learn, and the comfort holds up for long travel days."
                },
                {
                  author: "Daniel K.",
                  title: "Reliable daily work headset",
                  body: "Calls are clear, the battery lasts all week, and the quick charge feature is genuinely useful."
                }
              ].map((review) => (
                <article key={review.author} className="rounded-2xl border border-slate-200 bg-white p-4">
                  <h3 className="text-base font-bold text-slate-950">{review.title}</h3>
                  <p className="mt-1 text-sm font-medium text-slate-600">{review.author}</p>
                  <p className="mt-3 text-sm leading-7 text-slate-700">{review.body}</p>
                </article>
              ))}
            </div>
          )
        };

        return (
          <>
            <a
              href="#main-content"
              className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0"
            >
              Skip to main content
            </a>
            <Header activePath="product.html" />
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <nav aria-label="Breadcrumb" className="mb-6 text-sm text-slate-600">
                <a href="index.html" className="hover:text-slate-950">Home</a>
                <span className="mx-2">/</span>
                <a href="products.html" className="hover:text-slate-950">Electronics</a>
                <span className="mx-2">/</span>
                <span aria-current="page" className="font-semibold text-slate-950">{product.name}</span>
              </nav>

              <section className="grid gap-8 lg:grid-cols-[1.1fr_0.9fr]">
                <div className="space-y-4">
                  <div className="overflow-hidden rounded-[2rem] border border-slate-200 bg-white p-5 shadow-sm">
                    <img src={selectedImage} alt={product.alt} className="product-image w-full rounded-[1.5rem]" />
                  </div>
                  <div className="grid grid-cols-3 gap-4" aria-label="Product image gallery">
                    {gallery.map((image, index) => (
                      <button
                        key={image}
                        type="button"
                        onClick={() => setSelectedImage(image)}
                        className={`overflow-hidden rounded-2xl border bg-white p-2 shadow-sm ${
                          selectedImage === image ? "border-slate-950" : "border-slate-200 hover:border-slate-300"
                        }`}
                        aria-label={`View product image ${index + 1}`}
                        aria-pressed={selectedImage === image}
                      >
                        <img src={image} alt={`${product.alt}, gallery view ${index + 1}`} className="product-image w-full rounded-xl" />
                      </button>
                    ))}
                  </div>
                </div>

                <section className="rounded-[2rem] border border-slate-200 bg-white p-8 shadow-sm">
                  <p className="text-sm font-semibold uppercase tracking-[0.2em] text-orange-700">Featured electronics</p>
                  <h1 className="mt-3 text-4xl font-extrabold tracking-tight text-slate-950">
                    {product.name} - {formatPrice(product.price)}
                  </h1>
                  <div className="mt-4 flex flex-wrap items-center gap-3 text-sm text-slate-600">
                    <span aria-label={`${product.rating} out of 5 stars`} className="font-semibold text-amber-500">
                      {renderStars(product.rating)}
                    </span>
                    <span>{product.rating.toFixed(1)} rating</span>
                    <span>•</span>
                    <span>{product.reviews} reviews</span>
                    <span>•</span>
                    <span className="font-semibold text-emerald-700">{product.availability}</span>
                  </div>
                  <p className="mt-6 text-base leading-7 text-slate-700">
                    Premium wireless headphones engineered for immersive listening, crystal-clear calls, and long-haul comfort.
                  </p>

                  <form className="mt-8 space-y-6">
                    <fieldset>
                      <legend className="text-sm font-semibold text-slate-900">Color</legend>
                      <div className="mt-3 flex flex-wrap gap-3">
                        {["Black", "Silver", "Midnight Blue"].map((color) => (
                          <button
                            key={color}
                            type="button"
                            onClick={() => setSelectedColor(color)}
                            className={`rounded-full border px-4 py-2 text-sm font-semibold ${
                              selectedColor === color
                                ? "border-slate-950 bg-slate-950 text-white"
                                : "border-slate-300 bg-white text-slate-900 hover:bg-slate-50"
                            }`}
                            aria-pressed={selectedColor === color}
                          >
                            {color}
                          </button>
                        ))}
                      </div>
                    </fieldset>

                    <fieldset>
                      <legend className="text-sm font-semibold text-slate-900">Size</legend>
                      <div className="mt-3 flex flex-wrap gap-3">
                        {["Standard Fit", "Wide Fit", "Travel Kit"].map((size) => (
                          <button
                            key={size}
                            type="button"
                            onClick={() => setSelectedSize(size)}
                            className={`rounded-full border px-4 py-2 text-sm font-semibold ${
                              selectedSize === size
                                ? "border-orange-600 bg-orange-50 text-orange-800"
                                : "border-slate-300 bg-white text-slate-900 hover:bg-slate-50"
                            }`}
                            aria-pressed={selectedSize === size}
                          >
                            {size}
                          </button>
                        ))}
                      </div>
                    </fieldset>

                    <div className="rounded-2xl bg-slate-50 p-4 text-sm text-slate-700">
                      Selected setup: <span className="font-semibold text-slate-950">{selectedColor}</span> /
                      <span className="font-semibold text-slate-950"> {selectedSize}</span>
                    </div>

                    <div className="flex flex-wrap gap-3">
                      <a
                        href="cart.html"
                        className="rounded-full bg-slate-950 px-6 py-3 text-sm font-bold text-white no-underline hover:bg-slate-800"
                      >
                        Add to Cart
                      </a>
                      <a
                        href="cart.html"
                        className="rounded-full bg-orange-600 px-6 py-3 text-sm font-bold text-white no-underline hover:bg-orange-700"
                      >
                        Buy Now
                      </a>
                    </div>
                  </form>
                </section>
              </section>

              <section className="mt-10 rounded-[2rem] border border-slate-200 bg-white p-6 shadow-sm">
                <div className="flex flex-wrap gap-3" role="tablist" aria-label="Product information tabs">
                  {[
                    ["description", "Description"],
                    ["specs", "Specs"],
                    ["reviews", "Reviews"]
                  ].map(([tabId, label]) => (
                    <button
                      key={tabId}
                      type="button"
                      role="tab"
                      id={`tab-${tabId}`}
                      aria-selected={activeTab === tabId}
                      aria-controls={`panel-${tabId}`}
                      onClick={() => setActiveTab(tabId)}
                      className="tab-button rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-900"
                    >
                      {label}
                    </button>
                  ))}
                </div>
                <div id={`panel-${activeTab}`} role="tabpanel" aria-labelledby={`tab-${activeTab}`} className="mt-6">
                  {tabs[activeTab]}
                </div>
              </section>

              <section className="mt-10" aria-labelledby="related-products-title">
                <div className="flex items-end justify-between">
                  <div>
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-orange-700">You may also like</p>
                    <h2 id="related-products-title" className="mt-2 text-3xl font-extrabold text-slate-950">
                      Related products
                    </h2>
                  </div>
                  <a href="products.html" className="text-sm font-semibold text-slate-700 hover:text-slate-950">
                    Explore all
                  </a>
                </div>
                <div className="mt-6 grid gap-5 md:grid-cols-2 xl:grid-cols-4">
                  {relatedProducts.map((item) => (
                    <article key={item.id} className="rounded-[1.5rem] border border-slate-200 bg-white p-4 shadow-sm">
                      <img src={item.image} alt={item.alt} className="product-image w-full rounded-2xl" />
                      <h3 className="mt-4 text-lg font-bold text-slate-950">{item.name}</h3>
                      <p className="mt-1 text-sm text-slate-600">{item.brand}</p>
                      <div className="mt-2 flex items-center justify-between">
                        <span className="text-lg font-extrabold text-slate-950">{formatPrice(item.price)}</span>
                        <a href="products.html" className="text-sm font-semibold text-slate-700 hover:text-slate-950">
                          View
                        </a>
                      </div>
                    </article>
                  ))}
                </div>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
