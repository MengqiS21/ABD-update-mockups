<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse | Explore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['"Manrope"', "sans-serif"] }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="pulse-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { Layout, trendingTopics, suggestedUsers, popularCards } = window.PulseShared;

      function App() {
        return (
          <Layout activePath="explore.html">
            <main id="main-content" className="mt-6 space-y-6">
              <section className="card-surface rounded-[1.75rem] p-6">
                <h1 className="text-3xl font-extrabold tracking-tight text-slate-950">Explore Pulse</h1>
                <form className="mt-5" role="search" aria-label="Search Pulse">
                  <label htmlFor="explore-search" className="sr-only">Search Pulse</label>
                  <input
                    id="explore-search"
                    type="search"
                    className="w-full rounded-full border border-slate-300 bg-white px-5 py-4 text-sm text-slate-900"
                    placeholder="Search topics, creators, and posts"
                  />
                </form>
                <div className="mt-5 flex flex-wrap gap-2" aria-label="Trending hashtags">
                  {trendingTopics.map((topic) => (
                    <button key={topic} type="button" className="rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-900 hover:bg-slate-200">
                      {topic}
                    </button>
                  ))}
                </div>
              </section>

              <section className="card-surface rounded-[1.75rem] p-6">
                <div className="flex items-end justify-between gap-4">
                  <div>
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Suggested for you</p>
                    <h2 className="mt-2 text-2xl font-extrabold text-slate-950">People to follow</h2>
                  </div>
                </div>
                <div className="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                  {suggestedUsers.map((user) => (
                    <article key={user.handle} className="suggested-card rounded-[1.5rem] border border-slate-200 bg-white p-5 shadow-sm transition">
                      <img src={user.avatar} alt={user.avatarAlt} className="h-14 w-14 rounded-full object-cover" />
                      <h3 className="mt-4 text-lg font-bold text-slate-950">{user.name}</h3>
                      <p className="mt-1 text-sm text-slate-500">{user.handle}</p>
                      <p className="mt-3 text-sm leading-7 text-slate-600">{user.bio}</p>
                      <button type="button" className="mt-5 rounded-full bg-slate-950 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">
                        Follow
                      </button>
                    </article>
                  ))}
                </div>
              </section>

              <section className="card-surface rounded-[1.75rem] p-6">
                <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Popular now</p>
                <h2 className="mt-2 text-2xl font-extrabold text-slate-950">Posts and images</h2>
                <div className="masonry-grid mt-6">
                  {popularCards.map((card) => (
                    <article key={card.title} className="media-card overflow-hidden rounded-[1.5rem] border border-slate-200 bg-white shadow-sm transition">
                      <img src={card.image} alt={card.alt} className="w-full object-cover" />
                      <div className="p-5">
                        <h3 className="text-lg font-bold text-slate-950">{card.title}</h3>
                        <p className="mt-3 text-sm leading-7 text-slate-600">{card.text}</p>
                      </div>
                    </article>
                  ))}
                </div>
              </section>
            </main>
          </Layout>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
