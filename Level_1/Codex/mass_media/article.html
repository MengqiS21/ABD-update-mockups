<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Meridian | Article</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', "sans-serif"],
              serif: ['"Source Serif 4"', "serif"]
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="news-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { Header, Footer, worldStories } = window.MeridianShared;

      function App() {
        return (
          <>
            <a href="#main-content" className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0">
              Skip to main content
            </a>
            <Header activePath="article.html" />
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <article className="mx-auto max-w-4xl">
                <header className="page-surface rounded-[2rem] p-8">
                  <p className="text-sm font-semibold uppercase tracking-[0.2em] text-red-800">World</p>
                  <h1 className="mt-3 text-5xl font-bold leading-tight text-slate-950">
                    Regional powers race to steady shipping routes as UN meets on Red Sea tensions
                  </h1>
                  <p className="mt-4 text-xl leading-8 text-slate-700">
                    Diplomats are scrambling to prevent a maritime security crisis from hardening into a broader economic shock.
                  </p>
                  <div className="mt-6 flex flex-wrap gap-3 text-sm text-slate-600">
                    <span className="font-semibold text-slate-950">By Leila Hassan</span>
                    <span>Nov 11, 2025</span>
                    <span>8 min read</span>
                  </div>
                </header>

                <figure className="mt-8 overflow-hidden rounded-[2rem]">
                  <img
                    src="https://images.unsplash.com/photo-1521295121783-8a321d551ad2?auto=format&fit=crop&w=1600&q=80"
                    alt="Delegates seated in a circular chamber during an international emergency session"
                    className="h-[28rem] w-full object-cover"
                  />
                  <figcaption className="bg-white px-5 py-3 text-sm text-slate-600">
                    Diplomats gathered for an emergency session after weeks of escalating disruptions across a major shipping corridor.
                  </figcaption>
                </figure>

                <div className="article-body mt-8 space-y-6 text-lg leading-9 text-slate-800">
                  <p>
                    The emergency session called by the United Nations on Tuesday reflects a growing recognition among diplomats that the Red Sea crisis is no longer a narrow maritime dispute. What began as a series of threats to commercial shipping has become a test of how quickly governments can contain a security problem before it cascades into trade, energy, and insurance markets.
                  </p>
                  <p>
                    Officials from several regional capitals said privately that the central challenge is no longer just deterrence. It is coordination. Naval patrols, airspace management, sanctions policy, and humanitarian access are all now being negotiated in parallel, often by institutions with competing timelines and mandates.
                  </p>
                  <blockquote className="rounded-[1.5rem] border-l-4 border-red-700 bg-red-50 px-6 py-5 text-2xl font-bold leading-10 text-slate-950">
                    “When shipping companies begin rerouting at scale, the diplomatic window narrows fast. Every day of uncertainty raises the cost of restoring confidence.”
                  </blockquote>
                  <p>
                    Analysts caution that even if the immediate threat environment stabilizes, markets may continue pricing in volatility. That means higher freight premiums, longer transit times, and tougher political questions for governments already managing fragile consumer confidence. For policymakers in Europe and Asia, those knock-on effects may prove more politically volatile than the initial incident itself.
                  </p>
                  <p>
                    Related reporting from the Meridian newsroom has focused on the structural vulnerabilities behind the crisis, including aging port infrastructure and the lack of alternative routes for key commodities. In an earlier dispatch, our correspondents examined how insurers are recalculating exposure in real time as naval escorts expand.
                  </p>
                  <p>
                    The next phase of talks will likely determine whether the current emergency is treated as a temporary shock or the opening chapter of a longer strategic confrontation. Either way, the meeting underscores how quickly a regional pressure point can redraw the priorities of global diplomacy.
                  </p>
                </div>

                <section className="mt-8 rounded-[1.75rem] border border-slate-200 bg-white p-6">
                  <h2 className="text-2xl font-bold text-slate-950">Related reading</h2>
                  <div className="mt-4 flex flex-wrap gap-3">
                    <a href="world.html" className="rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-900 no-underline hover:bg-slate-200">
                      World live briefing
                    </a>
                    <a href="article.html" className="rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-900 no-underline hover:bg-slate-200">
                      Shipping insurers widen risk models
                    </a>
                  </div>
                </section>

                <section className="mt-8 rounded-[1.75rem] border border-slate-200 bg-white p-6">
                  <h2 className="text-2xl font-bold text-slate-950">Tags</h2>
                  <div className="mt-4 flex flex-wrap gap-2">
                    {["UN", "Red Sea", "Trade", "Diplomacy", "Security"].map((tag) => (
                      <a key={tag} href="world.html" className="rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-900 no-underline hover:bg-slate-50">
                        {tag}
                      </a>
                    ))}
                  </div>
                </section>

                <section className="mt-8 rounded-[1.75rem] border border-slate-200 bg-white p-6" aria-labelledby="comments-title">
                  <h2 id="comments-title" className="text-2xl font-bold text-slate-950">Comments</h2>
                  <form className="mt-5 space-y-4">
                    <div>
                      <label htmlFor="comment-name" className="mb-2 block text-sm font-semibold text-slate-700">Name</label>
                      <input id="comment-name" type="text" className="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm text-slate-900" />
                    </div>
                    <div>
                      <label htmlFor="comment-body" className="mb-2 block text-sm font-semibold text-slate-700">Comment</label>
                      <textarea id="comment-body" rows="4" className="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm text-slate-900"></textarea>
                    </div>
                    <button type="submit" className="rounded-full bg-slate-950 px-5 py-3 text-sm font-semibold text-white hover:bg-slate-800">
                      Post comment
                    </button>
                  </form>
                </section>

                <section className="mt-10" aria-labelledby="more-world-title">
                  <div className="flex items-end justify-between gap-4">
                    <h2 id="more-world-title" className="text-3xl font-bold text-slate-950">More from World</h2>
                    <a href="world.html" className="text-sm font-semibold text-slate-700 hover:text-slate-950">See all World coverage</a>
                  </div>
                  <div className="mt-6 grid gap-5 md:grid-cols-3">
                    {worldStories.slice(1, 4).map((story) => (
                      <article key={story.title} className="story-card page-surface overflow-hidden rounded-[1.5rem] transition">
                        <img src={story.image} alt={story.alt} className="h-40 w-full object-cover" />
                        <div className="p-5">
                          <h3 className="text-2xl font-bold leading-tight text-slate-950">{story.title}</h3>
                          <p className="mt-3 text-sm text-slate-600">By {story.byline}</p>
                        </div>
                      </article>
                    ))}
                  </div>
                </section>
              </article>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
