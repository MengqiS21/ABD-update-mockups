<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City of Lakewood | Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Public Sans"', "sans-serif"]
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="portal-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { Header, Footer, serviceCategories } = window.LakewoodPortal;

      function App() {
        return (
          <>
            <a
              href="#main-content"
              className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0"
            >
              Skip to main content
            </a>
            <Header activePath="services.html" />
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <section className="page-section rounded-[2rem] p-8">
                <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-600">Service directory</p>
                <h1 className="mt-3 text-4xl font-extrabold tracking-tight text-slate-950">City services overview</h1>
                <p className="mt-3 max-w-3xl text-base leading-7 text-slate-700">
                  Browse the main service categories used by residents, businesses, and visitors. Each service area is organized by common civic tasks.
                </p>
              </section>

              <section className="mt-8 grid gap-5 md:grid-cols-2 xl:grid-cols-3" aria-label="Service categories">
                {serviceCategories.map((category) => (
                  <article key={category.name} className="service-tile rounded-[1.75rem] border border-slate-200 bg-white p-6 shadow-sm transition">
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Category</p>
                    <h2 className="mt-3 text-2xl font-bold text-slate-950">{category.name}</h2>
                    <p className="mt-3 text-sm leading-7 text-slate-600">{category.description}</p>
                    <a
                      href={category.href}
                      className="mt-6 inline-flex rounded-full bg-slate-950 px-4 py-2 text-sm font-semibold text-white no-underline hover:bg-slate-800"
                    >
                      Open service
                    </a>
                  </article>
                ))}
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
