<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City of Lakewood | Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Public Sans"', "sans-serif"]
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="portal-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { Header, Footer } = window.LakewoodPortal;

      function App() {
        return (
          <>
            <a
              href="#main-content"
              className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0"
            >
              Skip to main content
            </a>
            <Header activePath="contact.html" />
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <section className="page-section rounded-[2rem] p-8">
                <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-600">Contact the city</p>
                <h1 className="mt-3 text-4xl font-extrabold tracking-tight text-slate-950">Department directory and inquiry form</h1>
                <p className="mt-3 max-w-3xl text-base leading-7 text-slate-700">
                  Reach the right department, send an online inquiry, or visit City Hall in person.
                </p>
              </section>

              <section className="mt-8 grid gap-8 xl:grid-cols-[1fr_380px]">
                <div className="space-y-8">
                  <div className="page-section rounded-[1.75rem] p-6">
                    <h2 className="text-2xl font-bold text-slate-950">Department directory</h2>
                    <div className="mt-6 grid gap-4 md:grid-cols-2">
                      {[
                        ["Utilities", "(253) 555-0184", "Mon-Thu 8:00 AM to 5:30 PM"],
                        ["Planning & Permits", "(253) 555-0116", "Mon-Thu 8:30 AM to 5:00 PM"],
                        ["Parks & Recreation", "(253) 555-0199", "Mon-Fri 8:00 AM to 5:00 PM"],
                        ["Public Works", "(253) 555-0127", "Mon-Thu 8:00 AM to 5:30 PM"]
                      ].map(([name, phone, hours]) => (
                        <article key={name} className="directory-card rounded-[1.25rem] border border-slate-200 bg-white p-4 transition">
                          <h3 className="text-lg font-bold text-slate-950">{name}</h3>
                          <p className="mt-2 text-sm text-slate-700">{phone}</p>
                          <p className="mt-1 text-sm text-slate-600">{hours}</p>
                        </article>
                      ))}
                    </div>
                  </div>

                  <div className="page-section rounded-[1.75rem] p-6">
                    <h2 className="text-2xl font-bold text-slate-950">Send an inquiry</h2>
                    <form className="mt-6 space-y-5">
                      <div>
                        <label htmlFor="contact-name" className="mb-2 block text-sm font-semibold text-slate-700">
                          Name
                        </label>
                        <input
                          id="contact-name"
                          type="text"
                          className="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900"
                          required
                        />
                      </div>
                      <div>
                        <label htmlFor="contact-email" className="mb-2 block text-sm font-semibold text-slate-700">
                          Email
                        </label>
                        <input
                          id="contact-email"
                          type="email"
                          className="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900"
                          required
                        />
                      </div>
                      <div>
                        <label htmlFor="contact-department" className="mb-2 block text-sm font-semibold text-slate-700">
                          Department
                        </label>
                        <select
                          id="contact-department"
                          className="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900"
                          required
                        >
                          <option value="">Select a department</option>
                          <option>Utilities</option>
                          <option>Planning & Permits</option>
                          <option>Parks & Recreation</option>
                          <option>Public Works</option>
                        </select>
                      </div>
                      <div>
                        <label htmlFor="contact-message" className="mb-2 block text-sm font-semibold text-slate-700">
                          Message
                        </label>
                        <textarea
                          id="contact-message"
                          rows="5"
                          className="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900"
                          required
                        ></textarea>
                      </div>
                      <button
                        type="submit"
                        className="rounded-full bg-slate-950 px-6 py-3 text-sm font-bold text-white hover:bg-slate-800"
                      >
                        Send message
                      </button>
                    </form>
                  </div>
                </div>

                <aside className="space-y-8">
                  <div className="page-section rounded-[1.75rem] p-6">
                    <h2 className="text-2xl font-bold text-slate-950">City Hall location</h2>
                    <img
                      src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=1200&q=80"
                      alt="Map-style aerial view representing the area around Lakewood City Hall"
                      className="mt-5 h-64 w-full rounded-[1.25rem] object-cover"
                    />
                    <p className="mt-4 text-sm leading-7 text-slate-600">
                      480 Civic Center Drive, Lakewood, WA 98499
                    </p>
                  </div>
                  <div className="page-section rounded-[1.75rem] p-6">
                    <h2 className="text-2xl font-bold text-slate-950">Social media</h2>
                    <nav className="mt-5 space-y-3" aria-label="Social media links">
                      {[
                        ["Facebook", "#"],
                        ["Instagram", "#"],
                        ["YouTube", "#"]
                      ].map(([label, href]) => (
                        <a
                          key={label}
                          href={href}
                          className="block rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-900 no-underline hover:bg-slate-50"
                        >
                          {label}
                        </a>
                      ))}
                    </nav>
                  </div>
                </aside>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
