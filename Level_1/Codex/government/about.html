<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City of Lakewood | About</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Public Sans"', "sans-serif"]
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="portal-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { Header, Footer, leadership } = window.LakewoodPortal;

      function App() {
        return (
          <>
            <a
              href="#main-content"
              className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0"
            >
              Skip to main content
            </a>
            <Header activePath="about.html" />
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <section className="page-section rounded-[2rem] p-8">
                <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-600">About the city</p>
                <h1 className="mt-3 text-4xl font-extrabold tracking-tight text-slate-950">About Lakewood</h1>
                <p className="mt-3 max-w-3xl text-base leading-7 text-slate-700">
                  Lakewood is a mid-sized municipal government serving roughly 160,000 residents through community-centered planning, reliable public services, and transparent local leadership.
                </p>
              </section>

              <section className="mt-8 grid gap-8 lg:grid-cols-[1fr_320px]">
                <div className="page-section rounded-[1.75rem] p-6">
                  <h2 className="text-2xl font-bold text-slate-950">City history</h2>
                  <div className="mt-4 space-y-4 text-sm leading-7 text-slate-700">
                    <p>
                      Originally developed as a regional residential and commercial hub, Lakewood grew around transit corridors, neighborhood business districts, and a strong parks network.
                    </p>
                    <p>
                      Today the city balances long-term infrastructure investment with public safety, housing, recreation, and economic development priorities shaped by resident input.
                    </p>
                  </div>
                  <h2 className="mt-8 text-2xl font-bold text-slate-950">Mission statement</h2>
                  <p className="mt-4 text-sm leading-7 text-slate-700">
                    To deliver accessible, equitable, and responsive public services that strengthen trust, improve quality of life, and support a resilient civic future.
                  </p>
                </div>
                <aside className="page-section rounded-[1.75rem] p-6">
                  <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-600">Annual report</p>
                  <h2 className="mt-2 text-2xl font-extrabold text-slate-950">2024 city report</h2>
                  <p className="mt-3 text-sm leading-7 text-slate-600">
                    Review budget priorities, service metrics, neighborhood investments, and council initiatives.
                  </p>
                  <a
                    href="#"
                    className="mt-5 inline-flex rounded-full bg-slate-950 px-5 py-3 text-sm font-semibold text-white no-underline hover:bg-slate-800"
                    aria-label="Download annual report PDF"
                  >
                    Download Annual Report
                  </a>
                </aside>
              </section>

              <section className="mt-8" aria-labelledby="leadership-title">
                <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-600">Leadership</p>
                <h2 id="leadership-title" className="mt-2 text-3xl font-extrabold text-slate-950">City leadership team</h2>
                <div className="mt-6 grid gap-5 md:grid-cols-2 xl:grid-cols-4">
                  {leadership.map((leader) => (
                    <article key={leader.name} className="team-card rounded-[1.75rem] border border-slate-200 bg-white p-5 shadow-sm transition">
                      <img src={leader.image} alt={leader.alt} className="h-64 w-full rounded-[1.25rem] object-cover" />
                      <h3 className="mt-4 text-xl font-bold text-slate-950">{leader.name}</h3>
                      <p className="mt-1 text-sm text-slate-600">{leader.title}</p>
                    </article>
                  ))}
                </div>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
