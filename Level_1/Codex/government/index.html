<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City of Lakewood | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Public Sans"', "sans-serif"]
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="portal-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { Header, Footer, serviceCategories, newsItems, events } = window.LakewoodPortal;

      function App() {
        return (
          <>
            <a
              href="#main-content"
              className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0"
            >
              Skip to main content
            </a>
            <Header activePath="index.html" />
            <div className="border-b border-red-200 bg-red-50" role="alert" aria-live="polite">
              <div className="mx-auto flex max-w-7xl flex-col gap-2 px-4 py-3 text-sm text-red-900 lg:flex-row lg:items-center lg:px-6">
                <span className="font-bold uppercase tracking-[0.18em]">Emergency Alert</span>
                <span>Road Closure: Main St between 3rd and 5th Ave until Nov 30.</span>
              </div>
            </div>
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <section className="page-section rounded-[2rem] p-8 lg:p-12">
                <div className="grid gap-8 lg:grid-cols-[1.15fr_0.85fr] lg:items-center">
                  <div className="space-y-6">
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-600">Resident services</p>
                    <h1 className="max-w-3xl text-4xl font-extrabold tracking-tight text-slate-950 sm:text-5xl">
                      How can we help you?
                    </h1>
                    <p className="max-w-2xl text-lg leading-8 text-slate-700">
                      Access permits, utility billing, park information, and city updates through a single public service portal.
                    </p>
                    <form className="max-w-2xl" role="search" aria-label="Search city services">
                      <label htmlFor="task-search" className="sr-only">Search city services</label>
                      <div className="flex flex-col gap-3 sm:flex-row">
                        <input
                          id="task-search"
                          type="search"
                          placeholder="Search permits, utility bills, parks, and city services"
                          className="w-full rounded-full border border-slate-300 bg-white px-5 py-4 text-sm text-slate-900 shadow-sm placeholder:text-slate-500"
                        />
                        <button
                          type="submit"
                          className="rounded-full bg-slate-950 px-6 py-4 text-sm font-bold text-white hover:bg-slate-800"
                        >
                          Search
                        </button>
                      </div>
                    </form>
                  </div>
                  <div className="glass-card rounded-[1.75rem] border border-slate-200 p-6">
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Quick status</p>
                    <dl className="mt-5 space-y-4">
                      {[
                        ["Permit turnaround", "5 business days average"],
                        ["Utility payment cutoff", "Nov 28 at 5:00 PM"],
                        ["Park facility reservations", "Winter season open"]
                      ].map(([label, value]) => (
                        <div key={label} className="rounded-2xl bg-slate-50 p-4">
                          <dt className="text-sm font-medium text-slate-600">{label}</dt>
                          <dd className="mt-1 text-lg font-bold text-slate-950">{value}</dd>
                        </div>
                      ))}
                    </dl>
                  </div>
                </div>
              </section>

              <section className="mt-10" aria-labelledby="quick-services-title">
                <div className="flex items-end justify-between gap-4">
                  <div>
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-600">Quick access</p>
                    <h2 id="quick-services-title" className="mt-2 text-3xl font-extrabold text-slate-950">
                      Start a common task
                    </h2>
                  </div>
                  <a href="services.html" className="text-sm font-semibold text-slate-700 hover:text-slate-950">
                    Browse all services
                  </a>
                </div>
                <div className="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                  {[
                    ["Pay a Bill", "billing.html", "Manage utility balances and make a payment."],
                    ["Report an Issue", "contact.html", "Share service requests or neighborhood concerns."],
                    ["Apply for a Permit", "permits.html", "Start a permit or license application online."],
                    ["Find a Park", "services.html", "Explore parks, trails, and recreation access."]
                  ].map(([label, href, text]) => (
                    <a
                      key={label}
                      href={href}
                      className="service-tile rounded-[1.5rem] border border-slate-200 bg-white p-6 no-underline shadow-sm transition hover:border-slate-300"
                    >
                      <h3 className="text-xl font-bold text-slate-950">{label}</h3>
                      <p className="mt-3 text-sm leading-7 text-slate-600">{text}</p>
                    </a>
                  ))}
                </div>
              </section>

              <section className="mt-10 grid gap-8 lg:grid-cols-[1fr_340px]">
                <div className="page-section rounded-[1.75rem] p-6">
                  <div className="flex items-end justify-between gap-4">
                    <div>
                      <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-600">News & announcements</p>
                      <h2 className="mt-2 text-3xl font-extrabold text-slate-950">Latest city updates</h2>
                    </div>
                    <a href="about.html" className="text-sm font-semibold text-slate-700 hover:text-slate-950">
                      Learn about the city
                    </a>
                  </div>
                  <div className="mt-6 grid gap-4 md:grid-cols-3">
                    {newsItems.map((item) => (
                      <article key={item.title} className="news-card rounded-[1.5rem] border border-slate-200 bg-white p-5 transition">
                        <h3 className="text-lg font-bold text-slate-950">{item.title}</h3>
                        <p className="mt-3 text-sm leading-7 text-slate-600">{item.text}</p>
                      </article>
                    ))}
                  </div>
                </div>
                <aside className="page-section rounded-[1.75rem] p-6" aria-labelledby="events-title">
                  <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-600">Upcoming</p>
                  <h2 id="events-title" className="mt-2 text-2xl font-extrabold text-slate-950">City events</h2>
                  <ol className="mt-5 space-y-4">
                    {events.map((event) => (
                      <li key={event.title} className="rounded-2xl bg-slate-50 p-4">
                        <p className="text-sm font-semibold text-slate-600">{event.date}</p>
                        <p className="mt-1 text-lg font-bold text-slate-950">{event.title}</p>
                        <p className="mt-1 text-sm text-slate-600">{event.place}</p>
                      </li>
                    ))}
                  </ol>
                </aside>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
