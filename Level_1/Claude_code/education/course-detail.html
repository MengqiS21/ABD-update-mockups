                            <span aria-hidden="true">{icon}</span>
                            <span className="text-xs">{text}</span>
                          </div>
                        ))}
                      </div>

                      <div className="mt-5 pt-5 border-t border-gray-100 flex justify-around text-xs text-indigo-600 font-semibold">
                        <a href="#" className="hover:text-indigo-700">Share</a>
                        <a href="#" className="hover:text-indigo-700">Gift</a>
                        <a href="#" className="hover:text-indigo-700">Coupon</a>
                      </div>
                    </div>
                  </div>
                </aside>
              </div>
            </div>
          </main>
          <Footer />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<CourseDetailPage />);
  </script>
</body>
</html>
