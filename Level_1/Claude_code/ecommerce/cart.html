<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart (3 items) – NovaMart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 100:'#dbeafe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 800:'#1e40af' },
            accent: { 400:'#fb923c', 500:'#f97316', 600:'#ea580c' }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *:focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; border-radius: 3px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const NAV_LINKS = [
      { label: 'Electronics', href: 'products.html?cat=electronics' },
      { label: 'Kitchen', href: 'products.html?cat=kitchen' },
      { label: 'Clothing', href: 'products.html?cat=clothing' },
      { label: 'Sports', href: 'products.html?cat=sports' },
      { label: "Today's Deals", href: 'products.html?cat=deals' },
    ];

    const INITIAL_ITEMS = [
      {
        id: 1,
        name: 'Sony WH-1000XM5 Wireless Noise-Cancelling Headphones',
        variant: 'Color: Midnight Black',
        price: 279.99,
        original: 349.99,
        qty: 1,
        img: 'headphones',
        alt: 'Sony WH-1000XM5 headphones in midnight black',
        inStock: true,
        stockNote: 'Only 14 left in stock',
      },
      {
        id: 2,
        name: 'Ninja Air Fryer XL 5.5 Quart Digital',
        variant: 'Size: 5.5 Qt',
        price: 89.99,
        original: 129.99,
        qty: 1,
        img: 'airfryer',
        alt: 'Ninja XL 5.5 quart air fryer in silver and black',
        inStock: true,
        stockNote: 'In stock',
      },
      {
        id: 3,
        name: 'Hydro Flask 32 oz Wide Mouth Water Bottle',
        variant: 'Color: Pacific · Size: 32 oz',
        price: 34.95,
        original: 44.95,
        qty: 2,
        img: 'flask',
        alt: 'Teal Pacific Hydro Flask 32 oz bottle',
        inStock: true,
        stockNote: 'In stock',
      },
    ];

    const RECOMMENDED = [
      { id:10, name:'Apple AirPods Pro 3rd Gen', price:199.99, img:'airpods', alt:'Apple AirPods Pro with case on white background' },
      { id:11, name:'Echo Dot (5th Gen)', price:29.99, img:'echo', alt:'Amazon Echo Dot smart speaker in charcoal' },
      { id:12, name:'Yoga Mat Premium 6mm', price:32.99, img:'yoga', alt:'Purple non-slip yoga mat on hardwood floor' },
      { id:13, name:'Ring Video Doorbell Pro', price:149.99, img:'doorbell', alt:'Ring doorbell installed beside white front door' },
    ];

    /* ─── Header ──────────────────────────────────── */
    const Header = ({ cartCount }) => {
      const [query, setQuery] = useState('');
      const handleSearch = (e) => e.preventDefault();
      return (
        <header role="banner">
          <div className="bg-brand-800 text-white text-sm py-1.5 text-center">
            🚚 Free shipping on orders over $35 — <a href="products.html" className="underline font-medium hover:text-brand-100">Shop Now</a>
          </div>
          <div className="bg-brand-700 text-white shadow-lg">
            <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">
              <a href="index.html" className="flex items-center gap-2 shrink-0 rounded" aria-label="NovaMart home">
                <div className="w-8 h-8 bg-accent-500 rounded-lg flex items-center justify-center font-black text-white text-lg" aria-hidden="true">N</div>
                <span className="text-xl font-black tracking-tight hidden sm:block">NovaMart</span>
              </a>
              <form onSubmit={handleSearch} role="search" className="flex-1 flex max-w-2xl" aria-label="Site search">
                <label htmlFor="site-search" className="sr-only">Search NovaMart</label>
                <input id="site-search" type="search" value={query} onChange={e => setQuery(e.target.value)} placeholder="Search products, brands, categories…"
                  className="flex-1 px-4 py-2 rounded-l-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-accent-400" />
                <button type="submit" className="bg-accent-500 hover:bg-accent-600 px-4 rounded-r-lg font-semibold text-sm transition-colors" aria-label="Submit search">🔍 Search</button>
              </form>
              <nav aria-label="Account and cart" className="flex items-center gap-3 shrink-0">
                <a href="account.html" className="flex flex-col items-center text-xs hover:text-brand-100 px-2 py-1" aria-label="Your account"><span aria-hidden="true" className="text-xl">👤</span><span className="hidden sm:block">Account</span></a>
                <a href="cart.html" className="relative flex flex-col items-center text-xs hover:text-brand-100 px-2 py-1 text-accent-400 font-bold" aria-label={`Cart, ${cartCount} items`} aria-current="page">
                  <span aria-hidden="true" className="text-xl">🛒</span><span className="hidden sm:block">Cart</span>
                  {cartCount > 0 && <span className="absolute -top-1 -right-1 bg-accent-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center" aria-hidden="true">{cartCount}</span>}
                </a>
              </nav>
            </div>
            <nav aria-label="Main categories" className="bg-brand-600">
              <div className="max-w-7xl mx-auto px-4">
                <ul className="flex gap-1">
                  {NAV_LINKS.map(link => (
                    <li key={link.label}>
                      <a href={link.href} className="block px-4 py-2 text-sm font-medium text-white hover:bg-brand-500 rounded-t transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white">{link.label}</a>
                    </li>
                  ))}
                </ul>
              </div>
            </nav>
          </div>
        </header>
      );
    };

    /* ─── Footer ──────────────────────────────────── */
    const Footer = () => (
      <footer className="bg-gray-900 text-gray-300 mt-16" role="contentinfo">
        <div className="max-w-7xl mx-auto px-4 py-12 grid grid-cols-2 md:grid-cols-4 gap-8">
          <div>
            <div className="flex items-center gap-2 mb-4">
              <div className="w-7 h-7 bg-accent-500 rounded-lg flex items-center justify-center font-black text-white" aria-hidden="true">N</div>
              <span className="text-white font-black text-lg">NovaMart</span>
            </div>
            <p className="text-sm text-gray-400">Your trusted marketplace for electronics, home goods, and apparel.</p>
          </div>
          {[
            { title:'Shop', items:['Electronics','Kitchen','Clothing','Sports',"Today's Deals"] },
            { title:'Help',  items:['Track Order','Returns & Refunds','Shipping Info','FAQs','Contact Us'] },
            { title:'Company', items:['About NovaMart','Careers','Press','Sell on NovaMart','Affiliate Program'] },
          ].map(col => (
            <div key={col.title}>
              <h3 className="text-white font-semibold mb-3 text-sm uppercase tracking-wide">{col.title}</h3>
              <ul className="space-y-2 text-sm">
                {col.items.map(item => <li key={item}><a href="#" className="hover:text-white transition-colors">{item}</a></li>)}
              </ul>
            </div>
          ))}
        </div>
        <div className="border-t border-gray-800 max-w-7xl mx-auto px-4 py-6 flex flex-col sm:flex-row justify-between items-center gap-4 text-sm text-gray-500">
          <p>© 2026 NovaMart, Inc. All rights reserved.</p>
          <div className="flex gap-4">
            <a href="#" className="hover:text-white">Privacy Policy</a>
            <a href="#" className="hover:text-white">Terms of Service</a>
          </div>
        </div>
      </footer>
    );

    /* ─── Cart Item ───────────────────────────────── */
    const CartItem = ({ item, onQtyChange, onRemove, onSaveForLater }) => {
      const discount = Math.round((1 - item.price / item.original) * 100);
      return (
        <article className="bg-white rounded-xl border border-gray-200 p-4 md:p-5 flex gap-4" aria-label={`Cart item: ${item.name}`}>
          {/* Image */}
          <a href="product-detail.html" className="shrink-0 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-600 rounded-xl" aria-label={`View ${item.name}`}>
            <img src={`https://picsum.photos/seed/${item.img}/120/120`} alt={item.alt} width="120" height="120"
              className="w-24 h-24 md:w-28 md:h-28 object-cover rounded-xl" />
          </a>

          {/* Details */}
          <div className="flex-1 min-w-0">
            <div className="flex items-start justify-between gap-2">
              <div className="flex-1 min-w-0">
                <h3 className="font-semibold text-gray-900 text-sm leading-snug mb-1">
                  <a href="product-detail.html" className="hover:text-brand-600 focus-visible:text-brand-600 focus-visible:outline-none">{item.name}</a>
                </h3>
                <p className="text-xs text-gray-500 mb-1">{item.variant}</p>
                <p className={`text-xs font-medium ${item.inStock ? 'text-green-600' : 'text-red-600'}`}>{item.stockNote}</p>
              </div>
              {/* Mobile price */}
              <div className="text-right shrink-0 md:hidden">
                <div className="font-black text-gray-900">${(item.price * item.qty).toFixed(2)}</div>
                {discount > 0 && <div className="text-xs text-red-600 font-semibold">−{discount}% off</div>}
              </div>
            </div>

            {/* Controls */}
            <div className="flex flex-wrap items-center gap-3 mt-3">
              {/* Quantity */}
              <div className="flex items-center border border-gray-300 rounded-lg overflow-hidden" role="group" aria-label={`Quantity for ${item.name}`}>
                <button onClick={() => onQtyChange(item.id, item.qty - 1)} className="px-2.5 py-1.5 text-sm hover:bg-gray-100 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-600 focus-visible:ring-inset" aria-label={`Decrease quantity of ${item.name}`}>−</button>
                <span className="px-3 py-1.5 text-sm font-semibold border-x border-gray-300 min-w-[36px] text-center" aria-live="polite" aria-label={`Quantity: ${item.qty}`}>{item.qty}</span>
                <button onClick={() => onQtyChange(item.id, item.qty + 1)} className="px-2.5 py-1.5 text-sm hover:bg-gray-100 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-600 focus-visible:ring-inset" aria-label={`Increase quantity of ${item.name}`}>+</button>
              </div>

              {/* Action buttons */}
              <div className="flex items-center gap-2 text-xs" role="group" aria-label={`Actions for ${item.name}`}>
                <button onClick={() => onSaveForLater(item.id)}
                  className="text-brand-600 hover:text-brand-700 hover:underline font-medium focus-visible:outline-none focus-visible:underline"
                  aria-label={`Save ${item.name} for later`}>Save for later</button>
                <span className="text-gray-300" aria-hidden="true">|</span>
                <button onClick={() => onRemove(item.id)}
                  className="text-red-600 hover:text-red-700 hover:underline font-medium focus-visible:outline-none focus-visible:underline"
                  aria-label={`Remove ${item.name} from cart`}>Remove</button>
              </div>
            </div>
          </div>

          {/* Desktop price */}
          <div className="hidden md:flex flex-col items-end justify-between shrink-0 pl-4">
            <div className="text-right">
              <div className="text-lg font-black text-gray-900" aria-label={`Item total: $${(item.price * item.qty).toFixed(2)}`}>${(item.price * item.qty).toFixed(2)}</div>
              <div className="text-sm text-gray-400 line-through">${(item.original * item.qty).toFixed(2)}</div>
              {discount > 0 && <div className="text-xs text-red-600 font-semibold">−{discount}% off</div>}
            </div>
            <div className="text-xs text-gray-400">per unit: ${item.price.toFixed(2)}</div>
          </div>
        </article>
      );
    };

    /* ─── Order Summary ───────────────────────────── */
    const OrderSummary = ({ items, promoCode, setPromoCode, promoApplied, onApplyPromo, onCheckout }) => {
      const subtotal = items.reduce((sum, i) => sum + i.price * i.qty, 0);
      const savings = items.reduce((sum, i) => sum + (i.original - i.price) * i.qty, 0);
      const shipping = subtotal >= 35 ? 0 : 5.99;
      const promoDiscount = promoApplied ? subtotal * 0.1 : 0;
      const tax = (subtotal - promoDiscount) * 0.08;
      const total = subtotal + shipping - promoDiscount + tax;
      const totalItems = items.reduce((sum, i) => sum + i.qty, 0);

      return (
        <aside aria-label="Order summary" className="bg-white rounded-xl border border-gray-200 p-5 sticky top-4">
          <h2 className="font-bold text-gray-900 text-lg mb-5">Order Summary</h2>

          {/* Line items */}
          <dl className="space-y-3 text-sm">
            <div className="flex justify-between">
              <dt className="text-gray-600">Subtotal ({totalItems} item{totalItems !== 1 ? 's' : ''})</dt>
              <dd className="font-semibold" aria-label={`Subtotal: $${subtotal.toFixed(2)}`}>${subtotal.toFixed(2)}</dd>
            </div>
            <div className="flex justify-between text-green-600">
              <dt>Savings</dt>
              <dd className="font-semibold" aria-label={`Total savings: $${savings.toFixed(2)}`}>−${savings.toFixed(2)}</dd>
            </div>
            {promoApplied && (
              <div className="flex justify-between text-green-600">
                <dt>Promo code (NOVA10)</dt>
                <dd className="font-semibold" aria-label={`Promo discount: $${promoDiscount.toFixed(2)}`}>−${promoDiscount.toFixed(2)}</dd>
              </div>
            )}
            <div className="flex justify-between">
              <dt className="text-gray-600">Shipping estimate</dt>
              <dd className="font-semibold" aria-label={shipping === 0 ? 'Free shipping' : `Shipping: $${shipping.toFixed(2)}`}>
                {shipping === 0 ? <span className="text-green-600">FREE</span> : `$${shipping.toFixed(2)}`}
              </dd>
            </div>
            {shipping === 0 && (
              <div className="bg-green-50 text-green-700 text-xs rounded-lg p-2 border border-green-200 flex items-center gap-1.5">
                <span aria-hidden="true">✓</span> You qualify for free shipping!
              </div>
            )}
            <div className="flex justify-between text-gray-600">
              <dt>Estimated tax (8%)</dt>
              <dd aria-label={`Tax: $${tax.toFixed(2)}`}>${tax.toFixed(2)}</dd>
            </div>
          </dl>

          {/* Promo code */}
          <div className="mt-5 border-t border-gray-200 pt-5">
            <label htmlFor="promo-input" className="text-sm font-semibold text-gray-800 block mb-2">Promo Code</label>
            <div className="flex gap-2">
              <input
                id="promo-input"
                type="text"
                value={promoCode}
                onChange={e => setPromoCode(e.target.value.toUpperCase())}
                placeholder="Enter code (e.g. NOVA10)"
                disabled={promoApplied}
                className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-600 disabled:bg-gray-100 disabled:text-gray-400"
                aria-label="Promo code"
                aria-describedby="promo-hint"
              />
              <button
                onClick={onApplyPromo}
                disabled={promoApplied || !promoCode}
                className="px-3 py-2 bg-brand-600 hover:bg-brand-700 disabled:bg-gray-300 text-white text-sm font-semibold rounded-lg transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-600 focus-visible:ring-offset-2"
                aria-label={promoApplied ? 'Promo code applied' : 'Apply promo code'}
              >
                {promoApplied ? '✓' : 'Apply'}
              </button>
            </div>
            <p id="promo-hint" className="text-xs text-gray-400 mt-1">
              {promoApplied ? '🎉 NOVA10 applied — 10% off your order!' : 'Try NOVA10 for 10% off'}
            </p>
          </div>

          {/* Total */}
          <div className="mt-5 pt-5 border-t border-gray-200">
            <div className="flex justify-between items-center mb-5">
              <span className="font-bold text-gray-900 text-base">Order Total</span>
              <span className="font-black text-gray-900 text-2xl" aria-label={`Order total: $${total.toFixed(2)}`}>${total.toFixed(2)}</span>
            </div>
            <button
              onClick={onCheckout}
              className="w-full py-4 bg-accent-500 hover:bg-accent-600 text-white font-black text-lg rounded-xl transition-colors focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-accent-500 focus-visible:ring-offset-2"
              aria-label={`Proceed to checkout, total $${total.toFixed(2)}`}
            >
              Proceed to Checkout →
            </button>
            <p className="text-xs text-center text-gray-400 mt-3">
              🔒 Secure checkout · SSL encrypted
            </p>
          </div>

          {/* Payment icons */}
          <div className="mt-4 flex items-center justify-center gap-2">
            {['Visa', 'MC', 'Amex', 'PayPal', 'Apple Pay'].map(p => (
              <span key={p} className="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded font-medium border border-gray-200">{p}</span>
            ))}
          </div>
        </aside>
      );
    };

    /* ─── Recommended ─────────────────────────────── */
    const Recommended = ({ products }) => (
      <section aria-labelledby="recommended-heading" className="mt-10">
        <h2 id="recommended-heading" className="text-xl font-bold text-gray-900 mb-5">Customers Also Bought</h2>
        <ul className="grid grid-cols-2 md:grid-cols-4 gap-4" role="list">
          {products.map(p => (
            <li key={p.id} role="listitem">
              <article className="bg-white rounded-xl border border-gray-200 p-4 hover:shadow-md transition-shadow flex flex-col items-center gap-2">
                <a href="product-detail.html" aria-label={`View ${p.name}`} className="block focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-600 rounded-xl overflow-hidden w-full">
                  <img src={`https://picsum.photos/seed/${p.img}/200/160`} alt={p.alt} width="200" height="160"
                    className="w-full h-28 object-cover rounded-lg hover:scale-105 transition-transform duration-300" />
                </a>
                <h3 className="text-xs font-semibold text-gray-800 text-center line-clamp-2 leading-snug">
                  <a href="product-detail.html" className="hover:text-brand-600 focus-visible:text-brand-600 focus-visible:outline-none">{p.name}</a>
                </h3>
                <span className="font-black text-gray-900 text-sm" aria-label={`Price: $${p.price}`}>${p.price.toFixed(2)}</span>
                <a href="cart.html" className="w-full text-center text-xs font-semibold py-2 rounded-lg bg-brand-600 hover:bg-brand-700 text-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-600 focus-visible:ring-offset-2"
                  aria-label={`Add ${p.name} to cart`}>Add to Cart</a>
              </article>
            </li>
          ))}
        </ul>
      </section>
    );

    /* ─── App ─────────────────────────────────────── */
    const App = () => {
      const [items, setItems] = useState(INITIAL_ITEMS);
      const [promoCode, setPromoCode] = useState('');
      const [promoApplied, setPromoApplied] = useState(false);
      const [checkoutMsg, setCheckoutMsg] = useState(false);
      const [removedMsg, setRemovedMsg] = useState('');

      const cartCount = items.reduce((sum, i) => sum + i.qty, 0);

      const handleQtyChange = (id, newQty) => {
        if (newQty < 1) return;
        setItems(prev => prev.map(i => i.id === id ? {...i, qty: newQty} : i));
      };

      const handleRemove = (id) => {
        const item = items.find(i => i.id === id);
        setItems(prev => prev.filter(i => i.id !== id));
        setRemovedMsg(`"${item.name}" removed from cart.`);
        setTimeout(() => setRemovedMsg(''), 4000);
      };

      const handleSaveForLater = (id) => {
        const item = items.find(i => i.id === id);
        setItems(prev => prev.filter(i => i.id !== id));
        setRemovedMsg(`"${item.name}" saved to your wishlist.`);
        setTimeout(() => setRemovedMsg(''), 4000);
      };

      const handleApplyPromo = () => {
        if (promoCode === 'NOVA10') setPromoApplied(true);
        else alert('Invalid promo code. Try NOVA10 for a demo!');
      };

      const handleCheckout = () => {
        setCheckoutMsg(true);
        setTimeout(() => setCheckoutMsg(false), 3000);
      };

      return (
        <div className="min-h-screen flex flex-col">
          <a href="#main-content" className="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 bg-brand-600 text-white px-4 py-2 rounded z-50 font-semibold">Skip to main content</a>
          <Header cartCount={cartCount} />

          <main id="main-content" className="flex-1 max-w-7xl mx-auto px-4 py-6 w-full">
            {/* Breadcrumb */}
            <nav aria-label="Breadcrumb" className="mb-4">
              <ol className="flex items-center gap-2 text-sm text-gray-500" role="list">
                <li><a href="index.html" className="hover:text-brand-600 focus-visible:text-brand-600">Home</a></li>
                <li aria-hidden="true">›</li>
                <li className="text-gray-900 font-medium" aria-current="page">Your Cart</li>
              </ol>
            </nav>

            <h1 className="text-2xl md:text-3xl font-black text-gray-900 mb-6">
              Your Cart <span className="text-gray-400 font-normal text-xl" aria-label={`${cartCount} items`}>({cartCount} item{cartCount !== 1 ? 's' : ''})</span>
            </h1>

            {/* Alerts */}
            {removedMsg && (
              <div role="alert" aria-live="polite" className="mb-4 bg-blue-50 text-blue-800 border border-blue-200 rounded-xl px-4 py-3 text-sm font-medium flex items-center gap-2">
                <span aria-hidden="true">ℹ️</span> {removedMsg}
              </div>
            )}
            {checkoutMsg && (
              <div role="alert" aria-live="assertive" className="mb-4 bg-green-50 text-green-800 border border-green-200 rounded-xl px-4 py-3 text-sm font-medium flex items-center gap-2">
                <span aria-hidden="true">🎉</span> Redirecting to checkout... (This is a mockup)
              </div>
            )}

            {items.length === 0 ? (
              /* Empty cart */
              <div className="text-center py-24 bg-white rounded-2xl border border-gray-200">
                <p className="text-7xl mb-6" aria-hidden="true">🛒</p>
                <h2 className="text-2xl font-bold text-gray-700 mb-3">Your cart is empty</h2>
                <p className="text-gray-500 mb-8">Looks like you haven't added anything yet. Browse our deals below!</p>
                <a href="products.html" className="inline-block bg-brand-600 hover:bg-brand-700 text-white font-bold px-8 py-3 rounded-xl transition-colors focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-brand-600 focus-visible:ring-offset-2">
                  Continue Shopping
                </a>
              </div>
            ) : (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                {/* Cart items */}
                <div className="lg:col-span-2 space-y-4">
                  {/* Free shipping banner */}
                  <div className="bg-green-50 border border-green-200 rounded-xl px-4 py-3 text-sm text-green-800 flex items-center gap-2">
                    <span aria-hidden="true">🚚</span>
                    <span>Your order qualifies for <strong>FREE shipping</strong>!</span>
                  </div>

                  {/* Items */}
                  <ul aria-label="Cart items" className="space-y-4">
                    {items.map(item => (
                      <li key={item.id}>
                        <CartItem
                          item={item}
                          onQtyChange={handleQtyChange}
                          onRemove={handleRemove}
                          onSaveForLater={handleSaveForLater}
                        />
                      </li>
                    ))}
                  </ul>

                  {/* Continue shopping */}
                  <div className="flex justify-between items-center pt-2">
                    <a href="products.html" className="text-brand-600 hover:text-brand-700 font-semibold text-sm flex items-center gap-1 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-600 rounded">
                      ← Continue Shopping
                    </a>
                    <p className="text-xs text-gray-400">All prices in USD. Taxes calculated at checkout.</p>
                  </div>
                </div>

                {/* Summary */}
                <div>
                  <OrderSummary
                    items={items}
                    promoCode={promoCode}
                    setPromoCode={setPromoCode}
                    promoApplied={promoApplied}
                    onApplyPromo={handleApplyPromo}
                    onCheckout={handleCheckout}
                  />
                </div>
              </div>
            )}

            <Recommended products={RECOMMENDED} />
          </main>
          <Footer />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
