                </p>

                <p className="mb-6">

                {/* Pull Quote */}

                  <p className="font-serif italic text-2xl text-slate-800 leading-snug mb-3">
                    "The rerouting of 15,000 vessels around the Cape adds an average of 12 days to shipping times. The global economy is paying for a conflict it didn't choose."
                  </p>
                  <footer className="text-sm text-slate-600 font-sans not-italic font-medium">
                    — Dr. Fatima Al-Rasheed, Global Trade Institute
                  </footer>
                </blockquote>

                <p className="mb-6">
                  The Houthi movement — formally known as Ansar Allah — frames its attacks as solidarity with Palestinians in Gaza. But analysts who study the group's strategy see a more complex calculus at work. The strikes serve multiple purposes simultaneously: they demonstrate the movement's reach and technical capability, they impose costs on states aligned with Israel, and they enhance the Houthis' domestic political standing in Yemen, where the group now controls the most populous areas despite nearly a decade of grinding civil war. Each intercepted drone or missile becomes a recruiting tool; each ship struck becomes a fundraising moment.
                </p>

                <p className="mb-6">
                  The international response has been significant but, by most assessments, insufficient. Operation Prosperity Guardian, the US-led multinational naval coalition assembled in late 2024, has intercepted hundreds of drones and missiles. US and UK airstrikes have struck Houthi weapons stockpiles and launch sites inside Yemen. Yet the attacks have not stopped — if anything, they have intensified and grown more sophisticated, with the Houthis incorporating lessons from each engagement to develop new evasion and saturation tactics.
                </p>

                {/* Inline Related */}
                <aside className="border border-gray-200 rounded-lg p-4 my-8 bg-white">
                  <p className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Related</p>
                  <a href="article.html" className="font-serif font-semibold text-slate-900 hover:text-rose-700 transition-colors leading-snug focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">
                    Yemen's Houthi Movement: A History of Resilience and Reinvention →
                  </a>
                </aside>

                <p className="mb-6">
                  The economic consequences ripple far beyond the shipping industry. Manufacturers in Europe and Asia report delays in receiving critical components; retailers warn of inventory shortfalls ahead of peak seasons. Egypt has seen revenues from the Suez Canal — which handles transit fees for ships passing through the Red Sea — fall by more than 60 percent compared to pre-crisis levels, delivering a devastating blow to an economy already battered by currency devaluation and food price inflation. For a country where Canal revenues had funded infrastructure and subsidies for generations, the shortfall is not merely an accounting entry — it is a social and political crisis in slow motion.
                </p>

                {/* Tags */}
                <div className="mt-10 pt-8 border-t border-gray-200">
                  <nav aria-label="Article tags">
                    <div className="flex flex-wrap gap-2">
                      {['Red Sea', 'Yemen', 'Houthis', 'Global Trade', 'Middle East', 'Maritime Security'].map(tag => (
                        <a
                          key={tag}
                          href="#"
                          className="inline-block bg-gray-100 hover:bg-gray-200 text-slate-700 text-sm px-3 py-1 rounded-full transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500"
                        >
                          {tag}
                        </a>
                      ))}
                    </div>
                  </nav>
                </div>

                {/* Author Bio */}
                <div className="mt-10 p-6 bg-slate-50 border border-gray-200 rounded-xl flex gap-5 items-start">
                  <img
                    src="https://picsum.photos/seed/amirkhalil/200/200"
                    alt="Portrait of Amir Khalil, Middle East Correspondent"
                    className="w-20 h-20 rounded-full object-cover flex-shrink-0 border-2 border-white shadow"
                  />
                  <div>
                    <p className="font-semibold text-slate-900 text-lg">Amir Khalil</p>
                    <p className="text-sm text-rose-700 font-medium mb-2">Middle East Correspondent</p>
                    <p className="text-sm text-slate-600 font-body leading-relaxed">
                      Amir Khalil has reported from Lebanon, Yemen, Iraq, and Egypt for The Meridian for over a decade, with a focus on regional security, political Islam, and the humanitarian consequences of conflict.
                    </p>
                    <a href="#" className="text-rose-700 hover:text-rose-600 text-sm font-semibold mt-2 inline-block focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">
                      More by Amir Khalil →
                    </a>
                  </div>
                </div>
              </article>

              {/* Comments Section */}
              <section aria-labelledby="comments-heading" className="max-w-2xl mx-auto mt-12 pt-10 border-t border-gray-200">
                <h2 id="comments-heading" className="font-serif font-bold text-2xl text-slate-900 mb-6">
                  Reader Discussion <span className="text-slate-400 font-normal text-lg">142 comments</span>
                </h2>
                <CommentForm />
                <ul className="space-y-6">
                  {SAMPLE_COMMENTS.map((comment, i) => (
                    <li key={i} className="flex gap-4 items-start">
                      <img
                        src={comment.avatar}
                        alt={`Profile photo of commenter ${comment.username}`}
                        loading="lazy"
                        className="w-10 h-10 rounded-full object-cover flex-shrink-0"
                      />
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="font-semibold text-sm text-slate-900">@{comment.username}</span>
                          <span className="text-xs text-slate-400">·</span>
                          <time className="text-xs text-slate-400" dateTime="2026-03-15">{comment.date}</time>
                        </div>
                        <p className="text-sm text-slate-700 font-body leading-relaxed mb-2">{comment.text}</p>
                        <div className="flex gap-3">
                          <button
                            onClick={() => handleLike(i)}
                            aria-label={`Like this comment, currently ${commentLikes[i]} likes`}
                            className="text-xs text-slate-500 hover:text-rose-700 flex items-center gap-1 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded"
                          >
                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
                            {commentLikes[i]}
                          </button>
                          <button
                            aria-label={`Reply to comment by ${comment.username}`}
                            className="text-xs text-slate-500 hover:text-slate-800 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded"
                          >
                            Reply
                          </button>
                        </div>
                      </div>
                    </li>
                  ))}
                </ul>
              </section>

              {/* More from World */}
              <section aria-labelledby="more-world-heading" className="mt-14 pt-10 border-t border-gray-200 pb-6">
                <h2 id="more-world-heading" className="font-serif font-bold text-2xl text-slate-900 mb-6">More from World</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                  {MORE_FROM_WORLD.map((story, i) => (
                    <article key={i} className="group">
                      <a href="#" className="block overflow-hidden rounded-lg mb-3 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500">

                      <h3 className="font-serif font-bold text-slate-900 text-sm leading-snug mb-1">

                      </h3>
                      <p className="text-xs text-slate-500">By {story.author}</p>

                  ))}
                </div>
              </section>
            </div>
          </main>
          <MeridianFooter />
        </div>
