    .skip-link {

      border-radius: 0 0 4px 0;
      transition: top 0.15s;

                <a href="index.html" className="font-serif font-black text-2xl tracking-widest text-white hover:text-rose-400 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded" aria-label="The Meridian — Home">

                <nav aria-label="Primary navigation" className="hidden lg:flex items-center gap-1">
                  {NAV_LINKS.map(link => (
                    <a

                      href={link.href}
                      aria-current={currentPage === link.label ? 'page' : undefined}

        question: 'Can I cancel anytime?',

    function CheckIcon({ label }) {
      return (
        <span aria-label={label || 'Included'} className="text-green-600 font-bold text-lg">

    }

    function CrossIcon({ label }) {
      return (
        <span aria-label={label || 'Not included'} className="text-gray-300 font-bold text-lg">
          ✗
        </span>
      );
    }

    function StarRating({ count }) {
      return (
        <span aria-label={`${count} out of 5 stars`} className="flex gap-0.5">
          {Array.from({ length: count }).map((_, i) => (
            <svg key={i} className="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">

        lastName: '',

        password: '',

        setOpenFaq(prev => prev === id ? null : id);
      };

      const handleFormChange = (e) => {
        const { name, value, type, checked } = e.target;
        if (name.startsWith('nl-')) {
          const key = name.replace('nl-', '');
          setFormData(prev => ({
            ...prev,
            newsletters: { ...prev.newsletters, [key]: checked },
          }));
        } else {
          setFormData(prev => ({ ...prev, [name]: value }));
        }
      };

      const handleFormSubmit = (e) => {
        e.preventDefault();
        setFormSubmitted(true);

                      <tr className="border-b border-gray-200">
                        <th scope="col" className="text-left px-5 py-4 font-semibold text-slate-700 w-1/2">Feature</th>
                        <th scope="col" className="text-center px-5 py-4 font-semibold text-slate-700">Free</th>
                        <th scope="col" className="text-center px-5 py-4 font-bold text-rose-700 bg-rose-50">Digital</th>
                        <th scope="col" className="text-center px-5 py-4 font-semibold text-slate-700">All-Access</th>
                      </tr>
                    </thead>
                    <tbody>
                      {TABLE_FEATURES.map((row, i) => (
                        <tr key={i} className={`border-b border-gray-100 last:border-0 ${i % 2 === 0 ? 'bg-white' : 'bg-gray-50'}`}>
                          <th scope="row" className="text-left px-5 py-3.5 font-medium text-slate-700">{row.label}</th>
                          <td className="text-center px-5 py-3.5">
                            {typeof row.free === 'string'
                              ? <span className="text-slate-600">{row.free}</span>
                              : row.free
                                ? <CheckIcon label="Included in Free plan" />
                                : <CrossIcon label="Not included in Free plan" />
                            }
                          </td>
                          <td className="text-center px-5 py-3.5 bg-rose-50">
                            {typeof row.digital === 'string'
                              ? <span className="text-slate-600">{row.digital}</span>
                              : row.digital
                                ? <CheckIcon label="Included in Digital plan" />
                                : <CrossIcon label="Not included in Digital plan" />
                            }
                          </td>
                          <td className="text-center px-5 py-3.5">
                            {typeof row.allAccess === 'string'
                              ? <span className="text-slate-600">{row.allAccess}</span>
                              : row.allAccess
                                ? <CheckIcon label="Included in All-Access plan" />
                                : <CrossIcon label="Not included in All-Access plan" />
                            }
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </section>

            {/* Testimonials */}
            <section aria-labelledby="testimonials-heading" className="py-14 bg-white">
              <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                <h2 id="testimonials-heading" className="font-serif font-bold text-2xl text-slate-900 mb-8 text-center">What our subscribers say</h2>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-7">
                  {TESTIMONIALS.map((t, i) => (
                    <figure key={i} className="bg-gray-50 rounded-2xl p-7 border border-gray-200">
                      <div className="mb-3">
                        <StarRating count={t.stars} />
                      </div>
                      <blockquote className="font-body text-slate-700 leading-relaxed text-sm italic mb-4">
                        "{t.quote}"
                      </blockquote>
                      <figcaption>
                        <p className="font-semibold text-sm text-slate-900">{t.name}</p>
                        <p className="text-xs text-slate-500">{t.location} · Subscriber since {t.since}</p>
                      </figcaption>
                    </figure>
                  ))}
                </div>
              </div>
            </section>

            {/* FAQ Accordion */}
            <section aria-labelledby="faq-heading" className="py-14 bg-gray-50">
              <div className="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
                <h2 id="faq-heading" className="font-serif font-bold text-2xl text-slate-900 mb-8 text-center">Frequently Asked Questions</h2>
                <dl className="space-y-3">
                  {FAQ_ITEMS.map((item) => {
                    const isOpen = openFaq === item.id;
                    return (
                      <div key={item.id} className="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                        <dt>
                          <button
                            aria-expanded={isOpen}
                            aria-controls={`${item.id}-answer`}
                            onClick={() => toggleFaq(item.id)}
                            className="w-full flex items-center justify-between px-6 py-4 text-left font-semibold text-slate-900 hover:bg-gray-50 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500"
                          >
                            <span>{item.question}</span>
                            <svg
                              className={`w-5 h-5 text-slate-500 flex-shrink-0 ml-4 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}
                              fill="none"
                              stroke="currentColor"
                              viewBox="0 0 24 24"
                              aria-hidden="true"
                            >
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                            </svg>
                          </button>
                        </dt>
                        <dd
                          id={`${item.id}-answer`}
                          role="region"
                          aria-labelledby={`${item.id}-btn`}
                          hidden={!isOpen}
                          className="px-6 pb-5"
                        >
                          <p className="text-sm text-slate-600 font-body leading-relaxed">{item.answer}</p>
                        </dd>
                      </div>
                    );
                  })}
                </dl>
              </div>
            </section>

            {/* Sign-Up Form */}
            <section aria-labelledby="signup-form-heading" id="signup-form" className="py-14 bg-white">
              <div className="max-w-xl mx-auto px-4 sm:px-6 lg:px-8">
                <h2 id="signup-form-heading" className="font-serif font-bold text-3xl text-slate-900 mb-2 text-center">Start your subscription today</h2>
                <p className="text-center text-slate-500 font-body mb-8">Join over 400,000 subscribers worldwide.</p>
                {formSubmitted ? (
                  <div className="bg-green-50 border border-green-200 rounded-xl p-8 text-center">
                    <p className="text-green-700 font-semibold text-lg mb-2">Welcome to The Meridian!</p>
                    <p className="text-green-600 text-sm">Check your email for a verification link to activate your account.</p>
                  </div>
                ) : (
                  <form onSubmit={handleFormSubmit} className="space-y-5 bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label htmlFor="signup-first-name" className="block text-sm font-medium text-slate-700 mb-1">First name</label>
                        <input
                          id="signup-first-name"
                          name="firstName"
                          type="text"
                          value={formData.firstName}
                          onChange={handleFormChange}
                          required
                          autoComplete="given-name"
                          className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500"
                        />
                      </div>
                      <div>
                        <label htmlFor="signup-last-name" className="block text-sm font-medium text-slate-700 mb-1">Last name</label>
                        <input
                          id="signup-last-name"
                          name="lastName"
                          type="text"
                          value={formData.lastName}
                          onChange={handleFormChange}
                          required
                          autoComplete="family-name"
                          className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500"
                        />
                      </div>
                    </div>
                    <div>
                      <label htmlFor="signup-email" className="block text-sm font-medium text-slate-700 mb-1">Email address</label>
                      <input
                        id="signup-email"
                        name="email"
                        type="email"
                        value={formData.email}
                        onChange={handleFormChange}
                        required
                        autoComplete="email"
                        className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500"
                      />
                    </div>
                    <div>
                      <label htmlFor="signup-password" className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                      <input
                        id="signup-password"
                        name="password"
                        type="password"
                        value={formData.password}
                        onChange={handleFormChange}
                        required
                        autoComplete="new-password"
                        minLength={8}
                        className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500"
                      />
                      <p className="text-xs text-slate-400 mt-1">Minimum 8 characters</p>
                    </div>
                    <div>
                      <label htmlFor="signup-plan" className="block text-sm font-medium text-slate-700 mb-1">Select plan</label>
                      <select
                        id="signup-plan"
                        name="plan"
                        value={formData.plan}
                        onChange={handleFormChange}
                        className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-slate-900 bg-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500"
                      >
                        <option value="free">Free — $0/month</option>
                        <option value="digital">Digital — $9.99/month</option>
                        <option value="all-access">All-Access — $19.99/month</option>
                      </select>
                    </div>
                    <fieldset className="border border-gray-200 rounded-lg px-4 py-3">
                      <legend className="text-sm font-medium text-slate-700 px-1">Newsletter preferences</legend>
                      <div className="grid grid-cols-2 gap-2 mt-2">
                        {[
                          { id: 'nl-dailyBrief', label: 'Daily Brief' },
                          { id: 'nl-weekendEdition', label: 'Weekend Edition' },
                          { id: 'nl-techWeekly', label: 'Tech Weekly' },
                          { id: 'nl-cultureRoundup', label: 'Culture Roundup' },
                        ].map(({ id, label }) => (
                          <label key={id} className="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
                            <input
                              type="checkbox"
                              id={id}
                              name={id}
                              checked={formData.newsletters[id.replace('nl-', '')]}
                              onChange={handleFormChange}
                              className="rounded border-gray-300 text-rose-700 focus-visible:ring-rose-500"
                            />
                            {label}
                          </label>
                        ))}
                      </div>
                    </fieldset>
                    <button
                      type="submit"
                      className="w-full bg-rose-700 hover:bg-rose-600 text-white font-semibold py-3 rounded-lg transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 text-base"
                    >
                      Create My Account
                    </button>
                    <p className="text-xs text-slate-400 text-center leading-relaxed">
                      By creating an account, you agree to our{' '}
                      <a href="#" className="underline hover:text-slate-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">Terms of Use</a>{' '}
                      and{' '}
                      <a href="#" className="underline hover:text-slate-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">Privacy Policy</a>.
                      We will never sell your personal data to third parties.
                    </p>
                  </form>
                )}
              </div>
            </section>

            {/* Trust Signals */}
            <section aria-labelledby="trust-heading" className="py-10 bg-gray-50 border-t border-gray-200">
              <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                <h2 id="trust-heading" className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-5">As featured in &amp; recognized by</h2>
                <div className="flex flex-wrap items-center justify-center gap-6 text-slate-400">
                  {[
                    'Columbia Journalism Review',
                    'Press Gazette',
                    'Reuters Institute',
                    'World Press Freedom Index',
                    'Online Journalism Awards',
                  ].map(name => (
                    <span key={name} className="text-sm font-semibold border border-gray-300 rounded-full px-4 py-1.5 bg-white">
                      {name}
                    </span>
                  ))}
                </div>
                <p className="text-xs text-slate-400 mt-6 font-body">
                  The Meridian has been awarded the Society of Publishers in Asia Digital Media Award for Excellence in International Reporting three years running, and was shortlisted for the Pulitzer Prize for International Reporting in 2025.
                </p>
              </div>
            </section>
          </main>
          <MeridianFooter />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
