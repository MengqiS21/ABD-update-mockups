                        <span className="font-semibold text-slate-900">{letter.author}</span>
                        <span className="text-slate-500"> · {letter.location}</span>
                        <div className="mt-1 text-xs text-slate-400">
                          In response to:{' '}
                          <a href="article.html" className="text-rose-700 hover:underline focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">
                            {letter.inResponseTo}
                          </a>
                        </div>
                      </footer>
                    </div>
                  ))}
                </div>
              </section>

              {/* Editorial Standards Note */}
              <section aria-labelledby="editorial-standards-heading" className="py-10">
                <div className="bg-gray-100 rounded-xl px-6 py-5 border border-gray-200 max-w-3xl">
                  <h2 id="editorial-standards-heading" className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Editorial Independence</h2>
                  <p className="text-sm text-slate-600 font-body leading-relaxed">
                    Opinion pieces published in The Meridian reflect the views of the individual authors and do not represent the editorial positions of The Meridian Media Group. Our columnists are chosen for their expertise and independence of thought. The Meridian's news reporting and its opinion section operate with separate editorial leadership. Our editorial board does not accept outside influence on its positions, and no advertiser, investor, or owner has ever directed our editorial content. Questions about editorial standards can be directed to our Standards Editor.
                  </p>
                </div>
              </section>
            </div>
          </main>
          <MeridianFooter />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
