<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: {} } }</script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *:focus-visible { outline: 2px solid #8b5cf6; outline-offset: 2px; border-radius: 6px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .skip-link { position: absolute; top: -40px; left: 0; background: #7c3aed; color: white; padding: 8px 16px; border-radius: 0 0 8px 0; font-weight: 600; z-index: 100; }
    .skip-link:focus { top: 0; }
    /* Toggle switch */
    input[type="checkbox"].toggle { appearance: none; width: 44px; height: 24px; background: #334155; border-radius: 12px; cursor: pointer; transition: background 0.2s; position: relative; flex-shrink: 0; }
    input[type="checkbox"].toggle:checked { background: #7c3aed; }
    input[type="checkbox"].toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: transform 0.2s; }
    input[type="checkbox"].toggle:checked::after { transform: translateX(20px); }
    input[type="checkbox"].toggle:focus-visible { outline: 2px solid #8b5cf6; outline-offset: 2px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ── ICONS ─────────────────────────────────────────────── */
const Ic = {
  Home:     () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
  Compass:  () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><circle cx="11" cy="11" r="8"/><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-4.35-4.35"/></svg>,
  Bell:     () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>,
  Msg:      () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>,
  User:     () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
  Gear:     () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
  Plus:     () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>,
  Eye:      () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
  EyeOff:   () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>,
  Lightning:() => <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>,
  Shield:   () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
  Moon:     () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>,
  Sun:      () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
  Warn:     () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
};

/* ── AVATAR ─────────────────────────────────────────────── */
const Avatar = ({ user, size='sm' }) => {
  const initials = user.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  return <div className={`${size==='sm'?'w-8 h-8 text-xs':'w-10 h-10 text-sm'} rounded-full bg-gradient-to-br from-violet-500 to-purple-700 flex items-center justify-center font-bold text-white flex-shrink-0 select-none`} aria-hidden="true">{initials}</div>;
};

/* ── NAV ────────────────────────────────────────────────── */
const NAV_ITEMS = [
  { icon:'Home',    label:'Home',          href:'index.html' },
  { icon:'Compass', label:'Explore',       href:'explore.html' },
  { icon:'Bell',    label:'Notifications', href:'notifications.html', badge:3 },
  { icon:'Msg',     label:'Messages',      href:'messages.html', badge:5 },
  { icon:'User',    label:'Profile',       href:'profile.html' },
  { icon:'Gear',    label:'Settings',      href:'settings.html' },
];
const ME = { name:'Alex Chen', handle:'@alexchen' };

const Navigation = ({ cur }) => (
  <nav className="fixed left-0 top-0 h-full w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-4 z-40 hidden lg:flex" aria-label="Main navigation">
    <a href="index.html" className="flex items-center gap-2 mb-8 px-2" aria-label="Pulse — go to home feed">
      <span className="text-violet-500"><Ic.Lightning /></span>
      <span className="text-2xl font-extrabold tracking-tight text-white">Pulse</span>
    </a>
    <ul className="space-y-1 flex-1" role="list">
      {NAV_ITEMS.map(({ icon, label, href, badge }) => {
        const Icon = Ic[icon]; const active = cur === href;
        return (
          <li key={label}>
            <a href={href} className={`flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all ${active ? 'bg-violet-600 text-white shadow-lg shadow-violet-900/40' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`} aria-current={active ? 'page' : undefined}>
              <Icon /><span className="font-semibold">{label}</span>
              {badge > 0 && <span className="ml-auto bg-violet-500 text-white text-xs rounded-full min-w-[20px] h-5 flex items-center justify-center px-1" aria-label={`${badge} unread`}>{badge}</span>}
            </a>
          </li>
        );
      })}
    </ul>
    <button className="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-xl mb-4 flex items-center justify-center gap-2 transition-colors" aria-label="Create new post"><Ic.Plus /><span>New Post</span></button>
    <a href="profile.html" className="flex items-center gap-3 px-2 py-2 rounded-xl hover:bg-slate-800 transition-colors">
      <Avatar user={ME} size="sm" />
      <div className="flex-1 min-w-0"><p className="font-semibold text-sm text-white truncate">{ME.name}</p><p className="text-slate-500 text-xs truncate">{ME.handle}</p></div>
    </a>
  </nav>
);

const MobileNav = ({ cur }) => (
  <nav className="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur border-t border-slate-800 flex lg:hidden z-40" aria-label="Mobile navigation">
    {NAV_ITEMS.slice(0,5).map(({ icon, label, href, badge }) => {
      const Icon = Ic[icon]; const active = cur === href;
      return (
        <a key={label} href={href} className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 relative transition-colors ${active ? 'text-violet-400' : 'text-slate-500 hover:text-slate-300'}`}
          aria-label={label} aria-current={active ? 'page' : undefined}>
          <Icon /><span className="text-[10px] font-medium">{label}</span>
          {badge > 0 && <span className="absolute top-1.5 left-1/2 translate-x-1.5 bg-violet-500 text-white text-[9px] rounded-full min-w-[14px] h-3.5 flex items-center justify-center px-0.5" aria-label={`${badge} unread`}>{badge}</span>}
        </a>
      );
    })}
  </nav>
);

/* ── FORM COMPONENTS ────────────────────────────────────── */
const Input = ({ id, label, type='text', value, onChange, placeholder, hint, autoComplete }) => {
  const [show, setShow] = useState(false);
  const isPass = type === 'password';
  return (
    <div>
      <label htmlFor={id} className="block text-sm font-semibold text-slate-200 mb-1.5">{label}</label>
      <div className="relative">
        <input id={id} type={isPass && show ? 'text' : type} value={value} onChange={onChange}
          placeholder={placeholder} autoComplete={autoComplete}
          className="w-full bg-slate-800 border border-slate-700 text-slate-100 placeholder-slate-500 px-4 py-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 transition-colors pr-10" />
        {isPass && (
          <button type="button" onClick={() => setShow(s => !s)}
            className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 transition-colors"
            aria-label={show ? 'Hide password' : 'Show password'}>
            {show ? <Ic.EyeOff /> : <Ic.Eye />}
          </button>
        )}
      </div>
      {hint && <p className="text-slate-500 text-xs mt-1">{hint}</p>}
    </div>
  );
};

const Toggle = ({ id, label, description, checked, onChange }) => (
  <div className="flex items-start justify-between gap-4 py-3">
    <div className="flex-1">
      <label htmlFor={id} className="font-semibold text-sm text-slate-200 cursor-pointer">{label}</label>
      {description && <p className="text-slate-400 text-xs mt-0.5 leading-relaxed">{description}</p>}
    </div>
    <input type="checkbox" id={id} className="toggle mt-0.5" checked={checked} onChange={e => onChange(e.target.checked)}
      role="switch" aria-checked={checked} aria-label={label} />
  </div>
);

const Select = ({ id, label, value, onChange, options }) => (
  <div>
    <label htmlFor={id} className="block text-sm font-semibold text-slate-200 mb-1.5">{label}</label>
    <select id={id} value={value} onChange={e => onChange(e.target.value)}
      className="w-full bg-slate-800 border border-slate-700 text-slate-100 px-4 py-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-violet-500 cursor-pointer">
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

const Section = ({ icon: Icon, title, children, className='' }) => (
  <section aria-labelledby={`section-${title.toLowerCase().replace(/\s/g,'-')}`} className={`bg-slate-900 border border-slate-800 rounded-2xl p-5 sm:p-6 ${className}`}>
    <div className="flex items-center gap-2.5 mb-5">
      <span className="text-violet-400"><Icon /></span>
      <h2 id={`section-${title.toLowerCase().replace(/\s/g,'-')}`} className="text-base font-bold text-white">{title}</h2>
    </div>
    {children}
  </section>
);

/* ── SETTINGS PAGE ──────────────────────────────────────── */
const SettingsPage = () => {
  /* Account */
  const [username, setUsername] = useState('alexchen');
  const [email, setEmail] = useState('alex.chen@example.com');
  const [currentPw, setCurrentPw] = useState('');
  const [newPw, setNewPw] = useState('');
  const [confirmPw, setConfirmPw] = useState('');

  /* Privacy */
  const [postsVisibility, setPostsVisibility] = useState('everyone');
  const [dmPermission, setDmPermission] = useState('followers');
  const [privateAccount, setPrivateAccount] = useState(false);
  const [showActivity, setShowActivity] = useState(true);

  /* Notifications */
  const [emailNotifs, setEmailNotifs] = useState({
    likes: true, comments: true, follows: true, mentions: true, dms: false, digest: false,
  });
  const [pushNotifs, setPushNotifs] = useState({
    likes: false, comments: true, follows: true, mentions: true, dms: true,
  });

  /* Appearance */
  const [darkMode, setDarkMode] = useState(true);
  const [reduceMotion, setReduceMotion] = useState(false);
  const [fontSize, setFontSize] = useState('medium');

  /* Saved feedback */
  const [saved, setSaved] = useState('');
  const handleSave = section => { setSaved(section); setTimeout(() => setSaved(''), 2500); };

  /* Danger zone */
  const [showDeactivate, setShowDeactivate] = useState(false);
  const [showDelete, setShowDelete] = useState(false);

  return (
    <div className="min-h-screen bg-slate-950">
      <Navigation cur="settings.html" />
      <MobileNav cur="settings.html" />
      <div className="lg:ml-64">
        <main id="main-content" className="max-w-2xl mx-auto px-4 py-6 pb-24 lg:pb-8 space-y-5">
          <h1 className="text-2xl font-extrabold text-white">Settings</h1>

          {/* ── Account ── */}
          <Section icon={Ic.User} title="Account">
            <form onSubmit={e => { e.preventDefault(); handleSave('account'); }} noValidate>
              <div className="space-y-4">
                <Input id="s-username" label="Username" value={username} onChange={e => setUsername(e.target.value)} placeholder="alexchen" autoComplete="username" hint="Your @handle on Pulse. Must be unique." />
                <Input id="s-email" label="Email address" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" autoComplete="email" />
                <div className="border-t border-slate-800 pt-4">
                  <p className="text-sm font-bold text-slate-200 mb-3">Change password</p>
                  <div className="space-y-3">
                    <Input id="s-current-pw" label="Current password" type="password" value={currentPw} onChange={e => setCurrentPw(e.target.value)} placeholder="••••••••" autoComplete="current-password" />
                    <Input id="s-new-pw" label="New password" type="password" value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="••••••••" autoComplete="new-password" hint="At least 8 characters with a mix of letters and numbers." />
                    <Input id="s-confirm-pw" label="Confirm new password" type="password" value={confirmPw} onChange={e => setConfirmPw(e.target.value)} placeholder="••••••••" autoComplete="new-password" />
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-3 mt-5 pt-4 border-t border-slate-800">
                <button type="submit" className="bg-violet-600 hover:bg-violet-700 text-white font-bold px-5 py-2 rounded-xl text-sm transition-colors">Save changes</button>
                {saved === 'account' && <span className="text-emerald-400 text-sm font-semibold" role="status" aria-live="polite">✓ Saved!</span>}
              </div>
            </form>
          </Section>

          {/* ── Privacy ── */}
          <Section icon={Ic.Shield} title="Privacy">
            <div className="space-y-4">
              <Select id="s-posts-vis" label="Who can see your posts" value={postsVisibility} onChange={setPostsVisibility}
                options={[{ value:'everyone', label:'Everyone' }, { value:'followers', label:'Followers only' }, { value:'me', label:'Only me' }]} />
              <Select id="s-dm-perm" label="Who can send you direct messages" value={dmPermission} onChange={setDmPermission}
                options={[{ value:'everyone', label:'Everyone' }, { value:'followers', label:'People you follow' }, { value:'none', label:'No one' }]} />
              <div className="border-t border-slate-800 pt-3">
                <Toggle id="s-private" label="Private account" description="Only approved followers can see your posts and profile." checked={privateAccount} onChange={setPrivateAccount} />
                <Toggle id="s-activity" label="Show activity status" description="Let people see when you were last active on Pulse." checked={showActivity} onChange={setShowActivity} />
              </div>
              <div className="flex items-center gap-3 pt-2">
                <button onClick={() => handleSave('privacy')} className="bg-violet-600 hover:bg-violet-700 text-white font-bold px-5 py-2 rounded-xl text-sm transition-colors">Save changes</button>
                {saved === 'privacy' && <span className="text-emerald-400 text-sm font-semibold" role="status" aria-live="polite">✓ Saved!</span>}
              </div>
            </div>
          </Section>

          {/* ── Notifications ── */}
          <Section icon={Ic.Bell} title="Notifications">
            <fieldset>
              <legend className="text-sm font-bold text-slate-300 mb-1">Email notifications</legend>
              <div className="bg-slate-800/50 rounded-xl px-4 divide-y divide-slate-700/50 mb-4">
                {[['likes','Likes on your posts'],['comments','Comments on your posts'],['follows','New followers'],['mentions','Mentions and tags'],['dms','Direct messages'],['digest','Weekly activity digest']].map(([k, label]) => (
                  <Toggle key={k} id={`en-${k}`} label={label} checked={emailNotifs[k]} onChange={v => setEmailNotifs(p => ({ ...p, [k]: v }))} />
                ))}
              </div>
              <legend className="text-sm font-bold text-slate-300 mb-1">Push notifications</legend>
              <div className="bg-slate-800/50 rounded-xl px-4 divide-y divide-slate-700/50">
                {[['likes','Likes'],['comments','Comments'],['follows','New followers'],['mentions','Mentions'],['dms','Direct messages']].map(([k, label]) => (
                  <Toggle key={k} id={`pn-${k}`} label={label} checked={pushNotifs[k]} onChange={v => setPushNotifs(p => ({ ...p, [k]: v }))} />
                ))}
              </div>
            </fieldset>
            <div className="flex items-center gap-3 mt-5 pt-4 border-t border-slate-800">
              <button onClick={() => handleSave('notifs')} className="bg-violet-600 hover:bg-violet-700 text-white font-bold px-5 py-2 rounded-xl text-sm transition-colors">Save changes</button>
              {saved === 'notifs' && <span className="text-emerald-400 text-sm font-semibold" role="status" aria-live="polite">✓ Saved!</span>}
            </div>
          </Section>

          {/* ── Appearance ── */}
          <Section icon={Ic.Moon} title="Appearance">
            <div className="space-y-3">
              {/* Theme toggle */}
              <fieldset>
                <legend className="text-sm font-bold text-slate-200 mb-2">Theme</legend>
                <div className="grid grid-cols-2 gap-2">
                  {[['dark', 'Dark', Ic.Moon], ['light', 'Light', Ic.Sun]].map(([val, label, Icon]) => (
                    <label key={val}
                      className={`flex items-center justify-center gap-2 py-3 rounded-xl border-2 cursor-pointer transition-colors font-semibold text-sm ${(val === 'dark') === darkMode ? 'border-violet-500 bg-violet-600/10 text-violet-300' : 'border-slate-700 text-slate-400 hover:border-slate-600'}`}>
                      <input type="radio" name="theme" value={val} checked={(val === 'dark') === darkMode} onChange={() => setDarkMode(val === 'dark')} className="sr-only" />
                      <Icon />{label}
                    </label>
                  ))}
                </div>
              </fieldset>
              <Select id="s-fontsize" label="Text size" value={fontSize} onChange={setFontSize}
                options={[{ value:'small', label:'Small' }, { value:'medium', label:'Medium (Default)' }, { value:'large', label:'Large' }]} />
              <div className="border-t border-slate-800 pt-2">
                <Toggle id="s-motion" label="Reduce motion" description="Minimize animations and transitions throughout the app." checked={reduceMotion} onChange={setReduceMotion} />
              </div>
              <div className="flex items-center gap-3 pt-2">
                <button onClick={() => handleSave('appearance')} className="bg-violet-600 hover:bg-violet-700 text-white font-bold px-5 py-2 rounded-xl text-sm transition-colors">Save changes</button>
                {saved === 'appearance' && <span className="text-emerald-400 text-sm font-semibold" role="status" aria-live="polite">✓ Saved!</span>}
              </div>
            </div>
          </Section>

          {/* ── Danger Zone ── */}
          <Section icon={Ic.Warn} title="Danger Zone" className="border-rose-900/40">
            <div className="space-y-4">
              <div className="bg-rose-950/20 border border-rose-900/30 rounded-xl p-4">
                <p className="font-semibold text-rose-300 text-sm mb-1">Deactivate account</p>
                <p className="text-slate-400 text-xs leading-relaxed mb-3">Temporarily disable your account. Your profile and posts will be hidden until you reactivate.</p>
                <button onClick={() => setShowDeactivate(!showDeactivate)}
                  className="border border-rose-700/60 text-rose-400 hover:bg-rose-900/30 font-semibold px-4 py-2 rounded-xl text-sm transition-colors"
                  aria-expanded={showDeactivate}>
                  Deactivate Account
                </button>
                {showDeactivate && (
                  <div className="mt-3 p-3 bg-slate-900 rounded-xl border border-rose-900/40" role="alert">
                    <p className="text-slate-200 text-sm font-semibold mb-2">Are you sure you want to deactivate?</p>
                    <p className="text-slate-400 text-xs mb-3">You can reactivate at any time by logging in again.</p>
                    <div className="flex gap-2">
                      <button className="bg-rose-700 hover:bg-rose-600 text-white text-sm font-bold px-4 py-1.5 rounded-lg transition-colors">Yes, deactivate</button>
                      <button onClick={() => setShowDeactivate(false)} className="text-slate-400 hover:text-white text-sm font-semibold px-4 py-1.5 rounded-lg border border-slate-700 hover:bg-slate-800 transition-colors">Cancel</button>
                    </div>
                  </div>
                )}
              </div>
              <div className="bg-rose-950/20 border border-rose-900/30 rounded-xl p-4">
                <p className="font-semibold text-rose-300 text-sm mb-1">Delete account</p>
                <p className="text-slate-400 text-xs leading-relaxed mb-3">Permanently delete your account and all associated data. This action <strong className="text-rose-400">cannot be undone</strong>.</p>
                <button onClick={() => setShowDelete(!showDelete)}
                  className="bg-rose-800/50 hover:bg-rose-700/50 border border-rose-700/60 text-rose-300 font-semibold px-4 py-2 rounded-xl text-sm transition-colors"
                  aria-expanded={showDelete}>
                  Delete Account Permanently
                </button>
                {showDelete && (
                  <div className="mt-3 p-3 bg-slate-900 rounded-xl border border-rose-900/40" role="alert">
                    <p className="text-slate-200 text-sm font-semibold mb-2">This will permanently delete your account</p>
                    <p className="text-slate-400 text-xs mb-3">All your posts, messages, and data will be removed and cannot be recovered.</p>
                    <div className="mb-3">
                      <label htmlFor="confirm-delete" className="block text-xs font-semibold text-slate-300 mb-1.5">Type <span className="text-rose-400 font-mono">DELETE</span> to confirm</label>
                      <input id="confirm-delete" type="text" placeholder="DELETE" className="w-full bg-slate-800 border border-rose-700/50 text-slate-100 px-3 py-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-rose-500" />
                    </div>
                    <div className="flex gap-2">
                      <button className="bg-rose-700 hover:bg-rose-600 text-white text-sm font-bold px-4 py-1.5 rounded-lg transition-colors">Delete my account</button>
                      <button onClick={() => setShowDelete(false)} className="text-slate-400 hover:text-white text-sm font-semibold px-4 py-1.5 rounded-lg border border-slate-700 hover:bg-slate-800 transition-colors">Cancel</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </Section>
        </main>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SettingsPage />);
</script>
</body>
</html>
