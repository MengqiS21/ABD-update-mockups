<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — Messages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: {} } }</script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *:focus-visible { outline: 2px solid #8b5cf6; outline-offset: 2px; border-radius: 6px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .skip-link { position: absolute; top: -40px; left: 0; background: #7c3aed; color: white; padding: 8px 16px; border-radius: 0 0 8px 0; font-weight: 600; z-index: 100; }
    .skip-link:focus { top: 0; }
    .chat-scroll { scrollbar-width: thin; scrollbar-color: #334155 transparent; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ── ICONS ─────────────────────────────────────────────── */
const Ic = {
  Home:     () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
  Compass:  () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><circle cx="11" cy="11" r="8"/><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-4.35-4.35"/></svg>,
  Bell:     () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>,
  Msg:      () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>,
  User:     () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
  Gear:     () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
  Plus:     () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>,
  Send:     () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>,
  Smile:    () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
  Img:      () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
  Search:   () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>,
  Back:     () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>,
  Lightning:() => <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>,
  Verified: () => <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
  MoreVert: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" /></svg>,
};

/* ── AVATAR ─────────────────────────────────────────────── */
const AVATAR_COLORS = {
  AC:'from-violet-500 to-purple-700', MR:'from-rose-500 to-pink-700',
  JP:'from-blue-500 to-cyan-700',    ST:'from-emerald-500 to-teal-700',
  RK:'from-amber-500 to-orange-600', PK:'from-indigo-500 to-blue-700',
  LS:'from-fuchsia-500 to-purple-700',ZW:'from-sky-500 to-blue-600',
};
const SZ = { xs:'w-7 h-7 text-xs', sm:'w-8 h-8 text-xs', md:'w-10 h-10 text-sm', lg:'w-12 h-12 text-base' };
const Avatar = ({ user, size='md' }) => {
  const initials = user.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const g = AVATAR_COLORS[initials] || 'from-violet-500 to-purple-700';
  return <div className={`${SZ[size]} rounded-full bg-gradient-to-br ${g} flex items-center justify-center font-bold text-white flex-shrink-0 select-none`} aria-hidden="true">{initials}</div>;
};

/* ── NAV ────────────────────────────────────────────────── */
const NAV_ITEMS = [
  { icon:'Home',    label:'Home',          href:'index.html' },
  { icon:'Compass', label:'Explore',       href:'explore.html' },
  { icon:'Bell',    label:'Notifications', href:'notifications.html', badge:3 },
  { icon:'Msg',     label:'Messages',      href:'messages.html', badge:5 },
  { icon:'User',    label:'Profile',       href:'profile.html' },
  { icon:'Gear',    label:'Settings',      href:'settings.html' },
];
const ME = { name:'Alex Chen', handle:'@alexchen' };

const Navigation = ({ cur }) => (
  <nav className="fixed left-0 top-0 h-full w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-4 z-40 hidden lg:flex" aria-label="Main navigation">
    <a href="index.html" className="flex items-center gap-2 mb-8 px-2" aria-label="Pulse — go to home feed">
      <span className="text-violet-500"><Ic.Lightning /></span>
      <span className="text-2xl font-extrabold tracking-tight text-white">Pulse</span>
    </a>
    <ul className="space-y-1 flex-1" role="list">
      {NAV_ITEMS.map(({ icon, label, href, badge }) => {
        const Icon = Ic[icon]; const active = cur === href;
        return (
          <li key={label}>
            <a href={href} className={`flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all ${active ? 'bg-violet-600 text-white shadow-lg shadow-violet-900/40' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`} aria-current={active ? 'page' : undefined}>
              <Icon /><span className="font-semibold">{label}</span>
              {badge > 0 && <span className="ml-auto bg-violet-500 text-white text-xs rounded-full min-w-[20px] h-5 flex items-center justify-center px-1" aria-label={`${badge} unread`}>{badge}</span>}
            </a>
          </li>
        );
      })}
    </ul>
    <button className="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-xl mb-4 flex items-center justify-center gap-2 transition-colors" aria-label="Create new post"><Ic.Plus /><span>New Post</span></button>
    <a href="profile.html" className="flex items-center gap-3 px-2 py-2 rounded-xl hover:bg-slate-800 transition-colors">
      <Avatar user={ME} size="sm" />
      <div className="flex-1 min-w-0"><p className="font-semibold text-sm text-white truncate">{ME.name}</p><p className="text-slate-500 text-xs truncate">{ME.handle}</p></div>
    </a>
  </nav>
);

const MobileNav = ({ cur }) => (
  <nav className="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur border-t border-slate-800 flex lg:hidden z-40" aria-label="Mobile navigation">
    {NAV_ITEMS.slice(0,5).map(({ icon, label, href, badge }) => {
      const Icon = Ic[icon]; const active = cur === href;
      return (
        <a key={label} href={href} className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 relative transition-colors ${active ? 'text-violet-400' : 'text-slate-500 hover:text-slate-300'}`}
          aria-label={label} aria-current={active ? 'page' : undefined}>
          <Icon /><span className="text-[10px] font-medium">{label}</span>
          {badge > 0 && <span className="absolute top-1.5 left-1/2 translate-x-1.5 bg-violet-500 text-white text-[9px] rounded-full min-w-[14px] h-3.5 flex items-center justify-center px-0.5" aria-label={`${badge} unread`}>{badge}</span>}
        </a>
      );
    })}
  </nav>
);

/* ── CONVERSATIONS DATA ─────────────────────────────────── */
const CONVOS = [
  { id:1, user:{ name:'Maya Rodriguez', handle:'@maya_creates', verified:true }, lastMsg:"That photo series is coming together beautifully 🔥", time:'2m', unread:2, online:true },
  { id:2, user:{ name:'Jordan Park',    handle:'@jordanpark'                 }, lastMsg:"Did you see the Climate Week stats? Wild numbers.", time:'1h', unread:0, online:false },
  { id:3, user:{ name:'Riley Kim',      handle:'@rileykim',    verified:true }, lastMsg:"Tournament photos are on my profile now!", time:'3h', unread:1, online:true },
  { id:4, user:{ name:'Priya Kapoor',   handle:'@priyak'                    }, lastMsg:"Would love to collaborate on a climate thread 🌱", time:'5h', unread:0, online:false },
  { id:5, user:{ name:'Leo Santos',     handle:'@leosantos'                 }, lastMsg:"PR reviewed and merged — great work on those types!", time:'1d', unread:0, online:false },
  { id:6, user:{ name:'Zoe Williams',   handle:'@zoewrites',  verified:true }, lastMsg:"Quick question about your AI research thread…", time:'2d', unread:0, online:false },
];

const INITIAL_MESSAGES = [
  { id:1,  from:'them', text:"Hey Alex! Loved your post about AI research this morning.",         time:'10:02 AM', group:'Morning' },
  { id:2,  from:'me',   text:"Thanks Maya! It took a while to compile all the papers. There's so much happening right now 🤖",  time:'10:04 AM' },
  { id:3,  from:'them', text:"Totally. The multimodal stuff especially — did you read the Vision-Language paper from DeepMind?", time:'10:05 AM' },
  { id:4,  from:'me',   text:"Yes!! That one blew my mind. The emergent reasoning capabilities they found were not expected at all.", time:'10:06 AM' },
  { id:5,  from:'them', text:"Exactly my reaction. I actually screenshotted like six different sections 😂",                   time:'10:08 AM' },
  { id:6,  from:'me',   text:"Same. My notes app is a disaster at this point haha",                                              time:'10:09 AM' },
  { id:7,  from:'them', text:"Ha! Worth it though. Hey — are you going to the TechMeet SF event next week?",                    time:'10:11 AM', group:'Just now' },
  { id:8,  from:'me',   text:"Oh I hadn't heard about it! What's the lineup?",                                                   time:'10:12 AM' },
  { id:9,  from:'them', text:"A bunch of researchers from Anthropic, Google DeepMind, and some indie labs. Should be really good.", time:'10:13 AM' },
  { id:10, from:'them', text:"That photo series is coming together beautifully 🔥",                                               time:'10:14 AM' },
];

/* ── MESSAGES PAGE ──────────────────────────────────────── */
const MessagesPage = () => {
  const [activeConvo, setActiveConvo] = useState(CONVOS[0]);
  const [messages, setMessages] = useState(INITIAL_MESSAGES);
  const [input, setInput] = useState('');
  const [mobileView, setMobileView] = useState('list'); // 'list' | 'chat'
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, activeConvo]);

  const sendMessage = () => {
    if (!input.trim()) return;
    setMessages(prev => [...prev, { id: Date.now(), from:'me', text: input.trim(), time: new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }) }]);
    setInput('');
  };

  const handleKey = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  const selectConvo = (c) => { setActiveConvo(c); setMobileView('chat'); };

  /* Conversation list */
  const ConvoList = () => (
    <aside className={`${mobileView === 'chat' ? 'hidden md:flex' : 'flex'} flex-col w-full md:w-80 lg:w-72 border-r border-slate-800 bg-slate-900 flex-shrink-0`} aria-label="Conversations">
      <div className="p-4 border-b border-slate-800">
        <h1 className="text-xl font-extrabold text-white mb-3">Messages</h1>
        <div className="relative">
          <label htmlFor="msg-search" className="sr-only">Search messages</label>
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"><Ic.Search /></span>
          <input id="msg-search" type="search" placeholder="Search messages…" className="w-full bg-slate-800 text-slate-100 placeholder-slate-500 pl-9 pr-3 py-2 rounded-xl text-sm outline-none focus:ring-2 focus:ring-violet-500" />
        </div>
      </div>
      <ul className="flex-1 overflow-y-auto" role="list" aria-label="Conversation list">
        {CONVOS.map(c => (
          <li key={c.id}>
            <button onClick={() => selectConvo(c)}
              className={`w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-800 transition-colors text-left ${activeConvo.id === c.id ? 'bg-slate-800 border-r-2 border-violet-500' : ''}`}
              aria-label={`Conversation with ${c.user.name}. ${c.unread > 0 ? `${c.unread} unread messages.` : ''} Last message: ${c.lastMsg}`}
              aria-current={activeConvo.id === c.id ? 'true' : undefined}>
              <div className="relative flex-shrink-0">
                <Avatar user={c.user} size="md" />
                {c.online && <span className="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 border-2 border-slate-900 rounded-full" aria-label="Online"></span>}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-1">
                    <span className="font-semibold text-sm text-white truncate">{c.user.name}</span>
                    {c.user.verified && <span className="text-violet-400 flex-shrink-0" aria-label="Verified"><Ic.Verified /></span>}
                  </div>
                  <span className="text-slate-500 text-xs flex-shrink-0 ml-2">{c.time}</span>
                </div>
                <div className="flex items-center justify-between mt-0.5">
                  <p className={`text-xs truncate pr-2 ${c.unread ? 'text-slate-200 font-medium' : 'text-slate-400'}`}>{c.lastMsg}</p>
                  {c.unread > 0 && <span className="bg-violet-600 text-white text-[10px] rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1 flex-shrink-0" aria-label={`${c.unread} unread`}>{c.unread}</span>}
                </div>
              </div>
            </button>
          </li>
        ))}
      </ul>
    </aside>
  );

  /* Message group header */
  const groupHeaders = {};
  messages.forEach(m => { if (m.group) groupHeaders[m.id] = m.group; });

  /* Chat panel */
  const ChatPanel = () => (
    <section className={`${mobileView === 'list' ? 'hidden md:flex' : 'flex'} flex-col flex-1 min-w-0`} aria-label={`Chat with ${activeConvo.user.name}`}>
      {/* Chat header */}
      <div className="flex items-center gap-3 px-4 py-3 border-b border-slate-800 bg-slate-900/80 backdrop-blur">
        <button onClick={() => setMobileView('list')} className="md:hidden text-slate-400 hover:text-white mr-1 p-1 rounded-lg transition-colors" aria-label="Back to conversations list"><Ic.Back /></button>
        <div className="relative">
          <Avatar user={activeConvo.user} size="md" />
          {activeConvo.online && <span className="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 border-2 border-slate-900 rounded-full" aria-hidden="true"></span>}
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-1">
            <h2 className="font-bold text-white text-sm truncate">{activeConvo.user.name}</h2>
            {activeConvo.user.verified && <span className="text-violet-400" aria-label="Verified"><Ic.Verified /></span>}
          </div>
          <p className="text-xs text-slate-400">{activeConvo.online ? <span className="text-emerald-400">● Online</span> : activeConvo.user.handle}</p>
        </div>
        <button className="text-slate-400 hover:text-white p-2 rounded-lg hover:bg-slate-800 transition-colors" aria-label="More options for this conversation"><Ic.MoreVert /></button>
      </div>

      {/* Messages */}
      <div ref={chatRef} className="flex-1 overflow-y-auto p-4 space-y-1 chat-scroll" role="log" aria-label="Messages" aria-live="polite">
        {messages.map((msg, idx) => {
          const isMe = msg.from === 'me';
          const prev = messages[idx - 1];
          const showAvatar = !isMe && (!prev || prev.from !== 'them' || groupHeaders[msg.id]);
          return (
            <div key={msg.id}>
              {groupHeaders[msg.id] && (
                <div className="flex items-center gap-3 my-4" aria-label={`Messages from ${groupHeaders[msg.id]}`}>
                  <div className="flex-1 border-t border-slate-800"></div>
                  <span className="text-slate-500 text-xs font-medium">{groupHeaders[msg.id]}</span>
                  <div className="flex-1 border-t border-slate-800"></div>
                </div>
              )}
              <div className={`flex items-end gap-2 ${isMe ? 'flex-row-reverse' : 'flex-row'} mb-1`}>
                {!isMe && <div className="w-8">{showAvatar && <Avatar user={activeConvo.user} size="xs" />}</div>}
                <div className={`max-w-[72%] ${isMe ? 'items-end' : 'items-start'} flex flex-col`}>
                  <div className={`px-4 py-2.5 rounded-2xl text-sm leading-relaxed ${isMe ? 'bg-violet-600 text-white rounded-br-sm' : 'bg-slate-800 text-slate-100 rounded-bl-sm'}`}>
                    {msg.text}
                  </div>
                  <time className="text-slate-600 text-[10px] mt-1 px-1" dateTime={msg.time}>{msg.time}</time>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Input */}
      <div className="px-4 py-3 border-t border-slate-800 bg-slate-900/80">
        <div className="flex items-end gap-2 bg-slate-800 rounded-2xl px-3 py-2">
          <div className="flex gap-1">
            <button className="text-slate-400 hover:text-violet-400 p-1.5 rounded-lg transition-colors" aria-label="Add emoji"><Ic.Smile /></button>
            <button className="text-slate-400 hover:text-violet-400 p-1.5 rounded-lg transition-colors" aria-label="Attach image"><Ic.Img /></button>
          </div>
          <label htmlFor="message-input" className="sr-only">Write a message to {activeConvo.user.name}</label>
          <textarea id="message-input" value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey}
            placeholder={`Message ${activeConvo.user.name}…`} rows={1}
            className="flex-1 bg-transparent text-slate-100 placeholder-slate-500 text-sm resize-none outline-none leading-relaxed max-h-32 py-1"
            aria-label={`Write a message to ${activeConvo.user.name}`} />
          <button onClick={sendMessage} disabled={!input.trim()}
            className="bg-violet-600 hover:bg-violet-700 disabled:opacity-40 disabled:cursor-not-allowed text-white p-2 rounded-xl transition-colors flex-shrink-0"
            aria-label="Send message">
            <Ic.Send />
          </button>
        </div>
        <p className="text-slate-600 text-xs text-center mt-2">Press Enter to send · Shift+Enter for new line</p>
      </div>
    </section>
  );

  return (
    <div className="min-h-screen bg-slate-950 flex">
      <Navigation cur="messages.html" />
      <MobileNav cur="messages.html" />
      <div className="lg:ml-64 flex flex-1 min-h-screen" id="main-content">
        <div className="flex flex-1 min-h-screen max-h-screen overflow-hidden">
          <ConvoList />
          <ChatPanel />
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<MessagesPage />);
</script>
</body>
</html>
