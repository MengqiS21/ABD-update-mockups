<!DOCTYPE html>

<body class="bg-slate-950 text-slate-100 min-h-screen">
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

/* ── ICONS ─────────────────────────────────────────────── */

  Compass:  () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><circle cx="11" cy="11" r="8"/><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-4.35-4.35"/></svg>,
  Bell:     () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>,
  Msg:      () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>,
  User:     () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
  Gear:     () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
  Heart:    ({ f }) => <svg className="w-5 h-5" fill={f?"currentColor":"none"} viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>,
  Comment:  () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>,
  Share:    () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>,
  Bkmark:   ({ f }) => <svg className="w-5 h-5" fill={f?"currentColor":"none"} viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" /></svg>,
  Plus:     () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>,
  Img:      () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
  Smile:    () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
  More:     () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M5 12h.01M12 12h.01M19 12h.01" /></svg>,
  Verified: () => <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
  Search:   () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>,
  Lightning:() => <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>,
};

/* ── AVATAR ─────────────────────────────────────────────── */
const AVATAR_COLORS = {
  AC:'from-violet-500 to-purple-700', MR:'from-rose-500 to-pink-700',
  JP:'from-blue-500 to-cyan-700',    ST:'from-emerald-500 to-teal-700',
  RK:'from-amber-500 to-orange-600', PK:'from-indigo-500 to-blue-700',
  LS:'from-fuchsia-500 to-purple-700',ZW:'from-sky-500 to-blue-600',
  DL:'from-lime-500 to-green-600',   NP:'from-red-500 to-rose-700',
};
const SZ = { xs:'w-7 h-7 text-xs', sm:'w-8 h-8 text-xs', md:'w-10 h-10 text-sm', lg:'w-14 h-14 text-lg', xl:'w-20 h-20 text-2xl' };
const Avatar = ({ user, size='md' }) => {
  const initials = user.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const g = AVATAR_COLORS[initials] || 'from-violet-500 to-purple-700';
  return <div className={`${SZ[size]} rounded-full bg-gradient-to-br ${g} flex items-center justify-center font-bold text-white flex-shrink-0 select-none`} aria-hidden="true">{initials}</div>;
};

/* ── NAVIGATION ─────────────────────────────────────────── */
const NAV_ITEMS = [
  { icon:'Home',    label:'Home',          href:'index.html',         badge:0 },
  { icon:'Compass', label:'Explore',       href:'explore.html',       badge:0 },
  { icon:'Bell',    label:'Notifications', href:'notifications.html', badge:3 },
  { icon:'Msg',     label:'Messages',      href:'messages.html',      badge:5 },
  { icon:'User',    label:'Profile',       href:'profile.html',       badge:0 },
  { icon:'Gear',    label:'Settings',      href:'settings.html',      badge:0 },
];
const ME = { name:'Alex Chen', handle:'@alexchen' };

const Navigation = ({ cur }) => (
  <nav className="fixed left-0 top-0 h-full w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-4 z-40 hidden lg:flex" aria-label="Main navigation">
    <a href="index.html" className="flex items-center gap-2 mb-8 px-2" aria-label="Pulse — go to home feed">
      <span className="text-violet-500"><Ic.Lightning /></span>
      <span className="text-2xl font-extrabold tracking-tight text-white">Pulse</span>
    </a>
    <ul className="space-y-1 flex-1" role="list">
      {NAV_ITEMS.map(({ icon, label, href, badge }) => {
        const Icon = Ic[icon]; const active = cur === href;
        return (
          <li key={label}>
            <a href={href}
              className={`flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-150 ${active ? 'bg-violet-600 text-white shadow-lg shadow-violet-900/40' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
              aria-current={active ? 'page' : undefined}>
              <Icon />
              <span className="font-semibold">{label}</span>
              {badge > 0 && <span className="ml-auto bg-violet-500 text-white text-xs rounded-full min-w-[20px] h-5 flex items-center justify-center px-1" aria-label={`${badge} unread`}>{badge}</span>}
            </a>
          </li>
        );
      })}
    </ul>
    <button className="w-full bg-violet-600 hover:bg-violet-700 active:bg-violet-800 text-white font-bold py-3 rounded-xl mb-4 flex items-center justify-center gap-2 transition-colors" aria-label="Create new post">
      <Ic.Plus /><span>New Post</span>
    </button>
    <a href="profile.html" className="flex items-center gap-3 px-2 py-2 rounded-xl hover:bg-slate-800 transition-colors" aria-label="View your profile">
      <Avatar user={ME} size="sm" />
      <div className="flex-1 min-w-0">
        <p className="font-semibold text-sm text-white truncate">{ME.name}</p>
        <p className="text-slate-500 text-xs truncate">{ME.handle}</p>
      </div>
    </a>
  </nav>
);

const MobileNav = ({ cur }) => (
  <nav className="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur border-t border-slate-800 flex lg:hidden z-40" aria-label="Mobile navigation">
    {NAV_ITEMS.slice(0,5).map(({ icon, label, href, badge }) => {
      const Icon = Ic[icon]; const active = cur === href;
      return (
        <a key={label} href={href}
          className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 relative transition-colors ${active ? 'text-violet-400' : 'text-slate-500 hover:text-slate-300'}`}
          aria-label={label} aria-current={active ? 'page' : undefined}>
          <Icon />
          <span className="text-[10px] font-medium">{label}</span>
          {badge > 0 && <span className="absolute top-1.5 left-1/2 translate-x-1.5 bg-violet-500 text-white text-[9px] rounded-full min-w-[14px] h-3.5 flex items-center justify-center px-0.5" aria-label={`${badge} unread`}>{badge}</span>}
        </a>
      );
    })}
  </nav>
);

/* ── POST CARD ──────────────────────────────────────────── */
const fmt = n => n >= 1000 ? (n/1000).toFixed(1).replace('.0','')+'K' : String(n);

const PostCard = ({ post }) => {
  const [liked, setLiked] = useState(post.liked||false);
  const [lc, setLc] = useState(post.likes);
  const [saved, setSaved] = useState(false);
  const toggle = () => { setLiked(p => { setLc(c => p ? c-1 : c+1); return !p; }); };
  return (
    <article className="bg-slate-900 border border-slate-800 rounded-2xl p-4 hover:border-slate-700 transition-colors">
      <div className="flex items-start justify-between mb-3">
        <a href="profile.html" className="flex items-center gap-3 group" aria-label={`View ${post.author.name}'s profile`}>
          <Avatar user={post.author} />
          <div>
            <div className="flex items-center gap-1">
              <span className="font-semibold text-white group-hover:underline">{post.author.name}</span>
              {post.author.verified && <span className="text-violet-400" aria-label="Verified"><Ic.Verified /></span>}
            </div>
            <div className="flex items-center gap-1.5 text-slate-400 text-sm">
              <span>{post.author.handle}</span>
              <span aria-hidden="true">·</span>
              <time dateTime={post.iso}>{post.time}</time>
            </div>
          </div>
        </a>
        <button className="text-slate-500 hover:text-white hover:bg-slate-800 p-1.5 rounded-lg transition-colors" aria-label={`More options for this post by ${post.author.name}`}><Ic.More /></button>
      </div>
      <p className="text-slate-100 leading-relaxed mb-3">{post.text}</p>
      {post.imgGradient && (
        <div className={`w-full h-60 rounded-xl mb-3 bg-gradient-to-br ${post.imgGradient} flex items-center justify-center`} role="img" aria-label={post.imgAlt}>
          <span className="text-white/30"><Ic.Img /></span>
        </div>
      )}
      {post.tags && post.tags.length > 0 && (
        <div className="flex flex-wrap gap-2 mb-3">{post.tags.map(t => <a key={t} href="explore.html" className="text-violet-400 hover:text-violet-300 text-sm font-medium">{t}</a>)}</div>
      )}
      <div className="flex items-center justify-between pt-3 border-t border-slate-800">
        <div className="flex items-center gap-5">
          <button onClick={toggle} className={`flex items-center gap-1.5 text-sm font-medium transition-colors ${liked ? 'text-rose-500' : 'text-slate-400 hover:text-rose-400'}`}
            aria-label={`${liked?'Unlike':'Like'} — ${lc} likes`} aria-pressed={liked}>
            <Ic.Heart f={liked} /><span>{fmt(lc)}</span>
          </button>
          <button className="flex items-center gap-1.5 text-sm font-medium text-slate-400 hover:text-violet-400 transition-colors" aria-label={`Comment — ${post.comments} comments`}>
            <Ic.Comment /><span>{fmt(post.comments)}</span>
          </button>
          <button className="flex items-center gap-1.5 text-sm font-medium text-slate-400 hover:text-green-400 transition-colors" aria-label={`Share — ${post.shares} shares`}>
            <Ic.Share /><span>{fmt(post.shares)}</span>
          </button>
        </div>
        <button onClick={() => setSaved(p=>!p)} className={`transition-colors ${saved ? 'text-violet-400' : 'text-slate-400 hover:text-violet-400'}`}
          aria-label={saved ? 'Remove bookmark' : 'Bookmark this post'} aria-pressed={saved}>
          <Ic.Bkmark f={saved} />
        </button>
      </div>
    </article>
  );
};

/* ── COMPOSER ───────────────────────────────────────────── */
const Composer = () => {
  const [text, setText] = useState('');
  const MAX = 280; const rem = MAX - text.length;
  const pct = ((MAX - rem) / MAX) * 100;
  return (
    <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 mb-4">
      <div className="flex gap-3">
        <Avatar user={ME} />
        <div className="flex-1">
          <label htmlFor="composer" className="sr-only">What's on your mind, Alex?</label>
          <textarea id="composer" value={text} onChange={e => setText(e.target.value)} maxLength={MAX}
            placeholder="What's on your mind, Alex?"
            className="w-full bg-transparent text-slate-100 placeholder-slate-500 resize-none outline-none text-base leading-relaxed min-h-[80px]"
            aria-describedby="char-count" />
          <div className="flex items-center justify-between mt-2 pt-3 border-t border-slate-800">
            <div className="flex items-center gap-1" role="toolbar" aria-label="Composer tools">
              <button className="text-violet-400 hover:bg-slate-800 p-2 rounded-lg transition-colors" aria-label="Attach image"><Ic.Img /></button>
              <button className="text-violet-400 hover:bg-slate-800 p-2 rounded-lg transition-colors" aria-label="Add emoji"><Ic.Smile /></button>
            </div>
            <div className="flex items-center gap-3">
              {rem <= 60 && <span id="char-count" className={`text-xs font-mono ${rem < 20 ? 'text-rose-400' : 'text-slate-400'}`} aria-live="polite" aria-label={`${rem} characters remaining`}>{rem}</span>}
              <button disabled={!text.trim()} className="bg-violet-600 hover:bg-violet-700 disabled:opacity-40 disabled:cursor-not-allowed text-white font-bold px-5 py-2 rounded-full text-sm transition-colors" aria-label="Publish post">Post</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── TRENDING SIDEBAR ───────────────────────────────────── */
const TrendingSidebar = () => {
  const trends = [
    { tag:'#ClimateWeek', posts:'84K', hot:true },
    { tag:'#TechLayoffs',  posts:'62K' },
    { tag:'#WorldCup2026', posts:'156K' },
    { tag:'#AIArt',        posts:'41K' },
    { tag:'#MindfulMonday',posts:'28K' },
  ];
  const suggested = [
    { name:'Priya Kapoor', handle:'@priyak',    bio:'Climate scientist & advocate' },
    { name:'Leo Santos',   handle:'@leosantos', bio:'Open-source developer' },
    { name:'Zoe Williams', handle:'@zoewrites', bio:'Tech journalist' },
  ];
  const [followed, setFollowed] = useState({});
  return (
    <aside className="hidden xl:block fixed right-0 top-0 w-80 h-screen overflow-y-auto p-4 border-l border-slate-800 bg-slate-950" aria-label="Search, trending topics and suggested accounts">
      <div className="relative mb-5">
        <label htmlFor="sidebar-search" className="sr-only">Search Pulse</label>
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"><Ic.Search /></span>
        <input id="sidebar-search" type="search" placeholder="Search Pulse" className="w-full bg-slate-800 text-slate-100 placeholder-slate-500 pl-9 pr-4 py-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-violet-500" />
      </div>
      <section aria-labelledby="trending-heading" className="bg-slate-900 rounded-2xl p-4 mb-4">
        <h2 id="trending-heading" className="font-bold text-white mb-3">🔥 Trending</h2>
        <ul role="list" className="space-y-2">
          {trends.map(t => (
            <li key={t.tag}>
              <a href="explore.html" className="flex items-center justify-between hover:bg-slate-800 -mx-2 px-2 py-1.5 rounded-lg transition-colors">
                <div>
                  <p className="font-semibold text-sm text-white">{t.tag}</p>
                  <p className="text-slate-400 text-xs">{t.posts} posts</p>
                </div>
                {t.hot && <span className="text-xs font-bold text-rose-400 bg-rose-400/10 px-2 py-0.5 rounded-full">Hot</span>}
              </a>
            </li>
          ))}
        </ul>
      </section>
      <section aria-labelledby="follow-heading" className="bg-slate-900 rounded-2xl p-4">
        <h2 id="follow-heading" className="font-bold text-white mb-3">Who to Follow</h2>
        <ul role="list" className="space-y-3">
          {suggested.map(u => (
            <li key={u.handle} className="flex items-center gap-3">
              <Avatar user={u} size="sm" />
              <div className="flex-1 min-w-0">
                <p className="font-semibold text-sm text-white truncate">{u.name}</p>
                <p className="text-slate-400 text-xs truncate">{u.bio}</p>
              </div>
              <button
                onClick={() => setFollowed(p => ({ ...p, [u.handle]: !p[u.handle] }))}
                className={`text-xs font-bold px-3 py-1.5 rounded-full border transition-colors flex-shrink-0 ${followed[u.handle] ? 'bg-violet-600 border-violet-600 text-white' : 'border-slate-600 text-slate-200 hover:bg-slate-700'}`}
                aria-label={`${followed[u.handle] ? 'Unfollow' : 'Follow'} ${u.name}`}
                aria-pressed={!!followed[u.handle]}>
                {followed[u.handle] ? 'Following' : 'Follow'}
              </button>
            </li>
          ))}
        </ul>
      </section>
    </aside>
  );
};

/* ── POSTS DATA ─────────────────────────────────────────── */
const POSTS = [
  { id:1, author:{ name:'Alex Chen',       handle:'@alexchen',    verified:true  }, time:'2h', iso:'2026-03-16T10:00:00', text:"Just wrapped up a deep dive into the latest AI research papers. The progress in multimodal models is genuinely staggering — real-time video understanding, cross-modal reasoning, and emergent capabilities nobody predicted. We're living in a wild time. 🤖✨", tags:['#AIResearch','#MachineLearning'], likes:847, comments:124, shares:89, liked:false },
