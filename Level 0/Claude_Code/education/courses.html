<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses — LearnPath</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans antialiased">
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const Header = ({ active = '' }) => {
  const [mobileOpen, setMobileOpen] = useState(false);
  const nav = [
    { label: 'Courses', href: 'courses.html' },
    { label: 'Pricing', href: 'pricing.html' },
    { label: 'Dashboard', href: 'dashboard.html' },
  ];
  return (
    <header className="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div className="flex items-center justify-between h-16">
          <a href="index.html" className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
              <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
            </div>
            <span className="text-xl font-bold text-slate-900">LearnPath</span>
          </a>
          <nav className="hidden md:flex items-center gap-8">
            {nav.map(n => (
              <a key={n.label} href={n.href} className={`text-sm font-medium transition-colors ${active === n.label ? 'text-indigo-600' : 'text-slate-600 hover:text-slate-900'}`}>{n.label}</a>
            ))}
          </nav>
          <div className="hidden md:flex items-center gap-3">
            <a href="dashboard.html" className="text-sm font-medium text-slate-600 hover:text-slate-900 px-4 py-2 rounded-lg hover:bg-slate-100 transition-colors">Sign In</a>
            <a href="pricing.html" className="text-sm font-semibold bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">Start Free Trial</a>
          </div>
          <button onClick={() => setMobileOpen(!mobileOpen)} className="md:hidden p-2 rounded-lg text-slate-600 hover:bg-slate-100">
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={mobileOpen ? "M6 18L18 6M6 6l12 12" : "M4 6h16M4 12h16M4 18h16"} /></svg>
          </button>
        </div>
      </div>
    </header>
  );
};

const Footer = () => (
  <footer className="bg-slate-900 text-slate-300 mt-20">
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <div className="flex flex-col md:flex-row justify-between gap-8">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 rounded-lg bg-indigo-500 flex items-center justify-center">
            <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
          </div>
          <span className="text-white font-bold text-lg">LearnPath</span>
        </div>
        <div className="flex flex-wrap gap-6 text-sm text-slate-400">
          {[['Home','index.html'],['Courses','courses.html'],['Pricing','pricing.html'],['Dashboard','dashboard.html']].map(([l,h]) =>
            <a key={l} href={h} className="hover:text-white transition-colors">{l}</a>
          )}
        </div>
      </div>
      <div className="border-t border-slate-800 mt-8 pt-8 text-sm text-slate-500">© 2026 LearnPath, Inc. All rights reserved.</div>
    </div>
  </footer>
);

const Stars = ({ rating }) => {
  const full = Math.floor(rating);
  return (
    <span className="flex items-center gap-0.5">
      {[1,2,3,4,5].map(i => (
        <svg key={i} className={`w-3.5 h-3.5 ${i <= full ? 'text-amber-400' : 'text-slate-300'}`} fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
        </svg>
      ))}
    </span>
  );
};

const COURSES = [
  { id:1, title:'Python for Data Science & Machine Learning Bootcamp', instructor:'Dr. Sarah Chen', rating:4.8, enrolled:'124,302', price:89, level:'Intermediate', duration:'24h 15m', category:'Data Science', free:false, emoji:'🐍', color:'from-blue-600 to-indigo-700' },
  { id:2, title:'React & Next.js: The Complete Masterclass 2026', instructor:'Alex Rodriguez', rating:4.9, enrolled:'89,445', price:94, level:'Intermediate', duration:'31h 40m', category:'Web Development', free:false, emoji:'⚛️', color:'from-cyan-500 to-blue-600' },
  { id:3, title:'UX Design Fundamentals: Research to Prototype', instructor:'Emma Wilson', rating:4.7, enrolled:'67,210', price:79, level:'Beginner', duration:'18h 30m', category:'UX Design', free:false, emoji:'🎨', color:'from-pink-500 to-violet-600' },
  { id:4, title:'Digital Marketing Strategy: Complete 2026 Guide', instructor:'James Park', rating:4.6, enrolled:'203,112', price:69, level:'Beginner', duration:'22h 10m', category:'Business', free:false, emoji:'📈', color:'from-amber-500 to-orange-600' },
  { id:5, title:'Introduction to Photography: Capture Your World', instructor:'Nina Patel', rating:4.5, enrolled:'48,763', price:0, level:'Beginner', duration:'12h 20m', category:'Photography', free:true, emoji:'📷', color:'from-teal-500 to-cyan-600' },
  { id:6, title:'Advanced SQL for Data Analysis', instructor:'Michael Torres', rating:4.8, enrolled:'91,445', price:84, level:'Advanced', duration:'20h 05m', category:'Data Science', free:false, emoji:'🗄️', color:'from-slate-600 to-slate-800' },
  { id:7, title:'Full-Stack Web Development with Node.js', instructor:'Olivia Kim', rating:4.7, enrolled:'73,210', price:99, level:'Advanced', duration:'40h 00m', category:'Web Development', free:false, emoji:'🌐', color:'from-green-600 to-emerald-700' },
  { id:8, title:'Business Strategy & Competitive Analysis', instructor:'Robert Chang', rating:4.5, enrolled:'55,890', price:74, level:'Intermediate', duration:'16h 45m', category:'Business', free:false, emoji:'🏆', color:'from-yellow-600 to-amber-700' },
  { id:9, title:'Figma for Designers: UI/UX Mastery', instructor:'Sofia Blanc', rating:4.9, enrolled:'112,033', price:0, level:'Beginner', duration:'14h 30m', category:'UX Design', free:true, emoji:'✏️', color:'from-violet-500 to-purple-700' },
  { id:10, title:'Machine Learning A-Z: Python & R in Data Science', instructor:'Dr. Sarah Chen', rating:4.7, enrolled:'156,220', price:94, level:'Advanced', duration:'44h 20m', category:'Data Science', free:false, emoji:'🤖', color:'from-indigo-500 to-blue-700' },
  { id:11, title:'Vue.js 3 & Vuex: Complete Vue Developer Guide', instructor:'Lucas Ferreira', rating:4.6, enrolled:'38,900', price:79, level:'Intermediate', duration:'28h 00m', category:'Web Development', free:false, emoji:'💚', color:'from-emerald-500 to-green-700' },
  { id:12, title:'Photography Post-Processing with Lightroom', instructor:'Nina Patel', rating:4.8, enrolled:'29,445', price:59, level:'Intermediate', duration:'10h 50m', category:'Photography', free:false, emoji:'🖼️', color:'from-rose-500 to-pink-700' },
];

const levelColors = {
  Beginner: 'bg-emerald-100 text-emerald-700',
  Intermediate: 'bg-amber-100 text-amber-700',
  Advanced: 'bg-rose-100 text-rose-700',
};

const CourseCard = ({ course }) => (
  <a href="course-detail.html" className="group bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 flex flex-col">
    <div className={`h-40 bg-gradient-to-br ${course.color} relative overflow-hidden flex items-center justify-center`}>
      <div className="absolute inset-0 opacity-20">
        <div className="absolute top-3 left-3 w-12 h-12 rounded-full bg-white/30"></div>
        <div className="absolute bottom-3 right-3 w-20 h-20 rounded-full bg-white/20"></div>
      </div>
      <div className="relative text-center">
        <div className="text-5xl">{course.emoji}</div>
      </div>
      {course.free && (
        <span className="absolute top-3 left-3 bg-emerald-500 text-white text-xs font-bold px-2 py-1 rounded-lg">FREE</span>
      )}
      <span className={`absolute top-3 right-3 text-xs font-semibold px-2 py-1 rounded-lg ${levelColors[course.level]} bg-white/90`}>{course.level}</span>
    </div>
    <div className="p-4 flex flex-col flex-1">
      <span className="text-xs font-medium text-indigo-600 mb-1">{course.category}</span>
      <h3 className="font-semibold text-slate-900 text-sm leading-snug group-hover:text-indigo-600 transition-colors line-clamp-2 mb-1.5">{course.title}</h3>
      <p className="text-xs text-slate-500 mb-2">{course.instructor}</p>
      <div className="flex items-center gap-2 mb-2">
        <span className="text-sm font-bold text-amber-500">{course.rating.toFixed(1)}</span>
        <Stars rating={course.rating} />
        <span className="text-xs text-slate-400">({course.enrolled})</span>
      </div>
      <div className="flex items-center gap-3 text-xs text-slate-500 mb-3">
        <span className="flex items-center gap-1">
          <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          {course.duration}
        </span>
      </div>
      <div className="mt-auto flex items-center justify-between pt-3 border-t border-slate-100">
        <span className="font-bold text-slate-900 text-base">
          {course.free ? <span className="text-emerald-600">Free</span> : `$${course.price}`}
        </span>
        <span className="text-xs font-semibold text-indigo-600 border border-indigo-200 px-3 py-1 rounded-lg group-hover:bg-indigo-600 group-hover:text-white transition-colors">Enroll</span>
      </div>
    </div>
  </a>
);

const CheckboxFilter = ({ label, checked, onChange }) => (
  <label className="flex items-center gap-2.5 cursor-pointer group">
    <div className={`w-4 h-4 rounded border-2 flex items-center justify-center transition-colors ${checked ? 'bg-indigo-600 border-indigo-600' : 'border-slate-300 group-hover:border-indigo-400'}`} onClick={onChange}>
      {checked && <svg className="w-2.5 h-2.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
    </div>
    <span className="text-sm text-slate-700 group-hover:text-slate-900">{label}</span>
  </label>
);

const App = () => {
  const [selectedCategories, setSelectedCategories] = useState([]);
  const [selectedLevels, setSelectedLevels] = useState([]);
  const [selectedPrice, setSelectedPrice] = useState('all');
  const [selectedRating, setSelectedRating] = useState(0);
  const [sortBy, setSortBy] = useState('popular');
  const [search, setSearch] = useState('');

  const toggle = (arr, setArr, val) => setArr(arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val]);

  const filtered = useMemo(() => {
    let result = [...COURSES];
    if (search) result = result.filter(c => c.title.toLowerCase().includes(search.toLowerCase()) || c.instructor.toLowerCase().includes(search.toLowerCase()));
    if (selectedCategories.length) result = result.filter(c => selectedCategories.includes(c.category));
    if (selectedLevels.length) result = result.filter(c => selectedLevels.includes(c.level));
    if (selectedPrice === 'free') result = result.filter(c => c.free);
    if (selectedPrice === 'paid') result = result.filter(c => !c.free);
    if (selectedRating > 0) result = result.filter(c => c.rating >= selectedRating);
    if (sortBy === 'popular') result.sort((a, b) => parseInt(b.enrolled.replace(/,/g,'')) - parseInt(a.enrolled.replace(/,/g,'')));
    else if (sortBy === 'rated') result.sort((a, b) => b.rating - a.rating);
    else if (sortBy === 'newest') result.sort((a, b) => b.id - a.id);
    return result;
  }, [selectedCategories, selectedLevels, selectedPrice, selectedRating, sortBy, search]);

  const categories = ['Web Development','Data Science','UX Design','Business','Photography'];
  const levels = ['Beginner','Intermediate','Advanced'];

  return (
    <>
      <Header active="Courses" />
      <main>
        {/* Page Header */}
        <div className="bg-white border-b border-slate-200">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            <h1 className="text-3xl font-extrabold text-slate-900 mb-2">All Courses</h1>
            <p className="text-slate-500 text-base">Discover expert-led courses across every category. {COURSES.length.toLocaleString()}+ courses available.</p>
            <div className="mt-5 relative max-w-md">
              <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
              <input
                type="text" placeholder="Search courses..."
                value={search} onChange={e => setSearch(e.target.value)}
                className="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white"
              />
            </div>
          </div>
        </div>

        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
          <div className="flex gap-8">
            {/* Sidebar */}
            <aside className="hidden lg:block w-60 flex-shrink-0">
              <div className="bg-white rounded-2xl border border-slate-200 p-5 sticky top-24 space-y-7">
                {/* Category */}
                <div>
                  <h3 className="font-bold text-slate-900 text-sm mb-3">Category</h3>
                  <div className="space-y-2.5">
                    {categories.map(c => (
                      <CheckboxFilter key={c} label={c} checked={selectedCategories.includes(c)} onChange={() => toggle(selectedCategories, setSelectedCategories, c)} />
                    ))}
                  </div>
                </div>
                <div className="border-t border-slate-100"></div>
                {/* Level */}
                <div>
                  <h3 className="font-bold text-slate-900 text-sm mb-3">Level</h3>
                  <div className="space-y-2.5">
                    {levels.map(l => (
                      <CheckboxFilter key={l} label={l} checked={selectedLevels.includes(l)} onChange={() => toggle(selectedLevels, setSelectedLevels, l)} />
                    ))}
                  </div>
                </div>
                <div className="border-t border-slate-100"></div>
                {/* Price */}
                <div>
                  <h3 className="font-bold text-slate-900 text-sm mb-3">Price</h3>
                  <div className="space-y-2.5">
                    {[['all','All'],['free','Free'],['paid','Paid']].map(([val, label]) => (
                      <label key={val} className="flex items-center gap-2.5 cursor-pointer group">
                        <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center transition-colors ${selectedPrice===val ? 'border-indigo-600' : 'border-slate-300 group-hover:border-indigo-400'}`} onClick={() => setSelectedPrice(val)}>
                          {selectedPrice===val && <div className="w-2 h-2 rounded-full bg-indigo-600"></div>}
                        </div>
                        <span className="text-sm text-slate-700">{label}</span>
                      </label>
                    ))}
                  </div>
                </div>
                <div className="border-t border-slate-100"></div>
                {/* Rating */}
                <div>
                  <h3 className="font-bold text-slate-900 text-sm mb-3">Minimum Rating</h3>
                  <div className="space-y-2">
                    {[0,4.0,4.5,4.7].map(r => (
                      <label key={r} className="flex items-center gap-2.5 cursor-pointer group">
                        <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center transition-colors ${selectedRating===r ? 'border-indigo-600' : 'border-slate-300 group-hover:border-indigo-400'}`} onClick={() => setSelectedRating(r)}>
                          {selectedRating===r && <div className="w-2 h-2 rounded-full bg-indigo-600"></div>}
                        </div>
                        <span className="text-sm text-slate-700 flex items-center gap-1">
                          {r===0 ? 'Any' : <>
                            <svg className="w-3.5 h-3.5 text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                            {r}+
                          </>}
                        </span>
                      </label>
                    ))}
                  </div>
                </div>
                {(selectedCategories.length || selectedLevels.length || selectedPrice !== 'all' || selectedRating > 0) && (
                  <button
                    onClick={() => { setSelectedCategories([]); setSelectedLevels([]); setSelectedPrice('all'); setSelectedRating(0); }}
                    className="w-full text-sm text-indigo-600 font-medium border border-indigo-200 py-2 rounded-lg hover:bg-indigo-50 transition-colors"
                  >Clear All Filters</button>
                )}
              </div>
            </aside>

            {/* Main */}
            <div className="flex-1 min-w-0">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
                <p className="text-sm text-slate-500"><span className="font-semibold text-slate-900">{filtered.length}</span> courses found</p>
                <div className="flex items-center gap-2">
                  <span className="text-sm text-slate-500 whitespace-nowrap">Sort by:</span>
                  <div className="flex rounded-xl border border-slate-200 bg-white overflow-hidden">
                    {[['popular','Most Popular'],['rated','Highest Rated'],['newest','Newest']].map(([val, label]) => (
                      <button key={val} onClick={() => setSortBy(val)}
                        className={`px-4 py-2 text-xs font-medium transition-colors whitespace-nowrap ${sortBy===val ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}
                      >{label}</button>
                    ))}
                  </div>
                </div>
              </div>

              {filtered.length === 0 ? (
                <div className="text-center py-24 bg-white rounded-2xl border border-slate-200">
                  <div className="text-5xl mb-4">🔍</div>
                  <h3 className="text-lg font-bold text-slate-900 mb-2">No courses found</h3>
                  <p className="text-slate-500 text-sm">Try adjusting your filters or search query.</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
                  {filtered.map(c => <CourseCard key={c.id} course={c} />)}
                </div>
              )}
            </div>
          </div>
        </div>
      </main>
      <Footer />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
