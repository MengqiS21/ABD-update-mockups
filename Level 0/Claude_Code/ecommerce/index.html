<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaMart – Shop Everything</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .hero-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #0891b2 100%); }
    .scroll-hide::-webkit-scrollbar { display: none; }
    .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeSlide { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .animate-fade { animation: fadeSlide 0.5s ease forwards; }
    .star { color: #f59e0b; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect } = React;

/* ── SHARED HEADER ── */

  const [query, setQuery] = useState('');
  const [menuOpen, setMenuOpen] = useState(false);
  const categories = ['Electronics','Kitchen','Clothing','Sports','Beauty','Books','Toys','Automotive'];
  return (
    <header className="bg-blue-900 text-white shadow-lg sticky top-0 z-50">
      {/* Top strip */}
      <div className="bg-blue-950 text-xs text-blue-200 py-1">
        <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
          <span>🚚 Free shipping on orders over $35 · Same-day delivery available in select cities</span>
          <div className="flex gap-4">
            <a href="account.html" className="hover:text-yellow-300 transition">Sign In</a>
            <span className="opacity-40">|</span>
            <a href="account.html" className="hover:text-yellow-300 transition">New Customer? Start here</a>
          </div>
        </div>
      </div>
      {/* Main row */}
      <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">
        <a href="index.html" className="text-2xl font-extrabold text-yellow-400 tracking-tight whitespace-nowrap hover:text-yellow-300 transition">
          Nova<span className="text-white">Mart</span>
        </a>
        {/* Search */}
        <div className="flex flex-1 max-w-2xl">
          <select className="bg-gray-100 text-gray-700 text-sm px-2 rounded-l-lg border-r border-gray-300 focus:outline-none">
            <option>All</option>
            {categories.map(c => <option key={c}>{c}</option>)}
          </select>
          <input
            type="text"
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search NovaMart..."
            className="flex-1 px-4 py-2 text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
          />
          <button className="bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-semibold px-5 py-2 rounded-r-lg transition text-sm">
            Search
          </button>
        </div>
        {/* Icons */}
        <div className="flex items-center gap-5 ml-2 text-sm">
          <a href="account.html" className="flex flex-col items-center hover:text-yellow-300 transition leading-tight">
            <span className="text-lg">👤</span>
            <span className="text-xs">Account</span>
          </a>
          <a href="account.html" className="flex flex-col items-center hover:text-yellow-300 transition leading-tight">
            <span className="text-lg">❤️</span>
            <span className="text-xs">Wishlist</span>
          </a>
          <a href="cart.html" className="flex flex-col items-center hover:text-yellow-300 transition leading-tight relative">
            <span className="text-lg">🛒</span>
            <span className="absolute -top-1 -right-2 bg-yellow-400 text-blue-900 text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center">{cartCount}</span>
            <span className="text-xs">Cart</span>
          </a>
        </div>
      </div>
      {/* Category nav */}
      <nav className="bg-blue-800 text-sm">
        <div className="max-w-7xl mx-auto px-4 flex gap-1 overflow-x-auto scroll-hide py-1">
          {['Today\'s Deals','Electronics','Kitchen & Home','Clothing','Sports','Beauty','Books','Toys','Automotive','Gift Cards'].map(cat => (
            <a key={cat} href="products.html"
               className="whitespace-nowrap px-3 py-1.5 rounded hover:bg-blue-700 hover:text-yellow-300 transition text-blue-100">
              {cat}
            </a>
          ))}
        </div>
      </nav>
    </header>
  );
}

/* ── SHARED FOOTER ── */
function Footer() {
  return (
    <footer className="bg-blue-950 text-blue-200 mt-16">
      <div className="max-w-7xl mx-auto px-4 py-12 grid grid-cols-2 md:grid-cols-4 gap-8 text-sm">
        <div>
          <h3 className="text-white font-bold mb-3 text-base">Get to Know Us</h3>
          {['About NovaMart','Careers','Press & Blog','Sustainability','Investor Relations'].map(l=>(
            <a key={l} href="#" className="block mb-1.5 hover:text-yellow-300 transition">{l}</a>
          ))}
        </div>
        <div>
          <h3 className="text-white font-bold mb-3 text-base">Shop With Us</h3>
          {['Your Account','Track Your Order','Returns & Exchanges','NovaMart Prime','Gift Cards'].map(l=>(
            <a key={l} href="#" className="block mb-1.5 hover:text-yellow-300 transition">{l}</a>
          ))}
        </div>
        <div>
          <h3 className="text-white font-bold mb-3 text-base">Help</h3>
          {['Help Center','Shipping Rates','Returns Policy','NovaMart App','Accessibility'].map(l=>(
            <a key={l} href="#" className="block mb-1.5 hover:text-yellow-300 transition">{l}</a>
          ))}
        </div>
        <div>
          <h3 className="text-white font-bold mb-3 text-base">Stay Connected</h3>
          <p className="text-xs mb-3 text-blue-300">Subscribe for deals, new arrivals & more.</p>
          <div className="flex">
            <input type="email" placeholder="Your email" className="flex-1 px-3 py-2 rounded-l-lg text-gray-900 text-xs focus:outline-none" />
            <button className="bg-yellow-400 text-blue-900 font-semibold px-3 py-2 rounded-r-lg text-xs hover:bg-yellow-300 transition">Go</button>
          </div>
          <div className="flex gap-3 mt-4 text-xl">
            {['📘','🐦','📸','▶️'].map((ic,i)=>(
              <a key={i} href="#" className="hover:text-yellow-300 transition">{ic}</a>
            ))}
          </div>
        </div>
      </div>
      <div className="border-t border-blue-800 py-4 text-center text-xs text-blue-400">
        © 2026 NovaMart, Inc. · <a href="#" className="hover:text-yellow-300">Privacy</a> · <a href="#" className="hover:text-yellow-300">Terms</a> · <a href="#" className="hover:text-yellow-300">Cookie Preferences</a>
      </div>
    </footer>
  );
}

/* ── STAR RATING ── */
function Stars({ rating, count }) {
  return (
    <div className="flex items-center gap-1 text-xs">
      {[1,2,3,4,5].map(i => (
        <span key={i} className={i <= Math.round(rating) ? 'text-yellow-400' : 'text-gray-300'}>★</span>
      ))}
      <span className="text-blue-600 ml-1">({count?.toLocaleString()})</span>
    </div>
  );
}

/* ── PRODUCT CARD ── */
function ProductCard({ product }) {
  return (
    <a href="product-detail.html" className="bg-white rounded-xl shadow-sm hover:shadow-md transition-all duration-200 overflow-hidden group border border-gray-100 flex flex-col">
      <div className="relative bg-gray-50 h-44 flex items-center justify-center overflow-hidden">
        <img src={`https://picsum.photos/seed/${product.seed}/300/200`} alt={product.name}
             className="object-cover w-full h-full group-hover:scale-105 transition-transform duration-300" />
        {product.badge && (
          <span className={`absolute top-2 left-2 text-xs font-bold px-2 py-0.5 rounded-full ${product.badge === 'Sale' ? 'bg-red-500 text-white' : product.badge === 'New' ? 'bg-green-500 text-white' : 'bg-yellow-400 text-blue-900'}`}>
            {product.badge}
          </span>
        )}
        <button className="absolute top-2 right-2 bg-white rounded-full p-1.5 shadow hover:scale-110 transition text-gray-400 hover:text-red-500 text-sm">♥</button>
      </div>
      <div className="p-3 flex flex-col flex-1">
        <p className="text-xs text-blue-600 font-medium mb-0.5">{product.brand}</p>
        <p className="text-sm text-gray-800 font-medium leading-snug line-clamp-2 flex-1">{product.name}</p>
        <Stars rating={product.rating} count={product.reviews} />
        <div className="flex items-baseline gap-2 mt-2">
          <span className="text-lg font-bold text-gray-900">${product.price}</span>
          {product.original && <span className="text-xs text-gray-400 line-through">${product.original}</span>}
          {product.original && <span className="text-xs text-red-500 font-semibold">-{Math.round((1-product.price/product.original)*100)}%</span>}
        </div>
        {product.prime && <p className="text-xs text-blue-600 font-medium mt-1">✦ Prime · Free delivery</p>}
      </div>
    </a>
  );
}

/* ── HERO BANNER ── */
function HeroBanner() {
  const slides = [
    { tag:'Flash Sale', headline:'Up to 50% off Electronics', sub:'Limited time · Ends tonight at midnight', cta:'Shop Electronics', color:'from-blue-900 to-indigo-800', accent:'yellow' },
    { tag:'New Arrivals', headline:'Spring Home Refresh is Here', sub:'Discover 500+ new kitchen & home products', cta:'Shop Home', color:'from-teal-800 to-cyan-700', accent:'yellow' },
    { tag:'Members Only', headline:'NovaMart Prime · First Month Free', sub:'Free same-day delivery, exclusive deals & more', cta:'Try Prime', color:'from-purple-900 to-indigo-800', accent:'yellow' },
  ];
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setIdx(i => (i+1)%slides.length), 5000);
    return () => clearInterval(t);
  }, []);
  const s = slides[idx];
  return (
    <div className={`relative bg-gradient-to-r ${s.color} text-white overflow-hidden`} style={{minHeight:'360px'}}>
      <div className="max-w-7xl mx-auto px-8 py-16 flex items-center justify-between gap-8">
        <div className="animate-fade" key={idx}>
          <span className="inline-block bg-yellow-400 text-blue-900 text-xs font-bold px-3 py-1 rounded-full mb-4 uppercase tracking-wider">{s.tag}</span>
          <h1 className="text-4xl md:text-5xl font-extrabold leading-tight mb-3 max-w-lg">{s.headline}</h1>
          <p className="text-blue-200 text-base mb-6">{s.sub}</p>
          <a href="products.html" className="inline-block bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-bold px-7 py-3 rounded-lg shadow-lg transition text-sm">{s.cta} →</a>
        </div>
        <div className="hidden md:block">
          <img src={`https://picsum.photos/seed/hero${idx}/420/280`} alt="hero" className="rounded-2xl shadow-2xl w-80 h-56 object-cover" />
        </div>
      </div>
      {/* Dots */}
      <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
        {slides.map((_,i) => (
          <button key={i} onClick={()=>setIdx(i)}
            className={`w-2 h-2 rounded-full transition-all ${i===idx?'bg-yellow-400 w-5':'bg-white/40'}`} />
        ))}
      </div>
      {/* Nav arrows */}
      <button onClick={()=>setIdx(i=>(i-1+slides.length)%slides.length)}
        className="absolute left-3 top-1/2 -translate-y-1/2 bg-black/30 hover:bg-black/50 rounded-full w-8 h-8 flex items-center justify-center text-white transition">‹</button>
      <button onClick={()=>setIdx(i=>(i+1)%slides.length)}
        className="absolute right-3 top-1/2 -translate-y-1/2 bg-black/30 hover:bg-black/50 rounded-full w-8 h-8 flex items-center justify-center text-white transition">›</button>
    </div>
  );
}

        {cats.map(cat => (

/* ── TODAY'S DEALS ── */
function TodaysDeals() {
  const deals = [
    { name:'Sony WH-1000XM5 Headphones', brand:'Sony', price:'279.99', original:'399.99', rating:4.8, reviews:12340, badge:'Sale', seed:'sony1', prime:true },
    { name:'Apple AirPods Pro (2nd Gen)', brand:'Apple', price:'189.99', original:'249.00', rating:4.7, reviews:89210, badge:'Sale', seed:'apple1', prime:true },
    { name:'Samsung 65" 4K QLED TV', brand:'Samsung', price:'799.99', original:'1299.99', rating:4.6, reviews:3201, badge:'Sale', seed:'tv1', prime:true },
    { name:'Instant Pot Duo 7-in-1', brand:'Instant Brands', price:'59.99', original:'99.95', rating:4.7, reviews:54321, badge:'Sale', seed:'pot1', prime:false },
    { name:'Nike Air Zoom Pegasus 40', brand:'Nike', price:'89.99', original:'130.00', rating:4.5, reviews:8760, badge:'Sale', seed:'nike1', prime:true },
    { name:'Dyson V15 Detect Vacuum', brand:'Dyson', price:'549.99', original:'749.99', rating:4.7, reviews:6543, badge:'Sale', seed:'dyson1', prime:true },
    { name:'Anker PowerCore 26800mAh', brand:'Anker', price:'45.99', original:'79.99', rating:4.6, reviews:34500, badge:'Sale', seed:'anker1', prime:true },
    { name:'KitchenAid Stand Mixer 5-Qt', brand:'KitchenAid', price:'279.99', original:'449.99', rating:4.8, reviews:21000, badge:'Sale', seed:'mixer1', prime:false },
  ];
  const [timeLeft, setTimeLeft] = useState({ h:7, m:23, s:45 });
  useEffect(() => {
    const t = setInterval(() => {
      setTimeLeft(prev => {
        let {h,m,s} = prev;
        s--;
        if(s<0){s=59;m--;}
        if(m<0){m=59;h--;}
        if(h<0){h=0;m=0;s=0;}
        return {h,m,s};
      });
    }, 1000);
    return () => clearInterval(t);
  }, []);
  const pad = n => String(n).padStart(2,'0');
  return (
    <section className="max-w-7xl mx-auto px-4 pb-10">
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-4">
          <h2 className="text-xl font-bold text-gray-900">Today's Deals</h2>
          <div className="flex items-center gap-1 bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg">
            <span>⏱</span>
            <span>Ends in</span>
            <span className="bg-red-800 px-1.5 py-0.5 rounded ml-1">{pad(timeLeft.h)}:{pad(timeLeft.m)}:{pad(timeLeft.s)}</span>
          </div>
        </div>
        <a href="products.html" className="text-blue-600 text-sm font-medium hover:underline">See all deals →</a>
      </div>
      <div className="flex gap-4 overflow-x-auto scroll-hide pb-2">
        {deals.map((d, i) => (
          <div key={i} className="min-w-[180px] max-w-[180px]">
            <ProductCard product={d} />
          </div>
        ))}
      </div>
    </section>
  );
}

/* ── PROMO BANNERS ── */
function PromoBanners() {
  const banners = [
    { title:'Prime Deals', sub:'Extra 15% off for members', color:'bg-gradient-to-r from-blue-600 to-blue-800', cta:'Join Prime', emoji:'⚡' },
    { title:'New Arrivals', sub:'Freshest picks this week', color:'bg-gradient-to-r from-teal-600 to-cyan-700', cta:'Shop New', emoji:'✨' },
    { title:'Sell on NovaMart', sub:'Reach millions of shoppers', color:'bg-gradient-to-r from-purple-600 to-indigo-700', cta:'Start Selling', emoji:'🏪' },
  ];
  return (
    <section className="max-w-7xl mx-auto px-4 pb-10">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {banners.map((b,i) => (
          <div key={i} className={`${b.color} text-white rounded-xl p-5 flex items-center justify-between`}>

/* ── TRENDING BRANDS ── */
function TrendingBrands() {
  const brands = ['Sony','Apple','Samsung','Nike','Dyson','Levi\'s','Ninja','Garmin','Anker','Bose','KitchenAid','Adidas'];

      <div className="flex flex-wrap gap-2">
        {brands.map(b => (
          <a key={b} href="products.html"
             className="bg-white border border-gray-200 text-gray-700 text-sm font-medium px-4 py-2 rounded-full hover:border-blue-500 hover:text-blue-600 transition shadow-sm">
            {b}
          </a>
        ))}
      </div>
    </section>
  );
}

/* ── MAIN APP ── */
function App() {
  return (
    <div className="min-h-screen flex flex-col">
      <Header cartCount={3} />
      <main className="flex-1">
        <HeroBanner />
        <CategoryTiles />
        <TodaysDeals />
        <PromoBanners />
        <FeaturedSection />
        <TrendingBrands />
      </main>
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
