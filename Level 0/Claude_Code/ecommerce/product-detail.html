        <div>
          <h3 className="text-white font-bold mb-3">Get to Know Us</h3>
          {['About NovaMart','Careers','Press & Blog','Sustainability'].map(l=><a key={l} href="#" className="block mb-1.5 hover:text-yellow-300 transition">{l}</a>)}

        <div>

        </div>
        <div>
          <h3 className="text-white font-bold mb-3">Stay Connected</h3>
          <div className="flex"><input type="email" placeholder="Your email" className="flex-1 px-3 py-2 rounded-l-lg text-gray-900 text-xs focus:outline-none"/>
            <button className="bg-yellow-400 text-blue-900 font-semibold px-3 py-2 rounded-r-lg text-xs">Go</button></div>
        </div>

const IMAGES = [
  'https://picsum.photos/seed/sony1/600/500',
  'https://picsum.photos/seed/sony2/600/500',
  'https://picsum.photos/seed/sony3/600/500',
  'https://picsum.photos/seed/sony4/600/500',
];

const COLORS = [
  { name:'Midnight Black', hex:'#1a1a1a' },
  { name:'Platinum Silver', hex:'#c0c0c0' },
  { name:'Midnight Blue', hex:'#1e3a8a' },
];

const SPECS = [
  { label:'Brand', value:'Sony' },
  { label:'Model', value:'WH-1000XM5' },
  { label:'Driver Size', value:'30mm' },
  { label:'Frequency Response', value:'4 Hz – 40,000 Hz' },
  { label:'Noise Cancellation', value:'Industry-leading ANC with 8 mics' },
  { label:'Battery Life', value:'30 hours (ANC on)' },
  { label:'Charging Time', value:'3.5 hours (USB-C)' },
  { label:'Quick Charge', value:'3 min charge = 3 hours playback' },
  { label:'Connectivity', value:'Bluetooth 5.2, Multipoint' },
  { label:'Codec Support', value:'LDAC, AAC, SBC' },
  { label:'Weight', value:'250 g' },
  { label:'Foldable', value:'No' },
  { label:'Voice Assistant', value:'Google Assistant, Alexa' },
  { label:'Water Resistance', value:'Not rated' },
  { label:'Warranty', value:'1 year limited' },
];

const REVIEWS = [
  { name:'Jordan M.', rating:5, date:'March 10, 2026', title:'Best headphones I\'ve ever owned', body:'The noise cancellation is absolutely incredible — I can\'t hear anything on my daily commute. Sound quality is rich and balanced. Battery lasts all day and then some. Worth every penny.', helpful:234 },
  { name:'Priya K.', rating:4, date:'February 28, 2026', title:'Excellent ANC, slightly uncomfortable after 3 hours', body:'Love the sound and ANC. My only gripe is that after about 3 hours of continuous wear, the headband starts to feel a bit tight. That said, for work calls and music sessions, these are phenomenal.', helpful:187 },
  { name:'Thomas B.', rating:5, date:'February 15, 2026', title:'Upgraded from XM4 — worth it', body:'The XM4s were already great but the XM5s take it to another level. Clearer highs, better call quality, and the touch controls are more responsive. Build quality is top notch.', helpful:142 },
  { name:'Sarah L.', rating:3, date:'January 30, 2026', title:'Great sound, disappointed it doesn\'t fold', body:'Coming from an older model that folded for travel, I was surprised these don\'t fold anymore. Still great headphones but the non-folding design is a real inconvenience for frequent travelers.', helpful:98 },
];

const RELATED = [
  { name:'Bose QuietComfort 45', brand:'Bose', price:'199.99', original:'329.00', rating:4.5, reviews:14500, seed:'bose1' },
  { name:'Apple AirPods Max', brand:'Apple', price:'449.99', original:'549.00', rating:4.4, reviews:34200, seed:'apple2' },
  { name:'Jabra Evolve2 85', brand:'Jabra', price:'379.99', original:'479.00', rating:4.5, reviews:3400, seed:'jabra1' },
  { name:'Anker Soundcore Q45', brand:'Anker', price:'59.99', original:'89.99', rating:4.4, reviews:23000, seed:'anker2' },
];

function Stars({ rating, size='sm' }) {
  return (
    <div className={`flex items-center gap-0.5 ${size==='lg'?'text-xl':'text-sm'}`}>
      {[1,2,3,4,5].map(i=><span key={i} className={i<=Math.round(rating)?'text-yellow-400':'text-gray-300'}>★</span>)}
    </div>
  );
}

function ReviewBar({ label, pct }) {
  return (
    <div className="flex items-center gap-2 text-xs">
      <span className="w-12 text-blue-600 text-right">{label}</span>
      <div className="flex-1 bg-gray-200 rounded-full h-2">
        <div className="bg-yellow-400 h-2 rounded-full" style={{width:`${pct}%`}}/>
      </div>
      <span className="text-gray-500 w-8">{pct}%</span>
    </div>
  );
}

function ProductDetail() {
  const [mainImg, setMainImg] = useState(0);
  const [color, setColor] = useState(0);
  const [qty, setQty] = useState(1);
  const [tab, setTab] = useState('description');
  const [cartCount, setCartCount] = useState(3);
  const [added, setAdded] = useState(false);
  const [wished, setWished] = useState(false);

  function addToCart() {
    setCartCount(c=>c+qty);
    setAdded(true);
    setTimeout(()=>setAdded(false), 2500);
  }

  const tabs = ['description','specs','reviews'];

  return (
    <>
      <Header cartCount={cartCount} />
      <main className="max-w-7xl mx-auto px-4 py-6">
        {/* Breadcrumb */}
        <div className="text-xs text-gray-500 flex gap-1 mb-5">
          <a href="index.html" className="hover:text-blue-600">Home</a><span>›</span>
          <a href="products.html" className="hover:text-blue-600">Electronics</a><span>›</span>
          <a href="products.html" className="hover:text-blue-600">Headphones</a><span>›</span>
          <span className="text-gray-700">Sony WH-1000XM5</span>
        </div>

        {/* Main product section */}
        <div className="grid grid-cols-1 md:grid-cols-12 gap-8 mb-12">
          {/* Images col */}

            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mb-3 aspect-square flex items-center justify-center">
              <img src={IMAGES[mainImg]} alt="product" className="w-full h-full object-cover" />

            <div className="flex gap-2">

                <button key={i} onClick={()=>setMainImg(i)}
                  className={`flex-1 rounded-lg overflow-hidden border-2 transition ${mainImg===i?'border-blue-600':'border-gray-200 hover:border-gray-400'}`}>
                  <img src={img} alt={`View ${i+1}`} className="w-full h-16 object-cover"/>
                </button>
              ))}
            </div>
          </div>

          {/* Info col */}
          <div className="md:col-span-4">
            <p className="text-xs text-blue-600 font-semibold uppercase tracking-wide mb-1">Sony</p>
            <h1 className="text-2xl font-bold leading-snug mb-2">Sony WH-1000XM5 Wireless Noise-Canceling Headphones</h1>

            <div className="flex items-center gap-3 mb-3">
              <Stars rating={4.8} />
              <a href="#reviews" onClick={()=>setTab('reviews')}
                 className="text-blue-600 text-sm hover:underline">12,340 ratings</a>
              <span className="text-gray-300">|</span>
              <span className="text-green-600 text-sm font-medium">#1 Best Seller</span>
            </div>

            <div className="border-t border-gray-100 pt-3 mb-3">
              <div className="flex items-baseline gap-2">
                <span className="text-3xl font-extrabold text-gray-900">$279.99</span>
                <span className="text-lg text-gray-400 line-through">$399.99</span>
                <span className="text-base text-red-500 font-bold">Save 30%</span>
              </div>
              <p className="text-xs text-gray-500 mt-0.5">Tax included where applicable</p>
              <div className="bg-blue-50 text-blue-700 text-xs font-semibold px-3 py-1.5 rounded-lg inline-block mt-2">
                ✦ Prime members get an extra 5% back · <a href="account.html" className="underline">Learn more</a>
              </div>
            </div>

            {/* Color */}
            <div className="mb-4">
              <p className="text-sm font-semibold mb-2">Color: <span className="font-normal text-gray-600">{COLORS[color].name}</span></p>
              <div className="flex gap-2">
                {COLORS.map((c,i)=>(
                  <button key={i} onClick={()=>setColor(i)}
                    className={`w-9 h-9 rounded-full border-2 transition ${color===i?'border-blue-600 scale-110':'border-gray-300 hover:border-gray-500'}`}
                    style={{background:c.hex}} title={c.name}/>
                ))}
              </div>
            </div>

            {/* Stock */}
            <p className="text-green-600 font-semibold text-sm mb-4">✓ In Stock · Usually ships in 1-2 business days</p>

            {/* Quantity */}
            <div className="flex items-center gap-3 mb-4">
              <span className="text-sm font-medium text-gray-700">Qty:</span>
              <div className="flex items-center border border-gray-200 rounded-lg overflow-hidden">
                <button onClick={()=>setQty(q=>Math.max(1,q-1))} className="px-3 py-2 text-gray-600 hover:bg-gray-100 transition font-bold">−</button>
                <span className="px-4 py-2 font-semibold text-sm border-x border-gray-200">{qty}</span>
                <button onClick={()=>setQty(q=>q+1)} className="px-3 py-2 text-gray-600 hover:bg-gray-100 transition font-bold">+</button>
              </div>
            </div>

            {/* CTAs */}
            <div className="flex flex-col gap-3">
              <button onClick={addToCart}
                className={`w-full py-3 rounded-xl font-bold text-sm transition shadow-md ${added?'bg-green-500 text-white':'bg-yellow-400 hover:bg-yellow-300 text-blue-900'}`}>
                {added ? '✓ Added to Cart!' : 'Add to Cart'}

              <a href="cart.html"
                className="w-full py-3 rounded-xl font-bold text-sm bg-blue-600 hover:bg-blue-700 text-white text-center transition shadow-md">

              </a>
              <button onClick={()=>setWished(w=>!w)}
                className={`w-full py-2 rounded-xl text-sm border transition ${wished?'border-red-400 text-red-500 bg-red-50':'border-gray-300 text-gray-600 hover:bg-gray-50'}`}>
                {wished ? '♥ Saved to Wishlist' : '♡ Add to Wishlist'}

            </div>

            {/* Share */}
            <div className="flex items-center gap-3 mt-4 text-xs text-gray-500">
              <span>Share:</span>
              {['📘 Facebook','🐦 Twitter','📧 Email','🔗 Copy Link'].map(s=>(

            </div>
          </div>

            <div className="bg-white border border-gray-200 rounded-2xl shadow-sm p-5 sticky top-28">
              <p className="text-2xl font-extrabold mb-1">$279.99</p>

                {t === 'reviews' ? `Reviews (12,340)` : t.charAt(0).toUpperCase()+t.slice(1)}
              </button>
            ))}
          </div>

          {tab === 'description' && (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 max-w-3xl">
              <h3 className="text-lg font-bold mb-4">Product Description</h3>
              <p className="text-gray-700 text-sm leading-relaxed mb-4">
                Experience sound like never before with the Sony WH-1000XM5 wireless noise-canceling headphones.
                Featuring Sony's new Integrated Processor V1 and eight microphones, these headphones deliver
                industry-leading noise cancellation that adapts to your environment in real time.
              </p>
              <p className="text-gray-700 text-sm leading-relaxed mb-4">
                The 30mm carbon fiber composite drivers produce clear, natural sound across the full frequency
                spectrum. Whether you're listening to classical, hip-hop, or podcasts, the XM5 delivers
                exceptional audio clarity with deep bass and sparkling highs.
              </p>
              <ul className="list-none space-y-2 text-sm text-gray-700">
                {[
                  '🎧 Industry-leading noise cancellation with 8 microphones',
                  '🔋 30-hour battery life with quick charge (3 min = 3 hours)',
                  '📞 Exceptional call quality with Auto NC Optimizer',
                  '🎵 LDAC codec support for Hi-Res Audio wireless playback',
                  '📱 Multipoint connection – connect to 2 devices simultaneously',
                  '🌐 Speak-to-Chat automatically pauses music when you talk',
                  '🎛️ Precise touch sensor controls on ear cup',
                  '✈️ Compatible with Sony | Headphones Connect app',
                ].map((f,i)=><li key={i}>{f}</li>)}
              </ul>
            </div>
          )}

          {tab === 'specs' && (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 max-w-2xl">
              <h3 className="text-lg font-bold mb-4">Technical Specifications</h3>
              <table className="w-full text-sm">
                <tbody>
                  {SPECS.map((s,i)=>(
                    <tr key={i} className={i%2===0?'bg-gray-50':''}>
                      <td className="py-2.5 px-4 text-gray-500 font-medium w-1/2">{s.label}</td>
                      <td className="py-2.5 px-4 text-gray-900">{s.value}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {tab === 'reviews' && (
            <div className="max-w-3xl">
              {/* Rating summary */}
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6 flex gap-8 items-center">
                <div className="text-center">
                  <p className="text-5xl font-extrabold text-gray-900">4.8</p>
                  <Stars rating={4.8} size="lg" />
                  <p className="text-xs text-gray-500 mt-1">12,340 ratings</p>
                </div>
                <div className="flex-1 space-y-1.5">
                  <ReviewBar label="5 ★" pct={82} />
                  <ReviewBar label="4 ★" pct={11} />
                  <ReviewBar label="3 ★" pct={4} />
                  <ReviewBar label="2 ★" pct={2} />
                  <ReviewBar label="1 ★" pct={1} />
                </div>
              </div>
              {/* Individual reviews */}
              <div className="space-y-4">
                {REVIEWS.map((r,i)=>(
                  <div key={i} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-2">
                        <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-sm">{r.name[0]}</div>
                        <span className="font-semibold text-sm">{r.name}</span>
                        <span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full font-medium">Verified Purchase</span>
                      </div>
                      <span className="text-xs text-gray-400">{r.date}</span>
                    </div>
                    <Stars rating={r.rating} />
                    <p className="font-semibold text-sm mt-2 mb-1">{r.title}</p>
                    <p className="text-sm text-gray-600 leading-relaxed">{r.body}</p>
                    <div className="flex items-center gap-3 mt-3 text-xs text-gray-400">
                      <span>Helpful? ({r.helpful})</span>
                      <button className="text-blue-600 hover:underline">Yes</button>
                      <button className="text-blue-600 hover:underline">No</button>
                      <button className="ml-auto text-gray-400 hover:text-gray-600">Report</button>
                    </div>
                  </div>
                ))}
              </div>
              <div className="text-center mt-6">
                <button className="border border-gray-300 text-gray-700 px-6 py-2.5 rounded-lg text-sm hover:bg-gray-50 transition">

                </button>
              </div>
            </div>
          )}
        </div>

        {/* Related products */}
        <section>
          <h2 className="text-xl font-bold mb-4">Frequently Bought Together</h2>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            {RELATED.map((p,i)=>(
              <a key={i} href="product-detail.html" className="bg-white rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition overflow-hidden group">
                <img src={`https://picsum.photos/seed/${p.seed}/300/200`} alt={p.name}
                     className="w-full h-40 object-cover group-hover:scale-105 transition-transform duration-300"/>
                <div className="p-3">
                  <p className="text-xs text-blue-600 font-medium">{p.brand}</p>
                  <p className="text-sm font-medium text-gray-800 line-clamp-2 mb-1">{p.name}</p>
                  <div className="flex items-center gap-0.5 text-xs mb-1">
                    {[1,2,3,4,5].map(j=><span key={j} className={j<=Math.round(p.rating)?'text-yellow-400':'text-gray-300'}>★</span>)}
                    <span className="text-blue-600 ml-1">({p.reviews.toLocaleString()})</span>
                  </div>
                  <div className="flex items-baseline gap-1">
                    <span className="font-bold text-gray-900">${p.price}</span>
                    <span className="text-xs text-gray-400 line-through">${p.original}</span>
                  </div>
                </div>
              </a>
            ))}
          </div>
        </section>
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ProductDetail />);
</script>
</body>
</html>
