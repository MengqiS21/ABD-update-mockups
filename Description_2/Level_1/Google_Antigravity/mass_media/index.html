<!DOCTYPE html>
<html lang="en">

<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF9F6;
            /* Slight off-white, paper-like */

            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .font-serif {
            font-family: 'Merriweather', serif;
        }

        /* Customize scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;

</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        const SearchIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></svg>;
        const UserIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>;

        // --- Shared Components ---

                                </button>
                            </div>

                            {/* Left Navigation */}
                            <nav className="hidden md:flex space-x-8" aria-label="Main Navigation">

                                <a href="category.html" className="text-sm font-semibold text-gray-900 hover:text-red-700 hover:underline hover:underline-offset-4 decoration-2 transition-colors">Energy</a>
                                <a href="category.html" className="text-sm font-semibold text-gray-900 hover:text-red-700 hover:underline hover:underline-offset-4 decoration-2 transition-colors">Policy</a>

                                <a href="index.html" className="font-serif text-2xl font-black tracking-tighter uppercase mb-4 block">
                                    Groundwork<span className="text-red-500">.</span>
                                </a>

                                </p>

                                <h3 className="text-xs font-bold uppercase tracking-widest text-neutral-500 mb-4">Sections</h3>

                                    <li><a href="category.html" className="hover:text-red-400 transition-colors focus:outline-none focus:underline">Climate</a></li>
                                    <li><a href="category.html" className="hover:text-red-400 transition-colors focus:outline-none focus:underline">Energy</a></li>
                                    <li><a href="category.html" className="hover:text-red-400 transition-colors focus:outline-none focus:underline">Data</a></li>
                                    <li><a href="opinion.html" className="hover:text-red-400 transition-colors focus:outline-none focus:underline">Perspectives</a></li>

                                <form className="flex" onSubmit={(e) => e.preventDefault()}>

                                    <input
                                        id="email-address"
                                        name="email"
                                        type="email"
                                        autoComplete="email"
                                        required
                                        className="w-full min-w-0 px-4 py-2 text-base text-gray-900 bg-white border border-transparent rounded-none focus:outline-none focus:ring-2 focus:ring-white focus:border-white sm:text-sm"

                                    />
                                    <button
                                        type="submit"
                                        className="mt-0 ml-3 flex-shrink-0 w-auto flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-none text-white bg-red-700 hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-neutral-900 focus:ring-red-500 transition-colors"

                                &copy; 2026 Groundwork Media Inc. All rights reserved.
                            </p>
                            <div className="mt-4 md:mt-0 flex space-x-6 text-sm text-neutral-500">

                            </div>

                        <img

                                    The Invisible Flood: How Groundwater Collapse Is Reshaping the American West

                            <p className="text-xl md:text-2xl text-gray-300 font-serif mb-8 max-w-3xl leading-relaxed">

                            </p>

                            <div className="flex items-center space-x-4 text-sm font-medium text-gray-400">
                                <span className="flex items-center"><ClockIcon /><span className="ml-1">15 min read</span></span>
                                <span>&bull;</span>
                                <span className="uppercase tracking-wider">By Sarah Jenkins & David Choe</span>

                    id: 2,
                    category: 'Policy',
                    title: 'Lobbying Under the Radar: The New Tactics of Big Oil',
                    excerpt: 'Internal documents reveal how fossil fuel giants are quietly funding grassroots front groups to block local renewable initiatives.',

                    date: 'Oct 10',
                    image: 'https://images.unsplash.com/photo-1551062973-205fb1fc969f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80',
                    alt: 'Oil refinery at dusk'

                    id: 3,
                    category: 'Science',
                    title: 'Thawing Permafrost: The Microbial Threat Awakens',

                                    <img src={story.image} alt={story.alt} className="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500 ease-out" />

                                <div className="text-xs font-bold text-red-700 uppercase tracking-widest mb-3">

                                </div>
                                <h3 className="font-serif text-xl font-bold mb-3 leading-tight group-hover:underline decoration-2 underline-offset-4">

                                </h3>
                                <p className="text-gray-600 font-serif leading-relaxed mb-4 flex-grow text-sm">

                                </div>

                    </div>

            );

            return (

                        <div className="text-center mb-16">

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-12 divide-y md:divide-y-0 md:divide-x divide-neutral-700">
                            <div className="text-center px-4 pt-8 md:pt-0">
                                <p className="font-serif text-6xl lg:text-8xl font-black text-red-500 mb-4 tracking-tighter">4.2<span className="text-4xl">ft</span></p>
                                <h3 className="text-lg font-bold uppercase tracking-wider mb-2">Aquifer Depletion</h3>
                                <p className="text-neutral-400 text-sm font-serif">Average annual drop in Central Valley groundwater levels since 2011.</p>
                                <a href="article.html" className="inline-block mt-4 text-xs font-bold text-white hover:text-red-400 uppercase tracking-widest border-b border-white hover:border-red-400 pb-1">Read the Report</a>

                            </div>

                            <div className="text-center px-4 pt-8 md:pt-0">
                                <p className="font-serif text-6xl lg:text-8xl font-black text-red-500 mb-4 tracking-tighter">18<span className="text-4xl">%</span></p>
                                <h3 className="text-lg font-bold uppercase tracking-wider mb-2">Unreported Emissions</h3>
                                <p className="text-neutral-400 text-sm font-serif">Discrepancy in tech sector greenhouse gas reporting uncovered via satellite data.</p>
                                <a href="article.html" className="inline-block mt-4 text-xs font-bold text-white hover:text-red-400 uppercase tracking-widest border-b border-white hover:border-red-400 pb-1">Explore Findings</a>
                            </div>

                    </div>

                        <div className="flex flex-col sm:flex-row justify-center items-center gap-4">

        const rootLayout = document.getElementById('root');
