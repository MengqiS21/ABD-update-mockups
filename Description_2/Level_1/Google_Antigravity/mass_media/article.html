                    <p>Deep in the Guaviare department of Colombia, where the Amazon rainforest begins its slow transition into the eastern plains, a sign stands next to an unpaved logging road. "Protected Forest Area," it reads in fading Spanish, bearing the logos of three international conservation NGOs and a Swiss multinational energy trader.</p>

                    <p>On paper, this 50,000-hectare parcel is a triumph of modern climate finance. It generates millions of carbon credits annually, purchased by airlines, tech giants, and oil companies to claim progress toward "net zero" emissions goals.</p>

                    <p>But when Groundwork reporters visited the site in August, accompanied by local indigenous guides, the reality was starkly different. The forest wasn't being preserved from imminent logging. In fact, historical records showed the land had never been viable for commercial logging due to its remote topography and seasonal flooding. The carbon credits being sold were based on a hypothetical threat that didn't exist.</p>

                    <PullQuote />

                    <h3>The Phantom Baseline</h3>

                    <p>The core of the problem lies in what auditors call the "baseline scenario." To generate a carbon offset credit, a project developer must prove that the forest would have been destroyed without their intervention.</p>

                    <p>Groundwork's analysis of project documents reveals a systemic pattern of exaggerating these theoretical threats. By drawing baseline scenarios that predict catastrophically high rates of deforestation, developers can claim to "save" more trees—and thus generate more lucrative credits—even if nothing changes on the ground.</p>

                    <DataEmbed />

                    <p>Consider the case of the Alto Mayo project in Peru. In 2020, auditors approved a baseline scenario predicting a 45% deforestation rate over five years. Yet satellite data from adjacent, unprotected forests with identical geographic profiles showed deforestation rates of less than 3% during the same period.</p>

                    <p>When confronted with these discrepancies, the certification bodies responsible for validating the projects pointed to older, less precise methodologies. "The science of remote sensing has evolved rapidly," said a spokesperson for Verra, the world's leading carbon standard. "We are in the process of updating our methodologies to reflect the latest technological capabilities."</p>

                    <p>But for the millions of tons of CO2 already emitted under the cover of these faulty credits, the damage is already done. And the financial incentives remain skewed toward producing maximum volume over proven environmental integrity.</p>
