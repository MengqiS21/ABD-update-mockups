<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - State of Vermont</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gov: {
                            primary: '#1e3a5f',
                            secondary: '#336699',
                            accent: '#e6a400',
                            light: '#f4f7f6',
                            dark: '#1a1a1a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, sans-serif;
        }

        a:focus,
        button:focus,
        input:focus,
        select:focus {
            outline: 2px solid #e6a400 !important;
            outline-offset: 2px;
        }
    </style>
</head>

<body class="bg-gov-light text-gov-dark min-h-screen flex flex-col">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const Header = () => (
            <header className="bg-gov-primary text-white border-b-4 border-gov-accent">
                <div className="bg-gov-dark py-1 px-4 text-xs flex justify-between items-center">
                    <span>Official Government Website of the State of Vermont</span>
                    <div className="flex gap-2 items-center">
                        <label htmlFor="language-select" className="sr-only">Select Language</label>
                        <select id="language-select" className="bg-gov-dark text-white border border-gray-500 rounded px-1 py-0.5" aria-label="Language Selector">
                            <option value="en">English</option>
                            <option value="es">Español</option>
                            <option value="fr">Français</option>
                        </select>
                    </div>
                </div>
                <div className="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                    <a href="index.html" className="text-2xl font-bold flex items-center gap-2 hover:opacity-80 transition-opacity">
                        <svg className="w-8 h-8 text-gov-accent" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z" /></svg>
                        <span>State of Vermont</span>
                    </a>
                    <nav aria-label="Main Navigation">
                        <ul className="flex flex-wrap gap-4 md:gap-6 font-medium">
                            <li><a href="services.html" className="text-gov-accent underline transition-colors" aria-current="page">Services</a></li>
                            <li><a href="service-driver-license.html" className="hover:text-gov-accent transition-colors">Renew License</a></li>
                            <li><a href="service-benefits.html" className="hover:text-gov-accent transition-colors">Apply for Benefits</a></li>
                            <li><a href="about.html" className="hover:text-gov-accent transition-colors">About</a></li>
                            <li><a href="contact.html" className="hover:text-gov-accent transition-colors">Contact</a></li>
                        </ul>
                    </nav>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="bg-gov-primary text-white mt-auto py-8 border-t-8 border-gov-secondary">
                <div className="container mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-8">
                    <div>
                        <h2 className="text-lg font-bold mb-4">State of Vermont</h2>
                        <p className="text-sm opacity-90">Providing resident services securely and efficiently.</p>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Quick Links</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="index.html" className="hover:underline hover:text-gov-accent">Home</a></li>
                            <li><a href="services.html" className="hover:underline hover:text-gov-accent">All Services</a></li>
                            <li><a href="about.html" className="hover:underline hover:text-gov-accent">About the Governor</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Resources</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Open Data & Transparency</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Legislative News</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Agency Directory</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Support</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="contact.html" className="hover:underline hover:text-gov-accent">Contact Us</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Accessibility Statement</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Privacy Policy</a></li>
                        </ul>
                    </div>
                </div>
                <div className="container mx-auto px-4 mt-8 pt-4 border-t border-blue-800 text-xs text-center opacity-75">
                    &copy; 2026 State of Vermont. All rights reserved.
                </div>
            </footer>
        );

        const App = () => {
            const categories = [
                {
                    title: "New Residents",
                    description: "Everything you need to get settled in Vermont.",
                    services: [
                        { name: "Update Driver's License", time: "~15 minutes online", link: "service-driver-license.html" },
                        { name: "Register Vehicle", time: "~20 minutes online", link: "#" },
                        { name: "Voter Registration", time: "~5 minutes online", link: "#" }
                    ]
                },
                {
                    title: "Families & Households",
                    description: "Support and resources for families.",
                    services: [
                        { name: "Apply for Benefits (SNAP, Medicaid)", time: "~30 minutes online", link: "service-benefits.html" },
                        { name: "Childcare Assistance", time: "~15 minutes online", link: "#" },
                        { name: "Home Energy Assistance", time: "~10 minutes online", link: "#" }
                    ]
                },
                {
                    title: "Students",
                    description: "Education resources and financial aid.",
                    services: [
                        { name: "Financial Aid Application", time: "~25 minutes online", link: "#" },
                        { name: "Find a Public School", time: "Instant search", link: "#" }
                    ]
                },
                {
                    title: "Seniors",
                    description: "Programs for aging residents.",
                    services: [
                        { name: "Medicare Assistance", time: "Variable", link: "#" },
                        { name: "Property Tax Relief", time: "~15 minutes online", link: "#" }
                    ]
                },
                {
                    title: "Businesses",
                    description: "Resources for employers and entrepreneurs.",
                    services: [
                        { name: "Register a New Business", time: "~30 minutes online", link: "#" },
                        { name: "File Business Taxes", time: "~45 minutes online", link: "#" },
                        { name: "Apply for Permits", time: "Variable", link: "#" }
                    ]
                }
            ];

            return (
                <div className="flex-grow flex flex-col">
                    <Header />
                    <main id="main-content" className="flex-grow bg-white">
                        <section className="bg-gov-light py-10 px-4 border-b border-gray-200">
                            <div className="container mx-auto max-w-5xl">
                                <nav aria-label="Breadcrumb" className="text-sm text-gray-500 mb-4">
                                    <ol className="flex space-x-2">
                                        <li><a href="index.html" className="hover:text-gov-secondary hover:underline">Home</a></li>
                                        <li><span aria-hidden="true">&gt;</span></li>
                                        <li className="text-gray-900 font-medium" aria-current="page">Services Overview</li>
                                    </ol>
                                </nav>
                                <h1 className="text-4xl font-bold text-gov-primary mb-4">Services Overview</h1>
                                <p className="text-lg text-gray-700 max-w-3xl">Find government services organized by your life stage and needs. We aim to make all resident services accessible, efficient, and easy to complete online.</p>
                            </div>
                        </section>

                        <div className="container mx-auto max-w-5xl px-4 py-12">
                            <div className="space-y-12">
                                {categories.map((category, index) => (
                                    <section key={index} aria-labelledby={`cat-title-${index}`}>
                                        <h2 id={`cat-title-${index}`} className="text-2xl font-bold text-gov-secondary mb-2">{category.title}</h2>
                                        <p className="text-gray-600 mb-6">{category.description}</p>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {category.services.map((service, sIndex) => (
                                                <a key={sIndex} href={service.link} className="group p-5 bg-gov-light border border-gray-200 rounded-lg focus-within:ring-2 focus-within:ring-gov-accent hover:border-gov-primary hover:shadow-md transition-all flex flex-col justify-between h-full">
                                                    <div>
                                                        <h3 className="font-bold text-lg text-gov-primary group-hover:underline">{service.name}</h3>
                                                        <p className="text-sm text-gray-500 mt-2 flex items-center gap-1">
                                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                                            <span>{service.time}</span>
                                                        </p>
                                                    </div>
                                                    <div className="mt-4 flex justify-end">
                                                        <span className="text-gov-secondary group-hover:text-gov-primary" aria-hidden="true">
                                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
                                                        </span>
                                                    </div>
                                                </a>
                                            ))}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
