<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - State of Vermont</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gov: {
                            primary: '#1e3a5f',
                            secondary: '#336699',
                            accent: '#e6a400',
                            light: '#f4f7f6',
                            dark: '#1a1a1a',
                            success: '#2e7d32',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, sans-serif;
        }

        a:focus,
        button:focus,
        input:focus,
        select:focus,
        textarea:focus {
            outline: 2px solid #e6a400 !important;
            outline-offset: 2px;
        }

        /* Chat Widget Animations */
        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-animate {
            animation: slideUpFade 0.3s ease-out forwards;
        }
    </style>
</head>

<body class="bg-gov-light text-gov-dark min-h-screen flex flex-col relative">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Header = () => (
            <header className="bg-gov-primary text-white border-b-4 border-gov-accent">
                <div className="bg-gov-dark py-1 px-4 text-xs flex justify-between items-center">
                    <span>Official Government Website of the State of Vermont</span>
                    <div className="flex gap-2 items-center">
                        <label htmlFor="language-select" className="sr-only">Select Language</label>
                        <select id="language-select" className="bg-gov-dark text-white border border-gray-500 rounded px-1 py-0.5" aria-label="Language Selector">
                            <option value="en">English</option>
                            <option value="es">Español</option>
                            <option value="fr">Français</option>
                        </select>
                    </div>
                </div>
                <div className="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                    <a href="index.html" className="text-2xl font-bold flex items-center gap-2 hover:opacity-80 transition-opacity">
                        <svg className="w-8 h-8 text-gov-accent" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z" /></svg>
                        <span>State of Vermont</span>
                    </a>
                    <nav aria-label="Main Navigation">
                        <ul className="flex flex-wrap gap-4 md:gap-6 font-medium">
                            <li><a href="services.html" className="hover:text-gov-accent transition-colors">Services</a></li>
                            <li><a href="service-driver-license.html" className="hover:text-gov-accent transition-colors">Renew License</a></li>
                            <li><a href="service-benefits.html" className="hover:text-gov-accent transition-colors">Apply for Benefits</a></li>
                            <li><a href="about.html" className="hover:text-gov-accent transition-colors">About</a></li>
                            <li><a href="contact.html" className="text-gov-accent underline transition-colors" aria-current="page">Contact</a></li>
                        </ul>
                    </nav>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="bg-gov-primary text-white mt-auto py-8 border-t-8 border-gov-secondary">
                <div className="container mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-8">
                    <div>
                        <h2 className="text-lg font-bold mb-4">State of Vermont</h2>
                        <p className="text-sm opacity-90">Providing resident services securely and efficiently.</p>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Quick Links</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="index.html" className="hover:underline hover:text-gov-accent">Home</a></li>
                            <li><a href="services.html" className="hover:underline hover:text-gov-accent">All Services</a></li>
                            <li><a href="about.html" className="hover:underline hover:text-gov-accent">About the Governor</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Resources</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Open Data & Transparency</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Legislative News</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Agency Directory</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Support</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="contact.html" className="hover:underline hover:text-gov-accent">Contact Us</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Accessibility Statement</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Privacy Policy</a></li>
                        </ul>
                    </div>
                </div>
                <div className="container mx-auto px-4 mt-8 pt-4 border-t border-blue-800 text-xs text-center opacity-75">
                    &copy; 2026 State of Vermont. All rights reserved.
                </div>
            </footer>
        );

        const LiveChatWidget = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([
                { text: "Hello! I'm the Vermont State virtual assistant. How can I help you today?", isBot: true }
            ]);
            const [input, setInput] = useState("");
            const messagesEndRef = useRef(null);

            const toggleChat = () => setIsOpen(!isOpen);

            const handleSend = (e) => {
                e.preventDefault();
                if (!input.trim()) return;

                setMessages(prev => [...prev, { text: input, isBot: false }]);
                const userMessage = input;
                setInput("");

                // Simulate simple bot response
                setTimeout(() => {
                    setMessages(prev => [...prev, {
                        text: `Thanks for asking about "${userMessage}". Let me connect you with a live representative to help with that. Mon-Fri 8am-5pm.`,
                        isBot: true
                    }]);
                }, 1000);
            };

            useEffect(() => {
                if (messagesEndRef.current) {
                    messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
                }
            }, [messages, isOpen]);

            return (
                <div className="fixed bottom-6 right-6 z-50">
                    {isOpen ? (
                        <div className="bg-white rounded-lg shadow-xl border border-gray-200 w-80 md:w-96 flex flex-col chat-animate overflow-hidden" role="dialog" aria-label="Live Chat">
                            <div className="bg-gov-primary text-white p-4 flex justify-between items-center">
                                <div>
                                    <h3 className="font-bold flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-green-400 inline-block" aria-hidden="true"></span>
                                        Live Chat
                                    </h3>
                                    <p className="text-xs text-blue-200">Chat with a representative — Mon–Fri 8am–5pm</p>
                                </div>
                                <button onClick={toggleChat} className="p-1 hover:bg-gov-secondary rounded transition-colors focus:ring-2 focus:ring-gov-accent" aria-label="Close Chat">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                            </div>

                            <div className="h-80 overflow-y-auto p-4 bg-gray-50 flex flex-col gap-3" role="log" aria-live="polite">
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`max-w-[80%] rounded-lg p-3 text-sm ${msg.isBot ? 'bg-white border border-gray-200 text-gray-800 self-start shadow-sm' : 'bg-gov-secondary text-white self-end'}`}>
                                        {msg.text}
                                    </div>
                                ))}
                                <div ref={messagesEndRef} />
                            </div>

                            <form onSubmit={handleSend} className="p-3 bg-white border-t border-gray-200 flex gap-2">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="Type your message..."
                                    className="flex-grow border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gov-primary focus:ring-1 focus:ring-gov-primary"
                                    aria-label="Chat message"
                                />
                                <button type="submit" className="bg-gov-secondary hover:bg-gov-primary text-white px-4 py-2 rounded font-bold text-sm transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-gov-primary">Send</button>
                            </form>
                        </div>
                    ) : (
                        <button
                            onClick={toggleChat}
                            className="bg-gov-primary hover:bg-blue-800 text-white rounded-full p-4 shadow-lg flex items-center gap-2 transition-transform hover:scale-105 focus:ring-4 focus:ring-gov-accent"
                            aria-label="Open Live Chat"
                        >
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                            <span className="font-bold hidden md:inline">Chat with Support</span>
                        </button>
                    )}
                </div>
            );
        };

        const App = () => {
            const [feedbackSubmitted, setFeedbackSubmitted] = useState(false);

            const handleFeedbackSubmit = (e) => {
                e.preventDefault();
                setFeedbackSubmitted(true);
            };

            return (
                <div className="flex-grow flex flex-col">
                    <Header />
                    <main id="main-content" className="flex-grow bg-white pb-12">
                        <section className="bg-gov-light py-10 px-4 border-b border-gray-200">
                            <div className="container mx-auto max-w-5xl">
                                <h1 className="text-4xl font-bold text-gov-primary mb-4">Contact Us</h1>
                                <p className="text-lg text-gray-700 max-w-3xl">Need help? We provide multiple ways to get in touch with state departments, report issues, or provide feedback.</p>
                            </div>
                        </section>

                        <div className="bg-gov-primary text-white py-4 text-center px-4">
                            <p className="flex items-center justify-center gap-2 font-medium">
                                <svg className="w-5 h-5 flex-shrink-0 text-gov-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
                                <span><strong>Multilingual Support Available:</strong> If you need assistance in another language, call our main hotline and state your language.</span>
                            </p>
                        </div>

                        <div className="container mx-auto max-w-5xl px-4 py-12">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12">

                                {/* Helplines Column */}
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-800 mb-6 border-b border-gray-100 pb-2">Department Helplines</h2>
                                    <p className="text-gray-600 mb-6">Call directly to speak with representatives from specific state departments during normal business hours (Mon-Fri, 8:00 AM - 5:00 PM).</p>

                                    <ul className="space-y-4">
                                        <li className="flex items-start gap-4 p-4 border border-gray-200 rounded-lg hover:border-gov-secondary hover:shadow-sm transition-all bg-gray-50">
                                            <div className="bg-white p-2 rounded shadow-sm text-gov-secondary">
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-gray-900">Main State Information</h3>
                                                <a href="tel:1-800-555-0100" className="text-lg text-gov-secondary font-bold hover:underline">1-800-555-0100</a>
                                            </div>
                                        </li>
                                        <li className="flex items-start gap-4 p-4 border border-gray-200 rounded-lg hover:border-gov-secondary hover:shadow-sm transition-all bg-gray-50">
                                            <div className="bg-white p-2 rounded shadow-sm text-gov-secondary">
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-gray-900">Dept. of Motor Vehicles (DMV)</h3>
                                                <a href="tel:1-800-555-0101" className="text-lg text-gov-secondary font-bold hover:underline">1-800-555-0101</a>
                                            </div>
                                        </li>
                                        <li className="flex items-start gap-4 p-4 border border-gray-200 rounded-lg hover:border-gov-secondary hover:shadow-sm transition-all bg-gray-50">
                                            <div className="bg-white p-2 rounded shadow-sm text-gov-secondary">
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-gray-900">Health & Human Services</h3>
                                                <a href="tel:1-800-555-0102" className="text-lg text-gov-secondary font-bold hover:underline">1-800-555-0102</a>
                                            </div>
                                        </li>
                                        <li className="flex items-start gap-4 p-4 border border-gray-200 rounded-lg hover:border-gov-secondary hover:shadow-sm transition-all bg-gray-50">
                                            <div className="bg-white p-2 rounded shadow-sm text-gov-secondary">
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-gray-900">Dept. of Taxes</h3>
                                                <a href="tel:1-800-555-0103" className="text-lg text-gov-secondary font-bold hover:underline">1-800-555-0103</a>
                                            </div>
                                        </li>
                                    </ul>
                                </div>

                                {/* Feedback Form Column */}
                                <div>
                                    <div className="bg-white border border-gray-200 rounded-lg shadow p-6 md:p-8">
                                        <h2 className="text-2xl font-bold text-gov-primary mb-2">Website Feedback</h2>
                                        <p className="text-gray-600 mb-6 text-sm">We are constantly trying to improve the state portal. Let us know how we can make your online experience better.</p>

                                        {!feedbackSubmitted ? (
                                            <form onSubmit={handleFeedbackSubmit}>
                                                <div className="space-y-4">
                                                    <div>
                                                        <label htmlFor="name" className="block text-gray-800 font-bold mb-1">Name (Optional)</label>
                                                        <input
                                                            type="text"
                                                            id="name"
                                                            className="w-full border border-gray-300 rounded px-4 py-2 focus:ring-2 focus:ring-gov-accent focus:border-transparent outline-none"
                                                            placeholder="Your Name"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label htmlFor="email" className="block text-gray-800 font-bold mb-1">Email Address (Optional)</label>
                                                        <input
                                                            type="email"
                                                            id="email"
                                                            className="w-full border border-gray-300 rounded px-4 py-2 focus:ring-2 focus:ring-gov-accent focus:border-transparent outline-none"
                                                            placeholder="name@example.com"
                                                        />
                                                    </div>
                                                    <div>
                                                        <label htmlFor="type" className="block text-gray-800 font-bold mb-1 border-gray-300">Feedback Type</label>
                                                        <select id="type" className="w-full border border-gray-300 rounded px-4 py-2 focus:ring-2 focus:ring-gov-accent outline-none">
                                                            <option value="suggestion">Suggestion for Improvement</option>
                                                            <option value="bug">Report a Bug / Error</option>
                                                            <option value="accessibility">Accessibility Issue</option>
                                                            <option value="other">Other</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label htmlFor="message" className="block text-gray-800 font-bold mb-1">Message <span className="text-red-600">*</span></label>
                                                        <textarea
                                                            id="message"
                                                            rows="4"
                                                            required
                                                            className="w-full border border-gray-300 rounded px-4 py-2 focus:ring-2 focus:ring-gov-accent outline-none resize-y"
                                                            placeholder="Please describe your experience or suggestion..."
                                                        ></textarea>
                                                    </div>
                                                    <button
                                                        type="submit"
                                                        className="w-full bg-gov-secondary hover:bg-gov-primary text-white font-bold py-3 px-4 rounded transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-gov-primary"
                                                    >
                                                        Submit Feedback
                                                    </button>
                                                </div>
                                            </form>
                                        ) : (
                                            <div className="bg-green-50 border border-gov-success rounded-lg p-6 text-center">
                                                <div className="w-16 h-16 bg-gov-success text-white rounded-full flex items-center justify-center mx-auto mb-4">
                                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                                </div>
                                                <h3 className="text-xl font-bold text-gov-success mb-2">Thank You!</h3>
                                                <p className="text-gray-700">Your feedback has been submitted successfully to our web team.</p>
                                                <button
                                                    onClick={() => setFeedbackSubmitted(false)}
                                                    className="mt-6 text-gov-secondary font-bold hover:underline text-sm"
                                                >
                                                    Submit another response
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>

                            </div>
                        </div>

                        <LiveChatWidget />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
