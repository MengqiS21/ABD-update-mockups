<body class="bg-gov-light text-gov-dark min-h-screen flex flex-col">

            <header className="bg-gov-primary text-white border-b-4 border-gov-accent">
                <div className="bg-gov-dark py-1 px-4 text-xs flex justify-between items-center">
                    <span>Official Government Website of the State of Vermont</span>
                    <div className="flex gap-2 items-center">
                        <label htmlFor="language-select" className="sr-only">Select Language</label>
                        <select id="language-select" className="bg-gov-dark text-white border border-gray-500 rounded px-1 py-0.5" aria-label="Language Selector">
                            <option value="en">English</option>
                            <option value="es">Español</option>
                            <option value="fr">Français</option>
                        </select>
                    </div>
                </div>
                <div className="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                    <a href="index.html" className="text-2xl font-bold flex items-center gap-2 hover:opacity-80 transition-opacity">
                        <svg className="w-8 h-8 text-gov-accent" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z" /></svg>
                        <span>State of Vermont</span>
                    </a>
                    <nav aria-label="Main Navigation">
                        <ul className="flex flex-wrap gap-4 md:gap-6 font-medium">
                            <li><a href="services.html" className="hover:text-gov-accent transition-colors">Services</a></li>
                            <li><a href="service-driver-license.html" className="text-gov-accent underline transition-colors" aria-current="page">Renew License</a></li>
                            <li><a href="service-benefits.html" className="hover:text-gov-accent transition-colors">Apply for Benefits</a></li>
                            <li><a href="about.html" className="hover:text-gov-accent transition-colors">About</a></li>
                            <li><a href="contact.html" className="hover:text-gov-accent transition-colors">Contact</a></li>
                        </ul>
                    </nav>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="bg-gov-primary text-white mt-auto py-8 border-t-8 border-gov-secondary">
                <div className="container mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-8">
                    <div>
                        <h2 className="text-lg font-bold mb-4">State of Vermont</h2>
                        <p className="text-sm opacity-90">Providing resident services securely and efficiently.</p>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Quick Links</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="index.html" className="hover:underline hover:text-gov-accent">Home</a></li>
                            <li><a href="services.html" className="hover:underline hover:text-gov-accent">All Services</a></li>
                            <li><a href="about.html" className="hover:underline hover:text-gov-accent">About the Governor</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Resources</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Open Data & Transparency</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Legislative News</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Agency Directory</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Support</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="contact.html" className="hover:underline hover:text-gov-accent">Contact Us</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Accessibility Statement</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Privacy Policy</a></li>
                        </ul>
                    </div>
                </div>
                <div className="container mx-auto px-4 mt-8 pt-4 border-t border-blue-800 text-xs text-center opacity-75">
                    &copy; 2026 State of Vermont. All rights reserved.
                </div>
            </footer>
        );

        const WizardStep = ({ number, title, isActive, isCompleted }) => (
            <div className="flex items-center gap-1 md:gap-2">
                <div className={`w-6 h-6 md:w-8 md:h-8 rounded-full flex items-center justify-center font-bold text-xs md:text-sm shadow-sm ${isActive ? 'bg-gov-primary text-white ring-2 ring-offset-2 ring-gov-primary' :
                        isCompleted ? 'bg-gov-success text-white' : 'bg-gray-200 text-gray-500'
                    }`} aria-current={isActive ? 'step' : undefined}>
                    {isCompleted ? '✓' : number}
                </div>
                <span className={`font-medium text-xs md:text-sm mr-2 md:mr-4 ${isActive ? 'text-gov-primary bold' : isCompleted ? 'text-gov-success' : 'text-gray-500'}`}>
                    {title}
                </span>
                <div className="hidden lg:block w-8 h-px bg-gray-300 mr-4 last:hidden" aria-hidden="true"></div>
            </div>
        );

        const App = () => {
            const [step, setStep] = useState(1);
            const [isEligible, setIsEligible] = useState(null);

            const goToNextStep = () => {
                setStep(prev => prev + 1);
                window.scrollTo(0, 0);
            };
            const goToPrevStep = () => setStep(prev => prev - 1);

            return (
                <div className="flex-grow flex flex-col">
                    <Header />
                    <main id="main-content" className="flex-grow bg-white">
                        <section className="bg-gov-light py-8 px-4 border-b border-gray-200">
                            <div className="container mx-auto max-w-4xl">
                                <nav aria-label="Breadcrumb" className="text-sm text-gray-500 mb-4">
                                    <ol className="flex space-x-2">
                                        <li><a href="index.html" className="hover:text-gov-secondary hover:underline">Home</a></li>
                                        <li><span aria-hidden="true">&gt;</span></li>
                                        <li><a href="services.html" className="hover:text-gov-secondary hover:underline">Services</a></li>
                                        <li><span aria-hidden="true">&gt;</span></li>
                                        <li className="text-gray-900 font-medium" aria-current="page">Renew Driver's License</li>
                                    </ol>
                                </nav>
                                <h1 className="text-3xl md:text-4xl font-bold text-gov-primary mb-2">Renew Driver's License</h1>
                                <p className="text-gray-700">Complete your standard Vermont driver's license renewal online in about 10 minutes.</p>
                            </div>
                        </section>

                        <div className="container mx-auto max-w-4xl px-4 py-8">
                            {/* Wizard steps wrapper... */}
                            <div className="flex flex-wrap items-center gap-y-2 mb-10 pb-6 border-b border-gray-100" aria-label="Progress">
                                <WizardStep number="1" title="Eligibility" isActive={step === 1} isCompleted={step > 1} />
                                <WizardStep number="2" title="Checklist" isActive={step === 2} isCompleted={step > 2} />
                                <WizardStep number="3" title="Scheduler" isActive={step === 3} isCompleted={step > 3} />
                                <WizardStep number="4" title="Review & Pay" isActive={step === 4} isCompleted={step > 4} />
                                <WizardStep number="5" title="Confirmation" isActive={step === 5} isCompleted={step === 5} />
                            </div>

                            <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6 md:p-8">
                                {step === 1 && (
                                    <div id="step-1" role="tabpanel">
                                        <h2 className="text-2xl font-bold text-gov-primary mb-6">Eligibility Checker</h2>
                                        <fieldset className="mb-6">
                                            <legend className="block text-gray-700 font-bold mb-4">Does your current license expire within the next 6 months?</legend>
                                            <div className="flex gap-6">
                                                <label className="flex items-center gap-2 cursor-pointer focus-within:ring-2 focus-within:ring-gov-accent rounded p-1">
                                                    <input type="radio" name="expire" className="w-5 h-5 text-gov-secondary cursor-pointer" onChange={() => setIsEligible(true)} />
                                                    <span>Yes</span>
                                                </label>
                                                <label className="flex items-center gap-2 cursor-pointer focus-within:ring-2 focus-within:ring-gov-accent rounded p-1">
                                                    <input type="radio" name="expire" className="w-5 h-5 text-gov-secondary cursor-pointer" onChange={() => setIsEligible(false)} />
                                                    <span>No</span>
                                                </label>
                                            </div>
                                        </fieldset>

                                        {isEligible === true && (
                                            <div className="bg-green-50 border-l-4 border-gov-success p-4 mb-6" role="alert">
                                                <p className="text-gov-success font-medium flex items-center gap-2">
                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                                    Great! You are eligible to renew online.
                                                </p>
                                            </div>
                                        )}
                                        {isEligible === false && (
                                            <div className="bg-red-50 border-l-4 border-red-500 p-4 mb-6" role="alert">
                                                <p className="text-red-700 font-medium">Sorry, you can only renew online if your license expires within 6 months. Please contact your local DMV.</p>
                                            </div>
                                        )}

                                        <div className="flex justify-end mt-8">
                                            <button
                                                onClick={goToNextStep}
                                                disabled={!isEligible}
                                                className="bg-gov-primary hover:bg-blue-800 disabled:opacity-50 disabled:cursor-not-allowed text-white px-8 py-3 rounded font-bold transition-colors shadow-sm"
                                            >
                                                Continue
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {step === 2 && (
                                    <div id="step-2" role="tabpanel">
                                        <h2 className="text-2xl font-bold text-gov-primary mb-6">Required Documents Checklist</h2>
                                        <p className="text-gray-700 mb-4">Before proceeding with the scheduler, please ensure you have the following documents ready for your appointment or online verification:</p>

                                        <ul className="space-y-3 mb-8 ml-2">
                                            <li className="flex items-start gap-3">
                                                <input type="checkbox" id="doc1" className="mt-1 w-5 h-5 text-gov-secondary rounded focus:ring-gov-accent" />
                                                <label htmlFor="doc1" className="text-gray-800 font-medium cursor-pointer">Current Vermont Driver's License<br /><span className="text-sm font-normal text-gray-500">Your current license, even if expired for less than a year.</span></label>
                                            </li>
                                            <li className="flex items-start gap-3">
                                                <input type="checkbox" id="doc2" className="mt-1 w-5 h-5 text-gov-secondary rounded focus:ring-gov-accent" />
                                                <label htmlFor="doc2" className="text-gray-800 font-medium cursor-pointer">Proof of Identity<br /><span className="text-sm font-normal text-gray-500">A valid US Passport, Birth Certificate, or Permanent Resident Card.</span></label>
                                            </li>
                                            <li className="flex items-start gap-3">
                                                <input type="checkbox" id="doc3" className="mt-1 w-5 h-5 text-gov-secondary rounded focus:ring-gov-accent" />
                                                <label htmlFor="doc3" className="text-gray-800 font-medium cursor-pointer">Two Proofs of Vermont Residency<br /><span className="text-sm font-normal text-gray-500">Utility bills, lease agreement, or bank statements in your name.</span></label>
                                            </li>
                                        </ul>

                                        <div className="flex justify-between mt-8 pt-6 border-t border-gray-100">
                                            <button onClick={goToPrevStep} className="text-gov-secondary font-bold hover:underline px-4 py-2">Back</button>
                                            <button onClick={goToNextStep} className="bg-gov-primary hover:bg-blue-800 text-white px-8 py-3 rounded font-bold transition-colors shadow-sm">
                                                Continue
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {step === 3 && (
                                    <div id="step-3" role="tabpanel">
                                        <h2 className="text-2xl font-bold text-gov-primary mb-6">Appointment Scheduler</h2>
                                        <p className="text-gray-700 mb-6">Select a date for your visual acuity test and new photo at the Burlington DMV branch.</p>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                            <div>
                                                <div className="border border-gray-200 rounded-lg p-4 bg-white" aria-label="Date Picker Calendar">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <button className="p-1 hover:bg-gray-100 rounded focus:ring-2 focus:ring-gov-accent" aria-label="Previous month">&lt;</button>
                                                        <strong className="text-gov-primary" aria-live="polite">April 2026</strong>
                                                        <button className="p-1 hover:bg-gray-100 rounded focus:ring-2 focus:ring-gov-accent" aria-label="Next month">&gt;</button>
                                                    </div>
                                                    <div className="grid grid-cols-7 gap-1 text-center text-sm mb-2" aria-hidden="true">
                                                        <span className="text-gray-500">Su</span><span className="text-gray-500">Mo</span><span className="text-gray-500">Tu</span><span className="text-gray-500">We</span><span className="text-gray-500">Th</span><span className="text-gray-500">Fr</span><span className="text-gray-500">Sa</span>
                                                    </div>
                                                    <div className="grid grid-cols-7 gap-1 text-center text-sm">
                                                        <button disabled className="py-2 text-gray-300">29</button><button disabled className="py-2 text-gray-300">30</button><button disabled className="py-2 text-gray-300">31</button>
                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">1</button>
                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">2</button>
                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">3</button>
                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">4</button>
                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">5</button>
                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">6</button>
                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">7</button>
                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">8</button>
                                                        <button className="py-2 bg-gov-secondary text-white font-bold rounded focus:ring-2 focus:ring-gov-accent shadow-sm" aria-selected="true" aria-label="Thursday, April 9th">9</button>
                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">10</button>
                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">11</button>
                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">12</button>

                                                        <button className="py-2 hover:bg-gov-light rounded focus:ring-2 focus:ring-gov-accent cursor-pointer text-gray-700">14</button>
                                                        <button className="py-2 text-gov-accent font-bold hover:bg-gov-light focus:ring-2 focus:ring-gov-accent rounded cursor-pointer" aria-label="April 15th, Tax Deadline">15</button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-gray-800 mb-3">Available Times on April 9th</h3>
                                                <div className="grid grid-cols-2 gap-3" role="radiogroup" aria-label="Time slots">
                                                    <label className="border border-gray-300 rounded p-3 text-center cursor-pointer hover:border-gov-secondary focus-within:ring-2 focus-within:ring-gov-accent bg-gov-light">
                                                        <input type="radio" name="time" className="sr-only" />
                                                        <span className="font-medium">09:00 AM</span>
                                                    </label>
                                                    <label className="border-2 border-gov-secondary rounded p-3 text-center cursor-pointer bg-blue-50 focus-within:ring-2 focus-within:ring-gov-accent">
                                                        <input type="radio" name="time" className="sr-only" defaultChecked />
                                                        <span className="font-medium text-gov-primary">10:30 AM</span>
                                                    </label>
                                                    <label className="border border-gray-300 rounded p-3 text-center cursor-pointer hover:border-gov-secondary focus-within:ring-2 focus-within:ring-gov-accent bg-gov-light">
                                                        <input type="radio" name="time" className="sr-only" />
                                                        <span className="font-medium">01:00 PM</span>
                                                    </label>
                                                    <label className="border border-gray-300 rounded p-3 text-center cursor-pointer hover:border-gov-secondary focus-within:ring-2 focus-within:ring-gov-accent bg-gov-light">
                                                        <input type="radio" name="time" className="sr-only" />
                                                        <span className="font-medium">02:45 PM</span>
                                                    </label>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex justify-between mt-8 pt-6 border-t border-gray-100">
                                            <button onClick={goToPrevStep} className="text-gov-secondary font-bold hover:underline px-4 py-2">Back</button>
                                            <button onClick={goToNextStep} className="bg-gov-primary hover:bg-blue-800 text-white px-8 py-3 rounded font-bold transition-colors shadow-sm">
                                                Continue
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {step === 4 && (
                                    <div id="step-4" role="tabpanel">
                                        <h2 className="text-2xl font-bold text-gov-primary mb-6">Review & Pay</h2>

                                        <div className="bg-gray-50 border border-gray-200 rounded-lg p-6 mb-8">
                                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-b border-gray-200 pb-2">Appointment Summary</h3>
                                            <dl className="grid grid-cols-1 md:grid-cols-2 gap-y-4 text-sm">
                                                <div>
                                                    <dt className="text-gray-500 font-medium">Service Type</dt>
                                                    <dd className="font-bold text-gray-900">Driver's License Renewal (Standard)</dd>
                                                </div>
                                                <div>
                                                    <dt className="text-gray-500 font-medium">Location</dt>
                                                    <dd className="font-bold text-gray-900">Burlington DMV Branch</dd>
                                                </div>
                                                <div>
                                                    <dt className="text-gray-500 font-medium">Date</dt>
                                                    <dd className="font-bold text-gray-900">Thursday, April 9, 2026</dd>
                                                </div>
                                                <div>
                                                    <dt className="text-gray-500 font-medium">Time</dt>
                                                    <dd className="font-bold text-gray-900">10:30 AM EST</dd>
                                                </div>
                                            </dl>
                                        </div>

                                        <div className="border border-gray-200 rounded-lg p-6 mb-8 max-w-sm ml-auto bg-white shadow-sm">
                                            <h3 className="text-lg font-bold text-gray-800 mb-4">Fee Breakdown</h3>
                                            <div className="flex justify-between mb-2">
                                                <span className="text-gray-600">Standard License Renewal (4-year)</span>
                                                <span className="font-medium">$32.00</span>
                                            </div>
                                            <div className="flex justify-between mb-4 pb-4 border-b border-gray-200">
                                                <span className="text-gray-600">Online Processing Fee</span>
                                                <span className="font-medium">$3.00</span>
                                            </div>
                                            <div className="flex justify-between text-xl font-bold text-gov-primary">
                                                <span>Total</span>
                                                <span>$35.00</span>
                                            </div>
                                        </div>

                                        <div className="flex justify-between mt-8 pt-6 border-t border-gray-100">
                                            <button onClick={goToPrevStep} className="text-gov-secondary font-bold hover:underline px-4 py-2">Back</button>
                                            <button onClick={goToNextStep} className="bg-gov-success hover:bg-green-700 text-white px-8 py-3 rounded font-bold transition-colors shadow-sm flex items-center gap-2">
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                                Pay $35.00
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {step === 5 && (
                                    <div id="step-5" role="tabpanel" className="text-center py-8">
                                        <div className="w-20 h-20 bg-green-100 text-gov-success rounded-full flex items-center justify-center mx-auto mb-6">
                                            <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                        </div>
                                        <h2 className="text-3xl font-bold text-gov-primary mb-4">Payment Successful!</h2>
                                        <p className="text-gray-700 mb-2">Your appointment has been confirmed for <strong>April 9, 2026 at 10:30 AM</strong>.</p>
                                        <p className="text-gray-600 mb-8">A confirmation email summary and receipt have been sent to your email address.</p>

                                        <div className="max-w-md mx-auto bg-gray-50 border border-gray-200 p-6 rounded-lg text-left shadow-sm">
                                            <h3 className="font-bold text-gray-800 mb-2">What's Next?</h3>
                                            <ol className="list-decimal ml-5 text-sm text-gray-700 space-y-2">
                                                <li>Print or save your email confirmation receipt.</li>
                                                <li>Gather your physical required documents from the checklist.</li>
                                                <li>Arrive 10 minutes prior to your appointment time at the Burlington DMV.</li>
                                            </ol>
                                        </div>

                                        <div className="mt-10">
                                            <a href="index.html" className="text-gov-secondary font-bold hover:underline">Return to Homepage</a>
                                        </div>
                                    </div>
                                )}

                            </div>
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
