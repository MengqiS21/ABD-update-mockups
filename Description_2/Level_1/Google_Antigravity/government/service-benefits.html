<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Benefits - State of Vermont</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gov: {
                            primary: '#1e3a5f',
                            secondary: '#336699',
                            accent: '#e6a400',
                            light: '#f4f7f6',
                            dark: '#1a1a1a',
                            success: '#2e7d32',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, sans-serif;
        }

        a:focus,
        button:focus,
        input:focus,
        select:focus {
            outline: 2px solid #e6a400 !important;
            outline-offset: 2px;
        }
    </style>
</head>

<body class="bg-gov-light text-gov-dark min-h-screen flex flex-col">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState } = React;

        const Header = () => (
            <header className="bg-gov-primary text-white border-b-4 border-gov-accent">
                <div className="bg-gov-dark py-1 px-4 text-xs flex justify-between items-center">
                    <span>Official Government Website of the State of Vermont</span>
                    <div className="flex gap-2 items-center">
                        <label htmlFor="language-select" className="sr-only">Select Language</label>
                        <select id="language-select" className="bg-gov-dark text-white border border-gray-500 rounded px-1 py-0.5" aria-label="Language Selector">
                            <option value="en">English</option>
                            <option value="es">Español</option>
                            <option value="fr">Français</option>
                        </select>
                    </div>
                </div>
                <div className="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                    <a href="index.html" className="text-2xl font-bold flex items-center gap-2 hover:opacity-80 transition-opacity">
                        <svg className="w-8 h-8 text-gov-accent" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z" /></svg>
                        <span>State of Vermont</span>
                    </a>
                    <nav aria-label="Main Navigation">
                        <ul className="flex flex-wrap gap-4 md:gap-6 font-medium">
                            <li><a href="services.html" className="hover:text-gov-accent transition-colors">Services</a></li>
                            <li><a href="service-driver-license.html" className="hover:text-gov-accent transition-colors">Renew License</a></li>
                            <li><a href="service-benefits.html" className="text-gov-accent underline transition-colors" aria-current="page">Apply for Benefits</a></li>
                            <li><a href="about.html" className="hover:text-gov-accent transition-colors">About</a></li>
                            <li><a href="contact.html" className="hover:text-gov-accent transition-colors">Contact</a></li>
                        </ul>
                    </nav>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="bg-gov-primary text-white mt-auto py-8 border-t-8 border-gov-secondary">
                <div className="container mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-8">
                    <div>
                        <h2 className="text-lg font-bold mb-4">State of Vermont</h2>
                        <p className="text-sm opacity-90">Providing resident services securely and efficiently.</p>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Quick Links</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="index.html" className="hover:underline hover:text-gov-accent">Home</a></li>
                            <li><a href="services.html" className="hover:underline hover:text-gov-accent">All Services</a></li>
                            <li><a href="about.html" className="hover:underline hover:text-gov-accent">About the Governor</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Resources</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Open Data & Transparency</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Legislative News</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Agency Directory</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="font-bold mb-3">Support</h3>
                        <ul className="text-sm space-y-2 opacity-90">
                            <li><a href="contact.html" className="hover:underline hover:text-gov-accent">Contact Us</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Accessibility Statement</a></li>
                            <li><a href="#" className="hover:underline hover:text-gov-accent">Privacy Policy</a></li>
                        </ul>
                    </div>
                </div>
                <div className="container mx-auto px-4 mt-8 pt-4 border-t border-blue-800 text-xs text-center opacity-75">
                    &copy; 2026 State of Vermont. All rights reserved.
                </div>
            </footer>
        );

        const App = () => {
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [formData, setFormData] = useState({
                householdSize: '1',
                income: '',
                employment: 'employed'
            });

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setIsSubmitted(true);
            };

            return (
                <div className="flex-grow flex flex-col">
                    <Header />
                    <main id="main-content" className="flex-grow bg-white">
                        <section className="bg-gov-light py-8 px-4 border-b border-gray-200">
                            <div className="container mx-auto max-w-4xl">
                                <nav aria-label="Breadcrumb" className="text-sm text-gray-500 mb-4">
                                    <ol className="flex space-x-2">
                                        <li><a href="index.html" className="hover:text-gov-secondary hover:underline">Home</a></li>
                                        <li><span aria-hidden="true">&gt;</span></li>
                                        <li><a href="services.html" className="hover:text-gov-secondary hover:underline">Services</a></li>
                                        <li><span aria-hidden="true">&gt;</span></li>
                                        <li className="text-gray-900 font-medium" aria-current="page">Apply for Benefits</li>
                                    </ol>
                                </nav>
                                <h1 className="text-3xl md:text-4xl font-bold text-gov-primary mb-2">Benefit Eligibility Screener</h1>
                                <p className="text-gray-700">Answer a few quick questions to find out which assistance programs you might qualify for.</p>
                            </div>
                        </section>

                        <div className="container mx-auto max-w-4xl px-4 py-10">
                            {!isSubmitted ? (
                                <div className="bg-white rounded-lg shadow border border-gray-200 p-6 md:p-8 max-w-2xl mx-auto">
                                    <h2 className="text-2xl font-bold text-gov-primary mb-6 border-b border-gray-100 pb-4">Check Your Eligibility</h2>
                                    <form onSubmit={handleSubmit} noValidate>
                                        <div className="space-y-6 mb-8">
                                            <div>
                                                <label htmlFor="householdSize" className="block text-gray-800 font-bold mb-2">What is your total household size?</label>
                                                <select
                                                    id="householdSize"
                                                    name="householdSize"
                                                    value={formData.householdSize}
                                                    onChange={handleInputChange}
                                                    className="w-full max-w-xs border border-gray-300 rounded px-4 py-2 focus:ring-2 focus:ring-gov-accent focus:border-transparent bg-white"
                                                >
                                                    <option value="1">1 Person</option>
                                                    <option value="2">2 People</option>
                                                    <option value="3">3 People</option>
                                                    <option value="4">4 People</option>
                                                    <option value="5+">5 or more People</option>
                                                </select>
                                            </div>

                                            <div>
                                                <label htmlFor="income" className="block text-gray-800 font-bold mb-2">Estimated annual household income before taxes:</label>
                                                <div className="relative max-w-xs flex items-center">
                                                    <span className="absolute left-3 text-gray-500 font-bold" aria-hidden="true">$</span>
                                                    <input
                                                        type="number"
                                                        id="income"
                                                        name="income"
                                                        value={formData.income}
                                                        onChange={handleInputChange}
                                                        placeholder="e.g. 45000"
                                                        required
                                                        className="w-full pl-8 pr-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-gov-accent focus:border-transparent"
                                                    />
                                                </div>
                                            </div>

                                            <fieldset>
                                                <legend className="block text-gray-800 font-bold mb-2">What is your current employment status?</legend>
                                                <div className="space-y-3">
                                                    <label className="flex items-center gap-3 cursor-pointer">
                                                        <input
                                                            type="radio"
                                                            name="employment"
                                                            value="employed"
                                                            checked={formData.employment === 'employed'}
                                                            onChange={handleInputChange}
                                                            className="w-5 h-5 text-gov-secondary focus:ring-gov-accent"
                                                        />
                                                        <span>Employed</span>
                                                    </label>
                                                    <label className="flex items-center gap-3 cursor-pointer">
                                                        <input
                                                            type="radio"
                                                            name="employment"
                                                            value="unemployed"
                                                            checked={formData.employment === 'unemployed'}
                                                            onChange={handleInputChange}
                                                            className="w-5 h-5 text-gov-secondary focus:ring-gov-accent"
                                                        />
                                                        <span>Unemployed</span>
                                                    </label>
                                                    <label className="flex items-center gap-3 cursor-pointer">
                                                        <input
                                                            type="radio"
                                                            name="employment"
                                                            value="retired"
                                                            checked={formData.employment === 'retired'}
                                                            onChange={handleInputChange}
                                                            className="w-5 h-5 text-gov-secondary focus:ring-gov-accent"
                                                        />
                                                        <span>Retired</span>
                                                    </label>
                                                    <label className="flex items-center gap-3 cursor-pointer">
                                                        <input
                                                            type="radio"
                                                            name="employment"
                                                            value="disabled"
                                                            checked={formData.employment === 'disabled'}
                                                            onChange={handleInputChange}
                                                            className="w-5 h-5 text-gov-secondary focus:ring-gov-accent"
                                                        />
                                                        <span>Unable to work due to disability</span>
                                                    </label>
                                                </div>
                                            </fieldset>
                                        </div>

                                        <div className="border-t border-gray-200 pt-6">
                                            <button
                                                type="submit"
                                                className="w-full md:w-auto bg-gov-secondary hover:bg-gov-primary text-white font-bold py-3 px-8 rounded shadow transition-colors block text-center"
                                            >
                                                See Qualifying Programs
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            ) : (
                                <div>
                                    <div className="bg-green-50 border-l-4 border-gov-success p-4 mb-8 max-w-4xl mx-auto shadow-sm" role="alert">
                                        <h2 className="text-gov-success font-bold text-lg flex items-center gap-2">
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                            Screener Complete
                                        </h2>
                                        <p className="text-green-800 mt-1">Based on your answers, you may be eligible for the following programs. Note that this is an estimate and official eligibility is determined after a full application.</p>
                                    </div>

                                    <h2 className="text-2xl font-bold text-gray-800 mb-6 font-primary">Recommended Programs</h2>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {/* Program 1 */}
                                        <div className="bg-white rounded-lg shadow-md border border-gray-200 flex flex-col hover:border-gov-secondary transition-colors">
                                            <div className="p-6 flex-grow">
                                                <h3 className="text-xl font-bold text-gov-primary mb-2">SNAP (3SquaresVT)</h3>
                                                <p className="text-gray-600 mb-4 text-sm">Supplemental Nutrition Assistance Program helps you buy healthy food.</p>
                                                <ul className="text-sm text-gray-500 space-y-2 mb-4">
                                                    <li className="flex gap-2"><svg className="w-4 h-4 text-gov-success flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Covers groceries</li>
                                                    <li className="flex gap-2"><svg className="w-4 h-4 text-gov-success flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Monthly EBT benefits</li>
                                                </ul>
                                            </div>
                                            <div className="p-4 bg-gray-50 border-t border-gray-100 rounded-b-lg">
                                                <a href="#" className="block w-full text-center bg-gov-secondary hover:bg-gov-primary text-white font-bold py-2 px-4 rounded transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-gov-primary">
                                                    Start Application
                                                </a>
                                            </div>
                                        </div>

                                        {/* Program 2 */}
                                        <div className="bg-white rounded-lg shadow-md border border-gray-200 flex flex-col hover:border-gov-secondary transition-colors">
                                            <div className="p-6 flex-grow">
                                                <h3 className="text-xl font-bold text-gov-primary mb-2">Medicaid</h3>
                                                <p className="text-gray-600 mb-4 text-sm">Free or low-cost health coverage for eligible adults, children, and pregnant individuals.</p>
                                                <ul className="text-sm text-gray-500 space-y-2 mb-4">
                                                    <li className="flex gap-2"><svg className="w-4 h-4 text-gov-success flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Doctor visits</li>
                                                    <li className="flex gap-2"><svg className="w-4 h-4 text-gov-success flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Prescription drugs</li>
                                                </ul>
                                            </div>
                                            <div className="p-4 bg-gray-50 border-t border-gray-100 rounded-b-lg">
                                                <a href="#" className="block w-full text-center bg-gov-secondary hover:bg-gov-primary text-white font-bold py-2 px-4 rounded transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-gov-primary">
                                                    Start Application
                                                </a>
                                            </div>
                                        </div>

                                        {/* Program 3 */}
                                        <div className="bg-white rounded-lg shadow-md border border-gray-200 flex flex-col hover:border-gov-secondary transition-colors">
                                            <div className="p-6 flex-grow">
                                                <h3 className="text-xl font-bold text-gov-primary mb-2">Heating Assistance</h3>
                                                <p className="text-gray-600 mb-4 text-sm">The Seasonal Fuel Assistance program helps pay part of your home heating bills.</p>
                                                <ul className="text-sm text-gray-500 space-y-2 mb-4">
                                                    <li className="flex gap-2"><svg className="w-4 h-4 text-gov-success flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Winter heat aid</li>
                                                    <li className="flex gap-2"><svg className="w-4 h-4 text-gov-success flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> Crisis fuel grants</li>
                                                </ul>
                                            </div>
                                            <div className="p-4 bg-gray-50 border-t border-gray-100 rounded-b-lg">
                                                <a href="#" className="block w-full text-center bg-gov-secondary hover:bg-gov-primary text-white font-bold py-2 px-4 rounded transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-gov-primary">
                                                    Start Application
                                                </a>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="text-center mt-10">
                                        <button onClick={() => setIsSubmitted(false)} className="text-gov-secondary font-bold hover:underline">
                                            &larr; Start Over Screener
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
