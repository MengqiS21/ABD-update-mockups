                                                    3-Part Payment Plan

                                            </div>

                                            <div className="p-8">
                                                {billingCycle === 'full' ? (
                                                    <div className="text-center">
                                                        <div className="text-5xl font-extrabold text-slate-900 font-condensed mb-2">$349</div>
                                                        <p className="text-slate-500 mb-6">One-time payment</p>

                                                            Enroll Now
                                                        </a>
                                                    </div>
                                                ) : (
                                                    <div className="text-center">
                                                        <div className="text-5xl font-extrabold text-slate-900 font-condensed mb-2">$120<span className="text-xl font-medium text-slate-500">/mo</span></div>

                                                            Enroll with Payment Plan

                                                <p className="text-sm text-slate-600 mb-4">Many employers reimburse tuition for professional development. Download our template to ask your manager.</p>
                                                <a href="#" className="text-brand-600 text-sm font-medium hover:text-brand-800 flex items-center focus:outline-none focus:underline">
                                                    Download Template <Icons.ChevronRight className="h-4 w-4 ml-1" />

                                            </div>
                                            <div className="bg-white border border-slate-200 rounded-xl p-6">

                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Sticky Sidebar */}
                            <div className="lg:w-1/3 hidden lg:block">
                                <div className="sticky top-28">
                                    <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm mb-6">
                                        <h3 className="font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">Required Materials</h3>
                                        <ul className="space-y-3 text-sm text-slate-600">
                                            <li className="flex items-start">
                                                <Icons.CheckCircle className="h-5 w-5 text-emerald-500 mr-2 flex-shrink-0" />
                                                Laptop or desktop computer (PC/Mac) with webcam
                                            </li>
                                            <li className="flex items-start">
                                                <Icons.CheckCircle className="h-5 w-5 text-emerald-500 mr-2 flex-shrink-0" />

                                            </li>
                                            <li className="flex items-start">
                                                <Icons.CheckCircle className="h-5 w-5 text-emerald-500 mr-2 flex-shrink-0" />

                                        </ul>
                                    </div>

                                    <div className="bg-brand-50 rounded-2xl border border-brand-100 p-6 text-center">
                                        <h3 className="font-bold text-slate-900 mb-2">Have Questions?</h3>
                                        <p className="text-sm text-slate-600 mb-4">Talk to an admissions advisor to see if this program is right for you.</p>
                                        <a href="pricing.html" className="inline-block w-full py-2 bg-white border border-brand-200 rounded-lg text-brand-700 font-medium text-sm hover:bg-slate-50 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 shadow-sm">
                                            Chat with Advisor
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <Header />
                    <CourseDetail />
                    <Footer />
                </div>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
