                        else if (hrs > 0) { hrs--; mins = 59; secs = 59; }

                            <div className="space-y-6 flex flex-col">
                                {/* Resource Library */}
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex-1">
                                    <h3 className="font-bold text-slate-900 mb-4 flex items-center border-b border-slate-100 pb-3">
                                        <Icons.FileText className="h-5 w-5 mr-2 text-emerald-500" />
                                        Module Resources
                                    </h3>
                                    <ul className="space-y-3">
                                        {[
                                            { icon: <Icons.FileText className="h-4 w-4 text-rose-500" />, name: 'Provider Portals Slide Deck.pdf' },
                                            { icon: <Icons.FileText className="h-4 w-4 text-emerald-500" />, name: 'Common Denial Codes Cheat Sheet.xlsx' },
                                            { icon: <Icons.Link className="h-4 w-4 text-blue-500" />, name: 'CMS.gov Official Billing Guidelines' }
                                        ].map((r, i) => (
                                            <li key={i}>
                                                <a href="#" className="flex items-center text-sm text-slate-600 hover:text-brand-600 group focus:outline-none focus:text-brand-600">
                                                    <span className="p-1.5 bg-slate-100 rounded mr-3 group-hover:bg-brand-50">{r.icon}</span>
                                                    <span className="truncate group-hover:underline">{r.name}</span>
                                                </a>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Mini Discussion Board */}
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex-1">
                                    <h3 className="font-bold text-slate-900 mb-4 flex items-center border-b border-slate-100 pb-3">
                                        <Icons.MessageSquare className="h-5 w-5 mr-2 text-amber-500" />
                                        Cohort Discussion
                                    </h3>
                                    <div className="space-y-4 mb-4">
                                        <div className="flex gap-3">
                                            <div className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center font-bold text-xs text-slate-500 flex-shrink-0">
                                                TJ
                                            </div>
                                            <div>
                                                <div className="flex items-baseline gap-2">
                                                    <span className="text-xs font-bold text-slate-900">Tom J.</span>
                                                    <span className="text-[10px] text-slate-500">2 hrs ago</span>
                                                </div>
                                                <p className="text-sm text-slate-600 mt-0.5 line-clamp-2">Does anyone have a good trick for remembering the difference between HMO and PPO auth requirements?</p>
                                                <div className="mt-1 text-[11px] font-medium text-brand-600 cursor-pointer">3 replies</div>
                                            </div>
                                        </div>
                                    </div>
                                    <button className="w-full border border-slate-200 bg-slate-50 text-slate-600 text-sm font-medium hover:bg-slate-100 px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-brand-500">
                                        Open Discussion Board
                                    </button>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const ClassroomApp = () => {
            const [activeItem, setActiveItem] = useState(null);

            return (
                <div className="min-h-screen flex flex-col font-sans overflow-hidden">
                    <AppHeader />
                    <div className="flex flex-1 overflow-hidden h-full">
                        <SidebarAgenda activeItem={activeItem} setActiveItem={setActiveItem} />
                        <MainContentArea />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ClassroomApp />);
    </script>
</body>
