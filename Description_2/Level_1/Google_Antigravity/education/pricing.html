                                            <h3 className="text-xl font-bold font-condensed mb-2">Not sure which path to take?</h3>
                                            <p className="text-brand-100 text-sm max-w-sm mb-6">Our admissions advisors can help align your career goals with the right program and find available funding options.</p>
                                            <button
                                                onClick={() => setIsChatOpen(true)}
                                                className="inline-flex items-center px-6 py-3 border-2 border-brand-400 text-brand-50 font-bold rounded-lg hover:bg-brand-800 hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 focus:ring-offset-slate-900"
                                            >
                                                Talk to an Advisor <Icons.ChevronRight className="ml-2 h-4 w-4" />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Chat Widget Mockup */}
                    {isChatOpen && (
                        <div className="fixed bottom-4 right-4 z-50 animate-fade-in-up">
                            <div className="bg-white rounded-xl shadow-2xl border border-slate-200 w-80 overflow-hidden flex flex-col">
                                <div className="bg-slate-900 p-4 flex justify-between items-center text-white">
                                    <div className="flex items-center gap-2">
                                        <div className="relative">
                                            <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=100&auto=format&fit=crop&q=80" alt="Advisor Sarah" className="w-8 h-8 rounded-full border border-slate-600" />
                                            <div className="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 rounded-full border border-slate-900"></div>
                                        </div>
                                        <div>
                                            <h3 className="text-sm font-bold">Sarah (Admissions)</h3>
                                            <p className="text-[10px] text-slate-400">Typically replies immediately</p>
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => setIsChatOpen(false)}
                                        className="text-slate-400 hover:text-white focus:outline-none"
                                    >
                                        <Icons.X className="h-5 w-5" />
                                    </button>
                                </div>
                                <div className="p-4 h-64 overflow-y-auto bg-slate-50 flex flex-col gap-3">
                                    <div className="text-[10px] text-center text-slate-400 font-medium">Today 1:30 PM</div>
                                    <div className="flex items-start gap-2">
                                        <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=100&auto=format&fit=crop&q=80" alt="Sarah" className="w-6 h-6 rounded-full" />
                                        <div className="bg-white border border-slate-200 text-sm text-slate-800 p-3 rounded-2xl rounded-tl-sm shadow-sm">
                                            Hi there! I'm Sarah. How can I help you regarding enrollment or financing today?
                                        </div>
                                    </div>
                                </div>
                                <div className="p-3 bg-white border-t border-slate-200">
                                    <input
                                        type="text"
                                        placeholder="Type your message..."
                                        className="w-full text-sm bg-slate-100 border-transparent rounded-full px-4 py-2 focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500 outline-none transition-colors"
                                    />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <Header />
                    <PricingPage />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
