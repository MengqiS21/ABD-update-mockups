<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folia - Messages</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAFA;
            color: #18181B;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const Icons = {
            Home: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
            Explore: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Bell: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>,
            Mail: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>,
            User: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
            Settings: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
            More: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z" /></svg>,
            Plus: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Image: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
            Send: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>,
            Info: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        };

        const Navigation = ({ currentPath }) => {
            const navItems = [
                { name: 'Home', path: 'index.html', icon: Icons.Home },
                { name: 'Explore', path: 'explore.html', icon: Icons.Explore },
                { name: 'Notifications', path: 'notifications.html', icon: Icons.Bell },
                { name: 'Messages', path: 'messages.html', icon: Icons.Mail },
                { name: 'Profile', path: 'profile.html', icon: Icons.User },
                { name: 'Settings', path: 'settings.html', icon: Icons.Settings },
            ];

            return (
                <>
                    <nav className="hidden sm:flex flex-col h-screen fixed w-[80px] lg:w-[260px] bg-white border-r border-zinc-200 z-40">
                        <div className="pt-8 pb-4 lg:px-6 px-4 flex items-center justify-center lg:justify-start gap-3">
                            <div className="w-10 h-10 rounded-xl bg-zinc-900 text-white flex items-center justify-center font-bold text-xl leading-none shrink-0">F</div>
                            <span className="text-2xl font-bold tracking-tight text-zinc-900 hidden lg:block">Folia</span>
                        </div>

                        <div className="flex-1 mt-6 px-3 space-y-1 overflow-y-auto hide-scrollbar">
                            {navItems.map(item => {
                                const active = currentPath === item.path;
                                const Icon = item.icon;
                                return (
                                    <a key={item.name} href={item.path}
                                        className={`flex items-center lg:justify-start justify-center gap-4 px-3 lg:px-4 py-3.5 rounded-2xl transition-all duration-200 group
                                        ${active ? 'bg-zinc-100 text-zinc-900 font-semibold' : 'text-zinc-500 hover:bg-zinc-50 hover:text-zinc-900'}`}>
                                        <span className={`transition-transform duration-200 group-hover:scale-110 ${active ? 'scale-110 text-zinc-900' : ''}`}>
                                            <Icon />
                                        </span>
                                        <span className="hidden lg:block text-[16px]">{item.name}</span>
                                    </a>
                                );
                            })}

                            <button className="mt-8 w-full bg-zinc-900 text-white rounded-2xl py-3.5 font-semibold shadow-md shadow-zinc-900/10 hover:bg-zinc-800 hover:shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                                <Icons.Plus />
                                <span className="hidden lg:block">New Project</span>
                            </button>
                        </div>

                        <div className="p-4 mb-4">
                            <a href="profile.html" className="flex items-center gap-3 p-2 lg:p-3 -mx-2 lg:mx-0 rounded-2xl hover:bg-zinc-100 transition-colors justify-center lg:justify-start">
                                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&q=80" alt="Hana Creative" className="w-10 h-10 rounded-full object-cover ring-2 ring-white shadow-sm shrink-0" />
                                <div className="hidden lg:block flex-1 min-w-0">
                                    <p className="text-[15px] font-semibold text-zinc-900 truncate">Hana Creative</p>
                                    <p className="text-[13px] text-zinc-500 truncate">@hanastudios</p>
                                </div>
                                <div className="hidden lg:block text-zinc-400">
                                    <Icons.More />
                                </div>
                            </a>
                        </div>
                    </nav>

                    <nav className="sm:hidden fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-zinc-200 flex justify-around p-3 z-50 pb-safe">
                        {navItems.filter(i => !['Settings', 'Profile'].includes(i.name)).map(item => {
                            const active = currentPath === item.path;
                            const Icon = item.icon;
                            return (
                                <a key={item.name} href={item.path} className={`p-2.5 rounded-xl transition-colors ${active ? 'text-zinc-900 bg-zinc-100' : 'text-zinc-500'}`}>
                                    <Icon />
                                </a>
                            );
                        })}
                        <a href="profile.html" className="p-2.5">
                            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&q=80" alt="Profile" className="w-7 h-7 rounded-full object-cover ring-2 ring-white shadow-sm" />
                        </a>
                    </nav>
                </>
            );
        };

        const Messages = () => {
            const threads = [
                { id: 1, type: 'collab', name: "VANGUARD Campaign", members: "Elena, Marcus + You", time: "10m", snippet: "Marcus: Just uploaded the new raw renders. Check...", unread: true, avatars: ["https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=100&q=80", "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=100&q=80"] },
                { id: 2, type: 'dm', name: "Sarah Jenkins", time: "2h", snippet: "Should we try dropping the saturation?", unread: false, avatars: ["https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=100&q=80"] },
                { id: 3, type: 'dm', name: "Alex Chen", time: "1d", snippet: "Shared a project with you", unread: false, avatars: ["https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=crop&w=100&q=80"] },
                { id: 4, type: 'collab', name: "Typeface Design", members: "Studio K + You", time: "3d", snippet: "Studio K: Let's ship it next week.", unread: false, avatars: ["https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?auto=format&fit=crop&w=100&q=80"] },
            ];

            const [msgText, setMsgText] = useState("");

            return (
                <div className="flex h-screen w-full bg-white sm:bg-transparent">
                    {/* Left Panel */}
                    <div className="w-full sm:w-[350px] shrink-0 bg-white border-r border-zinc-200 flex flex-col hidden sm:flex">
                        <div className="p-4 sm:p-5 border-b border-zinc-200 flex items-center justify-between z-10 bg-white">
                            <h2 className="text-xl font-bold text-zinc-900">Messages</h2>
                            <button className="p-2 bg-zinc-100 rounded-full text-zinc-600 hover:text-zinc-900 transition-colors">
                                <Icons.Plus />
                            </button>
                        </div>
                        <div className="p-4 border-b border-zinc-200">
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 pl-3 flex items-center text-zinc-400">
                                    <Icons.Search />
                                </span>
                                <input
                                    type="text"
                                    className="w-full bg-zinc-100 border-none rounded-xl py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-zinc-900 transition-all placeholder-zinc-500"
                                    placeholder="Search messages..."
                                />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto hide-scrollbar divide-y divide-zinc-100">
                            {threads.map(t => (
                                <div key={t.id} className={`p-4 flex gap-3 cursor-pointer hover:bg-zinc-50 transition-colors ${t.id === 1 ? 'bg-zinc-50/80 before:content-[""] before:absolute before:left-0 before:top-0 before:w-1 before:h-full before:bg-zinc-900 relative' : ''}`}>
                                    <div className="w-12 h-12 shrink-0 relative flex">
                                        {t.avatars.length === 1 ? (
                                            <img src={t.avatars[0]} alt={t.name} className="w-12 h-12 rounded-full object-cover border border-zinc-100" />
                                        ) : (
                                            <>
                                                <img src={t.avatars[0]} alt="Avatar 1" className="w-8 h-8 rounded-full object-cover absolute top-0 left-0 border-2 border-white" />
                                                <img src={t.avatars[1]} alt="Avatar 2" className="w-8 h-8 rounded-full object-cover absolute bottom-0 right-0 border-2 border-white" />
                                            </>
                                        )}
                                        {t.unread && <div className="absolute top-0 right-0 w-3 h-3 bg-indigo-600 border-2 border-white rounded-full"></div>}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className="flex justify-between items-baseline mb-1">
                                            <h4 className="text-[15px] font-bold text-zinc-900 truncate">{t.name}</h4>
                                            <span className="text-xs text-zinc-400 font-medium shrink-0 ml-2">{t.time}</span>
                                        </div>
                                        {t.type === 'collab' && <p className="text-xs text-indigo-600 font-semibold mb-0.5 truncate">{t.members}</p>}
                                        <p className={`text-[14px] truncate ${t.unread ? 'text-zinc-900 font-semibold' : 'text-zinc-500'}`}>{t.snippet}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Right Panel */}
                    <div className="flex-1 flex flex-col bg-[#FAFAFA] relative">
                        {/* Chat Header */}
                        <div className="h-[73px] bg-white border-b border-zinc-200 flex items-center justify-between px-6 shrink-0 z-10 shadow-sm">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 relative flex">
                                    <img src={threads[0].avatars[0]} alt="Avatar 1" className="w-7 h-7 rounded-full object-cover absolute top-0 left-0 border-2 border-white" />
                                    <img src={threads[0].avatars[1]} alt="Avatar 2" className="w-7 h-7 rounded-full object-cover absolute bottom-0 right-0 border-2 border-white" />
                                </div>
                                <div>
                                    <h3 className="font-bold text-zinc-900 text-[15px]">{threads[0].name}</h3>
                                    <p className="text-xs text-zinc-500">{threads[0].members}</p>
                                </div>
                            </div>
                            <div className="flex gap-4 text-zinc-400">
                                <button className="hover:text-zinc-900"><Icons.Info /></button>
                                <button className="hover:text-zinc-900"><Icons.More /></button>
                            </div>
                        </div>

                        {/* Chat Log */}
                        <div className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 flex flex-col hide-scrollbar">
                            <div className="text-center text-xs text-zinc-400 font-medium my-4">Today</div>

                            <div className="flex gap-3 max-w-3xl">
                                <img src={threads[0].avatars[0]} className="w-8 h-8 rounded-full object-cover shadow-sm shrink-0" />
                                <div>
                                    <div className="flex items-baseline gap-2 mb-1">
                                        <span className="font-semibold text-sm text-zinc-900">Elena Rossi</span>
                                        <span className="text-xs text-zinc-400">10:04 AM</span>
                                    </div>
                                    <div className="bg-white border border-zinc-200 rounded-2xl p-3 text-[15px] text-zinc-800 shadow-sm leading-relaxed inline-block">
                                        Could we adjust the lighting slightly in the first scene? It feels a bit too harsh compared to the rest of the campaign.
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-3 max-w-3xl flex-row-reverse self-end">
                                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&q=80" className="w-8 h-8 rounded-full object-cover shadow-sm shrink-0" />
                                <div className="flex flex-col items-end">
                                    <div className="flex items-baseline gap-2 mb-1">
                                        <span className="text-xs text-zinc-400">10:12 AM</span>
                                    </div>
                                    <div className="bg-zinc-900 text-white rounded-2xl p-3 text-[15px] shadow-sm leading-relaxed inline-block mb-1">
                                        Good catch. Wrapping up a quick test now.
                                    </div>
                                    <div className="text-xs text-zinc-400 flex items-center gap-1 font-medium mt-0.5"><Icons.Search /> Read</div>
                                </div>
                            </div>

                            <div className="flex gap-3 max-w-3xl">
                                <img src={threads[0].avatars[1]} className="w-8 h-8 rounded-full object-cover shadow-sm shrink-0" />
                                <div>
                                    <div className="flex items-baseline gap-2 mb-1">
                                        <span className="font-semibold text-sm text-zinc-900">Marcus Wei</span>
                                        <span className="text-xs text-zinc-400">10:45 AM</span>
                                    </div>
                                    <div className="bg-white border border-zinc-200 rounded-2xl p-3 text-[15px] text-zinc-800 shadow-sm leading-relaxed inline-block">
                                        Just uploaded the new raw renders. Check this snippet out, completely changed the god rays.
                                    </div>

                                    {/* Inline shared image */}
                                    <div className="mt-2 group rounded-xl overflow-hidden border border-zinc-200 cursor-pointer max-w-sm relative shadow-sm">
                                        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80" className="w-full object-cover" />
                                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                            <span className="px-4 py-2 bg-white rounded-full font-bold text-sm text-zinc-900 shadow-lg">View Project</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>

                        {/* Composer footer */}
                        <div className="p-4 bg-white border-t border-zinc-200 sm:m-4 sm:rounded-2xl sm:border shadow-sm mb-[80px] sm:mb-4">
                            <div className="flex items-end gap-3">
                                <button className="p-2 text-zinc-500 hover:text-zinc-900 transition-colors shrink-0">
                                    <Icons.Plus />
                                </button>
                                <button className="p-2 text-zinc-500 hover:text-zinc-900 transition-colors shrink-0">
                                    <Icons.Image />
                                </button>
                                <textarea
                                    className="flex-1 max-h-32 bg-zinc-100 rounded-xl px-4 py-3 text-[15px] text-zinc-900 resize-none focus:outline-none focus:ring-1 focus:ring-zinc-300 placeholder-zinc-500"
                                    placeholder="Type a message..."
                                    rows="1"
                                    value={msgText}
                                    onChange={(e) => setMsgText(e.target.value)}
                                ></textarea>
                                <button className="p-3 bg-zinc-900 text-white rounded-xl hover:bg-zinc-800 transition-colors shrink-0">
                                    <Icons.Send />
                                </button>
                            </div>
                            <div className="mt-3 flex gap-2 overflow-x-auto hide-scrollbar pl-1">
                                <button className="px-3 py-1.5 flex items-center gap-1.5 rounded-full border border-zinc-200 text-xs font-semibold text-zinc-600 hover:bg-zinc-50 shrink-0">
                                    🎨 Share a Project
                                </button>
                                <button className="px-3 py-1.5 flex items-center gap-1.5 rounded-full border border-zinc-200 text-xs font-semibold text-zinc-600 hover:bg-zinc-50 shrink-0">
                                    👍 Sounds good
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen flex w-full h-full">
                    {/* Navigation container reserves layout space on desktop */}
                    <div className="hidden sm:block w-[80px] lg:w-[260px] shrink-0 border-r border-zinc-200 bg-white"></div>
                    <Navigation currentPath="messages.html" />

                    {/* Main content area */}
                    <div className="flex-1 min-w-0 h-screen overflow-hidden">
                        <Messages />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
