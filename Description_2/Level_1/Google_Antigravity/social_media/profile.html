<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folia - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAFA;
            color: #18181B;
            -webkit-font-smoothing: antialiased;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const Icons = {
            Home: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
            Explore: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Bell: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>,
            Mail: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>,
            User: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
            Settings: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
            More: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z" /></svg>,
            Heart: ({ filled }) => <svg className="w-5 h-5" fill={filled ? "currentColor" : "none"} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>,
            Plus: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
            Eye: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
            Edit: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>,
            MapPin: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
            Link: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>,
        };

        const Navigation = ({ currentPath }) => {
            const navItems = [
                { name: 'Home', path: 'index.html', icon: Icons.Home },
                { name: 'Explore', path: 'explore.html', icon: Icons.Explore },
                { name: 'Notifications', path: 'notifications.html', icon: Icons.Bell },
                { name: 'Messages', path: 'messages.html', icon: Icons.Mail },
                { name: 'Profile', path: 'profile.html', icon: Icons.User },
                { name: 'Settings', path: 'settings.html', icon: Icons.Settings },
            ];

            return (
                <>
                    <nav className="hidden sm:flex flex-col h-screen fixed w-[80px] lg:w-[260px] bg-white border-r border-zinc-200 z-40">
                        <div className="pt-8 pb-4 lg:px-6 px-4 flex items-center justify-center lg:justify-start gap-3">
                            <div className="w-10 h-10 rounded-xl bg-zinc-900 text-white flex items-center justify-center font-bold text-xl leading-none shrink-0">F</div>
                            <span className="text-2xl font-bold tracking-tight text-zinc-900 hidden lg:block">Folia</span>
                        </div>

                        <div className="flex-1 mt-6 px-3 space-y-1 overflow-y-auto hide-scrollbar">
                            {navItems.map(item => {
                                const active = currentPath === item.path;
                                const Icon = item.icon;
                                return (
                                    <a key={item.name} href={item.path}
                                        className={`flex items-center lg:justify-start justify-center gap-4 px-3 lg:px-4 py-3.5 rounded-2xl transition-all duration-200 group
                                        ${active ? 'bg-zinc-100 text-zinc-900 font-semibold' : 'text-zinc-500 hover:bg-zinc-50 hover:text-zinc-900'}`}>
                                        <span className={`transition-transform duration-200 group-hover:scale-110 ${active ? 'scale-110 text-zinc-900' : ''}`}>
                                            <Icon />
                                        </span>
                                        <span className="hidden lg:block text-[16px]">{item.name}</span>
                                    </a>
                                );
                            })}

                            <button className="mt-8 w-full bg-zinc-900 text-white rounded-2xl py-3.5 font-semibold shadow-md shadow-zinc-900/10 hover:bg-zinc-800 hover:shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                                <Icons.Plus />
                                <span className="hidden lg:block">New Project</span>
                            </button>
                        </div>

                        <div className="p-4 mb-4">
                            <a href="profile.html" className="flex items-center gap-3 p-2 lg:p-3 -mx-2 lg:mx-0 rounded-2xl hover:bg-zinc-100 transition-colors justify-center lg:justify-start">
                                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&q=80" alt="Hana Creative" className="w-10 h-10 rounded-full object-cover ring-2 ring-white shadow-sm shrink-0" />
                                <div className="hidden lg:block flex-1 min-w-0">
                                    <p className="text-[15px] font-semibold text-zinc-900 truncate">Hana Creative</p>
                                    <p className="text-[13px] text-zinc-500 truncate">@hanastudios</p>
                                </div>
                                <div className="hidden lg:block text-zinc-400">
                                    <Icons.More />
                                </div>
                            </a>
                        </div>
                    </nav>

                    <nav className="sm:hidden fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-zinc-200 flex justify-around p-3 z-50 pb-safe">
                        {navItems.filter(i => !['Settings', 'Profile'].includes(i.name)).map(item => {
                            const active = currentPath === item.path;
                            const Icon = item.icon;
                            return (
                                <a key={item.name} href={item.path} className={`p-2.5 rounded-xl transition-colors ${active ? 'text-zinc-900 bg-zinc-100' : 'text-zinc-500'}`}>
                                    <Icon />
                                </a>
                            );
                        })}
                        <a href="profile.html" className="p-2.5 bg-zinc-100 rounded-xl rounded-full p-2 ring-2 ring-zinc-900">
                            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&q=80" alt="Profile" className="w-6 h-6 rounded-full object-cover" />
                        </a>
                    </nav>
                </>
            );
        };

        const Profile = () => {
            const [activeTab, setActiveTab] = useState('Work');
            const tabs = ['Work', 'Curated Collections', 'About'];

            const projects = [
                { src: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80", title: "Fluid Dynamics", views: "14.2k", likes: "2.1k" },
                { src: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=800&q=80", title: "Cyber Space", views: "8.4k", likes: "892" },
                { src: "https://images.unsplash.com/photo-1550684376-efcbd6e3f031?auto=format&fit=crop&w=800&q=80", title: "Geometry", views: "12.1k", likes: "3.4k" },
                { src: "https://images.unsplash.com/photo-1621360841013-c76831f1628c?auto=format&fit=crop&w=800&q=80", title: "Neon Days", views: "9.2k", likes: "1.2k" },
                { src: "https://images.unsplash.com/photo-1561070791-2526d30994b5?auto=format&fit=crop&w=800&q=80", title: "Editorial Spread", views: "11k", likes: "1.5k" },
                { src: "https://images.unsplash.com/photo-1518640467707-6811f4a6ab73?auto=format&fit=crop&w=800&q=80", title: "Type Focus", views: "6.7k", likes: "1.1k" }
            ];

            return (
                <div className="w-full">
                    {/* Header Image */}
                    <div className="h-64 sm:h-80 w-full relative">
                        <img src="https://images.unsplash.com/photo-1505909182942-e2f09aee3e89?auto=format&fit=crop&w=2000&q=80" className="w-full h-full object-cover" />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        <button className="absolute top-6 right-6 p-2 bg-white/20 backdrop-blur rounded-full text-white hover:bg-white/40 transition">
                            <Icons.Edit />
                        </button>
                    </div>

                    <div className="max-w-[1200px] mx-auto px-4 sm:px-8 pb-12 w-full -mt-20 relative z-10">
                        {/* Profile Info */}
                        <div className="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-zinc-200">
                            <div className="flex flex-col sm:flex-row gap-6 items-start sm:items-end -mt-16 sm:-mt-20 mb-6 border-b border-zinc-100 pb-6">
                                <div className="shrink-0 p-1.5 bg-white rounded-full inline-block">
                                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80" alt="Hana Creative" className="w-24 h-24 sm:w-32 sm:h-32 rounded-full object-cover shadow-sm bg-zinc-100" />
                                </div>
                                <div className="flex-1 min-w-0 w-full flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <div>
                                        <h1 className="text-2xl sm:text-3xl font-extrabold text-zinc-900">Hana Creative</h1>
                                        <p className="text-[15px] font-medium text-zinc-500">@hanastudios</p>
                                    </div>
                                    <div className="flex gap-3 w-full sm:w-auto">
                                        <button className="flex-1 sm:flex-none px-6 py-2.5 rounded-full border border-zinc-200 text-zinc-900 font-semibold hover:bg-zinc-50 transition-colors">
                                            Edit Profile
                                        </button>
                                        <button className="px-4 py-2.5 rounded-full border border-zinc-200 text-zinc-900 hover:bg-zinc-50 transition-colors">
                                            <Icons.More />
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col lg:flex-row gap-8 lg:gap-16">
                                <div className="flex-1 space-y-4">
                                    <div className="inline-flex items-center gap-2 px-3 py-1 bg-green-50 text-green-700 text-xs font-bold rounded-full border border-green-200 uppercase tracking-wide">
                                        <span className="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                                        Available for Freelance
                                    </div>
                                    <p className="text-[16px] text-zinc-800 leading-relaxed max-w-2xl">
                                        Multidisciplinary designer based in Tokyo. Exploring the intersection of digital art, typography, and interactive media. Lover of brutalism and bright palettes.
                                    </p>
                                    <div className="flex flex-wrap gap-x-6 gap-y-2 text-sm text-zinc-500">
                                        <div className="flex items-center gap-1.5"><Icons.MapPin /> Tokyo, JP</div>
                                        <div className="flex items-center gap-1.5 hover:text-indigo-600 cursor-pointer transition-colors"><Icons.Link /> hanastudios.com</div>
                                    </div>
                                </div>
                                <div className="shrink-0 space-y-5 lg:pl-10 lg:border-l border-zinc-100 min-w-[200px]">
                                    <div>
                                        <p className="text-xs text-zinc-500 font-semibold uppercase tracking-wider mb-2">Works In</p>
                                        <p className="text-sm font-medium text-zinc-900 bg-zinc-100 px-3 py-1.5 rounded-lg inline-block">Procreate, Figma, Blender</p>
                                    </div>
                                    <div className="flex gap-6">
                                        <div>
                                            <p className="text-xl font-bold text-zinc-900">14.2k</p>
                                            <p className="text-xs text-zinc-500 font-medium">Followers</p>
                                        </div>
                                        <div>
                                            <p className="text-xl font-bold text-zinc-900">890</p>
                                            <p className="text-xs text-zinc-500 font-medium">Following</p>
                                        </div>
                                        <div>
                                            <p className="text-xl font-bold text-zinc-900">24</p>
                                            <p className="text-xs text-zinc-500 font-medium">Projects</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="flex space-x-8 mt-10 mb-8 border-b border-zinc-200">
                            {tabs.map(tab => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`pb-4 text-[16px] font-semibold transition-colors relative whitespace-nowrap
                                        ${activeTab === tab ? 'text-zinc-900' : 'text-zinc-500 hover:text-zinc-700'}`}
                                >
                                    {tab}
                                    {activeTab === tab && (
                                        <span className="absolute bottom-0 left-0 w-full h-[3px] bg-zinc-900 rounded-t-full"></span>
                                    )}
                                </button>
                            ))}
                        </div>

                        {/* Project Grid */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {/* Pinned/Featured */}
                            <div className="sm:col-span-2 relative group rounded-2xl overflow-hidden cursor-pointer shadow-sm bg-zinc-100 h-80 sm:h-96 w-full ring-2 ring-transparent ring-offset-2 ring-offset-zinc-50 hover:ring-zinc-300 transition-all">
                                <img src={projects[0].src} alt={projects[0].title} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                <div className="absolute top-4 left-4 bg-zinc-900/80 backdrop-blur text-white text-xs font-bold px-3 py-1.5 rounded-full flex items-center gap-1">
                                    <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" /></svg>
                                    Featured Work
                                </div>
                                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-100 transition-opacity duration-300"></div>
                                <div className="absolute inset-x-0 bottom-0 p-6 flex items-end justify-between">
                                    <div className="text-white min-w-0 pr-4">
                                        <h3 className="font-extrabold text-3xl mb-1">{projects[0].title}</h3>
                                        <div className="flex gap-4 text-sm font-medium text-zinc-300">
                                            <span className="flex items-center gap-1.5"><Icons.Eye /> {projects[0].views} Views</span>
                                            <span className="flex items-center gap-1.5"><Icons.Heart filled /> {projects[0].likes} Appreciations</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {projects.slice(1).map((project, i) => (
                                <div key={i} className="relative group rounded-2xl overflow-hidden cursor-pointer shadow-sm bg-zinc-100 h-80 sm:h-96 w-full">
                                    <img src={project.src} alt={project.title} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                                    <div className="absolute inset-x-0 bottom-0 p-5 translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300 flex flex-col justify-end">
                                        <h4 className="text-white font-bold text-xl mb-2">{project.title}</h4>
                                        <div className="flex items-center gap-4 text-white text-sm">
                                            <span className="flex items-center gap-1.5"><Icons.Eye /> {project.views}</span>
                                            <span className="flex items-center gap-1.5"><Icons.Heart filled={false} /> {project.likes}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen flex w-full">
                    {/* Navigation container reserves layout space on desktop */}
                    <div className="hidden sm:block w-[80px] lg:w-[260px] shrink-0 border-r border-zinc-200 bg-white shadow-sm z-50"></div>
                    <Navigation currentPath="profile.html" />

                    {/* Main content area */}
                    <div className="flex-1 min-w-0 pb-16 sm:pb-0 relative">
                        <Profile />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
