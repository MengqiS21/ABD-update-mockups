                                    <div className="pt-2 text-sm text-stone-500 flex justify-between items-center">

                                                <tr className="bg-stone-50"><td className="px-4 py-3 font-medium text-stone-900">M</td><td className="px-4 py-3">38-40</td><td className="px-4 py-3">31-33</td><td className="px-4 py-3">29.5</td></tr>
                                                <tr><td className="px-4 py-3 font-medium text-stone-900">L</td><td className="px-4 py-3">41-43</td><td className="px-4 py-3">34-36</td><td className="px-4 py-3">30</td></tr>

                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="mt-8 text-center">
                                        <button onClick={() => setShowSizeGuide(false)} className="px-6 py-3 bg-stone-900 text-white font-medium rounded-full hover:bg-stone-800 transition-colors w-full sm:w-auto">Close Guide</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProductDetail />);
    </script>
