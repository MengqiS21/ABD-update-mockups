<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | ThreadHouse</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // Shared Components Header & Footer from index.html (Inlined for standalone behavior)
        const Header = () => {
            React.useEffect(() => { lucide.createIcons(); });
            return (
                <header className="sticky top-0 z-50 bg-stone-50/90 backdrop-blur-md border-b border-stone-200 transition-all">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16 sm:h-20">
                            <div className="flex items-center md:hidden">
                                <button type="button" className="text-stone-500 hover:text-stone-900 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-stone-900 rounded-md p-2" aria-label="Open menu">
                                    <i data-lucide="menu" className="h-6 w-6"></i>
                                </button>
                            </div>
                            <div className="flex-1 flex justify-center md:justify-start">
                                <a href="index.html" className="flex-shrink-0 flex items-center focus:outline-none focus:ring-2 focus:ring-stone-900 rounded-sm">
                                    <span className="font-serif text-2xl sm:text-3xl font-bold tracking-tighter">ThreadHouse.</span>
                                </a>
                            </div>
                            <nav className="hidden md:flex space-x-8">
                                <a href="products.html" className="text-sm font-medium text-stone-900 underline underline-offset-4 focus:outline-none focus:ring-2 focus:ring-stone-900 rounded-sm transition-colors">Shop</a>
                                <a href="products.html" className="text-sm font-medium text-stone-500 hover:text-stone-900 focus:outline-none focus:underline underline-offset-4 transition-colors">New Arrivals</a>
                                <a href="#" className="text-sm font-medium text-stone-500 hover:text-stone-900 focus:outline-none focus:underline underline-offset-4 transition-colors">About</a>
                            </nav>
                            <div className="flex items-center space-x-2 sm:space-x-4">
                                <button className="text-stone-500 hover:text-stone-900 focus:outline-none focus:ring-2 focus:ring-stone-900 rounded-full p-2" aria-label="Search">
                                    <i data-lucide="search" className="h-5 w-5"></i>
                                </button>
                                <a href="account.html" className="text-stone-500 hover:text-stone-900 hidden sm:block focus:outline-none focus:ring-2 focus:ring-stone-900 rounded-full p-2" aria-label="Account">
                                    <i data-lucide="user" className="h-5 w-5"></i>
                                </a>
                                <a href="cart.html" className="text-stone-500 hover:text-stone-900 relative focus:outline-none focus:ring-2 focus:ring-stone-900 rounded-full p-2" aria-label="Cart">
                                    <i data-lucide="shopping-bag" className="h-5 w-5"></i>
                                    <span className="absolute top-1 right-1 flex h-4 w-4 items-center justify-center rounded-full bg-stone-900 text-[10px] font-bold text-white">2</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const Footer = () => {
            React.useEffect(() => { lucide.createIcons(); });
            return (
                <footer className="bg-stone-950 text-stone-300 pt-16 pb-8 border-t border-stone-800">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-12 md:gap-8 mb-12">
                            <div className="col-span-1 md:col-span-1">
                                <span className="font-serif text-2xl font-bold text-white tracking-tighter block mb-4">ThreadHouse.</span>
                                <p className="text-sm text-stone-400 leading-relaxed">Sustainable, independently designed clothing tailored for the modern individual.</p>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Shop</h3>
                                <ul className="space-y-3 text-sm">
                                    <li><a href="products.html" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">All Products</a></li>
                                    <li><a href="products.html" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">New Arrivals</a></li>
                                    <li><a href="products.html" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">Sale</a></li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Support</h3>
                                <ul className="space-y-3 text-sm">
                                    <li><a href="#" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">FAQ</a></li>
                                    <li><a href="#" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">Shipping & Returns</a></li>
                                    <li><a href="#" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">Contact Us</a></li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Newsletter</h3>
                                <p className="text-sm text-stone-400 mb-4">Subscribe for updates on new drops and exclusive offers.</p>
                                <form className="flex" onSubmit={(e) => e.preventDefault()}>
                                    <label htmlFor="email-address" className="sr-only">Email address</label>
                                    <input id="email-address" type="email" required className="w-full min-w-0 px-4 py-2 text-base text-stone-900 bg-white border border-transparent rounded-l-md focus:outline-none focus:ring-2 focus:ring-white sm:text-sm placeholder-stone-500" placeholder="Enter your email" />
                                    <button type="submit" className="flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-r-md text-stone-950 bg-stone-200 hover:bg-white focus:outline-none focus:ring-2 focus:ring-white transition-colors">Subscribe</button>
                                </form>
                            </div>
                        </div>
                        <div className="border-t border-stone-800 pt-8 flex flex-col md:flex-row justify-between items-center">
                            <p className="text-sm text-stone-500">&copy; 2026 ThreadHouse. All rights reserved.</p>
                            <div className="flex space-x-6 mt-4 md:mt-0">
                                <a href="#" className="text-stone-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white rounded-sm p-1"><i data-lucide="instagram" className="h-5 w-5"></i></a>
                                <a href="#" className="text-stone-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white rounded-sm p-1"><i data-lucide="twitter" className="h-5 w-5"></i></a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };

        const ProductsPage = () => {
            const [styleMatch, setStyleMatch] = React.useState(false);

            React.useEffect(() => {
                lucide.createIcons();
            });

            // Generate mock products (around 24 items)
            const mockProducts = Array.from({ length: 24 }).map((_, i) => ({
                id: i,
                name: ['Oversized Linen Shirt', 'Organic Cotton Tee', 'Pleated Trousers', 'Merino Wool Sweater', 'Canvas Chore Coat', 'Wide Leg Denim'][i % 6],
                price: ['89.00', '35.00', '110.00', '145.00', '160.00', '125.00'][i % 6],
                img: [
                    'https://images.unsplash.com/photo-1596755094514-f87e32f85e2c?w=600&auto=format&fit=crop',
                    'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600&auto=format&fit=crop',
                    'https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=600&auto=format&fit=crop',
                    'https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=600&auto=format&fit=crop',
                    'https://images.unsplash.com/photo-1551028719-00167b16eac5?w=600&auto=format&fit=crop',
                    'https://images.unsplash.com/photo-1542272604-787c3835535d?w=600&auto=format&fit=crop'
                ][i % 6],
                colors: i % 2 === 0 ? ['#EAE5D9', '#869485', '#242424'] : ['#242424', '#B4B4B4'],
                isOutfit: i % 4 === 0
            }));

            const displayProducts = styleMatch ? mockProducts.filter(p => p.isOutfit) : mockProducts;

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />

                    {/* Page Header */}
                    <div className="bg-stone-100 py-12 border-b border-stone-200">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center pt-8">
                            <h1 className="text-4xl sm:text-5xl font-serif font-bold text-stone-900 tracking-tight">Our Collection</h1>
                            <p className="mt-4 text-stone-500 max-w-2xl mx-auto">Mindfully crafted pieces for your everyday wardrobe. Filter by your preferences or shop curated outfits.</p>
                        </div>
                    </div>

                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex flex-col lg:flex-row gap-10">
                        {/* Sidebar Filters */}
                        <aside className="w-full lg:w-64 flex-shrink-0 space-y-8">
                            {/* Style Match Toggle */}
                            <div className="pb-6 border-b border-stone-200">
                                <label className="flex items-center justify-between cursor-pointer group">
                                    <span className="text-sm font-semibold text-stone-900 tracking-wide uppercase">Style Match</span>
                                    <div className="relative">
                                        <input type="checkbox" className="sr-only" checked={styleMatch} onChange={() => setStyleMatch(!styleMatch)} aria-label="Toggle Style Match" />
                                        <div className={`block w-10 h-6 rounded-full transition-colors ${styleMatch ? 'bg-stone-900' : 'bg-stone-300'}`}></div>
                                        <div className={`dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${styleMatch ? 'transform translate-x-4' : ''}`}></div>
                                    </div>
                                </label>
                                <p className="text-xs text-stone-500 mt-2">Show outfits as curated sets</p>
                            </div>

                            {/* Category Filter */}
                            <div>
                                <h3 className="text-sm font-semibold text-stone-900 tracking-wide uppercase mb-4">Clothing Type</h3>
                                <ul className="space-y-3">
                                    {['All Clothing', 'Tops & Shirts', 'Sweaters & Knits', 'Outerwear', 'Trousers & Jeans', 'Accessories'].map((cat, i) => (
                                        <li key={cat}>
                                            <div className="flex items-center">
                                                <input id={`cat-${i}`} name="category" type="radio" className="h-4 w-4 border-stone-300 text-stone-900 focus:ring-stone-900" defaultChecked={i === 0} />
                                                <label htmlFor={`cat-${i}`} className="ml-3 text-sm text-stone-600">{cat}</label>
                                            </div>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            {/* Size Filter */}
                            <div className="pt-6 border-t border-stone-200">
                                <h3 className="text-sm font-semibold text-stone-900 tracking-wide uppercase mb-4">Size</h3>
                                <div className="grid grid-cols-3 gap-2">
                                    {['XS', 'S', 'M', 'L', 'XL', 'XXL'].map(size => (
                                        <button key={size} className="border border-stone-300 rounded text-sm py-2 px-1 text-center text-stone-600 hover:border-stone-900 focus:outline-none focus:ring-2 focus:ring-stone-900 transition-colors">
                                            {size}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Color Filter */}
                            <div className="pt-6 border-t border-stone-200">
                                <h3 className="text-sm font-semibold text-stone-900 tracking-wide uppercase mb-4">Color</h3>
                                <div className="flex flex-wrap gap-3">
                                    {['#242424', '#FFFFFF', '#EAE5D9', '#869485', '#3C4959', '#AA7D62'].map((color, i) => (
                                        <button key={i} className="w-8 h-8 rounded-full border border-stone-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-stone-900 shadow-sm hover:scale-110 transition-transform" style={{ backgroundColor: color }} aria-label={`Color ${color}`}></button>
                                    ))}
                                </div>
                            </div>

                            {/* Material Filter */}
                            <div className="pt-6 border-t border-stone-200">
                                <h3 className="text-sm font-semibold text-stone-900 tracking-wide uppercase mb-4">Material</h3>
                                <ul className="space-y-3">
                                    {['Organic Cotton', 'Recycled Polyester', 'Merino Wool', 'Linen', 'Hemp Blend'].map((mat, i) => (
                                        <li key={mat}>
                                            <div className="flex items-center">
                                                <input id={`mat-${i}`} name="material" type="checkbox" className="h-4 w-4 rounded border-stone-300 text-stone-900 focus:ring-stone-900" />
                                                <label htmlFor={`mat-${i}`} className="ml-3 text-sm text-stone-600">{mat}</label>
                                            </div>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            {/* Price Filter */}
                            <div className="pt-6 border-t border-stone-200">
                                <h3 className="text-sm font-semibold text-stone-900 tracking-wide uppercase mb-4">Price</h3>
                                <input type="range" min="0" max="300" className="w-full h-1 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-stone-900 focus:outline-none focus:ring-2 focus:ring-stone-900" />
                                <div className="flex justify-between text-xs text-stone-500 mt-2">
                                    <span>$0</span>
                                    <span>$300+</span>
                                </div>
                            </div>
                        </aside>

                        {/* Product Grid */}
                        <div className="flex-1">
                            <div className="flex justify-between items-center mb-6">
                                <p className="text-sm text-stone-500">{displayProducts.length} Results</p>
                                <div className="flex items-center space-x-2">
                                    <label htmlFor="sort" className="text-sm text-stone-600">Sort by:</label>
                                    <select id="sort" className="text-sm border-stone-300 rounded-md focus:ring-stone-900 focus:border-stone-900 bg-transparent py-1 pl-2 pr-8 text-stone-900">
                                        <option>Recommended</option>
                                        <option>Newest</option>
                                        <option>Price: Low to High</option>
                                        <option>Price: High to Low</option>
                                    </select>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-x-6 gap-y-10">
                                {displayProducts.map((product, idx) => (
                                    <a href="product-detail.html" key={idx} className="group focus:outline-none focus:ring-4 focus:ring-stone-900 rounded-xl block">
                                        <div className="relative bg-stone-100 rounded-xl overflow-hidden aspect-[4/5] mb-4 shadow-sm group-hover:shadow-md transition-shadow">
                                            <img src={product.img} alt={product.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />

                                            {/* Style Match Badge */}
                                            {styleMatch && product.isOutfit && (
                                                <div className="absolute top-4 left-4 bg-stone-900 text-white px-3 py-1 rounded-full text-xs font-semibold tracking-widest uppercase shadow-sm">
                                                    Curated Outfit
                                                </div>
                                            )}

                                            <div className="absolute bottom-4 left-0 right-0 px-4 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-4 group-hover:translate-y-0 text-center flex gap-2">
                                                <button className="flex-1 bg-white text-stone-900 font-medium px-4 py-3 rounded-full shadow-lg hover:bg-stone-100 transition-colors focus:outline-none">
                                                    Quick Add
                                                </button>
                                            </div>
                                        </div>
                                        <div>
                                            <div className="flex justify-between items-start">
                                                <h3 className="text-base font-medium text-stone-900 group-hover:text-stone-600 transition-colors pr-4">{product.name}</h3>
                                                <p className="text-sm font-medium text-stone-900">${product.price}</p>
                                            </div>
                                            <div className="flex gap-1.5 mt-2">
                                                {product.colors.map((c, i) => (
                                                    <span key={i} className="w-3.5 h-3.5 rounded-full border border-stone-300" style={{ backgroundColor: c }}></span>
                                                ))}
                                            </div>
                                        </div>
                                    </a>
                                ))}
                            </div>

                            {/* Pagination */}
                            <div className="mt-16 flex justify-center">
                                <nav className="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                                    <a href="#" className="relative inline-flex items-center px-2 py-2 rounded-l-md border border-stone-300 bg-white text-sm font-medium text-stone-500 hover:bg-stone-50 focus:z-10 focus:outline-none focus:ring-1 focus:ring-stone-900 focus:border-stone-900">
                                        <span className="sr-only">Previous</span>
                                        <i data-lucide="chevron-left" className="h-5 w-5"></i>
                                    </a>
                                    <a href="#" aria-current="page" className="z-10 bg-stone-900 text-white relative inline-flex items-center px-4 py-2 border border-stone-900 text-sm font-medium focus:z-10 focus:outline-none focus:ring-1 focus:ring-stone-900">1</a>
                                    <a href="#" className="bg-white text-stone-500 hover:bg-stone-50 relative inline-flex items-center px-4 py-2 border border-stone-300 text-sm font-medium focus:z-10 focus:outline-none focus:ring-1 focus:ring-stone-900 focus:border-stone-900">2</a>
                                    <a href="#" className="bg-white text-stone-500 hover:bg-stone-50 relative inline-flex items-center px-4 py-2 border border-stone-300 text-sm font-medium focus:z-10 focus:outline-none focus:ring-1 focus:ring-stone-900 focus:border-stone-900">3</a>
                                    <a href="#" className="relative inline-flex items-center px-2 py-2 rounded-r-md border border-stone-300 bg-white text-sm font-medium text-stone-500 hover:bg-stone-50 focus:z-10 focus:outline-none focus:ring-1 focus:ring-stone-900 focus:border-stone-900">
                                        <span className="sr-only">Next</span>
                                        <i data-lucide="chevron-right" className="h-5 w-5"></i>
                                    </a>
                                </nav>
                            </div>
                        </div>
                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProductsPage />);
    </script>
</body>

</html>
