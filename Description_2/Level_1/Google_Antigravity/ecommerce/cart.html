<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | ThreadHouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-900 font-sans antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const Header = () => {
            React.useEffect(() => { lucide.createIcons(); });
            return (
                <header className="sticky top-0 z-50 bg-stone-50/90 backdrop-blur-md border-b border-stone-200 transition-all">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16 sm:h-20">
                        <button className="md:hidden p-2 text-stone-500 hover:text-stone-900 rounded-md focus:ring-2 focus:ring-stone-900"><i data-lucide="menu" className="w-6 h-6"></i></button>
                        <a href="index.html" className="flex-1 flex justify-center md:justify-start flex-shrink-0 focus:ring-2 focus:ring-stone-900 rounded-sm">
                            <span className="font-serif text-2xl sm:text-3xl font-bold tracking-tighter">ThreadHouse.</span>
                        </a>
                        <nav className="hidden md:flex space-x-8">
                            <a href="products.html" className="text-sm font-medium text-stone-500 hover:text-stone-900 focus:underline transition-colors">Shop</a>
                            <a href="products.html" className="text-sm font-medium text-stone-500 hover:text-stone-900 focus:underline transition-colors">New Arrivals</a>
                            <a href="#" className="text-sm font-medium text-stone-500 hover:text-stone-900 focus:underline transition-colors">About</a>
                        </nav>
                        <div className="flex items-center space-x-2 sm:space-x-4">
                            <button className="p-2 text-stone-500 hover:text-stone-900 rounded-full focus:ring-2 focus:ring-stone-900"><i data-lucide="search" className="w-5 h-5"></i></button>
                            <a href="account.html" className="hidden sm:block p-2 text-stone-500 hover:text-stone-900 rounded-full focus:ring-2 focus:ring-stone-900"><i data-lucide="user" className="w-5 h-5"></i></a>
                            <a href="cart.html" className="relative p-2 text-stone-900 bg-stone-200 rounded-full focus:ring-2 focus:ring-stone-900">
                                <i data-lucide="shopping-bag" className="w-5 h-5"></i>
                                <span className="absolute top-1 right-1 flex h-4 w-4 items-center justify-center rounded-full bg-stone-900 text-[10px] font-bold text-white">2</span>
                            </a>
                        </div>
                    </div>
                </header>
            );
        };

        const Footer = () => {
            React.useEffect(() => { lucide.createIcons(); });
            return (
                <footer className="bg-stone-950 text-stone-300 pt-16 pb-8 border-t border-stone-800">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-8 mb-12">
                            <div>
                                <span className="font-serif text-2xl font-bold text-white tracking-tighter block mb-4">ThreadHouse.</span>
                                <p className="text-sm text-stone-400">Sustainable, independently designed clothing.</p>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Shop</h3>
                                <ul className="space-y-3 text-sm">
                                    <li><a href="products.html" className="text-stone-400 hover:text-white">All Products</a></li>
                                    <li><a href="products.html" className="text-stone-400 hover:text-white">New Arrivals</a></li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Support</h3>
                                <ul className="space-y-3 text-sm">
                                    <li><a href="#" className="text-stone-400 hover:text-white">FAQ</a></li>
                                    <li><a href="#" className="text-stone-400 hover:text-white">Shipping</a></li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Newsletter</h3>
                                <form className="flex" onSubmit={(e) => e.preventDefault()}>
                                    <input type="email" required className="w-full px-4 py-2 text-sm text-stone-900 bg-white rounded-l-md focus:ring-2 focus:ring-white" placeholder="Email" aria-label="Email address" />
                                    <button type="submit" className="px-4 py-2 text-sm font-medium rounded-r-md text-stone-950 bg-stone-200 hover:bg-white transition-colors">Subscribe</button>
                                </form>
                            </div>
                        </div>
                        <div className="border-t border-stone-800 pt-8 flex justify-between items-center flex-col sm:flex-row gap-4">
                            <p className="text-sm text-stone-500">&copy; 2026 ThreadHouse.</p>
                            <div className="flex space-x-6">
                                <a href="#" className="text-stone-400 hover:text-white"><i data-lucide="instagram" className="w-5 h-5"></i></a>
                                <a href="#" className="text-stone-400 hover:text-white"><i data-lucide="twitter" className="w-5 h-5"></i></a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };

        const CartPage = () => {
            const [giftWrap, setGiftWrap] = React.useState(false);
            const [quantities, setQuantities] = React.useState({ 1: 1, 2: 1 });

            React.useEffect(() => { lucide.createIcons(); });

            const items = [
                {
                    id: 1,
                    name: 'Oversized Linen Shirt',
                    price: 89.00,
                    color: 'Sage Green',
                    size: 'M',
                    img: 'https://images.unsplash.com/photo-1596755094514-f87e32f85e2c?w=300&auto=format&fit=crop',
                    link: 'product-detail.html'
                },
                {
                    id: 2,
                    name: 'Pleated Trousers',
                    price: 110.00,
                    color: 'Oatmeal',
                    size: '32',
                    img: 'https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=300&auto=format&fit=crop',
                    link: 'product-detail.html'
                }
            ];

            const subtotal = items.reduce((acc, item) => acc + (item.price * quantities[item.id]), 0);
            const giftWrapCost = giftWrap ? 5.00 : 0;
            const shipping = subtotal > 150 ? 0 : 10.00;
            const taxes = subtotal * 0.08;
            const total = subtotal + giftWrapCost + shipping + taxes;

            // Date calculation for estimated delivery
            const today = new Date();
            const deliveryStart = new Date(today);
            deliveryStart.setDate(today.getDate() + 3);
            const deliveryEnd = new Date(today);
            deliveryEnd.setDate(today.getDate() + 5);

            const formatDate = (date) => {
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            };

            const updateQuantity = (id, delta) => {
                setQuantities(prev => ({
                    ...prev,
                    [id]: Math.max(1, prev[id] + delta)
                }));
            };

            return (
                <div className="min-h-screen flex flex-col bg-stone-50">
                    <Header />

                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
                        <h1 className="text-3xl md:text-4xl font-serif font-bold text-stone-900 tracking-tight mb-8">Your Cart</h1>

                        {/* Loyalty points banner */}
                        <div className="bg-stone-900 text-stone-50 rounded-xl p-4 sm:p-6 mb-8 flex flex-col sm:flex-row items-center justify-between shadow-lg">
                            <div className="flex items-center mb-4 sm:mb-0">
                                <div className="bg-stone-800 p-3 rounded-full mr-4">
                                    <i data-lucide="award" className="w-6 h-6 text-yellow-500"></i>
                                </div>
                                <div>
                                    <h3 className="font-bold text-lg tracking-wide">ThreadHouse Rewards</h3>
                                    <p className="text-stone-300 text-sm">You're <strong>120 points</strong> away from a free canvas tote bag.</p>
                                </div>
                            </div>
                            <div className="w-full sm:w-1/3">
                                <div className="flex justify-between text-xs mb-2 font-medium">
                                    <span className="text-stone-400">380 pts</span>
                                    <span className="text-yellow-500">500 pts</span>
                                </div>
                                <div className="w-full bg-stone-800 rounded-full h-2.5">
                                    <div className="bg-yellow-500 h-2.5 rounded-full" style={{ width: '76%' }}></div>
                                </div>
                            </div>
                        </div>

                        <div className="lg:grid lg:grid-cols-12 lg:gap-x-12 lg:items-start">
                            {/* Cart Items List */}
                            <div className="lg:col-span-7 xl:col-span-8">
                                <div className="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
                                    <ul className="divide-y divide-stone-200">
                                        {items.map((item) => (
                                            <li key={item.id} className="p-6 flex flex-col sm:flex-row">
                                                <div className="flex-shrink-0 w-24 h-32 sm:w-32 sm:h-40 bg-stone-100 rounded-lg overflow-hidden border border-stone-200 mb-4 sm:mb-0">
                                                    <img src={item.img} alt={item.name} className="w-full h-full object-center object-cover" />
                                                </div>

                                                <div className="ml-0 sm:ml-6 flex-1 flex flex-col">
                                                    <div className="flex justify-between">
                                                        <div>
                                                            <h3 className="text-base sm:text-lg font-medium text-stone-900">
                                                                <a href={item.link} className="hover:underline">{item.name}</a>
                                                            </h3>
                                                            <p className="mt-1 text-sm text-stone-500 font-medium">${item.price.toFixed(2)}</p>
                                                        </div>
                                                        <button type="button" className="text-stone-400 hover:text-red-500 p-1 rounded transition-colors focus:outline-none focus:ring-2 focus:ring-red-500 h-fit" aria-label="Remove item">
                                                            <i data-lucide="x" className="w-5 h-5"></i>
                                                        </button>
                                                    </div>

                                                    <div className="mt-4 flex flex-wrap gap-4 text-sm text-stone-600">
                                                        <div className="flex items-center">
                                                            <span className="w-3 h-3 rounded-full mr-2 border border-stone-300" style={{ backgroundColor: item.color === 'Sage Green' ? '#869485' : '#EAE5D9' }}></span>
                                                            Color: {item.color}
                                                        </div>
                                                        <div className="px-3 border-l border-stone-300">
                                                            Size: {item.size}
                                                        </div>
                                                    </div>

                                                    <div className="mt-auto pt-4 flex items-center justify-between">
                                                        <div className="flex items-center border border-stone-300 rounded-lg">
                                                            <button onClick={() => updateQuantity(item.id, -1)} className="px-3 py-1 text-stone-600 hover:bg-stone-100 rounded-l-lg transition-colors focus:outline-none focus:ring-2 focus:ring-inset focus:ring-stone-900" aria-label="Decrease quantity">
                                                                <i data-lucide="minus" className="w-3 h-3"></i>
                                                            </button>
                                                            <span className="px-4 py-1 text-sm font-medium border-x border-stone-300 bg-stone-50 min-w-[2.5rem] text-center" aria-live="polite">
                                                                {quantities[item.id]}
                                                            </span>
                                                            <button onClick={() => updateQuantity(item.id, 1)} className="px-3 py-1 text-stone-600 hover:bg-stone-100 rounded-r-lg transition-colors focus:outline-none focus:ring-2 focus:ring-inset focus:ring-stone-900" aria-label="Increase quantity">
                                                                <i data-lucide="plus" className="w-3 h-3"></i>
                                                            </button>
                                                        </div>
                                                        <div className="font-medium text-stone-900">
                                                            ${(item.price * quantities[item.id]).toFixed(2)}
                                                        </div>
                                                    </div>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>

                                    <div className="p-6 bg-stone-50 border-t border-stone-200">
                                        <label className="flex items-start cursor-pointer group">
                                            <div className="flex items-center h-5">
                                                <input
                                                    type="checkbox"
                                                    checked={giftWrap}
                                                    onChange={(e) => setGiftWrap(e.target.checked)}
                                                    className="w-5 h-5 border-stone-300 rounded text-stone-900 focus:ring-stone-900 accent-stone-900 cursor-pointer"
                                                />
                                            </div>
                                            <div className="ml-3 text-sm">
                                                <span className="font-medium text-stone-900 flex items-center">
                                                    <i data-lucide="gift" className="w-4 h-4 mr-1.5 text-stone-500"></i>
                                                    Add Gift Wrapping <span className="text-stone-500 font-normal ml-2">+$5.00</span>
                                                </span>
                                                <p className="text-stone-500 mt-1">Includes a signature recycled Kraft box and handwritten note.</p>
                                            </div>
                                        </label>
                                    </div>
                                </div>

                                <div className="mt-6 flex items-center p-4 bg-blue-50/50 rounded-xl border border-blue-100 shadow-sm text-sm text-stone-700">
                                    <div className="bg-white p-2 text-stone-900 rounded-full mr-4 shadow-sm">
                                        <i data-lucide="truck" className="w-5 h-5 flex-shrink-0"></i>
                                    </div>
                                    <div>
                                        <span className="font-semibold text-stone-900 block mb-0.5">Estimated Delivery</span>
                                        Arrives between {formatDate(deliveryStart)} and {formatDate(deliveryEnd)} via Standard Shipping.
                                    </div>
                                </div>
                            </div>

                            {/* Order Summary */}
                            <div className="mt-10 lg:mt-0 lg:col-span-5 xl:col-span-4 max-w-lg w-full ml-auto">
                                <div className="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden sticky top-28">
                                    <div className="p-6">
                                        <h2 className="text-lg font-serif font-bold text-stone-900 tracking-wide uppercase mb-6">Order Summary</h2>

                                        <div className="space-y-4 text-sm text-stone-700">
                                            <div className="flex justify-between pb-3 border-b border-stone-100">
                                                <span>Subtotal</span>
                                                <span className="font-medium text-stone-900">${subtotal.toFixed(2)}</span>
                                            </div>
                                            {giftWrap && (
                                                <div className="flex justify-between pb-3 border-b border-stone-100 text-stone-600">
                                                    <span className="flex items-center">Gift Wrapping</span>
                                                    <span>${giftWrapCost.toFixed(2)}</span>
                                                </div>
                                            )}
                                            <div className="flex justify-between pb-3 border-b border-stone-100">
                                                <span>Shipping {shipping === 0 && <span className="text-xs ml-2 py-0.5 px-2 bg-stone-100 rounded-full text-stone-600">(Free over $150)</span>}</span>
                                                <span className="font-medium text-stone-900">{shipping === 0 ? 'Free' : `$${shipping.toFixed(2)}`}</span>
                                            </div>
                                            <div className="flex justify-between pb-3 border-b border-stone-100">
                                                <span>Estimated Taxes</span>
                                                <span className="font-medium text-stone-900">${taxes.toFixed(2)}</span>
                                            </div>

                                            <div className="flex justify-between pt-2 text-base sm:text-lg font-bold text-stone-900">
                                                <span>Total</span>
                                                <span>${total.toFixed(2)}</span>
                                            </div>
                                        </div>

                                        <div className="mt-8 space-y-3">
                                            <button className="w-full bg-stone-900 border border-transparent rounded-full shadow-sm py-4 px-4 text-base font-medium text-white hover:bg-stone-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-stone-900 transition-colors flex justify-center items-center group">
                                                Checkout Securely <i data-lucide="arrow-right" className="ml-2 w-4 h-4 transform group-hover:translate-x-1 transition-transform"></i>
                                            </button>
                                            <div className="flex items-center justify-center space-x-2 text-stone-400">
                                                <i data-lucide="lock" className="w-3 h-3 mt-0.5"></i>
                                                <span className="text-xs uppercase tracking-wider font-semibold">SSL Secure Checkout</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Accepted payment methods */}
                                    <div className="p-4 bg-stone-50 border-t border-stone-200 flex justify-center space-x-3">
                                        <div className="w-10 h-6 bg-white border border-stone-200 rounded flex items-center justify-center text-[10px] font-bold text-blue-800 shadow-sm">VISA</div>
                                        <div className="w-10 h-6 bg-white border border-stone-200 rounded flex items-center justify-center text-[10px] font-bold text-red-600 shadow-sm">MC</div>
                                        <div className="w-10 h-6 bg-white border border-stone-200 rounded flex items-center justify-center text-[10px] font-bold text-sky-500 shadow-sm">AMEX</div>
                                        <div className="w-10 h-6 bg-stone-900 rounded flex items-center justify-center text-[10px] font-bold text-white shadow-sm">Pay<span className="text-blue-200">Pal</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CartPage />);
    </script>
</body>

</html>
