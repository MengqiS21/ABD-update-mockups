<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreadHouse | E-commerce</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Hide scrollbar for horizontal scroll areas */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // Shared Components
        const Header = () => {
            React.useEffect(() => {
                lucide.createIcons();
            });

            return (
                <header className="sticky top-0 z-50 bg-stone-50/90 backdrop-blur-md border-b border-stone-200 transition-all">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16 sm:h-20">
                            {/* Mobile menu button */}
                            <div className="flex items-center md:hidden">
                                <button type="button" className="text-stone-500 hover:text-stone-900 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-stone-900 rounded-md p-2" aria-label="Open menu">
                                    <i data-lucide="menu" className="h-6 w-6"></i>
                                </button>
                            </div>

                            {/* Logo */}
                            <div className="flex-1 flex justify-center md:justify-start">
                                <a href="index.html" className="flex-shrink-0 flex items-center focus:outline-none focus:ring-2 focus:ring-stone-900 rounded-sm">
                                    <span className="font-serif text-2xl sm:text-3xl font-bold tracking-tighter">ThreadHouse.</span>
                                </a>
                            </div>

                            {/* Desktop Navigation */}
                            <nav className="hidden md:flex space-x-8">
                                <a href="products.html" className="text-sm font-medium text-stone-900 hover:text-stone-600 focus:outline-none focus:text-stone-600 focus:underline underline-offset-4 transition-colors">Shop</a>
                                <a href="products.html" className="text-sm font-medium text-stone-500 hover:text-stone-900 focus:outline-none focus:text-stone-900 focus:underline underline-offset-4 transition-colors">New Arrivals</a>
                                <a href="#" className="text-sm font-medium text-stone-500 hover:text-stone-900 focus:outline-none focus:text-stone-900 focus:underline underline-offset-4 transition-colors">About</a>
                            </nav>

                            {/* Icons */}
                            <div className="flex items-center space-x-2 sm:space-x-4">
                                <button className="text-stone-500 hover:text-stone-900 focus:outline-none focus:ring-2 focus:ring-stone-900 rounded-full p-2" aria-label="Search">
                                    <i data-lucide="search" className="h-5 w-5"></i>
                                </button>
                                <a href="account.html" className="text-stone-500 hover:text-stone-900 hidden sm:block focus:outline-none focus:ring-2 focus:ring-stone-900 rounded-full p-2" aria-label="Account">
                                    <i data-lucide="user" className="h-5 w-5"></i>
                                </a>
                                <a href="cart.html" className="text-stone-500 hover:text-stone-900 relative focus:outline-none focus:ring-2 focus:ring-stone-900 rounded-full p-2" aria-label="Cart">
                                    <i data-lucide="shopping-bag" className="h-5 w-5"></i>
                                    <span className="absolute top-1 right-1 flex h-4 w-4 items-center justify-center rounded-full bg-stone-900 text-[10px] font-bold text-white">2</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const Footer = () => {
            React.useEffect(() => {
                lucide.createIcons();
            });
            return (
                <footer className="bg-stone-950 text-stone-300 pt-16 pb-8 border-t border-stone-800">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-12 md:gap-8 mb-12">
                            <div className="col-span-1 md:col-span-1">
                                <span className="font-serif text-2xl font-bold text-white tracking-tighter block mb-4">ThreadHouse.</span>
                                <p className="text-sm text-stone-400 leading-relaxed">Sustainable, independently designed clothing tailored for the modern individual.</p>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Shop</h3>
                                <ul className="space-y-3 text-sm">
                                    <li><a href="products.html" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">All Products</a></li>
                                    <li><a href="products.html" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">New Arrivals</a></li>
                                    <li><a href="products.html" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">Sale</a></li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Support</h3>
                                <ul className="space-y-3 text-sm">
                                    <li><a href="#" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">FAQ</a></li>
                                    <li><a href="#" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">Shipping & Returns</a></li>
                                    <li><a href="#" className="text-stone-400 hover:text-white transition-colors focus:outline-none focus:underline underline-offset-2">Contact Us</a></li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Newsletter</h3>
                                <p className="text-sm text-stone-400 mb-4">Subscribe for updates on new drops and exclusive offers.</p>
                                <form className="flex" onSubmit={(e) => e.preventDefault()}>
                                    <label htmlFor="email-address" className="sr-only">Email address</label>
                                    <input id="email-address" type="email" required className="w-full min-w-0 px-4 py-2 text-base text-stone-900 bg-white border border-transparent rounded-l-md focus:outline-none focus:ring-2 focus:ring-white sm:text-sm placeholder-stone-500" placeholder="Enter your email" />
                                    <button type="submit" className="flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-r-md text-stone-950 bg-stone-200 hover:bg-white focus:outline-none focus:ring-2 focus:ring-white transition-colors">
                                        Subscribe
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div className="border-t border-stone-800 pt-8 flex flex-col md:flex-row justify-between items-center">
                            <p className="text-sm text-stone-500">&copy; 2026 ThreadHouse. All rights reserved.</p>
                            <div className="flex space-x-6 mt-4 md:mt-0">
                                <a href="#" className="text-stone-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white rounded-sm p-1" aria-label="Instagram">
                                    <i data-lucide="instagram" className="h-5 w-5"></i>
                                </a>
                                <a href="#" className="text-stone-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white rounded-sm p-1" aria-label="Twitter">
                                    <i data-lucide="twitter" className="h-5 w-5"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };

        const Homepage = () => {
            React.useEffect(() => {
                lucide.createIcons();
            });

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    
                    <main className="flex-grow">
                        {/* Hero Section */}
                        <section className="relative h-[85vh] flex items-center justify-center bg-stone-900 overflow-hidden">
                            <div className="absolute inset-0 w-full h-full">
                                <div className="absolute inset-0 bg-stone-900/40 mix-blend-multiply z-10"></div>
                                <img src="https://images.unsplash.com/photo-1445205170230-053b83016050?q=80&w=2071&auto=format&fit=crop" alt="Fashion models wearing spring collection outdoors" className="w-full h-full object-cover" />
                            </div>
                            <div className="relative z-20 text-center px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto flex flex-col items-center">
                                <span className="inline-block py-1 px-3 rounded-full bg-stone-100/20 text-stone-50 text-xs font-semibold tracking-widest uppercase backdrop-blur-sm mb-6 border border-stone-100/30">Spring 2026 Collection</span>
                                <h1 className="text-4xl sm:text-5xl md:text-7xl font-serif font-semibold text-white tracking-tight mb-6 drop-shadow-lg leading-tight">
                                    Wear What You<br/>Stand For
                                </h1>
                                <p className="text-lg sm:text-xl text-stone-200 mb-10 font-light drop-shadow max-w-2xl">
                                    Discover a mindful approach to modern style. Sustainable fabrics, independent designs, uniquely yours.
                                </p>
                                <a href="products.html" className="inline-flex items-center justify-center px-8 py-4 border border-transparent text-base font-medium rounded-full text-stone-900 bg-white hover:bg-stone-100 md:text-lg transition-all hover:scale-105 focus:outline-none focus:ring-4 focus:ring-white/50 shadow-xl">
                                    Shop the Collection
                                </a>
                            </div>
                        </section>

                        {/* Shop by Mood (Categories) */}
                        <section className="max-w-7xl mx-auto py-20 px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-end mb-10">
                                <h2 className="text-3xl md:text-4xl font-serif font-bold text-stone-900 tracking-tight">Shop by Mood</h2>
                                <a href="products.html" className="text-sm font-semibold text-stone-900 pb-1 border-b-2 border-stone-900 hover:text-stone-600 hover:border-stone-600 transition-colors focus:outline-none focus:ring-2 focus:ring-stone-900 rounded-sm">View all</a>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {/* Mood Cards */}
                                {[
                                    { title: 'Minimalist', img: 'https://images.unsplash.com/photo-1550614000-4b95d466f288?w=800&auto=format&fit=crop' },
                                    { title: 'Streetwear', img: 'https://images.unsplash.com/photo-1523398002811-999aa8d9512e?w=800&auto=format&fit=crop' },
                                    { title: 'Workwear', img: 'https://images.unsplash.com/photo-1617137968427-ec561cd9aa22?w=800&auto=format&fit=crop' },
                                    { title: 'Weekend', img: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=800&auto=format&fit=crop' }
                                ].map((mood) => (
                                    <a href="products.html" key={mood.title} className="group relative h-96 rounded-xl overflow-hidden flex items-end justify-center p-6 focus:outline-none focus:ring-4 focus:ring-stone-900 shadow-sm hover:shadow-xl transition-shadow">
                                        <div className="absolute inset-0 w-full h-full">
                                            <div className="absolute inset-0 bg-gradient-to-t from-stone-900/90 via-stone-900/20 to-transparent z-10 transition-opacity group-hover:opacity-70"></div>
                                            <img src={mood.img} alt={`People wearing ${mood.title} style clothing`} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                        </div>
                                        <div className="relative z-20 flex flex-col items-center translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
                                            <h3 className="text-white text-2xl font-serif font-medium tracking-wide mb-2">
                                                {mood.title}
                                            </h3>
                                            <span className="text-stone-200 text-sm font-medium opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center">
                                                Explore <i data-lucide="arrow-right" className="ml-1 w-4 h-4"></i>
                                            </span>
                                        </div>
                                    </a>
                                ))}
                            </div>
                        </section>

                        {/* New Arrivals (Horizontal Scroll) */}
                        <section className="bg-stone-200/50 py-20 border-y border-stone-200">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <div className="flex justify-between items-end mb-10">
                                    <div>
                                        <h2 className="text-3xl md:text-4xl font-serif font-bold text-stone-900 tracking-tight">New Arrivals</h2>
                                        <p className="mt-2 text-stone-500">The latest additions to our sustainable collection.</p>
                                    </div>
                                    <div className="hidden sm:flex space-x-2">
                                        <button className="p-2 rounded-full border border-stone-300 hover:bg-stone-200 focus:outline-none" aria-label="Previous">
                                            <i data-lucide="chevron-left" className="w-5 h-5 text-stone-600"></i>
                                        </button>
                                        <button className="p-2 rounded-full border border-stone-300 hover:bg-stone-200 focus:outline-none" aria-label="Next">
                                            <i data-lucide="chevron-right" className="w-5 h-5 text-stone-600"></i>
                                        </button>
                                    </div>
                                </div>
                                <div className="flex overflow-x-auto space-x-6 pb-8 pt-4 snap-x -mx-4 px-4 sm:mx-0 sm:px-0 scrollbar-hide">
                                    {[
                                        { name: 'Oversized Linen Shirt', price: '$89.00', img: 'https://images.unsplash.com/photo-1596755094514-f87e32f85e2c?w=600&auto=format&fit=crop', stock: 'Low Stock' },
                                        { name: 'Pleated Trousers', price: '$110.00', img: 'https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=600&auto=format&fit=crop' },
                                        { name: 'Merino Wool Beanie', price: '$45.00', img: 'https://images.unsplash.com/photo-1576871337622-98d48d1cf531?w=600&auto=format&fit=crop', stock: 'Just Added' },
                                        { name: 'Organic Cotton Tee', price: '$35.00', img: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600&auto=format&fit=crop' },
                                        { name: 'Canvas Tote Bag', price: '$55.00', img: 'https://images.unsplash.com/photo-1597404294360-feeeda04612e?w=600&auto=format&fit=crop', stock: 'Low Stock' }
                                    ].map((product, idx) => (
                                        <a href="product-detail.html" key={idx} className="block min-w-[280px] w-[280px] sm:min-w-[320px] sm:w-[320px] snap-start group focus:outline-none focus:ring-4 focus:ring-stone-900 rounded-xl">
                                            <div className="relative h-96 bg-stone-100 rounded-xl overflow-hidden mb-4 shadow-sm group-hover:shadow-md transition-shadow">
                                                <img src={product.img} alt={product.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                                {product.stock && (
                                                    <div className="absolute top-4 left-4 bg-white/95 backdrop-blur-md px-3 py-1.5 rounded-full text-xs font-bold tracking-wide text-stone-900 shadow-sm border border-stone-100/50 uppercase">
                                                        {product.stock}
                                                    </div>
                                                )}
                                                <div className="absolute bottom-4 left-0 right-0 px-4 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-4 group-hover:translate-y-0 text-center">
                                                    <span className="inline-block bg-white text-stone-900 font-medium px-6 py-3 rounded-full shadow-lg w-full hover:bg-stone-100 transition-colors">
                                                        Quick View
                                                    </span>
                                                </div>
                                            </div>
                                            <div className="px-1 text-center">
                                                <h3 className="text-base font-medium text-stone-900 group-hover:text-stone-600 transition-colors">{product.name}</h3>
                                                <p className="mt-1 text-sm text-stone-500 font-medium">{product.price}</p>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Brand Story */}
                        <section className="py-24 bg-stone-950 text-stone-50 text-center px-4 relative overflow-hidden">
                            <div className="absolute top-0 right-0 -mt-20 -mr-20 w-80 h-80 bg-stone-800 rounded-full blur-3xl opacity-30 pointer-events-none"></div>
                            <div className="absolute bottom-0 left-0 -mb-20 -ml-20 w-80 h-80 bg-stone-800 rounded-full blur-3xl opacity-30 pointer-events-none"></div>
                            <div className="max-w-3xl mx-auto relative z-10">
                                <i data-lucide="leaf" className="h-12 w-12 mx-auto mb-8 text-stone-400"></i>
                                <h2 className="text-3xl sm:text-5xl font-serif font-bold mb-8">Designed for Tomorrow</h2>
                                <p className="text-lg sm:text-xl text-stone-300 mb-12 leading-relaxed font-light">
                                    ThreadHouse is more than a boutique. We partner with independent designers and sustainable manufacturers to bring you clothing that respects the planet. Every piece is crafted with organic materials, fair trade practices, and a timeless aesthetic meant to outlast passing trends.
                                </p>
                                <a href="#" className="inline-flex items-center px-8 py-4 border border-stone-400 text-base font-medium rounded-full text-stone-50 hover:bg-stone-50 hover:text-stone-900 transition-all focus:outline-none focus:ring-4 focus:ring-stone-500">
                                    Our Mission
                                </a>
                            </div>
                        </section>
                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Homepage />);
    </script>
</body>
</html>
