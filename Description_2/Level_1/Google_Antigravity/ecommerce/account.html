<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | ThreadHouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-900 font-sans antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const Header = () => {
            React.useEffect(() => { lucide.createIcons(); });
            return (
                <header className="sticky top-0 z-50 bg-stone-50/90 backdrop-blur-md border-b border-stone-200 transition-all">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16 sm:h-20">
                        <button className="md:hidden p-2 text-stone-500 hover:text-stone-900 rounded-md focus:ring-2 focus:ring-stone-900"><i data-lucide="menu" className="w-6 h-6"></i></button>
                        <a href="index.html" className="flex-1 flex justify-center md:justify-start flex-shrink-0 focus:ring-2 focus:ring-stone-900 rounded-sm">
                            <span className="font-serif text-2xl sm:text-3xl font-bold tracking-tighter">ThreadHouse.</span>
                        </a>
                        <nav className="hidden md:flex space-x-8">
                            <a href="products.html" className="text-sm font-medium text-stone-500 hover:text-stone-900 focus:underline transition-colors">Shop</a>
                            <a href="products.html" className="text-sm font-medium text-stone-500 hover:text-stone-900 focus:underline transition-colors">New Arrivals</a>
                            <a href="#" className="text-sm font-medium text-stone-500 hover:text-stone-900 focus:underline transition-colors">About</a>
                        </nav>
                        <div className="flex items-center space-x-2 sm:space-x-4">
                            <button className="p-2 text-stone-500 hover:text-stone-900 rounded-full focus:ring-2 focus:ring-stone-900"><i data-lucide="search" className="w-5 h-5"></i></button>
                            <a href="account.html" className="hidden sm:block p-2 text-stone-900 bg-stone-200 rounded-full focus:ring-2 focus:ring-stone-900"><i data-lucide="user" className="w-5 h-5"></i></a>
                            <a href="cart.html" className="relative p-2 text-stone-500 hover:text-stone-900 rounded-full focus:ring-2 focus:ring-stone-900">
                                <i data-lucide="shopping-bag" className="w-5 h-5"></i>
                                <span className="absolute top-1 right-1 flex h-4 w-4 items-center justify-center rounded-full bg-stone-900 text-[10px] font-bold text-white">2</span>
                            </a>
                        </div>
                    </div>
                </header>
            );
        };

        const Footer = () => {
            React.useEffect(() => { lucide.createIcons(); });
            return (
                <footer className="bg-stone-950 text-stone-300 pt-16 pb-8 border-t border-stone-800">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-8 mb-12">
                            <div>
                                <span className="font-serif text-2xl font-bold text-white tracking-tighter block mb-4">ThreadHouse.</span>
                                <p className="text-sm text-stone-400">Sustainable, independently designed clothing.</p>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Shop</h3>
                                <ul className="space-y-3 text-sm">
                                    <li><a href="products.html" className="text-stone-400 hover:text-white">All Products</a></li>
                                    <li><a href="products.html" className="text-stone-400 hover:text-white">New Arrivals</a></li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Support</h3>
                                <ul className="space-y-3 text-sm">
                                    <li><a href="#" className="text-stone-400 hover:text-white">FAQ</a></li>
                                    <li><a href="#" className="text-stone-400 hover:text-white">Shipping</a></li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-xs font-semibold text-white tracking-widest uppercase mb-4">Newsletter</h3>
                                <form className="flex" onSubmit={(e) => e.preventDefault()}>
                                    <input type="email" required className="w-full px-4 py-2 text-sm text-stone-900 bg-white rounded-l-md focus:ring-2 focus:ring-white" placeholder="Email" aria-label="Email address" />
                                    <button type="submit" className="px-4 py-2 text-sm font-medium rounded-r-md text-stone-950 bg-stone-200 hover:bg-white transition-colors">Subscribe</button>
                                </form>
                            </div>
                        </div>
                        <div className="border-t border-stone-800 pt-8 flex justify-between items-center flex-col sm:flex-row gap-4">
                            <p className="text-sm text-stone-500">&copy; 2026 ThreadHouse.</p>
                            <div className="flex space-x-6">
                                <a href="#" className="text-stone-400 hover:text-white"><i data-lucide="instagram" className="w-5 h-5"></i></a>
                                <a href="#" className="text-stone-400 hover:text-white"><i data-lucide="twitter" className="w-5 h-5"></i></a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };

        const AccountPage = () => {
            const [activeTab, setActiveTab] = React.useState('orders');

            React.useEffect(() => { lucide.createIcons(); }, [activeTab]);

            const copyToClipboard = () => {
                navigator.clipboard.writeText('https://threadhouse.com/ref/johndoe22');
                alert('Referral link copied to clipboard!');
            };

            const OrderHistory = () => (
                <div className="space-y-6 animate-fade-in-up">
                    <h2 className="text-2xl font-serif font-bold text-stone-900 tracking-tight mb-6">Order History</h2>

                    {[{
                        id: 'ORD-98231', date: 'March 14, 2026', status: 'Delivered', total: '$145.00', items: [
                            { name: 'Merino Wool Beanie', img: 'https://images.unsplash.com/photo-1576871337622-98d48d1cf531?w=150&auto=format&fit=crop' },
                            { name: 'Ribbed Cotton Socks x2', img: 'https://images.unsplash.com/photo-1582269411985-7140f1a92a7e?w=150&auto=format&fit=crop' }
                        ]
                    }, {
                        id: 'ORD-84511', date: 'January 02, 2026', status: 'Delivered', total: '$210.00', items: [
                            { name: 'Heavyweight Hoodie', img: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=150&auto=format&fit=crop' }
                        ]
                    }].map((order, idx) => (
                        <div key={idx} className="bg-white border border-stone-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                            <div className="bg-stone-50 px-6 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-stone-200">
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 w-full">
                                    <div>
                                        <p className="text-xs font-semibold text-stone-500 uppercase tracking-wider">Order placed</p>
                                        <p className="text-sm font-medium text-stone-900 mt-1">{order.date}</p>
                                    </div>
                                    <div>
                                        <p className="text-xs font-semibold text-stone-500 uppercase tracking-wider">Total</p>
                                        <p className="text-sm font-medium text-stone-900 mt-1">{order.total}</p>
                                    </div>
                                    <div>
                                        <p className="text-xs font-semibold text-stone-500 uppercase tracking-wider">Order Number</p>
                                        <p className="text-sm font-medium text-stone-900 mt-1">{order.id}</p>
                                    </div>
                                    <div className="flex justify-end items-center sm:col-span-1 col-span-2 mt-2 sm:mt-0">
                                        <a href="#" className="text-sm font-medium text-stone-900 border border-stone-300 px-4 py-2 rounded-full hover:bg-stone-100 transition-colors">View Details</a>
                                    </div>
                                </div>
                            </div>
                            <div className="p-6">
                                <div className="flex items-center mb-4">
                                    <i data-lucide="check-circle" className="w-5 h-5 text-green-600 mr-2"></i>
                                    <span className="font-semibold text-stone-900">{order.status}</span>
                                </div>
                                <div className="flex space-x-4">
                                    {order.items.map((item, i) => (
                                        <div key={i} className="group relative">
                                            <div className="w-20 h-24 bg-stone-100 rounded-md overflow-hidden border border-stone-200">
                                                <img src={item.img} alt={item.name} className="w-full h-full object-cover" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );

            const StyleProfile = () => (
                <div className="space-y-6 animate-fade-in-up">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-serif font-bold text-stone-900 tracking-tight">Style Profile</h2>
                        <button className="text-sm font-medium text-stone-600 border border-stone-300 rounded-full px-4 py-2 hover:bg-stone-100 transition-colors">Edit Profile</button>
                    </div>

                    <div className="bg-white border border-stone-200 rounded-xl p-6 shadow-sm">
                        <h3 className="text-sm font-semibold text-stone-500 uppercase tracking-wider mb-4 border-b border-stone-100 pb-2">Measurements & Sizing</h3>
                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-6 mb-8">
                            <div>
                                <p className="text-sm text-stone-500 mb-1">Tops</p>
                                <p className="font-medium text-stone-900 text-lg">Medium (M)</p>
                            </div>
                            <div>
                                <p className="text-sm text-stone-500 mb-1">Bottoms</p>
                                <p className="font-medium text-stone-900 text-lg">32 / 32L</p>
                            </div>
                            <div>
                                <p className="text-sm text-stone-500 mb-1">Shoes</p>
                                <p className="font-medium text-stone-900 text-lg">US 10.5</p>
                            </div>
                            <div>
                                <p className="text-sm text-stone-500 mb-1">Height</p>
                                <p className="font-medium text-stone-900 text-lg">6'0"</p>
                            </div>
                        </div>

                        <h3 className="text-sm font-semibold text-stone-500 uppercase tracking-wider mb-4 border-b border-stone-100 pb-2">Preferred Styles</h3>
                        <div className="flex flex-wrap gap-2 mb-8">
                            {['Minimalist', 'Workwear', 'Monochrome', 'Comfort-first'].map(style => (
                                <span key={style} className="bg-stone-100 text-stone-800 text-sm px-3 py-1 rounded-full border border-stone-200">
                                    {style}
                                </span>
                            ))}
                        </div>

                        <h3 className="text-sm font-semibold text-stone-500 uppercase tracking-wider mb-4 border-b border-stone-100 pb-2">Color Palette</h3>
                        <div className="flex gap-3">
                            {['#242424', '#EAE5D9', '#869485', '#3C4959'].map(color => (
                                <div key={color} className="w-10 h-10 rounded-full border border-stone-300 shadow-sm" style={{ backgroundColor: color }}></div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const Rewards = () => (
                <div className="space-y-6 animate-fade-in-up">
                    <h2 className="text-2xl font-serif font-bold text-stone-900 tracking-tight mb-6">Loyalty Rewards</h2>

                    <div className="bg-stone-900 rounded-2xl p-8 text-white relative overflow-hidden shadow-xl">
                        <div className="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-stone-800 rounded-full opacity-50 blur-2xl"></div>
                        <div className="relative z-10 flex flex-col md:flex-row md:items-center justify-between">
                            <div className="mb-6 md:mb-0">
                                <p className="text-stone-300 font-medium uppercase tracking-widest text-sm mb-2 flex items-center">
                                    <i data-lucide="award" className="w-4 h-4 mr-2 text-yellow-500"></i> Member Tier: Insider
                                </p>
                                <div className="flex items-end space-x-2">
                                    <span className="text-5xl font-serif font-bold tracking-tighter">380</span>
                                    <span className="text-xl text-stone-400 font-medium mb-1">pts</span>
                                </div>
                                <p className="text-sm mt-3 text-stone-300 max-w-sm">Earn 120 more points to unlock the <strong>VIP Tier</strong> and a free organic canvas tote bag.</p>
                            </div>
                            <div className="bg-white/10 backdrop-blur-md border border-white/20 p-5 rounded-xl text-center min-w-[200px]">
                                <p className="text-xs uppercase tracking-wider font-semibold text-stone-300 mb-2">Available Reward</p>
                                <p className="text-3xl font-bold mb-3">$15 Off</p>
                                <button className="w-full bg-white text-stone-900 font-medium rounded-full py-2 hover:bg-stone-100 transition-colors">Redeem Now</button>
                            </div>
                        </div>
                    </div>

                    <h3 className="text-lg font-serif font-bold text-stone-900 mt-8 mb-4">Ways to earn points</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        {[
                            { icon: 'shopping-bag', title: 'Shop', desc: 'Earn 1 point per $1 spent' },
                            { icon: 'instagram', title: 'Follow', desc: '+50 points on Instagram' },
                            { icon: 'star', title: 'Review', desc: '+100 pts with photo review' }
                        ].map(way => (
                            <div key={way.title} className="bg-stone-50 border border-stone-200 rounded-xl p-5 text-center flex flex-col items-center">
                                <div className="bg-white p-3 rounded-full shadow-sm mb-3">
                                    <i data-lucide={way.icon} className="w-6 h-6 text-stone-900"></i>
                                </div>
                                <h4 className="font-semibold text-stone-900 mb-1">{way.title}</h4>
                                <p className="text-sm text-stone-500">{way.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const SavedOutfits = () => (
                <div className="space-y-6 animate-fade-in-up">
                    <h2 className="text-2xl font-serif font-bold text-stone-900 tracking-tight mb-6">Saved Outfits & Items</h2>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {[
                            { name: 'Weekend Coffee Run', img: 'https://images.unsplash.com/photo-1550614000-4b95d466f288?w=800&auto=format&fit=crop', items: 3 },
                            { name: 'Office Casual', img: 'https://images.unsplash.com/photo-1617137968427-ec561cd9aa22?w=800&auto=format&fit=crop', items: 4 }
                        ].map((outfit, idx) => (
                            <div key={idx} className="group relative rounded-xl overflow-hidden aspect-[16/10] shadow-sm border border-stone-200 cursor-pointer">
                                <img src={outfit.img} alt={outfit.name} className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                <div className="absolute inset-0 bg-gradient-to-t from-stone-900/80 via-transparent to-transparent"></div>
                                <div className="absolute bottom-5 left-5 right-5 flex justify-between items-end">
                                    <div>
                                        <h3 className="text-xl font-serif font-medium text-white tracking-wide">{outfit.name}</h3>
                                        <p className="text-sm text-stone-300 mt-1">{outfit.items} items</p>
                                    </div>
                                    <button className="bg-white/20 backdrop-blur-md text-white p-2 rounded-full hover:bg-white hover:text-stone-900 transition-colors focus:outline-none">
                                        <i data-lucide="arrow-right" className="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const Referral = () => (
                <div className="space-y-6 animate-fade-in-up">
                    <h2 className="text-2xl font-serif font-bold text-stone-900 tracking-tight mb-6">Refer a Friend</h2>

                    <div className="bg-blue-50/50 border border-blue-100 rounded-2xl p-8 flex flex-col md:flex-row items-center justify-between shadow-sm">
                        <div className="mb-6 md:mb-0 md:mr-8 md:w-1/2">
                            <div className="bg-blue-100 w-12 h-12 rounded-full flex items-center justify-center mb-4">
                                <i data-lucide="users" className="w-6 h-6 text-blue-600"></i>
                            </div>
                            <h3 className="text-xl font-serif font-bold text-stone-900 mb-2">Give $20, Get $20</h3>
                            <p className="text-stone-600">Share your unique link with friends. They'll get $20 off their first order, and you'll get $20 in store credit when they make a purchase.</p>
                        </div>

                        <div className="w-full md:w-1/2">
                            <label htmlFor="referral-link" className="block text-sm font-medium text-stone-700 mb-2">Your Unique Share Link</label>
                            <div className="flex border border-stone-300 rounded-xl overflow-hidden shadow-sm bg-white focus-within:ring-2 focus-within:ring-stone-900 focus-within:border-stone-900">
                                <input
                                    type="text"
                                    id="referral-link"
                                    readOnly
                                    value="https://threadhouse.com/ref/johndoe22"
                                    className="flex-1 min-w-0 px-4 py-3 text-sm text-stone-500 bg-transparent focus:outline-none"
                                />
                                <button
                                    onClick={copyToClipboard}
                                    className="bg-stone-900 text-white px-5 py-3 text-sm font-medium hover:bg-stone-800 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-stone-900"
                                >
                                    Copy Link
                                </button>
                            </div>
                            <div className="mt-4 flex space-x-3">
                                <button className="flex-1 border border-stone-300 bg-white py-2 rounded-lg text-sm font-medium text-stone-600 hover:bg-stone-50 flex justify-center items-center shadow-sm">
                                    <i data-lucide="mail" className="w-4 h-4 mr-2"></i> Email
                                </button>
                                <button className="flex-1 border border-stone-300 bg-white py-2 rounded-lg text-sm font-medium text-stone-600 hover:bg-stone-50 flex justify-center items-center shadow-sm">
                                    <i data-lucide="twitter" className="w-4 h-4 mr-2 text-[#1DA1F2]"></i> Share
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col bg-stone-50">
                    <Header />

                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full flex flex-col md:flex-row gap-8">

                        {/* Sidebar Navigation */}
                        <aside className="w-full md:w-64 flex-shrink-0">
                            <div className="flex items-center space-x-4 mb-8">
                                <div className="w-14 h-14 bg-stone-300 rounded-full overflow-hidden shadow-inner border-2 border-white">
                                    <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=200&auto=format&fit=crop" alt="User Avatar" className="w-full h-full object-cover" />
                                </div>
                                <div>
                                    <h1 className="font-bold text-stone-900">John Doe</h1>
                                    <p className="text-sm text-stone-500">Insider Tier</p>
                                </div>
                            </div>

                            <nav className="space-y-1">
                                {[
                                    { id: 'orders', label: 'Order History', icon: 'package' },
                                    { id: 'profile', label: 'Style Profile', icon: 'sliders' },
                                    { id: 'rewards', label: 'Loyalty Rewards', icon: 'award' },
                                    { id: 'outfits', label: 'Saved Outfits', icon: 'bookmark' },
                                    { id: 'referral', label: 'Refer a Friend', icon: 'users' },
                                    { id: 'settings', label: 'Account Settings', icon: 'settings' }
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-stone-900 ${activeTab === tab.id ? 'bg-stone-200 text-stone-900' : 'text-stone-600 hover:bg-stone-100 hover:text-stone-900'}`}
                                    >
                                        <i data-lucide={tab.icon} className={`w-5 h-5 mr-3 ${activeTab === tab.id ? 'text-stone-900' : 'text-stone-400'}`}></i>
                                        {tab.label}
                                    </button>
                                ))}
                                <button className="w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg text-red-600 hover:bg-red-50 transition-colors mt-8 focus:outline-none focus:ring-2 focus:ring-red-500">
                                    <i data-lucide="log-out" className="w-5 h-5 mr-3 text-red-400"></i>
                                    Sign Out
                                </button>
                            </nav>
                        </aside>

                        {/* Content Area */}
                        <div className="flex-1 bg-white/50 backdrop-blur-sm rounded-3xl md:border md:border-stone-200 md:shadow-sm md:p-8">
                            {activeTab === 'orders' && <OrderHistory />}
                            {activeTab === 'profile' && <StyleProfile />}
                            {activeTab === 'rewards' && <Rewards />}
                            {activeTab === 'outfits' && <SavedOutfits />}
                            {activeTab === 'referral' && <Referral />}
                            {activeTab === 'settings' && (
                                <div className="space-y-6">
                                    <h2 className="text-2xl font-serif font-bold text-stone-900 tracking-tight">Account Settings</h2>
                                    <p className="text-stone-500">Manage your password, shipping addresses, and payment methods.</p>
                                    <div className="bg-white border border-stone-200 rounded-xl p-6 shadow-sm flex justify-center items-center py-20 text-stone-400">
                                        Settings UI Placeholder
                                    </div>
                                </div>
                            )}
                        </div>

                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AccountPage />);
    </script>
</body>

</html>
