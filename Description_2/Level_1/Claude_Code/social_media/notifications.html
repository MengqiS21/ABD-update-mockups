function Sidebar({ current }) {
  return (
    <nav aria-label="Primary navigation" className="hidden lg:flex flex-col fixed inset-y-0 left-0 w-60 bg-zinc-900 border-r border-zinc-800 z-30 px-3 py-6">

        <div className="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center font-bold text-white text-sm flex-shrink-0" aria-hidden="true">F</div>
        <span className="text-lg font-bold tracking-tight text-white">Folia</span>
      </a>
      <ul className="flex flex-col gap-0.5 flex-1" role="list">
        {NAV.map(({ label, href, icon: Icon, badge }) => {
          const active = current === label;
          return (
            <li key={label}>
              <a href={href} aria-current={active ? 'page' : undefined} aria-label={badge ? `${label} (${badge} unread)` : label}
                className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${active ? 'bg-violet-600/15 text-violet-400' : 'text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800'}`}>
                <Icon />
                <span>{label}</span>
                {badge && <span className="ml-auto bg-violet-600 text-white text-xs font-bold rounded-full min-w-[20px] h-5 flex items-center justify-center px-1" aria-hidden="true">{badge}</span>}

        <IconPlus />New Post
      </a>
    </nav>
  );
}

function MobileNav({ current }) {
  return (
    <nav aria-label="Mobile navigation" className="lg:hidden fixed bottom-0 inset-x-0 bg-zinc-900/95 backdrop-blur border-t border-zinc-800 z-30 flex">
      {NAV.map(({ label, href, icon: Icon, badge }) => {
        const active = current === label;
        return (
          <a key={label} href={href} aria-current={active ? 'page' : undefined} aria-label={badge ? `${label}, ${badge} unread` : label}
            className={`relative flex-1 flex flex-col items-center py-3 gap-0.5 text-[10px] transition-colors ${active ? 'text-violet-400' : 'text-zinc-500'}`}>
            <Icon />
            <span>{label}</span>
            {badge && <span className="absolute top-2 left-1/2 ml-2 bg-violet-600 text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center" aria-hidden="true">{badge}</span>}
          </a>
        );
      })}
    </nav>
  );
}

/* ── Icon Badge ─────────────────────────────────────────────── */
function NotifIcon({ type }) {
  const base = "w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0";
  if (type === 'heart') return <span className={`${base} bg-pink-500/15 text-pink-400`}><IconHeart /></span>;
  if (type === 'bookmark') return <span className={`${base} bg-amber-500/15 text-amber-400`}><IconBookmark /></span>;
  if (type === 'comment') return <span className={`${base} bg-violet-500/15 text-violet-400`}><IconMessageSquare /></span>;
  if (type === 'follow') return <span className={`${base} bg-emerald-500/15 text-emerald-400`}><IconUserPlus /></span>;
  return <span className={`${base} bg-blue-500/15 text-blue-400`}><IconSparkles /></span>;
}

/* ── Notification Row ───────────────────────────────────────── */
function NotifRow({ item }) {
  return (
    <article
      aria-label={`${item.actor}: ${item.text}${item.work ? ` "${item.work}"` : ''}${item.timeAgo ? `, ${item.timeAgo} ago` : ''}`}
      className={`flex items-start gap-3 px-4 py-3.5 border-b border-zinc-800 transition-colors hover:bg-zinc-900/60 ${item.unread ? 'bg-violet-600/5' : ''}`}
    >
      {item.unread && <span className="mt-2 w-2 h-2 bg-violet-500 rounded-full flex-shrink-0" aria-label="Unread" />}
      {!item.unread && <span className="mt-2 w-2 h-2 flex-shrink-0" aria-hidden="true" />}

      <a href="profile.html" aria-label={`View ${item.actor}'s profile`} className="flex-shrink-0">
        <img src={item.actorAvatar} alt={`${item.actor}'s avatar`} className="w-10 h-10 rounded-full object-cover" />
      </a>

      <div className="flex-1 min-w-0">
        <p className="text-sm text-zinc-300 leading-snug">
          <a href="profile.html" className="font-semibold text-zinc-100 hover:text-violet-400 transition-colors">{item.actor}</a>
          {' '}{item.text}{' '}
          {item.work && (
            <a href="profile.html" className="font-semibold text-zinc-100 hover:text-violet-400 transition-colors">'{item.work}'</a>
          )}
          {item.collection && <span className="text-zinc-400"> {item.collection}</span>}
        </p>
        {item.comment && (
          <p className="mt-1 text-xs text-zinc-400 italic">{item.comment}</p>
        )}
        <p className="mt-1 text-xs text-zinc-500">{item.timeAgo} ago</p>
      </div>

      <div className="flex items-center gap-2 flex-shrink-0">
        <NotifIcon type={item.icon || 'sparkles'} />
        {item.workThumb && (
          <a href="profile.html" aria-label={`View ${item.work}`}>
            <img src={item.workThumb} alt={item.workAlt} className="w-11 h-11 rounded-lg object-cover" />
          </a>
        )}
      </div>
    </article>
  );
}

/* ── App ─────────────────────────────────────────────────────── */
function App() {
  const [activeTab, setActiveTab] = useState('Activity');
  const tabs = [
    { label: 'Activity', data: ACTIVITY, count: ACTIVITY.filter(n => n.unread).length },
    { label: 'Feedback Requests', data: FEEDBACK, count: FEEDBACK.filter(n => n.unread).length },
    { label: 'Collections', data: COLLECTIONS, count: COLLECTIONS.filter(n => n.unread).length },
  ];
  const current = tabs.find(t => t.label === activeTab);

  return (
    <div className="min-h-screen flex">
      <Sidebar current="Notifications" />
      <MobileNav current="Notifications" />

      <main id="main-content" className="flex-1 lg:ml-60 max-w-2xl mx-auto w-full pb-24 lg:pb-6">
        <a href="#main-content" className="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-50 focus:bg-violet-600 focus:text-white focus:px-4 focus:py-2 focus:rounded-lg">
          Skip to main content
        </a>

        {/* Header */}
        <div className="sticky top-0 bg-zinc-950/90 backdrop-blur z-10 px-4 pt-6 pb-0 border-b border-zinc-800">
          <div className="flex items-center justify-between mb-4">
            <h1 className="text-xl font-bold text-zinc-100">Notifications</h1>
            <button
              aria-label="Mark all notifications as read"
              className="text-xs text-violet-400 hover:text-violet-300 transition-colors"
            >
              Mark all read
            </button>
          </div>

          {/* Tabs */}
          <div role="tablist" aria-label="Notification categories" className="flex gap-0 overflow-x-auto">
            {tabs.map(({ label, count }) => {
              const active = activeTab === label;
              return (
                <button
                  key={label}
                  role="tab"
                  aria-selected={active}
                  aria-label={count > 0 ? `${label}, ${count} unread` : label}
                  onClick={() => setActiveTab(label)}
                  className={`flex-shrink-0 flex items-center gap-1.5 px-4 py-3 text-sm font-medium border-b-2 transition-colors
                    ${active ? 'border-violet-500 text-violet-400' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`}
                >
                  {label}
                  {count > 0 && (
                    <span className={`text-xs rounded-full px-1.5 py-0.5 font-bold ${active ? 'bg-violet-600 text-white' : 'bg-zinc-800 text-zinc-400'}`}>
                      {count}
                    </span>
                  )}
                </button>
              );
            })}
          </div>
        </div>

        {/* List */}
        <section aria-label={`${activeTab} notifications`} role="tabpanel">
          {current.data.length > 0 ? (
            current.data.map(item => <NotifRow key={item.id} item={item} />)
          ) : (
            <div className="flex flex-col items-center justify-center py-24 text-zinc-500">
              <IconBell />
              <p className="mt-3 text-sm">Nothing here yet</p>
            </div>
          )}
        </section>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
