const NAV = [
  { label: 'Home', href: 'index.html', icon: IconHome },
  { label: 'Explore', href: 'explore.html', icon: IconCompass },

  { label: 'Settings', href: 'settings.html', icon: IconCog },

function Sidebar({ current }) {
  return (
    <nav aria-label="Primary navigation" className="hidden lg:flex flex-col fixed inset-y-0 left-0 w-60 bg-zinc-900 border-r border-zinc-800 z-30 px-3 py-6">
      <a href="index.html" className="flex items-center gap-2.5 px-3 mb-8 rounded-xl" aria-label="Folia — go to home feed">
        <div className="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center font-bold text-white text-sm flex-shrink-0" aria-hidden="true">F</div>
        <span className="text-lg font-bold tracking-tight text-white">Folia</span>
      </a>
      <ul className="flex flex-col gap-0.5 flex-1" role="list">
        {NAV.map(({ label, href, icon: Icon, badge }) => {
          const active = current === label;
          return (
            <li key={label}>
              <a href={href} aria-current={active ? 'page' : undefined} aria-label={badge ? `${label} (${badge} unread)` : label}
                className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${active ? 'bg-violet-600/15 text-violet-400' : 'text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800'}`}>
                <Icon />
                <span>{label}</span>
                {badge && <span className="ml-auto bg-violet-600 text-white text-xs font-bold rounded-full min-w-[20px] h-5 flex items-center justify-center px-1" aria-hidden="true">{badge}</span>}
              </a>
            </li>
          );
        })}

      <a href="index.html#composer" className="flex items-center justify-center gap-2 mt-4 bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold rounded-xl px-4 py-3 transition-colors">
        <IconPlus />New Post
      </a>
    </nav>
  );
}

function MobileNav({ current }) {
  return (
    <nav aria-label="Mobile navigation" className="lg:hidden fixed bottom-0 inset-x-0 bg-zinc-900/95 backdrop-blur border-t border-zinc-800 z-30 flex">
      {NAV.map(({ label, href, icon: Icon, badge }) => {
        const active = current === label;
        return (
          <a key={label} href={href} aria-current={active ? 'page' : undefined} aria-label={badge ? `${label}, ${badge} unread` : label}
            className={`relative flex-1 flex flex-col items-center py-3 gap-0.5 text-[10px] transition-colors ${active ? 'text-violet-400' : 'text-zinc-500'}`}>
            <Icon />
            <span>{label}</span>
            {badge && <span className="absolute top-2 left-1/2 ml-2 bg-violet-600 text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center" aria-hidden="true">{badge}</span>}
          </a>
        );
      })}
    </nav>
  );
}

/* ── Project Tile ─────────────────────────────────────────────── */
function ProjectTile({ project, featured }) {
  return (
    <a
      href="#"
      aria-label={`${project.title} — ${project.medium}. ${project.views} views, ${project.appreciations} appreciations`}
      className="tile relative block rounded-2xl overflow-hidden bg-zinc-800 group"
    >
      <img
        src={`https://picsum.photos/seed/${project.seed}/${featured ? '600/400' : '400/400'}`}
        alt={project.imageAlt}
        className={`w-full object-cover transition-transform duration-300 group-hover:scale-105 ${featured ? 'aspect-[3/2]' : 'aspect-square'}`}
        loading="lazy"
      />
      {featured && (
        <span className="absolute top-3 left-3 flex items-center gap-1 bg-black/60 text-yellow-400 text-xs font-semibold px-2.5 py-1 rounded-full">
          <IconPin />
          Featured
        </span>
      )}
      <div className="tile-overlay absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent flex flex-col justify-end p-3">
        <p className="text-sm font-semibold text-white">{project.title}</p>
        <p className="text-xs text-zinc-300 mt-0.5">{project.medium}</p>
        <div className="flex items-center gap-3 mt-1.5 text-xs text-zinc-300">
          <span className="flex items-center gap-1"><IconEye />{project.views}</span>
          <span className="flex items-center gap-1"><IconHeart />{project.appreciations}</span>
        </div>
      </div>
    </a>
  );
}

            <div role="tabpanel" aria-label="About" className="max-w-xl space-y-6">
              <section aria-labelledby="about-bio">
                <h2 id="about-bio" className="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-2">Bio</h2>
                <p className="text-sm text-zinc-300 leading-relaxed">{PROFILE.bio}</p>
              </section>
              <section aria-labelledby="about-mediums">
                <h2 id="about-mediums" className="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-2">Mediums</h2>
                <div className="flex flex-wrap gap-2">
                  {PROFILE.mediums.map(m => (
                    <span key={m} className="text-sm text-violet-400 bg-violet-600/10 border border-violet-600/20 px-3 py-1 rounded-xl">{m}</span>
                  ))}
                </div>
              </section>
              <section aria-labelledby="about-tools">
                <h2 id="about-tools" className="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-2">Tools</h2>
                <div className="flex flex-wrap gap-2">
                  {PROFILE.worksWith.map(t => (
                    <span key={t} className="text-sm text-zinc-300 bg-zinc-800 border border-zinc-700 px-3 py-1 rounded-xl">{t}</span>
                  ))}
                </div>
              </section>
              <section aria-labelledby="about-commission">
                <h2 id="about-commission" className="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-2">Commission Status</h2>
                <div className="flex items-center gap-3">
                  <span className="flex items-center gap-2 bg-emerald-600/15 border border-emerald-600/30 text-emerald-400 text-sm font-semibold px-4 py-2 rounded-xl">
                    <span className="w-2 h-2 bg-emerald-400 rounded-full" aria-hidden="true" />
                    Open for Work
                  </span>
                  <span className="text-xs text-zinc-500">Available for editorial, brand &amp; personal projects</span>
                </div>
              </section>
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
