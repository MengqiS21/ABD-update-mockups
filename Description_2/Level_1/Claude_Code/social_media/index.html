/* ── Shared Sidebar ─────────────────────────────────────────── */
function Sidebar({ current }) {
  return (
    <nav aria-label="Primary navigation" className="hidden lg:flex flex-col fixed inset-y-0 left-0 w-60 bg-zinc-900 border-r border-zinc-800 z-30 px-3 py-6">
      <a href="index.html" className="flex items-center gap-2.5 px-3 mb-8 rounded-xl" aria-label="Folia — go to home feed">
        <div className="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center font-bold text-white text-sm flex-shrink-0" aria-hidden="true">F</div>
        <span className="text-lg font-bold tracking-tight text-white">Folia</span>
      </a>
      <ul className="flex flex-col gap-0.5 flex-1" role="list">
        {NAV.map(({ label, href, icon: Icon, badge }) => {
          const active = current === label;
          return (
            <li key={label}>
              <a
                href={href}
                aria-current={active ? 'page' : undefined}
                aria-label={badge ? `${label} (${badge} unread)` : label}
                className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors duration-150
                  ${active ? 'bg-violet-600/15 text-violet-400' : 'text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800'}`}
              >
                <Icon />
                <span>{label}</span>
                {badge && (
                  <span className="ml-auto bg-violet-600 text-white text-xs font-bold rounded-full min-w-[20px] h-5 flex items-center justify-center px-1" aria-hidden="true">
                    {badge}
                  </span>
                )}
              </a>
            </li>
          );
        })}
      </ul>
      <a
        href="#composer"
        className="flex items-center justify-center gap-2 mt-4 bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white text-sm font-semibold rounded-xl px-4 py-3 transition-colors"
        aria-label="Create a new post"
      >
        <IconPlus />
        New Post
      </a>
    </nav>
  );
}

/* ── Shared Mobile Nav ──────────────────────────────────────── */
function MobileNav({ current }) {
  return (
    <nav aria-label="Mobile navigation" className="lg:hidden fixed bottom-0 inset-x-0 bg-zinc-900/95 backdrop-blur border-t border-zinc-800 z-30 flex safe-area-bottom">
      {NAV.map(({ label, href, icon: Icon, badge }) => {
        const active = current === label;
        return (
          <a
            key={label}
            href={href}
            aria-current={active ? 'page' : undefined}
            aria-label={badge ? `${label}, ${badge} unread` : label}
            className={`relative flex-1 flex flex-col items-center py-3 gap-0.5 text-[10px] transition-colors
              ${active ? 'text-violet-400' : 'text-zinc-500'}`}
          >
            <Icon />
            <span>{label}</span>
            {badge && (
              <span className="absolute top-2 left-1/2 ml-2 bg-violet-600 text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center" aria-hidden="true">
                {badge}
              </span>
            )}
          </a>
        );
      })}
    </nav>
  );
}

/* ── Composer ───────────────────────────────────────────────── */
function Composer() {
  const [text, setText] = useState('');
  const [tags, setTags] = useState('');
  const [focused, setFocused] = useState(false);
  const textId = useId();
  const tagId = useId();

  const handleSubmit = (e) => {
    e.preventDefault();
    setText('');
    setTags('');
    setFocused(false);
    alert('Post shared! (demo)');
  };

  return (
    <section aria-label="Create a new post" className="bg-zinc-900 rounded-2xl border border-zinc-800 p-4 mb-4">
      <h2 className="sr-only">Share Your Work</h2>
      <form onSubmit={handleSubmit}>
        <div className="flex gap-3 items-start">
          <img
            src="https://picsum.photos/seed/myavatar/40/40"
            alt="Your avatar"
            className="w-10 h-10 rounded-full flex-shrink-0 object-cover"
          />
          <div className="flex-1 min-w-0">
            <label htmlFor={textId} className="sr-only">What are you working on?</label>
            <textarea
              id={textId}
              value={text}
              onChange={e => setText(e.target.value)}
              onFocus={() => setFocused(true)}
              placeholder="Share your work-in-progress…"
              rows={focused ? 3 : 1}
              className="w-full bg-zinc-800 text-zinc-100 placeholder-zinc-500 rounded-xl px-4 py-2.5 text-sm resize-none border border-zinc-700 focus:border-violet-500 focus:outline-none transition-all"
              aria-label="Post caption"
            />
            {focused && (
              <div className="mt-2 space-y-2">
                <div className="flex items-center gap-2">
                  <label htmlFor={tagId} className="sr-only">Add skill tags</label>
                  <IconTag cls="text-zinc-500 flex-shrink-0" />
                  <input
                    id={tagId}
                    type="text"
                    value={tags}
                    onChange={e => setTags(e.target.value)}
                    placeholder="Add skills: #illustration #procreate"
                    className="flex-1 bg-zinc-800 text-zinc-100 placeholder-zinc-500 rounded-lg px-3 py-2 text-sm border border-zinc-700 focus:border-violet-500 focus:outline-none"
                  />
                </div>
                <div className="flex items-center justify-between pt-1">
                  <label className="flex items-center gap-2 cursor-pointer text-zinc-400 hover:text-zinc-200 text-sm transition-colors">
                    <input type="file" accept="image/*" className="sr-only" aria-label="Upload image" />
                    <IconPhoto />
                    <span>Add Image</span>
                  </label>
                  <button
                    type="submit"
                    className="bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold px-5 py-2 rounded-xl transition-colors"
                  >
                    Share
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      </form>
    </section>
  );
}

/* ── Feed Toggle ────────────────────────────────────────────── */
function FeedToggle({ active, setActive }) {
  return (
    <div role="tablist" aria-label="Feed filter" className="flex bg-zinc-900 border border-zinc-800 rounded-xl p-1 mb-4">
      {['For You', 'Following'].map(tab => (
        <button
          key={tab}
          role="tab"
          aria-selected={active === tab}
          onClick={() => setActive(tab)}
          className={`flex-1 py-2 text-sm font-medium rounded-lg transition-colors
            ${active === tab ? 'bg-zinc-700 text-zinc-100' : 'text-zinc-400 hover:text-zinc-200'}`}
        >
          {tab}
        </button>
      ))}
    </div>
  );
}

function PostCard({ post }) {
  const [appreciated, setAppreciated] = useState(false);
  const [collected, setCollected] = useState(false);
  const [appreciations, setAppreciations] = useState(post.appreciations);
  const [collections, setCollections] = useState(post.collections);

  const handleAppreciate = () => {
    setAppreciated(p => !p);
    setAppreciations(n => n + (appreciated ? -1 : 1));
  };
  const handleCollect = () => {
    setCollected(p => !p);
    setCollections(n => n + (collected ? -1 : 1));
  };

  return (
    <article aria-label={`Post: ${post.title} by ${post.author}`} className="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden mb-4">
      {/* Author row */}
      <div className="flex items-center gap-3 px-4 pt-4 pb-3">
        <a href="profile.html" aria-label={`View ${post.author}'s profile`}>
          <img src={post.avatar} alt={`${post.author}'s avatar`} className="w-10 h-10 rounded-full object-cover" />
        </a>
        <div className="flex-1 min-w-0">
          <div className="flex items-baseline gap-2 flex-wrap">
            <a href="profile.html" className="font-semibold text-sm text-zinc-100 hover:text-violet-400 transition-colors">
              {post.author}
            </a>
            <span className="text-xs text-zinc-500">{post.handle}</span>
          </div>
          <div className="flex items-center gap-2 mt-0.5">
            <span className="text-xs text-violet-400 bg-violet-600/10 px-2 py-0.5 rounded-full">{post.discipline}</span>
            <span className="text-xs text-zinc-500">{post.timeAgo} ago</span>
          </div>
        </div>
      </div>

      {/* Image */}
      <a href="profile.html" aria-label={`View full post: ${post.title}`}>
        <img
          src={post.image}
          alt={post.imageAlt}
          className="w-full object-cover max-h-[480px]"
          loading="lazy"
        />
      </a>

      {/* Caption */}
      <div className="px-4 pt-3 pb-2">
        <p className="text-sm font-semibold text-zinc-100 mb-1">{post.title}</p>
        <p className="text-sm text-zinc-400 leading-relaxed">{post.caption}</p>
        <div className="flex flex-wrap gap-1.5 mt-2">
          {post.tags.map(tag => (
            <a key={tag} href="explore.html" className="text-xs text-violet-400 hover:text-violet-300 transition-colors">
              {tag}
            </a>
          ))}
        </div>
      </div>

      {/* Engagement bar */}
      <div className="flex items-center gap-1 px-3 pb-3 pt-1 border-t border-zinc-800 mt-2">
        <button
          onClick={handleAppreciate}
          aria-pressed={appreciated}
          aria-label={`${appreciated ? 'Remove appreciation from' : 'Appreciate'} ${post.title}. ${appreciations} appreciations`}
          className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium transition-colors
            ${appreciated ? 'text-pink-400 bg-pink-500/10' : 'text-zinc-400 hover:text-pink-400 hover:bg-pink-500/10'}`}
        >
          <IconHeart filled={appreciated} />
          <span>{appreciations.toLocaleString()}</span>
          <span className="hidden sm:inline">Appreciate</span>
        </button>
        <button
          onClick={handleCollect}
          aria-pressed={collected}
          aria-label={`${collected ? 'Remove from collection' : 'Collect'} ${post.title}. ${collections} collections`}
          className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium transition-colors
            ${collected ? 'text-amber-400 bg-amber-500/10' : 'text-zinc-400 hover:text-amber-400 hover:bg-amber-500/10'}`}
        >
          <IconBookmark filled={collected} />
          <span>{collections.toLocaleString()}</span>
          <span className="hidden sm:inline">Collect</span>
        </button>
        <button
          aria-label={`Comment on ${post.title}. ${post.comments} comments`}
          className="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium text-zinc-400 hover:text-violet-400 hover:bg-violet-500/10 transition-colors"
        >
          <IconChat />
          <span>{post.comments}</span>
          <span className="hidden sm:inline">Comment</span>
        </button>
        <button
          aria-label={`Share ${post.title}`}
          className="ml-auto flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors"
        >
          <IconShare />
          <span className="hidden sm:inline">Share</span>
        </button>
      </div>
    </article>
  );
}

/* ── Right Panel ────────────────────────────────────────────── */
