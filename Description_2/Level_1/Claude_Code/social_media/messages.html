function Sidebar({ current }) {

              <a href={href} aria-current={active ? 'page' : undefined} aria-label={badge ? `${label} (${badge} unread)` : label}

function MobileNav({ current }) {

        return (
          <a key={label} href={href} aria-current={active ? 'page' : undefined} aria-label={badge ? `${label}, ${badge} unread` : label}
            className={`relative flex-1 flex flex-col items-center py-3 gap-0.5 text-[10px] transition-colors ${active ? 'text-violet-400' : 'text-zinc-500'}`}>

          </a>
        );
      })}
    </nav>
  );
}

/* ── Thread List Item ─────────────────────────────────────────── */
function ThreadItem({ thread, active, onClick }) {
  return (
    <button
      onClick={onClick}
      aria-selected={active}
      aria-label={`${thread.name}${thread.unread ? `, ${thread.unread} unread messages` : ''} — ${thread.lastMsg}`}
      className={`w-full flex items-center gap-3 px-4 py-3.5 text-left transition-colors border-b border-zinc-800
        ${active ? 'bg-violet-600/10' : 'hover:bg-zinc-900/60'}`}
    >
      <div className="relative flex-shrink-0">
        <img src={thread.avatar} alt={`${thread.name}'s avatar`} className="w-11 h-11 rounded-full object-cover" />
        {thread.online && (
          <span className="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 rounded-full border-2 border-zinc-950" aria-label="Online" />
        )}
        {thread.type === 'collab' && (
          <span className="absolute -bottom-1 -right-1 bg-violet-600 rounded-full p-0.5" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" className="w-2.5 h-2.5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M4.5 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM14.25 8.625a3.375 3.375 0 1 1 6.75 0 3.375 3.375 0 0 1-6.75 0ZM1.5 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM17.25 19.128l-.001.144a2.25 2.25 0 0 1-.233.96 10.088 10.088 0 0 0 5.06-1.01.75.75 0 0 0 .42-.643 4.875 4.875 0 0 0-6.957-4.611 8.586 8.586 0 0 1 1.71 5.157v.003Z" /></svg>
          </span>
        )}
      </div>
      <div className="flex-1 min-w-0">
        <div className="flex items-baseline justify-between gap-2">
          <span className={`text-sm font-semibold truncate ${active ? 'text-violet-400' : 'text-zinc-100'}`}>{thread.name}</span>
          <span className="text-xs text-zinc-500 flex-shrink-0">{thread.timeAgo}</span>
        </div>
        <p className="text-xs text-zinc-400 truncate mt-0.5">{thread.lastMsg}</p>
      </div>

/* ── Message Bubble ──────────────────────────────────────────── */
function Bubble({ msg, threadType }) {
  const isMe = msg.from === 'me';
  return (
    <div className={`flex items-end gap-2 ${isMe ? 'flex-row-reverse' : 'flex-row'}`}>
      <div className={`max-w-[72%] ${isMe ? 'items-end' : 'items-start'} flex flex-col gap-1`}>
        {!isMe && threadType === 'collab' && (
          <span className="text-xs text-zinc-500 px-1">{msg.from}</span>
        )}
        {msg.image && (
          <a href={msg.image} aria-label="View shared image in full size" target="_blank" rel="noopener noreferrer">
            <img src={msg.image} alt={msg.imageAlt} className="rounded-2xl max-w-[280px] w-full object-cover" />
          </a>
        )}
        {msg.text && (
          <div className={`px-4 py-2.5 rounded-2xl text-sm leading-relaxed
            ${isMe
              ? 'bg-violet-600 text-white rounded-br-sm'
              : 'bg-zinc-800 text-zinc-100 rounded-bl-sm'}`}
          >
            {msg.text}
          </div>
        )}
        <div className={`flex items-center gap-1 text-xs text-zinc-500 ${isMe ? 'flex-row-reverse' : ''}`}>
          <span>{msg.time}</span>
          {isMe && (
            <span className={msg.read ? 'text-violet-400' : 'text-zinc-500'} aria-label={msg.read ? 'Read' : 'Sent'}>
              <IconDoubleCheck />
            </span>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Conversation Panel ──────────────────────────────────────── */
function ConversationPanel({ thread }) {
  const [inputText, setInputText] = useState('');
  const bottomRef = useRef(null);
  const inputId = useId();

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [thread.id]);

  const handleSend = (e) => {
    e.preventDefault();
    if (inputText.trim()) {
      setInputText('');
    }
  };

  return (
    <div className="flex flex-col h-full">
      {/* Header */}
      <div className="flex items-center gap-3 px-4 py-3.5 border-b border-zinc-800 flex-shrink-0">
        <div className="relative">
          <img src={thread.avatar} alt={`${thread.name}'s avatar`} className="w-10 h-10 rounded-full object-cover" />
          {thread.online && <span className="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 rounded-full border-2 border-zinc-950" aria-label="Online" />}
        </div>
        <div>
          <p className="font-semibold text-sm text-zinc-100">{thread.name}</p>
          <p className="text-xs text-zinc-500">{thread.online ? 'Active now' : 'Offline'}</p>
        </div>
      </div>

      {/* Messages */}
      <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3" role="log" aria-label={`Conversation with ${thread.name}`} aria-live="polite">
        {thread.messages.map(msg => (
          <Bubble key={msg.id} msg={msg} threadType={thread.type} />
        ))}
        <div ref={bottomRef} />
      </div>

      {/* Share Project shortcut */}
      <div className="px-4 py-2 border-t border-zinc-800">
        <button
          aria-label="Share a project in this conversation"
          className="flex items-center gap-2 text-xs text-violet-400 bg-violet-600/10 border border-violet-600/20 hover:bg-violet-600/20 rounded-xl px-3 py-2 transition-colors"
        >
          <IconFolder />
          Share a Project
        </button>
      </div>

      {/* Composer */}
      <form onSubmit={handleSend} className="flex items-center gap-3 px-4 pb-4 pt-2 flex-shrink-0">
        <label htmlFor={inputId} className="sr-only">Message {thread.name}</label>
        <button type="button" aria-label="Share an image" className="text-zinc-500 hover:text-zinc-300 flex-shrink-0 transition-colors">
          <IconPhoto />
        </button>
        <input
          id={inputId}
          type="text"
          value={inputText}
          onChange={e => setInputText(e.target.value)}
          placeholder={`Message ${thread.name}…`}
          className="flex-1 bg-zinc-800 border border-zinc-700 text-zinc-100 placeholder-zinc-500 rounded-xl px-4 py-2.5 text-sm focus:border-violet-500 focus:outline-none"
          aria-label={`Type a message to ${thread.name}`}
        />
        <button
          type="submit"
          disabled={!inputText.trim()}
          aria-label="Send message"
          className="flex-shrink-0 bg-violet-600 hover:bg-violet-500 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-xl p-2.5 transition-colors"
        >
          <IconSend />
        </button>
      </form>
    </div>
  );
}

/* ── App ─────────────────────────────────────────────────────── */
function App() {
  const [activeId, setActiveId] = useState(1);
  const [showPanel, setShowPanel] = useState(false);
  const activeThread = THREADS.find(t => t.id === activeId);

  const selectThread = (id) => {
    setActiveId(id);
    setShowPanel(true);
  };

  return (
    <div className="min-h-screen flex">
      <Sidebar current="Messages" />
      <MobileNav current="Messages" />

      <main id="main-content" className="flex-1 lg:ml-60 flex pb-16 lg:pb-0" style={{ height: '100vh' }}>
        <a href="#main-content" className="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-50 focus:bg-violet-600 focus:text-white focus:px-4 focus:py-2 focus:rounded-lg">
          Skip to main content
        </a>

        {/* Thread list */}
        <div className={`flex-shrink-0 w-full md:w-80 border-r border-zinc-800 flex flex-col ${showPanel ? 'hidden md:flex' : 'flex'}`}>
          <div className="px-4 pt-6 pb-4 flex-shrink-0">
            <h1 className="text-xl font-bold text-zinc-100">Messages</h1>
            <p className="text-xs text-zinc-500 mt-0.5">Creative collaborations &amp; DMs</p>
          </div>
          <div
            role="listbox"
            aria-label="Conversations"
            className="flex-1 overflow-y-auto"
          >
            {THREADS.map(thread => (
              <ThreadItem
                key={thread.id}
                thread={thread}
                active={thread.id === activeId}
                onClick={() => selectThread(thread.id)}
              />
            ))}
          </div>
        </div>

        {/* Conversation */}
        <div className={`flex-1 flex flex-col ${showPanel ? 'flex' : 'hidden md:flex'}`}>
          {activeThread ? (
            <>
              {/* Back button on mobile */}
              <button
                onClick={() => setShowPanel(false)}
                aria-label="Back to conversations list"
                className="md:hidden flex items-center gap-2 px-4 pt-4 pb-2 text-sm text-violet-400 hover:text-violet-300"
              >
                ← Back
              </button>
              <ConversationPanel thread={activeThread} />
            </>
          ) : (
            <div className="flex-1 flex items-center justify-center text-zinc-500">
              <p className="text-sm">Select a conversation to start messaging</p>
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
