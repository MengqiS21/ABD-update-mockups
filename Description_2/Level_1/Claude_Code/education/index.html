/* ── Path Quiz ────────────────────────────────────────────────── */
const QUIZ_STEPS = [
  {
    q: 'What best describes your current situation?',
    options: ['Currently employed, seeking career change', 'Recently unemployed or laid off', 'Just graduated, entering workforce', 'Returning to work after a break'],
  },
  {
    q: 'What is your primary goal?',
    options: ['Higher pay in a new field', 'More stable / predictable work', 'Work in healthcare', 'Work remotely or flexibly'],
  },
  {
    q: 'How much time can you commit per week?',
    options: ['Under 5 hours', '5–10 hours', '10–20 hours', '20+ hours'],
  },
];

function PathQuiz() {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [done, setDone] = useState(false);
  const current = QUIZ_STEPS[step];

  const select = (opt) => {
    const next = [...answers, opt];
    setAnswers(next);
    if (step < QUIZ_STEPS.length - 1) { setStep(s => s + 1); }
    else { setDone(true); }
  };

  return (
    <section id="quiz" aria-labelledby="quiz-heading" className="bg-indigo-950 text-white py-16">
      <div className="max-w-2xl mx-auto px-4 sm:px-6 text-center">
        <p className="font-body text-indigo-300 text-xs uppercase tracking-widest font-semibold mb-2">3-Question Quiz</p>
        <h2 id="quiz-heading" className="font-display text-3xl font-extrabold mb-3">Find Your Path</h2>
        <p className="font-body text-indigo-300 mb-8">Answer 3 quick questions and we'll recommend the right program for you.</p>

        {!done ? (
          <div aria-live="polite" aria-atomic="true">
            {/* Progress */}
            <div className="flex gap-1.5 justify-center mb-8" role="group" aria-label={`Step ${step + 1} of ${QUIZ_STEPS.length}`}>
              {QUIZ_STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 rounded-full transition-all ${i <= step ? 'bg-orange-400' : 'bg-indigo-700'} ${i === step ? 'w-8' : 'w-4'}`} aria-hidden="true" />
              ))}
            </div>
            <p className="font-display text-xl font-bold mb-6">{current.q}</p>
            <div className="grid gap-3">
              {current.options.map(opt => (
                <button key={opt} onClick={() => select(opt)}
                  className="font-body text-sm text-left px-5 py-3.5 bg-indigo-800/60 hover:bg-indigo-700 border border-indigo-700 rounded-xl transition-colors text-indigo-100 hover:text-white">
                  {opt}
                </button>
              ))}
            </div>
          </div>
        ) : (
          <div aria-live="polite" aria-atomic="true">
            <div className="text-6xl mb-4" aria-hidden="true">🎯</div>
            <p className="font-display text-xl font-bold mb-2">We've got a match!</p>
            <p className="font-body text-indigo-200 mb-6">Based on your answers, we recommend the <strong className="text-white">Medical Administrative Assistant Certificate</strong> — perfect for flexible scheduling and in-demand healthcare work.</p>
            <div className="flex flex-col sm:flex-row gap-3 justify-center">
              <a href="course-detail.html" className="font-display font-bold bg-orange-500 hover:bg-orange-400 text-white px-6 py-3 rounded-xl transition-colors">
                View Recommended Course
              </a>
              <a href="courses.html" className="font-body border border-indigo-500 text-indigo-200 hover:bg-indigo-800 px-6 py-3 rounded-xl transition-colors">
                Browse All Programs
              </a>
            </div>
            <button onClick={() => { setStep(0); setAnswers([]); setDone(false); }} className="font-body text-sm text-indigo-400 hover:text-indigo-200 mt-4 underline">
              Retake quiz
            </button>
          </div>
        )}
      </div>
    </section>
  );
}

              ))}
            </div>
            <div className="flex gap-2">
