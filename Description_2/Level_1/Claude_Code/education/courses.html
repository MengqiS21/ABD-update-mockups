const NAV_LINKS = [

          <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center" aria-hidden="true"><span className="text-white font-bold text-sm font-display">SF</span></div>
          <span className="font-display font-bold text-lg text-slate-900">SkillForge</span>
        </a>
        <nav aria-label="Primary navigation" className="hidden md:flex items-center gap-1">
          {NAV_LINKS.map(({ label, href }) => (
            <a key={label} href={href} aria-current={label === 'Explore Courses' ? 'page' : undefined}
              className={`px-3 py-2 text-sm font-medium rounded-lg transition-colors ${label === 'Explore Courses' ? 'text-indigo-600 bg-indigo-50 font-semibold' : 'text-slate-600 hover:text-indigo-600 hover:bg-indigo-50'}`}>{label}</a>
          ))}

        <div className="flex items-center gap-3">
          <a href="dashboard.html" className="hidden sm:block text-sm font-medium text-slate-600 hover:text-indigo-600 px-3 py-2 rounded-lg">Sign In</a>

}

function Footer() {
  return (
    <footer className="bg-slate-900 text-slate-400 py-10 mt-10">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center" aria-hidden="true"><span className="text-white font-bold text-xs font-display">SF</span></div>
          <span className="font-display font-bold text-white">SkillForge</span>
        </div>
        <nav aria-label="Footer navigation" className="flex flex-wrap gap-x-6 gap-y-2 text-sm justify-center">
          {['Homepage', 'Pricing', 'Dashboard', 'About', 'Accessibility'].map(l => (
            <a key={l} href={l === 'Homepage' ? 'index.html' : l === 'Pricing' ? 'pricing.html' : l === 'Dashboard' ? 'dashboard.html' : '#'} className="hover:text-white transition-colors">{l}</a>
          ))}
        </nav>
        <p className="font-body text-xs text-slate-500">© 2026 SkillForge. Accredited by ACCET.</p>
      </div>
    </footer>
  );
}

/* ── Course Data ─────────────────────────────────────────────── */

  { id: 1, title: 'Medical Administrative Assistant Certificate', field: 'Healthcare', format: 'Cohort', duration: '8 weeks', hours: 120, cost: 349, credential: 'Certificate', startDate: 'Mar 3', rating: 4.9, enrolled: 1240, hot: true, href: 'course-detail.html', img: 'https://picsum.photos/seed/medadmin/400/240', imgAlt: 'Medical office administrator working at a computer with patient files visible on screen' },
  { id: 2, title: 'IT Support Specialist Certificate', field: 'IT', format: 'Cohort', duration: '12 weeks', hours: 180, cost: 499, credential: 'Certificate', startDate: 'Mar 10', rating: 4.8, enrolled: 2180, hot: true, href: 'course-detail.html', img: 'https://picsum.photos/seed/itsupport/400/240', imgAlt: 'IT technician troubleshooting a computer system in an office environment' },
  { id: 3, title: 'QuickBooks & Bookkeeping Professional', field: 'Business', format: 'Self-Paced', duration: '6 weeks', hours: 60, cost: 199, credential: 'Certificate', startDate: 'Anytime', rating: 4.7, enrolled: 3890, hot: false, href: 'course-detail.html', img: 'https://picsum.photos/seed/bookkeeping/400/240', imgAlt: 'Accountant reviewing financial spreadsheets and using bookkeeping software' },
  { id: 4, title: 'HVAC Fundamentals & EPA 608 Prep', field: 'Trades', format: 'Live Online', duration: '16 weeks', hours: 240, cost: 599, credential: 'Certificate', startDate: 'Mar 17', rating: 4.9, enrolled: 890, hot: false, href: 'course-detail.html', img: 'https://picsum.photos/seed/hvac/400/240', imgAlt: 'HVAC technician installing air conditioning unit on a rooftop' },
  { id: 5, title: 'Pharmacy Technician Certification Prep', field: 'Healthcare', format: 'Cohort', duration: '10 weeks', hours: 150, cost: 399, credential: 'Certificate', startDate: 'Mar 24', rating: 4.8, enrolled: 1020, hot: false, href: 'course-detail.html', img: 'https://picsum.photos/seed/pharmacy/400/240', imgAlt: 'Pharmacy technician organizing medications behind a pharmacy counter' },
  { id: 6, title: 'Project Management Essentials', field: 'Business', format: 'Self-Paced', duration: '8 weeks', hours: 80, cost: 0, credential: 'Badge', startDate: 'Anytime', rating: 4.6, enrolled: 8400, hot: false, href: 'course-detail.html', img: 'https://picsum.photos/seed/projmgmt/400/240', imgAlt: 'Team members collaborating around a project management board with sticky notes' },
  { id: 7, title: 'Medical Coding & Billing Specialist', field: 'Healthcare', format: 'Cohort', duration: '12 weeks', hours: 160, cost: 449, credential: 'Certificate', startDate: 'Apr 7', rating: 4.8, enrolled: 760, hot: true, href: 'course-detail.html', img: 'https://picsum.photos/seed/medcoding/400/240', imgAlt: 'Medical coder reviewing billing documents and ICD codes at a desk' },
  { id: 8, title: 'Customer Success & CRM Professional', field: 'Business', format: 'Self-Paced', duration: '6 weeks', hours: 50, cost: 249, credential: 'Badge', startDate: 'Anytime', rating: 4.5, enrolled: 2100, hot: false, href: 'course-detail.html', img: 'https://picsum.photos/seed/crm/400/240', imgAlt: 'Customer service professional on a headset reviewing CRM software on dual monitors' },
  { id: 9, title: 'Electrical Wiring Fundamentals', field: 'Trades', format: 'Live Online', duration: '14 weeks', hours: 210, cost: 549, credential: 'Certificate', startDate: 'Apr 14', rating: 4.7, enrolled: 430, hot: false, href: 'course-detail.html', img: 'https://picsum.photos/seed/electrical/400/240', imgAlt: 'Electrician working with wiring in an electrical panel' },
  { id: 10, title: 'CompTIA A+ Exam Bootcamp', field: 'IT', format: 'Cohort', duration: '8 weeks', hours: 120, cost: 399, credential: 'Certificate', startDate: 'Mar 17', rating: 4.9, enrolled: 3200, hot: true, href: 'course-detail.html', img: 'https://picsum.photos/seed/comptia/400/240', imgAlt: 'Student studying for CompTIA certification exam with textbooks and practice materials' },
  { id: 11, title: 'Medical Billing Free Starter Course', field: 'Healthcare', format: 'Self-Paced', duration: '2 weeks', hours: 20, cost: 0, credential: 'Badge', startDate: 'Anytime', rating: 4.4, enrolled: 12000, hot: false, href: 'course-detail.html', img: 'https://picsum.photos/seed/medbilling_free/400/240', imgAlt: 'Introduction to medical billing — a beginner sits at a computer viewing training materials' },
  { id: 12, title: 'Human Resources Essentials', field: 'Business', format: 'Self-Paced', duration: '6 weeks', hours: 60, cost: 279, credential: 'Certificate', startDate: 'Anytime', rating: 4.6, enrolled: 1780, hot: false, href: 'course-detail.html', img: 'https://picsum.photos/seed/hr/400/240', imgAlt: 'HR professional reviewing employee records and conducting a virtual interview' },
];

const FORMAT_BADGE = {
  'Cohort': 'bg-indigo-100 text-indigo-700',
  'Self-Paced': 'bg-emerald-100 text-emerald-700',
  'Live Online': 'bg-sky-100 text-sky-700',
};

/* ── Filters ─────────────────────────────────────────────────── */
const FILTER_OPTS = {
  field: ['All Fields', 'Healthcare', 'IT', 'Business', 'Trades'],
  format: ['All Formats', 'Cohort', 'Self-Paced', 'Live Online'],
  cost: ['Any Cost', 'Free', 'Under $500', '$500+'],
  credential: ['Any Credential', 'Certificate', 'Badge'],
};

function FilterGroup({ label, opts, value, onChange }) {
  const id = `filter-${label.toLowerCase().replace(/\s+/g, '-')}`;
  return (
    <div>
      <label htmlFor={id} className="font-display block text-xs font-semibold text-slate-700 uppercase tracking-wide mb-1.5">{label}</label>
      <select id={id} value={value} onChange={e => onChange(e.target.value)}
        className="w-full border border-slate-200 bg-white text-slate-700 rounded-lg px-3 py-2.5 text-sm focus:border-indigo-500 focus:outline-none">
        {opts.map(o => <option key={o}>{o}</option>)}
      </select>
    </div>
  );
}

/* ── Course Card ─────────────────────────────────────────────── */
function CourseCard({ course }) {
  return (
    <article aria-label={`${course.title} — ${course.format}, ${course.duration}, $${course.cost === 0 ? 'Free' : course.cost}`}
      className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden flex flex-col hover:shadow-md transition-shadow">
      <a href={course.href} tabIndex={-1} aria-hidden="true">
        <div className="relative">
          <img src={course.img} alt={course.imgAlt} className="w-full h-40 object-cover" loading="lazy" />
          {course.hot && (
            <span className="absolute top-3 left-3 flex items-center gap-1 bg-orange-500 text-white text-[10px] font-bold uppercase tracking-wide px-2 py-0.5 rounded-full">
              <IconFire /> Hot
            </span>
          )}
        </div>
      </a>
      <div className="flex-1 p-5 flex flex-col">
        <div className="flex items-center gap-2 mb-2">
          <span className={`font-body text-[10px] font-bold uppercase tracking-wider px-2.5 py-0.5 rounded-full ${FORMAT_BADGE[course.format] || 'bg-slate-100 text-slate-600'}`}>
            {course.format}
          </span>
          <span className="font-body text-[10px] text-slate-400 font-semibold">{course.credential}</span>
        </div>
        <h3 className="font-display font-bold text-slate-900 text-base leading-snug mb-2">
          <a href={course.href} className="hover:text-indigo-600 transition-colors">{course.title}</a>
        </h3>
        <div className="flex flex-wrap gap-x-4 gap-y-1 font-body text-xs text-slate-500 mb-3">
          <span className="flex items-center gap-1"><IconClock />{course.duration} · {course.hours} hrs</span>
          <span className="flex items-center gap-1"><IconCalendar />Starts {course.startDate}</span>
        </div>
        <div className="flex items-center gap-2 font-body text-xs text-slate-500 mb-4">
          <div className="flex gap-0.5" aria-label={`Rated ${course.rating} out of 5 stars`}>
            {[...Array(5)].map((_, i) => <IconStar key={i} />)}
          </div>
          <span>{course.rating} ({course.enrolled.toLocaleString()})</span>
        </div>
        <div className="flex items-center justify-between mt-auto">
          <div>
            {course.cost === 0
              ? <span className="font-display font-extrabold text-emerald-600 text-xl">Free</span>
              : <span className="font-display font-extrabold text-slate-900 text-xl">${course.cost}</span>
            }
          </div>
          <a href={course.href}
            className="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors"
            aria-label={`Enroll in ${course.title}`}>
            Enroll <IconArrow />
          </a>
        </div>
      </div>
    </article>
  );
}

/* ── App ─────────────────────────────────────────────────────── */
function App() {
  const [search, setSearch] = useState('');
  const [field, setField] = useState('All Fields');
  const [format, setFormat] = useState('All Formats');
  const [cost, setCost] = useState('Any Cost');
  const [credential, setCredential] = useState('Any Credential');
  const [sort, setSort] = useState('Popular');
  const [mobileFilters, setMobileFilters] = useState(false);

  const filtered = ALL_COURSES.filter(c => {
    if (search && !c.title.toLowerCase().includes(search.toLowerCase())) return false;
    if (field !== 'All Fields' && c.field !== field) return false;
    if (format !== 'All Formats' && c.format !== format) return false;
    if (cost === 'Free' && c.cost !== 0) return false;
    if (cost === 'Under $500' && (c.cost === 0 || c.cost >= 500)) return false;
    if (cost === '$500+' && c.cost < 500) return false;
    if (credential !== 'Any Credential' && c.credential !== credential) return false;
    return true;
  }).sort((a, b) => {
    if (sort === 'Popular') return b.enrolled - a.enrolled;
    if (sort === 'Lowest Price') return a.cost - b.cost;
    if (sort === 'Highest Rated') return b.rating - a.rating;
    if (sort === 'Shortest') return parseInt(a.duration) - parseInt(b.duration);
    return 0;
  });

  const FilterPanel = () => (
    <aside aria-label="Course filters" className="space-y-5">
      <div>
        <label htmlFor="search-courses" className="font-display block text-xs font-semibold text-slate-700 uppercase tracking-wide mb-1.5">Search</label>
        <div className="relative">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"><IconSearch /></span>
          <input id="search-courses" type="search" value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Search programs…" className="w-full border border-slate-200 bg-white text-slate-700 rounded-lg pl-9 pr-3 py-2.5 text-sm focus:border-indigo-500 focus:outline-none" />
        </div>
      </div>
      <FilterGroup label="Career Field" opts={FILTER_OPTS.field} value={field} onChange={setField} />
      <FilterGroup label="Format" opts={FILTER_OPTS.format} value={format} onChange={setFormat} />
      <FilterGroup label="Cost" opts={FILTER_OPTS.cost} value={cost} onChange={setCost} />
      <FilterGroup label="Credential Type" opts={FILTER_OPTS.credential} value={credential} onChange={setCredential} />
      <button onClick={() => { setSearch(''); setField('All Fields'); setFormat('All Formats'); setCost('Any Cost'); setCredential('Any Credential'); }}
        className="font-body text-sm text-indigo-600 hover:text-indigo-800 underline w-full text-left">
        Clear all filters
      </button>
    </aside>
  );

  return (
    <>
      <a href="#main-content" className="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-1/2 focus:-translate-x-1/2 focus:z-50 focus:bg-indigo-600 focus:text-white focus:px-4 focus:py-2 focus:rounded-lg focus:font-body focus:text-sm">Skip to main content</a>
      <Header />
      <main id="main-content">
        {/* Page header */}
        <div className="bg-white border-b border-slate-100 py-10">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <nav aria-label="Breadcrumb" className="font-body text-sm text-slate-400 mb-4 flex items-center gap-2">
              <a href="index.html" className="hover:text-indigo-600 transition-colors">Home</a>
              <span aria-hidden="true">/</span>
              <span className="text-slate-700">All Programs</span>
            </nav>
            <h1 className="font-display text-3xl font-extrabold text-slate-900 mb-2">Explore Programs</h1>
            <p className="font-body text-slate-500">40+ career-ready certificates and badges across healthcare, IT, business, and trades.</p>
          </div>
        </div>

        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
          {/* Mobile filter toggle */}
          <div className="lg:hidden mb-4">
            <button onClick={() => setMobileFilters(p => !p)} aria-expanded={mobileFilters} aria-controls="mobile-filters"
              className="flex items-center gap-2 font-body text-sm font-semibold text-slate-700 border border-slate-200 bg-white px-4 py-2.5 rounded-lg hover:border-indigo-300 transition-colors">
              <IconFilter /> Filters
              {[field, format, cost, credential].filter(v => !v.startsWith('All') && !v.startsWith('Any')).length > 0 && (
                <span className="bg-indigo-600 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center" aria-label="Active filters">
                  {[field, format, cost, credential].filter(v => !v.startsWith('All') && !v.startsWith('Any')).length}
                </span>
              )}
            </button>
            {mobileFilters && (
              <div id="mobile-filters" className="mt-3 bg-white rounded-2xl border border-slate-200 p-4">
                <FilterPanel />
              </div>
            )}
          </div>

          <div className="lg:grid lg:grid-cols-4 lg:gap-8">
            {/* Desktop sidebar */}
            <div className="hidden lg:block lg:col-span-1">
              <div className="bg-white rounded-2xl border border-slate-100 p-5 sticky top-24">
                <FilterPanel />
              </div>
            </div>

            {/* Main content */}
            <div className="lg:col-span-3">
              {/* Sort + count bar */}
              <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
                <p className="font-body text-sm text-slate-500" aria-live="polite" aria-atomic="true">
                  Showing <strong className="text-slate-900">{filtered.length}</strong> of {ALL_COURSES.length} programs
                </p>
                <div className="flex items-center gap-2">
                  <label htmlFor="sort-select" className="font-body text-sm text-slate-600">Sort:</label>
                  <select id="sort-select" value={sort} onChange={e => setSort(e.target.value)}
                    className="border border-slate-200 bg-white text-slate-700 rounded-lg px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none">
                    {['Popular', 'Highest Rated', 'Lowest Price', 'Shortest'].map(o => (
                      <option key={o}>{o}</option>
                    ))}
                  </select>
                </div>
              </div>

              {/* Grid */}
              {filtered.length > 0 ? (
                <div className="grid sm:grid-cols-2 xl:grid-cols-3 gap-5" role="list" aria-label="Course listings">
                  {filtered.map(c => (
                    <div key={c.id} role="listitem">
                      <CourseCard course={c} />
                    </div>
                  ))}
                </div>
              ) : (
                <div className="text-center py-16">
                  <p className="font-display text-xl font-bold text-slate-700 mb-2">No programs match your filters</p>
                  <p className="font-body text-slate-400 mb-4">Try adjusting your filters or clearing them to see all programs.</p>
                  <button onClick={() => { setSearch(''); setField('All Fields'); setFormat('All Formats'); setCost('Any Cost'); setCredential('Any Credential'); }}
                    className="font-body text-sm text-indigo-600 hover:text-indigo-800 underline">Clear all filters</button>
                </div>
              )}
            </div>
          </div>
        </div>
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
