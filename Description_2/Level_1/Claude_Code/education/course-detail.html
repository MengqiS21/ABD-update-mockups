function CurriculumAccordion() {
  const [openWeek, setOpenWeek] = useState(1);
  return (
    <div className="space-y-2">
      {WEEKS.map(week => (
        <div key={week.n} className="border border-slate-200 rounded-xl overflow-hidden">
          <button
            onClick={() => setOpenWeek(openWeek === week.n ? null : week.n)}
            aria-expanded={openWeek === week.n}
            aria-controls={`week-${week.n}-content`}
            className="w-full flex items-center justify-between px-5 py-4 bg-white hover:bg-slate-50 text-left transition-colors"
          >
            <div className="flex items-center gap-4">

          Number of monthly payments
        </label>
        <select id={monthsId} value={months} onChange={e => setMonths(Number(e.target.value))}
          className="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm text-slate-800 focus:border-indigo-500 focus:outline-none bg-white">
          <option value={1}>1 payment (pay in full)</option>
          <option value={2}>2 monthly payments</option>
          <option value={3}>3 monthly payments</option>
          <option value={6}>6 monthly payments</option>
        </select>
      </div>
      <div className="bg-indigo-50 rounded-xl p-4 text-center" aria-live="polite" aria-atomic="true">
        <p className="font-body text-xs text-indigo-500 mb-1">Your monthly payment</p>

        <p className="font-body text-xs text-slate-400 mt-1">Total: ${totalCost} · No interest · No credit check</p>

  );

        </div>
        <p className="font-body text-xs text-slate-400 mt-1">Next cohort: <strong className="text-slate-700">March 3, 2026</strong></p>

      {step === 0 ? (

                      <div key={title} className="bg-white rounded-2xl border border-slate-100 p-5 shadow-sm">
                        <p className="font-display font-bold text-slate-900 mb-1">{title}</p>
                        <p className="font-body text-sm text-slate-500 leading-relaxed mb-2">{body}</p>
                        <a href={link} className="font-body text-sm text-indigo-600 hover:underline">{linkLabel}</a>
                      </div>
                    ))}
                  </div>
                </div>
              </section>

              {/* Q&A Sessions */}
              <section aria-labelledby="qa-heading">
                <h2 id="qa-heading" className="font-display text-2xl font-extrabold text-slate-900 mb-5">Live Q&A Schedule</h2>
                <div className="space-y-3">
                  {QA_SESSIONS.map(s => (
                    <div key={s.date} className="bg-white rounded-xl border border-slate-100 p-4 flex items-center gap-4 shadow-sm flex-wrap">
                      <div className="font-body text-center bg-indigo-50 rounded-xl p-3 w-20 flex-shrink-0">
                        <p className="text-[10px] text-indigo-500 font-bold uppercase">{s.date.split(',')[1].trim()}</p>
                        <p className="font-display font-extrabold text-indigo-800 text-lg leading-none">{s.date.split(' ')[1]}</p>
                      </div>
                      <div className="flex-1">
                        <p className="font-display font-semibold text-slate-900">{s.topic}</p>
                        <p className="font-body text-sm text-slate-500">{s.time} · Hosted by {s.host}</p>
                      </div>
                      <a href="#enroll" className="font-body text-sm text-indigo-600 border border-indigo-200 hover:bg-indigo-50 px-4 py-2 rounded-lg transition-colors">
                        Register
                      </a>
                    </div>
                  ))}
                </div>
              </section>
            </div>

            {/* Desktop enroll widget */}
            <div className="hidden lg:block lg:col-span-1">
              <EnrollWidget />
            </div>
          </div>
        </div>
      </main>
      <footer className="bg-slate-900 text-slate-400 py-8 mt-4">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col sm:flex-row justify-between items-center gap-3">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center" aria-hidden="true"><span className="text-white font-bold text-xs">SF</span></div>
            <span className="font-display font-bold text-white">SkillForge</span>
          </div>
          <nav aria-label="Footer navigation" className="flex gap-5 font-body text-sm">
            {['index.html', 'courses.html', 'pricing.html', 'dashboard.html'].map((href, i) => (
              <a key={i} href={href} className="hover:text-white">{['Home', 'Programs', 'Pricing', 'Dashboard'][i]}</a>
            ))}
          </nav>
          <p className="font-body text-xs text-slate-500">© 2026 SkillForge. Accredited by ACCET.</p>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
