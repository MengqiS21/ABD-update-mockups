<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Groundwork — Keep Independent Journalism Alive</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #fff; color: #111827; font-family: 'Inter', system-ui, sans-serif; }
    *:focus-visible { outline: 2px solid #15803d; outline-offset: 3px; border-radius: 3px; }
    img { display: block; max-width: 100%; }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .font-prose { font-family: 'Source Serif 4', Georgia, serif; }
    .font-ui { font-family: 'Inter', system-ui, sans-serif; }
    .toggle-track { transition: background-color 0.15s; }
    .toggle-thumb { transition: transform 0.15s; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useId } = React;

/* ── Icons ──────────────────────────────────────────────────── */
const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>;
const IconXIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>;
const IconHeart = () => <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" /></svg>;
const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>;
const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" /></svg>;
const IconStar = () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path fillRule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.006Z" clipRule="evenodd" /></svg>;
const IconMicroscope = () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.8} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 0 1-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 0 1 4.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0 1 12 15a9.065 9.065 0 0 1-6.23-.693L5 14.5m14.8.8 1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0 1 12 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5" /></svg>;

const NAV_LINKS = [
  { label: 'Climate', href: 'climate.html' },
  { label: 'Energy', href: '#' },
  { label: 'Policy', href: '#' },
  { label: 'Science', href: '#' },
  { label: 'Data', href: '#' },
  { label: 'Opinion', href: 'opinion.html' },
];

function Header() {
  const [mobileOpen, setMobileOpen] = useState(false);
  return (
    <header className="font-ui border-b border-gray-200 bg-white sticky top-0 z-40 shadow-sm">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between h-16">
        <a href="index.html" aria-label="Groundwork — home">
          <span className="font-display text-2xl font-black tracking-tight text-gray-900"><span className="text-green-700">Ground</span>work</span>
        </a>
        <nav aria-label="Primary navigation" className="hidden md:flex items-center gap-1">
          {NAV_LINKS.map(({ label, href }) => (
            <a key={label} href={href} className="px-3 py-2 text-sm font-medium text-gray-600 hover:text-green-700 hover:bg-green-50 rounded-lg transition-colors">{label}</a>
          ))}
        </nav>
        <div className="flex items-center gap-3">
          <a href="subscribe.html" aria-current="page" className="hidden sm:inline-flex items-center gap-1.5 bg-green-700 hover:bg-green-800 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors">
            <IconHeart /> Support Us
          </a>
          <button onClick={() => setMobileOpen(p => !p)} aria-expanded={mobileOpen} aria-controls="mobile-menu" aria-label={mobileOpen ? 'Close menu' : 'Open menu'} className="md:hidden p-2 text-gray-600">
            {mobileOpen ? <IconXIcon /> : <IconMenu />}
          </button>
        </div>
      </div>
      {mobileOpen && (
        <div id="mobile-menu" className="md:hidden border-t border-gray-100 bg-white px-4 pb-4 pt-2">
          <ul className="space-y-1" role="list">
            {NAV_LINKS.map(({ label, href }) => (
              <li key={label}><a href={href} className="block px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-green-50 hover:text-green-700 rounded-lg">{label}</a></li>
            ))}
          </ul>
        </div>
      )}
    </header>
  );
}

/* ── Hero ────────────────────────────────────────────────────── */
function Hero() {
  return (
    <div className="bg-green-900 py-16 sm:py-20">
      <div className="max-w-4xl mx-auto px-4 sm:px-6 text-center">
        <p className="font-ui text-green-300 text-xs font-bold uppercase tracking-widest mb-4">Reader Supported · No Advertising · 501(c)(3) Nonprofit</p>
        <h1 className="font-display text-4xl sm:text-5xl lg:text-6xl font-black text-white leading-tight mb-6">
          Keep Groundwork<br />Independent
        </h1>
        <p className="font-prose text-xl text-green-100 leading-relaxed max-w-2xl mx-auto mb-10">
          Our investigations into climate, science, and environmental policy are free to read and will remain free — because readers like you fund them, not advertisers or corporations.
        </p>

        {/* Impact stats */}
        <div className="grid grid-cols-3 gap-4 max-w-2xl mx-auto">
          {[
            { n: '14', unit: 'months', label: 'avg. investigation length' },
            { n: '$80k', unit: '', label: 'avg. cost per major investigation' },
            { n: '100%', unit: '', label: 'reader funded · zero ad revenue' },
          ].map(({ n, unit, label }) => (
            <div key={label} className="bg-green-800/60 rounded-2xl p-4">
              <p className="font-display text-3xl font-black text-white leading-none">
                {n}<span className="text-lg text-green-300 ml-0.5">{unit}</span>
              </p>
              <p className="font-ui text-xs text-green-300 mt-1.5">{label}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Impact Metrics ──────────────────────────────────────────── */
function ImpactMetrics({ tier }) {
  const impacts = {
    free: { hours: 0, label: 'All investigations free to read. Always.' },
    supporter: { hours: 3, label: 'funds ~3 hours of investigative reporting per month' },
    investigator: { hours: 9, label: 'funds ~9 hours of investigative reporting per month' },
  };
  const impact = impacts[tier] || impacts.supporter;
  if (!impact.hours) {
    return (
      <p className="font-ui text-xs text-gray-500 text-center mt-3 italic">{impact.label}</p>
    );
  }
  const filled = impact.hours;
  const total = 9;
  return (
    <div className="mt-4 p-3 bg-green-50 rounded-xl border border-green-100">
      <p className="font-ui text-xs text-green-700 font-semibold mb-2">Your impact — per month:</p>
      <div className="flex gap-1 flex-wrap" role="img" aria-label={`${filled} of ${total} reporting hours funded`}>
        {Array.from({ length: total }, (_, i) => (
          <div key={i} className={`w-6 h-6 rounded-md flex items-center justify-center text-xs ${i < filled ? 'bg-green-600' : 'bg-green-100'}`}
            aria-hidden="true">
            {i < filled ? <span className="text-white text-[10px]">★</span> : ''}
          </div>
        ))}
      </div>
      <p className="font-ui text-xs text-green-700 mt-2">{impact.label}</p>
    </div>
  );
}

/* ── Tiers ───────────────────────────────────────────────────── */
const TIERS = [
  {
    id: 'free',
    name: 'Free Reader',
    price: { monthly: 0, annual: 0 },
    icon: null,
    badge: null,
    description: 'Full access to all investigations, no cost, no account required.',
    features: [
      'All investigations free to read',
      'Full archive access',
      'Public newsletter (weekly)',
      'No account required',
    ],
    cta: 'Continue reading free',
    ctaHref: 'index.html',
    highlight: false,
  },
  {
    id: 'supporter',
    name: 'Supporter',
    price: { monthly: 7, annual: 70 },
    icon: IconHeart,
    badge: 'Most popular',
    description: 'For readers who want to directly fund the journalism they value.',
    features: [
      'Everything in Free Reader',
      'Supporters-only briefing (bi-weekly)',
      'Advance access to new investigations',
      'Comment on articles',
      'Your name in our annual report',
    ],
    cta: 'Become a Supporter',
    ctaHref: '#payment',
    highlight: true,
  },
  {
    id: 'investigator',
    name: 'Investigator',
    price: { monthly: 20, annual: 200 },
    icon: IconMicroscope,
    badge: 'All-access',
    description: 'For power readers, researchers, and advocates who need the full picture.',
    features: [
      'Everything in Supporter',
      'Full data access — download all datasets',
      'FOIA document library',
      'Monthly live Q&A with Groundwork reporters',
      'Early access to upcoming investigations',
      'Investigator badge on your profile',
    ],
    cta: 'Become an Investigator',
    ctaHref: '#payment',
    highlight: false,
  },
];

function TierCard({ tier, isAnnual, selected, onSelect }) {
  const price = isAnnual ? tier.price.annual : tier.price.monthly;
  const period = isAnnual ? '/year' : '/month';
  const savingsLabel = isAnnual && tier.price.monthly > 0 ? `Save $${(tier.price.monthly * 12 - tier.price.annual)} vs. monthly` : null;

  return (
    <article
      aria-label={`${tier.name} plan${selected ? ', currently selected' : ''}`}
      className={`relative flex flex-col rounded-2xl border-2 p-6 transition-all cursor-pointer
        ${selected
          ? 'border-green-600 bg-green-50 shadow-lg shadow-green-100'
          : tier.highlight
            ? 'border-green-300 bg-white shadow-md'
            : 'border-gray-200 bg-white hover:border-green-200'}`}
      onClick={() => onSelect(tier.id)}
      onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onSelect(tier.id); } }}
      tabIndex={0}
      role="radio"
      aria-checked={selected}
    >
      {tier.badge && (
        <span className={`absolute -top-3 left-1/2 -translate-x-1/2 text-[10px] font-bold uppercase tracking-wider px-3 py-1 rounded-full whitespace-nowrap
          ${tier.highlight ? 'bg-green-700 text-white' : 'bg-gray-800 text-white'}`}>
          {tier.badge}
        </span>
      )}

      <div className="flex items-center gap-3 mb-4">
        {tier.icon && (
          <span className={`p-2 rounded-xl ${selected ? 'bg-green-600 text-white' : 'bg-green-100 text-green-700'}`}>
            <tier.icon />
          </span>
        )}
        <h3 className="font-display text-xl font-bold text-gray-900">{tier.name}</h3>
      </div>

      <div className="mb-4">
        {price === 0 ? (
          <p className="font-display text-4xl font-black text-gray-900">Free</p>
        ) : (
          <div>
            <p className="font-display text-4xl font-black text-gray-900">
              ${price}
              <span className="font-ui text-base font-normal text-gray-500 ml-1">{period}</span>
            </p>
            {savingsLabel && (
              <p className="font-ui text-xs text-green-700 font-semibold mt-1">{savingsLabel}</p>
            )}
          </div>
        )}
      </div>

      <p className="font-prose text-sm text-gray-600 mb-5 leading-relaxed">{tier.description}</p>

      <ul className="space-y-2.5 flex-1 mb-5" role="list">
        {tier.features.map(f => (
          <li key={f} className="flex items-start gap-2.5 font-ui text-sm text-gray-700">
            <span className={`mt-0.5 flex-shrink-0 ${selected ? 'text-green-600' : 'text-green-500'}`}><IconCheck /></span>
            {f}
          </li>
        ))}
      </ul>

      <ImpactMetrics tier={tier.id} />

      {tier.id !== 'free' && (
        <div className="mt-4">
          <div className={`w-5 h-5 rounded-full border-2 mx-auto ${selected ? 'bg-green-600 border-green-600' : 'border-gray-300'} flex items-center justify-center`} aria-hidden="true">
            {selected && <div className="w-2.5 h-2.5 bg-white rounded-full" />}
          </div>
        </div>
      )}
    </article>
  );
}

/* ── Testimonials ────────────────────────────────────────────── */
const TESTIMONIALS = [
  {
    quote: "Groundwork's investigation into carbon markets was cited in three congressional committee hearings. This is the journalism that actually moves policy.",
    name: 'Dr. Fatima Osei', title: 'Environmental Policy Researcher', avatar: 'https://picsum.photos/seed/testimonial1/48/48',
  },
  {
    quote: "I've been a supporter for two years. Every month I feel good knowing my $7 is directly funding accountability journalism that has no other source of support.",
    name: 'Thomas Lindqvist', title: 'Investigator-tier supporter since 2024', avatar: 'https://picsum.photos/seed/testimonial2/48/48',
  },
  {
    quote: "As a scientist, I rely on Groundwork to translate rigorous research into policy context. The data access at the Investigator level is exceptional.",
    name: 'Prof. Ananya Krishnamurthy', title: 'Climate Scientist, Stanford', avatar: 'https://picsum.photos/seed/testimonial3/48/48',
  },
];

/* ── Payment Form ────────────────────────────────────────────── */
function PaymentForm({ selectedTier, isAnnual }) {
  const tier = TIERS.find(t => t.id === selectedTier);
  const price = isAnnual ? tier.price.annual : tier.price.monthly;
  const period = isAnnual ? 'year' : 'month';
  const isFree = price === 0;

  const [firstName, setFirstName] = useState('');
  const [lastName, setLastName] = useState('');
  const [email, setEmail] = useState('');
  const [cardNum, setCardNum] = useState('');
  const [expiry, setExpiry] = useState('');
  const [cvv, setCvv] = useState('');
  const [zip, setZip] = useState('');
  const [agree, setAgree] = useState(false);

  const firstId = useId(); const lastId = useId(); const emailId = useId();
  const cardId = useId(); const expiryId = useId(); const cvvId = useId(); const zipId = useId();

  const handleSubmit = (e) => {
    e.preventDefault();
    if (isFree) { window.location.href = 'index.html'; return; }
    alert(`Thank you for becoming a Groundwork ${tier.name}! Your support makes independent journalism possible. (demo)`);
  };

  const inputCls = "w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:border-green-600 focus:outline-none";

  return (
    <section id="payment" aria-labelledby="payment-heading" className="bg-gray-50 rounded-2xl border border-gray-200 p-6 sm:p-8">
      <div className="flex items-center justify-between mb-6">
        <h2 id="payment-heading" className="font-display text-2xl font-bold text-gray-900">
          {isFree ? 'Continue Reading Free' : `Become a ${tier.name}`}
        </h2>
        {!isFree && (
          <div className="text-right">
            <p className="font-display text-2xl font-black text-green-700">${price}<span className="font-ui text-sm text-gray-400 font-normal">/{period}</span></p>
          </div>
        )}
      </div>

      {!isFree && (
        <div className="bg-white border border-gray-200 rounded-xl p-4 mb-6 flex items-center gap-3">
          <IconShield className="text-green-600" />
          <p className="font-ui text-sm text-gray-600">
            <strong className="text-gray-800">Secure payment</strong> · Processed by Stripe · 256-bit SSL encryption · Cancel any time
          </p>
        </div>
      )}

      <form onSubmit={handleSubmit} noValidate className="space-y-5">
        <fieldset>
          <legend className="font-ui text-sm font-semibold text-gray-700 mb-3">Your information</legend>
          <div className="grid sm:grid-cols-2 gap-4">
            <div>
              <label htmlFor={firstId} className="font-ui block text-sm font-medium text-gray-700 mb-1">
                First name <span className="text-red-500" aria-label="required">*</span>
              </label>
              <input id={firstId} type="text" required autoComplete="given-name" placeholder="Jane"
                value={firstName} onChange={e => setFirstName(e.target.value)} className={inputCls} />
            </div>
            <div>
              <label htmlFor={lastId} className="font-ui block text-sm font-medium text-gray-700 mb-1">
                Last name <span className="text-red-500" aria-label="required">*</span>
              </label>
              <input id={lastId} type="text" required autoComplete="family-name" placeholder="Smith"
                value={lastName} onChange={e => setLastName(e.target.value)} className={inputCls} />
            </div>
          </div>
        </fieldset>

        <div>
          <label htmlFor={emailId} className="font-ui block text-sm font-medium text-gray-700 mb-1">
            Email address <span className="text-red-500" aria-label="required">*</span>
          </label>
          <input id={emailId} type="email" required autoComplete="email" placeholder="jane@example.com"
            value={email} onChange={e => setEmail(e.target.value)} className={inputCls} />
          <p className="font-ui text-xs text-gray-400 mt-1">Your account and receipt will be sent here.</p>
        </div>

        {!isFree && (
          <fieldset>
            <legend className="font-ui text-sm font-semibold text-gray-700 mb-3">
              Payment information
              <span className="ml-2 font-normal text-xs text-gray-400">(demo — enter any values)</span>
            </legend>
            <div className="space-y-4">
              <div>
                <label htmlFor={cardId} className="font-ui block text-sm font-medium text-gray-700 mb-1">
                  Card number <span className="text-red-500" aria-label="required">*</span>
                </label>
                <input id={cardId} type="text" required autoComplete="cc-number" inputMode="numeric"
                  placeholder="1234 5678 9012 3456" maxLength={19}
                  value={cardNum}
                  onChange={e => {
                    const v = e.target.value.replace(/\D/g, '').slice(0, 16);
                    setCardNum(v.replace(/(.{4})/g, '$1 ').trim());
                  }}
                  className={inputCls} />
              </div>
              <div className="grid grid-cols-3 gap-4">
                <div className="col-span-1">
                  <label htmlFor={expiryId} className="font-ui block text-sm font-medium text-gray-700 mb-1">
                    Expiry <span className="text-red-500" aria-label="required">*</span>
                  </label>
                  <input id={expiryId} type="text" required autoComplete="cc-exp" placeholder="MM/YY"
                    maxLength={5} value={expiry}
                    onChange={e => {
                      let v = e.target.value.replace(/\D/g, '');
                      if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2,4);
                      setExpiry(v);
                    }}
                    className={inputCls} />
                </div>
                <div className="col-span-1">
                  <label htmlFor={cvvId} className="font-ui block text-sm font-medium text-gray-700 mb-1">
                    CVV <span className="text-red-500" aria-label="required">*</span>
                  </label>
                  <input id={cvvId} type="text" required autoComplete="cc-csc" placeholder="123"
                    maxLength={4} inputMode="numeric" value={cvv} onChange={e => setCvv(e.target.value.replace(/\D/g, '').slice(0,4))}
                    className={inputCls} />
                </div>
                <div className="col-span-1">
                  <label htmlFor={zipId} className="font-ui block text-sm font-medium text-gray-700 mb-1">
                    ZIP / Postal <span className="text-red-500" aria-label="required">*</span>
                  </label>
                  <input id={zipId} type="text" required autoComplete="postal-code" placeholder="10001"
                    maxLength={10} value={zip} onChange={e => setZip(e.target.value)}
                    className={inputCls} />
                </div>
              </div>
            </div>
          </fieldset>
        )}

        <div className="flex items-start gap-3">
          <input type="checkbox" id="agree-terms" required checked={agree} onChange={e => setAgree(e.target.checked)}
            className="mt-0.5 w-4 h-4 accent-green-700 flex-shrink-0" />
          <label htmlFor="agree-terms" className="font-ui text-sm text-gray-600 cursor-pointer leading-relaxed">
            I agree to Groundwork's <a href="#" className="text-green-700 hover:underline">Terms of Service</a> and <a href="#" className="text-green-700 hover:underline">Privacy Policy</a>.
            {!isFree && ` My ${tier.name} membership will renew automatically at $${price}/${period}. I may cancel at any time.`}
          </label>
        </div>

        <button type="submit"
          className="w-full font-ui bg-green-700 hover:bg-green-800 active:bg-green-900 text-white font-bold text-base py-4 rounded-xl transition-colors">
          {isFree ? 'Continue Reading →' : `Start my ${tier.name} membership — $${price}/${period}`}
        </button>

        {!isFree && (
          <p className="font-ui text-center text-xs text-gray-400">
            Your contribution is tax-deductible to the extent permitted by law. EIN: 82-XXXXXXX.
          </p>
        )}
      </form>
    </section>
  );
}

/* ── Footer ──────────────────────────────────────────────────── */
function Footer() {
  return (
    <footer className="font-ui bg-gray-900 text-gray-400 py-10 mt-12">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6">
        <span className="font-display text-xl font-black text-white"><span className="text-green-400">Ground</span>work</span>
        <nav aria-label="Footer navigation" className="flex flex-wrap gap-x-6 gap-y-2 text-sm">
          {['Climate', 'Energy', 'Policy', 'Science', 'Opinion', 'About', 'Ethics'].map(l => (
            <a key={l} href={l === 'Opinion' ? 'opinion.html' : l === 'Climate' ? 'climate.html' : '#'} className="hover:text-white transition-colors">{l}</a>
          ))}
        </nav>
      </div>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 mt-6 pt-6 border-t border-gray-800">
        <p className="text-xs text-gray-500">© 2026 Groundwork Investigative Press. 501(c)(3) nonprofit. EIN: 82-XXXXXXX. Contributions are tax-deductible.</p>
      </div>
    </footer>
  );
}

/* ── App ─────────────────────────────────────────────────────── */
function App() {
  const [isAnnual, setIsAnnual] = useState(false);
  const [selectedTier, setSelectedTier] = useState('supporter');

  const selectedTierObj = TIERS.find(t => t.id === selectedTier);
  const isFree = selectedTierObj.price.monthly === 0;

  return (
    <>
      <a href="#main-content" className="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-1/2 focus:-translate-x-1/2 focus:z-50 focus:bg-green-700 focus:text-white focus:px-4 focus:py-2 focus:rounded-lg focus:font-ui focus:text-sm">
        Skip to main content
      </a>
      <Header />
      <Hero />

      <main id="main-content" className="max-w-5xl mx-auto px-4 sm:px-6 py-14">
        {/* Billing toggle */}
        <div className="flex items-center justify-center gap-4 mb-10">
          <span className={`font-ui text-sm font-medium ${!isAnnual ? 'text-gray-900' : 'text-gray-400'}`}>Monthly</span>
          <button
            role="switch"
            aria-checked={isAnnual}
            aria-label="Toggle annual billing"
            onClick={() => setIsAnnual(p => !p)}
            className={`relative inline-flex h-7 w-14 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors toggle-track
              ${isAnnual ? 'bg-green-600' : 'bg-gray-300'}`}
          >
            <span className={`inline-block h-6 w-6 transform rounded-full bg-white shadow ring-0 transition toggle-thumb ${isAnnual ? 'translate-x-7' : 'translate-x-0'}`} aria-hidden="true" />
          </button>
          <span className={`font-ui text-sm font-medium ${isAnnual ? 'text-gray-900' : 'text-gray-400'}`}>
            Annual
            <span className="ml-1.5 font-ui text-[10px] font-bold text-green-700 bg-green-100 px-1.5 py-0.5 rounded">Save ~17%</span>
          </span>
        </div>

        {/* Tier cards */}
        <div role="radiogroup" aria-label="Choose a support tier" className="grid sm:grid-cols-3 gap-5 mb-12">
          {TIERS.map(tier => (
            <TierCard key={tier.id} tier={tier} isAnnual={isAnnual}
              selected={selectedTier === tier.id} onSelect={setSelectedTier} />
          ))}
        </div>

        {/* Testimonials */}
        <section aria-labelledby="testimonials-heading" className="mb-14">
          <h2 id="testimonials-heading" className="font-display text-2xl font-bold text-gray-900 text-center mb-8">What our supporters say</h2>
          <div className="grid sm:grid-cols-3 gap-6">
            {TESTIMONIALS.map(({ quote, name, title, avatar }) => (
              <figure key={name} className="bg-gray-50 rounded-2xl p-5 border border-gray-100">
                <div className="flex gap-0.5 text-amber-400 mb-3" aria-label="5 stars">
                  {[...Array(5)].map((_, i) => <IconStar key={i} />)}
                </div>
                <blockquote className="font-prose text-sm text-gray-700 leading-relaxed mb-4 italic">"{quote}"</blockquote>
                <figcaption className="flex items-center gap-3">
                  <img src={avatar} alt={`${name}'s photo`} className="w-9 h-9 rounded-full object-cover" />
                  <div>
                    <p className="font-ui text-sm font-semibold text-gray-900">{name}</p>
                    <p className="font-ui text-xs text-gray-500">{title}</p>
                  </div>
                </figcaption>
              </figure>
            ))}
          </div>
        </section>

        {/* FAQ */}
        <section aria-labelledby="faq-heading" className="mb-14">
          <h2 id="faq-heading" className="font-display text-2xl font-bold text-gray-900 mb-6">Frequently asked questions</h2>
          <div className="space-y-0 divide-y divide-gray-100 border border-gray-100 rounded-2xl overflow-hidden">
            {[
              {
                q: 'Is Groundwork really free to read?',
                a: 'Yes. All of our investigations, articles, and data reports are and will remain free to read. We believe accountability journalism should be accessible to everyone, not just those who can afford a subscription.',
              },
              {
                q: 'How do you stay independent without advertising?',
                a: 'Groundwork is structured as a 501(c)(3) nonprofit organization. We accept no advertising revenue. Our funding comes entirely from individual reader support and a small number of foundation grants that do not influence our editorial decisions.',
              },
              {
                q: 'Can I cancel my membership at any time?',
                a: 'Yes. You can cancel your Supporter or Investigator membership at any time from your account settings. You will retain access to member benefits until the end of your current billing period.',
              },
              {
                q: 'Is my contribution tax-deductible?',
                a: 'Yes. Groundwork Investigative Press is a registered 501(c)(3) nonprofit organization (EIN: 82-XXXXXXX). Contributions are tax-deductible to the full extent permitted by law. You will receive a donation receipt by email.',
              },
              {
                q: 'What does the Investigator data access include?',
                a: 'Investigator-tier members receive access to our full data library, including every dataset we have used in investigations (CSV, GeoJSON, and XLSX formats), FOIA-obtained documents, and custom data request priority.',
              },
            ].map(({ q, a }, i) => {
              const id = `faq-${i}`;
              return <FaqItem key={i} id={id} q={q} a={a} />;
            })}
          </div>
        </section>

        {/* Payment form */}
        <PaymentForm selectedTier={selectedTier} isAnnual={isAnnual} />
      </main>
      <Footer />
    </>
  );
}

function FaqItem({ id, q, a }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="bg-white">
      <button
        onClick={() => setOpen(p => !p)}
        aria-expanded={open}
        aria-controls={`${id}-answer`}
        className="w-full flex items-center justify-between gap-4 px-5 py-4 text-left hover:bg-gray-50 transition-colors"
      >
        <span className="font-ui text-sm font-semibold text-gray-900">{q}</span>
        <span className="flex-shrink-0 font-ui text-xl leading-none text-gray-400 transition-transform" style={{ transform: open ? 'rotate(45deg)' : 'none' }} aria-hidden="true">+</span>
      </button>
      {open && (
        <div id={`${id}-answer`} className="px-5 pb-4">
          <p className="font-prose text-sm text-gray-600 leading-relaxed">{a}</p>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
