function BreakingBanner() {

  return (
    <div role="alert" aria-live="assertive" className="font-ui bg-amber-50 border-b-2 border-amber-400">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 flex items-center gap-3 py-2.5">

          Breaking

          <a href="article.html" className="hover:underline">

        <button onClick={() => setDismissed(true)} aria-label="Dismiss breaking news banner"
          className="flex-shrink-0 text-amber-600 hover:text-amber-800 text-xs underline">

      </div>
    </div>
  );
}

function Newsletter() {
  const [email, setEmail] = useState('');
  const emailId = useId();
  const handleSubmit = (e) => {
    e.preventDefault();
    if (email) { alert(`Thank you! "${email}" added to the Groundwork newsletter. (demo)`); setEmail(''); }
  };
  return (
    <section aria-labelledby="newsletter-heading" className="py-12 border-t border-gray-100">
      <div className="max-w-2xl mx-auto px-4 sm:px-6 text-center">
        <h2 id="newsletter-heading" className="font-display text-2xl font-bold text-gray-900 mb-2">The Weekly Briefing</h2>
        <p className="font-prose text-gray-600 mb-6 text-base">Our editors' picks, data highlights, and unreported angles — every Friday morning.</p>
        <form onSubmit={handleSubmit} className="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
          <label htmlFor={emailId} className="sr-only">Your email address</label>
          <input
            id={emailId}
            type="email"
            required
            value={email}
            onChange={e => setEmail(e.target.value)}
            placeholder="your@email.com"
            autoComplete="email"
            className="flex-1 border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-green-600 focus:outline-none"
          />
          <button type="submit"
            className="font-ui bg-green-700 hover:bg-green-800 text-white text-sm font-semibold px-6 py-3 rounded-lg transition-colors whitespace-nowrap">

        </form>

}
