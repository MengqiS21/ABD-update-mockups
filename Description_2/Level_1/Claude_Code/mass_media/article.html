/* ── Inline Chart ────────────────────────────────────────────── */
function AquiferChart() {
  const data = [
    { year: '1960', val: 100 }, { year: '1970', val: 89 }, { year: '1980', val: 77 },
    { year: '1990', val: 68 }, { year: '2000', val: 59 }, { year: '2010', val: 52 },
    { year: '2020', val: 45 }, { year: '2026', val: 39 },
  ];
  const w = 600; const h = 160; const pad = { l: 30, r: 10, t: 20, b: 30 };
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;
  const xStep = innerW / (data.length - 1);
  const points = data.map((d, i) => {
    const x = pad.l + i * xStep;
    const y = pad.t + innerH - (d.val / 100) * innerH;
    return { x, y, ...d };
  });
  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
  const fillD = pathD + ` L ${points[points.length-1].x} ${h - pad.b} L ${pad.l} ${h - pad.b} Z`;

  return (
    <figure className="my-8 bg-gray-50 rounded-2xl overflow-hidden border border-gray-100" aria-label="Aquifer level decline chart">
      <div className="px-6 pt-5 pb-2">
        <p className="font-ui text-xs text-green-700 font-bold uppercase tracking-wider mb-1">Groundwork Data Visualization</p>
        <p className="font-display text-base font-bold text-gray-900">High Plains Aquifer Composite Index, 1960–2026</p>
        <p className="font-ui text-xs text-gray-500">Normalized to 1960 level (= 100). Source: USGS National Groundwater Monitoring Network.</p>
      </div>
      <svg viewBox={`0 0 ${w} ${h}`} className="w-full" role="img" aria-label="Line chart showing High Plains aquifer declining from index 100 in 1960 to 39 in 2026">
        <title>High Plains Aquifer Composite Index 1960–2026</title>
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#16a34a" stopOpacity="0.3" />
            <stop offset="100%" stopColor="#16a34a" stopOpacity="0.02" />
          </linearGradient>
        </defs>
        {/* Grid lines */}
        {[25, 50, 75, 100].map(v => {
          const y = pad.t + innerH - (v / 100) * innerH;
          return (
            <g key={v}>
              <line x1={pad.l} y1={y} x2={w - pad.r} y2={y} stroke="#e5e7eb" strokeWidth="1" strokeDasharray="4 4" />
              <text x={pad.l - 4} y={y + 4} textAnchor="end" fontSize="9" fill="#9ca3af">{v}</text>
            </g>
          );
        })}
        {/* Area fill */}
        <path d={fillD} fill="url(#areaGrad)" />
        {/* Line */}
        <path d={pathD} fill="none" stroke="#16a34a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        {/* Data points */}
        {points.map((p, i) => (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r={i === points.length - 1 ? 5 : 3.5}
              fill={i === points.length - 1 ? '#dc2626' : '#16a34a'}
              stroke="white" strokeWidth="1.5"
              aria-label={`${p.year}: ${p.val}`}
            />
            <text x={p.x} y={h - pad.b + 14} textAnchor="middle" fontSize="8.5" fill="#9ca3af">{p.year}</text>
          </g>
        ))}
        {/* Last point label */}
        <text x={points[points.length-1].x + 8} y={points[points.length-1].y + 4} fontSize="10" fill="#dc2626" fontWeight="bold">39</text>
      </svg>
      <figcaption className="px-6 pb-4 font-ui text-xs text-gray-400 italic">
        The composite index fell below 50 — half of 1960 levels — sometime between 2010 and 2015. At current extraction rates, the index is projected to reach 30 by 2040.
      </figcaption>
    </figure>
  );
}

              López is one of millions of people across the American West whose lives are being quietly, irreversibly reshaped by a crisis that happens underground, out of sight: the systematic depletion of the aquifers that underlie the region's farmland, cities, and ecosystems.
            </p>
          </div>

          <AquiferChart />

          <div className="prose-body">
            <p>
              Over the past fourteen months, Groundwork reviewed more than 180,000 individual well monitoring records, conducted field interviews in eight states, and obtained internal federal documents through Freedom of Information Act requests. What we found is a system in collapse — and a regulatory apparatus that has, for decades, chosen not to see it.
            </p>
            <p>
              The High Plains Aquifer, which underlies roughly 174,000 square miles from South Dakota to Texas, has lost nearly 300 cubic miles of water since large-scale irrigation began in the 1950s. The Central Valley Aquifer in California, where López farms, has experienced an average water-level decline of more than 60 feet in some areas since 2000. The Phoenix Active Management Area in Arizona is depleting its groundwater at roughly twice the rate regulators have publicly acknowledged.
            </p>
          </div>

          <PullQuote
            quote="We're not running low on water. We're running out of the aquifer that everyone assumed would always be there."
            attribution="— Dr. Bridget Scanlon, Bureau of Economic Geology, University of Texas"
          />

          <div className="prose-body">
            <p>
              The consequences extend far beyond agriculture. Groundwater depletion is causing land to physically sink — a process called subsidence — in cities including Phoenix, Las Vegas, Houston, and large swaths of the Central Valley. Parts of the San Joaquin Valley have dropped by more than 28 feet since the 1920s, damaging infrastructure, cracking canals, and permanently reducing the storage capacity of the very aquifers being drained.
            </p>
            <p>
              At the same time, the underground collapse is accelerating surface water scarcity. Streams and rivers fed by aquifer discharge are drying up as water tables drop below the level needed to sustain baseflow. The Cimarron River in Kansas, the Ogallala-dependent segment of the Republican River, and dozens of smaller streams have experienced significant reductions in baseflow — or have gone dry — in the past thirty years.
            </p>
          </div>

          {/* Inline map placeholder */}
          <figure className="my-8 bg-gray-100 rounded-2xl overflow-hidden" aria-label="Map of aquifer stress zones">
            <div className="bg-gradient-to-br from-amber-50 to-red-50 aspect-[16/9] flex items-center justify-center relative">
              <img
                src="https://picsum.photos/seed/aquifer_map/900/500"
                alt="Map of the contiguous United States showing color-coded aquifer stress levels. Dark red regions across California, Kansas, Texas, and Arizona indicate critical stress. Yellow regions in Colorado, Nebraska, and Oregon indicate moderate stress. Green regions in the Pacific Northwest indicate low stress."
                className="w-full object-cover"
              />
              <div className="absolute bottom-3 right-3 bg-white/90 rounded-lg px-3 py-2 text-xs font-ui">
                <p className="font-bold text-gray-700 mb-1">Aquifer Stress Level</p>
                <div className="flex flex-col gap-0.5">
                  {[['Critical', 'bg-red-500'], ['High', 'bg-orange-400'], ['Moderate', 'bg-amber-300'], ['Low', 'bg-green-400']].map(([l, c]) => (
                    <div key={l} className="flex items-center gap-1.5">
                      <div className={`w-3 h-3 rounded-sm ${c}`} aria-hidden="true" />
                      <span>{l}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <figcaption className="px-5 py-3 font-ui text-xs text-gray-400 italic">
              Groundwork analysis of USGS groundwater level data. "Critical stress" indicates observed declines of more than 25% from 1990–2025 baseline.
              <a href="#" className="text-green-700 hover:underline ml-1">View interactive map →</a>
            </figcaption>
          </figure>

          <div className="prose-body">
            <p>
              Federal and state agencies have been aware of these trends for decades. Internal USGS memos obtained by Groundwork, dating to 2009, warned that "without significant policy intervention, several major aquifer systems in the American West face partial to complete functional depletion within the 21st century." Those memos were not released publicly. When we asked the USGS about them, a spokesperson said the agency "does not comment on pre-decisional deliberative materials."
            </p>
          </div>

          <PullQuote
            quote="The water law systems in most Western states were designed for a world of abundance. They have no graceful mechanism for scarcity."
            attribution="— Jennifer Pitt, National Audubon Society"
          />

          <div className="prose-body">
            <p>
              The legal and political obstacles to change are formidable. Water rights in most Western states are governed by the doctrine of prior appropriation — first in time, first in right — a system designed in the 19th century to encourage rapid development. Under this system, large agricultural users who established their water rights early hold almost ironclad claims to continue pumping, regardless of the broader consequences.
            </p>
            <p>
              Some states have attempted to address groundwater depletion through active management areas, sustainable yield targets, and metered extraction. Kansas, for example, has some of the most sophisticated groundwater regulation in the region. But even there, the pace of voluntary conservation has lagged far behind the pace of depletion. A recent state study found that even if all irrigators in the High Plains portion of Kansas reduced extraction by 20%, the aquifer would still be functionally depleted in most of the state within 50 years.
            </p>
            <p>
              For López and millions like her, abstract policy debates resolve into a single, daily reality: the wells are going dry. She has already fallowed 40 of her 140 acres. She is considering fallowing more. And she does not know where the water she needs will come from.
            </p>
            <p>
              "This is not something that happened to us," she says. "This is something we did to ourselves. Now we have to figure out how to live with it."
            </p>
          </div>
