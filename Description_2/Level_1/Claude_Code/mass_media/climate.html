/* ── Data Viz Preview ────────────────────────────────────────── */
function DataVizPreview() {
  /* Simple SVG bar chart — Western aquifer levels */
  const bars = [
    { year: '1960', val: 92 },
    { year: '1970', val: 84 },
    { year: '1980', val: 76 },
    { year: '1990', val: 68 },
    { year: '2000', val: 61 },
    { year: '2010', val: 55 },
    { year: '2020', val: 47 },
    { year: '2026', val: 41 },
  ];
  const maxVal = 100;
  const chartH = 120;
  return (
    <div className="bg-gray-900 rounded-2xl overflow-hidden mb-4">
      <div className="px-5 py-4 border-b border-gray-700">
        <p className="font-ui text-xs text-green-400 font-bold uppercase tracking-wider mb-1">Groundwork Data</p>
        <p className="font-display text-base font-bold text-white">High Plains Aquifer Level Index (1960–2026)</p>
        <p className="font-ui text-xs text-gray-400 mt-0.5">Composite of USGS monitoring wells, normalized to 1960 baseline (= 100)</p>
      </div>
      <div className="px-5 py-5" aria-label="Bar chart showing aquifer decline from index value 92 in 1960 to 41 in 2026">
        <svg viewBox={`0 0 ${bars.length * 48} ${chartH + 30}`} className="w-full" role="img" aria-label="High Plains Aquifer decline chart">
          <title>High Plains Aquifer Level Index 1960–2026</title>
          {bars.map((b, i) => {
            const barH = (b.val / maxVal) * chartH;
            const x = i * 48;
            const y = chartH - barH;
            const isLast = i === bars.length - 1;
            return (
              <g key={b.year}>
                <rect x={x + 6} y={y} width={34} height={barH}
                  fill={isLast ? '#dc2626' : '#16a34a'} rx="3"
                  aria-label={`${b.year}: ${b.val}`}
                />
                <text x={x + 23} y={chartH + 14} textAnchor="middle" fontSize="9" fill="#9ca3af">{b.year}</text>
                <text x={x + 23} y={y - 4} textAnchor="middle" fontSize="9" fill={isLast ? '#f87171' : '#4ade80'}>{b.val}</text>
              </g>
            );
          })}
          <line x1="0" y1={chartH} x2={bars.length * 48} y2={chartH} stroke="#374151" strokeWidth="1" />
        </svg>
      </div>
      <div className="px-5 pb-5">
        <a href="article.html" className="font-ui inline-flex items-center gap-2 bg-green-700 hover:bg-green-600 text-white text-sm font-semibold px-4 py-2.5 rounded-lg transition-colors">
          <IconChart /> View Full Interactive Report
        </a>
      </div>
    </div>
  );
}
