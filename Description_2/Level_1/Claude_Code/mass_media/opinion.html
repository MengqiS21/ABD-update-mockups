<!DOCTYPE html>

/* ── Page Header ─────────────────────────────────────────────── */
function PageHeader() {

}

/* ── Respond Link ────────────────────────────────────────────── */
function RespondLink({ href }) {
  return (
    <a href={href}
      className="font-ui inline-flex items-center gap-2 text-sm text-green-700 border border-green-200 hover:bg-green-50 px-4 py-2 rounded-lg transition-colors"
      aria-label="Submit a response or letter to this piece">
      <IconMail />
      Respond to this piece
    </a>
  );
}

/* ── Author Bio Card ─────────────────────────────────────────── */
function AuthorBioCard({ author, date, readTime, respond }) {
  return (
    <div className="flex flex-col sm:flex-row gap-4 bg-gray-50 rounded-xl p-4 border border-gray-100">
      <img src={author.avatar} alt={`${author.name}'s photo`}
        className="w-14 h-14 rounded-full object-cover flex-shrink-0" />
      <div className="flex-1 min-w-0">
        <div className="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2">
          <div>
            <p className="font-ui font-semibold text-sm text-gray-900">{author.name}</p>
            <p className="font-ui text-xs text-gray-500 mt-0.5">{author.title}</p>
            {author.affiliation && <p className="font-ui text-xs text-gray-400 mt-0.5">{author.affiliation}</p>}
          </div>
          <div className="font-ui text-xs text-gray-400 flex-shrink-0">
            <time>{date}</time> · {readTime} read
          </div>
        </div>
        {author.bio && <p className="font-ui text-xs text-gray-500 mt-2 leading-relaxed">{author.bio}</p>}
        <div className="flex items-center gap-2 mt-2">
          <span className="font-ui text-[10px] font-bold text-green-700 bg-green-50 border border-green-100 px-2 py-0.5 rounded">
            {author.expertise}
          </span>
          {respond && <RespondLink href={respond} />}
        </div>
      </div>

}

/* ── Featured Piece ──────────────────────────────────────────── */
function FeaturedPiece({ piece }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <article aria-label={`Featured perspective: ${piece.title}`} className="mb-14 pb-14 border-b border-gray-100">
      <div className="flex items-center gap-2 mb-5">
        <span className="font-ui text-[10px] font-bold uppercase tracking-widest bg-green-700 text-white px-2.5 py-1 rounded">Featured Perspective</span>
        <span className="font-ui text-xs text-gray-400">Water Law · Policy</span>
      </div>

      <div className="lg:grid lg:grid-cols-5 lg:gap-10 mb-6">
        <div className="lg:col-span-3 order-2 lg:order-1 flex flex-col justify-start">
          <h2 className="font-display text-3xl sm:text-4xl font-black leading-snug text-gray-900 mb-4">
            <a href={piece.href} className="hover:text-green-700 transition-colors">{piece.title}</a>
          </h2>
          <p className="font-prose text-lg text-gray-600 leading-relaxed mb-5">{piece.deck}</p>
          <AuthorBioCard author={piece.author} date={piece.date} readTime={piece.readTime} respond={piece.respondHref} />
        </div>
        <div className="lg:col-span-2 order-1 lg:order-2 mb-6 lg:mb-0">
          <figure>
            <a href={piece.href} tabIndex={-1} aria-hidden="true">
              <img src={piece.img} alt={piece.imgAlt} className="w-full rounded-2xl object-cover aspect-[16/10]" />
            </a>
          </figure>
        </div>
      </div>

      {/* Excerpt */}
      <div className="max-w-2xl">
        <div className="font-prose text-base text-gray-700 leading-relaxed space-y-4">
          {(expanded ? piece.excerpt : piece.excerpt.slice(0, 1)).map((para, i) => (
            <p key={i}>{para}</p>
          ))}
        </div>
        <div className="mt-5 flex items-center gap-3">
          <a href={piece.href} className="font-ui inline-flex items-center gap-2 bg-green-700 hover:bg-green-800 text-white font-semibold px-5 py-2.5 rounded-lg transition-colors text-sm">
            Read the full essay <IconArrow />
          </a>
          {!expanded && (
            <button onClick={() => setExpanded(true)} className="font-ui text-sm text-green-700 hover:text-green-800 underline">
              Show more
            </button>
          )}
        </div>
      </div>
    </article>

/* ── Opinion Card ────────────────────────────────────────────── */
function OpinionCard({ piece }) {
  return (
    <article aria-label={`Perspective: ${piece.title}`} className="grid sm:grid-cols-3 gap-6 py-8 border-b border-gray-100 last:border-0">
      <a href={piece.href} tabIndex={-1} aria-hidden="true" className="sm:col-span-1">
        <img src={piece.img} alt={piece.imgAlt} className="w-full rounded-xl object-cover aspect-[4/3]" loading="lazy" />
      </a>
      <div className="sm:col-span-2 flex flex-col justify-start">
        <h3 className="font-display text-xl font-bold leading-snug text-gray-900 mb-2">
          <a href={piece.href} className="hover:text-green-700 transition-colors">{piece.title}</a>
        </h3>
        <p className="font-prose text-sm text-gray-600 leading-relaxed mb-3">{piece.deck}</p>
        <p className="font-prose text-sm text-gray-500 italic mb-4">"{piece.excerpt.substring(0, 200)}…"</p>
        <AuthorBioCard author={piece.author} date={piece.date} readTime={piece.readTime} respond={piece.respondHref} />
        <div className="mt-3">
          <a href={piece.href} className="font-ui inline-flex items-center gap-1.5 text-sm text-green-700 font-semibold hover:text-green-800 transition-colors">

/* ── Letter Submission ───────────────────────────────────────── */
function LetterSubmission() {
  const [form, setForm] = useState({ name: '', email: '', affiliation: '', letter: '', reference: '' });
  const nameId = useId(); const emailId = useId(); const affId = useId();
  const letterId = useId(); const refId = useId();

  const handleSubmit = (e) => {
    e.preventDefault();
    if (form.name && form.email && form.letter) {
      alert('Thank you for your submission. Our editors will review your letter within 5 business days. (demo)');
      setForm({ name: '', email: '', affiliation: '', letter: '', reference: '' });
    }
  };

  const F = ({ label, req, children, htmlFor, hint }) => (
    <div>
      <label htmlFor={htmlFor} className="font-ui block text-sm font-medium text-gray-700 mb-1">
        {label}{req && <span className="text-red-500 ml-0.5" aria-label="required">*</span>}
      </label>
      {children}
      {hint && <p className="font-ui text-xs text-gray-400 mt-1">{hint}</p>}
    </div>
  );

  return (
    <section id="respond" aria-labelledby="respond-heading" className="bg-gray-50 rounded-2xl border border-gray-200 p-6 sm:p-8">
      <h2 id="respond-heading" className="font-display text-2xl font-bold text-gray-900 mb-1">Respond to a Perspective</h2>
      <p className="font-prose text-base text-gray-600 mb-6 leading-relaxed">
        We welcome responses from readers, researchers, practitioners, and community members. Selected letters are published in Perspectives. We do not publish anonymous submissions.
      </p>
      <form onSubmit={handleSubmit} noValidate className="space-y-5">
        <div className="grid sm:grid-cols-2 gap-5">
          <F label="Full name" req htmlFor={nameId}>
            <input id={nameId} type="text" required value={form.name} onChange={e => setForm(p => ({...p, name: e.target.value}))}
              autoComplete="name" placeholder="Dr. / Prof. / Mr. / Ms."
              className="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:border-green-600 focus:outline-none" />
          </F>
          <F label="Email address" req htmlFor={emailId} hint="Not published. Used for editorial correspondence only.">
            <input id={emailId} type="email" required value={form.email} onChange={e => setForm(p => ({...p, email: e.target.value}))}
              autoComplete="email" placeholder="you@institution.edu"
              className="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:border-green-600 focus:outline-none" />
          </F>
        </div>
        <F label="Affiliation / Title" htmlFor={affId} hint="Optional, but helps editors assess expertise and context.">
          <input id={affId} type="text" value={form.affiliation} onChange={e => setForm(p => ({...p, affiliation: e.target.value}))}
            placeholder="e.g. Professor of Hydrology, University of Kansas"
            className="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:border-green-600 focus:outline-none" />
        </F>
        <F label="Which piece are you responding to?" htmlFor={refId}>
          <select id={refId} value={form.reference} onChange={e => setForm(p => ({...p, reference: e.target.value}))}
            aria-label="Select the piece you are responding to"
            className="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-700 focus:border-green-600 focus:outline-none bg-white">
            <option value="">Select a piece…</option>
            <option>Groundwater Law Is a 19th-Century Solution to a 21st-Century Crisis</option>
            <option>I Farmed the Ogallala for Forty Years</option>
            <option>The Science Is Clear. Why Isn't the Policy?</option>
            <option>Water Privatization Won't Save Us</option>
            <option>In Defense of Optimism</option>
            <option>Other / General response</option>
          </select>
        </F>
        <F label="Your letter" req htmlFor={letterId} hint="Letters should be 200–600 words. We may edit for length and clarity. Original submissions only.">
          <textarea id={letterId} required rows={7} value={form.letter} onChange={e => setForm(p => ({...p, letter: e.target.value}))}
            placeholder="Write your response here…"
            className="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-green-600 focus:outline-none resize-none leading-relaxed" />
          <p className="font-ui text-right text-xs text-gray-400 mt-1">{form.letter.split(/\s+/).filter(Boolean).length} words</p>
        </F>
        <div className="flex items-start gap-3 p-3 bg-white border border-gray-200 rounded-lg">
          <input type="checkbox" id="ethics-check" required className="mt-0.5 w-4 h-4 accent-green-700 flex-shrink-0" />
          <label htmlFor="ethics-check" className="font-ui text-sm text-gray-600 cursor-pointer">
            I confirm this is my original work, written in my own name. I have disclosed any relevant conflicts of interest or funding sources in the text.
            <a href="#" className="text-green-700 hover:underline ml-1">Read our ethics policy →</a>
          </label>
        </div>
        <button type="submit"
          className="font-ui bg-green-700 hover:bg-green-800 text-white font-semibold px-6 py-3 rounded-lg transition-colors">
          Submit for Editorial Review
