                      <svg className="w-5 h-5 text-primary flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                        <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"/>
                      </svg>
                      <div>
                        <p className="font-semibold text-gray-800 text-sm">{item.title}</p>
                        <p className="text-gray-500 text-xs mt-0.5 leading-relaxed">{item.desc}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="bg-accent-light border border-yellow-200 rounded-xl p-5">
                <p className="font-semibold text-gray-800 mb-1">Report an accessibility issue</p>
                <p className="text-gray-600 text-sm mb-3">If you encounter any accessibility barriers on Vermont.gov, please contact the Agency of Digital Services.</p>
                <div className="flex flex-wrap gap-3">
                  <a href="contact.html" className="text-primary font-semibold text-sm hover:underline">Submit a Report →</a>
                  <a href="tel:18028282229" className="text-primary font-semibold text-sm hover:underline">Call (802) 828-2229</a>
                  <a href="mailto:accessibility@vermont.gov" className="text-primary font-semibold text-sm hover:underline">accessibility@vermont.gov</a>
                </div>
              </div>
            </div>
          </section>
        </main>
      );
    };

    const App = () => (
      <div className="min-h-screen flex flex-col">
        <SkipNav />
        <OfficialBanner />
        <Header current="About Vermont" />
        <div className="flex-1"><AboutPage /></div>
        <Footer />

    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
