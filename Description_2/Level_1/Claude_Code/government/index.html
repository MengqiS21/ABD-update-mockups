<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {

            'primary-light': '#E8F5E9',
            'primary-mid': '#2E7D32',

            accent: '#C8860A',
            'accent-light': '#FFF8E1',
            danger: '#B71C1C',
            'danger-light': '#FFEBEE',
          }
        }
      }

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    /* ── Shared: Skip Nav ── */
    const SkipNav = () => (
      <a href="#main-content" className="skip-link">Skip to main content</a>
    );

    /* ── Shared: Official Banner ── */
    const OfficialBanner = () => {
      const [open, setOpen] = useState(false);
      return (
        <div className="bg-gray-700 text-white text-xs">
          <div className="max-w-7xl mx-auto px-4 py-1.5 flex items-center gap-3 flex-wrap">
            <span className="flex items-center gap-1.5 font-medium">
              <svg className="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                <path fillRule="evenodd" d="M10 1.944A11.954 11.954 0 012.166 5C2.056 5.649 2 6.319 2 7c0 5.225 3.34 9.67 8 11.317C14.66 16.67 18 12.225 18 7c0-.682-.057-1.35-.166-2.001A11.954 11.954 0 0110 1.944z" clipRule="evenodd" />
              </svg>
              An official website of the State of Vermont

            <button onClick={() => setOpen(!open)} aria-expanded={open}
              className="text-blue-300 underline hover:no-underline text-xs focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-accent rounded">
              Here's how you know
            </button>
          </div>
          {open && (
            <div className="max-w-7xl mx-auto px-4 py-4 grid sm:grid-cols-2 gap-5 border-t border-gray-600 text-gray-300">
              <div className="flex gap-3">
                <svg className="w-6 h-6 text-green-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <div><p className="font-semibold text-white mb-0.5">Official websites use .gov</p><p>A .gov website belongs to an official government organization in the United States.</p></div>
              </div>
              <div className="flex gap-3">
                <svg className="w-6 h-6 text-green-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <div><p className="font-semibold text-white mb-0.5">Secure .gov websites use HTTPS</p><p>A lock or https:// means you've safely connected to the .gov website. Share sensitive information only on official, secure sites.</p></div>
              </div>
            </div>
          )}
        </div>
      );
    };

    /* ── Shared: Header ── */
    const Header = ({ current }) => {
      const [menuOpen, setMenuOpen] = useState(false);
      const [lang, setLang] = useState('EN');
      const navLinks = [
        { href: 'index.html', label: 'Home' },
        { href: 'services.html', label: 'Services' },
        { href: 'about.html', label: 'About Vermont' },
        { href: 'contact.html', label: 'Contact' },
      ];
      return (
        <header className="bg-white border-b-2 border-primary sticky top-0 z-40 shadow-sm" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16">
              <a href="index.html" className="flex items-center gap-3" aria-label="Vermont.gov — Home">
                <div className="w-10 h-10 rounded-full bg-primary flex items-center justify-center" aria-hidden="true">
                  <svg viewBox="0 0 40 40" className="w-8 h-8" fill="none" aria-hidden="true">
                    <circle cx="20" cy="20" r="20" fill="#1B5E20"/>
                    <text x="50%" y="56%" textAnchor="middle" fill="white" fontSize="13" fontWeight="700" fontFamily="Inter,sans-serif" dy="0">VT</text>
                  </svg>
                </div>
                <div>
                  <div className="font-bold text-lg text-primary leading-none">Vermont.gov</div>
                  <div className="text-xs text-gray-500 leading-none mt-0.5">Official State Portal</div>
                </div>
              </a>

              <nav aria-label="Main navigation" className="hidden md:flex items-center gap-1">
                {navLinks.map(link => (
                  <a key={link.href} href={link.href}
                    aria-current={current === link.label ? 'page' : undefined}
                    className={`px-4 py-2 rounded text-sm font-medium transition-colors ${
                      current === link.label
                        ? 'bg-primary-light text-primary font-semibold'
                        : 'text-gray-700 hover:bg-gray-100 hover:text-primary'
                    }`}>
                    {link.label}
                  </a>
                ))}
              </nav>

              <div className="flex items-center gap-3">
                <div className="hidden sm:flex items-center gap-1" role="group" aria-label="Select language">
                  {['EN','ES','FR'].map(l => (
                    <button key={l} onClick={() => setLang(l)}
                      aria-pressed={lang === l}
                      aria-label={`Switch to ${l === 'EN' ? 'English' : l === 'ES' ? 'Spanish' : 'French'}`}
                      className={`px-2.5 py-1 text-xs font-semibold rounded border transition-colors ${
                        lang === l ? 'bg-primary text-white border-primary' : 'text-gray-600 border-gray-300 hover:border-primary hover:text-primary'
                      }`}>
                      {l}
                    </button>
                  ))}
                </div>
                <button onClick={() => setMenuOpen(!menuOpen)}
                  aria-expanded={menuOpen} aria-controls="mobile-nav" aria-label="Toggle navigation menu"
                  className="md:hidden p-2 rounded text-gray-600 hover:bg-gray-100">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    {menuOpen
                      ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
                      : <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                  </svg>
                </button>
              </div>
            </div>
            {menuOpen && (
              <nav id="mobile-nav" aria-label="Mobile navigation" className="md:hidden py-3 border-t border-gray-100">
                {navLinks.map(link => (
                  <a key={link.href} href={link.href}
                    aria-current={current === link.label ? 'page' : undefined}
                    className={`block px-4 py-2.5 text-sm font-medium rounded mb-1 ${
                      current === link.label ? 'bg-primary-light text-primary' : 'text-gray-700 hover:bg-gray-100'

                    {link.label}
                  </a>
                ))}

                  {['EN','ES','FR'].map(l => (
                    <button key={l} onClick={() => setLang(l)} aria-pressed={lang === l}
                      aria-label={`Switch to ${l === 'EN' ? 'English' : l === 'ES' ? 'Spanish' : 'French'}`}
                      className={`px-3 py-1 text-xs font-semibold rounded border ${lang === l ? 'bg-primary text-white border-primary' : 'text-gray-600 border-gray-300'}`}>
                      {l}
                    </button>
                  ))}
                </div>
              </nav>
            )}
          </div>

      );

    const Footer = () => (

        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-8 mb-10">
            <div>
              <div className="flex items-center gap-2 mb-4">
                <div className="w-9 h-9 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm" aria-hidden="true">VT</div>
                <span className="font-bold text-white text-lg">Vermont.gov</span>
              </div>
              <p className="text-sm leading-relaxed text-gray-400">Official portal for Vermont state government services and information.</p>
            </div>
            <div>
              <h3 className="font-semibold text-white mb-3 text-xs uppercase tracking-wider">Quick Links</h3>
              <ul className="space-y-2 text-sm">
                {["Renew Driver's License","Apply for Benefits","Register to Vote","Find a School","Business Licenses"].map(t => (
                  <li key={t}><a href="#" className="hover:text-white transition-colors">{t}</a></li>
                ))}
              </ul>
            </div>
            <div>
              <h3 className="font-semibold text-white mb-3 text-xs uppercase tracking-wider">Departments</h3>
              <ul className="space-y-2 text-sm">
                {['DMV','Health','Education','Human Services','Tax Department'].map(t => (
                  <li key={t}><a href="#" className="hover:text-white transition-colors">{t}</a></li>
                ))}
              </ul>
            </div>
            <div>
              <h3 className="font-semibold text-white mb-3 text-xs uppercase tracking-wider">About</h3>
              <ul className="space-y-2 text-sm">
                {['Accessibility Statement','Privacy Policy','Site Disclaimer','Open Data','Site Map'].map(t => (
                  <li key={t}><a href="#" className="hover:text-white transition-colors">{t}</a></li>
                ))}
              </ul>
            </div>
          </div>
          <div className="border-t border-gray-600 pt-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-gray-500">
            <p>© 2025 State of Vermont. All rights reserved.</p>
            <p>Vermont State House · 115 State Street · Montpelier, VT 05633 · (802) 828-1110</p>
          </div>
        </div>
      </footer>
    );

    /* ── Page: Home ── */
    const HomePage = () => {
      const [query, setQuery] = useState('');
      const [alertDismissed, setAlertDismissed] = useState(false);

      const quickLinks = [
        { icon: '🪪', title: "Renew Driver's License", href: 'service-license.html', time: '~10 min online' },
        { icon: '🏥', title: 'Apply for Benefits', href: 'service-benefits.html', time: '~20 min online' },
        { icon: '🗳️', title: 'Register to Vote', href: '#', time: '~5 min online' },
        { icon: '🎓', title: 'Find a School', href: '#', time: 'Browse listings' },
        { icon: '🏢', title: 'Business Licenses', href: '#', time: '~15 min online' },
        { icon: '🌳', title: 'Parks & Recreation', href: '#', time: 'Browse & book' },
        { icon: '🏠', title: 'Property Records', href: '#', time: 'Search online' },
        { icon: '📋', title: 'Court Records', href: '#', time: 'View case info' },
      ];

      const updates = [
        { dept: 'Department of Taxes', time: '2 hours ago', msg: 'E-file portal now open for FY2024 returns. File online at tax.vermont.gov before April 15.', tag: 'Tax', tagColor: 'bg-orange-100 text-orange-800' },
        { dept: 'Dept. of Motor Vehicles', time: '1 day ago', msg: 'New online scheduling available for road tests at all DMV locations starting April 1, 2025.', tag: 'Licensing', tagColor: 'bg-blue-100 text-blue-800' },
        { dept: 'Dept. of Health', time: '2 days ago', msg: 'Spring vaccination clinics now available statewide. Find a clinic near you or schedule through MyHealthVT.', tag: 'Health', tagColor: 'bg-green-100 text-green-800' },
        { dept: 'Agency of Education', time: '3 days ago', msg: '2025–26 school enrollment windows are open for Burlington, Montpelier, and Barre districts.', tag: 'Education', tagColor: 'bg-purple-100 text-purple-800' },
      ];

      return (
        <>
          {/* Alert Banner */}
          {!alertDismissed && (
            <div role="alert" aria-live="polite" className="bg-danger text-white px-4 py-3">
              <div className="max-w-7xl mx-auto flex items-center gap-3 flex-wrap">
                <svg className="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                  <path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd" />
                </svg>
                <p className="text-sm font-medium flex-1">
                  <strong>Tax Filing Deadline: April 15</strong> — File Online Now.{' '}
                  <a href="#" className="underline hover:no-underline focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-white rounded">
                    Visit tax.vermont.gov →
                  </a>
                </p>
                <button onClick={() => setAlertDismissed(true)} aria-label="Dismiss tax deadline notice"
                  className="p-1 hover:bg-white/20 rounded transition-colors">
                  <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                    <path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd" />
                  </svg>
                </button>
              </div>
            </div>
          )}

          <main id="main-content" tabIndex={-1}>
            {/* Hero */}
            <section aria-labelledby="hero-heading" className="bg-gradient-to-br from-primary via-primary-mid to-green-700 text-white py-16 px-4">
              <div className="max-w-4xl mx-auto text-center">
                <p className="text-green-200 text-sm font-medium tracking-wide uppercase mb-3">State of Vermont · Official Resident Services</p>
                <h1 id="hero-heading" className="text-4xl sm:text-5xl font-extrabold mb-4 leading-tight">
                  What Do You Need Today?
                </h1>
                <p className="text-xl text-green-100 mb-8 max-w-2xl mx-auto leading-relaxed">
                  Access state government services, apply for benefits, renew licenses, and more — all in one place.
                </p>
                <form role="search" aria-label="Search Vermont state services" className="max-w-2xl mx-auto"
                  onSubmit={e => { e.preventDefault(); alert(`Searching for: "${query}"`); }}>
                  <div className="flex rounded-xl overflow-hidden shadow-lg">
                    <label htmlFor="hero-search" className="sr-only">Search for a service or topic</label>
                    <input id="hero-search" type="search" value={query} onChange={e => setQuery(e.target.value)}
                      placeholder="Try: driver's license, SNAP benefits, voter registration…"
                      className="flex-1 px-5 py-4 text-gray-900 text-base focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent"
                      aria-label="Search for a service or topic" />
                    <button type="submit"
                      className="bg-accent text-white px-7 py-4 font-semibold text-base hover:bg-yellow-700 transition-colors whitespace-nowrap">
                      Search
                    </button>
                  </div>
                  <p className="text-green-200 text-sm mt-3">
                    Popular:{' '}
                    {["Driver's license","SNAP benefits","Voter registration"].map((s, i) => (
                      <span key={s}>
                        <button type="button" onClick={() => setQuery(s)}
                          className="underline hover:no-underline text-green-100 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-white rounded">
                          {s}
                        </button>
                        {i < 2 ? ', ' : ''}
                      </span>
                    ))}
                  </p>
                </form>
              </div>
            </section>

            {/* Quick Task Links */}
            <section aria-labelledby="tasks-heading" className="py-12 px-4 bg-white">
              <div className="max-w-7xl mx-auto">
                <div className="flex items-end justify-between mb-6">
                  <div>
                    <h2 id="tasks-heading" className="text-2xl font-bold text-gray-900">Common Tasks</h2>
                    <p className="text-gray-500 mt-1">Access the most frequently requested state services</p>
                  </div>
                  <a href="services.html" className="text-primary font-semibold text-sm hover:underline flex items-center gap-1">
                    All services
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/>
                    </svg>
                  </a>
                </div>
                <ul className="grid grid-cols-2 sm:grid-cols-4 gap-4" role="list" aria-label="Common state services">
                  {quickLinks.map(link => (
                    <li key={link.title}>
                      <a href={link.href}
                        className="flex flex-col items-center text-center p-5 border-2 border-gray-100 rounded-xl hover:border-primary hover:bg-primary-light transition-all group h-full">
                        <span className="text-3xl mb-3" aria-hidden="true">{link.icon}</span>
                        <span className="font-semibold text-gray-800 text-sm group-hover:text-primary leading-snug">{link.title}</span>
                        <span className="text-xs text-gray-400 mt-1.5">{link.time}</span>
                      </a>
                    </li>
                  ))}
                </ul>
              </div>
            </section>

            {/* Updates + Sidebar */}
            <section aria-labelledby="updates-heading" className="py-12 px-4 bg-gray-50">
              <div className="max-w-7xl mx-auto grid lg:grid-cols-3 gap-8">
                <div className="lg:col-span-2">
                  <h2 id="updates-heading" className="text-2xl font-bold text-gray-900 mb-6">Live Updates from State Departments</h2>
                  <div role="feed" aria-label="State department news" className="space-y-4">
                    {updates.map((u, i) => (
                      <article key={i} className="bg-white rounded-xl p-5 border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                        <div className="flex items-start justify-between gap-3 mb-2">
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="font-semibold text-gray-900 text-sm">{u.dept}</span>
                            <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${u.tagColor}`}>{u.tag}</span>
                          </div>
                          <time className="text-xs text-gray-400 flex-shrink-0 whitespace-nowrap">{u.time}</time>
                        </div>
                        <p className="text-gray-600 text-sm leading-relaxed">{u.msg}</p>
                        <a href="#" className="text-primary text-xs font-semibold mt-2 inline-block hover:underline">Learn more →</a>
                      </article>
                    ))}
                  </div>
                </div>

                <aside aria-label="Emergency resources and account sign-in" className="space-y-5">
                  <div className="bg-danger text-white rounded-xl p-5">
                    <h3 className="font-bold text-lg mb-1">Emergency Resources</h3>
                    <p className="text-red-100 text-sm mb-4">Need immediate assistance?</p>
                    <ul className="space-y-2.5 text-sm">
                      <li><a href="tel:911" className="flex items-center gap-2 hover:text-red-200 font-medium"><span aria-hidden="true">🚨</span> Emergency: Call 911</a></li>
                      <li><a href="tel:211" className="flex items-center gap-2 hover:text-red-200"><span aria-hidden="true">📞</span> Crisis Hotline: 2-1-1</a></li>
                      <li><a href="#" className="flex items-center gap-2 hover:text-red-200"><span aria-hidden="true">🏠</span> Housing Assistance</a></li>
                      <li><a href="#" className="flex items-center gap-2 hover:text-red-200"><span aria-hidden="true">🍎</span> Food Banks &amp; Pantries</a></li>
                    </ul>
                  </div>

                  <div className="bg-white rounded-xl p-5 border border-gray-200 shadow-sm">
                    <h3 className="font-bold text-gray-900 text-lg mb-1">My Vermont Account</h3>
                    <p className="text-gray-500 text-sm mb-4 leading-relaxed">Sign in to track applications, renew licenses, and manage your state records securely.</p>
                    <a href="#"
                      className="block w-full text-center bg-primary text-white py-2.5 rounded-lg font-semibold hover:bg-primary-dark transition-colors mb-2">
                      Sign In
                    </a>
                    <a href="#"
                      className="block w-full text-center text-primary border-2 border-primary py-2.5 rounded-lg font-semibold hover:bg-primary-light transition-colors">
                      Create Account
                    </a>
                  </div>

                  <div className="bg-accent-light border border-yellow-200 rounded-xl p-5">
                    <h3 className="font-bold text-gray-900 mb-1">Need Help?</h3>
                    <p className="text-gray-600 text-sm mb-3">Speak with a Vermont resident services representative.</p>
                    <p className="font-semibold text-gray-900 text-sm">Mon–Fri 8am–5pm</p>
                    <a href="tel:18008282229" className="text-primary font-bold text-lg hover:underline">(800) 828-2229</a>
                    <p className="text-gray-500 text-xs mt-1">TTY: (800) 253-0191</p>
                    <a href="contact.html" className="text-primary text-sm font-semibold hover:underline mt-2 inline-block">More contact options →</a>
                  </div>
                </aside>
              </div>
            </section>

            {/* Life Stages CTA */}
            <section aria-labelledby="life-stages-heading" className="py-12 px-4 bg-white">
              <div className="max-w-7xl mx-auto text-center">
                <h2 id="life-stages-heading" className="text-2xl font-bold text-gray-900 mb-2">Services for Every Vermonter</h2>
                <p className="text-gray-500 mb-8">Find services tailored to your situation and life stage</p>
                <ul className="grid grid-cols-2 sm:grid-cols-5 gap-4" role="list" aria-label="Browse services by life stage">

                    { emoji: '🆕', label: 'New Residents' },
                    { emoji: '👨‍👩‍👧', label: 'Families' },
                    { emoji: '🎓', label: 'Students' },
                    { emoji: '👴', label: 'Seniors' },
                    { emoji: '🏢', label: 'Businesses' },
                  ].map(item => (
                    <li key={item.label}>
                      <a href="services.html"
                        className="flex flex-col items-center gap-2.5 p-6 bg-gray-50 rounded-xl border-2 border-transparent hover:border-primary hover:bg-primary-light transition-all group">
                        <span className="text-4xl" aria-hidden="true">{item.emoji}</span>
                        <span className="font-semibold text-gray-800 text-sm group-hover:text-primary">{item.label}</span>
                      </a>
                    </li>
                  ))}
                </ul>
              </div>
            </section>
