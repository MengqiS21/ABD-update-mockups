<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — ThreadHouse</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest:   '#2C4A1E',
            sage:     '#7A9E5A',
            cream:    '#F8F5EE',
            gold:     '#D4A853',
            bark:     '#8B6B4A',
            charcoal: '#1C1C1C',
            muted:    '#5A5A5A',
            border:   '#D8D3CA',
          },
        },
      },
    };
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0}
    :focus-visible{outline:3px solid #2C4A1E;outline-offset:3px;border-radius:2px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .animate-fade-in{animation:fadeIn .35s ease forwards}
  </style>
</head>
<body class="bg-cream text-charcoal font-sans">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    /* ── Header ── */
    function Header() {
      const [menuOpen, setMenuOpen] = useState(false);
      const nav = [
        { label:'New Arrivals', href:'products.html' },
        { label:'Women',        href:'products.html' },
        { label:'Men',          href:'products.html' },
        { label:'Accessories',  href:'products.html' },
        { label:'Sale',         href:'products.html' },
      ];
      return (
        <header role="banner" className="sticky top-0 z-50 bg-cream border-b border-border shadow-sm">
          <a href="#main-content" className="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 focus:bg-forest focus:text-white focus:px-4 focus:py-2 focus:rounded">Skip to main content</a>
          <div className="bg-forest text-white text-center text-xs py-2 px-4 tracking-wide">Free shipping on orders over $75 · Use code <strong>SPRING10</strong> for 10% off</div>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16 gap-4">
              <a href="index.html" className="flex-shrink-0 font-serif text-2xl font-bold tracking-tight text-forest" aria-label="ThreadHouse Home">Thread<span className="text-gold">House</span></a>
              <nav aria-label="Main navigation" className="hidden lg:flex items-center gap-6">
                {nav.map(n => <a key={n.label} href={n.href} className="text-sm font-medium text-charcoal hover:text-forest transition-colors">{n.label}</a>)}
              </nav>
              <div className="flex items-center gap-2">
                <a href="account.html" aria-label="My account" className="p-2 rounded-full hover:bg-border transition-colors hidden sm:block">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </a>
                <a href="cart.html" aria-label="Shopping cart, 3 items — current page" aria-current="page" className="relative p-2 rounded-full hover:bg-border transition-colors">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                  <span className="absolute -top-0.5 -right-0.5 bg-gold text-white text-xs w-4 h-4 rounded-full flex items-center justify-center font-bold" aria-hidden="true">3</span>
                </a>
                <button onClick={() => setMenuOpen(v => !v)} aria-label={menuOpen ? 'Close menu' : 'Open menu'} aria-expanded={menuOpen} className="lg:hidden p-2 rounded hover:bg-border transition-colors">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" aria-hidden="true">{menuOpen ? <path d="M6 18L18 6M6 6l12 12"/> : <><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>}</svg>
                </button>
              </div>
            </div>
          </div>
          {menuOpen && (
            <nav aria-label="Mobile navigation" className="lg:hidden bg-white border-t border-border px-4 py-3">
              {nav.map(n => <a key={n.label} href={n.href} className="block py-2.5 text-sm font-medium text-charcoal hover:text-forest border-b border-border/50 last:border-0">{n.label}</a>)}
            </nav>
          )}
        </header>
      );
    }

    /* ── Footer ── */
    function Footer() {
      return (
        <footer role="contentinfo" className="bg-charcoal text-white mt-16">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
              <div>
                <p className="font-serif text-2xl font-bold mb-3">Thread<span className="text-gold">House</span></p>
                <p className="text-sm text-gray-400 leading-relaxed">Sustainable, independently designed fashion for the conscious generation.</p>
              </div>
              <nav aria-label="Shop links"><h3 className="font-semibold text-sm uppercase tracking-widest mb-4 text-gold">Shop</h3>{['New Arrivals','Women','Men','Accessories','Sale'].map(l => <a key={l} href="products.html" className="block text-sm text-gray-400 hover:text-white py-1 transition-colors">{l}</a>)}</nav>
              <nav aria-label="Help links"><h3 className="font-semibold text-sm uppercase tracking-widest mb-4 text-gold">Help</h3>{['Size Guide','Returns & Exchanges','Shipping Info','Contact Us'].map(l => <a key={l} href="#" className="block text-sm text-gray-400 hover:text-white py-1 transition-colors">{l}</a>)}</nav>
              <div>
                <h3 className="font-semibold text-sm uppercase tracking-widest mb-4 text-gold">Stay in the Loop</h3>
                <form onSubmit={e => e.preventDefault()} className="flex gap-2">
                  <label htmlFor="footer-email" className="sr-only">Email address</label>
                  <input id="footer-email" type="email" placeholder="your@email.com" required className="flex-1 px-3 py-2 text-sm rounded bg-white/10 border border-white/20 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gold" />
                  <button type="submit" className="px-4 py-2 bg-gold text-white text-sm font-semibold rounded hover:bg-amber-500 transition-colors">Join</button>
                </form>
              </div>
            </div>
            <div className="border-t border-white/10 mt-10 pt-6 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-gray-500">
              <p>© 2025 ThreadHouse. Certified B Corp.</p>
              <div className="flex gap-4"><a href="#" className="hover:text-white transition-colors">Privacy Policy</a><a href="#" className="hover:text-white transition-colors">Terms</a></div>
            </div>
          </div>
        </footer>
      );
    }

    /* ── Cart Item ── */
    function CartItem({ item, onQtyChange, onRemove }) {
      return (
        <article className="flex gap-4 sm:gap-5 py-5 border-b border-border last:border-0 animate-fade-in"
                 aria-label={`Cart item: ${item.name}`}>
          {/* Thumbnail */}
          <a href="product-detail.html" className="flex-shrink-0 rounded-xl overflow-hidden w-24 sm:w-32 aspect-[3/4] bg-border focus-visible:ring-2 focus-visible:ring-forest">
            <img src={`https://picsum.photos/seed/${item.seed}/200/280`}
                 alt={`${item.name} in ${item.color}, size ${item.size}`}
                 className="w-full h-full object-cover" />
          </a>

          {/* Details */}
          <div className="flex-1 min-w-0 flex flex-col justify-between">
            <div>
              <div className="flex items-start justify-between gap-2">
                <div>
                  <a href="product-detail.html" className="font-semibold text-sm sm:text-base text-charcoal hover:text-forest transition-colors">{item.name}</a>
                  <p className="text-xs sm:text-sm text-muted mt-0.5">{item.color} · Size {item.size}</p>
                  <p className="text-xs text-muted">{item.material}</p>
                </div>
                <button onClick={() => onRemove(item.id)}
                        aria-label={`Remove ${item.name} from cart`}
                        className="flex-shrink-0 p-1.5 rounded hover:bg-border transition-colors text-muted hover:text-red-600">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </div>

              {/* Stock warning */}
              {item.lowStock && (
                <p className="text-xs text-red-600 font-medium mt-1.5 flex items-center gap-1" role="alert">
                  <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true"><path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd"/></svg>
                  Only {item.stockLeft} left in stock
                </p>
              )}
            </div>

            <div className="flex items-center justify-between mt-3">
              {/* Qty */}
              <div className="flex items-center border border-border rounded-lg overflow-hidden" role="group" aria-label={`Quantity for ${item.name}`}>
                <button onClick={() => onQtyChange(item.id, item.qty - 1)}
                        aria-label={`Decrease quantity of ${item.name}`}
                        disabled={item.qty <= 1}
                        className="px-3 py-2 hover:bg-border transition-colors text-sm font-light disabled:opacity-30 disabled:cursor-not-allowed">−</button>
                <span className="px-4 text-sm font-semibold min-w-[2.5rem] text-center" aria-live="polite" aria-label={`Quantity: ${item.qty}`}>{item.qty}</span>
                <button onClick={() => onQtyChange(item.id, item.qty + 1)}
                        aria-label={`Increase quantity of ${item.name}`}
                        className="px-3 py-2 hover:bg-border transition-colors text-sm font-light">+</button>
              </div>

              {/* Price */}
              <div className="text-right">
                <p className="font-bold text-base text-charcoal">${(item.price * item.qty).toFixed(2)}</p>
                {item.qty > 1 && <p className="text-xs text-muted">${item.price} each</p>}
              </div>
            </div>
          </div>
        </article>
      );
    }

    /* ── Loyalty Points Tracker ── */
    function LoyaltyTracker({ subtotal }) {
      const pointsEarned = Math.floor(subtotal);
      const currentBalance = 380;
      const goal = 500;
      const toGo = goal - currentBalance;
      const pct = Math.min(100, (currentBalance / goal) * 100);

      return (
        <div className="bg-forest/5 border border-forest/20 rounded-2xl p-5" aria-label="Loyalty rewards tracker">
          <div className="flex items-center gap-2 mb-3">
            <span className="text-xl" aria-hidden="true">⭐</span>
            <h3 className="font-semibold text-sm text-forest">ThreadHouse Rewards</h3>
          </div>
          <p className="text-sm text-charcoal mb-4">
            You're <strong>{toGo} points</strong> away from a <strong>free tote bag</strong>!
          </p>

          {/* Progress bar */}
          <div className="mb-2">
            <div className="flex justify-between text-xs text-muted mb-1">
              <span>Your balance: <strong className="text-forest">{currentBalance} pts</strong></span>
              <span>Goal: {goal} pts</span>
            </div>
            <div className="h-3 bg-border rounded-full overflow-hidden" role="progressbar"
                 aria-valuenow={currentBalance} aria-valuemin="0" aria-valuemax={goal}
                 aria-label={`${currentBalance} of ${goal} points toward free tote`}>
              <div className="h-full bg-gradient-to-r from-forest to-sage rounded-full transition-all duration-500"
                   style={{width:`${pct}%`}} aria-hidden="true" />
            </div>
          </div>

          <p className="text-xs text-muted">
            This order will earn you <strong className="text-forest">+{pointsEarned} points</strong>.
            After checkout you'll have <strong className="text-forest">{currentBalance + pointsEarned} points</strong>.
          </p>
        </div>
      );
    }

    /* ── Order Summary ── */
    function OrderSummary({ items, giftWrap }) {
      const [promoCode, setPromoCode] = useState('');
      const [promoApplied, setPromoApplied] = useState(false);
      const [promoError, setPromoError] = useState('');

      const subtotal = items.reduce((sum, i) => sum + i.price * i.qty, 0);
      const discount = promoApplied ? subtotal * 0.1 : 0;
      const giftWrapFee = giftWrap ? 5 : 0;
      const shipping = subtotal - discount >= 75 ? 0 : 7.95;
      const total = subtotal - discount + giftWrapFee + shipping;

      const applyPromo = () => {
        if (promoCode.toUpperCase() === 'SPRING10') {
          setPromoApplied(true);
          setPromoError('');
        } else {
          setPromoError('Invalid promo code. Try SPRING10.');
        }
      };

      return (
        <aside aria-label="Order summary" className="bg-white rounded-2xl border border-border p-6 sticky top-24">
          <h2 className="font-serif text-xl font-bold text-charcoal mb-5">Order Summary</h2>

          {/* Line items */}
          <dl className="space-y-3 text-sm mb-5">
            <div className="flex justify-between">
              <dt className="text-muted">Subtotal ({items.reduce((s,i) => s + i.qty, 0)} items)</dt>
              <dd className="font-medium">${subtotal.toFixed(2)}</dd>
            </div>
            {promoApplied && (
              <div className="flex justify-between text-forest animate-fade-in">
                <dt className="font-medium">Promo (SPRING10 −10%)</dt>
                <dd className="font-semibold">−${discount.toFixed(2)}</dd>
              </div>
            )}
            {giftWrapFee > 0 && (
              <div className="flex justify-between">
                <dt className="text-muted">Gift wrapping</dt>
                <dd className="font-medium">+${giftWrapFee.toFixed(2)}</dd>
              </div>
            )}
            <div className="flex justify-between">
              <dt className="text-muted">Shipping</dt>
              <dd className={`font-medium ${shipping === 0 ? 'text-forest' : ''}`}>
                {shipping === 0 ? 'FREE' : `$${shipping.toFixed(2)}`}
              </dd>
            </div>
            {shipping > 0 && (
              <p className="text-xs text-muted bg-gold/10 rounded-lg px-3 py-2" role="note">
                Add ${(75 - (subtotal - discount)).toFixed(2)} more for free shipping
              </p>
            )}
          </dl>

          <div className="border-t border-border pt-4 mb-5">
            <div className="flex justify-between items-baseline">
              <span className="font-bold text-charcoal">Total</span>
              <div className="text-right">
                <span className="font-bold text-2xl text-charcoal">${total.toFixed(2)}</span>
                <p className="text-xs text-muted">incl. taxes</p>
              </div>
            </div>
          </div>

          {/* Promo code */}
          {!promoApplied && (
            <div className="mb-5">
              <label htmlFor="promo-code" className="text-xs font-semibold text-muted uppercase tracking-wide block mb-2">Promo Code</label>
              <div className="flex gap-2">
                <input id="promo-code" type="text" value={promoCode}
                       onChange={e => { setPromoCode(e.target.value); setPromoError(''); }}
                       onKeyDown={e => e.key === 'Enter' && applyPromo()}
                       placeholder="Enter code"
                       aria-describedby={promoError ? 'promo-error' : undefined}
                       className="flex-1 border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-forest" />
                <button onClick={applyPromo} className="px-4 py-2 border border-forest text-forest text-sm font-semibold rounded-lg hover:bg-forest hover:text-white transition-colors">Apply</button>
              </div>
              {promoError && <p id="promo-error" role="alert" className="text-xs text-red-600 mt-1.5">{promoError}</p>}
            </div>
          )}
          {promoApplied && (
            <div className="mb-5 flex items-center justify-between bg-forest/10 rounded-lg px-3 py-2 animate-fade-in">
              <span className="text-sm font-semibold text-forest">✓ SPRING10 applied</span>
              <button onClick={() => { setPromoApplied(false); setPromoCode(''); }}
                      className="text-xs text-muted hover:text-red-600 transition-colors" aria-label="Remove promo code SPRING10">Remove</button>
            </div>
          )}

          {/* Checkout CTA */}
          <button className="w-full bg-forest text-white font-bold py-4 rounded-xl hover:bg-sage transition-colors text-sm uppercase tracking-wide shadow-lg shadow-forest/20"
                  aria-label={`Proceed to checkout — total $${total.toFixed(2)}`}>
            Proceed to Checkout →
          </button>
          <p className="text-center text-xs text-muted mt-3 flex items-center justify-center gap-1.5">
            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            256-bit SSL secured checkout
          </p>

          {/* Payment icons */}
          <div className="flex items-center justify-center gap-2 mt-4" aria-label="Accepted payment methods">
            {['Visa','MC','Amex','PayPal','Apple Pay'].map(p => (
              <span key={p} className="bg-border px-2 py-1 rounded text-xs text-muted font-medium">{p}</span>
            ))}
          </div>
        </aside>
      );
    }

    /* ── Main Cart Page ── */
    function CartPage() {
      const [items, setItems] = useState([
        { id:1, name:'Oversized Linen Shirt',   color:'Sage Green', size:'S', material:'100% European Linen', price:89,  qty:1, lowStock:true,  stockLeft:2, seed:'cart1' },
        { id:2, name:'Wide Leg Organic Denim',   color:'Indigo',     size:'M', material:'Organic Cotton',      price:145, qty:1, lowStock:false, stockLeft:null, seed:'cart2' },
        { id:3, name:'Bamboo Ribbed Tank',        color:'Cream',      size:'S', material:'Bamboo',             price:42,  qty:2, lowStock:false, stockLeft:null, seed:'cart3' },
      ]);
      const [giftWrap, setGiftWrap] = useState(false);
      const [giftMessage, setGiftMessage] = useState('');

      const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);

      const handleQtyChange = (id, newQty) => {
        if (newQty < 1) return;
        setItems(prev => prev.map(i => i.id === id ? { ...i, qty: newQty } : i));
      };

      const handleRemove = (id) => {
        setItems(prev => prev.filter(i => i.id !== id));
      };

      // Estimated delivery: 3–5 business days from now
      const deliveryDate = new Date();
      deliveryDate.setDate(deliveryDate.getDate() + 5);
      const deliveryEnd = new Date(deliveryDate);
      deliveryEnd.setDate(deliveryEnd.getDate() + 2);
      const fmt = (d) => d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

      return (
        <main id="main-content" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
          {/* Breadcrumb */}
          <nav aria-label="Breadcrumb" className="text-xs text-muted mb-6">
            <ol className="flex items-center gap-1.5">
              <li><a href="index.html" className="hover:text-forest transition-colors">Home</a></li>
              <li aria-hidden="true">/</li>
              <li><span className="text-charcoal font-medium" aria-current="page">Shopping Cart</span></li>
            </ol>
          </nav>

          <h1 className="font-serif text-4xl font-bold text-charcoal mb-2">Your Cart</h1>
          <p className="text-muted text-sm mb-8">{items.length} item{items.length !== 1 ? 's' : ''}</p>

          {items.length === 0 ? (
            <div className="text-center py-24 animate-fade-in">
              <span className="text-6xl mb-4 block" aria-hidden="true">🛍️</span>
              <h2 className="font-serif text-2xl font-bold text-charcoal mb-3">Your cart is empty</h2>
              <p className="text-muted mb-6">Looks like you haven't added anything yet.</p>
              <a href="products.html" className="inline-block bg-forest text-white font-semibold px-8 py-4 rounded-full hover:bg-sage transition-colors">Start Shopping</a>
            </div>
          ) : (
            <div className="grid lg:grid-cols-3 gap-10">
              {/* Left: items + extras */}
              <div className="lg:col-span-2 space-y-6">
                {/* Cart items */}
                <section aria-label="Cart items" className="bg-white rounded-2xl p-5 sm:p-6 border border-border">
                  {items.map(item => (
                    <CartItem key={item.id} item={item} onQtyChange={handleQtyChange} onRemove={handleRemove} />
                  ))}
                </section>

                {/* Gift wrapping */}
                <section aria-labelledby="gift-wrap-heading" className="bg-white rounded-2xl p-5 sm:p-6 border border-border">
                  <div className="flex items-start gap-4">
                    <div className="w-10 h-10 rounded-xl bg-gold/15 flex items-center justify-center flex-shrink-0" aria-hidden="true">
                      <span className="text-xl">🎁</span>
                    </div>
                    <div className="flex-1">
                      <div className="flex items-center justify-between gap-3 flex-wrap">
                        <div>
                          <h2 id="gift-wrap-heading" className="font-semibold text-sm text-charcoal">Gift Wrapping</h2>
                          <p className="text-xs text-muted mt-0.5">Beautiful tissue paper, ribbon, and a handwritten card</p>
                        </div>
                        <div className="flex items-center gap-3">
                          <span className="text-sm font-semibold text-muted">+$5.00</span>
                          <label className="flex items-center gap-2 cursor-pointer" htmlFor="gift-wrap-toggle">
                            <input id="gift-wrap-toggle" type="checkbox" checked={giftWrap}
                                   onChange={e => setGiftWrap(e.target.checked)}
                                   className="sr-only" />
                            <span role="switch" aria-checked={giftWrap} aria-labelledby="gift-wrap-heading"
                                  className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${giftWrap ? 'bg-forest' : 'bg-gray-300'}`}>
                              <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform shadow ${giftWrap ? 'translate-x-6' : 'translate-x-1'}`} aria-hidden="true"/>
                            </span>
                            <span className="text-xs text-muted">{giftWrap ? 'Added' : 'Add'}</span>
                          </label>
                        </div>
                      </div>

                      {giftWrap && (
                        <div className="mt-4 animate-fade-in">
                          <label htmlFor="gift-message" className="text-xs font-medium text-charcoal mb-1.5 block">
                            Gift message <span className="text-muted font-normal">(optional, 150 chars)</span>
                          </label>
                          <textarea id="gift-message" value={giftMessage}
                                    onChange={e => setGiftMessage(e.target.value.slice(0, 150))}
                                    placeholder="Write your personal message here…"
                                    rows="3"
                                    aria-describedby="gift-char-count"
                                    className="w-full border border-border rounded-lg p-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-forest" />
                          <p id="gift-char-count" className="text-xs text-muted text-right mt-1">{giftMessage.length}/150</p>
                        </div>
                      )}
                    </div>
                  </div>
                </section>

                {/* Delivery estimate */}
                <section aria-labelledby="delivery-heading" className="bg-white rounded-2xl p-5 sm:p-6 border border-border">
                  <h2 id="delivery-heading" className="font-semibold text-sm text-charcoal mb-4 flex items-center gap-2">
                    <span aria-hidden="true">🚚</span> Estimated Delivery
                  </h2>
                  <div className="grid sm:grid-cols-3 gap-4">
                    {[
                      { label:'Standard', days:'5–7 business days', date:`${fmt(deliveryDate)} – ${fmt(deliveryEnd)}`, price:'FREE on orders $75+', highlight: subtotal >= 75 },
                      { label:'Express',  days:'2–3 business days', date:'Wed, Apr 2 – Thu, Apr 3', price:'$9.95', highlight:false },
                      { label:'Overnight',days:'Next business day', date:'Mon, Mar 31', price:'$24.95', highlight:false },
                    ].map(opt => (
                      <label key={opt.label} className="cursor-pointer">
                        <input type="radio" name="shipping-method" defaultChecked={opt.label === 'Standard'}
                               className="sr-only" aria-label={`${opt.label} shipping: ${opt.days}, ${opt.price}`} />
                        <div className={`border-2 rounded-xl p-4 transition-colors ${opt.label === 'Standard' ? 'border-forest bg-forest/5' : 'border-border hover:border-forest/50'}`}>
                          <div className="flex justify-between items-start mb-1">
                            <p className="font-semibold text-sm text-charcoal">{opt.label}</p>
                            {opt.label === 'Standard' && (
                              <div className="w-4 h-4 bg-forest rounded-full flex items-center justify-center flex-shrink-0" aria-hidden="true">
                                <svg className="w-2.5 h-2.5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>
                              </div>
                            )}
                          </div>
                          <p className="text-xs text-muted">{opt.days}</p>
                          <p className="text-xs text-charcoal mt-1">{opt.date}</p>
                          <p className={`text-xs font-semibold mt-2 ${opt.highlight && subtotal >= 75 ? 'text-forest' : 'text-charcoal'}`}>{opt.price}</p>
                        </div>
                      </label>
                    ))}
                  </div>
                </section>

                {/* Loyalty points */}
                <LoyaltyTracker subtotal={subtotal} />
              </div>

              {/* Right: order summary */}
              <div className="lg:col-span-1">
                <OrderSummary items={items} giftWrap={giftWrap} />

                {/* Continue shopping */}
                <div className="mt-4 text-center">
                  <a href="products.html" className="text-sm text-forest underline underline-offset-2 hover:text-sage transition-colors">← Continue shopping</a>
                </div>

                {/* Trust badges */}
                <div className="mt-6 grid grid-cols-3 gap-3 text-center">
                  {[
                    { icon:'🔒', label:'Secure\nCheckout' },
                    { icon:'↩',  label:'Free\nReturns' },
                    { icon:'🌿', label:'Carbon\nNeutral' },
                  ].map(b => (
                    <div key={b.label} className="bg-white rounded-xl p-3 border border-border">
                      <span className="text-2xl block mb-1" aria-hidden="true">{b.icon}</span>
                      <p className="text-xs text-muted whitespace-pre-line leading-tight">{b.label}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Recently viewed */}
          <section aria-labelledby="recently-heading" className="mt-16">
            <h2 id="recently-heading" className="font-serif text-2xl font-bold text-charcoal mb-6">Recently Viewed</h2>
            <ul className="grid grid-cols-2 sm:grid-cols-4 gap-4" aria-label="Recently viewed products">
              {[
                { name:'Recycled Fleece Hoodie', price:98, seed:'rv1' },
                { name:'Linen Midi Skirt',       price:95, seed:'rv2' },
                { name:'Bamboo Wrap Dress',      price:148,seed:'rv3' },
                { name:'Organic Cotton Joggers', price:75, seed:'rv4' },
              ].map(p => (
                <li key={p.name}>
                  <a href="product-detail.html" className="group block" aria-label={`${p.name}, $${p.price}`}>
                    <div className="aspect-[3/4] rounded-xl overflow-hidden bg-border mb-2">
                      <img src={`https://picsum.photos/seed/${p.seed}/200/280`} alt={p.name}
                           className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                    </div>
                    <p className="text-sm font-medium text-charcoal group-hover:text-forest transition-colors">{p.name}</p>
                    <p className="text-sm font-bold text-charcoal mt-0.5">${p.price}.00</p>
                  </a>
                </li>
              ))}
            </ul>
          </section>
        </main>
      );
    }

    function App() {
      return (
        <>
          <Header />
          <CartPage />
          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
