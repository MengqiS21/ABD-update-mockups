<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Folia Creative Community</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'folia-bg':     '#FAF9F7',
            'folia-surf':   '#F2EFEA',
            'folia-border': '#E4DFD8',
            'folia-text':   '#1C1917',
            'folia-muted':  '#78716C',
            'folia-accent': '#7C3AED',
            'folia-accent-h':'#6D28D9',
            'folia-rose':   '#F43F5E',
            'folia-amber':  '#D97706',
            'folia-sidebar':'#161514',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #FAF9F7; color: #1C1917; }
    :focus-visible { outline: 3px solid #7C3AED !important; outline-offset: 2px !important; }
    .skip-link { position:absolute;top:-52px;left:8px;background:#7C3AED;color:#fff;padding:10px 18px;z-index:9999;border-radius:6px;font-weight:600;transition:top 0.15s;text-decoration:none;font-size:14px; }
    .skip-link:focus { top:8px; }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
    .sidebar-link { display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;font-size:15px;font-weight:500;color:#a8a29e;transition:all 0.15s;text-decoration:none; }
    .sidebar-link:hover { background:rgba(255,255,255,0.07);color:#fff; }
    .sidebar-link.active { background:rgba(124,58,237,0.15);color:#c4b5fd; }
    .bottom-nav-link { display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;color:#78716c;font-size:10px;font-weight:500;text-decoration:none;transition:color 0.15s; }
    .bottom-nav-link.active { color:#7C3AED; }
    .bottom-nav-link:hover { color:#7C3AED; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── Sidebar ───────────────────────────────────────────────── */
    function Sidebar({ current = 'notifs' }) {
      const NAV = [
        { key:'feed',    label:'Feed',          href:'index.html',         icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
        { key:'explore', label:'Explore',       href:'explore.html',       icon:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' },
        { key:'notifs',  label:'Notifications', href:'notifications.html', icon:'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9', badge: 3 },
        { key:'messages',label:'Messages',      href:'messages.html',      icon:'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z', badge: 2 },
        { key:'profile', label:'Profile',       href:'profile.html',       icon:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
        { key:'settings',label:'Settings',      href:'settings.html',      icon:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
      ];
      return (
        <aside className="hidden lg:flex flex-col fixed left-0 top-0 h-full w-60 bg-folia-sidebar text-white z-40 py-6 px-3" aria-label="Primary navigation">
          <a href="index.html" className="flex items-center gap-2.5 px-3 mb-8" aria-label="Folia — go to feed">
            <div className="w-9 h-9 bg-gradient-to-br from-folia-accent to-pink-500 rounded-xl flex items-center justify-center flex-shrink-0" aria-hidden="true">
              <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>
            </div>
            <span className="font-extrabold text-xl tracking-tight">folia</span>
          </a>
          <nav aria-label="Main site navigation">
            <ul className="space-y-1" role="list">
              {NAV.map(n => (
                <li key={n.key}>
                  <a href={n.href} className={`sidebar-link ${current===n.key?'active':''}`}
                    aria-current={current===n.key?'page':undefined}
                    aria-label={n.badge ? `${n.label} — ${n.badge} unread` : n.label}>
                    <div className="relative flex-shrink-0">
                      <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        {n.icon.includes('M15 12') ? (
                          <><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></>
                        ) : (
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={n.icon} />
                        )}
                      </svg>
                      {n.badge && <span aria-hidden="true" className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-folia-rose text-white text-[10px] font-bold rounded-full flex items-center justify-center">{n.badge}</span>}
                    </div>
                    <span>{n.label}</span>
                  </a>
                </li>
              ))}
            </ul>
          </nav>
          <div className="flex-1" />
          <a href="profile.html" className="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5 transition-colors" aria-label="My profile — Kai Rivera">
            <div className="w-9 h-9 rounded-full bg-gradient-to-br from-violet-400 to-pink-500 flex items-center justify-center text-white font-bold text-sm flex-shrink-0" role="img" aria-label="Kai Rivera's avatar">KR</div>
            <div className="min-w-0">
              <p className="font-semibold text-sm text-white truncate">Kai Rivera</p>
              <p className="text-xs text-folia-muted truncate">@kairivera</p>
            </div>
          </a>
        </aside>
      );
    }

    function BottomNav({ current = 'notifs' }) {
      const NAV = [
        { key:'feed',    href:'index.html',        icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6', label:'Feed' },
        { key:'explore', href:'explore.html',      icon:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z', label:'Explore' },
        { key:'notifs',  href:'notifications.html',icon:'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9', label:'Activity' },
        { key:'messages',href:'messages.html',     icon:'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z', label:'Messages' },
        { key:'profile', href:'profile.html',      icon:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z', label:'Profile' },
      ];
      return (
        <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-folia-border z-40 flex" aria-label="Mobile navigation">
          {NAV.map(n => (
            <a key={n.key} href={n.href} className={`bottom-nav-link flex-1 ${current===n.key?'active':''}`} aria-current={current===n.key?'page':undefined} aria-label={n.label}>
              <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={current===n.key?2.5:2} d={n.icon} /></svg>
              <span>{n.label}</span>
            </a>
          ))}
        </nav>
      );
    }

    /* ── Notification data ─────────────────────────────────────── */
    const ACTIVITY_NOTIFS = [
      { id:1,  type:'appreciate', actor:'Hana Kobayashi',   handle:'@hanakob', time:'4h',  unread:true,  work:'Solstice III',       thumbGrad:'from-amber-300 to-rose-400',   avatarGrad:'from-pink-400 to-rose-500' },
      { id:2,  type:'follow',     actor:'Marcus Webb',       handle:'@marcusw', time:'5h',  unread:true,  work:null,                  thumbGrad:null,                           avatarGrad:'from-blue-400 to-indigo-500' },
      { id:3,  type:'collect',    actor:'Sara Lindqvist',    handle:'@saral',   time:'6h',  unread:true,  work:'Midnight Study #4',   thumbGrad:'from-indigo-300 to-violet-500', avatarGrad:'from-violet-400 to-purple-500' },
      { id:4,  type:'comment',    actor:'Tom Ellis',         handle:'@tomell',  time:'8h',  unread:false, work:'Solstice III',        thumbGrad:'from-amber-300 to-rose-400',   avatarGrad:'from-green-400 to-teal-500',  body:'"The warm golds are perfect — love how you handled the glow!"' },
      { id:5,  type:'appreciate', actor:'Jin Park',           handle:'@jinpark', time:'11h', unread:false, work:'Midnight Study #4',  thumbGrad:'from-indigo-300 to-violet-500', avatarGrad:'from-cyan-400 to-blue-500' },
      { id:6,  type:'follow',     actor:'Amara Osei',         handle:'@amaraosei', time:'1d', unread:false, work:null,                thumbGrad:null,                           avatarGrad:'from-purple-400 to-violet-600' },
      { id:7,  type:'comment',    actor:'Nadia Kowalski',    handle:'@nadiak',  time:'2d',  unread:false, work:'Color Study VII',     thumbGrad:'from-rose-200 to-fuchsia-400', avatarGrad:'from-amber-400 to-orange-500', body:'"Would love to see a process breakdown for this one!"' },
      { id:8,  type:'appreciate', actor:'Ryo Tanaka',         handle:'@ryot',    time:'2d',  unread:false, work:'Color Study VII',    thumbGrad:'from-rose-200 to-fuchsia-400', avatarGrad:'from-teal-400 to-emerald-500' },
    ];

    const FEEDBACK_NOTIFS = [
      { id:10, actor:'Maya Chen',   handle:'@mayachen', time:'3h',  unread:true,  work:'Solstice III',      thumbGrad:'from-amber-300 to-rose-400',   avatarGrad:'from-purple-400 to-pink-500',   body:'Requested feedback on composition and color balance.' },
      { id:11, actor:'Linh Nguyen', handle:'@linhdraws', time:'1d', unread:false, work:'Botanic Systems',  thumbGrad:'from-emerald-300 to-cyan-500',  avatarGrad:'from-emerald-400 to-teal-500',  body:'Requested feedback on particle physics and loop timing.' },
    ];

    const COLLECTION_NOTIFS = [
      { id:20, actor:'Sara Lindqvist', handle:'@saral',   time:'6h',  unread:true,  work:'Midnight Study #4', thumbGrad:'from-indigo-300 to-violet-500', avatarGrad:'from-violet-400 to-purple-500' },
      { id:21, actor:'Hana Kobayashi', handle:'@hanakob', time:'1d',  unread:false, work:'Solstice III',      thumbGrad:'from-amber-300 to-rose-400',   avatarGrad:'from-pink-400 to-rose-500' },
      { id:22, actor:'Jin Park',        handle:'@jinpark', time:'2d',  unread:false, work:'Color Study VII',   thumbGrad:'from-rose-200 to-fuchsia-400', avatarGrad:'from-cyan-400 to-blue-500' },
    ];

    function typeIcon(type) {
      if (type === 'appreciate') return { path:'M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z', bg:'bg-folia-rose', label:'appreciated' };
      if (type === 'follow')     return { path:'M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z', bg:'bg-folia-accent', label:'followed you' };
      if (type === 'collect')    return { path:'M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z', bg:'bg-folia-amber', label:'collected' };
      if (type === 'comment')    return { path:'M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z', bg:'bg-emerald-500', label:'commented on' };
      return { path:'', bg:'bg-gray-400', label:'' };
    }

    function NotifItem({ notif, onMarkRead }) {
      const icon = typeIcon(notif.type);
      return (
        <li className={`flex gap-4 p-4 rounded-xl transition-colors ${notif.unread ? 'bg-folia-accent/5 border border-folia-accent/20' : 'bg-white border border-folia-border'}`}
          aria-label={`${notif.unread ? 'Unread: ' : ''}${notif.actor} ${icon.label}${notif.work ? ` your piece "${notif.work}"` : ''}, ${notif.time} ago`}>
          {/* Avatar with type badge */}
          <div className="relative flex-shrink-0">
            <div className={`w-10 h-10 rounded-full bg-gradient-to-br ${notif.avatarGrad} flex items-center justify-center text-white font-bold text-sm`} role="img" aria-label={`${notif.actor}'s avatar`}>
              {notif.actor.split(' ').map(w=>w[0]).join('')}
            </div>
            <div className={`absolute -bottom-1 -right-1 w-5 h-5 ${icon.bg} rounded-full flex items-center justify-center`} aria-hidden="true">
              <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d={icon.path} />
              </svg>
            </div>
          </div>
          {/* Content */}
          <div className="flex-1 min-w-0">
            <p className="text-sm text-folia-text">
              <a href="profile.html" className="font-semibold hover:text-folia-accent transition-colors">{notif.actor}</a>
              {' '}{icon.label}{notif.work ? <> your piece <a href="index.html" className="font-semibold hover:text-folia-accent transition-colors">"{notif.work}"</a></> : ''}
            </p>
            {notif.body && <p className="text-sm text-folia-muted mt-1 italic">{notif.body}</p>}
            <p className="text-xs text-folia-muted mt-1">{notif.time} ago</p>
          </div>
          {/* Thumbnail */}
          {notif.thumbGrad && (
            <div className={`w-12 h-12 rounded-lg bg-gradient-to-br ${notif.thumbGrad} flex-shrink-0`} role="img" aria-label={`Thumbnail for "${notif.work}"`} />
          )}
          {/* Mark read */}
          {notif.unread && (
            <button
              onClick={() => onMarkRead(notif.id)}
              className="flex-shrink-0 self-start text-xs text-folia-accent font-medium hover:underline"
              aria-label={`Mark notification from ${notif.actor} as read`}
            >
              Mark read
            </button>
          )}
        </li>
      );
    }

    /* ── Notifications page ────────────────────────────────────── */
    function NotificationsPage() {
      const [activeTab, setActiveTab] = useState('activity');
      const [activity, setActivity] = useState(ACTIVITY_NOTIFS);
      const [feedback, setFeedback] = useState(FEEDBACK_NOTIFS);
      const [collections, setCollections] = useState(COLLECTION_NOTIFS);
      const [liveMsg, setLiveMsg] = useState('');
      const tabsRef = useRef(null);
      const contentRef = useRef(null);

      const unreadActivity = activity.filter(n => n.unread).length;
      const unreadFeedback = feedback.filter(n => n.unread).length;
      const unreadCollections = collections.filter(n => n.unread).length;

      const TABS = [
        { key:'activity',    label:'Activity',           unread: unreadActivity },
        { key:'feedback',    label:'Feedback Requests',  unread: unreadFeedback },
        { key:'collections', label:'Collections',        unread: unreadCollections },
      ];

      function handleTabChange(key) {
        setActiveTab(key);
        setLiveMsg(`Showing ${TABS.find(t=>t.key===key)?.label}`);
        setTimeout(() => { setLiveMsg(''); contentRef.current?.focus(); }, 50);
      }

      function handleTabKey(e, idx) {
        const tabs = tabsRef.current?.querySelectorAll('[role="tab"]');
        if (!tabs) return;
        if (e.key === 'ArrowRight') { e.preventDefault(); const next = tabs[Math.min(idx+1,tabs.length-1)]; next?.focus(); handleTabChange(TABS[Math.min(idx+1,tabs.length-1)].key); }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); const prev = tabs[Math.max(idx-1,0)]; prev?.focus(); handleTabChange(TABS[Math.max(idx-1,0)].key); }
      }

      function markRead(id, tabKey) {
        if (tabKey === 'activity')    setActivity(a => a.map(n => n.id===id ? {...n, unread:false} : n));
        if (tabKey === 'feedback')    setFeedback(a => a.map(n => n.id===id ? {...n, unread:false} : n));
        if (tabKey === 'collections') setCollections(a => a.map(n => n.id===id ? {...n, unread:false} : n));
        setLiveMsg('Notification marked as read');
        setTimeout(() => setLiveMsg(''), 2000);
      }

      function markAllRead() {
        if (activeTab === 'activity')    setActivity(a => a.map(n => ({...n, unread:false})));
        if (activeTab === 'feedback')    setFeedback(a => a.map(n => ({...n, unread:false})));
        if (activeTab === 'collections') setCollections(a => a.map(n => ({...n, unread:false})));
        const tabLabel = TABS.find(t=>t.key===activeTab)?.label;
        setLiveMsg(`All ${tabLabel} notifications marked as read`);
        setTimeout(() => setLiveMsg(''), 2000);
      }

      const currentNotifs = activeTab === 'activity' ? activity : activeTab === 'feedback' ? feedback : collections;
      const currentUnread = activeTab === 'activity' ? unreadActivity : activeTab === 'feedback' ? unreadFeedback : unreadCollections;

      return (
        <div className="min-h-screen bg-folia-bg">
          <Sidebar current="notifs" />
          <BottomNav current="notifs" />

          <main id="main-content" className="lg:ml-60 pb-20 lg:pb-8" tabIndex={-1}>
            {/* Live region */}
            <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{liveMsg}</div>

            <div className="max-w-2xl mx-auto px-4 lg:px-8 py-8">
              {/* Header */}
              <div className="flex items-center justify-between mb-6">
                <div>
                  <h1 className="text-2xl font-extrabold text-folia-text">Notifications</h1>
                  {currentUnread > 0 && (
                    <p className="text-sm text-folia-muted mt-0.5">
                      <span aria-live="polite" aria-atomic="true">{currentUnread} unread</span>
                    </p>
                  )}
                </div>
                {currentUnread > 0 && (
                  <button
                    onClick={markAllRead}
                    className="text-sm text-folia-accent font-semibold hover:underline"
                    aria-label={`Mark all ${TABS.find(t=>t.key===activeTab)?.label} notifications as read`}
                  >
                    Mark all read
                  </button>
                )}
              </div>

              {/* Tabs */}
              <div role="tablist" aria-label="Notification categories" ref={tabsRef} className="flex gap-1 border-b border-folia-border mb-6">
                {TABS.map((tab, idx) => (
                  <button
                    key={tab.key}
                    role="tab"
                    aria-selected={activeTab === tab.key}
                    aria-controls={`panel-${tab.key}`}
                    id={`tab-${tab.key}`}
                    onClick={() => handleTabChange(tab.key)}
                    onKeyDown={e => handleTabKey(e, idx)}
                    tabIndex={activeTab === tab.key ? 0 : -1}
                    className={`relative px-4 py-3 text-sm font-semibold transition-colors whitespace-nowrap ${
                      activeTab === tab.key
                        ? 'text-folia-accent border-b-2 border-folia-accent'
                        : 'text-folia-muted hover:text-folia-text'
                    }`}
                    aria-label={tab.unread > 0 ? `${tab.label} — ${tab.unread} unread` : tab.label}
                  >
                    {tab.label}
                    {tab.unread > 0 && (
                      <span aria-hidden="true" className="ml-2 inline-flex items-center justify-center w-5 h-5 bg-folia-rose text-white text-[10px] font-bold rounded-full">
                        {tab.unread}
                      </span>
                    )}
                  </button>
                ))}
              </div>

              {/* Notification list */}
              <div
                id={`panel-${activeTab}`}
                role="tabpanel"
                aria-labelledby={`tab-${activeTab}`}
                ref={contentRef}
                tabIndex={-1}
                className="focus:outline-none"
              >
                {currentNotifs.length === 0 ? (
                  <p className="text-folia-muted text-center py-12">No notifications here yet.</p>
                ) : (
                  <ul className="space-y-3" role="list" aria-label={`${TABS.find(t=>t.key===activeTab)?.label} notifications`}>
                    {currentNotifs.map(notif => (
                      <NotifItem key={notif.id} notif={notif} onMarkRead={(id) => markRead(id, activeTab)} />
                    ))}
                  </ul>
                )}
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<NotificationsPage />);
  </script>
</body>
</html>
