<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore — Folia Creative Community</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'folia-bg':     '#FAF9F7',
            'folia-surf':   '#F2EFEA',
            'folia-border': '#E4DFD8',
            'folia-text':   '#1C1917',
            'folia-muted':  '#78716C',
            'folia-accent': '#7C3AED',
            'folia-accent-h':'#6D28D9',
            'folia-rose':   '#F43F5E',
            'folia-amber':  '#D97706',
            'folia-sidebar':'#161514',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #FAF9F7; color: #1C1917; }
    :focus-visible { outline: 3px solid #7C3AED !important; outline-offset: 2px !important; }
    .skip-link { position:absolute;top:-52px;left:8px;background:#7C3AED;color:#fff;padding:10px 18px;z-index:9999;border-radius:6px;font-weight:600;transition:top 0.15s;text-decoration:none;font-size:14px; }
    .skip-link:focus { top:8px; }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
    .sidebar-link { display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;font-size:15px;font-weight:500;color:#a8a29e;transition:all 0.15s;text-decoration:none; }
    .sidebar-link:hover { background:rgba(255,255,255,0.07);color:#fff; }
    .sidebar-link.active { background:rgba(124,58,237,0.15);color:#c4b5fd; }
    .bottom-nav-link { display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;color:#78716c;font-size:10px;font-weight:500;text-decoration:none;transition:color 0.15s; }
    .bottom-nav-link.active { color:#7C3AED; }
    .bottom-nav-link:hover { color:#7C3AED; }
    .grid-item { position:relative;overflow:hidden;border-radius:12px;cursor:pointer; }
    .grid-item .overlay { position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 50%);opacity:0;transition:opacity 0.2s; }
    .grid-item:hover .overlay, .grid-item:focus-within .overlay { opacity:1; }
    .grid-item .overlay-content { position:absolute;bottom:0;left:0;right:0;padding:12px;transform:translateY(8px);transition:transform 0.2s; }
    .grid-item:hover .overlay-content, .grid-item:focus-within .overlay-content { transform:translateY(0); }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── Sidebar ───────────────────────────────────────────────── */
    function Sidebar({ current = 'explore' }) {
      const NAV = [
        { key:'feed',    label:'Feed',          href:'index.html',         icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
        { key:'explore', label:'Explore',       href:'explore.html',       icon:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' },
        { key:'notifs',  label:'Notifications', href:'notifications.html', icon:'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9', badge: 3 },
        { key:'messages',label:'Messages',      href:'messages.html',      icon:'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z', badge: 2 },
        { key:'profile', label:'Profile',       href:'profile.html',       icon:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
        { key:'settings',label:'Settings',      href:'settings.html',      icon:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
      ];
      return (
        <aside className="hidden lg:flex flex-col fixed left-0 top-0 h-full w-60 bg-folia-sidebar text-white z-40 py-6 px-3" aria-label="Primary navigation">
          <a href="index.html" className="flex items-center gap-2.5 px-3 mb-8" aria-label="Folia — go to feed">
            <div className="w-9 h-9 bg-gradient-to-br from-folia-accent to-pink-500 rounded-xl flex items-center justify-center flex-shrink-0" aria-hidden="true">
              <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>
            </div>
            <span className="font-extrabold text-xl tracking-tight">folia</span>
          </a>
          <nav aria-label="Main site navigation">
            <ul className="space-y-1" role="list">
              {NAV.map(n => (
                <li key={n.key}>
                  <a href={n.href} className={`sidebar-link ${current===n.key?'active':''}`}
                    aria-current={current===n.key?'page':undefined}
                    aria-label={n.badge ? `${n.label} — ${n.badge} unread` : n.label}>
                    <div className="relative flex-shrink-0">
                      <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        {n.icon.includes('M15 12') ? (
                          <><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></>
                        ) : (
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={n.icon} />
                        )}
                      </svg>
                      {n.badge && <span aria-hidden="true" className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-folia-rose text-white text-[10px] font-bold rounded-full flex items-center justify-center">{n.badge}</span>}
                    </div>
                    <span>{n.label}</span>
                  </a>
                </li>
              ))}
            </ul>
          </nav>
          <div className="flex-1" />
          <a href="profile.html" className="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5 transition-colors" aria-label="My profile — Kai Rivera">
            <div className="w-9 h-9 rounded-full bg-gradient-to-br from-violet-400 to-pink-500 flex items-center justify-center text-white font-bold text-sm flex-shrink-0" role="img" aria-label="Kai Rivera's avatar">KR</div>
            <div className="min-w-0">
              <p className="font-semibold text-sm text-white truncate">Kai Rivera</p>
              <p className="text-xs text-folia-muted truncate">@kairivera</p>
            </div>
          </a>
        </aside>
      );
    }

    /* ── Bottom nav ────────────────────────────────────────────── */
    function BottomNav({ current = 'explore' }) {
      const NAV = [
        { key:'feed',    href:'index.html',        icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6', label:'Feed' },
        { key:'explore', href:'explore.html',      icon:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z', label:'Explore' },
        { key:'notifs',  href:'notifications.html',icon:'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9', label:'Activity' },
        { key:'messages',href:'messages.html',     icon:'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z', label:'Messages' },
        { key:'profile', href:'profile.html',      icon:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z', label:'Profile' },
      ];
      return (
        <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-folia-border z-40 flex" aria-label="Mobile navigation">
          {NAV.map(n => (
            <a key={n.key} href={n.href} className={`bottom-nav-link flex-1 ${current===n.key?'active':''}`} aria-current={current===n.key?'page':undefined} aria-label={n.label}>
              <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={current===n.key?2.5:2} d={n.icon} /></svg>
              <span>{n.label}</span>
            </a>
          ))}
        </nav>
      );
    }

    /* ── Data ──────────────────────────────────────────────────── */
    const MEDIUMS = [
      { key:'all',        label:'All Work' },
      { key:'digital',    label:'Digital Art' },
      { key:'photography',label:'Photography' },
      { key:'typography', label:'Typography' },
      { key:'3d',         label:'3D & Motion' },
      { key:'illustration',label:'Illustration' },
      { key:'graphic',    label:'Graphic Design' },
    ];

    const GRID_ITEMS = [
      { id:1, author:'Maya Chen', handle:'@mayachen', title:'Solstice III', medium:'digital', grad:'from-amber-300 via-orange-400 to-rose-500', appreciates:284, size:'tall' },
      { id:2, author:'Hiroshi Tanaka', handle:'@hiroshit', title:'Fog on the Kamo', medium:'photography', grad:'from-slate-300 via-blue-200 to-slate-400', appreciates:519, size:'normal' },
      { id:3, author:'Linh Nguyen', handle:'@linhdraws', title:'Botanic Systems', medium:'3d', grad:'from-emerald-300 via-teal-400 to-cyan-500', appreciates:167, size:'wide' },
      { id:4, author:'Priya Sharma', handle:'@priyaillust', title:'After the Rain', medium:'illustration', grad:'from-rose-200 via-pink-300 to-fuchsia-400', appreciates:342, size:'normal' },
      { id:5, author:'Zoe Park', handle:'@zoepark', title:'Noir Sequence', medium:'photography', grad:'from-gray-700 via-gray-500 to-gray-900', appreciates:211, size:'tall' },
      { id:6, author:'Felix Müller', handle:'@felixm', title:'Typeface Study 04', medium:'typography', grad:'from-yellow-100 via-amber-200 to-orange-300', appreciates:98, size:'normal' },
      { id:7, author:'Amara Osei', handle:'@amaraosei', title:'Chrome Garden', medium:'3d', grad:'from-purple-300 via-violet-400 to-indigo-500', appreciates:431, size:'normal' },
      { id:8, author:'Sol Martinez', handle:'@solm', title:'Urban Drift', medium:'graphic', grad:'from-red-300 via-orange-400 to-yellow-300', appreciates:179, size:'wide' },
      { id:9, author:'Nadia Kowalski', handle:'@nadiak', title:'Still Life No. 7', medium:'photography', grad:'from-stone-200 via-amber-100 to-stone-300', appreciates:263, size:'normal' },
      { id:10, author:'Jin Park', handle:'@jinpark', title:'Mono Forms', medium:'graphic', grad:'from-zinc-700 via-zinc-500 to-zinc-300', appreciates:145, size:'normal' },
      { id:11, author:'Cleo Barnes', handle:'@cleob', title:'Drift & Dream', medium:'illustration', grad:'from-sky-200 via-blue-300 to-indigo-400', appreciates:388, size:'tall' },
      { id:12, author:'Ryo Tanaka', handle:'@ryot', title:'Depth Study', medium:'3d', grad:'from-teal-300 via-emerald-400 to-green-500', appreciates:214, size:'normal' },
    ];

    const RISING_CREATORS = [
      { name:'Felix Müller',   handle:'@felixm',   discipline:'Typography', grad:'from-yellow-400 to-orange-500', followers:'1.2K', recentWork:'from-yellow-100 via-amber-200 to-orange-300' },
      { name:'Amara Osei',     handle:'@amaraosei',discipline:'3D Art',     grad:'from-purple-400 to-violet-600', followers:'2.8K', recentWork:'from-purple-300 via-violet-400 to-indigo-500' },
      { name:'Zoe Park',       handle:'@zoepark',  discipline:'Photography',grad:'from-gray-400 to-gray-600',     followers:'3.4K', recentWork:'from-gray-700 via-gray-500 to-gray-900' },
      { name:'Nadia Kowalski', handle:'@nadiak',   discipline:'Photography',grad:'from-amber-400 to-stone-500',   followers:'890',  recentWork:'from-stone-200 via-amber-100 to-stone-300' },
      { name:'Cleo Barnes',    handle:'@cleob',    discipline:'Illustration',grad:'from-sky-400 to-indigo-500',   followers:'1.9K', recentWork:'from-sky-200 via-blue-300 to-indigo-400' },
    ];

    const TRENDING_PALETTES = [
      { name:'Solstice Warm',   colors:['#F59E0B','#F97316','#EF4444','#DC2626'] },
      { name:'Ocean Mist',      colors:['#BAE6FD','#7DD3FC','#38BDF8','#0284C7'] },
      { name:'Forest Dusk',     colors:['#6EE7B7','#34D399','#059669','#047857'] },
      { name:'Violet Dream',    colors:['#DDD6FE','#C4B5FD','#A78BFA','#7C3AED'] },
      { name:'Desert Rose',     colors:['#FECDD3','#FDA4AF','#FB7185','#F43F5E'] },
      { name:'Ink & Stone',     colors:['#F5F5F4','#A8A29E','#57534E','#1C1917'] },
    ];

    /* ── Grid item ─────────────────────────────────────────────── */
    function GridItem({ item }) {
      const [appreciated, setAppreciated] = useState(false);
      const heightClass = item.size === 'tall' ? 'row-span-2' : 'row-span-1';

      return (
        <div className={`grid-item ${heightClass} bg-gradient-to-br ${item.grad}`}
          style={{ minHeight: item.size === 'tall' ? '360px' : '176px' }}>
          {/* Overlay */}
          <div className="overlay" aria-hidden="true" />
          <div className="overlay-content">
            <p className="text-white font-semibold text-sm truncate">{item.title}</p>
            <div className="flex items-center justify-between mt-1">
              <a href="profile.html" className="text-white/80 text-xs hover:text-white transition-colors" aria-label={`View ${item.author}'s profile`}>
                {item.handle}
              </a>
              <button
                onClick={() => setAppreciated(a => !a)}
                aria-pressed={appreciated}
                aria-label={`${appreciated?'Remove appreciation from':'Appreciate'} ${item.title} by ${item.author} — ${item.appreciates + (appreciated?1:0)} appreciations`}
                className="flex items-center gap-1 text-white/80 hover:text-white transition-colors"
              >
                <svg aria-hidden="true" className="w-3.5 h-3.5" fill={appreciated?'currentColor':'none'} stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
                <span className="text-xs">{item.appreciates + (appreciated?1:0)}</span>
              </button>
            </div>
          </div>
          {/* Accessible link covering entire card */}
          <a href="index.html" className="absolute inset-0 opacity-0 focus-visible:opacity-100 focus-visible:bg-folia-accent/20 rounded-xl"
            aria-label={`View ${item.title} by ${item.author}`}
            tabIndex={0}>
          </a>
        </div>
      );
    }

    /* ── Rising Creator card ───────────────────────────────────── */
    function RisingCreatorCard({ creator }) {
      const [following, setFollowing] = useState(false);
      return (
        <div className="bg-white border border-folia-border rounded-2xl overflow-hidden flex-shrink-0 w-48">
          {/* Recent work preview */}
          <div className={`h-24 bg-gradient-to-br ${creator.recentWork}`} role="img" aria-label={`Recent work by ${creator.name}`} />
          {/* Info */}
          <div className="p-3">
            <div className="flex items-center gap-2 mb-2">
              <div className={`w-8 h-8 rounded-full bg-gradient-to-br ${creator.grad} flex items-center justify-center text-white font-bold text-xs flex-shrink-0`} role="img" aria-label={`${creator.name}'s avatar`}>
                {creator.name.split(' ').map(w=>w[0]).join('')}
              </div>
              <div className="min-w-0">
                <p className="font-semibold text-xs text-folia-text truncate">{creator.name}</p>
                <p className="text-[11px] text-folia-muted truncate">{creator.discipline}</p>
              </div>
            </div>
            <p className="text-[11px] text-folia-muted mb-2">{creator.followers} followers</p>
            <button
              onClick={() => setFollowing(f => !f)}
              aria-pressed={following}
              aria-label={`${following?'Unfollow':'Follow'} ${creator.name}`}
              className={`w-full py-1.5 rounded-lg text-xs font-semibold transition-colors ${
                following
                  ? 'bg-folia-surf text-folia-muted border border-folia-border hover:bg-red-50 hover:text-red-600 hover:border-red-200'
                  : 'bg-folia-accent text-white hover:bg-folia-accent-h'
              }`}
            >
              {following ? 'Following' : 'Follow'}
            </button>
          </div>
        </div>
      );
    }

    /* ── Explore page ──────────────────────────────────────────── */
    function ExplorePage() {
      const [activeMedium, setActiveMedium] = useState('all');
      const [query, setQuery] = useState('');
      const [liveMsg, setLiveMsg] = useState('');
      const tabsRef = useRef(null);

      const filtered = GRID_ITEMS.filter(item => {
        const matchMedium = activeMedium === 'all' || item.medium === activeMedium;
        const matchQuery = !query || item.title.toLowerCase().includes(query.toLowerCase()) || item.author.toLowerCase().includes(query.toLowerCase());
        return matchMedium && matchQuery;
      });

      function handleMediumChange(key) {
        setActiveMedium(key);
        const label = MEDIUMS.find(m => m.key === key)?.label;
        setLiveMsg(`Showing ${label}`);
        setTimeout(() => setLiveMsg(''), 2000);
      }

      function handleTabKey(e, idx) {
        const tabs = tabsRef.current?.querySelectorAll('[role="tab"]');
        if (!tabs) return;
        if (e.key === 'ArrowRight') { e.preventDefault(); tabs[Math.min(idx+1, tabs.length-1)]?.focus(); }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); tabs[Math.max(idx-1, 0)]?.focus(); }
        if (e.key === 'Home') { e.preventDefault(); tabs[0]?.focus(); }
        if (e.key === 'End')  { e.preventDefault(); tabs[tabs.length-1]?.focus(); }
      }

      return (
        <div className="min-h-screen bg-folia-bg">
          <Sidebar current="explore" />
          <BottomNav current="explore" />

          <main id="main-content" className="lg:ml-60 pb-20 lg:pb-8" tabIndex={-1}>
            {/* Live region */}
            <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{liveMsg}</div>

            <div className="max-w-5xl mx-auto px-4 lg:px-8 py-8">
              {/* Header */}
              <div className="mb-6">
                <h1 className="text-2xl font-extrabold text-folia-text mb-1">Explore</h1>
                <p className="text-folia-muted text-sm">Discover exceptional work from the Folia community</p>
              </div>

              {/* Search */}
              <div className="mb-6" role="search" aria-label="Search artworks and creators">
                <label htmlFor="explore-search" className="sr-only">Search artworks and creators</label>
                <div className="relative">
                  <svg aria-hidden="true" className="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-folia-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                  </svg>
                  <input
                    id="explore-search"
                    type="search"
                    value={query}
                    onChange={e => setQuery(e.target.value)}
                    placeholder="Search artworks, creators, tags…"
                    aria-label="Search artworks and creators"
                    className="w-full pl-10 pr-4 py-2.5 border border-folia-border rounded-xl text-sm bg-white focus:border-folia-accent focus:ring-2 focus:ring-folia-accent/20 outline-none transition-colors"
                  />
                </div>
              </div>

              {/* Medium filter tabs */}
              <div className="mb-6 overflow-x-auto" role="tablist" aria-label="Filter by medium" ref={tabsRef}>
                <div className="flex gap-2 min-w-max pb-2">
                  {MEDIUMS.map((m, idx) => (
                    <button
                      key={m.key}
                      role="tab"
                      aria-selected={activeMedium === m.key}
                      aria-controls="explore-grid"
                      id={`tab-${m.key}`}
                      onClick={() => handleMediumChange(m.key)}
                      onKeyDown={e => handleTabKey(e, idx)}
                      tabIndex={activeMedium === m.key ? 0 : -1}
                      className={`px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-colors ${
                        activeMedium === m.key
                          ? 'bg-folia-accent text-white'
                          : 'bg-white border border-folia-border text-folia-muted hover:border-folia-accent hover:text-folia-accent'
                      }`}
                    >
                      {m.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Discovery grid */}
              <section id="explore-grid" role="tabpanel" aria-labelledby={`tab-${activeMedium}`} aria-label={`${MEDIUMS.find(m=>m.key===activeMedium)?.label} artworks`}>
                {filtered.length === 0 ? (
                  <p className="text-folia-muted text-center py-12">No results found. Try a different search or filter.</p>
                ) : (
                  <div
                    className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 auto-rows-[176px]"
                    role="list"
                    aria-label={`${filtered.length} artworks`}
                  >
                    {filtered.map(item => (
                      <div key={item.id} role="listitem">
                        <GridItem item={item} />
                      </div>
                    ))}
                  </div>
                )}
              </section>

              {/* Rising Creators spotlight */}
              <section className="mt-12" aria-labelledby="rising-heading">
                <div className="flex items-center justify-between mb-4">
                  <h2 id="rising-heading" className="text-lg font-bold text-folia-text">Rising Creators</h2>
                  <button className="text-folia-accent text-sm font-medium hover:underline">See all</button>
                </div>
                <div
                  className="flex gap-4 overflow-x-auto pb-3"
                  role="list"
                  aria-label="Rising creators to follow"
                  style={{ scrollbarWidth:'none' }}
                >
                  {RISING_CREATORS.map(creator => (
                    <div key={creator.handle} role="listitem">
                      <RisingCreatorCard creator={creator} />
                    </div>
                  ))}
                </div>
              </section>

              {/* Trending Palettes */}
              <section className="mt-12" aria-labelledby="palettes-heading">
                <h2 id="palettes-heading" className="text-lg font-bold text-folia-text mb-4">Trending Palettes</h2>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-4" role="list" aria-label="Trending color palettes">
                  {TRENDING_PALETTES.map(palette => (
                    <div key={palette.name} role="listitem" className="bg-white border border-folia-border rounded-2xl p-4">
                      <div className="flex gap-1.5 mb-3" role="img" aria-label={`${palette.name} palette: ${palette.colors.join(', ')}`}>
                        {palette.colors.map(color => (
                          <div key={color} className="flex-1 h-10 rounded-lg" style={{ backgroundColor: color }} />
                        ))}
                      </div>
                      <p className="font-semibold text-sm text-folia-text">{palette.name}</p>
                      <div className="flex gap-2 mt-1 flex-wrap">
                        {palette.colors.map(color => (
                          <span key={color} className="text-xs text-folia-muted font-mono">{color}</span>
                        ))}
                      </div>
                      <button
                        className="mt-3 text-xs text-folia-accent font-semibold hover:underline"
                        aria-label={`Copy ${palette.name} palette to clipboard`}
                      >
                        Copy palette
                      </button>
                    </div>
                  ))}
                </div>
              </section>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ExplorePage />);
  </script>
</body>
</html>
