<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kai Rivera — Folia Creative Community</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'folia-bg':     '#FAF9F7',
            'folia-surf':   '#F2EFEA',
            'folia-border': '#E4DFD8',
            'folia-text':   '#1C1917',
            'folia-muted':  '#78716C',
            'folia-accent': '#7C3AED',
            'folia-accent-h':'#6D28D9',
            'folia-rose':   '#F43F5E',
            'folia-amber':  '#D97706',
            'folia-sidebar':'#161514',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #FAF9F7; color: #1C1917; }
    :focus-visible { outline: 3px solid #7C3AED !important; outline-offset: 2px !important; }
    .skip-link { position:absolute;top:-52px;left:8px;background:#7C3AED;color:#fff;padding:10px 18px;z-index:9999;border-radius:6px;font-weight:600;transition:top 0.15s;text-decoration:none;font-size:14px; }
    .skip-link:focus { top:8px; }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
    .sidebar-link { display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;font-size:15px;font-weight:500;color:#a8a29e;transition:all 0.15s;text-decoration:none; }
    .sidebar-link:hover { background:rgba(255,255,255,0.07);color:#fff; }
    .sidebar-link.active { background:rgba(124,58,237,0.15);color:#c4b5fd; }
    .bottom-nav-link { display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;color:#78716c;font-size:10px;font-weight:500;text-decoration:none;transition:color 0.15s; }
    .bottom-nav-link.active { color:#7C3AED; }
    .bottom-nav-link:hover { color:#7C3AED; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── Sidebar ───────────────────────────────────────────────── */
    function Sidebar({ current = 'profile' }) {
      const NAV = [
        { key:'feed',    label:'Feed',          href:'index.html',         icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
        { key:'explore', label:'Explore',       href:'explore.html',       icon:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' },
        { key:'notifs',  label:'Notifications', href:'notifications.html', icon:'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9', badge: 3 },
        { key:'messages',label:'Messages',      href:'messages.html',      icon:'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z', badge: 2 },
        { key:'profile', label:'Profile',       href:'profile.html',       icon:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
        { key:'settings',label:'Settings',      href:'settings.html',      icon:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
      ];
      return (
        <aside className="hidden lg:flex flex-col fixed left-0 top-0 h-full w-60 bg-folia-sidebar text-white z-40 py-6 px-3" aria-label="Primary navigation">
          <a href="index.html" className="flex items-center gap-2.5 px-3 mb-8" aria-label="Folia — go to feed">
            <div className="w-9 h-9 bg-gradient-to-br from-folia-accent to-pink-500 rounded-xl flex items-center justify-center flex-shrink-0" aria-hidden="true">
              <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>
            </div>
            <span className="font-extrabold text-xl tracking-tight">folia</span>
          </a>
          <nav aria-label="Main site navigation">
            <ul className="space-y-1" role="list">
              {NAV.map(n => (
                <li key={n.key}>
                  <a href={n.href} className={`sidebar-link ${current===n.key?'active':''}`}
                    aria-current={current===n.key?'page':undefined}
                    aria-label={n.badge ? `${n.label} — ${n.badge} unread` : n.label}>
                    <div className="relative flex-shrink-0">
                      <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        {n.icon.includes('M15 12') ? (
                          <><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></>
                        ) : (
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={n.icon} />
                        )}
                      </svg>
                      {n.badge && <span aria-hidden="true" className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-folia-rose text-white text-[10px] font-bold rounded-full flex items-center justify-center">{n.badge}</span>}
                    </div>
                    <span>{n.label}</span>
                  </a>
                </li>
              ))}
            </ul>
          </nav>
          <div className="flex-1" />
          <a href="profile.html" className="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5 transition-colors" aria-label="My profile — Kai Rivera">
            <div className="w-9 h-9 rounded-full bg-gradient-to-br from-violet-400 to-pink-500 flex items-center justify-center text-white font-bold text-sm flex-shrink-0" role="img" aria-label="Kai Rivera's avatar">KR</div>
            <div className="min-w-0">
              <p className="font-semibold text-sm text-white truncate">Kai Rivera</p>
              <p className="text-xs text-folia-muted truncate">@kairivera</p>
            </div>
          </a>
        </aside>
      );
    }

    function BottomNav({ current = 'profile' }) {
      const NAV = [
        { key:'feed',    href:'index.html',        icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6', label:'Feed' },
        { key:'explore', href:'explore.html',      icon:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z', label:'Explore' },
        { key:'notifs',  href:'notifications.html',icon:'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9', label:'Activity' },
        { key:'messages',href:'messages.html',     icon:'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z', label:'Messages' },
        { key:'profile', href:'profile.html',      icon:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z', label:'Profile' },
      ];
      return (
        <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-folia-border z-40 flex" aria-label="Mobile navigation">
          {NAV.map(n => (
            <a key={n.key} href={n.href} className={`bottom-nav-link flex-1 ${current===n.key?'active':''}`} aria-current={current===n.key?'page':undefined} aria-label={n.label}>
              <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={current===n.key?2.5:2} d={n.icon} /></svg>
              <span>{n.label}</span>
            </a>
          ))}
        </nav>
      );
    }

    /* ── Data ──────────────────────────────────────────────────── */
    const FEATURED_WORKS = [
      { id:1, title:'Solstice III',      grad:'from-amber-300 via-orange-400 to-rose-500',   appreciates:284, views:1840 },
      { id:2, title:'Midnight Study #4', grad:'from-indigo-300 via-violet-400 to-purple-500', appreciates:199, views:1210 },
      { id:3, title:'Color Study VII',   grad:'from-rose-200 via-pink-300 to-fuchsia-400',    appreciates:342, views:2100 },
    ];

    const ALL_PROJECTS = [
      { id:1,  title:'Solstice III',       grad:'from-amber-300 to-rose-500',   appreciates:284, views:1840, year:2025 },
      { id:2,  title:'Midnight Study #4',  grad:'from-indigo-300 to-purple-500',appreciates:199, views:1210, year:2025 },
      { id:3,  title:'Color Study VII',    grad:'from-rose-200 to-fuchsia-400', appreciates:342, views:2100, year:2025 },
      { id:4,  title:'Botanical Dream',    grad:'from-emerald-200 to-teal-500', appreciates:158, views:890,  year:2024 },
      { id:5,  title:'Ink & Glass',        grad:'from-slate-300 to-zinc-600',   appreciates:211, views:1540, year:2024 },
      { id:6,  title:'Fragments I',        grad:'from-sky-200 to-blue-500',     appreciates:89,  views:620,  year:2024 },
      { id:7,  title:'Solstice I',         grad:'from-yellow-200 to-orange-400',appreciates:392, views:3200, year:2024 },
      { id:8,  title:'Warm Geometry',      grad:'from-orange-200 to-red-500',   appreciates:144, views:870,  year:2023 },
      { id:9,  title:'Archive Series #3',  grad:'from-stone-300 to-stone-600',  appreciates:67,  views:410,  year:2023 },
    ];

    /* ── Profile page ──────────────────────────────────────────── */
    function ProfilePage() {
      const [following, setFollowing] = useState(false);
      const [activeTab, setActiveTab] = useState('work');
      const [liveMsg, setLiveMsg] = useState('');
      const tabsRef = useRef(null);
      const contentRef = useRef(null);

      const TABS = [
        { key:'work',        label:'All Work',        count: ALL_PROJECTS.length },
        { key:'collections', label:'Collections',     count: 4 },
        { key:'appreciated', label:'Appreciated',     count: 87 },
      ];

      function handleTabChange(key) {
        setActiveTab(key);
        setTimeout(() => contentRef.current?.focus(), 50);
      }

      function handleTabKey(e, idx) {
        const tabs = tabsRef.current?.querySelectorAll('[role="tab"]');
        if (!tabs) return;
        if (e.key === 'ArrowRight') { e.preventDefault(); const next = Math.min(idx+1,tabs.length-1); tabs[next]?.focus(); handleTabChange(TABS[next].key); }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); const prev = Math.max(idx-1,0); tabs[prev]?.focus(); handleTabChange(TABS[prev].key); }
      }

      return (
        <div className="min-h-screen bg-folia-bg">
          <Sidebar current="profile" />
          <BottomNav current="profile" />

          <main id="main-content" className="lg:ml-60 pb-20 lg:pb-8" tabIndex={-1}>
            <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{liveMsg}</div>

            {/* Cover + avatar */}
            <div
              className="h-52 bg-gradient-to-br from-violet-400 via-folia-accent to-pink-500 relative"
              role="img"
              aria-label="Kai Rivera's profile cover: violet to pink gradient"
            >
              <a href="settings.html" className="absolute top-4 right-4 bg-white/20 hover:bg-white/30 backdrop-blur-sm text-white text-sm font-semibold px-4 py-2 rounded-xl transition-colors" aria-label="Edit profile">
                Edit profile
              </a>
            </div>

            <div className="max-w-4xl mx-auto px-4 lg:px-8">
              {/* Avatar row */}
              <div className="flex items-end justify-between -mt-12 mb-4">
                <div
                  className="w-24 h-24 rounded-2xl bg-gradient-to-br from-violet-400 to-pink-500 border-4 border-folia-bg flex items-center justify-center text-white font-extrabold text-2xl"
                  role="img"
                  aria-label="Kai Rivera's profile picture"
                >
                  KR
                </div>
                <div className="flex gap-2 pb-1">
                  <a href="messages.html" className="flex items-center gap-1.5 px-4 py-2 border border-folia-border rounded-xl text-sm font-semibold text-folia-text hover:bg-folia-surf transition-colors" aria-label="Send Kai Rivera a message">
                    <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>
                    Message
                  </a>
                  <button
                    onClick={() => { setFollowing(f => !f); setLiveMsg(following ? 'Unfollowed Kai Rivera' : 'Following Kai Rivera'); setTimeout(()=>setLiveMsg(''),2000); }}
                    aria-pressed={following}
                    aria-label={`${following ? 'Unfollow' : 'Follow'} Kai Rivera`}
                    className={`px-5 py-2 rounded-xl text-sm font-semibold transition-colors ${following ? 'bg-folia-surf text-folia-muted border border-folia-border hover:bg-red-50 hover:text-red-600' : 'bg-folia-accent text-white hover:bg-folia-accent-h'}`}
                  >
                    {following ? 'Following' : 'Follow'}
                  </button>
                </div>
              </div>

              {/* Bio */}
              <section aria-labelledby="profile-name">
                <h1 id="profile-name" className="text-xl font-extrabold text-folia-text">Kai Rivera</h1>
                <p className="text-sm text-folia-muted">@kairivera</p>

                {/* Commission badge */}
                <div className="flex items-center gap-2 mt-2">
                  <span className="inline-flex items-center gap-1 px-2.5 py-1 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-full text-xs font-semibold" role="status" aria-label="Commission status: Open for commissions">
                    <span aria-hidden="true" className="w-1.5 h-1.5 bg-emerald-500 rounded-full" />
                    Open for commissions
                  </span>
                </div>

                <p className="text-sm text-folia-text mt-3 max-w-lg leading-relaxed">
                  Illustrator & visual storyteller based in Portland, OR. I explore the intersection of light, memory, and nature through digital painting and editorial work. Available for editorial, brand, and cover illustration.
                </p>

                {/* Tools */}
                <div className="mt-3">
                  <p className="text-xs font-semibold text-folia-muted uppercase tracking-wide mb-1.5">Works in</p>
                  <div className="flex flex-wrap gap-1.5" role="list" aria-label="Creative tools">
                    {['Procreate','Figma','Adobe Illustrator','After Effects','Film Photography'].map(tool => (
                      <span key={tool} role="listitem" className="px-2.5 py-1 bg-folia-surf border border-folia-border rounded-full text-xs font-medium text-folia-text">{tool}</span>
                    ))}
                  </div>
                </div>

                {/* Stats */}
                <div className="flex gap-8 mt-4" role="list" aria-label="Profile statistics">
                  {[
                    { value:'4.2K', label:'Followers' },
                    { value:'318',  label:'Following' },
                    { value:'9',    label:'Projects' },
                    { value:'12.3K',label:'Appreciations' },
                  ].map(stat => (
                    <div key={stat.label} role="listitem" className="text-center">
                      <p className="font-extrabold text-folia-text text-lg">{stat.value}</p>
                      <p className="text-xs text-folia-muted">{stat.label}</p>
                    </div>
                  ))}
                </div>
              </section>

              {/* Featured Work */}
              <section className="mt-10" aria-labelledby="featured-heading">
                <div className="flex items-center gap-2 mb-4">
                  <svg aria-hidden="true" className="w-4 h-4 text-folia-amber" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                  <h2 id="featured-heading" className="text-base font-bold text-folia-text">Featured Work</h2>
                </div>
                <div className="grid grid-cols-3 gap-4" role="list" aria-label="Featured works">
                  {FEATURED_WORKS.map(work => (
                    <div key={work.id} role="listitem" className="group relative">
                      <div className={`aspect-square bg-gradient-to-br ${work.grad} rounded-xl overflow-hidden`} role="img" aria-label={`${work.title} — artwork thumbnail`} />
                      <div className="absolute inset-0 rounded-xl bg-black/0 group-hover:bg-black/40 transition-colors flex flex-col justify-end p-3 opacity-0 group-hover:opacity-100">
                        <p className="text-white font-semibold text-xs">{work.title}</p>
                        <div className="flex gap-2 mt-1">
                          <span className="text-white/80 text-[11px]">♥ {work.appreciates}</span>
                          <span className="text-white/80 text-[11px]">👁 {work.views}</span>
                        </div>
                      </div>
                      <a href="index.html" className="absolute inset-0 rounded-xl" aria-label={`View ${work.title} — ${work.appreciates} appreciations, ${work.views} views`} />
                    </div>
                  ))}
                </div>
              </section>

              {/* Portfolio tabs */}
              <div className="mt-10 border-b border-folia-border" role="tablist" aria-label="Portfolio sections" ref={tabsRef}>
                <div className="flex gap-0">
                  {TABS.map((tab, idx) => (
                    <button
                      key={tab.key}
                      role="tab"
                      aria-selected={activeTab === tab.key}
                      aria-controls={`panel-${tab.key}`}
                      id={`ptab-${tab.key}`}
                      onClick={() => handleTabChange(tab.key)}
                      onKeyDown={e => handleTabKey(e, idx)}
                      tabIndex={activeTab === tab.key ? 0 : -1}
                      className={`px-4 py-3 text-sm font-semibold transition-colors ${
                        activeTab === tab.key
                          ? 'text-folia-accent border-b-2 border-folia-accent'
                          : 'text-folia-muted hover:text-folia-text'
                      }`}
                    >
                      {tab.label}
                      <span aria-hidden="true" className="ml-1.5 text-folia-muted font-normal text-xs">{tab.count}</span>
                    </button>
                  ))}
                </div>
              </div>

              {/* Tab content */}
              <div
                id={`panel-${activeTab}`}
                role="tabpanel"
                aria-labelledby={`ptab-${activeTab}`}
                ref={contentRef}
                tabIndex={-1}
                className="focus:outline-none mt-6 pb-8"
              >
                {activeTab === 'work' && (
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-4" role="list" aria-label="All projects">
                    {ALL_PROJECTS.map(p => (
                      <div key={p.id} role="listitem" className="group relative">
                        <div className={`aspect-square bg-gradient-to-br ${p.grad} rounded-xl`} role="img" aria-label={`${p.title} — ${p.year}`} />
                        <div className="absolute inset-0 rounded-xl bg-black/0 group-hover:bg-black/50 transition-all flex flex-col justify-end p-3 opacity-0 group-hover:opacity-100">
                          <p className="text-white font-semibold text-xs truncate">{p.title}</p>
                          <div className="flex gap-2 mt-0.5">
                            <span className="text-white/80 text-[11px]">♥ {p.appreciates}</span>
                            <span className="text-white/80 text-[11px]">👁 {p.views}</span>
                          </div>
                        </div>
                        <a href="index.html" className="absolute inset-0 rounded-xl" aria-label={`View ${p.title} (${p.year}) — ${p.appreciates} appreciations, ${p.views} views`} />
                      </div>
                    ))}
                  </div>
                )}
                {activeTab === 'collections' && (
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4" role="list" aria-label="Collections">
                    {['Colour Theory','Texture & Grain','Type Inspo','Night Studies'].map((col, i) => (
                      <div key={col} role="listitem" className="group relative cursor-pointer">
                        <div className={`aspect-square rounded-xl bg-gradient-to-br ${['from-blue-200 to-indigo-400','from-stone-200 to-stone-500','from-yellow-200 to-amber-500','from-slate-400 to-slate-700'][i]}`} role="img" aria-label={`${col} collection thumbnail`} />
                        <p className="mt-2 text-sm font-semibold text-folia-text">{col}</p>
                        <p className="text-xs text-folia-muted">Saved collection</p>
                      </div>
                    ))}
                  </div>
                )}
                {activeTab === 'appreciated' && (
                  <p className="text-folia-muted text-sm text-center py-12">Works Kai Rivera has appreciated will appear here.</p>
                )}
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ProfilePage />);
  </script>
</body>
</html>
