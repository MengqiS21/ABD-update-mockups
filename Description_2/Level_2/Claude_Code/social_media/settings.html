<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Folia Creative Community</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'folia-bg':     '#FAF9F7',
            'folia-surf':   '#F2EFEA',
            'folia-border': '#E4DFD8',
            'folia-text':   '#1C1917',
            'folia-muted':  '#78716C',
            'folia-accent': '#7C3AED',
            'folia-accent-h':'#6D28D9',
            'folia-rose':   '#F43F5E',
            'folia-amber':  '#D97706',
            'folia-sidebar':'#161514',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #FAF9F7; color: #1C1917; }
    :focus-visible { outline: 3px solid #7C3AED !important; outline-offset: 2px !important; }
    .skip-link { position:absolute;top:-52px;left:8px;background:#7C3AED;color:#fff;padding:10px 18px;z-index:9999;border-radius:6px;font-weight:600;transition:top 0.15s;text-decoration:none;font-size:14px; }
    .skip-link:focus { top:8px; }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
    .sidebar-link { display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;font-size:15px;font-weight:500;color:#a8a29e;transition:all 0.15s;text-decoration:none; }
    .sidebar-link:hover { background:rgba(255,255,255,0.07);color:#fff; }
    .sidebar-link.active { background:rgba(124,58,237,0.15);color:#c4b5fd; }
    .bottom-nav-link { display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;color:#78716c;font-size:10px;font-weight:500;text-decoration:none;transition:color 0.15s; }
    .bottom-nav-link.active { color:#7C3AED; }
    .bottom-nav-link:hover { color:#7C3AED; }
    input[type="text"],input[type="email"],input[type="url"],input[type="password"],textarea,select {
      font-family: 'Inter', system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── Sidebar ───────────────────────────────────────────────── */
    function Sidebar({ current = 'settings' }) {
      const NAV = [
        { key:'feed',    label:'Feed',          href:'index.html',         icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
        { key:'explore', label:'Explore',       href:'explore.html',       icon:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' },
        { key:'notifs',  label:'Notifications', href:'notifications.html', icon:'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9', badge: 3 },
        { key:'messages',label:'Messages',      href:'messages.html',      icon:'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z', badge: 2 },
        { key:'profile', label:'Profile',       href:'profile.html',       icon:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
        { key:'settings',label:'Settings',      href:'settings.html',      icon:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
      ];
      return (
        <aside className="hidden lg:flex flex-col fixed left-0 top-0 h-full w-60 bg-folia-sidebar text-white z-40 py-6 px-3" aria-label="Primary navigation">
          <a href="index.html" className="flex items-center gap-2.5 px-3 mb-8" aria-label="Folia — go to feed">
            <div className="w-9 h-9 bg-gradient-to-br from-folia-accent to-pink-500 rounded-xl flex items-center justify-center flex-shrink-0" aria-hidden="true">
              <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>
            </div>
            <span className="font-extrabold text-xl tracking-tight">folia</span>
          </a>
          <nav aria-label="Main site navigation">
            <ul className="space-y-1" role="list">
              {NAV.map(n => (
                <li key={n.key}>
                  <a href={n.href} className={`sidebar-link ${current===n.key?'active':''}`}
                    aria-current={current===n.key?'page':undefined}
                    aria-label={n.badge ? `${n.label} — ${n.badge} unread` : n.label}>
                    <div className="relative flex-shrink-0">
                      <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        {n.icon.includes('M15 12') ? (
                          <><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></>
                        ) : (
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={n.icon} />
                        )}
                      </svg>
                      {n.badge && <span aria-hidden="true" className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-folia-rose text-white text-[10px] font-bold rounded-full flex items-center justify-center">{n.badge}</span>}
                    </div>
                    <span>{n.label}</span>
                  </a>
                </li>
              ))}
            </ul>
          </nav>
          <div className="flex-1" />
          <a href="profile.html" className="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/5 transition-colors" aria-label="My profile — Kai Rivera">
            <div className="w-9 h-9 rounded-full bg-gradient-to-br from-violet-400 to-pink-500 flex items-center justify-center text-white font-bold text-sm flex-shrink-0" role="img" aria-label="Kai Rivera's avatar">KR</div>
            <div className="min-w-0">
              <p className="font-semibold text-sm text-white truncate">Kai Rivera</p>
              <p className="text-xs text-folia-muted truncate">@kairivera</p>
            </div>
          </a>
        </aside>
      );
    }

    function BottomNav({ current = 'settings' }) {
      const NAV = [
        { key:'feed',    href:'index.html',        icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6', label:'Feed' },
        { key:'explore', href:'explore.html',      icon:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z', label:'Explore' },
        { key:'notifs',  href:'notifications.html',icon:'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9', label:'Activity' },
        { key:'messages',href:'messages.html',     icon:'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z', label:'Messages' },
        { key:'profile', href:'profile.html',      icon:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z', label:'Profile' },
      ];
      return (
        <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-folia-border z-40 flex" aria-label="Mobile navigation">
          {NAV.map(n => (
            <a key={n.key} href={n.href} className={`bottom-nav-link flex-1 ${current===n.key?'active':''}`} aria-current={current===n.key?'page':undefined} aria-label={n.label}>
              <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={current===n.key?2.5:2} d={n.icon} /></svg>
              <span>{n.label}</span>
            </a>
          ))}
        </nav>
      );
    }

    /* ── Shared form field ─────────────────────────────────────── */
    function Field({ id, label, type='text', value, onChange, required, error, hint, multiline, rows=3, placeholder, maxLength }) {
      const inputClass = `w-full px-3.5 py-2.5 border rounded-xl text-sm outline-none transition-colors ${
        error ? 'border-red-400 focus:border-red-500 focus:ring-2 focus:ring-red-200' : 'border-folia-border focus:border-folia-accent focus:ring-2 focus:ring-folia-accent/20'
      }`;
      const describedBy = [hint && `${id}-hint`, error && `${id}-err`].filter(Boolean).join(' ') || undefined;
      return (
        <div>
          <label htmlFor={id} className="block text-sm font-semibold text-folia-text mb-1.5">
            {label}{required && <span aria-hidden="true" className="text-folia-rose ml-0.5">*</span>}
          </label>
          {hint && <p id={`${id}-hint`} className="text-xs text-folia-muted mb-1.5">{hint}</p>}
          {multiline ? (
            <textarea
              id={id}
              value={value}
              onChange={e => onChange(e.target.value)}
              required={required}
              aria-required={required}
              aria-describedby={describedBy}
              aria-invalid={!!error}
              rows={rows}
              maxLength={maxLength}
              placeholder={placeholder}
              className={inputClass}
            />
          ) : (
            <input
              id={id}
              type={type}
              value={value}
              onChange={e => onChange(e.target.value)}
              required={required}
              aria-required={required}
              aria-describedby={describedBy}
              aria-invalid={!!error}
              maxLength={maxLength}
              placeholder={placeholder}
              className={inputClass}
            />
          )}
          {error && <p id={`${id}-err`} role="alert" className="text-xs text-red-600 mt-1">{error}</p>}
          {maxLength && <p aria-live="polite" aria-atomic="true" className="text-xs text-folia-muted mt-1 text-right">{value.length}/{maxLength}</p>}
        </div>
      );
    }

    /* ── Toggle switch ─────────────────────────────────────────── */
    function Toggle({ id, label, checked, onChange, description }) {
      return (
        <div className="flex items-start justify-between gap-4">
          <div className="flex-1">
            <label htmlFor={id} className="text-sm font-semibold text-folia-text cursor-pointer">{label}</label>
            {description && <p className="text-xs text-folia-muted mt-0.5">{description}</p>}
          </div>
          <button
            id={id}
            role="switch"
            aria-checked={checked}
            aria-label={label}
            onClick={() => onChange(!checked)}
            className={`relative inline-flex flex-shrink-0 h-6 w-11 rounded-full transition-colors focus:outline-none ${checked ? 'bg-folia-accent' : 'bg-folia-border'}`}
          >
            <span
              aria-hidden="true"
              className={`inline-block w-4 h-4 rounded-full bg-white shadow-sm transition-transform mt-1 ${checked ? 'translate-x-6' : 'translate-x-1'}`}
            />
          </button>
        </div>
      );
    }

    /* ── Tag input ─────────────────────────────────────────────── */
    function TagInput({ id, label, hint, tags, onChange }) {
      const [inputVal, setInputVal] = useState('');

      function handleKey(e) {
        if ((e.key === 'Enter' || e.key === ',') && inputVal.trim()) {
          e.preventDefault();
          const val = inputVal.trim().replace(/^,+|,+$/g,'');
          if (val && !tags.includes(val)) onChange([...tags, val]);
          setInputVal('');
        }
        if (e.key === 'Backspace' && !inputVal && tags.length) {
          onChange(tags.slice(0,-1));
        }
      }

      return (
        <div>
          <label htmlFor={id} className="block text-sm font-semibold text-folia-text mb-1">{label}</label>
          {hint && <p id={`${id}-hint`} className="text-xs text-folia-muted mb-1.5">{hint}</p>}
          <div className="border border-folia-border rounded-xl px-3 py-2 flex flex-wrap gap-1.5 focus-within:border-folia-accent focus-within:ring-2 focus-within:ring-folia-accent/20 transition-colors">
            {tags.map((tag, i) => (
              <span key={i} className="flex items-center gap-1 px-2.5 py-0.5 bg-folia-surf border border-folia-border rounded-full text-xs font-medium text-folia-text">
                {tag}
                <button
                  type="button"
                  onClick={() => onChange(tags.filter((_,j) => j!==i))}
                  aria-label={`Remove ${tag}`}
                  className="text-folia-muted hover:text-folia-rose transition-colors ml-0.5 leading-none"
                >×</button>
              </span>
            ))}
            <input
              id={id}
              type="text"
              value={inputVal}
              onChange={e => setInputVal(e.target.value)}
              onKeyDown={handleKey}
              placeholder={tags.length === 0 ? 'Type and press Enter…' : ''}
              aria-describedby={`${id}-hint`}
              className="flex-1 min-w-24 text-sm outline-none bg-transparent placeholder:text-folia-muted"
            />
          </div>
        </div>
      );
    }

    /* ── Settings page ─────────────────────────────────────────── */
    function SettingsPage() {
      // Profile & Portfolio
      const [displayName, setDisplayName]     = useState('Kai Rivera');
      const [handle, setHandle]               = useState('kairivera');
      const [bio, setBio]                     = useState('Illustrator & visual storyteller based in Portland, OR. I explore the intersection of light, memory, and nature through digital painting and editorial work.');
      const [website, setWebsite]             = useState('https://kairivera.com');
      const [location, setLocation]           = useState('Portland, OR');
      const [profileErrors, setProfileErrors] = useState({});
      const [profileSaved, setProfileSaved]   = useState(false);

      // Creative Tools
      const [skills, setSkills] = useState(['Digital Illustration','Editorial Design','Visual Storytelling']);
      const [software, setSoftware] = useState(['Procreate','Figma','Adobe Illustrator','After Effects']);

      // Visibility
      const [publicProfile, setPublicProfile]     = useState(true);
      const [showInExplore, setShowInExplore]     = useState(true);
      const [allowMessages, setAllowMessages]     = useState(true);
      const [showAppreciates, setShowAppreciates] = useState(true);
      const [visibilitySaved, setVisibilitySaved] = useState(false);

      // Commissions
      const [openForWork, setOpenForWork]         = useState(true);
      const [commissionTypes, setCommissionTypes] = useState(['Editorial Illustration','Cover Art','Brand Identity']);
      const [commissionNote, setCommissionNote]   = useState('Currently accepting editorial and brand projects. Lead time ~3 weeks.');
      const [commissionSaved, setCommissionSaved] = useState(false);

      // Notifications
      const [notifPrefs, setNotifPrefs] = useState({
        appreciates:   { label:'Appreciations',       email:true,  push:true  },
        collects:      { label:'Collections',         email:false, push:true  },
        follows:       { label:'New followers',       email:true,  push:false },
        comments:      { label:'Comments',            email:true,  push:true  },
        feedback_req:  { label:'Feedback requests',   email:true,  push:true  },
        collab_invite: { label:'Collab invitations',  email:true,  push:true  },
        messages:      { label:'New messages',        email:false, push:true  },
      });
      const [notifSaved, setNotifSaved] = useState(false);

      // Security
      const [currentPw, setCurrentPw]     = useState('');
      const [newPw, setNewPw]             = useState('');
      const [confirmPw, setConfirmPw]     = useState('');
      const [twoFAEnabled, setTwoFAEnabled] = useState(false);
      const [pwErrors, setPwErrors]       = useState({});
      const [pwSaved, setPwSaved]         = useState(false);

      const [liveMsg, setLiveMsg] = useState('');
      const successRef = useRef(null);

      function announce(msg) {
        setLiveMsg(msg);
        setTimeout(() => setLiveMsg(''), 3000);
      }

      /* profile save */
      function saveProfile(e) {
        e.preventDefault();
        const errs = {};
        if (!displayName.trim()) errs.displayName = 'Display name is required.';
        if (!handle.trim()) errs.handle = 'Username is required.';
        else if (!/^[a-z0-9_]{3,20}$/.test(handle)) errs.handle = 'Username must be 3–20 characters: lowercase letters, numbers, underscores.';
        if (bio.length > 300) errs.bio = 'Bio must be 300 characters or fewer.';
        if (website && !/^https?:\/\/.+/.test(website)) errs.website = 'Enter a valid URL starting with http:// or https://';
        setProfileErrors(errs);
        if (Object.keys(errs).length === 0) {
          setProfileSaved(true);
          announce('Profile saved successfully.');
          setTimeout(() => setProfileSaved(false), 3000);
        } else {
          const firstErrId = Object.keys(errs)[0];
          document.getElementById(firstErrId)?.focus();
        }
      }

      /* password save */
      function savePassword(e) {
        e.preventDefault();
        const errs = {};
        if (!currentPw) errs.currentPw = 'Please enter your current password.';
        if (!newPw || newPw.length < 8) errs.newPw = 'New password must be at least 8 characters.';
        if (newPw !== confirmPw) errs.confirmPw = 'Passwords do not match.';
        setPwErrors(errs);
        if (Object.keys(errs).length === 0) {
          setPwSaved(true);
          setCurrentPw(''); setNewPw(''); setConfirmPw('');
          announce('Password updated successfully.');
          setTimeout(() => setPwSaved(false), 3000);
        } else {
          const firstErrId = Object.keys(errs)[0];
          document.getElementById(firstErrId)?.focus();
        }
      }

      function toggleNotifPref(key, channel) {
        setNotifPrefs(prev => ({ ...prev, [key]: { ...prev[key], [channel]: !prev[key][channel] } }));
      }

      const SECTION_CLASSES = 'bg-white border border-folia-border rounded-2xl p-6 mb-6';

      return (
        <div className="min-h-screen bg-folia-bg">
          <Sidebar current="settings" />
          <BottomNav current="settings" />

          <main id="main-content" className="lg:ml-60 pb-20 lg:pb-8" tabIndex={-1}>
            {/* Global live region */}
            <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{liveMsg}</div>

            <div className="max-w-2xl mx-auto px-4 lg:px-8 py-8">
              <h1 className="text-2xl font-extrabold text-folia-text mb-8">Settings</h1>

              {/* ── 1. Profile & Portfolio ──────────────────────── */}
              <section aria-labelledby="s-profile">
                <div className={SECTION_CLASSES}>
                  <h2 id="s-profile" className="text-base font-bold text-folia-text mb-5">Profile &amp; Portfolio</h2>
                  <form onSubmit={saveProfile} noValidate aria-label="Edit profile form">
                    <div className="space-y-4">
                      {/* Avatar */}
                      <div className="flex items-center gap-4">
                        <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-400 to-pink-500 flex items-center justify-center text-white font-extrabold text-xl" role="img" aria-label="Current profile picture: KR initials">KR</div>
                        <div>
                          <button type="button" className="text-sm font-semibold text-folia-accent hover:underline" aria-label="Upload a new profile photo">Upload photo</button>
                          <p className="text-xs text-folia-muted mt-0.5">JPG, PNG or GIF · Max 2 MB</p>
                        </div>
                      </div>

                      <Field id="displayName" label="Display Name" value={displayName} onChange={setDisplayName} required error={profileErrors.displayName} maxLength={50} />
                      <Field id="handle" label="Username" value={handle} onChange={setHandle} required error={profileErrors.handle} hint="folia.co/@kairivera" placeholder="kairivera" maxLength={20} />
                      <Field id="bio" label="Bio" value={bio} onChange={setBio} multiline rows={3} error={profileErrors.bio} maxLength={300} placeholder="Tell the community about your work…" />
                      <Field id="website" label="Website" type="url" value={website} onChange={setWebsite} error={profileErrors.website} placeholder="https://yoursite.com" />
                      <Field id="location" label="Location" value={location} onChange={setLocation} placeholder="City, Country" />
                    </div>

                    {profileSaved && (
                      <div role="status" className="mt-4 px-4 py-2.5 bg-emerald-50 border border-emerald-200 rounded-xl text-sm text-emerald-700 font-medium" ref={successRef}>
                        Profile saved successfully.
                      </div>
                    )}

                    <div className="mt-5 flex justify-end">
                      <button type="submit" className="px-6 py-2.5 bg-folia-accent text-white text-sm font-semibold rounded-xl hover:bg-folia-accent-h transition-colors">
                        Save Profile
                      </button>
                    </div>
                  </form>
                </div>
              </section>

              {/* ── 2. Creative Tools ───────────────────────────── */}
              <section aria-labelledby="s-tools">
                <div className={SECTION_CLASSES}>
                  <h2 id="s-tools" className="text-base font-bold text-folia-text mb-5">Creative Tools</h2>
                  <div className="space-y-5">
                    <TagInput
                      id="skills-input"
                      label="Skills & Disciplines"
                      hint="Type a skill and press Enter or comma to add. Shown on your profile."
                      tags={skills}
                      onChange={setSkills}
                    />
                    <TagInput
                      id="software-input"
                      label="Software & Tools"
                      hint="Type a tool and press Enter. e.g. Procreate, Blender, Lightroom"
                      tags={software}
                      onChange={setSoftware}
                    />
                    <div className="flex justify-end">
                      <button
                        onClick={() => announce('Creative tools saved.')}
                        className="px-6 py-2.5 bg-folia-accent text-white text-sm font-semibold rounded-xl hover:bg-folia-accent-h transition-colors"
                      >
                        Save Tools
                      </button>
                    </div>
                  </div>
                </div>
              </section>

              {/* ── 3. Visibility ───────────────────────────────── */}
              <section aria-labelledby="s-visibility">
                <div className={SECTION_CLASSES}>
                  <h2 id="s-visibility" className="text-base font-bold text-folia-text mb-5">Visibility</h2>
                  <div className="space-y-5">
                    <Toggle id="sw-public"      label="Public profile"        description="Anyone can view your portfolio and profile." checked={publicProfile}     onChange={setPublicProfile} />
                    <Toggle id="sw-explore"     label="Show in Explore"       description="Your work may appear in the Explore discovery grid." checked={showInExplore}  onChange={setShowInExplore} />
                    <Toggle id="sw-messages"    label="Allow direct messages" description="Other creators can send you direct messages." checked={allowMessages}    onChange={setAllowMessages} />
                    <Toggle id="sw-appreciates" label="Show appreciation count" description="Display the total number of appreciations on your works." checked={showAppreciates} onChange={setShowAppreciates} />
                    <div className="flex justify-end">
                      <button
                        onClick={() => { setVisibilitySaved(true); announce('Visibility settings saved.'); setTimeout(()=>setVisibilitySaved(false),3000); }}
                        className="px-6 py-2.5 bg-folia-accent text-white text-sm font-semibold rounded-xl hover:bg-folia-accent-h transition-colors"
                      >
                        Save Visibility
                      </button>
                    </div>
                    {visibilitySaved && <p role="status" className="text-sm text-emerald-700 text-right font-medium">Saved.</p>}
                  </div>
                </div>
              </section>

              {/* ── 4. Commission Status ────────────────────────── */}
              <section aria-labelledby="s-commissions">
                <div className={SECTION_CLASSES}>
                  <h2 id="s-commissions" className="text-base font-bold text-folia-text mb-5">Commission Status</h2>
                  <div className="space-y-5">
                    <Toggle
                      id="sw-openwork"
                      label="Open for commissions"
                      description={openForWork ? 'Your profile displays an "Open for Work" badge.' : 'Your commission badge is hidden.'}
                      checked={openForWork}
                      onChange={setOpenForWork}
                    />
                    {openForWork && (
                      <>
                        <TagInput
                          id="commission-types"
                          label="Commission types"
                          hint="Add the types of work you accept. Press Enter to add."
                          tags={commissionTypes}
                          onChange={setCommissionTypes}
                        />
                        <Field
                          id="commissionNote"
                          label="Commission note"
                          value={commissionNote}
                          onChange={setCommissionNote}
                          multiline rows={2}
                          hint="Shown to potential clients on your profile."
                          maxLength={200}
                          placeholder="e.g. Available for editorial projects. Lead time 2–3 weeks."
                        />
                      </>
                    )}
                    <div className="flex justify-end">
                      <button
                        onClick={() => { setCommissionSaved(true); announce('Commission settings saved.'); setTimeout(()=>setCommissionSaved(false),3000); }}
                        className="px-6 py-2.5 bg-folia-accent text-white text-sm font-semibold rounded-xl hover:bg-folia-accent-h transition-colors"
                      >
                        Save Commission Settings
                      </button>
                    </div>
                    {commissionSaved && <p role="status" className="text-sm text-emerald-700 text-right font-medium">Saved.</p>}
                  </div>
                </div>
              </section>

              {/* ── 5. Notification Preferences ─────────────────── */}
              <section aria-labelledby="s-notifs">
                <div className={SECTION_CLASSES}>
                  <h2 id="s-notifs" className="text-base font-bold text-folia-text mb-2">Notification Preferences</h2>
                  <p className="text-sm text-folia-muted mb-5">Choose how you'd like to be notified for each activity type.</p>
                  <table className="w-full text-sm" aria-label="Notification preferences by type and channel">
                    <thead>
                      <tr className="text-left border-b border-folia-border">
                        <th scope="col" className="pb-2 font-semibold text-folia-text w-2/3">Activity</th>
                        <th scope="col" className="pb-2 font-semibold text-folia-muted text-center w-1/6">Email</th>
                        <th scope="col" className="pb-2 font-semibold text-folia-muted text-center w-1/6">Push</th>
                      </tr>
                    </thead>
                    <tbody>
                      {Object.entries(notifPrefs).map(([key, pref]) => (
                        <tr key={key} className="border-b border-folia-border last:border-0">
                          <td className="py-3 text-folia-text font-medium">{pref.label}</td>
                          <td className="py-3 text-center">
                            <input
                              type="checkbox"
                              id={`notif-${key}-email`}
                              checked={pref.email}
                              onChange={() => toggleNotifPref(key, 'email')}
                              aria-label={`${pref.label} — email notifications`}
                              className="w-4 h-4 accent-folia-accent cursor-pointer"
                            />
                          </td>
                          <td className="py-3 text-center">
                            <input
                              type="checkbox"
                              id={`notif-${key}-push`}
                              checked={pref.push}
                              onChange={() => toggleNotifPref(key, 'push')}
                              aria-label={`${pref.label} — push notifications`}
                              className="w-4 h-4 accent-folia-accent cursor-pointer"
                            />
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  <div className="mt-5 flex justify-end">
                    <button
                      onClick={() => { setNotifSaved(true); announce('Notification preferences saved.'); setTimeout(()=>setNotifSaved(false),3000); }}
                      className="px-6 py-2.5 bg-folia-accent text-white text-sm font-semibold rounded-xl hover:bg-folia-accent-h transition-colors"
                    >
                      Save Preferences
                    </button>
                  </div>
                  {notifSaved && <p role="status" className="text-sm text-emerald-700 text-right font-medium mt-2">Saved.</p>}
                </div>
              </section>

              {/* ── 6. Account Security ─────────────────────────── */}
              <section aria-labelledby="s-security">
                <div className={SECTION_CLASSES}>
                  <h2 id="s-security" className="text-base font-bold text-folia-text mb-5">Account Security</h2>

                  {/* Change password */}
                  <h3 className="text-sm font-bold text-folia-text mb-4">Change Password</h3>
                  <form onSubmit={savePassword} noValidate aria-label="Change password form">
                    <div className="space-y-4">
                      <Field id="currentPw" label="Current password" type="password" value={currentPw} onChange={setCurrentPw} required error={pwErrors.currentPw} />
                      <Field id="newPw" label="New password" type="password" value={newPw} onChange={setNewPw} required error={pwErrors.newPw} hint="At least 8 characters." />
                      <Field id="confirmPw" label="Confirm new password" type="password" value={confirmPw} onChange={setConfirmPw} required error={pwErrors.confirmPw} />
                    </div>
                    {pwSaved && <p role="status" className="mt-3 text-sm text-emerald-700 font-medium">Password updated successfully.</p>}
                    <div className="mt-5 flex justify-end">
                      <button type="submit" className="px-6 py-2.5 bg-folia-accent text-white text-sm font-semibold rounded-xl hover:bg-folia-accent-h transition-colors">
                        Update Password
                      </button>
                    </div>
                  </form>

                  {/* 2FA */}
                  <div className="mt-6 pt-6 border-t border-folia-border">
                    <h3 className="text-sm font-bold text-folia-text mb-1">Two-Factor Authentication</h3>
                    <p className="text-xs text-folia-muted mb-4">Add an extra layer of security to your account using an authenticator app.</p>
                    <Toggle
                      id="sw-2fa"
                      label="Enable 2FA"
                      description={twoFAEnabled ? 'Two-factor authentication is active.' : 'Two-factor authentication is disabled.'}
                      checked={twoFAEnabled}
                      onChange={v => { setTwoFAEnabled(v); announce(v ? 'Two-factor authentication enabled.' : 'Two-factor authentication disabled.'); }}
                    />
                    {twoFAEnabled && (
                      <div className="mt-3 px-4 py-3 bg-emerald-50 border border-emerald-200 rounded-xl" role="status">
                        <p className="text-sm text-emerald-700 font-medium">2FA is active.</p>
                        <p className="text-xs text-emerald-600 mt-0.5">Scan the QR code in your authenticator app, or enter the setup key manually.</p>
                        <div className="mt-3 w-24 h-24 bg-white border border-emerald-200 rounded-lg flex items-center justify-center" role="img" aria-label="QR code placeholder for two-factor authentication setup">
                          <svg aria-hidden="true" className="w-10 h-10 text-emerald-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Danger zone */}
                  <div className="mt-6 pt-6 border-t border-folia-border">
                    <h3 className="text-sm font-bold text-red-600 mb-1">Danger Zone</h3>
                    <p className="text-xs text-folia-muted mb-3">These actions are permanent and cannot be undone.</p>
                    <div className="flex flex-col sm:flex-row gap-2">
                      <button className="px-4 py-2 border border-red-200 text-red-600 text-sm font-semibold rounded-xl hover:bg-red-50 transition-colors" aria-label="Deactivate account — this action is reversible">
                        Deactivate account
                      </button>
                      <button className="px-4 py-2 border border-red-400 bg-red-50 text-red-700 text-sm font-semibold rounded-xl hover:bg-red-100 transition-colors" aria-label="Delete account — this action is permanent and cannot be undone">
                        Delete account permanently
                      </button>
                    </div>
                  </div>
                </div>
              </section>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<SettingsPage />);
  </script>
</body>
</html>
