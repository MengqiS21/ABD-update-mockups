                      On a Tuesday morning in August 2024, a crack appeared in the foundation of James Echeverría's farmhouse outside Tulare, California. It was three inches wide and ran diagonally from the northeast corner of his living room to the back porch. He knew exactly what it was.
                    </p>
                    <p>

                    </p>
                    <p>
                      Echeverría's property sits over one of the most over-drafted aquifers in the United States — the Tulare Basin, part of the larger San Joaquin Valley system that provides roughly a third of the country's fruits and vegetables. According to satellite data analyzed by Groundwork, the ground beneath his farm sank 8.7 inches in 2024 alone.
                    </p>

                    {/* Pull quote */}

                    </blockquote>

                    <h2 className="font-serif text-2xl font-bold mt-8 mb-4">A Crisis Measured in Feet, Not Inches</h2>
                    <p>
                      The numbers are staggering. Groundwork obtained and analyzed records from 2.4 million federal monitoring wells — the most comprehensive dataset ever compiled on American groundwater. The findings: 37 percent of U.S. groundwater wells have declined since 2000, with the sharpest drops concentrated in the High Plains Aquifer (which underlies parts of eight states from South Dakota to Texas) and the Central Valley aquifer system.
                    </p>
                    <p>
                      In some counties in western Kansas, water levels have dropped more than 150 feet since the 1950s. At current extraction rates, hydrologists estimate the southern High Plains could lose 40 percent of its remaining saturated thickness within 25 years.
                    </p>

                    <figure className="my-8" aria-labelledby="chart1-caption">
                      <div className="bg-gw-nav rounded-sm h-56 flex items-center justify-center relative overflow-hidden" role="img" aria-label="Bar chart showing groundwater depletion rates by aquifer region, 2000–2024">
                        <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'repeating-linear-gradient(90deg, #D97706 0px, #D97706 1px, transparent 1px, transparent 40px)' }} aria-hidden="true" />
                        <div className="text-center z-10">
                          <p className="text-gw-gold text-xs font-bold uppercase tracking-widest font-sans mb-1">Interactive Chart</p>
                          <p className="text-white font-serif text-lg font-bold">Groundwater Depletion by Aquifer<br/>Region, 2000–2024</p>
                          <p className="text-white/40 text-xs font-sans mt-2">Source: Groundwork analysis of USGS data</p>
                        </div>
                      </div>
                      <figcaption id="chart1-caption" className="text-xs text-gw-muted mt-2 font-sans">
                        The High Plains and Central Valley aquifer systems account for 61% of all measurable U.S. groundwater depletion since 2000. Source: Groundwork / USGS.
                      </figcaption>
                    </figure>

                    <h2 className="font-serif text-2xl font-bold mt-8 mb-4">Federal Policy's Blind Spot</h2>
                    <p>
                      For decades, groundwater management has been left almost entirely to the states — a patchwork of regulations that varies enormously. Texas, for example, operates under the "rule of capture," which allows landowners to pump as much water as they can from beneath their property, regardless of effects on neighbors or the broader aquifer.
                    </p>
                    <p>
                      The result has been a tragedy-of-the-commons dynamic that federal water law was never designed to address. The Bureau of Reclamation, which oversees most western water projects, focuses on surface water — reservoirs, canals, river allocations. It has no direct authority over groundwater pumping.
                    </p>

                    {/* Pull quote 2 */}
                    <blockquote className="pull-quote">
                      "The federal government built the infrastructure that enabled massive groundwater extraction. It never built the governance structure to manage the consequences."
                      <cite className="block mt-2 font-sans text-sm text-gw-muted not-italic font-semibold">— Dr. Sarah Moonias, Water Policy Institute, University of Arizona</cite>
                    </blockquote>

                    <h2 className="font-serif text-2xl font-bold mt-8 mb-4">The Communities Being Left Behind</h2>
                    <p>
                      The consequences are not equally distributed. Groundwork's analysis found that the communities experiencing the most severe water table declines are disproportionately Latino farmworker communities in California's Central Valley and Native American communities in the Southwest — populations that often lack the legal and financial resources to drill deeper wells or pursue water rights claims.
                    </p>
                    <p>
                      In the Coachella Valley east of Los Angeles, a cluster of low-income farmworker colonias has experienced dry wells every summer for the past four years. Residents are now dependent on water trucked in by county officials — an arrangement that costs seven times more per gallon than piped municipal water.
                    </p>

                    {/* Map embed */}
                    <figure className="my-8" aria-labelledby="map-caption">
                      <div className="bg-gradient-to-br from-blue-950 via-teal-900 to-emerald-950 rounded-sm h-64 flex items-center justify-center" role="img" aria-label="Map of the American West showing counties with most severe groundwater declines highlighted in red">
                        <div className="text-center">
                          <p className="text-gw-gold text-xs font-bold uppercase tracking-widest font-sans mb-1">Interactive Map</p>
                          <p className="text-white font-serif text-base font-bold">Counties With Critical Groundwater Depletion</p>
                          <p className="text-white/40 text-xs font-sans mt-1">Hover over a county to see detailed well data</p>
                        </div>
                      </div>
                      <figcaption id="map-caption" className="text-xs text-gw-muted mt-2 font-sans">
                        Red counties have lost more than 50 feet of water table depth since 2000. Orange counties show losses of 25–50 feet. Source: Groundwork / USGS / NASA.
                      </figcaption>
                    </figure>
                  </div>
