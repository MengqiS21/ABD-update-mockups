<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── Cookie Banner ─────────────────────────────────────────── */
    function CookieBanner({ onDismiss }) {
      const btnRef = useRef(null);
      useEffect(() => { btnRef.current?.focus(); }, []);
      return (
        <div role="region" aria-label="Cookie consent" className="fixed bottom-0 left-0 right-0 z-50 bg-gw-nav border-t-2 border-gw-gold px-4 py-3 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
          <p className="text-white text-sm max-w-xl">
            Groundwork uses cookies to remember your preferences and improve your experience. We never sell your data.{' '}
            <a href="#" className="text-gw-gold underline hover:no-underline">Learn more</a>.
          </p>
          <div className="flex gap-3 flex-shrink-0">
            <button onClick={onDismiss} ref={btnRef} className="px-5 py-2 bg-gw-gold text-white text-sm font-semibold rounded-sm hover:bg-amber-600 transition-colors" aria-label="Accept cookies and dismiss this banner">
              Accept
            </button>
            <button onClick={onDismiss} className="px-5 py-2 border border-white/40 text-white text-sm font-semibold rounded-sm hover:border-white transition-colors" aria-label="Decline optional cookies and dismiss this banner">
              Decline
            </button>
          </div>
        </div>
      );
    }

    /* ── Breaking News Ticker ──────────────────────────────────── */
    function BreakingTicker() {
      const [paused, setPaused] = useState(false);
      const ITEMS = [
        'BREAKING: Senate committee advances landmark carbon pricing bill after 14-hour session',
        'UPDATE: EPA releases new methane reporting rules covering 3,000 oil &amp; gas facilities',
        'EXCLUSIVE: Leaked documents show federal groundwater projections revised downward by 28%',
        'REPORT: Colorado River allocation talks collapse as reservoir levels hit historic low',
      ];
      const doubled = [...ITEMS, ...ITEMS];
      return (
        <div className="bg-gw-break text-white" role="region" aria-label="Breaking news ticker">
          <div className="max-w-7xl mx-auto px-4 flex items-center gap-0 h-10">
            <span className="flex-shrink-0 bg-white text-gw-break text-xs font-extrabold px-2.5 py-1 mr-3 tracking-widest uppercase" aria-hidden="true">Breaking</span>
            <div className="flex-1 ticker-wrap overflow-hidden" aria-live="off">
              <div className={`ticker-inner ${paused ? 'paused' : ''}`} aria-hidden="true">
                {doubled.map((item, i) => (
                  <span key={i} className="text-sm font-medium mr-16" dangerouslySetInnerHTML={{ __html: item }} />
                ))}
              </div>
              {/* Static accessible version */}
              <ul className="sr-only">
                {ITEMS.map((item, i) => <li key={i} dangerouslySetInnerHTML={{ __html: item }} />)}
              </ul>
            </div>
            <button
              onClick={() => setPaused(p => !p)}
              aria-pressed={paused}
              aria-label={paused ? 'Resume breaking news ticker' : 'Pause breaking news ticker'}
              className="flex-shrink-0 ml-3 p-1.5 rounded hover:bg-white/20 transition-colors"
            >
              {paused ? (
                <svg aria-hidden="true" className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              ) : (
                <svg aria-hidden="true" className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
              )}
            </button>
          </div>
        </div>
      );
    }

            <nav aria-label="Main site navigation" className="hidden md:flex items-center gap-5">

            </nav>
            <a href="subscribe.html" className="hidden md:inline-flex items-center gap-1.5 px-4 py-2 bg-gw-gold text-white text-xs font-bold uppercase tracking-wide rounded-sm hover:bg-amber-600 transition-colors font-sans">
              Subscribe
            </a>
            <button onClick={() => setMenuOpen(m=>!m)} aria-expanded={menuOpen} aria-label={menuOpen?'Close menu':'Open menu'} className="md:hidden p-2 text-white hover:text-gw-gold transition-colors">
              <svg aria-hidden="true" className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={menuOpen ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'} />
              </svg>
            </button>
          </div>
          {/* Category nav */}
          <div className="border-t border-white/10 bg-white">
            <nav aria-label="Topic categories" className="max-w-7xl mx-auto px-4 flex overflow-x-auto gap-0 hide-scrollbar">
              {CATS.map(c => (
                <a key={c.key} href={c.href} className="cat-link whitespace-nowrap" aria-current={current===c.key?'page':undefined} dangerouslySetInnerHTML={{ __html: c.label }} />
              ))}
            </nav>
          </div>
          {/* Mobile menu */}
          {menuOpen && (
            <div className="md:hidden bg-gw-nav border-t border-white/10 px-4 py-4">
              <nav aria-label="Mobile navigation">
                <ul className="space-y-2">
                  {NAV.map(n => (
                    <li key={n.key}><a href={n.href} className="block py-2 text-white font-semibold font-sans text-sm" aria-current={current===n.key?'page':undefined}>{n.label}</a></li>
                  ))}
                  <li><a href="subscribe.html" className="block mt-3 text-center py-2.5 bg-gw-gold text-white font-bold text-sm rounded-sm">Support Groundwork</a></li>
                </ul>
              </nav>
            </div>
          )}
        </header>
      );
    }

    /* ── Footer ────────────────────────────────────────────────── */
    function Footer() {
      return (
        <footer className="bg-gw-nav text-white mt-16" aria-label="Site footer">
          <div className="max-w-7xl mx-auto px-4 py-12">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-8 pb-8 border-b border-white/10">
              <div>
                <div className="flex items-center gap-2 mb-3">
                  <div className="w-6 h-6 bg-gw-gold flex items-center justify-center" aria-hidden="true">
                    <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                  </div>
                  <span className="font-serif text-lg font-black tracking-tight">Groundwork</span>
                </div>
                <p className="text-white/50 text-xs leading-relaxed font-sans">Independent investigative journalism covering climate, science, and environmental policy.</p>
              </div>
              {[
                { heading:'Coverage', links:['Climate','Energy','Policy','Science','Data &amp; Maps','Investigations'] },
                { heading:'About', links:['Our Mission','Staff','Methodology','Ethics Policy','Contact Us'] },
                { heading:'Support', links:['Subscribe','Donate','Newsletters','Republish Our Work','Press Inquiries'] },
              ].map(col => (
                <div key={col.heading}>
                  <h3 className="text-white font-bold text-xs uppercase tracking-widest mb-3 font-sans">{col.heading}</h3>
                  <ul className="space-y-2">
                    {col.links.map(l => (
                      <li key={l}><a href="#" className="text-white/50 text-sm hover:text-white transition-colors font-sans" dangerouslySetInnerHTML={{ __html: l }} /></li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
            <div className="pt-6 flex flex-col sm:flex-row items-center justify-between gap-3">

              <div className="flex gap-4">
                {['Privacy Policy','Terms of Use','Accessibility'].map(l => (
                  <a key={l} href="#" className="text-white/30 text-xs hover:text-white/60 font-sans transition-colors">{l}</a>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    }

    /* ── Article Card ──────────────────────────────────────────── */
    function ArticleCard({ story, size = 'normal' }) {
      return (
        <article className="group" aria-label={story.title}>
          <a href={story.href} className="article-card block" aria-label={story.title}>
            <div className={`bg-gradient-to-br ${story.imgGrad} ${size === 'large' ? 'h-56' : 'h-40'} rounded-sm mb-3`} role="img" aria-label={story.imgAlt || story.title} />
          </a>
          <div>
            <div className="flex items-center gap-2 mb-1.5">
              <a href="climate.html" className="text-[11px] font-bold uppercase tracking-widest text-gw-amber hover:underline font-sans">{story.category}</a>
              {story.isNew && <span className="text-[10px] font-bold uppercase tracking-widest text-gw-break font-sans">New</span>}
            </div>
            <h3 className={`font-serif font-bold leading-snug mb-2 group-hover:text-gw-accent transition-colors ${size === 'large' ? 'text-xl' : 'text-base'}`}>
              <a href={story.href} className="card-headline hover:underline" aria-label={story.title}>{story.title}</a>
            </h3>
            {story.deck && <p className="text-gw-muted text-sm leading-relaxed font-sans mb-2">{story.deck}</p>}
            <div className="flex items-center gap-2 text-xs text-gw-muted font-sans">
              <span>{story.author}</span>
              <span aria-hidden="true">·</span>
              <time dateTime={story.dateIso}>{story.date}</time>
              {story.readTime && <><span aria-hidden="true">·</span><span>{story.readTime} min read</span></>}
            </div>
          </div>
        </article>
      );
    }

    /* ── Newsletter Signup ─────────────────────────────────────── */
    function NewsletterSignup() {
      const [email, setEmail] = useState('');
      const [error, setError] = useState('');
      const [success, setSuccess] = useState(false);
      const [busy, setBusy] = useState(false);

      function handleSubmit(e) {
        e.preventDefault();
        if (!email.trim()) { setError('Please enter your email address.'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('Please enter a valid email address (e.g., name@example.com).'); return; }
        setError('');
        setBusy(true);
        setTimeout(() => { setBusy(false); setSuccess(true); setEmail(''); }, 1000);
      }

      return (
        <section id="newsletter" className="bg-gw-accent text-white py-12 px-4" aria-labelledby="nl-heading">
          <div className="max-w-2xl mx-auto text-center">
            <h2 id="nl-heading" className="font-serif text-2xl font-bold mb-2">The Groundwork Briefing</h2>
            <p className="text-white/70 text-sm mb-6 font-sans">Our weekly digest of climate investigations, data releases, and policy developments. Free, always.</p>
            {success ? (
              <div role="status" aria-live="polite" aria-atomic="true" className="px-6 py-3 bg-white/10 rounded text-white font-semibold font-sans">
                You're in. Check your inbox for a confirmation email.
              </div>
            ) : (
              <form onSubmit={handleSubmit} noValidate aria-label="Newsletter signup form">
                <div className="flex flex-col sm:flex-row gap-2 max-w-md mx-auto">
                  <div className="flex-1">
                    <label htmlFor="nl-email" className="sr-only">Email address</label>
                    <input
                      id="nl-email"
                      type="email"
                      value={email}
                      onChange={e => setEmail(e.target.value)}
                      placeholder="your@email.com"
                      required
                      aria-required="true"
                      aria-invalid={!!error}
                      aria-describedby={error ? 'nl-err' : undefined}
                      className="w-full px-4 py-2.5 text-gw-text text-sm rounded-sm outline-none focus:ring-2 focus:ring-gw-gold font-sans"
                    />
                  </div>
                  <button type="submit" disabled={busy} aria-busy={busy} className="px-6 py-2.5 bg-gw-gold text-white font-bold text-sm rounded-sm hover:bg-amber-600 transition-colors disabled:opacity-60 font-sans">
                    {busy ? 'Subscribing…' : 'Subscribe Free'}
                  </button>
                </div>
                {error && <p id="nl-err" role="alert" className="mt-2 text-amber-200 text-xs font-sans">{error}</p>}
              </form>
            )}
            {/* Live region for status */}
            {!success && <div role="status" aria-live="polite" className="sr-only">{busy ? 'Subscribing, please wait…' : ''}</div>}
          </div>
        </section>
      );
    }

    /* ── Main page data ────────────────────────────────────────── */

        author:'David Reinholt', date:'March 22, 2026', dateIso:'2026-03-22', readTime:12,
        category:'Energy', href:'article.html',

      {

        imgGrad:'from-blue-400 via-teal-500 to-cyan-600', imgAlt:'Flooded neighborhood with FEMA buyout signs',
      },
    ];

    const MORE_STORIES = [
      { id:4, title:'Inside the "Carbon Cowboys": How Offset Markets Failed Small Landowners', author:'James Adeyemi', date:'Mar 18', dateIso:'2026-03-18', readTime:10, category:'Climate', href:'article.html', imgGrad:'from-green-600 to-emerald-800', imgAlt:'Forest with carbon offset markers' },
      { id:5, title:'Arctic Permafrost Is Thawing 70 Years Early. Scientists Don\'t Know Why.', author:'Priya Vásquez', date:'Mar 15', dateIso:'2026-03-15', readTime:8, category:'Science', href:'article.html', imgGrad:'from-sky-200 via-blue-300 to-indigo-400', imgAlt:'Melting permafrost in Arctic tundra' },

    function HomePage() {
      const [cookieDismissed, setCookieDismissed] = useState(false);
      const loadMoreRef = useRef(null);

      return (
        <div className="min-h-screen bg-gw-bg">
          {!cookieDismissed && <CookieBanner onDismiss={() => setCookieDismissed(true)} />}
          <BreakingTicker />
          <Header current="home" />

          <main id="main-content" tabIndex={-1} className="focus:outline-none">

            <section aria-labelledby="hero-heading" className="border-b border-gw-border">
              <div className="max-w-7xl mx-auto px-4 py-8">
                <div className="grid grid-cols-1 lg:grid-cols-5 gap-0 lg:gap-8">
                  {/* Main hero */}
                  <div className="lg:col-span-3 border-r-0 lg:border-r border-gw-border lg:pr-8">
                    <a href="article.html" className="group block" aria-label="The Invisible Flood: How Groundwater Collapse Is Reshaping the American West">
                      <div className="h-72 lg:h-80 bg-gradient-to-br from-blue-900 via-teal-800 to-emerald-900 mb-5 relative rounded-sm overflow-hidden" role="img" aria-label="Aerial image of cracked, dry American West landscape">
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent" aria-hidden="true" />
                        <div className="absolute bottom-4 left-4 right-4">
                          <span className="text-xs font-bold uppercase tracking-widest text-gw-gold font-sans">Feature Investigation</span>
                        </div>
                      </div>
                    </a>
                    <span className="text-xs font-bold uppercase tracking-widest text-gw-amber font-sans">Climate · Water</span>
                    <h1 id="hero-heading" className="font-serif text-3xl lg:text-4xl font-black leading-tight mt-1 mb-3">
                      <a href="article.html" className="hover:text-gw-accent transition-colors">The Invisible Flood: How Groundwater Collapse Is Reshaping the American West</a>
                    </h1>
                    <p className="text-gw-muted leading-relaxed font-sans mb-4">
                      Across a 600-mile arc from Nevada to New Mexico, aquifers that took 10,000 years to fill are emptying in decades. Our six-month investigation — drawing on 2.4 million well records and satellite subsidence data — reveals what happens when the water runs out.

                    <div className="flex items-center gap-3">
                      <div className="w-9 h-9 rounded-full bg-gradient-to-br from-teal-500 to-emerald-600 flex items-center justify-center text-white font-bold text-sm font-sans flex-shrink-0" role="img" aria-label="Camille Okafor's profile photo">CO</div>
                      <div className="font-sans">
                        <p className="text-sm font-semibold text-gw-text">Camille Okafor</p>
                        <p className="text-xs text-gw-muted">Senior Climate Correspondent · <time dateTime="2026-03-20">March 20, 2026</time> · 22 min read</p>

                    </div>
                  </div>
                  {/* Sidebar stories */}
                  <div className="lg:col-span-2 mt-6 lg:mt-0">

                    <div className="space-y-5">
                      {LATEST.map(story => (

                          <h3 className="font-serif text-base font-bold leading-snug mt-1 mb-1">
                            <a href={story.href} className="hover:text-gw-accent transition-colors">{story.title}</a>
                          </h3>
                          <div className="flex items-center gap-2 text-xs text-gw-muted font-sans">
                            <span>{story.author}</span>
                            <span aria-hidden="true">·</span>
                            <time dateTime={story.dateIso}>{story.date}</time>
                          </div>
                        </article>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </section>

            {/* ── By the Numbers ────────────────────────────────── */}
            <section aria-labelledby="btn-heading" className="bg-gw-accent text-white py-12">
              <div className="max-w-7xl mx-auto px-4">
                <h2 id="btn-heading" className="font-serif text-xl font-bold text-center mb-8 text-white/70">By the Numbers</h2>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-6 text-center" role="list" aria-label="Key statistics">
                  {[
                    { stat:'37%', label:'of U.S. groundwater wells have declined since 2000', source:'USGS, 2025' },
                    { stat:'$2.1T', label:'estimated infrastructure cost of sea-level adaptation by 2060', source:'MIT, 2024' },
                    { stat:'4.8°F', label:'average warming in the American West since 1970', source:'NOAA' },
                    { stat:'840M', label:'acres of Western land currently under some form of drought', source:'USDM, Feb 2026' },
                  ].map(item => (
                    <div key={item.stat} role="listitem" className="border-t-2 border-gw-gold pt-4">
                      <p className="font-serif text-4xl font-black text-gw-gold mb-1" aria-label={`${item.stat} — ${item.label}`}>{item.stat}</p>
                      <p className="text-white/70 text-xs leading-relaxed font-sans mb-1">{item.label}</p>
                      <p className="text-white/30 text-[10px] font-sans">Source: {item.source}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* ── More Stories ──────────────────────────────────── */}
            <section aria-labelledby="more-heading" className="max-w-7xl mx-auto px-4 py-10">
              <h2 id="more-heading" className="font-serif text-xl font-bold mb-6 pb-2 border-b border-gw-border">Recent Reporting</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8" role="list" aria-label="Recent investigations">
                {MORE_STORIES.map(story => (
                  <div key={story.id} role="listitem">
                    <ArticleCard story={story} />
                  </div>
                ))}
              </div>
              <div className="mt-8 text-center">
                <a
                  href="climate.html"
                  ref={loadMoreRef}
                  className="inline-block px-8 py-3 border-2 border-gw-accent text-gw-accent font-bold text-sm uppercase tracking-wide hover:bg-gw-accent hover:text-white transition-colors font-sans rounded-sm"
                >
                  View All Investigations
                </a>
              </div>
            </section>

            {/* ── Donation CTA ──────────────────────────────────── */}
            <section aria-labelledby="donate-heading" className="bg-gw-surf border-t border-b border-gw-border py-12 px-4">
              <div className="max-w-2xl mx-auto text-center">
                <p className="text-xs font-bold uppercase tracking-widest text-gw-amber mb-2 font-sans">Reader Supported</p>
                <h2 id="donate-heading" className="font-serif text-2xl lg:text-3xl font-black mb-3">This Reporting Is Free. Making It Isn't.</h2>
                <p className="text-gw-muted leading-relaxed font-sans mb-6">
                  Groundwork accepts no advertising and no government money. Every investigation — every database, every FOIA request, every source — is funded by readers like you.
                </p>
                <div className="flex flex-col sm:flex-row gap-3 justify-center">
                  <a href="subscribe.html" className="donation-btn">Support Groundwork Today</a>
                  <a href="subscribe.html" className="inline-block px-7 py-3 border-2 border-gw-accent text-gw-accent font-bold text-sm rounded-sm hover:bg-gw-accent hover:text-white transition-colors font-sans">See Our Impact</a>
                </div>
              </div>
            </section>

            {/* ── Newsletter ────────────────────────────────────── */}
            <NewsletterSignup />
          </main>

          <Footer />
        </div>
      );
    }
