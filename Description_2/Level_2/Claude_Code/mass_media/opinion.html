    .skip-link:focus { top:8px; }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
    .nav-link { font-size:14px;font-weight:600;color:#a3b18a;text-decoration:none;padding:6px 4px;letter-spacing:0.03em;text-transform:uppercase;transition:color 0.15s; }
    .nav-link:hover, .nav-link[aria-current="page"] { color:#fff; }
    .nav-link[aria-current="page"] { border-bottom:2px solid #D97706; }
    .cat-link { font-size:13px;font-weight:600;color:#78716C;text-decoration:none;padding:8px 16px;letter-spacing:0.04em;text-transform:uppercase;transition:all 0.15s;border-bottom:3px solid transparent; }
    .cat-link:hover { color:#1B4332;border-bottom-color:#1B4332; }
    .cat-link[aria-current="page"] { color:#1B4332;border-bottom-color:#1B4332; }

    .ticker-inner { display:flex;animation:ticker-scroll 40s linear infinite;width:max-content; }
    .ticker-inner.paused { animation-play-state:paused; }
    .ticker-wrap { overflow:hidden;white-space:nowrap; }
    .piece-body { font-family:'Playfair Display',Georgia,serif; font-size:17px; line-height:1.8; color:#1A1A1A; }
    .piece-body p { margin-bottom:1.3em; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function BreakingTicker() {
      const [paused, setPaused] = useState(false);
      const ITEMS = ['BREAKING: Senate committee advances landmark carbon pricing bill','UPDATE: EPA releases new methane reporting rules','EXCLUSIVE: Federal groundwater projections revised downward by 28%'];
      return (
        <div className="bg-gw-break text-white" role="region" aria-label="Breaking news ticker">
          <div className="max-w-7xl mx-auto px-4 flex items-center h-10">
            <span className="flex-shrink-0 bg-white text-gw-break text-xs font-extrabold px-2.5 py-1 mr-3 tracking-widest uppercase" aria-hidden="true">Breaking</span>
            <div className="flex-1 ticker-wrap">
              <div className={`ticker-inner ${paused?'paused':''}`} aria-hidden="true">
                {[...ITEMS,...ITEMS].map((it,i) => <span key={i} className="text-sm font-medium mr-16">{it}</span>)}
              </div>
              <ul className="sr-only">{ITEMS.map((it,i) => <li key={i}>{it}</li>)}</ul>
            </div>
            <button onClick={() => setPaused(p=>!p)} aria-pressed={paused} aria-label={paused?'Resume ticker':'Pause ticker'} className="flex-shrink-0 ml-3 p-1.5 rounded hover:bg-white/20 transition-colors">
              {paused ? <svg aria-hidden="true" className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                      : <svg aria-hidden="true" className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>}
            </button>
          </div>
        </div>
      );
    }

    function Header({ current = 'opinion' }) {

        { key:'climate', label:'Climate', href:'climate.html' },
        { key:'energy', label:'Energy', href:'climate.html' },
        { key:'policy', label:'Policy', href:'climate.html' },
        { key:'science', label:'Science', href:'climate.html' },
        { key:'data', label:'Data', href:'climate.html' },
        { key:'opinion', label:'Perspectives', href:'opinion.html' },

        { key:'climate', label:'Climate', href:'climate.html' },
        { key:'energy', label:'Energy', href:'climate.html' },
        { key:'policy', label:'Policy', href:'climate.html' },
        { key:'science', label:'Science', href:'climate.html' },
        { key:'data', label:'Data &amp; Maps', href:'climate.html' },
        { key:'opinion', label:'Perspectives', href:'opinion.html' },

      return (
        <header className="sticky top-0 z-40 bg-gw-nav shadow-lg">
          <div className="border-b border-white/10">
            <div className="max-w-7xl mx-auto px-4 h-8 flex items-center justify-between">
              <span className="text-xs text-white/50">Independent Climate Journalism</span>
              <a href="subscribe.html" className="text-xs text-gw-gold font-semibold hover:underline">Support Groundwork</a>
            </div>
          </div>
          <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" className="flex items-center gap-2.5" aria-label="Groundwork — home">
              <div className="w-7 h-7 bg-gw-gold flex items-center justify-center" aria-hidden="true">
                <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              </div>
              <span className="font-serif text-xl font-black text-white">Groundwork</span>
            </a>
            <nav aria-label="Main site navigation" className="hidden md:flex items-center gap-5">

            </nav>
            <a href="subscribe.html" className="hidden md:inline-flex px-4 py-2 bg-gw-gold text-white text-xs font-bold uppercase tracking-wide rounded-sm hover:bg-amber-600 transition-colors">Subscribe</a>
          </div>
          <div className="border-t border-white/10 bg-white">
            <nav aria-label="Topic categories" className="max-w-7xl mx-auto px-4 flex overflow-x-auto gap-0">
              {CATS.map(c => <a key={c.key} href={c.href} className="cat-link whitespace-nowrap" aria-current={current===c.key?'page':undefined} dangerouslySetInnerHTML={{ __html: c.label }} />)}
            </nav>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="bg-gw-nav text-white mt-16" aria-label="Site footer">
          <div className="max-w-7xl mx-auto px-4 py-10">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-8 pb-8 border-b border-white/10">
              <div>
                <span className="font-serif text-lg font-black text-white">Groundwork</span>
                <p className="text-white/40 text-xs mt-2 leading-relaxed">Independent investigative journalism on climate, science &amp; policy.</p>
              </div>
              {[
                { h:'Coverage', l:['Climate','Energy','Policy','Science'] },
                { h:'About', l:['Our Mission','Staff','Methodology'] },
                { h:'Support', l:['Subscribe','Donate','Newsletters'] },
              ].map(col => (
                <div key={col.h}>
                  <h3 className="text-xs font-bold uppercase tracking-widest text-white mb-3">{col.h}</h3>
                  <ul className="space-y-1.5">{col.l.map(l => <li key={l}><a href="#" className="text-white/40 text-sm hover:text-white transition-colors">{l}</a></li>)}</ul>
                </div>
              ))}
            </div>
            <p className="pt-5 text-white/25 text-xs">© {new Date().getFullYear()} Groundwork. A 501(c)(3) nonprofit.</p>
          </div>
        </footer>
      );
    }

    /* ── Data ──────────────────────────────────────────────────── */
    const FEATURED_ESSAY = {
      title: "Carbon Markets Have Become a License to Pollute — And Scientists Are Done Pretending Otherwise",
      deck: "A decade of satellite monitoring, independent audits, and leaked internal studies all point to the same conclusion: the voluntary carbon market is not delivering the reductions it promises.",
      author: "Dr. Fatima Al-Rashid",
      role: "Senior Research Fellow, Carbon Accountability Lab, Columbia University",
      date: "March 21, 2026",
      dateIso: "2026-03-21",
      readTime: 14,
      avatarGrad: "from-rose-500 to-pink-700",
      excerpt: [
        "I have spent the last seven years studying voluntary carbon offset projects. I have visited forests in Bolivia, Indonesia, and Zimbabwe that are supposedly sequestering millions of tons of carbon dioxide on behalf of airlines, oil companies, and technology firms. What I found was systematically at odds with what those companies are claiming in their annual sustainability reports.",
        "The fundamental problem is not fraud — though fraud certainly exists. The problem is that the core methodology of the voluntary carbon market is designed to measure commitments, not outcomes. It counts trees planted, not trees surviving. It counts emissions avoided based on counterfactual baselines that are, in many cases, impossible to verify.",
        "A forest protection project in Brazil might claim to have prevented 500,000 acres from being cut down over 30 years. But 'avoided deforestation' as a credit is only valid if you can prove those 500,000 acres would actually have been cut down. That's not a scientific question. It's a political and economic forecast — and the market's track record of getting those forecasts right is dismal.",
      ],
    };

    const ESSAYS = [
      {
        id:1, title:"What the Colorado River Compact Still Gets Wrong About How Water Works",
        author:"Dr. Marcus Chukwuemeka", role:"Professor of Water Law, University of Colorado", date:"March 17, 2026", dateIso:"2026-03-17",
        avatarGrad:"from-blue-500 to-indigo-700", readTime:11,
        blurb:"A century-old legal document cannot govern a river whose flow has decreased by 20% due to climate change. It's time for a fundamental rethink.",
        tags:['Water','Policy','Law'],
      },
      {
        id:2, title:"I Spent 30 Years Warning Congress About Wildfire. Here's What I Got Wrong.",
        author:"Elena Ruiz-Torres", role:"Former Director, National Interagency Fire Center (2001–2019)", date:"March 14, 2026", dateIso:"2026-03-14",
        avatarGrad:"from-orange-500 to-red-700", readTime:9,
        blurb:"We focused on suppression. We should have focused on fuel. A retrospective on three decades of wildfire policy, and what a retired official wishes she'd fought harder for.",
        tags:['Wildfire','Policy','Forest Management'],
      },
      {
        id:3, title:"The Solar Industry Has a Labor Problem No One Wants to Talk About",
        author:"Yusuf Okonkwo", role:"Labor Rights Correspondent &amp; Former Energy Policy Analyst, AFL-CIO", date:"March 11, 2026", dateIso:"2026-03-11",
        avatarGrad:"from-yellow-500 to-amber-700", readTime:8,
        blurb:"The green energy transition is generating millions of jobs. Many of them are dangerous, low-wage, and nonunion. That's a climate justice problem.",
        tags:['Energy','Labor','Justice'],
      },
      {
        id:4, title:"A Haida Elder Speaks: What Salmon Tell Us About the Health of the North Pacific",
        author:"Chief Robert Swifthawk", role:"Hereditary Chief, Haida Nation; Member, Pacific Salmon Commission", date:"March 6, 2026", dateIso:"2026-03-06",
        avatarGrad:"from-teal-500 to-emerald-700", readTime:7,
        blurb:"Indigenous ecological knowledge is not folklore. It is a centuries-long scientific record — one that western researchers are finally beginning to take seriously.",
        tags:['Indigenous Knowledge','Ocean','Fisheries'],
      },
      {
        id:5, title:"The Problem With 'Net Zero 2050' Is the Net",
        author:"Dr. Priya Sundarajan", role:"Climate Economist, Resources for the Future", date:"March 3, 2026", dateIso:"2026-03-03",
        avatarGrad:"from-violet-500 to-purple-700", readTime:12,
        blurb:"Corporate net-zero commitments are overwhelmingly dependent on future carbon removal technologies that don't yet exist at scale. This is not a plan. It's a deferral.",
        tags:['Carbon Markets','Policy','Economics'],
      },
    ];

    /* ── Letter submission modal ───────────────────────────────── */
    function LetterModal({ essay, onClose, triggerRef }) {
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [org, setOrg] = useState('');
      const [letter, setLetter] = useState('');
      const [errors, setErrors] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [busy, setBusy] = useState(false);
      const closeBtnRef = useRef(null);
      const modalRef = useRef(null);
      const successRef = useRef(null);

      useEffect(() => {
        closeBtnRef.current?.focus();
        function trap(e) {
          const focusable = modalRef.current?.querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])');
          if (!focusable || !focusable.length) return;
          const first = focusable[0]; const last = focusable[focusable.length-1];
          if (e.key === 'Tab') {
            if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
            else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
          }
          if (e.key === 'Escape') { onClose(); triggerRef.current?.focus(); }
        }
        document.addEventListener('keydown', trap);
        return () => document.removeEventListener('keydown', trap);
      }, []);

      useEffect(() => { if (submitted) successRef.current?.focus(); }, [submitted]);

      function handleSubmit(e) {
        e.preventDefault();
        const errs = {};
        if (!name.trim()) errs.name = 'Your name is required.';
        if (!email.trim()) errs.email = 'Your email address is required.';
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errs.email = 'Enter a valid email address (e.g., name@example.com).';
        if (!letter.trim() || letter.trim().split(/\s+/).length < 30) errs.letter = 'Please write at least 30 words in your response.';
        setErrors(errs);
        if (Object.keys(errs).length === 0) {
          setBusy(true);
          setTimeout(() => { setBusy(false); setSubmitted(true); }, 1000);
        } else {
          const firstErrId = Object.keys(errs)[0];
          document.getElementById(`ltr-${firstErrId}`)?.focus();
        }
      }

      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 overflow-y-auto" role="dialog" aria-modal="true" aria-labelledby="letter-modal-title" ref={modalRef}>
          <div className="bg-white rounded-sm w-full max-w-lg shadow-2xl my-4">
            <div className="flex items-center justify-between px-6 py-4 border-b border-gw-border">
              <h2 id="letter-modal-title" className="font-serif text-lg font-bold">Respond to This Piece</h2>
              <button ref={closeBtnRef} onClick={() => { onClose(); triggerRef.current?.focus(); }} aria-label="Close response form" className="p-1.5 rounded hover:bg-gw-surf text-gw-muted transition-colors">
                <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>
            <div className="px-6 py-5">
              {submitted ? (
                <div role="status" aria-live="polite" ref={successRef} tabIndex={-1} className="focus:outline-none text-center py-6">
                  <div className="w-12 h-12 bg-gw-accent rounded-full flex items-center justify-center mx-auto mb-3" aria-hidden="true">
                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                  </div>
                  <h3 className="font-serif text-xl font-bold mb-2">Thank you for your response.</h3>
                  <p className="text-gw-muted text-sm font-sans">We review all reader letters. If selected for publication, an editor will be in touch within 5–7 business days.</p>
                  <button onClick={() => { onClose(); triggerRef.current?.focus(); }} className="mt-5 px-6 py-2.5 bg-gw-accent text-white text-sm font-semibold rounded-sm hover:bg-gw-accent-h transition-colors font-sans">
                    Close
                  </button>
                </div>
              ) : (
                <form onSubmit={handleSubmit} noValidate aria-label="Reader response submission form">
                  <p className="text-sm text-gw-muted font-sans mb-5 leading-relaxed">
                    Responding to: <span className="font-semibold text-gw-text">"{essay.title}"</span> by {essay.author}
                  </p>
                  <div className="space-y-4">
                    {[
                      { id:'name',  label:'Full name',        type:'text',  value:name,  set:setName,  required:true,  hint:'Your name as you wish it to appear if published.' },
                      { id:'email', label:'Email address',    type:'email', value:email, set:setEmail, required:true,  hint:'We use this to contact you. Not published.' },
                      { id:'org',   label:'Organization / affiliation', type:'text', value:org, set:setOrg, required:false, hint:'Optional. e.g., "Farmer, Fresno County" or "PhD candidate, MIT"' },
                    ].map(f => (
                      <div key={f.id}>
                        <label htmlFor={`ltr-${f.id}`} className="block text-sm font-semibold text-gw-text mb-1 font-sans">
                          {f.label}{f.required && <span aria-hidden="true" className="text-gw-break ml-0.5">*</span>}
                        </label>
                        {f.hint && <p id={`ltr-${f.id}-hint`} className="text-xs text-gw-muted mb-1 font-sans">{f.hint}</p>}
                        <input
                          id={`ltr-${f.id}`}
                          type={f.type}
                          value={f.value}
                          onChange={e => f.set(e.target.value)}
                          required={f.required}
                          aria-required={f.required}
                          aria-invalid={!!errors[f.id]}
                          aria-describedby={[`ltr-${f.id}-hint`, errors[f.id] && `ltr-${f.id}-err`].filter(Boolean).join(' ') || undefined}
                          className={`w-full px-3 py-2 border rounded-sm text-sm outline-none transition-colors font-sans ${errors[f.id] ? 'border-gw-break focus:border-gw-break focus:ring-1 focus:ring-gw-break' : 'border-gw-border focus:border-gw-accent focus:ring-1 focus:ring-gw-accent'}`}
                        />
                        {errors[f.id] && <p id={`ltr-${f.id}-err`} role="alert" className="text-xs text-gw-break mt-1 font-sans">{errors[f.id]}</p>}
                      </div>
                    ))}
                    <div>
                      <label htmlFor="ltr-letter" className="block text-sm font-semibold text-gw-text mb-1 font-sans">
                        Your response <span aria-hidden="true" className="text-gw-break">*</span>
                      </label>
                      <p id="ltr-letter-hint" className="text-xs text-gw-muted mb-1 font-sans">Minimum 30 words. We may edit for length and clarity.</p>
                      <textarea
                        id="ltr-letter"
                        value={letter}
                        onChange={e => setLetter(e.target.value)}
                        required
                        aria-required="true"
                        aria-invalid={!!errors.letter}
                        aria-describedby={['ltr-letter-hint', errors.letter && 'ltr-letter-err'].filter(Boolean).join(' ')}
                        rows={5}
                        className={`w-full px-3 py-2 border rounded-sm text-sm outline-none transition-colors font-sans resize-y ${errors.letter ? 'border-gw-break focus:border-gw-break' : 'border-gw-border focus:border-gw-accent'}`}
                        placeholder="Write your response here…"
                      />
                      {errors.letter && <p id="ltr-letter-err" role="alert" className="text-xs text-gw-break mt-1 font-sans">{errors.letter}</p>}
                    </div>
                  </div>
                  <div className="flex justify-end gap-3 mt-5">
                    <button type="button" onClick={() => { onClose(); triggerRef.current?.focus(); }} className="px-4 py-2 text-sm text-gw-muted hover:text-gw-text transition-colors font-sans">Cancel</button>
                    <button type="submit" disabled={busy} aria-busy={busy} className="px-6 py-2.5 bg-gw-accent text-white text-sm font-semibold rounded-sm hover:bg-gw-accent-h transition-colors disabled:opacity-60 font-sans">
                      {busy ? 'Submitting…' : 'Submit Response'}
                    </button>
                  </div>
                </form>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ── Essay card ────────────────────────────────────────────── */
    function EssayCard({ essay }) {
      const [modalOpen, setModalOpen] = useState(false);
      const respondRef = useRef(null);
      return (
        <>
          {modalOpen && <LetterModal essay={essay} onClose={() => setModalOpen(false)} triggerRef={respondRef} />}
          <article className="py-6 border-b border-gw-border last:border-0" aria-label={`Essay: ${essay.title} by ${essay.author}`}>
            <div className="flex gap-4">
              {/* Author avatar */}
              <div className="flex-shrink-0">
                <div className={`w-12 h-12 rounded-full bg-gradient-to-br ${essay.avatarGrad} flex items-center justify-center text-white font-bold text-sm font-sans`} role="img" aria-label={`${essay.author}'s profile photo`}>
                  {essay.author.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(w=>w[0]).join('')}
                </div>
              </div>
              <div className="flex-1 min-w-0">
                <h3 className="font-serif text-lg font-bold leading-snug mb-1">
                  <a href="article.html" className="hover:text-gw-accent transition-colors">{essay.title}</a>
                </h3>
                <p className="text-sm text-gw-muted font-sans mb-2 leading-relaxed">{essay.blurb}</p>
                {/* Contributor bio */}
                <div className="bg-gw-surf rounded-sm px-3 py-2 mb-2">
                  <p className="text-xs font-semibold text-gw-text font-sans">{essay.author}</p>
                  <p className="text-xs text-gw-muted font-sans" dangerouslySetInnerHTML={{ __html: essay.role }} />
                </div>
                <div className="flex flex-wrap items-center gap-3">
                  <time className="text-xs text-gw-muted font-sans" dateTime={essay.dateIso}>{essay.date}</time>
                  <span className="text-xs text-gw-muted font-sans" aria-hidden="true">·</span>
                  <span className="text-xs text-gw-muted font-sans">{essay.readTime} min read</span>
                  <div className="flex flex-wrap gap-1.5 ml-0 sm:ml-auto">
                    {essay.tags.map(tag => (
                      <span key={tag} className="text-[11px] px-2 py-0.5 bg-white border border-gw-border text-gw-muted font-bold uppercase tracking-wide font-sans rounded-sm" dangerouslySetInnerHTML={{ __html: tag }} />
                    ))}
                  </div>
                </div>
                <div className="mt-3 flex items-center gap-3">
                  <a href="article.html" className="text-sm font-semibold text-gw-accent hover:underline font-sans">Read essay →</a>
                  <button
                    ref={respondRef}
                    onClick={() => setModalOpen(true)}
                    className="text-sm font-semibold text-gw-muted hover:text-gw-accent border border-gw-border px-3 py-1 rounded-sm hover:border-gw-accent transition-colors font-sans"
                    aria-label={`Respond to "${essay.title}" by ${essay.author}`}
                  >
                    Respond to this piece
                  </button>
                </div>
              </div>
            </div>
          </article>
        </>
      );
    }
