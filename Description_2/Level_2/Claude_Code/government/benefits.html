<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Benefits — Vermont Resident Assistance | Vermont.gov</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gov-navy':   '#1A3A6B',
            'gov-navy-h': '#142E56',
            'gov-blue':   '#2558A3',
            'gov-blue-h': '#1E4A8A',
            'gov-green':  '#2D6A3F',
            'gov-green-h':'#245531',
            'gov-gold':   '#8B6914',
            'gov-light':  '#EEF3FB',
            'gov-gray':   '#F5F6F8',
            'gov-border': '#D1D9E6',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #F5F6F8; color: #1A1A2E; }
    :focus-visible { outline: 3px solid #2558A3 !important; outline-offset: 2px !important; }
    .skip-link { position: absolute; top: -52px; left: 8px; background: #1A3A6B; color: #fff; padding: 10px 18px; z-index: 9999; border-radius: 4px; font-weight: 600; transition: top 0.15s; text-decoration: none; font-size: 14px; }
    .skip-link:focus { top: 8px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function Header() {
      const [menuOpen, setMenuOpen] = useState(false);
      const [lang, setLang] = useState('EN');
      const navLinks = [
        { label: 'Home',     href: 'index.html',    key: 'home' },
        { label: 'Services', href: 'services.html', key: 'services' },
        { label: 'About',    href: 'about.html',    key: 'about' },
        { label: 'Contact',  href: 'contact.html',  key: 'contact' },
      ];
      return (
        <header className="bg-gov-navy text-white shadow-lg">
          <div className="bg-gov-navy-h border-b border-white/10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-1.5 flex items-center justify-between">
              <p className="text-xs text-white/70">Official Vermont State Website</p>
              <div role="navigation" aria-label="Language selection">
                <label htmlFor="lang-select" className="sr-only">Select language</label>
                <select id="lang-select" value={lang} onChange={e=>setLang(e.target.value)} className="bg-transparent border border-white/20 text-white text-xs rounded px-2 py-0.5" aria-label="Select display language">
                  {[{code:'EN',label:'English'},{code:'ES',label:'Español'},{code:'FR',label:'Français'}].map(l=><option key={l.code} value={l.code} className="text-black">{l.label}</option>)}
                </select>
              </div>
            </div>
          </div>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-20 gap-6">
              <a href="index.html" className="flex items-center gap-3 flex-shrink-0" aria-label="Vermont.gov — Go to homepage">
                <div className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center border-2 border-white/20 flex-shrink-0" aria-hidden="true"><svg className="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
                <div><p className="font-extrabold text-lg leading-tight tracking-tight">Vermont.gov</p><p className="text-white/60 text-xs leading-tight">Official State Portal</p></div>
              </a>
              <nav aria-label="Main navigation" className="hidden md:block">
                <ul className="flex items-center gap-1" role="list">
                  {navLinks.map(l=><li key={l.key}><a href={l.href} className="px-4 py-2 rounded-lg text-sm font-medium text-white/80 hover:text-white hover:bg-white/10 transition-colors">{l.label}</a></li>)}
                </ul>
              </nav>
              <button className="md:hidden p-2 rounded-lg hover:bg-white/10" aria-expanded={menuOpen} aria-controls="mobile-nav" aria-label={menuOpen?'Close':'Open navigation menu'} onClick={()=>setMenuOpen(o=>!o)}>
                <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
              </button>
            </div>
          </div>
          {menuOpen && <nav id="mobile-nav" aria-label="Mobile navigation"><ul className="border-t border-white/10 px-4 py-3 space-y-1" role="list">{navLinks.map(l=><li key={l.key}><a href={l.href} className="block px-4 py-2.5 rounded-lg text-sm font-medium text-white/80 hover:text-white hover:bg-white/10">{l.label}</a></li>)}</ul></nav>}
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="bg-gov-navy-h text-white" role="contentinfo">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            <div className="flex flex-col sm:flex-row justify-between items-start gap-6">
              <div><p className="font-extrabold text-lg mb-1">Vermont.gov</p><p className="text-sm text-white/60">© 2025 State of Vermont. All rights reserved.</p></div>
              <nav aria-label="Footer navigation"><ul className="flex flex-wrap gap-4" role="list">{[{l:'Services',h:'services.html'},{l:'About',h:'about.html'},{l:'Contact',h:'contact.html'},{l:'Accessibility',h:'#'},{l:'Privacy',h:'#'}].map(({l,h})=><li key={l}><a href={h} className="text-sm text-white/60 hover:text-white transition-colors">{l}</a></li>)}</ul></nav>
            </div>
          </div>
        </footer>
      );
    }

    /* ── Benefits programs data ────────────────────────────────── */
    const PROGRAMS = [
      {
        id: 'snap',
        name: 'SNAP (Food Assistance)',
        agency: 'Dept. for Children & Families',
        desc: 'Monthly benefits to help low-income individuals and families buy groceries at approved stores.',
        maxMonthly: 'Up to $291/mo (individual)',
        processingTime: '30 days',
        eligCheck: (h, income, emp) => income !== 'over_80k',
        icon: '🛒',
        color: 'bg-green-50 border-green-200',
        badge: 'bg-green-100 text-green-700',
      },
      {
        id: 'medicaid',
        name: 'Medicaid / Dr. Dynasaur',
        agency: 'Dept. of Vermont Health Access',
        desc: 'Free or low-cost health coverage for eligible Vermont residents including doctor visits, prescriptions, and hospital care.',
        maxMonthly: 'Full health coverage',
        processingTime: '45 days',
        eligCheck: (h, income, emp) => income !== 'over_80k',
        icon: '🏥',
        color: 'bg-blue-50 border-blue-200',
        badge: 'bg-blue-100 text-blue-700',
      },
      {
        id: 'heat',
        name: 'Heating Assistance (LIHEAP)',
        agency: 'Dept. for Children & Families',
        desc: 'Financial assistance to help low-income households with home heating costs during winter months.',
        maxMonthly: 'Seasonal lump-sum benefit',
        processingTime: '2 weeks',
        eligCheck: (h, income, emp) => ['under_30k','30k_50k'].includes(income),
        icon: '🔥',
        color: 'bg-orange-50 border-orange-200',
        badge: 'bg-orange-100 text-orange-700',
      },
      {
        id: 'childcare',
        name: 'Childcare Financial Assistance',
        agency: 'Dept. for Children & Families',
        desc: 'Subsidy for eligible working families to help pay for childcare at licensed providers.',
        maxMonthly: 'Based on household income',
        processingTime: '30 days',
        eligCheck: (h, income, emp) => h >= 2 && income !== 'over_80k' && emp === 'employed',
        icon: '👶',
        color: 'bg-pink-50 border-pink-200',
        badge: 'bg-pink-100 text-pink-700',
      },
      {
        id: 'wic',
        name: 'WIC Program',
        agency: 'VT Department of Health',
        desc: 'Nutrition support for pregnant women, new mothers, and children under 5 — including food, formula, and health referrals.',
        maxMonthly: 'Food benefits + nutrition education',
        processingTime: '2 weeks',
        eligCheck: (h, income, emp) => ['under_30k','30k_50k'].includes(income),
        icon: '🍎',
        color: 'bg-yellow-50 border-yellow-200',
        badge: 'bg-yellow-100 text-yellow-700',
      },
      {
        id: 'vpharm',
        name: 'VPharm Prescription Assistance',
        agency: 'Dept. of Vermont Health Access',
        desc: 'Helps eligible Vermont seniors and people with disabilities afford prescription medications.',
        maxMonthly: 'Up to 80% drug cost coverage',
        processingTime: '3 weeks',
        eligCheck: (h, income, emp) => ['under_30k','30k_50k'].includes(income),
        icon: '💊',
        color: 'bg-purple-50 border-purple-200',
        badge: 'bg-purple-100 text-purple-700',
      },
    ];

    function BenefitsPage() {
      const [step, setStep] = useState('screener'); // screener | results
      const [form, setForm] = useState({ household: '', income: '', employment: '', citizenship: '', age: '' });
      const [errors, setErrors] = useState({});
      const [results, setResults] = useState([]);
      const [liveMsg, setLiveMsg] = useState('');
      const [startApply, setStartApply] = useState(null);
      const resultsRef = useRef(null);
      const screenerHeadRef = useRef(null);

      function validate() {
        const errs = {};
        if (!form.household) errs.household = 'Please select your household size.';
        if (!form.income) errs.income = 'Please select your annual household income range.';
        if (!form.employment) errs.employment = 'Please select your employment status.';
        if (!form.citizenship) errs.citizenship = 'Please confirm your citizenship/residency status.';
        setErrors(errs);
        if (Object.keys(errs).length) {
          const firstId = Object.keys(errs)[0];
          document.getElementById(`field-${firstId}`)?.focus();
          return false;
        }
        return true;
      }

      function runScreener(e) {
        e.preventDefault();
        if (!validate()) return;
        const hSize = parseInt(form.household, 10) || 1;
        const qualifying = PROGRAMS.filter(p => p.eligCheck(hSize, form.income, form.employment));
        setResults(qualifying);
        setStep('results');
        setLiveMsg(`Eligibility check complete. You may qualify for ${qualifying.length} programs.`);
        setTimeout(()=>setLiveMsg(''),3000);
        setTimeout(()=>resultsRef.current?.focus(),50);
      }

      function resetScreener() {
        setStep('screener');
        setForm({ household:'', income:'', employment:'', citizenship:'', age:'' });
        setErrors({});
        setTimeout(()=>screenerHeadRef.current?.focus(),50);
      }

      const FIELD_OPTS = {
        household: ['1 person','2 people','3 people','4 people','5+ people'],
        income: [
          { v:'under_30k', l:'Under $30,000/year' },
          { v:'30k_50k',   l:'$30,000 – $50,000/year' },
          { v:'50k_80k',   l:'$50,001 – $80,000/year' },
          { v:'over_80k',  l:'Over $80,000/year' },
        ],
        employment: [
          { v:'employed',    l:'Employed (full or part-time)' },
          { v:'unemployed',  l:'Unemployed / Job seeking' },
          { v:'self',        l:'Self-employed' },
          { v:'retired',     l:'Retired' },
          { v:'unable',      l:'Unable to work (disability, caregiving, etc.)' },
        ],
      };

      return (
        <>
          <Header />
          <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{liveMsg}</div>

          <div className="bg-gov-green text-white py-8">
            <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
              <nav aria-label="Breadcrumb" className="mb-3">
                <ol className="flex items-center gap-2 text-sm text-white/60" role="list">
                  <li><a href="index.html" className="hover:text-white transition-colors">Home</a></li>
                  <li aria-hidden="true">/</li>
                  <li><a href="services.html" className="hover:text-white transition-colors">Services</a></li>
                  <li aria-hidden="true">/</li>
                  <li aria-current="page" className="text-white font-medium">Apply for Benefits</li>
                </ol>
              </nav>
              <h1 className="text-2xl sm:text-3xl font-extrabold">Benefits Eligibility Screener</h1>
              <p className="text-white/75 text-sm mt-1">Vermont Dept. for Children &amp; Families · Takes approximately 2 minutes</p>
            </div>
          </div>

          <main id="main-content" tabIndex={-1}>
            <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

              {/* ── Screener form ──────────────────────────── */}
              {step === 'screener' && (
                <section aria-labelledby="screener-heading">
                  <h2 id="screener-heading" ref={screenerHeadRef} tabIndex={-1} className="text-xl font-bold text-gov-navy mb-2 focus:outline-none">
                    Tell Us About Your Household
                  </h2>
                  <p className="text-gray-600 text-sm mb-6">
                    Your answers are private and not saved. This screener is for information only and does not constitute an application.
                  </p>

                  <form onSubmit={runScreener} noValidate aria-label="Benefits eligibility screener form">
                    <div className="bg-white border border-gov-border rounded-xl p-6 sm:p-8 space-y-8">

                      {/* Household size */}
                      <fieldset>
                        <legend className="font-semibold text-sm text-gov-navy mb-3">
                          Household size (people who live and eat with you)
                          <span className="text-red-500 ml-1" aria-hidden="true">*</span>
                        </legend>
                        <div className="flex flex-wrap gap-2" role="radiogroup" aria-required="true" aria-describedby={errors.household?'err-household':undefined}>
                          {FIELD_OPTS.household.map(o => (
                            <label key={o} className="cursor-pointer">
                              <input type="radio" name="household" id={o==='1 person'?'field-household':undefined} value={o} checked={form.household===o} onChange={()=>setForm(p=>({...p,household:o}))} className="sr-only" aria-label={`Household size: ${o}`} />
                              <span className={`block px-4 py-2.5 rounded-lg border-2 text-sm font-medium transition-all ${form.household===o?'bg-gov-blue text-white border-gov-blue':'bg-white border-gov-border hover:border-gov-blue text-gov-navy'}`}>{o}</span>
                            </label>
                          ))}
                        </div>
                        {errors.household && <p id="err-household" role="alert" className="mt-2 text-red-600 text-sm flex items-center gap-1.5"><svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>{errors.household}</p>}
                      </fieldset>

                      {/* Income */}
                      <fieldset>
                        <legend className="font-semibold text-sm text-gov-navy mb-3">
                          Annual household income (before taxes)
                          <span className="text-red-500 ml-1" aria-hidden="true">*</span>
                        </legend>
                        <div className="space-y-2" role="radiogroup" aria-required="true" aria-describedby={errors.income?'err-income':undefined}>
                          {FIELD_OPTS.income.map(o => (
                            <label key={o.v} className="flex items-center gap-3 cursor-pointer group">
                              <input type="radio" id={o.v==='under_30k'?'field-income':undefined} name="income" value={o.v} checked={form.income===o.v} onChange={()=>setForm(p=>({...p,income:o.v}))} className="w-4 h-4 text-gov-blue" aria-label={o.l} />
                              <span className={`text-sm ${form.income===o.v?'font-semibold text-gov-navy':'text-gray-700'} group-hover:text-gov-navy transition-colors`}>{o.l}</span>
                            </label>
                          ))}
                        </div>
                        {errors.income && <p id="err-income" role="alert" className="mt-2 text-red-600 text-sm flex items-center gap-1.5"><svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>{errors.income}</p>}
                      </fieldset>

                      {/* Employment */}
                      <fieldset>
                        <legend className="font-semibold text-sm text-gov-navy mb-3">
                          Employment status
                          <span className="text-red-500 ml-1" aria-hidden="true">*</span>
                        </legend>
                        <div className="space-y-2" role="radiogroup" aria-required="true" aria-describedby={errors.employment?'err-employment':undefined}>
                          {FIELD_OPTS.employment.map(o => (
                            <label key={o.v} className="flex items-center gap-3 cursor-pointer group">
                              <input type="radio" id={o.v==='employed'?'field-employment':undefined} name="employment" value={o.v} checked={form.employment===o.v} onChange={()=>setForm(p=>({...p,employment:o.v}))} className="w-4 h-4 text-gov-blue" aria-label={o.l} />
                              <span className={`text-sm ${form.employment===o.v?'font-semibold text-gov-navy':'text-gray-700'} group-hover:text-gov-navy transition-colors`}>{o.l}</span>
                            </label>
                          ))}
                        </div>
                        {errors.employment && <p id="err-employment" role="alert" className="mt-2 text-red-600 text-sm flex items-center gap-1.5"><svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>{errors.employment}</p>}
                      </fieldset>

                      {/* Citizenship */}
                      <fieldset>
                        <legend className="font-semibold text-sm text-gov-navy mb-3">
                          Citizenship / Residency status
                          <span className="text-red-500 ml-1" aria-hidden="true">*</span>
                        </legend>
                        <div className="space-y-2" role="radiogroup" aria-required="true" aria-describedby={errors.citizenship?'err-citizenship':undefined}>
                          {[
                            { v:'citizen',  l:'U.S. Citizen or U.S. National' },
                            { v:'permanent', l:'Lawful Permanent Resident (Green Card)' },
                            { v:'refugee',  l:'Refugee, Asylee, or Special Immigrant' },
                            { v:'other',    l:'Other immigration status' },
                          ].map(o=>(
                            <label key={o.v} className="flex items-center gap-3 cursor-pointer group">
                              <input type="radio" id={o.v==='citizen'?'field-citizenship':undefined} name="citizenship" value={o.v} checked={form.citizenship===o.v} onChange={()=>setForm(p=>({...p,citizenship:o.v}))} className="w-4 h-4 text-gov-blue" aria-label={o.l} />
                              <span className={`text-sm ${form.citizenship===o.v?'font-semibold text-gov-navy':'text-gray-700'} group-hover:text-gov-navy transition-colors`}>{o.l}</span>
                            </label>
                          ))}
                        </div>
                        {errors.citizenship && <p id="err-citizenship" role="alert" className="mt-2 text-red-600 text-sm flex items-center gap-1.5"><svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>{errors.citizenship}</p>}
                      </fieldset>

                      <p className="text-xs text-gray-400">
                        <span className="text-red-500" aria-hidden="true">*</span> Required fields. All information is confidential and used only to determine potential eligibility. This is not an application.
                      </p>
                    </div>

                    <button
                      type="submit"
                      className="mt-6 w-full bg-gov-green text-white font-bold py-4 rounded-xl hover:bg-gov-green-h transition-colors flex items-center justify-center gap-2"
                      aria-label="Submit eligibility screener to see qualifying programs"
                    >
                      <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                      Check My Eligibility
                    </button>
                  </form>
                </section>
              )}

              {/* ── Results ─────────────────────────────────── */}
              {step === 'results' && (
                <section aria-labelledby="results-heading" ref={resultsRef} tabIndex={-1} className="focus:outline-none">
                  <div className="flex items-start justify-between gap-4 mb-6">
                    <div>
                      <h2 id="results-heading" className="text-xl font-bold text-gov-navy">Your Eligibility Results</h2>
                      <p className="text-gray-600 text-sm mt-1">
                        Based on your answers, you may qualify for{' '}
                        <strong className="text-gov-green">{results.length} program{results.length !== 1 ? 's' : ''}</strong>.
                      </p>
                    </div>
                    <button onClick={resetScreener} className="text-sm text-gov-blue hover:underline flex-shrink-0" aria-label="Retake eligibility screener">Retake screener</button>
                  </div>

                  {results.length === 0 ? (
                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-6 text-center" role="status">
                      <p className="text-lg font-semibold text-amber-800 mb-2">No automatic matches found</p>
                      <p className="text-sm text-amber-700 mb-4">Your income or household situation may not qualify you for screened programs, but you may still be eligible for others. Please <a href="contact.html" className="underline hover:no-underline font-semibold">contact a benefits counselor</a> for a full review.</p>
                      <a href="contact.html" className="inline-flex items-center gap-2 bg-amber-600 text-white font-semibold px-6 py-3 rounded-xl hover:bg-amber-700 transition-colors text-sm" aria-label="Contact a benefits counselor for personalized assistance">Talk to a Counselor</a>
                    </div>
                  ) : (
                    <>
                      <div role="status" className="bg-green-50 border border-green-200 rounded-xl p-4 mb-6 text-sm text-green-700">
                        <strong>Good news!</strong> You may qualify for {results.length} program{results.length!==1?'s':''} listed below. Click "Start Application" to begin the official process for any program.
                      </div>

                      <div className="space-y-4" role="list" aria-label="Programs you may qualify for">
                        {results.map(prog => (
                          <article key={prog.id} className={`border rounded-2xl p-6 ${prog.color}`} role="listitem" aria-label={`${prog.name} — you may qualify`}>
                            <div className="flex items-start justify-between gap-4">
                              <div className="flex items-start gap-3 min-w-0">
                                <span aria-hidden="true" className="text-3xl flex-shrink-0">{prog.icon}</span>
                                <div className="min-w-0">
                                  <div className="flex items-center gap-2 flex-wrap">
                                    <h3 className="font-bold text-base text-gov-navy">{prog.name}</h3>
                                    <span className={`text-xs font-semibold px-2.5 py-0.5 rounded-full ${prog.badge}`} aria-label="Likely eligible">Likely Eligible</span>
                                  </div>
                                  <p className="text-xs text-gray-600 mt-0.5">{prog.agency}</p>
                                  <p className="text-sm text-gray-700 mt-2 leading-relaxed">{prog.desc}</p>

                                  <dl className="mt-3 flex flex-wrap gap-x-6 gap-y-1 text-xs">
                                    <div>
                                      <dt className="text-gray-500 inline">Benefit: </dt>
                                      <dd className="font-semibold text-gov-navy inline">{prog.maxMonthly}</dd>
                                    </div>
                                    <div>
                                      <dt className="text-gray-500 inline">Processing time: </dt>
                                      <dd className="font-semibold text-gov-navy inline">{prog.processingTime}</dd>
                                    </div>
                                  </dl>
                                </div>
                              </div>
                            </div>

                            <div className="mt-5 flex flex-wrap items-center gap-3">
                              <button
                                onClick={() => setStartApply(prog.id)}
                                className="bg-gov-navy text-white font-semibold text-sm px-5 py-2.5 rounded-lg hover:bg-gov-navy-h transition-colors flex items-center gap-2"
                                aria-label={`Start application for ${prog.name}`}
                                aria-expanded={startApply===prog.id}
                              >
                                Start Application →
                              </button>
                              <a href="contact.html" className="text-sm text-gov-blue font-medium hover:underline" aria-label={`Ask a counselor about ${prog.name}`}>Ask a counselor</a>
                            </div>

                            {/* Inline application start */}
                            {startApply === prog.id && (
                              <div
                                className="mt-5 bg-white rounded-xl p-5 border border-gov-border"
                                role="region"
                                aria-label={`Begin ${prog.name} application`}
                                aria-live="polite"
                              >
                                <h4 className="font-bold text-sm text-gov-navy mb-3">Start Your {prog.name} Application</h4>
                                <p className="text-sm text-gray-600 mb-4">To complete your application you'll need: proof of identity, proof of Vermont residency, and income documentation (pay stubs, benefit letters).</p>
                                <form aria-label={`${prog.name} application start form`} onSubmit={e=>{e.preventDefault();alert(`Application started for ${prog.name}!`);}}>
                                  <div className="grid sm:grid-cols-2 gap-3 mb-4">
                                    <div>
                                      <label htmlFor={`app-fname-${prog.id}`} className="block text-xs font-medium text-gov-navy mb-1">First Name <span className="text-red-500" aria-hidden="true">*</span></label>
                                      <input id={`app-fname-${prog.id}`} type="text" required aria-required="true" placeholder="Jane" className="w-full border border-gov-border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-gov-blue" />
                                    </div>
                                    <div>
                                      <label htmlFor={`app-lname-${prog.id}`} className="block text-xs font-medium text-gov-navy mb-1">Last Name <span className="text-red-500" aria-hidden="true">*</span></label>
                                      <input id={`app-lname-${prog.id}`} type="text" required aria-required="true" placeholder="Doe" className="w-full border border-gov-border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-gov-blue" />
                                    </div>
                                    <div>
                                      <label htmlFor={`app-email-${prog.id}`} className="block text-xs font-medium text-gov-navy mb-1">Email Address <span className="text-red-500" aria-hidden="true">*</span></label>
                                      <input id={`app-email-${prog.id}`} type="email" required aria-required="true" placeholder="jane@email.com" className="w-full border border-gov-border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-gov-blue" />
                                    </div>
                                    <div>
                                      <label htmlFor={`app-phone-${prog.id}`} className="block text-xs font-medium text-gov-navy mb-1">Phone Number</label>
                                      <input id={`app-phone-${prog.id}`} type="tel" placeholder="(802) 555-0100" className="w-full border border-gov-border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-gov-blue" />
                                    </div>
                                  </div>
                                  <div className="flex gap-3">
                                    <button type="submit" className="bg-gov-green text-white font-bold text-sm px-6 py-2.5 rounded-lg hover:bg-gov-green-h transition-colors" aria-label={`Submit ${prog.name} application`}>
                                      Submit Application
                                    </button>
                                    <button type="button" onClick={()=>setStartApply(null)} className="border border-gov-border text-gray-600 text-sm px-5 py-2.5 rounded-lg hover:border-gray-400 transition-colors" aria-label={`Cancel ${prog.name} application`}>Cancel</button>
                                  </div>
                                </form>
                              </div>
                            )}
                          </article>
                        ))}
                      </div>

                      {/* Not listed */}
                      <div className="mt-8 bg-gov-light border border-gov-border rounded-xl p-5 text-sm">
                        <p className="font-semibold text-gov-navy mb-1">Looking for something else?</p>
                        <p className="text-gray-600">Additional programs may be available. <a href="contact.html" className="text-gov-blue underline hover:no-underline">Speak with a benefits counselor</a> for a comprehensive review of your options including housing assistance, childcare, employment training, and more.</p>
                      </div>
                    </>
                  )}
                </section>
              )}
            </div>
          </main>

          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BenefitsPage />);
  </script>
</body>
</html>
