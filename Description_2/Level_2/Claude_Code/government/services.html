<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services & Programs — Vermont.gov Resident Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gov-navy':   '#1A3A6B',
            'gov-navy-h': '#142E56',
            'gov-blue':   '#2558A3',
            'gov-blue-h': '#1E4A8A',
            'gov-green':  '#2D6A3F',
            'gov-green-h':'#245531',
            'gov-gold':   '#8B6914',
            'gov-light':  '#EEF3FB',
            'gov-gray':   '#F5F6F8',
            'gov-border': '#D1D9E6',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #F5F6F8; color: #1A1A2E; }
    :focus-visible { outline: 3px solid #2558A3 !important; outline-offset: 2px !important; }
    .skip-link { position: absolute; top: -52px; left: 8px; background: #1A3A6B; color: #fff; padding: 10px 18px; z-index: 9999; border-radius: 4px; font-weight: 600; transition: top 0.15s; text-decoration: none; font-size: 14px; }
    .skip-link:focus { top: 8px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef } = React;

    function Header({ current = '' }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const [lang, setLang] = useState('EN');
      const navLinks = [
        { label: 'Home',     href: 'index.html',    key: 'home'     },
        { label: 'Services', href: 'services.html', key: 'services' },
        { label: 'About',    href: 'about.html',    key: 'about'    },
        { label: 'Contact',  href: 'contact.html',  key: 'contact'  },
      ];
      return (
        <header className="bg-gov-navy text-white shadow-lg">
          <div className="bg-gov-navy-h border-b border-white/10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-1.5 flex items-center justify-between gap-4">
              <p className="text-xs text-white/70 flex items-center gap-1"><svg aria-hidden="true" className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>Official Vermont State Website</p>
              <div role="navigation" aria-label="Language selection">
                <label htmlFor="lang-select" className="sr-only">Select language</label>
                <select id="lang-select" value={lang} onChange={e => setLang(e.target.value)} className="bg-transparent border border-white/20 text-white text-xs rounded px-2 py-0.5" aria-label="Select display language">
                  {[{code:'EN',label:'English'},{code:'ES',label:'Español'},{code:'FR',label:'Français'}].map(l=><option key={l.code} value={l.code} className="text-black">{l.label}</option>)}
                </select>
              </div>
            </div>
          </div>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-20 gap-6">
              <a href="index.html" className="flex items-center gap-3 flex-shrink-0" aria-label="Vermont.gov — Go to homepage">
                <div className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center border-2 border-white/20 flex-shrink-0" aria-hidden="true"><svg className="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
                <div><p className="font-extrabold text-lg leading-tight tracking-tight">Vermont.gov</p><p className="text-white/60 text-xs leading-tight">Official State Portal</p></div>
              </a>
              <nav aria-label="Main navigation" className="hidden md:block">
                <ul className="flex items-center gap-1" role="list">
                  {navLinks.map(l => <li key={l.key}><a href={l.href} className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${current===l.key?'bg-white/15 text-white':'text-white/80 hover:text-white hover:bg-white/10'}`} aria-current={current===l.key?'page':undefined}>{l.label}</a></li>)}
                </ul>
              </nav>
              <button className="md:hidden p-2 rounded-lg hover:bg-white/10" aria-expanded={menuOpen} aria-controls="mobile-nav" aria-label={menuOpen?'Close navigation menu':'Open navigation menu'} onClick={()=>setMenuOpen(o=>!o)}>
                <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
              </button>
            </div>
          </div>
          {menuOpen && <nav id="mobile-nav" aria-label="Mobile navigation"><ul className="border-t border-white/10 px-4 py-3 space-y-1" role="list">{navLinks.map(l=><li key={l.key}><a href={l.href} className="block px-4 py-2.5 rounded-lg text-sm font-medium text-white/80 hover:text-white hover:bg-white/10">{l.label}</a></li>)}</ul></nav>}
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="bg-gov-navy-h text-white mt-0" role="contentinfo">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-8">
              <div className="lg:col-span-2"><p className="font-extrabold text-lg mb-2">Vermont.gov</p><p className="text-sm text-white/60 leading-relaxed mb-4">The official website of the State of Vermont.</p><p className="text-xs text-white/40">© 2025 State of Vermont. All rights reserved.</p></div>
              <nav aria-label="Services navigation"><h2 className="font-semibold text-sm uppercase tracking-wider text-white/50 mb-3">Services</h2><ul className="space-y-2" role="list">{['Driver\'s License','Benefits & Assistance','Voter Registration','Tax Filing','Business Registration'].map(l=><li key={l}><a href="services.html" className="text-sm text-white/70 hover:text-white transition-colors">{l}</a></li>)}</ul></nav>
              <nav aria-label="Government navigation"><h2 className="font-semibold text-sm uppercase tracking-wider text-white/50 mb-3">Government</h2><ul className="space-y-2" role="list">{['Governor\'s Office','State Legislature','Agency Directory','Open Data','Careers'].map(l=><li key={l}><a href="about.html" className="text-sm text-white/70 hover:text-white transition-colors">{l}</a></li>)}</ul></nav>
              <nav aria-label="Help navigation"><h2 className="font-semibold text-sm uppercase tracking-wider text-white/50 mb-3">Help</h2><ul className="space-y-2" role="list">{[{l:'Contact Us',h:'contact.html'},{l:'Accessibility',h:'#'},{l:'Privacy Policy',h:'#'},{l:'Site Map',h:'#'}].map(({l,h})=><li key={l}><a href={h} className="text-sm text-white/70 hover:text-white transition-colors">{l}</a></li>)}</ul></nav>
            </div>
            <div className="mt-10 pt-6 border-t border-white/10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
              <p className="text-xs text-white/40">An official website of the State of Vermont.</p>
              <div className="flex gap-4">{['Accessibility Statement','Non-Discrimination','Web Privacy Policy'].map(l=><a key={l} href="#" className="text-xs text-white/40 hover:text-white/70 transition-colors">{l}</a>)}</div>
            </div>
          </div>
        </footer>
      );
    }

    const STAGES = [
      {
        key: 'new', label: 'New Residents', icon: '🏠', color: 'border-blue-300 bg-blue-50',
        services: [
          { name: 'Transfer Out-of-State Driver\'s License',  href: 'drivers-license.html', time: '~15 min',    dept: 'DMV',        status: 'Online' },
          { name: 'Establish Vermont Residency',              href: '#',                     time: '~20 min',    dept: 'SoS',        status: 'Online' },
          { name: 'Register to Vote',                         href: '#',                     time: '~5 min',     dept: 'SoS',        status: 'Online' },
          { name: 'Change Address with DMV',                  href: '#',                     time: '~5 min',     dept: 'DMV',        status: 'Online' },
          { name: 'Update Voter Registration',                href: '#',                     time: '~5 min',     dept: 'SoS',        status: 'Online' },
        ]
      },
      {
        key: 'families', label: 'Families', icon: '👨‍👩‍👧', color: 'border-green-300 bg-green-50',
        services: [
          { name: 'Request Birth Certificate',                href: '#',                     time: '~10 min',    dept: 'VDH',        status: 'Online' },
          { name: 'Apply for SNAP Benefits',                  href: 'benefits.html',         time: '~30 min',    dept: 'DCF',        status: 'Online' },
          { name: 'Apply for Medicaid / Dr. Dynasaur',        href: 'benefits.html',         time: '~30 min',    dept: 'DVHA',       status: 'Online' },
          { name: 'Childcare Subsidy Program',                href: 'benefits.html',         time: '~20 min',    dept: 'DCF',        status: 'Online' },
          { name: 'School Enrollment & Finder',               href: '#',                     time: '~10 min',    dept: 'AOE',        status: 'Online' },
          { name: 'WIC Program Application',                  href: 'benefits.html',         time: '~20 min',    dept: 'VDH',        status: 'In Person' },
        ]
      },
      {
        key: 'students', label: 'Students', icon: '🎓', color: 'border-purple-300 bg-purple-50',
        services: [
          { name: 'Vermont Student Assistance Corp (VSAC)',   href: '#',                     time: '~45 min',    dept: 'VSAC',       status: 'Online' },
          { name: 'High School Transcript Request',           href: '#',                     time: '~10 min',    dept: 'AOE',        status: 'Online' },
          { name: 'College Tuition Waiver Programs',          href: '#',                     time: '~15 min',    dept: 'VSAC',       status: 'Online' },
          { name: 'GED / Adult Education Enrollment',         href: '#',                     time: '~10 min',    dept: 'AOE',        status: 'Online' },
        ]
      },
      {
        key: 'seniors', label: 'Seniors', icon: '👴', color: 'border-amber-300 bg-amber-50',
        services: [
          { name: 'Fuel & Heating Assistance (LIHEAP)',       href: 'benefits.html',         time: '~25 min',    dept: 'DCBS',       status: 'Online' },
          { name: 'Prescription Assistance (VPharm)',         href: 'benefits.html',         time: '~20 min',    dept: 'DVHA',       status: 'Online' },
          { name: 'Meals on Wheels Referral',                 href: '#',                     time: '~5 min',     dept: 'DAIL',       status: 'Online' },
          { name: 'Senior Medicare Patrol',                   href: '#',                     time: '~15 min',    dept: 'DAIL',       status: 'Online' },
          { name: 'Property Tax Adjustment Claim',            href: '#',                     time: '~20 min',    dept: 'Tax Dept.',  status: 'Online' },
        ]
      },
      {
        key: 'business', label: 'Businesses', icon: '🏢', color: 'border-slate-300 bg-slate-50',
        services: [
          { name: 'Register a Business (LLC, Corp, LP)',      href: '#',                     time: '~20 min',    dept: 'SoS',        status: 'Online' },
          { name: 'File Business Annual Report',              href: '#',                     time: '~10 min',    dept: 'SoS',        status: 'Online' },
          { name: 'Obtain Business License / Permit',         href: '#',                     time: '~30 min',    dept: 'SoS',        status: 'Online' },
          { name: 'Sales & Use Tax Registration',             href: '#',                     time: '~15 min',    dept: 'Tax Dept.',  status: 'Online' },
          { name: 'Apply for a Trade Name (DBA)',             href: '#',                     time: '~10 min',    dept: 'SoS',        status: 'Online' },
          { name: 'Worker\'s Comp Insurance Verification',    href: '#',                     time: '~5 min',     dept: 'DLWD',       status: 'Online' },
        ]
      },
    ];

    function ServicesPage() {
      const [activeStage, setActiveStage] = useState('new');
      const [searchVal, setSearchVal] = useState('');
      const [liveMsg, setLiveMsg] = useState('');
      const panelRef = useRef(null);

      const active = STAGES.find(s => s.key === activeStage);

      function allServices() {
        return STAGES.flatMap(s => s.services.map(sv => ({...sv, stage: s.label})));
      }

      const filtered = searchVal.trim()
        ? allServices().filter(s => s.name.toLowerCase().includes(searchVal.toLowerCase()) || s.dept.toLowerCase().includes(searchVal.toLowerCase()))
        : null;

      function handleTabChange(key) {
        setActiveStage(key);
        const stage = STAGES.find(s => s.key === key);
        setLiveMsg(`Showing ${stage.label} services — ${stage.services.length} available`);
        setTimeout(() => setLiveMsg(''), 2000);
        setTimeout(() => panelRef.current?.focus(), 50);
      }

      return (
        <>
          <Header current="services" />
          <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{liveMsg}</div>

          {/* Page banner */}
          <div className="bg-gov-blue text-white py-10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <nav aria-label="Breadcrumb" className="mb-4">
                <ol className="flex items-center gap-2 text-sm text-white/60" role="list">
                  <li><a href="index.html" className="hover:text-white transition-colors">Home</a></li>
                  <li aria-hidden="true"><span>/</span></li>
                  <li aria-current="page" className="text-white font-medium">Services</li>
                </ol>
              </nav>
              <h1 className="text-3xl font-extrabold">Services &amp; Programs</h1>
              <p className="text-white/75 mt-2 max-w-xl">Browse services organized by life stage, or search below to find exactly what you need.</p>

              {/* Search */}
              <form role="search" aria-label="Search state services" className="mt-6 max-w-xl" onSubmit={e => e.preventDefault()}>
                <div className="flex rounded-lg overflow-hidden shadow">
                  <label htmlFor="services-search" className="sr-only">Search services and programs</label>
                  <input
                    id="services-search"
                    type="search"
                    value={searchVal}
                    onChange={e => setSearchVal(e.target.value)}
                    placeholder="Search services, programs, departments…"
                    className="flex-1 px-4 py-3 text-gov-navy text-sm focus:outline-none"
                    aria-label="Search services by name or department"
                  />
                  <button type="submit" className="bg-gov-green hover:bg-gov-green-h text-white px-5 py-3 text-sm font-semibold transition-colors" aria-label="Search services">Search</button>
                </div>
              </form>
            </div>
          </div>

          <main id="main-content" tabIndex={-1}>
            {filtered ? (
              /* Search results */
              <section aria-labelledby="results-heading" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
                <div className="flex items-center justify-between mb-6">
                  <h2 id="results-heading" className="text-xl font-bold text-gov-navy">
                    Search Results <span className="text-gray-500 font-normal text-base">for "{searchVal}"</span>
                  </h2>
                  <button onClick={() => setSearchVal('')} className="text-sm text-gov-blue hover:underline" aria-label="Clear search and return to service categories">Clear search</button>
                </div>
                {filtered.length === 0 ? (
                  <div role="status" className="text-center py-16">
                    <p className="text-xl font-semibold text-gov-navy">No results found for "{searchVal}"</p>
                    <p className="text-gray-500 mt-2">Try different keywords or <a href="contact.html" className="text-gov-blue underline hover:no-underline">contact us</a> for help.</p>
                  </div>
                ) : (
                  <div className="space-y-3" role="list" aria-label="Search results">
                    {filtered.map((s,i) => (
                      <a key={i} href={s.href} role="listitem" className="bg-white border border-gov-border rounded-xl p-5 flex items-center justify-between gap-4 hover:border-gov-blue hover:shadow-sm transition-all" aria-label={`${s.name} — ${s.dept} — estimated time ${s.time}`}>
                        <div>
                          <p className="font-semibold text-sm text-gov-navy">{s.name}</p>
                          <p className="text-xs text-gray-500 mt-0.5">{s.stage} · {s.dept} · <time>{s.time}</time></p>
                        </div>
                        <div className="flex items-center gap-3 flex-shrink-0">
                          <span className={`text-xs font-medium px-2.5 py-0.5 rounded-full ${s.status==='Online' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>{s.status}</span>
                          <svg aria-hidden="true" className="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                        </div>
                      </a>
                    ))}
                  </div>
                )}
              </section>
            ) : (
              /* Life stage tabs */
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
                {/* Tab list */}
                <div role="tablist" aria-label="Services by resident life stage" className="flex flex-wrap gap-2 mb-8">
                  {STAGES.map(s => (
                    <button
                      key={s.key}
                      role="tab"
                      id={`tab-${s.key}`}
                      aria-selected={activeStage === s.key}
                      aria-controls={`panel-${s.key}`}
                      onClick={() => handleTabChange(s.key)}
                      className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-semibold border-2 transition-all ${activeStage===s.key ? 'bg-gov-navy text-white border-gov-navy' : 'bg-white text-gov-navy border-gov-border hover:border-gov-blue'}`}
                    >
                      <span aria-hidden="true">{s.icon}</span>
                      {s.label}
                    </button>
                  ))}
                </div>

                {/* Tab panel */}
                <div
                  ref={panelRef}
                  tabIndex={-1}
                  role="tabpanel"
                  id={`panel-${active.key}`}
                  aria-labelledby={`tab-${active.key}`}
                  className="focus:outline-none"
                >
                  <div className={`border-l-4 border-gov-blue bg-gov-light rounded-r-xl px-6 py-4 mb-8`}>
                    <h2 className="text-xl font-bold text-gov-navy flex items-center gap-2">
                      <span aria-hidden="true">{active.icon}</span>
                      Services for {active.label}
                    </h2>
                    <p className="text-sm text-gray-600 mt-1">{active.services.length} services available</p>
                  </div>

                  <div className="space-y-3" role="list" aria-label={`Services for ${active.label}`}>
                    {active.services.map((s, i) => (
                      <a
                        key={i}
                        href={s.href}
                        role="listitem"
                        className="bg-white border border-gov-border rounded-xl p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 hover:border-gov-blue hover:shadow-sm transition-all group"
                        aria-label={`${s.name} — ${s.dept} — Estimated time: ${s.time} — ${s.status}`}
                      >
                        <div className="flex items-start gap-4">
                          <div className="w-10 h-10 bg-gov-light rounded-lg flex items-center justify-center flex-shrink-0 group-hover:bg-gov-blue/10 transition-colors" aria-hidden="true">
                            <svg className="w-5 h-5 text-gov-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                          </div>
                          <div>
                            <p className="font-semibold text-sm text-gov-navy group-hover:text-gov-blue transition-colors">{s.name}</p>
                            <p className="text-xs text-gray-500 mt-0.5">
                              <span className="font-medium">{s.dept}</span>
                              <span aria-hidden="true"> · </span>
                              <span aria-label={`Estimated completion time: ${s.time}`}>⏱ {s.time}</span>
                            </p>
                          </div>
                        </div>
                        <div className="flex items-center gap-3 flex-shrink-0 pl-14 sm:pl-0">
                          <span className={`text-xs font-semibold px-3 py-1 rounded-full ${s.status==='Online' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`} aria-label={`Availability: ${s.status}`}>
                            {s.status === 'Online' ? '✓ Online' : '📍 In Person'}
                          </span>
                          <span className="text-xs text-gov-blue font-semibold group-hover:underline hidden sm:block">Start →</span>
                        </div>
                      </a>
                    ))}
                  </div>

                  {/* CTA */}
                  <div className="mt-8 bg-gov-green/5 border border-gov-green/20 rounded-xl p-6 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                    <div>
                      <p className="font-semibold text-gov-navy text-sm">Not sure what you qualify for?</p>
                      <p className="text-xs text-gray-600 mt-0.5">Use our eligibility screener to discover all available programs in under 2 minutes.</p>
                    </div>
                    <a href="benefits.html" className="flex-shrink-0 bg-gov-green text-white font-semibold text-sm px-5 py-2.5 rounded-lg hover:bg-gov-green-h transition-colors" aria-label="Start benefits eligibility screener">Start Screener →</a>
                  </div>
                </div>
              </div>
            )}

            {/* Featured services row */}
            <section aria-labelledby="featured-heading" className="bg-white border-t border-gov-border py-12">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <h2 id="featured-heading" className="text-xl font-bold text-gov-navy mb-6">Most Used Services This Month</h2>
                <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4" role="list" aria-label="Most used services">
                  {[
                    { name:'Driver\'s License Renewal', uses:'18,420 completions', href:'drivers-license.html', color:'bg-blue-600' },
                    { name:'Benefits Eligibility Screener', uses:'12,650 completions', href:'benefits.html', color:'bg-green-600' },
                    { name:'Voter Registration Check', uses:'9,310 completions', href:'#', color:'bg-purple-600' },
                    { name:'Tax Filing Portal', uses:'8,920 completions', href:'#', color:'bg-amber-600' },
                  ].map(s => (
                    <a key={s.name} href={s.href} role="listitem" className="bg-gov-gray border border-gov-border rounded-xl p-5 hover:shadow-md transition-shadow group" aria-label={`${s.name} — ${s.uses}`}>
                      <div className={`w-3 h-3 rounded-full ${s.color} mb-3`} aria-hidden="true"></div>
                      <p className="font-semibold text-sm text-gov-navy group-hover:text-gov-blue transition-colors">{s.name}</p>
                      <p className="text-xs text-gray-500 mt-1">{s.uses}</p>
                    </a>
                  ))}
                </div>
              </div>
            </section>
          </main>

          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ServicesPage />);
  </script>
</body>
</html>
