<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreadHouse — My Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'th-green': '#2D4A3E',
            'th-green-h': '#3D6454',
            'th-gold': '#C8A96E',
            'th-cream': '#FAF9F6',
            'th-beige': '#E8DDD0',
            'th-charcoal': '#2A2A2A',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #FAF9F6; color: #2A2A2A; }
    :focus-visible { outline: 3px solid #C8A96E !important; outline-offset: 2px !important; }
    .skip-link { position: absolute; top: -48px; left: 8px; background: #2D4A3E; color: #fff; padding: 10px 18px; z-index: 9999; border-radius: 4px; font-weight: 600; transition: top 0.15s; text-decoration: none; }
    .skip-link:focus { top: 8px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── Shared Header ─────────────────────────────────────────── */
    function Header() {
      const [cartCount] = useState(2);
      const [menuOpen, setMenuOpen] = useState(false);
      const [searchOpen, setSearchOpen] = useState(false);
      const searchRef = useRef(null);
      useEffect(() => { if (searchOpen) searchRef.current?.focus(); }, [searchOpen]);
      const navLinks = [
        { label: 'Home', href: 'index.html', key: 'home' },
        { label: 'Shop', href: 'products.html', key: 'shop' },
        { label: 'Collections', href: 'products.html', key: 'collections' },
        { label: 'Sale', href: 'products.html', key: 'sale' },
      ];
      return (
        <header className="sticky top-0 z-50 shadow-md">
          <div className="bg-th-gold text-th-charcoal text-xs text-center py-2 px-4 font-medium" role="banner" aria-label="Promotional announcement">
            Free shipping on orders over $75 &nbsp;·&nbsp; Code <strong>SPRING25</strong> for 15% off
          </div>
          <div className="bg-th-green text-white">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex items-center justify-between h-16 gap-4">
                <a href="index.html" className="flex-shrink-0 font-extrabold text-xl sm:text-2xl tracking-tight" aria-label="ThreadHouse – Go to homepage">THREAD<span className="text-th-gold">HOUSE</span></a>
                <nav aria-label="Main navigation" className="hidden md:block">
                  <ul className="flex space-x-6" role="list">
                    {navLinks.map(l => <li key={l.key}><a href={l.href} className="text-sm font-medium transition-colors hover:text-th-gold">{l.label}</a></li>)}
                  </ul>
                </nav>
                <div className="flex items-center gap-2 sm:gap-3">
                  {searchOpen ? (
                    <div className="flex items-center gap-1" role="search">
                      <label htmlFor="site-search" className="sr-only">Search products</label>
                      <input ref={searchRef} id="site-search" type="search" placeholder="Search…" className="bg-white/10 border border-white/30 text-white placeholder-white/60 rounded px-3 py-1.5 text-sm w-40 sm:w-56" onKeyDown={e => e.key === 'Escape' && setSearchOpen(false)} />
                      <button onClick={() => setSearchOpen(false)} aria-label="Close search" className="p-1.5 hover:text-th-gold transition-colors"><svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
                    </div>
                  ) : (
                    <button onClick={() => setSearchOpen(true)} aria-label="Open product search" className="p-1.5 hover:text-th-gold transition-colors"><svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></button>
                  )}
                  <a href="cart.html" className="relative p-1.5 hover:text-th-gold transition-colors" aria-label={`Shopping cart — ${cartCount} items`}>
                    <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                    <span aria-hidden="true" className="absolute -top-1 -right-1 bg-th-gold text-th-charcoal text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center">{cartCount}</span>
                  </a>
                  <a href="account.html" className="p-1.5 text-th-gold" aria-label="My account" aria-current="page">
                    <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                  </a>
                  <button className="md:hidden p-1.5 hover:text-th-gold" aria-expanded={menuOpen} aria-controls="mobile-menu" aria-label={menuOpen ? 'Close navigation menu' : 'Open navigation menu'} onClick={() => setMenuOpen(o => !o)}>
                    <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
                  </button>
                </div>
              </div>
            </div>
            {menuOpen && <nav id="mobile-menu" aria-label="Mobile navigation"><ul className="bg-th-green-h border-t border-white/10 px-4 py-3 space-y-1" role="list">{navLinks.map(l => <li key={l.key}><a href={l.href} className="block py-2 text-sm font-medium hover:text-th-gold transition-colors">{l.label}</a></li>)}</ul></nav>}
          </div>
        </header>
      );
    }

    /* ── Shared Footer ─────────────────────────────────────────── */
    function Footer() {
      return (
        <footer className="bg-th-charcoal text-white mt-20" role="contentinfo">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
              <div><p className="font-extrabold text-xl mb-2">THREAD<span className="text-th-gold">HOUSE</span></p><p className="text-sm text-white/60 leading-relaxed">Sustainable fashion for a generation that refuses to compromise on style or values.</p></div>
              <nav aria-label="Shop navigation"><h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Shop</h2><ul className="space-y-2" role="list">{['New Arrivals','Tops','Bottoms','Outerwear','Accessories','Sale'].map(l=><li key={l}><a href="products.html" className="text-sm text-white/60 hover:text-white transition-colors">{l}</a></li>)}</ul></nav>
              <nav aria-label="Help navigation"><h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Help</h2><ul className="space-y-2" role="list">{['Size Guide','Shipping & Returns','Sustainability','FAQ','Contact Us'].map(l=><li key={l}><a href="#" className="text-sm text-white/60 hover:text-white transition-colors">{l}</a></li>)}</ul></nav>
              <div><h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Stay in the Loop</h2><form aria-label="Email newsletter subscription" onSubmit={e=>{e.preventDefault();}}><label htmlFor="footer-email" className="sr-only">Email address</label><input id="footer-email" type="email" required aria-required="true" placeholder="your@email.com" className="w-full bg-white/10 border border-white/20 text-white placeholder-white/40 rounded px-3 py-2 text-sm mb-2" /><button type="submit" className="w-full bg-th-gold text-th-charcoal font-semibold text-sm rounded px-4 py-2 hover:bg-th-gold/90 transition-colors">Subscribe</button></form></div>
            </div>
            <div className="border-t border-white/10 mt-10 pt-6 flex flex-col sm:flex-row justify-between items-center gap-4">
              <p className="text-xs text-white/40">© 2025 ThreadHouse. All rights reserved.</p>
              <div className="flex gap-6">{['Privacy Policy','Terms of Use','Accessibility'].map(l=><a key={l} href="#" className="text-xs text-white/40 hover:text-white transition-colors">{l}</a>)}</div>
            </div>
          </div>
        </footer>
      );
    }

    /* ── Account page data ─────────────────────────────────────── */
    const ORDERS = [
      { id: 'TH-20250312-4482', date: 'March 12, 2025', status: 'Delivered',    total: 204, items: ['Oversized Linen Shirt','Wide-Leg Trousers'] },
      { id: 'TH-20250228-3861', date: 'February 28, 2025', status: 'Delivered', total: 195, items: ['Linen Blazer'] },
      { id: 'TH-20250215-3219', date: 'February 15, 2025', status: 'Returned',  total: 120, items: ['Ribbed Knit Cardigan'] },
      { id: 'TH-20250104-2887', date: 'January 4, 2025',  status: 'Delivered',  total: 83,  items: ['Relaxed Fit Tee','Canvas Bucket Hat'] },
    ];

    const STATUS_STYLES = {
      'Delivered': 'bg-green-100 text-green-700',
      'Shipped':   'bg-blue-100 text-blue-700',
      'Processing':'bg-amber-100 text-amber-700',
      'Returned':  'bg-gray-100 text-gray-600',
      'Cancelled': 'bg-red-100 text-red-600',
    };

    const SAVED_OUTFITS = [
      { name: 'Weekend Brunch',  items: ['Oversized Linen Shirt','Wide-Leg Trousers','Canvas Bucket Hat'], grads: ['from-emerald-200 to-teal-300','from-amber-100 to-amber-300','from-lime-200 to-green-300'] },
      { name: 'Work From Anywhere', items: ['Linen Blazer','High-Waist Denim','Structured Tote'],         grads: ['from-orange-100 to-orange-300','from-sky-200 to-blue-300','from-orange-100 to-orange-300'] },
      { name: 'Weekend Edit',    items: ['Drop-Shoulder Hoodie','Cargo Trousers','Woven Belt Bag'],         grads: ['from-slate-200 to-slate-400','from-lime-200 to-green-300','from-amber-100 to-amber-300'] },
    ];

    const ACCOUNT_TABS = [
      { key: 'orders',    label: 'My Orders',       icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2' },
      { key: 'style',     label: 'Style Profile',   icon: 'M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z' },
      { key: 'rewards',   label: 'Loyalty Rewards', icon: 'M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z' },
      { key: 'outfits',   label: 'Saved Outfits',   icon: 'M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z' },
      { key: 'referral',  label: 'Referral Program',icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z' },
    ];

    /* ── Account Page ──────────────────────────────────────────── */
    function AccountPage() {
      const [activeTab, setActiveTab] = useState('orders');
      const [liveMsg, setLiveMsg] = useState('');
      const [copied, setCopied] = useState(false);
      const [stylePrefs, setStylePrefs] = useState({
        sizes: ['S', 'M'],
        styles: ['Minimalist', 'Workwear'],
        colors: ['Neutrals', 'Earth Tones'],
        materials: ['Organic Cotton', 'Linen'],
      });
      const loyaltyPoints = 380;
      const tier = loyaltyPoints >= 500 ? 'Gold' : loyaltyPoints >= 200 ? 'Silver' : 'Bronze';
      const tierColor = tier === 'Gold' ? 'text-th-gold' : tier === 'Silver' ? 'text-slate-400' : 'text-amber-700';
      const REFERRAL_LINK = 'threadhouse.co/ref/maya_r_2025';
      const tabContentRef = useRef(null);

      function handleTabChange(key) {
        setActiveTab(key);
        // Focus management: move focus to panel
        setTimeout(() => tabContentRef.current?.focus(), 50);
      }

      function copyReferralLink() {
        setCopied(true);
        setLiveMsg('Referral link copied to clipboard!');
        setTimeout(() => { setCopied(false); setLiveMsg(''); }, 3000);
      }

      function toggleStylePref(key, val) {
        setStylePrefs(prev => {
          const arr = prev[key];
          const next = arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val];
          return { ...prev, [key]: next };
        });
      }

      return (
        <>
          <Header />
          <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{liveMsg}</div>

          <main id="main-content" tabIndex={-1}>
            {/* Breadcrumb */}
            <nav aria-label="Breadcrumb" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <ol className="flex items-center gap-2 text-sm text-gray-500" role="list">
                <li><a href="index.html" className="hover:text-th-green transition-colors">Home</a></li>
                <li aria-hidden="true"><span>/</span></li>
                <li aria-current="page" className="text-th-charcoal font-medium">My Account</li>
              </ol>
            </nav>

            {/* Account hero */}
            <section aria-labelledby="account-greeting" className="bg-th-green text-white">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-5">
                  <div className="w-16 h-16 bg-th-gold rounded-full flex items-center justify-center text-th-charcoal font-extrabold text-2xl flex-shrink-0" role="img" aria-label="Profile avatar for Maya R.">M</div>
                  <div>
                    <h1 id="account-greeting" className="text-2xl font-extrabold">Hello, Maya!</h1>
                    <p className="text-white/70 text-sm mt-0.5">maya.r@email.com · Member since January 2024</p>
                    <div className="flex items-center gap-2 mt-2">
                      <span className={`text-sm font-bold ${tierColor}`} aria-label={`Loyalty tier: ${tier}`}>{tier} Member</span>
                      <span className="text-white/30">·</span>
                      <span className="text-sm text-white/70" aria-label={`${loyaltyPoints} loyalty points`}>{loyaltyPoints} pts</span>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
              <div className="flex flex-col lg:flex-row gap-8">

                {/* Sidebar nav */}
                <aside aria-label="Account navigation" className="lg:w-60 flex-shrink-0">
                  <nav>
                    <ul className="space-y-1" role="list">
                      {ACCOUNT_TABS.map(tab => (
                        <li key={tab.key}>
                          <button
                            role="tab"
                            aria-selected={activeTab === tab.key}
                            aria-controls={`panel-${tab.key}`}
                            id={`tab-${tab.key}`}
                            onClick={() => handleTabChange(tab.key)}
                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all text-left ${activeTab === tab.key ? 'bg-th-green text-white' : 'text-gray-600 hover:bg-th-beige/60 hover:text-th-charcoal'}`}
                          >
                            <svg aria-hidden="true" className="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={tab.icon} /></svg>
                            {tab.label}
                          </button>
                        </li>
                      ))}
                    </ul>
                    <div className="mt-6 pt-6 border-t border-th-beige">
                      <button className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-red-500 hover:bg-red-50 transition-all text-left" aria-label="Sign out of your ThreadHouse account">
                        <svg aria-hidden="true" className="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        Sign Out
                      </button>
                    </div>
                  </nav>
                </aside>

                {/* Tab content */}
                <div
                  ref={tabContentRef}
                  tabIndex={-1}
                  className="flex-1 min-w-0 focus:outline-none"
                  role="tabpanel"
                  id={`panel-${activeTab}`}
                  aria-labelledby={`tab-${activeTab}`}
                >

                  {/* ── My Orders ──────────────────────────────── */}
                  {activeTab === 'orders' && (
                    <section aria-labelledby="orders-heading">
                      <h2 id="orders-heading" className="text-xl font-bold text-th-charcoal mb-6">My Orders</h2>
                      <div className="space-y-4" role="list" aria-label="Order history">
                        {ORDERS.map(order => (
                          <article key={order.id} className="bg-white rounded-2xl p-5 shadow-sm border border-th-beige/60" role="listitem" aria-label={`Order ${order.id}`}>
                            <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-3">
                              <div>
                                <div className="flex items-center gap-3 flex-wrap">
                                  <p className="font-bold text-sm text-th-charcoal">{order.id}</p>
                                  <span className={`text-xs font-semibold px-2.5 py-0.5 rounded-full ${STATUS_STYLES[order.status]}`} aria-label={`Order status: ${order.status}`}>{order.status}</span>
                                </div>
                                <p className="text-xs text-gray-500 mt-1"><time dateTime={order.date}>{order.date}</time></p>
                                <p className="text-sm text-gray-700 mt-2">{order.items.join(', ')}</p>
                              </div>
                              <div className="flex flex-col sm:items-end gap-2">
                                <p className="font-bold text-th-green">${order.total.toFixed(2)}</p>
                                <div className="flex gap-2">
                                  <button className="text-xs border border-gray-200 text-gray-600 px-3 py-1.5 rounded-lg hover:border-th-green hover:text-th-green transition-all" aria-label={`View details for order ${order.id}`}>View Order</button>
                                  {order.status === 'Delivered' && (
                                    <button className="text-xs border border-th-green text-th-green px-3 py-1.5 rounded-lg hover:bg-th-green hover:text-white transition-all" aria-label={`Start a return for order ${order.id}`}>Return</button>
                                  )}
                                </div>
                              </div>
                            </div>
                          </article>
                        ))}
                      </div>
                    </section>
                  )}

                  {/* ── Style Profile ───────────────────────────── */}
                  {activeTab === 'style' && (
                    <section aria-labelledby="style-heading">
                      <h2 id="style-heading" className="text-xl font-bold text-th-charcoal mb-2">Style Profile</h2>
                      <p className="text-gray-500 text-sm mb-8">Your saved preferences help us personalise product recommendations.</p>

                      <div className="space-y-8">
                        {[
                          { key: 'sizes', label: 'My Sizes', options: ['XS','S','M','L','XL','XXL'] },
                          { key: 'styles', label: 'Style Preferences', options: ['Minimalist','Streetwear','Workwear','Weekend','Boho','Athleisure'] },
                          { key: 'colors', label: 'Favourite Colour Palettes', options: ['Neutrals','Earth Tones','Monochrome','Bold & Bright','Pastels','Muted Tones'] },
                          { key: 'materials', label: 'Preferred Materials', options: ['Organic Cotton','Linen','Recycled Polyester','Wool','Denim','Silk/Satin'] },
                        ].map(section => (
                          <fieldset key={section.key} className="bg-white rounded-2xl p-6 shadow-sm border border-th-beige/60">
                            <legend className="font-semibold text-base text-th-charcoal mb-4">{section.label}</legend>
                            <div className="flex flex-wrap gap-2" role="group" aria-label={`Select your ${section.label.toLowerCase()}`}>
                              {section.options.map(opt => (
                                <button
                                  key={opt}
                                  onClick={() => toggleStylePref(section.key, opt)}
                                  aria-pressed={stylePrefs[section.key].includes(opt)}
                                  aria-label={`${opt}: ${stylePrefs[section.key].includes(opt) ? 'selected' : 'not selected'}`}
                                  className={`px-4 py-2 rounded-xl text-sm font-medium border-2 transition-all ${stylePrefs[section.key].includes(opt) ? 'bg-th-green text-white border-th-green' : 'bg-white text-gray-600 border-gray-200 hover:border-th-green hover:text-th-green'}`}
                                >
                                  {opt}
                                </button>
                              ))}
                            </div>
                          </fieldset>
                        ))}
                      </div>

                      <div className="mt-6 flex gap-3">
                        <button
                          className="bg-th-green text-white font-semibold px-6 py-3 rounded-xl hover:bg-th-green-h transition-colors text-sm"
                          aria-label="Save your style profile preferences"
                          onClick={() => { setLiveMsg('Style profile saved successfully!'); setTimeout(() => setLiveMsg(''), 2500); }}
                        >
                          Save Profile
                        </button>
                        <button className="border-2 border-gray-200 text-gray-600 font-semibold px-6 py-3 rounded-xl hover:border-gray-400 transition-colors text-sm" aria-label="Discard style profile changes">Discard Changes</button>
                      </div>
                    </section>
                  )}

                  {/* ── Loyalty Rewards ─────────────────────────── */}
                  {activeTab === 'rewards' && (
                    <section aria-labelledby="rewards-heading">
                      <h2 id="rewards-heading" className="text-xl font-bold text-th-charcoal mb-6">Loyalty Rewards</h2>

                      {/* Points card */}
                      <div className="bg-gradient-to-br from-th-green to-teal-700 text-white rounded-2xl p-8 mb-8 relative overflow-hidden" aria-label="Your loyalty rewards summary">
                        <div aria-hidden="true" className="absolute -right-8 -top-8 w-36 h-36 bg-white/5 rounded-full"></div>
                        <div aria-hidden="true" className="absolute -right-4 -bottom-8 w-48 h-48 bg-white/5 rounded-full"></div>
                        <div className="relative">
                          <p className="text-white/70 text-sm font-medium mb-1">Current Balance</p>
                          <p className="text-5xl font-extrabold text-th-gold" aria-label={`${loyaltyPoints} ThreadRewards points`}>{loyaltyPoints}</p>
                          <p className="text-white/70 text-sm mt-1">ThreadRewards Points</p>
                          <div className="flex items-center gap-2 mt-4">
                            <svg aria-hidden="true" className="w-4 h-4 text-th-gold" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                            <span className="text-sm font-semibold" aria-label={`Membership tier: ${tier}`}>{tier} Member</span>
                          </div>
                        </div>
                      </div>

                      {/* Rewards tiers */}
                      <div className="bg-white rounded-2xl p-6 shadow-sm border border-th-beige/60 mb-8">
                        <h3 className="font-bold text-base text-th-charcoal mb-4">Tier Progress</h3>
                        <div className="space-y-4">
                          {[
                            { tier: 'Bronze', min: 0,   max: 199,  desc: '1 point per $1 spent' },
                            { tier: 'Silver', min: 200, max: 499,  desc: '1.25 points per $1 + birthday bonus' },
                            { tier: 'Gold',   min: 500, max: 999,  desc: '1.5 points per $1 + early access + free gift' },
                            { tier: 'Platinum', min: 1000, max: Infinity, desc: '2 points per $1 + personal stylist' },
                          ].map(t => {
                            const isActive = loyaltyPoints >= t.min && loyaltyPoints <= t.max;
                            const isPast = loyaltyPoints > t.max;
                            return (
                              <div key={t.tier} className={`flex items-center gap-4 p-3 rounded-xl ${isActive ? 'bg-th-green/5 border-2 border-th-green' : 'border-2 border-transparent'}`} aria-current={isActive ? 'step' : undefined} aria-label={`${t.tier} tier${isActive ? ' — your current tier' : isPast ? ' — achieved' : ''}`}>
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 text-lg ${isPast ? 'bg-th-gold' : isActive ? 'bg-th-green' : 'bg-gray-100'}`} aria-hidden="true">
                                  {isPast ? '✓' : isActive ? '★' : '○'}
                                </div>
                                <div className="flex-1 min-w-0">
                                  <p className={`font-bold text-sm ${isActive ? 'text-th-green' : 'text-th-charcoal'}`}>{t.tier} {t.min === 0 ? '' : `(${t.min}–${t.max === Infinity ? '∞' : t.max} pts)`}</p>
                                  <p className="text-xs text-gray-500 mt-0.5">{t.desc}</p>
                                </div>
                                {isActive && <span className="text-xs font-bold text-th-green bg-th-green/10 px-2 py-0.5 rounded-full flex-shrink-0">Current</span>}
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* Rewards catalogue */}
                      <div className="bg-white rounded-2xl p-6 shadow-sm border border-th-beige/60">
                        <h3 className="font-bold text-base text-th-charcoal mb-4">Redeem Rewards</h3>
                        <div className="grid sm:grid-cols-2 gap-4" role="list" aria-label="Available rewards to redeem">
                          {[
                            { name: 'Free Tote Bag',        pts: 500,  desc: 'Our signature recycled canvas tote' },
                            { name: '$10 Off Your Order',    pts: 300,  desc: 'Applies to any order $50+' },
                            { name: 'Free Shipping Voucher', pts: 150,  desc: 'Valid on any order size' },
                            { name: 'Donate 100 Points',     pts: 100,  desc: 'We plant one tree on your behalf' },
                          ].map(reward => {
                            const canAfford = loyaltyPoints >= reward.pts;
                            return (
                              <div key={reward.name} className="border-2 border-th-beige rounded-xl p-4" role="listitem" aria-label={`${reward.name} — ${reward.pts} points`}>
                                <div className="flex items-start justify-between gap-2">
                                  <div>
                                    <p className="font-semibold text-sm text-th-charcoal">{reward.name}</p>
                                    <p className="text-xs text-gray-500 mt-0.5">{reward.desc}</p>
                                  </div>
                                  <span className="text-xs font-bold text-th-gold whitespace-nowrap">{reward.pts} pts</span>
                                </div>
                                <button
                                  disabled={!canAfford}
                                  aria-disabled={!canAfford}
                                  aria-label={canAfford ? `Redeem ${reward.name} for ${reward.pts} points` : `${reward.name} requires ${reward.pts} points — you have ${loyaltyPoints}`}
                                  className={`mt-3 w-full text-xs font-semibold py-2 rounded-lg transition-all ${canAfford ? 'bg-th-green text-white hover:bg-th-green-h' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}
                                  onClick={() => canAfford && alert(`Redeemed: ${reward.name}`)}
                                >
                                  {canAfford ? 'Redeem' : `Need ${reward.pts - loyaltyPoints} more pts`}
                                </button>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </section>
                  )}

                  {/* ── Saved Outfits ───────────────────────────── */}
                  {activeTab === 'outfits' && (
                    <section aria-labelledby="outfits-heading">
                      <div className="flex items-center justify-between mb-6">
                        <h2 id="outfits-heading" className="text-xl font-bold text-th-charcoal">Saved Outfits</h2>
                        <button className="text-sm bg-th-green text-white font-semibold px-4 py-2 rounded-xl hover:bg-th-green-h transition-colors" aria-label="Create a new saved outfit">+ New Outfit</button>
                      </div>
                      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6" role="list" aria-label="Your saved outfit collections">
                        {SAVED_OUTFITS.map(outfit => (
                          <article key={outfit.name} className="bg-white rounded-2xl overflow-hidden shadow-sm border border-th-beige/60 hover:shadow-md transition-shadow" role="listitem" aria-label={`Saved outfit: ${outfit.name}`}>
                            <div className="grid grid-cols-3 gap-0.5 bg-th-beige" aria-label={`${outfit.name} outfit preview — ${outfit.items.join(', ')}`}>
                              {outfit.grads.map((grad, i) => (
                                <div key={i} className={`aspect-square bg-gradient-to-br ${grad}`} role="img" aria-label={outfit.items[i]}></div>
                              ))}
                            </div>
                            <div className="p-4">
                              <h3 className="font-bold text-sm text-th-charcoal">{outfit.name}</h3>
                              <p className="text-xs text-gray-500 mt-1">{outfit.items.join(' · ')}</p>
                              <div className="flex gap-2 mt-3">
                                <a href="product-detail.html" className="flex-1 text-center text-xs bg-th-green text-white font-semibold py-2 rounded-lg hover:bg-th-green-h transition-colors" aria-label={`Shop the ${outfit.name} outfit`}>Shop Outfit</a>
                                <button className="text-xs border border-gray-200 text-gray-500 px-3 py-2 rounded-lg hover:border-red-300 hover:text-red-500 transition-all" aria-label={`Delete saved outfit: ${outfit.name}`}>
                                  <svg aria-hidden="true" className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                              </div>
                            </div>
                          </article>
                        ))}

                        {/* Add new outfit card */}
                        <button
                          className="bg-th-beige/30 border-2 border-dashed border-th-beige rounded-2xl aspect-auto min-h-48 flex flex-col items-center justify-center gap-2 hover:border-th-green hover:bg-th-green/5 transition-all group"
                          aria-label="Create a new saved outfit"
                        >
                          <div aria-hidden="true" className="w-10 h-10 rounded-full bg-th-beige group-hover:bg-th-green/10 flex items-center justify-center transition-colors">
                            <svg className="w-5 h-5 text-gray-400 group-hover:text-th-green transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                          </div>
                          <span className="text-sm font-medium text-gray-400 group-hover:text-th-green transition-colors">Create New Outfit</span>
                        </button>
                      </div>
                    </section>
                  )}

                  {/* ── Referral Program ────────────────────────── */}
                  {activeTab === 'referral' && (
                    <section aria-labelledby="referral-heading">
                      <h2 id="referral-heading" className="text-xl font-bold text-th-charcoal mb-2">Referral Program</h2>
                      <p className="text-gray-500 text-sm mb-8">Share ThreadHouse with friends — you both get rewarded.</p>

                      {/* Hero card */}
                      <div className="bg-gradient-to-br from-th-green to-teal-700 text-white rounded-2xl p-8 mb-8 relative overflow-hidden">
                        <div aria-hidden="true" className="absolute -right-6 -top-6 w-40 h-40 bg-white/5 rounded-full"></div>
                        <div className="relative">
                          <h3 className="text-2xl font-extrabold mb-2">Give $15, Get $15</h3>
                          <p className="text-white/80 text-sm leading-relaxed max-w-sm">When a friend makes their first purchase using your link, they get $15 off — and you earn $15 in store credit.</p>
                          <div className="flex flex-wrap gap-4 mt-6">
                            {[{label:'Friends Referred', val:3},{label:'Credits Earned', val:'$45'},{label:'Total Saved', val:'$60'}].map(s => (
                              <div key={s.label} className="text-center">
                                <p className="text-2xl font-extrabold text-th-gold" aria-label={`${s.val} ${s.label}`}>{s.val}</p>
                                <p className="text-xs text-white/60 mt-0.5">{s.label}</p>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>

                      {/* Referral link */}
                      <div className="bg-white rounded-2xl p-6 shadow-sm border border-th-beige/60 mb-6">
                        <h3 className="font-bold text-base text-th-charcoal mb-4">Your Unique Referral Link</h3>
                        <div className="flex gap-2">
                          <div className="flex-1">
                            <label htmlFor="referral-link" className="sr-only">Your referral link</label>
                            <input
                              id="referral-link"
                              type="text"
                              value={REFERRAL_LINK}
                              readOnly
                              className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm bg-th-beige/30 text-th-charcoal font-mono"
                              aria-label={`Your referral link: ${REFERRAL_LINK}`}
                              onClick={e => e.target.select()}
                            />
                          </div>
                          <button
                            onClick={copyReferralLink}
                            aria-label={copied ? 'Referral link copied!' : 'Copy referral link to clipboard'}
                            className={`flex-shrink-0 px-5 py-3 rounded-xl text-sm font-bold transition-all ${copied ? 'bg-th-gold text-th-charcoal' : 'bg-th-green text-white hover:bg-th-green-h'}`}
                          >
                            {copied ? (
                              <span className="flex items-center gap-1.5">
                                <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                Copied!
                              </span>
                            ) : (
                              <span className="flex items-center gap-1.5">
                                <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                                Copy
                              </span>
                            )}
                          </button>
                        </div>

                        {/* Share buttons */}
                        <div className="flex flex-wrap gap-2 mt-4">
                          {[
                            { label: 'Share on Instagram', icon: 'from-pink-400 to-purple-500', text: 'Instagram' },
                            { label: 'Share via SMS', icon: 'from-green-400 to-emerald-500', text: 'SMS' },
                            { label: 'Share via Email', icon: 'from-blue-400 to-blue-600', text: 'Email' },
                            { label: 'Share on TikTok', icon: 'from-slate-700 to-slate-900', text: 'TikTok' },
                          ].map(s => (
                            <button
                              key={s.text}
                              aria-label={s.label}
                              className={`flex items-center gap-2 px-4 py-2 rounded-xl text-white text-xs font-semibold bg-gradient-to-r ${s.icon} hover:opacity-90 transition-opacity`}
                            >
                              {s.text}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* Referral history */}
                      <div className="bg-white rounded-2xl p-6 shadow-sm border border-th-beige/60">
                        <h3 className="font-bold text-base text-th-charcoal mb-4">Referral History</h3>
                        <div className="space-y-3" role="list" aria-label="Referral history list">
                          {[
                            { name: 'Alex M.', date: 'March 1, 2025', status: 'Purchased', credit: '$15' },
                            { name: 'Sam K.', date: 'February 8, 2025', status: 'Purchased', credit: '$15' },
                            { name: 'Jamie L.', date: 'January 20, 2025', status: 'Purchased', credit: '$15' },
                            { name: 'Chris T.', date: 'March 15, 2025', status: 'Pending', credit: '—' },
                          ].map(ref => (
                            <div key={ref.name} className="flex items-center justify-between py-2 border-b border-th-beige/40 last:border-0" role="listitem" aria-label={`Referral: ${ref.name}`}>
                              <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-th-beige rounded-full flex items-center justify-center text-sm font-bold text-th-charcoal" aria-hidden="true">{ref.name.charAt(0)}</div>
                                <div>
                                  <p className="text-sm font-medium text-th-charcoal">{ref.name}</p>
                                  <p className="text-xs text-gray-500"><time>{ref.date}</time></p>
                                </div>
                              </div>
                              <div className="text-right">
                                <span className={`text-xs font-semibold px-2.5 py-0.5 rounded-full ${ref.status === 'Purchased' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`} aria-label={`Status: ${ref.status}`}>{ref.status}</span>
                                <p className="text-sm font-bold text-th-green mt-1">{ref.credit}</p>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </section>
                  )}

                </div>
              </div>
            </div>
          </main>

          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AccountPage />);
  </script>
</body>
</html>
