<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreadHouse — Shopping Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'th-green': '#2D4A3E',
            'th-green-h': '#3D6454',
            'th-gold': '#C8A96E',
            'th-cream': '#FAF9F6',
            'th-beige': '#E8DDD0',
            'th-charcoal': '#2A2A2A',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #FAF9F6; color: #2A2A2A; }
    :focus-visible { outline: 3px solid #C8A96E !important; outline-offset: 2px !important; }
    .skip-link { position: absolute; top: -48px; left: 8px; background: #2D4A3E; color: #fff; padding: 10px 18px; z-index: 9999; border-radius: 4px; font-weight: 600; transition: top 0.15s; text-decoration: none; }
    .skip-link:focus { top: 8px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── Shared Header ─────────────────────────────────────────── */
    function Header({ cartCount }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const [searchOpen, setSearchOpen] = useState(false);
      const searchRef = useRef(null);
      useEffect(() => { if (searchOpen) searchRef.current?.focus(); }, [searchOpen]);
      const navLinks = [
        { label: 'Home', href: 'index.html', key: 'home' },
        { label: 'Shop', href: 'products.html', key: 'shop' },
        { label: 'Collections', href: 'products.html', key: 'collections' },
        { label: 'Sale', href: 'products.html', key: 'sale' },
      ];
      return (
        <header className="sticky top-0 z-50 shadow-md">
          <div className="bg-th-gold text-th-charcoal text-xs text-center py-2 px-4 font-medium" role="banner" aria-label="Promotional announcement">
            Free shipping on orders over $75 &nbsp;·&nbsp; Code <strong>SPRING25</strong> for 15% off
          </div>
          <div className="bg-th-green text-white">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex items-center justify-between h-16 gap-4">
                <a href="index.html" className="flex-shrink-0 font-extrabold text-xl sm:text-2xl tracking-tight" aria-label="ThreadHouse – Go to homepage">THREAD<span className="text-th-gold">HOUSE</span></a>
                <nav aria-label="Main navigation" className="hidden md:block">
                  <ul className="flex space-x-6" role="list">
                    {navLinks.map(l => <li key={l.key}><a href={l.href} className="text-sm font-medium transition-colors hover:text-th-gold">{l.label}</a></li>)}
                  </ul>
                </nav>
                <div className="flex items-center gap-2 sm:gap-3">
                  {searchOpen ? (
                    <div className="flex items-center gap-1" role="search">
                      <label htmlFor="site-search" className="sr-only">Search products</label>
                      <input ref={searchRef} id="site-search" type="search" placeholder="Search…" className="bg-white/10 border border-white/30 text-white placeholder-white/60 rounded px-3 py-1.5 text-sm w-40 sm:w-56" onKeyDown={e => e.key === 'Escape' && setSearchOpen(false)} />
                      <button onClick={() => setSearchOpen(false)} aria-label="Close search" className="p-1.5 hover:text-th-gold transition-colors"><svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
                    </div>
                  ) : (
                    <button onClick={() => setSearchOpen(true)} aria-label="Open product search" className="p-1.5 hover:text-th-gold transition-colors"><svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></button>
                  )}
                  <a href="cart.html" className="relative p-1.5 text-th-gold" aria-label={`Shopping cart — ${cartCount} items`} aria-current="page">
                    <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                    <span aria-hidden="true" className="absolute -top-1 -right-1 bg-th-gold text-th-charcoal text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center">{cartCount}</span>
                  </a>
                  <a href="account.html" className="p-1.5 hover:text-th-gold transition-colors" aria-label="My account"><svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></a>
                  <button className="md:hidden p-1.5 hover:text-th-gold" aria-expanded={menuOpen} aria-controls="mobile-menu" aria-label={menuOpen ? 'Close navigation menu' : 'Open navigation menu'} onClick={() => setMenuOpen(o => !o)}>
                    <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
                  </button>
                </div>
              </div>
            </div>
            {menuOpen && <nav id="mobile-menu" aria-label="Mobile navigation"><ul className="bg-th-green-h border-t border-white/10 px-4 py-3 space-y-1" role="list">{navLinks.map(l => <li key={l.key}><a href={l.href} className="block py-2 text-sm font-medium hover:text-th-gold transition-colors">{l.label}</a></li>)}</ul></nav>}
          </div>
        </header>
      );
    }

    /* ── Shared Footer ─────────────────────────────────────────── */
    function Footer() {
      return (
        <footer className="bg-th-charcoal text-white mt-20" role="contentinfo">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
              <div><p className="font-extrabold text-xl mb-2">THREAD<span className="text-th-gold">HOUSE</span></p><p className="text-sm text-white/60 leading-relaxed">Sustainable fashion for a generation that refuses to compromise on style or values.</p></div>
              <nav aria-label="Shop navigation"><h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Shop</h2><ul className="space-y-2" role="list">{['New Arrivals','Tops','Bottoms','Outerwear','Accessories','Sale'].map(l=><li key={l}><a href="products.html" className="text-sm text-white/60 hover:text-white transition-colors">{l}</a></li>)}</ul></nav>
              <nav aria-label="Help navigation"><h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Help</h2><ul className="space-y-2" role="list">{['Size Guide','Shipping & Returns','Sustainability','FAQ','Contact Us'].map(l=><li key={l}><a href="#" className="text-sm text-white/60 hover:text-white transition-colors">{l}</a></li>)}</ul></nav>
              <div><h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Stay in the Loop</h2><form aria-label="Email newsletter subscription" onSubmit={e=>{e.preventDefault();}}><label htmlFor="footer-email" className="sr-only">Email address</label><input id="footer-email" type="email" required aria-required="true" placeholder="your@email.com" className="w-full bg-white/10 border border-white/20 text-white placeholder-white/40 rounded px-3 py-2 text-sm mb-2" /><button type="submit" className="w-full bg-th-gold text-th-charcoal font-semibold text-sm rounded px-4 py-2 hover:bg-th-gold/90 transition-colors">Subscribe</button></form></div>
            </div>
            <div className="border-t border-white/10 mt-10 pt-6 flex flex-col sm:flex-row justify-between items-center gap-4">
              <p className="text-xs text-white/40">© 2025 ThreadHouse. All rights reserved.</p>
              <div className="flex gap-6">{['Privacy Policy','Terms of Use','Accessibility'].map(l=><a key={l} href="#" className="text-xs text-white/40 hover:text-white transition-colors">{l}</a>)}</div>
            </div>
          </div>
        </footer>
      );
    }

    /* ── Cart Page ─────────────────────────────────────────────── */
    const INITIAL_CART = [
      { id: 1, name: 'Oversized Linen Shirt',  color: 'Sage Green',  size: 'S',  qty: 1, price: 89,  grad: 'from-emerald-200 to-teal-300' },
      { id: 2, name: 'Wide-Leg Trousers',       color: 'Oatmeal',     size: 'M',  qty: 1, price: 115, grad: 'from-amber-100 to-amber-300'  },
      { id: 3, name: 'Canvas Bucket Hat',       color: 'Sage',        size: 'One Size', qty: 1, price: 38, grad: 'from-lime-200 to-green-300' },
    ];

    function CartPage() {
      const [items, setItems] = useState(INITIAL_CART);
      const [giftWrap, setGiftWrap] = useState(false);
      const [promoCode, setPromoCode] = useState('');
      const [promoApplied, setPromoApplied] = useState(false);
      const [promoError, setPromoError] = useState('');
      const [liveMsg, setLiveMsg] = useState('');
      const [promoInputRef] = useState(() => React.createRef());
      const loyaltyPoints = 380;
      const pointsNeeded = 500;
      const pointsToFreebie = pointsNeeded - loyaltyPoints;
      const progressPct = Math.min(100, (loyaltyPoints / pointsNeeded) * 100);

      function updateQty(id, delta) {
        setItems(prev => {
          const item = prev.find(i => i.id === id);
          const newQty = Math.max(1, Math.min(10, item.qty + delta));
          const updated = prev.map(i => i.id === id ? { ...i, qty: newQty } : i);
          setLiveMsg(`${item.name} quantity updated to ${newQty}.`);
          setTimeout(() => setLiveMsg(''), 2500);
          return updated;
        });
      }

      function removeItem(id) {
        const item = items.find(i => i.id === id);
        setItems(prev => prev.filter(i => i.id !== id));
        setLiveMsg(`${item.name} removed from cart.`);
        setTimeout(() => setLiveMsg(''), 3000);
      }

      function applyPromo(e) {
        e.preventDefault();
        setPromoError('');
        if (promoCode.trim().toUpperCase() === 'SPRING25') {
          setPromoApplied(true);
          setLiveMsg('Promo code SPRING25 applied — 15% discount!');
          setTimeout(() => setLiveMsg(''), 3000);
        } else {
          setPromoError('Invalid promo code. Please check and try again.');
          promoInputRef.current?.focus();
        }
      }

      const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
      const shipping = subtotal >= 75 ? 0 : 5.99;
      const giftWrapCost = giftWrap ? 5 : 0;
      const discount = promoApplied ? subtotal * 0.15 : 0;
      const total = subtotal + shipping + giftWrapCost - discount;
      const totalItems = items.reduce((s, i) => s + i.qty, 0);

      return (
        <>
          <Header cartCount={totalItems} />
          <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{liveMsg}</div>

          <main id="main-content" tabIndex={-1}>
            {/* Breadcrumb */}
            <nav aria-label="Breadcrumb" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <ol className="flex items-center gap-2 text-sm text-gray-500" role="list">
                <li><a href="index.html" className="hover:text-th-green transition-colors">Home</a></li>
                <li aria-hidden="true"><span>/</span></li>
                <li aria-current="page" className="text-th-charcoal font-medium">Cart</li>
              </ol>
            </nav>

            <section aria-labelledby="cart-heading" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
              <h1 id="cart-heading" className="text-3xl font-extrabold text-th-charcoal mb-2">Your Cart</h1>
              <p className="text-gray-500 text-sm mb-8" aria-live="polite" aria-atomic="true">
                {totalItems} {totalItems === 1 ? 'item' : 'items'} · Free shipping{subtotal >= 75 ? ' included!' : ` on orders over $75 (add $${(75 - subtotal).toFixed(2)} more)`}
              </p>

              {items.length === 0 ? (
                <div className="text-center py-24" role="status">
                  <p className="text-5xl mb-4" aria-hidden="true">🛒</p>
                  <h2 className="text-xl font-bold text-th-charcoal">Your cart is empty</h2>
                  <p className="text-gray-500 mt-2 mb-6">Looks like you haven't added anything yet.</p>
                  <a href="products.html" className="bg-th-green text-white font-bold px-8 py-3.5 rounded-xl hover:bg-th-green-h transition-colors">Start Shopping</a>
                </div>
              ) : (
                <div className="grid lg:grid-cols-3 gap-10">
                  {/* Cart items */}
                  <div className="lg:col-span-2 space-y-4">
                    <h2 className="sr-only">Cart items</h2>

                    {/* Free shipping progress */}
                    {subtotal < 75 && (
                      <div className="bg-th-beige/60 rounded-2xl p-4 border border-th-beige" aria-label="Free shipping progress">
                        <p className="text-sm font-medium text-th-charcoal mb-2">
                          Add <strong className="text-th-green">${(75 - subtotal).toFixed(2)}</strong> more for free shipping!
                        </p>
                        <div className="bg-white rounded-full h-2 overflow-hidden">
                          <div
                            className="bg-th-green h-2 rounded-full transition-all"
                            style={{ width: `${Math.min(100, (subtotal / 75) * 100)}%` }}
                            role="progressbar"
                            aria-valuenow={subtotal}
                            aria-valuemin={0}
                            aria-valuemax={75}
                            aria-label={`$${subtotal.toFixed(2)} of $75 for free shipping`}
                          ></div>
                        </div>
                      </div>
                    )}

                    {/* Item list */}
                    <ul className="space-y-4" aria-label="Items in your cart">
                      {items.map(item => (
                        <li key={item.id} className="bg-white rounded-2xl p-4 sm:p-6 shadow-sm border border-th-beige/60" aria-label={`${item.name}, ${item.color}, size ${item.size}`}>
                          <div className="flex gap-4">
                            {/* Product image */}
                            <a href="product-detail.html" aria-label={`View details for ${item.name}`} className="flex-shrink-0">
                              <div className={`w-24 h-28 sm:w-28 sm:h-36 rounded-xl bg-gradient-to-br ${item.grad} flex items-center justify-center overflow-hidden relative`} role="img" aria-label={`${item.name} product image`}>
                                <div aria-hidden="true" className="absolute inset-0 opacity-10" style={{backgroundImage:'repeating-linear-gradient(45deg,#000 0,#000 1px,transparent 0,transparent 6px)'}}></div>
                              </div>
                            </a>

                            {/* Info */}
                            <div className="flex-1 min-w-0">
                              <div className="flex items-start justify-between gap-2">
                                <div>
                                  <a href="product-detail.html" className="hover:text-th-green transition-colors">
                                    <h3 className="font-bold text-sm sm:text-base">{item.name}</h3>
                                  </a>
                                  <p className="text-sm text-gray-500 mt-0.5">{item.color} · Size {item.size}</p>
                                  <p className="text-xs text-th-green font-medium mt-1">In Stock · Ships in 1–2 days</p>
                                </div>
                                <button
                                  onClick={() => removeItem(item.id)}
                                  aria-label={`Remove ${item.name} from cart`}
                                  className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all flex-shrink-0"
                                >
                                  <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                              </div>

                              <div className="flex items-center justify-between mt-4">
                                {/* Quantity controls */}
                                <div className="flex items-center border-2 border-gray-200 rounded-xl overflow-hidden">
                                  <button
                                    onClick={() => updateQty(item.id, -1)}
                                    disabled={item.qty <= 1}
                                    aria-label={`Decrease quantity of ${item.name}, currently ${item.qty}`}
                                    className="px-3 py-1.5 text-base font-bold hover:bg-th-beige disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                                  >−</button>
                                  <span aria-live="polite" aria-atomic="true" aria-label={`Quantity of ${item.name}: ${item.qty}`} className="px-3 py-1.5 text-sm font-semibold w-8 text-center">{item.qty}</span>
                                  <button
                                    onClick={() => updateQty(item.id, 1)}
                                    disabled={item.qty >= 10}
                                    aria-label={`Increase quantity of ${item.name}, currently ${item.qty}`}
                                    className="px-3 py-1.5 text-base font-bold hover:bg-th-beige disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                                  >+</button>
                                </div>
                                <p className="font-bold text-th-green">${(item.price * item.qty).toFixed(2)}</p>
                              </div>
                            </div>
                          </div>
                        </li>
                      ))}
                    </ul>

                    {/* Gift wrapping */}
                    <div className="bg-white rounded-2xl p-5 shadow-sm border border-th-beige/60">
                      <h3 className="font-semibold text-sm text-th-charcoal mb-1">Gift Options</h3>
                      <label className="flex items-start gap-3 cursor-pointer group">
                        <input
                          type="checkbox"
                          id="gift-wrap"
                          checked={giftWrap}
                          onChange={e => {
                            setGiftWrap(e.target.checked);
                            setLiveMsg(e.target.checked ? 'Gift wrapping added (+$5.00).' : 'Gift wrapping removed.');
                            setTimeout(() => setLiveMsg(''), 2500);
                          }}
                          className="mt-0.5 w-4 h-4 rounded border-gray-300 text-th-green focus:ring-th-gold"
                          aria-describedby="gift-wrap-desc"
                        />
                        <div>
                          <span className="text-sm font-medium text-th-charcoal group-hover:text-th-green transition-colors">Add gift wrapping <span className="text-th-green font-bold">(+$5.00)</span></span>
                          <p id="gift-wrap-desc" className="text-xs text-gray-500 mt-0.5">Presented in our signature recycled kraft box with a hand-written message card.</p>
                        </div>
                      </label>
                      {giftWrap && (
                        <div className="mt-3 pl-7">
                          <label htmlFor="gift-message" className="text-xs font-medium text-gray-600 block mb-1">Gift message (optional)</label>
                          <textarea
                            id="gift-message"
                            placeholder="Write a personal message…"
                            maxLength={200}
                            rows={3}
                            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:ring-2 focus:ring-th-gold"
                            aria-label="Optional gift message, maximum 200 characters"
                          ></textarea>
                        </div>
                      )}
                    </div>

                    {/* Estimated delivery */}
                    <div className="bg-white rounded-2xl p-5 shadow-sm border border-th-beige/60">
                      <h3 className="font-semibold text-sm text-th-charcoal mb-3">Estimated Delivery</h3>
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-th-green/10 rounded-xl flex items-center justify-center flex-shrink-0" aria-hidden="true">
                          <svg className="w-5 h-5 text-th-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
                        </div>
                        <div>
                          <p className="text-sm font-semibold text-th-charcoal">Standard (Free) — <time dateTime="2025-04-02">April 2–4, 2025</time></p>
                          <p className="text-xs text-gray-500 mt-0.5">Orders placed before 2pm PT ship same day Mon–Fri</p>
                        </div>
                      </div>
                      <div className="mt-3 pt-3 border-t border-th-beige/60 flex items-center gap-3">
                        <div className="w-10 h-10 bg-th-gold/10 rounded-xl flex items-center justify-center flex-shrink-0" aria-hidden="true">
                          <svg className="w-5 h-5 text-th-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                        </div>
                        <div>
                          <p className="text-sm font-semibold text-th-charcoal">Express — <time dateTime="2025-03-29">March 29–30, 2025</time></p>
                          <p className="text-xs text-gray-500 mt-0.5">$12.99 · 1–2 business days</p>
                        </div>
                      </div>
                    </div>

                    {/* Continue shopping */}
                    <a href="products.html" className="inline-flex items-center gap-2 text-th-green font-semibold text-sm hover:underline">
                      <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                      Continue Shopping
                    </a>
                  </div>

                  {/* Order summary sidebar */}
                  <aside aria-labelledby="summary-heading" className="lg:sticky lg:top-24 h-fit">
                    <div className="bg-white rounded-2xl p-6 shadow-sm border border-th-beige/60 space-y-6">
                      <h2 id="summary-heading" className="font-bold text-lg text-th-charcoal">Order Summary</h2>

                      {/* Loyalty points tracker */}
                      <div className="bg-th-green/5 border border-th-green/20 rounded-xl p-4" aria-label="Loyalty rewards points tracker">
                        <div className="flex items-center gap-2 mb-2">
                          <span aria-hidden="true" className="text-lg">⭐</span>
                          <h3 className="font-semibold text-sm text-th-green">ThreadRewards</h3>
                        </div>
                        <p className="text-xs text-gray-600 mb-2">
                          You have <strong className="text-th-green">{loyaltyPoints} points</strong>. Earn <strong className="text-th-green">{Math.round(total)}</strong> more with this order.
                        </p>
                        <p className="text-xs font-medium text-th-charcoal mb-1.5" aria-live="polite">
                          You're <strong className="text-th-green">{pointsToFreebie} points</strong> away from a free tote bag!
                        </p>
                        <div
                          className="bg-gray-200 rounded-full h-2 overflow-hidden"
                          role="progressbar"
                          aria-valuenow={loyaltyPoints}
                          aria-valuemin={0}
                          aria-valuemax={pointsNeeded}
                          aria-label={`Loyalty progress: ${loyaltyPoints} of ${pointsNeeded} points for a free tote`}
                        >
                          <div className="bg-th-gold h-2 rounded-full transition-all" style={{width:`${progressPct}%`}} aria-hidden="true"></div>
                        </div>
                        <div className="flex justify-between text-xs text-gray-400 mt-1">
                          <span>0 pts</span>
                          <span>{pointsNeeded} pts = Free Tote</span>
                        </div>
                      </div>

                      {/* Promo code */}
                      <form onSubmit={applyPromo} aria-label="Apply promo code" noValidate>
                        <h3 className="font-semibold text-sm text-th-charcoal mb-2">Promo Code</h3>
                        <div className="flex gap-2">
                          <div className="flex-1">
                            <label htmlFor="promo-input" className="sr-only">Enter promo code</label>
                            <input
                              id="promo-input"
                              ref={promoInputRef}
                              type="text"
                              value={promoCode}
                              onChange={e => { setPromoCode(e.target.value); setPromoError(''); }}
                              placeholder="e.g. SPRING25"
                              disabled={promoApplied}
                              aria-describedby={promoError ? 'promo-error' : promoApplied ? 'promo-success' : undefined}
                              aria-invalid={!!promoError}
                              className={`w-full border rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-th-gold ${promoError ? 'border-red-400' : 'border-gray-200'} ${promoApplied ? 'bg-gray-50 text-gray-400 cursor-not-allowed' : ''}`}
                            />
                          </div>
                          <button
                            type="submit"
                            disabled={promoApplied || !promoCode.trim()}
                            className="bg-th-green text-white font-semibold px-4 py-2.5 rounded-xl text-sm hover:bg-th-green-h disabled:opacity-50 disabled:cursor-not-allowed transition-colors whitespace-nowrap"
                          >
                            {promoApplied ? 'Applied' : 'Apply'}
                          </button>
                        </div>
                        {promoError && (
                          <p id="promo-error" role="alert" className="text-red-600 text-xs mt-1.5 flex items-center gap-1">
                            <svg aria-hidden="true" className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            {promoError}
                          </p>
                        )}
                        {promoApplied && (
                          <p id="promo-success" className="text-th-green text-xs mt-1.5 flex items-center gap-1" role="status">
                            <svg aria-hidden="true" className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                            SPRING25 applied — 15% off!
                          </p>
                        )}
                      </form>

                      {/* Price breakdown */}
                      <div className="space-y-2 text-sm" aria-label="Price breakdown">
                        <div className="flex justify-between">
                          <span className="text-gray-600">Subtotal ({totalItems} items)</span>
                          <span className="font-medium">${subtotal.toFixed(2)}</span>
                        </div>
                        {promoApplied && (
                          <div className="flex justify-between text-th-green">
                            <span>Discount (SPRING25 −15%)</span>
                            <span className="font-medium">−${discount.toFixed(2)}</span>
                          </div>
                        )}
                        <div className="flex justify-between">
                          <span className="text-gray-600">Shipping</span>
                          <span className={shipping === 0 ? 'text-th-green font-medium' : 'font-medium'}>{shipping === 0 ? 'FREE' : `$${shipping.toFixed(2)}`}</span>
                        </div>
                        {giftWrap && (
                          <div className="flex justify-between">
                            <span className="text-gray-600">Gift wrapping</span>
                            <span className="font-medium">$5.00</span>
                          </div>
                        )}
                        <div className="pt-3 border-t-2 border-th-beige flex justify-between items-center">
                          <span className="font-bold text-base text-th-charcoal">Total</span>
                          <span className="font-extrabold text-xl text-th-green">${total.toFixed(2)}</span>
                        </div>
                        <p className="text-xs text-gray-400 text-center">Taxes calculated at checkout</p>
                      </div>

                      {/* Checkout CTA */}
                      <button
                        className="w-full bg-th-green text-white font-bold py-4 rounded-xl hover:bg-th-green-h transition-colors flex items-center justify-center gap-2"
                        aria-label={`Proceed to checkout — total $${total.toFixed(2)}`}
                        onClick={() => alert('Proceeding to checkout…')}
                      >
                        <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        Checkout Securely
                      </button>

                      {/* Payment icons */}
                      <div className="text-center">
                        <p className="text-xs text-gray-400 mb-2">We accept</p>
                        <div className="flex justify-center gap-2 flex-wrap" aria-label="Accepted payment methods">
                          {['Visa','Mastercard','Amex','Apple Pay','PayPal'].map(p => (
                            <span key={p} className="border border-gray-200 rounded px-2 py-0.5 text-xs font-medium text-gray-500">{p}</span>
                          ))}
                        </div>
                      </div>
                    </div>
                  </aside>
                </div>
              )}
            </section>
          </main>

          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CartPage />);
  </script>
</body>
</html>
