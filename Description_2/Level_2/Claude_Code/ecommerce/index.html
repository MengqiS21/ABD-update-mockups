<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreadHouse — Wear What You Stand For</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'th-green': '#2D4A3E',
            'th-green-h': '#3D6454',
            'th-gold': '#C8A96E',
            'th-cream': '#FAF9F6',
            'th-beige': '#E8DDD0',
            'th-charcoal': '#2A2A2A',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #FAF9F6; color: #2A2A2A; }
    :focus-visible { outline: 3px solid #C8A96E !important; outline-offset: 2px !important; }
    .skip-link { position: absolute; top: -48px; left: 8px; background: #2D4A3E; color: #fff; padding: 10px 18px; z-index: 9999; border-radius: 4px; font-weight: 600; transition: top 0.15s; text-decoration: none; }
    .skip-link:focus { top: 8px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    .scroll-x { display: flex; overflow-x: auto; gap: 1.25rem; padding-bottom: 1rem; scroll-snap-type: x mandatory; scrollbar-width: thin; scrollbar-color: #C8A96E #E8DDD0; }
    .scroll-x > * { scroll-snap-align: start; flex-shrink: 0; }
    @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    .marquee-inner { display:flex; animation: marquee 22s linear infinite; }
    .marquee-inner:hover { animation-play-state: paused; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── Shared Header ─────────────────────────────────────────── */
    function Header({ current = 'home' }) {
      const [cartCount] = useState(2);
      const [menuOpen, setMenuOpen] = useState(false);
      const [searchOpen, setSearchOpen] = useState(false);
      const searchRef = useRef(null);
      const menuBtnRef = useRef(null);

      useEffect(() => {
        if (searchOpen) searchRef.current?.focus();
      }, [searchOpen]);

      const navLinks = [
        { label: 'Home', href: 'index.html', key: 'home' },
        { label: 'Shop', href: 'products.html', key: 'shop' },
        { label: 'Collections', href: 'products.html', key: 'collections' },
        { label: 'Sale', href: 'products.html', key: 'sale' },
      ];

      return (
        <header className="sticky top-0 z-50 shadow-md">
          {/* Announcement bar */}
          <div className="bg-th-gold text-th-charcoal text-xs text-center py-2 px-4 font-medium" role="banner" aria-label="Promotional announcement">
            Free shipping on orders over $75 &nbsp;·&nbsp; Code <strong>SPRING25</strong> for 15% off
          </div>

          <div className="bg-th-green text-white">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex items-center justify-between h-16 gap-4">
                {/* Logo */}
                <a href="index.html" className="flex-shrink-0 font-extrabold text-xl sm:text-2xl tracking-tight" aria-label="ThreadHouse – Go to homepage">
                  THREAD<span className="text-th-gold">HOUSE</span>
                </a>

                {/* Desktop nav */}
                <nav aria-label="Main navigation" className="hidden md:block">
                  <ul className="flex space-x-6" role="list">
                    {navLinks.map(l => (
                      <li key={l.key}>
                        <a
                          href={l.href}
                          className={`text-sm font-medium transition-colors hover:text-th-gold ${current === l.key ? 'text-th-gold border-b-2 border-th-gold pb-0.5' : ''}`}
                          aria-current={current === l.key ? 'page' : undefined}
                        >{l.label}</a>
                      </li>
                    ))}
                  </ul>
                </nav>

                {/* Search + actions */}
                <div className="flex items-center gap-2 sm:gap-3">
                  {searchOpen ? (
                    <div className="flex items-center gap-1" role="search">
                      <label htmlFor="site-search" className="sr-only">Search products</label>
                      <input
                        ref={searchRef}
                        id="site-search"
                        type="search"
                        placeholder="Search…"
                        className="bg-white/10 border border-white/30 text-white placeholder-white/60 rounded px-3 py-1.5 text-sm w-40 sm:w-56 focus:bg-white/20"
                        onKeyDown={e => e.key === 'Escape' && setSearchOpen(false)}
                      />
                      <button onClick={() => setSearchOpen(false)} aria-label="Close search" className="p-1.5 hover:text-th-gold transition-colors">
                        <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                      </button>
                    </div>
                  ) : (
                    <button onClick={() => setSearchOpen(true)} aria-label="Open product search" className="p-1.5 hover:text-th-gold transition-colors">
                      <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </button>
                  )}

                  <a href="cart.html" className="relative p-1.5 hover:text-th-gold transition-colors" aria-label={`Shopping cart — ${cartCount} items`}>
                    <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                    <span aria-hidden="true" className="absolute -top-1 -right-1 bg-th-gold text-th-charcoal text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center leading-none">{cartCount}</span>
                  </a>

                  <a href="account.html" className="p-1.5 hover:text-th-gold transition-colors" aria-label="My account">
                    <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                  </a>

                  {/* Mobile menu button */}
                  <button
                    ref={menuBtnRef}
                    className="md:hidden p-1.5 hover:text-th-gold transition-colors"
                    aria-expanded={menuOpen}
                    aria-controls="mobile-menu"
                    aria-label={menuOpen ? 'Close navigation menu' : 'Open navigation menu'}
                    onClick={() => setMenuOpen(o => !o)}
                  >
                    {menuOpen
                      ? <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                      : <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>}
                  </button>
                </div>
              </div>
            </div>

            {/* Mobile menu */}
            {menuOpen && (
              <nav id="mobile-menu" aria-label="Mobile navigation">
                <ul className="bg-th-green-h border-t border-white/10 px-4 py-3 space-y-1" role="list">
                  {navLinks.map(l => (
                    <li key={l.key}>
                      <a href={l.href} className="block py-2 text-sm font-medium hover:text-th-gold transition-colors" aria-current={current === l.key ? 'page' : undefined}>{l.label}</a>
                    </li>
                  ))}
                </ul>
              </nav>
            )}
          </div>
        </header>
      );
    }

    /* ── Shared Footer ─────────────────────────────────────────── */
    function Footer() {
      return (
        <footer className="bg-th-charcoal text-white mt-20" role="contentinfo">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
              {/* Brand */}
              <div>
                <p className="font-extrabold text-xl mb-2 text-white">THREAD<span className="text-th-gold">HOUSE</span></p>
                <p className="text-sm text-white/60 leading-relaxed">Sustainable fashion for a generation that refuses to compromise on style or values.</p>
                <div className="flex gap-3 mt-4">
                  {['Instagram','TikTok','Pinterest'].map(s => (
                    <a key={s} href="#" aria-label={`ThreadHouse on ${s}`} className="text-white/50 hover:text-th-gold transition-colors text-xs border border-white/20 rounded px-2 py-1">{s}</a>
                  ))}
                </div>
              </div>
              {/* Shop */}
              <nav aria-label="Shop navigation">
                <h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Shop</h2>
                <ul className="space-y-2" role="list">
                  {['New Arrivals','Tops','Bottoms','Outerwear','Accessories','Sale'].map(l => (
                    <li key={l}><a href="products.html" className="text-sm text-white/60 hover:text-white transition-colors">{l}</a></li>
                  ))}
                </ul>
              </nav>
              {/* Help */}
              <nav aria-label="Help navigation">
                <h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Help</h2>
                <ul className="space-y-2" role="list">
                  {['Size Guide','Shipping & Returns','Sustainability','FAQ','Contact Us'].map(l => (
                    <li key={l}><a href="#" className="text-sm text-white/60 hover:text-white transition-colors">{l}</a></li>
                  ))}
                </ul>
              </nav>
              {/* Newsletter */}
              <div>
                <h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Stay in the Loop</h2>
                <p className="text-sm text-white/60 mb-3">New drops, style tips, and exclusive offers straight to your inbox.</p>
                <form aria-label="Email newsletter subscription" onSubmit={e => { e.preventDefault(); alert('Subscribed!'); }}>
                  <label htmlFor="footer-email" className="sr-only">Email address</label>
                  <input
                    id="footer-email"
                    type="email"
                    required
                    aria-required="true"
                    placeholder="your@email.com"
                    className="w-full bg-white/10 border border-white/20 text-white placeholder-white/40 rounded px-3 py-2 text-sm mb-2 focus:bg-white/15"
                  />
                  <button type="submit" className="w-full bg-th-gold text-th-charcoal font-semibold text-sm rounded px-4 py-2 hover:bg-th-gold/90 transition-colors">Subscribe</button>
                </form>
              </div>
            </div>
            <div className="border-t border-white/10 mt-10 pt-6 flex flex-col sm:flex-row justify-between items-center gap-4">
              <p className="text-xs text-white/40">© 2025 ThreadHouse. All rights reserved.</p>
              <div className="flex gap-6">
                {['Privacy Policy','Terms of Use','Accessibility'].map(l => (
                  <a key={l} href="#" className="text-xs text-white/40 hover:text-white transition-colors">{l}</a>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    }

    /* ── ARIA Live Region ──────────────────────────────────────── */
    function LiveRegion({ message }) {
      return (
        <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">
          {message}
        </div>
      );
    }

    /* ── Product Card ──────────────────────────────────────────── */
    const GRADIENTS = [
      'from-emerald-200 to-teal-300','from-amber-100 to-amber-300','from-slate-200 to-slate-400',
      'from-rose-100 to-rose-300','from-sky-200 to-blue-300','from-violet-200 to-purple-300',
      'from-lime-200 to-green-300','from-orange-100 to-orange-300',
    ];

    function ProductCard({ product, onAddToCart }) {
      const grad = GRADIENTS[product.id % GRADIENTS.length];
      return (
        <article className="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow group" aria-label={product.name}>
          <a href="product-detail.html" aria-label={`View details for ${product.name} in ${product.color}`} className="block">
            <div className={`bg-gradient-to-br ${grad} aspect-[3/4] flex items-center justify-center relative overflow-hidden`} role="img" aria-label={`${product.name} product photo`}>
              {/* Fabric texture overlay */}
              <div className="absolute inset-0 opacity-10" style={{backgroundImage:'repeating-linear-gradient(45deg,#000 0,#000 1px,transparent 0,transparent 50%)',backgroundSize:'6px 6px'}} aria-hidden="true"></div>
              <svg aria-hidden="true" className="w-16 h-16 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z" /></svg>
              {product.badge && (
                <span className="absolute top-3 left-3 bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full" aria-label={`Badge: ${product.badge}`}>{product.badge}</span>
              )}
              {product.isNew && (
                <span className="absolute top-3 right-3 bg-th-green text-white text-xs font-bold px-2 py-0.5 rounded-full" aria-label="New arrival">New</span>
              )}
            </div>
          </a>
          <div className="p-4">
            <a href="product-detail.html" className="hover:text-th-green transition-colors">
              <h3 className="font-semibold text-sm">{product.name}</h3>
            </a>
            <p className="text-xs text-gray-500 mt-0.5">{product.color}</p>
            <div className="flex items-center justify-between mt-3">
              <p className="font-bold text-th-green">${product.price.toFixed(2)}</p>
              <button
                onClick={() => onAddToCart(product)}
                className="bg-th-green text-white text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-th-green-h transition-colors focus:bg-th-green-h"
                aria-label={`Add ${product.name} to cart`}
              >Add to Cart</button>
            </div>
          </div>
        </article>
      );
    }

    /* ── Homepage ──────────────────────────────────────────────── */
    const NEW_ARRIVALS = [
      { id: 1,  name: 'Oversized Linen Shirt',    color: 'Sage Green',  price: 89,  badge: 'Low Stock', isNew: true  },
      { id: 2,  name: 'Wide-Leg Trousers',         color: 'Oatmeal',     price: 115, badge: null,        isNew: true  },
      { id: 3,  name: 'Cropped Utility Jacket',    color: 'Warm Stone',  price: 165, badge: 'Low Stock', isNew: false },
      { id: 4,  name: 'Relaxed Fit Tee',           color: 'Chalk White', price: 45,  badge: null,        isNew: true  },
      { id: 5,  name: 'High-Waist Denim',          color: 'Indigo Wash', price: 98,  badge: null,        isNew: false },
      { id: 6,  name: 'Ribbed Knit Cardigan',      color: 'Dusty Mauve', price: 120, badge: 'Low Stock', isNew: true  },
    ];

    const MOODS = [
      { label: 'Minimalist', desc: 'Clean lines, quiet luxury',  grad: 'from-stone-200 to-stone-400' },
      { label: 'Streetwear', desc: 'Bold, expressive, urban',    grad: 'from-slate-700 to-slate-900' },
      { label: 'Workwear',   desc: 'Sharp, polished, confident', grad: 'from-th-green to-teal-800'   },
      { label: 'Weekend',    desc: 'Easy, breezy, effortless',   grad: 'from-amber-200 to-orange-300' },
    ];

    function HomePage() {
      const [liveMsg, setLiveMsg] = useState('');

      function handleAddToCart(product) {
        setLiveMsg(`${product.name} has been added to your cart.`);
        setTimeout(() => setLiveMsg(''), 3000);
      }

      return (
        <>
          <Header current="home" />
          <LiveRegion message={liveMsg} />

          <main id="main-content" tabIndex={-1}>
            {/* ── Hero ──────────────────────────────── */}
            <section
              aria-labelledby="hero-heading"
              className="relative min-h-[88vh] flex items-end pb-20 overflow-hidden"
              style={{ background: 'linear-gradient(135deg, #0f1e1a 0%, #2D4A3E 45%, #3d6e5e 80%, #1a3028 100%)' }}
            >
              {/* Decorative texture */}
              <div aria-hidden="true" className="absolute inset-0 opacity-5" style={{backgroundImage:'repeating-linear-gradient(0deg,#fff 0,#fff 1px,transparent 0,transparent 40px),repeating-linear-gradient(90deg,#fff 0,#fff 1px,transparent 0,transparent 40px)'}}></div>

              {/* Floating leaf shapes */}
              {[
                {top:'10%',right:'15%',w:'280px',op:'0.08',rot:'15deg'},
                {top:'30%',right:'5%',w:'180px',op:'0.06',rot:'-10deg'},
                {top:'60%',left:'5%',w:'220px',op:'0.06',rot:'20deg'},
              ].map((s,i) => (
                <div key={i} aria-hidden="true" className="absolute rounded-full bg-th-gold" style={{top:s.top,right:s.right,left:s.left,width:s.w,height:s.w,opacity:s.op,transform:`rotate(${s.rot})`}}></div>
              ))}

              <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
                <div className="max-w-2xl">
                  <span className="inline-block text-th-gold text-xs font-semibold tracking-[0.25em] uppercase mb-4">Spring / Summer 2025</span>
                  <h1 id="hero-heading" className="text-5xl sm:text-6xl lg:text-7xl font-extrabold text-white leading-tight">
                    Wear What<br />You Stand For.
                  </h1>
                  <p className="mt-6 text-lg text-white/70 max-w-md leading-relaxed">
                    New Spring Collection — conscious fashion that wears its values on its sleeve. Sustainably made, independently designed.
                  </p>
                  <div className="mt-8 flex flex-wrap gap-4">
                    <a href="products.html" className="bg-th-gold text-th-charcoal font-bold px-8 py-4 rounded-xl hover:bg-th-gold/90 transition-all text-sm tracking-wide shadow-lg shadow-th-gold/30">
                      Shop the Collection
                    </a>
                    <a href="#brand-story" className="border-2 border-white/30 text-white font-semibold px-8 py-4 rounded-xl hover:border-white/60 transition-all text-sm">
                      Our Story
                    </a>
                  </div>
                </div>
              </div>

              {/* Scroll indicator */}
              <div aria-hidden="true" className="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 text-white/30 text-xs">
                <span>Scroll</span>
                <svg className="w-4 h-4 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
              </div>
            </section>

            {/* ── Marquee ticker ──────────────────── */}
            <div className="bg-th-gold py-2.5 overflow-hidden" aria-label="Site highlights" role="region">
              <div aria-hidden="true" className="marquee-inner text-th-charcoal text-xs font-semibold tracking-widest uppercase whitespace-nowrap">
                {Array(4).fill(['Free Returns · Organic Cotton · B-Corp Certified · Carbon Neutral Shipping · Size XS–XXL · Ethically Crafted · 1% for the Planet ·']).flat().map((t,i) => <span key={i} className="mx-6">{t}</span>)}
              </div>
            </div>

            {/* ── Shop by Mood ────────────────────── */}
            <section aria-labelledby="mood-heading" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
              <div className="text-center mb-10">
                <h2 id="mood-heading" className="text-3xl font-bold text-th-charcoal">Shop by Mood</h2>
                <p className="text-gray-500 mt-2">Find pieces that match your energy today.</p>
              </div>
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                {MOODS.map(mood => (
                  <a
                    key={mood.label}
                    href="products.html"
                    className={`relative rounded-2xl overflow-hidden aspect-[4/5] flex flex-col justify-end p-6 bg-gradient-to-br ${mood.grad} group focus:outline-none`}
                    aria-label={`Shop ${mood.label} style — ${mood.desc}`}
                  >
                    <div aria-hidden="true" className="absolute inset-0 bg-black/25 group-hover:bg-black/35 transition-colors"></div>
                    <div className="relative">
                      <p className="text-white font-bold text-lg">{mood.label}</p>
                      <p className="text-white/75 text-xs mt-1">{mood.desc}</p>
                    </div>
                    <div aria-hidden="true" className="absolute top-4 right-4 w-8 h-8 border-2 border-white/40 rounded-full flex items-center justify-center group-hover:border-white/80 transition-colors">
                      <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                    </div>
                  </a>
                ))}
              </div>
            </section>

            {/* ── New Arrivals ─────────────────────── */}
            <section aria-labelledby="arrivals-heading" className="bg-th-beige/40 py-20">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="flex items-end justify-between mb-8">
                  <div>
                    <h2 id="arrivals-heading" className="text-3xl font-bold text-th-charcoal">New Arrivals</h2>
                    <p className="text-gray-500 mt-1 text-sm">Fresh styles, crafted for the season.</p>
                  </div>
                  <a href="products.html" className="text-th-green font-semibold text-sm hover:underline flex items-center gap-1">
                    View all <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                  </a>
                </div>

                <div className="scroll-x" role="list" aria-label="New arrivals product list">
                  {NEW_ARRIVALS.map(p => (
                    <div key={p.id} className="w-56 sm:w-64" role="listitem">
                      <ProductCard product={p} onAddToCart={handleAddToCart} />
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* ── Brand Story ──────────────────────── */}
            <section id="brand-story" aria-labelledby="story-heading" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24">
              <div className="grid lg:grid-cols-2 gap-16 items-center">
                <div>
                  <span className="text-th-gold text-xs font-bold tracking-widest uppercase">Who we are</span>
                  <h2 id="story-heading" className="mt-3 text-4xl font-extrabold text-th-charcoal leading-tight">
                    Fashion That Gives<br />a Damn.
                  </h2>
                  <p className="mt-6 text-gray-600 leading-relaxed">
                    ThreadHouse started as a small studio in Portland with a single question: <em>why does choosing ethical fashion mean sacrificing style?</em> We partner with independent designers and small-batch manufacturers to create clothing that's as good for the planet as it looks on you.
                  </p>
                  <p className="mt-4 text-gray-600 leading-relaxed">
                    Every ThreadHouse piece is made from certified organic or recycled materials, produced in fair-wage facilities, and shipped carbon-neutrally. We're a B-Corp, and proud of it.
                  </p>
                  <a href="#" className="inline-flex items-center gap-2 mt-8 bg-th-green text-white font-semibold px-7 py-3.5 rounded-xl hover:bg-th-green-h transition-colors">
                    Our Mission
                    <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
                  </a>
                </div>

                <div className="grid grid-cols-2 gap-4" aria-hidden="true">
                  {[
                    {grad:'from-emerald-200 to-teal-400',label:'100% Sustainable Materials'},
                    {grad:'from-amber-200 to-amber-400',label:'Independent Designers'},
                    {grad:'from-sky-200 to-blue-300',label:'Carbon Neutral Shipping'},
                    {grad:'from-rose-200 to-rose-400',label:'Fair Wage Certified'},
                  ].map((item, i) => (
                    <div key={i} className={`rounded-2xl bg-gradient-to-br ${item.grad} aspect-square flex items-end p-4`}>
                      <p className="text-white font-semibold text-xs leading-tight">{item.label}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* ── Stats bar ────────────────────────── */}
            <section aria-labelledby="stats-heading" className="bg-th-green text-white py-14">
              <h2 id="stats-heading" className="sr-only">ThreadHouse impact numbers</h2>
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                  {[
                    {num:'42K+',label:'Community Members'},
                    {num:'120+',label:'Independent Designers'},
                    {num:'98%',label:'Sustainable Materials'},
                    {num:'1%',label:'Revenue to Planet'},
                  ].map(stat => (
                    <div key={stat.label}>
                      <p className="text-4xl font-extrabold text-th-gold">{stat.num}</p>
                      <p className="text-sm text-white/70 mt-1">{stat.label}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* ── Instagram-style feed teaser ──────── */}
            <section aria-labelledby="community-heading" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
              <div className="text-center mb-8">
                <h2 id="community-heading" className="text-3xl font-bold text-th-charcoal">Styled by You</h2>
                <p className="text-gray-500 mt-2 text-sm">Tag <strong>#ThreadHouseStyle</strong> to be featured</p>
              </div>
              <div className="grid grid-cols-3 sm:grid-cols-6 gap-2" role="list" aria-label="Customer style photos">
                {[...Array(6)].map((_, i) => (
                  <div
                    key={i}
                    role="listitem"
                    className={`aspect-square rounded-lg bg-gradient-to-br ${GRADIENTS[i]} cursor-pointer hover:opacity-90 transition-opacity relative overflow-hidden`}
                    aria-label={`Customer style photo ${i + 1}`}
                    tabIndex={0}
                    onKeyDown={e => e.key === 'Enter' && null}
                  >
                    <div aria-hidden="true" className="absolute inset-0 opacity-10" style={{backgroundImage:'repeating-linear-gradient(45deg,#000 0,#000 1px,transparent 0,transparent 6px)'}}></div>
                  </div>
                ))}
              </div>
            </section>
          </main>

          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HomePage />);
  </script>
</body>
</html>
