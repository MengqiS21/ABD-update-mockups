<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreadHouse — Shop All Products</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'th-green': '#2D4A3E',
            'th-green-h': '#3D6454',
            'th-gold': '#C8A96E',
            'th-cream': '#FAF9F6',
            'th-beige': '#E8DDD0',
            'th-charcoal': '#2A2A2A',
          }

  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #FAF9F6; color: #2A2A2A; }
    :focus-visible { outline: 3px solid #C8A96E !important; outline-offset: 2px !important; }
    .skip-link { position: absolute; top: -48px; left: 8px; background: #2D4A3E; color: #fff; padding: 10px 18px; z-index: 9999; border-radius: 4px; font-weight: 600; transition: top 0.15s; text-decoration: none; }
    .skip-link:focus { top: 8px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    .filter-panel { transition: transform 0.25s ease, opacity 0.25s ease; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    /* ── Shared Header ─────────────────────────────────────────── */
    function Header({ current = '' }) {
      const [cartCount] = useState(2);
      const [menuOpen, setMenuOpen] = useState(false);
      const [searchOpen, setSearchOpen] = useState(false);
      const searchRef = useRef(null);

      useEffect(() => { if (searchOpen) searchRef.current?.focus(); }, [searchOpen]);

      const navLinks = [
        { label: 'Home', href: 'index.html', key: 'home' },
        { label: 'Shop', href: 'products.html', key: 'shop' },
        { label: 'Collections', href: 'products.html', key: 'collections' },
        { label: 'Sale', href: 'products.html', key: 'sale' },
      ];

      return (
        <header className="sticky top-0 z-50 shadow-md">
          <div className="bg-th-gold text-th-charcoal text-xs text-center py-2 px-4 font-medium" role="banner" aria-label="Promotional announcement">
            Free shipping on orders over $75 &nbsp;·&nbsp; Code <strong>SPRING25</strong> for 15% off
          </div>
          <div className="bg-th-green text-white">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex items-center justify-between h-16 gap-4">
                <a href="index.html" className="flex-shrink-0 font-extrabold text-xl sm:text-2xl tracking-tight" aria-label="ThreadHouse – Go to homepage">THREAD<span className="text-th-gold">HOUSE</span></a>
                <nav aria-label="Main navigation" className="hidden md:block">
                  <ul className="flex space-x-6" role="list">
                    {navLinks.map(l => (
                      <li key={l.key}>
                        <a href={l.href} className={`text-sm font-medium transition-colors hover:text-th-gold ${current === l.key ? 'text-th-gold border-b-2 border-th-gold pb-0.5' : ''}`} aria-current={current === l.key ? 'page' : undefined}>{l.label}</a>
                      </li>
                    ))}
                  </ul>
                </nav>
                <div className="flex items-center gap-2 sm:gap-3">
                  {searchOpen ? (
                    <div className="flex items-center gap-1" role="search">
                      <label htmlFor="site-search" className="sr-only">Search products</label>
                      <input ref={searchRef} id="site-search" type="search" placeholder="Search…" className="bg-white/10 border border-white/30 text-white placeholder-white/60 rounded px-3 py-1.5 text-sm w-40 sm:w-56" onKeyDown={e => e.key === 'Escape' && setSearchOpen(false)} />
                      <button onClick={() => setSearchOpen(false)} aria-label="Close search" className="p-1.5 hover:text-th-gold transition-colors"><svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
                    </div>
                  ) : (
                    <button onClick={() => setSearchOpen(true)} aria-label="Open product search" className="p-1.5 hover:text-th-gold transition-colors"><svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></button>
                  )}
                  <a href="cart.html" className="relative p-1.5 hover:text-th-gold transition-colors" aria-label={`Shopping cart — ${cartCount} items`}>
                    <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                    <span aria-hidden="true" className="absolute -top-1 -right-1 bg-th-gold text-th-charcoal text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center">{cartCount}</span>
                  </a>
                  <a href="account.html" className="p-1.5 hover:text-th-gold transition-colors" aria-label="My account"><svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></a>
                  <button className="md:hidden p-1.5 hover:text-th-gold transition-colors" aria-expanded={menuOpen} aria-controls="mobile-menu" aria-label={menuOpen ? 'Close navigation menu' : 'Open navigation menu'} onClick={() => setMenuOpen(o => !o)}>
                    <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
                  </button>
                </div>
              </div>
            </div>
            {menuOpen && (
              <nav id="mobile-menu" aria-label="Mobile navigation">
                <ul className="bg-th-green-h border-t border-white/10 px-4 py-3 space-y-1" role="list">
                  {navLinks.map(l => <li key={l.key}><a href={l.href} className="block py-2 text-sm font-medium hover:text-th-gold transition-colors">{l.label}</a></li>)}
                </ul>
              </nav>
            )}
          </div>
        </header>
      );
    }

    /* ── Shared Footer ─────────────────────────────────────────── */
    function Footer() {
      return (
        <footer className="bg-th-charcoal text-white mt-20" role="contentinfo">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
              <div>
                <p className="font-extrabold text-xl mb-2">THREAD<span className="text-th-gold">HOUSE</span></p>
                <p className="text-sm text-white/60 leading-relaxed">Sustainable fashion for a generation that refuses to compromise on style or values.</p>
              </div>
              <nav aria-label="Shop navigation"><h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Shop</h2><ul className="space-y-2" role="list">{['New Arrivals','Tops','Bottoms','Outerwear','Accessories','Sale'].map(l=><li key={l}><a href="products.html" className="text-sm text-white/60 hover:text-white transition-colors">{l}</a></li>)}</ul></nav>
              <nav aria-label="Help navigation"><h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Help</h2><ul className="space-y-2" role="list">{['Size Guide','Shipping & Returns','Sustainability','FAQ','Contact Us'].map(l=><li key={l}><a href="#" className="text-sm text-white/60 hover:text-white transition-colors">{l}</a></li>)}</ul></nav>
              <div>
                <h2 className="font-semibold text-sm uppercase tracking-wider text-th-gold mb-4">Stay in the Loop</h2>
                <form aria-label="Email newsletter subscription" onSubmit={e=>{e.preventDefault();alert('Subscribed!');}}>
                  <label htmlFor="footer-email" className="sr-only">Email address</label>
                  <input id="footer-email" type="email" required aria-required="true" placeholder="your@email.com" className="w-full bg-white/10 border border-white/20 text-white placeholder-white/40 rounded px-3 py-2 text-sm mb-2" />
                  <button type="submit" className="w-full bg-th-gold text-th-charcoal font-semibold text-sm rounded px-4 py-2 hover:bg-th-gold/90 transition-colors">Subscribe</button>
                </form>
              </div>
            </div>
            <div className="border-t border-white/10 mt-10 pt-6 flex flex-col sm:flex-row justify-between items-center gap-4">
              <p className="text-xs text-white/40">© 2025 ThreadHouse. All rights reserved.</p>
              <div className="flex gap-6">{['Privacy Policy','Terms of Use','Accessibility'].map(l=><a key={l} href="#" className="text-xs text-white/40 hover:text-white transition-colors">{l}</a>)}</div>
            </div>
          </div>
        </footer>
      );
    }

    /* ── Product data ──────────────────────────────────────────── */
    const GRADS = [
      'from-emerald-200 to-teal-300','from-amber-100 to-amber-300','from-slate-200 to-slate-400',
      'from-rose-100 to-rose-300','from-sky-200 to-blue-300','from-violet-200 to-purple-300',
      'from-lime-200 to-green-300','from-orange-100 to-orange-300',
    ];

    const ALL_PRODUCTS = [
      { id:1,  name:'Oversized Linen Shirt',     color:'Sage Green',    price:89,  badge:'Low Stock', category:'Tops',       sizes:['XS','S','M'],        material:'Organic Linen',         isNew:true  },
      { id:2,  name:'Wide-Leg Trousers',          color:'Oatmeal',       price:115, badge:null,        category:'Bottoms',    sizes:['XS','S','M','L'],    material:'Recycled Cotton',        isNew:true  },
      { id:3,  name:'Cropped Utility Jacket',     color:'Warm Stone',    price:165, badge:'Low Stock', category:'Outerwear',  sizes:['S','M','L'],         material:'Organic Cotton',         isNew:false },
      { id:4,  name:'Relaxed Fit Tee',            color:'Chalk White',   price:45,  badge:null,        category:'Tops',       sizes:['XS','S','M','L','XL','XXL'], material:'Organic Cotton', isNew:true  },
      { id:5,  name:'High-Waist Denim',           color:'Indigo Wash',   price:98,  badge:null,        category:'Bottoms',    sizes:['XS','S','M','L'],    material:'Recycled Polyester',     isNew:false },
      { id:6,  name:'Ribbed Knit Cardigan',       color:'Dusty Mauve',   price:120, badge:'Low Stock', category:'Tops',       sizes:['XS','S','M'],        material:'Organic Cotton',         isNew:true  },
      { id:7,  name:'Linen Blazer',               color:'Sand Dune',     price:195, badge:null,        category:'Outerwear',  sizes:['S','M','L','XL'],    material:'Organic Linen',          isNew:false },
      { id:8,  name:'Cargo Trousers',             color:'Forest Green',  price:135, badge:null,        category:'Bottoms',    sizes:['XS','S','M','L','XL'], material:'Recycled Cotton',       isNew:true  },
      { id:9,  name:'Fitted Turtleneck',          color:'Charcoal',      price:68,  badge:null,        category:'Tops',       sizes:['XS','S','M','L'],    material:'Organic Cotton',         isNew:false },
      { id:10, name:'Pleated Midi Skirt',         color:'Terracotta',    price:88,  badge:'Low Stock', category:'Bottoms',    sizes:['XS','S','M'],        material:'Organic Linen',          isNew:true  },
      { id:11, name:'Structured Tote',            color:'Natural Tan',   price:75,  badge:null,        category:'Accessories',sizes:[],                    material:'Recycled Polyester',     isNew:false },
      { id:12, name:'Canvas Bucket Hat',          color:'Sage',          price:38,  badge:null,        category:'Accessories',sizes:[],                    material:'Organic Cotton',         isNew:true  },
      { id:13, name:'Drop-Shoulder Hoodie',       color:'Slate Blue',    price:95,  badge:null,        category:'Tops',       sizes:['S','M','L','XL','XXL'], material:'Organic Cotton',      isNew:false },
      { id:14, name:'Stretch Bike Shorts',        color:'Jet Black',     price:58,  badge:null,        category:'Bottoms',    sizes:['XS','S','M','L'],    material:'Recycled Polyester',     isNew:true  },
      { id:15, name:'Woven Belt Bag',             color:'Cognac Brown',  price:52,  badge:'Low Stock', category:'Accessories',sizes:[],                    material:'Recycled Polyester',     isNew:false },
      { id:16, name:'Merino Crewneck',            color:'Oat',           price:145, badge:null,        category:'Tops',       sizes:['XS','S','M','L'],    material:'Organic Cotton',         isNew:true  },
      { id:17, name:'Tailored Shorts',            color:'Navy',          price:79,  badge:null,        category:'Bottoms',    sizes:['XS','S','M','L','XL'], material:'Organic Cotton',        isNew:false },
      { id:18, name:'Longline Raincoat',          color:'Olive',         price:245, badge:null,        category:'Outerwear',  sizes:['S','M','L','XL'],    material:'Recycled Polyester',     isNew:true  },
      { id:19, name:'Striped Linen Shirt',        color:'Blue/White',    price:82,  badge:null,        category:'Tops',       sizes:['XS','S','M','L','XL','XXL'], material:'Organic Linen', isNew:false },
      { id:20, name:'Knit Bucket Hat',            color:'Cream',         price:42,  badge:'Low Stock', category:'Accessories',sizes:[],                    material:'Organic Cotton',         isNew:true  },
      { id:21, name:'Flared Leg Jeans',           color:'Light Wash',    price:108, badge:null,        category:'Bottoms',    sizes:['XS','S','M','L'],    material:'Recycled Polyester',     isNew:false },
      { id:22, name:'Utility Vest',               color:'Khaki',         price:88,  badge:null,        category:'Outerwear',  sizes:['S','M','L'],         material:'Organic Cotton',         isNew:true  },
      { id:23, name:'Cropped Cami',               color:'Blush Pink',    price:38,  badge:null,        category:'Tops',       sizes:['XS','S','M','L'],    material:'Organic Cotton',         isNew:false },
      { id:24, name:'Wide-Brim Sun Hat',          color:'Straw Natural', price:55,  badge:'Low Stock', category:'Accessories',sizes:[],                    material:'Organic Linen',          isNew:true  },
    ];

    const COLOR_SWATCHES = [
      { name:'Green',  hex:'#6B8F71' },
      { name:'White',  hex:'#F5F5F0' },
      { name:'Black',  hex:'#1A1A1A' },
      { name:'Tan',    hex:'#C4A882' },
      { name:'Blue',   hex:'#5B7FA6' },
      { name:'Pink',   hex:'#D9A5A5' },
      { name:'Olive',  hex:'#7A8A4E' },
      { name:'Mauve',  hex:'#B88E9D' },
    ];

    /* ── Products Page ─────────────────────────────────────────── */
    function ProductsPage() {
      const [filters, setFilters] = useState({
        categories: [],
        sizes: [],
        colors: [],
        materials: [],
        priceMin: 0,
        priceMax: 300,
      });
      const [sortBy, setSortBy] = useState('featured');
      const [styleMatch, setStyleMatch] = useState(false);
      const [mobileFiltersOpen, setMobileFiltersOpen] = useState(false);
      const [liveMsg, setLiveMsg] = useState('');
      const [cartCount, setCartCount] = useState(2);
      const filterPanelRef = useRef(null);
      const filterBtnRef = useRef(null);

      useEffect(() => {
        if (mobileFiltersOpen) filterPanelRef.current?.focus();
        else filterBtnRef.current?.focus();
      }, [mobileFiltersOpen]);

      function toggleArrayFilter(key, val) {
        setFilters(prev => {
          const arr = prev[key];
          const next = arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val];
          return { ...prev, [key]: next };
        });
      }

      const filteredProducts = useMemo(() => {
        let result = ALL_PRODUCTS.filter(p => {
          if (filters.categories.length && !filters.categories.includes(p.category)) return false;
          if (filters.sizes.length && !filters.sizes.some(s => p.sizes.includes(s))) return false;
          if (filters.materials.length && !filters.materials.includes(p.material)) return false;
          if (p.price < filters.priceMin || p.price > filters.priceMax) return false;
          return true;
        });
        if (sortBy === 'price-asc') result = [...result].sort((a,b) => a.price - b.price);
        if (sortBy === 'price-desc') result = [...result].sort((a,b) => b.price - a.price);
        if (sortBy === 'newest') result = [...result].filter(p => p.isNew).concat(result.filter(p => !p.isNew));
        return result;
      }, [filters, sortBy]);

      function handleAddToCart(product) {
        setCartCount(c => c + 1);
        setLiveMsg(`${product.name} has been added to your cart.`);
        setTimeout(() => setLiveMsg(''), 3000);
      }

      function clearFilters() {
        setFilters({ categories: [], sizes: [], colors: [], materials: [], priceMin: 0, priceMax: 300 });
        setLiveMsg('All filters cleared.');
        setTimeout(() => setLiveMsg(''), 2000);
      }

      const hasFilters = filters.categories.length || filters.sizes.length || filters.colors.length || filters.materials.length;

      const FilterPanel = () => (
        <aside aria-label="Product filters" className="w-full">
          <div className="flex items-center justify-between mb-6">
            <h2 className="font-bold text-lg text-th-charcoal">Filters</h2>
            {hasFilters ? (
              <button onClick={clearFilters} className="text-th-green text-xs font-semibold underline hover:no-underline" aria-label="Clear all active filters">Clear all</button>
            ) : null}
          </div>

          {/* Style Match toggle */}
          <div className="mb-6 pb-6 border-b border-th-beige">
            <div className="flex items-center justify-between">
              <label htmlFor="style-match-toggle" className="font-semibold text-sm text-th-charcoal cursor-pointer">
                Style Match
                <span className="block text-xs text-gray-500 font-normal mt-0.5">Show as curated outfits</span>
              </label>
              <button
                id="style-match-toggle"
                role="switch"
                aria-checked={styleMatch}
                onClick={() => setStyleMatch(s => !s)}
                className={`relative inline-flex items-center w-12 h-6 rounded-full transition-colors focus:ring-2 focus:ring-th-gold focus:ring-offset-2 ${styleMatch ? 'bg-th-green' : 'bg-gray-300'}`}
                aria-label={`Style Match: ${styleMatch ? 'on' : 'off'}`}
              >
                <span aria-hidden="true" className={`inline-block w-5 h-5 bg-white rounded-full shadow transition-transform ${styleMatch ? 'translate-x-6' : 'translate-x-0.5'}`}></span>
              </button>
            </div>
          </div>

          {/* Category filter */}
          <fieldset className="mb-6 pb-6 border-b border-th-beige">
            <legend className="font-semibold text-sm text-th-charcoal mb-3">Clothing Type</legend>
            <div className="space-y-2">
              {['Tops','Bottoms','Outerwear','Accessories'].map(cat => (
                <label key={cat} className="flex items-center gap-2 cursor-pointer group">
                  <input
                    type="checkbox"
                    checked={filters.categories.includes(cat)}
                    onChange={() => toggleArrayFilter('categories', cat)}
                    className="w-4 h-4 rounded border-gray-300 text-th-green focus:ring-th-gold"
                    aria-label={`Filter by ${cat}`}
                  />
                  <span className="text-sm text-gray-700 group-hover:text-th-green transition-colors">{cat}</span>
                </label>
              ))}
            </div>
          </fieldset>

          {/* Size filter */}
          <fieldset className="mb-6 pb-6 border-b border-th-beige">
            <legend className="font-semibold text-sm text-th-charcoal mb-3">Size</legend>
            <div className="flex flex-wrap gap-2" role="group" aria-label="Size options">
              {['XS','S','M','L','XL','XXL'].map(size => (
                <button
                  key={size}
                  onClick={() => toggleArrayFilter('sizes', size)}
                  aria-pressed={filters.sizes.includes(size)}
                  aria-label={`Size ${size}: ${filters.sizes.includes(size) ? 'selected' : 'not selected'}`}
                  className={`w-10 h-10 text-sm font-medium rounded border transition-all ${filters.sizes.includes(size) ? 'bg-th-green text-white border-th-green' : 'bg-white text-gray-700 border-gray-300 hover:border-th-green'}`}
                >
                  {size}
                </button>
              ))}
            </div>
          </fieldset>

          {/* Color filter */}
          <fieldset className="mb-6 pb-6 border-b border-th-beige">
            <legend className="font-semibold text-sm text-th-charcoal mb-3">Color</legend>
            <div className="flex flex-wrap gap-2" role="group" aria-label="Color options">
              {COLOR_SWATCHES.map(c => (
                <button
                  key={c.name}
                  onClick={() => toggleArrayFilter('colors', c.name)}
                  aria-pressed={filters.colors.includes(c.name)}
                  aria-label={`Color ${c.name}: ${filters.colors.includes(c.name) ? 'selected' : 'not selected'}`}
                  className={`w-8 h-8 rounded-full border-2 transition-all ${filters.colors.includes(c.name) ? 'border-th-green scale-110 ring-2 ring-th-green ring-offset-1' : 'border-gray-200 hover:border-gray-400'}`}
                  style={{ backgroundColor: c.hex }}
                  title={c.name}
                ></button>
              ))}
            </div>
          </fieldset>

          {/* Material filter */}
          <fieldset className="mb-6 pb-6 border-b border-th-beige">
            <legend className="font-semibold text-sm text-th-charcoal mb-3">Material</legend>
            <div className="space-y-2">
              {['Organic Cotton','Organic Linen','Recycled Polyester','Recycled Cotton'].map(mat => (
                <label key={mat} className="flex items-center gap-2 cursor-pointer group">
                  <input
                    type="checkbox"
                    checked={filters.materials.includes(mat)}
                    onChange={() => toggleArrayFilter('materials', mat)}
                    className="w-4 h-4 rounded border-gray-300 text-th-green focus:ring-th-gold"
                    aria-label={`Filter by material: ${mat}`}
                  />
                  <span className="text-sm text-gray-700 group-hover:text-th-green transition-colors">{mat}</span>
                </label>
              ))}
            </div>
          </fieldset>

          {/* Price range */}
          <fieldset className="mb-6">
            <legend className="font-semibold text-sm text-th-charcoal mb-3">Price Range</legend>
            <div className="flex items-center gap-3">
              <div>
                <label htmlFor="price-min" className="text-xs text-gray-500 block mb-1">Min ($)</label>
                <input
                  id="price-min"
                  type="number"
                  min={0} max={filters.priceMax}
                  value={filters.priceMin}
                  onChange={e => setFilters(prev => ({ ...prev, priceMin: Number(e.target.value) }))}
                  className="w-20 border border-gray-300 rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-th-gold"
                  aria-label="Minimum price in dollars"
                />
              </div>
              <span className="text-gray-400 mt-4" aria-hidden="true">—</span>
              <div>
                <label htmlFor="price-max" className="text-xs text-gray-500 block mb-1">Max ($)</label>
                <input
                  id="price-max"
                  type="number"
                  min={filters.priceMin} max={500}
                  value={filters.priceMax}
                  onChange={e => setFilters(prev => ({ ...prev, priceMax: Number(e.target.value) }))}
                  className="w-20 border border-gray-300 rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-th-gold"
                  aria-label="Maximum price in dollars"
                />
              </div>
            </div>
          </fieldset>
        </aside>
      );

      return (
        <>
          <Header current="shop" />

          {/* ARIA live region */}
          <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{liveMsg}</div>
          <div role="status" aria-live="polite" aria-atomic="true" aria-busy={false} id="results-count" className="sr-only">{filteredProducts.length} products found</div>

          <main id="main-content" tabIndex={-1}>
            {/* Breadcrumb */}
            <nav aria-label="Breadcrumb" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <ol className="flex items-center gap-2 text-sm text-gray-500" role="list">
                <li><a href="index.html" className="hover:text-th-green transition-colors">Home</a></li>
                <li aria-hidden="true"><span>/</span></li>
                <li aria-current="page" className="text-th-charcoal font-medium">Shop</li>
              </ol>
            </nav>

            {/* Page header */}
            <section aria-labelledby="page-heading" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-6">
              <h1 id="page-heading" className="text-3xl font-extrabold text-th-charcoal">Shop All</h1>
              <p className="text-gray-500 mt-1 text-sm">{filteredProducts.length} styles — Spring / Summer 2025</p>
            </section>

            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
              {/* Mobile filter bar */}
              <div className="flex items-center justify-between gap-4 mb-6 lg:hidden">
                <button
                  ref={filterBtnRef}
                  onClick={() => setMobileFiltersOpen(true)}
                  className="flex items-center gap-2 border border-gray-300 rounded-lg px-4 py-2 text-sm font-medium hover:bg-th-beige transition-colors"
                  aria-expanded={mobileFiltersOpen}
                  aria-controls="mobile-filter-panel"
                  aria-label="Open product filters"
                >
                  <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>
                  Filters {hasFilters ? `(${[...filters.categories,...filters.sizes,...filters.materials,...filters.colors].length})` : ''}
                </button>
                <div className="flex items-center gap-2">
                  <label htmlFor="sort-mobile" className="text-sm text-gray-500 whitespace-nowrap">Sort by:</label>
                  <select id="sort-mobile" value={sortBy} onChange={e => setSortBy(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
                    <option value="featured">Featured</option>
                    <option value="newest">Newest</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                  </select>
                </div>
              </div>

              {/* Mobile filter drawer */}
              {mobileFiltersOpen && (
                <div role="dialog" aria-modal="true" aria-labelledby="mobile-filter-heading" className="fixed inset-0 z-50 flex lg:hidden">
                  <div className="absolute inset-0 bg-black/40" onClick={() => setMobileFiltersOpen(false)} aria-hidden="true"></div>
                  <div
                    id="mobile-filter-panel"
                    ref={filterPanelRef}
                    tabIndex={-1}
                    className="relative bg-white w-80 max-w-full h-full overflow-y-auto shadow-xl p-6 focus:outline-none"
                    onKeyDown={e => { if (e.key === 'Escape') { setMobileFiltersOpen(false); } }}
                  >
                    <div className="flex items-center justify-between mb-6">
                      <h2 id="mobile-filter-heading" className="font-bold text-lg">Filters</h2>
                      <button onClick={() => setMobileFiltersOpen(false)} aria-label="Close filters panel" className="p-2 hover:bg-th-beige rounded-lg transition-colors">
                        <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                      </button>
                    </div>
                    <FilterPanel />
                    <button onClick={() => setMobileFiltersOpen(false)} className="w-full mt-4 bg-th-green text-white font-semibold py-3 rounded-xl hover:bg-th-green-h transition-colors">
                      View {filteredProducts.length} Results
                    </button>
                  </div>
                </div>
              )}

              <div className="flex gap-8">
                {/* Desktop filter sidebar */}
                <div className="hidden lg:block w-64 flex-shrink-0">
                  <FilterPanel />
                </div>

                {/* Product grid */}
                <div className="flex-1 min-w-0">
                  {/* Sort bar (desktop) */}
                  <div className="hidden lg:flex items-center justify-between mb-6">
                    <p className="text-sm text-gray-500"><span className="font-semibold text-th-charcoal">{filteredProducts.length}</span> products</p>
                    <div className="flex items-center gap-2">
                      <label htmlFor="sort-desktop" className="text-sm text-gray-500">Sort by:</label>
                      <select id="sort-desktop" value={sortBy} onChange={e => setSortBy(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-th-gold">
                        <option value="featured">Featured</option>
                        <option value="newest">Newest</option>
                        <option value="price-asc">Price: Low to High</option>
                        <option value="price-desc">Price: High to Low</option>
                      </select>
                    </div>
                  </div>

                  {/* Active filter chips */}
                  {hasFilters ? (
                    <div className="flex flex-wrap gap-2 mb-4" role="list" aria-label="Active filters">
                      {filters.categories.map(c => (
                        <span key={c} role="listitem" className="inline-flex items-center gap-1 bg-th-green/10 text-th-green text-xs font-medium px-3 py-1 rounded-full">
                          {c}
                          <button onClick={() => toggleArrayFilter('categories', c)} aria-label={`Remove ${c} filter`} className="ml-1 hover:text-red-500 transition-colors">×</button>
                        </span>
                      ))}
                      {filters.sizes.map(s => (
                        <span key={s} role="listitem" className="inline-flex items-center gap-1 bg-th-green/10 text-th-green text-xs font-medium px-3 py-1 rounded-full">
                          Size {s}
                          <button onClick={() => toggleArrayFilter('sizes', s)} aria-label={`Remove size ${s} filter`} className="ml-1 hover:text-red-500 transition-colors">×</button>
                        </span>
                      ))}
                    </div>
                  ) : null}

                  {styleMatch ? (
                    /* Style Match view — curated outfit sets */
                    <section aria-labelledby="sets-heading">
                      <h2 id="sets-heading" className="font-bold text-lg text-th-charcoal mb-4">Curated Outfit Sets</h2>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        {[
                          { set: 'The Weekend Edit', items: [ALL_PRODUCTS[0], ALL_PRODUCTS[1], ALL_PRODUCTS[11]] },
                          { set: 'Office-Ready',     items: [ALL_PRODUCTS[6], ALL_PRODUCTS[4], ALL_PRODUCTS[10]] },
                          { set: 'Street Casual',    items: [ALL_PRODUCTS[12], ALL_PRODUCTS[7], ALL_PRODUCTS[14]] },
                          { set: 'Minimalist Look',  items: [ALL_PRODUCTS[3], ALL_PRODUCTS[16], ALL_PRODUCTS[19]] },
                        ].map(outfit => (
                          <article key={outfit.set} className="bg-white rounded-2xl overflow-hidden shadow-sm border border-th-beige" aria-label={`Outfit set: ${outfit.set}`}>
                            <div className="grid grid-cols-3 gap-0.5 bg-th-beige">
                              {outfit.items.map((item, i) => (
                                <div key={i} className={`aspect-square bg-gradient-to-br ${GRADS[item.id % GRADS.length]}`} role="img" aria-label={item.name}></div>
                              ))}
                            </div>
                            <div className="p-4">
                              <h3 className="font-bold text-sm">{outfit.set}</h3>
                              <p className="text-xs text-gray-500 mt-1">{outfit.items.map(i => i.name).join(' · ')}</p>
                              <div className="flex items-center justify-between mt-3">
                                <p className="font-bold text-th-green text-sm">${outfit.items.reduce((s,i) => s+i.price,0).toFixed(2)} total</p>
                                <a href="product-detail.html" className="bg-th-green text-white text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-th-green-h transition-colors" aria-label={`Shop the ${outfit.set} outfit set`}>Shop Set</a>
                              </div>
                            </div>
                          </article>
                        ))}
                      </div>
                    </section>
                  ) : (
                    <section aria-labelledby="grid-heading">
                      <h2 id="grid-heading" className="sr-only">Product grid</h2>
                      {filteredProducts.length === 0 ? (
                        <div className="text-center py-24" role="status">
                          <p className="text-xl font-semibold text-th-charcoal">No products match your filters.</p>
                          <button onClick={clearFilters} className="mt-4 text-th-green font-semibold underline hover:no-underline">Clear all filters</button>
                        </div>
                      ) : (
                        <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6" role="list" aria-label="Product results">
                          {filteredProducts.map(p => {
                            const grad = GRADS[p.id % GRADS.length];
                            return (
                              <article key={p.id} className="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow" role="listitem" aria-label={p.name}>
                                <a href="product-detail.html" aria-label={`View details for ${p.name} in ${p.color}`} className="block">
                                  <div className={`bg-gradient-to-br ${grad} aspect-[3/4] flex items-center justify-center relative overflow-hidden`} role="img" aria-label={`${p.name} product photo`}>
                                    <div aria-hidden="true" className="absolute inset-0 opacity-10" style={{backgroundImage:'repeating-linear-gradient(45deg,#000 0,#000 1px,transparent 0,transparent 6px)'}}></div>
                                    <svg aria-hidden="true" className="w-12 h-12 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z" /></svg>
                                    {p.badge && <span className="absolute top-2 left-2 bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full" aria-label={`Badge: ${p.badge}`}>{p.badge}</span>}
                                    {p.isNew && <span className="absolute top-2 right-2 bg-th-green text-white text-xs font-bold px-2 py-0.5 rounded-full" aria-label="New arrival">New</span>}
                                  </div>
                                </a>
                                <div className="p-3 sm:p-4">
                                  <a href="product-detail.html" className="hover:text-th-green transition-colors"><h3 className="font-semibold text-xs sm:text-sm leading-tight">{p.name}</h3></a>
                                  <p className="text-xs text-gray-500 mt-0.5">{p.color} · {p.material}</p>
                                  {p.sizes.length > 0 && (
                                    <p className="text-xs text-gray-400 mt-0.5" aria-label={`Available in sizes: ${p.sizes.join(', ')}`}>{p.sizes.slice(0,4).join(' · ')}{p.sizes.length > 4 ? ' +' : ''}</p>
                                  )}
                                  <div className="flex items-center justify-between mt-3">
                                    <p className="font-bold text-th-green text-sm">${p.price.toFixed(2)}</p>
                                    <button
                                      onClick={() => handleAddToCart(p)}
                                      className="bg-th-green text-white text-xs font-semibold px-2.5 py-1.5 rounded-lg hover:bg-th-green-h transition-colors"
                                      aria-label={`Add ${p.name} to cart`}
                                    >Add</button>
                                  </div>
                                </div>
                              </article>
                            );
                          })}
                        </div>
                      )}
                    </section>
                  )}
                </div>
              </div>
            </div>
          </main>

          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ProductsPage />);
  </script>
</body>
</html>
