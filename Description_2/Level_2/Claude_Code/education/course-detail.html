<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Administrative Assistant Certificate | SkillForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'sf-navy':   '#1B3F6B',
            'sf-navy-h': '#254F82',
            'sf-amber':  '#E8760A',
            'sf-amber-h':'#D06508',
            'sf-teal':   '#1D7A8A',
            'sf-light':  '#F0F4F8',
            'sf-green':  '#1A7F4B',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #F0F4F8; color: #111827; }
    :focus-visible { outline: 3px solid #E8760A !important; outline-offset: 2px !important; }
    .skip-link { position: absolute; top: -56px; left: 8px; background: #1B3F6B; color: #fff; padding: 10px 18px; z-index: 9999; border-radius: 6px; font-weight: 600; transition: top 0.15s; text-decoration: none; font-size: 0.9rem; }
    .skip-link:focus { top: 8px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    /* Sticky sidebar: cat_6 — must not obscure focused elements */
    .sticky-sidebar { position: sticky; top: 5rem; max-height: calc(100vh - 6rem); overflow-y: auto; }
    /* Accordion: cat_4 */
    .accordion-btn:focus-visible { outline: 3px solid #E8760A; outline-offset: 2px; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─── Shared Header ─────────────────────────────────────────────── */
    function Header({ current = '' }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const toggleRef = useRef(null);
      const navLinks = [
        { label: 'Home',      href: 'index.html',     key: 'home' },
        { label: 'Courses',   href: 'courses.html',   key: 'courses' },
        { label: 'Pricing',   href: 'pricing.html',   key: 'pricing' },
        { label: 'Dashboard', href: 'dashboard.html', key: 'dashboard' },
      ];
      useEffect(() => {
        function h(e) { if (e.key === 'Escape' && menuOpen) { setMenuOpen(false); toggleRef.current?.focus(); } }
        document.addEventListener('keydown', h);
        return () => document.removeEventListener('keydown', h);
      }, [menuOpen]);
      return (
        <header className="sticky top-0 z-50 shadow-lg">
          <div className="bg-sf-amber text-white text-xs text-center py-2 px-4 font-semibold" role="note">
            🎓 Spring Cohort starting March 3 — only <strong>4 seats left!</strong>&nbsp;
            <a href="#enroll-cta" className="underline hover:no-underline">Enroll now →</a>
          </div>
          <div className="bg-sf-navy text-white">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16 gap-4">
              <a href="index.html" className="font-extrabold text-xl tracking-tight" aria-label="SkillForge — Go to homepage">
                Skill<span className="text-sf-amber">Forge</span>
              </a>
              <nav aria-label="Primary navigation" className="hidden md:flex items-center gap-1">
                {navLinks.map(l => (
                  <a key={l.key} href={l.href} aria-current={current === l.key ? 'page' : undefined}
                    className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${current === l.key ? 'bg-sf-amber text-white' : 'text-gray-200 hover:bg-sf-navy-h'}`}>
                    {l.label}
                  </a>
                ))}
              </nav>
              <div className="hidden md:flex items-center gap-3">
                <a href="dashboard.html" className="text-sm text-gray-200 hover:text-white px-3 py-1.5">Sign In</a>
                <a href="pricing.html" className="bg-sf-amber hover:bg-sf-amber-h text-white text-sm font-semibold px-5 py-2 rounded-lg">Start Free</a>
              </div>
              <button ref={toggleRef} aria-label={menuOpen ? 'Close menu' : 'Open menu'} aria-expanded={menuOpen}
                onClick={() => setMenuOpen(o => !o)} className="md:hidden p-2 rounded-md text-gray-200 hover:bg-sf-navy-h">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  {menuOpen ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                             : <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />}
                </svg>
              </button>
            </div>
            {menuOpen && (
              <nav className="md:hidden border-t border-sf-navy-h px-4 pb-4 pt-2 space-y-1" aria-label="Mobile navigation">
                {navLinks.map(l => (
                  <a key={l.key} href={l.href} className="block px-4 py-2 rounded-md text-sm text-gray-200 hover:bg-sf-navy-h">{l.label}</a>
                ))}
              </nav>
            )}
          </div>
        </header>
      );
    }

    /* ─── Footer ─────────────────────────────────────────────────────── */
    function Footer() {
      return (
        <footer className="bg-gray-900 text-gray-300 pt-10 pb-6" aria-label="Site footer">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex flex-col sm:flex-row justify-between items-center gap-4 border-b border-gray-700 pb-6 mb-6">
              <p className="font-extrabold text-xl text-white">Skill<span className="text-sf-amber">Forge</span></p>
              <nav aria-label="Footer links" className="flex flex-wrap gap-4 text-sm">
                <a href="courses.html" className="hover:text-white">Browse Courses</a>
                <a href="pricing.html" className="hover:text-white">Pricing</a>
                <a href="dashboard.html" className="hover:text-white">Dashboard</a>
                <a href="#" className="hover:text-white">Help Center</a>
              </nav>
            </div>
            <p className="text-xs text-gray-500 text-center">© 2026 SkillForge Inc. All rights reserved.</p>
          </div>
        </footer>
      );
    }

    /* ─── Enrollment Modal ──────────────────────────────────────────── */
    /* cat_5: focus trap + return focus on close */
    function EnrollModal({ open, onClose }) {
      const [step, setStep] = useState(1);
      const [errors, setErrors] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [form, setForm] = useState({ name: '', email: '', phone: '', plan: 'full' });
      const firstBtnRef = useRef(null);
      const closeBtnRef = useRef(null);
      const liveRef = useRef(null);

      useEffect(() => {
        if (open) { setTimeout(() => closeBtnRef.current?.focus(), 50); }
      }, [open]);

      useEffect(() => {
        function onKey(e) {
          if (!open) return;
          if (e.key === 'Escape') onClose();
          if (e.key === 'Tab') {
            const focusable = document.querySelector('[data-modal]')?.querySelectorAll(
              'button, input, select, textarea, a[href], [tabindex]:not([tabindex="-1"])'
            );
            if (!focusable || focusable.length === 0) return;
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (e.shiftKey) {
              if (document.activeElement === first) { e.preventDefault(); last.focus(); }
            } else {
              if (document.activeElement === last) { e.preventDefault(); first.focus(); }
            }
          }
        }
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [open, onClose]);

      function validate() {
        const e = {};
        if (!form.name.trim()) e.name = 'Full name is required.';
        if (!form.email.trim()) e.email = 'Email address is required.';
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Please enter a valid email address.';
        if (!form.phone.trim()) e.phone = 'Phone number is required.';
        return e;
      }

      function handleSubmit(e) {
        e.preventDefault();
        if (step === 1) {
          const errs = validate();
          if (Object.keys(errs).length) { setErrors(errs); return; }
          setStep(2);
        } else {
          setSubmitted(true);
        }
      }

      if (!open) return null;

      return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/60" onClick={onClose} aria-hidden="true" />
          <div data-modal role="dialog" aria-modal="true" aria-labelledby="modal-title"
            className="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8 max-h-[90vh] overflow-y-auto">

            {/* cat_7: enrollment confirmation via aria-live */}
            <div ref={liveRef} aria-live="polite" aria-atomic="true" className="sr-only">
              {submitted ? 'Enrollment confirmed! Check your email for next steps.' : ''}
            </div>

            <button ref={closeBtnRef} onClick={onClose} aria-label="Close enrollment form"
              className="absolute top-4 right-4 p-2 rounded-full text-gray-400 hover:text-gray-700 hover:bg-gray-100">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>

            {submitted ? (
              <div className="text-center py-6">
                <div className="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4" aria-hidden="true">
                  <svg className="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                  </svg>
                </div>
                <h2 id="modal-title" className="text-2xl font-bold text-sf-navy mb-2">You're Enrolled!</h2>
                <p className="text-gray-500 mb-6">Confirmation sent to <strong>{form.email}</strong>. Your cohort starts <strong>March 3</strong>.</p>
                <a href="classroom.html" className="inline-block bg-sf-amber text-white font-bold px-8 py-3 rounded-xl hover:bg-sf-amber-h transition-colors">
                  Go to Your Classroom →
                </a>
              </div>
            ) : (
              <>
                <div className="mb-6">
                  <div className="flex items-center gap-3 mb-1">
                    <span className="text-xs font-semibold text-gray-400">Step {step} of 2</span>
                  </div>
                  <div className="w-full bg-gray-100 rounded-full h-1.5" aria-hidden="true">
                    <div className="bg-sf-amber h-1.5 rounded-full transition-all" style={{ width: step === 1 ? '50%' : '100%' }} />
                  </div>
                </div>

                <h2 id="modal-title" className="text-xl font-bold text-sf-navy mb-1">
                  {step === 1 ? 'Create Your Account' : 'Choose Payment Plan'}
                </h2>
                <p className="text-sm text-gray-500 mb-6">
                  {step === 1 ? 'Medical Administrative Assistant Certificate · $349' : 'Select how you'd like to pay'}
                </p>

                <form onSubmit={handleSubmit} aria-label={step === 1 ? 'Account information form' : 'Payment plan selection'} noValidate>
                  {step === 1 ? (
                    <div className="space-y-4">
                      <div>
                        <label htmlFor="enroll-name" className="block text-sm font-medium text-gray-700 mb-1">
                          Full Name <span aria-hidden="true" className="text-red-500">*</span>
                        </label>
                        <input id="enroll-name" type="text" value={form.name} onChange={e => setForm(f => ({...f, name: e.target.value}))}
                          aria-required="true"
                          aria-describedby={errors.name ? 'name-error' : undefined}
                          aria-invalid={errors.name ? 'true' : undefined}
                          className={`w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sf-amber ${errors.name ? 'border-red-400' : 'border-gray-200'}`} />
                        {errors.name && <p id="name-error" role="alert" className="text-red-600 text-xs mt-1">{errors.name}</p>}
                      </div>
                      <div>
                        <label htmlFor="enroll-email" className="block text-sm font-medium text-gray-700 mb-1">
                          Email Address <span aria-hidden="true" className="text-red-500">*</span>
                        </label>
                        <input id="enroll-email" type="email" value={form.email} onChange={e => setForm(f => ({...f, email: e.target.value}))}
                          aria-required="true"
                          aria-describedby={errors.email ? 'email-error' : undefined}
                          aria-invalid={errors.email ? 'true' : undefined}
                          className={`w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sf-amber ${errors.email ? 'border-red-400' : 'border-gray-200'}`} />
                        {errors.email && <p id="email-error" role="alert" className="text-red-600 text-xs mt-1">{errors.email}</p>}
                      </div>
                      <div>
                        <label htmlFor="enroll-phone" className="block text-sm font-medium text-gray-700 mb-1">
                          Phone Number <span aria-hidden="true" className="text-red-500">*</span>
                        </label>
                        <input id="enroll-phone" type="tel" value={form.phone} onChange={e => setForm(f => ({...f, phone: e.target.value}))}
                          aria-required="true"
                          aria-describedby={errors.phone ? 'phone-error' : 'phone-hint'}
                          aria-invalid={errors.phone ? 'true' : undefined}
                          className={`w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sf-amber ${errors.phone ? 'border-red-400' : 'border-gray-200'}`} />
                        <p id="phone-hint" className="text-xs text-gray-400 mt-1">Used only for course updates and cohort notifications</p>
                        {errors.phone && <p id="phone-error" role="alert" className="text-red-600 text-xs mt-1">{errors.phone}</p>}
                      </div>
                    </div>
                  ) : (
                    <fieldset className="space-y-3">
                      <legend className="sr-only">Payment plan options</legend>
                      {[
                        { val: 'full', label: 'Pay in Full', price: '$349', detail: 'One-time payment, save $20' },
                        { val: 'plan', label: '3-Month Plan', price: '$123/mo', detail: 'Pay $369 over 3 months' },
                        { val: 'employer', label: 'Employer Reimbursement', price: '$0 now', detail: 'Invoice your employer directly' },
                      ].map(p => (
                        <label key={p.val}
                          className={`flex items-center gap-4 p-4 border-2 rounded-xl cursor-pointer transition-colors ${form.plan === p.val ? 'border-sf-amber bg-amber-50' : 'border-gray-200 hover:border-gray-300'}`}>
                          <input type="radio" name="plan" value={p.val} checked={form.plan === p.val}
                            onChange={() => setForm(f => ({...f, plan: p.val}))}
                            className="accent-sf-amber" aria-describedby={`plan-${p.val}-detail`} />
                          <div className="flex-1">
                            <div className="flex justify-between items-center">
                              <span className="font-semibold text-sm text-sf-navy">{p.label}</span>
                              <span className="font-bold text-sf-amber">{p.price}</span>
                            </div>
                            <p id={`plan-${p.val}-detail`} className="text-xs text-gray-500 mt-0.5">{p.detail}</p>
                          </div>
                        </label>
                      ))}
                    </fieldset>
                  )}

                  <div className="flex gap-3 mt-6">
                    {step === 2 && (
                      <button type="button" onClick={() => setStep(1)}
                        className="flex-1 border border-gray-200 text-gray-600 py-3 rounded-xl text-sm font-medium hover:bg-gray-50">
                        ← Back
                      </button>
                    )}
                    <button type="submit"
                      className="flex-1 bg-sf-amber hover:bg-sf-amber-h text-white font-bold py-3 rounded-xl transition-colors">
                      {step === 1 ? 'Continue →' : 'Complete Enrollment →'}
                    </button>
                  </div>
                </form>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ─── Curriculum Accordion ──────────────────────────────────────── */
    /* cat_2, cat_3, cat_4: list structure, headings, keyboard operable */
    const modules = [
      { id: 1, title: 'Week 1–2: Healthcare System Fundamentals', topics: ['Introduction to US healthcare systems','Medical terminology & abbreviations','HIPAA compliance & patient privacy','Insurance types: Medicare, Medicaid, private'] },
      { id: 2, title: 'Week 3: Medical Office Procedures', topics: ['Patient intake workflows','Scheduling and appointment management','Electronic Health Records (EHR) basics','Front-desk communication skills'] },
      { id: 3, title: 'Week 4–5: Medical Billing Fundamentals', topics: ['ICD-10 and CPT code basics','Claims submission and denial management','Explanation of Benefits (EOB) processing','Patient billing and collections'] },
      { id: 4, title: 'Week 6: Medical Coding Essentials', topics: ['Inpatient vs outpatient coding','Procedure coding and modifiers','Auditing and quality checks','Using coding references and software'] },
      { id: 5, title: 'Week 7: Applied Practice', topics: ['Simulated office environment exercises','Real-world case studies','Software proficiency: Kareo, Athenahealth','Role-play: patient and insurance interactions'] },
      { id: 6, title: 'Week 8: Certification Prep & Career Launch', topics: ['CMAA exam preparation (NCCT)','Resume and interview coaching','Employer introduction events','Certificate award and portfolio review'] },
    ];

    function CurriculumAccordion() {
      const [openIdx, setOpenIdx] = useState(null);

      function toggle(idx) { setOpenIdx(o => o === idx ? null : idx); }

      function handleKey(e, idx) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(idx); }
      }

      return (
        <section aria-labelledby="curriculum-heading" className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          <h2 id="curriculum-heading" className="text-2xl font-bold text-sf-navy mb-6">Course Curriculum</h2>
          <ol className="space-y-2" aria-label="Course modules list">
            {modules.map((mod, idx) => {
              const isOpen = openIdx === idx;
              return (
                <li key={mod.id}>
                  <h3>
                    <button
                      className="accordion-btn w-full flex items-center justify-between gap-3 text-left px-4 py-3.5 rounded-lg bg-sf-light hover:bg-blue-50 transition-colors"
                      aria-expanded={isOpen}
                      aria-controls={`module-panel-${mod.id}`}
                      id={`module-btn-${mod.id}`}
                      onClick={() => toggle(idx)}
                      onKeyDown={e => handleKey(e, idx)}>
                      <span className="font-semibold text-sm text-sf-navy">{mod.title}</span>
                      <svg className={`w-4 h-4 text-sf-amber flex-shrink-0 transition-transform ${isOpen ? 'rotate-180' : ''}`}
                        fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                      </svg>
                    </button>
                  </h3>
                  <div id={`module-panel-${mod.id}`} role="region" aria-labelledby={`module-btn-${mod.id}`}
                    hidden={!isOpen}>
                    <ul className="px-4 py-3 space-y-1.5 border-l-2 border-sf-amber ml-4 mt-1">
                      {mod.topics.map(t => (
                        <li key={t} className="text-sm text-gray-600 flex items-start gap-2">
                          <span className="text-sf-amber mt-0.5 flex-shrink-0" aria-hidden="true">✓</span>
                          {t}
                        </li>
                      ))}
                    </ul>
                  </div>
                </li>
              );
            })}
          </ol>
          <p className="text-xs text-gray-400 mt-4">Use Enter or Space to expand/collapse module details.</p>
        </section>
      );
    }

    /* ─── Tab Panel ─────────────────────────────────────────────────── */
    /* cat_4, cat_5: keyboard-accessible tabs, no focus loss on switch */
    function DetailTabs() {
      const tabs = ['Overview','Instructor','Financing','Q&A Schedule'];
      const [active, setActive] = useState(0);
      const tabRefs = useRef([]);

      function handleTabKey(e, idx) {
        let next = idx;
        if (e.key === 'ArrowRight') next = (idx + 1) % tabs.length;
        else if (e.key === 'ArrowLeft') next = (idx - 1 + tabs.length) % tabs.length;
        else if (e.key === 'Home') next = 0;
        else if (e.key === 'End') next = tabs.length - 1;
        else return;
        e.preventDefault();
        setActive(next);
        tabRefs.current[next]?.focus();
      }

      return (
        <div>
          <div role="tablist" aria-label="Course detail sections" className="flex flex-wrap gap-1 border-b border-gray-200 mb-6">
            {tabs.map((t, i) => (
              <button key={t} ref={el => tabRefs.current[i] = el}
                role="tab" id={`tab-${i}`} aria-controls={`panel-${i}`} aria-selected={active === i}
                tabIndex={active === i ? 0 : -1}
                onClick={() => setActive(i)} onKeyDown={e => handleTabKey(e, i)}
                className={`px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors border-b-2 -mb-px ${active === i ? 'border-sf-amber text-sf-amber bg-amber-50' : 'border-transparent text-gray-500 hover:text-sf-navy'}`}>
                {t}
              </button>
            ))}
          </div>

          {/* Overview */}
          <div id="panel-0" role="tabpanel" aria-labelledby="tab-0" hidden={active !== 0}>
            <h3 className="text-lg font-bold text-sf-navy mb-4">What You'll Learn</h3>
            <ul className="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-8">
              {['Navigate real-world medical office software (EHR, Kareo, Athenahealth)',
                'Process insurance claims and handle denials confidently',
                'Understand HIPAA compliance and patient privacy regulations',
                'Schedule appointments and manage patient intake workflows',
                'Apply ICD-10 and CPT coding basics to billing tasks',
                'Prepare for the CMAA national certification exam (NCCT)',
                'Build a professional resume and ace healthcare admin interviews',
                'Connect with SkillForge employer partners for job placement'
              ].map(item => (
                <li key={item} className="flex items-start gap-2 text-sm text-gray-700">
                  <span className="text-sf-green font-bold mt-0.5 flex-shrink-0" aria-hidden="true">✓</span>
                  {item}
                </li>
              ))}
            </ul>
            <section aria-labelledby="outcomes-heading" className="bg-green-50 border border-green-200 rounded-xl p-6">
              <h3 id="outcomes-heading" className="font-bold text-sf-green mb-4">Alumni Outcomes</h3>
              <dl className="grid grid-cols-3 gap-6 text-center">
                {[
                  { val: '92%', label: 'Job placement within 3 months' },
                  { val: '$19/hr', label: 'Average starting wage' },
                  { val: '4.8 / 5', label: 'Learner satisfaction rating' },
                ].map(s => (
                  <div key={s.label}>
                    <dt className="sr-only">{s.label}</dt>
                    <dd className="text-2xl font-extrabold text-sf-green">{s.val}</dd>
                    <p className="text-xs text-green-700 mt-1">{s.label}</p>
                  </div>
                ))}
              </dl>
            </section>
          </div>

          {/* Instructor */}
          <div id="panel-1" role="tabpanel" aria-labelledby="tab-1" hidden={active !== 1}>
            <div className="flex gap-5 items-start">
              <div className="w-20 h-20 rounded-full bg-sf-navy text-white flex items-center justify-center text-2xl font-bold flex-shrink-0" aria-label="Instructor photo placeholder">AR</div>
              <div>
                <h3 className="text-xl font-bold text-sf-navy">Dr. Angela Reyes, MHA, CPC</h3>
                <p className="text-sm text-gray-500 mt-1">Medical Practice Administrator · 18 years experience</p>
                <div className="flex gap-2 mt-2 flex-wrap">
