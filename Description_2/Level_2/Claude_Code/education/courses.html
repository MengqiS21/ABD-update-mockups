<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Courses | SkillForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'sf-bg':       '#F8F9FB',
            'sf-surf':     '#F0F2F7',
            'sf-border':   '#E2E8F0',
            'sf-text':     '#1E293B',
            'sf-muted':    '#64748B',
            'sf-primary':  '#1E3A5F',
            'sf-primary-h':'#162D4A',
            'sf-accent':   '#E85D04',
            'sf-accent-h': '#C44D04',
            'sf-success':  '#059669',
            'sf-warning':  '#D97706',
            'sf-nav':      '#0F1F35',
            'sf-gold':     '#F59E0B',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: #F8F9FB; color: #1E293B; }
    :focus-visible { outline: 3px solid #E85D04 !important; outline-offset: 2px !important; }
    .skip-link { position:absolute;top:-60px;left:8px;background:#1E3A5F;color:#fff;padding:10px 18px;z-index:9999;border-radius:6px;font-weight:700;transition:top 0.15s;text-decoration:none;font-size:14px; }
    .skip-link:focus { top:8px; }
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
    .nav-link { font-size:14px;font-weight:600;color:#94A3B8;text-decoration:none;padding:6px 2px;transition:color 0.15s; }
    .nav-link:hover, .nav-link[aria-current="page"] { color:#fff; }
    .filter-check { appearance:none;width:16px;height:16px;border:2px solid #CBD5E1;border-radius:4px;flex-shrink:0;cursor:pointer;transition:all 0.15s;background:#fff;position:relative; }
    .filter-check:checked { background:#1E3A5F;border-color:#1E3A5F; }
    .filter-check:checked::after { content:'✓';position:absolute;top:-2px;left:1px;color:#fff;font-size:11px;font-weight:800; }
    .filter-radio { appearance:none;width:16px;height:16px;border:2px solid #CBD5E1;border-radius:50%;flex-shrink:0;cursor:pointer;transition:all 0.15s;background:#fff; }
    .filter-radio:checked { border-color:#1E3A5F;background:#fff; box-shadow: inset 0 0 0 4px #1E3A5F; }
    .card-hover { transition:box-shadow 0.2s; }
    .card-hover:hover { box-shadow:0 6px 24px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function Header({ current = 'courses' }) {
      const NAV = [
        { key:'home', label:'Home', href:'index.html' },
        { key:'courses', label:'Courses', href:'courses.html' },
        { key:'pricing', label:'Pricing', href:'pricing.html' },
        { key:'about', label:'About', href:'index.html' },
      ];
      return (
        <header className="sticky top-0 z-40 bg-sf-nav shadow-md">
          <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-6">
            <a href="index.html" className="flex items-center gap-2 flex-shrink-0" aria-label="SkillForge — home">
              <div className="w-8 h-8 bg-sf-accent rounded-lg flex items-center justify-center" aria-hidden="true">
                <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>
              </div>
              <span className="text-white font-extrabold text-xl tracking-tight">SkillForge</span>
            </a>
            <nav aria-label="Main site navigation" className="hidden md:flex items-center gap-6">
              {NAV.map(n => <a key={n.key} href={n.href} className="nav-link" aria-current={current===n.key?'page':undefined}>{n.label}</a>)}
            </nav>
            <div className="hidden md:flex items-center gap-3">
              <a href="dashboard.html" className="text-sm font-semibold text-white/70 hover:text-white transition-colors">Sign In</a>
              <a href="pricing.html" className="px-4 py-2 bg-sf-accent text-white text-sm font-bold rounded-lg hover:bg-sf-accent-h transition-colors">Start Free</a>
            </div>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="bg-sf-nav text-white mt-16" aria-label="Site footer">
          <div className="max-w-7xl mx-auto px-4 py-10">
            <div className="flex flex-col sm:flex-row items-center justify-between gap-4 pb-6 border-b border-white/10">
              <span className="font-extrabold text-lg text-white">SkillForge</span>
              <div className="flex gap-4">{['Privacy','Terms','Accessibility'].map(l => <a key={l} href="#" className="text-white/30 text-xs hover:text-white/60 transition-colors">{l}</a>)}</div>
            </div>
            <p className="pt-5 text-white/25 text-xs text-center">© {new Date().getFullYear()} SkillForge Inc.</p>
          </div>
        </footer>
      );
    }

    /* ── Courses data ──────────────────────────────────────────── */
    const ALL_COURSES = [
      { id:1, title:'Medical Administrative Assistant Certificate', instructor:'Dr. Linda Zhao, RHIA', field:'Healthcare', format:'Cohort', duration:'1-3mo', cost_tier:'under500', credential:'Certificate', weeks:8, hours:48, cost:'$349', startDate:'Mar 3', grad:'from-teal-400 to-cyan-600', rating:4.8, enrolled:1240 },
      { id:2, title:'CompTIA A+ & Help Desk Certificate', instructor:'Marcus Webb, CompTIA', field:'IT & Tech', format:'Self-Paced', duration:'1-3mo', cost_tier:'under500', credential:'Certificate', weeks:10, hours:60, cost:'$499', startDate:'Anytime', grad:'from-blue-500 to-indigo-700', rating:4.9, enrolled:2100 },
      { id:3, title:'HVAC Installation & Maintenance', instructor:'Robert Flanagan, EPA 608', field:'Trades', format:'Cohort', duration:'3-6mo', cost_tier:'over500', credential:'Certificate', weeks:12, hours:80, cost:'$599', startDate:'Mar 10', grad:'from-orange-400 to-red-600', rating:4.7, enrolled:870 },
      { id:4, title:'Medical Billing & Coding Certificate', instructor:'Sarah Okonkwo, CPC', field:'Healthcare', format:'Self-Paced', duration:'1-3mo', cost_tier:'under500', credential:'Certificate', weeks:8, hours:52, cost:'$349', startDate:'Anytime', grad:'from-purple-400 to-pink-600', rating:4.8, enrolled:1580 },
      { id:5, title:'QuickBooks & Small Business Accounting', instructor:'David Kim, CPA', field:'Business', format:'Self-Paced', duration:'under1mo', cost_tier:'under500', credential:'Badge', weeks:4, hours:24, cost:'$149', startDate:'Anytime', grad:'from-green-500 to-emerald-700', rating:4.6, enrolled:3200 },
      { id:6, title:'Phlebotomy Technician Certificate', instructor:'Nurse Practitioner Teresa Vang', field:'Healthcare', format:'Cohort', duration:'1-3mo', cost_tier:'under500', credential:'Certificate', weeks:6, hours:36, cost:'$299', startDate:'Mar 17', grad:'from-red-400 to-rose-600', rating:4.7, enrolled:980 },
      { id:7, title:'Python for Data Analysis — Introductory', instructor:'Alex Novak, Google Certified', field:'IT & Tech', format:'Self-Paced', duration:'under1mo', cost_tier:'free', credential:'Badge', weeks:3, hours:18, cost:'Free', startDate:'Anytime', grad:'from-sky-400 to-blue-600', rating:4.5, enrolled:8400 },
      { id:8, title:'Project Management Professional (PMP) Prep', instructor:'Carmen Silva, PMP, MBA', field:'Business', format:'Live Online', duration:'1-3mo', cost_tier:'over500', credential:'CEU', weeks:10, hours:60, cost:'$699', startDate:'Mar 24', grad:'from-violet-500 to-purple-700', rating:4.9, enrolled:720 },
      { id:9, title:'Certified Nursing Assistant (CNA) Prep', instructor:'RN Jennifer Bell, BSN', field:'Healthcare', format:'Cohort', duration:'under1mo', cost_tier:'under500', credential:'Certificate', weeks:4, hours:32, cost:'$249', startDate:'Apr 7', grad:'from-cyan-400 to-teal-600', rating:4.8, enrolled:1820 },
      { id:10, title:'Electrical Wiring Fundamentals', instructor:'Ed Garcia, Master Electrician', field:'Trades', format:'Cohort', duration:'3-6mo', cost_tier:'over500', credential:'CEU', weeks:14, hours:96, cost:'$799', startDate:'Apr 14', grad:'from-yellow-400 to-amber-600', rating:4.6, enrolled:550 },
      { id:11, title:'HR Assistant Certificate', instructor:'Lori Tran, SHRM-CP', field:'Business', format:'Self-Paced', duration:'1-3mo', cost_tier:'under500', credential:'Certificate', weeks:8, hours:44, cost:'$349', startDate:'Anytime', grad:'from-pink-400 to-fuchsia-600', rating:4.7, enrolled:1140 },
      { id:12, title:'Cybersecurity Fundamentals', instructor:'James Addo, CISSP', field:'IT & Tech', format:'Self-Paced', duration:'1-3mo', cost_tier:'under500', credential:'Badge', weeks:6, hours:40, cost:'$299', startDate:'Anytime', grad:'from-slate-500 to-gray-700', rating:4.8, enrolled:2760 },
    ];

    /* ── Courses page ──────────────────────────────────────────── */
    function CoursesPage() {
      const [filters, setFilters] = useState({ field:[], format:[], duration:[], cost:[], credential:[] });
      const [sort, setSort] = useState('popular');
      const [query, setQuery] = useState('');
      const [liveMsg, setLiveMsg] = useState('');
      const [mobileFiltersOpen, setMobileFiltersOpen] = useState(false);
      const mobileFiltersRef = useRef(null);
      const mobileFiltersBtnRef = useRef(null);

      function toggleFilter(cat, val) {
        setFilters(prev => {
          const current = prev[cat];
          const next = current.includes(val) ? current.filter(v=>v!==val) : [...current, val];
          return { ...prev, [cat]: next };
        });
      }

      function clearAll() {
        setFilters({ field:[], format:[], duration:[], cost:[], credential:[] });
        setLiveMsg('All filters cleared');
        setTimeout(() => setLiveMsg(''), 2000);
      }

      const activeCount = Object.values(filters).flat().length;

      let filtered = ALL_COURSES.filter(c => {
        const matchField  = !filters.field.length      || filters.field.includes(c.field);
        const matchFormat = !filters.format.length     || filters.format.includes(c.format);
        const matchDur    = !filters.duration.length   || filters.duration.includes(c.duration);
        const matchCost   = !filters.cost.length       || filters.cost.includes(c.cost_tier);
        const matchCred   = !filters.credential.length || filters.credential.includes(c.credential);
        const matchQuery  = !query || c.title.toLowerCase().includes(query.toLowerCase()) || c.instructor.toLowerCase().includes(query.toLowerCase()) || c.field.toLowerCase().includes(query.toLowerCase());
        return matchField && matchFormat && matchDur && matchCost && matchCred && matchQuery;
      });
      if (sort === 'popular')   filtered = [...filtered].sort((a,b) => b.enrolled - a.enrolled);
      if (sort === 'rating')    filtered = [...filtered].sort((a,b) => b.rating - a.rating);
      if (sort === 'price-low') filtered = [...filtered].sort((a,b) => (a.cost_tier === 'free' ? -1 : b.cost_tier === 'free' ? 1 : 0));
      if (sort === 'newest')    filtered = [...filtered].sort((a,b) => a.id - b.id);

      const FILTER_SECTIONS = [
        { key:'field',      label:'Career Field',    type:'checkbox', opts:['Healthcare','IT & Tech','Trades','Business'] },
        { key:'format',     label:'Format',          type:'checkbox', opts:['Self-Paced','Cohort','Live Online'] },
        { key:'duration',   label:'Duration',        type:'checkbox', opts:[{v:'under1mo',l:'Under 1 month'},{v:'1-3mo',l:'1–3 months'},{v:'3-6mo',l:'3–6 months'}] },
        { key:'cost',       label:'Cost',            type:'checkbox', opts:[{v:'free',l:'Free'},{v:'under500',l:'Under $500'},{v:'over500',l:'$500+'}] },
        { key:'credential', label:'Credential Type', type:'checkbox', opts:['Certificate','Badge','CEU'] },
      ];

      function FilterPanel() {
        return (
          <div className="space-y-6">
            {activeCount > 0 && (
              <div className="flex items-center justify-between">
                <span className="text-xs font-bold text-sf-text">{activeCount} filter{activeCount!==1?'s':''} active</span>
                <button onClick={clearAll} className="text-xs font-semibold text-sf-accent hover:underline" aria-label="Clear all active filters">Clear all</button>
              </div>
            )}
            {FILTER_SECTIONS.map(section => (
              <fieldset key={section.key} className="border-0 p-0 m-0">
                <legend className="text-xs font-extrabold uppercase tracking-widest text-sf-muted mb-3 block">{section.label}</legend>
                <div className="space-y-2">
                  {section.opts.map(opt => {
                    const val = typeof opt === 'object' ? opt.v : opt;
                    const label = typeof opt === 'object' ? opt.l : opt;
                    const checked = filters[section.key].includes(val);
                    return (
                      <label key={val} className="flex items-center gap-2.5 cursor-pointer group">
                        <input
                          type="checkbox"
                          className="filter-check"
                          checked={checked}
                          onChange={() => { toggleFilter(section.key, val); setLiveMsg(`${checked?'Removed':'Added'} filter: ${label}`); setTimeout(()=>setLiveMsg(''),2000); }}
                          aria-label={`${section.label}: ${label}`}
                        />
                        <span className={`text-sm transition-colors ${checked ? 'font-semibold text-sf-primary' : 'text-sf-text group-hover:text-sf-primary'}`}>{label}</span>
                      </label>
                    );
                  })}
                </div>
              </fieldset>
            ))}
          </div>
        );
      }

      // Mobile filter drawer focus trap
      useEffect(() => {
        if (!mobileFiltersOpen) return;
        const panel = mobileFiltersRef.current;
        panel?.querySelector('button')?.focus();
        function trap(e) {
          if (!mobileFiltersOpen) return;
          const focusable = panel?.querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])');
          if (!focusable?.length) return;
          const first = focusable[0]; const last = focusable[focusable.length-1];
          if (e.key === 'Tab') {
            if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
            else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
          }
          if (e.key === 'Escape') { setMobileFiltersOpen(false); mobileFiltersBtnRef.current?.focus(); }
        }
        document.addEventListener('keydown', trap);
        return () => document.removeEventListener('keydown', trap);
      }, [mobileFiltersOpen]);

      return (
        <div className="min-h-screen bg-sf-bg">
          <Header current="courses" />

          {/* Mobile filter drawer */}
          {mobileFiltersOpen && (
            <div className="lg:hidden fixed inset-0 z-50 flex" role="dialog" aria-modal="true" aria-label="Course filters" ref={mobileFiltersRef}>
              <div className="absolute inset-0 bg-black/50" onClick={() => { setMobileFiltersOpen(false); mobileFiltersBtnRef.current?.focus(); }} aria-hidden="true" />
              <div className="relative bg-white w-72 h-full overflow-y-auto p-5 shadow-xl">
                <div className="flex items-center justify-between mb-5">
                  <h2 className="font-bold text-sf-text">Filters</h2>
                  <button onClick={() => { setMobileFiltersOpen(false); mobileFiltersBtnRef.current?.focus(); }} aria-label="Close filters panel" className="p-1.5 rounded hover:bg-sf-surf text-sf-muted">
                    <svg aria-hidden="true" className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                  </button>
                </div>
                <FilterPanel />
              </div>
            </div>
          )}

          <main id="main-content" tabIndex={-1} className="focus:outline-none">
            <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{liveMsg}</div>

            {/* Page header */}
            <div className="bg-sf-primary text-white py-8 px-4">
              <div className="max-w-7xl mx-auto">
                <h1 className="text-2xl font-extrabold mb-1">Browse All Courses</h1>
                <p className="text-white/60 text-sm">{ALL_COURSES.length} programs across healthcare, IT, trades, and business</p>
              </div>
            </div>

            <div className="max-w-7xl mx-auto px-4 py-8">
              {/* Search + sort bar */}
              <div className="flex flex-col sm:flex-row gap-3 mb-6">
                <div className="flex-1 relative" role="search" aria-label="Search courses">
                  <label htmlFor="course-search" className="sr-only">Search courses by title, instructor, or topic</label>
                  <svg aria-hidden="true" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-sf-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                  <input id="course-search" type="search" value={query} onChange={e => setQuery(e.target.value)} placeholder="Search courses, instructors, topics…" className="w-full pl-10 pr-4 py-2.5 border border-sf-border rounded-lg text-sm focus:border-sf-accent focus:ring-2 focus:ring-sf-accent/20 outline-none transition-colors bg-white" aria-label="Search courses" />
                </div>
                <div className="flex items-center gap-2">
                  <label htmlFor="sort-by" className="text-sm font-semibold text-sf-muted whitespace-nowrap">Sort by:</label>
                  <select id="sort-by" value={sort} onChange={e => setSort(e.target.value)} className="border border-sf-border rounded-lg text-sm px-3 py-2.5 focus:border-sf-accent outline-none bg-white text-sf-text" aria-label="Sort courses by">
                    <option value="popular">Most Popular</option>
                    <option value="rating">Highest Rated</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="newest">Newest</option>
                  </select>
                  <button ref={mobileFiltersBtnRef} onClick={() => setMobileFiltersOpen(true)} className="lg:hidden flex items-center gap-1.5 px-3 py-2.5 border border-sf-border rounded-lg text-sm font-semibold text-sf-text bg-white hover:border-sf-accent transition-colors" aria-expanded={mobileFiltersOpen} aria-label="Open filters panel">
                    <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>
                    Filters {activeCount > 0 && <span className="ml-0.5 w-5 h-5 bg-sf-accent text-white text-[10px] font-bold rounded-full flex items-center justify-center">{activeCount}</span>}
                  </button>
                </div>
              </div>

              <div className="flex gap-8">
                {/* Filter sidebar (desktop) — shown before grid in DOM but visually side */}
                <aside className="hidden lg:block w-56 flex-shrink-0" aria-label="Course filters">
                  <div className="bg-white border border-sf-border rounded-xl p-5 sticky top-24">
                    <div className="flex items-center justify-between mb-5">
                      <h2 className="font-bold text-sf-text text-sm">Filters</h2>
                      {activeCount > 0 && <span className="text-xs font-bold bg-sf-accent text-white px-2 py-0.5 rounded-full">{activeCount}</span>}
                    </div>
                    <FilterPanel />
                  </div>
                </aside>

                {/* Course grid */}
                <div className="flex-1 min-w-0">
                  <div className="mb-4 flex items-center justify-between">
                    <p className="text-sm text-sf-muted font-sans" aria-live="polite" aria-atomic="true">
                      {filtered.length === 0
                        ? 'No courses match your filters.'
                        : `Showing ${filtered.length} course${filtered.length!==1?'s':''}`}
                    </p>
                  </div>

                  {filtered.length === 0 ? (
                    <div className="text-center py-16" role="status">
                      <div className="w-16 h-16 bg-sf-surf rounded-full flex items-center justify-center mx-auto mb-4" aria-hidden="true">
                        <svg className="w-8 h-8 text-sf-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                      </div>
                      <p className="font-bold text-sf-text mb-2">No courses found</p>
                      <p className="text-sm text-sf-muted mb-4">Try adjusting your filters or search term. Currently showing 0 results for the selected criteria.</p>
                      <button onClick={clearAll} className="text-sm font-semibold text-sf-accent hover:underline">Clear all filters</button>
                    </div>
                  ) : (
                    <ul className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5" role="list" aria-label={`${filtered.length} courses`}>
                      {filtered.map(course => (
                        <li key={course.id}>
                          <article className="bg-white border border-sf-border rounded-xl overflow-hidden card-hover h-full flex flex-col" aria-label={`${course.title}, taught by ${course.instructor}`}>
                            <a href="course-detail.html" tabIndex={-1} aria-hidden="true">
                              <div className={`h-36 bg-gradient-to-br ${course.grad}`} role="img" aria-label={`${course.title} — ${course.field} course thumbnail`} />
                            </a>
                            <div className="p-4 flex-1 flex flex-col">
                              {/* Badges */}
                              <div className="flex flex-wrap gap-1.5 mb-2">
                                <span className={`text-[11px] font-bold px-2 py-0.5 rounded-full ${course.format==='Cohort'?'bg-sf-primary/10 text-sf-primary':course.format==='Live Online'?'bg-sf-warning/10 text-sf-warning':'bg-sf-success/10 text-sf-success'}`}>
                                  {course.format}
                                </span>
                                <span className="text-[11px] font-semibold px-2 py-0.5 rounded-full bg-sf-surf text-sf-muted">{course.credential}</span>
                                {course.cost === 'Free' && <span className="text-[11px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700">Free</span>}
                              </div>
                              {/* Title — accessible card link */}
                              <h3 className="font-bold text-sm text-sf-text leading-snug mb-1">
                                <a href="course-detail.html" className="hover:text-sf-accent transition-colors" aria-label={`${course.title} — taught by ${course.instructor} — ${course.cost}`}>
                                  {course.title}
                                </a>
                              </h3>
                              <p className="text-xs text-sf-muted mb-2 flex items-center gap-1.5">
                                <svg aria-hidden="true" className="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                {course.instructor}
                              </p>
                              <div className="flex items-center gap-1 mb-3">
                                <div className="flex" role="img" aria-label={`Rating: ${course.rating} out of 5 stars`}>
                                  {[1,2,3,4,5].map(s => (
                                    <svg key={s} aria-hidden="true" className={`w-3.5 h-3.5 ${s <= Math.round(course.rating) ? 'text-sf-gold' : 'text-sf-border'}`} fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                  ))}
                                </div>
                                <span className="text-xs text-sf-muted">{course.rating} ({course.enrolled.toLocaleString()})</span>
                              </div>
                              <div className="mt-auto flex items-center justify-between pt-3 border-t border-sf-border">
                                <div>
                                  <p className="font-extrabold text-sf-primary text-base">{course.cost}</p>
                                  <p className="text-[11px] text-sf-muted">{course.weeks} wks · {course.hours}h total</p>
                                </div>
                                <div>
                                  {course.format === 'Cohort' && course.startDate !== 'Anytime' ? (
                                    <div className="text-right">
                                      <p className="text-[10px] text-sf-muted">Next start</p>
                                      <p className="text-xs font-bold text-sf-accent">{course.startDate}</p>
                                    </div>
                                  ) : (
                                    <span className="text-[11px] font-semibold text-sf-success bg-sf-success/10 px-2 py-1 rounded-full">Start anytime</span>
                                  )}
                                </div>
                              </div>
                              <a href="course-detail.html" className="mt-3 block text-center py-2 bg-sf-primary text-white text-xs font-bold rounded-lg hover:bg-sf-primary-h transition-colors" aria-label={`Enroll in ${course.title}`}>
                                Enroll Now
                              </a>
                            </div>
                          </article>
                        </li>
                      ))}
                    </ul>
                  )}
                </div>
              </div>
            </div>
          </main>

          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CoursesPage />);
  </script>
</body>
</html>
