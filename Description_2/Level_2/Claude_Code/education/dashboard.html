    @keyframes achievement-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.85;transform:scale(1.04)} }

    /* Slow, single-cycle fade — safe for photosensitivity */

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ─── Shared Header ─────────────────────────────────────────────── */
    function Header({ current = 'dashboard' }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const toggleRef = useRef(null);
      const navLinks = [
        { label: 'Home',      href: 'index.html',     key: 'home' },

        function h(e) { if (e.key === 'Escape' && menuOpen) { setMenuOpen(false); toggleRef.current?.focus(); } }

        return () => document.removeEventListener('keydown', h);
      }, [menuOpen]);
      return (
        <header className="sticky top-0 z-50 shadow-lg">

              <nav aria-label="Primary navigation" className="hidden md:flex items-center gap-1">
                {navLinks.map(l => (
                  <a key={l.key} href={l.href} aria-current={current === l.key ? 'page' : undefined}
                    className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${current === l.key ? 'bg-sf-amber text-white' : 'text-gray-200 hover:bg-sf-navy-h'}`}>
                    {l.label}
                  </a>
                ))}
              </nav>
              <div className="hidden md:flex items-center gap-3">
                <span className="text-sm text-gray-200">👋 Maria G.</span>
                <button className="text-sm text-gray-300 hover:text-white px-3 py-1.5 rounded border border-gray-500 hover:border-gray-300">Sign Out</button>
              </div>

    /* ─── Office Hours Modal ─────────────────────────────────────────── */
    /* cat_5: focus trap + return focus on close */
    function OfficeHoursModal({ open, onClose }) {
      const firstRef = useRef(null);
      const lastRef = useRef(null);
      const [selected, setSelected] = useState('');
      const [booked, setBooked] = useState(false);
      const liveRef = useRef(null);

      useEffect(() => {
        if (open) setTimeout(() => firstRef.current?.focus(), 50);
      }, [open]);

      useEffect(() => {
        function onKey(e) {
          if (!open) return;
          if (e.key === 'Escape') onClose();
          if (e.key === 'Tab') {
            const modal = document.querySelector('[data-oh-modal]');
            if (!modal) return;
            const focusable = modal.querySelectorAll('button, input, select, a[href], [tabindex]:not([tabindex="-1"])');
            const first = focusable[0], last = focusable[focusable.length - 1];
            if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last?.focus(); }
            else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first?.focus(); }
          }
        }
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [open, onClose]);

      if (!open) return null;

      const slots = ['Tue Mar 11, 12:00 PM ET','Tue Mar 11, 12:30 PM ET','Thu Mar 13, 6:00 PM ET','Thu Mar 13, 6:30 PM ET'];

      return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/60" onClick={onClose} aria-hidden="true" />
          <div data-oh-modal role="dialog" aria-modal="true" aria-labelledby="oh-title"
            className="relative bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
            <div ref={liveRef} aria-live="polite" aria-atomic="true" className="sr-only">
              {booked ? 'Office hours session booked successfully!' : ''}
            </div>
            <button ref={firstRef} onClick={onClose} aria-label="Close office hours booking"
              className="absolute top-4 right-4 p-2 rounded-full text-gray-400 hover:bg-gray-100">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
            <h2 id="oh-title" className="text-xl font-bold text-sf-navy mb-1">Book Office Hours</h2>
            <p className="text-sm text-gray-500 mb-6">with Dr. Angela Reyes, MHA, CPC</p>
            {booked ? (
              <div className="text-center py-4">
                <div className="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-3" aria-hidden="true">
                  <svg className="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                  </svg>
                </div>
                <p className="font-bold text-sf-navy mb-1">Session Booked!</p>
                <p className="text-sm text-gray-500 mb-5">{selected} · Zoom link sent to your email.</p>
                <button ref={lastRef} onClick={onClose} className="bg-sf-amber text-white px-6 py-2.5 rounded-xl font-semibold hover:bg-sf-amber-h">Done</button>
              </div>
            ) : (
              <form onSubmit={e => { e.preventDefault(); if (selected) setBooked(true); }} aria-label="Office hours booking form">
                <fieldset className="mb-5">
                  <legend className="text-sm font-medium text-gray-700 mb-2">Available time slots</legend>
                  <div className="space-y-2">
                    {slots.map(s => (
                      <label key={s} className={`flex items-center gap-3 p-3 border-2 rounded-lg cursor-pointer transition-colors ${selected === s ? 'border-sf-amber bg-amber-50' : 'border-gray-100 hover:border-gray-200'}`}>
                        <input type="radio" name="slot" value={s} checked={selected === s} onChange={() => setSelected(s)} className="accent-sf-amber" />
                        <span className="text-sm font-medium text-sf-navy">{s}</span>
                      </label>
                    ))}
                  </div>
                </fieldset>
                <button ref={lastRef} type="submit" disabled={!selected}
                  className="w-full bg-sf-amber disabled:opacity-50 hover:bg-sf-amber-h text-white font-bold py-3 rounded-xl transition-colors">
                  Confirm Booking
                </button>
              </form>
            )}
          </div>
        </div>
      );
    }

    /* ─── Mini Calendar ─────────────────────────────────────────────── */
    function MiniCalendar() {
      const days = ['S','M','T','W','T','F','S'];
      // March 2026 starts on Sunday (day 0)
      const dates = Array.from({ length: 31 }, (_, i) => i + 1);
      const startOffset = 0; // March 1 = Sunday
      const dueDates = [12, 19]; // assignment due dates
      const eventDates = [11, 18, 25]; // live sessions

      return (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
          <h3 className="font-bold text-sf-navy mb-4 text-sm">March 2026</h3>
          <div className="grid grid-cols-7 gap-1 text-center text-xs">
            {days.map(d => (
              <div key={d} className="font-semibold text-gray-400 py-1" aria-hidden="true">{d}</div>
            ))}
            {Array.from({ length: startOffset }).map((_, i) => <div key={`empty-${i}`} />)}
            {dates.map(d => {
              const isToday = d === 10;
              const isDue = dueDates.includes(d);
              const isEvent = eventDates.includes(d);
              let label = `March ${d}`;
              if (isToday) label += ' — Today';
              if (isDue) label += ' — Assignment due';
              if (isEvent) label += ' — Live session';
              return (
                <button key={d} aria-label={label}
                  className={`w-7 h-7 rounded-full mx-auto flex items-center justify-center text-xs font-medium transition-colors
                    ${isToday ? 'bg-sf-navy text-white' :
                      isDue ? 'bg-red-100 text-red-700 font-bold' :
                      isEvent ? 'bg-amber-100 text-amber-700 font-bold' :
                      'text-gray-600 hover:bg-sf-light'}`}>
                  {d}
                </button>
              );
            })}
          </div>
          <div className="mt-4 flex flex-wrap gap-3 text-xs text-gray-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-sf-navy inline-block" aria-hidden="true"></span>Today</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-amber-200 inline-block" aria-hidden="true"></span>Live session</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-red-200 inline-block" aria-hidden="true"></span>Due date</span>
          </div>
        </div>
      );
    }

    /* ─── Dashboard Tabs ────────────────────────────────────────────── */
    /* cat_4, cat_5: keyboard-accessible, no focus loss on switch */
    function DashboardTabs({ tabs, active, onSwitch, tabRefs }) {
      function handleKey(e, idx) {
        let next = idx;
        if (e.key === 'ArrowRight') next = (idx + 1) % tabs.length;
        else if (e.key === 'ArrowLeft') next = (idx - 1 + tabs.length) % tabs.length;
        else if (e.key === 'Home') next = 0;
        else if (e.key === 'End') next = tabs.length - 1;
        else return;
        e.preventDefault();
        onSwitch(tabs[next].key);
        tabRefs.current[next]?.focus();
      }
      return (
        <div role="tablist" aria-label="Dashboard sections" className="flex border-b border-gray-200 bg-white rounded-t-xl overflow-hidden">
          {tabs.map((t, i) => (
            <button key={t.key} ref={el => tabRefs.current[i] = el}
              role="tab" id={`dash-tab-${t.key}`} aria-controls={`dash-panel-${t.key}`} aria-selected={active === t.key}
              tabIndex={active === t.key ? 0 : -1}
              onClick={() => onSwitch(t.key)} onKeyDown={e => handleKey(e, i)}
              className={`flex-1 px-4 py-3.5 text-sm font-semibold transition-colors border-b-2 ${active === t.key ? 'border-sf-amber text-sf-amber bg-amber-50' : 'border-transparent text-gray-500 hover:text-sf-navy'}`}>
              {t.label}
            </button>
          ))}
        </div>
      );
    }
