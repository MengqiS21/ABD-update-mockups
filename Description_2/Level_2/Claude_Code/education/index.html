  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── Shared Header ─────────────────────────────────────────────── */
    function Header({ current = 'home' }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const menuRef = useRef(null);
      const toggleRef = useRef(null);

      const navLinks = [

            <a href="courses.html" className="underline hover:no-underline">Enroll now →</a>
          </div>
          <div className="bg-sf-navy text-white">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex items-center justify-between h-16 gap-4">
                {/* Logo */}
                <a href="index.html" className="flex-shrink-0 font-extrabold text-xl sm:text-2xl tracking-tight" aria-label="SkillForge — Go to homepage">
                  Skill<span className="text-sf-amber">Forge</span>
                </a>
                {/* Desktop nav */}
                <nav aria-label="Primary navigation" className="hidden md:flex items-center gap-1">
                  {navLinks.map(l => (
                    <a key={l.key} href={l.href}
                      aria-current={current === l.key ? 'page' : undefined}
                      className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${current === l.key ? 'bg-sf-amber text-white' : 'text-gray-200 hover:bg-sf-navy-h'}`}>
                      {l.label}
                    </a>
                  ))}
                </nav>
                {/* Actions */}
                <div className="hidden md:flex items-center gap-3">
                  <a href="dashboard.html" className="text-sm text-gray-200 hover:text-white px-3 py-1.5 rounded transition-colors">Sign In</a>
                  <a href="pricing.html" className="bg-sf-amber hover:bg-sf-amber-h text-white text-sm font-semibold px-5 py-2 rounded-lg transition-colors">
                    Start Free
                  </a>
                </div>
                {/* Mobile hamburger */}
                <button ref={toggleRef} aria-label={menuOpen ? 'Close navigation menu' : 'Open navigation menu'} aria-expanded={menuOpen} aria-controls="mobile-menu"

                  className="md:hidden p-2 rounded-md text-gray-200 hover:bg-sf-navy-h focus-visible:outline-sf-amber">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    {menuOpen
                      ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />

                  </svg>
                </button>
              </div>
            </div>
            {/* Mobile menu */}
            {menuOpen && (
              <nav id="mobile-menu" ref={menuRef} aria-label="Mobile navigation"
                className="md:hidden border-t border-sf-navy-h px-4 pb-4 pt-2 space-y-1">
                {navLinks.map(l => (
                  <a key={l.key} href={l.href}

                    className={`block px-4 py-2 rounded-md text-sm font-medium ${current === l.key ? 'bg-sf-amber text-white' : 'text-gray-200 hover:bg-sf-navy-h'}`}>

                </div>

            )}

      );
    }

                <div className="flex gap-3 mt-4" aria-label="Social media links">

    /* ─── Quiz Modal ─────────────────────────────────────────────────── */
    function QuizModal({ open, onClose }) {
      const firstFocusRef = useRef(null);
      const lastFocusRef = useRef(null);
      const closeBtnRef = useRef(null);
      const triggerRef = useRef(null);

      useEffect(() => {
        if (open) { firstFocusRef.current?.focus(); }
      }, [open]);

      function trapFocus(e) {
        if (e.key !== 'Tab') return;
        const first = firstFocusRef.current;
        const last = lastFocusRef.current;
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      }

      function handleClose() {
        onClose();
        document.getElementById('quiz-trigger')?.focus();
      }

      useEffect(() => {
        function onKey(e) { if (e.key === 'Escape' && open) handleClose(); }
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [open]);

      if (!open) return null;
      return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4" onKeyDown={trapFocus}>
          <div className="absolute inset-0 bg-black/60" onClick={handleClose} aria-hidden="true" />
          <div role="dialog" aria-modal="true" aria-labelledby="quiz-title"
            className="relative bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 fade-in">
            <button ref={firstFocusRef} onClick={handleClose}
              aria-label="Close Find Your Path quiz"
              className="absolute top-4 right-4 p-2 rounded-full text-gray-400 hover:text-gray-700 hover:bg-gray-100">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
            <h2 id="quiz-title" className="text-2xl font-bold text-sf-navy mb-2">Find Your Path</h2>
            <p className="text-gray-500 text-sm mb-6">Answer 3 quick questions and we'll match you with the right program.</p>
            <form aria-label="Career path quiz" onSubmit={e => { e.preventDefault(); handleClose(); }}>
              <fieldset className="mb-5">
                <legend className="text-sm font-semibold text-gray-700 mb-2">1. What's your current situation?</legend>
                <div className="space-y-2">
                  {['Looking for my first career','Changing careers','Upskilling in my current field'].map(opt => (
                    <label key={opt} className="flex items-center gap-3 p-3 border rounded-lg cursor-pointer hover:border-sf-navy has-[:checked]:border-sf-amber has-[:checked]:bg-amber-50 transition-colors">
                      <input type="radio" name="situation" value={opt} className="accent-sf-amber" />
                      <span className="text-sm">{opt}</span>
                    </label>
                  ))}
                </div>
              </fieldset>
              <fieldset className="mb-5">
                <legend className="text-sm font-semibold text-gray-700 mb-2">2. Which field interests you most?</legend>
                <div className="grid grid-cols-2 gap-2">
                  {['Healthcare','IT & Tech','Trades','Business'].map(f => (
                    <label key={f} className="flex items-center gap-2 p-3 border rounded-lg cursor-pointer hover:border-sf-navy has-[:checked]:border-sf-amber has-[:checked]:bg-amber-50 text-sm transition-colors">
                      <input type="radio" name="field" value={f} className="accent-sf-amber" /> {f}
                    </label>
                  ))}
                </div>
              </fieldset>
              <fieldset className="mb-6">
                <legend className="text-sm font-semibold text-gray-700 mb-2">3. How soon do you want to start?</legend>
                <select className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sf-amber" aria-required="true">
                  <option value="">Select…</option>
                  <option>Right away</option>
                  <option>Within 1–3 months</option>
                  <option>Just exploring</option>
                </select>
              </fieldset>
              <button ref={lastFocusRef} type="submit"
                className="w-full bg-sf-amber hover:bg-sf-amber-h text-white font-bold py-3 rounded-xl transition-colors">
                Show My Matches →
              </button>
            </form>
          </div>
        </div>
      );
    }

    /* ─── Success Stories Carousel ───────────────────────────────────── */
    const stories = [
      { name: 'Maria G.', before: 'Retail Manager', after: 'Medical Office Coordinator', quote: 'SkillForge changed my life. I went from retail to healthcare admin in just 10 weeks.', img: 'MG', prog: 'Medical Admin Certificate', outcome: '42% salary increase' },
      { name: 'James T.', before: 'Unemployed', after: 'IT Help Desk Specialist', quote: 'The cohort format kept me accountable. My instructor answered every question.', img: 'JT', prog: 'CompTIA A+ Prep Track', outcome: 'Hired in 6 weeks' },
      { name: 'Priya S.', before: 'Waitstaff', after: 'Healthcare Billing Specialist', quote: 'Employer reimbursement made it free for me. Best career investment I ever made.', img: 'PS', prog: 'Medical Billing & Coding', outcome: '$19/hr starting wage' },
      { name: 'Carlos R.', before: 'Delivery Driver', after: 'HVAC Technician Apprentice', quote: 'Hands-on curriculum + real employer connections. Worth every penny.', img: 'CR', prog: 'HVAC Fundamentals', outcome: 'Apprenticeship placed' },
    ];

    function StoriesCarousel() {
      const [idx, setIdx] = useState(0);
      const total = stories.length;
      const prev = () => setIdx(i => (i - 1 + total) % total);
      const next = () => setIdx(i => (i + 1) % total);

      useEffect(() => {
        const t = setInterval(next, 6000);
        return () => clearInterval(t);
      }, []);

      const s = stories[idx];
      return (
        <section className="bg-sf-navy py-16" aria-label="Learner success stories">
          <div className="max-w-4xl mx-auto px-4 text-center text-white">
            <h2 className="text-3xl font-bold mb-10">Success Stories</h2>
            <div aria-live="polite" aria-atomic="true" className="bg-white/10 rounded-2xl p-8 md:p-12 relative">
              <div className="w-16 h-16 rounded-full bg-sf-amber flex items-center justify-center text-white font-bold text-xl mx-auto mb-4" aria-hidden="true">
                {s.img}
              </div>
              <blockquote>
                <p className="text-lg md:text-xl italic mb-6 leading-relaxed">"{s.quote}"</p>
                <footer className="text-sm text-gray-200">
                  <strong className="text-white text-base">{s.name}</strong>
                  <p className="mt-1">{s.prog}</p>
                  <div className="flex justify-center gap-6 mt-4 text-xs">
                    <span className="bg-white/20 px-3 py-1 rounded-full">Before: {s.before}</span>
                    <span className="bg-sf-amber/80 px-3 py-1 rounded-full font-semibold">{s.outcome}</span>
                    <span className="bg-white/20 px-3 py-1 rounded-full">Now: {s.after}</span>
                  </div>
                </footer>
              </blockquote>
            </div>
            <div className="flex justify-center items-center gap-4 mt-6">
              <button onClick={prev} aria-label="Previous success story"
                className="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                </svg>
              </button>
              <div role="tablist" aria-label="Success story navigation" className="flex gap-2">
                {stories.map((_, i) => (
                  <button key={i} role="tab" aria-selected={i === idx} aria-label={`Story ${i + 1} of ${total}: ${stories[i].name}`}
                    onClick={() => setIdx(i)}
                    className={`w-2.5 h-2.5 rounded-full transition-all ${i === idx ? 'bg-sf-amber scale-125' : 'bg-white/40 hover:bg-white/60'}`} />
                ))}
              </div>
              <button onClick={next} aria-label="Next success story"
                className="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                </svg>
              </button>
            </div>
          </div>
        </section>
      );
    }

    /* ─── Featured Course Card ───────────────────────────────────────── */
    function CourseCard({ title, field, format, weeks, price, starts, instructor, badge }) {

                aria-label={`Format: ${badge}`}>
                {badge}
              </span>
              <span className="text-xs text-gray-400">{field}</span>
            </div>
            <h3 className="font-bold text-sf-navy text-base mb-1 leading-snug">{title}</h3>
            <p className="text-xs text-gray-500 mb-4">Instructor: {instructor}</p>
            <div className="flex justify-between text-xs text-gray-500 mb-4 border-t pt-3">

    /* ─── Homepage ───────────────────────────────────────────────────── */
    function HomePage() {
      const [quizOpen, setQuizOpen] = useState(false);

      const featuredCourses = [

      return (
        <>

          <main id="main-content" tabIndex={-1}>
            {/* Hero */}
            <section className="bg-gradient-to-br from-sf-navy via-blue-900 to-sf-teal text-white py-20 md:py-28" aria-label="Hero">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="max-w-3xl">
                  <div className="inline-flex items-center gap-2 bg-white/10 text-sm px-4 py-1.5 rounded-full mb-6 border border-white/20">
                    <span className="w-2 h-2 rounded-full bg-sf-amber animate-pulse" aria-hidden="true"></span>

                  </div>
                  <h1 className="text-4xl sm:text-5xl md:text-6xl font-extrabold leading-tight mb-6">

                    <span className="text-sf-amber">Starts Here.</span>
                  </h1>

                  </p>
                  <p className="text-sm text-blue-200 mb-10">Accredited · Employer-Connected · Financial Aid Available</p>
                  <div className="flex flex-col sm:flex-row gap-4">
                    <button id="quiz-trigger" onClick={() => setQuizOpen(true)}
                      className="bg-sf-amber hover:bg-sf-amber-h text-white font-bold px-8 py-4 rounded-xl text-lg transition-colors shadow-lg">
                      Find Your Path →
                    </button>
                    <a href="courses.html"
                      className="border-2 border-white text-white hover:bg-white hover:text-sf-navy font-bold px-8 py-4 rounded-xl text-lg transition-colors text-center">
                      Browse Courses
                    </a>
                  </div>
                </div>
              </div>
            </section>

            {/* Urgency bar */}
            <div className="bg-red-600 text-white text-center py-3 px-4 text-sm font-semibold" role="alert" aria-live="assertive">

            </div>

            {/* Stats */}
            <section className="bg-white border-b py-10" aria-label="SkillForge by the numbers">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <dl className="grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                  {[
                    { val: '47,000+', label: 'Graduates' },
                    { val: '92%',     label: 'Job Placement Rate' },
                    { val: '8 Weeks', label: 'Average Program Length' },
                    { val: '200+',    label: 'Employer Partners' },
                  ].map(s => (
                    <div key={s.label}>
                      <dt className="sr-only">{s.label}</dt>
                      <dd className="text-3xl md:text-4xl font-extrabold text-sf-navy">{s.val}</dd>
                      <p className="text-sm text-gray-500 mt-1">{s.label}</p>
                    </div>
                  ))}
                </dl>
              </div>
            </section>

            {/* Employer logos marquee */}

                <p className="text-sm font-semibold text-gray-400 uppercase tracking-widest">Graduates Hired By</p>
              </div>
              <div className="relative" aria-hidden="true">
                <div className="marquee-inner">
                  {partners.map((p, i) => (
                    <div key={i} className="flex-shrink-0 mx-10 text-gray-400 font-bold text-lg tracking-tight">{p}</div>
                  ))}
                </div>
              </div>
              <div className="sr-only">
                <p>Our graduates are hired by companies including: Google, Mayo Clinic, Deloitte, Kaiser Permanente, Amazon, Johns Hopkins, Bosch, and KPMG.</p>
              </div>
            </section>

            {/* Career paths */}
            <section className="py-16 bg-white" aria-labelledby="paths-heading">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="text-center mb-12">
                  <h2 id="paths-heading" className="text-3xl font-bold text-sf-navy mb-3">Choose Your Career Path</h2>
                  <p className="text-gray-500 max-w-xl mx-auto">Every program is built with employer input and designed to get you job-ready fast.</p>
                </div>
                <ul className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" role="list">
                  {[
                    { icon: '🏥', label: 'Healthcare Support', count: '12 programs', color: 'bg-red-50 border-red-100' },
                    { icon: '💻', label: 'IT & Technology', count: '9 programs', color: 'bg-blue-50 border-blue-100' },
                    { icon: '🔧', label: 'Skilled Trades', count: '8 programs', color: 'bg-amber-50 border-amber-100' },
                    { icon: '📊', label: 'Business Admin', count: '11 programs', color: 'bg-green-50 border-green-100' },
                  ].map(p => (
                    <li key={p.label} role="listitem">
                      <a href="courses.html"
                        aria-label={`Browse ${p.label} — ${p.count}`}
                        className={`block text-center p-8 rounded-xl border-2 ${p.color} card-hover transition-all group`}>
                        <div className="text-4xl mb-4" aria-hidden="true">{p.icon}</div>
                        <h3 className="font-bold text-sf-navy text-lg group-hover:text-sf-amber transition-colors">{p.label}</h3>
                        <p className="text-sm text-gray-500 mt-1">{p.count}</p>
                      </a>
                    </li>
                  ))}
                </ul>
              </div>
            </section>

            {/* Featured courses */}
            <section className="py-16 bg-sf-light" aria-labelledby="featured-heading">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-4">
                  <div>
                    <h2 id="featured-heading" className="text-3xl font-bold text-sf-navy">Featured Programs</h2>
                    <p className="text-gray-500 mt-1">In-demand credentials — cohorts filling fast</p>
                  </div>
                  <a href="courses.html" className="text-sf-amber font-semibold hover:underline text-sm">View all courses →</a>
                </div>
                <ul className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" role="list" aria-label="Featured courses">
                  {featuredCourses.map(c => (
                    <li key={c.title} role="listitem">
                      <CourseCard {...c} />
                    </li>
                  ))}
                </ul>
              </div>
            </section>

            {/* Success Stories */}
            <StoriesCarousel />

            {/* How it works */}
            <section className="py-16 bg-white" aria-labelledby="how-heading">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="text-center mb-12">
                  <h2 id="how-heading" className="text-3xl font-bold text-sf-navy mb-3">How SkillForge Works</h2>
                  <p className="text-gray-500">From enrollment to employment in as little as 8 weeks</p>
                </div>
                <ol className="grid grid-cols-1 md:grid-cols-4 gap-8" aria-label="Steps to get started">
                  {[
                    { step: '01', title: 'Find Your Program', desc: 'Use our quiz or browse 40+ career-focused programs across 4 fields.' },
                    { step: '02', title: 'Enroll &amp; Fund It', desc: 'Apply online in minutes. Payment plans, employer reimbursement, and scholarships available.' },
                    { step: '03', title: 'Learn &amp; Connect', desc: 'Attend live sessions or go self-paced. Your cohort and instructor are with you every step.' },
                    { step: '04', title: 'Get Hired', desc: 'Earn your certificate and tap our employer network. 92% placed within 3 months.' },
                  ].map(s => (
                    <li key={s.step} className="text-center">
                      <div className="w-12 h-12 rounded-full bg-sf-amber text-white font-bold text-lg flex items-center justify-center mx-auto mb-4" aria-hidden="true">{s.step}</div>
                      <h3 className="font-bold text-sf-navy mb-2" dangerouslySetInnerHTML={{ __html: s.title }} />
                      <p className="text-sm text-gray-500 leading-relaxed">{s.desc}</p>
                    </li>
                  ))}
                </ol>
              </div>
            </section>

            {/* CTA Banner */}
            <section className="bg-sf-amber py-16 text-white" aria-labelledby="cta-heading">
              <div className="max-w-3xl mx-auto px-4 text-center">
                <h2 id="cta-heading" className="text-3xl md:text-4xl font-extrabold mb-4">Ready to Launch Your New Career?</h2>
                <p className="text-amber-100 mb-8 text-lg">Join 47,000+ SkillForge graduates. Spring cohorts are filling fast.</p>
                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                  <a href="pricing.html" className="bg-white text-sf-amber font-bold px-8 py-4 rounded-xl text-lg hover:bg-amber-50 transition-colors">
                    See Pricing & Plans
                  </a>
                  <button onClick={() => setQuizOpen(true)} className="border-2 border-white text-white font-bold px-8 py-4 rounded-xl text-lg hover:bg-white/10 transition-colors">
                    Take the Quiz
                  </button>
                </div>
              </div>
            </section>
          </main>

          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HomePage />);
  </script>
