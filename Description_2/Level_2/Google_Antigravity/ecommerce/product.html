<!DOCTYPE html>
<html lang="en">

<head>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

</head>

<body class="bg-white text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Header = () => (
            <header className="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-16">
                        <div className="flex-shrink-0 flex items-center">
                            <a href="index.html" className="text-2xl font-bold tracking-tighter text-gray-900" aria-label="ThreadHouse Homepage">ThreadHouse</a>
                        </div>
                        <nav className="hidden md:flex space-x-8" aria-label="Main Navigation">
                            <a href="products.html" className="text-gray-600 hover:text-black transition-colors px-3 py-2 text-sm font-medium">Shop</a>
                            <a href="products.html" className="text-gray-600 hover:text-black transition-colors px-3 py-2 text-sm font-medium">New Arrivals</a>
                            <a href="products.html" className="text-red-600 hover:text-red-700 transition-colors px-3 py-2 text-sm font-medium">Sale</a>
                        </nav>
                        <div className="flex items-center space-x-4 md:space-x-6">
                            <button aria-label="Search site" className="text-gray-400 hover:text-black transition-colors">
                                <i className="fas fa-search" aria-hidden="true"></i>
                            </button>
                            <a href="account.html" aria-label="Account profile" className="text-gray-400 hover:text-black transition-colors">
                                <i className="far fa-user" aria-hidden="true"></i>
                            </a>
                            <a href="cart.html" aria-label="Shopping Cart with 2 items" className="text-gray-400 hover:text-black transition-colors relative">
                                <i className="fas fa-shopping-bag" aria-hidden="true"></i>
                                <span className="absolute -top-1.5 -right-2 inline-flex items-center justify-center h-4 w-4 text-[10px] font-bold leading-none text-white transform bg-black rounded-full">2</span>
                            </a>
                        </div>
                    </div>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="bg-gray-50 border-t border-gray-200 pt-16 pb-8 mt-16">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                        <div>
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">About Us</h2>
                            <ul className="space-y-4">
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Our Story</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Sustainability</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Careers</a></li>
                            </ul>
                        </div>
                        <div>
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">Customer Service</h2>
                            <ul className="space-y-4">
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Contact Us</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Shipping & Returns</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">FAQ</a></li>
                            </ul>
                        </div>
                        <div className="md:col-span-2">
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">Subscribe to our Newsletter</h2>
                            <p className="text-sm text-gray-500 mb-4">Get the latest updates on new products and upcoming sales.</p>
                            <form className="mt-4 sm:flex sm:max-w-md">
                                <label htmlFor="email-address" className="sr-only">Email address</label>
                                <input type="email" name="email-address" id="email-address" required className="appearance-none min-w-0 w-full bg-white border border-gray-300 rounded-md shadow-sm py-2 px-4 text-sm text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-black focus:border-black" placeholder="Enter your email" />
                                <div className="mt-3 rounded-md sm:mt-0 sm:ml-3 sm:flex-shrink-0">
                                    <button type="submit" className="w-full flex items-center justify-center bg-black border border-transparent rounded-md py-2 px-4 text-sm font-medium text-white hover:bg-gray-800 focus:ring-2 focus:ring-offset-2 focus:ring-black transition-colors">Subscribe</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div className="mt-12 border-t border-gray-200 pt-8 flex items-center justify-between">
                        <p className="text-sm text-gray-400">&copy; 2026 ThreadHouse. All rights reserved.</p>
                        <div className="flex space-x-6">
                            <a href="#" className="text-gray-400 hover:text-black transition-colors" aria-label="Visit us on Instagram">
                                <i className="fab fa-instagram text-xl" aria-hidden="true"></i>
                            </a>
                            <a href="#" className="text-gray-400 hover:text-black transition-colors" aria-label="Visit us on Twitter">
                                <i className="fab fa-twitter text-xl" aria-hidden="true"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const SizeGuideModal = ({ isOpen, onClose }) => {
            const modalRef = useRef(null);

            useEffect(() => {
                if (!isOpen) return;

                const focusableElements = modalRef.current.querySelectorAll(
                    'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
                );
                const firstElement = focusableElements[0];
                const lastElement = focusableElements[focusableElements.length - 1];

                const handleTab = (e) => {
                    if (e.key === 'Tab') {
                        if (e.shiftKey) {
                            if (document.activeElement === firstElement) {
                                lastElement.focus();
                                e.preventDefault();
                            }
                        } else {
                            if (document.activeElement === lastElement) {
                                firstElement.focus();
                                e.preventDefault();
                            }
                        }
                    }
                    if (e.key === 'Escape') {
                        onClose();
                    }
                };

                document.addEventListener('keydown', handleTab);
                firstElement.focus();

                return () => {
                    document.removeEventListener('keydown', handleTab);
                };
            }, [isOpen, onClose]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[100] overflow-y-auto" role="dialog" aria-modal="true" aria-labelledby="modal-title">
                    <div className="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                        {/* Background overlay */}
                        <div className="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onClick={onClose}></div>

                        <span className="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
                        <div ref={modalRef} className="inline-block align-bottom bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6" role="document">
                            <div className="absolute top-0 right-0 pt-4 pr-4">
                                <button
                                    type="button"
                                    className="bg-white rounded-md text-gray-400 hover:text-gray-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black"
                                    onClick={onClose}
                                    aria-label="Close modal"
                                >
                                    <span className="sr-only">Close</span>
                                    <i className="fas fa-times text-xl" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div className="sm:flex sm:items-start">
                                <div className="mt-3 text-center sm:mt-0 sm:text-left w-full">
                                    <h3 className="text-lg leading-6 font-medium text-gray-900" id="modal-title">Size Guide</h3>
                                    <div className="mt-4 overflow-x-auto">
                                        <table className="min-w-full divide-y divide-gray-200">
                                            <thead className="bg-gray-50">
                                                <tr>
                                                    <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Size</th>
                                                    <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Chest (in)</th>
                                                    <th scope="col" className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Length (in)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white divide-y divide-gray-200">
                                                <tr><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">S</td><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">36-38</td><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">28</td></tr>
                                                <tr><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">M</td><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">38-40</td><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">29</td></tr>
                                                <tr><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">L</td><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">40-42</td><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">30</td></tr>
                                                <tr><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">XL</td><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">42-44</td><td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">31</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
                                <button
                                    type="button"
                                    className="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-black text-base font-medium text-white hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black sm:ml-3 sm:w-auto sm:text-sm"
                                    onClick={onClose}
                                >
                                    Got it
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [selectedSize, setSelectedSize] = useState("");
            const [selectedColor, setSelectedColor] = useState("Sage Green");
            const [quantity, setQuantity] = useState(1);
            const [activeTab, setActiveTab] = useState("materials");
            const [isSizeGuideOpen, setIsSizeGuideOpen] = useState(false);
            const [cartMessage, setCartMessage] = useState("");

            const images = [
                "https://images.unsplash.com/photo-1596755094514-f87e32f85e2c?auto=format&fit=crop&w=1000&q=80",
                "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?auto=format&fit=crop&w=1000&q=80",
                "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=1000&q=80",
                "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&w=1000&q=80"
            ];

            const completeLook = [
                { id: 101, name: "Pleated Trousers", price: "$110.00", image: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&w=400&q=80" },
                { id: 102, name: "Minimalist Watch", price: "$145.00", image: "https://images.unsplash.com/photo-1524805444758-089113d48a6d?auto=format&fit=crop&w=400&q=80" },
                { id: 103, name: "Leather Loafers", price: "$165.00", image: "https://images.unsplash.com/photo-1533827432537-70133748f5c8?auto=format&fit=crop&w=400&q=80" }
            ];

            const handleAddToCart = () => {
                if (!selectedSize) {
                    alert('Please select a size first.');
                    return;
                }
                setCartMessage(`Added ${quantity} Oversized Linen Shirt in ${selectedSize} to your cart.`);
                setTimeout(() => setCartMessage(""), 5000);
            };

            const openSizeGuide = () => {
                setIsSizeGuideOpen(true);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">

                        {/* Breadcrumbs */}
                        <nav aria-label="Breadcrumb" className="mb-6">
                            <ol role="list" className="flex items-center space-x-2 text-sm text-gray-500">
                                <li><a href="index.html" className="hover:text-black">Home</a></li>
                                <li><span className="mx-2">/</span></li>
                                <li><a href="products.html" className="hover:text-black">Clothing</a></li>
                                <li><span className="mx-2">/</span></li>
                                <li><a href="products.html" className="hover:text-black">Shirts</a></li>
                                <li><span className="mx-2">/</span></li>
                                <li aria-current="page" className="text-gray-900 font-medium">Oversized Linen Shirt</li>
                            </ol>
                        </nav>

                        <div className="lg:grid lg:grid-cols-2 lg:gap-x-12 xl:gap-x-16">
                            {/* Image Gallery */}
                            <div className="flex flex-col-reverse lg:flex-row gap-4 lg:gap-6 mb-10 lg:mb-0">
                                {/* Thumbnails */}
                                <div className="hidden lg:flex flex-col space-y-4 w-24 flex-shrink-0" role="group" aria-label="Product image thumbnails">
                                    {images.map((img, idx) => (
                                        <button key={idx} className="relative h-32 w-full bg-gray-100 rounded-md overflow-hidden focus:outline-none focus:ring-2 focus:ring-black">
                                            <span className="sr-only">View image {idx + 1}</span>
                                            <img src={img} alt="" className="w-full h-full object-cover object-center" aria-hidden="true" />
                                        </button>
                                    ))}
                                </div>

                                {/* Main Image Grid (Mobile: scroller, Desktop: grid or large single + scroll) */}
                                <div className="w-full grid grid-cols-2 gap-4 lg:grid-cols-1 lg:gap-6">
                                    {images.map((img, idx) => (
                                        <div key={idx} className="relative aspect-[3/4] bg-gray-100 rounded-lg overflow-hidden">
                                            <img src={img} alt={`Lifestyle photo ${idx + 1} for Oversized Linen Shirt`} className="w-full h-full object-cover object-center" />
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Product Info */}
                            <div className="flex flex-col pt-2 lg:pt-0">
                                <h1 className="text-3xl font-bold text-gray-900 mb-2">Oversized Linen Shirt</h1>
                                <p className="text-2xl font-medium text-gray-900 mb-6">$89.00</p>

                                <div className="prose prose-sm text-gray-600 mb-8 w-full max-w-none">
                                    <p>A relaxed, boxy silhouette cut from premium European flax. This oversized linen shirt is garment-dyed for a soft, lived-in feel from day one. Perfect for warm weather layering.</p>
                                </div>

                                {/* Color Selector */}
                                <div className="mb-8">
                                    <h2 className="text-sm font-medium text-gray-900 mb-3">Color - <span className="font-normal text-gray-500">{selectedColor}</span></h2>
                                    <div className="flex items-center space-x-3">
                                        <button className="h-8 w-8 rounded-full bg-[#8A9A86] ring-2 ring-offset-2 ring-black focus:outline-none" aria-label="Select Sage Green" onClick={() => setSelectedColor("Sage Green")}></button>
                                        <button className="h-8 w-8 rounded-full bg-[#FAF9F6] border border-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black" aria-label="Select Off-White" onClick={() => setSelectedColor("Off-White")}></button>
                                        <button className="h-8 w-8 rounded-full bg-[#1A1A1A] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black" aria-label="Select Washed Black" onClick={() => setSelectedColor("Washed Black")}></button>
                                    </div>
                                </div>

                                {/* Size Selector */}
                                <div className="mb-8">
                                    <div className="flex justify-between items-center mb-3">
                                        <h2 className="text-sm font-medium text-gray-900">Size</h2>
                                        <button className="text-sm text-gray-500 hover:text-black hover:underline focus:outline-none" onClick={openSizeGuide}>Size Guide</button>
                                    </div>
                                    <div className="grid grid-cols-5 gap-3">
                                        {['XS', 'S', 'M', 'L', 'XL'].map((size) => (
                                            <button
                                                key={size}
                                                onClick={() => setSelectedSize(size)}
                                                className={`flex items-center justify-center rounded-md border py-3 text-sm font-medium focus:outline-none sm:flex-1 transition-colors ${selectedSize === size ? 'bg-black text-white border-black ring-2 ring-offset-2 ring-black' : 'bg-white text-gray-900 border-gray-200 hover:bg-gray-50'}`}
                                                aria-pressed={selectedSize === size}
                                                aria-label={`Size ${size}`}
                                            >
                                                {size}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Quantity and Add to Cart */}
                                <div className="flex space-x-4 mb-10">
                                    <div className="w-1/4">
                                        <label htmlFor="quantity" className="sr-only">Quantity</label>
                                        <div className="flex items-center border border-gray-300 rounded-md h-12">
                                            <button className="px-3 py-2 text-gray-600 hover:text-black focus:outline-none" onClick={() => setQuantity(Math.max(1, quantity - 1))} aria-label="Decrease quantity">
                                                <i className="fas fa-minus text-xs" aria-hidden="true"></i>
                                            </button>
                                            <input type="number" id="quantity" name="quantity" min="1" value={quantity} readOnly className="w-full text-center text-gray-900 font-medium focus:outline-none border-none py-2" />
                                            <button className="px-3 py-2 text-gray-600 hover:text-black focus:outline-none" onClick={() => setQuantity(quantity + 1)} aria-label="Increase quantity">
                                                <i className="fas fa-plus text-xs" aria-hidden="true"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <button
                                        onClick={handleAddToCart}
                                        className="w-3/4 bg-black border border-transparent rounded-md shadow-sm py-3 px-8 text-base font-medium text-white hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black"
                                    >
                                        Add to Cart
                                    </button>
                                </div>

                                {/* Live Region for Announcer */}
                                <div aria-live="assertive" className="sr-only">{cartMessage}</div>
                                {cartMessage && (
                                    <div className="mb-6 p-4 bg-green-50 border border-green-200 text-green-800 rounded-md flex items-center">
                                        <i className="fas fa-check-circle mr-2 text-green-600"></i>
                                        {cartMessage}
                                    </div>
                                )}

                                {/* Tabs for Details */}
                                <div className="border-t border-gray-200 pt-6 mt-2">
                                    <div className="flex border-b border-gray-200" role="tablist" aria-orientation="horizontal">
                                        <button
                                            className={`py-4 px-6 text-sm font-medium border-b-2 focus:outline-none ${activeTab === 'materials' ? 'border-black text-black' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}
                                            role="tab"
                                            aria-selected={activeTab === 'materials'}
                                            aria-controls="tab-materials"
                                            id="tab-btn-materials"
                                            onClick={() => setActiveTab('materials')}
                                        >
                                            Material & Care
                                        </button>
                                        <button
                                            className={`py-4 px-6 text-sm font-medium border-b-2 focus:outline-none ${activeTab === 'shipping' ? 'border-black text-black' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}
                                            role="tab"
                                            aria-selected={activeTab === 'shipping'}
                                            aria-controls="tab-shipping"
                                            id="tab-btn-shipping"
                                            onClick={() => setActiveTab('shipping')}
                                        >
                                            Shipping & Returns
                                        </button>
                                    </div>

                                    <div className="py-6">
                                        {activeTab === 'materials' && (
                                            <div id="tab-materials" role="tabpanel" aria-labelledby="tab-btn-materials">
                                                <ul className="list-disc pl-5 space-y-2 text-sm text-gray-600">
                                                    <li>100% Organic European Flax Linen</li>
                                                    <li>Garment-dyed for a washed, lived-in feel</li>
                                                    <li>Machine wash cold with like colors</li>
                                                    <li>Tumble dry low or hang dry</li>
                                                    <li>Warm iron if needed, or leave un-ironed for a relaxed look</li>
                                                </ul>
                                            </div>
                                        )}
                                        {activeTab === 'shipping' && (
                                            <div id="tab-shipping" role="tabpanel" aria-labelledby="tab-btn-shipping">
                                                <ul className="list-disc pl-5 space-y-2 text-sm text-gray-600">
                                                    <li>Free standard shipping on orders over $150</li>
                                                    <li>Standard delivery in 3-5 business days</li>
                                                    <li>Expedited delivery available at checkout</li>
                                                    <li>Free returns within 30 days of purchase</li>
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                </div>

                            </div>
                        </div>

                        {/* Complete The Look */}
                        <section className="mt-24 border-t border-gray-200 pt-16" aria-labelledby="complete-look-heading">
                            <h2 id="complete-look-heading" className="text-2xl font-bold text-gray-900 mb-8">Complete the Look</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                {completeLook.map((item) => (
                                    <div key={item.id} className="group">
                                        <div className="relative w-full h-80 bg-gray-200 rounded-lg overflow-hidden mb-4">
                                            <img src={item.image} alt="" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" aria-hidden="true" />
                                        </div>
                                        <div className="flex justify-between items-start">
                                            <h3 className="text-base font-medium text-gray-900">
                                                <a href="#" className="focus:outline-none focus:underline">
                                                    <span aria-hidden="true" className="absolute inset-0 z-10"></span>
                                                    {item.name}
                                                </a>
                                            </h3>
                                            <p className="text-base font-medium text-gray-900">{item.price}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Photo Reviews */}
                        <section className="mt-24 border-t border-gray-200 pt-16 mb-16" aria-labelledby="reviews-heading">
                            <div className="flex items-center justify-between mb-8">
                                <h2 id="reviews-heading" className="text-2xl font-bold text-gray-900">How You Wear It</h2>
                                <button className="text-sm font-semibold text-black hover:underline hidden sm:block">Upload Photo</button>
                            </div>

                            <div className="flex space-x-4 overflow-x-auto pb-8 no-scrollbar -mx-4 px-4 sm:mx-0 sm:px-0">
                                {[1, 2, 3, 4, 5].map((_, i) => (
                                    <div key={i} className="flex-none w-64 md:w-72 relative group">
                                        <div className="relative h-80 w-full rounded-lg overflow-hidden bg-gray-200">
                                            <img
                                                src={`https://images.unsplash.com/photo-${1500000000000 + (i * 12345)}?auto=format&fit=crop&w=400&q=80`}
                                                alt={`Customer wearing ${selectedColor} shirt`}
                                                className="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500"
                                                onError={(e) => {
                                                    e.target.src = "https://images.unsplash.com/photo-1596755094514-f87e32f85e2c?auto=format&fit=crop&w=400&q=80";
                                                }}
                                            />
                                            <div className="absolute inset-x-0 bottom-0 p-4 bg-gradient-to-t from-black/60 to-transparent">
                                                <p className="text-white text-sm font-medium">@user_{i + 1}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-4 sm:hidden text-center">
                                <button className="text-sm font-semibold text-black border border-black px-6 py-2 rounded-md">Upload Photo</button>
                            </div>
                        </section>

                    </main>
                    <Footer />
                    <SizeGuideModal isOpen={isSizeGuideOpen} onClose={() => setIsSizeGuideOpen(false)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
