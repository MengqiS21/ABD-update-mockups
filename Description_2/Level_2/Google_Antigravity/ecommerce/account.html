<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreadHouse | My Account</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Header = () => (
            <header className="sticky top-0 z-50 bg-white border-b border-gray-200">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-16">
                        <div className="flex-shrink-0 flex items-center">
                            <a href="index.html" className="text-2xl font-bold tracking-tighter text-gray-900" aria-label="ThreadHouse Homepage">ThreadHouse</a>
                        </div>
                        <nav className="hidden md:flex space-x-8" aria-label="Main Navigation">
                            <a href="products.html" className="text-gray-600 hover:text-black transition-colors px-3 py-2 text-sm font-medium">Shop</a>
                            <a href="products.html" className="text-gray-600 hover:text-black transition-colors px-3 py-2 text-sm font-medium">New Arrivals</a>
                            <a href="products.html" className="text-red-600 hover:text-red-700 transition-colors px-3 py-2 text-sm font-medium">Sale</a>
                        </nav>
                        <div className="flex items-center space-x-4 md:space-x-6">
                            <button aria-label="Search site" className="text-gray-400 hover:text-black transition-colors">
                                <i className="fas fa-search" aria-hidden="true"></i>
                            </button>
                            <a href="account.html" aria-current="page" aria-label="Account profile" className="text-black transition-colors">
                                <i className="fas fa-user" aria-hidden="true"></i>
                            </a>
                            <a href="cart.html" aria-label="Shopping Cart with 2 items" className="text-gray-400 hover:text-black transition-colors relative">
                                <i className="fas fa-shopping-bag" aria-hidden="true"></i>
                                <span className="absolute -top-1.5 -right-2 inline-flex items-center justify-center h-4 w-4 text-[10px] font-bold leading-none text-white transform bg-black rounded-full">2</span>
                            </a>
                        </div>
                    </div>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="bg-white border-t border-gray-200 pt-16 pb-8 mt-16">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                        <div>
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">About Us</h2>
                            <ul className="space-y-4">
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Our Story</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Sustainability</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Careers</a></li>
                            </ul>
                        </div>
                        <div>
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">Customer Service</h2>
                            <ul className="space-y-4">
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Contact Us</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Shipping & Returns</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">FAQ</a></li>
                            </ul>
                        </div>
                        <div className="md:col-span-2">
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">Subscribe to our Newsletter</h2>
                            <p className="text-sm text-gray-500 mb-4">Get the latest updates on new products and upcoming sales.</p>
                            <form className="mt-4 sm:flex sm:max-w-md">
                                <label htmlFor="email-address" className="sr-only">Email address</label>
                                <input type="email" name="email-address" id="email-address" required className="appearance-none min-w-0 w-full bg-white border border-gray-300 rounded-md shadow-sm py-2 px-4 text-sm text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-black focus:border-black" placeholder="Enter your email" />
                                <div className="mt-3 rounded-md sm:mt-0 sm:ml-3 sm:flex-shrink-0">
                                    <button type="submit" className="w-full flex items-center justify-center bg-black border border-transparent rounded-md py-2 px-4 text-sm font-medium text-white hover:bg-gray-800 focus:ring-2 focus:ring-offset-2 focus:ring-black transition-colors">Subscribe</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div className="mt-12 border-t border-gray-200 pt-8 flex items-center justify-between">
                        <p className="text-sm text-gray-400">&copy; 2026 ThreadHouse. All rights reserved.</p>
                        <div className="flex space-x-6">
                            <a href="#" className="text-gray-400 hover:text-black transition-colors" aria-label="Visit us on Instagram">
                                <i className="fab fa-instagram text-xl" aria-hidden="true"></i>
                            </a>
                            <a href="#" className="text-gray-400 hover:text-black transition-colors" aria-label="Visit us on Twitter">
                                <i className="fab fa-twitter text-xl" aria-hidden="true"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const MyOrders = () => {
            const orders = [
                {
                    id: 'ORD-987654321',
                    date: 'March 15, 2026',
                    status: 'Delivered',
                    total: '$143.00',
                    items: [
                        { name: 'Organic Cotton T-Shirt', color: 'White', size: 'M', price: '$45.00', image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=150&q=80' },
                        { name: 'Recycled Denim Jacket', color: 'Blue', size: 'L', price: '$98.00', image: 'https://images.unsplash.com/photo-1576871337622-98d48d1cf531?auto=format&fit=crop&w=150&q=80' }
                    ]
                },
                {
                    id: 'ORD-123456789',
                    date: 'January 28, 2026',
                    status: 'Returned',
                    total: '$89.00',
                    items: [
                        { name: 'Oversized Linen Shirt', color: 'Sage Green', size: 'L', price: '$89.00', image: 'https://images.unsplash.com/photo-1596755094514-f87e32f85e2c?auto=format&fit=crop&w=150&q=80' }
                    ]
                }
            ];

            return (
                <div aria-labelledby="orders-heading" className="space-y-6">
                    <h2 id="orders-heading" className="text-2xl font-bold text-gray-900">Order History</h2>
                    {orders.map((order) => (
                        <div key={order.id} className="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
                            <div className="bg-gray-50 px-4 py-4 sm:px-6 flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-gray-200">
                                <div className="grid grid-cols-2 gap-4 sm:flex sm:space-x-8 sm:gap-0">
                                    <div>
                                        <dt className="text-xs font-medium text-gray-500 uppercase">Order Number</dt>
                                        <dd className="mt-1 text-sm text-gray-900 font-medium">{order.id}</dd>
                                    </div>
                                    <div>
                                        <dt className="text-xs font-medium text-gray-500 uppercase">Date Placed</dt>
                                        <dd className="mt-1 text-sm text-gray-900">{order.date}</dd>
                                    </div>
                                    <div>
                                        <dt className="text-xs font-medium text-gray-500 uppercase">Total Amount</dt>
                                        <dd className="mt-1 text-sm text-gray-900 font-medium">{order.total}</dd>
                                    </div>
                                </div>
                                <div className="mt-4 sm:mt-0 flex flex-col sm:items-end">
                                    <span className={`inline-flex rounded-full px-3 py-0.5 text-sm font-medium ${order.status === 'Delivered' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}`}>
                                        {order.status}
                                    </span>
                                    <a href="#" className="mt-2 text-sm font-medium text-black hover:underline" aria-label={`View details of order ${order.id}`}>View Invoice</a>
                                </div>
                            </div>
                            <ul role="list" className="divide-y divide-gray-200">
                                {order.items.map((item, idx) => (
                                    <li key={idx} className="p-4 sm:p-6 flex items-center sm:items-start">
                                        <div className="flex-shrink-0 w-16 h-20 sm:w-20 sm:h-24 bg-gray-200 rounded-md overflow-hidden">
                                            <img src={item.image} alt={item.name} className="w-full h-full object-cover object-center" />
                                        </div>
                                        <div className="ml-4 flex-1">
                                            <div className="font-medium text-gray-900">
                                                <a href="product.html" className="hover:underline">{item.name}</a>
                                            </div>
                                            <div className="mt-1 text-sm text-gray-500 sm:flex sm:space-x-4">
                                                <p>{item.color}</p>
                                                <p className="hidden sm:block border-l border-gray-300 pl-4">Size {item.size}</p>
                                                <p className="block sm:hidden mt-1">Size {item.size}</p>
                                            </div>
                                            <p className="mt-1 text-sm font-medium text-gray-900">{item.price}</p>
                                        </div>
                                        <div className="ml-4 flex-shrink-0 hidden sm:block">
                                            <a href="product.html" className="text-sm font-medium text-black hover:underline px-4 py-2 border border-gray-300 rounded-md">Buy Again</a>
                                        </div>
                                    </li>
                                ))}
                            </ul>
                            <div className="p-4 sm:hidden border-t border-gray-200 bg-gray-50 text-center">
                                <a href="product.html" className="text-sm font-medium text-black hover:underline">Buy Again</a>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        const StyleProfile = () => {
            const [preferences, setPreferences] = useState({
                fit: 'Oversized',
                colors: ['Neutrals', 'Earth Tones'],
                materials: ['Linen', 'Organic Cotton']
            });

            return (
                <div aria-labelledby="profile-heading" className="bg-white border border-gray-200 rounded-lg shadow-sm p-6 sm:p-8">
                    <div className="flex justify-between items-center mb-6 border-b border-gray-200 pb-4">
                        <h2 id="profile-heading" className="text-2xl font-bold text-gray-900">Style Profile</h2>
                        <button className="text-sm font-medium text-black hover:underline border border-black px-4 py-2 rounded-md">Edit Profile</button>
                    </div>

                    <p className="text-gray-600 mb-8">We use your style profile to tailor "Style Match" recommendations specifically for you.</p>

                    <dl className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-8">
                        <div className="sm:col-span-1 border-b border-gray-100 pb-4 md:border-none md:pb-0">
                            <dt className="text-sm font-medium text-gray-500 uppercase tracking-widest mb-2">Preferred Fit</dt>
                            <dd className="text-base text-gray-900 font-medium">{preferences.fit}</dd>
                        </div>

                        <div className="sm:col-span-1 border-b border-gray-100 pb-4 md:border-none md:pb-0">
                            <dt className="text-sm font-medium text-gray-500 uppercase tracking-widest mb-2">Sizes</dt>
                            <dd className="text-base text-gray-900 space-x-4">
                                <span className="inline-flex items-center px-2.5 py-0.5 rounded-md text-sm font-medium bg-gray-100 text-gray-800">Top: L</span>
                                <span className="inline-flex items-center px-2.5 py-0.5 rounded-md text-sm font-medium bg-gray-100 text-gray-800">Bottom: 32</span>
                            </dd>
                        </div>

                        <div className="sm:col-span-1 border-b border-gray-100 pb-4 md:border-none md:pb-0">
                            <dt className="text-sm font-medium text-gray-500 uppercase tracking-widest mb-2">Favorite Color Palettes</dt>
                            <dd className="mt-1 flex flex-wrap gap-2">
                                {preferences.colors.map(c => (
                                    <span key={c} className="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium border border-gray-300 bg-white">
                                        {c}
                                    </span>
                                ))}
                            </dd>
                        </div>

                        <div className="sm:col-span-1">
                            <dt className="text-sm font-medium text-gray-500 uppercase tracking-widest mb-2">Preferred Materials</dt>
                            <dd className="mt-1 flex flex-wrap gap-2">
                                {preferences.materials.map(m => (
                                    <span key={m} className="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium border border-gray-300 bg-white">
                                        {m}
                                    </span>
                                ))}
                            </dd>
                        </div>
                    </dl>
                </div>
            );
        }

        const LoyaltyRewards = () => {
            const copyCode = (e) => {
                e.preventDefault();
                navigator.clipboard.writeText('REF-ALEX2026');
                alert('Referral link copied to clipboard!');
            }

            return (
                <div className="space-y-8">
                    {/* Rewards Balance */}
                    <div aria-labelledby="rewards-heading" className="bg-blue-50 border border-blue-200 rounded-lg p-6 sm:p-8 relative overflow-hidden">
                        <div className="relative z-10 flex flex-col md:flex-row md:items-center md:justify-between">
                            <div>
                                <h2 id="rewards-heading" className="text-2xl font-bold text-gray-900 mb-2">My Rewards</h2>
                                <p className="text-blue-800 font-medium mb-1">Tier: <span className="font-bold">Gold Member</span></p>
                                <p className="text-blue-700 text-sm max-w-md">You earn 2 points for every $1 spent. Reach 500 points to unlock a free tote bag!</p>
                            </div>
                            <div className="mt-6 md:mt-0 text-left md:text-right bg-white p-4 rounded-lg shadow-sm border border-blue-100 inline-block">
                                <p className="text-xs uppercase font-bold text-gray-500 tracking-wider">Available Points</p>
                                <p className="text-4xl font-black text-blue-600">380</p>
                            </div>
                        </div>

                        <div className="mt-8 relative z-10">
                            <div className="flex justify-between text-xs font-semibold text-blue-800 mb-2">
                                <span>0 pt</span>
                                <span>500 pt</span>
                            </div>
                            <div className="w-full bg-blue-200 rounded-full h-3">
                                <div className="bg-blue-600 h-3 rounded-full relative" style={{ width: '76%' }}>
                                    <div className="absolute -right-3 -top-1 w-5 h-5 bg-white border-2 border-blue-600 rounded-full shadow"></div>
                                </div>
                            </div>
                            <p className="text-sm font-medium text-blue-800 mt-3 text-right">120 points to next reward</p>
                        </div>

                        {/* Decorative background circle */}
                        <div className="absolute -bottom-24 -right-24 w-64 h-64 bg-blue-200 rounded-full opacity-20 pointer-events-none" aria-hidden="true"></div>
                    </div>

                    {/* Referral Program */}
                    <div aria-labelledby="referral-heading" className="bg-white border border-gray-200 rounded-lg shadow-sm p-6 sm:p-8">
                        <div className="flex items-start">
                            <div className="flex-shrink-0 mt-1">
                                <span className="flex h-12 w-12 items-center justify-center rounded-lg bg-black">
                                    <i className="fas fa-gift text-white text-xl" aria-hidden="true"></i>
                                </span>
                            </div>
                            <div className="ml-6 flex-1">
                                <h2 id="referral-heading" className="text-xl font-bold text-gray-900 mb-2">Give $20, Get $20</h2>
                                <p className="text-gray-600 mb-6">Share your unique link with friends. They get $20 off their first order, and you get $20 in store credit when they purchase.</p>

                                <div className="flex flex-col sm:flex-row gap-4">
                                    <div className="relative flex-grow">
                                        <label htmlFor="referral-link" className="sr-only">Your referral link</label>
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                            <i className="fas fa-link text-gray-400" aria-hidden="true"></i>
                                        </div>
                                        <input
                                            type="text"
                                            id="referral-link"
                                            readOnly
                                            value="threadhouse.com/ref/REF-ALEX2026"
                                            className="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-md leading-5 bg-gray-50 text-gray-900 sm:text-sm focus:outline-none focus:ring-black focus:border-black"
                                        />
                                    </div>
                                    <button
                                        onClick={copyCode}
                                        className="inline-flex items-center justify-center px-6 py-3 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black"
                                    >
                                        Copy Link
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const SavedOutfits = () => {
            const outfits = [
                { id: 1, name: "Weekend Minimalist", items: 3, image: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=400&q=80" },
                { id: 2, name: "Office Casual", items: 4, image: "https://images.unsplash.com/photo-1594938298596-eb5fd3822758?auto=format&fit=crop&w=400&q=80" }
            ];

            return (
                <div aria-labelledby="outfits-heading">
                    <div className="flex justify-between items-center mb-6">
                        <h2 id="outfits-heading" className="text-2xl font-bold text-gray-900">Saved Outfits</h2>
                        <a href="products.html" className="text-sm font-medium text-black hover:underline">Create New</a>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        {outfits.map(outfit => (
                            <div key={outfit.id} className="group relative bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden flex flex-col">
                                <div className="aspect-[4/3] bg-gray-200 overflow-hidden">
                                    <img src={outfit.image} alt={outfit.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                </div>
                                <div className="p-4 flex-1 flex flex-col justify-between">
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-900">
                                            <a href="#" className="focus:outline-none hover:underline">
                                                <span className="absolute inset-0" aria-hidden="true"></span>
                                                {outfit.name}
                                            </a>
                                        </h3>
                                        <p className="text-sm text-gray-500">{outfit.items} items saved</p>
                                    </div>
                                    <div className="mt-4 flex items-center space-x-2 relative z-10">
                                        <button className="text-sm font-medium text-black bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded">Shop Outfit</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const App = () => {
            const [activeTab, setActiveTab] = useState('orders');

            const tabs = [
                { id: 'orders', name: 'My Orders', icon: 'fas fa-box' },
                { id: 'profile', name: 'Style Profile', icon: 'fas fa-tshirt' },
                { id: 'rewards', name: 'Rewards & Referrals', icon: 'fas fa-star' },
                { id: 'outfits', name: 'Saved Outfits', icon: 'fas fa-heart' },
                { id: 'settings', name: 'Account Settings', icon: 'fas fa-cog' }
            ];

            const renderContent = () => {
                switch (activeTab) {
                    case 'orders': return <MyOrders />;
                    case 'profile': return <StyleProfile />;
                    case 'rewards': return <LoyaltyRewards />;
                    case 'outfits': return <SavedOutfits />;
                    case 'settings': return <div className="bg-white p-8 rounded-lg shadow-sm border border-gray-200"><h2 className="text-xl font-bold">Account Settings</h2><p className="mt-4 text-gray-500">Settings panel under construction.</p></div>;
                    default: return <MyOrders />;
                }
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full" aria-labelledby="account-heading">
                        <div className="md:flex md:items-center md:justify-between mb-8 pb-4 border-b border-gray-200">
                            <div className="flex-1 min-w-0">
                                <h1 id="account-heading" className="text-3xl font-bold leading-7 text-gray-900 sm:text-4xl sm:truncate">
                                    Welcome back, Alex
                                </h1>
                                <p className="mt-2 text-sm text-gray-500">Member since February 2025</p>
                            </div>
                            <div className="mt-4 flex md:mt-0 md:ml-4">
                                <button type="button" className="inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black">
                                    Sign Out
                                </button>
                            </div>
                        </div>

                        <div className="flex flex-col lg:flex-row gap-8 lg:gap-12">
                            <aside className="w-full lg:w-64 flex-shrink-0" aria-label="Account Navigation">
                                <nav className="space-y-1">
                                    {tabs.map((tab) => (
                                        <button
                                            key={tab.id}
                                            onClick={() => setActiveTab(tab.id)}
                                            className={`group flex items-center w-full px-3 py-3 text-sm font-medium rounded-md transition-colors ${activeTab === tab.id
                                                    ? 'bg-black text-white'
                                                    : 'text-gray-900 hover:bg-gray-100'
                                                }`}
                                            aria-current={activeTab === tab.id ? 'page' : undefined}
                                        >
                                            <i className={`${tab.icon} flex-shrink-0 -ml-1 mr-3 text-lg ${activeTab === tab.id ? 'text-white' : 'text-gray-400 group-hover:text-gray-500'}`} aria-hidden="true"></i>
                                            <span className="truncate">{tab.name}</span>
                                        </button>
                                    ))}
                                </nav>
                            </aside>

                            <section className="flex-1 min-w-0" aria-live="polite">
                                {renderContent()}
                            </section>
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
