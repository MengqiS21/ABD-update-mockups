<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreadHouse | Shopping Cart</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Header = () => (
            <header className="sticky top-0 z-50 bg-white border-b border-gray-200">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-16">
                        <div className="flex-shrink-0 flex items-center">
                            <a href="index.html" className="text-2xl font-bold tracking-tighter text-gray-900" aria-label="ThreadHouse Homepage">ThreadHouse</a>
                        </div>
                        <nav className="hidden md:flex space-x-8" aria-label="Main Navigation">
                            <a href="products.html" className="text-gray-600 hover:text-black transition-colors px-3 py-2 text-sm font-medium">Shop</a>
                            <a href="products.html" className="text-gray-600 hover:text-black transition-colors px-3 py-2 text-sm font-medium">New Arrivals</a>
                            <a href="products.html" className="text-red-600 hover:text-red-700 transition-colors px-3 py-2 text-sm font-medium">Sale</a>
                        </nav>
                        <div className="flex items-center space-x-4 md:space-x-6">
                            <button aria-label="Search site" className="text-gray-400 hover:text-black transition-colors">
                                <i className="fas fa-search" aria-hidden="true"></i>
                            </button>
                            <a href="account.html" aria-label="Account profile" className="text-gray-400 hover:text-black transition-colors">
                                <i className="far fa-user" aria-hidden="true"></i>
                            </a>
                            <a href="cart.html" aria-current="page" aria-label="Shopping Cart" className="text-black transition-colors relative">
                                <i className="fas fa-shopping-bag" aria-hidden="true"></i>
                                <span className="absolute -top-1.5 -right-2 inline-flex items-center justify-center h-4 w-4 text-[10px] font-bold leading-none text-white transform bg-black rounded-full">2</span>
                            </a>
                        </div>
                    </div>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="bg-white border-t border-gray-200 pt-16 pb-8 mt-16">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                        <div>
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">About Us</h2>
                            <ul className="space-y-4">
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Our Story</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Sustainability</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Careers</a></li>
                            </ul>
                        </div>
                        <div>
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">Customer Service</h2>
                            <ul className="space-y-4">
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Contact Us</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Shipping & Returns</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">FAQ</a></li>
                            </ul>
                        </div>
                        <div className="md:col-span-2">
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">Subscribe to our Newsletter</h2>
                            <p className="text-sm text-gray-500 mb-4">Get the latest updates on new products and upcoming sales.</p>
                            <form className="mt-4 sm:flex sm:max-w-md">
                                <label htmlFor="email-address" className="sr-only">Email address</label>
                                <input type="email" name="email-address" id="email-address" required className="appearance-none min-w-0 w-full bg-white border border-gray-300 rounded-md shadow-sm py-2 px-4 text-sm text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-black focus:border-black" placeholder="Enter your email" />
                                <div className="mt-3 rounded-md sm:mt-0 sm:ml-3 sm:flex-shrink-0">
                                    <button type="submit" className="w-full flex items-center justify-center bg-black border border-transparent rounded-md py-2 px-4 text-sm font-medium text-white hover:bg-gray-800 focus:ring-2 focus:ring-offset-2 focus:ring-black transition-colors">Subscribe</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div className="mt-12 border-t border-gray-200 pt-8 flex items-center justify-between">
                        <p className="text-sm text-gray-400">&copy; 2026 ThreadHouse. All rights reserved.</p>
                        <div className="flex space-x-6">
                            <a href="#" className="text-gray-400 hover:text-black transition-colors" aria-label="Visit us on Instagram">
                                <i className="fab fa-instagram text-xl" aria-hidden="true"></i>
                            </a>
                            <a href="#" className="text-gray-400 hover:text-black transition-colors" aria-label="Visit us on Twitter">
                                <i className="fab fa-twitter text-xl" aria-hidden="true"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const App = () => {
            const [cartItems, setCartItems] = useState([
                {
                    id: 1,
                    name: "Oversized Linen Shirt",
                    color: "Sage Green",
                    size: "M",
                    price: 89.00,
                    quantity: 1,
                    image: "https://images.unsplash.com/photo-1596755094514-f87e32f85e2c?auto=format&fit=crop&w=300&q=80"
                },
                {
                    id: 2,
                    name: "Pleated Trousers",
                    color: "Oatmeal",
                    size: "32",
                    price: 110.00,
                    quantity: 1,
                    image: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&w=300&q=80"
                }
            ]);

            const [giftWrap, setGiftWrap] = useState(false);
            const [promoCode, setPromoCode] = useState('');
            const [promoActive, setPromoActive] = useState(false);

            const handleQuantityChange = (id, delta) => {
                setCartItems(cartItems.map(item => {
                    if (item.id === id) {
                        const newQuantity = Math.max(1, item.quantity + delta);
                        return { ...item, quantity: newQuantity };
                    }
                    return item;
                }));
            };

            const handleRemove = (id) => {
                setCartItems(cartItems.filter(item => item.id !== id));
            };

            const handlePromoApply = (e) => {
                e.preventDefault();
                if (promoCode.toUpperCase() === 'SPRING10') {
                    setPromoActive(true);
                } else {
                    alert('Invalid promo code');
                }
            };

            const subtotal = cartItems.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            const discount = promoActive ? subtotal * 0.1 : 0;
            const shipping = subtotal > 150 ? 0 : 15.00;
            const giftWrapFee = giftWrap ? 5.00 : 0;
            const tax = (subtotal - discount) * 0.08;
            const total = subtotal - discount + shipping + giftWrapFee + tax;

            // Calculate estimated delivery
            const today = new Date();
            today.setDate(today.getDate() + 4);
            const deliveryDate = today.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full" aria-labelledby="cart-heading">
                        <h1 id="cart-heading" className="text-3xl font-bold text-gray-900 tracking-tight mb-8">Your Cart</h1>

                        {cartItems.length === 0 ? (
                            <div className="text-center py-20 bg-white rounded-lg shadow-sm border border-gray-200">
                                <i className="fas fa-shopping-bag text-gray-400 text-5xl mb-4" aria-hidden="true"></i>
                                <h2 className="text-xl font-medium text-gray-900 mb-2">Your cart is empty</h2>
                                <p className="text-gray-500 mb-8">Looks like you haven't added anything to your cart yet.</p>
                                <a href="products.html" className="inline-flex justify-center py-3 px-6 border border-transparent shadow-sm text-base font-medium rounded-md text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black transition-colors">
                                    Continue Shopping
                                </a>
                            </div>
                        ) : (
                            <div className="lg:grid lg:grid-cols-12 lg:gap-x-12 lg:items-start">
                                {/* Cart Items */}
                                <section className="lg:col-span-7" aria-labelledby="cart-items-heading">
                                    <h2 id="cart-items-heading" className="sr-only">Items in your shopping cart</h2>

                                    <ul role="list" className="border-t border-b border-gray-200 divide-y divide-gray-200">
                                        {cartItems.map((item) => (
                                            <li key={item.id} className="flex py-6 sm:py-8">
                                                <div className="flex-shrink-0">
                                                    <img src={item.image} alt={item.name} className="w-24 h-32 rounded-md object-center object-cover sm:w-32 sm:h-40" />
                                                </div>

                                                <div className="ml-4 flex-1 flex flex-col justify-between sm:ml-6">
                                                    <div className="relative pr-9 sm:grid sm:grid-cols-2 sm:gap-x-6 sm:pr-0">
                                                        <div>
                                                            <div className="flex justify-between">
                                                                <h3 className="text-base font-medium text-gray-900 shadow-sm-hover">
                                                                    <a href="product.html" className="hover:underline">{item.name}</a>
                                                                </h3>
                                                            </div>
                                                            <div className="mt-1 flex text-sm">
                                                                <p className="text-gray-500">{item.color}</p>
                                                                <p className="ml-4 pl-4 border-l border-gray-200 text-gray-500">Size {item.size}</p>
                                                            </div>
                                                            <p className="mt-2 text-base font-medium text-gray-900">${item.price.toFixed(2)}</p>
                                                        </div>

                                                        <div className="mt-4 sm:mt-0 sm:pr-9 flex items-start sm:justify-end">
                                                            <label htmlFor={`quantity-${item.id}`} className="sr-only">Quantity, {item.name}</label>
                                                            <div className="flex items-center border border-gray-300 rounded-md">
                                                                <button className="px-3 py-1 text-gray-600 hover:text-black focus:outline-none focus:ring-2 focus:ring-black rounded-l-md" onClick={() => handleQuantityChange(item.id, -1)} aria-label={`Decrease quantity of ${item.name}`}>
                                                                    <i className="fas fa-minus text-xs" aria-hidden="true"></i>
                                                                </button>
                                                                <span id={`quantity-${item.id}`} className="px-2 w-8 text-center text-sm font-medium text-gray-900">{item.quantity}</span>
                                                                <button className="px-3 py-1 text-gray-600 hover:text-black focus:outline-none focus:ring-2 focus:ring-black rounded-r-md" onClick={() => handleQuantityChange(item.id, 1)} aria-label={`Increase quantity of ${item.name}`}>
                                                                    <i className="fas fa-plus text-xs" aria-hidden="true"></i>
                                                                </button>
                                                            </div>

                                                            <div className="absolute top-0 right-0 sm:relative sm:top-auto sm:right-auto sm:ml-4">
                                                                <button type="button" className="-m-2 p-2 inline-flex text-gray-400 hover:text-red-500 focus:outline-none" onClick={() => handleRemove(item.id)} aria-label={`Remove ${item.name} from cart`}>
                                                                    <span className="sr-only">Remove</span>
                                                                    <i className="fas fa-trash-alt text-lg" aria-hidden="true"></i>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <p className="mt-4 flex text-sm text-gray-700 space-x-2 items-center">
                                                        <i className="fas fa-check text-green-500" aria-hidden="true"></i>
                                                        <span>In stock — Ships in 1-2 business days</span>
                                                    </p>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>

                                    {/* Loyalty Points Tracker */}
                                    <div className="mt-8 bg-blue-50 border border-blue-100 rounded-lg p-6 flex flex-col sm:flex-row items-center justify-between shadow-sm">
                                        <div className="flex items-center space-x-4 mb-4 sm:mb-0">
                                            <div className="bg-blue-100 text-blue-600 rounded-full h-12 w-12 flex items-center justify-center flex-shrink-0">
                                                <i className="fas fa-star text-xl" aria-hidden="true"></i>
                                            </div>
                                            <div>
                                                <h3 className="text-sm font-bold text-gray-900">ThreadHouse Rewards</h3>
                                                <p className="text-sm text-gray-600">You're <span className="font-bold text-blue-600">120 points</span> away from a free tote bag!</p>
                                            </div>
                                        </div>
                                        <div className="w-full sm:w-1/3">
                                            <div className="w-full bg-blue-200 rounded-full h-2.5">
                                                <div className="bg-blue-600 h-2.5 rounded-full" style={{ width: '70%' }}></div>
                                            </div>
                                            <p className="text-xs text-right mt-1 text-gray-500" aria-live="polite">380 / 500 pt</p>
                                        </div>
                                    </div>

                                    {/* Gift Wrapping Toggle */}
                                    <div className="mt-6 flex items-start p-4 border border-gray-200 rounded-lg bg-white">
                                        <div className="flex items-center h-5">
                                            <input
                                                id="gift-wrapping"
                                                name="gift-wrapping"
                                                type="checkbox"
                                                className="focus:ring-black h-4 w-4 text-black border-gray-300 rounded rounded-sm cursor-pointer"
                                                checked={giftWrap}
                                                onChange={(e) => setGiftWrap(e.target.checked)}
                                            />
                                        </div>
                                        <div className="ml-3 text-sm">
                                            <label htmlFor="gift-wrapping" className="font-medium text-gray-900 cursor-pointer">
                                                Add gift wrapping <span className="text-gray-500">(+$5.00)</span>
                                            </label>
                                            <p className="text-gray-500">Your items will be wrapped in signature eco-friendly tissue and boxed.</p>
                                        </div>
                                    </div>

                                </section>

                                {/* Order Summary */}
                                <section aria-labelledby="summary-heading" className="mt-16 bg-white rounded-lg p-6 lg:p-8 lg:mt-0 lg:col-span-5 shadow-sm border border-gray-200">
                                    <h2 id="summary-heading" className="text-lg font-medium text-gray-900 mb-6 border-b border-gray-200 pb-4">Order Summary</h2>

                                    <dl className="space-y-4 text-sm text-gray-600">
                                        <div className="flex justify-between">
                                            <dt>Subtotal</dt>
                                            <dd className="font-medium text-gray-900">${subtotal.toFixed(2)}</dd>
                                        </div>

                                        {promoActive && (
                                            <div className="flex justify-between items-center text-green-600">
                                                <dt className="flex items-center">
                                                    Discount (SPRING10)
                                                    <button type="button" className="ml-2 text-xs text-red-500 hover:text-red-700" onClick={() => setPromoActive(false)} aria-label="Remove promo code">Remove</button>
                                                </dt>
                                                <dd className="font-medium">-${discount.toFixed(2)}</dd>
                                            </div>
                                        )}

                                        <div className="flex justify-between">
                                            <dt>Shipping</dt>
                                            <dd className="font-medium text-gray-900">{shipping === 0 ? 'Free' : `$${shipping.toFixed(2)}`}</dd>
                                        </div>

                                        {giftWrap && (
                                            <div className="flex justify-between">
                                                <dt>Gift Wrapping</dt>
                                                <dd className="font-medium text-gray-900">$5.00</dd>
                                            </div>
                                        )}

                                        <div className="flex justify-between">
                                            <dt>Tax (Estimated)</dt>
                                            <dd className="font-medium text-gray-900">${tax.toFixed(2)}</dd>
                                        </div>

                                        <div className="border-t border-gray-200 pt-4 flex justify-between items-center">
                                            <dt className="text-base font-bold text-gray-900">Total</dt>
                                            <dd className="text-xl font-bold text-gray-900">${total.toFixed(2)}</dd>
                                        </div>
                                    </dl>

                                    <div className="mt-8 border-t border-gray-200 pt-6">
                                        <form onSubmit={handlePromoApply} aria-label="Promo Code Form">
                                            <label htmlFor="promo-code" className="block text-sm font-medium text-gray-700">Promo code</label>
                                            <div className="mt-1 flex space-x-2">
                                                <input
                                                    type="text"
                                                    id="promo-code"
                                                    name="promo-code"
                                                    className="shadow-sm focus:ring-black focus:border-black block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border"
                                                    placeholder="Try 'SPRING10'"
                                                    value={promoCode}
                                                    onChange={(e) => setPromoCode(e.target.value)}
                                                    disabled={promoActive}
                                                />
                                                <button
                                                    type="submit"
                                                    className="bg-gray-100 border border-gray-300 rounded-md px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black disabled:opacity-50"
                                                    disabled={promoActive || !promoCode}
                                                >
                                                    Apply
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                    <div className="mt-6">
                                        <button type="button" className="w-full bg-black border border-transparent rounded-md shadow-sm py-4 px-4 text-base font-bold text-white hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black transition-colors flex justify-center items-center">
                                            Checkout <i className="fas fa-lock ml-2 text-xs" aria-hidden="true"></i>
                                        </button>
                                        <div className="mt-4 text-center text-xs text-gray-500 flex justify-center items-center space-x-1">
                                            <i className="fas fa-truck" aria-hidden="true"></i>
                                            <span>Estimated delivery <strong className="text-gray-900">{deliveryDate}</strong></span>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}

                        {/* Recently Viewed (optional add-on for a full cart page logic) */}
                        {cartItems.length > 0 && (
                            <section className="mt-24 mb-16" aria-labelledby="recent-heading">
                                <h2 id="recent-heading" className="text-2xl font-bold text-gray-900 mb-6">You Might Also Like</h2>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                    {/* Just dummy items */}
                                    {[
                                        { id: 201, name: "Merino Wool Beanie", price: "$35.00", image: "https://images.unsplash.com/photo-1576871337632-b9aef4c17ab9?auto=format&fit=crop&w=300&q=80" },
                                        { id: 202, name: "Organic Cotton T-Shirt", price: "$45.00", image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=300&q=80" }
                                    ].map(item => (
                                        <article key={item.id} className="group">
                                            <div className="relative aspect-[4/5] bg-gray-200 rounded-lg overflow-hidden mb-3">
                                                <img src={item.image} alt={item.name} className="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500" />
                                                <div className="absolute inset-x-0 bottom-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button className="w-full bg-white text-black py-2 text-sm font-semibold rounded shadow-sm hover:bg-gray-50">Add to Cart</button>
                                                </div>
                                            </div>
                                            <h3 className="text-sm font-medium text-gray-900"><a href="#" className="hover:underline">{item.name}</a></h3>
                                            <p className="text-sm text-gray-500">{item.price}</p>
                                        </article>
                                    ))}
                                </div>
                            </section>
                        )}

                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
