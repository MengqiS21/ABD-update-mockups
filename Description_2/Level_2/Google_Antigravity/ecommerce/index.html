<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreadHouse | Homepage</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Hide scrollbar for horizontal scroll areas */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-white text-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    const Header = () => (
      <header className="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex justify-between items-center h-16">
            <div className="flex-shrink-0 flex items-center">
              <a href="index.html" className="text-2xl font-bold tracking-tighter text-gray-900" aria-label="ThreadHouse Homepage">ThreadHouse</a>
            </div>
            <nav className="hidden md:flex space-x-8" aria-label="Main Navigation">
              <a href="products.html" className="text-gray-600 hover:text-black transition-colors px-3 py-2 text-sm font-medium">Shop</a>
              <a href="products.html" className="text-gray-600 hover:text-black transition-colors px-3 py-2 text-sm font-medium">New Arrivals</a>
              <a href="products.html" className="text-red-600 hover:text-red-700 transition-colors px-3 py-2 text-sm font-medium">Sale</a>
            </nav>
            <div className="flex items-center space-x-4 md:space-x-6">
              <button aria-label="Search site" className="text-gray-400 hover:text-black transition-colors">
                <i className="fas fa-search" aria-hidden="true"></i>
              </button>
              <a href="account.html" aria-label="Account profile" className="text-gray-400 hover:text-black transition-colors">
                <i className="far fa-user" aria-hidden="true"></i>
              </a>
              <a href="cart.html" aria-label="Shopping Cart with 2 items" className="text-gray-400 hover:text-black transition-colors relative">
                <i className="fas fa-shopping-bag" aria-hidden="true"></i>
                <span className="absolute -top-1.5 -right-2 inline-flex items-center justify-center h-4 w-4 text-[10px] font-bold leading-none text-white transform bg-black rounded-full">2</span>
              </a>
            </div>
          </div>
        </div>
      </header>
    );

    const Footer = () => (
      <footer className="bg-gray-50 border-t border-gray-200 pt-16 pb-8">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
            <div>
              <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">About Us</h2>
              <ul className="space-y-4">
                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Our Story</a></li>
                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Sustainability</a></li>
                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Careers</a></li>
              </ul>
            </div>
            <div>
              <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">Customer Service</h2>
              <ul className="space-y-4">
                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Contact Us</a></li>
                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Shipping & Returns</a></li>
                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">FAQ</a></li>
              </ul>
            </div>
            <div className="md:col-span-2">
              <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">Subscribe to our Newsletter</h2>
              <p className="text-sm text-gray-500 mb-4">Get the latest updates on new products and upcoming sales.</p>
              <form className="mt-4 sm:flex sm:max-w-md">
                <label htmlFor="email-address" className="sr-only">Email address</label>
                <input type="email" name="email-address" id="email-address" required className="appearance-none min-w-0 w-full bg-white border border-gray-300 rounded-md shadow-sm py-2 px-4 text-sm text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-black focus:border-black" placeholder="Enter your email" />
                <div className="mt-3 rounded-md sm:mt-0 sm:ml-3 sm:flex-shrink-0">
                  <button type="submit" className="w-full flex items-center justify-center bg-black border border-transparent rounded-md py-2 px-4 text-sm font-medium text-white hover:bg-gray-800 focus:ring-2 focus:ring-offset-2 focus:ring-black transition-colors">Subscribe</button>
                </div>
              </form>
            </div>
          </div>
          <div className="mt-12 border-t border-gray-200 pt-8 flex items-center justify-between">
            <p className="text-sm text-gray-400">&copy; 2026 ThreadHouse. All rights reserved.</p>
            <div className="flex space-x-6">
              <a href="#" className="text-gray-400 hover:text-black transition-colors" aria-label="Visit us on Instagram">
                <i className="fab fa-instagram text-xl" aria-hidden="true"></i>
              </a>
              <a href="#" className="text-gray-400 hover:text-black transition-colors" aria-label="Visit us on Twitter">
                <i className="fab fa-twitter text-xl" aria-hidden="true"></i>
              </a>
            </div>
          </div>
        </div>
      </footer>
    );

    const Hero = () => (
      <section className="relative h-[80vh] flex items-center justify-center overflow-hidden" aria-label="Promotional Hero">
        <div className="absolute inset-0 z-0">
          <img 
            src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80" 
            alt="" 
            className="w-full h-full object-cover object-center"
            aria-hidden="true"
          />
          <div className="absolute inset-0 bg-black/30"></div>
        </div>
        <div className="relative z-10 text-center px-4 max-w-3xl">
          <h1 className="text-4xl md:text-6xl font-extrabold tracking-tight text-white mb-6 leading-tight">
            Wear What You Stand For
          </h1>
          <p className="text-lg md:text-xl text-gray-100 mb-10 max-w-xl mx-auto">
            Discover the New Spring Collection. Sustainable, independently designed fashion for the conscious mind.
          </p>
          <a href="products.html" className="inline-flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-md text-black bg-white hover:bg-gray-100 md:text-lg transition-transform transform hover:scale-105" aria-label="Shop the new spring collection">
            Shop Collection
          </a>
        </div>
      </section>
    );

    const MoodSection = () => {
      const moods = [
        { name: "Minimalist", image: "https://images.unsplash.com/photo-1550614000-4b95d466f16b?auto=format&fit=crop&w=800&q=80" },
        { name: "Streetwear", image: "https://images.unsplash.com/photo-1523398002811-999aa8d9512e?auto=format&fit=crop&w=800&q=80" },
        { name: "Workwear", image: "https://images.unsplash.com/photo-1594938298596-eb5fd3822758?auto=format&fit=crop&w=800&q=80" },
        { name: "Weekend", image: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=800&q=80" }
      ];

      return (
        <section className="py-16 md:py-24 bg-white" aria-labelledby="mood-heading">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 id="mood-heading" className="text-3xl font-bold text-gray-900 mb-12 text-center">Shop by Mood</h2>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
              {moods.map((mood, idx) => (
                <a key={idx} href="products.html" className="group relative h-96 rounded-lg overflow-hidden block focus:outline-none focus:ring-4 focus:ring-black" aria-label={`Shop ${mood.name} style`}>
                  <img src={mood.image} alt="" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" aria-hidden="true" />
                  <div className="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
                  <div className="absolute bottom-6 left-6">
                    <h3 className="text-2xl font-semibold text-white group-hover:tracking-wide transition-all">{mood.name}</h3>
                  </div>
                </a>
              ))}
            </div>
          </div>
        </section>
      );
    }

    const NewArrivals = () => {
      const products = [
        { id: 1, name: "Oversized Linen Shirt", price: "$89.00", image: "https://images.unsplash.com/photo-1596755094514-f87e32f85e2c?auto=format&fit=crop&w=600&q=80", lowStock: true },
        { id: 2, name: "Organic Cotton T-Shirt", price: "$45.00", image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=600&q=80", lowStock: false },
        { id: 3, name: "Recycled Denim Jacket", price: "$145.00", image: "https://images.unsplash.com/photo-1576871337622-98d48d1cf531?auto=format&fit=crop&w=600&q=80", lowStock: true },
        { id: 4, name: "Pleated Trousers", price: "$110.00", image: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&w=600&q=80", lowStock: false },
        { id: 5, name: "Merino Wool Beanie", price: "$35.00", image: "https://images.unsplash.com/photo-1576871337632-b9aef4c17ab9?auto=format&fit=crop&w=600&q=80", lowStock: false }
      ];

      return (
        <section className="py-16 bg-gray-50 overflow-hidden" aria-labelledby="arrivals-heading">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex justify-between items-end mb-8">
              <h2 id="arrivals-heading" className="text-3xl font-bold text-gray-900">New Arrivals</h2>
              <a href="products.html" className="text-sm font-semibold text-black hover:underline hidden sm:block">View all &rarr;</a>
            </div>
            
            <div className="flex space-x-6 overflow-x-auto pb-8 no-scrollbar -mx-4 px-4 sm:mx-0 sm:px-0">
              {products.map((product) => (
                <article key={product.id} className="flex-none w-64 md:w-80 group">
                  <div className="relative h-80 md:h-96 w-full rounded-lg overflow-hidden bg-gray-200 mb-4">
                    <img src={product.image} alt={product.name} className="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500" />
                    {product.lowStock && (
                      <div className="absolute top-3 right-3 bg-red-100 text-red-800 text-xs font-bold px-2 py-1 rounded">
                        Low Stock
                      </div>
                    )}
                  </div>
                  <h3 className="text-lg font-medium text-gray-900 mb-1">
                    <a href="product.html" className="focus:outline-none focus:underline" aria-label={`View details of ${product.name}`}>
                      <span className="absolute inset-0" aria-hidden="true"></span>
                      {product.name}
                    </a>
                  </h3>
                  <p className="text-gray-500 font-medium">{product.price}</p>
                </article>
              ))}
            </div>
            <div className="mt-4 sm:hidden text-center">
              <a href="products.html" className="text-sm font-semibold text-black hover:underline">View all new arrivals &rarr;</a>
            </div>
          </div>
        </section>
      );
    }

    const BrandStory = () => (
      <section className="py-24 bg-white" aria-labelledby="story-heading">
        <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
          <h2 id="story-heading" className="text-3xl font-bold text-gray-900 mb-6">Designed with Intention</h2>
          <p className="text-lg md:text-xl text-gray-600 mb-10 leading-relaxed">
            ThreadHouse is more than a boutique. We partner with independent designers who prioritize sustainable materials, ethical production, and timeless aesthetics. We believe in clothes that look good, last long, and leave a lighter footprint.
          </p>
          <a href="#" className="inline-flex items-center justify-center px-6 py-3 border border-black text-base font-medium rounded-md text-black bg-white hover:bg-black hover:text-white transition-colors" aria-label="Read our mission statement">
            Our Mission
          </a>
        </div>
      </section>
    );

    const App = () => (
      <div className="min-h-screen flex flex-col">
        <Header />
        <main className="flex-grow">
          <Hero />
          <MoodSection />
          <NewArrivals />
          <BrandStory />
        </main>
        <Footer />
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
