<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreadHouse | Shop New Arrivals & Classics</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-white text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Header = () => (
            <header className="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-16">
                        <div className="flex-shrink-0 flex items-center">
                            <a href="index.html" className="text-2xl font-bold tracking-tighter text-gray-900" aria-label="ThreadHouse Homepage">ThreadHouse</a>
                        </div>
                        <nav className="hidden md:flex space-x-8" aria-label="Main Navigation">
                            <a href="products.html" className="text-black px-3 py-2 text-sm font-medium border-b-2 border-black">Shop</a>
                            <a href="products.html" className="text-gray-600 hover:text-black transition-colors px-3 py-2 text-sm font-medium">New Arrivals</a>
                            <a href="products.html" className="text-red-600 hover:text-red-700 transition-colors px-3 py-2 text-sm font-medium">Sale</a>
                        </nav>
                        <div className="flex items-center space-x-4 md:space-x-6">
                            <button aria-label="Search site" className="text-gray-400 hover:text-black transition-colors">
                                <i className="fas fa-search" aria-hidden="true"></i>
                            </button>
                            <a href="account.html" aria-label="Account profile" className="text-gray-400 hover:text-black transition-colors">
                                <i className="far fa-user" aria-hidden="true"></i>
                            </a>
                            <a href="cart.html" aria-label="Shopping Cart with 2 items" className="text-gray-400 hover:text-black transition-colors relative">
                                <i className="fas fa-shopping-bag" aria-hidden="true"></i>
                                <span className="absolute -top-1.5 -right-2 inline-flex items-center justify-center h-4 w-4 text-[10px] font-bold leading-none text-white transform bg-black rounded-full">2</span>
                            </a>
                        </div>
                    </div>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="bg-gray-50 border-t border-gray-200 pt-16 pb-8 mt-16">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                        <div>
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">About Us</h2>
                            <ul className="space-y-4">
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Our Story</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Sustainability</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Careers</a></li>
                            </ul>
                        </div>
                        <div>
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">Customer Service</h2>
                            <ul className="space-y-4">
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Contact Us</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">Shipping & Returns</a></li>
                                <li><a href="#" className="text-sm text-gray-500 hover:text-black transition-colors">FAQ</a></li>
                            </ul>
                        </div>
                        <div className="md:col-span-2">
                            <h2 className="text-sm font-semibold text-gray-900 tracking-wider uppercase mb-4">Subscribe to our Newsletter</h2>
                            <p className="text-sm text-gray-500 mb-4">Get the latest updates on new products and upcoming sales.</p>
                            <form className="mt-4 sm:flex sm:max-w-md">
                                <label htmlFor="email-address" className="sr-only">Email address</label>
                                <input type="email" name="email-address" id="email-address" required className="appearance-none min-w-0 w-full bg-white border border-gray-300 rounded-md shadow-sm py-2 px-4 text-sm text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-black focus:border-black" placeholder="Enter your email" />
                                <div className="mt-3 rounded-md sm:mt-0 sm:ml-3 sm:flex-shrink-0">
                                    <button type="submit" className="w-full flex items-center justify-center bg-black border border-transparent rounded-md py-2 px-4 text-sm font-medium text-white hover:bg-gray-800 focus:ring-2 focus:ring-offset-2 focus:ring-black transition-colors">Subscribe</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div className="mt-12 border-t border-gray-200 pt-8 flex items-center justify-between">
                        <p className="text-sm text-gray-400">&copy; 2026 ThreadHouse. All rights reserved.</p>
                        <div className="flex space-x-6">
                            <a href="#" className="text-gray-400 hover:text-black transition-colors" aria-label="Visit us on Instagram">
                                <i className="fab fa-instagram text-xl" aria-hidden="true"></i>
                            </a>
                            <a href="#" className="text-gray-400 hover:text-black transition-colors" aria-label="Visit us on Twitter">
                                <i className="fab fa-twitter text-xl" aria-hidden="true"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const FilterSidebar = ({ styleMatch, setStyleMatch }) => {
            return (
                <aside className="w-full lg:w-64 pr-8 mb-8 lg:mb-0" aria-label="Product Filters">
                    <div className="flex items-center justify-between mb-8 pb-4 border-b border-gray-200">
                        <h2 className="text-lg font-semibold text-gray-900">Filters</h2>
                        <button className="text-sm text-gray-500 hover:text-black hover:underline" aria-label="Clear all filters">Clear All</button>
                    </div>

                    <div className="mb-6 pb-6 border-b border-gray-200">
                        <div className="flex items-center justify-between">
                            <span className="text-sm font-medium text-gray-900" id="style-match-label">Style Match</span>
                            <button
                                type="button"
                                className={`relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-black focus:ring-offset-2 ${styleMatch ? 'bg-black' : 'bg-gray-200'}`}
                                role="switch"
                                aria-checked={styleMatch}
                                aria-labelledby="style-match-label"
                                onClick={() => setStyleMatch(!styleMatch)}
                            >
                                <span className={`pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out ${styleMatch ? 'translate-x-5' : 'translate-x-0'}`}></span>
                            </button>
                        </div>
                        <p className="text-xs text-gray-500 mt-2">Toggle to see outfits as curated sets</p>
                    </div>

                    <form className="space-y-6">
                        <fieldset>
                            <legend className="text-sm font-medium text-gray-900 mb-3">Clothing Type</legend>
                            <div className="space-y-2">
                                {['T-Shirts', 'Shirts', 'Pants', 'Jackets', 'Accessories', 'Dresses'].map(type => (
                                    <div key={type} className="flex items-center">
                                        <input id={`type-${type}`} name="type" defaultValue={type} type="checkbox" className="h-4 w-4 rounded border-gray-300 text-black focus:ring-black" />
                                        <label htmlFor={`type-${type}`} className="ml-3 text-sm text-gray-600">{type}</label>
                                    </div>
                                ))}
                            </div>
                        </fieldset>

                        <fieldset>
                            <legend className="text-sm font-medium text-gray-900 mb-3">Size</legend>
                            <div className="grid grid-cols-3 gap-2">
                                {['XS', 'S', 'M', 'L', 'XL', 'XXL'].map(size => (
                                    <label key={size} className="cursor-pointer">
                                        <input type="checkbox" className="sr-only peer" name="size" value={size} />
                                        <div className="flex items-center justify-center rounded border border-gray-200 bg-white py-1 px-2 text-sm text-gray-900 peer-checked:border-black peer-checked:bg-black peer-checked:text-white peer-focus:ring-2 peer-focus:ring-black peer-focus:ring-offset-2 transition-colors">
                                            {size}
                                        </div>
                                    </label>
                                ))}
                            </div>
                        </fieldset>

                        <fieldset>
                            <legend className="text-sm font-medium text-gray-900 mb-3">Color</legend>
                            <div className="flex flex-wrap gap-2">
                                {[
                                    { name: 'Black', hex: '#000000' },
                                    { name: 'White', hex: '#FFFFFF', border: true },
                                    { name: 'Navy', hex: '#1e3a8a' },
                                    { name: 'Olive', hex: '#4d7c0f' },
                                    { name: 'Beige', hex: '#d6d3d1' },
                                    { name: 'Burgundy', hex: '#9f1239' }
                                ].map(color => (
                                    <label key={color.name} className="cursor-pointer relative">
                                        <input type="checkbox" className="sr-only peer" name="color" value={color.name} />
                                        <span className="sr-only">{color.name}</span>
                                        <span
                                            className={`block h-6 w-6 rounded-full ring-offset-2 peer-checked:ring-2 peer-checked:ring-black peer-focus:ring-2 peer-focus:ring-black ${color.border ? 'border border-gray-300' : ''}`}
                                            style={{ backgroundColor: color.hex }}
                                            aria-hidden="true"
                                        ></span>
                                    </label>
                                ))}
                            </div>
                        </fieldset>

                        <fieldset>
                            <legend className="text-sm font-medium text-gray-900 mb-3">Material</legend>
                            <div className="space-y-2">
                                {['Organic Cotton', 'Recycled Polyester', 'Linen', 'Merino Wool', 'Tencel'].map(mat => (
                                    <div key={mat} className="flex items-center">
                                        <input id={`mat-${mat}`} name="material" value={mat} type="checkbox" className="h-4 w-4 rounded border-gray-300 text-black focus:ring-black" />
                                        <label htmlFor={`mat-${mat}`} className="ml-3 text-sm text-gray-600">{mat}</label>
                                    </div>
                                ))}
                            </div>
                        </fieldset>

                        <fieldset>
                            <legend className="text-sm font-medium text-gray-900 mb-3">Price Range</legend>
                            <div className="space-y-2">
                                {[
                                    { id: 'under-50', label: 'Under $50' },
                                    { id: '50-100', label: '$50 to $100' },
                                    { id: '100-200', label: '$100 to $200' },
                                    { id: 'over-200', label: '$200+' }
                                ].map(price => (
                                    <div key={price.id} className="flex items-center">
                                        <input id={price.id} name="price" value={price.id} type="radio" className="h-4 w-4 border-gray-300 text-black focus:ring-black" />
                                        <label htmlFor={price.id} className="ml-3 text-sm text-gray-600">{price.label}</label>
                                    </div>
                                ))}
                            </div>
                        </fieldset>

                    </form>
                </aside>
            );
        };

        const ProductGrid = ({ styleMatch }) => {
            // Generate 20 mock items
            const mockProducts = Array.from({ length: 20 }, (_, i) => {
                const categories = ["Shirt", "Pants", "Jacket", "T-Shirt", "Dress"];
                const materials = ["Linen", "Organic Cotton", "Recycled Denim", "Merino Wool", "Tencel"];
                const colors = ["Sage Green", "Off-White", "Washed Black", "Navy", "Oatmeal"];

                const cat = categories[i % categories.length];
                const mat = materials[i % materials.length];
                const col = colors[(i + Math.floor(i / 5)) % colors.length];

                return {
                    id: i + 1,
                    name: `${mat} ${cat} — ${col}`,
                    price: `$${(Math.floor(Math.random() * 15) * 10) + 39}.00`,
                    image: [
                        "https://images.unsplash.com/photo-1596755094514-f87e32f85e2c?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1576871337622-98d48d1cf531?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?auto=format&fit=crop&w=600&q=80"
                    ][i % 5],
                    isNew: i < 4,
                    isLowStock: i % 7 === 0,
                    colors: 2 + (i % 3)
                };
            });

            return (
                <div className="flex-1">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-bold text-gray-900" id="product-grid-heading">
                            {styleMatch ? "Curated Sets" : "All Clothing"} <span className="text-sm text-gray-500 font-normal ml-2">({mockProducts.length} items)</span>
                        </h1>
                        <div className="flex items-center space-x-2">
                            <label htmlFor="sort" className="text-sm text-gray-600 font-medium">Sort by</label>
                            <select id="sort" className="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-black focus:border-black sm:text-sm rounded-md bg-transparent cursor-pointer">
                                <option>Featured</option>
                                <option>Newest</option>
                                <option>Price: Low to High</option>
                                <option>Price: High to Low</option>
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-y-10 gap-x-6 xl:gap-x-8" aria-labelledby="product-grid-heading">
                        {mockProducts.map((product) => (
                            <article key={product.id} className="group relative">
                                <div className="relative w-full aspect-[4/5] bg-gray-200 rounded-lg overflow-hidden mb-4">
                                    <img src={product.image} alt="" className="w-full h-full object-cover object-center group-hover:scale-105 transition-transform duration-500" aria-hidden="true" />

                                    {/* Badges */}
                                    <div className="absolute top-3 left-3 flex flex-col gap-2">
                                        {product.isNew && <span className="bg-black text-white text-xs font-bold px-2 py-1 rounded">New</span>}
                                        {product.isLowStock && <span className="bg-red-100 text-red-800 text-xs font-bold px-2 py-1 rounded">Low Stock</span>}
                                    </div>

                                    {/* Quick Add overlay */}
                                    <div className="absolute inset-x-0 bottom-0 p-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                        <button className="w-full bg-white/95 backdrop-blur-sm text-black border border-transparent rounded-md py-3 px-4 text-sm font-semibold hover:bg-black hover:text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black transition-colors" aria-label={`Add ${product.name} to cart`}>
                                            Quick Add
                                        </button>
                                    </div>
                                </div>

                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="text-base font-medium text-gray-900">
                                            <a href="product.html" className="focus:outline-none focus:underline hover:underline">
                                                <span aria-hidden="true" className="absolute inset-0 z-10 bottom-16"></span>
                                                {product.name}
                                            </a>
                                        </h3>
                                        <p className="mt-1 text-sm text-gray-500">{product.colors} colors</p>
                                    </div>
                                    <p className="text-base font-medium text-gray-900">{product.price}</p>
                                </div>
                            </article>
                        ))}
                    </div>

                    <div className="mt-16 text-center">
                        <button className="inline-flex items-center px-6 py-3 border border-gray-300 shadow-sm text-base font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black">
                            Load More
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [styleMatch, setStyleMatch] = useState(false);

            // We add an aria-live region to announce changes when style match toggles.
            // This satisfies our screen reader requirement.
            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                        <div aria-live="polite" className="sr-only">
                            {styleMatch ? "Curated sets are now displayed." : "Individual clothing items are now displayed."}
                        </div>

                        <div className="flex flex-col lg:flex-row pt-4">
                            <FilterSidebar styleMatch={styleMatch} setStyleMatch={setStyleMatch} />
                            <ProductGrid styleMatch={styleMatch} />
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
