<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#0369a1', secondary: '#0f172a', accent: '#f59e0b' } } }
        }

    <style>

<body class="bg-gray-50 text-slate-900 font-sans antialiased">

                            </a>
                            <nav className="hidden md:flex ml-10 space-x-8" aria-label="Main Navigation">

            </footer>

                                            <span className="text-gray-400 ml-2">out of pocket for you*</span>

                                        </ul>
                                    </div>
                                    <div className="p-6 bg-gray-50 mt-auto">

                                </div>

                                <p className="text-gray-600 text-sm mb-8">Estimate your monthly payments for our certification programs. No impact to your credit score to check rates.</p>

                                            id="loan-amount"

                                            value={loanAmount}
                                            onChange={(e) => setLoanAmount(Number(e.target.value))}
                                            className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary focus-visible:outline focus-visible:outline-2 focus-visible:outline-accent"
                                        />
                                        <div className="flex justify-between text-xs text-gray-500 mt-2" aria-hidden="true">
                                            <span>$300</span>
                                            <span>$5,000</span>
                                        </div>
                                    </div>

                                    <div>
                                        <label htmlFor="term-months" className="block text-sm font-semibold text-secondary mb-2">Payment Term: {months} months</label>
                                        <input
                                            type="range"
                                            id="term-months"
                                            min="3" max="24" step="3"
                                            value={months}
                                            onChange={(e) => setMonths(Number(e.target.value))}
                                            className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary focus-visible:outline focus-visible:outline-2 focus-visible:outline-accent"
                                        />

                                            <span>24 mo</span>
                                        </div>
                                    </div>

                                    <div className="bg-blue-50 border border-blue-100 p-6 rounded-xl mt-8">

                                            <span className="text-3xl font-extrabold text-primary" aria-live="polite">${monthlyPayment}</span>
                                        </div>

                                            <span className="font-semibold">${totalAmount.toFixed(2)}</span>
                                        </div>
                                    </div>

                                    <button className="w-full bg-primary hover:bg-sky-800 text-white font-semibold py-3 rounded-lg transition-colors focus-visible outline-none mt-4">Apply for Financing</button>

                            {/* Assistance & Scholarships Info */}

                                    <div className="flex items-start gap-4">

                                    </div>
                                </section>

                                    <div className="flex items-start gap-4">
                                        <div className="bg-accent/20 p-3 rounded-full flex-shrink-0" aria-hidden="true">
                                            <svg className="w-8 h-8 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                        </div>
                                        <div>
                                            <h2 id="scholarship-heading" className="text-xl font-bold text-secondary mb-2">SkillForge Access Grant</h2>
                                            <p className="text-gray-600 text-sm mb-4">We award over $500,000 annually in partial and full scholarships to underrepresented minorities and career-changers affected by layoffs.</p>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PricingPage />);
    </script>
</body>

</html>
