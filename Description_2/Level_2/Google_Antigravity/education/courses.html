<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programs & Courses | SkillForge</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#0369a1', secondary: '#0f172a', accent: '#f59e0b' } } }
        }
    </script>
    <style>
        .focus-visible:focus-visible {
            outline: 2px solid #f59e0b;
            outline-offset: 2px;
        }

        input[type="checkbox"]:focus-visible {
            outline: 2px solid #f59e0b;
            outline-offset: 2px;
        }
    </style>
</head>

<body class="bg-gray-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const Header = () => (
            <header className="bg-white shadow-sm sticky top-0 z-50">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between h-16 items-center">
                        <div className="flex items-center">
                            <a href="index.html" className="flex items-center gap-2 text-primary font-bold text-2xl focus-visible rounded" aria-label="SkillForge Home">
                                <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3L1 9L5 11.18V17.18L12 21L19 17.18V11.18L21 10.09V17H23V9L12 3ZM18.82 9L12 12.72L5.18 9L12 5.28L18.82 9ZM17 15.99L12 18.72L7 15.99V12.27L12 15L17 12.27V15.99Z" /></svg>
                                SkillForge
                            </a>
                            <nav className="hidden md:flex ml-10 space-x-8" aria-label="Main Navigation">
                                <a href="courses.html" className="text-primary border-b-2 border-primary font-medium focus-visible rounded px-1" aria-current="page">Programs & Courses</a>
                                <a href="study.html" className="text-gray-600 hover:text-primary font-medium focus-visible rounded px-1">Classroom</a>
                                <a href="pricing.html" className="text-gray-600 hover:text-primary font-medium focus-visible rounded px-1">Pricing & Aid</a>
                            </nav>
                        </div>
                        <div className="flex items-center space-x-4">
                            <a href="dashboard.html" className="text-gray-600 hover:text-primary font-medium hidden sm:block focus-visible rounded px-1">Log In</a>
                            <a href="courses.html" className="bg-primary hover:bg-sky-800 text-white px-4 py-2 rounded-md font-medium transition-colors focus-visible outline-none">
                                Start Learning
                            </a>
                        </div>
                    </div>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="bg-secondary text-gray-300 py-12 mt-auto">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-4 gap-8">
                    <div><div className="flex items-center gap-2 text-white font-bold text-xl mb-4"><svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3L1 9L5 11.18V17.18L12 21L19 17.18V11.18L21 10.09V17H23V9L12 3ZM18.82 9L12 12.72L5.18 9L12 5.28L18.82 9ZM17 15.99L12 18.72L7 15.99V12.27L12 15L17 12.27V15.99Z" /></svg>SkillForge</div><p className="text-sm">Vocational and professional certification for adult learners.</p></div>
                    <div><h2 className="text-white font-semibold mb-4 text-lg">Programs</h2><ul className="space-y-2 text-sm"><li><a href="courses.html" className="hover:text-white focus-visible rounded">Healthcare</a></li><li><a href="courses.html" className="hover:text-white focus-visible rounded">Information Technology</a></li><li><a href="courses.html" className="hover:text-white focus-visible rounded">Business</a></li></ul></div>
                    <div><h2 className="text-white font-semibold mb-4 text-lg">Resources</h2><ul className="space-y-2 text-sm"><li><a href="pricing.html" className="hover:text-white focus-visible rounded">Tuition & Financing</a></li><li><a href="#" className="hover:text-white focus-visible rounded">Help Center</a></li></ul></div>
                    <div><h2 className="text-white font-semibold mb-4 text-lg">Legal</h2><ul className="space-y-2 text-sm"><li><a href="#" className="hover:text-white focus-visible rounded">Privacy Policy</a></li><li><a href="#" className="hover:text-white focus-visible rounded">Accessibility Statement</a></li></ul></div>
                </div>
            </footer>
        );

        const COURSE_DATA = [
            { id: 1, title: 'Medical Administrative Assistant Certificate', category: 'Healthcare Support', categoryValue: 'healthcare', format: 'Cohort', formatValue: 'cohort', duration: '8 weeks', cost: 349, costCategory: 'under-500', type: 'Certificate', instructor: 'Dr. Sarah Lin', rating: 4.8, image: 'https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=400&q=80', date: 'March 3', totalHours: 120 },
            { id: 2, title: 'HVAC Fundamentals & Safety', category: 'Skilled Trades', categoryValue: 'trades', format: 'Self-Paced', formatValue: 'self', duration: '4 weeks', cost: 0, costCategory: 'free', type: 'Badge', instructor: 'Thomas Reed', rating: 4.7, image: 'https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?auto=format&fit=crop&w=400&q=80', date: 'Start Anytime', totalHours: 40 },
            { id: 3, title: 'IT Support & Networking Certificate', category: 'Information Technology', categoryValue: 'it', format: 'Live Online', formatValue: 'live', duration: '12 weeks', cost: 899, costCategory: '500-plus', type: 'Certificate', instructor: 'Michael Chang', rating: 4.9, image: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=400&q=80', date: 'April 15', totalHours: 240 },
            { id: 4, title: 'Medical Billing Specialist', category: 'Healthcare Support', categoryValue: 'healthcare', format: 'Self-Paced', formatValue: 'self', duration: '6 weeks', cost: 199, costCategory: 'under-500', type: 'Certificate', instructor: 'Jessica Alba, CBCS', rating: 4.6, image: 'https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?auto=format&fit=crop&w=400&q=80', date: 'Start Anytime', totalHours: 90 },
            { id: 5, title: 'Basic Workplace Communication', category: 'Business Administration', categoryValue: 'business', format: 'Self-Paced', formatValue: 'self', duration: '2 weeks', cost: 0, costCategory: 'free', type: 'CEU', instructor: 'David Vance', rating: 4.5, image: 'https://images.unsplash.com/photo-1600880292203-757bb62b4b45?auto=format&fit=crop&w=400&q=80', date: 'Start Anytime', totalHours: 15 },
        ];

        const CoursesPage = () => {
            const [searchQuery, setSearchQuery] = React.useState('');
            const [filters, setFilters] = React.useState({ category: [], format: [], costCategory: [], type: [] });

            const handleFilterChange = (group, value) => {
                setFilters(prev => {
                    const current = prev[group];
                    const updated = current.includes(value) ? current.filter(v => v !== value) : [...current, value];
                    return { ...prev, [group]: updated };
                });
            };

            const filteredCourses = React.useMemo(() => {
                return COURSE_DATA.filter(course => {
                    const matchesSearch = course.title.toLowerCase().includes(searchQuery.toLowerCase()) || course.instructor.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = filters.category.length === 0 || filters.category.includes(course.categoryValue);
                    const matchesFormat = filters.format.length === 0 || filters.format.includes(course.formatValue);
                    const matchesCost = filters.costCategory.length === 0 || filters.costCategory.includes(course.costCategory);
                    const matchesType = filters.type.length === 0 || filters.type.includes(course.type);
                    return matchesSearch && matchesCategory && matchesFormat && matchesCost && matchesType;
                });
            }, [searchQuery, filters]);

            return (
                <div className="min-h-screen flex flex-col">
                    <a href="#main-content" className="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-primary text-white p-2 z-[60] rounded">Skip to main content</a>
                    <Header />

                    <div className="bg-secondary text-white py-12">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h1 className="text-3xl md:text-4xl font-extrabold mb-4">Find Your Path</h1>
                            <p className="text-lg text-gray-300 max-w-2xl">Browse our industry-recognized certifications, self-paced skill tracks, and professional development programs.</p>
                        </div>
                    </div>

                    <main id="main-content" className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full flex flex-col md:flex-row gap-8">
                        <aside className="w-full md:w-64 flex-shrink-0" aria-label="Course Filters">
                            <div className="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                                <div className="mb-6">
                                    <label htmlFor="search-course" className="sr-only">Search courses</label>
                                    <div className="relative">
                                        <input
                                            id="search-course"
                                            type="search"
                                            placeholder="Search courses..."
                                            className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus-visible outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                            value={searchQuery}
                                            onChange={e => setSearchQuery(e.target.value)}
                                        />
                                        <svg className="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                    </div>
                                </div>

                                <form className="space-y-6">
                                    <fieldset>
                                        <legend className="font-semibold text-secondary text-sm uppercase tracking-wider mb-3">Career Field</legend>
                                        <div className="space-y-2">
                                            {[
                                                { val: 'healthcare', label: 'Healthcare Support' },
                                                { val: 'it', label: 'Information Technology' },
                                                { val: 'business', label: 'Business Administration' },
                                                { val: 'trades', label: 'Skilled Trades' }
                                            ].map(opt => (
                                                <label key={opt.val} className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                                                    <input type="checkbox" className="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary"
                                                        checked={filters.category.includes(opt.val)}
                                                        onChange={() => handleFilterChange('category', opt.val)}
                                                    />
                                                    {opt.label}
                                                </label>
                                            ))}
                                        </div>
                                    </fieldset>

                                    <fieldset>
                                        <legend className="font-semibold text-secondary text-sm uppercase tracking-wider mb-3">Format</legend>
                                        <div className="space-y-2">
                                            {[
                                                { val: 'self', label: 'Self-Paced' },
                                                { val: 'cohort', label: 'Cohort' },
                                                { val: 'live', label: 'Live Online' }
                                            ].map(opt => (
                                                <label key={opt.val} className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                                                    <input type="checkbox" className="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary"
                                                        checked={filters.format.includes(opt.val)}
                                                        onChange={() => handleFilterChange('format', opt.val)}
                                                    />
                                                    {opt.label}
                                                </label>
                                            ))}
                                        </div>
                                    </fieldset>

                                    <fieldset>
                                        <legend className="font-semibold text-secondary text-sm uppercase tracking-wider mb-3">Cost</legend>
                                        <div className="space-y-2">
                                            {[
                                                { val: 'free', label: 'Free' },
                                                { val: 'under-500', label: 'Under $500' },
                                                { val: '500-plus', label: '$500+' }
                                            ].map(opt => (
                                                <label key={opt.val} className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                                                    <input type="checkbox" className="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary"
                                                        checked={filters.costCategory.includes(opt.val)}
                                                        onChange={() => handleFilterChange('costCategory', opt.val)}
                                                    />
                                                    {opt.label}
                                                </label>
                                            ))}
                                        </div>
                                    </fieldset>

                                    <fieldset>
                                        <legend className="font-semibold text-secondary text-sm uppercase tracking-wider mb-3">Credential Type</legend>
                                        <div className="space-y-2">
                                            {[
                                                { val: 'Certificate', label: 'Certificate' },
                                                { val: 'Badge', label: 'Badge' },
                                                { val: 'CEU', label: 'CEU' }
                                            ].map(opt => (
                                                <label key={opt.val} className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                                                    <input type="checkbox" className="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary"
                                                        checked={filters.type.includes(opt.val)}
                                                        onChange={() => handleFilterChange('type', opt.val)}
                                                    />
                                                    {opt.label}
                                                </label>
                                            ))}
                                        </div>
                                    </fieldset>
                                </form>
                            </div>
                        </aside>

                        <div className="flex-1">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-bold text-secondary" aria-live="polite">
                                    {filteredCourses.length} {filteredCourses.length === 1 ? 'Program' : 'Programs'} Found
                                </h2>
                                <div className="flex items-center gap-2">
                                    <label htmlFor="sort-select" className="sr-only">Sort by</label>
                                    <select id="sort-select" className="border border-gray-300 rounded-md py-1.5 pl-3 pr-8 text-sm focus-visible outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                        <option>Most Relevant</option>
                                        <option>Price: Low to High</option>
                                        <option>Price: High to Low</option>
                                        <option>Starting Soon</option>
                                    </select>
                                </div>
                            </div>

                            {filteredCourses.length > 0 ? (
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {filteredCourses.map(course => (
                                        <article key={course.id} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col group hover:shadow-md transition-shadow relative">
                                            <div className="h-48 relative overflow-hidden">
                                                <img src={course.image} alt="" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" aria-hidden="true" />
                                                <div className="absolute top-3 left-3 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-secondary flex items-center gap-1 shadow-sm" aria-label={`Format: ${course.format}`}>
                                                    {course.format === 'Live Online' && <span className="w-2 h-2 rounded-full bg-red-500" aria-hidden="true"></span>}
                                                    {course.format}
                                                </div>
                                            </div>
                                            <div className="p-5 flex-1 flex flex-col">
                                                <div className="text-xs font-semibold text-primary uppercase tracking-wide mb-1">{course.category}</div>

                                                <h3 className="text-lg font-bold text-secondary mb-2 line-clamp-2">
                                                    <a href="course-detail.html" className="focus-visible outline-none focus:underline after:absolute after:inset-0 after:z-10" aria-label={`Course: ${course.title}, instructed by ${course.instructor}`}>
                                                        {course.title}
                                                    </a>
                                                </h3>
                                                <p className="text-sm text-gray-600 mb-3 flex items-center gap-1">
                                                    <svg className="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                                    <span className="sr-only">Instructor:</span> {course.instructor}
                                                </p>

                                                <div className="flex items-center gap-2 mb-4 text-sm font-medium">
                                                    <span className="text-accent flex items-center gap-0.5" aria-label={`Rating: ${course.rating} out of 5`}>
                                                        {course.rating}
                                                        <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                                    </span>
                                                    <span className="text-gray-300" aria-hidden="true">|</span>
                                                    <span className="text-gray-600"><span className="sr-only">Credential type:</span> {course.type}</span>
                                                </div>

                                                <div className="mt-auto border-t border-gray-100 pt-4 flex flex-wrap gap-y-2 justify-between items-center text-sm text-gray-600">
                                                    <div className="flex flex-col">
                                                        <span className="font-semibold text-secondary text-lg">
                                                            {course.cost === 0 ? 'Free' : `$${course.cost}`}
                                                        </span>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="font-medium text-secondary"><span className="sr-only">Start Date:</span> {course.date}</div>
                                                        <div className="text-xs">{course.duration} • {course.totalHours} hrs</div>
                                                    </div>
                                                </div>

                                                <div className="mt-4">
                                                    <span className="block w-full text-center bg-gray-50 text-primary font-semibold py-2 rounded-md border border-gray-200 transition-colors">
                                                        Enroll Now
                                                    </span>
                                                </div>
                                            </div>
                                        </article>
                                    ))}
                                </div>
                            ) : (
                                <div className="bg-white border text-center border-gray-200 rounded-xl p-12 flex flex-col items-center">
                                    <svg className="w-16 h-16 text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                    <h3 className="text-lg font-bold text-secondary mb-2" id="empty-state-title">No programs found</h3>
                                    <p className="text-gray-500 mb-6 max-w-sm" id="empty-search-msg">
                                        We couldn't find any courses matching your current filters and search query. Try adjusting or removing some filters to see more results.
                                    </p>
                                    <button onClick={() => { setSearchQuery(''); setFilters({ category: [], format: [], costCategory: [], type: [] }); }} className="text-primary font-medium focus-visible outline-none hover:underline focus:ring-2 focus:ring-primary rounded px-2 py-1" aria-describedby="empty-state-title">
                                        Clear all filters
                                    </button>
                                </div>
                            )}
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CoursesPage />);
    </script>
</body>

</html>
