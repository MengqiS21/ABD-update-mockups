<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | State of Vermont</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .focus-visible\:ring:focus-visible {
            outline: 3px solid #34d399;
            outline-offset: 2px;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col relative">
    <div id="root" class="flex flex-col min-h-screen w-full"></div>
    <script type="text/babel">
        // Shared Header and Footer components
        const Header = ({ activePage }) => {
            return (
                <header className="bg-slate-900 text-white shadow-md">

                        <div className="flex items-center space-x-2">
                            <span className="sr-only">Official State Website</span>
                            <svg className="h-4 w-4" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                                <path fillRule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zM5.5 10a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM10 8a2 2 0 100 4 2 2 0 000-4z" clipRule="evenodd" />
                            </svg>

                        </div>

                            <select id="language-selector" className="bg-emerald-700 text-white text-xs rounded border border-emerald-600 focus:ring focus:ring-emerald-300 py-1 px-2" aria-label="Language selector">
                                <option value="en">English (EN)</option>
                                <option value="es">Español (ES)</option>
                                <option value="fr">Français (FR)</option>

                                <svg className="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                                </svg>
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight">VERMONT</h1>
                                <p className="text-xs text-slate-300">Official Resident Portal</p>
                            </div>
                        </a>
                        <nav aria-label="Primary Navigation">
                            <ul className="flex flex-wrap items-center justify-center space-x-1 md:space-x-4">
                                <li><a href="index.html" aria-current={activePage === 'home' ? 'page' : undefined} className={`font-medium px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-emerald-400 transition-colors ${activePage === 'home' ? 'text-white border-b-2 border-emerald-500' : 'text-slate-200 hover:text-emerald-300'}`}>Home</a></li>
                                <li><a href="services.html" aria-current={activePage === 'services' ? 'page' : undefined} className={`font-medium px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-emerald-400 transition-colors ${activePage === 'services' ? 'text-white border-b-2 border-emerald-500' : 'text-slate-200 hover:text-emerald-300'}`}>Services</a></li>
                                <li><a href="about.html" aria-current={activePage === 'about' ? 'page' : undefined} className={`font-medium px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-emerald-400 transition-colors ${activePage === 'about' ? 'text-white border-b-2 border-emerald-500' : 'text-slate-200 hover:text-emerald-300'}`}>About</a></li>
                                <li><a href="contact.html" aria-current={activePage === 'contact' ? 'page' : undefined} className={`font-medium px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-emerald-400 transition-colors ${activePage === 'contact' ? 'text-white border-b-2 border-emerald-500' : 'text-slate-200 hover:text-emerald-300'}`}>Contact</a></li>
                            </ul>
                        </nav>
                    </div>
                </header>
            );
        };

        const Footer = () => (
            <footer className="bg-slate-900 text-slate-300 py-12 border-t-4 border-emerald-600 mt-auto">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-4 gap-8">
                    <div className="mb-8 md:mb-0">
                        <div className="flex items-center space-x-3 mb-4">
                            <div className="bg-emerald-600 rounded-full p-1.5 h-8 w-8 flex items-center justify-center">
                                <svg className="h-5 w-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                                </svg>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-white tracking-tight">VERMONT</h1>
                                <p className="text-xs">Official Resident Portal</p>
                            </div>
                        </div>
                        <p className="text-sm mb-4">Dedicated to serving the residents, businesses, and visitors of the Green Mountain State.</p>
                        <div className="flex space-x-4">
                            <a href="#twitter" aria-label="Visit State of Vermont Twitter page" className="text-slate-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded">
                                <svg className="h-6 w-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M8.29 20.251c7.547 0 11.675-6.253 11.675-11.675 0-.178 0-.355-.012-.53A8.348 8.348 0 0022 5.92a8.19 8.19 0 01-2.357.646 4.118 4.118 0 001.804-2.27 8.224 8.224 0 01-2.605.996 4.107 4.107 0 00-6.993 3.743 11.65 11.65 0 01-8.457-4.287 4.106 4.106 0 001.27 5.477A4.072 4.072 0 012.8 9.713v.052a4.105 4.105 0 003.292 4.022 4.095 4.095 0 01-1.853.07 4.108 4.108 0 003.834 2.85A8.233 8.233 0 012 18.407a11.616 11.616 0 006.29 1.84" /></svg>
                            </a>
                        </div>
                    </div>
                    <div>
                        <h3 className="text-white font-bold mb-4 uppercase text-sm tracking-wider">Government</h3>
                        <ul className="space-y-2 text-sm">
                            <li><a href="about.html" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Governor's Office</a></li>
                            <li><a href="about.html#agencies" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">State Agencies Directory</a></li>
                            <li><a href="#legislature" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Legislature</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="text-white font-bold mb-4 uppercase text-sm tracking-wider">Services</h3>
                        <ul className="space-y-2 text-sm">
                            <li><a href="service-license.html" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Driver & Vehicle Services</a></li>
                            <li><a href="service-benefits.html" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Health & Human Services</a></li>
                            <li><a href="services.html" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">All Resident Services</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="text-white font-bold mb-4 uppercase text-sm tracking-wider">Support</h3>
                        <ul className="space-y-2 text-sm">
                            <li><a href="contact.html" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Contact Us</a></li>
                            <li><a href="#accessibility" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Accessibility Statement</a></li>
                            <li><a href="#privacy" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Privacy Policy</a></li>
                        </ul>
                    </div>
                </div>
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-12 pt-8 border-t border-slate-700 text-sm flex flex-col md:flex-row justify-between items-center">
                    <p>&copy; {new Date().getFullYear()} State of Vermont. All rights reserved.</p>
                    <p className="mt-2 md:mt-0 text-slate-400">Designed with accessibility in mind.</p>
                </div>
            </footer>
        );

        const App = () => {
            const [feedbackSent, setFeedbackSent] = React.useState(false);
            const statusRef = React.useRef(null);

            const handleFeedbackSubmit = (e) => {
                e.preventDefault();
                setFeedbackSent(true);
                setTimeout(() => {
                    if (statusRef.current) statusRef.current.focus();
                }, 100);
            };

            return (
                <>
                    <Header activePage="contact" />

                    {/* Breadcrumbs */}
                    <nav aria-label="Breadcrumb" className="bg-white border-b border-slate-200 py-3">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <ol className="flex items-center space-x-2 text-sm text-slate-500">
                                <li><a href="index.html" className="hover:text-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1">Home</a></li>
                                <li><span aria-hidden="true" className="mx-1">/</span></li>
                                <li><a href="contact.html" className="text-slate-800 font-medium hover:text-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1" aria-current="page">Contact</a></li>
                            </ol>
                        </div>
                    </nav>

                    <main id="main-content" className="flex-grow focus:outline-none" tabIndex="-1">

                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 md:py-16">
                            <div className="mb-10 text-center md:text-left">
                                <h1 className="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight mb-4">Contact Us</h1>
                                <p className="text-lg text-slate-600 max-w-3xl">Get support, report issues, or find the right department for your question.</p>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">

                                {/* Helplines & Support */}
                                <section aria-labelledby="helplines-heading">
                                    <h2 id="helplines-heading" className="text-2xl font-bold text-slate-900 mb-6 border-b-2 border-slate-200 pb-2">Helpline Numbers</h2>

                                    <div className="mb-8 p-4 bg-amber-50 border border-amber-200 rounded-md flex items-start gap-3">
                                        <svg className="h-6 w-6 text-amber-600 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" /></svg>
                                        <div>
                                            <h3 className="font-bold text-slate-900 text-sm">Multilingual Support Available</h3>
                                            <p className="text-sm text-slate-700">All helplines provide free interpretation services. Asistencia multilingüe disponible. Assistance multilingue disponible.</p>
                                        </div>
                                    </div>

                                    <ul className="space-y-4">
                                        <li className="bg-white border text-left border-slate-200 rounded p-5 flex flex-col md:flex-row justify-between items-start md:items-center">
                                            <div>
                                                <h3 className="font-bold text-slate-900 text-lg">General Information (Vermont 211)</h3>
                                                <p className="text-sm text-slate-600">Health, human services, and community resources.</p>
                                            </div>
                                            <a href="tel:211" className="mt-2 md:mt-0 text-2xl font-bold text-emerald-700 hover:underline focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1" aria-label="Call 211">2-1-1</a>
                                        </li>
                                        <li className="bg-white border text-left border-slate-200 rounded p-5 flex flex-col md:flex-row justify-between items-start md:items-center">
                                            <div>
                                                <h3 className="font-bold text-slate-900 text-lg">Department of Motor Vehicles</h3>
                                                <p className="text-sm text-slate-600">Licenses, registrations, titles, and rules.</p>
                                            </div>
                                            <a href="tel:8889999999" className="mt-2 md:mt-0 text-xl font-bold text-emerald-700 hover:underline focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1" aria-label="Call DMV at 8 8 8. 9 9 9. 9 9 9 9.">(888) 999-9999</a>
                                        </li>
                                        <li className="bg-white border text-left border-slate-200 rounded p-5 flex flex-col md:flex-row justify-between items-start md:items-center">
                                            <div>
                                                <h3 className="font-bold text-slate-900 text-lg">Health & Human Services</h3>
                                                <p className="text-sm text-slate-600">Benefits applications, Medicare, family support.</p>
                                            </div>
                                            <a href="tel:8001112222" className="mt-2 md:mt-0 text-xl font-bold text-emerald-700 hover:underline focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1" aria-label="Call Health Services at 8 0 0. 1 1 1. 2 2 2 2.">(800) 111-2222</a>
                                        </li>
                                    </ul>
                                </section>

                                {/* Feedback Form */}
                                <section aria-labelledby="feedback-heading" className="bg-white border border-slate-200 shadow-sm rounded-lg p-6 md:p-8">
                                    <h2 id="feedback-heading" className="text-2xl font-bold text-slate-900 mb-2">Website Feedback</h2>
                                    <p className="text-slate-600 mb-6">Suggestions or encountering an issue? Let us know how we can improve this portal.</p>

                                    {!feedbackSent ? (
                                        <form onSubmit={handleFeedbackSubmit} noValidate>
                                            <div className="mb-4">
                                                <label htmlFor="feedback-type" className="block text-sm font-semibold text-slate-900 mb-1">Feedback Type <span className="text-red-500" aria-label="required">*</span></label>
                                                <select id="feedback-type" name="feedback-type" className="w-full border border-slate-300 rounded px-3 py-2 text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500" required aria-required="true">
                                                    <option value="">Select a category</option>
                                                    <option value="issue">Report a technical issue</option>
                                                    <option value="suggestion">Suggestion for improvement</option>
                                                    <option value="accessibility">Accessibility concern</option>
                                                    <option value="other">Other</option>
                                                </select>
                                            </div>

                                            <div className="mb-4">
                                                <label htmlFor="feedback-message" className="block text-sm font-semibold text-slate-900 mb-1">Your Message <span className="text-red-500" aria-label="required">*</span></label>
                                                <textarea id="feedback-message" name="feedback-message" rows="5" className="w-full border border-slate-300 rounded px-3 py-2 text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-y" placeholder="Describe your experience or suggestion..." required aria-required="true"></textarea>
                                            </div>

                                            <div className="mb-6">
                                                <label htmlFor="feedback-email" className="block text-sm font-semibold text-slate-900 mb-1">Email Address (Optional)</label>
                                                <p className="text-xs text-slate-500 mb-1">If you would like a response regarding your feedback.</p>
                                                <input type="email" id="feedback-email" name="feedback-email" className="w-full border border-slate-300 rounded px-3 py-2 text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="you@example.com" />
                                            </div>

                                            <button type="submit" className="bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-2.5 px-6 rounded focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-600 transition-colors">
                                                Submit Feedback
                                            </button>
                                        </form>
                                    ) : (
                                        <div aria-live="polite" className="bg-emerald-50 border border-emerald-200 p-6 rounded text-center">
                                            <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-emerald-100 mb-4">
                                                <svg className="h-6 w-6 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" />
                                                </svg>
                                            </div>
                                            <h3 ref={statusRef} tabIndex="-1" className="text-xl font-bold text-emerald-900 mb-2 focus:outline-none">Thank You!</h3>
                                            <p className="text-emerald-800">Your feedback has been successfully submitted and will help us improve our services.</p>
                                        </div>
                                    )}
                                </section>
                            </div>
                        </div>
                    </main>

                    {/* Floating Live Chat Widget Button */}
                    <div className="fixed bottom-6 right-6 z-50">
                        <button className="bg-emerald-700 hover:bg-emerald-800 text-white rounded-full py-3 px-4 sm:px-6 shadow-xl flex items-center gap-3 focus:outline-none focus:ring-4 focus:ring-emerald-400 focus:ring-offset-2 transition-transform hover:scale-105" aria-label="Open live chat">
                            <svg className="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>
                            <div className="text-left hidden sm:block">
                                <span className="font-bold block leading-tight text-sm">Chat with a representative</span>
                                <span className="text-xs text-emerald-100">Mon–Fri 8am–5pm</span>
                            </div>
                        </button>
                    </div>

                    <Footer />
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
