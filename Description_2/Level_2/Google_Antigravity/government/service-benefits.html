<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Benefits | State of Vermont</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .focus-visible\:ring:focus-visible {
            outline: 3px solid #34d399;
            outline-offset: 2px;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">
    <div id="root" class="flex flex-col min-h-screen w-full"></div>
    <script type="text/babel">
        // Shared Header and Footer components
        const Header = ({ activePage }) => {
            return (
                <header className="bg-slate-900 text-white shadow-md">
                    <div className="bg-emerald-800 text-sm py-2 px-4 flex justify-between items-center sm:px-6 lg:px-8 max-w-7xl mx-auto w-full">
                        <div className="flex items-center space-x-2">
                            <span className="sr-only">Official State Website</span>
                            <svg className="h-4 w-4" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                                <path fillRule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zM5.5 10a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM10 8a2 2 0 100 4 2 2 0 000-4z" clipRule="evenodd" />
                            </svg>
                            <span>An official website of the State of Vermont</span>
                        </div>
                        <div>
                            <label htmlFor="language-selector" className="sr-only">Select Language</label>
                            <select id="language-selector" className="bg-emerald-700 text-white text-xs rounded border border-emerald-600 focus:ring focus:ring-emerald-300 py-1 px-2" aria-label="Language selector">
                                <option value="en">English (EN)</option>
                                <option value="es">Español (ES)</option>
                                <option value="fr">Français (FR)</option>
                            </select>
                        </div>
                    </div>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row justify-between items-center w-full">
                        <a href="index.html" className="flex items-center space-x-3 mb-4 md:mb-0 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded" aria-label="State of Vermont Homepage">
                            <div className="bg-emerald-600 rounded-full p-2 h-10 w-10 flex items-center justify-center">
                                <svg className="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                                </svg>
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight">VERMONT</h1>
                                <p className="text-xs text-slate-300">Official Resident Portal</p>
                            </div>
                        </a>
                        <nav aria-label="Primary Navigation">
                            <ul className="flex flex-wrap items-center justify-center space-x-1 md:space-x-4">
                                <li><a href="index.html" aria-current={activePage === 'home' ? 'page' : undefined} className={`font-medium px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-emerald-400 transition-colors ${activePage === 'home' ? 'text-white border-b-2 border-emerald-500' : 'text-slate-200 hover:text-emerald-300'}`}>Home</a></li>
                                <li><a href="services.html" aria-current={activePage === 'services' ? 'page' : undefined} className={`font-medium px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-emerald-400 transition-colors ${activePage === 'services' ? 'text-white border-b-2 border-emerald-500' : 'text-slate-200 hover:text-emerald-300'}`}>Services</a></li>
                                <li><a href="about.html" aria-current={activePage === 'about' ? 'page' : undefined} className={`font-medium px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-emerald-400 transition-colors ${activePage === 'about' ? 'text-white border-b-2 border-emerald-500' : 'text-slate-200 hover:text-emerald-300'}`}>About</a></li>
                                <li><a href="contact.html" aria-current={activePage === 'contact' ? 'page' : undefined} className={`font-medium px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-emerald-400 transition-colors ${activePage === 'contact' ? 'text-white border-b-2 border-emerald-500' : 'text-slate-200 hover:text-emerald-300'}`}>Contact</a></li>
                            </ul>
                        </nav>
                    </div>
                </header>
            );
        };

        const Footer = () => (
            <footer className="bg-slate-900 text-slate-300 py-12 border-t-4 border-emerald-600 mt-auto">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-4 gap-8">
                    <div className="mb-8 md:mb-0">
                        <div className="flex items-center space-x-3 mb-4">
                            <div className="bg-emerald-600 rounded-full p-1.5 h-8 w-8 flex items-center justify-center">
                                <svg className="h-5 w-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                                </svg>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-white tracking-tight">VERMONT</h1>
                                <p className="text-xs">Official Resident Portal</p>
                            </div>
                        </div>
                        <p className="text-sm mb-4">Dedicated to serving the residents, businesses, and visitors of the Green Mountain State.</p>
                        <div className="flex space-x-4">
                            <a href="#twitter" aria-label="Visit State of Vermont Twitter page" className="text-slate-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded">
                                <svg className="h-6 w-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M8.29 20.251c7.547 0 11.675-6.253 11.675-11.675 0-.178 0-.355-.012-.53A8.348 8.348 0 0022 5.92a8.19 8.19 0 01-2.357.646 4.118 4.118 0 001.804-2.27 8.224 8.224 0 01-2.605.996 4.107 4.107 0 00-6.993 3.743 11.65 11.65 0 01-8.457-4.287 4.106 4.106 0 001.27 5.477A4.072 4.072 0 012.8 9.713v.052a4.105 4.105 0 003.292 4.022 4.095 4.095 0 01-1.853.07 4.108 4.108 0 003.834 2.85A8.233 8.233 0 012 18.407a11.616 11.616 0 006.29 1.84" /></svg>
                            </a>
                        </div>
                    </div>
                    <div>
                        <h2 className="text-white font-bold mb-4 uppercase text-sm tracking-wider">Government</h2>
                        <ul className="space-y-2 text-sm">
                            <li><a href="about.html" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Governor's Office</a></li>
                            <li><a href="about.html#agencies" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">State Agencies Directory</a></li>
                            <li><a href="#legislature" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Legislature</a></li>
                        </ul>
                    </div>
                    <div>
                        <h2 className="text-white font-bold mb-4 uppercase text-sm tracking-wider">Services</h2>
                        <ul className="space-y-2 text-sm">
                            <li><a href="service-license.html" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Driver & Vehicle Services</a></li>
                            <li><a href="service-benefits.html" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Health & Human Services</a></li>
                            <li><a href="services.html" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">All Resident Services</a></li>
                        </ul>
                    </div>
                    <div>
                        <h2 className="text-white font-bold mb-4 uppercase text-sm tracking-wider">Support</h2>
                        <ul className="space-y-2 text-sm">
                            <li><a href="contact.html" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Contact Us</a></li>
                            <li><a href="#accessibility" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Accessibility Statement</a></li>
                            <li><a href="#privacy" className="hover:text-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1 -mx-1 transition-colors">Privacy Policy</a></li>
                        </ul>
                    </div>
                </div>
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-12 pt-8 border-t border-slate-700 text-sm flex flex-col md:flex-row justify-between items-center">
                    <p>&copy; {new Date().getFullYear()} State of Vermont. All rights reserved.</p>
                    <p className="mt-2 md:mt-0 text-slate-400">Designed with accessibility in mind.</p>
                </div>
            </footer>
        );

        const App = () => {
            const [submitted, setSubmitted] = React.useState(false);
            const [errors, setErrors] = React.useState({});
            const [formData, setFormData] = React.useState({
                householdSize: '',
                income: '',
                employmentStatus: ''
            });
            const resultsRef = React.useRef(null);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
                // Clear error for field
                if (errors[name]) {
                    setErrors(prev => ({ ...prev, [name]: '' }));
                }
            };

            const validateForm = () => {
                const newErrors = {};

                if (!formData.householdSize) {
                    newErrors.householdSize = "Please indicate your household size.";
                } else if (isNaN(formData.householdSize) || parseInt(formData.householdSize) < 1) {
                    newErrors.householdSize = "Household size must be a valid number of 1 or more.";
                }

                if (!formData.income) {
                    newErrors.income = "Please select an estimated annual income range.";
                }

                if (!formData.employmentStatus) {
                    newErrors.employmentStatus = "Please select your current employment status.";
                }

                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (validateForm()) {
                    setSubmitted(true);
                    setTimeout(() => {
                        if (resultsRef.current) resultsRef.current.focus();
                    }, 50);
                } else {
                    // Focus on first error conceptually
                    const errorFields = Object.keys(errors);
                    if (errorFields.length > 0) {
                        const el = document.getElementById(errorFields[0]);
                        if (el) el.focus();
                    }
                }
            };

            const resetForm = () => {
                setSubmitted(false);
                setFormData({
                    householdSize: '',
                    income: '',
                    employmentStatus: ''
                });
                setErrors({});
            };

            return (
                <>
                    <Header activePage="services" />

                    {/* Breadcrumbs */}
                    <nav aria-label="Breadcrumb" className="bg-white border-b border-slate-200 py-3">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <ol className="flex items-center space-x-2 text-sm text-slate-500">
                                <li><a href="index.html" className="hover:text-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1">Home</a></li>
                                <li><span aria-hidden="true" className="mx-1">/</span></li>
                                <li><a href="services.html" className="hover:text-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1">Services</a></li>
                                <li><span aria-hidden="true" className="mx-1">/</span></li>
                                <li><a href="#current" className="text-slate-800 font-medium hover:text-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-1" aria-current="page">Apply for Benefits</a></li>
                            </ol>
                        </div>
                    </nav>

                    <main id="main-content" className="flex-grow focus:outline-none py-10" tabIndex="-1">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">

                            <div className="mb-10 text-center md:text-left">
                                <h1 className="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight mb-4">Check Benefits Eligibility</h1>
                                <p className="text-lg text-slate-600 max-w-3xl">Find out which state programs you may qualify for before you apply. This screener takes less than 2 minutes.</p>
                            </div>

                            {!submitted ? (
                                <div className="bg-white border border-slate-200 rounded-lg shadow-sm p-6 md:p-10">
                                    <h2 className="text-xl font-bold text-emerald-900 border-b border-emerald-100 pb-3 mb-6">Household Information</h2>
                                    <form onSubmit={handleSubmit} noValidate>

                                        <div className="mb-6">
                                            <label htmlFor="householdSize" className="block text-base font-semibold text-slate-900 mb-2">
                                                Household Size
                                            </label>
                                            <p className="text-sm text-slate-500 mb-2">Include yourself and anyone who lives with you and shares income/expenses.</p>
                                            <input
                                                type="number"
                                                id="householdSize"
                                                name="householdSize"
                                                min="1"
                                                className={`w-full md:w-1/3 border rounded px-4 py-2 text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 ${errors.householdSize ? 'border-red-500 bg-red-50' : 'border-slate-300'}`}
                                                value={formData.householdSize}
                                                onChange={handleInputChange}
                                                aria-required="true"
                                                aria-invalid={!!errors.householdSize}
                                                aria-describedby={errors.householdSize ? "householdSize-error" : undefined}
                                            />
                                            {errors.householdSize && (
                                                <p id="householdSize-error" className="mt-2 text-sm text-red-600 font-medium flex items-center">
                                                    <svg className="h-4 w-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                    <span className="sr-only">Error:</span> {errors.householdSize}
                                                </p>
                                            )}
                                        </div>

                                        <div className="mb-6">
                                            <label htmlFor="income" className="block text-base font-semibold text-slate-900 mb-2">
                                                Estimated Annual Household Income
                                            </label>
                                            <p className="text-sm text-slate-500 mb-2">Include all sources of income before taxes are taken out.</p>
                                            <select
                                                id="income"
                                                name="income"
                                                className={`w-full md:w-2/3 border rounded px-4 py-2 text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 ${errors.income ? 'border-red-500 bg-red-50' : 'border-slate-300'}`}
                                                value={formData.income}
                                                onChange={handleInputChange}
                                                aria-required="true"
                                                aria-invalid={!!errors.income}
                                                aria-describedby={errors.income ? "income-error" : undefined}
                                            >
                                                <option value="">-- Select an income range --</option>
                                                <option value="under-15k">Under $15,000</option>
                                                <option value="15k-30k">$15,000 - $30,000</option>
                                                <option value="30k-50k">$30,000 - $50,000</option>
                                                <option value="50k-75k">$50,000 - $75,000</option>
                                                <option value="75k-plus">$75,000 or more</option>
                                            </select>
                                            {errors.income && (
                                                <p id="income-error" className="mt-2 text-sm text-red-600 font-medium flex items-center">
                                                    <svg className="h-4 w-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                    <span className="sr-only">Error:</span> {errors.income}
                                                </p>
                                            )}
                                        </div>

                                        <div className="mb-10">
                                            <legend className="block text-base font-semibold text-slate-900 mb-4">Employment Status</legend>
                                            <div className="space-y-3">
                                                {['Employed full-time', 'Employed part-time', 'Unemployed', 'Retired', 'Unable to work'].map((status) => (
                                                    <div key={status} className="flex items-center">
                                                        <input
                                                            id={`emp-${status.replace(/\s+/g, '-').toLowerCase()}`}
                                                            name="employmentStatus"
                                                            type="radio"
                                                            value={status}
                                                            className="h-5 w-5 border-slate-300 text-emerald-600 focus:ring-emerald-500 cursor-pointer"
                                                            onChange={handleInputChange}
                                                            checked={formData.employmentStatus === status}
                                                            aria-required="true"
                                                            aria-invalid={!!errors.employmentStatus}
                                                            aria-describedby={errors.employmentStatus ? "employment-error" : undefined}
                                                        />
                                                        <label htmlFor={`emp-${status.replace(/\s+/g, '-').toLowerCase()}`} className="ml-3 block text-base text-slate-700 cursor-pointer">
                                                            {status}
                                                        </label>
                                                    </div>
                                                ))}
                                            </div>
                                            {errors.employmentStatus && (
                                                <p id="employment-error" className="mt-3 text-sm text-red-600 font-medium flex items-center">
                                                    <svg className="h-4 w-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                    <span className="sr-only">Error:</span> {errors.employmentStatus}
                                                </p>
                                            )}
                                        </div>

                                        <div className="pt-6 border-t border-slate-200">
                                            <button
                                                type="submit"
                                                className="w-full md:w-auto bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3 px-8 rounded-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-600 transition-colors shadow"
                                            >
                                                Find Qualifying Programs
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            ) : (
                                <div aria-live="polite">
                                    <h2 id="results-heading" ref={resultsRef} tabIndex="-1" className="text-2xl font-bold text-slate-900 mb-6 focus:outline-none">
                                        Your Personalized Recommendations
                                    </h2>
                                    <p className="text-slate-700 mb-6">Based on your input (Household of {formData.householdSize}, {formData.employmentStatus}), you may be eligible for the following programs:</p>

                                    <ul className="space-y-6">
                                        {formData.income !== '75k-plus' && (
                                            <li className="bg-white border-l-4 border-emerald-500 shadow-sm rounded-r-lg p-6 hover:shadow-md transition-shadow">
                                                <div className="md:flex justify-between items-start">
                                                    <div className="mb-4 md:mb-0 md:mr-6">
                                                        <h3 className="text-xl font-bold text-slate-900 mb-2">3SquaresVT (SNAP)</h3>
                                                        <p className="text-slate-600 text-sm">Helps low-income households buy the food they need for good health. Provides monthly benefits on an EBT card.</p>
                                                    </div>
                                                    <a href="#apply-snap" className="shrink-0 inline-block bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 px-6 rounded focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition-colors text-center w-full md:w-auto" aria-label="Start Application for 3SquaresVT (SNAP)">
                                                        Start Application
                                                    </a>
                                                </div>
                                            </li>
                                        )}

                                        {(formData.income === 'under-15k' || formData.income === '15k-30k') && (
                                            <li className="bg-white border-l-4 border-blue-500 shadow-sm rounded-r-lg p-6 hover:shadow-md transition-shadow">
                                                <div className="md:flex justify-between items-start">
                                                    <div className="mb-4 md:mb-0 md:mr-6">
                                                        <h3 className="text-xl font-bold text-slate-900 mb-2">Medicaid for Children and Adults (MCA)</h3>
                                                        <p className="text-slate-600 text-sm">Provides free or low-cost health coverage to eligible low-income adults, children, pregnant women, elderly adults and people with disabilities.</p>
                                                    </div>
                                                    <a href="#apply-medicaid" className="shrink-0 inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors text-center w-full md:w-auto" aria-label="Start Application for Medicaid">
                                                        Start Application
                                                    </a>
                                                </div>
                                            </li>
                                        )}

                                        <li className="bg-white border-l-4 border-amber-500 shadow-sm rounded-r-lg p-6 hover:shadow-md transition-shadow">
                                            <div className="md:flex justify-between items-start">
                                                <div className="mb-4 md:mb-0 md:mr-6">
                                                    <h3 className="text-xl font-bold text-slate-900 mb-2">Seasonal Fuel Assistance</h3>
                                                    <p className="text-slate-600 text-sm">Helps pay part of home heating bills whether you own your home or rent, pay for heat directly or as part of rent.</p>
                                                </div>
                                                <a href="#apply-fuel" className="shrink-0 inline-block border-2 border-emerald-600 text-emerald-700 hover:bg-emerald-50 focus:bg-emerald-50 font-semibold py-2 px-6 rounded focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition-colors text-center w-full md:w-auto" aria-label="Start Application for Seasonal Fuel Assistance">
                                                    Start Application
                                                </a>
                                            </div>
                                        </li>
                                    </ul>

                                    <div className="mt-8 text-center pt-8 border-t border-slate-200">
                                        <button onClick={resetForm} className="text-slate-600 font-medium hover:text-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 rounded px-2 py-1 underline">
                                            Take the screener again
                                        </button>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    <Footer />
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
