<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

                            <ul className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {[
                                    { title: "Renew Driver's License", icon: "🚗", link: "service-license.html", desc: "Online renewal process" },
                                    { title: "Apply for Benefits", icon: "🛡️", link: "service-benefits.html", desc: "SNAP, Medicaid, Assistance" },
                                    { title: "Register to Vote", icon: "🗳️", link: "services.html#voting", desc: "Voter registration portal" },

                                <a href="services.html" className="inline-flex items-center text-emerald-700 font-bold hover:text-emerald-800 hover:underline focus:outline-none focus:ring-2 focus:ring-emerald-400 rounded px-2 py-1 text-lg">
                                    View all resident services
                                    <svg className="ml-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />

                                </a>
                            </div>
                        </section>

                                            <p className="text-sm font-medium text-slate-600">{news.dept}</p>
