<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | Folia</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0c0d10;
            color: #f3f4f6;
            margin: 0;
            overflow-x: hidden;
        }

        .focus-ring:focus-visible {
            outline: 2px solid #a855f7;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const SvgIcon = ({ path, className = "w-6 h-6", extraPaths }) => (
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" className={className} aria-hidden="true">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={path} />
                {extraPaths}
            </svg>
        );

        const NavigationSidebar = ({ currentPage }) => {
            const navItems = [
                { name: 'Feed', href: 'index.html', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
                { name: 'Explore', href: 'explore.html', icon: 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' },
                { name: 'Notifications', href: 'notifications.html', icon: 'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9' },
                { name: 'Messages', href: 'messages.html', icon: 'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z' },
                { name: 'Profile', href: 'profile.html', icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
                { name: 'Settings', href: 'settings.html', icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z' }
            ];

            return (
                <nav className="w-20 lg:w-64 border-r border-gray-800 h-screen fixed top-0 left-0 flex flex-col p-4 bg-[#0c0d10] z-40" aria-label="Main Navigation">
                    <div className="mb-8 flex items-center justify-center lg:justify-start pt-2">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-purple-500/20">
                            <span className="text-white font-bold text-xl">F</span>
                        </div>
                        <span className="text-2xl font-bold ml-3 hidden lg:block tracking-tight text-white">Folia</span>
                    </div>
                    <ul className="flex-1 space-y-2">
                        {navItems.map(item => {
                            const active = currentPage === item.href.replace('.html', '');
                            return (
                                <li key={item.name}>
                                    <a href={item.href} className={`flex items-center p-3 rounded-xl transition-all duration-200 group focus-ring relative ${active ? 'bg-indigo-500/10 text-white' : 'text-gray-400 hover:bg-gray-800/40 hover:text-white'}`} aria-current={active ? 'page' : undefined}>
                                        <div className={`${active ? 'text-indigo-400' : 'group-hover:text-indigo-400'} transition-colors duration-200`}>
                                            <SvgIcon path={item.icon} extraPaths={item.name === 'Settings' ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /> : null} />
                                        </div>
                                        <span className={`ml-4 font-medium hidden lg:block ${active ? 'text-white' : ''}`}>{item.name}</span>
                                        {item.name === 'Notifications' && (
                                            <span className="absolute top-3 right-3 lg:right-4 flex h-2 w-2">
                                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                                                <span className="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span>
                                            </span>
                                        )}
                                    </a>
                                </li>
                            )
                        })}
                    </ul>
                </nav>
            );
        };

        const Layout = ({ currentPage, children }) => (
            <div className="flex min-h-screen">
                <NavigationSidebar currentPage={currentPage} />
                <main className={`flex-1 flex justify-center ml-20 lg:ml-64 w-full`}>
                    <div className="w-full max-w-3xl px-4 lg:px-8 py-8">
                        {children}
                    </div>
                </main>
            </div>
        );

        const NotificationItem = ({ type, actor, actorImg, target, time, isUnread, comment, targetImg }) => {
            const icons = {
                like: { path: "M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z", color: "text-rose-500", bg: "bg-rose-500/20" },
                comment: { path: "M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z", color: "text-indigo-400", bg: "bg-indigo-400/20" },
                follow: { path: "M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z", color: "text-emerald-400", bg: "bg-emerald-400/20" }
            };

            const iconProps = icons[type];

            return (
                <div className={`p-5 flex gap-4 transition-colors hover:bg-gray-800/40 relative group ${isUnread ? 'bg-indigo-500/5' : ''}`}>
                    {isUnread && <div className="absolute left-0 top-0 bottom-0 w-1 bg-indigo-500" aria-hidden="true" />}

                    <div className="relative flex-shrink-0 mt-1">
                        <img src={actorImg} alt={`${actor}'s profile`} className="w-12 h-12 rounded-full object-cover border border-gray-700" />
                        <div className={`absolute -bottom-1 -right-1 p-1 rounded-full ${iconProps.bg} backdrop-blur-md`}>
                            <SvgIcon path={iconProps.path} className={`w-3.5 h-3.5 ${iconProps.color} ${type === 'like' ? 'fill-current' : ''}`} />
                        </div>
                    </div>

                    <div className="flex-1 min-w-0">
                        <p className="text-sm text-gray-300">
                            <span className="font-semibold text-white mr-1">{actor}</span>
                            {type === 'like' && 'appreciated your piece'}
                            {type === 'comment' && 'left a comment on'}
                            {type === 'follow' && 'started following you'}
                            {target && <span className="font-medium text-white ml-1">"{target}"</span>}
                        </p>

                        {comment && (
                            <p className="mt-2 text-sm text-gray-400 italic">"{comment}"</p>
                        )}

                        <p className="text-xs text-gray-500 mt-1">{time}</p>
                    </div>

                    {targetImg && (
                        <a href="#" className="flex-shrink-0 focus-ring rounded-lg overflow-hidden ml-4">
                            <img src={targetImg} alt="Referenced work" className="w-14 h-14 object-cover" />
                        </a>
                    )}
                </div>
            );
        };

        const Notifications = () => {
            const [activeTab, setActiveTab] = React.useState('Activity');
            const tabs = ['Activity', 'Feedback Requests', 'Collections'];

            return (
                <Layout currentPage="notifications">
                    <header aria-live="polite">
                        <h1 className="text-3xl font-bold text-white mb-6">Notifications <span className="sr-only">, 2 unread</span></h1>
                        <div className="flex border-b border-gray-800 mb-6" role="tablist">
                            {tabs.map(tab => (
                                <button
                                    key={tab}
                                    role="tab"
                                    aria-selected={activeTab === tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`py-4 px-6 font-semibold transition-colors focus-ring relative ${activeTab === tab ? 'text-white border-b-2 border-indigo-500' : 'text-gray-500 hover:text-gray-300'}`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>
                    </header>

                    <section aria-label="Notification list">
                        <div className="bg-[#15171e] border border-gray-800 rounded-2xl overflow-hidden divide-y divide-gray-800">
                            <NotificationItem
                                type="like"
                                actor="Hana"
                                actorImg="https://i.pravatar.cc/150?img=5"
                                target="Solstice III"
                                time="4h ago"
                                isUnread={true}
                                targetImg="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=150&auto=format&fit=crop"
                            />
                            <NotificationItem
                                type="comment"
                                actor="Kael_3D"
                                actorImg="https://i.pravatar.cc/150?img=11"
                                target="Brand Exploration v2"
                                time="8h ago"
                                comment="The typography on the left variation feels much more grounded. Great iteration!"
                                isUnread={true}
                                targetImg="https://images.unsplash.com/photo-1600093463592-8e36ae95ef56?q=80&w=150&auto=format&fit=crop"
                            />
                            <NotificationItem
                                type="follow"
                                actor="Studio Vertex"
                                actorImg="https://i.pravatar.cc/150?img=12"
                                time="1d ago"
                                isUnread={false}
                            />
                            <NotificationItem
                                type="like"
                                actor="Alex Rivera"
                                actorImg="https://i.pravatar.cc/150?img=3"
                                target="Analog series #04"
                                time="2d ago"
                                isUnread={false}
                                targetImg="https://images.unsplash.com/photo-1516961642265-531546e84af2?q=80&w=150&auto=format&fit=crop"
                            />
                        </div>
                    </section>
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Notifications />);
    </script>
</body>

</html>
