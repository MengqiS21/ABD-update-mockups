<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Folia</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0c0d10;
            color: #f3f4f6;
            margin: 0;
            overflow: hidden;
            /* Hide main scrollbar for fixed app-like layout */
        }

        .focus-ring:focus-visible {
            outline: 2px solid #a855f7;
            outline-offset: 2px;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const SvgIcon = ({ path, className = "w-6 h-6", extraPaths }) => (
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" className={className} aria-hidden="true">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={path} />
                {extraPaths}
            </svg>
        );

        const NavigationSidebar = ({ currentPage }) => {
            const navItems = [
                { name: 'Feed', href: 'index.html', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
                { name: 'Explore', href: 'explore.html', icon: 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' },
                { name: 'Notifications', href: 'notifications.html', icon: 'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9' },
                { name: 'Messages', href: 'messages.html', icon: 'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z' },
                { name: 'Profile', href: 'profile.html', icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
                { name: 'Settings', href: 'settings.html', icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z' }
            ];

            return (
                <nav className="w-20 lg:w-64 border-r border-gray-800 h-screen fixed top-0 left-0 flex flex-col p-4 bg-[#0c0d10] z-40" aria-label="Main Navigation">
                    <div className="mb-8 flex items-center justify-center lg:justify-start pt-2">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-purple-500/20">
                            <span className="text-white font-bold text-xl">F</span>
                        </div>
                        <span className="text-2xl font-bold ml-3 hidden lg:block tracking-tight text-white">Folia</span>
                    </div>
                    <ul className="flex-1 space-y-2">
                        {navItems.map(item => {
                            const active = currentPage === item.href.replace('.html', '');
                            return (
                                <li key={item.name}>
                                    <a href={item.href} className={`flex items-center p-3 rounded-xl transition-all duration-200 group focus-ring ${active ? 'bg-indigo-500/10 text-white' : 'text-gray-400 hover:bg-gray-800/40 hover:text-white'}`} aria-current={active ? 'page' : undefined}>
                                        <div className={`${active ? 'text-indigo-400' : 'group-hover:text-indigo-400'} transition-colors duration-200`}>
                                            <SvgIcon path={item.icon} extraPaths={item.name === 'Settings' ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /> : null} />
                                        </div>
                                        <span className={`ml-4 font-medium hidden lg:block ${active ? 'text-white' : ''}`}>{item.name}</span>
                                    </a>
                                </li>
                            )
                        })}
                    </ul>
                </nav>
            );
        };

        const Messages = () => {
            const [activeThreadId, setActiveThreadId] = React.useState(1);
            const [messageInput, setMessageInput] = React.useState('');
            const inputRef = React.useRef(null);

            const threads = [
                { id: 1, name: 'Elena Rodriguez', role: 'Art Director', img: 'https://i.pravatar.cc/150?img=43', unread: false, time: '2h', lastMsg: 'The color palette looks solid. Let\'s proceed with variation B.' },
                { id: 2, name: 'Studio Vertex', role: 'Motion Agency', img: 'https://i.pravatar.cc/150?img=12', unread: true, time: '1d', lastMsg: 'Are you open for commissions next month? We have a 3D brief.' },
                { id: 3, name: 'Marcus Chen', role: '3D Generalist', img: 'https://i.pravatar.cc/150?img=60', unread: false, time: '3d', lastMsg: 'Thanks for the feedback!' }
            ];

            const activeThread = threads.find(t => t.id === activeThreadId);

            const handleSend = (e) => {
                e.preventDefault();
                if (!messageInput.trim()) return;
                // Add message logic here
                setMessageInput('');
                // Ensure focus stays in input after sending (cat_5)
                setTimeout(() => {
                    inputRef.current?.focus();
                }, 0);
            };

            return (
                <div className="flex h-screen bg-[#0c0d10]">
                    <NavigationSidebar currentPage="messages" />

                    <main className="flex-1 flex ml-20 lg:ml-64 h-full relative">
                        {/* LEFT PANEL: Conversation List */}
                        <section aria-label="Conversations" className="w-[350px] border-r border-gray-800 flex flex-col h-full flex-shrink-0 bg-[#0c0d10] z-10 hidden md:flex">
                            <header className="p-4 border-b border-gray-800 flex items-center justify-between">
                                <h1 className="text-xl font-bold text-white">Messages</h1>
                                <button className="p-2 text-indigo-400 hover:bg-indigo-400/10 rounded-full focus-ring" aria-label="Compose new message">
                                    <SvgIcon path="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </button>
                            </header>

                            <div className="p-4 border-b border-gray-800">
                                <label htmlFor="search-messages" className="sr-only">Search messages</label>
                                <div className="relative">
                                    <SvgIcon path="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" className="w-4 h-4 text-gray-500 absolute left-3 top-3 pointer-events-none" />
                                    <input
                                        type="text"
                                        id="search-messages"
                                        placeholder="Search messages..."
                                        className="w-full bg-[#15171e] border-none rounded-xl pl-9 pr-4 py-2.5 text-sm text-gray-200 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 outline-none"
                                    />
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto hide-scrollbar divide-y divide-gray-800">
                                {threads.map(thread => (
                                    <button
                                        key={thread.id}
                                        aria-label={`Conversation with ${thread.name}, ${thread.unread ? 'unread messages' : 'read'}`}
                                        aria-selected={activeThreadId === thread.id}
                                        onClick={() => setActiveThreadId(thread.id)}
                                        className={`w-full text-left p-4 flex gap-3 items-center transition-colors focus-ring relative ${activeThreadId === thread.id ? 'bg-[#15171e]' : 'hover:bg-gray-800/40'}`}
                                    >
                                        {activeThreadId === thread.id && <div className="absolute left-0 top-0 bottom-0 w-1 bg-indigo-500" aria-hidden="true" />}
                                        <div className="relative">
                                            <img src={thread.img} alt="" className="w-12 h-12 rounded-full object-cover border border-gray-700" />
                                            {thread.unread && <div className="absolute top-0 right-0 w-3 h-3 bg-indigo-500 border-2 border-[#0c0d10] rounded-full"></div>}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex justify-between items-baseline mb-0.5">
                                                <h2 className="text-sm font-semibold text-gray-100 truncate">{thread.name}</h2>
                                                <span className="text-xs text-gray-500 flex-shrink-0">{thread.time}</span>
                                            </div>
                                            <p className={`text-sm truncate ${thread.unread ? 'text-white font-medium' : 'text-gray-500'}`}>
                                                {thread.lastMsg}
                                            </p>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* RIGHT PANEL: Chat View */}
                        <section aria-label={`Chat with ${activeThread?.name}`} className="flex-1 flex flex-col h-full bg-[#0f1115]">
                            <header className="p-4 border-b border-gray-800 flex items-center justify-between bg-[#0f1115]/90 backdrop-blur-md z-10 hidden sm:flex">
                                <div className="flex items-center gap-3">
                                    <img src={activeThread?.img} alt={`${activeThread?.name} profile picture`} className="w-10 h-10 rounded-full object-cover" />
                                    <div>
                                        <h2 className="text-base font-bold text-gray-100 leading-tight">{activeThread?.name}</h2>
                                        <p className="text-xs text-gray-400">{activeThread?.role}</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-1">
                                    <button className="px-3 py-1.5 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-500 rounded-lg transition-colors focus-ring flex items-center gap-2">
                                        <SvgIcon path="M12 4v16m8-8H4" className="w-4 h-4" />
                                        Share a Project
                                    </button>
                                    <button className="p-2 text-gray-400 hover:text-white rounded-lg hover:bg-gray-800 transition-colors focus-ring" aria-label="Conversation options">
                                        <SvgIcon path="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z" />
                                    </button>
                                </div>
                            </header>

                            <div className="flex-1 overflow-y-auto p-4 space-y-6 hide-scrollbar">
                                {/* Chronological Messages */}
                                <div className="flex justify-center">
                                    <span className="text-xs font-semibold text-gray-500 uppercase tracking-wider px-3 py-1 bg-[#15171e] rounded-full">Today</span>
                                </div>

                                {/* Incoming Context Bubble (Inline image sharing) */}
                                <div className="flex gap-3 max-w-lg">
                                    <img src={activeThread?.img} alt="" className="w-8 h-8 rounded-full object-cover flex-shrink-0" aria-hidden="true" />
                                    <div>
                                        <div className="bg-[#15171e] border border-gray-800 rounded-2xl p-3 text-sm text-gray-200 shadow-sm">
                                            <p className="mb-2">I took a look at the concept board you shared. I think the typography approach in variation B fits perfectly.</p>
                                            <div className="rounded-lg overflow-hidden border border-gray-700 aspect-video relative">
                                                <img src="https://images.unsplash.com/photo-1614729939124-032f0b56c9ce?q=80&w=400&auto=format&fit=crop" alt="Screenshot of typography variation B" className="w-full h-full object-cover" />
                                            </div>
                                        </div>
                                        <span className="text-xs text-gray-500 mt-1 ml-1 block">10:42 AM</span>
                                    </div>
                                </div>

                                {/* Outgoing message */}
                                <div className="flex gap-3 flex-row-reverse max-w-lg ml-auto">
                                    <div className="flex flex-col items-end">
                                        <div className="bg-indigo-600 rounded-2xl rounded-tr-sm p-3 text-sm text-white shadow-sm shadow-indigo-900/20">
                                            <p>Awesome. I'll refine the kerning and prepare the final presentation deck.</p>
                                        </div>
                                        <div className="flex items-center gap-1 mt-1 mr-1">
                                            <span className="text-xs text-gray-500">11:05 AM</span>
                                            {/* Read receipt */}
                                            <SvgIcon path="M5 13l4 4L19 7" className="w-3.5 h-3.5 text-indigo-400" />
                                        </div>
                                    </div>
                                </div>

                                {/* Incoming message */}
                                <div className="flex gap-3 max-w-lg">
                                    <img src={activeThread?.img} alt="" className="w-8 h-8 rounded-full object-cover flex-shrink-0" aria-hidden="true" />
                                    <div>
                                        <div className="bg-[#15171e] border border-gray-800 rounded-2xl rounded-tl-sm p-3 text-sm text-gray-200">
                                            <p>The color palette looks solid. Let's proceed with variation B.</p>
                                        </div>
                                        <span className="text-xs text-gray-500 mt-1 ml-1 block">2 hours ago</span>
                                    </div>
                                </div>
                            </div>

                            {/* Message Input Footer */}
                            <div className="p-4 bg-[#0f1115] border-t border-gray-800">
                                <form className="flex items-end gap-2 bg-[#15171e] border border-gray-700 rounded-2xl p-2 pb-2 focus-within:border-indigo-500 transition-colors" onSubmit={handleSend}>
                                    <button type="button" className="p-2 text-gray-400 hover:text-white rounded-full hover:bg-gray-800 transition-colors focus-ring flex-shrink-0 mb-0.5" aria-label="Add attachment or image">
                                        <SvgIcon path="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                                    </button>

                                    <div className="flex-1 relative">
                                        <label htmlFor="message-input" className="sr-only">Type a message</label>
                                        <textarea
                                            id="message-input"
                                            ref={inputRef}
                                            value={messageInput}
                                            onChange={(e) => setMessageInput(e.target.value)}
                                            placeholder="Type a message..."
                                            className="w-full bg-transparent border-none text-gray-200 placeholder-gray-500 focus:ring-0 resize-none max-h-32 min-h-[40px] py-2 px-1 outline-none"
                                            rows="1"
                                            onKeyDown={(e) => {
                                                if (e.key === 'Enter' && !e.shiftKey) {
                                                    e.preventDefault();
                                                    handleSend(e);
                                                }
                                            }}
                                        />
                                    </div>

                                    <div className="flex items-center gap-1 mb-0.5 flex-shrink-0">
                                        <button type="button" className="p-2 text-gray-400 hover:text-yellow-400 rounded-full hover:bg-gray-800 transition-colors focus-ring" aria-label="Insert Emoji">
                                            <SvgIcon path="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </button>
                                        <button
                                            type="submit"
                                            className={`p-2 rounded-full transition-colors focus-ring flex items-center justify-center ${messageInput.trim() ? 'bg-indigo-600 text-white hover:bg-indigo-500' : 'bg-gray-800 text-gray-500 cursor-not-allowed'}`}
                                            disabled={!messageInput.trim()}
                                            aria-label="Send message"
                                        >
                                            <SvgIcon path="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" className="w-5 h-5 ml-0.5" />
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </section>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Messages />);
    </script>
</body>

</html>
