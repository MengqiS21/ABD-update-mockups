<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Feed | Folia</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0c0d10;
            color: #f3f4f6;
            margin: 0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #272a30;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3f434a;
        }

        .focus-ring:focus-visible {
            outline: 2px solid #a855f7;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- SHARED COMPONENTS ---

        const SvgIcon = ({ path, className = "w-6 h-6", extraPaths }) => (
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" className={className} aria-hidden="true">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={path} />
                {extraPaths}
            </svg>
        );

        const NavigationSidebar = ({ currentPage }) => {
            const navItems = [
                { name: 'Feed', href: 'index.html', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
                { name: 'Explore', href: 'explore.html', icon: 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' },
                { name: 'Notifications', href: 'notifications.html', icon: 'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9' },
                { name: 'Messages', href: 'messages.html', icon: 'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z' },
                { name: 'Profile', href: 'profile.html', icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
                { name: 'Settings', href: 'settings.html', icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z' }
            ];

            return (
                <nav className="w-20 lg:w-64 border-r border-gray-800 h-screen fixed top-0 left-0 flex flex-col p-4 bg-[#0c0d10] z-40 transition-all duration-300" aria-label="Main Navigation">
                    <div className="mb-8 flex items-center justify-center lg:justify-start pt-2">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center flex-shrink-0 shadow-lg shadow-purple-500/20">
                            <span className="text-white font-bold text-xl">F</span>
                        </div>
                        <span className="text-2xl font-bold ml-3 hidden lg:block tracking-tight text-white">Folia</span>
                    </div>

                    <ul className="flex-1 space-y-2">
                        {navItems.map(item => {
                            const active = currentPage === item.href.replace('.html', '');
                            const isSettings = item.name === 'Settings';
                            return (
                                <li key={item.name}>
                                    <a
                                        href={item.href}
                                        className={`flex items-center p-3 rounded-xl transition-all duration-200 group focus-ring ${active ? 'bg-indigo-500/10 text-white' : 'text-gray-400 hover:bg-gray-800/40 hover:text-white'}`}
                                        aria-current={active ? 'page' : undefined}
                                    >
                                        <div className={`${active ? 'text-indigo-400' : 'group-hover:text-indigo-400'} transition-colors duration-200`}>
                                            <SvgIcon path={item.icon} extraPaths={isSettings ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /> : null} />
                                        </div>
                                        <span className={`ml-4 font-medium hidden lg:block ${active ? 'text-white' : ''}`}>{item.name}</span>
                                    </a>
                                </li>
                            )
                        })}
                        <li>
                            <button className="w-full flex items-center justify-center lg:justify-start p-3 mt-4 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white transition-all duration-200 focus-ring shadow-lg shadow-indigo-500/20">
                                <SvgIcon path="M12 4v16m8-8H4" />
                                <span className="ml-2 font-medium hidden lg:block">Post Work</span>
                            </button>
                        </li>
                    </ul>

                    <div className="mt-auto">
                        <a href="profile.html" className="flex items-center p-2 rounded-xl hover:bg-gray-800/40 transition-colors duration-200 focus-ring" aria-label="Go to your profile">
                            <img src="https://i.pravatar.cc/150?img=32" alt="Maya's profile avatar" className="w-10 h-10 rounded-full border border-gray-700 object-cover" />
                            <div className="ml-3 hidden lg:block overflow-hidden">
                                <p className="font-semibold text-sm text-gray-200 truncate leading-tight">Maya Creates</p>
                                <p className="text-xs text-gray-500 truncate">@maya_creates</p>
                            </div>
                        </a>
                    </div>
                </nav>
            );
        };

        const Layout = ({ currentPage, children, rightSidebar }) => (
            <div className="flex min-h-screen">
                <NavigationSidebar currentPage={currentPage} />
                <main className={`flex-1 flex justify-center ml-20 lg:ml-64 transition-all duration-300`}>
                    <div className="w-full max-w-2xl px-4 lg:px-6 xl:px-8 py-8">
                        {children}
                    </div>
                    {rightSidebar && (
                        <div className="hidden xl:block w-80 px-4 py-8 border-l border-gray-800 h-screen sticky top-0 overflow-y-auto">
                            {rightSidebar()}
                        </div>
                    )}
                </main>
            </div>
        );

        // --- FEED PAGE COMPONENTS ---

        const Composer = () => {
            const [caption, setCaption] = React.useState('');
            const [tags, setTags] = React.useState('');

            return (
                <div className="bg-[#15171e] rounded-2xl p-4 border border-gray-800 mb-8 shadow-sm">
                    <div className="flex gap-4">
                        <img src="https://i.pravatar.cc/150?img=32" alt="Maya's profile avatar" className="w-10 h-10 rounded-full object-cover flex-shrink-0" />
                        <div className="flex-1">
                            <div className="mb-2 relative">
                                <label htmlFor="composer-input" className="sr-only">Share your creative work, concepts, or thoughts</label>
                                <textarea
                                    id="composer-input"
                                    placeholder="Share your work-in-progress or latest inspiration..."
                                    className="w-full bg-transparent border-none text-gray-100 placeholder-gray-500 focus:ring-0 resize-none overflow-hidden focus-ring px-2 rounded min-h-[60px]"
                                    value={caption}
                                    onChange={(e) => setCaption(e.target.value)}
                                    aria-describedby="char-limit-warning"
                                />
                            </div>

                            <div className="mb-3 px-2">
                                <label htmlFor="tags-input" className="sr-only">Add skills or medium tags</label>
                                <div className="flex items-center bg-[#0c0d10] rounded-lg px-3 py-1.5 focus-within:ring-2 focus-within:ring-indigo-500">
                                    <span className="text-gray-500 text-sm mr-2">#</span>
                                    <input
                                        type="text"
                                        id="tags-input"
                                        placeholder="Add skills/medium: e.g. illustration, procreate"
                                        className="bg-transparent border-none text-sm text-gray-300 focus:ring-0 w-full outline-none"
                                        value={tags}
                                        onChange={(e) => setTags(e.target.value)}
                                    />
                                </div>
                            </div>

                            <div className="flex items-center justify-between border-t border-gray-800 pt-3 mt-2">
                                <div className="flex gap-2">
                                    <button aria-label="Upload media" className="p-2 text-gray-400 hover:text-indigo-400 hover:bg-indigo-400/10 rounded-full transition-colors focus-ring">
                                        <SvgIcon path="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" className="w-5 h-5" />
                                    </button>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span
                                        id="char-limit-warning"
                                        className={`text-xs ${caption.length > 400 ? 'text-red-400' : 'text-gray-500'}`}
                                        aria-live="polite"
                                    >
                                        {caption.length > 400 ? 'Limit reached' : `${caption.length}/400`}
                                    </span>
                                    <button className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 rounded-full text-sm font-semibold transition-colors focus-ring cursor-pointer" disabled={caption.length > 400}>
                                        Share
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const PostCard = ({ author, handle, avatar, time, text, tags, imageUrl, likes, comments, isLiked: initLiked }) => {
            const [isLiked, setIsLiked] = React.useState(initLiked);
            const [likeCount, setLikeCount] = React.useState(likes);

            const handleLike = () => {
                setIsLiked(!isLiked);
                setLikeCount(prev => isLiked ? prev - 1 : prev + 1);
            };

            return (
                <article className="bg-[#15171e] rounded-2xl border border-gray-800 overflow-hidden mb-6 shadow-sm">
                    <div className="p-4 flex items-center justify-between pointer-events-none">
                        <div className="flex items-center gap-3 pointer-events-auto">
                            <a href="#" className="focus-ring rounded-full">
                                <img src={avatar} alt={`${author}'s profile avatar`} className="w-10 h-10 rounded-full object-cover border border-gray-700" />
                            </a>
                            <div>
                                <a href="#" className="font-semibold text-gray-100 hover:underline focus-ring rounded">{author}</a>
                                <div className="flex items-center text-sm text-gray-500">
                                    <span>{handle}</span>
                                    <span className="mx-1">·</span>
                                    <time>{time}</time>
                                </div>
                            </div>
                        </div>
                        <button className="p-2 text-gray-500 hover:text-white rounded-full hover:bg-gray-800 transition-colors focus-ring pointer-events-auto" aria-label={`More options for post by ${author}`} aria-haspopup="menu" aria-expanded="false">
                            <SvgIcon path="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z" className="w-5 h-5" />
                        </button>
                    </div>

                    <div className="px-4 pb-3">
                        <p className="text-gray-300 leading-relaxed mb-3 whitespace-pre-line">{text}</p>
                        {tags && tags.length > 0 && (
                            <div className="flex flex-wrap gap-2 mb-3" aria-label="Post tags">
                                {tags.map(tag => (
                                    <a key={tag} href="#" className="text-xs font-medium text-indigo-400 bg-indigo-400/10 px-2 py-1 rounded hover:bg-indigo-400/20 transition-colors focus-ring">#{tag}</a>
                                ))}
                            </div>
                        )}
                    </div>

                    {imageUrl && (
                        <div className="w-full bg-[#0c0d10] border-y border-gray-800 aspect-[4/3] sm:aspect-video relative overflow-hidden group">
                            <img src={imageUrl} alt={`Project work attached to post by ${author}`} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-[1.02]" />
                        </div>
                    )}

                    <div className="p-3 px-4 flex justify-between items-center text-gray-400">
                        <div className="flex gap-6">
                            <button
                                onClick={handleLike}
                                className={`flex items-center gap-2 group focus-ring rounded-full p-1 -ml-1 ${isLiked ? 'text-rose-500' : 'hover:text-rose-500'}`}
                                aria-label={`${isLiked ? 'Unlike' : 'Like'} post by ${author} — currently ${likeCount} likes`}
                                aria-pressed={isLiked}
                            >
                                <div className={`p-1.5 rounded-full ${isLiked ? 'bg-rose-500/10' : 'group-hover:bg-rose-500/10'} transition-colors`}>
                                    <svg fill={isLiked ? "currentColor" : "none"} viewBox="0 0 24 24" stroke="currentColor" className="w-5 h-5 text-current">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={isLiked ? 0 : 2} fillRule={isLiked ? "nonzero" : "evenodd"} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                    </svg>
                                </div>
                                <span className={`text-sm font-medium ${isLiked ? '' : 'group-hover:text-rose-500'} transition-colors`}>{likeCount}</span>
                            </button>

                            <button className="flex items-center gap-2 hover:text-indigo-400 group focus-ring rounded-full p-1" aria-label={`Comment on post by ${author} — ${comments} comments`}>
                                <div className="p-1.5 rounded-full group-hover:bg-indigo-400/10 transition-colors">
                                    <SvgIcon path="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" className="w-5 h-5" />
                                </div>
                                <span className="text-sm font-medium">{comments}</span>
                            </button>
                        </div>
                    </div>
                </article>
            );
        }

        const FeedToggle = () => (
            <div className="flex border-b border-gray-800 mb-6" role="tablist" aria-label="Feed Streams">
                <button role="tab" aria-selected="true" className="flex-1 py-4 font-semibold text-white border-b-2 border-indigo-500 focus-ring">For You</button>
                <button role="tab" aria-selected="false" className="flex-1 py-4 font-semibold text-gray-500 hover:text-gray-300 transition-colors focus-ring">Following</button>
            </div>
        );

        const TrendingWidget = () => (
            <div className="bg-[#15171e] rounded-2xl border border-gray-800 p-5 mb-6">
                <h2 className="font-bold text-gray-100 mb-4 tracking-wide">Trending Palettes</h2>
                <div className="space-y-4">
                    <div className="group cursor-pointer">
                        <div className="flex h-12 rounded-lg overflow-hidden focus-ring" tabIndex="0" aria-label="Neon Cyberpunk Palette">
                            <div className="w-1/4 bg-[#facc15]"></div>
                            <div className="w-1/4 bg-[#f43f5e]"></div>
                            <div className="w-1/4 bg-[#8b5cf6]"></div>
                            <div className="w-1/4 bg-[#0ea5e9]"></div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const SuggestedCreatorsWidget = () => (
            <div className="bg-[#15171e] rounded-2xl border border-gray-800 p-5">
                <h2 className="font-bold text-gray-100 mb-4 tracking-wide">Rising Creators</h2>
                <div className="space-y-4">
                    {[
                        { name: 'Kael', handle: '@kael_3d', role: '3D Artist', img: 'https://i.pravatar.cc/150?img=11' }
                    ].map(user => (
                        <div key={user.handle} className="flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <img src={user.img} alt={`Profile of ${user.name}`} className="w-10 h-10 rounded-full object-cover" />
                                <div>
                                    <p className="text-sm font-semibold text-gray-200 leading-tight">{user.name}</p>
                                    <p className="text-xs text-gray-500">{user.role}</p>
                                </div>
                            </div>
                            <button className="text-xs font-semibold bg-gray-800 hover:bg-gray-700 text-white px-3 py-1.5 rounded-full transition-colors focus-ring" aria-label={`Follow ${user.name}`}>Follow</button>
                        </div>
                    ))}
                </div>
            </div>
        );

        const Feed = () => {
            const posts = [
                {
                    id: 1,
                    author: 'Elena Rodriguez',
                    handle: '@elena_designs',
                    avatar: 'https://i.pravatar.cc/150?img=43',
                    time: '2h',
                    text: 'Just finished the branding concepts...',
                    tags: ['branding', 'typography'],
                    imageUrl: 'https://images.unsplash.com/photo-1600093463592-8e36ae95ef56?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80',
                    likes: 245,
                    comments: 32,
                    isLiked: true
                }
            ];

            return (
                <Layout
                    currentPage="index"
                    rightSidebar={() => (
                        <div className="space-y-6">
                            <TrendingWidget />
                            <SuggestedCreatorsWidget />
                        </div>
                    )}
                >
                    <header className="sticky top-0 z-10 bg-[#0c0d10]/90 backdrop-blur-md pt-4 pb-2 -mx-4 px-4 lg:mx-0 lg:px-0 mb-4">
                        <FeedToggle />
                    </header>
                    <Composer />
                    <div aria-label="Timeline: Main feed" role="feed">
                        {posts.map(post => <PostCard key={post.id} {...post} />)}
                    </div>
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Feed />);
    </script>
</body>

</html>
