<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Folia</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0c0d10;
            color: #f3f4f6;
            margin: 0;
            overflow-x: hidden;
        }

        .focus-ring:focus-visible {
            outline: 2px solid #a855f7;
            outline-offset: 2px;
        }

        /* Style for custom toggle switches */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #6875F5;
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: #4f46e5;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const SvgIcon = ({ path, className = "w-6 h-6", extraPaths }) => (
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" className={className} aria-hidden="true">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={path} />
                {extraPaths}
            </svg>
        );

        const NavigationSidebar = ({ currentPage }) => {
            const navItems = [
                { name: 'Feed', href: 'index.html', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
                { name: 'Explore', href: 'explore.html', icon: 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' },
                { name: 'Notifications', href: 'notifications.html', icon: 'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9' },
                { name: 'Messages', href: 'messages.html', icon: 'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z' },
                { name: 'Profile', href: 'profile.html', icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
                { name: 'Settings', href: 'settings.html', icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z' }
            ];

            return (
                <nav className="w-20 lg:w-64 border-r border-gray-800 h-screen fixed top-0 left-0 flex flex-col p-4 bg-[#0c0d10] z-40" aria-label="Main Navigation">
                    <div className="mb-8 flex items-center justify-center lg:justify-start pt-2">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-purple-500/20">
                            <span className="text-white font-bold text-xl">F</span>
                        </div>
                        <span className="text-2xl font-bold ml-3 hidden lg:block tracking-tight text-white">Folia</span>
                    </div>
                    <ul className="flex-1 space-y-2">
                        {navItems.map(item => {
                            const active = currentPage === item.href.replace('.html', '');
                            const isSettings = item.name === 'Settings';
                            return (
                                <li key={item.name}>
                                    <a href={item.href} className={`flex items-center p-3 rounded-xl transition-all duration-200 group focus-ring ${active ? 'bg-indigo-500/10 text-white' : 'text-gray-400 hover:bg-gray-800/40 hover:text-white'}`} aria-current={active ? 'page' : undefined}>
                                        <div className={`${active ? 'text-indigo-400' : 'group-hover:text-indigo-400'} transition-colors duration-200`}>
                                            <SvgIcon path={item.icon} extraPaths={isSettings ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /> : null} />
                                        </div>
                                        <span className={`ml-4 font-medium hidden lg:block ${active ? 'text-white' : ''}`}>{item.name}</span>
                                    </a>
                                </li>
                            )
                        })}
                    </ul>
                </nav>
            );
        };

        const Toggle = ({ id, label, description, defaultChecked }) => {
            const [checked, setChecked] = React.useState(defaultChecked);
            return (
                <div className="flex items-center justify-between py-4 group">
                    <div className="flex flex-col pr-4">
                        <span className="text-sm font-medium text-gray-200" id={`${id}-label`}>{label}</span>
                        {description && <span className="text-sm text-gray-500" id={`${id}-description`}>{description}</span>}
                    </div>
                    <button
                        id={id}
                        type="button"
                        role="switch"
                        aria-checked={checked}
                        aria-labelledby={`${id}-label`}
                        aria-describedby={description ? `${id}-description` : undefined}
                        className={`${checked ? 'bg-indigo-600' : 'bg-gray-700'} relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus-ring`}
                        onClick={() => setChecked(!checked)}
                    >
                        <span className={`${checked ? 'translate-x-5' : 'translate-x-0'} pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out`}></span>
                    </button>
                </div>
            );
        };

        const DeleteAccountModal = ({ isOpen, onClose }) => {
            const modalRef = React.useRef(null);
            const firstInputRef = React.useRef(null);

            // Focus trap logic
            React.useEffect(() => {
                if (!isOpen) return;

                const focusableElementsWrapper = modalRef.current;
                const focusableElements = focusableElementsWrapper.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
                const firstElement = focusableElements[0];
                const lastElement = focusableElements[focusableElements.length - 1];

                const handleTabKeyPress = (e) => {
                    if (e.key === 'Tab') {
                        if (e.shiftKey && document.activeElement === firstElement) {
                            e.preventDefault();
                            lastElement.focus();
                        } else if (!e.shiftKey && document.activeElement === lastElement) {
                            e.preventDefault();
                            firstElement.focus();
                        }
                    }
                };

                const handleEsc = (e) => {
                    if (e.key === 'Escape') onClose();
                };

                firstElement?.focus();

                document.addEventListener('keydown', handleTabKeyPress);
                document.addEventListener('keydown', handleEsc);

                return () => {
                    document.removeEventListener('keydown', handleTabKeyPress);
                    document.removeEventListener('keydown', handleEsc);
                };
            }, [isOpen, onClose]);

            if (!isOpen) return null;

            return (
                <div role="dialog" aria-modal="true" aria-labelledby="modal-title" className="fixed inset-0 z-50 overflow-y-auto">
                    <div className="flex min-h-screen items-center justify-center p-4 text-center sm:p-0">
                        <div className="fixed inset-0 bg-black/80 transition-opacity backdrop-blur-sm" aria-hidden="true" onClick={onClose}></div>

                        <div ref={modalRef} className="relative transform overflow-hidden rounded-2xl bg-[#15171e] border border-gray-800 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg">
                            <div className="bg-[#15171e] px-4 pb-4 pt-5 sm:p-6 sm:pb-4 border-b border-gray-800">
                                <div className="sm:flex sm:items-start">
                                    <div className="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-red-500/10 sm:mx-0 sm:h-10 sm:w-10">
                                        <SvgIcon path="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" className="h-6 w-6 text-red-500" />
                                    </div>
                                    <div className="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left">
                                        <h3 className="text-lg font-bold leading-6 text-white" id="modal-title">Delete Account</h3>
                                        <div className="mt-2">
                                            <p className="text-sm text-gray-400">
                                                Are you sure you want to deactivate your account? All of your portfolios, posts, and messages will be permanently removed. This action cannot be undone.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-[#0c0d10] px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6 gap-3">
                                <button type="button" onClick={onClose} className="inline-flex w-full justify-center rounded-xl bg-red-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-red-500 focus-ring sm:w-auto">
                                    Delete Account
                                </button>
                                <button type="button" ref={firstInputRef} onClick={onClose} className="mt-3 inline-flex w-full justify-center rounded-xl bg-[#15171e] px-4 py-2 text-sm font-semibold text-gray-300 shadow-sm ring-1 ring-inset ring-gray-700 hover:bg-gray-800 focus-ring sm:mt-0 sm:w-auto">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Settings = () => {
            const [username, setUsername] = React.useState('maya_creates');
            const [isModalOpen, setIsModalOpen] = React.useState(false);
            const [usernameError, setUsernameError] = React.useState('');

            const handleUsernameChange = (e) => {
                const val = e.target.value;
                setUsername(val);
                if (val.trim() === '') {
                    setUsernameError('Username cannot be empty.');
                } else if (val.length < 3) {
                    setUsernameError('Username must be at least 3 characters.');
                } else {
                    setUsernameError('');
                }
            };

            const handleModalTriggerFocus = () => {
                // Return focus to trigger after modal closes
                setTimeout(() => {
                    document.getElementById('delete-account-trigger')?.focus();
                }, 10);
            };

            return (
                <div className="flex min-h-screen bg-[#0f1115]">
                    <NavigationSidebar currentPage="settings" />

                    <main className="flex-1 ml-20 lg:ml-64 w-full">
                        <div className="max-w-4xl mx-auto px-4 lg:px-8 py-10">
                            <header className="mb-10">
                                <h1 className="text-3xl font-bold text-white tracking-tight">Settings</h1>
                                <p className="text-gray-400 mt-2">Manage your account preferences and creative profile.</p>
                            </header>

                            <div className="space-y-10">
                                {/* Profile & Portfolio Group */}
                                <section aria-labelledby="profile-settings-heading" className="bg-[#15171e] border border-gray-800 rounded-3xl overflow-hidden shadow-sm">
                                    <div className="p-6 border-b border-gray-800 bg-[#15171e] sticky top-0 z-10">
                                        <h2 id="profile-settings-heading" className="text-xl font-bold text-gray-100">Profile & Portfolio</h2>
                                    </div>
                                    <div className="p-6 space-y-6">
                                        <div className="flex items-center gap-6">
                                            <div className="relative group cursor-pointer focus-within:ring-2 focus-within:ring-indigo-500 rounded-full inline-block">
                                                <img src="https://i.pravatar.cc/150?img=32" alt="Current Avatar" className="w-20 h-20 rounded-full object-cover border-2 border-gray-700" />
                                                <div className="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <SvgIcon path="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" className="text-white w-6 h-6" />
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                                                </div>
                                                <input type="file" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" aria-label="Change profile picture" />
                                            </div>
                                            <div>
                                                <button className="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white font-medium rounded-xl transition-colors focus-ring text-sm">Change Avatar</button>
                                                <p className="text-xs text-gray-500 mt-2">JPG, GIF or PNG. 1MB max.</p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div>
                                                <label htmlFor="display-name" className="block text-sm font-medium text-gray-300 mb-2">Display Name</label>
                                                <input type="text" id="display-name" defaultValue="Maya Creates" className="w-full bg-[#0c0d10] border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none focus-ring transition-colors" />
                                            </div>
                                            <div>
                                                <label htmlFor="username" className="block text-sm font-medium text-gray-300 mb-2">Username <span className="text-red-400">*</span></label>
                                                <div className="relative">
                                                    <span className="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">@</span>
                                                    <input
                                                        type="text"
                                                        id="username"
                                                        value={username}
                                                        onChange={handleUsernameChange}
                                                        className={`w-full bg-[#0c0d10] border ${usernameError ? 'border-red-500' : 'border-gray-700'} rounded-xl pl-8 pr-4 py-2.5 text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none focus-ring transition-colors`}
                                                        aria-invalid={usernameError ? "true" : "false"}
                                                        aria-describedby={usernameError ? "username-error" : undefined}
                                                        required
                                                    />
                                                </div>
                                                {usernameError && <p id="username-error" className="mt-2 text-sm text-red-400" aria-live="polite">{usernameError}</p>}
                                            </div>
                                            <div className="md:col-span-2">
                                                <label htmlFor="bio" className="block text-sm font-medium text-gray-300 mb-2">Bio</label>
                                                <textarea id="bio" rows="3" className="w-full bg-[#0c0d10] border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none focus-ring transition-colors resize-none mb-1">Digital artist and UI designer exploring the intersection between brutalism and fluid organic forms.</textarea>
                                                <p className="text-xs text-gray-500 text-right">98/160</p>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* Creative Tools Group */}
                                <section aria-labelledby="tools-heading" className="bg-[#15171e] border border-gray-800 rounded-3xl overflow-hidden shadow-sm">
                                    <div className="p-6 border-b border-gray-800 bg-[#15171e]">
                                        <h2 id="tools-heading" className="text-xl font-bold text-gray-100">Creative Tools</h2>
                                        <p className="text-sm text-gray-400 mt-1">Listed skills and primary software.</p>
                                    </div>
                                    <div className="p-6">
                                        <label htmlFor="skills-input" className="block text-sm font-medium text-gray-300 mb-2">Software Stack</label>
                                        <div className="flex flex-wrap gap-2 mb-4" aria-label="Current tools">
                                            {['Figma', 'Procreate', 'Adobe Illustrator', 'Blender'].map(tool => (
                                                <span key={tool} className="inline-flex items-center gap-1.5 px-3 py-1 bg-indigo-500/10 text-indigo-300 rounded-lg text-sm font-medium border border-indigo-500/20">
                                                    {tool}
                                                    <button type="button" aria-label={`Remove ${tool}`} className="hover:text-white focus-ring rounded-full">
                                                        <SvgIcon path="M6 18L18 6M6 6l12 12" className="w-3.5 h-3.5" />
                                                    </button>
                                                </span>
                                            ))}
                                        </div>
                                        <div className="flex gap-2">
                                            <input type="text" id="skills-input" placeholder="Add a tool (e.g. Cinema4D)..." className="flex-1 bg-[#0c0d10] border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none focus-ring transition-colors" />
                                            <button className="px-4 py-2.5 bg-gray-800 hover:bg-gray-700 text-white font-medium rounded-xl transition-colors focus-ring">Add</button>
                                        </div>
                                    </div>
                                </section>

                                {/* Visibility & Commission Status Group */}
                                <section aria-labelledby="visibility-heading" className="bg-[#15171e] border border-gray-800 rounded-3xl overflow-hidden shadow-sm">
                                    <div className="p-6 border-b border-gray-800 bg-[#15171e]">
                                        <h2 id="visibility-heading" className="text-xl font-bold text-gray-100">Visibility & Status</h2>
                                    </div>
                                    <div className="px-6 py-2 divide-y divide-gray-800">
                                        <Toggle
                                            id="public-portfolio-toggle"
                                            label="Public Portfolio"
                                            description="Make your portfolio visible to anyone, including search engines."
                                            defaultChecked={true}
                                        />
                                        <Toggle
                                            id="open-work-toggle"
                                            label="Open for Work Badge"
                                            description="Display a badge on your profile indicating you are accepting commissions."
                                            defaultChecked={true}
                                        />
                                        <Toggle
                                            id="collab-toggle"
                                            label="Collaboration Requests"
                                            description="Allow specific requests for joint creative endeavors."
                                            defaultChecked={false}
                                        />
                                    </div>
                                </section>

                                {/* Notifications Group */}
                                <section aria-labelledby="notifications-heading" className="bg-[#15171e] border border-gray-800 rounded-3xl overflow-hidden shadow-sm">
                                    <div className="p-6 border-b border-gray-800 bg-[#15171e]">
                                        <h2 id="notifications-heading" className="text-xl font-bold text-gray-100">Notifications</h2>
                                    </div>
                                    <div className="px-6 py-2 divide-y divide-gray-800">
                                        <Toggle
                                            id="push-appreciations-toggle"
                                            label="Appreciations"
                                            description="Notify me when someone appreciates my work."
                                            defaultChecked={true}
                                        />
                                        <Toggle
                                            id="push-comments-toggle"
                                            label="Comments and Feedback"
                                            description="Notify me of new comments on my posts."
                                            defaultChecked={true}
                                        />
                                        <Toggle
                                            id="email-digest-toggle"
                                            label="Weekly Digest Emails"
                                            description="Receive a weekly summary of trending palettes and creators."
                                            defaultChecked={false}
                                        />
                                    </div>
                                </section>

                                {/* Security Group */}
                                <section aria-labelledby="security-heading" className="bg-[#15171e] border border-gray-800 rounded-3xl overflow-hidden shadow-sm">
                                    <div className="p-6 border-b border-gray-800 bg-[#15171e]">
                                        <h2 id="security-heading" className="text-xl font-bold text-gray-100">Account Security</h2>
                                    </div>
                                    <div className="p-6">
                                        <div className="flex flex-col md:flex-row gap-4 items-start md:items-center justify-between mb-8">
                                            <div>
                                                <h3 className="text-base font-semibold text-gray-200">Password</h3>
                                                <p className="text-sm text-gray-500 mt-1">Last changed 3 months ago.</p>
                                            </div>
                                            <button className="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white font-medium rounded-xl transition-colors focus-ring text-sm">Update Password</button>
                                        </div>
                                        <div className="flex flex-col md:flex-row gap-4 items-start md:items-center justify-between pt-6 border-t border-gray-800">
                                            <div>
                                                <h3 className="text-base font-semibold text-red-400">Danger Zone</h3>
                                                <p className="text-sm text-gray-500 mt-1">Permanently remove your account and all associated data.</p>
                                            </div>
                                            <button
                                                id="delete-account-trigger"
                                                onClick={() => setIsModalOpen(true)}
                                                className="px-4 py-2 border border-red-500/30 text-red-500 hover:bg-red-500/10 font-medium rounded-xl transition-colors focus-ring text-sm"
                                            >
                                                Delete Account
                                            </button>
                                        </div>
                                    </div>
                                </section>

                                <div className="flex justify-end pt-4 pb-12">
                                    <button className="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-colors focus-ring shadow-lg shadow-indigo-500/20">
                                        Save Changes
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    <DeleteAccountModal
                        isOpen={isModalOpen}
                        onClose={() => {
                            setIsModalOpen(false);
                            handleModalTriggerFocus();
                        }}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Settings />);
    </script>
</body>

</html>
