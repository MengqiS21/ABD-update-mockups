<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore | Folia</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0c0d10;
            color: #f3f4f6;
            margin: 0;
            overflow-x: hidden;
        }

        .focus-ring:focus-visible {
            outline: 2px solid #a855f7;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const SvgIcon = ({ path, className = "w-6 h-6", extraPaths }) => (
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" className={className} aria-hidden="true">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={path} />
                {extraPaths}
            </svg>
        );

        const NavigationSidebar = ({ currentPage }) => {
            const navItems = [
                { name: 'Feed', href: 'index.html', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
                { name: 'Explore', href: 'explore.html', icon: 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z' },
                { name: 'Notifications', href: 'notifications.html', icon: 'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9' },
                { name: 'Messages', href: 'messages.html', icon: 'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z' },
                { name: 'Profile', href: 'profile.html', icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
                { name: 'Settings', href: 'settings.html', icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z' }
            ];

            return (
                <nav className="w-20 lg:w-64 border-r border-gray-800 h-screen fixed top-0 left-0 flex flex-col p-4 bg-[#0c0d10] z-40" aria-label="Main Navigation">
                    <div className="mb-8 flex items-center justify-center lg:justify-start pt-2">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-purple-500/20">
                            <span className="text-white font-bold text-xl">F</span>
                        </div>
                        <span className="text-2xl font-bold ml-3 hidden lg:block tracking-tight text-white">Folia</span>
                    </div>
                    <ul className="flex-1 space-y-2">
                        {navItems.map(item => {
                            const active = currentPage === item.href.replace('.html', '');
                            return (
                                <li key={item.name}>
                                    <a href={item.href} className={`flex items-center p-3 rounded-xl transition-all duration-200 group focus-ring ${active ? 'bg-indigo-500/10 text-white' : 'text-gray-400 hover:bg-gray-800/40 hover:text-white'}`} aria-current={active ? 'page' : undefined}>
                                        <div className={`${active ? 'text-indigo-400' : 'group-hover:text-indigo-400'} transition-colors duration-200`}>
                                            <SvgIcon path={item.icon} extraPaths={item.name === 'Settings' ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /> : null} />
                                        </div>
                                        <span className={`ml-4 font-medium hidden lg:block ${active ? 'text-white' : ''}`}>{item.name}</span>
                                    </a>
                                </li>
                            )
                        })}
                    </ul>
                </nav>
            );
        };

        const Layout = ({ currentPage, children }) => (
            <div className="flex min-h-screen">
                <NavigationSidebar currentPage={currentPage} />
                <main className={`flex-1 flex justify-center ml-20 lg:ml-64 w-full`}>
                    <div className="w-full max-w-6xl px-4 lg:px-8 py-8">
                        {children}
                    </div>
                </main>
            </div>
        );

        const Explore = () => {
            const categories = ['Digital Art', 'Photography', 'Typography', '3D', 'Motion', 'Branding'];
            const [activeCategory, setActiveCategory] = React.useState('All');

            const discoverItems = [
                { id: 1, title: 'Neon Nights', author: 'Jax', likes: 210, img: 'https://images.unsplash.com/photo-1550684376-efcbd6e3f031?q=80&w=600&auto=format&fit=crop', category: 'Photography' },
                { id: 2, title: 'Abstract Flow', author: 'Maya', likes: 185, img: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=600&auto=format&fit=crop', category: 'Digital Art' },
                { id: 3, title: 'Type Study Vol 4', author: 'Leo D.', likes: 340, img: 'https://images.unsplash.com/photo-1614729939124-032f0b56c9ce?q=80&w=600&auto=format&fit=crop', category: 'Typography' },
                { id: 4, title: 'Voxel City', author: 'Kael', likes: 512, img: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop', category: '3D' },
                { id: 5, title: 'Brand Identity', author: 'Studio X', likes: 120, img: 'https://images.unsplash.com/photo-1600093463592-8e36ae95ef56?q=80&w=600&auto=format&fit=crop', category: 'Branding' },
                { id: 6, title: 'Liquid Chrome', author: 'Zoe', likes: 89, img: 'https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=600&auto=format&fit=crop', category: 'Motion' },
                { id: 7, title: 'Geometric Echo', author: 'Aris', likes: 450, img: 'https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?q=80&w=600&auto=format&fit=crop', category: 'Digital Art' },
                { id: 8, title: 'Film Stills', author: 'Ria', likes: 310, img: 'https://images.unsplash.com/photo-1516961642265-531546e84af2?q=80&w=600&auto=format&fit=crop', category: 'Photography' }
            ];

            return (
                <Layout currentPage="explore">
                    <header className="mb-8">
                        <h1 className="text-3xl font-bold text-white mb-6">Explore</h1>

                        <div className="relative mb-8 max-w-2xl">
                            <label htmlFor="search-explore" className="sr-only">Search projects, creators, or medium</label>
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <SvgIcon path="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" className="w-5 h-5 text-gray-500" />
                            </div>
                            <input
                                type="text"
                                id="search-explore"
                                className="block w-full pl-11 pr-4 py-3 bg-[#15171e] border border-gray-800 rounded-xl text-gray-200 placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors focus-ring outline-none"
                                placeholder="Search by tags, creators, or keywords..."
                            />
                        </div>

                        <div className="flex overflow-x-auto pb-2 -mx-4 px-4 lg:mx-0 lg:px-0 space-x-2" role="tablist" aria-label="Explore Categories">
                            <button
                                role="tab"
                                aria-selected={activeCategory === 'All'}
                                onClick={() => setActiveCategory('All')}
                                className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium transition-colors focus-ring ${activeCategory === 'All' ? 'bg-white text-black' : 'bg-[#15171e] text-gray-300 hover:bg-gray-800 border border-gray-800'}`}
                            >
                                All
                            </button>
                            {categories.map(cat => (
                                <button
                                    key={cat}
                                    role="tab"
                                    aria-selected={activeCategory === cat}
                                    onClick={() => setActiveCategory(cat)}
                                    className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium transition-colors focus-ring ${activeCategory === cat ? 'bg-white text-black' : 'bg-[#15171e] text-gray-300 hover:bg-gray-800 border border-gray-800'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </header>

                    <section aria-labelledby="discovery-heading">
                        <h2 id="discovery-heading" className="sr-only">Discovery Grid</h2>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {discoverItems.filter(item => activeCategory === 'All' || item.category === activeCategory).map(item => (
                                <div key={item.id} className="group relative rounded-2xl overflow-hidden aspect-[4/5] bg-gray-900 focus-within:ring-2 focus-within:ring-indigo-500 transition-transform hover:-translate-y-1">
                                    <img src={item.img} alt={`Work titled ${item.title} by ${item.author}`} className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />

                                    {/* Hover overlay */}
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-5">
                                        <h3 className="text-white font-bold text-lg leading-tight">{item.title}</h3>
                                        <div className="flex items-center justify-between mt-2">
                                            <p className="text-gray-300 text-sm font-medium">{item.author}</p>
                                            <div className="flex items-center text-white gap-1 bg-white/20 backdrop-blur-md px-2 py-1 rounded-full">
                                                <SvgIcon path="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" className="w-3.5 h-3.5 fill-current" />
                                                <span className="text-xs font-bold">{item.likes}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <a href="#" aria-label={`View details for ${item.title} by ${item.author}`} className="absolute inset-0 z-10 focus:outline-none"></a>
                                </div>
                            ))}
                        </div>
                    </section>
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Explore />);
    </script>
</body>

</html>
