                        <nav className="hidden md:flex items-center space-x-8">
                            <a href="services.html" className="text-brand-700 font-medium transition-colors border-b-2 border-brand-700 py-7">Services</a>
                            <a href="about.html" className="text-slate-600 hover:text-brand-700 font-medium transition-colors">About</a>
                            <a href="contact.html" className="text-slate-600 hover:text-brand-700 font-medium transition-colors">Contact</a>

                                    <i data-lucide="mountain" className="w-5 h-5"></i>

                                <li><a href="service-benefits.html" className="hover:text-white hover:underline transition-colors">Benefits & Assistance</a></li>

                        <div>
                            <h3 className="text-white font-semibold mb-4 text-sm uppercase tracking-wider">Government</h3>
                            <ul className="space-y-3 text-sm">
                                <li><a href="about.html" className="hover:text-white hover:underline transition-colors">About the Governor</a></li>
                                <li><a href="#" className="hover:text-white hover:underline transition-colors">State Agencies</a></li>
                                <li><a href="#" className="hover:text-white hover:underline transition-colors">Elected Officials</a></li>
                                <li><a href="#" className="hover:text-white hover:underline transition-colors">Transparency Reports</a></li>
                            </ul>
                        </div>
                        <div>
                            <h3 className="text-white font-semibold mb-4 text-sm uppercase tracking-wider">Support</h3>
                            <ul className="space-y-3 text-sm">
                                <li><a href="contact.html" className="hover:text-white hover:underline transition-colors">Contact Us</a></li>

                                <li><a href="#" className="hover:text-white hover:underline transition-colors">Terms of Service</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </footer>
        );

        // --- Screener Component ---
        const BenefitScreener = () => {

            // Re-render icons on view change
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [view]);

            return (

                    <div className="mb-8 border-b border-slate-200 pb-6">

                            <ol className="inline-flex items-center space-x-1 md:space-x-3">

                                </div>

                                    <div>
                                        <h3 className="text-xl font-bold text-slate-900 mb-5 pb-2 border-b border-slate-100 flex items-center">
                                            <span className="w-7 h-7 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center text-sm mr-3">1</span>
                                            Household Information
                                        </h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pl-10">
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-2">Household Size</label>
                                                <div className="relative">
                                                    <select className="w-full border-slate-300 rounded-lg focus:ring-brand-500 focus:border-brand-500 py-3.5 pl-4 pr-10 bg-slate-50 font-medium text-slate-900 appearance-none shadow-sm hover:border-brand-300 transition-colors cursor-pointer">

                                                        <option>2 People</option>

                                                        <option>4 People</option>
                                                        <option>5+ People</option>
                                                    </select>
                                                    <i data-lucide="chevron-down" className="w-5 h-5 absolute right-4 top-3.5 text-slate-400 pointer-events-none"></i>
                                                </div>
                                                <p className="text-xs text-slate-500 mt-2 font-medium">Include yourself, spouse, and dependents living with you.</p>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-700 mb-2">Children under 18</label>

                                                        <option>0</option>
                                                        <option selected>1</option>
                                                        <option>2</option>
                                                        <option>3+</option>
                                                    </select>
                                                    <i data-lucide="chevron-down" className="w-5 h-5 absolute right-4 top-3.5 text-slate-400 pointer-events-none"></i>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div>

                                        </div>
                                        <div className="p-6 md:p-8 md:w-3/4 flex flex-col justify-between">
                                            <div>
                                                <h4 className="text-xl font-bold text-slate-900 mb-2">Supplemental Nutrition Assistance</h4>

                                                <div className="flex flex-wrap gap-3 mb-6">
                                                    <span className="bg-amber-50 text-amber-800 text-sm font-bold px-4 py-1.5 rounded-full uppercase tracking-wider border border-amber-200 shadow-sm">Est: $450/month</span>

                                                </div>
                                            </div>
                                            <div className="flex justify-end pt-4 border-t border-slate-100">
                                                <button className="bg-brand-600 hover:bg-brand-700 text-white px-8 py-3 rounded-lg font-bold transition-transform hover:scale-105 shadow-md flex items-center">
                                                    Start Application <i data-lucide="arrow-right" className="ml-2 w-5 h-5"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow bg-white flex flex-col md:flex-row group">
                                        <div className="bg-blue-100 p-6 md:w-1/4 flex flex-col items-center justify-center text-blue-800 border-b md:border-b-0 md:border-r border-slate-200 transition-colors">
                                            <div className="bg-blue-200/50 p-4 rounded-full mb-3">
                                                <i data-lucide="stethoscope" className="w-10 h-10"></i>
                                            </div>
                                            <span className="font-extrabold text-xl tracking-tight">Medicaid</span>
                                        </div>
                                        <div className="p-6 md:p-8 md:w-3/4 flex flex-col justify-between">
                                            <div>
                                                <h4 className="text-xl font-bold text-slate-900 mb-2">Health Coverage Assistance</h4>
                                                <p className="text-slate-600 mb-5 leading-relaxed text-lg">Free or low-cost health coverage for eligible children, adults, seniors, and people with disabilities.</p>

                                                </div>
                                            </div>
                                            <div className="flex justify-end pt-4 border-t border-slate-100">
                                                <button className="bg-brand-600 hover:bg-brand-700 text-white px-8 py-3 rounded-lg font-bold transition-transform hover:scale-105 shadow-md flex items-center">

                                        <div className="bg-rose-100 p-6 md:w-1/4 flex flex-col items-center justify-center text-rose-800 border-b md:border-b-0 md:border-r border-slate-200 transition-colors">
                                            <div className="bg-rose-200/50 p-4 rounded-full mb-3">
                                                <i data-lucide="flame" className="w-10 h-10 text-rose-600"></i>
                                            </div>
                                            <span className="font-extrabold text-xl tracking-tight text-center">Heating Asst.</span>
                                        </div>
                                        <div className="p-6 md:p-8 md:w-3/4 flex flex-col justify-between">
                                            <div>
                                                <h4 className="text-xl font-bold text-slate-900 mb-2">Home Energy Assistance Program</h4>
                                                <p className="text-slate-600 mb-5 leading-relaxed text-lg">Helps low-income households pay their heating and cooling bills, or weatherize their homes.</p>
                                                <div className="flex flex-wrap gap-3 mb-6">
                                                    <span className="bg-rose-50 text-rose-800 text-sm font-bold px-4 py-1.5 rounded-full uppercase tracking-wider border border-rose-200 shadow-sm">Seasonal Help</span>
                                                </div>
                                            </div>
                                            <div className="flex justify-end pt-4 border-t border-slate-100">
                                                <button className="bg-brand-600 hover:bg-brand-700 text-white px-8 py-3 rounded-lg font-bold transition-transform hover:scale-105 shadow-md flex items-center">
                                                    Start Application <i data-lucide="arrow-right" className="ml-2 w-5 h-5"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-8 text-center pt-6 border-t border-slate-200">
                                    <button onClick={() => setView('form')} className="text-brand-700 font-bold hover:text-brand-800 bg-brand-50 hover:bg-brand-100 px-6 py-3 rounded-lg transition-colors inline-flex items-center">
                                        <i data-lucide="edit-2" className="mr-2 w-4 h-4"></i> Edit my information
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            React.useEffect(() => {
                lucide.createIcons();
            });

            return (
                <div className="flex flex-col min-h-screen font-sans">
                    <TrustBanner />
                    <Header />
                    <main className="flex-grow bg-slate-50">
                        <BenefitScreener />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
