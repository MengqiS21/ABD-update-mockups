<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - State of Vermont</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e293b', 900: '#0f172a' },
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // --- Shared Components ---
        const TrustBanner = () => (
            <div className="bg-slate-100 text-slate-600 text-xs py-2 px-4 border-b border-slate-200">
                <div className="max-w-7xl mx-auto flex items-center justify-between">
                    <div className="flex items-center space-x-2">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/4/49/Flag_of_Vermont.svg" alt="Vermont Flag" className="h-4 w-6 object-cover border border-slate-300" />
                        <span>An official website of the State of Vermont</span>
                    </div>
                </div>
            </div>
        );

        const Header = () => (
            <header className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-20">
                        {/* Logo */}
                        <div className="flex items-center">
                            <a href="index.html" className="flex items-center space-x-3 group">
                                <div className="w-10 h-10 bg-brand-700 rounded-full flex items-center justify-center text-white font-bold text-xl group-hover:bg-brand-800 transition-colors">
                                    <i data-lucide="mountain"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold text-slate-900 leading-tight group-hover:text-brand-700 transition-colors">Vermont</h1>
                                    <p className="text-xs text-slate-500 font-medium tracking-wide uppercase">Resident Services Portal</p>
                                </div>
                            </a>
                        </div>

                        {/* Desktop Nav */}
                        <nav className="hidden md:flex items-center space-x-8">
                            <a href="services.html" className="text-brand-700 font-medium transition-colors border-b-2 border-brand-700 py-7">Services</a>
                            <a href="about.html" className="text-slate-600 hover:text-brand-700 font-medium transition-colors">About</a>
                            <a href="contact.html" className="text-slate-600 hover:text-brand-700 font-medium transition-colors">Contact</a>

                            <div className="flex items-center border-l border-slate-200 pl-6 space-x-4">
                                <select className="text-sm border border-slate-300 rounded-md text-slate-600 py-1.5 pl-3 pr-8 focus:ring-brand-500 focus:border-brand-500 bg-white">
                                    <option>English</option>
                                    <option>Español</option>
                                    <option>Français</option>
                                </select>
                                <button className="text-slate-500 hover:text-brand-700 p-2 transition-colors">
                                    <i data-lucide="search" className="w-5 h-5"></i>
                                </button>
                                <button className="bg-brand-700 hover:bg-brand-800 text-white px-4 py-2 rounded-md font-medium text-sm transition-colors shadow-sm">
                                    Sign In
                                </button>
                            </div>
                        </nav>

                        {/* Mobile Menu Button */}
                        <div className="md:hidden flex items-center">
                            <button className="text-slate-500 hover:text-slate-700 p-2">
                                <i data-lucide="menu" className="w-6 h-6"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="bg-slate-900 text-slate-300 py-12 border-t-4 border-brand-600">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                        <div>
                            <div className="flex items-center space-x-3 mb-6">
                                <div className="w-8 h-8 bg-brand-600 rounded-full flex items-center justify-center text-white">
                                    <i data-lucide="mountain" className="w-5 h-5"></i>
                                </div>
                                <span className="text-lg font-bold text-white">State of Vermont</span>
                            </div>
                            <p className="text-sm text-slate-400">
                                Official resident services portal providing access to licensing, health, education, and benefits.
                            </p>
                        </div>
                        <div>
                            <h3 className="text-white font-semibold mb-4 text-sm uppercase tracking-wider">Services</h3>
                            <ul className="space-y-3 text-sm">
                                <li><a href="service-driver-license.html" className="hover:text-white hover:underline transition-colors">Driver's License & ID</a></li>
                                <li><a href="service-benefits.html" className="hover:text-white hover:underline transition-colors">Benefits & Assistance</a></li>
                                <li><a href="#" className="hover:text-white hover:underline transition-colors">Taxes & Finance</a></li>
                                <li><a href="#" className="hover:text-white hover:underline transition-colors">Business & Employment</a></li>
                            </ul>
                        </div>
                        <div>
                            <h3 className="text-white font-semibold mb-4 text-sm uppercase tracking-wider">Government</h3>
                            <ul className="space-y-3 text-sm">
                                <li><a href="about.html" className="hover:text-white hover:underline transition-colors">About the Governor</a></li>
                                <li><a href="#" className="hover:text-white hover:underline transition-colors">State Agencies</a></li>
                                <li><a href="#" className="hover:text-white hover:underline transition-colors">Elected Officials</a></li>
                                <li><a href="#" className="hover:text-white hover:underline transition-colors">Transparency Reports</a></li>
                            </ul>
                        </div>
                        <div>
                            <h3 className="text-white font-semibold mb-4 text-sm uppercase tracking-wider">Support</h3>
                            <ul className="space-y-3 text-sm">
                                <li><a href="contact.html" className="hover:text-white hover:underline transition-colors">Contact Us</a></li>
                                <li><a href="#" className="hover:text-white hover:underline transition-colors">Accessibility</a></li>
                                <li><a href="#" className="hover:text-white hover:underline transition-colors">Privacy Policy</a></li>
                                <li><a href="#" className="hover:text-white hover:underline transition-colors">Terms of Service</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </footer>
        );

        // --- Page Components ---
        const PageHeader = () => (
            <div className="bg-slate-900 border-b border-brand-700 py-12 px-4 sm:px-6 lg:px-8">
                <div className="max-w-7xl mx-auto">
                    <div className="mb-4">
                        <nav className="flex text-sm text-slate-400" aria-label="Breadcrumb">
                            <ol className="inline-flex items-center space-x-1 md:space-x-3">
                                <li className="inline-flex items-center">
                                    <a href="index.html" className="inline-flex items-center hover:text-white transition-colors">
                                        <i data-lucide="home" className="w-4 h-4 mr-2"></i>
                                        Home
                                    </a>
                                </li>
                                <li>
                                    <div className="flex items-center">
                                        <i data-lucide="chevron-right" className="w-4 h-4 mx-1"></i>
                                        <span className="text-white ml-1 md:ml-2 font-medium">Services</span>
                                    </div>
                                </li>
                            </ol>
                        </nav>
                    </div>
                    <h2 className="text-3xl md:text-4xl font-bold text-white mb-4">Resident Services</h2>
                    <p className="text-xl text-slate-300 max-w-3xl">Find the information, resources, and online services you need, organized by life events and categories.</p>
                </div>
            </div>
        );

        const ServicesList = () => {
            const categories = [
                {
                    title: "New Residents",
                    icon: "map-pin",
                    desc: "Everything you need to get settled in Vermont.",
                    services: [
                        { name: "Transfer Out-of-State License", time: "~15 mins online", url: "service-driver-license.html" },
                        { name: "Register to Vote", time: "~5 mins online", url: "#" },
                        { name: "Change of Address", time: "~10 mins online", url: "#" }
                    ]
                },
                {
                    title: "Families & Children",
                    icon: "users",
                    desc: "Support and resources for growing families.",
                    services: [
                        { name: "Apply for WIC Benefits", time: "Check eligibility", url: "service-benefits.html" },
                        { name: "Find Child Care", time: "Search directory", url: "#" },
                        { name: "Child Support Services", time: "Manage account", url: "#" }
                    ]
                },
                {
                    title: "Students & Education",
                    icon: "graduation-cap",
                    desc: "Resources for students from Pre-K to College.",
                    services: [
                        { name: "Apply for State Grants", time: "~20 mins online", url: "#" },
                        { name: "School Report Cards", time: "View reports", url: "#" },
                        { name: "529 Savings Plan", time: "Manage account", url: "#" }
                    ]
                },
                {
                    title: "Seniors & Aging",
                    icon: "heart",
                    desc: "Programs and assistance for older adults.",
                    services: [
                        { name: "Medicare Assistance", time: "Schedule call", url: "#" },
                        { name: "Meals on Wheels", time: "Apply online", url: "service-benefits.html" },
                        { name: "Property Tax Relief", time: "~15 mins online", url: "#" }
                    ]
                },
                {
                    title: "Businesses",
                    icon: "briefcase",
                    desc: "Everything you need to start and run a business.",
                    services: [
                        { name: "Register a Business", time: "~25 mins online", url: "#" },
                        { name: "File Business Taxes", time: "Pay online", url: "#" },
                        { name: "Apply for Permits", time: "Application portal", url: "#" }
                    ]
                },
                {
                    title: "Vehicles & Transportation",
                    icon: "car",
                    desc: "Driving, roads, and vehicle registration.",
                    services: [
                        { name: "Renew Driver's License", time: "~10 mins online", url: "service-driver-license.html" },
                        { name: "Vehicle Registration", time: "~15 mins online", url: "#" },
                        { name: "Pay Traffic Ticket", time: "~5 mins online", url: "#" }
                    ]
                }
            ];

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {categories.map((category, i) => (
                            <div key={i} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow">
                                <div className="p-6 border-b border-slate-100 flex items-start space-x-4 bg-slate-50">
                                    <div className="w-12 h-12 bg-white border border-brand-100 text-brand-700 rounded-xl shadow-sm flex items-center justify-center flex-shrink-0">
                                        <i data-lucide={category.icon} className="w-6 h-6"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-xl font-bold text-slate-900">{category.title}</h3>
                                        <p className="text-slate-600 text-sm mt-1">{category.desc}</p>
                                    </div>
                                </div>
                                <ul className="divide-y divide-slate-100">
                                    {category.services.map((service, j) => (
                                        <li key={j}>
                                            <a href={service.url} className="flex justify-between items-center px-6 py-4 hover:bg-slate-50 transition-colors group">
                                                <span className="font-medium text-slate-800 group-hover:text-brand-700 transition-colors">{service.name}</span>
                                                <div className="flex items-center text-sm text-slate-500 font-medium whitespace-nowrap">
                                                    <i data-lucide="clock" className="w-4 h-4 mr-1.5 opacity-70"></i>
                                                    <span className="hidden sm:inline">{service.time}</span>
                                                    <i data-lucide="chevron-right" className="w-4 h-4 ml-3 text-slate-300 group-hover:text-brand-500 transition-colors"></i>
                                                </div>
                                            </a>
                                        </li>
                                    ))}
                                </ul>
                                <div className="px-6 py-4 bg-slate-50 border-t border-slate-100">
                                    <a href="#" className="text-sm font-medium text-brand-700 hover:text-brand-800 flex items-center">
                                        View all {category.title.toLowerCase()} services
                                        <i data-lucide="arrow-right" className="w-4 h-4 ml-1"></i>
                                    </a>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            // Initialize Lucide icons after rendering
            React.useEffect(() => {
                lucide.createIcons();
            });

            return (
                <div className="flex flex-col min-h-screen font-sans">
                    <TrustBanner />
                    <Header />
                    <main className="flex-grow bg-slate-50">
                        <PageHeader />
                        <ServicesList />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
