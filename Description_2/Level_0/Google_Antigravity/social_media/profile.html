                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5">
                            {portfolio.map(item => (
                                <div key={item.id} className="relative rounded-xl overflow-hidden group cursor-pointer aspect-square bg-dark-card border border-dark-border hover:border-folia-500/30 transition-colors">
                                    <img src={`${item.img}?auto=format&fit=crop&w=600&q=80`} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="Portfolio item" />
                                    
                                    <div className="absolute inset-0 bg-dark-bg/50 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-all duration-300 flex items-center justify-center border-2 border-transparent group-hover:border-folia-500/50 rounded-xl">
                                        <div className="flex gap-6 text-white transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
                                            <div className="flex flex-col items-center">
                                                <div className="w-10 h-10 rounded-full bg-black/40 flex items-center justify-center mb-1.5 backdrop-blur-md">
                                                    <Icons.Search className="w-5 h-5" />
                                                </div>
                                                <span className="text-xs font-bold drop-shadow-md">{item.views}</span>
                                            </div>
                                            <div className="flex flex-col items-center">
                                                <div className="w-10 h-10 rounded-full bg-folia-600 flex items-center justify-center mb-1.5 shadow-lg shadow-folia-600/30">
                                                    <Icons.Heart className="w-5 h-5 fill-white" />
                                                </div>
                                                <span className="text-xs font-bold drop-shadow-md">{item.likes}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };
        
        root.render(<Root />);
    </script>
</body>

</html>
