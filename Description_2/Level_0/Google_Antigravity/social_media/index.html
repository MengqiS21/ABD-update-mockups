<!DOCTYPE html>
<html lang="en" class="dark">

<head>

    <title>Folia | Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        folia: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .glass-effect {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }

</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Shared Icons Component

            MoreHorizontal: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1" /><circle cx="19" cy="12" r="1" /><circle cx="5" cy="12" r="1" /></svg>,
            Search: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></svg>,
            PenTool: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19 7-7 3 3-7 7-3-3z" /><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" /><path d="m2 2 7.58 7.58" /></svg>,

        };

                { id: 'feed', label: 'Feed', icon: Icons.Home, href: 'index.html' },
                { id: 'explore', label: 'Explore', icon: Icons.Explore, href: 'explore.html' },
                { id: 'notifications', label: 'Notifications', icon: Icons.Bell, href: 'notifications.html' },
                { id: 'messages', label: 'Messages', icon: Icons.Mail, href: 'messages.html' },
                { id: 'profile', label: 'Profile', icon: Icons.User, href: 'profile.html' },
                { id: 'settings', label: 'Settings', icon: Icons.Settings, href: 'settings.html' },
            ];

            return (
                <div className="min-h-screen flex flex-col md:flex-row max-w-7xl mx-auto">
                    {/* Mobile Top Bar */}
                    <div className="md:hidden glass-effect sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-2 text-folia-500 font-bold text-xl">
                            <Icons.Sparkles className="w-6 h-6" /> Folia
                        </div>
                        <img src="https://i.pravatar.cc/150?img=43" alt="Avatar" className="w-8 h-8 rounded-full border border-dark-border" />
                    </div>

                    {/* Desktop Sidebar */}
                    <aside className="hidden md:flex flex-col w-64 border-r border-dark-border p-4 sticky top-0 h-screen overflow-y-auto">
                        <div className="flex items-center gap-2 text-folia-500 font-bold text-2xl px-4 py-6 mb-4">
                            <Icons.Sparkles className="w-7 h-7" /> Folia
                        </div>

                        <nav className="flex-1 space-y-2">
                            {navItems.map(item => (
                                <a key={item.id} href={item.href}
                                    className={`flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 group
                                   ${activePage === item.id
                                            ? 'bg-folia-600/10 text-folia-500 font-medium'
                                            : 'text-slate-400 hover:bg-dark-card hover:text-slate-200'}`}>
                                    <item.icon className={`w-6 h-6 ${activePage === item.id ? 'fill-folia-500/20' : 'group-hover:scale-110 transition-transform'}`} />
                                    <span className="text-lg">{item.label}</span>
                                </a>
                            ))}
                        </nav>

                        <button className="mt-auto mb-4 bg-folia-600 hover:bg-folia-500 text-white font-medium py-3 px-4 rounded-xl shadow-lg shadow-folia-600/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                            <Icons.PenTool className="w-5 h-5" /> Post Project
                        </button>

                        <div className="flex items-center gap-3 px-4 py-3 mt-4 border-t border-dark-border cursor-pointer hover:bg-dark-card rounded-xl transition-colors">
                            <img src="https://i.pravatar.cc/150?img=43" alt="Avatar" className="w-10 h-10 rounded-full bg-dark-card" />
                            <div className="flex-1 min-w-0">
                                <p className="text-sm font-medium text-slate-200 truncate">Alex Rivera</p>
                                <p className="text-xs text-slate-500 truncate">@arivera_design</p>
                            </div>
                            <Icons.MoreHorizontal className="w-5 h-5 text-slate-500" />
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 min-w-0 border-r border-dark-border md:w-[600px] lg:w-[700px]">
                        {children}
                    </main>

                    {/* Right Sidebar (Desktop) */}
                    <aside className="hidden lg:block w-80 p-6 sticky top-0 h-screen overflow-y-auto hide-scrollbar">
                        <div className="relative mb-6">
                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <Icons.Search className="w-5 h-5 text-slate-500" />
                            </div>
                            <input type="text" placeholder="Search creatives, tags..."
                                className="w-full bg-dark-card border border-dark-border rounded-full py-2.5 pl-10 pr-4 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-folia-500 focus:ring-1 focus:ring-folia-500 transition-all" />
                        </div>

                        <div className="bg-dark-card rounded-2xl border border-dark-border p-4 mb-6">
                            <h3 className="font-bold text-slate-200 mb-4 whitespace-nowrap">Trending Palettes</h3>
                            <div className="grid grid-cols-5 gap-2 mb-3">
                                <div className="h-8 rounded-md bg-[#FF5C5C]"></div>
                                <div className="h-8 rounded-md bg-[#FFB84C]"></div>
                                <div className="h-8 rounded-md bg-[#F266AB]"></div>
                                <div className="h-8 rounded-md bg-[#A459D1]"></div>
                                <div className="h-8 rounded-md bg-[#2CD3E1]"></div>
                            </div>
                            <p className="text-xs text-slate-400 font-medium">Cyberpunk Sunset <span className="float-right">12.4k uses</span></p>
                        </div>

                        <div className="bg-dark-card rounded-2xl border border-dark-border p-4">
                            <h3 className="font-bold text-slate-200 mb-4">Suggested Creatives</h3>

                                { name: 'Marcus Chen', handle: '@marcus_c', role: 'Typography', img: '11' },
                                { name: 'Sarah Joy', handle: '@sjoy_photo', role: 'Photography', img: '5' }

                                    <img src={`https://i.pravatar.cc/150?img=${user.img}`} className="w-10 h-10 rounded-full" alt={user.name} />

                                        <p className="text-sm font-medium text-slate-200 truncate">{user.name}</p>
                                        <p className="text-xs text-slate-500 truncate">{user.role}</p>

                                        Follow
                                    </button>
                                </div>
                            ))}
                        </div>

                        <div className="mt-6 flex flex-wrap gap-x-3 gap-y-2 px-2 text-xs text-slate-500">
                            <a href="#" className="hover:text-slate-300">About</a>
                            <a href="#" className="hover:text-slate-300">Help Center</a>
                            <a href="#" className="hover:text-slate-300">Terms of Service</a>
                            <a href="#" className="hover:text-slate-300">Privacy Policy</a>

            const [feedType, setFeedType] = useState('foryou');
            const [postText, setPostText] = useState('');

            const posts = [
                {
                    id: 1,
                    user: { name: 'Klara Weiss', handle: '@klara_w', avatar: 'https://i.pravatar.cc/150?img=1' },
                    time: '2h',
                    content: 'Exploring some new volumetric lighting techniques in blender today. Really happy with how the atmosphere turned out! 🌫️✨',
                    tags: ['#3D', '#blender', '#lighting'],
                    image: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop',
                    stats: { appreciates: 342, comments: 28, collects: 89 }
                },
                {
                    id: 2,
                    user: { name: 'Julian Ford', handle: '@jford_design', avatar: 'https://i.pravatar.cc/150?img=8' },
                    time: '5h',
                    content: 'Brand identity concept for a boutique coffee roaster. Went for a brutalist typography approach matched with warm earthy tones.',
                    tags: ['#branding', '#typography', '#illustrator'],
                    image: 'https://images.unsplash.com/photo-1629198688000-71f23e745b6e?q=80&w=2680&auto=format&fit=crop',
                    stats: { appreciates: 821, comments: 64, collects: 215 }
                },
                {
                    id: 3,
                    user: { name: 'Maya Lin', handle: '@maya_pixels', avatar: 'https://i.pravatar.cc/150?img=5' },
                    time: '12h',
                    content: 'WIP on the new character concepts. Trying to find the right balance between tech-wear and fantasy elements.',
                    tags: ['#illustration', '#procreate', '#conceptart'],
                    image: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=2845&auto=format&fit=crop',
                    stats: { appreciates: 1205, comments: 142, collects: 430 }
                }
            ];

            return (
                <div className="pb-20 md:pb-0">
                    {/* Header with Toggles */}
                    <div className="glass-effect sticky top-0 z-40 px-4 py-3 flex items-center justify-between lg:justify-center border-b border-dark-border">
                        <div className="flex bg-dark-bg rounded-lg p-1 border border-dark-border">
                            <button
                                onClick={() => setFeedType('foryou')}
                                className={`px-6 py-1.5 text-sm font-medium rounded-md transition-all ${feedType === 'foryou'
                                        ? 'bg-dark-card text-slate-100 shadow-sm'
                                        : 'text-slate-400 hover:text-slate-200 hover:bg-dark-card/50'
                                    }`}
                            >
                                For You
                            </button>
                            <button
                                onClick={() => setFeedType('following')}
                                className={`px-6 py-1.5 text-sm font-medium rounded-md transition-all ${feedType === 'following'
                                        ? 'bg-dark-card text-slate-100 shadow-sm'
                                        : 'text-slate-400 hover:text-slate-200 hover:bg-dark-card/50'
                                    }`}
                            >
                                Following
                            </button>
                        </div>
                    </div>

                    {/* Composer */}
                    <div className="p-4 border-b border-dark-border bg-dark-bg/50">
                        <div className="flex gap-4">
                            <img src="https://i.pravatar.cc/150?img=43" className="w-10 h-10 rounded-full flex-shrink-0" alt="Avatar" />
                            <div className="flex-1">
                                <textarea
                                    className="w-full bg-transparent border-none focus:ring-0 resize-none text-lg text-slate-200 placeholder-slate-500 font-medium min-h-[60px]"
                                    placeholder="Share your work in progress..."
                                    value={postText}
                                    onChange={(e) => setPostText(e.target.value)}
                                ></textarea>

                                <input type="text" placeholder="Add skills: #illustration #procreate"
                                    className="w-full bg-transparent border-none text-sm text-folia-400 placeholder-slate-600 focus:ring-0 mb-3" />

                                <div className="flex items-center justify-between pt-3 border-t border-dark-border">
                                    <div className="flex items-center gap-2 text-folia-500">
                                        <button className="p-2 rounded-full hover:bg-folia-500/10 transition-colors">
                                            <Icons.Image className="w-5 h-5" />
                                        </button>
                                        <button className="p-2 rounded-full hover:bg-folia-500/10 transition-colors">
                                            <Icons.PenTool className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <button
                                        className={`px-5 py-1.5 rounded-full font-medium shadow-lg transition-all ${postText.trim().length > 0
                                                ? 'bg-folia-600 text-white hover:bg-folia-500 shadow-folia-600/20'
                                                : 'bg-dark-card text-slate-400 cursor-not-allowed border border-dark-border'
                                            }`}
                                    >
                                        Post
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Feed Posts */}
                    <div className="divide-y divide-dark-border">
                        {posts.map(post => (
                            <article key={post.id} className="p-4 md:p-5 hover:bg-dark-card/30 transition-colors cursor-pointer group">
                                <div className="flex items-start gap-3 mb-3">
                                    <img src={post.user.avatar} className="w-10 h-10 rounded-full object-cover" alt={post.user.name} />
                                    <div className="flex-1 min-w-0">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-2">
                                                <h3 className="font-bold text-slate-200 truncate hover:underline">{post.user.name}</h3>
                                                <span className="text-slate-500 text-sm">{post.user.handle}</span>
                                                <span className="text-slate-600 text-sm">·</span>
                                                <span className="text-slate-500 text-sm hover:underline">{post.time}</span>
                                            </div>
                                            <button className="text-slate-500 hover:text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity p-2 -mr-2 rounded-full hover:bg-dark-border">
                                                <Icons.MoreHorizontal className="w-4 h-4" />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div className="pl-13 ml-13 md:ml-0">
                                    <p className="text-slate-300 text-[15px] mb-3 leading-relaxed whitespace-pre-wrap">
                                        {post.content}
                                    </p>
                                    <div className="flex flex-wrap gap-2 mb-3">
                                        {post.tags.map(tag => (
                                            <span key={tag} className="text-folia-400 text-sm hover:underline cursor-pointer">{tag}</span>
                                        ))}
                                    </div>

                                    {/* Post Image Container */}
                                    <div className="rounded-2xl overflow-hidden border border-dark-border max-w-full relative bg-dark-card aspect-[4/3] group-hover:border-slate-600 transition-colors">
                                        <img src={post.image} alt="Post content" className="w-full h-full object-cover" loading="lazy" />

                                                <Icons.Heart className="w-5 h-5" />
                                            </div>
                                            <span className="text-sm font-medium">{post.stats.appreciates}</span>
                                        </button>
                                        <button className="flex items-center gap-2 group/action hover:text-blue-400 transition-colors">
                                            <div className="p-2 rounded-full group-hover/action:bg-blue-400/10 transition-colors -ml-2">
                                                <Icons.MessageCircle className="w-5 h-5" />
                                            </div>
                                            <span className="text-sm font-medium">{post.stats.comments}</span>
                                        </button>
                                        <button className="flex items-center gap-2 group/action hover:text-emerald-400 transition-colors">
                                            <div className="p-2 rounded-full group-hover/action:bg-emerald-400/10 transition-colors -ml-2">
                                                <Icons.Bookmark className="w-5 h-5" />
                                            </div>
                                            <span className="text-sm font-medium">{post.stats.collects}</span>
                                        </button>
                                        <button className="flex items-center gap-2 group/action hover:text-folia-400 transition-colors ml-auto">
                                            <div className="p-2 rounded-full group-hover/action:bg-folia-400/10 transition-colors -mr-2">
                                                <Icons.Share className="w-5 h-5" />
                                            </div>
                                        </button>
                                    </div>
                                </div>
                            </article>
                        ))}
                    </div>
                </div>
            );
        };

        const Root = () => {
            return (
                <AppLayout activePage="feed">
                    <FeedPage />
                </AppLayout>
            );
        };

        const rootElt = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElt);
        root.render(<Root />);
    </script>
</body>

</html>
