                                            <a href="product.html" className="block relative aspect-[3/4] bg-gray-100 rounded-md overflow-hidden mb-4">
                                                <img src={item.image} alt={item.name} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />
                                                <div className="absolute inset-x-0 bottom-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button className="w-full bg-white/95 text-black py-2.5 text-xs font-semibold rounded hover:bg-black hover:text-white transition-colors">Quick Add</button>
                                                </div>
                                            </a>
                                            <div className="text-center">
                                                <h3 className="text-sm font-medium text-gray-900 group-hover:text-gray-500 transition-colors"><a href="product.html">{item.name}</a></h3>
                                                <p className="mt-1 text-sm text-gray-500 font-medium">{item.price}</p>
                                            </div>
                                        </div>
                                    ))}
                                    <div className="flex flex-col items-center justify-center p-8 bg-gray-50 border border-gray-200 rounded-md text-center h-auto aspect-[3/4] hover:bg-gray-100 transition-colors cursor-pointer group">
                                        <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center mb-4 shadow-sm group-hover:scale-110 transition-transform">
                                            <SearchIcon size={20} className="text-gray-400" />
                                        </div>
                                        <h3 className="font-bold text-gray-900 mb-2">Shop The Collection</h3>
                                        <p className="text-sm text-gray-500 mb-6">Discover more items that elevate your style.</p>
                                        <a href="products.html" className="text-sm font-semibold border-b border-black pb-0.5">View All</a>
                                    </div>
                                </div>
                            </div>

                            {/* User Photo Reviews */}
                            <div className="mt-24 pt-16 border-t border-gray-200">
                                <div className="flex justify-between items-end mb-10">
                                    <div>
                                        <h2 className="text-2xl font-bold font-display mb-2">Customer Photos & Reviews</h2>
                                        <div className="flex items-center">
                                            <div className="flex text-amber-400 mr-2">
                                                <StarIcon size={16} fill="currentColor" />
                                                <StarIcon size={16} fill="currentColor" />
                                                <StarIcon size={16} fill="currentColor" />
                                                <StarIcon size={16} fill="currentColor" />
                                                <StarIcon size={16} fill="currentColor" className="text-gray-300" />
                                            </div>
                                            <span className="text-sm font-medium text-gray-900">4.2 / 5.0 <span className="text-gray-400 font-normal ml-1">Based on 24 reviews</span></span>
                                        </div>
                                    </div>
                                    <button className="bg-white border text-sm font-medium border-gray-300 px-6 py-2.5 rounded hover:border-black transition-colors">Write a Review</button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {[
                                        { name: "Sarah M.", fit: "True to size", body: "Absolutely love the fit and feel of this shirt. The sage green is exactly as pictured. I wear it to the office and on weekends.", image: "https://images.unsplash.com/photo-1549422079-05d8fcd67bdc?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" },
                                        { name: "Elena P.", fit: "Runs large", body: "It's definitely oversized as described. I sized down to a Small and it fits perfect. The linen quality is fantastic for the price point.", image: "https://images.unsplash.com/photo-1510467554522-6b95c3bbbf92?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" },
                                        { name: "Jessica T.", fit: "True to size", body: "My new staple button down! Taking it on vacation next week. Doesn't wrinkle quite as bad as other linen shirts I own.", image: null }
                                    ].map((review, rIdx) => (
                                        <div key={rIdx} className="bg-gray-50 rounded-lg p-6">
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <p className="font-bold text-gray-900">{review.name}</p>
                                                    <p className="text-xs text-gray-500 mb-2">Verified Buyer <span>•</span> Fit: {review.fit}</p>
                                                    <div className="flex text-amber-400">
                                                        <StarIcon size={12} fill="currentColor" />
                                                        <StarIcon size={12} fill="currentColor" />
                                                        <StarIcon size={12} fill="currentColor" />
                                                        <StarIcon size={12} fill="currentColor" />
                                                        <StarIcon size={12} fill="currentColor" />
                                                    </div>
                                                </div>
                                                <span className="text-xs text-gray-400">2 days ago</span>
                                            </div>
                                            <p className="text-sm text-gray-700 leading-relaxed mb-4">"{review.body}"</p>
                                            {review.image && (
                                                <div className="w-24 h-24 bg-gray-200 rounded overflow-hidden">
                                                    <img src={review.image} alt="User photo" className="w-full h-full object-cover" />
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </main>

                    <Footer />

                    {/* Size Guide Modal */}
                    <Modal isOpen={isSizeGuideOpen} onClose={() => setIsSizeGuideOpen(false)} title="Size Guide">
                        <div className="space-y-6">
                            <p className="text-sm text-gray-600">The Oversized Linen Shirt is designed for a relaxed, roomy fit. If you prefer a more tailored look, we recommend sizing down.</p>

                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-gray-50">
                                        <tr>
                                            <th className="px-4 py-3 font-semibold text-gray-900 rounded-tl">US Size</th>
                                            <th className="px-4 py-3 font-semibold text-gray-900">Chest (in)</th>
                                            <th className="px-4 py-3 font-semibold text-gray-900">Waist (in)</th>
                                            <th className="px-4 py-3 font-semibold text-gray-900 rounded-tr">Hips (in)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {[['XS', '32-34', '24-26', '34-36'],
                                        ['S', '34-36', '26-28', '36-38'],
                                        ['M', '36-38', '28-30', '38-40'],
                                        ['L', '38-41', '30-33', '40-43'],
                                        ['XL', '41-44', '33-36', '43-46'],
                                        ['XXL', '44-47', '36-40', '46-50']].map((row, i) => (
                                            <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-gray-50/50'}>
                                                <td className="px-4 py-3 font-medium text-gray-900">{row[0]}</td>
                                                <td className="px-4 py-3 text-gray-600">{row[1]}</td>
                                                <td className="px-4 py-3 text-gray-600">{row[2]}</td>
                                                <td className="px-4 py-3 text-gray-600">{row[3]}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            <div className="bg-gray-50 p-4 rounded text-sm">
                                <p className="font-semibold text-gray-900 mb-1">How to Measure</p>
                                <div className="space-y-2 mt-2 text-gray-600">
                                    <p><span className="font-medium text-gray-800">Chest:</span> Measure around the fullest part of your chest, keeping the tape horizontal.</p>
                                    <p><span className="font-medium text-gray-800">Waist:</span> Measure around your natural waistline, keeping the tape comfortably loose.</p>
                                    <p><span className="font-medium text-gray-800">Hips:</span> Measure around the fullest part of your hips, standing with your feet together.</p>
                                </div>
                            </div>
                        </div>
                    </Modal>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProductPage />);
    </script>
</body>

</html>
