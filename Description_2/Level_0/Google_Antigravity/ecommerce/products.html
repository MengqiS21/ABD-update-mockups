                                                    <div className="flex-1 bg-white border border-gray-300 rounded px-3 py-2 text-sm text-center font-medium">$0</div>
                                                    <span className="text-gray-400">-</span>
                                                    <div className="flex-1 bg-white border border-gray-300 rounded px-3 py-2 text-sm text-center font-medium">$300+</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </aside>

                                {/* Main Product Grid */}
                                <div className="flex-1">
                                    {styleMatchActive && (
                                        <div className="mb-8 p-6 bg-indigo-50 border border-indigo-100 rounded-lg flex items-start space-x-4">
                                            <div className="flex-shrink-0 bg-indigo-100 p-2 rounded-full">
                                                <SparklesIcon size={24} className="text-indigo-600" />
                                            </div>
                                            <div>
                                                <h4 className="text-lg font-bold text-indigo-900 mb-1">Style Match is Active</h4>
                                                <p className="text-indigo-700 text-sm">Products are now organized into curated complete outfits. Click on any item below to view the entire styled look.</p>
                                            </div>
                                        </div>
                                    )}

                                    <div className={`grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-x-6 gap-y-12 ${styleMatchActive ? 'opacity-90' : ''}`}>
                                        {MOCK_PRODUCTS.map((product) => (
                                            <div key={product.id} className="group flex flex-col cursor-pointer">
                                                <a href="product.html" className="relative aspect-[3/4] bg-gray-200 rounded-md overflow-hidden mb-4 shadow-sm">
                                                    <img
                                                        src={product.image}
                                                        alt={product.name}
                                                        className="w-full h-full object-cover object-center transition-transform duration-700 group-hover:scale-105"
                                                        loading="lazy"
                                                    />

                                                    {/* Badges */}
                                                    <div className="absolute top-3 left-3 flex flex-col gap-2">
                                                        {product.tag === 'New' && <span className="bg-white text-black text-[10px] uppercase font-bold px-2 py-1 tracking-widest rounded-sm w-max">New</span>}
                                                        {product.tag === 'Best Seller' && <span className="bg-black text-white text-[10px] uppercase font-bold px-2 py-1 tracking-widest rounded-sm w-max">Best Seller</span>}
                                                        {product.tag === 'Low Stock' && <span className="bg-red-600 text-white text-[10px] uppercase font-bold px-2 py-1 tracking-widest rounded-sm w-max">Low Stock</span>}
                                                        {product.tag === 'Sustainable' && <span className="bg-green-700 text-white text-[10px] uppercase font-bold px-2 py-1 tracking-widest rounded-sm w-max">Sustainable</span>}
                                                    </div>

                                                    {/* Quick Actions overlay */}
                                                    <div className="absolute inset-x-0 bottom-0 p-4 opacity-0 lg:group-hover:opacity-100 transition-opacity bg-gradient-to-t from-black/40 to-transparent">
                                                        <button className="w-full bg-white/95 backdrop-blur text-black py-3 text-sm font-semibold rounded hover:bg-black hover:text-white transition-colors">
                                                            Quick Add
                                                        </button>
                                                    </div>
                                                </a>
                                                <div>
                                                    <div className="flex justify-between items-start">
                                                        <h3 className="text-base font-medium text-gray-900 line-clamp-1 group-hover:underline decoration-1 underline-offset-4">
                                                            <a href="product.html">{product.name}</a>
                                                        </h3>
                                                        <span className="text-base font-medium text-gray-900 ml-4">${product.price}</span>
                                                    </div>
                                                    <p className="mt-1 text-sm text-gray-500">{product.color}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* Load More */}
                                    <div className="mt-16 text-center border-t border-gray-200 pt-16">
                                        <p className="text-sm text-gray-500 mb-6">Showing 24 of 142 products</p>
                                        <div className="w-64 h-1 bg-gray-200 rounded-full mx-auto mb-8 relative">
                                            <div className="absolute inset-y-0 left-0 bg-black rounded-full" style={{ width: '15%' }}></div>
                                        </div>
                                        <button className="bg-white border border-black text-black px-10 py-4 font-semibold text-sm rounded-full hover:bg-black hover:text-white transition-colors uppercase tracking-wider">
                                            Load More
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProductsPage />);
    </script>
</body>

</html>
