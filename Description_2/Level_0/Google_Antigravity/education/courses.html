<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillForge - Explore Programs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1E40AF', secondary: '#F59E0B', } } } }
    </script>
</head>

<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>;
        const IconClock = () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const IconCalendar = () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>;
        const IconDollar = () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;

        const Header = () => (
            <header className="bg-white border-b border-slate-200 sticky top-0 z-50">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-16">
                        <div className="flex items-center">
                            <a href="index.html" className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-blue-700 text-white rounded flex items-center justify-center font-bold text-xl">S</div>
                                <span className="font-bold text-xl text-slate-900 tracking-tight">SkillForge</span>
                            </a>
                            <nav className="hidden md:flex ml-10 space-x-8">
                                <a href="courses.html" className="text-sm font-bold text-blue-700">Explore Courses</a>
                                <a href="study-tool.html" className="text-sm font-medium text-slate-700 hover:text-blue-700">Classroom</a>
                                <a href="pricing.html" className="text-sm font-medium text-slate-700 hover:text-blue-700">Plans & Pricing</a>
                            </nav>
                        </div>
                        <div className="hidden md:flex items-center space-x-4">
                            <a href="dashboard.html" className="text-sm font-medium text-slate-700 hover:text-blue-700">Student Login</a>
                            <a href="courses.html" className="bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-blue-800 transition">Get Started</a>
                        </div>
                        <div className="flex md:hidden">
                            <button className="text-slate-500 hover:text-slate-700"><IconMenu /></button>
                        </div>
                    </div>
                </div>
            </header>
        );

        const Footer = () => (
            <footer className="bg-slate-900 text-slate-300 py-12 border-t border-slate-800 mt-auto">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-4 gap-8">
                    <div>
                        <div className="flex items-center gap-2 mb-4">
                            <div className="w-6 h-6 bg-blue-600 text-white rounded flex items-center justify-center font-bold text-sm">S</div>
                            <span className="font-bold text-lg text-white tracking-tight">SkillForge</span>
                        </div>
                        <p className="text-sm text-slate-400">Vocational and professional certification platform targeting adult learners and career-changers.</p>
                    </div>
                    <div>
                        <h3 className="font-semibold text-white mb-4">Learn</h3>
                        <ul className="space-y-2 text-sm">
                            <li><a href="courses.html" className="hover:text-blue-400">All Courses</a></li>
                            <li><a href="courses.html" className="hover:text-blue-400">Healthcare Support</a></li>
                            <li><a href="courses.html" className="hover:text-blue-400">IT & Tech</a></li>
                            <li><a href="courses.html" className="hover:text-blue-400">Business Admin</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="font-semibold text-white mb-4">Platform</h3>
                        <ul className="space-y-2 text-sm">
                            <li><a href="study-tool.html" className="hover:text-blue-400">Classroom</a></li>
                            <li><a href="pricing.html" className="hover:text-blue-400">Pricing</a></li>
                            <li><a href="#" className="hover:text-blue-400">For Employers</a></li>
                            <li><a href="#" className="hover:text-blue-400">Success Stories</a></li>
                        </ul>
                    </div>
                    <div>
                        <h3 className="font-semibold text-white mb-4">Support</h3>
                        <ul className="space-y-2 text-sm">
                            <li><a href="#" className="hover:text-blue-400">Help Center</a></li>
                            <li><a href="#" className="hover:text-blue-400">Contact Advisors</a></li>
                            <li><a href="#" className="hover:text-blue-400">Terms of Service</a></li>
                            <li><a href="#" className="hover:text-blue-400">Privacy Policy</a></li>
                        </ul>
                    </div>
                </div>
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-12 pt-8 border-t border-slate-800 text-sm text-slate-500 text-center">
                    &copy; {new Date().getFullYear()} SkillForge Learning. All rights reserved.
                </div>
            </footer>
        );

        const CourseCard = ({ tag, type, img, title, desc, duration, date, price, salary, href }) => (
            <div className="bg-white border border-slate-200 rounded-xl overflow-hidden hover:shadow-lg transition flex flex-col md:flex-row shadow-sm">
                <div className="md:w-1/3 bg-slate-100 flex-shrink-0 relative h-48 md:h-auto">
                    <img src={img} className="w-full h-full object-cover" alt={title} />
                    <div className={`absolute top-4 left-4 ${type === 'Cohort (Live)' ? 'bg-blue-100 text-blue-800 border bg-opacity-90 border-blue-200 backdrop-blur' : 'bg-purple-100 text-purple-800 border bg-opacity-90 border-purple-200 backdrop-blur'} text-xs font-bold px-2 py-1 rounded shadow-sm`}>{type}</div>
                </div>
                <div className="p-6 md:w-2/3 flex flex-col justify-between">
                    <div>
                        <div className="text-sm text-blue-600 font-bold mb-1 tracking-wide uppercase">{tag}</div>
                        <h3 className="text-xl font-bold text-slate-900 mb-2 leading-tight">{title}</h3>
                        <p className="text-slate-600 text-sm mb-5 line-clamp-2 leading-relaxed">{desc}</p>

                        <div className="flex flex-wrap gap-y-3 gap-x-5 text-sm text-slate-600 mb-6 font-medium">
                            <span className="flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded border border-slate-100"><IconClock /> {duration}</span>
                            <span className="flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded border border-slate-100"><IconCalendar /> {date}</span>
                            <span className="flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded border border-slate-100"><IconDollar /> {price}</span>
                        </div>
                    </div>
                    <div className="flex flex-col sm:flex-row justify-between items-center border-t border-slate-100 pt-5 gap-4">
                        <span className="text-sm font-semibold text-slate-700 bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full border border-emerald-100">Expected: {salary}</span>
                        <div className="flex gap-3 w-full sm:w-auto">
                            <a href={href} className="text-blue-700 border border-blue-200 hover:bg-blue-50 px-5 py-2.5 rounded-lg font-semibold text-sm text-center flex-1 sm:flex-none transition">Details</a>
                            <button className="bg-blue-700 text-white px-5 py-2.5 rounded-lg font-semibold text-sm hover:bg-blue-800 transition text-center flex-1 sm:flex-none shadow-sm">Enroll Now</button>
                        </div>
                    </div>
                </div>
            </div>
        );

        const App = () => (
            <div className="min-h-screen flex flex-col font-sans bg-slate-50 selection:bg-blue-200">
                <Header />

                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex flex-col md:flex-row gap-8 w-full">
                    {/* Sidebar Filters */}
                    <aside className="w-full md:w-64 flex-shrink-0">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 sticky top-24">
                            <h2 className="font-bold text-xl mb-6 text-slate-900 border-b border-slate-100 pb-3">Filters</h2>

                            <div className="mb-6">
                                <h3 className="font-semibold text-slate-800 mb-3 text-sm uppercase tracking-wide">Career Field</h3>
                                <div className="space-y-2.5">
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" defaultChecked className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> Healthcare Support</label>
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" defaultChecked className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> IT & Tech</label>
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> Business Admin</label>
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> Skilled Trades</label>
                                </div>
                            </div>

                            <div className="mb-6">
                                <h3 className="font-semibold text-slate-800 mb-3 text-sm uppercase tracking-wide">Format</h3>
                                <div className="space-y-2.5">
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" defaultChecked className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> Cohort (Live)</label>
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> Self-Paced</label>
                                </div>
                            </div>

                            <div className="mb-6">
                                <h3 className="font-semibold text-slate-800 mb-3 text-sm uppercase tracking-wide">Cost</h3>
                                <div className="space-y-2.5">
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> Free Options</label>
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" defaultChecked className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> Under $500</label>
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> $500+</label>
                                </div>
                            </div>

                            <div>
                                <h3 className="font-semibold text-slate-800 mb-3 text-sm uppercase tracking-wide">Credential Type</h3>
                                <div className="space-y-2.5">
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" defaultChecked className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> Certificate</label>
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> Badge</label>
                                    <label className="flex items-center gap-3 text-sm text-slate-600 hover:text-slate-900 cursor-pointer"><input type="checkbox" className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300" /> CEU</label>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                            <div>
                                <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Explore Programs</h1>
                                <p className="text-slate-500 mt-1">Found 45 matching courses</p>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-sm text-slate-500 font-medium">Sort by:</span>
                                <select className="bg-white border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 font-medium shadow-sm cursor-pointer outline-none">
                                    <option>Recommended</option>
                                    <option>Starting Soonest</option>
                                    <option>Lowest Price</option>
                                </select>
                            </div>
                        </div>

                        <div className="space-y-6">
                            <CourseCard
                                tag="Healthcare Support"
                                type="Cohort (Live)"
                                img="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                title="Medical Administrative Assistant Certificate"
                                desc="Master front office operations, appointment scheduling, basic medical billing, and exceptional patient communication in this intensive 8-week program."
                                duration="8 Weeks"
                                date="Starts March 3"
                                price="$349"
                                salary="$42k - $55k"
                                href="course-detail.html"
                            />
                            <CourseCard
                                tag="IT & Tech"
                                type="Self-Paced"
                                img="https://images.unsplash.com/photo-1551434678-e076c223a692?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                title="IT Support Specialist Certificate"
                                desc="Gain hands-on experience in troubleshooting, networking fundamentals, and operating systems. Prepares you for the CompTIA A+ certification."
                                duration="~12 Weeks"
                                date="Start Anytime"
                                price="$499"
                                salary="$45k - $60k"
                                href="course-detail.html"
                            />
                            <CourseCard
                                tag="Business Admin"
                                type="Cohort (Live)"
                                img="https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                                title="HR Compliance & Administration"
                                desc="Learn modern payroll systems, benefits administration, employee relations, and compliance with labor laws in an instructor-led environment."
                                duration="10 Weeks"
                                date="Starts April 15"
                                price="$449"
                                salary="$48k - $65k"
                                href="course-detail.html"
                            />
                        </div>

                        {/* Pagination */}
                        <div className="mt-12 flex justify-center">
                            <nav className="flex items-center gap-1">
                                <button className="px-3 py-2 text-slate-500 hover:text-slate-900 border border-transparent hover:border-slate-200 rounded font-medium disabled:opacity-50">Previous</button>
                                <button className="px-3.5 py-2 bg-blue-700 text-white rounded font-bold shadow-sm">1</button>
                                <button className="px-3.5 py-2 text-slate-700 hover:bg-slate-100 rounded font-medium">2</button>
                                <button className="px-3.5 py-2 text-slate-700 hover:bg-slate-100 rounded font-medium">3</button>
                                <span className="px-2 text-slate-400">...</span>
                                <button className="px-3.5 py-2 text-slate-700 hover:bg-slate-100 rounded font-medium">8</button>
                                <button className="px-3 py-2 text-blue-700 hover:text-blue-900 font-medium">Next</button>
                            </nav>
                        </div>
                    </main>
                </div>

                <Footer />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
