<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>State of Vermont — Official Resident Services Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vt: {
              blue: '#1B3A6B',
              dark: '#0F2444',
              gold: '#C8A951',
              green: '#2D6A4F',
              light: '#EEF2F7',
            }
          }
        }
      }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const AlertBanner = () => (
  <div className="bg-amber-500 text-white">
    <div className="max-w-6xl mx-auto px-4 py-2.5 flex flex-wrap items-center justify-between gap-3">
      <div className="flex items-center gap-2 text-sm font-medium">
        <svg className="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd" />
        </svg>
        <span><strong>Tax Filing Deadline: April 15</strong> — File your Vermont state income taxes online before the deadline.</span>
      </div>
      <a href="#" className="text-xs font-bold bg-white text-amber-600 px-4 py-1.5 rounded-full hover:bg-amber-50 transition whitespace-nowrap">
        File Online Now →
      </a>
    </div>
  </div>
);

const Header = ({ lang, setLang, activePage }) => (
  <header className="bg-vt-blue text-white shadow-lg">
    <div className="bg-vt-dark py-1.5 px-4 text-xs flex items-center justify-between">
      <div className="flex items-center gap-1.5 text-blue-300">
        <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
          <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
        </svg>
        <span>An Official Vermont State Government Website</span>
      </div>
      <div className="flex items-center gap-0.5">
        <span className="text-blue-400 mr-1.5">Language:</span>
        {['EN', 'ES', 'FR'].map(l => (
          <button
            key={l}
            onClick={() => setLang(l)}
            className={`px-2.5 py-0.5 rounded text-xs font-semibold transition ${lang === l ? 'bg-vt-gold text-vt-dark' : 'text-blue-300 hover:text-white hover:bg-white/10'}`}
          >
            {l}
          </button>
        ))}
      </div>
    </div>
    <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="./index.html" className="flex items-center gap-3 group">
        <div className="w-12 h-12 rounded-full bg-vt-gold flex items-center justify-center shadow-md">
          <span className="text-vt-dark font-black text-lg">VT</span>
        </div>
        <div>
          <div className="font-bold text-lg leading-tight group-hover:text-vt-gold transition">State of Vermont</div>
          <div className="text-blue-200 text-xs">Official Resident Services Portal</div>
        </div>
      </a>
      <nav className="hidden md:flex items-center gap-7 text-sm font-medium">
        {[
          { label: 'Home', href: './index.html' },
          { label: 'Services', href: './services.html' },
          { label: 'About', href: './about.html' },
          { label: 'Contact', href: './contact.html' },
        ].map(item => (
          <a
            key={item.label}
            href={item.href}
            className={`pb-0.5 transition ${activePage === item.label ? 'text-vt-gold border-b-2 border-vt-gold' : 'hover:text-vt-gold'}`}
          >
            {item.label}
          </a>
        ))}
      </nav>
    </div>
  </header>
);

const heroText = {
  EN: { title: 'What Do You Need Today?', sub: 'Access Vermont state services quickly, securely, and from anywhere.' },
  ES: { title: '¿Qué necesitas hoy?', sub: 'Accede a los servicios del estado de Vermont rápida y seguramente.' },
  FR: { title: "De quoi avez-vous besoin aujourd'hui?", sub: "Accédez aux services de l'État du Vermont rapidement et en toute sécurité." },
};

const HeroSearch = ({ lang }) => {
  const [query, setQuery] = useState('');
  const t = heroText[lang];
  return (
    <section className="bg-gradient-to-br from-vt-blue to-vt-dark text-white py-20 px-4 relative overflow-hidden">
      <div className="absolute inset-0 opacity-5">
        <div className="absolute top-0 right-0 w-96 h-96 bg-vt-gold rounded-full -translate-y-1/2 translate-x-1/2" />
        <div className="absolute bottom-0 left-0 w-64 h-64 bg-white rounded-full translate-y-1/2 -translate-x-1/2" />
      </div>
      <div className="max-w-3xl mx-auto text-center relative">
        <h1 className="text-4xl md:text-5xl font-extrabold mb-4 leading-tight">{t.title}</h1>
        <p className="text-blue-200 mb-10 text-lg">{t.sub}</p>
        <div className="flex rounded-xl overflow-hidden shadow-2xl max-w-2xl mx-auto">
          <input
            type="text"
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search services, forms, and state information..."
            className="flex-1 px-5 py-4 text-gray-800 text-sm focus:outline-none"
          />
          <button className="bg-vt-gold text-vt-dark font-bold px-8 py-4 hover:bg-yellow-400 transition text-sm flex items-center gap-2">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            Search
          </button>
        </div>
        <p className="text-blue-300 text-xs mt-4">Popular: Driver's License, Benefits, Voter Registration, Vehicle Registration</p>
      </div>
    </section>
  );
};

const quickLinks = [
  { icon: '🪪', label: "Renew Driver's License", href: './license-renewal.html', time: '~10 min', color: 'hover:border-blue-300' },
  { icon: '🏥', label: 'Apply for Benefits', href: './benefits.html', time: '~15 min', color: 'hover:border-green-300' },
  { icon: '🗳️', label: 'Register to Vote', href: '#', time: '~5 min', color: 'hover:border-purple-300' },
  { icon: '🏫', label: 'Find a School', href: '#', time: 'Browse', color: 'hover:border-yellow-300' },
  { icon: '🚗', label: 'Register a Vehicle', href: '#', time: '~12 min', color: 'hover:border-red-300' },
  { icon: '💼', label: 'File for Unemployment', href: '#', time: '~20 min', color: 'hover:border-orange-300' },
];

const QuickLinks = () => (
  <section className="max-w-6xl mx-auto px-4 py-14">
    <div className="flex items-center justify-between mb-7">
      <div>
        <h2 className="text-2xl font-bold text-gray-800">Popular Services</h2>
        <p className="text-gray-500 text-sm mt-1">Frequently used state services — start here</p>
      </div>
      <a href="./services.html" className="text-vt-blue text-sm font-semibold hover:underline hidden sm:block">
        View all services →
      </a>
    </div>
    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
      {quickLinks.map(link => (
        <a
          key={link.label}
          href={link.href}
          className={`flex flex-col items-center text-center p-5 bg-white rounded-2xl shadow-sm border-2 border-gray-100 transition group ${link.color}`}
        >
          <span className="text-4xl mb-3">{link.icon}</span>
          <span className="text-sm font-semibold text-gray-700 group-hover:text-vt-blue mb-1.5 leading-tight">{link.label}</span>
          <span className="text-xs text-gray-400 bg-gray-50 px-2 py-0.5 rounded-full">{link.time}</span>
        </a>
      ))}
    </div>
  </section>
);

const updates = [
  { dept: 'Dept. of Motor Vehicles', time: '2 hours ago', text: 'Online renewal system scheduled maintenance Saturday 11 PM – 3 AM EST. Plan accordingly.', type: 'warning', icon: '🔧' },
  { dept: 'Vermont Health Connect', time: '1 day ago', text: 'Open enrollment extended through March 31 for residents with qualifying life events.', type: 'success', icon: '✅' },
  { dept: 'Dept. of Labor', time: '2 days ago', text: 'New weekly claims processing times reduced to 3–5 business days. Check your portal for status.', type: 'info', icon: '📋' },
  { dept: 'Agency of Education', time: '3 days ago', text: 'Vermont Strong Scholarship applications for Fall 2026 are now open. Deadline: May 15.', type: 'success', icon: '🎓' },
];

const LiveUpdates = () => (
  <section className="bg-vt-light py-14 px-4">
    <div className="max-w-6xl mx-auto">
      <div className="flex items-center justify-between mb-7">
        <div>
          <h2 className="text-2xl font-bold text-gray-800">State Updates</h2>
          <p className="text-gray-500 text-sm mt-1">Latest news from Vermont state departments</p>
        </div>
        <a href="#" className="text-vt-blue text-sm font-semibold hover:underline hidden sm:block">View all updates →</a>
      </div>
      <div className="grid sm:grid-cols-2 gap-4">
        {updates.map((u, i) => (
          <div key={i} className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 hover:shadow-md transition">
            <div className="flex items-start gap-4">
              <span className="text-2xl">{u.icon}</span>
              <div className="min-w-0">
                <div className="flex flex-wrap items-center gap-2 mb-2">
                  <span className="text-xs font-bold text-vt-blue bg-blue-50 px-2.5 py-0.5 rounded-full">{u.dept}</span>
                  <span className="text-xs text-gray-400">{u.time}</span>
                </div>
                <p className="text-sm text-gray-600 leading-relaxed">{u.text}</p>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  </section>
);

const LifeStages = () => (
  <section className="max-w-6xl mx-auto px-4 py-14">
    <div className="flex items-center justify-between mb-7">
      <div>
        <h2 className="text-2xl font-bold text-gray-800">Browse by Life Stage</h2>
        <p className="text-gray-500 text-sm mt-1">Find services organized around your needs</p>
      </div>
    </div>
    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
      {[
        { icon: '🏠', label: 'New Residents', desc: 'ID, registration, and local services', color: 'bg-blue-50 border-blue-100 hover:border-blue-300' },
        { icon: '👨‍👩‍👧', label: 'Families', desc: 'Schools, childcare, health programs', color: 'bg-green-50 border-green-100 hover:border-green-300' },
        { icon: '🎓', label: 'Students', desc: 'Aid, scholarships, school resources', color: 'bg-purple-50 border-purple-100 hover:border-purple-300' },
        { icon: '🧓', label: 'Seniors', desc: 'Retirement, Medicare, benefits', color: 'bg-orange-50 border-orange-100 hover:border-orange-300' },
        { icon: '🏢', label: 'Businesses', desc: 'Licensing, taxes, permits', color: 'bg-slate-50 border-slate-200 hover:border-slate-400' },
      ].map(cat => (
        <a
          key={cat.label}
          href="./services.html"
          className={`flex flex-col items-center text-center p-6 rounded-2xl border-2 transition ${cat.color}`}
        >
          <span className="text-4xl mb-3">{cat.icon}</span>
          <span className="font-bold text-gray-700 text-sm mb-1">{cat.label}</span>
          <span className="text-xs text-gray-500 leading-tight">{cat.desc}</span>
        </a>
      ))}
    </div>
  </section>
);

const Footer = () => (
  <footer className="bg-gray-900 text-gray-400 pt-14 pb-6">
    <div className="max-w-6xl mx-auto px-4">
      <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-10 mb-10">
        <div>
          <div className="flex items-center gap-2.5 mb-4">
            <div className="w-9 h-9 rounded-full bg-vt-gold flex items-center justify-center">
              <span className="text-vt-dark font-black text-sm">VT</span>
            </div>
            <span className="text-white font-bold text-base">State of Vermont</span>
          </div>
          <p className="text-sm leading-relaxed mb-4">Official resident services portal for Vermont state government. Serving Vermonters since 1791.</p>
          <div className="flex gap-3">
            {['🐦', '📘', '▶️'].map((icon, i) => (
              <a key={i} href="#" className="w-8 h-8 bg-gray-800 hover:bg-gray-700 rounded-full flex items-center justify-center text-xs transition">{icon}</a>
            ))}
          </div>
        </div>
        <div>
          <div className="text-white font-semibold mb-4 text-sm uppercase tracking-wider">Services</div>
          <ul className="space-y-2.5 text-sm">
            {[["Driver's License Renewal", './license-renewal.html'], ['Apply for Benefits', './benefits.html'], ['All Services', './services.html'], ['Forms & Applications', '#'], ['Online Payments', '#']].map(([label, href]) => (
              <li key={label}><a href={href} className="hover:text-white transition">{label}</a></li>
            ))}
          </ul>
        </div>
        <div>
          <div className="text-white font-semibold mb-4 text-sm uppercase tracking-wider">Government</div>
          <ul className="space-y-2.5 text-sm">
            {[['About Vermont', './about.html'], ['Governor\'s Office', '#'], ['Open Data Portal', '#'], ['Legislative News', '#'], ['Budget & Finance', '#']].map(([label, href]) => (
              <li key={label}><a href={href} className="hover:text-white transition">{label}</a></li>
            ))}
          </ul>
        </div>
        <div>
          <div className="text-white font-semibold mb-4 text-sm uppercase tracking-wider">Help & Support</div>
          <ul className="space-y-2.5 text-sm mb-5">
            {[['Contact Us', './contact.html'], ['Accessibility Statement', '#'], ['Privacy Policy', '#'], ['Terms of Use', '#'], ['Sitemap', '#']].map(([label, href]) => (
              <li key={label}><a href={href} className="hover:text-white transition">{label}</a></li>
            ))}
          </ul>
          <div className="bg-gray-800 rounded-xl p-3 text-xs">
            <div className="text-white font-semibold mb-1">Need help?</div>
            <div className="text-gray-400">Call <span className="text-white">1-800-VT-SERVES</span></div>
            <div className="text-gray-500">Mon–Fri · 8 AM – 5 PM</div>
          </div>
        </div>
      </div>
      <div className="border-t border-gray-800 pt-6 flex flex-col sm:flex-row items-center justify-between text-xs gap-2 text-gray-500">
        <span>© 2026 State of Vermont. All rights reserved.</span>
        <div className="flex gap-4">
          <a href="#" className="hover:text-gray-300 transition">Accessibility</a>
          <a href="#" className="hover:text-gray-300 transition">Privacy</a>
          <a href="#" className="hover:text-gray-300 transition">Terms of Use</a>
        </div>
      </div>
    </div>
  </footer>
);

const App = () => {
  const [lang, setLang] = useState('EN');
  return (
    <div className="min-h-screen flex flex-col">
      <AlertBanner />
      <Header lang={lang} setLang={setLang} activePage="Home" />
      <main className="flex-1">
        <HeroSearch lang={lang} />
        <QuickLinks />
        <LiveUpdates />
        <LifeStages />
      </main>
      <Footer />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
