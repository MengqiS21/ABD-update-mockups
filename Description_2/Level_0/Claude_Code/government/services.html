<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services — State of Vermont</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vt: {
              blue: '#1B3A6B',
              dark: '#0F2444',
              gold: '#C8A951',
              green: '#2D6A4F',
              light: '#EEF2F7',
            }
          }
        }
      }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const Header = ({ lang, setLang }) => (
  <header className="bg-vt-blue text-white shadow-lg">
    <div className="bg-vt-dark py-1.5 px-4 text-xs flex items-center justify-between">
      <div className="flex items-center gap-1.5 text-blue-300">
        <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
          <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
        </svg>
        <span>An Official Vermont State Government Website</span>
      </div>
      <div className="flex items-center gap-0.5">
        <span className="text-blue-400 mr-1.5">Language:</span>
        {['EN', 'ES', 'FR'].map(l => (
          <button key={l} onClick={() => setLang(l)}
            className={`px-2.5 py-0.5 rounded text-xs font-semibold transition ${lang === l ? 'bg-vt-gold text-vt-dark' : 'text-blue-300 hover:text-white hover:bg-white/10'}`}>
            {l}
          </button>
        ))}
      </div>
    </div>
    <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="./index.html" className="flex items-center gap-3 group">
        <div className="w-12 h-12 rounded-full bg-vt-gold flex items-center justify-center shadow-md">
          <span className="text-vt-dark font-black text-lg">VT</span>
        </div>
        <div>
          <div className="font-bold text-lg leading-tight group-hover:text-vt-gold transition">State of Vermont</div>
          <div className="text-blue-200 text-xs">Official Resident Services Portal</div>
        </div>
      </a>
      <nav className="hidden md:flex items-center gap-7 text-sm font-medium">
        {[['Home', './index.html'], ['Services', './services.html'], ['About', './about.html'], ['Contact', './contact.html']].map(([label, href]) => (
          <a key={label} href={href}
            className={`pb-0.5 transition ${label === 'Services' ? 'text-vt-gold border-b-2 border-vt-gold' : 'hover:text-vt-gold'}`}>
            {label}
          </a>
        ))}
      </nav>
    </div>
  </header>
);

const Breadcrumb = () => (
  <div className="bg-white border-b border-gray-200">
    <div className="max-w-6xl mx-auto px-4 py-3 flex items-center gap-2 text-sm text-gray-500">
      <a href="./index.html" className="hover:text-vt-blue transition">Home</a>
      <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
        <path fillRule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clipRule="evenodd" />
      </svg>
      <span className="text-gray-800 font-medium">Services</span>
    </div>
  </div>
);

const lifeStageData = {
  'New Residents': {
    icon: '🏠',
    color: 'blue',
    desc: "Everything you need to establish yourself as a Vermont resident.",
    services: [
      { name: "Driver's License (New VT)", time: '~25 min', icon: '🪪', href: './license-renewal.html', note: 'In-person required' },
      { name: 'Vehicle Registration', time: '~12 min', icon: '🚗', href: '#', note: 'Online or mail' },
      { name: 'Voter Registration', time: '~5 min', icon: '🗳️', href: '#', note: 'Online' },
      { name: 'Change of Address (DMV)', time: '~5 min', icon: '📋', href: '#', note: 'Online' },
      { name: 'Find Local Services', time: 'Browse', icon: '🗺️', href: '#', note: 'Use zip code' },
      { name: 'School Enrollment', time: '~15 min', icon: '🏫', href: '#', note: 'District-specific' },
    ]
  },
  'Families': {
    icon: '👨‍👩‍👧',
    color: 'green',
    desc: 'Services for parents and families across all stages of life.',
    services: [
      { name: 'Apply for Benefits', time: '~15 min', icon: '🏥', href: './benefits.html', note: 'SNAP, Medicaid' },
      { name: 'Child Care Assistance', time: '~20 min', icon: '🧸', href: '#', note: 'Income-based' },
      { name: 'Birth Certificate', time: '~10 min', icon: '📜', href: '#', note: 'Online order' },
      { name: 'Health Insurance', time: '~15 min', icon: '💊', href: '#', note: 'Vermont Health Connect' },
      { name: 'WIC Program', time: '~20 min', icon: '🍼', href: '#', note: 'Appointment needed' },
      { name: 'Foster Care Info', time: 'Read', icon: '🤝', href: '#', note: 'DCF program' },
    ]
  },
  'Students': {
    icon: '🎓',
    color: 'purple',
    desc: 'Educational resources, financial aid, and student programs.',
    services: [
      { name: 'Vermont Strong Scholarship', time: '~30 min', icon: '💰', href: '#', note: 'Deadline: May 15' },
      { name: 'Free/Reduced Lunch', time: '~10 min', icon: '🥗', href: '#', note: 'School-year enrollment' },
      { name: 'State ID (Under 18)', time: '~15 min', icon: '🪪', href: '#', note: 'DMV office' },
      { name: 'Work Permit (Minors)', time: '~10 min', icon: '💼', href: '#', note: 'Employer form' },
      { name: 'Higher Ed Grants', time: '~20 min', icon: '🏛️', href: '#', note: 'VSAC programs' },
      { name: 'Adult Education', time: 'Browse', icon: '📚', href: '#', note: 'GED, ESL programs' },
    ]
  },
  'Seniors': {
    icon: '🧓',
    color: 'orange',
    desc: 'Benefits, healthcare, and services for Vermonters 60 and older.',
    services: [
      { name: 'Medicare Savings Program', time: '~20 min', icon: '🏥', href: './benefits.html', note: 'Premium help' },
      { name: 'Senior Property Tax Relief', time: '~15 min', icon: '🏡', href: '#', note: 'Annual filing' },
      { name: 'Heating Assistance (LIHEAP)', time: '~20 min', icon: '🔥', href: './benefits.html', note: 'Winter program' },
      { name: 'Senior Meals Program', time: 'Enroll', icon: '🍽️', href: '#', note: 'Area Agency on Aging' },
      { name: 'In-Home Care Services', time: 'Call', icon: '🩺', href: '#', note: '1-800-642-5119' },
      { name: 'Real ID for Seniors', time: '~20 min', icon: '🪪', href: './license-renewal.html', note: 'DMV required' },
    ]
  },
  'Businesses': {
    icon: '🏢',
    color: 'slate',
    desc: 'Licensing, registration, taxes, and compliance for Vermont businesses.',
    services: [
      { name: 'Business Registration', time: '~30 min', icon: '📝', href: '#', note: 'SOS office' },
      { name: 'Business Taxes', time: '~45 min', icon: '💲', href: '#', note: 'Dept. of Taxes' },
      { name: 'Professional Licensing', time: 'Varies', icon: '🔖', href: '#', note: '100+ professions' },
      { name: 'Workers Comp Insurance', time: 'Info', icon: '🦺', href: '#', note: 'DFLR required' },
      { name: 'Employer ID Number', time: '~15 min', icon: '🔢', href: '#', note: 'Federal + state' },
      { name: 'Export Assistance', time: 'Browse', icon: '🌐', href: '#', note: 'VEDA programs' },
    ]
  },
};

const colorMap = {
  blue:   { bg: 'bg-blue-600',  light: 'bg-blue-50',   border: 'border-blue-100', badge: 'bg-blue-100 text-blue-700', tab: 'border-blue-600 text-blue-700' },
  green:  { bg: 'bg-green-700', light: 'bg-green-50',  border: 'border-green-100', badge: 'bg-green-100 text-green-700', tab: 'border-green-700 text-green-700' },
  purple: { bg: 'bg-purple-700',light: 'bg-purple-50', border: 'border-purple-100', badge: 'bg-purple-100 text-purple-700', tab: 'border-purple-700 text-purple-700' },
  orange: { bg: 'bg-orange-600',light: 'bg-orange-50', border: 'border-orange-100', badge: 'bg-orange-100 text-orange-700', tab: 'border-orange-600 text-orange-700' },
  slate:  { bg: 'bg-slate-700', light: 'bg-slate-50',  border: 'border-slate-200', badge: 'bg-slate-100 text-slate-700', tab: 'border-slate-700 text-slate-700' },
};

const ServiceCard = ({ service, color }) => {
  const c = colorMap[color];
  return (
    <a href={service.href}
      className={`flex items-start gap-4 p-5 bg-white rounded-2xl border ${c.border} shadow-sm hover:shadow-md transition group`}>
      <span className="text-3xl flex-shrink-0">{service.icon}</span>
      <div className="min-w-0 flex-1">
        <div className="flex items-start justify-between gap-2">
          <span className="font-semibold text-gray-800 text-sm group-hover:text-vt-blue transition leading-snug">{service.name}</span>
          <svg className="w-4 h-4 text-gray-300 group-hover:text-vt-blue flex-shrink-0 mt-0.5 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
          </svg>
        </div>
        <div className="flex flex-wrap items-center gap-2 mt-2">
          <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${c.badge}`}>{service.time}</span>
          <span className="text-xs text-gray-400">{service.note}</span>
        </div>
      </div>
    </a>
  );
};

const ServicesPage = () => {
  const [activeTab, setActiveTab] = useState('New Residents');
  const [search, setSearch] = useState('');
  const tabs = Object.keys(lifeStageData);
  const current = lifeStageData[activeTab];
  const c = colorMap[current.color];

  const filtered = current.services.filter(s =>
    !search || s.name.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div>
      <div className="bg-vt-blue text-white py-10 px-4">
        <div className="max-w-6xl mx-auto">
          <div className="text-blue-300 text-sm mb-2">Services Directory</div>
          <h1 className="text-3xl font-bold mb-3">Vermont State Services</h1>
          <p className="text-blue-200 max-w-xl">Find services organized around your stage of life. Select a category below to browse relevant programs.</p>
        </div>
      </div>

      <div className="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
        <div className="max-w-6xl mx-auto px-4">
          <div className="flex overflow-x-auto gap-0 scrollbar-hide">
            {tabs.map(tab => {
              const d = lifeStageData[tab];
              const tc = colorMap[d.color];
              const isActive = tab === activeTab;
              return (
                <button
                  key={tab}
                  onClick={() => setActiveTab(tab)}
                  className={`flex items-center gap-2 px-5 py-4 text-sm font-semibold whitespace-nowrap border-b-3 transition ${
                    isActive ? `border-b-2 ${tc.tab}` : 'border-b-2 border-transparent text-gray-500 hover:text-gray-700'
                  }`}
                >
                  <span>{d.icon}</span>
                  <span>{tab}</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-4 py-10">
        <div className={`rounded-2xl ${c.light} border ${c.border} p-6 mb-8`}>
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <span className="text-4xl">{current.icon}</span>
              <div>
                <h2 className="text-xl font-bold text-gray-800">{activeTab}</h2>
                <p className="text-gray-600 text-sm mt-0.5">{current.desc}</p>
              </div>
            </div>
            <div className="flex items-center gap-2 bg-white rounded-xl border border-gray-200 px-3 py-2 shadow-sm">
              <svg className="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
              <input
                type="text"
                placeholder="Filter services..."
                value={search}
                onChange={e => setSearch(e.target.value)}
                className="text-sm outline-none w-44 text-gray-700 placeholder-gray-400"
              />
            </div>
          </div>
        </div>

        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {filtered.map(s => (
            <ServiceCard key={s.name} service={s} color={current.color} />
          ))}
          {filtered.length === 0 && (
            <div className="col-span-3 text-center py-12 text-gray-400">
              <div className="text-4xl mb-3">🔍</div>
              <div className="font-medium">No services found for "{search}"</div>
              <button onClick={() => setSearch('')} className="text-vt-blue text-sm mt-2 hover:underline">Clear search</button>
            </div>
          )}
        </div>

        <div className="mt-12 bg-vt-blue text-white rounded-2xl p-8 flex flex-col sm:flex-row items-center justify-between gap-6">
          <div>
            <h3 className="text-xl font-bold mb-2">Can't find what you need?</h3>
            <p className="text-blue-200 text-sm">Our support team is available Monday–Friday, 8 AM to 5 PM to help you navigate Vermont state services.</p>
          </div>
          <div className="flex flex-col sm:flex-row gap-3 flex-shrink-0">
            <a href="./contact.html" className="bg-vt-gold text-vt-dark font-bold px-6 py-3 rounded-xl hover:bg-yellow-400 transition text-sm text-center">
              Contact Support
            </a>
            <a href="#" className="bg-white/10 text-white font-semibold px-6 py-3 rounded-xl hover:bg-white/20 transition text-sm text-center">
              Live Chat
            </a>
          </div>
        </div>
      </div>
    </div>
  );
};

const Footer = () => (
  <footer className="bg-gray-900 text-gray-400 pt-12 pb-6">
    <div className="max-w-6xl mx-auto px-4">
      <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-8">
        <div>
          <div className="flex items-center gap-2.5 mb-3">
            <div className="w-8 h-8 rounded-full bg-vt-gold flex items-center justify-center">
              <span className="text-vt-dark font-black text-xs">VT</span>
            </div>
            <span className="text-white font-bold">State of Vermont</span>
          </div>
          <p className="text-sm leading-relaxed">Official resident services portal for Vermont state government.</p>
        </div>
        <div>
          <div className="text-white font-semibold mb-3 text-sm">Services</div>
          <ul className="space-y-2 text-sm">
            <li><a href="./license-renewal.html" className="hover:text-white transition">Driver's License Renewal</a></li>
            <li><a href="./benefits.html" className="hover:text-white transition">Apply for Benefits</a></li>
            <li><a href="./services.html" className="hover:text-white transition">All Services</a></li>
          </ul>
        </div>
        <div>
          <div className="text-white font-semibold mb-3 text-sm">Government</div>
          <ul className="space-y-2 text-sm">
            <li><a href="./about.html" className="hover:text-white transition">About Vermont</a></li>
            <li><a href="#" className="hover:text-white transition">Open Data</a></li>
            <li><a href="#" className="hover:text-white transition">Legislature</a></li>
          </ul>
        </div>
        <div>
          <div className="text-white font-semibold mb-3 text-sm">Help</div>
          <ul className="space-y-2 text-sm">
            <li><a href="./contact.html" className="hover:text-white transition">Contact Us</a></li>
            <li><a href="#" className="hover:text-white transition">Accessibility</a></li>
            <li><a href="#" className="hover:text-white transition">Privacy Policy</a></li>
          </ul>
        </div>
      </div>
      <div className="border-t border-gray-800 pt-5 flex flex-col sm:flex-row items-center justify-between text-xs text-gray-500 gap-2">
        <span>© 2026 State of Vermont. All rights reserved.</span>
        <span>Accessibility · Privacy · Terms</span>
      </div>
    </div>
  </footer>
);

const App = () => {
  const [lang, setLang] = useState('EN');
  return (
    <div className="min-h-screen flex flex-col">
      <Header lang={lang} setLang={setLang} />
      <Breadcrumb />
      <main className="flex-1"><ServicesPage /></main>
      <Footer />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
