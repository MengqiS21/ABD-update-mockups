<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver's License Renewal — State of Vermont</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vt: { blue: '#1B3A6B', dark: '#0F2444', gold: '#C8A951', green: '#2D6A4F', light: '#EEF2F7' }
          }
        }
      }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const Header = () => (
  <header className="bg-vt-blue text-white shadow-lg">
    <div className="bg-vt-dark py-1.5 px-4 text-xs flex items-center justify-between">
      <div className="flex items-center gap-1.5 text-blue-300">
        <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
          <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
        </svg>
        <span>An Official Vermont State Government Website</span>
      </div>
    </div>
    <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="./index.html" className="flex items-center gap-3 group">
        <div className="w-12 h-12 rounded-full bg-vt-gold flex items-center justify-center shadow-md">
          <span className="text-vt-dark font-black text-lg">VT</span>
        </div>
        <div>
          <div className="font-bold text-lg leading-tight group-hover:text-vt-gold transition">State of Vermont</div>
          <div className="text-blue-200 text-xs">Official Resident Services Portal</div>
        </div>
      </a>
      <nav className="hidden md:flex items-center gap-7 text-sm font-medium">
        {[['Home', './index.html'], ['Services', './services.html'], ['About', './about.html'], ['Contact', './contact.html']].map(([label, href]) => (
          <a key={label} href={href} className="hover:text-vt-gold transition">{label}</a>
        ))}
      </nav>
    </div>
  </header>
);

const Breadcrumb = () => (
  <div className="bg-white border-b border-gray-200">
    <div className="max-w-6xl mx-auto px-4 py-3 flex items-center gap-2 text-sm text-gray-500 flex-wrap">
      <a href="./index.html" className="hover:text-vt-blue transition">Home</a>
      <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clipRule="evenodd" /></svg>
      <a href="./services.html" className="hover:text-vt-blue transition">Services</a>
      <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clipRule="evenodd" /></svg>
      <span className="text-gray-800 font-medium">Driver's License Renewal</span>
    </div>
  </div>
);

const steps = [
  { id: 1, label: 'Eligibility', icon: '✓' },
  { id: 2, label: 'Documents', icon: '📋' },
  { id: 3, label: 'Schedule', icon: '📅' },
  { id: 4, label: 'Confirm', icon: '🎉' },
];

const StepIndicator = ({ current }) => (
  <div className="flex items-center justify-center mb-10">
    {steps.map((s, i) => (
      <React.Fragment key={s.id}>
        <div className="flex flex-col items-center">
          <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition ${
            s.id < current ? 'bg-green-500 text-white' :
            s.id === current ? 'bg-vt-blue text-white shadow-lg' :
            'bg-gray-200 text-gray-400'
          }`}>
            {s.id < current ? '✓' : s.id}
          </div>
          <div className={`text-xs mt-1.5 font-medium ${s.id === current ? 'text-vt-blue' : s.id < current ? 'text-green-600' : 'text-gray-400'}`}>
            {s.label}
          </div>
        </div>
        {i < steps.length - 1 && (
          <div className={`flex-1 h-0.5 mx-3 mb-5 transition ${s.id < current ? 'bg-green-400' : 'bg-gray-200'}`} />
        )}
      </React.Fragment>
    ))}
  </div>
);

const EligibilityStep = ({ onNext }) => {
  const [answers, setAnswers] = useState({ resident: null, age: null, expired: null, suspended: null });
  const [checked, setChecked] = useState(false);

  const eligible = answers.resident === 'yes' && answers.age === 'yes' && answers.suspended === 'no';
  const allAnswered = Object.values(answers).every(v => v !== null);

  const Q = ({ field, label, hint }) => (
    <div className="p-5 bg-white rounded-2xl border border-gray-100 shadow-sm">
      <div className="font-semibold text-gray-800 text-sm mb-0.5">{label}</div>
      {hint && <div className="text-xs text-gray-500 mb-3">{hint}</div>}
      <div className="flex gap-3">
        {['yes', 'no'].map(v => (
          <button key={v} onClick={() => setAnswers(a => ({ ...a, [field]: v }))}
            className={`px-5 py-2 rounded-xl text-sm font-semibold border-2 transition ${answers[field] === v ? (v === 'yes' ? 'bg-green-500 border-green-500 text-white' : 'bg-red-500 border-red-500 text-white') : 'border-gray-200 text-gray-600 hover:border-gray-300'}`}>
            {v === 'yes' ? 'Yes' : 'No'}
          </button>
        ))}
      </div>
    </div>
  );

  return (
    <div>
      <h2 className="text-2xl font-bold text-gray-800 mb-2">Eligibility Check</h2>
      <p className="text-gray-500 mb-7 text-sm">Answer a few questions to confirm you can renew online.</p>
      <div className="space-y-4 mb-7">
        <Q field="resident" label="Are you a current Vermont resident?" hint="You must have a Vermont address to renew online." />
        <Q field="age" label="Are you between 18 and 69 years old?" hint="Renewals for other age groups may require an in-person visit." />
        <Q field="expired" label="Did your license expire within the last 12 months?" hint="Older expirations may require additional steps." />
        <Q field="suspended" label="Has your license been suspended or revoked?" hint="Suspended licenses cannot be renewed online." />
      </div>
      {allAnswered && (
        <div className={`p-5 rounded-2xl mb-6 border-2 ${eligible ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
          <div className="flex items-center gap-3">
            <span className="text-3xl">{eligible ? '✅' : '❌'}</span>
            <div>
              <div className={`font-bold ${eligible ? 'text-green-700' : 'text-red-700'}`}>
                {eligible ? 'You are eligible to renew online!' : 'Online renewal is not available for you at this time.'}
              </div>
              <div className={`text-sm mt-0.5 ${eligible ? 'text-green-600' : 'text-red-600'}`}>
                {eligible ? 'Proceed to review the required documents.' : 'Please visit your nearest DMV office or call 802-828-2000.'}
              </div>
            </div>
          </div>
        </div>
      )}
      <button
        onClick={() => eligible && onNext()}
        disabled={!eligible}
        className={`w-full py-3.5 rounded-xl font-bold text-sm transition ${eligible ? 'bg-vt-blue text-white hover:bg-vt-dark' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
        Continue to Documents →
      </button>
    </div>
  );
};

const documents = [
  { label: 'Current Vermont Driver\'s License', required: true, note: 'Original or photocopy accepted' },
  { label: 'Proof of Vermont residence', required: true, note: 'Utility bill, lease agreement, or bank statement (dated within 60 days)' },
  { label: 'Social Security Number', required: true, note: 'For identity verification (not stored)' },
  { label: 'Payment — $35.00', required: true, note: 'Visa, MasterCard, or checking account' },
  { label: 'Vision screening waiver (if applicable)', required: false, note: 'If you have a waiver on file with the DMV' },
];

const DocumentsStep = ({ onNext, onBack }) => {
  const [checked, setChecked] = useState([]);
  const required = documents.filter(d => d.required);
  const allChecked = required.every(d => checked.includes(d.label));

  const toggle = (label) => setChecked(prev => prev.includes(label) ? prev.filter(l => l !== label) : [...prev, label]);

  return (
    <div>
      <h2 className="text-2xl font-bold text-gray-800 mb-2">Required Documents</h2>
      <p className="text-gray-500 mb-6 text-sm">Check off each item to confirm you have it ready. Required items are marked with an asterisk.</p>

      <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-6 flex gap-3">
        <span className="text-xl">💡</span>
        <div className="text-sm text-amber-800">
          <strong>Tip:</strong> Keep all documents within reach before you start. The online session will time out after 15 minutes of inactivity.
        </div>
      </div>

      <div className="space-y-3 mb-8">
        {documents.map(doc => (
          <label key={doc.label}
            className={`flex items-start gap-4 p-5 rounded-2xl border-2 cursor-pointer transition ${checked.includes(doc.label) ? 'border-green-400 bg-green-50' : 'border-gray-100 bg-white hover:border-gray-200'}`}>
            <div className={`w-6 h-6 rounded-md border-2 flex items-center justify-center flex-shrink-0 mt-0.5 transition ${checked.includes(doc.label) ? 'bg-green-500 border-green-500' : 'border-gray-300'}`}
              onClick={() => toggle(doc.label)}>
              {checked.includes(doc.label) && <span className="text-white text-xs font-bold">✓</span>}
            </div>
            <div>
              <div className="font-semibold text-sm text-gray-800">
                {doc.label} {doc.required && <span className="text-red-500">*</span>}
              </div>
              <div className="text-xs text-gray-500 mt-0.5">{doc.note}</div>
            </div>
          </label>
        ))}
      </div>

      <div className="bg-vt-light rounded-2xl p-5 mb-7 border border-blue-100">
        <div className="flex items-center justify-between mb-3">
          <span className="font-bold text-gray-800">Fee Summary</span>
        </div>
        <div className="space-y-2 text-sm">
          <div className="flex justify-between text-gray-600"><span>License Renewal (4-year)</span><span>$30.00</span></div>
          <div className="flex justify-between text-gray-600"><span>Processing Fee</span><span>$5.00</span></div>
          <div className="flex justify-between font-bold text-gray-800 border-t border-blue-200 pt-2 mt-2"><span>Total Due</span><span>$35.00</span></div>
        </div>
      </div>

      <div className="flex gap-3">
        <button onClick={onBack} className="px-6 py-3 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold text-sm hover:border-gray-300 transition">← Back</button>
        <button onClick={() => allChecked && onNext()}
          disabled={!allChecked}
          className={`flex-1 py-3 rounded-xl font-bold text-sm transition ${allChecked ? 'bg-vt-blue text-white hover:bg-vt-dark' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
          Schedule Appointment →
        </button>
      </div>
    </div>
  );
};

const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
const unavailable = [5, 6, 9, 12, 13, 19, 20, 26, 27];
const timeSlots = ['8:00 AM', '8:30 AM', '9:00 AM', '9:30 AM', '10:00 AM', '10:30 AM', '1:00 PM', '1:30 PM', '2:00 PM', '2:30 PM', '3:00 PM'];
const bookedSlots = ['9:00 AM', '10:00 AM', '2:00 PM'];

const ScheduleStep = ({ onNext, onBack }) => {
  const [selectedDate, setSelectedDate] = useState(null);
  const [selectedTime, setSelectedTime] = useState(null);
  const [location, setLocation] = useState('Montpelier');

  const month = 3; // April 2026
  const year = 2026;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const calDays = [];
  for (let i = 0; i < firstDay; i++) calDays.push(null);
  for (let d = 1; d <= daysInMonth; d++) calDays.push(d);

  const isUnavailable = (d) => !d || unavailable.includes(d) || new Date(year, month, d) < new Date();

  return (
    <div>
      <h2 className="text-2xl font-bold text-gray-800 mb-2">Schedule Your Appointment</h2>
      <p className="text-gray-500 mb-7 text-sm">Select a DMV location, date, and time slot for your renewal appointment.</p>

      <div className="mb-6">
        <label className="block text-sm font-semibold text-gray-700 mb-2">DMV Location</label>
        <select value={location} onChange={e => setLocation(e.target.value)}
          className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-700 focus:outline-none focus:border-vt-blue transition">
          {['Montpelier (Main Office)', 'Burlington', 'Rutland', 'St. Johnsbury', 'Brattleboro', 'Newport'].map(l => (
            <option key={l}>{l}</option>
          ))}
        </select>
      </div>

      <div className="grid lg:grid-cols-2 gap-6 mb-7">
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
          <div className="flex items-center justify-between mb-4">
            <button className="text-gray-400 hover:text-gray-600 transition p-1">‹</button>
            <div className="font-bold text-gray-800">{MONTHS[month]} {year}</div>
            <button className="text-gray-400 hover:text-gray-600 transition p-1">›</button>
          </div>
          <div className="grid grid-cols-7 mb-2">
            {DAYS.map(d => <div key={d} className="text-center text-xs font-semibold text-gray-400 py-1">{d}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {calDays.map((d, i) => (
              <button key={i}
                disabled={isUnavailable(d)}
                onClick={() => d && !isUnavailable(d) && setSelectedDate(d)}
                className={`aspect-square rounded-lg text-sm flex items-center justify-center font-medium transition ${
                  !d ? '' :
                  isUnavailable(d) ? 'text-gray-200 cursor-not-allowed' :
                  selectedDate === d ? 'bg-vt-blue text-white shadow-md' :
                  'text-gray-700 hover:bg-blue-50 hover:text-vt-blue'
                }`}>
                {d}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-4 mt-3 text-xs text-gray-400">
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-vt-blue inline-block" /> Selected</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-gray-100 inline-block" /> Unavailable</span>
          </div>
        </div>

        <div>
          <div className="font-semibold text-gray-700 text-sm mb-3">
            {selectedDate ? `Available times — April ${selectedDate}, 2026` : 'Select a date to see available times'}
          </div>
          {selectedDate ? (
            <div className="grid grid-cols-2 gap-2">
              {timeSlots.map(t => {
                const booked = bookedSlots.includes(t);
                const selected = selectedTime === t;
                return (
                  <button key={t} disabled={booked} onClick={() => !booked && setSelectedTime(t)}
                    className={`py-2.5 rounded-xl text-sm font-medium border-2 transition ${
                      booked ? 'border-gray-100 text-gray-300 cursor-not-allowed bg-gray-50' :
                      selected ? 'border-vt-blue bg-vt-blue text-white shadow-md' :
                      'border-gray-200 text-gray-700 hover:border-vt-blue hover:text-vt-blue'
                    }`}>
                    {booked ? <span className="line-through">{t}</span> : t}
                  </button>
                );
              })}
            </div>
          ) : (
            <div className="h-full flex items-center justify-center text-gray-300 text-4xl pt-8">📅</div>
          )}
        </div>
      </div>

      <div className="flex gap-3">
        <button onClick={onBack} className="px-6 py-3 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold text-sm hover:border-gray-300 transition">← Back</button>
        <button onClick={() => selectedDate && selectedTime && onNext({ date: `April ${selectedDate}, 2026`, time: selectedTime, location })}
          disabled={!selectedDate || !selectedTime}
          className={`flex-1 py-3 rounded-xl font-bold text-sm transition ${selectedDate && selectedTime ? 'bg-vt-blue text-white hover:bg-vt-dark' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
          Review & Confirm →
        </button>
      </div>
    </div>
  );
};

const ConfirmStep = ({ appointment, onBack }) => {
  const [email, setEmail] = useState('');
  const [phone, setPhone] = useState('');
  const [submitted, setSubmitted] = useState(false);

  if (submitted) {
    return (
      <div className="text-center py-8">
        <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
          <span className="text-4xl">✅</span>
        </div>
        <h2 className="text-2xl font-bold text-gray-800 mb-3">Appointment Confirmed!</h2>
        <p className="text-gray-500 mb-8 max-w-sm mx-auto text-sm">Your DMV appointment has been scheduled. A confirmation email and SMS have been sent.</p>
        <div className="bg-green-50 border border-green-200 rounded-2xl p-6 max-w-sm mx-auto mb-8 text-left">
          <div className="space-y-3 text-sm">
            <div className="flex justify-between"><span className="text-gray-500">Confirmation #</span><span className="font-bold text-gray-800">VT-DMV-{Math.floor(100000 + Math.random() * 900000)}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Service</span><span className="font-medium text-gray-700">License Renewal</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Location</span><span className="font-medium text-gray-700">{appointment.location}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Date & Time</span><span className="font-medium text-gray-700">{appointment.date} · {appointment.time}</span></div>
            <div className="flex justify-between border-t border-green-200 pt-3"><span className="text-gray-500">Fee Due</span><span className="font-bold text-gray-800">$35.00</span></div>
          </div>
        </div>
        <div className="flex gap-3 justify-center">
          <button onClick={() => window.print()} className="px-6 py-3 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold text-sm hover:border-gray-300 transition">🖨 Print</button>
          <a href="./index.html" className="bg-vt-blue text-white font-bold px-6 py-3 rounded-xl text-sm hover:bg-vt-dark transition">Return Home</a>
        </div>
      </div>
    );
  }

  return (
    <div>
      <h2 className="text-2xl font-bold text-gray-800 mb-2">Confirm Your Appointment</h2>
      <p className="text-gray-500 mb-7 text-sm">Review your details and enter contact info for your confirmation.</p>

      <div className="bg-vt-light border border-blue-100 rounded-2xl p-6 mb-6">
        <div className="text-vt-blue font-bold text-sm mb-4 uppercase tracking-wide">Appointment Summary</div>
        <div className="grid sm:grid-cols-2 gap-4 text-sm">
          {[
            ['Service', "Driver's License Renewal"],
            ['DMV Location', appointment?.location || 'Montpelier'],
            ['Date', appointment?.date || '—'],
            ['Time', appointment?.time || '—'],
            ['Fee', '$35.00'],
            ['Duration', '~15 minutes'],
          ].map(([k, v]) => (
            <div key={k} className="bg-white rounded-xl p-3 border border-blue-100">
              <div className="text-gray-400 text-xs mb-1">{k}</div>
              <div className="font-semibold text-gray-800">{v}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="grid sm:grid-cols-2 gap-4 mb-7">
        <div>
          <label className="block text-sm font-semibold text-gray-700 mb-1.5">Email Address <span className="text-red-500">*</span></label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com"
            className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-vt-blue transition" />
        </div>
        <div>
          <label className="block text-sm font-semibold text-gray-700 mb-1.5">Phone (optional)</label>
          <input type="tel" value={phone} onChange={e => setPhone(e.target.value)} placeholder="(802) 555-0000"
            className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-vt-blue transition" />
        </div>
      </div>

      <label className="flex items-start gap-3 mb-7 cursor-pointer">
        <input type="checkbox" className="mt-1 w-4 h-4 text-vt-blue rounded" />
        <span className="text-sm text-gray-600">I confirm that all documents listed will be brought to my appointment, and I agree to the <a href="#" className="text-vt-blue hover:underline">Vermont DMV Terms of Service</a>.</span>
      </label>

      <div className="flex gap-3">
        <button onClick={onBack} className="px-6 py-3 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold text-sm hover:border-gray-300 transition">← Back</button>
        <button onClick={() => email && setSubmitted(true)}
          disabled={!email}
          className={`flex-1 py-3.5 rounded-xl font-bold text-sm transition ${email ? 'bg-vt-green text-white hover:bg-green-800' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
          ✓ Confirm Appointment
        </button>
      </div>
    </div>
  );
};

const App = () => {
  const [step, setStep] = useState(1);
  const [appointment, setAppointment] = useState(null);

  return (
    <div className="min-h-screen flex flex-col">
      <Header />
      <Breadcrumb />
      <main className="flex-1">
        <div className="bg-vt-blue text-white py-8 px-4">
          <div className="max-w-6xl mx-auto flex items-center gap-4">
            <span className="text-4xl">🪪</span>
            <div>
              <div className="text-blue-300 text-sm">Department of Motor Vehicles</div>
              <h1 className="text-2xl font-bold">Driver's License Renewal</h1>
              <p className="text-blue-200 text-sm mt-1">Complete your renewal online in approximately 10 minutes.</p>
            </div>
          </div>
        </div>
        <div className="max-w-2xl mx-auto px-4 py-12">
          <StepIndicator current={step} />
          {step === 1 && <EligibilityStep onNext={() => setStep(2)} />}
          {step === 2 && <DocumentsStep onNext={() => setStep(3)} onBack={() => setStep(1)} />}
          {step === 3 && <ScheduleStep onNext={(appt) => { setAppointment(appt); setStep(4); }} onBack={() => setStep(2)} />}
          {step === 4 && <ConfirmStep appointment={appointment} onBack={() => setStep(3)} />}
        </div>
      </main>
      <footer className="bg-gray-900 text-gray-400 py-8 px-4 text-center text-sm">
        <div className="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">
          <span>© 2026 State of Vermont · DMV</span>
          <div className="flex gap-4">
            <a href="./index.html" className="hover:text-white transition">Home</a>
            <a href="./services.html" className="hover:text-white transition">Services</a>
            <a href="./contact.html" className="hover:text-white transition">Help</a>
          </div>
        </div>
      </footer>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
