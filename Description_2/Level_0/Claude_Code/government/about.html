<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Vermont — State of Vermont</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vt: { blue: '#1B3A6B', dark: '#0F2444', gold: '#C8A951', green: '#2D6A4F', light: '#EEF2F7' }
          }
        }
      }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const Header = ({ lang, setLang }) => (
  <header className="bg-vt-blue text-white shadow-lg">
    <div className="bg-vt-dark py-1.5 px-4 text-xs flex items-center justify-between">
      <div className="flex items-center gap-1.5 text-blue-300">
        <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
          <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
        </svg>
        <span>An Official Vermont State Government Website</span>
      </div>
      <div className="flex items-center gap-0.5">
        <span className="text-blue-400 mr-1.5">Language:</span>
        {['EN', 'ES', 'FR'].map(l => (
          <button key={l} onClick={() => setLang(l)}
            className={`px-2.5 py-0.5 rounded text-xs font-semibold transition ${lang === l ? 'bg-vt-gold text-vt-dark' : 'text-blue-300 hover:text-white hover:bg-white/10'}`}>
            {l}
          </button>
        ))}
      </div>
    </div>
    <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="./index.html" className="flex items-center gap-3 group">
        <div className="w-12 h-12 rounded-full bg-vt-gold flex items-center justify-center shadow-md">
          <span className="text-vt-dark font-black text-lg">VT</span>
        </div>
        <div>
          <div className="font-bold text-lg leading-tight group-hover:text-vt-gold transition">State of Vermont</div>
          <div className="text-blue-200 text-xs">Official Resident Services Portal</div>
        </div>
      </a>
      <nav className="hidden md:flex items-center gap-7 text-sm font-medium">
        {[['Home', './index.html'], ['Services', './services.html'], ['About', './about.html'], ['Contact', './contact.html']].map(([label, href]) => (
          <a key={label} href={href}
            className={`pb-0.5 transition ${label === 'About' ? 'text-vt-gold border-b-2 border-vt-gold' : 'hover:text-vt-gold'}`}>
            {label}
          </a>
        ))}
      </nav>
    </div>
  </header>
);

const Breadcrumb = () => (
  <div className="bg-white border-b border-gray-200">
    <div className="max-w-6xl mx-auto px-4 py-3 flex items-center gap-2 text-sm text-gray-500">
      <a href="./index.html" className="hover:text-vt-blue transition">Home</a>
      <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
        <path fillRule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clipRule="evenodd" />
      </svg>
      <span className="text-gray-800 font-medium">About Vermont</span>
    </div>
  </div>
);

const GovernorSection = () => (
  <section className="max-w-6xl mx-auto px-4 py-14">
    <div className="grid lg:grid-cols-3 gap-10">
      <div className="lg:col-span-1 flex flex-col items-center">
        <div className="w-48 h-48 rounded-2xl bg-gradient-to-br from-vt-blue to-vt-dark flex items-center justify-center text-white shadow-xl mb-4">
          <div className="text-center">
            <div className="text-6xl mb-2">👤</div>
            <div className="text-xs text-blue-200">Official Portrait</div>
          </div>
        </div>
        <div className="text-center">
          <div className="font-bold text-lg text-gray-800">Gov. Margaret E. Williams</div>
          <div className="text-vt-blue text-sm font-medium">79th Governor of Vermont</div>
          <div className="text-gray-500 text-xs mt-1">Serving since January 2023</div>
        </div>
        <a href="#" className="mt-4 w-full text-center text-sm font-semibold text-vt-blue border-2 border-vt-blue px-5 py-2.5 rounded-xl hover:bg-vt-blue hover:text-white transition">
          Governor's Office →
        </a>
      </div>
      <div className="lg:col-span-2">
        <div className="text-vt-blue text-sm font-semibold uppercase tracking-wider mb-2">Welcome Message</div>
        <h1 className="text-3xl font-bold text-gray-800 mb-6">A Message from the Governor</h1>
        <div className="space-y-4 text-gray-600 leading-relaxed">
          <p>Dear Fellow Vermonters,</p>
          <p>
            Vermont has always been a place where neighbors look out for one another — where community isn't just a concept, but a daily practice. As your Governor, my commitment is to make state government as responsive, efficient, and accessible as those same community values.
          </p>
          <p>
            This portal represents our continuing effort to bring Vermont's services directly to you — whether you're a long-time resident, a new arrival, a student, a senior, or a business owner. We believe that access to government services should be simple, dignified, and available in the language you speak.
          </p>
          <p>
            Vermont faces real challenges — from housing affordability to workforce development to climate resilience — but we also possess extraordinary strengths in our people, our natural resources, and our innovation economy. Together, we are building a Vermont that works for everyone.
          </p>
          <p className="font-medium text-gray-700 italic">
            — Governor Margaret E. Williams, State of Vermont
          </p>
        </div>
      </div>
    </div>
  </section>
);

const agencies = [
  { name: 'Dept. of Motor Vehicles', abbr: 'DMV', icon: '🚗', desc: 'Licenses, registrations, ID cards', phone: '802-828-2000' },
  { name: 'Vermont Health Connect', abbr: 'VHC', icon: '🏥', desc: 'Health insurance marketplace', phone: '1-855-899-9600' },
  { name: 'Agency of Education', abbr: 'AOE', icon: '🎓', desc: 'K-12, higher ed, scholarships', phone: '802-828-3135' },
  { name: 'Dept. of Labor', abbr: 'DOL', icon: '💼', desc: 'Employment, unemployment, workforce', phone: '802-828-4000' },
  { name: 'Dept. of Children & Families', abbr: 'DCF', icon: '👨‍👩‍👧', desc: 'Benefits, SNAP, child welfare', phone: '1-800-479-6151' },
  { name: 'Dept. of Environmental Conservation', abbr: 'DEC', icon: '🌿', desc: 'Environment, permits, water quality', phone: '802-828-1556' },
  { name: 'Dept. of Taxes', abbr: 'DOT', icon: '💲', desc: 'Income, property, and business taxes', phone: '802-828-2505' },
  { name: 'Secretary of State', abbr: 'SOS', icon: '🗳️', desc: 'Voter registration, business filings', phone: '802-828-2363' },
];

const AgencyDirectory = () => (
  <section className="bg-vt-light py-14 px-4">
    <div className="max-w-6xl mx-auto">
      <div className="text-center mb-10">
        <div className="text-vt-blue text-sm font-semibold uppercase tracking-wider mb-2">State Government</div>
        <h2 className="text-3xl font-bold text-gray-800">Agency Directory</h2>
        <p className="text-gray-500 mt-2">Key state agencies and contact information</p>
      </div>
      <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
        {agencies.map(a => (
          <div key={a.name} className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 hover:shadow-md transition">
            <div className="flex items-start gap-3 mb-3">
              <span className="text-2xl">{a.icon}</span>
              <div>
                <div className="font-bold text-gray-800 text-sm leading-tight">{a.name}</div>
                <div className="text-xs text-vt-blue font-medium mt-0.5">{a.abbr}</div>
              </div>
            </div>
            <p className="text-xs text-gray-500 mb-3">{a.desc}</p>
            <div className="text-xs text-gray-600 font-medium">{a.phone}</div>
          </div>
        ))}
      </div>
    </div>
  </section>
);

const transparencyReports = [
  { title: 'FY2025 Annual Budget Report', size: 'PDF · 4.2 MB', date: 'Jan 2026', icon: '📊' },
  { title: 'State Workforce Demographics', size: 'PDF · 1.8 MB', date: 'Dec 2025', icon: '👥' },
  { title: 'Open Data Portal — Q4 2025', size: 'Dashboard', date: 'Dec 2025', icon: '🗃️' },
  { title: 'Capital Projects Status Report', size: 'PDF · 2.1 MB', date: 'Nov 2025', icon: '🏗️' },
  { title: 'Agency Performance Metrics', size: 'PDF · 3.0 MB', date: 'Oct 2025', icon: '📈' },
  { title: 'Environmental Quality Report', size: 'PDF · 5.5 MB', date: 'Sep 2025', icon: '🌿' },
];

const legislativeNews = [
  { bill: 'H.484', title: 'Vermont Housing Opportunity Act', status: 'Passed House', date: 'Mar 18, 2026', tag: 'Housing' },
  { bill: 'S.210', title: 'Clean Water Infrastructure Bond', status: 'In Committee', date: 'Mar 12, 2026', tag: 'Environment' },
  { bill: 'H.392', title: 'Universal School Meals Extension', status: 'Signed into Law', date: 'Mar 5, 2026', tag: 'Education' },
  { bill: 'S.187', title: 'Small Business Tax Relief Act', status: 'Senate Floor', date: 'Feb 28, 2026', tag: 'Business' },
];

const Transparency = () => (
  <section className="max-w-6xl mx-auto px-4 py-14">
    <div className="grid lg:grid-cols-2 gap-12">
      <div>
        <div className="text-vt-blue text-sm font-semibold uppercase tracking-wider mb-2">Open Government</div>
        <h2 className="text-2xl font-bold text-gray-800 mb-6">Transparency Reports</h2>
        <div className="space-y-3">
          {transparencyReports.map((r, i) => (
            <a key={i} href="#"
              className="flex items-center gap-4 p-4 bg-white rounded-xl border border-gray-100 hover:border-vt-blue hover:shadow-sm transition group">
              <span className="text-2xl">{r.icon}</span>
              <div className="flex-1 min-w-0">
                <div className="font-semibold text-sm text-gray-800 group-hover:text-vt-blue transition truncate">{r.title}</div>
                <div className="text-xs text-gray-400 mt-0.5">{r.size} · {r.date}</div>
              </div>
              <svg className="w-4 h-4 text-gray-300 group-hover:text-vt-blue transition flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
            </a>
          ))}
        </div>
        <a href="#" className="block mt-4 text-center text-sm font-semibold text-vt-blue hover:underline">
          View all reports in Open Data Portal →
        </a>
      </div>

      <div>
        <div className="text-vt-blue text-sm font-semibold uppercase tracking-wider mb-2">Vermont Legislature</div>
        <h2 className="text-2xl font-bold text-gray-800 mb-6">Legislative News</h2>
        <div className="space-y-4">
          {legislativeNews.map((item, i) => {
            const tagColors = { Housing: 'bg-blue-100 text-blue-700', Environment: 'bg-green-100 text-green-700', Education: 'bg-purple-100 text-purple-700', Business: 'bg-orange-100 text-orange-700' };
            const statusColor = item.status === 'Signed into Law' ? 'text-green-700' : item.status === 'Passed House' ? 'text-blue-600' : 'text-gray-500';
            return (
              <div key={i} className="bg-white rounded-xl p-5 border border-gray-100 shadow-sm hover:shadow-md transition">
                <div className="flex items-start justify-between gap-3 mb-2">
                  <div>
                    <span className="text-xs font-bold text-gray-500 mr-2">{item.bill}</span>
                    <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${tagColors[item.tag]}`}>{item.tag}</span>
                  </div>
                  <span className="text-xs text-gray-400 whitespace-nowrap">{item.date}</span>
                </div>
                <div className="font-semibold text-gray-800 text-sm mb-1">{item.title}</div>
                <div className={`text-xs font-semibold ${statusColor}`}>{item.status}</div>
              </div>
            );
          })}
        </div>
        <a href="#" className="block mt-4 text-center text-sm font-semibold text-vt-blue hover:underline">
          Visit Vermont Legislature website →
        </a>
      </div>
    </div>
  </section>
);

const AccessibilityStatement = () => (
  <section className="bg-vt-blue text-white py-14 px-4">
    <div className="max-w-4xl mx-auto text-center">
      <div className="text-vt-gold text-4xl mb-4">♿</div>
      <h2 className="text-2xl font-bold mb-4">Accessibility Commitment</h2>
      <p className="text-blue-200 leading-relaxed mb-6">
        The State of Vermont is committed to ensuring equal access to government services and information for all residents, including individuals with disabilities. This portal strives to conform to <strong className="text-white">WCAG 2.1 Level AA</strong> standards as outlined by the Web Content Accessibility Guidelines.
      </p>
      <div className="grid sm:grid-cols-3 gap-4 mb-8">
        {[
          { icon: '🎨', title: 'Color Contrast', desc: 'All text meets 4.5:1 minimum contrast ratio' },
          { icon: '⌨️', title: 'Keyboard Navigation', desc: 'Full site navigable via keyboard alone' },
          { icon: '🔊', title: 'Screen Reader', desc: 'Compatible with NVDA, JAWS, and VoiceOver' },
        ].map(item => (
          <div key={item.title} className="bg-white/10 rounded-xl p-5">
            <div className="text-2xl mb-2">{item.icon}</div>
            <div className="font-semibold mb-1">{item.title}</div>
            <div className="text-blue-200 text-xs">{item.desc}</div>
          </div>
        ))}
      </div>
      <p className="text-blue-300 text-sm">
        To report an accessibility issue or request an accommodation, contact the Digital Accessibility Coordinator at <strong className="text-white">accessibility@vermont.gov</strong> or call <strong className="text-white">1-800-649-6825</strong>.
      </p>
    </div>
  </section>
);

const Footer = () => (
  <footer className="bg-gray-900 text-gray-400 pt-12 pb-6">
    <div className="max-w-6xl mx-auto px-4">
      <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-8">
        <div>
          <div className="flex items-center gap-2.5 mb-3">
            <div className="w-8 h-8 rounded-full bg-vt-gold flex items-center justify-center">
              <span className="text-vt-dark font-black text-xs">VT</span>
            </div>
            <span className="text-white font-bold">State of Vermont</span>
          </div>
          <p className="text-sm leading-relaxed">Official resident services portal for Vermont state government.</p>
        </div>
        <div>
          <div className="text-white font-semibold mb-3 text-sm">Services</div>
          <ul className="space-y-2 text-sm">
            <li><a href="./license-renewal.html" className="hover:text-white transition">Driver's License Renewal</a></li>
            <li><a href="./benefits.html" className="hover:text-white transition">Apply for Benefits</a></li>
            <li><a href="./services.html" className="hover:text-white transition">All Services</a></li>
          </ul>
        </div>
        <div>
          <div className="text-white font-semibold mb-3 text-sm">Government</div>
          <ul className="space-y-2 text-sm">
            <li><a href="./about.html" className="hover:text-white transition">About Vermont</a></li>
            <li><a href="#" className="hover:text-white transition">Open Data</a></li>
            <li><a href="#" className="hover:text-white transition">Legislature</a></li>
          </ul>
        </div>
        <div>
          <div className="text-white font-semibold mb-3 text-sm">Help</div>
          <ul className="space-y-2 text-sm">
            <li><a href="./contact.html" className="hover:text-white transition">Contact Us</a></li>
            <li><a href="#" className="hover:text-white transition">Accessibility</a></li>
            <li><a href="#" className="hover:text-white transition">Privacy Policy</a></li>
          </ul>
        </div>
      </div>
      <div className="border-t border-gray-800 pt-5 flex flex-col sm:flex-row items-center justify-between text-xs text-gray-500 gap-2">
        <span>© 2026 State of Vermont. All rights reserved.</span>
        <span>Accessibility · Privacy · Terms</span>
      </div>
    </div>
  </footer>
);

const App = () => {
  const [lang, setLang] = useState('EN');
  return (
    <div className="min-h-screen flex flex-col">
      <Header lang={lang} setLang={setLang} />
      <Breadcrumb />
      <main className="flex-1">
        <GovernorSection />
        <AgencyDirectory />
        <Transparency />
        <AccessibilityStatement />
      </main>
      <Footer />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
