<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — State of Vermont</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vt: { blue: '#1B3A6B', dark: '#0F2444', gold: '#C8A951', green: '#2D6A4F', light: '#EEF2F7' }
          }
        }
      }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const Header = ({ lang, setLang }) => (
  <header className="bg-vt-blue text-white shadow-lg">
    <div className="bg-vt-dark py-1.5 px-4 text-xs flex items-center justify-between">
      <div className="flex items-center gap-1.5 text-blue-300">
        <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
          <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
        </svg>
        <span>An Official Vermont State Government Website</span>
      </div>
      <div className="flex items-center gap-0.5">
        <span className="text-blue-400 mr-1.5">Language:</span>
        {['EN', 'ES', 'FR'].map(l => (
          <button key={l} onClick={() => setLang(l)}
            className={`px-2.5 py-0.5 rounded text-xs font-semibold transition ${lang === l ? 'bg-vt-gold text-vt-dark' : 'text-blue-300 hover:text-white hover:bg-white/10'}`}>
            {l}
          </button>
        ))}
      </div>
    </div>
    <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="./index.html" className="flex items-center gap-3 group">
        <div className="w-12 h-12 rounded-full bg-vt-gold flex items-center justify-center shadow-md">
          <span className="text-vt-dark font-black text-lg">VT</span>
        </div>
        <div>
          <div className="font-bold text-lg leading-tight group-hover:text-vt-gold transition">State of Vermont</div>
          <div className="text-blue-200 text-xs">Official Resident Services Portal</div>
        </div>
      </a>
      <nav className="hidden md:flex items-center gap-7 text-sm font-medium">
        {[['Home', './index.html'], ['Services', './services.html'], ['About', './about.html'], ['Contact', './contact.html']].map(([label, href]) => (
          <a key={label} href={href}
            className={`pb-0.5 transition ${label === 'Contact' ? 'text-vt-gold border-b-2 border-vt-gold' : 'hover:text-vt-gold'}`}>
            {label}
          </a>
        ))}
      </nav>
    </div>
  </header>
);

const Breadcrumb = () => (
  <div className="bg-white border-b border-gray-200">
    <div className="max-w-6xl mx-auto px-4 py-3 flex items-center gap-2 text-sm text-gray-500">
      <a href="./index.html" className="hover:text-vt-blue transition">Home</a>
      <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clipRule="evenodd" /></svg>
      <span className="text-gray-800 font-medium">Contact Us</span>
    </div>
  </div>
);

const botResponses = {
  'license': "I can help with that! For driver's license questions, you can renew online if your license expired within the last 12 months. Visit our License Renewal page or call DMV at 802-828-2000.",
  'benefit': "For benefit programs like SNAP, Medicaid, or Heating Assistance, please use our Benefits Screener to see what you may qualify for. You can also call 1-800-479-6151.",
  'renew': "License renewal takes about 10 minutes online. You'll need your current license, proof of Vermont residence, and a $35 fee. Shall I guide you to the renewal page?",
  'tax': "Vermont tax filing deadline is April 15. You can file online at myvermont.gov/taxes. For assistance, call the Dept. of Taxes at 802-828-2505.",
  'vote': "To register to vote, you must be a Vermont resident and US citizen. You can register online at mvp.vermont.gov or at your town clerk's office.",
  'hello': "Hello! I'm the Vermont State virtual assistant. I can help with services like license renewal, benefits, taxes, and more. What do you need today?",
  'hi': "Hi there! How can I help you access Vermont state services today?",
  'thanks': "You're welcome! Is there anything else I can help you with?",
  'default': "I can connect you with the right department for that. Could you provide a bit more detail, or would you like to be transferred to a live representative? Representatives are available Mon–Fri 8 AM–5 PM.",
};

const getBotResponse = (msg) => {
  const lower = msg.toLowerCase();
  for (const [key, val] of Object.entries(botResponses)) {
    if (lower.includes(key)) return val;
  }
  return botResponses['default'];
};

const LiveChat = () => {
  const [open, setOpen] = useState(false);
  const [input, setInput] = useState('');
  const [messages, setMessages] = useState([
    { from: 'bot', text: "Hello! I'm the Vermont State virtual assistant. How can I help you today?", time: 'Just now' },
  ]);
  const [typing, setTyping] = useState(false);
  const bottomRef = useRef(null);

  const now = () => {
    const d = new Date();
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  };

  const send = () => {
    if (!input.trim()) return;
    const userMsg = { from: 'user', text: input.trim(), time: now() };
    setMessages(m => [...m, userMsg]);
    setInput('');
    setTyping(true);
    setTimeout(() => {
      const reply = { from: 'bot', text: getBotResponse(userMsg.text), time: now() };
      setMessages(m => [...m, reply]);
      setTyping(false);
    }, 1200);
  };

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [messages, typing]);

  return (
    <div className="relative">
      {!open ? (
        <div className="bg-white rounded-2xl border-2 border-gray-100 shadow-sm p-6">
          <div className="flex items-center gap-3 mb-4">
            <div className="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center">
              <span className="text-2xl">💬</span>
            </div>
            <div>
              <div className="font-bold text-gray-800">Live Chat Support</div>
              <div className="flex items-center gap-1.5 text-xs text-gray-500">
                <span className="w-2 h-2 rounded-full bg-green-400 inline-block" />
                Representatives available now · Mon–Fri 8 AM–5 PM
              </div>
            </div>
          </div>
          <p className="text-sm text-gray-600 mb-5">Get instant help from a Vermont state representative or our virtual assistant — no hold music, no waiting.</p>
          <div className="grid grid-cols-2 gap-3 mb-5 text-sm">
            {[
              ['Average wait', '< 2 minutes'],
              ['Languages', 'EN · ES · FR · + more'],
              ['Availability', 'Mon–Fri 8 AM–5 PM'],
              ['Virtual agent', '24/7 available'],
            ].map(([k, v]) => (
              <div key={k} className="bg-gray-50 rounded-xl p-3">
                <div className="text-gray-400 text-xs mb-0.5">{k}</div>
                <div className="font-semibold text-gray-700 text-xs">{v}</div>
              </div>
            ))}
          </div>
          <button onClick={() => setOpen(true)} className="w-full bg-vt-blue text-white font-bold py-3 rounded-xl hover:bg-vt-dark transition text-sm">
            Start Chat →
          </button>
        </div>
      ) : (
        <div className="bg-white rounded-2xl border-2 border-gray-200 shadow-lg overflow-hidden">
          <div className="bg-vt-blue text-white px-5 py-4 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center text-lg">🤖</div>
              <div>
                <div className="font-bold text-sm">Vermont State Assistant</div>
                <div className="text-blue-200 text-xs flex items-center gap-1">
                  <span className="w-1.5 h-1.5 rounded-full bg-green-400 inline-block" /> Online · Responds instantly
                </div>
              </div>
            </div>
            <button onClick={() => setOpen(false)} className="text-blue-200 hover:text-white transition text-xl leading-none">×</button>
          </div>

          <div className="h-72 overflow-y-auto p-4 space-y-3 bg-gray-50">
            {messages.map((msg, i) => (
              <div key={i} className={`flex ${msg.from === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-xs px-4 py-2.5 rounded-2xl text-sm shadow-sm ${
                  msg.from === 'user' ? 'bg-vt-blue text-white rounded-br-sm' : 'bg-white text-gray-800 rounded-bl-sm border border-gray-100'
                }`}>
                  <p className="leading-relaxed">{msg.text}</p>
                  <div className={`text-xs mt-1 ${msg.from === 'user' ? 'text-blue-200 text-right' : 'text-gray-400'}`}>{msg.time}</div>
                </div>
              </div>
            ))}
            {typing && (
              <div className="flex justify-start">
                <div className="bg-white border border-gray-100 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">
                  <div className="flex gap-1 items-center">
                    {[0,1,2].map(i => (
                      <div key={i} className="w-2 h-2 bg-gray-300 rounded-full animate-bounce" style={{ animationDelay: `${i * 0.15}s` }} />
                    ))}
                  </div>
                </div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          <div className="p-3 border-t border-gray-100">
            <div className="flex gap-2">
              <input
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && send()}
                placeholder="Type your question..."
                className="flex-1 border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-vt-blue transition" />
              <button onClick={send} disabled={!input.trim()}
                className={`w-10 h-10 rounded-xl font-bold flex items-center justify-center transition ${input.trim() ? 'bg-vt-blue text-white hover:bg-vt-dark' : 'bg-gray-100 text-gray-300 cursor-not-allowed'}`}>
                ➤
              </button>
            </div>
            <div className="mt-2 flex flex-wrap gap-1.5">
              {["Renew license", "Apply for benefits", "Tax filing help"].map(s => (
                <button key={s} onClick={() => { setInput(s); }}
                  className="text-xs text-vt-blue border border-blue-200 px-2.5 py-1 rounded-full hover:bg-blue-50 transition">
                  {s}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const departments = [
  { name: 'General Assistance', phone: '1-800-VT-SERVES', hours: 'Mon–Fri 8 AM–5 PM', ext: '(1-800-887-3737)', icon: '🏛️' },
  { name: 'Dept. of Motor Vehicles', phone: '802-828-2000', hours: 'Mon–Fri 7:45 AM–4:30 PM', ext: '', icon: '🚗' },
  { name: 'Vermont Health Connect', phone: '1-855-899-9600', hours: 'Mon–Fri 8 AM–6 PM', ext: 'TTY: 1-855-789-9900', icon: '🏥' },
  { name: 'Dept. of Children & Families', phone: '1-800-479-6151', hours: 'Mon–Fri 7:45 AM–4:30 PM', ext: '', icon: '👨‍👩‍👧' },
  { name: 'Dept. of Labor', phone: '802-828-4000', hours: 'Mon–Fri 8 AM–4:30 PM', ext: '', icon: '💼' },
  { name: 'Agency of Education', phone: '802-828-3135', hours: 'Mon–Fri 7:45 AM–4:30 PM', ext: '', icon: '🎓' },
  { name: 'Dept. of Taxes', phone: '802-828-2505', hours: 'Mon–Fri 7:45 AM–4:30 PM', ext: 'Tax: 802-828-6802', icon: '💲' },
  { name: 'Secretary of State', phone: '802-828-2363', hours: 'Mon–Fri 7:45 AM–4:30 PM', ext: '', icon: '🗳️' },
];

const PhoneDirectory = () => (
  <div>
    <h2 className="text-2xl font-bold text-gray-800 mb-2">Department Helplines</h2>
    <p className="text-gray-500 text-sm mb-6">Direct phone numbers for all major state agencies. All numbers offer TTY/TRS support.</p>
    <div className="space-y-3">
      {departments.map(d => (
        <div key={d.name} className="bg-white rounded-2xl border border-gray-100 p-5 shadow-sm hover:shadow-md transition">
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div className="flex items-center gap-3">
              <span className="text-2xl">{d.icon}</span>
              <div>
                <div className="font-semibold text-gray-800 text-sm">{d.name}</div>
                <div className="text-xs text-gray-400 mt-0.5">{d.hours} {d.ext && `· ${d.ext}`}</div>
              </div>
            </div>
            <a href={`tel:${d.phone.replace(/\D/g, '')}`}
              className="bg-vt-light text-vt-blue font-bold text-sm px-4 py-2 rounded-xl hover:bg-blue-100 transition">
              {d.phone}
            </a>
          </div>
        </div>
      ))}
    </div>
  </div>
);

const MultilingualNotice = () => (
  <div className="bg-vt-blue text-white rounded-2xl p-7">
    <div className="flex items-center gap-3 mb-4">
      <span className="text-3xl">🌐</span>
      <div>
        <h3 className="font-bold text-lg">Multilingual Support</h3>
        <p className="text-blue-200 text-sm">Language assistance is free and available to all</p>
      </div>
    </div>
    <div className="grid sm:grid-cols-2 gap-3 mb-5">
      {[
        { lang: 'Español', note: 'Disponible para todos los servicios', flag: '🇲🇽' },
        { lang: 'Français', note: 'Disponible pour tous les services', flag: '🇫🇷' },
        { lang: 'Kirundi / Somali', note: 'Via interpreter — call ahead', flag: '🌍' },
        { lang: 'Other languages', note: '100+ via Language Line', flag: '💬' },
      ].map(l => (
        <div key={l.lang} className="bg-white/10 rounded-xl p-3 flex items-center gap-3">
          <span className="text-xl">{l.flag}</span>
          <div>
            <div className="font-semibold text-sm">{l.lang}</div>
            <div className="text-blue-200 text-xs">{l.note}</div>
          </div>
        </div>
      ))}
    </div>
    <p className="text-blue-200 text-sm">
      To request interpreter services, call <strong className="text-white">1-800-VT-SERVES</strong> and say <em>"interpreter"</em> in your language. Vermont is committed to language access under Title VI of the Civil Rights Act.
    </p>
  </div>
);

const FeedbackForm = () => {
  const [form, setForm] = useState({ type: '', page: '', rating: 0, message: '', email: '' });
  const [submitted, setSubmitted] = useState(false);

  const valid = form.type && form.rating > 0 && form.message.length > 10;

  if (submitted) {
    return (
      <div className="bg-green-50 border-2 border-green-200 rounded-2xl p-8 text-center">
        <div className="text-5xl mb-4">🙏</div>
        <h3 className="text-xl font-bold text-green-800 mb-2">Thank you for your feedback!</h3>
        <p className="text-green-700 text-sm mb-4">Your input helps us improve Vermont's digital services. We review every submission.</p>
        <button onClick={() => setSubmitted(false)} className="text-vt-blue text-sm font-semibold hover:underline">Submit another response</button>
      </div>
    );
  }

  return (
    <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-7">
      <h2 className="text-2xl font-bold text-gray-800 mb-2">Website Feedback</h2>
      <p className="text-gray-500 text-sm mb-7">Help us improve Vermont.gov. Your feedback is reviewed by our digital services team.</p>

      <div className="space-y-5">
        <div>
          <label className="block text-sm font-semibold text-gray-700 mb-2">Feedback Type <span className="text-red-500">*</span></label>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
            {['Suggestion', 'Bug Report', 'Compliment', 'Content Issue'].map(t => (
              <button key={t} onClick={() => setForm(f => ({ ...f, type: t }))}
                className={`py-2.5 rounded-xl text-xs font-semibold border-2 transition ${form.type === t ? 'border-vt-blue bg-vt-blue text-white' : 'border-gray-200 text-gray-600 hover:border-gray-300'}`}>
                {t}
              </button>
            ))}
          </div>
        </div>

        <div>
          <label className="block text-sm font-semibold text-gray-700 mb-2">Which page is this about?</label>
          <select value={form.page} onChange={e => setForm(f => ({ ...f, page: e.target.value }))}
            className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-700 focus:outline-none focus:border-vt-blue transition">
            <option value="">Select a page (optional)</option>
            {['Homepage', 'Services Overview', "Driver's License Renewal", 'Apply for Benefits', 'About Vermont', 'Contact Us', 'Other'].map(p => (
              <option key={p}>{p}</option>
            ))}
          </select>
        </div>

        <div>
          <label className="block text-sm font-semibold text-gray-700 mb-2">Overall Experience <span className="text-red-500">*</span></label>
          <div className="flex gap-2">
            {[1,2,3,4,5].map(n => (
              <button key={n} onClick={() => setForm(f => ({ ...f, rating: n }))}
                className={`w-12 h-12 rounded-xl font-bold text-xl transition ${form.rating >= n ? 'text-vt-gold' : 'text-gray-200 hover:text-gray-300'}`}>
                ★
              </button>
            ))}
            <span className="ml-2 text-sm text-gray-500 self-center">
              {form.rating === 0 ? 'No rating' : ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'][form.rating]}
            </span>
          </div>
        </div>

        <div>
          <label className="block text-sm font-semibold text-gray-700 mb-1.5">Your Message <span className="text-red-500">*</span></label>
          <textarea value={form.message} onChange={e => setForm(f => ({ ...f, message: e.target.value }))}
            rows={4} placeholder="Tell us what you experienced, what worked well, or how we can improve..."
            className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-vt-blue transition resize-none" />
          <div className="text-xs text-gray-400 text-right mt-1">{form.message.length}/500</div>
        </div>

        <div>
          <label className="block text-sm font-semibold text-gray-700 mb-1.5">Email (optional — for follow-up)</label>
          <input type="email" value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))}
            placeholder="you@example.com"
            className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-vt-blue transition" />
          <p className="text-xs text-gray-400 mt-1">Provide your email only if you'd like a response. We never share your information.</p>
        </div>

        <button onClick={() => valid && setSubmitted(true)}
          disabled={!valid}
          className={`w-full py-3.5 rounded-xl font-bold text-sm transition ${valid ? 'bg-vt-blue text-white hover:bg-vt-dark' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
          Submit Feedback
        </button>
      </div>
    </div>
  );
};

const Footer = () => (
  <footer className="bg-gray-900 text-gray-400 pt-12 pb-6">
    <div className="max-w-6xl mx-auto px-4">
      <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-8">
        <div>
          <div className="flex items-center gap-2.5 mb-3">
            <div className="w-8 h-8 rounded-full bg-vt-gold flex items-center justify-center">
              <span className="text-vt-dark font-black text-xs">VT</span>
            </div>
            <span className="text-white font-bold">State of Vermont</span>
          </div>
          <p className="text-sm leading-relaxed">Official resident services portal for Vermont state government.</p>
        </div>
        <div>
          <div className="text-white font-semibold mb-3 text-sm">Services</div>
          <ul className="space-y-2 text-sm">
            <li><a href="./license-renewal.html" className="hover:text-white transition">Driver's License Renewal</a></li>
            <li><a href="./benefits.html" className="hover:text-white transition">Apply for Benefits</a></li>
            <li><a href="./services.html" className="hover:text-white transition">All Services</a></li>
          </ul>
        </div>
        <div>
          <div className="text-white font-semibold mb-3 text-sm">Government</div>
          <ul className="space-y-2 text-sm">
            <li><a href="./about.html" className="hover:text-white transition">About Vermont</a></li>
            <li><a href="#" className="hover:text-white transition">Open Data</a></li>
            <li><a href="#" className="hover:text-white transition">Legislature</a></li>
          </ul>
        </div>
        <div>
          <div className="text-white font-semibold mb-3 text-sm">Help</div>
          <ul className="space-y-2 text-sm">
            <li><a href="./contact.html" className="hover:text-white transition">Contact Us</a></li>
            <li><a href="#" className="hover:text-white transition">Accessibility</a></li>
            <li><a href="#" className="hover:text-white transition">Privacy Policy</a></li>
          </ul>
        </div>
      </div>
      <div className="border-t border-gray-800 pt-5 flex flex-col sm:flex-row items-center justify-between text-xs text-gray-500 gap-2">
        <span>© 2026 State of Vermont. All rights reserved.</span>
        <span>Accessibility · Privacy · Terms</span>
      </div>
    </div>
  </footer>
);

const App = () => {
  const [lang, setLang] = useState('EN');
  return (
    <div className="min-h-screen flex flex-col">
      <Header lang={lang} setLang={setLang} />
      <Breadcrumb />
      <main className="flex-1">
        <div className="bg-vt-blue text-white py-10 px-4">
          <div className="max-w-6xl mx-auto">
            <h1 className="text-3xl font-bold mb-2">Contact Us</h1>
            <p className="text-blue-200">We're here to help. Reach Vermont state services through chat, phone, or written feedback.</p>
          </div>
        </div>

        <div className="max-w-6xl mx-auto px-4 py-12">
          <div className="grid lg:grid-cols-5 gap-10">
            <div className="lg:col-span-2 space-y-8">
              <div>
                <h2 className="text-xl font-bold text-gray-800 mb-4">Chat With Us</h2>
                <LiveChat />
              </div>
              <MultilingualNotice />
            </div>
            <div className="lg:col-span-3 space-y-10">
              <PhoneDirectory />
              <FeedbackForm />
            </div>
          </div>
        </div>
      </main>
      <Footer />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
