          <Header />

          {/* Page header */}
          <div className="bg-stone-100 border-b border-stone-200">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
              <nav className="text-xs text-stone-400 mb-2 flex items-center gap-1.5">
                <a href="index.html" className="hover:text-stone-600">Home</a>
                <span>/</span>
                <span className="text-stone-600">Shop All</span>
              </nav>
              <div className="flex items-end justify-between">
                <div>
                  <h1 className="text-2xl sm:text-3xl font-bold text-stone-900">Shop All</h1>
                  <p className="text-stone-500 text-sm mt-1">{filtered.length} styles found</p>
                </div>
                {/* Style Match Toggle */}
                <div className="flex items-center gap-3 bg-white border border-stone-200 rounded-xl px-4 py-2.5 shadow-sm">
                  <div>
                    <p className="text-xs font-semibold text-stone-800">Style Match</p>
                    <p className="text-xs text-stone-400">Show curated sets</p>
                  </div>
                  <button onClick={() => setStyleMatch(!styleMatch)}
                    className={`relative w-11 h-6 rounded-full transition-colors ${styleMatch ? 'bg-sage-600' : 'bg-stone-300'}`}>
                    <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all ${styleMatch ? 'left-5' : 'left-0.5'}`} />
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div className="flex gap-8">

              {/* Sidebar Filters */}
              <aside className="hidden lg:block w-60 flex-none">
                <div className="sticky top-24">
                  <div className="flex items-center justify-between mb-6">
                    <h2 className="font-semibold text-stone-900">Filters</h2>
                    {(selectedSizes.length + selectedColors.length + selectedMats.length > 0 || selectedCat !== 'All') > 0 && (
                      <button onClick={() => { setSelectedCat('All'); setSelectedSizes([]); setSelectedColors([]); setSelectedMats([]); setPriceMax(300); }}
                        className="text-xs text-sage-600 hover:text-sage-800 font-medium">Clear all</button>
                    )}
                  </div>

                  <FilterSection title="Clothing Type">
                    <div className="space-y-2">
                      {CATEGORIES.filter(c => c !== 'All').map(c => (
                        <label key={c} className="flex items-center gap-2.5 cursor-pointer group">
                          <input type="checkbox" checked={selectedCat === c}
                            onChange={() => setSelectedCat(selectedCat === c ? 'All' : c)}
                            className="w-4 h-4 rounded accent-sage-600 cursor-pointer" />
                          <span className="text-sm text-stone-600 group-hover:text-stone-900 transition-colors">{c}</span>
                        </label>
                      ))}
                    </div>
                  </FilterSection>

                  <FilterSection title="Size">
                    <div className="flex flex-wrap gap-2">
                      {SIZES.map(s => (
                        <button key={s} onClick={() => toggleArr(selectedSizes, setSelectedSizes, s)}
                          className={`px-3 py-1.5 text-xs font-medium rounded-lg border transition-colors ${
                            selectedSizes.includes(s) ? 'bg-stone-900 text-white border-stone-900' : 'border-stone-200 text-stone-600 hover:border-stone-400'
                          }`}>{s}</button>
                      ))}
                    </div>
                  </FilterSection>

                  <FilterSection title="Color">
                    <div className="grid grid-cols-4 gap-2">
                      {COLORS.map(c => (
                        <button key={c.name} onClick={() => toggleArr(selectedColors, setSelectedColors, c.name)}
                          title={c.name}
                          className={`w-8 h-8 rounded-full border-2 transition-all ${
                            selectedColors.includes(c.name) ? 'border-stone-800 scale-110' : 'border-transparent hover:border-stone-300'
                          }`}
                          style={{ background: c.hex }} />
                      ))}
                    </div>
                  </FilterSection>

                  <FilterSection title="Material">
                    <div className="space-y-2">
                      {MATERIALS.map(m => (
                        <label key={m} className="flex items-center gap-2.5 cursor-pointer group">
                          <input type="checkbox" checked={selectedMats.includes(m)}
                            onChange={() => toggleArr(selectedMats, setSelectedMats, m)}
                            className="w-4 h-4 rounded accent-sage-600 cursor-pointer" />
                          <span className="text-sm text-stone-600 group-hover:text-stone-900 transition-colors">{m}</span>
                        </label>
                      ))}
                    </div>
                  </FilterSection>

                  <FilterSection title="Price Range">
                    <div>
                      <div className="flex justify-between text-xs text-stone-500 mb-2">
                        <span>$0</span>
                        <span className="font-semibold text-stone-800">Up to ${priceMax}</span>
                      </div>
                      <input type="range" min={20} max={300} step={10} value={priceMax}
                        onChange={e => setPriceMax(+e.target.value)}
                        className="w-full accent-sage-600" />
                    </div>
                  </FilterSection>
                </div>
              </aside>

              {/* Main Content */}
              <div className="flex-1 min-w-0">
                {/* Toolbar */}
                <div className="flex items-center justify-between mb-6 pb-4 border-b border-stone-100">
                  <div className="flex items-center gap-2">
                    <button onClick={() => setFiltersOpen(true)} className="lg:hidden flex items-center gap-1.5 border border-stone-300 rounded-lg px-3 py-2 text-sm text-stone-600 hover:bg-stone-50">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z" />
                      </svg>
                      Filters
                    </button>
                    {/* Category quick filters */}
                    <div className="hidden sm:flex gap-2 flex-wrap">
                      {CATEGORIES.map(c => (
                        <button key={c} onClick={() => setSelectedCat(c)}
                          className={`px-3 py-1.5 text-xs font-medium rounded-full border transition-colors ${
                            selectedCat === c ? 'bg-stone-900 text-white border-stone-900' : 'border-stone-200 text-stone-600 hover:border-stone-400 hover:text-stone-900'
                          }`}>{c}</button>
                      ))}
                    </div>
                  </div>

                  <div className="flex items-center gap-3">
                    <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                      className="text-sm border border-stone-200 rounded-lg px-3 py-2 outline-none text-stone-700 bg-white">
                      <option value="featured">Featured</option>
                      <option value="newest">Newest</option>
                      <option value="price-asc">Price: Low–High</option>
                      <option value="price-desc">Price: High–Low</option>
                      <option value="rating">Top Rated</option>
                    </select>
                    <div className="hidden sm:flex gap-1">
                      <button onClick={() => setViewMode('grid')} className={`p-2 rounded-lg ${viewMode === 'grid' ? 'bg-stone-100 text-stone-900' : 'text-stone-400 hover:text-stone-600'}`}>
                        <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                          <path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                        </svg>
                      </button>
                      <button onClick={() => setViewMode('large')} className={`p-2 rounded-lg ${viewMode === 'large' ? 'bg-stone-100 text-stone-900' : 'text-stone-400 hover:text-stone-600'}`}>
                        <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                          <path d="M3 4a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 13a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1v-4zM12 4a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V5a1 1 0 00-1-1h-4zM12 13a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1v-4a1 1 0 00-1-1h-4z" />
                        </svg>
                      </button>
                    </div>
                  </div>
                </div>

                {styleMatch ? (
                  <div>
                    <div className="mb-6 p-4 bg-sage-50 border border-sage-200 rounded-xl">
                      <p className="text-sm font-semibold text-sage-800 mb-1">Style Match is On</p>
                      <p className="text-xs text-sage-600">Showing products as curated outfit sets. Shop each look together or pick individual pieces.</p>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                      {outfits.map((o,i) => <OutfitCard key={i} outfit={o} />)}
                    </div>
                  </div>
                ) : (
                  filtered.length > 0 ? (
                    <ProductGrid products={filtered} viewMode={viewMode} />
                  ) : (
                    <div className="text-center py-20">
                      <p className="text-stone-400 text-sm mb-4">No styles match your current filters.</p>
                      <button onClick={() => { setSelectedCat('All'); setSelectedSizes([]); setSelectedColors([]); setSelectedMats([]); setPriceMax(300); }}
                        className="text-sm font-medium text-sage-600 hover:text-sage-800">Clear all filters</button>
                    </div>
                  )
                )}
              </div>
            </div>
          </div>

          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
