<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreadHouse — Wear What You Stand For</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: {
              50: '#f2f5ee', 100: '#e4ecdc', 200: '#c9d9bc',
              300: '#a5bf96', 400: '#7da372', 500: '#5d8752',
              600: '#486b3f', 700: '#3a5532', 800: '#304629', 900: '#293c23'

          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Playfair Display', 'Georgia', 'serif']
          }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #fafaf8; }
    .font-serif { font-family: 'Playfair Display', serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef } = React;

    function AnnouncementBar() {
      return (
        <div className="bg-stone-800 text-stone-300 text-center text-xs py-2.5 tracking-wide font-light">
          Free shipping on orders over $75&nbsp;&nbsp;&middot;&nbsp;&nbsp;Sustainable packaging&nbsp;&nbsp;&middot;&nbsp;&nbsp;B Corp Certified
        </div>
      );
    }

    function Header({ active = 'home' }) {
      const [searchOpen, setSearchOpen] = useState(false);
      const navItems = [
        { label: 'Home', href: 'index.html', key: 'home' },
        { label: 'Shop All', href: 'products.html', key: 'shop' },
        { label: 'New Arrivals', href: 'products.html', key: 'new' },
        { label: 'Sale', href: '#', key: 'sale' },
        { label: 'Our Story', href: '#', key: 'story' },
      ];
      return (
        <header className="bg-white border-b border-stone-200 sticky top-0 z-50 shadow-sm">
          <AnnouncementBar />
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16">
              <a href="index.html" className="text-xl font-bold tracking-tight flex-none">
                <span className="text-stone-900">Thread</span><span className="text-sage-600">House</span>
              </a>
              <nav className="hidden md:flex items-center gap-7 text-sm font-medium">
                {navItems.map(n => (
                  <a key={n.key} href={n.href}
                    className={`transition-colors pb-0.5 ${active === n.key ? 'text-stone-900 border-b-2 border-sage-600' : 'text-stone-500 hover:text-stone-900'}`}>
                    {n.label}
                  </a>
                ))}
              </nav>
              <div className="flex items-center gap-0.5">
                {searchOpen ? (
                  <div className="flex items-center gap-2 border border-stone-200 rounded-full px-3 py-1.5 bg-stone-50">
                    <svg className="w-4 h-4 text-stone-400 flex-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input autoFocus className="w-44 text-sm outline-none bg-transparent placeholder-stone-400" placeholder="Search styles..." />
                    <button onClick={() => setSearchOpen(false)} className="text-stone-400 hover:text-stone-600 text-xl leading-none">&times;</button>
                  </div>
                ) : (
                  <button onClick={() => setSearchOpen(true)} className="p-2 text-stone-500 hover:text-stone-900 transition-colors">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                  </button>
                )}
                <a href="cart.html" className="relative p-2 text-stone-500 hover:text-stone-900 transition-colors">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 7H4l1-7z" />
                  </svg>
                  <span className="absolute top-1 right-1 bg-sage-600 text-white text-[9px] w-3.5 h-3.5 rounded-full flex items-center justify-center font-bold leading-none">2</span>
                </a>
                <a href="account.html" className="p-2 text-stone-500 hover:text-stone-900 transition-colors">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="bg-stone-900 text-stone-400">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-10 mb-12">
              <div className="col-span-2 sm:col-span-1">
                <div className="text-white text-xl font-bold mb-3">Thread<span className="text-sage-400">House</span></div>
                <p className="text-sm text-stone-500 leading-relaxed mb-5">
                  Sustainable fashion for independent minds. Every piece tells a story worth wearing.
                </p>
                <div className="flex gap-2">
                  {['IG', 'TK', 'PT', 'TW'].map(s => (
                    <div key={s} className="w-8 h-8 rounded-full bg-stone-700 hover:bg-stone-600 flex items-center justify-center text-xs font-medium cursor-pointer transition-colors">{s}</div>
                  ))}
                </div>
              </div>
              <div>
                <h4 className="text-white text-xs font-semibold uppercase tracking-[0.15em] mb-5">Shop</h4>
                <ul className="space-y-3 text-sm">
                  {['New Arrivals', 'Tops', 'Bottoms', 'Outerwear', 'Accessories', 'Sale', 'Gift Cards'].map(l => (
                    <li key={l}><a href="products.html" className="hover:text-white transition-colors">{l}</a></li>
                  ))}
                </ul>
              </div>
              <div>
                <h4 className="text-white text-xs font-semibold uppercase tracking-[0.15em] mb-5">Support</h4>
                <ul className="space-y-3 text-sm">
                  {['Size Guide', 'Shipping & Returns', 'Track Your Order', 'FAQ', 'Contact Us', 'Sustainability'].map(l => (
                    <li key={l}><a href="#" className="hover:text-white transition-colors">{l}</a></li>
                  ))}
                </ul>
              </div>
              <div>
                <h4 className="text-white text-xs font-semibold uppercase tracking-[0.15em] mb-5">Stay in the Loop</h4>
                <p className="text-sm text-stone-500 mb-4">New drops and sustainable stories — weekly.</p>
                <div className="flex gap-2">
                  <input type="email" placeholder="your@email.com"
                    className="flex-1 min-w-0 bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-sm text-white placeholder-stone-600 outline-none focus:border-sage-600 transition-colors" />
                  <button className="bg-sage-600 hover:bg-sage-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap">Join</button>
                </div>
              </div>
            </div>
            <div className="border-t border-stone-800 pt-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-stone-600">
              <p>© 2026 ThreadHouse. All rights reserved.</p>
              <div className="flex gap-5">
                {['Privacy', 'Terms', 'Accessibility', 'Sustainability Report'].map(l => (
                  <a key={l} href="#" className="hover:text-stone-400 transition-colors">{l}</a>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );

    function ProductCard({ product }) {
      const [wishlisted, setWishlisted] = useState(false);
      const colorMap = { 'd4dbc9': '#d4dbc9', 'f0e8d8': '#f0e8d8', 'dfc4b0': '#dfc4b0', 'f2f0ed': '#f2f0ed', 'c4cfc0': '#c4cfc0', 'e8dfc8': '#e8dfc8', 'd0d9c4': '#d0d9c4', 'f5f0e8': '#f5f0e8' };
      return (
        <a href="product-detail.html" className="group block">
          <div className="relative overflow-hidden rounded-2xl aspect-[3/4] mb-3" style={{ background: `#${product.imgBg}` }}>
            <div className="absolute inset-0 flex items-end justify-center pb-6">
              <span className="text-xs text-center font-medium px-3" style={{ color: `#${product.imgText}` }}>{product.name}</span>
            </div>
            {product.badge && (
              <span className={`absolute top-3 left-3 text-xs font-semibold px-2.5 py-1 rounded-full ${
                product.badge === 'Low Stock' ? 'bg-amber-100 text-amber-800' :
                product.badge === 'New' ? 'bg-sage-100 text-sage-700' :
                'bg-stone-800 text-white'
              }`}>{product.badge}</span>
            )}
            <button onClick={e => { e.preventDefault(); setWishlisted(!wishlisted); }}
              className="absolute top-3 right-3 p-2 bg-white rounded-full shadow opacity-0 group-hover:opacity-100 transition-opacity">
              <svg className={`w-4 h-4 ${wishlisted ? 'text-rose-500' : 'text-stone-400'}`} fill={wishlisted ? 'currentColor' : 'none'} stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
              </svg>
            </button>
          </div>
          <p className="text-xs text-stone-400 mb-0.5">{product.category}</p>
          <h3 className="text-sm font-medium text-stone-800 group-hover:text-sage-700 transition-colors leading-snug">{product.name}</h3>
          <p className="text-sm font-semibold text-stone-900 mt-1">${product.price}</p>
        </a>
      );
    }

    function App() {
      const newArrivals = [
        { id: 1, name: 'Oversized Linen Shirt', price: 89, category: 'Tops', badge: 'Low Stock', imgBg: 'd4dbc9', imgText: '3d5a2c' },
        { id: 2, name: 'Wide Leg Trouser', price: 112, category: 'Bottoms', badge: 'New', imgBg: 'f0e8d8', imgText: '7a5c3a' },
        { id: 3, name: 'Cropped Knit Cardigan', price: 95, category: 'Knitwear', badge: null, imgBg: 'dfc4b0', imgText: '7a3c2a' },
        { id: 4, name: 'Organic Cotton Tee', price: 38, category: 'Tops', badge: 'New', imgBg: 'f2f0ed', imgText: '5a5a5a' },
        { id: 5, name: 'Wrap Midi Skirt', price: 78, category: 'Bottoms', badge: 'Low Stock', imgBg: 'c4cfc0', imgText: '2d4a30' },
        { id: 6, name: 'Linen Blazer', price: 145, category: 'Outerwear', badge: null, imgBg: 'e8dfc8', imgText: '6a5a3a' },
        { id: 7, name: 'Slip Dress', price: 92, category: 'Dresses', badge: 'Low Stock', imgBg: 'd0d9c4', imgText: '3d5a2c' },
        { id: 8, name: 'Ribbed Tank', price: 32, category: 'Tops', badge: 'New', imgBg: 'f5f0e8', imgText: '8a7a6a' },
      ];
      const moods = [
        { name: 'Minimalist', desc: 'Clean lines, quiet luxury', bg: '#e8e5e0', text: '#6a6460' },
        { name: 'Streetwear', desc: 'Bold cuts, urban edge', bg: '#3a3530', text: '#c8c4b8' },
        { name: 'Workwear', desc: 'Polished, intentional', bg: '#d8dce4', text: '#4a5060' },
        { name: 'Weekend', desc: 'Effortless comfort', bg: '#f2e8d0', text: '#8a6a3a' },
      ];
      const scrollRef = useRef(null);
      const scroll = dir => {
        if (scrollRef.current) scrollRef.current.scrollBy({ left: dir * 300, behavior: 'smooth' });
      };

      return (
        <div className="min-h-screen">
          <Header active="home" />

          {/* Hero */}
          <section className="relative h-screen min-h-[640px] overflow-hidden flex items-center justify-center"
            style={{ background: 'linear-gradient(145deg, #2d3a2a 0%, #1e2a1c 40%, #3a4530 100%)' }}>
            <div className="absolute inset-0 opacity-10"
              style={{ backgroundImage: 'radial-gradient(circle at 30% 70%, #6b8a50 0%, transparent 60%), radial-gradient(circle at 80% 20%, #4a6040 0%, transparent 50%)' }} />
            <div className="absolute top-1/4 right-1/4 w-80 h-80 rounded-full opacity-10 blur-3xl" style={{ background: '#7da372' }} />
            <div className="absolute bottom-1/4 left-1/4 w-96 h-96 rounded-full opacity-10 blur-3xl" style={{ background: '#5d8752' }} />

            <div className="relative text-center text-white px-4 max-w-4xl">
              <p className="text-xs sm:text-sm font-light tracking-[0.45em] uppercase text-stone-400 mb-6">
                Spring 2026 Collection
              </p>
              <h1 className="font-serif text-5xl sm:text-7xl lg:text-8xl font-bold leading-[1.05] mb-6">
                Wear What<br />
                <span className="italic text-sage-300">You Stand For</span>
              </h1>
              <p className="text-stone-300 text-base sm:text-lg font-light mb-10 max-w-lg mx-auto leading-relaxed">
                Independently designed, sustainably made, ethically priced — new season, same values.
              </p>
              <div className="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="products.html" className="bg-white text-stone-900 px-9 py-3.5 rounded-full font-semibold text-sm hover:bg-stone-100 transition-colors shadow-lg">
                  Shop the Collection
                </a>
                <a href="#mission" className="border border-white/40 text-white px-9 py-3.5 rounded-full font-medium text-sm hover:bg-white/10 transition-colors backdrop-blur-sm">
                  Our Story
                </a>
              </div>
            </div>

            <div className="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 text-stone-500">
              <span className="text-[10px] tracking-[0.3em] uppercase">Scroll</span>
              <div className="w-px h-8 bg-stone-600 animate-pulse" />
            </div>
          </section>

          {/* Shop by Mood */}
          <section className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
            <div className="text-center mb-12">
              <p className="text-xs font-semibold tracking-[0.3em] uppercase text-sage-600 mb-2">Discover Your Style</p>
              <h2 className="text-3xl sm:text-4xl font-bold text-stone-900">Shop by Mood</h2>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              {moods.map(mood => (
                <a key={mood.name} href="products.html"
                  className="group relative overflow-hidden rounded-2xl aspect-[3/4] flex items-end cursor-pointer"
                  style={{ background: mood.bg }}>
                  <div className="absolute inset-0 flex items-center justify-center opacity-20">
                    <div className="w-3/4 h-3/4 rounded-xl border-2" style={{ borderColor: mood.text }} />
                  </div>
                  <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-black/10 to-transparent group-hover:from-black/70 transition-colors" />
                  <div className="relative p-5">
                    <h3 className="text-white font-bold text-lg mb-0.5">{mood.name}</h3>
                    <p className="text-white/60 text-xs mb-3">{mood.desc}</p>
                    <span className="text-white/70 text-xs font-medium border-b border-white/30 group-hover:border-white group-hover:text-white transition-colors">
                      Explore &rarr;
                    </span>
                  </div>
                </a>
              ))}
            </div>
          </section>

          {/* New Arrivals */}
          <section className="bg-stone-50 py-20">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex items-end justify-between mb-10">
                <div>
                  <p className="text-xs font-semibold tracking-[0.3em] uppercase text-sage-600 mb-2">Just Dropped</p>
                  <h2 className="text-3xl sm:text-4xl font-bold text-stone-900">New Arrivals</h2>
                </div>
                <div className="flex items-center gap-4">
                  <div className="hidden sm:flex gap-2">
                    <button onClick={() => scroll(-1)} className="w-9 h-9 rounded-full border border-stone-300 flex items-center justify-center text-stone-600 hover:bg-stone-100 transition-colors">&larr;</button>
                    <button onClick={() => scroll(1)} className="w-9 h-9 rounded-full border border-stone-300 flex items-center justify-center text-stone-600 hover:bg-stone-100 transition-colors">&rarr;</button>
                  </div>
                  <a href="products.html" className="text-sm font-medium text-stone-600 hover:text-stone-900 transition-colors hidden sm:block">View all &rarr;</a>
                </div>
              </div>
              <div ref={scrollRef} className="flex gap-5 overflow-x-auto scrollbar-hide pb-4 -mx-4 px-4">
                {newArrivals.map(p => (
                  <div key={p.id} className="flex-none w-52 sm:w-60">
                    <ProductCard product={p} />
                  </div>
                ))}
              </div>
              <div className="mt-6 sm:hidden text-center">
                <a href="products.html" className="text-sm font-medium text-stone-600">View all new arrivals &rarr;</a>
              </div>
            </div>
          </section>

          {/* Value props strip */}
          <section className="border-y border-stone-200 bg-white">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                {[
                  { symbol: '♻', title: 'Sustainably Made', desc: 'Organic & recycled materials only' },
                  { symbol: '✦', title: 'Independent Designers', desc: '120+ creators in our community' },
                  { symbol: '↩', title: 'Free Returns', desc: '30-day no-hassle returns' },
                  { symbol: '◇', title: 'Carbon Neutral', desc: 'Offset on every order placed' },
                ].map(f => (
                  <div key={f.title}>
                    <div className="text-2xl mb-3 text-sage-500">{f.symbol}</div>
                    <h4 className="font-semibold text-stone-800 text-sm mb-1">{f.title}</h4>
                    <p className="text-xs text-stone-500">{f.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Brand Story */}
          <section id="mission" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24">
            <div className="grid md:grid-cols-2 gap-16 items-center">
              <div className="order-2 md:order-1">
                <p className="text-xs font-semibold tracking-[0.3em] uppercase text-sage-600 mb-4">Who We Are</p>
                <h2 className="font-serif text-3xl sm:text-4xl font-bold text-stone-900 mb-6 leading-tight">
                  Fashion with a<br /><span className="italic text-sage-700">clear conscience</span>
                </h2>
                <p className="text-stone-500 leading-relaxed mb-4">
                  ThreadHouse started in 2020 when we couldn't find fashion that matched our values. We wanted clothes made by people paid fairly, from materials that don't cost the earth — literally.
                </p>
                <p className="text-stone-500 leading-relaxed mb-8">
                  Every piece in our collection is independently designed, responsibly sourced, and built to last beyond seasons. When you buy from ThreadHouse, you're not just buying clothes — you're voting for a different kind of industry.
                </p>
                <div className="flex items-center gap-6">
                  <a href="#" className="inline-flex items-center gap-2 bg-stone-900 text-white px-7 py-3.5 rounded-full font-semibold text-sm hover:bg-stone-700 transition-colors">
                    Our Mission
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 8l4 4m0 0l-4 4m4-4H3" />
                    </svg>
                  </a>
                  <div className="text-sm text-stone-400">
                    <span className="font-bold text-stone-900 text-lg">4,200+</span><br />
                    5-star reviews
                  </div>
                </div>
              </div>
              <div className="order-1 md:order-2 grid grid-cols-2 gap-4">
                <div className="rounded-2xl overflow-hidden aspect-[3/4]" style={{ background: '#d4dbc9' }}>
                  <div className="w-full h-full flex items-center justify-center p-6 text-center">
                    <p className="text-sm font-medium" style={{ color: '#3d5a2c' }}>ThreadHouse<br />Spring Story</p>
                  </div>
                </div>
                <div className="rounded-2xl overflow-hidden aspect-[3/4] mt-8" style={{ background: '#e8e0d4' }}>
                  <div className="w-full h-full flex items-center justify-center p-6 text-center">
                    <p className="text-sm font-medium" style={{ color: '#6a5040' }}>Sustainable<br />Craft</p>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Sale Banner */}
          <section className="py-16 text-center text-white" style={{ background: '#3a5532' }}>
            <p className="text-xs tracking-[0.4em] uppercase text-sage-300 mb-3">Limited Time</p>
            <h2 className="text-3xl sm:text-4xl font-bold mb-4">Spring Essentials — Up to 30% Off</h2>
            <p className="text-sage-200 text-sm mb-8 max-w-sm mx-auto">A curated selection of season favorites at introductory prices. Ends March 31.</p>
            <a href="products.html" className="inline-block bg-white text-stone-900 px-9 py-3.5 rounded-full font-semibold text-sm hover:bg-stone-100 transition-colors">
              Shop the Sale
            </a>
          </section>

          {/* Instagram strip */}
          <section className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            <div className="text-center mb-8">
              <p className="text-xs font-semibold tracking-[0.3em] uppercase text-sage-600 mb-2">Community</p>
              <h2 className="text-2xl font-bold text-stone-900">#WearThreadHouse</h2>
              <p className="text-stone-500 text-sm mt-2">Tag your looks for a chance to be featured</p>
            </div>
            <div className="grid grid-cols-3 sm:grid-cols-6 gap-2">
              {['d8dfc8', 'f0e4d0', 'e0dbd4', 'c8d4c4', 'f0e8dc', 'dcd4cc'].map((c, i) => (
                <div key={i} className="aspect-square rounded-xl overflow-hidden cursor-pointer group relative"
                  style={{ background: `#${c}` }}>
                  <div className="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors flex items-center justify-center">
                    <span className="text-white opacity-0 group-hover:opacity-100 transition-opacity text-xs font-medium">View</span>
                  </div>
                </div>
              ))}
            </div>
          </section>

          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
