<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oversized Linen Shirt — ThreadHouse</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: {
              50: '#f2f5ee', 100: '#e4ecdc', 200: '#c9d9bc',
              300: '#a5bf96', 400: '#7da372', 500: '#5d8752',
              600: '#486b3f', 700: '#3a5532', 800: '#304629', 900: '#293c23'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Playfair Display', 'Georgia', 'serif']
          }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', system-ui, sans-serif; background: #fafaf8; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    function AnnouncementBar() {
      return (
        <div className="bg-stone-800 text-stone-300 text-center text-xs py-2.5 tracking-wide font-light">
          Free shipping on orders over $75&nbsp;&nbsp;&middot;&nbsp;&nbsp;Sustainable packaging&nbsp;&nbsp;&middot;&nbsp;&nbsp;B Corp Certified
        </div>
      );
    }

    function Header() {
      const [searchOpen, setSearchOpen] = useState(false);
      return (
        <header className="bg-white border-b border-stone-200 sticky top-0 z-50 shadow-sm">
          <AnnouncementBar />
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16">
              <a href="index.html" className="text-xl font-bold tracking-tight">
                <span className="text-stone-900">Thread</span><span className="text-sage-600">House</span>
              </a>
              <nav className="hidden md:flex items-center gap-7 text-sm font-medium">
                {[['Home','index.html'],['Shop All','products.html'],['New Arrivals','products.html'],['Sale','#'],['Our Story','#']].map(([l,h]) => (
                  <a key={l} href={h} className="text-stone-500 hover:text-stone-900 transition-colors">{l}</a>
                ))}
              </nav>
              <div className="flex items-center gap-0.5">
                {searchOpen ? (
                  <div className="flex items-center gap-2 border border-stone-200 rounded-full px-3 py-1.5 bg-stone-50">
                    <svg className="w-4 h-4 text-stone-400 flex-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    <input autoFocus className="w-44 text-sm outline-none bg-transparent placeholder-stone-400" placeholder="Search styles..." />
                    <button onClick={() => setSearchOpen(false)} className="text-stone-400 hover:text-stone-600 text-xl leading-none">&times;</button>
                  </div>
                ) : (
                  <button onClick={() => setSearchOpen(true)} className="p-2 text-stone-500 hover:text-stone-900">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                  </button>
                )}
                <a href="cart.html" className="relative p-2 text-stone-500 hover:text-stone-900">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 7H4l1-7z" /></svg>
                  <span className="absolute top-1 right-1 bg-sage-600 text-white text-[9px] w-3.5 h-3.5 rounded-full flex items-center justify-center font-bold">2</span>
                </a>
                <a href="account.html" className="p-2 text-stone-500 hover:text-stone-900">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                </a>
              </div>
            </div>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="bg-stone-900 text-stone-400 mt-20">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-10 mb-12">
              <div className="col-span-2 sm:col-span-1">
                <div className="text-white text-xl font-bold mb-3">Thread<span className="text-sage-400">House</span></div>
                <p className="text-sm text-stone-500 leading-relaxed mb-5">Sustainable fashion for independent minds.</p>
                <div className="flex gap-2">
                  {['IG','TK','PT','TW'].map(s => <div key={s} className="w-8 h-8 rounded-full bg-stone-700 hover:bg-stone-600 flex items-center justify-center text-xs font-medium cursor-pointer transition-colors">{s}</div>)}
                </div>
              </div>
              <div>
                <h4 className="text-white text-xs font-semibold uppercase tracking-[0.15em] mb-5">Shop</h4>
                <ul className="space-y-3 text-sm">
                  {['New Arrivals','Tops','Bottoms','Outerwear','Accessories','Sale'].map(l => <li key={l}><a href="products.html" className="hover:text-white transition-colors">{l}</a></li>)}
                </ul>
              </div>
              <div>
                <h4 className="text-white text-xs font-semibold uppercase tracking-[0.15em] mb-5">Support</h4>
                <ul className="space-y-3 text-sm">
                  {['Size Guide','Shipping & Returns','Track Order','FAQ','Contact Us'].map(l => <li key={l}><a href="#" className="hover:text-white transition-colors">{l}</a></li>)}
                </ul>
              </div>
              <div>
                <h4 className="text-white text-xs font-semibold uppercase tracking-[0.15em] mb-5">Newsletter</h4>
                <p className="text-sm text-stone-500 mb-4">New drops and sustainable stories.</p>
                <div className="flex gap-2">
                  <input type="email" placeholder="your@email.com" className="flex-1 min-w-0 bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-sm text-white placeholder-stone-600 outline-none" />
                  <button className="bg-sage-600 hover:bg-sage-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Join</button>
                </div>
              </div>
            </div>
            <div className="border-t border-stone-800 pt-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-stone-600">
              <p>© 2026 ThreadHouse. All rights reserved.</p>
              <div className="flex gap-5">{['Privacy','Terms','Accessibility'].map(l => <a key={l} href="#" className="hover:text-stone-400">{l}</a>)}</div>
            </div>
          </div>
        </footer>
      );
    }

    const COLORS = [
      { name: 'Sage Green', hex: '#8aaa78', bg: 'd4dbc9', tc: '3d5a2c' },
      { name: 'Natural',    hex: '#e8dfc8', bg: 'f0e8d8', tc: '7a6040' },
      { name: 'White',      hex: '#f0f0ec', bg: 'f5f4f0', tc: '888878' },
    ];
    const SIZES = ['XS', 'S', 'M', 'L', 'XL'];
    const SIZE_GUIDE = [
      { size: 'XS', bust: '30–32"', waist: '24–26"', hip: '34–36"' },
      { size: 'S',  bust: '32–34"', waist: '26–28"', hip: '36–38"' },
      { size: 'M',  bust: '34–36"', waist: '28–30"', hip: '38–40"' },
      { size: 'L',  bust: '36–38"', waist: '30–32"', hip: '40–42"' },
      { size: 'XL', bust: '38–40"', waist: '32–34"', hip: '42–44"' },
    ];
    const PHOTOS = [
      { bg: 'd4dbc9', label: 'Front view' },
      { bg: 'c8d4c0', label: 'Back view' },
      { bg: 'dce4d4', label: 'Detail shot' },
      { bg: 'e4ecdc', label: 'Lifestyle' },
    ];
    const COMPLETE_LOOK = [
      { name: 'Wide Leg Trouser',    price: 112, bg: 'f0e8d8' },
      { name: 'Structured Tote',     price: 75,  bg: 'e8dfc8' },
      { name: 'Linen Blazer',        price: 145, bg: 'e8dfc8' },
    ];
    const REVIEWS = [
      { name: 'Mara K.', rating: 5, date: 'Mar 18, 2026', size: 'M', verified: true, text: 'Absolutely love this shirt. The linen is so breathable and the sage color is exactly as pictured. True to size — I\'m usually a medium and the oversized fit is perfect without being too boxy.', imgBg: 'c4d4b8' },
      { name: 'Priya S.', rating: 5, date: 'Mar 11, 2026', size: 'S', verified: true, text: 'Third piece I\'ve bought from ThreadHouse and I keep coming back. Quality is unmatched at this price point. The fabric gets softer with every wash too.', imgBg: 'd8e4cc' },
      { name: 'Jordan L.', rating: 4, date: 'Feb 28, 2026', size: 'L', verified: true, text: 'Great shirt, very versatile. I sized up for an even more relaxed fit. Only thing is the sleeves could be slightly longer for my taste, but that\'s personal preference.', imgBg: 'dce8d0' },
    ];

    function StarRating({ n, interactive = false, value = 0, onChange }) {
      const [hover, setHover] = useState(0);
      return (
        <div className="flex gap-0.5">
          {[1,2,3,4,5].map(i => (
            <svg key={i} onClick={() => interactive && onChange && onChange(i)}
              onMouseEnter={() => interactive && setHover(i)}
              onMouseLeave={() => interactive && setHover(0)}
              className={`w-4 h-4 ${(interactive ? (hover || value) : n) >= i ? 'text-amber-400' : 'text-stone-200'} ${interactive ? 'cursor-pointer' : ''}`}
              fill="currentColor" viewBox="0 0 20 20">
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
            </svg>
          ))}
        </div>
      );
    }

    function App() {
      const [selectedColor, setSelectedColor] = useState(0);
      const [selectedSize, setSelectedSize] = useState('');
      const [qty, setQty] = useState(1);
      const [activePhoto, setActivePhoto] = useState(0);
      const [activeTab, setActiveTab] = useState('description');
      const [showSizeGuide, setShowSizeGuide] = useState(false);
      const [added, setAdded] = useState(false);
      const [wishlisted, setWishlisted] = useState(false);
      const [sizeError, setSizeError] = useState(false);

      const handleAddToCart = () => {
        if (!selectedSize) { setSizeError(true); return; }
        setSizeError(false);
        setAdded(true);
        setTimeout(() => setAdded(false), 2500);
      };

      return (
        <div className="min-h-screen">
          <Header />

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {/* Breadcrumb */}
            <nav className="text-xs text-stone-400 mb-8 flex items-center gap-1.5">
              <a href="index.html" className="hover:text-stone-600">Home</a>
              <span>/</span>
              <a href="products.html" className="hover:text-stone-600">Shop All</a>
              <span>/</span>
              <a href="products.html" className="hover:text-stone-600">Tops</a>
              <span>/</span>
              <span className="text-stone-600">Oversized Linen Shirt</span>
            </nav>

            <div className="grid lg:grid-cols-2 gap-10 xl:gap-16">

              {/* Gallery */}
              <div className="flex gap-4">
                {/* Thumbnails */}
                <div className="flex flex-col gap-3 flex-none">
                  {PHOTOS.map((p, i) => (
                    <button key={i} onClick={() => setActivePhoto(i)}
                      className={`w-16 h-20 rounded-xl overflow-hidden border-2 transition-colors ${activePhoto === i ? 'border-stone-800' : 'border-transparent hover:border-stone-300'}`}
                      style={{ background: `#${p.bg}` }}>
                      <div className="w-full h-full flex items-end justify-center pb-1.5">
                        <span className="text-[8px] text-center opacity-40 font-medium" style={{ color: '#3d5a2c' }}>{p.label}</span>
                      </div>
                    </button>
                  ))}
                </div>
                {/* Main image */}
                <div className="flex-1 rounded-2xl overflow-hidden aspect-[3/4] relative" style={{ background: `#${PHOTOS[activePhoto].bg}` }}>
                  <div className="absolute inset-0 flex flex-col items-center justify-center gap-4">
                    <div className="w-32 h-48 rounded-xl border-2 border-dashed opacity-20" style={{ borderColor: '#3d5a2c' }} />
                    <span className="text-sm font-medium opacity-40" style={{ color: '#3d5a2c' }}>
                      {PHOTOS[activePhoto].label}
                    </span>
                  </div>
                  <div className="absolute top-4 left-4">
                    <span className="bg-amber-100 text-amber-800 text-xs font-semibold px-2.5 py-1 rounded-full">Low Stock</span>
                  </div>
                  <div className="absolute bottom-4 right-4 flex gap-2">
                    <button className="w-9 h-9 bg-white/90 rounded-full shadow flex items-center justify-center text-stone-600 hover:bg-white transition-colors text-sm">&larr;</button>
                    <button className="w-9 h-9 bg-white/90 rounded-full shadow flex items-center justify-center text-stone-600 hover:bg-white transition-colors text-sm">&rarr;</button>
                  </div>
                </div>
              </div>

              {/* Product Info */}
              <div className="flex flex-col">
                {/* Title + price */}
                <div className="mb-6">
                  <p className="text-xs font-semibold tracking-[0.2em] uppercase text-sage-600 mb-2">ThreadHouse Collection</p>
                  <h1 className="font-serif text-2xl sm:text-3xl font-bold text-stone-900 mb-1 leading-tight">Oversized Linen Shirt</h1>
                  <p className="text-stone-500 text-sm mb-3">{COLORS[selectedColor].name}</p>
                  <div className="flex items-center gap-4">
                    <span className="text-2xl font-bold text-stone-900">$89.00</span>
                    <div className="flex items-center gap-1.5">
                      <StarRating n={4.8} />
                      <span className="text-sm text-stone-500">4.8 (124 reviews)</span>
                    </div>
                  </div>
                </div>

                {/* Color selector */}
                <div className="mb-6">
                  <p className="text-sm font-semibold text-stone-800 mb-3">
                    Color: <span className="font-normal text-stone-500">{COLORS[selectedColor].name}</span>
                  </p>
                  <div className="flex gap-3">
                    {COLORS.map((c, i) => (
                      <button key={c.name} onClick={() => setSelectedColor(i)}
                        className={`w-9 h-9 rounded-full border-2 transition-all ${selectedColor === i ? 'border-stone-800 scale-110 shadow-md' : 'border-stone-200 hover:border-stone-400'}`}
                        style={{ background: c.hex }} title={c.name} />
                    ))}
                  </div>
                </div>

                {/* Size selector */}
                <div className="mb-6">
                  <div className="flex items-center justify-between mb-3">
                    <p className={`text-sm font-semibold ${sizeError ? 'text-red-500' : 'text-stone-800'}`}>
                      Size: <span className="font-normal text-stone-500">{selectedSize || (sizeError ? 'Please select a size' : 'Select size')}</span>
                    </p>
                    <button onClick={() => setShowSizeGuide(true)} className="text-xs font-medium text-sage-600 hover:text-sage-800 flex items-center gap-1">
                      <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                      Size Guide
                    </button>
                  </div>
                  <div className="flex gap-2 flex-wrap">
                    {SIZES.map(s => (
                      <button key={s} onClick={() => { setSelectedSize(s); setSizeError(false); }}
                        className={`w-14 h-11 text-sm font-medium rounded-xl border-2 transition-colors ${
                          selectedSize === s ? 'bg-stone-900 text-white border-stone-900' :
                          s === 'XL' ? 'border-stone-200 text-stone-300 cursor-not-allowed line-through' :
                          `border-stone-200 text-stone-700 hover:border-stone-400 ${sizeError ? 'border-red-200' : ''}`
                        }`}
                        disabled={s === 'XL'}>{s}</button>
                    ))}
                  </div>
                  <p className="text-xs text-stone-400 mt-2">XL is currently out of stock. <button className="text-sage-600 hover:underline">Get notified</button></p>
                </div>

                {/* Qty + Add to Cart */}
                <div className="flex gap-3 mb-4">
                  <div className="flex items-center border border-stone-200 rounded-xl overflow-hidden">
                    <button onClick={() => setQty(Math.max(1, qty - 1))} className="w-11 h-12 flex items-center justify-center text-stone-600 hover:bg-stone-50 transition-colors text-lg">-</button>
                    <span className="w-10 text-center text-sm font-medium text-stone-900">{qty}</span>
                    <button onClick={() => setQty(Math.min(5, qty + 1))} className="w-11 h-12 flex items-center justify-center text-stone-600 hover:bg-stone-50 transition-colors text-lg">+</button>
                  </div>
                  <button onClick={handleAddToCart}
                    className={`flex-1 py-3 rounded-xl font-semibold text-sm transition-all ${
                      added ? 'bg-sage-600 text-white' : 'bg-stone-900 text-white hover:bg-stone-700'
                    }`}>
                    {added ? 'Added to Cart!' : 'Add to Cart'}
                  </button>
                  <button onClick={() => setWishlisted(!wishlisted)}
                    className={`w-12 h-12 rounded-xl border-2 flex items-center justify-center transition-colors ${wishlisted ? 'border-rose-200 bg-rose-50' : 'border-stone-200 hover:border-stone-400'}`}>
                    <svg className={`w-5 h-5 ${wishlisted ? 'text-rose-500' : 'text-stone-400'}`} fill={wishlisted ? 'currentColor' : 'none'} stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                  </button>
                </div>

                {/* Trust signals */}
                <div className="bg-sage-50 border border-sage-100 rounded-xl p-4 mb-6">
                  <div className="grid grid-cols-2 gap-3 text-xs">
                    {[
                      { icon: '✓', text: 'Free shipping over $75' },
                      { icon: '↩', text: 'Free 30-day returns' },
                      { icon: '♻', text: 'Made from certified linen' },
                      { icon: '◇', text: 'Carbon offset shipping' },
                    ].map(t => (
                      <div key={t.text} className="flex items-center gap-2 text-sage-700">
                        <span className="font-bold text-sage-500">{t.icon}</span>
                        <span>{t.text}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Tabs */}
                <div className="border-t border-stone-100">
                  <div className="flex gap-0 border-b border-stone-200">
                    {[['description','Description'],['materials','Materials & Care'],['sustainability','Sustainability']].map(([k,l]) => (
                      <button key={k} onClick={() => setActiveTab(k)}
                        className={`px-4 py-3 text-sm font-medium border-b-2 -mb-px transition-colors ${
                          activeTab === k ? 'border-stone-900 text-stone-900' : 'border-transparent text-stone-500 hover:text-stone-700'
                        }`}>{l}</button>
                    ))}
                  </div>

                  <div className="pt-4 pb-2 text-sm text-stone-600 leading-relaxed">
                    {activeTab === 'description' && (
                      <div>
                        <p className="mb-3">A relaxed, effortless take on the classic linen shirt. Cut with an oversized silhouette and dropped shoulders, this piece works as a standalone layer or open over a tank. Woven from 100% European linen, it gets softer and more lived-in with every wear.</p>
                        <ul className="space-y-1.5 text-xs text-stone-500">
                          <li>• Oversized fit — we recommend your true size</li>
                          <li>• Dropped shoulders, relaxed chest and body</li>
                          <li>• Chest pocket, single button cuffs</li>
                          <li>• Slightly longer back hem</li>
                          <li>• Model is 5'9" wearing size S</li>
                        </ul>
                      </div>
                    )}
                    {activeTab === 'materials' && (
                      <div>
                        <p className="font-medium text-stone-800 mb-3">100% European Linen</p>
                        <p className="mb-4 text-xs text-stone-500">Our linen is sourced from certified European flax farms that use zero irrigation — flax naturally thrives on rainwater alone. The fabric is OEKO-TEX certified, meaning it's free from harmful substances.</p>
                        <div className="bg-stone-50 rounded-xl p-4 text-xs space-y-2">
                          <p className="font-semibold text-stone-700 mb-2">Care Instructions</p>
                          {['Machine wash cold, gentle cycle','Do not tumble dry — lay flat or hang to dry','Warm iron if needed, or embrace the natural texture','Do not dry clean','Wash with like colours'].map(c => (
                            <p key={c} className="text-stone-500">· {c}</p>
                          ))}
                        </div>
                      </div>
                    )}
                    {activeTab === 'sustainability' && (
                      <div className="space-y-3 text-xs text-stone-500">
                        <p className="font-medium text-stone-700 text-sm">Why this shirt is different</p>
                        <p>We partnered with a small family-run linen mill in Normandy, France. Every worker earns above living wage and the production facility runs on 100% renewable energy.</p>
                        <div className="grid grid-cols-2 gap-3 mt-3">
                          {[['Water saved','3,400L vs conventional'],['CO₂ offset','0.8kg per order'],['Packaging','100% recycled & compostable'],['End of life','Free take-back program']].map(([k,v]) => (
                            <div key={k} className="bg-sage-50 rounded-lg p-3">
                              <p className="font-semibold text-sage-700">{k}</p>
                              <p className="text-sage-600 mt-0.5">{v}</p>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Complete the Look */}
          <section className="bg-stone-50 py-16">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="mb-8">
                <p className="text-xs font-semibold tracking-[0.3em] uppercase text-sage-600 mb-2">Style It</p>
                <h2 className="text-2xl font-bold text-stone-900">Complete the Look</h2>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                {COMPLETE_LOOK.map(p => (
                  <a key={p.name} href="product-detail.html" className="group flex items-center gap-4 bg-white rounded-2xl p-4 border border-stone-100 hover:shadow-md transition-shadow">
                    <div className="w-20 h-24 rounded-xl flex-none" style={{ background: `#${p.bg}` }} />
                    <div>
                      <h3 className="font-medium text-stone-800 text-sm group-hover:text-sage-700 transition-colors">{p.name}</h3>
                      <p className="text-stone-900 font-semibold text-sm mt-1">${p.price}</p>
                      <button className="mt-2 text-xs font-medium text-sage-600 hover:text-sage-800">Add to cart</button>
                    </div>
                  </a>
                ))}
              </div>
            </div>
          </section>

          {/* Reviews */}
          <section className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            <div className="flex items-end justify-between mb-10">
              <div>
                <p className="text-xs font-semibold tracking-[0.3em] uppercase text-sage-600 mb-2">Community</p>
                <h2 className="text-2xl font-bold text-stone-900">Customer Reviews</h2>
              </div>
              <button className="bg-stone-900 text-white px-5 py-2.5 rounded-full text-sm font-medium hover:bg-stone-700 transition-colors">
                Write a Review
              </button>
            </div>

            {/* Rating summary */}
            <div className="flex flex-col sm:flex-row gap-8 mb-10 p-6 bg-stone-50 rounded-2xl">
              <div className="text-center flex-none">
                <div className="text-5xl font-bold text-stone-900 mb-1">4.8</div>
                <StarRating n={5} />
                <p className="text-xs text-stone-400 mt-1">124 reviews</p>
              </div>
              <div className="flex-1 space-y-2">
                {[['5 stars', 82], ['4 stars', 30], ['3 stars', 8], ['2 stars', 3], ['1 star', 1]].map(([l, n]) => (
                  <div key={l} className="flex items-center gap-3 text-sm">
                    <span className="text-stone-500 w-14 text-xs">{l}</span>
                    <div className="flex-1 h-2 bg-stone-200 rounded-full overflow-hidden">
                      <div className="h-full bg-amber-400 rounded-full" style={{ width: `${(n/124)*100}%` }} />
                    </div>
                    <span className="text-stone-400 text-xs w-6 text-right">{n}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Individual reviews */}
            <div className="space-y-6">
              {REVIEWS.map((r, i) => (
                <div key={i} className="flex gap-5 pb-6 border-b border-stone-100 last:border-0">
                  {/* Customer photo */}
                  <div className="w-16 h-20 rounded-xl flex-none overflow-hidden" style={{ background: `#${r.imgBg}` }}>
                    <div className="w-full h-full flex items-center justify-center">
                      <span className="text-[10px] text-center opacity-40 font-medium px-1" style={{ color: '#3d5a2c' }}>Photo</span>
                    </div>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-start justify-between gap-4 mb-2">
                      <div>
                        <div className="flex items-center gap-2">
                          <span className="font-semibold text-stone-800 text-sm">{r.name}</span>
                          {r.verified && <span className="text-[10px] bg-sage-100 text-sage-700 font-medium px-2 py-0.5 rounded-full">Verified Purchase</span>}
                        </div>
                        <div className="flex items-center gap-2 mt-1">
                          <StarRating n={r.rating} />
                          <span className="text-xs text-stone-400">{r.date} · Size {r.size}</span>
                        </div>
                      </div>
                    </div>
                    <p className="text-sm text-stone-600 leading-relaxed">{r.text}</p>
                    <div className="flex gap-4 mt-3 text-xs text-stone-400">
                      <button className="hover:text-stone-600">Helpful (12)</button>
                      <button className="hover:text-stone-600">Report</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div className="mt-6 text-center">
              <button className="border border-stone-300 text-stone-600 px-6 py-2.5 rounded-full text-sm font-medium hover:bg-stone-50 transition-colors">
                Load more reviews
              </button>
            </div>
          </section>

          {/* Size Guide Modal */}
          {showSizeGuide && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={() => setShowSizeGuide(false)}>
              <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
              <div className="relative bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-6">
                  <h2 className="text-xl font-bold text-stone-900">Size Guide</h2>
                  <button onClick={() => setShowSizeGuide(false)} className="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center text-stone-500 hover:bg-stone-200 transition-colors">&times;</button>
                </div>
                <p className="text-xs text-stone-400 mb-4">All measurements are in inches. This style runs true to size.</p>
                <div className="overflow-hidden rounded-xl border border-stone-100">
                  <table className="w-full text-sm">
                    <thead className="bg-stone-50">
                      <tr>
                        {['Size','Bust','Waist','Hip'].map(h => <th key={h} className="px-4 py-3 text-left text-xs font-semibold text-stone-600 uppercase tracking-wide">{h}</th>)}
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-stone-50">
                      {SIZE_GUIDE.map((row, i) => (
                        <tr key={row.size} className={i % 2 === 0 ? 'bg-white' : 'bg-stone-50/50'}>
                          <td className="px-4 py-3 font-semibold text-stone-800">{row.size}</td>
                          <td className="px-4 py-3 text-stone-600">{row.bust}</td>
                          <td className="px-4 py-3 text-stone-600">{row.waist}</td>
                          <td className="px-4 py-3 text-stone-600">{row.hip}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="mt-4 p-3 bg-sage-50 rounded-xl text-xs text-sage-700">
                  <strong>Style note:</strong> This shirt is cut oversized. For a more fitted look, size down. For extra relaxed, size up.
                </div>
                <button onClick={() => setShowSizeGuide(false)}
                  className="mt-5 w-full bg-stone-900 text-white py-3 rounded-xl font-medium text-sm hover:bg-stone-700 transition-colors">
                  Close
                </button>
              </div>
            </div>
          )}

          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
