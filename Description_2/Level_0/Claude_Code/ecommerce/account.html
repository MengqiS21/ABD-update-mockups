              Create Outfit

          <p className="text-sm text-stone-400 mb-6">Curate and save your favourite ThreadHouse looks. Share them with friends or use them as shopping guides.</p>

          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">

                    <button className="flex-1 text-xs bg-stone-900 text-white py-2 rounded-lg hover:bg-stone-700 transition-colors font-medium">Shop Look</button>
                  </div>

            {/* Add new card */}

        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div>
          <h2 className="text-xl font-bold text-stone-900 mb-2">Referral Program</h2>

              { step: '1', title: 'Share your link', desc: 'Send your unique referral link to friends, followers, or family.' },

              { step: '3', title: 'You both earn', desc: 'You get 150 pts. They get 10% off their first order.' },

              <div key={s.step} className="bg-white border border-stone-100 rounded-2xl p-5 shadow-sm">
                <div className="w-8 h-8 bg-sage-100 rounded-lg flex items-center justify-center text-sage-700 font-bold text-sm mb-3">{s.step}</div>
                <h3 className="font-semibold text-stone-800 text-sm mb-1.5">{s.title}</h3>
                <p className="text-xs text-stone-500 leading-relaxed">{s.desc}</p>
              </div>
            ))}
          </div>

          {/* Referral link */}

              <div className="flex-1 bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-600 font-mono overflow-hidden">
                {referralLink}

              <button onClick={handleCopy}
                className={`px-5 py-3 rounded-xl font-semibold text-sm transition-colors ${copied ? 'bg-sage-600 text-white' : 'bg-stone-900 text-white hover:bg-stone-700'}`}>
                {copied ? 'Copied!' : 'Copy'}

            <div className="flex gap-3 mt-4">
              {['Email', 'Instagram', 'WhatsApp', 'Twitter'].map(c => (
                <button key={c} className="flex-1 border border-stone-200 bg-white text-stone-600 text-xs font-medium py-2 rounded-lg hover:bg-stone-50 transition-colors">{c}</button>
              ))}
            </div>
          </div>

          {/* Referral stats */}
          <div className="grid sm:grid-cols-3 gap-4">

              { label: 'Total Referrals', value: '4', sub: 'friends joined' },
              { label: 'Points Earned', value: '600', sub: 'from referrals' },
              { label: 'Pending', value: '1', sub: 'awaiting first order' },
            ].map(s => (
              <div key={s.label} className="bg-white border border-stone-100 rounded-2xl p-5 shadow-sm text-center">
                <p className="text-3xl font-bold text-stone-900 mb-1">{s.value}</p>
                <p className="text-xs font-semibold text-stone-800">{s.label}</p>
                <p className="text-xs text-stone-400">{s.sub}</p>
              </div>
            ))}
          </div>

          {/* Referred friends */}
          <div className="mt-6">
            <h3 className="font-semibold text-stone-800 mb-4">Referred Friends</h3>
            <div className="bg-white border border-stone-100 rounded-2xl overflow-hidden shadow-sm">
              <table className="w-full text-sm">
                <thead className="bg-stone-50 border-b border-stone-100">

                    {['Friend','Joined','Status','Your Reward'].map(h => (
                      <th key={h} className="px-5 py-3 text-left text-xs font-semibold text-stone-500 uppercase tracking-wide">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-stone-50">
                  {[
                    { name: 'Jamie R.', date: 'Feb 8, 2026', status: 'Ordered', reward: '+150 pts' },
                    { name: 'Cam T.', date: 'Jan 22, 2026', status: 'Ordered', reward: '+150 pts' },
                    { name: 'Sasha W.', date: 'Dec 14, 2025', status: 'Ordered', reward: '+150 pts' },
                    { name: 'Nico A.', date: 'Mar 20, 2026', status: 'Pending', reward: 'Pending' },
                  ].map((r, i) => (
                    <tr key={i} className="hover:bg-stone-50 transition-colors">
                      <td className="px-5 py-3.5 font-medium text-stone-800">{r.name}</td>
                      <td className="px-5 py-3.5 text-stone-400 text-xs">{r.date}</td>
                      <td className="px-5 py-3.5">
                        <span className={`text-xs font-semibold px-2.5 py-1 rounded-full ${r.status === 'Ordered' ? 'bg-sage-100 text-sage-700' : 'bg-amber-100 text-amber-700'}`}>{r.status}</span>
                      </td>
                      <td className={`px-5 py-3.5 font-semibold text-sm ${r.reward === 'Pending' ? 'text-stone-400' : 'text-sage-600'}`}>{r.reward}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

      const TAB_CONTENT = {

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
