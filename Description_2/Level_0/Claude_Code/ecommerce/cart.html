<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — ThreadHouse</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: {
              50: '#f2f5ee', 100: '#e4ecdc', 200: '#c9d9bc',
              300: '#a5bf96', 400: '#7da372', 500: '#5d8752',
              600: '#486b3f', 700: '#3a5532', 800: '#304629', 900: '#293c23'
            }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', system-ui, sans-serif; background: #fafaf8; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    function AnnouncementBar() {
      return (
        <div className="bg-stone-800 text-stone-300 text-center text-xs py-2.5 tracking-wide font-light">
          Free shipping on orders over $75&nbsp;&nbsp;&middot;&nbsp;&nbsp;Sustainable packaging&nbsp;&nbsp;&middot;&nbsp;&nbsp;B Corp Certified
        </div>
      );
    }

    function Header() {
      return (
        <header className="bg-white border-b border-stone-200 sticky top-0 z-50 shadow-sm">
          <AnnouncementBar />
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16">
              <a href="index.html" className="text-xl font-bold tracking-tight">
                <span className="text-stone-900">Thread</span><span className="text-sage-600">House</span>
              </a>
              <nav className="hidden md:flex items-center gap-7 text-sm font-medium">
                {[['Home','index.html'],['Shop All','products.html'],['New Arrivals','products.html'],['Sale','#'],['Our Story','#']].map(([l,h]) => (
                  <a key={l} href={h} className="text-stone-500 hover:text-stone-900 transition-colors">{l}</a>
                ))}
              </nav>
              <div className="flex items-center gap-0.5">
                <a href="cart.html" className="relative p-2 text-stone-900">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 7H4l1-7z" /></svg>
                  <span className="absolute top-1 right-1 bg-sage-600 text-white text-[9px] w-3.5 h-3.5 rounded-full flex items-center justify-center font-bold">3</span>
                </a>
                <a href="account.html" className="p-2 text-stone-500 hover:text-stone-900">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                </a>
              </div>
            </div>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="bg-stone-900 text-stone-400 mt-20">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-10 mb-10">
              <div className="col-span-2 sm:col-span-1">
                <div className="text-white text-xl font-bold mb-3">Thread<span className="text-sage-400">House</span></div>
                <p className="text-sm text-stone-500 mb-5">Sustainable fashion for independent minds.</p>
                <div className="flex gap-2">
                  {['IG','TK','PT','TW'].map(s => <div key={s} className="w-8 h-8 rounded-full bg-stone-700 flex items-center justify-center text-xs font-medium cursor-pointer">{s}</div>)}
                </div>
              </div>
              <div>
                <h4 className="text-white text-xs font-semibold uppercase tracking-[0.15em] mb-4">Shop</h4>
                <ul className="space-y-2.5 text-sm">
                  {['New Arrivals','Tops','Bottoms','Outerwear','Accessories','Sale'].map(l => <li key={l}><a href="products.html" className="hover:text-white transition-colors">{l}</a></li>)}
                </ul>
              </div>
              <div>
                <h4 className="text-white text-xs font-semibold uppercase tracking-[0.15em] mb-4">Help</h4>
                <ul className="space-y-2.5 text-sm">
                  {['Size Guide','Shipping & Returns','Track Order','FAQ','Contact Us'].map(l => <li key={l}><a href="#" className="hover:text-white transition-colors">{l}</a></li>)}
                </ul>
              </div>
              <div>
                <h4 className="text-white text-xs font-semibold uppercase tracking-[0.15em] mb-4">Newsletter</h4>
                <div className="flex gap-2">
                  <input type="email" placeholder="your@email.com" className="flex-1 min-w-0 bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-sm text-white placeholder-stone-600 outline-none" />
                  <button className="bg-sage-600 hover:bg-sage-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Join</button>
                </div>
              </div>
            </div>
            <div className="border-t border-stone-800 pt-5 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-stone-600">
              <p>© 2026 ThreadHouse. All rights reserved.</p>
              <div className="flex gap-4">{['Privacy','Terms','Accessibility'].map(l => <a key={l} href="#" className="hover:text-stone-400">{l}</a>)}</div>
            </div>
          </div>
        </footer>
      );
    }

    const INITIAL_ITEMS = [
      { id: 1, name: 'Oversized Linen Shirt', size: 'M', color: 'Sage Green', price: 89,  qty: 1, bg: 'd4dbc9', points: 89 },
      { id: 2, name: 'Wide Leg Trouser',       size: 'S', color: 'Oat',        price: 112, qty: 1, bg: 'f0e8d8', points: 112 },
      { id: 3, name: 'Cropped Knit Cardigan',  size: 'S', color: 'Terracotta', price: 95,  qty: 1, bg: 'dfc4b0', points: 95 },
    ];

    const LOYALTY_CURRENT = 380;
    const LOYALTY_GOAL = 500;
    const LOYALTY_GOAL_REWARD = 'free tote bag';

    function App() {
      const [items, setItems] = useState(INITIAL_ITEMS);
      const [giftWrap, setGiftWrap] = useState(false);
      const [promoCode, setPromoCode] = useState('');
      const [promoApplied, setPromoApplied] = useState(false);
      const [promoError, setPromoError] = useState('');
      const [checkoutStep, setCheckoutStep] = useState(false);

      const updateQty = (id, delta) => {
        setItems(items.map(it => it.id === id ? { ...it, qty: Math.max(1, Math.min(5, it.qty + delta)) } : it));
      };
      const removeItem = id => setItems(items.filter(it => it.id !== id));

      const subtotal = items.reduce((s, it) => s + it.price * it.qty, 0);
      const giftWrapFee = giftWrap ? 5 : 0;
      const discount = promoApplied ? Math.round(subtotal * 0.1) : 0;
      const shipping = subtotal >= 75 ? 0 : 8;
      const total = subtotal + giftWrapFee - discount + shipping;
      const pointsEarned = items.reduce((s, it) => s + it.points * it.qty, 0);
      const pointsAfterPurchase = LOYALTY_CURRENT + pointsEarned;
      const pointsToGoal = Math.max(0, LOYALTY_GOAL - LOYALTY_CURRENT);

      const handlePromo = () => {
        if (promoCode.toUpperCase() === 'SPRING10') {
          setPromoApplied(true); setPromoError('');
        } else {
          setPromoError('Invalid code. Try SPRING10 for 10% off.'); setPromoApplied(false);
        }
      };

      return (
        <div className="min-h-screen">
          <Header />

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            {/* Title */}
            <div className="flex items-center justify-between mb-8">
              <div>
                <h1 className="text-2xl sm:text-3xl font-bold text-stone-900">Your Cart</h1>
                <p className="text-stone-500 text-sm mt-1">{items.length} {items.length === 1 ? 'item' : 'items'}</p>
              </div>
              <a href="products.html" className="text-sm font-medium text-sage-600 hover:text-sage-800 flex items-center gap-1">
                &larr; Continue Shopping
              </a>
            </div>

            {items.length === 0 ? (
              <div className="text-center py-24">
                <div className="text-6xl mb-4 text-stone-200">
                  <svg className="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 7H4l1-7z" /></svg>
                </div>
                <h2 className="text-xl font-semibold text-stone-700 mb-2">Your cart is empty</h2>
                <p className="text-stone-400 text-sm mb-6">Looks like you haven't added anything yet.</p>
                <a href="products.html" className="inline-block bg-stone-900 text-white px-7 py-3 rounded-full font-medium text-sm hover:bg-stone-700 transition-colors">Shop All Styles</a>
              </div>
            ) : (
              <div className="grid lg:grid-cols-3 gap-10">

                {/* Cart Items */}
                <div className="lg:col-span-2 space-y-4">

                  {/* Delivery banner */}
                  {shipping === 0 ? (
                    <div className="bg-sage-50 border border-sage-200 rounded-xl px-5 py-3 flex items-center gap-3">
                      <span className="text-sage-600 text-lg">✓</span>
                      <p className="text-sm text-sage-800 font-medium">You qualify for free shipping!</p>
                    </div>
                  ) : (
                    <div className="bg-amber-50 border border-amber-200 rounded-xl px-5 py-3">
                      <p className="text-sm text-amber-800">
                        Add <strong>${75 - subtotal}</strong> more to unlock free shipping.
                      </p>
                      <div className="mt-2 h-1.5 bg-amber-200 rounded-full overflow-hidden">
                        <div className="h-full bg-amber-500 rounded-full transition-all" style={{ width: `${(subtotal / 75) * 100}%` }} />
                      </div>
                    </div>
                  )}

                  {/* Items */}
                  {items.map(item => (
                    <div key={item.id} className="flex gap-5 bg-white border border-stone-100 rounded-2xl p-5 shadow-sm">
                      {/* Item image */}
                      <a href="product-detail.html" className="w-24 h-32 rounded-xl flex-none overflow-hidden" style={{ background: `#${item.bg}` }}>
                        <div className="w-full h-full flex items-end justify-center pb-2">
                          <span className="text-[9px] text-center opacity-30 font-medium px-1" style={{ color: '#3d5a2c' }}>{item.name}</span>
                        </div>
                      </a>

                      {/* Item details */}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-start justify-between gap-2">
                          <div>
                            <a href="product-detail.html" className="font-semibold text-stone-800 hover:text-sage-700 transition-colors text-sm sm:text-base leading-tight">{item.name}</a>
                            <div className="flex items-center gap-2 mt-1.5">
                              <span className="text-xs bg-stone-100 text-stone-600 px-2 py-0.5 rounded-full">Size {item.size}</span>
                              <span className="text-xs bg-stone-100 text-stone-600 px-2 py-0.5 rounded-full">{item.color}</span>
                            </div>
                          </div>
                          <button onClick={() => removeItem(item.id)} className="p-1.5 text-stone-300 hover:text-rose-400 transition-colors flex-none">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                          </button>
                        </div>

                        <div className="flex items-center justify-between mt-4">
                          {/* Qty */}
                          <div className="flex items-center border border-stone-200 rounded-lg overflow-hidden">
                            <button onClick={() => updateQty(item.id, -1)} className="w-8 h-8 flex items-center justify-center text-stone-600 hover:bg-stone-50 transition-colors">-</button>
                            <span className="w-8 text-center text-sm font-medium">{item.qty}</span>
                            <button onClick={() => updateQty(item.id, 1)} className="w-8 h-8 flex items-center justify-center text-stone-600 hover:bg-stone-50 transition-colors">+</button>
                          </div>
                          {/* Price */}
                          <div className="text-right">
                            <p className="font-bold text-stone-900">${item.price * item.qty}</p>
                            {item.qty > 1 && <p className="text-xs text-stone-400">${item.price} each</p>}
                          </div>
                        </div>
                        <div className="mt-2 flex items-center gap-1 text-xs text-sage-600">
                          <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                          Estimated delivery: Mar 28–30
                        </div>
                      </div>
                    </div>
                  ))}

                  {/* Gift Wrapping */}
                  <div className="bg-white border border-stone-100 rounded-2xl p-5 shadow-sm">
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-rose-50 rounded-xl flex items-center justify-center text-rose-400">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7" />
                          </svg>
                        </div>
                        <div>
                          <p className="font-semibold text-stone-800 text-sm">Gift Wrapping</p>
                          <p className="text-xs text-stone-400">Recycled kraft paper with a handwritten note</p>
                        </div>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className="text-sm font-semibold text-stone-700">+$5.00</span>
                        <button onClick={() => setGiftWrap(!giftWrap)}
                          className={`relative w-11 h-6 rounded-full transition-colors ${giftWrap ? 'bg-sage-600' : 'bg-stone-300'}`}>
                          <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all ${giftWrap ? 'left-5' : 'left-0.5'}`} />
                        </button>
                      </div>
                    </div>
                    {giftWrap && (
                      <div className="mt-4 pt-4 border-t border-stone-100">
                        <textarea className="w-full text-sm border border-stone-200 rounded-lg p-3 outline-none resize-none focus:border-sage-300 text-stone-700 placeholder-stone-400" rows={2} placeholder="Add a gift message (optional)..." />
                      </div>
                    )}
                  </div>

                  {/* Loyalty tracker */}
                  <div className="bg-gradient-to-r from-sage-50 to-stone-50 border border-sage-100 rounded-2xl p-5">
                    <div className="flex items-start gap-4">
                      <div className="w-10 h-10 bg-sage-600 rounded-xl flex items-center justify-center flex-none">
                        <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
                        </svg>
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between mb-1">
                          <p className="font-semibold text-stone-800 text-sm">Loyalty Points</p>
                          <a href="account.html" className="text-xs text-sage-600 hover:text-sage-800">View rewards &rarr;</a>
                        </div>
                        <p className="text-xs text-stone-500 mb-3">
                          You're <strong className="text-sage-700">{pointsToGoal} points</strong> away from a free {LOYALTY_GOAL_REWARD}. This order earns you <strong className="text-sage-700">+{pointsEarned} points</strong>.
                        </p>
                        <div className="h-2 bg-stone-200 rounded-full overflow-hidden">
                          <div className="h-full bg-sage-500 rounded-full transition-all"
                            style={{ width: `${Math.min(100, (LOYALTY_CURRENT / LOYALTY_GOAL) * 100)}%` }} />
                        </div>
                        <div className="flex justify-between text-[10px] text-stone-400 mt-1">
                          <span>{LOYALTY_CURRENT} pts</span>
                          <span>{LOYALTY_GOAL} pts — Free {LOYALTY_GOAL_REWARD}</span>
                        </div>
                        <p className="text-xs text-sage-600 mt-2 font-medium">After this purchase: {Math.min(LOYALTY_GOAL, pointsAfterPurchase)} / {LOYALTY_GOAL} points</p>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Order Summary */}
                <div className="lg:col-span-1">
                  <div className="bg-white border border-stone-100 rounded-2xl p-6 shadow-sm sticky top-24">
                    <h2 className="font-bold text-stone-900 text-lg mb-6">Order Summary</h2>

                    <div className="space-y-3 text-sm mb-5">
                      <div className="flex justify-between text-stone-600">
                        <span>Subtotal ({items.reduce((s,i) => s+i.qty, 0)} items)</span>
                        <span className="font-medium text-stone-800">${subtotal}</span>
                      </div>
                      {giftWrap && (
                        <div className="flex justify-between text-stone-600">
                          <span>Gift wrapping</span>
                          <span className="font-medium text-stone-800">+$5</span>
                        </div>
                      )}
                      {promoApplied && (
                        <div className="flex justify-between text-sage-600">
                          <span>Promo: SPRING10 (10% off)</span>
                          <span className="font-medium">-${discount}</span>
                        </div>
                      )}
                      <div className="flex justify-between text-stone-600">
                        <span>Shipping</span>
                        <span className={`font-medium ${shipping === 0 ? 'text-sage-600' : 'text-stone-800'}`}>
                          {shipping === 0 ? 'FREE' : `$${shipping}`}
                        </span>
                      </div>
                    </div>

                    <div className="border-t border-stone-100 pt-4 mb-5">
                      <div className="flex justify-between font-bold text-stone-900 text-lg">
                        <span>Total</span>
                        <span>${total}</span>
                      </div>
                      <p className="text-xs text-stone-400 mt-1">Tax calculated at checkout</p>
                    </div>

                    {/* Promo code */}
                    <div className="mb-5">
                      <p className="text-xs font-semibold text-stone-700 mb-2">Promo Code</p>
                      <div className="flex gap-2">
                        <input value={promoCode} onChange={e => setPromoCode(e.target.value)}
                          placeholder="Enter code" disabled={promoApplied}
                          className="flex-1 min-w-0 border border-stone-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-sage-300 disabled:bg-stone-50 disabled:text-stone-400" />
                        {promoApplied ? (
                          <button onClick={() => { setPromoApplied(false); setPromoCode(''); }} className="text-xs text-rose-500 hover:text-rose-700 font-medium whitespace-nowrap">Remove</button>
                        ) : (
                          <button onClick={handlePromo} className="bg-stone-800 text-white px-4 py-2 rounded-lg text-xs font-medium hover:bg-stone-700 transition-colors whitespace-nowrap">Apply</button>
                        )}
                      </div>
                      {promoError && <p className="text-xs text-rose-500 mt-1.5">{promoError}</p>}
                      {promoApplied && <p className="text-xs text-sage-600 mt-1.5 font-medium">Code applied — 10% off!</p>}
                    </div>

                    {/* Delivery estimate */}
                    <div className="bg-stone-50 rounded-xl p-3 mb-5 flex items-center gap-3 text-xs">
                      <svg className="w-4 h-4 text-stone-500 flex-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                      </svg>
                      <div>
                        <p className="font-medium text-stone-700">Estimated Delivery</p>
                        <p className="text-stone-500">Friday, Mar 28 – Sunday, Mar 30</p>
                      </div>
                    </div>

                    {/* Checkout CTA */}
                    <button onClick={() => setCheckoutStep(true)}
                      className="w-full bg-stone-900 hover:bg-stone-700 text-white py-4 rounded-xl font-bold text-sm transition-colors flex items-center justify-center gap-2">
                      Proceed to Checkout
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
                    </button>

                    {/* Payment icons */}
                    <div className="mt-4 flex items-center justify-center gap-2">
                      {['Visa','MC','Amex','PayPal','Shop Pay'].map(p => (
                        <span key={p} className="text-[9px] bg-stone-100 text-stone-500 px-2 py-1 rounded font-medium">{p}</span>
                      ))}
                    </div>
                    <p className="text-center text-[10px] text-stone-400 mt-2">256-bit SSL encryption · Secure checkout</p>
                  </div>
                </div>
              </div>
            )}

            {/* You may also like */}
            <div className="mt-16">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-xl font-bold text-stone-900">You May Also Like</h2>
                <a href="products.html" className="text-sm text-sage-600 hover:text-sage-800 font-medium">View all</a>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-5">
                {[
                  { name: 'Ribbed Tank', price: 32, bg: 'f5f0e8' },
                  { name: 'Wrap Midi Skirt', price: 78, bg: 'c4cfc0' },
                  { name: 'Linen Blazer', price: 145, bg: 'e8dfc8' },
                  { name: 'Organic Cotton Tee', price: 38, bg: 'f2f0ed' },
                ].map(p => (
                  <a key={p.name} href="product-detail.html" className="group">
                    <div className="aspect-[3/4] rounded-2xl mb-3 overflow-hidden" style={{ background: `#${p.bg}` }}>
                      <div className="w-full h-full flex items-end justify-center pb-4">
                        <span className="text-xs font-medium text-center opacity-30 px-3">{p.name}</span>
                      </div>
                    </div>
                    <p className="text-sm font-medium text-stone-800 group-hover:text-sage-700 transition-colors">{p.name}</p>
                    <p className="text-sm font-bold text-stone-900 mt-0.5">${p.price}</p>
                  </a>
                ))}
              </div>
            </div>
          </div>

          {/* Checkout modal overlay */}
          {checkoutStep && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={() => setCheckoutStep(false)}>
              <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
              <div className="relative bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 text-center" onClick={e => e.stopPropagation()}>
                <div className="w-16 h-16 bg-sage-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg className="w-8 h-8 text-sage-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                </div>
                <h2 className="text-xl font-bold text-stone-900 mb-2">Ready to Checkout</h2>
                <p className="text-stone-500 text-sm mb-1">Order total: <strong className="text-stone-900">${total}</strong></p>
                <p className="text-xs text-stone-400 mb-6">This is a mockup — checkout flow not implemented.</p>
                <button onClick={() => setCheckoutStep(false)} className="w-full bg-stone-900 text-white py-3 rounded-xl font-medium text-sm hover:bg-stone-700 transition-colors">
                  Close
                </button>
              </div>
            </div>
          )}

          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
