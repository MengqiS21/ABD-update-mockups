<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillForge | Courses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              forge: {
                100: "#e7f0ff",
                500: "#316dff",
                950: "#0a1a36",
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>
      const { html, Shell, SectionTitle, CourseCard, courses } = window.SkillForge;

      const filterGroups = [
        ["Career Field", ["Healthcare Support", "Trades", "IT", "Business Administration"]],
        ["Format", ["Self-Paced", "Cohort", "Live Online"]],
        ["Duration", ["Under 4 weeks", "4-8 weeks", "8+ weeks"]],
        ["Cost", ["Free", "Under $500", "$500+"]],
        ["Credential Type", ["Certificate", "Badge", "CEU"]],
      ];

      function App() {
        return html`
          <${Shell} current="./courses.html">
            <section className="mx-auto max-w-7xl px-4 pb-6 pt-8 sm:px-6 lg:px-8">
              <div className="grid gap-6 lg:grid-cols-[0.78fr_1.22fr]">
                <aside className="mesh-panel rounded-[2rem] p-6 ring-1 ring-slate-200/70">
                  <p className="text-sm font-bold uppercase tracking-[0.28em] text-sky-700">Filter Programs</p>
                  <div className="mt-6 space-y-5">
                    ${filterGroups.map(
                      ([group, options]) => html`
                        <div key=${group}>
                          <p className="text-sm font-semibold text-slate-950">${group}</p>
                          <div className="mt-3 flex flex-wrap gap-2">
                            ${options.map(
                              (option) => html`
                                <button key=${option} className="rounded-full border border-slate-300 bg-white px-3 py-2 text-sm text-slate-600 transition hover:border-sky-300 hover:text-sky-900">
                                  ${option}
                                </button>
                              `
                            )}
                          </div>
                        </div>
                      `
                    )}
                  </div>
                  <div className="mt-8 rounded-[1.5rem] bg-slate-950 p-5 text-white">
                    <p className="text-sm font-semibold uppercase tracking-[0.24em] text-slate-300">Need help choosing?</p>
                    <p className="mt-3 text-lg font-bold">Take the Find Your Path quiz in 3 minutes.</p>
                    <a href="./index.html" className="mt-4 inline-flex rounded-full bg-white px-4 py-3 text-sm font-semibold text-slate-950">Find Your Path</a>
                  </div>
                </aside>

                <div>
                  <${SectionTitle}
                    eyebrow="Learning Discovery"
                    title="Explore programs by field, format, and credential"
                    copy="Compare flexible short-form tracks and instructor-led cohorts built around practical milestones, next start dates, and transparent pricing."
                    actions=${html`<a href="./pricing.html" className="rounded-full border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700">Compare plans</a>`}
                  />
                  <div className="mb-6 flex flex-wrap gap-3">
                    <span className="rounded-full bg-sky-100 px-4 py-2 text-sm font-semibold text-sky-900">24 active programs</span>
                    <span className="rounded-full bg-emerald-100 px-4 py-2 text-sm font-semibold text-emerald-900">8 cohort starts this month</span>
                    <span className="rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-700 brand-border">Employer reimbursement available</span>
                  </div>
                  <div className="grid gap-6 xl:grid-cols-2">
                    ${courses.map((course) => html`<${CourseCard} key=${course.title} course=${course} />`)}
                  </div>
                </div>
              </div>
            </section>
          </${Shell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
