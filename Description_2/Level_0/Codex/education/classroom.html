<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillForge | Classroom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>
      const { html, Shell, agenda, resources, discussions } = window.SkillForge;

      function App() {
        return html`
          <${Shell} current="./classroom.html">
            <section className="mx-auto max-w-7xl px-4 pb-8 pt-8 sm:px-6 lg:px-8">
              <div className="grid gap-6 lg:grid-cols-[0.76fr_1.24fr]">
                <aside className="mesh-panel rounded-[2rem] p-6">
                  <p className="text-sm font-bold uppercase tracking-[0.28em] text-sky-700">Weekly Agenda</p>
                  <p className="mt-3 text-2xl font-extrabold text-slate-950">Week 3 of 8 - Medical Billing Fundamentals</p>
                  <div className="mt-6 space-y-3">
                    ${agenda.map(
                      ([day, item, meta]) => html`
                        <div key=${day} className="rounded-[1.5rem] bg-white/85 p-4">
                          <div className="flex items-center justify-between gap-3">
                            <p className="text-sm font-bold uppercase tracking-[0.22em] text-sky-700">${day}</p>
                            <span className="text-xs font-semibold text-slate-500">${meta}</span>
                          </div>
                          <p className="mt-2 text-sm leading-6 text-slate-700">${item}</p>
                        </div>
                      `
                    )}
                  </div>
                </aside>

                <div className="space-y-6">
                  <div className="gradient-card rounded-[2.5rem] px-8 py-8 text-white">
                    <div className="flex flex-wrap items-center justify-between gap-4">
                      <div>
                        <p className="text-sm font-bold uppercase tracking-[0.26em] text-sky-200">Live Session Countdown</p>
                        <h1 className="mt-3 text-4xl font-extrabold tracking-tight">Claims Lifecycle Workshop</h1>
                        <p className="mt-3 text-sm leading-7 text-slate-200">Next live lecture starts in 01d : 04h : 12m. Join from any device and use the built-in notes panel during class.</p>
                      </div>
                      <a href="./dashboard.html" className="rounded-full bg-white px-5 py-3 text-sm font-semibold text-slate-950">Join Session</a>
                    </div>
                  </div>

                  <div className="grid gap-6 xl:grid-cols-[0.95fr_1.05fr]">
                    <div className="mesh-panel rounded-[2rem] p-6">
                      <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Assignment Submission</p>
                      <div className="mt-4 rounded-[1.75rem] border-2 border-dashed border-sky-200 bg-sky-50 px-5 py-10 text-center">
                        <p className="text-lg font-bold text-slate-950">Upload claims workflow worksheet</p>
                        <p className="mt-2 text-sm text-slate-600">Accepted formats: PDF, DOCX, JPEG up to 25 MB</p>
                        <button className="mt-5 rounded-full bg-slate-950 px-5 py-3 text-sm font-semibold text-white">Submit Assignment</button>
                      </div>
                    </div>

                    <div className="mesh-panel rounded-[2rem] p-6">
                      <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Resource Library</p>
                      <div className="mt-4 space-y-3">
                        ${resources.map(
                          (item) => html`
                            <div key=${item.title} className="flex items-center justify-between gap-4 rounded-[1.5rem] bg-white/85 px-4 py-4">
                              <div>
                                <p className="font-bold text-slate-950">${item.title}</p>
                                <p className="text-sm text-slate-500">${item.type}</p>
                              </div>
                              <span className="text-sm font-semibold text-slate-700">${item.meta}</span>
                            </div>
                          `
                        )}
                      </div>
                    </div>
                  </div>

                  <div className="mesh-panel rounded-[2rem] p-6">
                    <div className="flex flex-wrap items-center justify-between gap-3">
                      <div>
                        <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Peer Discussion Board</p>
                        <p className="mt-2 text-sm text-slate-600">Module thread: Medical Billing Fundamentals</p>
                      </div>
                      <button className="rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700">Start a discussion</button>
                    </div>
                    <div className="mt-5 grid gap-4">
                      ${discussions.map(
                        (item) => html`
                          <article key=${item.topic} className="rounded-[1.5rem] bg-white/85 p-5">
                            <div className="flex items-center justify-between gap-3">
                              <p className="font-bold text-slate-950">${item.topic}</p>
                              <span className="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700">${item.replies} replies</span>
                            </div>
                            <p className="mt-2 text-sm text-slate-500">Started by ${item.author}</p>
                          </article>
                        `
                      )}
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </${Shell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
