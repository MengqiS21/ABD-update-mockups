<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillForge | Course Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>
      const { html, Shell, SectionTitle, weeklySchedule } = window.SkillForge;

      const outcomes = [
        "Navigate patient intake, registration, and scheduling workflows with confidence.",
        "Use foundational billing language and process common claims scenarios.",
        "Apply HIPAA-aware communication practices in real front-office situations.",
        "Work inside digital office systems, templates, and charting workflows.",
      ];

      const materials = [
        "Laptop or desktop with webcam and reliable internet",
        "SkillForge learner workbook mailed before Week 1",
        "Access to Google Workspace or Microsoft 365",
        "Optional headset for live session participation",
      ];

      const qaSessions = [
        "Tuesday, March 4 · 6:30 PM CT",
        "Thursday, March 13 · 12:00 PM CT",
        "Tuesday, March 25 · 6:30 PM CT",
      ];

      function App() {
        return html`
          <${Shell} current="./course-detail.html">
            <section className="mx-auto max-w-7xl px-4 pb-8 pt-8 sm:px-6 lg:px-8">
              <div className="grid gap-6 lg:grid-cols-[1.08fr_0.92fr]">
                <div className="gradient-card rounded-[2.5rem] px-8 py-10 text-white">
                  <div className="flex flex-wrap gap-3">
                    <span className="rounded-full bg-white/10 px-4 py-2 text-xs font-semibold uppercase tracking-[0.26em] text-sky-100">Healthcare Support</span>
                    <span className="rounded-full bg-emerald-300/20 px-4 py-2 text-xs font-semibold uppercase tracking-[0.22em] text-emerald-100">Cohort enrollment open</span>
                  </div>
                  <h1 className="mt-6 text-5xl font-extrabold leading-tight tracking-tight">Medical Administrative Assistant Certificate</h1>
                  <p className="mt-4 text-lg text-slate-200">8 weeks · Cohort · $349</p>
                  <p className="mt-5 max-w-2xl text-sm leading-7 text-slate-200">
                    A structured program for adult learners entering healthcare office roles, combining live instruction, weekly assignments, and simulated front-desk workflows.
                  </p>
                  <div className="mt-8 flex flex-wrap gap-3">
                    <a href="./pricing.html" className="rounded-full bg-white px-6 py-3 text-sm font-semibold text-slate-950">Enroll Now</a>
                    <a href="./classroom.html" className="rounded-full border border-white/25 px-6 py-3 text-sm font-semibold text-white">Preview Study Tools</a>
                  </div>
                </div>

                <div className="grid gap-4">
                  <div className="mesh-panel rounded-[2rem] p-6">
                    <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Alumni outcomes</p>
                    <p className="mt-3 text-4xl font-extrabold text-slate-950">92%</p>
                    <p className="mt-2 text-sm leading-6 text-slate-600">Job placement within 3 months for recent graduates who completed advising and career prep.</p>
                  </div>
                  <div className="mesh-panel rounded-[2rem] p-6">
                    <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Financing options</p>
                    <ul className="mt-4 space-y-3 text-sm leading-6 text-slate-600">
                      <li>Payment plan: 3 monthly payments of $117</li>
                      <li>Employer reimbursement documentation included</li>
                      <li>Scholarship review for nonprofit and workforce agency referrals</li>
                    </ul>
                  </div>
                  <div className="mesh-panel rounded-[2rem] p-6">
                    <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Next live Q&A</p>
                    <p className="mt-3 text-2xl font-extrabold text-slate-950">Tuesday, March 4 · 6:30 PM CT</p>
                    <p className="mt-2 text-sm text-slate-600">Meet the instructor, review the schedule, and ask enrollment questions live.</p>
                  </div>
                </div>
              </div>
            </section>

            <section className="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
              <div className="grid gap-6 lg:grid-cols-[1.05fr_0.95fr]">
                <div className="mesh-panel rounded-[2rem] p-6">
                  <${SectionTitle}
                    eyebrow="What You Will Learn"
                    title="Practical outcomes for entry-level healthcare office roles"
                    copy="The curriculum focuses on tools and workflows learners can use immediately in front-office, scheduling, and billing-support positions."
                  />
                  <ul className="space-y-4 text-sm leading-7 text-slate-700">
                    ${outcomes.map((item) => html`<li key=${item} className="rounded-[1.5rem] bg-white/80 px-5 py-4">• ${item}</li>`)}
                  </ul>
                </div>

                <div className="mesh-panel rounded-[2rem] p-6">
                  <p className="text-sm font-bold uppercase tracking-[0.28em] text-sky-700">Instructor</p>
                  <div className="mt-5 flex gap-4">
                    <div className="course-illustration h-24 w-24 rounded-[1.75rem]"></div>
                    <div>
                      <p className="text-2xl font-bold text-slate-950">Dr. Lena Howard, MHA, CPC</p>
                      <p className="mt-2 text-sm leading-6 text-slate-600">Former outpatient clinic administrator with 12 years in patient access, billing operations, and allied health training.</p>
                      <p className="mt-3 rounded-full bg-sky-100 px-3 py-1 text-xs font-semibold text-sky-900">Certified Professional Coder · AHIMA mentor</p>
                    </div>
                  </div>
                  <div className="mt-6 rounded-[1.5rem] bg-slate-950 p-5 text-white">
                    <p className="text-sm font-semibold uppercase tracking-[0.22em] text-slate-300">Required materials</p>
                    <ul className="mt-4 space-y-2 text-sm leading-6 text-slate-200">
                      ${materials.map((item) => html`<li key=${item}>• ${item}</li>`)}
                    </ul>
                  </div>
                </div>
              </div>
            </section>

            <section className="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
              <${SectionTitle}
                eyebrow="Weekly Breakdown"
                title="Eight weeks with clear milestones"
                copy="Each week pairs live instruction with a practical lab, a peer discussion, and a checkpoint assignment."
              />
              <div className="grid gap-4">
                ${weeklySchedule.map(
                  (item) => html`
                    <div key=${item.week} className="mesh-panel grid gap-4 rounded-[2rem] p-5 lg:grid-cols-[0.22fr_0.48fr_0.3fr]">
                      <div>
                        <p className="text-sm font-bold uppercase tracking-[0.22em] text-sky-700">${item.week}</p>
                      </div>
                      <div>
                        <p className="text-lg font-bold text-slate-950">${item.title}</p>
                      </div>
                      <div>
                        <p className="text-sm leading-6 text-slate-600">${item.note}</p>
                      </div>
                    </div>
                  `
                )}
              </div>
            </section>

            <section className="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
              <div className="grid gap-6 lg:grid-cols-3">
                <div className="mesh-panel rounded-[2rem] p-6">
                  <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Live Q&A Schedule</p>
                  <ul className="mt-4 space-y-3 text-sm leading-6 text-slate-600">
                    ${qaSessions.map((session) => html`<li key=${session} className="rounded-[1.25rem] bg-white/80 px-4 py-3">${session}</li>`)}
                  </ul>
                </div>
                <div className="mesh-panel rounded-[2rem] p-6">
                  <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Financing</p>
                  <p className="mt-4 text-sm leading-7 text-slate-600">Split tuition over 3 months, use employer reimbursement forms, or apply for community scholarship support before the cohort begins.</p>
                  <a href="./pricing.html" className="mt-5 inline-flex rounded-full bg-slate-950 px-5 py-3 text-sm font-semibold text-white">See payment options</a>
                </div>
                <div className="mesh-panel rounded-[2rem] p-6">
                  <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Next step</p>
                  <p className="mt-4 text-sm leading-7 text-slate-600">Preview the classroom interface, assignments, discussion boards, and resource library before joining the next cohort.</p>
                  <a href="./classroom.html" className="mt-5 inline-flex rounded-full border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700">Open classroom view</a>
                </div>
              </div>
            </section>
          </${Shell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
