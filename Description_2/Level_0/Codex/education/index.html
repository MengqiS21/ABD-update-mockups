<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillForge | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              forge: {
                50: "#f4f8ff",
                100: "#e7f0ff",
                300: "#89b7ff",
                500: "#316dff",
                700: "#1742aa",
                950: "#0a1a36",
              },
              mint: {
                100: "#ddfaf1",
                300: "#7fdcc0",
                500: "#1c9d81",
              },
            },
            boxShadow: {
              float: "0 28px 90px rgba(10, 26, 54, 0.18)",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>

    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>

                <div className="mx-auto grid max-w-7xl gap-8 px-8 py-10 text-white lg:grid-cols-[1.12fr_0.88fr] lg:px-12 lg:py-14">

                    <div className="flex flex-wrap gap-3">

                    <div className="grid gap-4 pt-4 sm:grid-cols-3">

                        <div className="grid gap-3 sm:grid-cols-2">
                          <div className="rounded-[1.5rem] bg-sky-50 p-4">

                copy="A snapshot of how learners moved from unstable jobs into clearer, credential-backed career pathways."

                        <p className="text-sm text-slate-500">Before: ${story.before}</p>

                        <p className="rounded-2xl bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-900">${story.pay}</p>
                      </div>
                    </article>

                )}

            <section className="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">

                  <h2 className="text-4xl font-extrabold tracking-tight">Built for adult learners who need clarity, trust, and a direct next step</h2>

                    SkillForge combines accreditation-aligned curriculum, instructor credentials, employer-informed projects, and transparent pricing to reduce the guesswork of career transition.

                <div className="grid gap-4 sm:grid-cols-2">

                    <p className="text-3xl font-extrabold">1:1</p>
                    <p className="mt-2 text-sm text-slate-200">Advising support for pathway selection, financing, and employer reimbursement</p>
                  </div>
                  <div className="rounded-[1.75rem] bg-white/10 p-5">
                    <p className="text-3xl font-extrabold">Live Q&A</p>
                    <p className="mt-2 text-sm text-slate-200">Weekly instructor sessions to reinforce material and answer practical questions</p>

                  <div className="rounded-[1.75rem] bg-white/10 p-5">
                    <p className="text-3xl font-extrabold">Scholarships</p>
                    <p className="mt-2 text-sm text-slate-200">Support for nonprofit, government, and career mobility cohorts</p>
                  </div>
                  <div className="rounded-[1.75rem] bg-white/10 p-5">
                    <p className="text-3xl font-extrabold">Try Free</p>
                    <p className="mt-2 text-sm text-slate-200">Preview study tools and sample lessons before enrolling</p>
                  </div>
                </div>
              </div>
            </section>
          </${Shell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
