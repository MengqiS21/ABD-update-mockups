<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillForge | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>
      const { html, Shell, dashboardAssignments, cohortMembers } = window.SkillForge;

      const calendar = [
        ["Sun", ""], ["Mon", "11"], ["Tue", "12"], ["Wed", "13"], ["Thu", "14"], ["Fri", "15"], ["Sat", "16"],
      ];

      function App() {
        return html`
          <${Shell} current="./dashboard.html">
            <section className="mx-auto max-w-7xl px-4 pb-8 pt-8 sm:px-6 lg:px-8">
              <div className="grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
                <div className="gradient-card rounded-[2.5rem] px-8 py-8 text-white">
                  <p className="text-sm font-bold uppercase tracking-[0.28em] text-sky-200">Your Program</p>
                  <h1 className="mt-3 text-4xl font-extrabold tracking-tight">Medical Admin Certificate - Week 3 of 8</h1>
                  <p className="mt-3 max-w-2xl text-sm leading-7 text-slate-200">Stay on track with upcoming sessions, assignments, office hours, and a live view of projected completion milestones.</p>
                  <div className="mt-6 flex flex-wrap gap-3">
                    <a href="./classroom.html" className="rounded-full bg-white px-5 py-3 text-sm font-semibold text-slate-950">Open Classroom</a>
                    <a href="./course-detail.html" className="rounded-full border border-white/25 px-5 py-3 text-sm font-semibold text-white">View Program Details</a>
                  </div>
                </div>
                <div className="mesh-panel rounded-[2rem] p-6">
                  <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Upcoming live session</p>
                  <p className="mt-3 text-2xl font-extrabold text-slate-950">Claims Lifecycle Workshop</p>
                  <p className="mt-2 text-sm text-slate-600">Tuesday, March 12 · 6:30 PM CT</p>
                  <a href="./classroom.html" className="mt-5 inline-flex rounded-full bg-slate-950 px-5 py-3 text-sm font-semibold text-white">Join Live Session</a>
                  <div className="mt-5 rounded-[1.5rem] bg-emerald-50 px-4 py-4 text-sm font-semibold text-emerald-900">Projected completion: April 18</div>
                </div>
              </div>
            </section>

            <section className="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
              <div className="grid gap-6 lg:grid-cols-[0.95fr_1.05fr]">
                <div className="space-y-6">
                  <div className="mesh-panel rounded-[2rem] p-6">
                    <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Assignment due dates</p>
                    <div className="mt-5 space-y-3">
                      ${dashboardAssignments.map(
                        (item) => html`
                          <div key=${item.title} className="rounded-[1.5rem] bg-white/85 px-4 py-4">
                            <div className="flex items-center justify-between gap-3">
                              <p className="font-bold text-slate-950">${item.title}</p>
                              <span className="text-sm font-semibold text-slate-500">${item.due}</span>
                            </div>
                            <p className="mt-2 text-sm text-slate-600">${item.status}</p>
                          </div>
                        `
                      )}
                    </div>
                  </div>

                  <div className="mesh-panel rounded-[2rem] p-6">
                    <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Instructor support</p>
                    <p className="mt-3 text-sm leading-7 text-slate-600">Office hours are available Tuesday and Thursday. Book a 15-minute slot for assignment review, quiz prep, or job search questions.</p>
                    <a href="./classroom.html" className="mt-5 inline-flex rounded-full border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700">Book Office Hours</a>
                  </div>
                </div>

                <div className="space-y-6">
                  <div className="mesh-panel rounded-[2rem] p-6">
                    <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Mini calendar</p>
                    <div className="mt-5 grid grid-cols-7 gap-3 text-center text-sm">
                      ${calendar.map(
                        ([day, date], index) => html`
                          <div key=${index} className="calendar-cell rounded-[1.25rem] ${date === "12" || date === "14" ? "bg-sky-100 text-sky-900" : "bg-white/85 text-slate-700"} px-2 py-3">
                            <p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">${day}</p>
                            <p className="mt-2 text-lg font-bold">${date || "-"}</p>
                          </div>
                        `
                      )}
                    </div>
                  </div>

                  <div className="mesh-panel rounded-[2rem] p-6">
                    <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-700">Your cohort</p>
                    <div className="mt-4 flex flex-wrap gap-3">
                      ${cohortMembers.map(
                        (member) => html`
                          <div key=${member} className="flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-950 text-sm font-bold text-white">
                            ${member}
                          </div>
                        `
                      )}
                    </div>
                  </div>

                  <div className="gradient-card rounded-[2rem] px-6 py-6 text-white">
                    <p className="text-sm font-bold uppercase tracking-[0.24em] text-sky-200">Certificate preview</p>
                    <div className="mt-4 rounded-[1.75rem] border border-white/15 bg-white/10 p-5">
                      <p className="text-xl font-extrabold">Medical Administrative Assistant Certificate</p>
                      <p className="mt-2 text-sm text-slate-200">Projected completion: April 18</p>
                      <p className="mt-4 text-sm text-slate-200">Issued upon successful completion of capstone simulation, attendance requirements, and final knowledge check.</p>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </${Shell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
