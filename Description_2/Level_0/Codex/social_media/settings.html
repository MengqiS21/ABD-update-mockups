<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folia | Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>
      const { html, AppShell, Card } = window.Folia;

      function SettingBlock({ title, copy, children }) {
        return html`
          <${Card}>
            <p className="text-lg font-semibold text-slate-950">${title}</p>
            <p className="mt-1 text-sm text-slate-500">${copy}</p>
            <div className="mt-4">${children}</div>
          </${Card}>
        `;
      }

      function Toggle({ label, state }) {
        return html`
          <div className="flex items-center justify-between gap-3 rounded-[1.5rem] bg-white px-4 py-4">
            <p className="text-sm font-semibold text-slate-700">${label}</p>
            <span className=${`rounded-full px-3 py-2 text-xs font-semibold uppercase tracking-[0.22em] ${state ? "bg-emerald-100 text-emerald-900" : "bg-slate-100 text-slate-500"}`}>${state ? "On" : "Off"}</span>
          </div>
        `;
      }

      function Aside() {
        return html`
          <${Card}>
            <p className="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Profile Snapshot</p>
            <div className="mt-4 space-y-3">
              <div className="rounded-[1.5rem] bg-amber-50 p-4">
                <p className="font-semibold text-amber-950">Open for Work</p>
                <p className="mt-1 text-sm text-amber-900">Commissions enabled for illustration and art direction.</p>
              </div>
              <div className="rounded-[1.5rem] bg-slate-100 p-4">
                <p className="font-semibold text-slate-900">Visibility</p>
                <p className="mt-1 text-sm text-slate-600">Public portfolio with private drafts hidden.</p>
              </div>
            </div>
          </${Card}>
        `;
      }

      function App() {
        return html`
          <${AppShell}
            current="./settings.html"
            title="Settings"
            subtitle="Profile controls for portfolio presentation, tools, visibility, and account security."
            actionLabel="Back to Profile"
            actionHref="./profile.html"
            aside=${html`<${Aside} />`}
          >
            <${SettingBlock} title="Profile & Portfolio" copy="Control your public creator card, pinned work, and portfolio summary.">
              <div className="grid gap-3 md:grid-cols-2">
                <div className="rounded-[1.5rem] bg-white p-4 text-sm text-slate-600">Display name: Mira Sol</div>
                <div className="rounded-[1.5rem] bg-white p-4 text-sm text-slate-600">Headline: Illustration + Art Direction</div>
              </div>
            </${SettingBlock}>
            <${SettingBlock} title="Creative Tools" copy="List the software and skills you want collaborators and clients to see.">
              <div className="flex flex-wrap gap-2">
                <span className="rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700">Procreate</span>
                <span className="rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700">Figma</span>
                <span className="rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700">Film Photography</span>
                <span className="rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700">Photoshop</span>
              </div>
            </${SettingBlock}>
            <${SettingBlock} title="Visibility" copy="Manage whether your portfolio and process posts are discoverable on Folia.">
              <div className="space-y-3">
                <${Toggle} label="Public portfolio" state=${true} />
                <${Toggle} label="Private drafts hidden from search" state=${true} />
              </div>
            </${SettingBlock}>
            <${SettingBlock} title="Commission Status" copy="Show or hide your Open for Work badge across profile, feed, and messages.">
              <div className="space-y-3">
                <${Toggle} label="Open for Work badge" state=${true} />
                <div className="rounded-[1.5rem] bg-white p-4 text-sm text-slate-600">Commission focus: Editorial illustration, campaign art direction, visual identity systems</div>
              </div>
            </${SettingBlock}>
            <${SettingBlock} title="Notifications" copy="Choose which activity should interrupt your workflow.">
              <div className="space-y-3">
                <${Toggle} label="Feedback request alerts" state=${true} />
                <${Toggle} label="Collection saves and appreciations" state=${true} />
                <${Toggle} label="Weekly creative digest" state=${false} />
              </div>
            </${SettingBlock}>
            <${SettingBlock} title="Account Security" copy="Access, sessions, and verification settings.">
              <div className="grid gap-3 md:grid-cols-2">
                <div className="rounded-[1.5rem] bg-white p-4 text-sm text-slate-600">Two-factor authentication: Enabled</div>
                <div className="rounded-[1.5rem] bg-white p-4 text-sm text-slate-600">Active sessions: Seoul, iPad, Studio Mac</div>
              </div>
            </${SettingBlock}>
          </${AppShell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
