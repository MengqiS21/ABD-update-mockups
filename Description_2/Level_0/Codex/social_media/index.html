<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folia | Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              folia: {
                cream: "#fcfaf6",
                sand: "#f7f2ea",
                ink: "#0f172a",
                gold: "#f59e0b",
              },
            },
            boxShadow: {
              lift: "0 24px 70px rgba(15, 23, 42, 0.08)",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>
      const { html, AppShell, Card, ComposerCard, FeedToggle, PostCard, RightRail, posts } = window.Folia;

      function Aside() {
        return html`
          <${RightRail} />
          <${Card}>
            <p className="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Collections Moving</p>
            <div className="mt-4 space-y-3">
              <div className="rounded-[1.5rem] bg-white p-4">
                <p className="font-semibold text-slate-900">Warm Light Portraits</p>
                <p className="mt-1 text-sm text-slate-500">328 works collected this week</p>
              </div>
              <div className="rounded-[1.5rem] bg-white p-4">
                <p className="font-semibold text-slate-900">Process Frames</p>
                <p className="mt-1 text-sm text-slate-500">Best place to discover unfinished visual experiments</p>
              </div>
            </div>
          </${Card}>
        `;
      }

      function App() {
        return html`
          <${AppShell}
            current="./index.html"
            title="Main Feed"
            subtitle="A process-first feed for illustrators, photographers, and designers sharing work in progress."
            actionLabel="View Portfolio"
            actionHref="./profile.html"
            aside=${html`<${Aside} />`}
          >
            <${FeedToggle} />
            <${ComposerCard} />
            ${posts.map((post) => html`<${PostCard} key=${post.title} post=${post} />`)}
          </${AppShell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
