<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folia | Messages</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>
      const { html, AppShell, Card, threads } = window.Folia;

      function ThreadsPanel() {
        return html`
          <${Card} className="h-full">
            <div className="flex items-center justify-between gap-3">
              <div>
                <p className="text-lg font-semibold text-slate-950">Conversations</p>
                <p className="mt-1 text-sm text-slate-500">Active collaborations and direct messages.</p>
              </div>
              <button className="rounded-full bg-slate-950 px-4 py-2 text-sm font-semibold text-white">New Thread</button>
            </div>
            <div className="mt-5 space-y-3">
              ${threads.map(
                (thread) => html`
                  <div key=${thread.name} className=${`rounded-[1.5rem] p-4 ${thread.active ? "bg-slate-950 text-white" : "bg-white text-slate-800"}`}>
                    <p className="font-semibold">${thread.name}</p>
                    <p className=${`mt-1 text-sm ${thread.active ? "text-slate-300" : "text-slate-500"}`}>${thread.meta}</p>
                  </div>
                `
              )}
            </div>
          </${Card}>
        `;
      }

      function ChatPanel() {
        return html`
          <${Card} className="h-full">
            <div className="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 pb-4">
              <div>
                <p className="text-lg font-semibold text-slate-950">Northlight Zine</p>
                <p className="mt-1 text-sm text-slate-500">Editorial collaboration with Hana and Tess</p>
              </div>
              <button className="rounded-full bg-amber-100 px-4 py-2 text-sm font-semibold text-amber-900">Share a Project</button>
            </div>
            <div className="space-y-4 py-5">
              <div className="max-w-xl rounded-[1.5rem] px-4 py-3 message-bubble-other">
                <p className="text-sm font-semibold text-slate-800">Hana</p>
                <p className="mt-1 text-sm text-slate-600">The latest type treatment works. Can you drop the crop with the orange margin?</p>
              </div>
              <div className="artwork-panel alt-c relative ml-auto h-48 max-w-xl overflow-hidden rounded-[1.75rem]"></div>
              <div className="ml-auto max-w-xl rounded-[1.5rem] px-4 py-3 text-white message-bubble-self">
                <p className="text-sm font-semibold">You</p>
                <p className="mt-1 text-sm text-amber-50">Shared the updated project frame. I opened the right margin and softened the headline contrast.</p>
              </div>
              <div className="max-w-xl rounded-[1.5rem] px-4 py-3 message-bubble-other">
                <p className="text-sm font-semibold text-slate-800">Tess</p>
                <p className="mt-1 text-sm text-slate-600">Looks good. Let’s use this in the opener spread. Read by everyone.</p>
              </div>
            </div>
            <div className="border-t border-slate-200 pt-4">
              <div className="rounded-[1.5rem] bg-slate-100 p-4 text-sm text-slate-500">Write a message, attach an image, or drop a project link...</div>
              <div className="mt-3 flex items-center justify-between gap-3">
                <div className="flex gap-2 text-xs font-semibold uppercase tracking-[0.22em] text-slate-500">
                  <span className="rounded-full bg-slate-100 px-3 py-2">Inline image</span>
                  <span className="rounded-full bg-slate-100 px-3 py-2">Project card</span>
                </div>
                <div className="text-sm text-slate-500">Read receipt: Seen 2m ago</div>
              </div>
            </div>
          </${Card}>
        `;
      }

      function Aside() {
        return html`
          <${Card}>
            <p className="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Shortcuts</p>
            <div className="mt-4 space-y-3">
              <button className="w-full rounded-[1.5rem] bg-slate-950 px-4 py-3 text-left text-sm font-semibold text-white">Share a Project</button>
              <button className="w-full rounded-[1.5rem] bg-slate-100 px-4 py-3 text-left text-sm font-semibold text-slate-700">Open Critique Thread</button>
            </div>
          </${Card}>
        `;
      }

      function App() {
        return html`
          <${AppShell}
            current="./messages.html"
            title="Messages"
            subtitle="Direct messages and active creative collaborations with image sharing built in."
            actionLabel="View Feed"
            actionHref="./index.html"
            aside=${html`<${Aside} />`}
          >
            <div className="grid gap-6 2xl:grid-cols-[320px_minmax(0,1fr)]">
              <${ThreadsPanel} />
              <${ChatPanel} />
            </div>
          </${AppShell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
