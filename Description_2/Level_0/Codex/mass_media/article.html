<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groundwork | Investigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              groundwork: {
                sand: "#f5f1e8",
                paper: "#f9f7f1",
                ink: "#122028",
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>
      const { html, PageShell, articleCharts, relatedInvestigations, StoryCard, SupportWidget } = window.Groundwork;

      function App() {
        return html`
          <${PageShell} current="./article.html">
            <article className="mx-auto max-w-7xl px-4 py-10 md:px-6 lg:px-8">
              <div className="mx-auto max-w-4xl">
                <p className="text-xs font-semibold uppercase tracking-[0.32em] text-teal-800">Investigation</p>
                <h1 className="serif-display balance-text mt-4 text-5xl leading-none text-slate-900 md:text-7xl">The Invisible Flood: How Groundwater Collapse Is Reshaping the American West</h1>
                <p className="mt-5 text-xl leading-8 text-slate-700">
                  Beneath the deserts and farmland of the American West, a slow-moving collapse is draining water reserves faster than regulators can count them.
                </p>
                <div className="mt-6 flex flex-wrap gap-4 text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">
                  <span>Elena Torres and Jamal Reeves</span>
                  <span>July 12, 2025</span>
                  <span>18 min read</span>
                </div>
              </div>

              <div className="hero-flood mt-10 h-[28rem] rounded-[2.2rem] shadow-[0_28px_70px_rgba(18,32,40,0.15)]"></div>

              <div className="mx-auto mt-10 grid max-w-6xl gap-10 xl:grid-cols-[minmax(0,1fr)_320px]">
                <div className="min-w-0">
                  <div className="rounded-[1.75rem] border border-stone-300 bg-white/70 p-6">
                    <p className="text-xs font-semibold uppercase tracking-[0.3em] text-slate-500">How We Reported This</p>
                    <p className="mt-4 text-base leading-8 text-slate-700">
                      Groundwork analyzed state well logs, crop irrigation records, emergency water hauling requests, and more than 14,000 pages of local meeting minutes, then interviewed residents, hydrologists, and water officials across six states.
                    </p>
                  </div>

                  <div className="mt-8 text-slate-800">
                    <p className="text-lg leading-8">
                      In some parts of the West, groundwater collapse does not arrive as spectacle. It arrives as a faucet that sputters, a pump that burns out, a home that suddenly needs water trucked in by the week.
                    </p>
                    <p className="mt-6 text-lg leading-8">
                      Across Arizona, California, and New Mexico, Groundwork found that counties were often responding to failing wells months after public warning signs had accumulated in permit backlogs, drought reports, and utility emergency requests.
                    </p>
                  </div>

                  <div className="editorial-panel chart-grid mt-10 rounded-[2rem] p-6 text-white">
                    <p className="text-xs font-semibold uppercase tracking-[0.3em] text-stone-300">Embedded Chart</p>
                    <div className="mt-6 grid gap-4 md:grid-cols-3">
                      ${articleCharts.map(
                        (item) => html`
                          <div key=${item.label} className="rounded-[1.5rem] border border-white/10 bg-white/5 p-4">
                            <p className="serif-display text-5xl">${item.value}</p>
                            <p className="mt-2 text-xs font-semibold uppercase tracking-[0.24em] text-stone-300">${item.label}</p>
                            <p className="mt-3 text-sm leading-6 text-stone-200">${item.note}</p>
                          </div>
                        `
                      )}
                    </div>
                  </div>

                  <blockquote className="mt-10 border-l-4 border-amber-700 pl-6">
                    <p className="serif-display text-4xl leading-tight text-slate-900">
                      "The wells went dry in spreadsheets long before anyone admitted they were going dry on the ground."
                    </p>
                    <p className="mt-3 text-sm font-semibold uppercase tracking-[0.24em] text-slate-500">Interview with a county water manager</p>
                  </blockquote>

                  <div className="mt-10 grid gap-6 lg:grid-cols-2">
                    <div className="shell-card rounded-[1.75rem] border border-stone-300/80 p-5">
                      <p className="text-xs font-semibold uppercase tracking-[0.3em] text-slate-500">Map Embed</p>
                      <div className="story-photo alt-a mt-4 h-72 rounded-[1.5rem]"></div>
                      <p className="mt-4 text-sm leading-6 text-slate-700">Interactive basin map showing areas of subsidence, emergency hauling requests, and domestic well failures.</p>
                    </div>
                    <div className="shell-card rounded-[1.75rem] border border-stone-300/80 p-5">
                      <p className="text-xs font-semibold uppercase tracking-[0.3em] text-slate-500">Field Notes</p>
                      <div className="space-y-4 pt-4 text-base leading-8 text-slate-700">
                        <p>Residents in unincorporated communities described rationing water for cooking while nearby industrial farms expanded pumping permits.</p>
                        <p>Hydrologists warned that land subsidence is damaging canals, roads, and pipelines in places where emergency response still centers on short-term trucking.</p>
                      </div>
                    </div>
                  </div>

                  <div className="mt-10 rounded-[1.75rem] border border-stone-300 bg-white/70 p-6">
                    <p className="text-xs font-semibold uppercase tracking-[0.3em] text-slate-500">Footnotes</p>
                    <ol className="mt-4 space-y-3 text-sm leading-6 text-slate-700">
                      <li>1. Groundwater well decline calculations are based on publicly available state monitoring records from 2003 through 2024.</li>
                      <li>2. Emergency hauling totals combine county procurement notices and state drought assistance requests.</li>
                      <li>3. Population exposure estimates pair census tract counts with basin-level depletion rates and domestic well depths.</li>
                    </ol>
                  </div>
                </div>

                <aside className="space-y-6">
                  <${SupportWidget} />
                </aside>
              </div>

              <section className="mx-auto mt-14 max-w-7xl">
                <div className="section-rule pt-8">
                  <div className="flex items-end justify-between gap-4">
                    <div>
                      <p className="text-xs font-semibold uppercase tracking-[0.3em] text-slate-500">Related Investigations</p>
                      <h2 className="serif-display mt-2 text-4xl text-slate-900">Continue the reporting trail.</h2>
                    </div>
                  </div>
                  <div className="mt-8 grid gap-6 lg:grid-cols-3">
                    ${relatedInvestigations.map((title, index) =>
                      html`<${StoryCard}
                        key=${title}
                        story=${{
                          title,
                          category: ["Data", "Finance", "Policy"][index],
                          blurb: "A follow-on investigation expanding the public records, data methods, and accountability questions behind this series.",
                          meta: "Read next",
                          mood: ["alt-b", "alt-c", "alt-a"][index],
                          href: index === 2 ? "./climate.html" : "./article.html",
                        }}
                        compact=${true}
                      />`
                    )}
                  </div>
                </div>
              </section>
            </article>
          </${PageShell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
