<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groundwork | Climate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              groundwork: {
                sand: "#f5f1e8",
                paper: "#f9f7f1",
                ink: "#122028",
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>
      const { html, PageShell, SectionHeading, StoryCard, climateStories, DocumentList, VizPreview } = window.Groundwork;

      function App() {
        const lead = {
          category: "Climate",
          title: "How Counties Lost Track of Their Last Reliable Wells",
          blurb:
            "Reporter Maya Chen traced permit files, pump failures, and emergency water deliveries to show how shallow aquifers collapsed long before official drought declarations.",
          reporter: "Maya Chen",
          readTime: "14 min read",
          mood: "alt-c",
          href: "./article.html",
        };

        return html`
          <${PageShell} current="./climate.html">
            <section className="mx-auto max-w-7xl px-4 py-10 md:px-6 lg:px-8">
              <${SectionHeading}
                eyebrow="Climate"
                title="Investigations on heat, water, fire, and the policy systems failing to keep up."
                blurb="Groundwork's climate desk follows how environmental risk moves through public agencies, utility markets, and neighborhood-level impacts."
              />
              <div className="mt-8 grid gap-8 xl:grid-cols-[1.15fr_0.85fr]">
                <div className="space-y-6">
                  <${StoryCard} story=${lead} />
                  <div className="shell-card rounded-[1.75rem] border border-stone-300/80 p-6">
                    <p className="text-xs font-semibold uppercase tracking-[0.3em] text-slate-500">Latest from the desk</p>
                    <div className="mt-5 space-y-5">
                      ${climateStories.map(
                        (story) => html`
                          <article key=${story.title} className="rounded-[1.5rem] border border-stone-300 bg-white/70 p-5">
                            <div className="flex flex-wrap items-center gap-3">
                              <span className="rounded-full bg-teal-900 px-3 py-2 text-xs font-semibold uppercase tracking-[0.24em] text-white">${story.tag}</span>
                              <span className="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">${story.readTime}</span>
                            </div>
                            <h3 className="serif-display mt-4 text-4xl leading-none text-slate-900">${story.title}</h3>
                            <p className="mt-3 text-sm leading-6 text-slate-700">${story.summary}</p>
                            <div className="mt-4 text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">${story.reporter}</div>
                          </article>
                        `
                      )}
                    </div>
                  </div>
                </div>
                <div className="space-y-6">
                  <${DocumentList} />
                  <${VizPreview} />
                </div>
              </div>
            </section>
          </${PageShell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
