<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groundwork | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              groundwork: {
                sand: "#f5f1e8",
                paper: "#f9f7f1",
                ink: "#122028",
                teal: "#0f766e",
                rust: "#b45309",
              },
            },
            boxShadow: {
              float: "0 24px 70px rgba(18, 32, 40, 0.12)",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>
      const { html, PageShell, BreakingBanner, SectionHeading, StoryCard, DataHighlight, DonationBanner, latestInvestigations } = window.Groundwork;

      function App() {
        return html`
          <${PageShell} current="./index.html">
            <${BreakingBanner} />
            <section className="mx-auto max-w-7xl px-4 py-8 md:px-6 lg:px-8 lg:py-10">
              <div className="hero-flood overflow-hidden rounded-[2.3rem] px-6 py-8 text-white shadow-float md:px-8 md:py-10 lg:px-12 lg:py-14">
                <div className="max-w-4xl">
                  <p className="text-xs font-semibold uppercase tracking-[0.34em] text-teal-100">Feature Investigation</p>
                  <h1 className="serif-display balance-text mt-4 text-5xl leading-none md:text-7xl">The Invisible Flood: How Groundwater Collapse Is Reshaping the American West</h1>
                  <p className="mt-5 max-w-2xl text-lg leading-8 text-stone-100">
                    A year-long Groundwork investigation tracks dry wells, land subsidence, and the quiet policy failures turning aquifer depletion into a regional emergency.
                  </p>
                  <div className="mt-8 flex flex-wrap gap-4 text-xs font-semibold uppercase tracking-[0.28em] text-stone-200">
                    <span>By Elena Torres and Jamal Reeves</span>
                    <span>July 12, 2025</span>
                    <span>18 min read</span>
                  </div>
                  <div className="mt-8 flex flex-wrap gap-3">
                    <a href="./article.html" className="rounded-full bg-white px-6 py-3 text-sm font-bold text-slate-950">Read the full story</a>
                    <a href="./climate.html" className="rounded-full border border-white/30 px-6 py-3 text-sm font-semibold text-white">Explore climate coverage</a>
                  </div>
                </div>
                <div className="mt-10 grid gap-4 border-t border-white/15 pt-8 md:grid-cols-3">
                  <div>
                    <p className="text-xs uppercase tracking-[0.28em] text-stone-300">Reporting footprint</p>
                    <p className="mt-2 text-3xl font-bold">6 states</p>
                  </div>
                  <div>
                    <p className="text-xs uppercase tracking-[0.28em] text-stone-300">Public records reviewed</p>
                    <p className="mt-2 text-3xl font-bold">14,200 pages</p>
                  </div>
                  <div>
                    <p className="text-xs uppercase tracking-[0.28em] text-stone-300">Interactive maps</p>
                    <p className="mt-2 text-3xl font-bold">3 embedded</p>
                  </div>
                </div>
              </div>
            </section>

            <section className="mx-auto max-w-7xl px-4 py-6 md:px-6 lg:px-8">
              <${SectionHeading}
                eyebrow="Latest Investigations"
                title="Deep reporting across climate, energy, and policy."
                blurb="Groundwork follows the paper trail behind environmental decision-making, then brings the data back to the communities most affected."
              />
              <div className="mt-8 grid gap-6 lg:grid-cols-3">
                ${latestInvestigations.map((story) => html`<${StoryCard} key=${story.title} story=${story} compact=${true} />`)}
              </div>
            </section>

            <section className="mx-auto max-w-7xl px-4 py-6 md:px-6 lg:px-8">
              <div className="section-rule pt-8">
                <${SectionHeading}
                  eyebrow="By The Numbers"
                  title="The scale of the crisis is already measurable."
                  blurb="Groundwork pairs field reporting with public datasets to show how groundwater depletion is reshaping agriculture, housing, and public health."
                />
                <div className="mt-8 grid gap-4 md:grid-cols-3">
                  <${DataHighlight} value="12.7 in" label="Land sink recorded" note="Maximum annual subsidence found in one stretch of the San Joaquin Valley." />
                  <${DataHighlight} value="2.3M" label="Residents exposed" note="People living in census tracts where water table decline outpaced state intervention." />
                  <${DataHighlight} value="31%" label="Monitoring gap" note="Share of rural domestic wells not captured in current state drought response systems." />
                </div>
              </div>
            </section>

            <section className="mx-auto max-w-7xl px-4 py-10 md:px-6 lg:px-8">
              <${DonationBanner} />
            </section>
          </${PageShell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
