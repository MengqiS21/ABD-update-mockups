<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groundwork | Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              groundwork: {
                sand: "#f5f1e8",
                paper: "#f9f7f1",
                ink: "#122028",
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="./shared.js"></script>
    <script>
      const { html, PageShell, SectionHeading, SupportForm } = window.Groundwork;

      function App() {
        return html`
          <${PageShell} current="./support.html">
            <section className="mx-auto max-w-7xl px-4 py-10 md:px-6 lg:px-8">
              <div className="editorial-panel overflow-hidden rounded-[2.2rem] px-6 py-10 text-white md:px-8 lg:px-10">
                <p className="text-xs font-semibold uppercase tracking-[0.32em] text-amber-200">Reader Support</p>
                <h1 className="serif-display mt-4 text-5xl leading-none md:text-7xl">Keep Groundwork Independent</h1>
                <p className="mt-5 max-w-3xl text-lg leading-8 text-stone-100">
                  Groundwork is funded by readers who want accountability journalism on climate, science, and environmental policy to remain public-interest work.
                </p>
              </div>

              <div className="mt-10">
                <${SectionHeading}
                  eyebrow="Membership"
                  title="Choose the level of support that matches your role in the newsroom."
                  blurb="Every contribution helps cover records requests, travel, document review, local partnerships, and the time needed to pressure institutions for answers."
                />
              </div>

              <div className="mt-8">
                <${SupportForm} />
              </div>
            </section>
          </${PageShell}>
        `;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
