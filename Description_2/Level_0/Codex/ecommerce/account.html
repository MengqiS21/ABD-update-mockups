<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreadHouse | Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: {} } };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="./shared.js"></script>
    <script type="text/babel" data-presets="react">
      const { Shell, SectionTitle } = window.ThreadHouse;

      function StatCard({ title, value, copy, dark }) {
        return (
          <div className={`${dark ? "bg-slate-950 text-stone-100" : "bg-white text-slate-900"} rounded-[2rem] p-6 shadow-[0_18px_55px_rgba(15,23,42,0.08)] ring-1 ring-slate-200/70`}>
            <p className={`text-sm font-semibold uppercase tracking-[0.3em] ${dark ? "text-stone-400" : "text-slate-500"}`}>{title}</p>
            <p className="mt-4 text-3xl font-semibold">{value}</p>
            <p className={`mt-3 text-sm leading-6 ${dark ? "text-stone-300" : "text-slate-600"}`}>{copy}</p>
          </div>
        );
      }

      function App() {
        return (
          <Shell current="./account.html">
            <section className="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
              <SectionTitle
                eyebrow="Account"
                title="Your ThreadHouse dashboard"
                copy="Track orders, saved outfits, reward progress, and referral activity from one account hub."
              />
              <div className="grid gap-6 lg:grid-cols-3">
                <StatCard title="My Orders" value="4 active orders" copy="Latest order: Oversized Linen Shirt, scheduled to arrive April 24." />
                <StatCard title="Style Profile" value="Minimalist + Workwear" copy="Saved preferences: relaxed tops, sage/stone palette, organic cotton fabrics." />
                <StatCard title="Loyalty Rewards" value="1,880 points" copy="120 points away from unlocking your next free tote and free express shipping." dark />
              </div>

              <div className="mt-6 grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
                <div className="rounded-[2rem] bg-white p-6 shadow-[0_18px_55px_rgba(15,23,42,0.08)] ring-1 ring-slate-200/70">
                  <p className="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Saved Outfits</p>
                  <div className="mt-5 grid gap-4 sm:grid-cols-2">
                    {["Gallery Opening", "Studio Commute", "Weekend Market", "Late Dinner Layers"].map((look, index) => (
                      <div key={look} className="product-shot photo-frame p-4">
                        <div className="flex h-full items-end rounded-[1.5rem] border border-white/60 bg-white/20 p-4">
                          <div>
                            <p className="rounded-full bg-white/85 px-3 py-1 text-xs font-semibold text-slate-700">Saved Outfit {index + 1}</p>
                            <p className="mt-3 text-lg font-semibold text-slate-900">{look}</p>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="space-y-6">
                  <div className="rounded-[2rem] bg-white p-6 shadow-[0_18px_55px_rgba(15,23,42,0.08)] ring-1 ring-slate-200/70">
                    <p className="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Referral Program</p>
                    <p className="mt-4 text-2xl font-semibold text-slate-900">Give 15%, get 15%</p>
                    <div className="mt-5 rounded-[1.5rem] bg-stone-50 p-4 text-sm text-slate-700">
                      https://threadhouse.mock/ref/mq-thread-15
                    </div>
                    <button className="mt-4 rounded-full bg-slate-900 px-5 py-3 text-sm font-semibold text-stone-50">Copy Share Link</button>
                  </div>

                  <div className="rounded-[2rem] bg-white p-6 shadow-[0_18px_55px_rgba(15,23,42,0.08)] ring-1 ring-slate-200/70">
                    <p className="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Style Notes</p>
                    <ul className="mt-4 space-y-3 text-sm leading-6 text-slate-600">
                      <li>Preferred fits: oversized shirting, straight-leg trousers, modular layers.</li>
                      <li>Saved materials: organic cotton, linen blends, recycled performance shells.</li>
                      <li>Alerts enabled for new arrivals tagged Minimalist and Workwear.</li>
                    </ul>
                  </div>
                </div>
              </div>
            </section>
          </Shell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
