<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreadHouse | Product Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: {} } };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="./shared.js"></script>
    <script type="text/babel" data-presets="react">
      const { Shell, ProductCard, SectionTitle, productCatalog } = window.ThreadHouse;

      function App() {
        const completeTheLook = productCatalog.slice(1, 4);
        const photoReviews = [
          { name: "Alina", city: "Brooklyn", quote: "The drape is oversized without swallowing the whole outfit. Looks sharp with cargos." },
          { name: "Noah", city: "Seattle", quote: "Fabric feels breathable and premium. The sage tone works with everything in my closet." },
          { name: "Mia", city: "Chicago", quote: "Bought for travel. It folds down well and still looks polished after unpacking." },
        ];

        return (
          <Shell current="./product-detail.html">
            <section className="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
              <div className="grid gap-8 lg:grid-cols-[1.1fr_0.9fr]">
                <div className="grid gap-4 sm:grid-cols-2">
                  {[1, 2, 3, 4].map((photo) => (
                    <div key={photo} className="product-shot photo-frame overflow-hidden rounded-[2rem] p-4 shadow-[0_18px_55px_rgba(15,23,42,0.08)]">
                      <div className="flex h-full items-end rounded-[1.5rem] border border-white/60 bg-white/20 p-4">
                        <span className="rounded-full bg-white/80 px-3 py-1 text-xs font-semibold text-slate-700">Lifestyle photo {photo}</span>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="space-y-6">
                  <div className="rounded-[2rem] bg-white p-7 shadow-[0_18px_55px_rgba(15,23,42,0.08)] ring-1 ring-slate-200/70">
                    <p className="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Featured product</p>
                    <h1 className="mt-4 text-4xl font-semibold tracking-tight text-slate-950">Oversized Linen Shirt - Sage Green - $89.00</h1>
                    <p className="mt-4 text-sm leading-7 text-slate-600">
                      Relaxed tailoring cut from a breathable linen blend with a washed finish. Designed for all-day layering and soft structure.
                    </p>
                    <div className="mt-6 flex flex-wrap gap-3">
                      {["XS", "S", "M", "L", "XL"].map((size) => (
                        <button key={size} className={`rounded-2xl border px-4 py-2 text-sm ${size === "M" ? "border-slate-900 bg-slate-900 text-stone-50" : "border-slate-200 bg-white text-slate-600"}`}>
                          {size}
                        </button>
                      ))}
                    </div>
                    <div className="mt-5 rounded-[1.5rem] border border-dashed border-slate-300 bg-stone-50 p-4">
                      <div className="flex items-center justify-between gap-4">
                        <div>
                          <p className="font-semibold text-slate-900">Size Guide</p>
                          <p className="text-sm text-slate-600">Modeling the modal state as an expanded preview card.</p>
                        </div>
                        <button className="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-stone-50">Open Guide</button>
                      </div>
                      <div className="mt-4 grid gap-2 rounded-2xl bg-white p-4 text-sm text-slate-600">
                        <div className="flex justify-between"><span>Chest</span><span>42 in</span></div>
                        <div className="flex justify-between"><span>Length</span><span>30 in</span></div>
                        <div className="flex justify-between"><span>Sleeve</span><span>24 in</span></div>
                      </div>
                    </div>
                    <div className="mt-6 flex flex-wrap gap-3">
                      <a href="./cart.html" className="rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-stone-50">Add to Cart</a>
                      <a href="./products.html" className="rounded-full border border-slate-200 px-6 py-3 text-sm font-semibold text-slate-700">Back to Listing</a>
                    </div>
                  </div>

                  <div className="rounded-[2rem] bg-white p-6 shadow-[0_18px_55px_rgba(15,23,42,0.08)] ring-1 ring-slate-200/70">
                    <div className="flex flex-wrap gap-3">
                      <button className="tab-active rounded-full px-4 py-2 text-sm font-semibold">Material + Care</button>
                      <button className="rounded-full bg-stone-100 px-4 py-2 text-sm font-semibold text-slate-600">Shipping</button>
                      <button className="rounded-full bg-stone-100 px-4 py-2 text-sm font-semibold text-slate-600">Designer Notes</button>
                    </div>
                    <div className="mt-5 space-y-3 text-sm leading-7 text-slate-600">
                      <p>55% linen / 45% organic cotton. Garment-washed for a softer hand feel and reduced shrinkage.</p>
                      <p>Cold wash, reshape while damp, and line dry. Steam lightly to restore drape.</p>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section className="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8">
              <SectionTitle
                eyebrow="Complete the Look"
                title="Pair it with tonal layers"
                copy="Suggested styling companions based on customer outfit saves and editorial pairing data."
              />
              <div className="grid gap-6 md:grid-cols-3">
                {completeTheLook.map((product) => (
                  <ProductCard key={product.id} product={product} detailHref="./product-detail.html" />
                ))}
              </div>
            </section>

            <section className="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
              <SectionTitle
                eyebrow="Photo Reviews"
                title="User-submitted style shots"
                copy="Community photos help shoppers gauge fit, proportion, and real-life styling beyond the studio set."
              />
              <div className="grid gap-6 lg:grid-cols-3">
                {photoReviews.map((review, index) => (
                  <article key={review.name} className="overflow-hidden rounded-[2rem] bg-white shadow-[0_18px_55px_rgba(15,23,42,0.08)] ring-1 ring-slate-200/70">
                    <div className="product-shot photo-frame p-5">
                      <div className="flex h-full items-end rounded-[1.5rem] border border-white/60 bg-white/20 p-4">
                        <span className="rounded-full bg-white/80 px-3 py-1 text-xs font-semibold text-slate-700">Customer photo {index + 1}</span>
                      </div>
                    </div>
                    <div className="space-y-3 p-5">
                      <div className="flex items-center justify-between">
                        <p className="font-semibold text-slate-900">{review.name}</p>
                        <p className="text-xs uppercase tracking-[0.2em] text-slate-500">{review.city}</p>
                      </div>
                      <p className="text-sm leading-6 text-slate-600">{review.quote}</p>
                    </div>
                  </article>
                ))}
              </div>
            </section>
          </Shell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
