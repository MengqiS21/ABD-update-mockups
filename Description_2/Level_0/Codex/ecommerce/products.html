<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreadHouse | Product Listing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#f8f5ef",
                700: "#3d5a4e",
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="./shared.js"></script>
    <script type="text/babel" data-presets="react">
      const { Shell, ProductCard, SectionTitle, productCatalog, colorSwatches } = window.ThreadHouse;

      function FilterTag({ children }) {
        return <button className="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm text-slate-600">{children}</button>;
      }

      function App() {
        return (
          <Shell current="./products.html">
            <section className="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
              <div className="grid gap-8 lg:grid-cols-[19rem_1fr]">
                <aside className="space-y-6">
                  <div className="rounded-[2rem] bg-white p-6 shadow-[0_18px_55px_rgba(15,23,42,0.08)] ring-1 ring-slate-200/70">
                    <p className="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Filters</p>
                    <div className="mt-6 space-y-6 text-sm">
                      <div>
                        <p className="mb-3 font-semibold text-slate-900">Clothing Type</p>
                        <div className="flex flex-wrap gap-2">
                          <FilterTag>Tops</FilterTag>
                          <FilterTag>Bottoms</FilterTag>
                          <FilterTag>Outerwear</FilterTag>
                          <FilterTag>Accessories</FilterTag>
                        </div>
                      </div>
                      <div>
                        <p className="mb-3 font-semibold text-slate-900">Size</p>
                        <div className="grid grid-cols-3 gap-2">
                          {["XS", "S", "M", "L", "XL", "XXL"].map((size) => (
                            <button key={size} className="rounded-2xl border border-slate-200 px-3 py-2 text-slate-600">{size}</button>
                          ))}
                        </div>
                      </div>
                      <div>
                        <p className="mb-3 font-semibold text-slate-900">Color</p>
                        <div className="flex flex-wrap gap-3">
                          {colorSwatches.map((color) => (
                            <button
                              key={color}
                              className="h-9 w-9 rounded-full ring-2 ring-white shadow-sm"
                              style={{ backgroundColor: color }}
                              aria-label={`Select ${color}`}
                            />
                          ))}
                        </div>
                      </div>
                      <div>
                        <p className="mb-3 font-semibold text-slate-900">Material</p>
                        <div className="space-y-2 text-slate-600">
                          <label className="flex items-center gap-3"><input type="checkbox" defaultChecked />Organic Cotton</label>
                          <label className="flex items-center gap-3"><input type="checkbox" />Recycled Polyester</label>
                        </div>
                      </div>
                      <div>
                        <p className="mb-3 font-semibold text-slate-900">Price Range</p>
                        <div className="rounded-3xl bg-stone-50 p-4">
                          <div className="h-2 rounded-full bg-slate-200">
                            <div className="h-2 w-3/5 rounded-full bg-slate-900" />
                          </div>
                          <div className="mt-3 flex justify-between text-slate-600">
                            <span>$30</span>
                            <span>$180</span>
                          </div>
                        </div>
                      </div>
                      <div className="rounded-[1.5rem] bg-slate-900 p-4 text-stone-50">
                        <div className="flex items-center justify-between gap-4">
                          <div>
                            <p className="font-semibold">Style Match</p>
                            <p className="text-xs text-stone-300">Show curated outfits as sets</p>
                          </div>
                          <div className="flex h-7 w-12 items-center rounded-full bg-emerald-400 px-1">
                            <div className="ml-auto h-5 w-5 rounded-full bg-white" />
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </aside>

                <div className="space-y-8">
                  <div className="rounded-[2rem] bg-white p-6 shadow-[0_18px_55px_rgba(15,23,42,0.08)] ring-1 ring-slate-200/70">
                    <SectionTitle
                      eyebrow="Marketplace Grid"
                      title="Curated apparel and accessories"
                      copy="Twenty-four pieces selected for modular spring wardrobes. Use filters to narrow by fit, material, color, or browse the full edit."
                    />
                    <div className="flex flex-wrap gap-3 text-sm">
                      <span className="rounded-full bg-stone-100 px-4 py-2 text-slate-700">24 items</span>
                      <span className="rounded-full bg-stone-100 px-4 py-2 text-slate-700">Editorial ranking</span>
                      <span className="rounded-full bg-stone-100 px-4 py-2 text-slate-700">Sustainable materials prioritized</span>
                    </div>
                  </div>
                  <div className="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
                    {productCatalog.map((product, index) => (
                      <ProductCard
                        key={product.id}
                        product={product}
                        detailHref="./product-detail.html"
                        badge={index % 5 === 0 ? "Set Ready" : undefined}
                      />
                    ))}
                  </div>
                </div>
              </div>
            </section>
          </Shell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
