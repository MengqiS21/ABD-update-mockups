<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreadHouse | Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: {} } };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="./shared.js"></script>
    <script type="text/babel" data-presets="react">
      const { Shell, SectionTitle } = window.ThreadHouse;

      function CartItem({ name, meta, price }) {
        return (
          <div className="grid gap-4 rounded-[2rem] bg-white p-5 shadow-[0_18px_55px_rgba(15,23,42,0.08)] ring-1 ring-slate-200/70 sm:grid-cols-[9rem_1fr_auto]">
            <div className="product-shot photo-frame max-w-[9rem] p-3">
              <div className="h-full rounded-[1.2rem] border border-white/60 bg-white/30" />
            </div>
            <div className="space-y-2">
              <p className="text-xl font-semibold text-slate-900">{name}</p>
              <p className="text-sm text-slate-600">{meta}</p>
              <div className="flex gap-2 text-xs uppercase tracking-[0.2em] text-slate-500">
                <span>Ships in 24h</span>
                <span>Limited stock</span>
              </div>
            </div>
            <div className="flex flex-col items-start gap-3 sm:items-end">
              <p className="text-lg font-semibold text-slate-900">{price}</p>
              <button className="rounded-full border border-slate-200 px-4 py-2 text-sm text-slate-600">Edit</button>
            </div>
          </div>
        );
      }

      function App() {
        return (
          <Shell current="./cart.html">
            <section className="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
              <div className="grid gap-8 lg:grid-cols-[1.1fr_0.9fr]">
                <div className="space-y-6">
                  <SectionTitle
                    eyebrow="Cart"
                    title="Three pieces ready for checkout"
                    copy="Review fit details, gifting add-ons, delivery timing, and rewards progress before completing your order."
                  />
                  <CartItem name="Oversized Linen Shirt" meta="Sage Green / Size M / Qty 1" price="$89.00" />
                  <CartItem name="Shift Cargo Pant" meta="Black / Size M / Qty 1" price="$95.00" />
                  <CartItem name="Transit Utility Tote" meta="Forest / One Size / Qty 1" price="$58.00" />
                </div>
                <div className="space-y-6">
                  <div className="rounded-[2rem] bg-white p-6 shadow-[0_18px_55px_rgba(15,23,42,0.08)] ring-1 ring-slate-200/70">
                    <p className="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Order Summary</p>
                    <div className="mt-5 space-y-3 text-sm text-slate-600">
                      <div className="flex justify-between"><span>Subtotal</span><span>$242.00</span></div>
                      <div className="flex justify-between"><span>Gift wrapping</span><span>+$5.00</span></div>
                      <div className="flex justify-between"><span>Shipping</span><span>Free</span></div>
                      <div className="flex justify-between border-t border-slate-200 pt-3 text-base font-semibold text-slate-900"><span>Total</span><span>$247.00</span></div>
                    </div>
                    <label className="mt-5 flex items-center justify-between rounded-[1.5rem] bg-stone-50 p-4 text-sm text-slate-700">
                      <span>Add gift wrapping and reusable note card</span>
                      <input type="checkbox" defaultChecked />
                    </label>
                    <div className="mt-5 rounded-[1.5rem] bg-emerald-50 p-4 text-sm text-emerald-900">
                      Estimated delivery: <span className="font-semibold">April 24, 2025</span>
                    </div>
                    <a href="./account.html" className="mt-6 inline-flex w-full items-center justify-center rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-stone-50">
                      Proceed to Checkout
                    </a>
                  </div>

                  <div className="rounded-[2rem] bg-slate-950 p-6 text-stone-100">
                    <p className="text-sm font-semibold uppercase tracking-[0.3em] text-stone-400">Loyalty Progress</p>
                    <p className="mt-4 text-2xl font-semibold">You&apos;re 120 points away from a free tote</p>
                    <div className="mt-5 h-3 rounded-full bg-white/10">
                      <div className="h-3 w-4/5 rounded-full bg-emerald-400" />
                    </div>
                    <p className="mt-3 text-sm text-stone-300">Earn points faster with complete-the-look bundles and referral credits.</p>
                  </div>
                </div>
              </div>
            </section>
          </Shell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
