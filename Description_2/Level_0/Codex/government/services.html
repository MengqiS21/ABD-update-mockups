<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resident Services | State of Vermont</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sky: {
                50: "#f4f9fd",
                100: "#d7ebf9",
                700: "#1f5f91",
                800: "#184d77",
                900: "#17324d",
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="./shared.js"></script>
    <script type="text/babel" data-presets="react">
      const { Shell, Hero, SectionHeading, lifeStages } = window.GovernmentPortal;

      function App() {
        return (
          <Shell current="./services.html">
            <Hero
              eyebrow="Services overview"
              title="Find state services by life stage"
              copy="This portal groups services around real resident moments so people can locate the right task, estimated completion time, and next step quickly."
            >
              <div className="portal-card rounded-[2rem] p-6 ring-1 ring-white/40">
                <p className="text-sm font-semibold uppercase tracking-[0.24em] text-sky-800">Browse pathways</p>
                <div className="mt-4 grid gap-3 sm:grid-cols-2">
                  {lifeStages.map((stage) => (
                    <a key={stage.id} href={`#${stage.id}`} className="rounded-[1.25rem] bg-slate-50 px-4 py-4 text-sm font-semibold text-slate-800 ring-1 ring-slate-200">
                      {stage.title}
                    </a>
                  ))}
                </div>
              </div>
            </Hero>

            <section className="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
              <SectionHeading
                eyebrow="Resident categories"
                title="Choose the services that fit your situation"
                copy="Each service card includes a concise description and an estimated completion time for the online process."
              />
              <div className="space-y-8">
                {lifeStages.map((stage) => (
                  <section key={stage.id} id={stage.id} className="portal-card rounded-[2rem] p-6 ring-1 ring-slate-200/70">
                    <div className="grid gap-6 lg:grid-cols-[0.72fr_1.28fr]">
                      <div>
                        <p className="text-sm font-semibold uppercase tracking-[0.28em] text-sky-800">{stage.title}</p>
                        <p className="mt-3 text-2xl font-semibold text-slate-900">{stage.description}</p>
                        <p className="mt-4 text-sm leading-7 text-slate-600">
                          Residents can begin online, save progress, and return later from any device linked to their state account.
                        </p>
                      </div>
                      <div className="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
                        {stage.services.map((service) => (
                          <a key={service.name} href={service.href} className="rounded-[1.4rem] bg-slate-50 p-5 ring-1 ring-slate-200 transition hover:-translate-y-1">
                            <p className="text-lg font-semibold text-slate-900">{service.name}</p>
                            <p className="mt-2 text-sm text-slate-600">Available online with secure document upload and email updates.</p>
                            <p className="mt-4 text-sm font-semibold text-sky-800">{service.eta}</p>
                          </a>
                        ))}
                      </div>
                    </div>
                  </section>
                ))}
              </div>
            </section>
          </Shell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
