<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Support | State of Vermont</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sky: {
                50: "#f4f9fd",
                100: "#d7ebf9",
                700: "#1f5f91",
                800: "#184d77",
                900: "#17324d",
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="./shared.js"></script>
    <script type="text/babel" data-presets="react">
      const { Shell, Hero, SectionHeading, helplines } = window.GovernmentPortal;

      function App() {
        return (
          <Shell current="./contact.html">
            <Hero
              eyebrow="Contact support"
              title="Get help from the right state team"
              copy="Residents can chat with a representative, call a department helpline, or submit feedback to improve the portal experience."
            >
              <div className="portal-card rounded-[2rem] p-6 ring-1 ring-white/40">
                <p className="text-sm font-semibold uppercase tracking-[0.24em] text-sky-800">Live chat</p>
                <p className="mt-3 text-2xl font-semibold text-slate-900">Chat with a representative</p>
                <p className="mt-2 text-sm leading-6 text-slate-600">Mon-Fri 8am-5pm</p>
                <div className="mt-5 rounded-[1.5rem] bg-slate-50 p-4 ring-1 ring-slate-200">
                  <p className="text-sm text-slate-700">Representative Ana M. is available now. Average wait time: 2 minutes.</p>
                </div>
                <button type="button" className="mt-5 rounded-full bg-sky-900 px-5 py-3 text-sm font-semibold text-white">
                  Start chat
                </button>
              </div>
            </Hero>

            <section className="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
              <div className="grid gap-8 lg:grid-cols-[0.9fr_1.1fr]">
                <div className="space-y-6">
                  <div className="portal-card rounded-[2rem] p-6 ring-1 ring-slate-200/70">
                    <SectionHeading
                      eyebrow="Helplines"
                      title="Call by department"
                      copy="Use the direct support number that matches your service need."
                    />
                    <div className="space-y-4">
                      {helplines.map((line) => (
                        <div key={line.dept} className="rounded-[1.35rem] bg-slate-50 p-4 ring-1 ring-slate-200">
                          <p className="text-lg font-semibold text-slate-900">{line.dept}</p>
                          <p className="mt-2 text-sm font-semibold text-sky-800">{line.phone}</p>
                          <p className="mt-1 text-sm text-slate-600">{line.hours}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="calm-stripe rounded-[2rem] p-6 ring-1 ring-sky-100">
                    <p className="text-sm font-semibold uppercase tracking-[0.24em] text-sky-800">Multilingual support</p>
                    <p className="mt-4 text-sm leading-7 text-slate-600">
                      Interpretation and translated follow-up are available in Spanish, French, Nepali, and additional languages upon request for all resident support channels.
                    </p>
                  </div>
                </div>

                <div className="portal-card rounded-[2rem] p-6 ring-1 ring-slate-200/70">
                  <SectionHeading
                    eyebrow="Feedback"
                    title="Tell us how to improve the website"
                    copy="This form helps the state prioritize usability fixes, clearer content, and accessibility improvements."
                  />
                  <div className="grid gap-5">
                    {[
                      ["Your name", "Jordan Rivera"],
                      ["Email address", "jordan.rivera@example.com"],
                      ["Page or service", "Benefits eligibility screener"],
                      ["Suggestion", "Add clearer document examples for heating assistance applications."],
                    ].map(([label, value], index) => (
                      <label key={label} className="block">
                        <span className="text-sm font-semibold text-slate-700">{label}</span>
                        <div className={`mt-2 rounded-[1rem] bg-slate-50 px-4 ${index === 3 ? "py-5 min-h-[8rem]" : "py-4"} ring-1 ring-slate-200`}>
                          {value}
                        </div>
                      </label>
                    ))}
                    <button type="button" className="rounded-full bg-sky-900 px-5 py-3 text-sm font-semibold text-white">
                      Submit feedback
                    </button>
                  </div>
                </div>
              </div>
            </section>
          </Shell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
