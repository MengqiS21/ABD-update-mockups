<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About the Portal | State of Vermont</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sky: {
                50: "#f4f9fd",
                100: "#d7ebf9",
                700: "#1f5f91",
                800: "#184d77",
                900: "#17324d",
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="./shared.js"></script>
    <script type="text/babel" data-presets="react">
      const { Shell, Hero, SectionHeading, agencyDirectory } = window.GovernmentPortal;

      function App() {
        return (
          <Shell current="./about.html">
            <Hero
              eyebrow="About government"
              title="How the resident portal supports transparent, accessible service delivery"
              copy="The portal is designed to reduce friction between residents and state agencies by centralizing services, updates, and support in one trustworthy experience."
            >
              <div className="portal-card rounded-[2rem] p-6 ring-1 ring-white/40">
                <div className="flex items-center gap-4">
                  <div className="flex h-20 w-20 items-center justify-center rounded-[1.5rem] bg-sky-100 text-2xl font-bold text-sky-900">
                    GM
                  </div>
                  <div>
                    <p className="text-sm font-semibold uppercase tracking-[0.24em] text-sky-800">Governor's message</p>
                    <p className="mt-2 text-lg font-semibold text-slate-900">Serving every resident with simpler digital services</p>
                  </div>
                </div>
                <p className="mt-4 text-sm leading-7 text-slate-600">
                  "Our goal is straightforward: make it easier for Vermonters to complete essential tasks, understand their options, and trust the information they receive from state government."
                </p>
              </div>
            </Hero>

            <section className="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
              <div className="grid gap-8 lg:grid-cols-[1fr_1fr]">
                <div className="portal-card rounded-[2rem] p-6 ring-1 ring-slate-200/70">
                  <SectionHeading
                    eyebrow="Welcome"
                    title="Governor's welcome"
                    copy="This portal reflects a statewide effort to build clear, fast, and accessible digital public services."
                  />
                  <div className="rounded-[1.5rem] bg-slate-50 p-5 ring-1 ring-slate-200">
                    <p className="text-sm leading-7 text-slate-600">
                      Residents should not need to understand agency boundaries to get help. This portal organizes services around resident needs, publishes updates in plain language, and expands access through multilingual and accessible design patterns.
                    </p>
                  </div>
                </div>
                <div id="directory" className="portal-card rounded-[2rem] p-6 ring-1 ring-slate-200/70">
                  <SectionHeading
                    eyebrow="Agency directory"
                    title="State agencies and what they manage"
                    copy="Find the primary state office connected to each major resident service area."
                  />
                  <div className="space-y-4">
                    {agencyDirectory.map((agency) => (
                      <div key={agency.agency} className="rounded-[1.4rem] bg-slate-50 p-4 ring-1 ring-slate-200">
                        <p className="text-lg font-semibold text-slate-900">{agency.agency}</p>
                        <p className="mt-2 text-sm text-slate-600">{agency.service}</p>
                        <p className="mt-3 text-sm font-semibold text-sky-800">{agency.phone}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>

            <section id="transparency" className="mx-auto max-w-7xl px-4 py-2 sm:px-6 lg:px-8">
              <div className="grid gap-8 lg:grid-cols-[1.05fr_0.95fr]">
                <div className="calm-stripe rounded-[2rem] p-6 ring-1 ring-sky-100">
                  <SectionHeading
                    eyebrow="Open data"
                    title="Transparency reports and public datasets"
                    copy="Performance reporting, service delivery metrics, and public records help residents track how government programs are operating."
                  />
                  <div className="grid gap-4 sm:grid-cols-2">
                    {[
                      "Quarterly service completion rates",
                      "Digital accessibility scorecards",
                      "Benefits processing timelines",
                      "Agency response-time dashboards",
                    ].map((item) => (
                      <div key={item} className="rounded-[1.3rem] bg-white p-4 ring-1 ring-slate-200">
                        <p className="text-sm font-semibold text-slate-800">{item}</p>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="space-y-6">
                  <div className="portal-card rounded-[2rem] p-6 ring-1 ring-slate-200/70">
                    <p className="text-sm font-semibold uppercase tracking-[0.24em] text-sky-800">Legislative news</p>
                    <div className="mt-4 space-y-4">
                      {[
                        "Committee hearings scheduled for digital identity modernization",
                        "Budget update expands resident outreach and translation services",
                        "Transportation package includes funding for online appointment capacity",
                      ].map((news) => (
                        <article key={news} className="rounded-[1.25rem] bg-slate-50 p-4 ring-1 ring-slate-200">
                          <p className="text-base font-semibold text-slate-900">{news}</p>
                        </article>
                      ))}
                    </div>
                  </div>
                  <div className="portal-card rounded-[2rem] p-6 ring-1 ring-slate-200/70">
                    <p className="text-sm font-semibold uppercase tracking-[0.24em] text-sky-800">Accessibility compliance</p>
                    <p className="mt-4 text-sm leading-7 text-slate-600">
                      The resident portal is designed to meet WCAG 2.1 AA expectations through keyboard support, semantic structure, color contrast controls, language support, and continuous accessibility review during service updates.
                    </p>
                  </div>
                </div>
              </div>
            </section>
          </Shell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
