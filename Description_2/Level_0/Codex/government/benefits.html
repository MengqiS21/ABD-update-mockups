<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apply for Benefits | State of Vermont</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sky: {
                50: "#f4f9fd",
                100: "#d7ebf9",
                700: "#1f5f91",
                800: "#184d77",
                900: "#17324d",
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="./shared.js"></script>
    <script type="text/babel" data-presets="react">
      const { Shell, Hero, SectionHeading, programs } = window.GovernmentPortal;

      function App() {
        return (
          <Shell current="./benefits.html">
            <Hero
              eyebrow="Benefits services"
              title="Screen for benefits and begin an application"
              copy="Residents can answer a short eligibility screener, review likely qualifying programs, and move directly into a guided application experience."
            >
              <div className="portal-card rounded-[2rem] p-6 ring-1 ring-white/40">
                <p className="text-sm font-semibold uppercase tracking-[0.24em] text-sky-800">Common programs</p>
                <div className="mt-4 space-y-3">
                  {programs.map((program) => (
                    <div key={program.name} className="rounded-[1.2rem] bg-slate-50 px-4 py-4 ring-1 ring-slate-200">
                      <p className="text-base font-semibold text-slate-900">{program.name}</p>
                      <p className="mt-1 text-sm text-slate-600">{program.tag}</p>
                    </div>
                  ))}
                </div>
              </div>
            </Hero>

            <section className="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
              <div className="grid gap-8 lg:grid-cols-[0.82fr_1.18fr]">
                <div className="portal-card rounded-[2rem] p-6 ring-1 ring-slate-200/70">
                  <SectionHeading
                    eyebrow="Eligibility screener"
                    title="Tell us about your household"
                    copy="This screener uses the information below to highlight programs that may fit your circumstances."
                  />
                  <div className="space-y-5">
                    <label className="block">
                      <span className="text-sm font-semibold text-slate-700">Household size</span>
                      <div className="mt-2 rounded-[1rem] bg-slate-50 px-4 py-4 ring-1 ring-slate-200">3 people</div>
                    </label>
                    <label className="block">
                      <span className="text-sm font-semibold text-slate-700">Monthly income range</span>
                      <div className="mt-2 rounded-[1rem] bg-slate-50 px-4 py-4 ring-1 ring-slate-200">$2,000 - $3,000</div>
                    </label>
                    <label className="block">
                      <span className="text-sm font-semibold text-slate-700">Employment status</span>
                      <div className="mt-2 rounded-[1rem] bg-slate-50 px-4 py-4 ring-1 ring-slate-200">Part-time employed</div>
                    </label>
                    <button type="button" className="w-full rounded-full bg-sky-900 px-5 py-3 text-sm font-semibold text-white">
                      View results
                    </button>
                  </div>
                </div>

                <div className="space-y-6">
                  <div className="calm-stripe rounded-[2rem] p-6 ring-1 ring-sky-100">
                    <SectionHeading
                      eyebrow="Results"
                      title="Programs you may qualify for"
                      copy="Based on the sample household information above, these programs are likely matches. Final eligibility is confirmed during the formal application."
                    />
                    <div className="grid gap-4">
                      {programs.map((program) => (
                        <article key={program.name} className="rounded-[1.5rem] bg-white p-5 ring-1 ring-slate-200">
                          <div className="flex flex-wrap items-start justify-between gap-4">
                            <div>
                              <p className="text-sm font-semibold uppercase tracking-[0.24em] text-sky-800">{program.tag}</p>
                              <h3 className="mt-2 text-xl font-semibold text-slate-900">{program.name}</h3>
                              <p className="mt-3 max-w-2xl text-sm leading-6 text-slate-600">{program.summary}</p>
                            </div>
                            <a href="./contact.html" className="rounded-full bg-sky-900 px-5 py-3 text-sm font-semibold text-white">
                              {program.cta}
                            </a>
                          </div>
                        </article>
                      ))}
                    </div>
                  </div>

                  <div className="portal-card rounded-[2rem] p-6 ring-1 ring-slate-200/70">
                    <p className="text-sm font-semibold uppercase tracking-[0.24em] text-sky-800">Next steps</p>
                    <div className="mt-4 grid gap-4 sm:grid-cols-3">
                      {[
                        "Create or sign in to your resident account",
                        "Upload proof of income and household identity",
                        "Track messages and case updates in the portal inbox",
                      ].map((item, index) => (
                        <div key={item} className="rounded-[1.3rem] bg-slate-50 p-4 ring-1 ring-slate-200">
                          <p className="text-xs font-semibold uppercase tracking-[0.24em] text-sky-800">{`Step ${index + 1}`}</p>
                          <p className="mt-2 text-sm leading-6 text-slate-700">{item}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </Shell>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
