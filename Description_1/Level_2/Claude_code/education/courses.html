<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Courses | LearnPath</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *:focus-visible { outline: 3px solid #4f46e5; outline-offset: 3px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const NAV_LINKS = [
      { href: 'courses.html', label: 'Courses' },
      { href: 'pricing.html', label: 'Pricing' },
      { href: 'dashboard.html', label: 'Dashboard' },
    ];

    function Header({ current }) {
      const [open, setOpen] = useState(false);
      return (
        <header className="bg-white border-b border-gray-200 sticky top-0 z-40" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16">
              <a href="index.html" className="flex items-center gap-2 rounded-md" aria-label="LearnPath — Go to homepage">
                <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center" aria-hidden="true">
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="white"><path d="M10.394 2.08a1 1 0 00-.788 0l-7 3a1 1 0 000 1.84L5.25 8.051a.999.999 0 01.356-.257l4-1.714a1 1 0 11.788 1.838L7.667 9.088l1.94.831a1 1 0 00.787 0l7-3a1 1 0 000-1.838l-7-3z"/><path d="M3.31 9.397L5 10.12v4.102a8.969 8.969 0 00-1.05-.174 1 1 0 01-.89-.89 11.115 11.115 0 01.25-3.762zM9.3 16.573A9.026 9.026 0 007 14.935v-3.957l1.818.78a3 3 0 002.364 0l5.508-2.361a11.026 11.026 0 01.25 3.762 1 1 0 01-.89.89 8.968 8.968 0 00-5.35 2.524 1 1 0 01-1.4 0z"/></svg>
                </div>
                <span className="text-xl font-bold text-indigo-600">LearnPath</span>
              </a>
              <nav aria-label="Main navigation" className="hidden md:flex items-center gap-8">
                {NAV_LINKS.map(l => (
                  <a key={l.href} href={l.href} aria-current={current === l.href ? 'page' : undefined}
                    className={`font-medium transition-colors ${current === l.href ? 'text-indigo-600' : 'text-gray-600 hover:text-indigo-600'}`}>
                    {l.label}
                  </a>
                ))}
              </nav>
              <div className="hidden md:flex items-center gap-3">
                <a href="dashboard.html" className="text-gray-600 hover:text-indigo-600 font-medium px-2 py-1 rounded-md transition-colors">Sign In</a>
                <a href="pricing.html" className="bg-indigo-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">Start Free Trial</a>
              </div>
              <button onClick={() => setOpen(o => !o)} aria-expanded={open} aria-controls="mobile-menu" aria-label={open ? 'Close menu' : 'Open menu'}
                className="md:hidden p-2 rounded-md text-gray-600">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  {open ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/> : <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
            {open && (
              <div id="mobile-menu" className="md:hidden py-4 border-t border-gray-100">
                <nav aria-label="Mobile navigation" className="flex flex-col gap-4">
                  {NAV_LINKS.map(l => <a key={l.href} href={l.href} className="text-gray-600 hover:text-indigo-600 font-medium px-2">{l.label}</a>)}
                  <div className="flex gap-3 px-2 pt-3 border-t border-gray-100 mt-1">
                    <a href="dashboard.html" className="text-gray-600 font-medium">Sign In</a>
                    <a href="pricing.html" className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-semibold">Start Free Trial</a>
                  </div>
                </nav>
              </div>
            )}
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="bg-gray-900 text-gray-400 mt-16" role="contentinfo">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
              <div>
                <a href="index.html" className="flex items-center gap-2 mb-4 rounded-md" aria-label="LearnPath — Go to homepage">
                  <div className="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center" aria-hidden="true"><span className="text-white font-bold text-xs">LP</span></div>
                  <span className="text-white font-bold">LearnPath</span>
                </a>
                <p className="text-sm">Empowering learners worldwide.</p>
              </div>
              <div><h3 className="text-white font-semibold mb-3">Learn</h3><ul className="space-y-2 text-sm"><li><a href="courses.html" className="hover:text-white">Browse Courses</a></li><li><a href="study.html" className="hover:text-white">Study Tools</a></li></ul></div>
              <div><h3 className="text-white font-semibold mb-3">Plans</h3><ul className="space-y-2 text-sm"><li><a href="pricing.html" className="hover:text-white">Pricing</a></li><li><a href="pricing.html" className="hover:text-white">For Teams</a></li></ul></div>
              <div><h3 className="text-white font-semibold mb-3">Company</h3><ul className="space-y-2 text-sm"><li><a href="#" className="hover:text-white">About</a></li><li><a href="#" className="hover:text-white">Careers</a></li></ul></div>
            </div>
            <div className="border-t border-gray-800 mt-8 pt-6 flex flex-col md:flex-row justify-between items-center gap-4 text-sm">
              <p>© 2026 LearnPath, Inc. All rights reserved.</p>
              <div className="flex gap-6"><a href="#" className="hover:text-white">Privacy</a><a href="#" className="hover:text-white">Terms</a><a href="#" className="hover:text-white">Accessibility</a></div>
            </div>
          </div>
        </footer>
      );
    }

    const ALL_COURSES = [
      { id:1, title:'Python for Data Science', instructor:'Dr. Sarah Chen', rating:4.8, reviews:12400, price:'$49.99', level:'Intermediate', duration:'24h', category:'Data Science', free:false, thumb:'📊', badge:'Bestseller' },
      { id:2, title:'The Complete Web Developer Bootcamp', instructor:'Marcus Rivera', rating:4.9, reviews:31200, price:'$59.99', level:'Beginner', duration:'65h', category:'Web Development', free:false, thumb:'💻', badge:'Top Rated' },
      { id:3, title:'UX Design: Wireframe to Prototype', instructor:'Priya Sharma', rating:4.7, reviews:8900, price:'$39.99', level:'Beginner', duration:'18h', category:'UX Design', free:false, thumb:'🎨', badge:'New' },
      { id:4, title:'Advanced Machine Learning', instructor:'Dr. James Okafor', rating:4.8, reviews:6700, price:'$69.99', level:'Advanced', duration:'32h', category:'Data Science', free:false, thumb:'🤖', badge:'' },
      { id:5, title:'HTML & CSS for Beginners', instructor:'Aisha Thompson', rating:4.6, reviews:22100, price:'Free', level:'Beginner', duration:'8h', category:'Web Development', free:true, thumb:'🌐', badge:'Free' },
      { id:6, title:'Business Strategy Fundamentals', instructor:'Prof. Elena Vasquez', rating:4.7, reviews:9800, price:'$44.99', level:'Beginner', duration:'12h', category:'Business', free:false, thumb:'📈', badge:'' },
      { id:7, title:'Photography: Light & Composition', instructor:'Noah Williams', rating:4.9, reviews:5400, price:'$34.99', level:'Beginner', duration:'10h', category:'Photography', free:false, thumb:'📷', badge:'Top Rated' },
      { id:8, title:'React & Next.js — The Full Stack Guide', instructor:'Chloe Park', rating:4.8, reviews:14200, price:'$54.99', level:'Intermediate', duration:'40h', category:'Web Development', free:false, thumb:'⚛️', badge:'' },
      { id:9, title:'Data Visualization with Tableau', instructor:'Dr. Sarah Chen', rating:4.6, reviews:7300, price:'Free', level:'Intermediate', duration:'15h', category:'Data Science', free:true, thumb:'📉', badge:'Free' },
      { id:10, title:'Brand Identity & Logo Design', instructor:'Priya Sharma', rating:4.7, reviews:4100, price:'$29.99', level:'Beginner', duration:'9h', category:'UX Design', free:false, thumb:'✏️', badge:'' },
      { id:11, title:'Entrepreneurship: Start Your Business', instructor:'Prof. Elena Vasquez', rating:4.5, reviews:3800, price:'$39.99', level:'Beginner', duration:'14h', category:'Business', free:false, thumb:'🚀', badge:'' },
      { id:12, title:'Portrait Photography Masterclass', instructor:'Noah Williams', rating:4.8, reviews:2900, price:'$44.99', level:'Advanced', duration:'20h', category:'Photography', free:false, thumb:'🤳', badge:'' },
    ];

    function StarRating({ value, count }) {
      const full = Math.floor(value);
      return (
        <span className="flex items-center gap-1" aria-label={`${value} out of 5 stars, ${count.toLocaleString()} reviews`}>
          <span className="font-semibold text-amber-600 text-sm">{value}</span>
          <span aria-hidden="true" className="flex">
            {[1,2,3,4,5].map(i => (
              <svg key={i} className={`w-3.5 h-3.5 ${i <= full ? 'text-amber-400' : 'text-gray-300'}`} fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
            ))}
          </span>
          <span className="text-gray-400 text-xs">({count.toLocaleString()})</span>
        </span>
      );
    }

    function FilterSidebar({ filters, onChange }) {
      const categories = ['Web Development','Data Science','UX Design','Business','Photography'];
      const levels = ['Beginner','Intermediate','Advanced'];
      const durations = ['0–5 hours','5–20 hours','20+ hours'];
      const ratings = ['4.5 & up','4.0 & up','3.5 & up'];

      function toggle(group, val) {
        const arr = filters[group] || [];
        onChange(group, arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val]);
      }

      return (
        <aside className="w-full lg:w-64 shrink-0" aria-label="Course filters">
          <form onSubmit={e => e.preventDefault()}>
            {/* Category */}
            <fieldset className="mb-6">
              <legend className="font-bold text-gray-900 mb-3 text-sm uppercase tracking-wide">Category</legend>
              <div className="space-y-2">
                {categories.map(cat => {
                  const id = `cat-${cat.replace(/\s+/g,'-').toLowerCase()}`;
                  return (
                    <label key={cat} htmlFor={id} className="flex items-center gap-2 cursor-pointer group">
                      <input type="checkbox" id={id} checked={(filters.category||[]).includes(cat)} onChange={() => toggle('category', cat)}
                        className="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer" />
                      <span className="text-sm text-gray-700 group-hover:text-indigo-600 transition-colors">{cat}</span>
                    </label>
                  );
                })}
              </div>
            </fieldset>

            {/* Level */}
            <fieldset className="mb-6">
              <legend className="font-bold text-gray-900 mb-3 text-sm uppercase tracking-wide">Level</legend>
              <div className="space-y-2">
                {levels.map(lv => {
                  const id = `lv-${lv.toLowerCase()}`;
                  return (
                    <label key={lv} htmlFor={id} className="flex items-center gap-2 cursor-pointer group">
                      <input type="checkbox" id={id} checked={(filters.level||[]).includes(lv)} onChange={() => toggle('level', lv)}
                        className="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer" />
                      <span className="text-sm text-gray-700 group-hover:text-indigo-600 transition-colors">{lv}</span>
                    </label>
                  );
                })}
              </div>
            </fieldset>

            {/* Duration */}
            <fieldset className="mb-6">
              <legend className="font-bold text-gray-900 mb-3 text-sm uppercase tracking-wide">Duration</legend>
              <div className="space-y-2">
                {durations.map(d => {
                  const id = `dur-${d.replace(/\W+/g,'-')}`;
                  return (
                    <label key={d} htmlFor={id} className="flex items-center gap-2 cursor-pointer group">
                      <input type="checkbox" id={id} checked={(filters.duration||[]).includes(d)} onChange={() => toggle('duration', d)}
                        className="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer" />
                      <span className="text-sm text-gray-700 group-hover:text-indigo-600 transition-colors">{d}</span>
                    </label>
                  );
                })}
              </div>
            </fieldset>

            {/* Rating */}
            <fieldset className="mb-6">
              <legend className="font-bold text-gray-900 mb-3 text-sm uppercase tracking-wide">Rating</legend>
              <div className="space-y-2">
                {ratings.map(r => {
                  const id = `rat-${r.replace(/\W+/g,'-')}`;
                  return (
                    <label key={r} htmlFor={id} className="flex items-center gap-2 cursor-pointer group">
                      <input type="radio" name="rating" id={id} checked={(filters.rating||'') === r} onChange={() => onChange('rating', r)}
                        className="w-4 h-4 text-indigo-600 border-gray-300 focus:ring-indigo-500 cursor-pointer" />
                      <span className="text-sm text-gray-700 group-hover:text-indigo-600 transition-colors">{r}</span>
                    </label>
                  );
                })}
              </div>
            </fieldset>

            {/* Price */}
            <fieldset className="mb-6">
              <legend className="font-bold text-gray-900 mb-3 text-sm uppercase tracking-wide">Price</legend>
              <div className="space-y-2">
                {['Free','Paid'].map(p => {
                  const id = `price-${p.toLowerCase()}`;
                  return (
                    <label key={p} htmlFor={id} className="flex items-center gap-2 cursor-pointer group">
                      <input type="checkbox" id={id} checked={(filters.price||[]).includes(p)} onChange={() => toggle('price', p)}
                        className="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer" />
                      <span className="text-sm text-gray-700 group-hover:text-indigo-600 transition-colors">{p}</span>
                    </label>
                  );
                })}
              </div>
            </fieldset>
          </form>
        </aside>
      );
    }

    function CourseCard({ course }) {
      return (
        <article className="bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-md transition-shadow flex flex-col">
          <a href="course-detail.html"
            aria-label={`${course.title} by ${course.instructor} — ${course.level}, ${course.duration}, rated ${course.rating} out of 5, ${course.price}`}
            className="block focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-inset">
            <div className="h-36 bg-gradient-to-br from-indigo-50 to-violet-50 flex items-center justify-center text-4xl" role="img" aria-hidden="true">
              {course.thumb}
            </div>
          </a>
          <div className="p-4 flex flex-col flex-1">
            {course.badge && (
              <span className={`inline-block text-xs font-semibold px-2 py-0.5 rounded mb-2 w-fit ${course.free ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800'}`}
                aria-label={`Badge: ${course.badge}`}>
                {course.badge}
              </span>
            )}
            <h3 className="font-semibold text-gray-900 mb-1 leading-snug text-sm flex-1">
              <a href="course-detail.html" className="hover:text-indigo-600 transition-colors focus:outline-none focus-visible:underline">
                {course.title}
              </a>
            </h3>
            <p className="text-xs text-gray-500 mb-2">{course.instructor}</p>
            <StarRating value={course.rating} count={course.reviews} />
            <div className="flex items-center gap-2 mt-2 mb-3 text-xs text-gray-500">
              <span className="bg-gray-100 px-2 py-0.5 rounded" aria-label={`Level: ${course.level}`}>{course.level}</span>
              <span aria-label={`Duration: ${course.duration}`}>{course.duration}</span>
            </div>
            <div className="flex items-center justify-between mt-auto pt-3 border-t border-gray-100">
              <span className={`font-bold text-base ${course.free ? 'text-emerald-600' : 'text-gray-900'}`}>{course.price}</span>
              <a href="course-detail.html" className="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-indigo-700 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
                View Course
              </a>
            </div>
          </div>
        </article>
      );
    }

    function CoursesPage() {
      const [filters, setFilters] = useState({ category:[], level:[], duration:[], rating:'', price:[] });
      const [sort, setSort] = useState('popular');
      const [search, setSearch] = useState('');

      function handleFilter(group, val) {
        setFilters(f => ({ ...f, [group]: val }));
      }

      const filtered = useMemo(() => {
        let list = ALL_COURSES.filter(c => {
          if (search && !c.title.toLowerCase().includes(search.toLowerCase()) && !c.instructor.toLowerCase().includes(search.toLowerCase())) return false;
          if (filters.category.length && !filters.category.includes(c.category)) return false;
          if (filters.level.length && !filters.level.includes(c.level)) return false;
          if (filters.price.length) {
            const isFree = c.free;
            const wantFree = filters.price.includes('Free');
            const wantPaid = filters.price.includes('Paid');
            if (wantFree && !wantPaid && !isFree) return false;
            if (wantPaid && !wantFree && isFree) return false;
          }
          if (filters.rating) {
            const min = parseFloat(filters.rating);
            if (c.rating < min) return false;
          }
          return true;
        });

        if (sort === 'popular') list = [...list].sort((a,b) => b.reviews - a.reviews);
        else if (sort === 'rated') list = [...list].sort((a,b) => b.rating - a.rating);
        else if (sort === 'newest') list = [...list].sort((a,b) => b.id - a.id);
        return list;
      }, [filters, sort, search]);

      return (
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
          {/* Breadcrumb */}
          <nav aria-label="Breadcrumb" className="mb-6">
            <ol className="flex items-center gap-2 text-sm text-gray-500">
              <li><a href="index.html" className="hover:text-indigo-600">Home</a></li>
              <li aria-hidden="true">›</li>
              <li aria-current="page" className="text-gray-900 font-medium">Courses</li>
            </ol>
          </nav>

          <div className="flex items-center justify-between mb-6">
            <h1 className="text-2xl font-bold text-gray-900">All Courses</h1>
          </div>

          {/* Search + Sort */}
          <div className="flex flex-col sm:flex-row gap-4 mb-8">
            <div className="flex-1">
              <label htmlFor="course-search" className="sr-only">Search courses</label>
              <div className="relative">
                <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input id="course-search" type="search" value={search} onChange={e => setSearch(e.target.value)}
                  placeholder="Search courses or instructors…"
                  className="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" />
              </div>
            </div>
            <div>
              <label htmlFor="sort-select" className="sr-only">Sort courses</label>
              <select id="sort-select" value={sort} onChange={e => setSort(e.target.value)}
                className="border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                <option value="popular">Most Popular</option>
                <option value="rated">Highest Rated</option>
                <option value="newest">Newest</option>
              </select>
            </div>
          </div>

          <div className="flex flex-col lg:flex-row gap-8">
            {/* Sidebar filters */}
            <div className="lg:sticky lg:top-20 lg:self-start">
              <FilterSidebar filters={filters} onChange={handleFilter} />
            </div>

            {/* Course grid */}
            <div className="flex-1">
              <div className="flex items-center justify-between mb-4">
                <p className="text-sm text-gray-600" aria-live="polite" aria-atomic="true">
                  Showing <strong>{filtered.length}</strong> {filtered.length === 1 ? 'course' : 'courses'}
                </p>
                {(filters.category.length > 0 || filters.level.length > 0 || filters.rating || filters.price.length > 0 || search) && (
                  <button onClick={() => { setFilters({ category:[], level:[], duration:[], rating:'', price:[] }); setSearch(''); }}
                    className="text-sm text-indigo-600 hover:text-indigo-700 font-medium focus:outline-none focus-visible:underline">
                    Clear all filters
                  </button>
                )}
              </div>

              {filtered.length === 0 ? (
                <div className="text-center py-20" role="status" aria-live="polite">
                  <div className="text-5xl mb-4" aria-hidden="true">🔍</div>
                  <h2 className="text-xl font-semibold text-gray-900 mb-2">No courses found</h2>
                  <p className="text-gray-500 mb-6">We couldn't find any courses matching your current filters. Try adjusting or clearing your filters.</p>
                  <button onClick={() => { setFilters({ category:[], level:[], duration:[], rating:'', price:[] }); setSearch(''); }}
                    className="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
                    Clear Filters
                  </button>
                </div>
              ) : (
                <ul className="grid sm:grid-cols-2 xl:grid-cols-3 gap-5 list-none p-0" role="list" aria-label="Course results">
                  {filtered.map(c => (
                    <li key={c.id} role="listitem">
                      <CourseCard course={c} />
                    </li>
                  ))}
                </ul>
              )}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <div className="flex flex-col min-h-screen">
          <a href="#main-content" className="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-indigo-600 text-white px-4 py-2 rounded-lg z-50">Skip to main content</a>
          <Header current="courses.html" />
          <main id="main-content" className="flex-1">
            <CoursesPage />
          </main>
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
