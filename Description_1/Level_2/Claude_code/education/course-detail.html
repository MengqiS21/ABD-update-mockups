    function EnrollModal({ onClose, onConfirm }) {
      const dialogRef = useRef(null);
      const firstFocusRef = useRef(null);
      const lastFocusRef = useRef(null);

      useEffect(() => {
        if (firstFocusRef.current) firstFocusRef.current.focus();

        function trapFocus(e) {
          if (!dialogRef.current) return;
          const focusable = dialogRef.current.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (e.key === 'Tab') {
            if (e.shiftKey) {
              if (document.activeElement === first) { e.preventDefault(); last.focus(); }
            } else {
              if (document.activeElement === last) { e.preventDefault(); first.focus(); }
            }
          }
          if (e.key === 'Escape') onClose();
        }

        document.addEventListener('keydown', trapFocus);
        return () => document.removeEventListener('keydown', trapFocus);
      }, [onClose]);

      return (
        <div className="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" ref={dialogRef}
          onClick={e => { if (e.target === e.currentTarget) onClose(); }}>

                  </label>

                    className="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" />
                </div>

    function AccordionSection({ section, index, isOpen, onToggle }) {
      const total = section.lessons.length;
      const btnId = `accordion-btn-${section.id}`;
      const panelId = `accordion-panel-${section.id}`;

      function handleKey(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          onToggle();
        }
      }

      return (
        <li className="border border-gray-200 rounded-xl overflow-hidden">
          <h3>
            <button id={btnId} aria-expanded={isOpen} aria-controls={panelId}
              onClick={onToggle} onKeyDown={handleKey}
              className="w-full flex items-center justify-between p-4 bg-white hover:bg-gray-50 transition-colors text-left focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-inset">

                <span className="font-semibold text-gray-900">Section {index + 1}: {section.title}</span>
                <span className="block text-sm text-gray-500 mt-0.5">{total} lessons</span>

              <svg className={`w-5 h-5 text-gray-500 transition-transform ${isOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">

                        <div className="text-5xl font-extrabold text-gray-900" aria-label="Overall rating: 4.8 out of 5">4.8</div>
                        <StarRating value={5} />
                        <div className="text-xs text-gray-500 mt-1">Course Rating</div>
                      </div>
                      <div className="flex-1 space-y-2">
                        {[['5 stars', 72], ['4 stars', 20], ['3 stars', 6], ['2 stars', 1], ['1 star', 1]].map(([label, pct]) => (
                          <div key={label} className="flex items-center gap-2 text-sm">
                            <span className="w-14 text-gray-500 text-xs">{label}</span>
                            <div className="flex-1 bg-gray-200 rounded-full h-2" role="progressbar" aria-valuenow={pct} aria-valuemin={0} aria-valuemax={100} aria-label={`${label}: ${pct}%`}>
                              <div className="bg-amber-400 h-2 rounded-full" style={{ width: `${pct}%` }}></div>
                            </div>
                            <span className="w-8 text-gray-500 text-xs text-right">{pct}%</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  <ul className="space-y-4 list-none p-0">
                    {REVIEWS.map(r => (
                      <li key={r.id} className="bg-white rounded-2xl border border-gray-200 p-5">
                        <div className="flex items-start gap-3">
                          <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-sm font-bold text-indigo-700 shrink-0" aria-hidden="true">
                            {r.name.charAt(0)}
                          </div>
                          <div className="flex-1">
                            <div className="flex items-center justify-between mb-1">
                              <span className="font-semibold text-gray-900">{r.name}</span>
                              <time className="text-xs text-gray-400">{r.date}</time>
                            </div>
                            <StarRating value={r.rating} />
                            <p className="text-sm text-gray-600 mt-2 leading-relaxed">{r.text}</p>
                          </div>
                        </div>
                      </li>
                    ))}
                  </ul>
                </section>
              </div>

              {/* Sticky Enrollment Sidebar — after main content in DOM (cat_10) */}
              <aside className="lg:w-80 shrink-0" aria-label="Course enrollment">
                <div className="lg:sticky lg:top-24">
                  <div className="bg-white border border-gray-200 rounded-2xl shadow-lg overflow-hidden">
                    <div className="h-36 bg-gradient-to-br from-indigo-100 to-violet-100 flex items-center justify-center text-5xl" role="img" aria-label="Python for Data Science course thumbnail">📊</div>
                    <div className="p-6">
                      <div className="flex items-end gap-3 mb-1">
                        <span className="text-3xl font-extrabold text-gray-900">$34.99</span>
                        <span className="text-gray-400 line-through text-lg">$49.99</span>
                        <span className="text-emerald-600 font-semibold text-sm">30% off</span>
                      </div>
                      <p className="text-xs text-red-500 mb-4">⏰ <strong>2 days</strong> left at this price!</p>

                      {enrolled ? (
                        <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 mb-4 text-center">
                          <p className="text-emerald-700 font-semibold">✅ Enrolled! You're in.</p>
                          <a href="study.html" className="block mt-3 bg-emerald-600 text-white font-bold py-2.5 rounded-lg hover:bg-emerald-700 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500">
                            Start Learning →
                          </a>
                        </div>
                      ) : (
                        <button ref={enrollBtnRef} onClick={() => setModalOpen(true)}
                          className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-colors mb-3 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500"
                          aria-label="Enroll now in Python for Data Science for $34.99">
                          Enroll Now — $34.99
                        </button>
                      )}

                      <a href="study.html" className="block w-full border-2 border-gray-300 text-gray-700 font-semibold py-3 rounded-xl hover:bg-gray-50 transition-colors text-center focus:outline-none focus-visible:ring-2 focus-visible:ring-gray-400 mb-4">
                        Try Free Preview
                      </a>

                      <p className="text-xs text-center text-gray-400 mb-4">30-day money-back guarantee</p>

                      <div className="space-y-2 text-sm text-gray-600">
                        {[
                          { icon:'⏱', text:'24 hours total' },
                          { icon:'♾️', text:'Lifetime access' },
                          { icon:'📱', text:'Mobile & desktop' },
                          { icon:'🏆', text:'Certificate included' },
                        ].map(item => (
                          <div key={item.text} className="flex items-center gap-2">
                            <span aria-hidden="true">{item.icon}</span>
                            <span>{item.text}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </aside>
            </div>
          </div>
        </>
      );
    }

    function App() {
      return (
        <div className="flex flex-col min-h-screen">
          <a href="#main-content" className="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-indigo-600 text-white px-4 py-2 rounded-lg z-50">Skip to main content</a>
          <Header current="" />
          <main id="main-content" className="flex-1">
            <CourseDetailPage />
          </main>
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
