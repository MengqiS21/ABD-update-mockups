<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnPath — Unlock Your Potential. Learn at Your Own Pace.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            indigo: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *:focus-visible { outline: 3px solid #4f46e5; outline-offset: 3px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    .star-fill { color: #f59e0b; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const NAV_LINKS = [
      { href: 'courses.html', label: 'Courses' },
      { href: 'pricing.html', label: 'Pricing' },
      { href: 'dashboard.html', label: 'Dashboard' },
    ];

    function Header({ current }) {
      const [open, setOpen] = useState(false);
      return (
        <header className="bg-white border-b border-gray-200 sticky top-0 z-40" role="banner">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16">
              <a href="index.html" className="flex items-center gap-2 rounded-md" aria-label="LearnPath — Go to homepage">
                <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center" aria-hidden="true">
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="white"><path d="M10.394 2.08a1 1 0 00-.788 0l-7 3a1 1 0 000 1.84L5.25 8.051a.999.999 0 01.356-.257l4-1.714a1 1 0 11.788 1.838L7.667 9.088l1.94.831a1 1 0 00.787 0l7-3a1 1 0 000-1.838l-7-3z"/><path d="M3.31 9.397L5 10.12v4.102a8.969 8.969 0 00-1.05-.174 1 1 0 01-.89-.89 11.115 11.115 0 01.25-3.762zM9.3 16.573A9.026 9.026 0 007 14.935v-3.957l1.818.78a3 3 0 002.364 0l5.508-2.361a11.026 11.026 0 01.25 3.762 1 1 0 01-.89.89 8.968 8.968 0 00-5.35 2.524 1 1 0 01-1.4 0z"/></svg>

                <span className="text-xl font-bold text-indigo-600">LearnPath</span>
              </a>
              <nav aria-label="Main navigation" className="hidden md:flex items-center gap-8">
                {NAV_LINKS.map(l => (
                  <a key={l.href} href={l.href} aria-current={current === l.href ? 'page' : undefined}

                    {l.label}
                  </a>
                ))}
              </nav>
              <div className="hidden md:flex items-center gap-3">
                <a href="dashboard.html" className="text-gray-600 hover:text-indigo-600 font-medium px-2 py-1 rounded-md transition-colors">Sign In</a>
                <a href="pricing.html" className="bg-indigo-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">Start Free Trial</a>
              </div>
              <button onClick={() => setOpen(o => !o)} aria-expanded={open} aria-controls="mobile-menu" aria-label={open ? 'Close menu' : 'Open menu'}
                className="md:hidden p-2 rounded-md text-gray-600">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  {open ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/> : <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>}
                </svg>
              </button>
            </div>
            {open && (
              <div id="mobile-menu" className="md:hidden py-4 border-t border-gray-100">
                <nav aria-label="Mobile navigation" className="flex flex-col gap-4">
                  {NAV_LINKS.map(l => <a key={l.href} href={l.href} className="text-gray-600 hover:text-indigo-600 font-medium px-2">{l.label}</a>)}
                  <div className="flex gap-3 px-2 pt-3 border-t border-gray-100 mt-1">
                    <a href="dashboard.html" className="text-gray-600 font-medium">Sign In</a>
                    <a href="pricing.html" className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-semibold">Start Free Trial</a>
                  </div>
                </nav>
              </div>
            )}
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="bg-gray-900 text-gray-400" role="contentinfo">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
              <div>
                <a href="index.html" className="flex items-center gap-2 mb-4 rounded-md" aria-label="LearnPath — Go to homepage">
                  <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center" aria-hidden="true">
                    <span className="text-white font-bold text-sm">LP</span>
                  </div>
                  <span className="text-white font-bold text-lg">LearnPath</span>
                </a>
                <p className="text-sm leading-relaxed">Empowering learners worldwide with quality education for the modern economy.</p>
              </div>
              <div>
                <h3 className="text-white font-semibold mb-4">Learn</h3>
                <ul className="space-y-2 text-sm">
                  <li><a href="courses.html" className="hover:text-white transition-colors">Browse Courses</a></li>
                  <li><a href="courses.html" className="hover:text-white transition-colors">Learning Paths</a></li>
                  <li><a href="study.html" className="hover:text-white transition-colors">Study Tools</a></li>
                </ul>
              </div>
              <div>
                <h3 className="text-white font-semibold mb-4">Plans</h3>
                <ul className="space-y-2 text-sm">
                  <li><a href="pricing.html" className="hover:text-white transition-colors">Pricing</a></li>
                  <li><a href="pricing.html" className="hover:text-white transition-colors">For Teams</a></li>
                  <li><a href="pricing.html" className="hover:text-white transition-colors">Enterprise</a></li>
                </ul>
              </div>
              <div>
                <h3 className="text-white font-semibold mb-4">Company</h3>
                <ul className="space-y-2 text-sm">
                  <li><a href="#" className="hover:text-white transition-colors">About Us</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">Careers</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">Contact</a></li>
                </ul>
              </div>
            </div>
            <div className="border-t border-gray-800 mt-10 pt-8 flex flex-col md:flex-row justify-between items-center gap-4">
              <p className="text-sm">© 2026 LearnPath, Inc. All rights reserved.</p>
              <div className="flex gap-6 text-sm">
                <a href="#" className="hover:text-white transition-colors">Privacy Policy</a>
                <a href="#" className="hover:text-white transition-colors">Terms of Service</a>
                <a href="#" className="hover:text-white transition-colors">Accessibility</a>
              </div>
            </div>
          </div>
        </footer>
      );
    }

    const CATEGORIES = [
      { name: 'Web Development', icon: '💻', count: '1,240 courses', color: 'bg-blue-50 hover:bg-blue-100 border-blue-200', iconBg: 'bg-blue-100' },
      { name: 'Data Science', icon: '📊', count: '890 courses', color: 'bg-emerald-50 hover:bg-emerald-100 border-emerald-200', iconBg: 'bg-emerald-100' },
      { name: 'UX Design', icon: '🎨', count: '540 courses', color: 'bg-violet-50 hover:bg-violet-100 border-violet-200', iconBg: 'bg-violet-100' },
      { name: 'Business', icon: '📈', count: '720 courses', color: 'bg-amber-50 hover:bg-amber-100 border-amber-200', iconBg: 'bg-amber-100' },
      { name: 'Photography', icon: '📷', count: '310 courses', color: 'bg-rose-50 hover:bg-rose-100 border-rose-200', iconBg: 'bg-rose-100' },
    ];

    const FEATURED_COURSES = [
      { id:1, title:'Python for Data Science', instructor:'Dr. Sarah Chen', rating:4.8, reviews:12400, enrolled:'84,000', price:'$49.99', level:'Intermediate', duration:'24h', badge:'Bestseller', thumb:'📊' },
      { id:2, title:'The Complete Web Developer Bootcamp', instructor:'Marcus Rivera', rating:4.9, reviews:31200, enrolled:'210,000', price:'$59.99', level:'Beginner', duration:'65h', badge:'Top Rated', thumb:'💻' },
      { id:3, title:'UX Design: From Wireframe to Prototype', instructor:'Priya Sharma', rating:4.7, reviews:8900, enrolled:'52,000', price:'$39.99', level:'Beginner', duration:'18h', badge:'New', thumb:'🎨' },
      { id:4, title:'Advanced Machine Learning with TensorFlow', instructor:'Dr. James Okafor', rating:4.8, reviews:6700, enrolled:'38,000', price:'$69.99', level:'Advanced', duration:'32h', badge:'', thumb:'🤖' },
    ];

    function StarRating({ value, count }) {
      const full = Math.floor(value);
      return (
        <span className="flex items-center gap-1" aria-label={`${value} stars out of 5, ${count.toLocaleString()} reviews`}>
          <span className="font-semibold text-amber-600 text-sm">{value}</span>
          <span aria-hidden="true" className="flex">
            {[1,2,3,4,5].map(i => (
              <svg key={i} className={`w-4 h-4 ${i <= full ? 'text-amber-400' : 'text-gray-300'}`} fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
            ))}
          </span>
          <span className="text-gray-500 text-xs">({count.toLocaleString()})</span>
        </span>
      );
    }

    function CourseCard({ course }) {
      return (
        <article className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
          <a href="course-detail.html"
            aria-label={`${course.title} by ${course.instructor} — ${course.level}, ${course.duration}, rated ${course.rating} out of 5, ${course.price}`}
            className="block focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 rounded-t-xl">
            <div className="h-40 bg-gradient-to-br from-indigo-50 to-indigo-100 flex items-center justify-center text-5xl" role="img" aria-hidden="true">
              {course.thumb}
            </div>
          </a>
          <div className="p-4">
            {course.badge && (
              <span className="inline-block bg-amber-100 text-amber-800 text-xs font-semibold px-2 py-0.5 rounded mb-2" aria-label={`Badge: ${course.badge}`}>
                {course.badge}
              </span>
            )}
            <h3 className="font-semibold text-gray-900 mb-1 leading-snug">
              <a href="course-detail.html" className="hover:text-indigo-600 transition-colors focus:outline-none focus-visible:underline"
                aria-label={`Course: ${course.title} by ${course.instructor}`}>
                {course.title}
              </a>
            </h3>
            <p className="text-sm text-gray-500 mb-2">{course.instructor}</p>
            <StarRating value={course.rating} count={course.reviews} />
            <div className="flex items-center gap-2 mt-2 text-xs text-gray-500">
              <span aria-label={`Level: ${course.level}`}>{course.level}</span>
              <span aria-hidden="true">·</span>
              <span aria-label={`Duration: ${course.duration}`}>{course.duration}</span>
              <span aria-hidden="true">·</span>
              <span aria-label={`Enrolled: ${course.enrolled} students`}>{course.enrolled} students</span>
            </div>
            <div className="flex items-center justify-between mt-3">
              <span className="font-bold text-gray-900 text-lg">{course.price}</span>
              <a href="course-detail.html" className="bg-indigo-600 text-white text-sm px-3 py-1.5 rounded-lg hover:bg-indigo-700 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500">
                Enroll Now
              </a>
            </div>
          </div>
        </article>
      );
    }

    function HomePage() {
      return (
        <>

          <section className="bg-gradient-to-br from-indigo-900 via-indigo-800 to-violet-800 text-white py-20 px-4" aria-labelledby="hero-heading">
            <div className="max-w-4xl mx-auto text-center">
              <div className="inline-block bg-indigo-700 bg-opacity-60 text-indigo-200 text-sm font-semibold px-4 py-1.5 rounded-full mb-6">
                🎓 Trusted by 2 million+ learners worldwide
              </div>
              <h1 id="hero-heading" className="text-4xl md:text-6xl font-extrabold mb-6 leading-tight">
                Unlock Your Potential.<br className="hidden md:block" /> Learn at Your Own Pace.
              </h1>
              <p className="text-indigo-200 text-lg md:text-xl max-w-2xl mx-auto mb-10 leading-relaxed">
                Explore thousands of expert-led courses in technology, business, design, and more.
                Start learning today and advance your career on your schedule.
              </p>
              <div className="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="courses.html" className="bg-white text-indigo-700 font-bold px-8 py-4 rounded-xl text-lg hover:bg-indigo-50 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-indigo-800">
                  Browse Courses
                </a>
                <a href="pricing.html" className="bg-indigo-500 text-white font-bold px-8 py-4 rounded-xl text-lg border-2 border-indigo-400 hover:bg-indigo-600 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-indigo-800">
                  Start Free Trial
                </a>
              </div>
              <p className="text-indigo-300 text-sm mt-6">No credit card required · Cancel anytime</p>
            </div>
          </section>

          {/* Categories */}
          <section className="py-16 px-4" aria-labelledby="categories-heading">
            <div className="max-w-7xl mx-auto">
              <div className="text-center mb-10">
                <h2 id="categories-heading" className="text-3xl font-bold text-gray-900 mb-3">Explore by Category</h2>
                <p className="text-gray-500 text-lg">Find courses in the topics you care about most</p>
              </div>
              <ul className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 list-none p-0" role="list">
                {CATEGORIES.map(cat => (
                  <li key={cat.name}>
                    <a href="courses.html" className={`flex flex-col items-center gap-3 p-6 rounded-2xl border-2 transition-all ${cat.color} focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500`}
                      aria-label={`Browse ${cat.name} — ${cat.count}`}>
                      <span className={`w-14 h-14 ${cat.iconBg} rounded-2xl flex items-center justify-center text-3xl`} aria-hidden="true">{cat.icon}</span>
                      <span className="font-semibold text-gray-800 text-center">{cat.name}</span>
                      <span className="text-xs text-gray-500">{cat.count}</span>
                    </a>
                  </li>
                ))}
              </ul>
            </div>
          </section>

          {/* Featured Courses */}
          <section className="bg-white py-16 px-4" aria-labelledby="featured-heading">
            <div className="max-w-7xl mx-auto">
              <div className="flex items-center justify-between mb-10">
                <div>
                  <h2 id="featured-heading" className="text-3xl font-bold text-gray-900 mb-2">Featured Courses</h2>
                  <p className="text-gray-500">Hand-picked by our curriculum team</p>
                </div>
                <a href="courses.html" className="text-indigo-600 font-semibold hover:text-indigo-700 transition-colors focus:outline-none focus-visible:underline hidden md:block">
                  View all courses →
                </a>
              </div>
              <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6" role="list" aria-label="Featured courses">
                {FEATURED_COURSES.map(c => (
                  <div role="listitem" key={c.id}>
                    <CourseCard course={c} />

                ))}
              </div>
              <div className="text-center mt-8 md:hidden">
                <a href="courses.html" className="text-indigo-600 font-semibold hover:text-indigo-700">View all courses →</a>
              </div>
            </div>
          </section>

          {/* Social Proof */}
          <section className="bg-gradient-to-r from-indigo-600 to-violet-600 py-12 px-4" aria-label="Learner statistics">
            <div className="max-w-5xl mx-auto">
              <p className="text-center text-white text-xl md:text-2xl font-semibold mb-8">
                Join <strong>2M+</strong> learners worldwide building skills that matter
              </p>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
                {[
                  { value: '2M+', label: 'Active Learners' },
                  { value: '8,500+', label: 'Expert Courses' },
                  { value: '450+', label: 'World-Class Instructors' },
                  { value: '97%', label: 'Satisfaction Rate' },
                ].map(stat => (
                  <div key={stat.label} className="bg-white bg-opacity-15 rounded-2xl py-5 px-3">
                    <div className="text-3xl font-extrabold text-white" aria-label={stat.value}>{stat.value}</div>
                    <div className="text-indigo-200 text-sm mt-1">{stat.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* How It Works */}
          <section className="py-16 px-4" aria-labelledby="how-heading">
            <div className="max-w-5xl mx-auto">
              <div className="text-center mb-12">
                <h2 id="how-heading" className="text-3xl font-bold text-gray-900 mb-3">How It Works</h2>
                <p className="text-gray-500 text-lg">Start learning in three simple steps</p>
              </div>
              <ol className="grid md:grid-cols-3 gap-8" aria-label="Steps to get started">
                {[
                  { step:'01', title:'Find Your Course', desc:'Browse thousands of expert-led courses across every topic. Filter by level, duration, and price to find the perfect fit.', icon:'🔍' },
                  { step:'02', title:'Learn at Your Pace', desc:'Watch video lectures, complete exercises, and engage with the community — whenever and wherever works for you.', icon:'🎓' },
                  { step:'03', title:'Earn Your Certificate', desc:'Complete your course, pass the assessments, and earn a verified certificate to share on LinkedIn and your resume.', icon:'🏆' },

                  <li key={item.step} className="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 text-center">
                    <div className="text-4xl mb-4" aria-hidden="true">{item.icon}</div>
                    <div className="text-indigo-600 font-bold text-sm mb-2">Step {item.step}</div>
                    <h3 className="text-xl font-bold text-gray-900 mb-3">{item.title}</h3>
                    <p className="text-gray-500 leading-relaxed">{item.desc}</p>
                  </li>
                ))}
              </ol>
              <div className="text-center mt-12">
                <a href="pricing.html" className="bg-indigo-600 text-white font-bold px-10 py-4 rounded-xl text-lg hover:bg-indigo-700 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 inline-block">

    function App() {
      return (
        <div className="flex flex-col min-h-screen">
          <a href="#main-content" className="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-indigo-600 text-white px-4 py-2 rounded-lg z-50">Skip to main content</a>

          <main id="main-content" className="flex-1">
            <HomePage />
          </main>
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

</html>
