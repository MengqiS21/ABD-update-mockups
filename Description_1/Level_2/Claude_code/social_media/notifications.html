const TYPE_ICON = {
  like: <IconHeart />,
  follow: <IconUserPlus />,
  mention: <IconAt />,
  comment: <IconChatBubble />,
};
const TYPE_BG = { like: 'bg-rose-50', follow: 'bg-indigo-50', mention: 'bg-blue-50', comment: 'bg-green-50' };

function NotificationItem({ notif, onMarkRead }) {
  return (
    <div className={`flex items-start gap-3 px-4 py-4 hover:bg-gray-50 transition-colors border-b border-gray-50 cursor-pointer ${!notif.read ? 'bg-indigo-50/30' : ''}`}
      role="listitem">
      <div className="relative flex-shrink-0">
        <img src={notif.user.avatar} alt={`${notif.user.name}'s avatar`} className="w-11 h-11 rounded-full object-cover" />
        <span className={`absolute -bottom-0.5 -right-0.5 w-5 h-5 rounded-full flex items-center justify-center ${TYPE_BG[notif.type]}`} aria-hidden="true">
          {TYPE_ICON[notif.type]}
        </span>
      </div>
      <div className="flex-1 min-w-0">
        <p className="text-sm text-gray-800">
          <a href="profile.html" className="font-semibold hover:underline">{notif.user.name}</a>
          {' '}<span className="text-gray-600">{notif.action}</span>
          {' '}<span className="text-gray-400 text-xs">· {notif.time}</span>
        </p>
        {notif.snippet && <p className="text-sm text-gray-500 mt-0.5 truncate">{notif.snippet}</p>}
        {notif.type === 'follow' && (
          <button aria-label={`Follow ${notif.user.name} back`}
            className="mt-2 text-xs font-semibold text-indigo-600 border border-indigo-200 px-3 py-1 rounded-lg hover:bg-indigo-50 transition-colors">
            Follow back
          </button>
        )}
      </div>
      {!notif.read && (
        <button onClick={() => onMarkRead(notif.id)}
          aria-label={`Mark notification from ${notif.user.name} as read`}
          className="flex-shrink-0 w-2.5 h-2.5 rounded-full bg-indigo-500 mt-2 hover:bg-indigo-700 transition-colors">
          <span className="sr-only">Unread</span>
        </button>

}

function NotificationsPage() {
  const [activeTab, setActiveTab] = useState('All');
  const [notifications, setNotifications] = useState(ALL_NOTIFICATIONS);
  const tabRefs = useRef({});
  const unreadCount = notifications.filter(n => !n.read).length;

  const filtered = activeTab === 'All' ? notifications : notifications.filter(n => n.category === activeTab);

  const markAllRead = () => {
    setNotifications(prev => prev.map(n => ({ ...n, read: true })));
    document.getElementById('live-region').textContent = 'All notifications marked as read.';
  };

  const markRead = (id) => {
    setNotifications(prev => prev.map(n => n.id === id ? { ...n, read: true } : n));
  };

  const handleTabKey = (e, tab) => {
    const tabs = TABS;
    const idx = tabs.indexOf(tab);
    if (e.key === 'ArrowRight') { e.preventDefault(); const next = tabs[(idx + 1) % tabs.length]; setActiveTab(next); tabRefs.current[next]?.focus(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); const prev = tabs[(idx - 1 + tabs.length) % tabs.length]; setActiveTab(prev); tabRefs.current[prev]?.focus(); }
    if (e.key === 'Home') { e.preventDefault(); setActiveTab(tabs[0]); tabRefs.current[tabs[0]]?.focus(); }
    if (e.key === 'End') { e.preventDefault(); setActiveTab(tabs[tabs.length-1]); tabRefs.current[tabs[tabs.length-1]]?.focus(); }
  };

  useEffect(() => {
    document.getElementById('live-region').textContent = `${unreadCount} unread notification${unreadCount !== 1 ? 's' : ''}`;
  }, [unreadCount]);

  return (
    <main id="main-content" className="max-w-2xl mx-auto px-4 py-6" aria-label="Notifications">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-xl font-bold text-gray-900">
          Notifications
          {unreadCount > 0 && (
            <span className="ml-2 bg-indigo-600 text-white text-xs font-bold rounded-full px-2 py-0.5" aria-live="polite" aria-label={`${unreadCount} unread notifications`}>
              {unreadCount}
            </span>
          )}
        </h1>
        {unreadCount > 0 && (
          <button onClick={markAllRead}
            className="flex items-center gap-1.5 text-sm text-indigo-600 hover:text-indigo-800 font-medium transition-colors">
            <IconCheck /> Mark all read
          </button>
        )}
      </div>

      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        {/* Tab list */}
        <div role="tablist" aria-label="Notification categories" className="flex border-b border-gray-100">
          {TABS.map(tab => {
            const count = tab === 'All' ? notifications.filter(n => !n.read).length : notifications.filter(n => n.category === tab && !n.read).length;
            return (
              <button
                key={tab}
                ref={el => tabRefs.current[tab] = el}
                role="tab"
                aria-selected={activeTab === tab}
                aria-controls={`panel-${tab}`}
                id={`tab-${tab}`}
                tabIndex={activeTab === tab ? 0 : -1}
                onClick={() => setActiveTab(tab)}
                onKeyDown={e => handleTabKey(e, tab)}
                className={`flex-1 py-3.5 text-sm font-semibold transition-colors relative ${activeTab === tab ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                {tab}
                {count > 0 && (
                  <span className="ml-1.5 bg-rose-500 text-white text-xs font-bold rounded-full px-1.5 py-0.5" aria-label={`${count} unread`}>{count}</span>
                )}
              </button>
            );
          })}
        </div>

        {/* Tab panels */}
        {TABS.map(tab => (
          <div key={tab} role="tabpanel" id={`panel-${tab}`} aria-labelledby={`tab-${tab}`} hidden={activeTab !== tab}>
            {activeTab === tab && (
              <div role="list" aria-label={`${tab} notifications`}>
                {filtered.length === 0 ? (
                  <div className="py-16 text-center">
                    <p className="text-gray-400 text-sm">No notifications here yet.</p>
                  </div>
                ) : (
                  filtered.map(n => <NotificationItem key={n.id} notif={n} onMarkRead={markRead} />)
                )}
              </div>
            )}
          </div>
        ))}
      </div>
    </main>
  );
}

function App() {
  return (
    <div className="min-h-screen bg-gray-50">
      <Sidebar activePage="notifications" />
      <div className="lg:ml-64 pb-20 lg:pb-0">
        <NotificationsPage />
      </div>
      <MobileNav activePage="notifications" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
