/* ── Emoji Picker ── */
const EMOJIS = ['😀','😂','😍','🥰','😊','🎉','🔥','💯','👍','❤️','✨','🙌','💪','🤔','😮','🎊','🌟','💬','🚀','🌈'];
function EmojiPicker({ onSelect, onClose }) {
  const ref = useRef(null);
  useEffect(() => { ref.current?.querySelector('button')?.focus(); }, []);
  useEffect(() => {
    const handler = (e) => { if (!ref.current?.contains(e.target)) onClose(); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [onClose]);
  const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
  return (
    <div ref={ref} role="dialog" aria-label="Emoji picker" onKeyDown={handleKey}
      className="absolute bottom-12 left-0 bg-white border border-gray-200 rounded-xl shadow-xl p-3 z-50 w-72">
      <div className="flex items-center justify-between mb-2">
        <span className="text-sm font-semibold text-gray-700">Choose an emoji</span>
        <button onClick={onClose} aria-label="Close emoji picker" className="text-gray-400 hover:text-gray-700 rounded p-1"><IconX /></button>
      </div>
      <div className="grid grid-cols-10 gap-1">
        {EMOJIS.map(emoji => (
          <button key={emoji} onClick={() => { onSelect(emoji); onClose(); }}
            aria-label={`Add emoji ${emoji}`}
            className="w-7 h-7 flex items-center justify-center text-lg hover:bg-gray-100 rounded transition-colors">
            {emoji}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ── Composer ── */
function Composer({ onPost }) {
  const [text, setText] = useState('');
  const [showEmoji, setShowEmoji] = useState(false);
  const [charError, setCharError] = useState('');
  const MAX = 280;
  const remaining = MAX - text.length;
  const composerRef = useRef(null);
  const liveRef = useRef(null);

  const handleChange = (e) => {
    const val = e.target.value;
    if (val.length > MAX) {
      setCharError(`Character limit exceeded by ${val.length - MAX}`);
      document.getElementById('live-region').textContent = `Character limit exceeded by ${val.length - MAX}`;
    } else {
      setCharError('');
      if (val.length >= MAX - 20) {
        document.getElementById('live-region').textContent = `${MAX - val.length} characters remaining`;
      }
    }
    setText(val);
  };

  const handlePost = () => {
    if (text.trim() && text.length <= MAX) {
      onPost(text);
      setText('');
      setCharError('');
      document.getElementById('live-region').textContent = 'Post published!';
    }
  };

  const handleKey = (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') handlePost();
  };

  const circumference = 2 * Math.PI * 18;
  const progress = Math.min(text.length / MAX, 1);
  const dashOffset = circumference * (1 - progress);
  const isOver = text.length > MAX;

  return (
    <section aria-label="Create a post" className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
      <div className="flex gap-3">
        <img src="https://i.pravatar.cc/40?img=11" alt="Your avatar, Alex Johnson" className="w-10 h-10 rounded-full object-cover flex-shrink-0 mt-1" />
        <div className="flex-1">
          <label htmlFor="composer-input" className="sr-only">What's on your mind, Alex?</label>
          <textarea
            id="composer-input"
            ref={composerRef}
            value={text}
            onChange={handleChange}
            onKeyDown={handleKey}
            placeholder="What's on your mind, Alex?"
            rows={3}
            aria-describedby="composer-hint composer-char-count"
            aria-invalid={isOver ? 'true' : 'false'}
            className={`w-full resize-none text-gray-900 placeholder-gray-400 text-base focus:outline-none border-b pb-2 ${isOver ? 'border-red-400' : 'border-gray-100'}`}
          />
          <span id="composer-hint" className="sr-only">Press Ctrl+Enter or Cmd+Enter to post. Maximum 280 characters.</span>
          <span id="composer-char-count" className="sr-only" aria-live="polite">
            {isOver ? `${text.length - MAX} characters over limit` : `${remaining} characters remaining`}
          </span>
          {charError && (
            <p role="alert" className="text-xs text-red-500 mt-1" id="composer-error">{charError}</p>
          )}
          <div className="flex items-center justify-between mt-3 relative">
            <div className="flex items-center gap-1">
              <label>
                <input type="file" accept="image/*" className="sr-only" aria-label="Upload image" onChange={() => document.getElementById('live-region').textContent = 'Image selected'} />
                <span role="button" tabIndex={0}
                  onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') e.currentTarget.previousSibling.click(); }}
                  aria-label="Attach an image to your post"
                  className="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg cursor-pointer transition-colors inline-flex">
                  <IconImage />
                </span>
              </label>
              <div className="relative">
                <button onClick={() => setShowEmoji(v => !v)} aria-label="Open emoji picker" aria-expanded={showEmoji}
                  aria-haspopup="dialog"
                  className="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors">
                  <IconSmile />
                </button>
                {showEmoji && <EmojiPicker onSelect={e => setText(t => t + e)} onClose={() => setShowEmoji(false)} />}
              </div>
            </div>
            <div className="flex items-center gap-3">
              <svg aria-hidden="true" className="w-10 h-10 -rotate-90" viewBox="0 0 44 44">
                <circle cx="22" cy="22" r="18" fill="none" stroke="#e5e7eb" strokeWidth="3"/>
                <circle cx="22" cy="22" r="18" fill="none"
                  stroke={isOver ? '#ef4444' : remaining <= 20 ? '#f59e0b' : '#6366f1'}
                  strokeWidth="3" strokeDasharray={circumference} strokeDashoffset={dashOffset} strokeLinecap="round"/>
              </svg>
              {remaining <= 20 && (
                <span className={`text-sm font-semibold ${isOver ? 'text-red-500' : 'text-amber-500'}`} aria-hidden="true">{remaining}</span>
              )}
              <button onClick={handlePost} disabled={!text.trim() || isOver}
                className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold py-2 px-5 rounded-xl transition-colors text-sm">
                Post
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ── Post Options Menu ── */
function PostMenu({ postId, author, onDelete, onClose }) {
  const menuRef = useRef(null);
  useEffect(() => { menuRef.current?.querySelector('[role="menuitem"]')?.focus(); }, []);
  useEffect(() => {
    const handler = (e) => { if (!menuRef.current?.contains(e.target)) onClose(); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [onClose]);
  const handleKey = (e) => {
    if (e.key === 'Escape') onClose();
    if (e.key === 'ArrowDown') { e.preventDefault(); const items = menuRef.current.querySelectorAll('[role="menuitem"]'); const idx = [...items].indexOf(document.activeElement); items[(idx + 1) % items.length]?.focus(); }
    if (e.key === 'ArrowUp') { e.preventDefault(); const items = menuRef.current.querySelectorAll('[role="menuitem"]'); const idx = [...items].indexOf(document.activeElement); items[(idx - 1 + items.length) % items.length]?.focus(); }
  };
  return (
    <div ref={menuRef} role="menu" aria-label={`Options for post by ${author}`} onKeyDown={handleKey}
      className="absolute top-8 right-0 bg-white border border-gray-200 rounded-xl shadow-xl py-1 z-50 w-48">
      <button role="menuitem" className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Edit post</button>
      <button role="menuitem" className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Copy link</button>
      <button role="menuitem" className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Mute @{author}</button>
      <hr className="my-1 border-gray-100" />
      <button role="menuitem" onClick={onDelete} className="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">Delete post</button>
    </div>
  );
}

/* ── Delete Confirm Modal ── */
function DeleteModal({ postId, onConfirm, onCancel }) {
  const modalRef = useRef(null);
  const prevFocusRef = useRef(document.activeElement);
  useEffect(() => {
    const firstEl = modalRef.current?.querySelector('button');
    firstEl?.focus();
    const trap = (e) => {
      if (e.key !== 'Tab') return;
      const focusables = modalRef.current.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])');
      const first = focusables[0], last = focusables[focusables.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    };
    const escHandler = (e) => { if (e.key === 'Escape') onCancel(); };
    document.addEventListener('keydown', trap);
    document.addEventListener('keydown', escHandler);
    return () => { document.removeEventListener('keydown', trap); document.removeEventListener('keydown', escHandler); prevFocusRef.current?.focus(); };
  }, [onCancel]);
  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" aria-modal="true" role="dialog" aria-labelledby="delete-title" aria-describedby="delete-desc">
      <div ref={modalRef} className="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6">
        <h2 id="delete-title" className="text-lg font-bold text-gray-900 mb-2">Delete this post?</h2>
        <p id="delete-desc" className="text-gray-600 text-sm mb-6">This action cannot be undone. Your post will be permanently removed.</p>
        <div className="flex gap-3 justify-end">
          <button onClick={onCancel} className="px-5 py-2 rounded-xl border border-gray-200 text-gray-700 font-medium hover:bg-gray-50 transition-colors">Cancel</button>
          <button onClick={onConfirm} className="px-5 py-2 rounded-xl bg-red-600 hover:bg-red-700 text-white font-semibold transition-colors">Delete</button>
        </div>
      </div>
    </div>
  );
}

/* ── Post Card ── */
function PostCard({ post, onDelete }) {
  const [liked, setLiked] = useState(post.liked || false);
  const [likeCount, setLikeCount] = useState(post.likes);
  const [bookmarked, setBookmarked] = useState(false);
  const [showMenu, setShowMenu] = useState(false);
  const [showDeleteModal, setShowDeleteModal] = useState(false);
  const moreRef = useRef(null);

  const toggleLike = () => {
    const next = !liked;
    setLiked(next);
    const nextCount = next ? likeCount + 1 : likeCount - 1;
    setLikeCount(nextCount);
    document.getElementById('live-region').textContent = next ? `You liked ${post.author.name}'s post. ${nextCount} likes total.` : `You unliked ${post.author.name}'s post. ${nextCount} likes total.`;
  };

  const handleMenuClose = () => { setShowMenu(false); moreRef.current?.focus(); };

  return (
    <article aria-label={`Post by ${post.author.name}`} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-3">
      <header className="flex items-start justify-between mb-3">
        <div className="flex items-center gap-3">
          <a href="profile.html" aria-label={`View ${post.author.name}'s profile`}>
            <img src={post.author.avatar} alt={`${post.author.name}'s avatar`} className="w-11 h-11 rounded-full object-cover" />
          </a>
          <div>
            <a href="profile.html" className="font-semibold text-gray-900 hover:underline text-sm">{post.author.name}</a>
            <div className="flex items-center gap-1.5">
              <span className="text-gray-500 text-xs">{post.author.handle}</span>
              <span className="text-gray-300 text-xs">·</span>
              <time dateTime={post.isoTime} className="text-gray-500 text-xs">{post.time}</time>
            </div>
          </div>
        </div>
        <div className="relative">
          <button ref={moreRef} onClick={() => setShowMenu(v => !v)}
            aria-label={`More options for post by ${post.author.name}`}
            aria-expanded={showMenu} aria-haspopup="menu"
            className="p-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-50 transition-colors">
            <IconMore />
          </button>
          {showMenu && <PostMenu postId={post.id} author={post.author.handle.replace('@','')} onDelete={() => { setShowMenu(false); setShowDeleteModal(true); }} onClose={handleMenuClose} />}
        </div>
      </header>

      <h3 className="sr-only">Post by {post.author.name}</h3>
      <p className="text-gray-800 text-sm leading-relaxed mb-3">{post.text}</p>

      {post.image && (
        <div className="mb-3 rounded-xl overflow-hidden">
          <img src={post.image} alt={post.imageAlt || `Photo shared by ${post.author.name}`} className="w-full object-cover max-h-80" loading="lazy" />
        </div>
      )}

      {post.tags && (
        <div className="flex flex-wrap gap-1.5 mb-3">
          {post.tags.map(tag => (
            <a key={tag} href="explore.html" className="text-indigo-600 text-sm hover:underline">#{tag}</a>
          ))}
        </div>
      )}

      <footer className="flex items-center gap-1 pt-2 border-t border-gray-50">
        <button onClick={toggleLike}
          aria-label={`Like post by ${post.author.name} — currently ${likeCount} like${likeCount !== 1 ? 's' : ''}`}
          aria-pressed={liked}
          className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${liked ? 'text-rose-600 bg-rose-50 hover:bg-rose-100' : 'text-gray-500 hover:text-rose-600 hover:bg-rose-50'}`}>
          <IconHeart filled={liked} />
          <span aria-hidden="true">{likeCount}</span>
        </button>
        <button aria-label={`Comment on post by ${post.author.name} — ${post.comments} comment${post.comments !== 1 ? 's' : ''}`}
          className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 transition-colors">
          <IconChatBubble />
          <span aria-hidden="true">{post.comments}</span>
        </button>
        <button aria-label={`Share post by ${post.author.name}`}
          className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 hover:text-green-600 hover:bg-green-50 transition-colors">
          <IconShare />
          <span aria-hidden="true">{post.shares}</span>
        </button>
        <button onClick={() => setBookmarked(v => !v)}
          aria-label={bookmarked ? `Remove bookmark from post by ${post.author.name}` : `Bookmark post by ${post.author.name}`}
          aria-pressed={bookmarked}
          className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ml-auto ${bookmarked ? 'text-indigo-600 bg-indigo-50' : 'text-gray-500 hover:text-indigo-600 hover:bg-indigo-50'}`}>
          <IconBookmark filled={bookmarked} />
        </button>
      </footer>

      {showDeleteModal && <DeleteModal postId={post.id} onConfirm={() => { setShowDeleteModal(false); onDelete(post.id); }} onCancel={() => setShowDeleteModal(false)} />}
    </article>
  );
}

/* ── Feed Page ── */
function FeedPage() {
  const [posts, setPosts] = useState(INITIAL_POSTS);

  const handlePost = (text) => {
    const newPost = {
      id: Date.now(), author: { name: 'Alex Johnson', handle: '@alexj', avatar: 'https://i.pravatar.cc/44?img=11' },
      time: 'just now', isoTime: new Date().toISOString(), text, likes: 0, comments: 0, shares: 0, liked: false,
    };
    setPosts(prev => [newPost, ...prev]);
  };

  const handleDelete = (id) => {
    setPosts(prev => prev.filter(p => p.id !== id));
    document.getElementById('live-region').textContent = 'Post deleted.';
  };

  return (
    <div className="flex gap-6 max-w-6xl mx-auto px-4 py-6">
      <main id="main-content" className="flex-1 min-w-0" aria-label="Main feed">
        <h1 className="text-xl font-bold text-gray-900 mb-4">Home Feed</h1>
        <Composer onPost={handlePost} />
        <section aria-label="Posts from people you follow">
          {posts.map(post => <PostCard key={post.id} post={post} onDelete={handleDelete} />)}
        </section>
      </main>
      <TrendingSidebar />
    </div>
  );
}

      <div className="lg:ml-64 pb-20 lg:pb-0">

      </div>
      <MobileNav activePage="feed" />
    </div>
  );
}
