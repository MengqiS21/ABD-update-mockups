/* ─── Utilities ─── */
function productImg(p) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect width="400" height="400" fill="#${p.hue}18"/><rect x="140" y="110" width="120" height="120" rx="16" fill="#${p.hue}35"/><text x="200" y="190" font-family="Arial" font-size="72" font-weight="bold" fill="#${p.hue}" text-anchor="middle">${p.name[0]}</text><text x="200" y="330" font-family="Arial,sans-serif" font-size="15" fill="#${p.hue}aa" text-anchor="middle">${p.cat}</text></svg>`;
  return `data:image/svg+xml,${encodeURIComponent(svg)}`;
}

function getCartCount() {
  try { return (JSON.parse(localStorage.getItem('novamart_cart')||'[]')).reduce((s,i)=>s+i.quantity,0); } catch { return 0; }
}
function addToCart(product, qty=1) {
  try {
    const cart = JSON.parse(localStorage.getItem('novamart_cart')||'[]');
    const idx = cart.findIndex(i=>i.id===product.id);
    if (idx>=0) cart[idx].quantity+=qty; else cart.push({...product,quantity:qty});
    localStorage.setItem('novamart_cart', JSON.stringify(cart));
    return true;
  } catch { return false; }
}

      <span className="text-gray-500 text-xs">({reviews.toLocaleString()})</span>

}

/* ─── Product Card ─── */
function ProductCard({ product, onAddToCart, compact=false }) {
  const [added, setAdded] = useState(false);
  const handleAdd = () => {
    addToCart(product);
    setAdded(true);
    document.dispatchEvent(new Event('novamart:cartupdate'));
    onAddToCart && onAddToCart(product.name);
    setTimeout(()=>setAdded(false), 1500);
  };
  return (
    <article className="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow overflow-hidden border border-gray-100 flex flex-col h-full" aria-label={product.name}>
      <a href="product-detail.html" className="block relative focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500" tabIndex="0" aria-label={`View details for ${product.name}`}>
        <div className="relative">
          <img src={productImg(product)} alt={`${product.name} product image`} className={`w-full object-cover ${compact?'h-40':'h-48'}`} loading="lazy"/>
          {product.badge && <span aria-label={`Label: ${product.badge}`} className="absolute top-2 left-2 bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded">{product.badge}</span>}
          {product.disc>0 && <span aria-hidden="true" className="absolute top-2 right-2 bg-green-600 text-white text-xs font-bold px-2 py-0.5 rounded">-{product.disc}%</span>}
          {!product.stock && <div aria-hidden="true" className="absolute inset-0 bg-gray-900/50 flex items-center justify-center"><span className="bg-white text-gray-700 font-semibold px-3 py-1 rounded text-sm">Out of Stock</span></div>}
        </div>
      </a>
      <div className="p-3 flex flex-col flex-1">
        <a href="product-detail.html" className="focus:outline-none focus:ring-2 focus:ring-blue-500 rounded" tabIndex="0">
          <h3 className="font-semibold text-gray-800 text-sm line-clamp-2 hover:text-blue-700 transition-colors leading-snug">{product.name}</h3>
        </a>
        <div className="mt-1"><Stars rating={product.rating} reviews={product.reviews}/></div>
        <div className="mt-2 flex items-baseline gap-2">
          <span className="text-blue-800 font-bold text-lg">${product.price.toFixed(2)}</span>
          {product.orig>product.price && <span className="text-gray-400 text-sm line-through" aria-label={`Original price $${product.orig.toFixed(2)}`}>${product.orig.toFixed(2)}</span>}
        </div>
        <div className="mt-auto pt-3">
          <button onClick={handleAdd} disabled={!product.stock||added}
            className={`w-full py-2 px-3 rounded-lg text-sm font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 ${!product.stock?'bg-gray-200 text-gray-500 cursor-not-allowed':added?'bg-green-600 text-white focus:ring-green-500':'bg-yellow-400 hover:bg-yellow-500 text-blue-900 focus:ring-yellow-500'}`}
            aria-label={product.stock?`Add ${product.name} to cart`:`${product.name} is out of stock`}
            aria-disabled={!product.stock}>
            {added?'✓ Added to Cart':product.stock?'Add to Cart':'Out of Stock'}
          </button>
        </div>
      </div>
    </article>
  );
}

const SLIDES = [
  { id:1, badge:"Flash Sale", title:"Flash Sale: Up to 50% off Electronics", sub:"Limited time deals on headphones, TVs, cameras and more. Shop before time runs out!", cta:"Shop Electronics Deals", grad:"from-blue-950 to-blue-700" },
  { id:2, badge:"New Arrivals", title:"New Season Kitchen Gear", sub:"Discover top-rated appliances and cookware at unbeatable prices this season.", cta:"Explore Kitchen Deals", grad:"from-orange-900 to-orange-600" },
  { id:3, badge:"New Season", title:"Spring Activewear Collection", sub:"Stay active with our latest clothing and sports equipment — new styles just dropped.", cta:"Shop Sports & Clothing", grad:"from-green-900 to-green-600" },
];

function HeroBanner() {
  const [cur, setCur] = useState(0);
  const [paused, setPaused] = useState(false);
  const [announce, setAnnounce] = useState('');
  const timerRef = useRef(null);

  const go = useCallback(idx=>{
    setCur(idx);
    setAnnounce(`Slide ${idx+1} of ${SLIDES.length}: ${SLIDES[idx].title}`);
  },[]);

  useEffect(()=>{
    if (!paused) timerRef.current = setInterval(()=>setCur(p=>{ const n=(p+1)%SLIDES.length; setAnnounce(`Slide ${n+1} of ${SLIDES.length}: ${SLIDES[n].title}`); return n; }), 5000);
    return ()=>clearInterval(timerRef.current);
  },[paused]);

  const s = SLIDES[cur];
  return (
    <section aria-label="Promotional banner slideshow" aria-roledescription="carousel">
      <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{announce}</div>
      <div className={`bg-gradient-to-r ${s.grad} text-white relative min-h-64 flex items-center transition-all duration-700`}>
        <div className="container mx-auto px-4 py-16 md:py-24">
          <div className="max-w-xl">
            <span className="inline-block bg-yellow-400 text-blue-900 text-xs font-bold uppercase tracking-wider px-3 py-1 rounded mb-4">{s.badge}</span>
            <h2 className="text-3xl md:text-4xl font-bold mb-3 leading-tight">{s.title}</h2>
            <p className="text-lg text-white/80 mb-6">{s.sub}</p>
            <a href="products.html" className="inline-block bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-bold px-8 py-3 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-current">
              {s.cta}
            </a>
          </div>
        </div>
        <div className="absolute bottom-4 right-4 flex items-center gap-3">
          <button onClick={()=>setPaused(p=>!p)} className="bg-white/20 hover:bg-white/30 text-white rounded-full p-2 focus:outline-none focus:ring-2 focus:ring-white transition-colors" aria-label={paused?'Play promotional slideshow':'Pause promotional slideshow'}>
            {paused
              ? <svg aria-hidden="true" className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              : <svg aria-hidden="true" className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            }
          </button>
          <div role="tablist" aria-label="Banner slides" className="flex gap-2">
            {SLIDES.map((sl,i)=>(
              <button key={sl.id} role="tab" aria-selected={i===cur} aria-label={`Slide ${i+1}: ${sl.title}`}
                onClick={()=>go(i)}
                className={`rounded-full transition-all focus:outline-none focus:ring-2 focus:ring-white ${i===cur?'w-8 h-3 bg-yellow-400':'w-3 h-3 bg-white/50 hover:bg-white/70'}`}/>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

        <div className="flex items-center gap-3">
          <h2 id="deals-heading" className="text-2xl font-bold text-gray-800">Today's Deals</h2>
          <span aria-label="Live deals currently available" className="bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded">LIVE</span>
        </div>
        <div className="flex gap-2">
          <button onClick={()=>scroll(-1)} className="bg-white hover:bg-gray-100 border border-gray-300 rounded-full p-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" aria-label="Scroll deals left">
            <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button onClick={()=>scroll(1)} className="bg-white hover:bg-gray-100 border border-gray-300 rounded-full p-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" aria-label="Scroll deals right">
            <svg aria-hidden="true" className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
      <div ref={scrollRef} className="flex gap-4 overflow-x-auto pb-4 snap-x" style={{scrollbarWidth:'thin'}} role="list" aria-label="Today's deals product list">
        {PRODUCTS.slice(0,9).map(p=>(
          <div key={p.id} className="snap-start flex-shrink-0 w-52" role="listitem">
            <ProductCard product={p} onAddToCart={onAddToCart} compact/>
          </div>
        ))}
      </div>
      <div className="mt-4 text-center">
        <a href="products.html" className="inline-block bg-blue-800 hover:bg-blue-900 text-white font-semibold px-8 py-3 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" aria-label="See all of today's deals">See All Deals</a>
      </div>
    </section>
  );
}

/* ─── Featured Products ─── */
function FeaturedProducts({ onAddToCart }) {
  return (
    <section aria-labelledby="featured-heading" id="featured" className="container mx-auto px-4 py-6 bg-white rounded-xl shadow-sm my-6">
      <div className="flex items-center justify-between mb-6">
        <h2 id="featured-heading" className="text-2xl font-bold text-gray-800">Customer Favorites</h2>
        <a href="products.html" className="text-blue-700 hover:text-blue-900 font-medium text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 rounded transition-colors" aria-label="View all customer favorites">View all →</a>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {PRODUCTS.slice(9,17).map(p=><ProductCard key={p.id} product={p} onAddToCart={onAddToCart}/>)}
      </div>
    </section>
  );
}

/* ─── App ─── */
function App() {
  const [msg, setMsg] = useState('');
  const handleAdd = name => {
    setMsg(`${name} has been added to your cart.`);
    setTimeout(()=>setMsg(''), 3000);
  };
  return (
    <div className="min-h-screen flex flex-col">
      <div role="status" aria-live="polite" aria-atomic="true" className="sr-only">{msg}</div>
      <Header/>
      <main id="main-content" className="flex-1" tabIndex="-1">
        <HeroBanner/>
        <CategorySection/>
        <TodaysDeals onAddToCart={handleAdd}/>
        <FeaturedProducts onAddToCart={handleAdd}/>
        <section aria-labelledby="newsletter-heading" className="bg-blue-800 text-white py-12 mt-6">
          <div className="container mx-auto px-4 text-center">
            <h2 id="newsletter-heading" className="text-2xl font-bold mb-3">Stay in the Loop</h2>
            <p className="text-blue-200 mb-6">Get exclusive deals, early access to sales, and more delivered to your inbox.</p>
            <form onSubmit={e=>e.preventDefault()} className="flex flex-col sm:flex-row gap-3 max-w-md mx-auto" noValidate>
              <div className="flex-1">
                <label htmlFor="email-sub" className="sr-only">Your email address</label>
                <input id="email-sub" type="email" placeholder="Enter your email" required aria-required="true"
                  className="w-full px-4 py-3 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-yellow-400" aria-describedby="sub-note"/>
                <p id="sub-note" className="sr-only">We'll send deals and promotions. Unsubscribe anytime.</p>
              </div>
              <button type="submit" className="bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-bold px-6 py-3 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-yellow-300 focus:ring-offset-2 focus:ring-offset-blue-800" aria-label="Subscribe to NovaMart newsletter">
                Subscribe
              </button>
            </form>
          </div>
        </section>
      </main>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
