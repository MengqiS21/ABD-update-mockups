<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City of Lakewood — Official Government Portal</title>
  <meta name="description" content="Welcome to the official City of Lakewood, Colorado government portal. Access city services, pay bills, apply for permits, report issues, and stay informed." />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Skip link */
    #skip-link {
      position: absolute;
      top: -48px;
      left: 0;
      background: #1e3a8a;
      color: #fff;
      padding: 10px 20px;
      font-weight: 700;
      font-size: 0.875rem;
      text-decoration: none;
      z-index: 9999;
      border-radius: 0 0 6px 0;
      transition: top 0.1s;
    }
    #skip-link:focus { top: 0; }
    /* Focus visible */
    :focus-visible { outline: 3px solid #f59e0b; outline-offset: 2px; }
    /* Remove default focus for mouse users but keep for keyboard */
    :focus:not(:focus-visible) { outline: none; }
    /* Main receives programmatic focus */
    #main-content:focus { outline: none; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <a href="#main-content" id="skip-link">Skip to main content</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ============================================================
       SHARED: CityHeader
    ============================================================ */
    function CityHeader({ currentPage }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const menuBtnRef = useRef(null);

      useEffect(() => {
        function onKey(e) {
          if (e.key === 'Escape' && menuOpen) {
            setMenuOpen(false);
            menuBtnRef.current?.focus();
          }
        }
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [menuOpen]);

      const links = [
        { href: 'index.html', label: 'Home', id: 'home' },
        { href: 'services.html', label: 'Services', id: 'services' },
        { href: 'about.html', label: 'About', id: 'about' },
        { href: 'contact.html', label: 'Contact', id: 'contact' },
      ];

      return (
        <header className="bg-blue-900 shadow-md" role="banner">
          {/* Utility bar */}
          <div className="bg-blue-950 text-blue-300 text-xs">
            <div className="max-w-7xl mx-auto px-4 py-1.5 flex items-center justify-between">
              <span>Official Website of the City of Lakewood, Colorado</span>
              <div className="flex items-center gap-4">
                <a href="#" className="hover:text-white underline rounded focus:outline-none focus:ring-1 focus:ring-amber-400 transition-colors">Translate</a>
                <span aria-hidden="true" className="text-blue-600">|</span>
                <a href="#" className="hover:text-white underline rounded focus:outline-none focus:ring-1 focus:ring-amber-400 transition-colors">Accessibility</a>
              </div>
            </div>
          </div>
          {/* Main bar */}
          <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
            <a
              href="index.html"
              className="flex items-center gap-3 rounded-lg p-1 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2 focus:ring-offset-blue-900"
              aria-label="City of Lakewood — Return to homepage"
            >
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none" aria-hidden="true" focusable="false">
                <circle cx="24" cy="24" r="23" fill="white" stroke="#1e3a8a" strokeWidth="1"/>
                <circle cx="24" cy="24" r="20" fill="#1e3a8a"/>
                <polygon points="24,9 26.9,17.6 36,17.6 28.5,22.8 31.4,31.5 24,26.2 16.6,31.5 19.5,22.8 12,17.6 21.1,17.6" fill="#f59e0b"/>
                <text x="24" y="39" textAnchor="middle" fill="white" fontSize="3.8" fontFamily="Arial,sans-serif" fontWeight="bold">LAKEWOOD</text>
              </svg>
              <div>
                <div className="text-white font-bold text-xl leading-tight tracking-tight">City of Lakewood</div>
                <div className="text-blue-300 text-xs tracking-widest uppercase font-medium">Colorado · Est. 1969</div>
              </div>
            </a>
            {/* Desktop nav */}
            <nav aria-label="Main navigation" className="hidden md:flex items-center gap-1">
              {links.map(link => (
                <a
                  key={link.id}
                  href={link.href}
                  className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2 focus:ring-offset-blue-900 ${
                    currentPage === link.id
                      ? 'bg-white text-blue-900 font-semibold'
                      : 'text-blue-100 hover:bg-blue-800 hover:text-white'
                  }`}
                  aria-current={currentPage === link.id ? 'page' : undefined}
                >
                  {link.label}
                </a>
              ))}
              <a
                href="pay-bill.html"
                className="ml-2 bg-amber-500 hover:bg-amber-400 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-blue-900"
                aria-label="Pay your city utility bill online"
              >
                Pay a Bill
              </a>
            </nav>
            {/* Mobile button */}
            <button
              ref={menuBtnRef}
              onClick={() => setMenuOpen(o => !o)}
              aria-expanded={menuOpen}
              aria-controls="mobile-menu"
              aria-label={menuOpen ? 'Close navigation menu' : 'Open navigation menu'}
              className="md:hidden text-white p-2 rounded-lg hover:bg-blue-800 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400"
            >
              <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true">
                {menuOpen
                  ? <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/>
                  : <path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
                }
              </svg>
            </button>
          </div>
          {/* Mobile menu */}
          {menuOpen && (
            <nav id="mobile-menu" aria-label="Mobile navigation" className="md:hidden border-t border-blue-800">
              <ul className="px-4 py-3 space-y-1" role="list">
                {links.map(link => (
                  <li key={link.id}>
                    <a
                      href={link.href}
                      className={`block px-4 py-2.5 rounded-lg text-sm font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400 ${
                        currentPage === link.id ? 'bg-white text-blue-900 font-semibold' : 'text-blue-100 hover:bg-blue-800'
                      }`}
                      aria-current={currentPage === link.id ? 'page' : undefined}
                    >
                      {link.label}
                    </a>
                  </li>
                ))}
                <li>
                  <a href="pay-bill.html" className="block px-4 py-2.5 bg-amber-500 text-white rounded-lg text-sm font-semibold hover:bg-amber-400 mt-2 focus:outline-none focus:ring-2 focus:ring-white">
                    Pay a Bill
                  </a>
                </li>
              </ul>
            </nav>
          )}
        </header>
      );
    }

    /* ============================================================
       SHARED: CityFooter
    ============================================================ */
    function CityFooter() {
      return (
        <footer className="bg-blue-950 text-white" role="contentinfo">
          <div className="max-w-7xl mx-auto px-4 py-12">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
              <div>
                <a href="index.html" className="inline-flex items-center gap-2 mb-4 rounded focus:outline-none focus:ring-2 focus:ring-amber-400" aria-label="City of Lakewood homepage">
                  <svg width="36" height="36" viewBox="0 0 48 48" fill="none" aria-hidden="true">
                    <circle cx="24" cy="24" r="23" fill="white"/>
                    <circle cx="24" cy="24" r="20" fill="#1e3a8a"/>
                    <polygon points="24,9 26.9,17.6 36,17.6 28.5,22.8 31.4,31.5 24,26.2 16.6,31.5 19.5,22.8 12,17.6 21.1,17.6" fill="#f59e0b"/>
                  </svg>
                  <span className="font-bold text-lg">City of Lakewood</span>
                </a>
                <address className="not-italic text-blue-300 text-sm leading-relaxed">

                  <a href="tel:+13039877000" className="text-blue-200 hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400 rounded">(303) 987-7000</a>
                </address>
                <p className="text-blue-400 text-xs mt-3">City Hall Hours:<br/>Mon–Fri · 8:00 AM – 5:00 PM</p>
              </div>
              <nav aria-label="Services footer navigation">
                <h2 className="text-white text-xs font-bold uppercase tracking-widest mb-4">Services</h2>
                <ul className="space-y-2.5" role="list">
                  {[{l:'Pay a Bill',h:'pay-bill.html'},{l:'Apply for a Permit',h:'permits.html'},{l:'Report an Issue',h:'contact.html'},{l:'Find a Park',h:'services.html'},{l:'All Services',h:'services.html'}].map(i=>(
                    <li key={i.l}><a href={i.h} className="text-blue-300 hover:text-white text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400 rounded">{i.l}</a></li>
                  ))}
                </ul>
              </nav>
              <nav aria-label="Government footer navigation">
                <h2 className="text-white text-xs font-bold uppercase tracking-widest mb-4">Government</h2>
                <ul className="space-y-2.5" role="list">
                  {[{l:'About Lakewood',h:'about.html'},{l:'Mayor & City Council',h:'about.html'},{l:'City Departments',h:'contact.html'},{l:'City Budget & Finance',h:'#'},{l:'Public Records',h:'#'}].map(i=>(
                    <li key={i.l}><a href={i.h} className="text-blue-300 hover:text-white text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400 rounded">{i.l}</a></li>
                  ))}
                </ul>
              </nav>
              <div>
                <h2 className="text-white text-xs font-bold uppercase tracking-widest mb-4">Connect With Us</h2>
                <div className="flex gap-2 mb-5">
                  {[
                    {n:'Facebook',p:'M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z'},
                    {n:'X (Twitter)',p:'M4 4l16 16M20 4L4 20'},
                    {n:'Instagram',p:'M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37zm1.5-4.87h.01M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5z'},
                    {n:'YouTube',p:'M22.54 6.42a2.78 2.78 0 0 0-1.95-1.95C18.88 4 12 4 12 4s-6.88 0-8.59.47a2.78 2.78 0 0 0-1.95 1.95A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.6C5.12 20.07 12 20.07 12 20.07s6.88 0 8.59-.47a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z'},
                  ].map(s=>(
                    <a key={s.n} href="#" aria-label={`Follow City of Lakewood on ${s.n}`} className="w-9 h-9 flex items-center justify-center rounded-full bg-blue-800 hover:bg-blue-600 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2 focus:ring-offset-blue-950">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth={2} viewBox="0 0 24 24" aria-hidden="true">
                        <path strokeLinecap="round" strokeLinejoin="round" d={s.p}/>
                      </svg>
                    </a>
                  ))}
                </div>
                <a href="contact.html" className="inline-block text-sm bg-blue-700 hover:bg-blue-600 text-white font-medium px-4 py-2.5 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2 focus:ring-offset-blue-950">
                  Contact City Hall
                </a>
              </div>
            </div>
            <div className="border-t border-blue-800 mt-10 pt-6 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-blue-400">
              <p>© 2024 City of Lakewood, Colorado. All rights reserved.</p>
              <nav aria-label="Legal and policy links">
                <ul className="flex flex-wrap gap-x-4 gap-y-1 justify-center" role="list">
                  {['Privacy Policy','Terms of Use','Accessibility Statement','Sitemap'].map(item=>(
                    <li key={item}><a href="#" className="hover:text-blue-200 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400 rounded">{item}</a></li>
                  ))}
                </ul>
              </nav>
            </div>
          </div>
        </footer>
      );
    }

    /* ============================================================
       PAGE: Homepage
    ============================================================ */
    function EmergencyAlert() {
      const [dismissed, setDismissed] = useState(false);
      const dismissRef = useRef(null);
      if (dismissed) return null;
      return (
        <div
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
          className="bg-amber-500"
        >
          <div className="max-w-7xl mx-auto px-4 py-2.5 flex items-center justify-between gap-4">
            <div className="flex items-center gap-3 flex-1 min-w-0">
              <svg className="w-5 h-5 flex-shrink-0 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
              </svg>
              <p className="text-white text-sm">
                <strong>Road Closure Alert:</strong>{' '}
                Main St between 3rd and 5th Ave is closed until Nov 30.{' '}
                <a href="#" className="underline font-semibold hover:no-underline focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-1 focus:ring-offset-amber-500 rounded">
                  View detour map
                </a>
              </p>
            </div>
            <button
              ref={dismissRef}
              onClick={() => setDismissed(true)}
              aria-label="Dismiss road closure alert"
              className="flex-shrink-0 text-white p-1.5 rounded hover:bg-amber-600 transition-colors focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-1 focus:ring-offset-amber-500"
            >
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true">
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
      );
    }

    function HomePage() {
      const [searchQuery, setSearchQuery] = useState('');

      const quickServices = [
        { id:'pay', label:'Pay a Bill', desc:'Utilities, fees & fines', href:'pay-bill.html',
          ariaLabel:'Pay a city bill — utilities, fees, and fines',
          icon:(
            <svg className="w-8 h-8 text-blue-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5} aria-hidden="true">
              <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/>
            </svg>
          )},
        { id:'report', label:'Report an Issue', desc:'Potholes, lights & more', href:'contact.html',
          ariaLabel:'Report a city issue — potholes, streetlights, and more',
          icon:(
            <svg className="w-8 h-8 text-blue-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5} aria-hidden="true">
              <path strokeLinecap="round" strokeLinejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/>

              <form

                <a
                  href="services.html"
                  className="inline-block bg-blue-900 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-800 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2"
                  aria-label="Browse all city services and departments"
                >
                  View All Services
                </a>
              </div>
            </div>
          </section>

          {/* News + Events */}
          <div className="max-w-7xl mx-auto px-4 py-12">
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
              {/* News */}
              <section aria-labelledby="news-heading" className="lg:col-span-2">
                <div className="flex items-center justify-between mb-6">
                  <h2 id="news-heading" className="text-2xl font-bold text-gray-900">News & Announcements</h2>
                  <a href="#" className="text-blue-600 text-sm font-medium hover:underline focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded whitespace-nowrap">
                    View all news
                  </a>
                </div>
                <ul className="space-y-4" role="list">
                  {news.map(item => (
                    <li key={item.id}>
                      <article className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 hover:shadow-md transition-shadow">
                        <span className="inline-block text-xs font-semibold bg-blue-100 text-blue-800 px-2.5 py-1 rounded-full mb-3">
                          {item.cat}
                        </span>
                        <h3 className="text-base font-semibold text-gray-900 mb-2 leading-snug">
                          <a href="#" className="hover:text-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 rounded">
                            {item.title}
                          </a>
                        </h3>
                        <p className="text-sm text-gray-600 leading-relaxed">{item.excerpt}</p>
                        <div className="flex items-center justify-between mt-4">
                          <time className="text-xs text-gray-400" dateTime={item.date}>{item.display}</time>
                          <a href="#" className="text-xs text-blue-600 font-medium hover:underline focus:outline-none focus:ring-2 focus:ring-blue-500 rounded" aria-label={`Read more about: ${item.title}`}>
                            Read more →
                          </a>
                        </div>
                      </article>
                    </li>
                  ))}
                </ul>
              </section>

              {/* Events */}
              <aside aria-labelledby="events-heading">
                <div className="flex items-center justify-between mb-6">
                  <h2 id="events-heading" className="text-2xl font-bold text-gray-900">Upcoming Events</h2>
                </div>
                <ul className="space-y-3" role="list">
                  {events.map(ev => (
                    <li key={ev.id}>
                      <a
                        href="#"
                        className="flex items-start gap-3 p-3 bg-white rounded-xl border border-gray-200 hover:shadow-md hover:border-blue-300 transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                        aria-label={`${ev.title}, ${ev.month} ${ev.day} at ${ev.time}, ${ev.loc}`}
                      >
                        <div className="flex-shrink-0 w-12 h-14 bg-blue-900 text-white rounded-lg flex flex-col items-center justify-center" aria-hidden="true">
                          <span className="text-xs font-bold uppercase leading-none">{ev.month}</span>
                          <span className="text-2xl font-bold leading-tight">{ev.day}</span>
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-semibold text-gray-900 leading-snug">{ev.title}</p>
                          <p className="text-xs text-gray-500 mt-0.5">{ev.time}</p>
                          <p className="text-xs text-gray-400 truncate">{ev.loc}</p>
                        </div>
                      </a>
                    </li>
                  ))}
                </ul>
                <a
                  href="#"
                  className="mt-4 w-full block text-center text-sm text-blue-600 font-medium hover:underline focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded py-2"
                  aria-label="View the full City of Lakewood events calendar"
                >
                  View Full Calendar →
                </a>
              </aside>
            </div>
          </div>

          {/* City Stats */}
          <section aria-labelledby="stats-heading" className="bg-blue-900 text-white py-14 px-4">
            <div className="max-w-7xl mx-auto">
              <h2 id="stats-heading" className="sr-only">City of Lakewood at a Glance</h2>
              <ul className="grid grid-cols-2 md:grid-cols-4 gap-6 text-center" role="list">
                {[
                  { value:'160,000+', label:'Residents Served' },
                  { value:'42 sq mi', label:'City Area' },
                  { value:'1,200+', label:'City Employees' },
                  { value:'47', label:'Parks & Facilities' },
                ].map(stat => (
                  <li key={stat.label}>
                    <span className="block text-3xl md:text-4xl font-bold text-amber-400">{stat.value}</span>
                    <span className="text-blue-200 text-sm mt-1 block">{stat.label}</span>
                  </li>
                ))}
              </ul>
            </div>
          </section>
        </>
      );
    }

    function App() {
      return (
        <div className="min-h-screen flex flex-col">
          <EmergencyAlert />
          <CityHeader currentPage="home" />
          <main id="main-content" tabIndex={-1} className="flex-1 focus:outline-none">
            <HomePage />
          </main>
          <CityFooter />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
