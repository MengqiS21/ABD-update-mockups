<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study: Python for Data Science | LearnPath</title>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        },
                        secondary: {
                            500: '#ec4899',
                            600: '#db2777',
                        },
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1,
        h2,
        h3,
        h4,
        .font-heading {
            font-family: 'Outfit', sans-serif;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .focus-ring {
            @apply focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2;
        }

        .video-focus:focus-visible {
            outline: 2px solid white;
            outline-offset: -2px;
            box-shadow: inset 0 0 0 4px #4f46e5;
        }
    </style>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    <div id="root" class="flex flex-col flex-grow"></div>

    <script type="text/babel">
        // Icons Component Helper
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = React.useRef(null);

            React.useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                            'stroke-width': 2
                        }
                    });
                    
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const Header = () => {
            return (
                <header className="sticky top-0 z-50 w-full bg-white border-b border-gray-200 shadow-sm">
                    <div className="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16">
                            <div className="flex-shrink-0 flex items-center gap-4">
                                <a href="course-detail.html" className="text-gray-500 hover:text-dark-900 focus-ring rounded-md p-1" aria-label="Back to course detail">
                                    <Icon name="ArrowLeft" size={20} />
                                </a>
                                <a href="index.html" className="flex items-center gap-2 focus-ring rounded-md" aria-label="LearnPath Homepage">
                                    <div className="bg-primary-600 text-white p-1.5 rounded-lg">
                                        <Icon name="BookOpen" size={20} />
                                    </div>
                                    <span className="font-heading font-bold text-lg text-dark-900 hidden sm:block">LearnPath</span>
                                </a>
                                <div className="h-6 w-px bg-gray-300 mx-2 hidden sm:block"></div>
                                <h1 className="font-heading font-semibold text-dark-900 truncate max-w-[200px] sm:max-w-xs md:max-w-md">Python for Data Science</h1>
                            </div>

                            <div className="flex items-center gap-4">
                                <button className="text-gray-600 hover:text-dark-900 font-medium focus-ring rounded-md px-3 py-2 flex items-center gap-2" aria-label="Your Notes">
                                    <Icon name="FileEdit" size={18} />
                                    <span className="hidden md:block">Notes</span>
                                </button>
                                <div className="flex items-center gap-3 border-l border-gray-200 pl-4">
                                    <div className="text-right hidden sm:block">
                                        <div className="text-sm font-bold text-dark-900">Your Progress</div>
                                        <div className="text-xs text-primary-600 font-medium">33% Completed</div>
                                    </div>
                                    <div className="w-10 h-10 rounded-full bg-gray-200 overflow-hidden border-2 border-primary-500 flex items-center justify-center">
                                        <img src="https://i.pravatar.cc/100?img=15" alt="Student avatar" className="w-full h-full object-cover" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const ProgressBar = () => {
            return (
                <div className="bg-white border-b border-gray-200 relative z-40" aria-label="Course Progress: Lesson 4 of 12">
                    <div className="max-w-full px-4 py-2 flex justify-between items-center text-sm font-medium">
                        <div className="text-gray-700">Lesson 4 of 12 &mdash; <span className="font-bold">Module 2: Data Structures</span></div>
                        <div className="text-primary-600">33%</div>
                    </div>
                    <div className="h-1 bg-gray-100 w-full" aria-hidden="true">
                        <div className="h-full bg-primary-600" style={{ width: '33%' }}></div>
                    </div>
                </div>
            );
        };

        const VideoPlayer = ({ onNextLesson, isBusy }) => {
            const [isPlaying, setIsPlaying] = React.useState(false);
            const [progress, setProgress] = React.useState(25);
            const [volume, setVolume] = React.useState(80);
            const playerRef = React.useRef(null);

            const togglePlay = () => setIsPlaying(!isPlaying);

            const handleKeyDown = (e) => {
                // Ignore if focusing on inside buttons so they don't double trigger
                if (e.target !== playerRef.current) return;

                switch (e.key) {
                    case ' ':
                    case 'Enter':
                        e.preventDefault();
                        togglePlay();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        setProgress(Math.min(100, progress + 5));
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        setProgress(Math.max(0, progress - 5));
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        setVolume(Math.min(100, volume + 10));
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        setVolume(Math.max(0, volume - 10));
                        break;
                }
            };

            return (
                <div
                    ref={playerRef}
                    className="relative bg-black aspect-video rounded-xl overflow-hidden shadow-lg group video-focus"
                    tabIndex="0"
                    onKeyDown={handleKeyDown}
                    aria-label="Video player for Variables and Data Types. Press space to play or pause, arrow keys to seek and adjust volume."
                    aria-busy={isBusy}
                >
                    <img src="https://images.unsplash.com/photo-1516116216624-53e697fedbea?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Video presentation slide showing python code" className="w-full h-full object-cover opacity-80" />

                    {/* Big center play/pause indicator (visible briefly or when paused) */}
                    {!isPlaying && (
                        <div className="absolute inset-0 flex items-center justify-center bg-black/30 pointer-events-none">
                            <div className="w-20 h-20 bg-primary-600/90 rounded-full flex items-center justify-center text-white backdrop-blur shadow-2xl">
                                <Icon name="Play" size={36} className="translate-x-1" />
                            </div>
                        </div>
                    )}

                    {/* Bottom Controls Overlay */}
                    <div className="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/90 via-black/50 to-transparent pt-12 pb-4 px-4 opacity-0 group-hover:opacity-100 group-focus-within:opacity-100 transition-opacity duration-300">

                        {/* Progress Bar */}
                        <div className="flex items-center gap-3 mb-4">
                            <span className="text-white text-xs font-medium w-10 text-right">02:34</span>
                            <div
                                className="flex-grow h-1.5 bg-gray-600/50 rounded-full cursor-pointer relative group-hover:h-2 transition-all"
                                aria-label="Seek video slider"
                                role="slider"
                                aria-valuemin="0"
                                aria-valuemax="10"
                                aria-valuenow="2.5"
                                tabIndex="0"
                            >
                                <div className="absolute top-0 left-0 h-full bg-white rounded-full pointer-events-none" style={{ width: `${progress}%` }}></div>
                                <div className="absolute top-1/2 -translate-y-1/2 w-4 h-4 bg-primary-500 rounded-full opacity-0 group-hover:opacity-100 shadow-md transform -translate-x-1/2 pointer-events-none" style={{ left: `${progress}%` }}></div>
                            </div>
                            <span className="text-white text-xs font-medium w-10">10:45</span>
                        </div>

                        {/* Control Buttons */}
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <button className="text-white hover:text-primary-400 focus-ring rounded-sm focus:outline-white" onClick={togglePlay} aria-label={isPlaying ? "Pause video" : "Play video"}>
                                    <Icon name={isPlaying ? "Pause" : "Play"} size={24} />
                                </button>

                                <button className="text-white hover:text-primary-400 focus-ring rounded-sm focus:outline-white flex items-center gap-2 group/vol" aria-label="Volume settings">
                                    <Icon name={volume > 50 ? "Volume2" : volume > 0 ? "Volume1" : "VolumeX"} size={22} />
                                    <div className="w-0 overflow-hidden group-hover/vol:w-16 transition-all duration-300 ease-in-out h-1.5 bg-gray-600/50 rounded-full relative">
                                        <div className="absolute top-0 left-0 h-full bg-white rounded-full" style={{ width: `${volume}%` }}></div>
                                    </div>
                                </button>

                                <div className="h-4 w-px bg-gray-600 mx-2"></div>

                                <span className="text-white text-sm font-medium truncate max-w-[150px] sm:max-w-xs">Variables and Data Types</span>
                            </div>

                            <div className="flex items-center gap-4">
                                <button className="text-white hover:text-primary-400 focus-ring rounded-sm focus:outline-white text-sm font-medium" aria-label="Playback speed">
                                    1x
                                </button>
                                <button className="text-white hover:text-primary-400 focus-ring rounded-sm focus:outline-white" aria-label="Enable captions (CC)">
                                    <Icon name="Subtitles" size={22} />
                                </button>
                                <button className="text-white hover:text-primary-400 focus-ring rounded-sm focus:outline-white" aria-label="Fullscreen">
                                    <Icon name="Maximize" size={22} />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ContentTabsContainer = () => {
            const [activeTab, setActiveTab] = React.useState('overview');
            const tabs = [
                { id: 'overview', label: 'Overview' },
                { id: 'notes', label: 'Notes' },
                { id: 'qa', label: 'Q&A' },
                { id: 'resources', label: 'Resources' }
            ];

            return (
                <div className="mt-8 bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                    <div className="border-b border-gray-200 px-2 sm:px-6" role="tablist" aria-label="Lesson Details">
                        <div className="flex space-x-2 sm:space-x-8 overflow-x-auto">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    role="tab"
                                    aria-selected={activeTab === tab.id}
                                    aria-controls={`panel-${tab.id}`}
                                    id={`tab-${tab.id}`}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`whitespace-nowrap py-4 px-2 border-b-2 font-medium text-sm focus-ring ${activeTab === tab.id
                                            ? 'border-primary-600 text-primary-600'
                                            : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'
                                        }`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="p-6">
                        <div role="tabpanel" id="panel-overview" aria-labelledby="tab-overview" hidden={activeTab !== 'overview'}>
                            <h2 className="text-xl font-heading font-bold text-dark-900 mb-4">Lesson Overview</h2>
                            <p className="text-gray-700 mb-4">In this lesson, we cover the fundamental building blocks of Python: variables and data types. Understanding how to store and manipulate different kinds of data is crucial for any data science task.</p>
                            <h3 className="font-bold text-dark-900 mb-2">Key Concepts:</h3>
                            <ul className="list-disc pl-5 space-y-1 text-gray-700">
                                <li>Integers and Floats</li>
                                <li>Strings and String manipulation</li>
                                <li>Booleans</li>
                                <li>Type casting and checking</li>
                                <li>Variable naming conventions</li>
                            </ul>
                        </div>

                        <div role="tabpanel" id="panel-notes" aria-labelledby="tab-notes" hidden={activeTab !== 'notes'}>
                            <h2 className="text-xl font-heading font-bold text-dark-900 mb-4">My Notes</h2>
                            <textarea
                                className="w-full bg-gray-50 border border-gray-200 rounded-lg p-4 h-48 focus-ring resize-none text-gray-700 placeholder-gray-400"
                                placeholder="Take notes here... Your notes will be saved automatically."
                                aria-label="Notes for current lesson"
                            ></textarea>
                            <div className="mt-3 flex justify-end">
                                <button className="bg-primary-600 hover:bg-primary-700 text-white font-medium px-4 py-2 rounded-lg transition-colors focus-ring">Save Notes</button>
                            </div>
                        </div>

                        <div role="tabpanel" id="panel-qa" aria-labelledby="tab-qa" hidden={activeTab !== 'qa'}>
                            <h2 className="text-xl font-heading font-bold text-dark-900 mb-4">Q&A</h2>
                            <p className="text-gray-600">No questions for this lesson yet. Be the first to ask!</p>
                            <button className="mt-4 bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium px-4 py-2 rounded-lg transition-colors focus-ring">Ask a Question</button>
                        </div>

                        <div role="tabpanel" id="panel-resources" aria-labelledby="tab-resources" hidden={activeTab !== 'resources'}>
                            <h2 className="text-xl font-heading font-bold text-dark-900 mb-4">Downloadable Resources</h2>
                            <ul className="space-y-3 mt-4">
                                <li className="flex items-center justify-between p-3 border border-gray-200 rounded-lg group">
                                    <div className="flex items-center gap-3">
                                        <div className="text-primary-600 bg-primary-50 p-2 rounded"><Icon name="FileText" size={20} /></div>
                                        <div>
                                            <p className="font-medium text-dark-900">Python_Cheat_Sheet.pdf</p>
                                            <p className="text-xs text-gray-500">2.4 MB</p>
                                        </div>
                                    </div>
                                    <button className="text-gray-400 hover:text-primary-600 focus-ring p-1 rounded" aria-label="Download Python_Cheat_Sheet.pdf">
                                        <Icon name="Download" size={20} />
                                    </button>
                                </li>
                                <li className="flex items-center justify-between p-3 border border-gray-200 rounded-lg group">
                                    <div className="flex items-center gap-3">
                                        <div className="text-primary-600 bg-primary-50 p-2 rounded"><Icon name="FileCode2" size={20} /></div>
                                        <div>
                                            <p className="font-medium text-dark-900">lesson_2_exercises.ipynb</p>
                                            <p className="text-xs text-gray-500">1.1 MB</p>
                                        </div>
                                    </div>
                                    <button className="text-gray-400 hover:text-primary-600 focus-ring p-1 rounded" aria-label="Download lesson_2_exercises.ipynb">
                                        <Icon name="Download" size={20} />
                                    </button>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        const LessonSidebar = ({ activeLessonId, onLessonSelect }) => {
            const modules = [
                {
                    id: "mod-1",
                    title: "Module 1: Introduction",
                    lessons: [
                        { id: "l-1", title: "What is Data Science?", duration: "10:45", completed: true, type: "video" },
                        { id: "l-2", title: "Setting up your Python Environment", duration: "15:20", completed: true, type: "video" },
                        { id: "l-3", title: "Module 1 Quiz", duration: "10 min", completed: true, type: "quiz" }
                    ]
                },
                {
                    id: "mod-2",
                    title: "Module 2: Python Crash Course",
                    lessons: [
                        { id: "l-4", title: "Variables and Data Types", duration: "10:45", completed: false, type: "video" },
                        { id: "l-5", title: "Lists, Dictionaries, and Sets", duration: "18:30", completed: false, type: "video" },
                        { id: "l-6", title: "Control Flow", duration: "12:15", completed: false, type: "video" }
                    ]
                }
            ];

            return (
                <aside className="w-full lg:w-96 flex-shrink-0 bg-white border-l border-gray-200 lg:h-[calc(100vh-105px)] lg:overflow-y-auto" aria-label="Course Curriculum">
                    <div className="p-4 border-b border-gray-200 bg-gray-50">
                        <h2 className="font-heading font-bold text-dark-900">Course Content</h2>
                    </div>

                    <div className="divide-y divide-gray-200">
                        {modules.map((mod, mIdx) => (
                            <div key={mod.id}>
                                <div className="px-4 py-3 bg-white">
                                    <h3 className="font-bold text-sm text-dark-900 mb-1">{mod.title}</h3>
                                    <div className="text-xs text-gray-500 font-medium">
                                        {mod.lessons.filter(l => l.completed).length} / {mod.lessons.length} completed
                                    </div>
                                </div>
                                <ul className="bg-gray-50/50">
                                    {mod.lessons.map(lesson => {
                                        const isActive = lesson.id === activeLessonId;
                                        return (
                                            <li key={lesson.id} className={`border-l-4 ${isActive ? 'border-primary-600 bg-primary-50' : 'border-transparent hover:bg-gray-100'} transition-colors`}>
                                                <button
                                                    className="w-full text-left px-4 py-3 flex gap-3 focus-ring outline-none"
                                                    onClick={() => onLessonSelect(lesson.id)}
                                                    aria-current={isActive ? 'true' : 'false'}
                                                    // Explicit programmatic state for completed lessons per cat_7 requirement
                                                    aria-label={`${lesson.title}. ${lesson.type}, ${lesson.duration}. ${lesson.completed ? 'Completed' : 'Not completed'}`}
                                                    aria-checked={lesson.completed}
                                                    role="menuitemcheckbox"
                                                >
                                                    <div className="mt-0.5 relative flex-shrink-0 w-5 h-5 flex items-center justify-center">
                                                        {lesson.completed ? (
                                                            <div className="w-5 h-5 rounded-full bg-green-500 flex items-center justify-center text-white">
                                                                <Icon name="Check" size={12} />
                                                            </div>
                                                        ) : (
                                                            <input type="checkbox" readOnly checked={false} className="w-4 h-4 rounded border-gray-300 text-primary-600 pointer-events-none" />
                                                        )}
                                                    </div>
                                                    <div className="flex-grow">
                                                        <div className={`text-sm ${isActive ? 'font-bold text-primary-700' : 'font-medium text-gray-700'}`}>
                                                            {lesson.title}
                                                        </div>
                                                        <div className="flex items-center gap-1.5 mt-1 text-xs text-gray-500">
                                                            <Icon name={lesson.type === 'video' ? 'PlayCircle' : 'HelpCircle'} size={12} />
                                                            {lesson.duration}
                                                        </div>
                                                    </div>
                                                </button>
                                            </li>
                                        );
                                    })}
                                </ul>
                            </div>
                        ))}
                    </div>
                </aside>
            );
        };

        const StudyToolApp = () => {
            const [activeLessonId, setActiveLessonId] = React.useState('l-4');
            const [isBusy, setIsBusy] = React.useState(false);

            // Announcer state for live region
            const [announcement, setAnnouncement] = React.useState('');

            const handleNextLesson = () => {
                setIsBusy(true);
                setAnnouncement("Loading next lesson...");

                // Simulate loading state and lesson switch
                setTimeout(() => {
                    setActiveLessonId('l-5');
                    setIsBusy(false);
                    setAnnouncement("Lesson loaded: Lists, Dictionaries, and Sets");

                    // Focus management: shift focus to the main container or player wrapper
                    const player = document.querySelector('.video-focus');
                    if (player) player.focus();
                }, 800);
            };

            return (
                <div className="flex flex-col flex-grow">
                    {/* Live Region for announcements (status changes programmatically exposed) */}
                    <div className="sr-only" aria-live="polite" aria-atomic="true">
                        {announcement}
                    </div>

                    <Header />
                    <ProgressBar />

                    {/* DOM Order Requirement (cat_10): Main content first, then sidebar */}
                    <div className="flex flex-col lg:flex-row flex-grow lg:overflow-hidden relative">

                        {/* Main Content Area (Left/Main) */}
                        <main className="flex-grow lg:overflow-y-auto p-4 sm:p-6 lg:p-8" aria-busy={isBusy}>
                            <div className="max-w-4xl mx-auto">
                                <VideoPlayer onNextLesson={handleNextLesson} isBusy={isBusy} />

                                <div className="mt-6 flex justify-between items-center bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                                    <div className="hidden sm:block">
                                        <h2 className="text-xl font-heading font-bold text-dark-900 border-l-4 border-primary-500 pl-3">Variables and Data Types</h2>
                                    </div>
                                    <button
                                        className="w-full sm:w-auto ml-auto bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2.5 px-6 rounded-lg shadow transition-colors focus-ring flex items-center justify-center gap-2"
                                        onClick={handleNextLesson}
                                        aria-label="Complete current lesson and advance to next lesson"
                                        disabled={isBusy}
                                    >
                                        {isBusy ? (
                                            <>
                                                <Icon name="Loader2" size={18} className="animate-spin" />
                                                <span>Loading...</span>
                                            </>
                                        ) : (
                                            <>
                                                <span>Next Lesson</span>
                                                <Icon name="ChevronRight" size={18} />
                                            </>
                                        )}
                                    </button>
                                </div>

                                <ContentTabsContainer />
                            </div>
                        </main>

                        {/* Lesson Sidebar (Right - appears after main content in DOM) */}
                        <LessonSidebar
                            activeLessonId={activeLessonId}
                            onLessonSelect={(id) => {
                                setAnnouncement(`Selected lesson: ${id}`);
                                setActiveLessonId(id);
                            }}
                        />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StudyToolApp />);
    </script>
</body>

</html>
