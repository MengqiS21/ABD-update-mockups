<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing & Plans | LearnPath</title>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        },
                        secondary: {
                            500: '#ec4899',
                            600: '#db2777',
                        },
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1,
        h2,
        h3,
        h4,
        .font-heading {
            font-family: 'Outfit', sans-serif;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .focus-ring {
            @apply focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2;
        }
    </style>
</head>

<body class="flex flex-col min-h-screen">
    <div id="root" class="flex flex-col flex-grow"></div>

    <script type="text/babel">
        // Icons Component Helper
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = React.useRef(null);

            React.useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                            'stroke-width': 2
                        }
                    });
                    
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const Header = () => {
            return (
                <header className="sticky top-0 z-50 w-full bg-white border-b border-gray-200 shadow-sm">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16">
                            <div className="flex-shrink-0 flex items-center">
                                <a href="index.html" className="flex items-center gap-2 focus-ring rounded-md" aria-label="LearnPath Homepage">
                                    <div className="bg-primary-600 text-white p-1.5 rounded-lg">
                                        <Icon name="BookOpen" size={24} />
                                    </div>
                                    <span className="font-heading font-bold text-xl text-dark-900 tracking-tight">LearnPath</span>
                                </a>
                            </div>

                            <nav className="hidden md:flex space-x-8" aria-label="Main Navigation">
                                <a href="courses.html" className="text-gray-600 hover:text-primary-600 font-medium transition-colors focus-ring rounded-md px-2 py-1">Explore Courses</a>
                                <a href="pricing.html" className="text-primary-600 font-medium transition-colors focus-ring rounded-md px-2 py-1" aria-current="page">Pricing</a>
                                <a href="#" className="flex items-center gap-1 text-gray-600 hover:text-primary-600 font-medium transition-colors focus-ring rounded-md px-2 py-1">
                                    Study Tools
                                    <Icon name="ChevronDown" size={16} />
                                </a>
                            </nav>

                            <div className="hidden md:flex items-center space-x-4">
                                <button className="text-gray-600 hover:text-dark-900 font-medium focus-ring rounded-md px-3 py-2" aria-label="Search">
                                    <Icon name="Search" size={20} />
                                </button>
                                <a href="dashboard.html" className="text-primary-600 hover:text-primary-700 font-medium focus-ring rounded-md px-3 py-2">Log in</a>
                                <a href="dashboard.html" className="bg-primary-600 hover:bg-primary-700 text-white font-medium px-5 py-2 rounded-full transition-colors focus-ring shadow-md hover:shadow-lg">
                                    Sign up free
                                </a>
                            </div>

                            <div className="md:hidden flex items-center">
                                <button className="text-gray-600 hover:text-dark-900 focus-ring rounded-md p-2" aria-label="Open menu">
                                    <Icon name="Menu" size={24} />
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-dark-900 text-gray-300 pt-16 pb-8 border-t border-dark-800 mt-auto">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="border-t border-dark-800 pt-8 flex flex-col md:flex-row justify-between items-center text-sm text-gray-400">
                            <p>&copy; {new Date().getFullYear()} LearnPath Inc. All rights reserved.</p>
                        </div>
                    </div>
                </footer>
            );
        };

        const FormSection = () => {
            // Accessible Checkout Form logic
            const [email, setEmail] = React.useState('');
            const [card, setCard] = React.useState('');
            const [emailError, setEmailError] = React.useState(true); // Simulate error
            const [cardError, setCardError] = React.useState(true); // Simulate error
            const [hasSubmitted, setHasSubmitted] = React.useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setHasSubmitted(true);

                const validEmail = email.includes('@');
                const validCard = card.length >= 16;

                setEmailError(!validEmail);
                setCardError(!validCard);

                if (validEmail && validCard) {
                    alert("Mock checkout successful!");
                }
            };

            return (
                <section className="py-20 bg-gray-50 border-t border-gray-200">
                    <div className="max-w-xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
                            <div className="text-center mb-8">
                                <h2 className="text-2xl font-heading font-bold text-dark-900">Sign Up / Checkout Simulation</h2>
                                <p className="text-gray-500 text-sm mt-2">Demonstrating accessible form validation (cat_9)</p>
                            </div>

                            <form onSubmit={handleSubmit} noValidate>
                                <div className="mb-6">
                                    <label htmlFor="email" className="block text-sm font-semibold text-dark-900 mb-2">
                                        Email Address <span className="text-red-500" aria-hidden="true">*</span>
                                    </label>
                                    <input
                                        type="email"
                                        id="email"
                                        className={`w-full px-4 py-3 rounded-lg border ${hasSubmitted && emailError ? 'border-red-500 bg-red-50 focus:ring-red-500' : 'border-gray-300 focus:ring-primary-500'} focus:outline-none focus:ring-2 transition-colors`}
                                        placeholder="you@example.com"
                                        aria-required="true"
                                        aria-invalid={hasSubmitted && emailError ? "true" : "false"}
                                        aria-describedby={hasSubmitted && emailError ? "email-error" : undefined}
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                    />
                                    {hasSubmitted && emailError && (
                                        <div id="email-error" className="mt-2 text-sm text-red-600 flex items-center gap-1">
                                            <Icon name="AlertCircle" size={14} /> Please enter a valid email address.
                                        </div>
                                    )}
                                </div>

                                <div className="mb-6">
                                    <label htmlFor="card" className="block text-sm font-semibold text-dark-900 mb-2">
                                        Card Number <span className="text-red-500" aria-hidden="true">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="card"
                                        className={`w-full px-4 py-3 rounded-lg border ${hasSubmitted && cardError ? 'border-red-500 bg-red-50 focus:ring-red-500' : 'border-gray-300 focus:ring-primary-500'} focus:outline-none focus:ring-2 transition-colors`}
                                        placeholder="0000 0000 0000 0000"
                                        aria-required="true"
                                        aria-invalid={hasSubmitted && cardError ? "true" : "false"}
                                        aria-describedby={hasSubmitted && cardError ? "card-error" : undefined}
                                        value={card}
                                        onChange={(e) => setCard(e.target.value)}
                                    />
                                    {hasSubmitted && cardError && (
                                        <div id="card-error" className="mt-2 text-sm text-red-600 flex items-center gap-1">
                                            <Icon name="AlertCircle" size={14} /> Card number must be at least 16 digits.
                                        </div>
                                    )}
                                </div>

                                <button
                                    type="submit"
                                    className="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-3.5 px-4 rounded-xl transition-all focus-ring shadow-md hover:shadow-lg"
                                >
                                    Complete Checkout
                                </button>
                            </form>
                        </div>
                    </div>
                </section>
            );
        };

        const PricingPage = () => {
            const [openFaq, setOpenFaq] = React.useState(0);

            const faqs = [
                { q: "Can I cancel my subscription at any time?", a: "Yes, you can cancel your subscription at any time from your account settings. You will continue to have access to your plan until the end of your billing cycle." },
                { q: "Do you offer discounts for students or non-profits?", a: "Yes, we offer a 50% discount for verified students and non-profit organizations. Please contact our support team with valid documentation to claim your discount." },
                { q: "Is there a certificate of completion?", a: "Absolutely! For all Pro and Teams tier users, verified certificates of completion are issued automatically upon passing the final assessment of any course." },
                { q: "What forms of payment do you accept?", a: "We accept all major credit cards (Visa, Mastercard, American Express), PayPal, and Apple Pay." }
            ];

            return (
                <div className="flex flex-col flex-grow bg-gray-50">
                    <Header />

                    {/* Hero Section */}
                    <div className="bg-dark-900 text-white pt-20 pb-20 relative overflow-hidden">
                        <div className="absolute top-0 right-0 -mr-40 -mt-40 w-[600px] h-[600px] rounded-full bg-primary-700/30 blur-[100px] pointer-events-none"></div>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
                            <h1 className="text-4xl lg:text-6xl font-heading font-extrabold mb-6">Invest in Your Future</h1>
                            <p className="text-xl text-gray-400 max-w-2xl mx-auto mb-10">Choose the perfect plan to unlock world-class education and accelerate your career. No hidden fees.</p>

                            {/* Toggle / Tabs could go here if Monthly/Yearly was needed, keeping it simple */}
                        </div>
                    </div>

                    {/* Pricing Tiers */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 -mt-12 relative z-20 pb-20">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">

                            {/* Free Tier */}
                            <div className="bg-white rounded-2xl p-8 border border-gray-200 shadow-md">
                                <h3 className="text-2xl font-heading font-bold text-dark-900 mb-2">Free</h3>
                                <p className="text-gray-500 text-sm mb-6 h-10">Essential tools to jumpstart your learning journey.</p>
                                <div className="mb-6 flex items-baseline">
                                    <span className="text-5xl font-extrabold text-dark-900">$0</span>
                                    <span className="text-gray-500 ml-2">/forever</span>
                                </div>
                                <button className="w-full bg-white border-2 border-dark-900 text-dark-900 hover:bg-gray-50 font-bold justify-center py-3 px-4 rounded-xl transition-all focus-ring mb-8">
                                    Get Started
                                </button>
                                <ul className="space-y-4">
                                    {["Access to 50+ free introductory courses", "Community forum access", "Standard video quality", "Learn on web and mobile"].map((feature, idx) => (
                                        <li key={idx} className="flex items-start gap-3">
                                            <Icon name="Check" size={20} className="text-gray-400 flex-shrink-0" />
                                            <span className="text-gray-700 text-sm">{feature}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            {/* Pro Tier */}
                            <div className="bg-primary-600 rounded-2xl p-8 border border-primary-500 shadow-2xl relative transform md:-translate-y-4">
                                <div className="absolute top-0 right-8 transform -translate-y-1/2">
                                    <span className="bg-amber-400 text-amber-900 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">Most Popular</span>
                                </div>
                                <h3 className="text-2xl font-heading font-bold text-white mb-2">Pro</h3>
                                <p className="text-primary-100 text-sm mb-6 h-10">Full library access for dedicated learners.</p>
                                <div className="mb-6 flex items-baseline">
                                    <span className="text-5xl font-extrabold text-white">$19</span>
                                    <span className="text-primary-200 ml-2">/mo</span>
                                </div>
                                <button className="w-full bg-white text-primary-600 hover:bg-gray-50 font-bold justify-center py-3 px-4 rounded-xl transition-all focus-ring shadow-lg mb-8">
                                    Start 7-Day Free Trial
                                </button>
                                <ul className="space-y-4">
                                    {["Unlimited access to 5,000+ courses", "Verified completion certificates", "4K video quality", "Download for offline viewing", "Interactive coding environments", "Priority email support"].map((feature, idx) => (
                                        <li key={idx} className="flex items-start gap-3 text-white">
                                            <Icon name="CheckCircle" size={20} className="text-primary-200 flex-shrink-0" />
                                            <span className="text-sm">{feature}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            {/* Teams Tier */}
                            <div className="bg-white rounded-2xl p-8 border border-gray-200 shadow-md">
                                <h3 className="text-2xl font-heading font-bold text-dark-900 mb-2">Teams</h3>
                                <p className="text-gray-500 text-sm mb-6 h-10">Upskill your entire organization effectively.</p>
                                <div className="mb-6 flex items-baseline">
                                    <span className="text-5xl font-extrabold text-dark-900">$49</span>
                                    <span className="text-gray-500 ml-2">/seat/mo</span>
                                </div>
                                <button className="w-full bg-white border-2 border-primary-600 text-primary-600 hover:bg-primary-50 font-bold justify-center py-3 px-4 rounded-xl transition-all focus-ring mb-8">
                                    Contact Sales
                                </button>
                                <ul className="space-y-4">
                                    {["Everything in Pro", "Admin dashboard & analytics", "Custom learning paths", "Dedicated Customer Success Mgr", "SSO integration", "API access for LMS"].map((feature, idx) => (
                                        <li key={idx} className="flex items-start gap-3">
                                            <Icon name="Check" size={20} className="text-primary-600 flex-shrink-0" />
                                            <span className="text-gray-700 text-sm font-medium">{feature}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                        </div>
                    </div>

                    {/* Feature Comparison Table */}
                    <div className="bg-white py-20 border-t border-gray-200">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl font-heading font-bold text-dark-900 mb-4">Compare Plans & Features</h2>
                                <p className="text-gray-600">Deep dive into exactly what's included in each tier.</p>
                            </div>

                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[600px]" aria-label="Feature comparison of pricing plans">
                                    <thead>
                                        <tr>
                                            <th className="w-1/3 py-4 px-6 bg-gray-50 border-b-2 border-gray-200 font-heading font-bold text-dark-900 rounded-tl-xl text-lg">Features</th>
                                            <th className="w-1/4 py-4 px-6 bg-gray-50 border-b-2 border-gray-200 font-heading font-bold text-dark-900 text-center">Free</th>
                                            <th className="w-1/4 py-4 px-6 bg-primary-50 border-b-2 border-primary-200 font-heading font-bold text-primary-800 text-center text-xl">Pro</th>
                                            <th className="w-1/4 py-4 px-6 bg-gray-50 border-b-2 border-gray-200 font-heading font-bold text-dark-900 text-center rounded-tr-xl">Teams</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {[
                                            { name: "Course Library Access", free: "Limited (50+)", pro: "Full (5,000+)", teams: "Full (5,000+)" },
                                            { name: "Video Quality", free: "720p", pro: "4K UHD", teams: "4K UHD" },
                                            { name: "Certificates of Completion", free: false, pro: true, teams: true },
                                            { name: "Offline Downloads", free: false, pro: true, teams: true },
                                            { name: "Interactive Coding Labs", free: false, pro: true, teams: true },
                                            { name: "Admin Analytics Dashboard", free: false, pro: false, teams: true },
                                            { name: "Single Sign-On (SSO)", free: false, pro: false, teams: true },
                                            { name: "Support Tier", free: "Community Forum", pro: "Priority Email", teams: "Dedicated CSM" }
                                        ].map((row, idx) => (
                                            <tr key={idx} className="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                                <td className="py-4 px-6 font-medium text-gray-900">{row.name}</td>

                                                {/* Free Column */}
                                                <td className="py-4 px-6 text-center text-gray-600">
                                                    {typeof row.free === 'boolean'
                                                        ? (row.free ? <Icon name="Check" className="mx-auto text-green-500" /> : <Icon name="Minus" className="mx-auto text-gray-300" />)
                                                        : row.free}
                                                </td>

                                                {/* Pro Column */}
                                                <td className="py-4 px-6 text-center font-semibold text-primary-700 bg-primary-50/30">
                                                    {typeof row.pro === 'boolean'
                                                        ? (row.pro ? <Icon name="Check" className="mx-auto text-primary-600" /> : <Icon name="Minus" className="mx-auto text-gray-300" />)
                                                        : row.pro}
                                                </td>

                                                {/* Teams Column */}
                                                <td className="py-4 px-6 text-center text-gray-700">
                                                    {typeof row.teams === 'boolean'
                                                        ? (row.teams ? <Icon name="Check" className="mx-auto text-dark-900" /> : <Icon name="Minus" className="mx-auto text-gray-300" />)
                                                        : row.teams}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Guarantee and Testimonials Strip */}
                    <div className="bg-dark-900 py-16 text-white relative">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex flex-col md:flex-row items-center justify-between gap-12">
                                <div className="flex items-center gap-6 md:w-1/3">
                                    <div className="w-20 h-20 bg-primary-600 rounded-full flex items-center justify-center flex-shrink-0 shadow-xl shadow-primary-600/30">
                                        <Icon name="ShieldCheck" size={40} className="text-white" />
                                    </div>
                                    <div>
                                        <h3 className="font-heading font-bold text-xl mb-1">30-Day Guarantee</h3>
                                        <p className="text-gray-400 text-sm">Not completely satisfied? Get a full refund, no questions asked.</p>
                                    </div>
                                </div>

                                <div className="md:w-2/3 bg-dark-800 p-8 rounded-2xl border border-dark-700 relative">
                                    <Icon name="Quote" size={48} className="text-dark-700 absolute top-4 left-4" />
                                    <p className="text-lg italic text-gray-300 mb-6 relative z-10 px-4">
                                        "The Pro subscription was the best investment I've ever made in my career. I completed 4 certificates and landed a Senior Developer role within 6 months of joining."
                                    </p>
                                    <div className="flex items-center gap-4 px-4">
                                        <div className="w-12 h-12 bg-gray-600 rounded-full overflow-hidden">
                                            <img src="https://i.pravatar.cc/100?img=33" alt="Reviewer" />
                                        </div>
                                        <div>
                                            <p className="font-bold text-white">David Miller</p>
                                            <p className="text-xs text-primary-400">Software Engineer</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Check Out Form Simulation (To hit accessibility requirement cat_9) */}
                    <FormSection />

                    {/* FAQ Accordion */}
                    <div className="py-20 bg-white">
                        <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl font-heading font-bold text-dark-900 mb-4">Frequently Asked Questions</h2>
                                <p className="text-gray-600">Have questions? We're here to help.</p>
                            </div>

                            <div className="space-y-4" role="list">
                                {faqs.map((faq, index) => {
                                    const isOpen = openFaq === index;
                                    const contentId = `faq-content-${index}`;

                                    return (
                                        <div key={index} className="border border-gray-200 rounded-xl overflow-hidden shadow-sm" role="listitem">
                                            <h3>
                                                <button
                                                    className="w-full text-left px-6 py-5 bg-white hover:bg-gray-50 flex items-center justify-between focus-ring rounded-none transition-colors"
                                                    onClick={() => setOpenFaq(isOpen ? null : index)}
                                                    aria-expanded={isOpen}
                                                    aria-controls={contentId}
                                                >
                                                    <span className="font-semibold text-dark-900">{faq.q}</span>
                                                    <div className={`transform transition-transform ${isOpen ? 'rotate-180 text-primary-600' : 'text-gray-400'}`}>
                                                        <Icon name="ChevronDown" size={20} />
                                                    </div>
                                                </button>
                                            </h3>
                                            <div
                                                id={contentId}
                                                className={`px-6 overflow-hidden transition-all duration-300 bg-gray-50 ${isOpen ? 'max-h-[500px] py-5 border-t border-gray-200' : 'max-h-0 py-0'}`}
                                                hidden={!isOpen}
                                            >
                                                <p className="text-gray-700 leading-relaxed">{faq.a}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PricingPage />);
    </script>
</body>

</html>
