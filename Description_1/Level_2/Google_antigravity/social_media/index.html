<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #f5f5f5;
            margin: 0;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        h1,
        h2,
        h3,
        h4,
        .font-display {
            font-family: 'Outfit', 'Inter', sans-serif;
        }

        .env-pb {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { indigo: { 500: '#6366f1', 600: '#4f46e5' } } } }
        }
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel" src="shared.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function PostComposer() {
            const [focus, setFocus] = useState(false);
            return (
                <div className="border-b border-neutral-800/60 p-4 pt-4 pb-3 flex gap-4 cursor-text transition-colors" onClick={() => setFocus(true)}>
                    <img src="https://i.pravatar.cc/150?u=alex" alt="Alex's Avatar" className="w-12 h-12 rounded-full object-cover shrink-0" />
                    <div className="flex-1">
                        <textarea
                            placeholder="What's on your mind, Alex?"
                            className="w-full bg-transparent text-xl text-white placeholder-neutral-500 focus:outline-none resize-none pt-2 font-medium"
                            rows={focus ? 3 : 1}
                            aria-label="Write a new post"
                        ></textarea>
                        {focus && (
                            <div className="border-t border-neutral-800/60 mt-3 pt-3 flex items-center justify-between">
                                <div className="flex items-center gap-1 text-indigo-400">
                                    <button className="p-2 hover:bg-indigo-500/10 rounded-full transition-colors" aria-label="Add image"><window.Icons.ImageIcon className="w-5 h-5" /></button>
                                    <button className="p-2 hover:bg-indigo-500/10 rounded-full transition-colors" aria-label="Add emoji"><window.Icons.Smile className="w-5 h-5" /></button>
                                    <button className="p-2 hover:bg-indigo-500/10 rounded-full transition-colors" aria-label="Add location"><window.Icons.Search className="w-5 h-5" /></button>
                                </div>
                                <button className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-1.5 px-5 rounded-full text-[15px] transition-colors shadow-lg active:scale-95">
                                    Post
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function PostCard({ post }) {
            return (
                <article className="border-b border-neutral-800/60 p-4 hover:bg-white/[0.015] transition-colors flex gap-4 cursor-pointer">
                    <img src={post.avatar} alt={post.name} className="w-10 h-10 sm:w-12 sm:h-12 rounded-full object-cover shrink-0" />
                    <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between">
                            <div className="flex flex-col sm:flex-row sm:items-center gap-0 sm:gap-2 leading-tight">
                                <span className="font-bold text-white text-[15px] sm:text-base truncate hover:underline">{post.name}</span>
                                <div className="flex items-center gap-1 text-[13px] sm:text-[15px] text-neutral-500">
                                    <span className="truncate">{post.handle}</span>
                                    <span>·</span>
                                    <span className="hover:underline shrink-0">{post.time}</span>
                                </div>
                            </div>
                            <button className="text-neutral-500 hover:text-indigo-400 p-1 rounded-full group transition-colors" aria-label="More actions">
                                <window.Icons.MoreHorizontal className="w-4 h-4" />
                            </button>
                        </div>

                        <p className="mt-1 sm:mt-1.5 text-[15px] sm:text-base leading-relaxed text-neutral-100 whitespace-pre-wrap">{post.text}</p>

                        {post.image && (
                            <div className="mt-3 rounded-2xl overflow-hidden border border-neutral-800/60 max-h-96">
                                <img src={post.image} alt="Post content" className="w-full h-full object-cover" />
                            </div>
                        )}

                        <div className="flex items-center justify-between mt-3 max-w-md text-neutral-500">
                            <button className="flex items-center gap-2 group hover:text-indigo-400 transition-colors bg-transparent border-none p-0 cursor-pointer text-[13px] sm:text-[14px]" aria-label="Comment">
                                <div className="p-1.5 rounded-full group-hover:bg-indigo-500/10 transition-colors"><window.Icons.MessageCircle className="w-4 h-4 sm:w-[18px] sm:h-[18px]" /></div>
                                <span>{post.stats.comments}</span>
                            </button>
                            <button className="flex items-center gap-2 group hover:text-green-500 transition-colors bg-transparent border-none p-0 cursor-pointer text-[13px] sm:text-[14px]" aria-label="Repost">
                                <div className="p-1.5 rounded-full group-hover:bg-green-500/10 transition-colors"><window.Icons.Repeat className="w-4 h-4 sm:w-[18px] sm:h-[18px]" /></div>
                                <span>{post.stats.reposts}</span>
                            </button>
                            <button className="flex items-center gap-2 group hover:text-pink-500 transition-colors bg-transparent border-none p-0 cursor-pointer text-[13px] sm:text-[14px]" aria-label="Like">
                                <div className="p-1.5 rounded-full group-hover:bg-pink-500/10 transition-colors"><window.Icons.Heart className="w-4 h-4 sm:w-[18px] sm:h-[18px] group-active:scale-75 transition-transform" /></div>
                                <span>{post.stats.likes}</span>
                            </button>
                            <div className="flex items-center gap-1">
                                <button className="p-1.5 rounded-full hover:text-indigo-400 hover:bg-indigo-500/10 transition-colors" aria-label="Bookmark"><window.Icons.Bookmark className="w-4 h-4 sm:w-[18px] sm:h-[18px]" /></button>
                                <button className="p-1.5 rounded-full hover:text-indigo-400 hover:bg-indigo-500/10 transition-colors" aria-label="Share"><window.Icons.Share2 className="w-4 h-4 sm:w-[18px] sm:h-[18px]" /></button>
                            </div>
                        </div>
                    </div>
                </article>
            );
        }

        function HomeFeed() {
            const posts = [
                {
                    id: 1,
                    name: 'Maya Lin',
                    handle: '@mayadesigns',
                    avatar: 'https://i.pravatar.cc/150?u=a042581f4e29026704d',
                    time: '2h',
                    text: 'Just finished migrating our entire frontend to React Server Components. The performance gains are absolutely unreal. TTFB dropped by 40% globally! 🚀✨\n\nWriting up a blog post detailing exactly how we did it incrementally.',
                    stats: { comments: 42, reposts: 18, likes: '1.2K' }
                },
                {
                    id: 2,
                    name: 'Tech Insider',
                    handle: '@techinsider',
                    avatar: 'https://i.pravatar.cc/150?u=techinsider123',
                    time: '4h',
                    text: 'Breaking: Major tech firms announce joint initiative on AI safety standards ahead of upcoming summit in Geneva next month. #TechNews',
                    image: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=1200',
                    stats: { comments: '128', reposts: '439', likes: '3.4K' }
                },
                {
                    id: 3,
                    name: 'Sam Rodriguez',
                    handle: '@samcodes',
                    avatar: 'https://i.pravatar.cc/150?u=samrod',
                    time: '5h',
                    text: 'The best typography is the one you don\'t notice. If folks are commenting on your font choices before they comment on the content, you might have overdone it.',
                    stats: { comments: 12, reposts: 5, likes: 89 }
                },
                {
                    id: 4,
                    name: 'Photography Daily',
                    handle: '@photodaily',
                    avatar: 'https://i.pravatar.cc/150?u=photo123',
                    time: '6h',
                    text: 'Golden hour in the Pacific Northwest never ceases to amaze. Captured on 35mm film.',
                    image: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&q=80&w=1200',
                    stats: { comments: 34, reposts: 12, likes: '450' }
                }
            ];

            return (
                <React.Fragment>
                    <header className="sticky top-0 bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-neutral-800/60 z-10 px-4 py-3 sm:py-4 flex justify-between items-center cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                        <h1 className="font-extrabold text-xl text-white font-display tracking-wide">Home</h1>
                    </header>

                    <PostComposer />

                    <div className="divide-y divide-neutral-800/60 pb-20 sm:pb-0">
                        {posts.map(post => <PostCard key={post.id} post={post} />)}
                    </div>
                </React.Fragment>
            );
        }

        function App() {
            // Small delay loop to ensure window.SocialLayout and Icons are loaded
            const [ready, setReady] = useState(false);
            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.SocialLayout && window.Icons) {
                        setReady(true);
                        clearInterval(interval);
                    }
                }, 50);
                return () => clearInterval(interval);
            }, []);

            if (!ready) return <div className="h-screen w-full flex items-center justify-center bg-[#0a0a0a] text-indigo-500"><svg className="animate-spin w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56" /></svg></div>;

            const SocialLayout = window.SocialLayout;
            return (
                <SocialLayout activePage="Home">
                    <HomeFeed />
                </SocialLayout>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
