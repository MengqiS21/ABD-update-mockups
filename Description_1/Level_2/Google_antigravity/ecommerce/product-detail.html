<!DOCTYPE html>

<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel" src="components.js"></script>

    <script type="text/babel">
        const { useState, useRef } = React;
        const { Header, Footer, A11yAnnouncer, ProductCard, announceToScreenReader } = window.NovaMart;

        const PRODUCT = {
            id: '1',
            name: 'Sony WH-1000XM5 Wireless Noise Canceling Headphones',
            brand: 'Sony',
            price: 279.99,
            originalPrice: 399.99,
            rating: 4.8,
            reviews: 1245,
            images: [
                'https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?auto=format&fit=crop&q=80&w=800',
                'https://images.unsplash.com/photo-1546435770-a3e426bf472b?auto=format&fit=crop&q=80&w=800',
                'https://images.unsplash.com/photo-1583394838336-acd977736f90?auto=format&fit=crop&q=80&w=800',
                'https://images.unsplash.com/photo-1590658268037-6bf12165a8df?auto=format&fit=crop&q=80&w=800',
            ],
            colors: [
                { id: 'black', name: 'Black', hex: '#1a1a1a' },
                { id: 'silver', name: 'Platinum Silver', hex: '#d1d5db' },
                { id: 'blue', name: 'Midnight Blue', hex: '#1e3a8a' }
            ]
        };

        const RELATED_PRODUCTS = [
            { id: '101', name: 'Sony WF-1000XM4 Earbuds', brand: 'Sony', price: 198.00, originalPrice: 279.99, rating: 4.6, reviews: 850, discount: 29, image: 'https://images.unsplash.com/photo-1590658268037-6bf12165a8df?auto=format&fit=crop&q=80&w=500' },
            { id: '102', name: 'Bose QuietComfort 45', brand: 'Bose', price: 249.00, originalPrice: 329.00, rating: 4.7, reviews: 920, discount: 24, image: 'https://images.unsplash.com/photo-1546435770-a3e426bf472b?auto=format&fit=crop&q=80&w=500' },
            { id: '103', name: 'Apple AirPods Max', brand: 'Apple', price: 479.00, originalPrice: 549.00, rating: 4.8, reviews: 1560, discount: 12, image: 'https://images.unsplash.com/photo-1613040809024-b4ef7ba99bc3?auto=format&fit=crop&q=80&w=500' },
            { id: '104', name: 'Sennheiser Momentum 4', brand: 'Sennheiser', price: 289.95, originalPrice: 349.95, rating: 4.5, reviews: 410, discount: 17, image: 'https://images.unsplash.com/photo-1583394838336-acd977736f90?auto=format&fit=crop&q=80&w=500' },
        ];

        const ImageGallery = () => {
            const [mainImage, setMainImage] = useState(0);

            const handleThumbnailClick = (index) => {
                setMainImage(index);
                announceToScreenReader(`Viewing image ${index + 1} of ${PRODUCT.images.length}`);
            };

            return (
                <div className="flex flex-col-reverse md:flex-row gap-4">
                    <div className="flex md:flex-col gap-4 overflow-x-auto md:overflow-visible" role="group" aria-label="Product thumbnails">
                        {PRODUCT.images.map((img, idx) => (
                            <button
                                key={idx}
                                onClick={() => handleThumbnailClick(idx)}
                                className={`w-20 h-20 md:w-24 md:h-24 flex-shrink-0 border-2 rounded-lg overflow-hidden focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 ${mainImage === idx ? 'border-blue-600' : 'border-transparent hover:border-gray-300'}`}
                                aria-label={`View image ${idx + 1}`}
                                aria-current={mainImage === idx ? 'true' : 'false'}
                            >
                                <img src={img} alt="" className="w-full h-full object-cover" />
                            </button>
                        ))}
                    </div>
                    <div className="flex-1 bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100">
                        <div className="aspect-[4/3] w-full relative">
                            <img src={PRODUCT.images[mainImage]} alt={PRODUCT.name} className="absolute inset-0 w-full h-full object-cover" />
                        </div>
                    </div>
                </div>
            );
        };

        const AccessibleTabs = () => {
            const [activeTab, setActiveTab] = useState('description');

            const handleTabKey = (e, tabId) => {
                const tabs = ['description', 'specs', 'reviews'];
                const currentIndex = tabs.indexOf(tabId);
                let nextIndex = null;

                // Arrow key navigation between tabs (Cat 4)
                if (e.key === 'ArrowRight') {
                    nextIndex = (currentIndex + 1) % tabs.length;
                } else if (e.key === 'ArrowLeft') {
                    nextIndex = (currentIndex - 1 + tabs.length) % tabs.length;
                }

                if (nextIndex !== null) {
                    e.preventDefault();
                    const nextTabId = tabs[nextIndex];
                    setActiveTab(nextTabId);
                    document.getElementById(`tab-${nextTabId}`).focus();
                }
            };

            return (
                <div className="mt-16 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div role="tablist" aria-label="Product details" className="flex border-b border-gray-200 overflow-x-auto">
                        <button
                            id="tab-description"
                            role="tab"
                            aria-selected={activeTab === 'description'}
                            aria-controls="panel-description"
                            tabIndex={activeTab === 'description' ? 0 : -1}
                            onKeyDown={(e) => handleTabKey(e, 'description')}
                            onClick={() => setActiveTab('description')}
                            className={`px-6 py-4 text-sm font-bold whitespace-nowrap focus:outline-none focus:bg-gray-50 ${activeTab === 'description' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-600 hover:text-gray-900'}`}
                        >
                            Description
                        </button>
                        <button
                            id="tab-specs"
                            role="tab"
                            aria-selected={activeTab === 'specs'}
                            aria-controls="panel-specs"
                            tabIndex={activeTab === 'specs' ? 0 : -1}
                            onKeyDown={(e) => handleTabKey(e, 'specs')}
                            onClick={() => setActiveTab('specs')}
                            className={`px-6 py-4 text-sm font-bold whitespace-nowrap focus:outline-none focus:bg-gray-50 ${activeTab === 'specs' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-600 hover:text-gray-900'}`}
                        >
                            Specifications
                        </button>
                        <button
                            id="tab-reviews"
                            role="tab"
                            aria-selected={activeTab === 'reviews'}
                            aria-controls="panel-reviews"
                            tabIndex={activeTab === 'reviews' ? 0 : -1}
                            onKeyDown={(e) => handleTabKey(e, 'reviews')}
                            onClick={() => setActiveTab('reviews')}
                            className={`px-6 py-4 text-sm font-bold whitespace-nowrap focus:outline-none focus:bg-gray-50 ${activeTab === 'reviews' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-600 hover:text-gray-900'}`}
                        >
                            Reviews ({PRODUCT.reviews})
                        </button>
                    </div>

                    <div className="p-6 md:p-8">
                        <div id="panel-description" role="tabpanel" aria-labelledby="tab-description" hidden={activeTab !== 'description'} tabIndex="0" className="focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 rounded text-gray-700 leading-relaxed space-y-4">
                            <h3 className="text-xl font-bold text-gray-900 mb-4">Industry-Leading Noise Cancellation</h3>
                            <p>The WH-1000XM5 headphones rewrite the rules for distraction-free listening. 2 processors control 8 microphones for unprecedented noise cancellation and exceptional call quality.</p>
                            <p>With a newly developed driver, DSEE - Extreme and Hires audio support, these headphones provide awe-inspiring audio quality. The Auto NC Optimizer automatically adjusts cancelling based on your environment.</p>
                        </div>

                        <div id="panel-specs" role="tabpanel" aria-labelledby="tab-specs" hidden={activeTab !== 'specs'} tabIndex="0" className="focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 rounded">
                            <h3 className="sr-only">Technical Specifications</h3>
                            <dl className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4 text-sm">
                                <div className="border-b border-gray-100 pb-2"><dt className="font-bold text-gray-900">Driver Unit</dt><dd className="text-gray-600 mt-1">30mm, dome type (CCAW Voice coil)</dd></div>
                                <div className="border-b border-gray-100 pb-2"><dt className="font-bold text-gray-900">Input(s)</dt><dd className="text-gray-600 mt-1">Stereo Mini Jack</dd></div>
                                <div className="border-b border-gray-100 pb-2"><dt className="font-bold text-gray-900">Frequency Response</dt><dd className="text-gray-600 mt-1">4 Hz - 40,000 Hz</dd></div>
                                <div className="border-b border-gray-100 pb-2"><dt className="font-bold text-gray-900">Battery Life</dt><dd className="text-gray-600 mt-1">Max. 30 hrs (NC ON), Max. 40 hrs (NC OFF)</dd></div>
                                <div className="border-b border-gray-100 pb-2"><dt className="font-bold text-gray-900">Bluetooth Version</dt><dd className="text-gray-600 mt-1">Version 5.2</dd></div>
                                <div className="border-b border-gray-100 pb-2"><dt className="font-bold text-gray-900">Weight</dt><dd className="text-gray-600 mt-1">Approx. 250g</dd></div>
                            </dl>
                        </div>

                        <div id="panel-reviews" role="tabpanel" aria-labelledby="tab-reviews" hidden={activeTab !== 'reviews'} tabIndex="0" className="focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 rounded">
                            <h3 className="sr-only">Customer Reviews</h3>
                            <div className="flex items-center gap-4 mb-8">
                                <div className="text-5xl font-extrabold text-gray-900">{PRODUCT.rating}</div>
                                <div>
                                    <div className="flex text-yellow-400 mb-1" aria-hidden="true">
                                        {[...Array(5)].map((_, i) => (
                                            <svg key={i} className={`w-5 h-5 ${i < Math.floor(PRODUCT.rating) ? 'text-yellow-400' : 'text-gray-300'}`} fill="currentColor" viewBox="0 0 20 20">
                                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                            </svg>
                                        ))}
                                    </div>
                                    <p className="text-sm text-gray-500">Based on {PRODUCT.reviews} reviews</p>
                                </div>
                            </div>

                            <div className="space-y-6">
                                {/* Mock Review */}
                                <div className="border-t border-gray-100 pt-6">
                                    <div className="flex justify-between items-start mb-2">
                                        <div>
                                            <h4 className="font-bold text-gray-900">Best ANC Headphones on the market</h4>
                                            <div className="flex items-center gap-2 mt-1">
                                                <div className="flex text-yellow-400 text-xs" aria-hidden="true">
                                                    {[...Array(5)].map((_, i) => <svg key={i} className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>)}
                                                </div>
                                                <span className="text-xs text-gray-500">Alex M. - Verified Buyer</span>
                                            </div>
                                        </div>
                                        <span className="text-xs text-gray-500">2 months ago</span>
                                    </div>
                                    <p className="text-sm text-gray-600">The noise cancelling is incredible. I wear these at the office and they block out almost everything. Sound quality is rich and the app allows great EQ control. The new design is much cleaner than the M4s.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ProductDetailPage = () => {
            const [quantity, setQuantity] = useState(1);
            const [selectedColor, setSelectedColor] = useState(PRODUCT.colors[0].id);

            const handleAddToCart = () => {
                announceToScreenReader(`${quantity} ${selectedColor} ${PRODUCT.name} added to cart`);
                // Actual add to cart logic would go here
            };

            return (
                <div className="min-h-screen flex flex-col bg-gray-50">
                    <A11yAnnouncer />
                    <a href="#main-content" className="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 z-[60] bg-blue-600 text-white px-4 py-2 font-bold rounded shadow-lg outline-none">
                        Skip to main content
                    </a>

                    <div className="bg-white border-b border-gray-200">
                        <Header activePage="products" />
                    </div>

                    <main id="main-content" className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full outline-none" tabIndex="-1">

                        {/* Breadcrumb */}
                        <nav aria-label="Breadcrumb" className="text-sm mb-6">
                            <ol className="flex items-center space-x-2 text-gray-500">
                                <li><a href="index.html" className="hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded">Home</a></li>
                                <li><span aria-hidden="true">&rsaquo;</span></li>
                                <li><a href="products.html" className="hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded">Electronics</a></li>
                                <li><span aria-hidden="true">&rsaquo;</span></li>
                                <li><span aria-current="page" className="text-gray-900 font-medium truncate max-w-xs block">{PRODUCT.name}</span></li>
                            </ol>
                        </nav>

                        {/* Product Hero */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                            <div className="lg:col-span-1">
                                <ImageGallery />
                            </div>

                            <div className="lg:col-span-1 flex flex-col">
                                <div className="mb-6 border-b border-gray-200 pb-6">
                                    <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wide mb-2">{PRODUCT.brand}</h2>
                                    <h1 className="text-3xl sm:text-4xl font-extrabold text-gray-900 tracking-tight mb-4">{PRODUCT.name}</h1>

                                    <div className="flex items-center gap-4 mb-4">
                                        <div className="flex items-center" aria-label={`Rated ${PRODUCT.rating} out of 5 stars by ${PRODUCT.reviews} reviewers`}>
                                            <div className="flex text-yellow-400" aria-hidden="true">
                                                {[...Array(5)].map((_, i) => (
                                                    <svg key={i} className={`w-5 h-5 ${i < Math.floor(PRODUCT.rating) ? 'text-yellow-400' : 'text-gray-300'}`} fill="currentColor" viewBox="0 0 20 20">
                                                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                                    </svg>
                                                ))}
                                            </div>
                                            <a href="#reviews" className="ml-2 text-sm font-medium text-blue-600 hover:text-blue-500 focus:outline-none focus:underline">{PRODUCT.reviews} reviews</a>
                                        </div>
                                    </div>

                                    <div className="flex items-end gap-3">
                                        <p className="text-3xl font-extrabold text-gray-900">${PRODUCT.price.toFixed(2)}</p>
                                        {PRODUCT.originalPrice && (
                                            <p className="text-lg text-gray-500 line-through mb-1">${PRODUCT.originalPrice.toFixed(2)}</p>
                                        )}
                                        {PRODUCT.originalPrice && (
                                            <p className="text-sm font-bold text-red-600 mb-1.5 bg-red-50 px-2 py-0.5 rounded ml-2">Save ${Math.round(PRODUCT.originalPrice - PRODUCT.price)}</p>
                                        )}
                                    </div>
                                </div>

                                {/* Form area: Selections & Actions */}
                                <form className="flex-grow space-y-6" onSubmit={(e) => { e.preventDefault(); handleAddToCart(); }}>
                                    {/* Colors - Cat 2 (fieldset) */}
                                    <fieldset>
                                        <legend className="text-sm font-bold text-gray-900 mb-3">Color: <span className="font-normal text-gray-500 ml-1">{PRODUCT.colors.find(c => c.id === selectedColor)?.name}</span></legend>
                                        <div className="flex items-center gap-3">
                                            {PRODUCT.colors.map(color => (
                                                <div key={color.id}>
                                                    <input
                                                        type="radio"
                                                        id={`color-${color.id}`}
                                                        name="color-selection"
                                                        value={color.id}
                                                        checked={selectedColor === color.id}
                                                        onChange={() => setSelectedColor(color.id)}
                                                        className="sr-only peer"
                                                        aria-label={`Select color ${color.name}`}
                                                    />
                                                    <label
                                                        htmlFor={`color-${color.id}`}
                                                        className="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer border-2 border-transparent peer-focus-visible:ring-2 peer-focus-visible:ring-offset-2 peer-focus-visible:ring-blue-500 peer-checked:border-blue-600 hover:scale-105 transition-transform"
                                                        style={{ backgroundColor: color.hex }}
                                                    >
                                                        {selectedColor === color.id && (
                                                            <svg className={`w-5 h-5 ${color.id === 'silver' ? 'text-gray-900' : 'text-white'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                                        )}
                                                    </label>
                                                </div>
                                            ))}
                                        </div>
                                    </fieldset>

                                    <div className="flex items-end gap-6 pt-4">
                                        {/* Quantity - Cat 1, Cat 4 */}
                                        <div>
                                            <label htmlFor="quantity" className="block text-sm font-bold text-gray-900 mb-2">Quantity</label>
                                            <div className="flex items-center border border-gray-300 rounded-md overflow-hidden h-12 w-32 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent">
                                                <button
                                                    type="button"
                                                    className="px-3 py-2 text-gray-600 hover:bg-gray-100 focus:outline-none"
                                                    onClick={() => setQuantity(Math.max(1, quantity - 1))}
                                                    aria-label="Decrease quantity"
                                                >
                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 12H4"></path></svg>
                                                </button>
                                                <input
                                                    id="quantity"
                                                    type="number"
                                                    min="1"
                                                    max="10"
                                                    value={quantity}
                                                    onChange={(e) => setQuantity(parseInt(e.target.value) || 1)}
                                                    className="w-full text-center border-none p-0 focus:ring-0 text-gray-900 font-bold"
                                                    aria-label="Product quantity"
                                                />
                                                <button
                                                    type="button"
                                                    className="px-3 py-2 text-gray-600 hover:bg-gray-100 focus:outline-none"
                                                    onClick={() => setQuantity(Math.min(10, quantity + 1))}
                                                    aria-label="Increase quantity"
                                                >
                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>
                                                </button>
                                            </div>
                                        </div>

                                        <div className="flex-grow space-y-3">
                                            <button
                                                type="submit"
                                                className="w-full flex items-center justify-center bg-blue-600 text-white font-bold py-3.5 px-6 rounded-md hover:bg-blue-700 shadow-sm transition-colors focus:outline-none focus:ring-4 focus:ring-blue-500 focus:ring-offset-2"
                                                aria-label={`Add ${quantity} ${PRODUCT.name} to cart`}
                                            >
                                                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                                Add to Cart
                                            </button>
                                        </div>
                                    </div>

                                    <div className="pt-2">
                                        <button
                                            type="button"
                                            className="w-full bg-gray-100 text-gray-900 border border-gray-200 font-bold py-3.5 px-6 rounded-md hover:bg-gray-200 transition-colors focus:outline-none focus:ring-4 focus:ring-gray-300 focus:ring-offset-2"
                                            aria-label={`Buy ${PRODUCT.name} instantly`}
                                            onClick={() => window.location.href = "cart.html"}
                                        >
                                            Buy Now
                                        </button>
                                    </div>

                                    <div className="mt-6 flex items-center gap-6 text-sm text-gray-500 border-t border-gray-200 pt-6">
                                        <div className="flex items-center gap-2"><svg className="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg> Free returns</div>
                                        <div className="flex items-center gap-2"><svg className="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Warranty included</div>
                                    </div>

                        <AccessibleTabs />

                        {/* Related Products Section */}
                        <section aria-labelledby="related-heading" className="mt-20 border-t border-gray-200 pt-16 mb-16">
                            <h2 id="related-heading" className="text-2xl font-bold text-gray-900 mb-8">Customers Also Bought</h2>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                {RELATED_PRODUCTS.map(product => (
                                    <ProductCard key={product.id} product={product} />
                                ))}
                            </div>
                        </section>

            );
        };
