<html lang="en">

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {

                    colors: {
                        brand: {

                        },

        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap"
        rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

            position: absolute;

            background: #000;

            padding: 8px;
            z-index: 100;

        /* Custom file input styling logic can be handled via React or Tailwind classes */

</head>

<body class="bg-gray-50 text-gray-900 antialiased flex flex-col min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AlertBanner = () => {
            const [visible, setVisible] = useState(true);
            if (!visible) return null;
            return (
                <div role="alert" className="bg-red-700 text-white px-4 py-3 sm:px-6 lg:px-8 flex items-start sm:items-center justify-between shadow-md">
                    <div className="flex items-center space-x-3 max-w-7xl mx-auto w-full">
                        <i data-lucide="alert-triangle" className="w-6 h-6 flex-shrink-0" aria-hidden="true"></i>
                        <span className="font-medium text-sm sm:text-base">
                            <span className="font-bold">Emergency Alert:</span> Road Closure: Main St between 3rd and 5th Ave until Nov 30
                        </span>
                    </div>
                    <button onClick={() => setVisible(false)} aria-label="Dismiss alert" className="text-white hover:text-red-200 focus:outline-none focus:ring-2 focus:ring-white rounded p-1 ml-4 transition-colors">
                        <i data-lucide="x" className="w-6 h-6" aria-hidden="true"></i>
                    </button>
                </div>
            );
        };

        const Header = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            return (
                <header className="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm relative">
                    <a href="#main-content" className="skip-link sr-only focus:not-sr-only p-4 bg-navy-900 text-white font-bold absolute top-0 left-0 z-50 rounded-br">Skip to main content</a>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-20 items-center">
                            <div className="flex items-center space-x-3">
                                <i data-lucide="landmark" className="w-8 h-8 text-navy-800" aria-hidden="true"></i>
                                <a href="index.html" className="text-2xl font-bold text-navy-900 tracking-tight focus:outline-none focus:ring-2 focus:ring-navy-800 rounded px-1 font-serif">
                                    City of Lakewood
                                </a>
                            </div>
                            <nav aria-label="Main Navigation" className="hidden md:flex space-x-8">
                                <a href="index.html" className="text-gray-600 hover:text-navy-800 hover:border-brand-300 font-medium py-2 px-1 border-b-2 border-transparent transition-colors focus:outline-none rounded">Home</a>
                                <a href="services.html" className="text-navy-800 font-semibold border-b-2 border-brand-500 py-2 px-1 focus:outline-none rounded transition-colors" aria-current="page">Services</a>
                                <a href="about.html" className="text-gray-600 hover:text-navy-800 hover:border-brand-300 font-medium py-2 px-1 border-b-2 border-transparent transition-colors focus:outline-none rounded">About</a>
                                <a href="contact.html" className="text-gray-600 hover:text-navy-800 hover:border-brand-300 font-medium py-2 px-1 border-b-2 border-transparent transition-colors focus:outline-none rounded">Contact</a>
                            </nav>
                            <div className="md:hidden">
                                <button aria-expanded={isMenuOpen} aria-label="Toggle navigation menu" onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-gray-600 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-navy-800 rounded p-2">
                                    <i data-lucide={isMenuOpen ? "x" : "menu"} className="w-6 h-6" aria-hidden="true"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    {isMenuOpen && (
                        <nav aria-label="Mobile Navigation" className="md:hidden bg-white border-t border-gray-100 flex flex-col space-y-1 p-4 shadow-inner">
                            <a href="index.html" className="text-gray-600 hover:text-navy-800 hover:bg-gray-50 py-3 px-4 rounded-md">Home</a>
                            <a href="services.html" className="text-navy-800 font-semibold py-3 px-4 bg-brand-50 rounded-md" aria-current="page">Services</a>
                            <a href="about.html" className="text-gray-600 hover:text-navy-800 hover:bg-gray-50 py-3 px-4 rounded-md">About</a>
                            <a href="contact.html" className="text-gray-600 hover:text-navy-800 hover:bg-gray-50 py-3 px-4 rounded-md">Contact</a>
                        </nav>
                    )}
                </header>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-navy-900 text-slate-300 pt-16 pb-8 mt-auto border-t-[6px] border-brand-500">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
                            <div>
                                <div className="flex items-center space-x-2 mb-6 text-white bg-navy-800 inline-block p-2 rounded">
                                    <i data-lucide="landmark" className="w-6 h-6 inline mr-2" aria-hidden="true"></i>
                                    <span className="text-lg font-bold font-serif">City of Lakewood</span>
                                </div>
                                <p className="text-sm text-slate-400 mb-6 leading-relaxed">
                                    Dedicated to serving our 160,000 residents with transparency, efficiency, and community spirit.
                                </p>
                            </div>
                            <div>
                                <h2 className="text-white text-sm font-bold uppercase tracking-wider mb-6 bg-navy-800 inline-block px-2 py-1 rounded">Departments</h2>
                                <ul className="space-y-3">
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Mayor's Office</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Public Works</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Parks & Recreation</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Police Department</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Fire Department</a></li>
                                </ul>
                            </div>
                            <div>
                                <h2 className="text-white text-sm font-bold uppercase tracking-wider mb-6 bg-navy-800 inline-block px-2 py-1 rounded">Quick Links</h2>
                                <ul className="space-y-3">
                                    <li><a href="services.html" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">All Services</a></li>
                                    <li><a href="service-permits.html" className="text-white font-bold focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors border-b border-brand-500">Apply for Permits</a></li>
                                    <li><a href="service-bill.html" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Pay a Bill</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Employment</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">City Council Meetings</a></li>
                                </ul>
                            </div>
                            <div>
                                <h2 className="text-white text-sm font-bold uppercase tracking-wider mb-6 bg-navy-800 inline-block px-2 py-1 rounded">Contact Us</h2>
                                <address className="not-italic text-sm space-y-4 text-slate-400">
                                    <p className="flex items-start">
                                        <i data-lucide="map-pin" className="w-5 h-5 mr-3 flex-shrink-0 text-slate-500" aria-hidden="true"></i>
                                        <span>123 City Hall Plaza<br />Lakewood, ST 12345</span>
                                    </p>
                                    <p className="flex items-center">
                                        <i data-lucide="phone" className="w-5 h-5 mr-3 flex-shrink-0 text-slate-500" aria-hidden="true"></i>
                                        <span>(555) 123-4567</span>
                                    </p>
                                    <p className="flex items-center">
                                        <i data-lucide="mail" className="w-5 h-5 mr-3 flex-shrink-0 text-slate-500" aria-hidden="true"></i>
                                        <a href="mailto:info@lakewood.gov" className="hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">info@lakewood.gov</a>
                                    </p>
                                </address>
                            </div>
                        </div>
                        <div className="border-t border-navy-800 pt-8 flex flex-col md:flex-row justify-between items-center text-xs">
                            <p>&copy; {new Date().getFullYear()} City of Lakewood. All rights reserved.</p>
                            <div className="flex space-x-6 mt-4 md:mt-0">
                                <a href="#" className="hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Privacy Policy</a>
                                <a href="#" className="hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Accessibility</a>
                                <a href="#" className="hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Terms of Use</a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };

        const PageHeader = () => (
            <div className="bg-navy-800 py-12 border-t border-navy-900">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <nav aria-label="Breadcrumb" className="mb-4">
                        <ol className="flex items-center space-x-2 text-sm text-brand-100">
                            <li><a href="index.html" className="hover:text-white focus:outline-none focus:underline rounded flex items-center"><i data-lucide="home" className="w-4 h-4 mr-1" aria-hidden="true"></i>Home</a></li>
                            <li><i data-lucide="chevron-right" className="w-4 h-4" aria-hidden="true"></i></li>
                            <li><a href="services.html" className="hover:text-white focus:outline-none focus:underline rounded flex items-center">Services</a></li>
                            <li><i data-lucide="chevron-right" className="w-4 h-4" aria-hidden="true"></i></li>
                            <li aria-current="page" className="text-white font-medium">Permits & Licenses</li>
                        </ol>
                    </nav>
                    <h1 className="text-4xl font-extrabold text-white font-serif mb-2">Permits & Licenses</h1>
                    <p className="text-lg text-navy-100 max-w-2xl">Apply for building, event, and business permits online or track the status of an existing application.</p>
                </div>
            </div>
        );

        const PermitForm = () => {
            const [status, setStatus] = useState('idle'); // idle, submitting, success
            const successRef = useRef(null);

            // Form state
            const [formData, setFormData] = useState({
                name: '',
                projectType: '',
                address: '',
                file: null
            });
            const [errors, setErrors] = useState({});

            useEffect(() => {
                if (status === 'success' && successRef.current) {
                    successRef.current.focus();
                }
            }, [status]);

            const validate = () => {
                const newErrors = {};
                if (!formData.name.trim()) newErrors.name = "Applicant name is required.";
                if (!formData.projectType) newErrors.projectType = "Please select a project type.";
                if (!formData.address.trim()) newErrors.address = "Project address is required.";
                if (!formData.file) newErrors.file = "Please upload the required plans/documents.";
                return newErrors;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const validationErrors = validate();
                if (Object.keys(validationErrors).length > 0) {
                    setErrors(validationErrors);
                    // Provide a generic screen reader error summary
                    document.getElementById('form-error-summary').innerText = "Form submission failed. Please fix the errors highlighted below.";
                    return;
                }

                setErrors({});
                document.getElementById('form-error-summary').innerText = "";
                setStatus('submitting');

                // Simulate network request
                setTimeout(() => {
                    setStatus('success');
                }, 1500);
            };

            const handleFileChange = (e) => {
                setFormData({ ...formData, file: e.target.files[0] });
                if (errors.file) setErrors({ ...errors, file: null });
            };

            if (status === 'success') {
                return (
                    <div className="bg-green-50 border border-green-200 rounded-xl p-8 text-center" role="region" aria-live="polite">
                        <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="check-circle" className="w-8 h-8" aria-hidden="true"></i>
                        </div>
                        <h2 className="text-2xl font-bold text-gray-900 mb-2" tabIndex="-1" ref={successRef}>Application Submitted Successfully</h2>
                        <p className="text-gray-600 mb-6">Your tracking number is <strong className="text-gray-900 font-mono text-lg ml-1 bg-white p-1 rounded border">PMT-4829-X</strong></p>
                        <p className="text-sm text-gray-500 mb-8 max-w-md mx-auto">Please save this tracking number. A confirmation email has been sent to you. Our team will review your application within 3-5 business days.</p>
                        <button onClick={() => { setStatus('idle'); setFormData({ name: '', projectType: '', address: '', file: null }); }} className="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-6 py-2 rounded-md font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm">
                            Submit Another Application
                        </button>
                    </div>
                );
            }

            return (
                <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                    <div className="bg-gray-50 px-6 py-4 border-b border-gray-200">
                        <h2 className="text-xl font-bold text-navy-900 font-serif" id="form-heading">New Permit Application</h2>
                    </div>
                    <form className="p-6 md:p-8 space-y-6" onSubmit={handleSubmit} aria-labelledby="form-heading" noValidate>
                        <div id="form-error-summary" className="sr-only" aria-live="assertive"></div>

                        <div>
                            <label htmlFor="applicantName" className="block text-sm font-semibold text-gray-900 mb-1">Applicant Name <span className="text-red-500" aria-hidden="true">*</span></label>
                            <input
                                type="text"
                                id="applicantName"
                                name="applicantName"
                                value={formData.name}
                                onChange={(e) => { setFormData({ ...formData, name: e.target.value }); if (errors.name) setErrors({ ...errors, name: null }); }}
                                aria-required="true"
                                aria-invalid={errors.name ? "true" : "false"}
                                aria-describedby={errors.name ? "name-error" : undefined}
                                className={`block w-full rounded-md py-2 px-3 text-gray-900 shadow-sm ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm sm:leading-6 ${errors.name ? 'ring-red-300 focus:ring-red-500 bg-red-50' : 'ring-gray-300 focus:ring-brand-500'}`}
                            />
                            {errors.name && <p className="mt-2 text-sm text-red-600 flex items-center" id="name-error"><i data-lucide="alert-circle" className="w-4 h-4 mr-1" aria-hidden="true"></i>{errors.name}</p>}
                        </div>

                        <div>
                            <label htmlFor="projectType" className="block text-sm font-semibold text-gray-900 mb-1">Project Type <span className="text-red-500" aria-hidden="true">*</span></label>
                            <select
                                id="projectType"
                                name="projectType"
                                value={formData.projectType}
                                onChange={(e) => { setFormData({ ...formData, projectType: e.target.value }); if (errors.projectType) setErrors({ ...errors, projectType: null }); }}
                                aria-required="true"
                                aria-invalid={errors.projectType ? "true" : "false"}
                                aria-describedby={errors.projectType ? "type-error" : undefined}
                                className={`block w-full rounded-md py-2 px-3 text-gray-900 shadow-sm ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm sm:leading-6 bg-white ${errors.projectType ? 'ring-red-300 focus:ring-red-500 bg-red-50' : 'ring-gray-300 focus:ring-brand-500'}`}
                            >
                                <option value="">Select a type...</option>
                                <option value="residential-remodel">Residential Remodel</option>
                                <option value="commercial-build">Commercial New Build</option>
                                <option value="plumbing-elec">Plumbing / Electrical Update</option>
                                <option value="event">Special Event Permit</option>
                                <option value="business">New Business License</option>
                            </select>
                            {errors.projectType && <p className="mt-2 text-sm text-red-600 flex items-center" id="type-error"><i data-lucide="alert-circle" className="w-4 h-4 mr-1" aria-hidden="true"></i>{errors.projectType}</p>}
                        </div>

                        <div>
                            <label htmlFor="projectAddress" className="block text-sm font-semibold text-gray-900 mb-1">Project Address <span className="text-red-500" aria-hidden="true">*</span></label>
                            <input
                                type="text"
                                id="projectAddress"
                                name="projectAddress"
                                value={formData.address}
                                onChange={(e) => { setFormData({ ...formData, address: e.target.value }); if (errors.address) setErrors({ ...errors, address: null }); }}
                                aria-required="true"
                                aria-invalid={errors.address ? "true" : "false"}
                                aria-describedby={errors.address ? "address-error" : undefined}
                                placeholder="123 Main St"
                                className={`block w-full rounded-md py-2 px-3 text-gray-900 shadow-sm ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm sm:leading-6 ${errors.address ? 'ring-red-300 focus:ring-red-500 bg-red-50' : 'ring-gray-300 focus:ring-brand-500'}`}
                            />
                            {errors.address && <p className="mt-2 text-sm text-red-600 flex items-center" id="address-error"><i data-lucide="alert-circle" className="w-4 h-4 mr-1" aria-hidden="true"></i>{errors.address}</p>}
                        </div>

                        <div>
                            <label htmlFor="documentUpload" className="block text-sm font-semibold text-gray-900 mb-1">Upload Documents (Plans, IDs, etc.) <span className="text-red-500" aria-hidden="true">*</span></label>
                            <p className="text-sm text-gray-500 mb-2">Supported formats: PDF, JPG, PNG. Max size: 20MB.</p>
                            <div className={`mt-2 flex justify-center rounded-lg border border-dashed px-6 py-10 ${errors.file ? 'border-red-300 bg-red-50' : 'border-gray-900/25 bg-white'}`}>
                                <div className="text-center">
                                    <i data-lucide="upload-cloud" className={`mx-auto h-10 w-10 ${errors.file ? 'text-red-400' : 'text-gray-300'}`} aria-hidden="true"></i>
                                    <div className="mt-4 flex text-sm leading-6 text-gray-600 justify-center">
                                        <label htmlFor="documentUpload" className="relative cursor-pointer rounded-md bg-white font-semibold text-brand-600 focus-within:outline-none focus-within:ring-2 focus-within:ring-brand-600 focus-within:ring-offset-2 hover:text-brand-500 p-1">
                                            <span>Upload a file</span>
                                            <input
                                                id="documentUpload"
                                                name="documentUpload"
                                                type="file"
                                                className="sr-only"
                                                onChange={handleFileChange}
                                                aria-required="true"
                                                aria-invalid={errors.file ? "true" : "false"}
                                                aria-describedby={errors.file ? "file-error" : "file-status"}
                                            />
                                        </label>
                                        <p className="pl-1 pt-1">or drag and drop</p>
                                    </div>
                                    <p id="file-status" className="text-xs leading-5 text-gray-600 mt-2" aria-live="polite">{formData.file ? formData.file.name : "No file selected"}</p>
                                </div>
                            </div>
                            {errors.file && <p className="mt-2 text-sm text-red-600 flex items-center" id="file-error"><i data-lucide="alert-circle" className="w-4 h-4 mr-1" aria-hidden="true"></i>{errors.file}</p>}
                        </div>

                        <div className="pt-4 border-t border-gray-100 flex items-center justify-end">
                            <button
                                type="submit"
                                disabled={status === 'submitting'}
                                aria-label="Submit Permit Application"
                                className="bg-brand-600 hover:bg-brand-700 disabled:opacity-70 disabled:cursor-not-allowed text-white px-8 py-3 rounded-md font-bold transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 shadow-md flex items-center"
                            >
                                {status === 'submitting' ? (
                                    <><i data-lucide="loader-2" className="w-5 h-5 mr-2 animate-spin" aria-hidden="true"></i> Processing...</>
                                ) : (
                                    "Submit Application"
                                )}
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        const StatusTracker = () => {
            const [query, setQuery] = useState('');
            const [result, setResult] = useState(null); // null, 'loading', or result obj

            const handleSearch = (e) => {
                e.preventDefault();
                if (!query.trim()) return;
                setResult('loading');
                // Simulate status lookup
                setTimeout(() => {
                    if (query.toUpperCase().includes('PMT')) {
                        setResult({ found: true, status: 'Under Review', date: 'Oct 24, 2026', type: 'Residential Remodel' });
                    } else {
                        setResult({ found: false });
                    }
                }, 1000);
            };

            return (
                <div className="bg-navy-50 border border-navy-100 rounded-xl p-6 shadow-sm">
                    <h2 className="text-xl font-bold text-navy-900 font-serif mb-4 flex items-center">
                        <i data-lucide="search" className="w-5 h-5 mr-2 text-navy-700" aria-hidden="true"></i>
                        Check Application Status
                    </h2>
                    <form onSubmit={handleSearch} className="mb-6 flex gap-2">
                        <label htmlFor="tracker-input" className="sr-only">Tracking Number</label>
                        <input
                            id="tracker-input"
                            type="text"
                            className="block w-full rounded-md py-2 px-3 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-navy-600 sm:text-sm"
                            placeholder="Enter Tracking ID (e.g. PMT-...)"
                            value={query}
                            onChange={(e) => setQuery(e.target.value)}
                        />
                        <button type="submit" className="bg-navy-800 hover:bg-navy-900 text-white px-4 py-2 rounded-md font-semibold transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-navy-600 flex-shrink-0 flex items-center">
                            Track
                        </button>
                    </form>

                    <div aria-live="polite" aria-atomic="true">
                        {result === 'loading' && <div className="text-gray-600 flex items-center"><i data-lucide="loader-2" className="w-4 h-4 mr-2 animate-spin"></i> Searching...</div>}
                        {result && typeof result === 'object' && result.found && (
                            <div className="bg-white p-4 rounded-lg border border-gray-200">
                                <div className="flex justify-between items-start border-b border-gray-100 pb-2 mb-2">
                                    <span className="font-mono text-sm font-bold text-gray-900">{query.toUpperCase()}</span>
                                    <span className="bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-1 rounded-full">{result.status}</span>
                                </div>
                                <p className="text-sm text-gray-600 mb-1"><strong>Type:</strong> {result.type}</p>
                                <p className="text-sm text-gray-600"><strong>Submitted:</strong> {result.date}</p>
                            </div>
                        )}
                        {result && typeof result === 'object' && !result.found && (
                            <div className="bg-red-50 text-red-700 p-3 rounded-lg border border-red-200 text-sm flex items-center">
                                <i data-lucide="alert-circle" className="w-4 h-4 mr-2" aria-hidden="true"></i> No application found with that ID.
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const MainContent = () => {
            return (
                <main id="main-content" className="flex-grow focus:outline-none bg-gray-50 pb-20" tabIndex="-1">
                    <PageHeader />
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-12">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                            <div className="lg:col-span-2">
                                <PermitForm />
                            </div>
                            <div className="space-y-8">
                                <StatusTracker />

                                <div className="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
                                    <h3 className="text-lg font-bold text-gray-900 font-serif mb-4 border-b border-gray-100 pb-2">Need Help?</h3>
                                    <p className="text-sm text-gray-600 mb-4">If you are unsure which permit you need or have questions about the application process, our Building Division is here to assist.</p>
                                    <ul className="space-y-3 text-sm text-gray-600">
                                        <li className="flex items-center"><i data-lucide="phone" className="w-4 h-4 mr-2 text-brand-600" aria-hidden="true"></i> (555) 123-4568</li>
                                        <li className="flex items-center"><i data-lucide="mail" className="w-4 h-4 mr-2 text-brand-600" aria-hidden="true"></i> <a href="mailto:permits@lakewood.gov" className="text-brand-600 hover:underline">permits@lakewood.gov</a></li>
                                        <li className="flex items-center"><i data-lucide="clock" className="w-4 h-4 mr-2 text-brand-600" aria-hidden="true"></i> Mon-Fri, 8am-4pm</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            );
        };

        const App = () => {
            useEffect(() => {
                lucide.createIcons();
            });

            return (
                <div className="min-h-screen flex flex-col font-sans text-gray-800">
                    <AlertBanner />
                    <Header />
                    <MainContent />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
