<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City of Lakewood — Official Government Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            300: '#5eead4',
                            500: '#14b8a6', // Teal as accent
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                        },
                        navy: {
                            800: '#1e3a8a',
                            900: '#1e3a5f',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    }
                }
            }
        }
    </script>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Merriweather', serif;
        }

        /* Focus styles for accessibility */
        *:focus-visible {
            outline: 3px solid #fde047;
            outline-offset: 2px;
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #000;
            color: white;
            padding: 8px;
            z-index: 100;
            transition: top 0.2s;
        }

        .skip-link:focus {
            top: 0;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 antialiased flex flex-col min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const AlertBanner = () => {
            const [visible, setVisible] = useState(true);
            if (!visible) return null;
            return (
                <div role="alert" className="bg-red-700 text-white px-4 py-3 sm:px-6 lg:px-8 flex items-start sm:items-center justify-between shadow-md">
                    <div className="flex items-center space-x-3 max-w-7xl mx-auto w-full">
                        <i data-lucide="alert-triangle" className="w-6 h-6 flex-shrink-0" aria-hidden="true"></i>
                        <span className="font-medium text-sm sm:text-base">
                            <span className="font-bold">Emergency Alert:</span> Road Closure: Main St between 3rd and 5th Ave until Nov 30
                        </span>
                    </div>
                    <button onClick={() => setVisible(false)} aria-label="Dismiss alert" className="text-white hover:text-red-200 focus:outline-none focus:ring-2 focus:ring-white rounded p-1 ml-4 transition-colors">
                        <i data-lucide="x" className="w-6 h-6" aria-hidden="true"></i>
                    </button>
                </div>
            );
        };

        const Header = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            return (
                <header className="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm relative">
                    <a href="#main-content" className="skip-link sr-only focus:not-sr-only p-4 bg-navy-900 text-white font-bold absolute top-0 left-0 z-50 rounded-br">Skip to main content</a>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-20 items-center">
                            <div className="flex items-center space-x-3">
                                <i data-lucide="landmark" className="w-8 h-8 text-navy-800" aria-hidden="true"></i>
                                <a href="index.html" className="text-2xl font-bold text-navy-900 tracking-tight focus:outline-none focus:ring-2 focus:ring-navy-800 rounded px-1 font-serif">
                                    City of Lakewood
                                </a>
                            </div>
                            <nav aria-label="Main Navigation" className="hidden md:flex space-x-8">
                                <a href="index.html" className="text-navy-800 font-semibold border-b-2 border-brand-500 py-2 px-1 focus:outline-none rounded transition-colors" aria-current="page">Home</a>
                                <a href="services.html" className="text-gray-600 hover:text-navy-800 hover:border-brand-300 font-medium py-2 px-1 border-b-2 border-transparent transition-colors focus:outline-none rounded">Services</a>
                                <a href="about.html" className="text-gray-600 hover:text-navy-800 hover:border-brand-300 font-medium py-2 px-1 border-b-2 border-transparent transition-colors focus:outline-none rounded">About</a>
                                <a href="contact.html" className="text-gray-600 hover:text-navy-800 hover:border-brand-300 font-medium py-2 px-1 border-b-2 border-transparent transition-colors focus:outline-none rounded">Contact</a>
                            </nav>
                            <div className="md:hidden">
                                <button aria-expanded={isMenuOpen} aria-label="Toggle navigation menu" onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-gray-600 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-navy-800 rounded p-2">
                                    <i data-lucide={isMenuOpen ? "x" : "menu"} className="w-6 h-6" aria-hidden="true"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    {/* Mobile Menu */}
                    {isMenuOpen && (
                        <nav aria-label="Mobile Navigation" className="md:hidden bg-white border-t border-gray-100 flex flex-col space-y-1 p-4 shadow-inner">
                            <a href="index.html" className="text-navy-800 font-semibold py-3 px-4 bg-brand-50 rounded-md" aria-current="page">Home</a>
                            <a href="services.html" className="text-gray-600 hover:text-navy-800 hover:bg-gray-50 py-3 px-4 rounded-md">Services</a>
                            <a href="about.html" className="text-gray-600 hover:text-navy-800 hover:bg-gray-50 py-3 px-4 rounded-md">About</a>
                            <a href="contact.html" className="text-gray-600 hover:text-navy-800 hover:bg-gray-50 py-3 px-4 rounded-md">Contact</a>
                        </nav>
                    )}
                </header>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-navy-900 text-slate-300 pt-16 pb-8 mt-auto border-t-[6px] border-brand-500">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
                            <div>
                                <div className="flex items-center space-x-2 mb-6 text-white bg-navy-800 inline-block p-2 rounded">
                                    <i data-lucide="landmark" className="w-6 h-6 inline mr-2" aria-hidden="true"></i>
                                    <span className="text-lg font-bold font-serif">City of Lakewood</span>
                                </div>
                                <p className="text-sm text-slate-400 mb-6 leading-relaxed">
                                    Dedicated to serving our 160,000 residents with transparency, efficiency, and community spirit.
                                </p>
                            </div>
                            <div>
                                <h2 className="text-white text-sm font-bold uppercase tracking-wider mb-6 bg-navy-800 inline-block px-2 py-1 rounded">Departments</h2>
                                <ul className="space-y-3">
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Mayor's Office</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Public Works</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Parks & Recreation</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Police Department</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Fire Department</a></li>
                                </ul>
                            </div>
                            <div>
                                <h2 className="text-white text-sm font-bold uppercase tracking-wider mb-6 bg-navy-800 inline-block px-2 py-1 rounded">Quick Links</h2>
                                <ul className="space-y-3">
                                    <li><a href="services.html" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">All Services</a></li>
                                    <li><a href="service-permits.html" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Apply for Permits</a></li>
                                    <li><a href="service-bill.html" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Pay a Bill</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Employment</a></li>
                                    <li><a href="#" className="text-sm hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">City Council Meetings</a></li>
                                </ul>
                            </div>
                            <div>
                                <h2 className="text-white text-sm font-bold uppercase tracking-wider mb-6 bg-navy-800 inline-block px-2 py-1 rounded">Contact Us</h2>
                                <address className="not-italic text-sm space-y-4 text-slate-400">
                                    <p className="flex items-start">
                                        <i data-lucide="map-pin" className="w-5 h-5 mr-3 flex-shrink-0 text-slate-500" aria-hidden="true"></i>
                                        <span>123 City Hall Plaza<br />Lakewood, ST 12345</span>
                                    </p>
                                    <p className="flex items-center">
                                        <i data-lucide="phone" className="w-5 h-5 mr-3 flex-shrink-0 text-slate-500" aria-hidden="true"></i>
                                        <span>(555) 123-4567</span>
                                    </p>
                                    <p className="flex items-center">
                                        <i data-lucide="mail" className="w-5 h-5 mr-3 flex-shrink-0 text-slate-500" aria-hidden="true"></i>
                                        <a href="mailto:info@lakewood.gov" className="hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">info@lakewood.gov</a>
                                    </p>
                                </address>
                            </div>
                        </div>
                        <div className="border-t border-navy-800 pt-8 flex flex-col md:flex-row justify-between items-center text-xs">
                            <p>&copy; 2026 City of Lakewood. All rights reserved.</p>
                            <div className="flex space-x-6 mt-4 md:mt-0">
                                <a href="#" className="hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Privacy Policy</a>
                                <a href="#" className="hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Accessibility</a>
                                <a href="#" className="hover:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 rounded px-1 transition-colors">Terms of Use</a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };

        const Hero = () => {
            const [searchQuery, setSearchQuery] = useState('');
            return (
                <section className="bg-navy-800 text-white relative overflow-hidden py-24 sm:py-32" aria-labelledby="hero-heading">
                    <div className="absolute inset-0 z-0 opacity-20 bg-center bg-cover" style={{ backgroundImage: "url('https://images.unsplash.com/photo-1449844908441-8829872d2607?auto=format&fit=crop&q=80')" }}></div>
                    <div className="absolute inset-0 bg-gradient-to-b from-navy-900/80 to-navy-800/90 mix-blend-multiply"></div>

                    <div className="relative z-10 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                        <h1 id="hero-heading" className="text-4xl sm:text-5xl lg:text-6xl font-extrabold tracking-tight mb-6 font-serif leading-tight">
                            Welcome to the City of Lakewood
                        </h1>
                        <p className="text-xl sm:text-2xl text-navy-100 mb-10 max-w-2xl mx-auto font-light">
                            Your gateway to city services, news, and community resources.
                        </p>

                        {/* Task-based Search */}
                        <form className="max-w-2xl mx-auto bg-white p-2 rounded-lg shadow-xl flex flex-col sm:flex-row gap-2 relative z-20" onSubmit={(e) => e.preventDefault()} aria-label="Sitewide search">
                            <label htmlFor="hero-search" className="sr-only">How Can We Help You?</label>
                            <div className="relative flex-grow">
                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i data-lucide="search" className="h-6 w-6 text-gray-400" aria-hidden="true"></i>
                                </div>
                                <input
                                    id="hero-search"
                                    type="text"
                                    className="block w-full pl-12 pr-4 py-4 rounded-md border-0 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-500 text-lg shadow-sm sm:leading-6 bg-gray-50 bg-opacity-90"
                                    placeholder="How can we help you today? (e.g. 'Pay bill', 'Permits')"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                            <button type="submit" aria-label="Search" className="bg-brand-600 hover:bg-brand-700 text-white px-8 py-4 rounded-md font-bold text-lg transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 shadow-md">
                                Search
                            </button>
                        </form>
                    </div>
                </section>
            );
        };

        const QuickServices = () => {
            const services = [
                { icon: 'credit-card', title: 'Pay a Bill', link: 'service-bill.html', desc: 'Water, sewer, and property taxes' },
                { icon: 'alert-circle', title: 'Report an Issue', link: '#', desc: 'Potholes, graffiti, or noise complaints' },
                { icon: 'file-text', title: 'Apply for a Permit', link: 'service-permits.html', desc: 'Building, events, and business licenses' },
                { icon: 'tree-pine', title: 'Find a Park', link: '#', desc: 'Locations, trails, and amenities' },
            ];

            return (
                <section className="py-16 bg-white relative -mt-8 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto z-20 rounded-t-xl shadow-lg border border-gray-100" aria-labelledby="quick-services-heading">
                    <div className="text-center mb-10">
                        <h2 id="quick-services-heading" className="text-2xl font-bold text-navy-900 border-b-4 border-brand-500 inline-block pb-2 font-serif">Quick Services</h2>
                    </div>
                    <ul className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        {services.map((svc, idx) => (
                            <li key={idx} className="flex">
                                <a href={svc.link} className="flex flex-col items-center bg-gray-50 rounded-xl p-8 hover:bg-brand-50 border border-gray-200 hover:border-brand-300 transition-all group w-full text-center shadow-sm hover:shadow-md focus:outline-none focus:ring-4 focus:ring-brand-500">
                                    <div className="bg-white p-4 rounded-full shadow-sm mb-4 group-hover:scale-110 group-hover:bg-brand-600 group-hover:text-white transition-all text-brand-600 border border-gray-100">
                                        <i data-lucide={svc.icon} className="w-8 h-8" aria-hidden="true"></i>
                                    </div>
                                    <h3 className="text-lg font-bold text-navy-900 group-hover:text-brand-700 mb-2">{svc.title}</h3>
                                    <p className="text-sm text-gray-500">{svc.desc}</p>
                                </a>
                            </li>
                        ))}
                    </ul>
                </section>
            );
        };

        const NewsAndEvents = () => {
            return (
                <section className="py-16 lg:py-24 bg-gray-50 border-t border-gray-200" aria-labelledby="news-events-heading">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                            {/* News Section */}
                            <div className="lg:col-span-2">
                                <div className="flex justify-between items-end mb-8 border-b-2 border-gray-200 pb-4">
                                    <h2 id="news-events-heading" className="text-2xl font-bold text-navy-900 font-serif">City News & Announcements</h2>
                                    <a href="#" className="text-brand-600 hover:text-brand-800 font-semibold text-sm flex items-center group">
                                        View All Announcements <i data-lucide="arrow-right" className="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform" aria-hidden="true"></i>
                                    </a>
                                </div>
                                <div className="space-y-6">
                                    <article className="bg-white p-6 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition-shadow">
                                        <span className="text-xs font-bold text-brand-600 uppercase tracking-wide mb-2 block">Public Safety</span>
                                        <h3 className="text-xl font-bold text-gray-900 mb-2">
                                            <a href="#" className="hover:text-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 rounded">New Traffic Safety Guidelines Enacted for Downtown Area</a>
                                        </h3>
                                        <p className="text-gray-600 mb-4 line-clamp-2">The City Council has approved new measures to enhance pedestrian safety downtown, including revised speed limits and new crosswalks.</p>
                                        <div className="text-sm text-gray-500 flex items-center">
                                            <i data-lucide="calendar" className="w-4 h-4 mr-2" aria-hidden="true"></i> Nov 15, 2026
                                        </div>
                                    </article>
                                    <article className="bg-white p-6 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition-shadow">
                                        <span className="text-xs font-bold text-brand-600 uppercase tracking-wide mb-2 block">Community</span>
                                        <h3 className="text-xl font-bold text-gray-900 mb-2">
                                            <a href="#" className="hover:text-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 rounded">Annual Winter Festival Seeking Vendor Applications</a>
                                        </h3>
                                        <p className="text-gray-600 mb-4 line-clamp-2">Local artisans and food vendors are invited to apply for booths at the upcoming Lakewood Winter Festival in City Center Park.</p>
                                        <div className="text-sm text-gray-500 flex items-center">
                                            <i data-lucide="calendar" className="w-4 h-4 mr-2" aria-hidden="true"></i> Nov 10, 2026
                                        </div>
                                    </article>
                                </div>
                            </div>

                            {/* Events Section */}
                            <div>
                                <div className="flex justify-between items-end mb-8 border-b-2 border-gray-200 pb-4">
                                    <h2 className="text-2xl font-bold text-navy-900 font-serif">Upcoming Events</h2>
                                </div>
                                <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                                    <ul className="divide-y divide-gray-100">
                                        <li className="p-5 hover:bg-gray-50 transition-colors">
                                            <div className="flex items-start">
                                                <div className="flex-shrink-0 bg-brand-50 rounded-md border text-center p-2 border-brand-100 mr-4 w-16" aria-hidden="true">
                                                    <span className="block text-brand-600 font-bold text-xs uppercase">Nov</span>
                                                    <span className="block text-navy-900 font-bold text-xl">20</span>
                                                </div>
                                                <div>
                                                    <h3 className="font-bold text-gray-900 leading-tight mb-1"><a href="#" className="hover:text-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 rounded">City Council Regular Meeting</a></h3>
                                                    <p className="text-sm text-gray-500 flex items-center mt-2"><i data-lucide="clock" className="w-3 h-3 mr-1" aria-hidden="true"></i> 7:00 PM</p>
                                                    <p className="text-sm text-gray-500 flex items-center mt-1"><i data-lucide="map-pin" className="w-3 h-3 mr-1" aria-hidden="true"></i> City Hall Chambers</p>
                                                </div>
                                            </div>
                                        </li>
                                        <li className="p-5 hover:bg-gray-50 transition-colors">
                                            <div className="flex items-start">
                                                <div className="flex-shrink-0 bg-brand-50 rounded-md border text-center p-2 border-brand-100 mr-4 w-16" aria-hidden="true">
                                                    <span className="block text-brand-600 font-bold text-xs uppercase">Nov</span>
                                                    <span className="block text-navy-900 font-bold text-xl">25</span>
                                                </div>
                                                <div>
                                                    <h3 className="font-bold text-gray-900 leading-tight mb-1"><a href="#" className="hover:text-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 rounded">Thanksgiving Farmers Market</a></h3>
                                                    <p className="text-sm text-gray-500 flex items-center mt-2"><i data-lucide="clock" className="w-3 h-3 mr-1" aria-hidden="true"></i> 9:00 AM - 2:00 PM</p>
                                                    <p className="text-sm text-gray-500 flex items-center mt-1"><i data-lucide="map-pin" className="w-3 h-3 mr-1" aria-hidden="true"></i> Centennial Plaza</p>
                                                </div>
                                            </div>
                                        </li>
                                        <li className="p-5 hover:bg-gray-50 transition-colors">
                                            <div className="flex items-start">
                                                <div className="flex-shrink-0 bg-brand-50 rounded-md border text-center p-2 border-brand-100 mr-4 w-16" aria-hidden="true">
                                                    <span className="block text-brand-600 font-bold text-xs uppercase">Dec</span>
                                                    <span className="block text-navy-900 font-bold text-xl">02</span>
                                                </div>
                                                <div>
                                                    <h3 className="font-bold text-gray-900 leading-tight mb-1"><a href="#" className="hover:text-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 rounded">Town Hall: Parks Expansion Plan</a></h3>
                                                    <p className="text-sm text-gray-500 flex items-center mt-2"><i data-lucide="clock" className="w-3 h-3 mr-1" aria-hidden="true"></i> 6:00 PM</p>
                                                    <p className="text-sm text-gray-500 flex items-center mt-1"><i data-lucide="video" className="w-3 h-3 mr-1" aria-hidden="true"></i> Virtual / Zoom</p>
                                                </div>
                                            </div>
                                        </li>
                                    </ul>
                                    <div className="bg-gray-50 border-t border-gray-100 p-4 text-center">
                                        <a href="#" className="text-brand-600 hover:text-brand-800 font-semibold text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 rounded py-1 px-2 inline-block">View Full Calendar</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const App = () => {
            useEffect(() => {
                lucide.createIcons();
            });

            return (
                <div className="min-h-screen flex flex-col font-sans text-gray-800">
                    <AlertBanner />
                    <Header />
                    <main id="main-content" className="flex-grow focus:outline-none" tabIndex="-1">
                        <Hero />
                        <QuickServices />
                        <NewsAndEvents />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
