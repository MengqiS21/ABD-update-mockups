                <div className="flex-1 min-w-0">
                  <p className="text-xs text-blue-600 font-medium">{item.brand}</p>
                  <a href="product-detail.html" className="text-sm font-semibold text-gray-900 hover:text-blue-700 line-clamp-2 block">{item.name}</a>
                  <div className="flex items-center gap-0.5 text-xs my-1">
                    {[1,2,3,4,5].map(j=><span key={j} className={j<=Math.round(item.rating)?'text-yellow-400':'text-gray-300'}>★</span>)}
                  </div>
                  <p className="text-base font-bold text-gray-900 mb-2">${item.price}</p>
                  <div className="flex gap-2 text-xs">
                    <a href="cart.html" className="bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-semibold px-3 py-1.5 rounded-lg transition">Add to Cart</a>
                    <button onClick={()=>setItems(it=>it.filter((_,j)=>j!==i))}
                      className="border border-gray-300 text-gray-600 px-3 py-1.5 rounded-lg hover:bg-gray-50 transition">Remove</button>
                  </div>
                </div>
                <div className="text-xs text-gray-400 whitespace-nowrap">{item.added}</div>
              </div>
            ))}
          </div>
      }
    </div>
  );
}

function AccountSettings() {
  const [saved, setSaved] = useState(false);
  const [notifications, setNotifications] = useState({
    orderUpdates: true,
    promotions: true,
    priceDrops: false,
    newArrivals: false,
    securityAlerts: true,
  });
  return (
    <div>
      <h2 className="text-xl font-bold mb-5">Account Settings</h2>
      <div className="space-y-5">
        {/* Profile */}
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
          <h3 className="font-bold mb-4 text-gray-900">Personal Information</h3>
          <div className="flex items-center gap-4 mb-5">
            <div className="w-16 h-16 rounded-full bg-blue-600 text-white flex items-center justify-center text-2xl font-bold">AJ</div>
            <div>
              <p className="font-semibold">Alex Johnson</p>
              <p className="text-xs text-gray-500">alex.johnson@email.com</p>
              <button className="text-xs text-blue-600 hover:underline mt-1">Change profile photo</button>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-4 text-sm">
            {[{label:'First Name',val:'Alex'},{label:'Last Name',val:'Johnson'},{label:'Email Address',val:'alex.johnson@email.com'},{label:'Phone Number',val:'(212) 555-0123'}].map((f,i)=>(
              <div key={i}>
                <label className="block text-xs font-medium text-gray-600 mb-1">{f.label}</label>
                <input type="text" defaultValue={f.val}
                  className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
              </div>
            ))}
            <div className="col-span-2">
              <label className="block text-xs font-medium text-gray-600 mb-1">Date of Birth</label>
              <input type="date" defaultValue="1991-07-14"
                className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
            </div>
          </div>
          <div className="mt-4 flex gap-3">
            <button onClick={()=>{setSaved(true);setTimeout(()=>setSaved(false),2500);}}
              className={`font-semibold px-5 py-2 rounded-lg text-sm transition ${saved?'bg-green-500 text-white':'bg-blue-600 hover:bg-blue-700 text-white'}`}>
              {saved ? '✓ Changes Saved!' : 'Save Changes'}
            </button>
            <button className="border border-gray-300 text-gray-700 px-5 py-2 rounded-lg text-sm hover:bg-gray-50 transition">Discard</button>
          </div>
        </div>

        {/* Password */}
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
          <h3 className="font-bold mb-4 text-gray-900">Password & Security</h3>
          <div className="space-y-3 max-w-md">
            {['Current Password','New Password','Confirm New Password'].map((f,i)=>(
              <div key={i}>
                <label className="block text-xs font-medium text-gray-600 mb-1">{f}</label>
                <input type="password" className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
              </div>
            ))}
          </div>
          <div className="flex gap-3 mt-4 items-center">
            <button className="bg-blue-600 text-white font-semibold px-5 py-2 rounded-lg text-sm hover:bg-blue-700 transition">Update Password</button>
            <div className="text-xs text-gray-500">
              <span className="font-medium text-green-600">✓ Two-factor authentication</span> is enabled
              <button className="ml-2 text-blue-600 hover:underline">Manage</button>
            </div>
          </div>
        </div>

        {/* Notifications */}
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
          <h3 className="font-bold mb-4 text-gray-900">Notification Preferences</h3>
          <div className="space-y-3">
            {Object.entries(notifications).map(([key, val])=>{
              const labels = {
                orderUpdates:'Order status updates',
                promotions:'Promotions and deals',
                priceDrops:'Price drop alerts on wishlist items',
                newArrivals:'New arrivals in your favorite categories',
                securityAlerts:'Security and account alerts',
              };
              return (
                <div key={key} className="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
                  <div>
                    <p className="text-sm font-medium text-gray-900">{labels[key]}</p>
                    {key==='securityAlerts' && <p className="text-xs text-gray-400">Recommended for your security</p>}
                  </div>
                  <button onClick={()=>setNotifications(n=>({...n,[key]:!val}))}
                    className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${val?'bg-blue-600':'bg-gray-200'}`}>
                    <span className={`inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform ${val?'translate-x-6':'translate-x-1'}`}/>
                  </button>
                </div>
              );
            })}
          </div>
        </div>

        {/* Danger zone */}
        <div className="bg-white rounded-2xl border border-red-100 shadow-sm p-5">
          <h3 className="font-bold mb-1 text-red-700">Danger Zone</h3>
          <p className="text-xs text-gray-500 mb-4">These actions are irreversible. Please proceed with caution.</p>
          <div className="flex gap-3">
            <button className="border border-red-300 text-red-600 text-sm px-4 py-2 rounded-lg hover:bg-red-50 transition">Deactivate Account</button>
            <button className="bg-red-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-red-700 transition">Delete Account</button>
          </div>
        </div>
      </div>
    </div>
  );
}
