/* ── FILTER SIDEBAR ── */
function FilterSidebar({ filters, setFilters }) {
  const [priceMin, setPriceMin] = useState('');
  const [priceMax, setPriceMax] = useState('');

  function toggleBrand(b) {
    setFilters(f => ({
      ...f,
      brands: f.brands.includes(b) ? f.brands.filter(x=>x!==b) : [...f.brands, b]
    }));
  }

  function applyPrice() {
    setFilters(f => ({...f, priceMin: priceMin?Number(priceMin):null, priceMax: priceMax?Number(priceMax):null}));
  }

  function clearAll() {
    setFilters({ brands:[], priceMin:null, priceMax:null, minRating:0, inStockOnly:false });
    setPriceMin(''); setPriceMax('');
  }

  const priceRanges = [
    { label:'Under $50', min:null, max:50 },
    { label:'$50 – $100', min:50, max:100 },
    { label:'$100 – $250', min:100, max:250 },
    { label:'$250 – $500', min:250, max:500 },
    { label:'$500 – $1000', min:500, max:1000 },
    { label:'Over $1000', min:1000, max:null },
  ];

  return (
    <aside className="w-56 flex-shrink-0">
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 sticky top-28">
        <div className="flex justify-between items-center mb-4">
          <h3 className="font-bold text-gray-900">Filters</h3>
          <button onClick={clearAll} className="text-xs text-blue-600 hover:underline">Clear all</button>
        </div>

        {/* In Stock */}
        <div className="mb-5">
          <label className="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked={filters.inStockOnly}
              onChange={e=>setFilters(f=>({...f,inStockOnly:e.target.checked}))}
              className="rounded border-gray-300 text-blue-600" />
            <span className="text-sm font-medium">In Stock Only</span>
          </label>
        </div>

        {/* Brand */}
        <div className="mb-5">
          <h4 className="text-sm font-semibold text-gray-700 mb-2">Brand</h4>
          <div className="space-y-1.5 max-h-48 overflow-y-auto pr-1">
            {BRANDS.map(b=>(
              <label key={b} className="flex items-center gap-2 cursor-pointer hover:text-blue-600 text-sm">
                <input type="checkbox" checked={filters.brands.includes(b)}
                  onChange={()=>toggleBrand(b)} className="rounded border-gray-300 text-blue-600" />
                {b}
              </label>
            ))}
          </div>
        </div>

        {/* Price Range (quick select) */}
        <div className="mb-5">
          <h4 className="text-sm font-semibold text-gray-700 mb-2">Price Range</h4>
          {priceRanges.map(r=>(
            <button key={r.label} onClick={()=>setFilters(f=>({...f,priceMin:r.min,priceMax:r.max}))}
              className={`block w-full text-left text-xs px-2 py-1.5 rounded mb-1 transition ${filters.priceMin===r.min&&filters.priceMax===r.max?'bg-blue-50 text-blue-700 font-semibold':'hover:bg-gray-50 text-gray-600'}`}>
              {r.label}
            </button>
          ))}
          <div className="flex gap-2 mt-2">
            <input type="number" placeholder="Min" value={priceMin} onChange={e=>setPriceMin(e.target.value)}
              className="w-full border border-gray-200 rounded px-2 py-1 text-xs" />
            <input type="number" placeholder="Max" value={priceMax} onChange={e=>setPriceMax(e.target.value)}
              className="w-full border border-gray-200 rounded px-2 py-1 text-xs" />
          </div>
          <button onClick={applyPrice} className="w-full mt-2 bg-blue-600 text-white text-xs py-1.5 rounded hover:bg-blue-700 transition">Apply</button>
        </div>

        {/* Rating */}
        <div className="mb-5">
          <h4 className="text-sm font-semibold text-gray-700 mb-2">Customer Rating</h4>
          {[4,3,2,1].map(r=>(
            <button key={r} onClick={()=>setFilters(f=>({...f,minRating:f.minRating===r?0:r}))}
              className={`flex items-center gap-1 text-xs w-full px-2 py-1.5 rounded mb-1 transition ${filters.minRating===r?'bg-blue-50 text-blue-700 font-semibold':'hover:bg-gray-50 text-gray-600'}`}>
              {[1,2,3,4,5].map(i=><span key={i} className={i<=r?'text-yellow-400':'text-gray-300'}>★</span>)}
              <span className="ml-1">& Up</span>
            </button>
          ))}
        </div>
      </div>
    </aside>

}

/* ── PRODUCT CARD ── */
function ProductCard({ product }) {
  const [wished, setWished] = useState(false);
  const discount = product.original ? Math.round((1-product.price/product.original)*100) : 0;
  return (
    <div className="bg-white rounded-xl shadow-sm hover:shadow-md transition-all border border-gray-100 flex flex-col group">
      <div className="relative bg-gray-50 h-44 flex items-center justify-center overflow-hidden rounded-t-xl">
        <img src={`https://picsum.photos/seed/${product.seed}/300/200`} alt={product.name}
             className="object-cover w-full h-full group-hover:scale-105 transition-transform duration-300" />
        {product.badge && (
          <span className={`absolute top-2 left-2 text-xs font-bold px-2 py-0.5 rounded-full ${product.badge==='Sale'?'bg-red-500 text-white':product.badge==='New'?'bg-green-500 text-white':'bg-yellow-400 text-blue-900'}`}>
            {product.badge}
          </span>
        )}
        {!product.inStock && (
          <div className="absolute inset-0 bg-white/70 flex items-center justify-center rounded-t-xl">
            <span className="bg-gray-700 text-white text-xs font-semibold px-3 py-1 rounded-full">Out of Stock</span>
          </div>
        )}
        <button onClick={()=>setWished(w=>!w)}
          className={`absolute top-2 right-2 bg-white rounded-full p-1.5 shadow hover:scale-110 transition text-sm ${wished?'text-red-500':'text-gray-300'}`}>♥</button>
      </div>
      <div className="p-3 flex flex-col flex-1">
        <p className="text-xs text-blue-600 font-medium mb-0.5">{product.brand}</p>
        <a href="product-detail.html" className="text-sm text-gray-800 font-medium leading-snug line-clamp-2 flex-1 hover:text-blue-700">{product.name}</a>
        <div className="flex items-center gap-1 my-1.5 text-xs">
          {[1,2,3,4,5].map(i=><span key={i} className={i<=Math.round(product.rating)?'text-yellow-400':'text-gray-300'}>★</span>)}
          <span className="text-blue-600 ml-1">({product.reviews.toLocaleString()})</span>
        </div>
        <div className="flex items-baseline gap-1.5 mb-1">
          <span className="text-base font-bold">${product.price.toFixed(2)}</span>
          {product.original && <>
            <span className="text-xs text-gray-400 line-through">${product.original.toFixed(2)}</span>
            <span className="text-xs text-red-500 font-semibold">-{discount}%</span>
          </>}
        </div>
        {product.inStock
          ? <p className="text-xs text-green-600 font-medium">✓ Free delivery</p>
          : <p className="text-xs text-red-500 font-medium">✗ Currently unavailable</p>
        }
      </div>
      {product.inStock && (
        <div className="px-3 pb-3">
          <a href="product-detail.html"
             className="block w-full text-center bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-semibold text-xs py-2 rounded-lg transition">
            View Product
          </a>
        </div>
      )}
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [filters, setFilters] = useState({ brands:[], priceMin:null, priceMax:null, minRating:0, inStockOnly:false });
  const [sort, setSort] = useState('Best Match');
  const [viewMode, setViewMode] = useState('grid'); // grid | list

  const filtered = useMemo(() => {
    let list = ALL_PRODUCTS;
    if(filters.brands.length) list = list.filter(p=>filters.brands.includes(p.brand));
    if(filters.priceMin != null) list = list.filter(p=>p.price >= filters.priceMin);
    if(filters.priceMax != null) list = list.filter(p=>p.price <= filters.priceMax);
    if(filters.minRating) list = list.filter(p=>p.rating >= filters.minRating);
    if(filters.inStockOnly) list = list.filter(p=>p.inStock);
    switch(sort) {
      case 'Price: Low to High': list = [...list].sort((a,b)=>a.price-b.price); break;
      case 'Price: High to Low': list = [...list].sort((a,b)=>b.price-a.price); break;
      case 'Customer Rating': list = [...list].sort((a,b)=>b.rating-a.rating); break;
      case 'Most Reviews': list = [...list].sort((a,b)=>b.reviews-a.reviews); break;
      default: break;
    }
    return list;
  }, [filters, sort]);

  return (
    <div className="min-h-screen flex flex-col">
      <Header cartCount={3} />

      {/* Breadcrumb */}
      <div className="max-w-7xl mx-auto px-4 py-3 text-xs text-gray-500 flex gap-1">
        <a href="index.html" className="hover:text-blue-600">Home</a>
        <span>›</span>
        <span className="text-gray-700 font-medium">Electronics</span>
      </div>

      <main className="flex-1 max-w-7xl mx-auto px-4 pb-10 w-full">
        <h1 className="text-2xl font-bold mb-1">Electronics</h1>
        <p className="text-sm text-gray-500 mb-5">{filtered.length.toLocaleString()} results found</p>

        <div className="flex gap-6 items-start">
          <FilterSidebar filters={filters} setFilters={setFilters} />

          <div className="flex-1 min-w-0">
            {/* Sort bar */}
            <div className="bg-white border border-gray-100 rounded-xl px-4 py-3 flex items-center justify-between mb-5 shadow-sm">
              <div className="flex items-center gap-2 text-sm">
                <span className="text-gray-500">Sort by:</span>
                {SORT_OPTIONS.map(o=>(
                  <button key={o} onClick={()=>setSort(o)}
                    className={`px-3 py-1.5 rounded-full text-xs font-medium transition ${sort===o?'bg-blue-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                    {o}
                  </button>
                ))}
              </div>
              <div className="flex gap-1">
                <button onClick={()=>setViewMode('grid')}
                  className={`p-2 rounded transition ${viewMode==='grid'?'bg-blue-600 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`} title="Grid view">
                  ▦
                </button>
                <button onClick={()=>setViewMode('list')}
                  className={`p-2 rounded transition ${viewMode==='list'?'bg-blue-600 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`} title="List view">
                  ☰
                </button>
              </div>
            </div>

            {/* Results */}
            {filtered.length === 0
              ? <div className="text-center py-16 text-gray-400">
                  <p className="text-4xl mb-3">🔍</p>
                  <p className="font-semibold text-gray-600">No products match your filters.</p>
                  <button onClick={()=>setFilters({brands:[],priceMin:null,priceMax:null,minRating:0,inStockOnly:false})}
                    className="mt-4 text-blue-600 text-sm hover:underline">Clear all filters</button>
                </div>
              : viewMode === 'grid'
                ? <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    {filtered.map(p=><ProductCard key={p.id} product={p}/>)}
                  </div>
                : <div className="space-y-3">
                    {filtered.map(p=>(
                      <div key={p.id} className="bg-white rounded-xl border border-gray-100 shadow-sm flex gap-4 p-4 hover:shadow-md transition">
                        <img src={`https://picsum.photos/seed/${p.seed}/120/100`} alt={p.name}
                             className="w-28 h-24 object-cover rounded-lg flex-shrink-0"/>
                        <div className="flex-1">
                          <p className="text-xs text-blue-600 font-medium">{p.brand}</p>
                          <a href="product-detail.html" className="font-semibold text-gray-900 hover:text-blue-700 text-sm">{p.name}</a>
                          <div className="flex items-center gap-0.5 my-1 text-xs">
                            {[1,2,3,4,5].map(i=><span key={i} className={i<=Math.round(p.rating)?'text-yellow-400':'text-gray-300'}>★</span>)}
                            <span className="text-blue-600 ml-1 text-xs">({p.reviews.toLocaleString()})</span>
                          </div>
                          <div className="flex items-center gap-2">
                            <span className="text-lg font-bold">${p.price.toFixed(2)}</span>
                            {p.original && <span className="text-xs text-gray-400 line-through">${p.original.toFixed(2)}</span>}
                            {p.original && <span className="text-xs text-red-500 font-semibold">-{Math.round((1-p.price/p.original)*100)}%</span>}
                          </div>
                          {p.inStock && <p className="text-xs text-green-600">✓ In Stock · Free delivery</p>}
                        </div>
                        {p.inStock && (
                          <div className="flex flex-col gap-2 justify-center">
                            <a href="cart.html" className="bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-semibold text-xs px-4 py-2 rounded-lg transition whitespace-nowrap">Add to Cart</a>
                            <a href="product-detail.html" className="border border-gray-300 text-gray-700 text-xs px-4 py-2 rounded-lg hover:bg-gray-50 transition text-center">View Details</a>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
            }
          </div>
        </div>
      </main>

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
