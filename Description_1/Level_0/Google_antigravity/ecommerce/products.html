<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop All Products | NovaMart</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        indigo: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8',
                            500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script type="text/babel" src="shared.js"></script>
</head>

<body class="bg-gray-50 text-gray-900 antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Header, Footer } = window;

        const renderApp = () => {
            const App = () => {
                const StarIcon = ({ filled }) => (
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill={filled ? "#fbbf24" : "none"} stroke={filled ? "#fbbf24" : "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-star"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg>
                );

                const FilterIcon = () => (
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" /></svg>
                );

                const ChevronDownView = () => (
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9" /></svg>
                );

                // Mock 24 products
                const products = Array.from({ length: 24 }).map((_, i) => ({
                    id: i + 1,
                    name: [
                        "Sony WH-1000XM5 Headphones", "Apple iPad Air (5th Gen)", "Ninja Professional Blender",
                        "Patagonia Micro D Fleece", "Samsung 49\" Odyssey G9", "Logitech MX Master 3S",
                        "Dyson V15 Detect", "Osprey Atmos AG 65", "LG C2 65\" OLED TV",
                        "Nike Air Force 1 '07", "Breville Barista Express", "GoPro HERO11 Black"
                    ][i % 12] + (i >= 12 ? " Pro" : ""),
                    price: [279.99, 499.00, 79.99, 44.50, 999.99, 99.99, 699.99, 270.00, 1499.00, 110.00, 699.95, 399.99][i % 12],
                    originalPrice: [399.99, 599.00, 99.99, 89.00, 1399.99, 0, 750.00, 0, 1999.00, 0, 750.00, 450.00][i % 12],
                    rating: [5, 4, 5, 4, 5, 5, 4, 5, 5, 4, 5, 4][i % 12],
                    reviews: Math.floor(Math.random() * 5000) + 50,
                    image: [
                        "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1585237837777-62f9eb5b1e60?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1527443195645-1133f7f28990?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1558317374-067fb5f30001?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1622560022434-66ee6eb00d08?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1593359677879-a4bb92f829d1?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1549298916-b41d501d3772?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1520630743120-749eb403e07f?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1564466809058-bf4114d55352?auto=format&fit=crop&w=600&q=80"
                    ][i % 12],
                    brand: ["Sony", "Apple", "Ninja", "Patagonia", "Samsung", "Logitech", "Dyson", "Osprey", "LG", "Nike", "Breville", "GoPro"][i % 12]
                }));

                const categories = ["All", "Electronics", "Home & Kitchen", "Apparel", "Sports & Outdoors", "Beauty"];
                const brands = ["Sony", "Apple", "Samsung", "LG", "Nike", "Patagonia"];

                return (
                    <div className="min-h-screen flex flex-col">
                        <window.Header active="products" />

                        <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                            {/* Breadcrumbs */}
                            <nav className="text-sm text-gray-500 mb-6 flex items-center gap-2">
                                <a href="index.html" className="hover:text-indigo-600">Home</a>
                                <span>/</span>
                                <span className="text-gray-900 font-medium">Shop All products</span>
                            </nav>

                            <div className="flex flex-col lg:flex-row gap-8">
                                {/* Left Sidebar - Filters */}
                                <aside className="w-full lg:w-64 flex-shrink-0">
                                    <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm sticky top-28">
                                        <div className="flex items-center justify-between mb-6 pb-4 border-b border-gray-100">
                                            <h2 className="text-lg font-bold flex items-center gap-2">
                                                <FilterIcon /> Filters
                                            </h2>
                                            <button className="text-sm text-indigo-600 font-medium">Clear All</button>
                                        </div>

                                        <div className="mb-6">
                                            <h3 className="font-semibold text-gray-900 mb-3 flex justify-between items-center cursor-pointer">
                                                Categories <ChevronDownView />
                                            </h3>
                                            <div className="space-y-2">
                                                {categories.map((cat, i) => (
                                                    <label key={cat} className="flex items-center gap-3 cursor-pointer group">
                                                        <input type="checkbox" defaultChecked={i === 0} className="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                                                        <span className="text-gray-600 text-sm group-hover:text-gray-900">{cat}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="mb-6">
                                            <h3 className="font-semibold text-gray-900 mb-3 flex justify-between items-center cursor-pointer">
                                                Brand <ChevronDownView />
                                            </h3>
                                            <div className="space-y-2">
                                                {brands.map(brand => (
                                                    <label key={brand} className="flex items-center gap-3 cursor-pointer group">
                                                        <input type="checkbox" className="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                                                        <span className="text-gray-600 text-sm group-hover:text-gray-900">{brand}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="mb-6">
                                            <h3 className="font-semibold text-gray-900 mb-3 flex justify-between items-center cursor-pointer">
                                                Price Range <ChevronDownView />
                                            </h3>
                                            <div className="space-y-3">
                                                <label className="flex items-center gap-3 cursor-pointer group">
                                                    <input type="radio" name="price" className="w-4 h-4 border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                                                    <span className="text-gray-600 text-sm group-hover:text-gray-900">Under $50</span>
                                                </label>
                                                <label className="flex items-center gap-3 cursor-pointer group">
                                                    <input type="radio" name="price" className="w-4 h-4 border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                                                    <span className="text-gray-600 text-sm group-hover:text-gray-900">$50 to $100</span>
                                                </label>
                                                <label className="flex items-center gap-3 cursor-pointer group">
                                                    <input type="radio" name="price" className="w-4 h-4 border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                                                    <span className="text-gray-600 text-sm group-hover:text-gray-900">$100 to $500</span>
                                                </label>
                                                <label className="flex items-center gap-3 cursor-pointer group">
                                                    <input type="radio" name="price" className="w-4 h-4 border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                                                    <span className="text-gray-600 text-sm group-hover:text-gray-900">Over $500</span>
                                                </label>
                                            </div>
                                        </div>

                                        <div>
                                            <h3 className="font-semibold text-gray-900 mb-3 flex justify-between items-center cursor-pointer">
                                                Rating <ChevronDownView />
                                            </h3>
                                            <div className="space-y-2">
                                                {[4, 3, 2, 1].map(stars => (
                                                    <label key={stars} className="flex items-center gap-3 cursor-pointer group">
                                                        <input type="radio" name="rating" className="w-4 h-4 border-gray-300 text-indigo-600 focus:ring-indigo-500" />
                                                        <div className="flex items-center">
                                                            {Array.from({ length: 5 }).map((_, i) => (
                                                                <StarIcon key={i} filled={i < stars} />
                                                            ))}
                                                            <span className="text-xs text-gray-500 ml-1">& Up</span>
                                                        </div>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </aside>

                                {/* Right Area - Grid */}
                                <div className="flex-1">
                                    {/* Top Bar */}
                                    <div className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                                        <p className="text-gray-600 text-sm font-medium">Showing <span className="text-gray-900 font-bold">1-24</span> of 1,245 products</p>
                                        <div className="flex items-center gap-3 text-sm">
                                            <span className="text-gray-500 font-medium">Sort by:</span>
                                            <select className="border border-gray-200 rounded-lg px-3 py-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium text-gray-900">
                                                <option>Best Match</option>
                                                <option>Price: Low to High</option>
                                                <option>Price: High to Low</option>
                                                <option>Customer Rating</option>
                                                <option>Newest Arrivals</option>
                                            </select>
                                        </div>
                                    </div>

                                    {/* Product Grid */}
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                        {products.map(product => (
                                            <div key={product.id} className="bg-white rounded-2xl border border-gray-100 overflow-hidden hover:shadow-xl transition-all group flex flex-col">
                                                <a href="product-detail.html" className="relative aspect-square block bg-gray-100 overflow-hidden">
                                                    {product.originalPrice > product.price && (
                                                        <span className="absolute top-3 left-3 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-md z-10 shadow-sm">
                                                            -{Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100)}%
                                                        </span>
                                                    )}
                                                    <img
                                                        src={product.image}
                                                        alt={product.name}
                                                        className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                                    />
                                                </a>
                                                <div className="p-4 flex flex-col flex-1">
                                                    <div className="flex items-center gap-1 mb-1">
                                                        {[1, 2, 3, 4, 5].map(star => (
                                                            <StarIcon key={star} filled={star <= product.rating} />
                                                        ))}
                                                        <span className="text-xs text-gray-500 ml-1">({product.reviews})</span>
                                                    </div>
                                                    <span className="text-xs text-indigo-600 font-bold uppercase tracking-wider mb-1">{product.brand}</span>
                                                    <a href="product-detail.html" className="block mb-2 flex-1">
                                                        <h3 className="text-gray-900 font-semibold leading-tight line-clamp-2 hover:text-indigo-600 transition-colors">{product.name}</h3>
                                                    </a>
                                                    <div className="mt-2 flex items-baseline gap-2 mb-4">
                                                        <span className="text-lg font-bold text-gray-900">${product.price.toFixed(2)}</span>
                                                        {product.originalPrice > 0 && (
                                                            <span className="text-sm text-gray-400 line-through">${product.originalPrice.toFixed(2)}</span>
                                                        )}
                                                    </div>
                                                    <button className="w-full bg-white border-2 border-gray-900 text-gray-900 hover:bg-gray-900 hover:text-white font-semibold py-2 rounded-lg transition-colors">
                                                        Add to Cart
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* Pagination */}
                                    <div className="mt-12 flex justify-center">
                                        <nav className="flex items-center gap-2">
                                            <button className="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors disabled:opacity-50">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6" /></svg>
                                            </button>
                                            <button className="w-10 h-10 rounded-full bg-indigo-600 text-white font-semibold shadow-md flex items-center justify-center">1</button>
                                            <button className="w-10 h-10 rounded-full border border-gray-200 text-gray-700 font-medium hover:bg-gray-50 transition-colors flex items-center justify-center">2</button>
                                            <button className="w-10 h-10 rounded-full border border-gray-200 text-gray-700 font-medium hover:bg-gray-50 transition-colors flex items-center justify-center">3</button>
                                            <span className="text-gray-400">...</span>
                                            <button className="w-10 h-10 rounded-full border border-gray-200 text-gray-700 font-medium hover:bg-gray-50 transition-colors flex items-center justify-center">12</button>
                                            <button className="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6" /></svg>
                                            </button>
                                        </nav>
                                    </div>
                                </div>
                            </div>
                        </main>

                        <window.Footer />
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        setTimeout(() => {
            if (window.Header && window.Footer) { renderApp(); }
            else {
                const interval = setInterval(() => {
                    if (window.Header && window.Footer) {
                        clearInterval(interval);
                        renderApp();
                    }
                }, 100);
            }
        }, 50);
    </script>
</body>

</html>
