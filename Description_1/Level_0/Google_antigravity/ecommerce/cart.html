<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart | NovaMart</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        indigo: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8',
                            500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script type="text/babel" src="shared.js"></script>
</head>

<body class="bg-gray-50 text-gray-900 antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { Header, Footer } = window;

        const renderApp = () => {
            const App = () => {
                const TrashIcon = () => (
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></svg>
                );

                const ShieldIcon = () => (
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" /></svg>
                );

                const [cartItems, setCartItems] = useState([
                    {
                        id: 1,
                        name: "Sony WH-1000XM5 Wireless Headphones",
                        brand: "Sony",
                        color: "Silver",
                        price: 279.99,
                        quantity: 1,
                        image: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?auto=format&fit=crop&w=300&q=80"
                    },
                    {
                        id: 2,
                        name: "Patagonia Micro D Fleece",
                        brand: "Patagonia",
                        color: "Navy Blue, Size: M",
                        price: 44.50,
                        quantity: 2,
                        image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=300&q=80"
                    }
                ]);

                const updateQuantity = (id, newQuantity) => {
                    if (newQuantity < 1) return;
                    setCartItems(items => items.map(item => item.id === id ? { ...item, quantity: newQuantity } : item));
                };

                const removeItem = (id) => {
                    setCartItems(items => items.filter(item => item.id !== id));
                };

                const subtotal = cartItems.reduce((acc, item) => acc + (item.price * item.quantity), 0);
                const shipping = subtotal > 50 ? 0 : 9.99;
                const tax = subtotal * 0.08;
                const total = subtotal + shipping + tax;

                return (
                    <div className="min-h-screen flex flex-col">
                        <window.Header active="cart" />

                        <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
                            <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight mb-8">Shopping Cart <span className="text-gray-400 font-medium text-xl">({cartItems.length} Items)</span></h1>

                            {cartItems.length === 0 ? (
                                <div className="bg-white p-12 text-center rounded-2xl shadow-sm border border-gray-100">
                                    <div className="w-20 h-20 bg-gray-50 text-gray-300 rounded-full flex items-center justify-center mx-auto mb-6">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" /><path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" /></svg>
                                    </div>
                                    <h2 className="text-2xl font-bold text-gray-900 mb-2">Your cart is empty</h2>
                                    <p className="text-gray-500 mb-8 max-w-md mx-auto">Looks like you haven't added anything to your cart yet. Discover our top-selling products and find something you love.</p>
                                    <a href="products.html" className="inline-block bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-8 rounded-xl transition-colors shadow-lg shadow-indigo-600/20">
                                        Continue Shopping
                                    </a>
                                </div>
                            ) : (
                                <div className="flex flex-col lg:flex-row gap-8 lg:gap-12">
                                    {/* Cart Items */}
                                    <div className="flex-1">
                                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
                                            <div className="hidden sm:grid sm:grid-cols-12 gap-4 px-6 py-4 bg-gray-50 border-b border-gray-100 text-sm font-semibold text-gray-500 uppercase tracking-wider">
                                                <div className="col-span-6">Product details</div>
                                                <div className="col-span-3 text-center">Quantity</div>
                                                <div className="col-span-2 text-right">Price</div>
                                                <div className="col-span-1"></div>
                                            </div>

                                            <ul className="divide-y divide-gray-100">
                                                {cartItems.map(item => (
                                                    <li key={item.id} className="p-6 flex flex-col sm:grid sm:grid-cols-12 gap-6 items-center">
                                                        <div className="flex-shrink-0 w-24 h-24 sm:w-28 sm:h-28 bg-gray-50 rounded-xl overflow-hidden border border-gray-100 sm:col-span-2">
                                                            <img src={item.image} alt={item.name} className="w-full h-full object-cover mix-blend-multiply" />
                                                        </div>
                                                        <div className="flex flex-col justify-center sm:col-span-4 w-full">
                                                            <span className="text-xs font-bold text-indigo-600 uppercase tracking-wider mb-1">{item.brand}</span>
                                                            <a href="product-detail.html" className="text-gray-900 font-bold hover:text-indigo-600 transition-colors line-clamp-2 md:line-clamp-none">{item.name}</a>
                                                            <p className="text-gray-500 text-sm mt-1">{item.color}</p>
                                                        </div>
                                                        <div className="flex items-center justify-center sm:col-span-3 w-full">
                                                            <div className="flex items-center border-2 border-gray-200 rounded-lg bg-gray-50 w-32">
                                                                <button onClick={() => updateQuantity(item.id, item.quantity - 1)} className="px-3 py-2 text-gray-500 hover:text-black font-medium">-</button>
                                                                <input type="number" readOnly value={item.quantity} className="w-10 text-center font-bold text-gray-900 bg-transparent border-none focus:ring-0 p-0" />
                                                                <button onClick={() => updateQuantity(item.id, item.quantity + 1)} className="px-3 py-2 text-gray-500 hover:text-black font-medium">+</button>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center justify-between sm:justify-end sm:col-span-2 w-full font-bold text-lg text-gray-900">
                                                            <span className="sm:hidden text-sm text-gray-500 font-normal">Total: </span>
                                                            ${(item.price * item.quantity).toFixed(2)}
                                                        </div>
                                                        <div className="flex items-center justify-end sm:col-span-1 w-full sm:w-auto mt-4 sm:mt-0">
                                                            <button onClick={() => removeItem(item.id)} className="text-gray-400 hover:text-red-500 p-2 hover:bg-red-50 rounded-lg transition-colors" aria-label="Remove item">
                                                                <TrashIcon />
                                                            </button>
                                                        </div>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>

                                        <a href="products.html" className="inline-flex items-center text-indigo-600 font-semibold hover:text-indigo-800 transition-colors gap-2 group">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="group-hover:-translate-x-1 transition-transform"><path d="m15 18-6-6 6-6" /></svg>
                                            Continue Shopping
                                        </a>
                                    </div>

                                    {/* Order Summary */}
                                    <div className="w-full lg:w-[380px] xl:w-[420px]">
                                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 sticky top-28">
                                            <h2 className="text-xl font-bold text-gray-900 mb-6">Order Summary</h2>

                                            <div className="space-y-4 text-sm text-gray-600 mb-6 border-b border-gray-100 pb-6">
                                                <div className="flex justify-between items-center">
                                                    <span>Subtotal</span>
                                                    <span className="font-semibold text-gray-900">${subtotal.toFixed(2)}</span>
                                                </div>
                                                <div className="flex justify-between items-center group cursor-pointer">
                                                    <span className="flex items-center gap-1">Shipping estimate <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gray-400"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></svg></span>
                                                    {shipping === 0 ? (
                                                        <span className="font-bold text-green-600">Free</span>
                                                    ) : (
                                                        <span className="font-semibold text-gray-900">${shipping.toFixed(2)}</span>
                                                    )}
                                                </div>
                                                <div className="flex justify-between items-center group cursor-pointer">
                                                    <span className="flex items-center gap-1">Tax estimate <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gray-400"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></svg></span>
                                                    <span className="font-semibold text-gray-900">${tax.toFixed(2)}</span>
                                                </div>
                                            </div>

                                            <div className="flex justify-between items-end mb-8">
                                                <span className="text-base font-bold text-gray-900">Total</span>
                                                <div className="text-right">
                                                    <span className="text-3xl font-extrabold text-gray-900 tracking-tight">${total.toFixed(2)}</span>
                                                    <p className="text-xs text-gray-500 mt-1">USD including VAT</p>
                                                </div>
                                            </div>

                                            <div className="mb-6">
                                                <label className="block text-sm font-semibold text-gray-700 mb-2">Gift card or promo code</label>
                                                <div className="flex">
                                                    <input type="text" placeholder="Enter code" className="flex-1 w-full bg-gray-50 border border-gray-200 rounded-l-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-medium" />
                                                    <button className="bg-gray-900 hover:bg-gray-800 text-white px-5 py-3 rounded-r-xl text-sm font-bold transition-colors">Apply</button>
                                                </div>
                                            </div>

                                            <button className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-lg py-4 rounded-xl transition-all shadow-lg shadow-indigo-600/30 mb-4 transform hover:-translate-y-0.5">
                                                Proceed to Checkout
                                            </button>

                                            <div className="flex items-center justify-center gap-2 text-sm text-gray-500 mt-6 bg-gray-50 py-3 rounded-lg border border-gray-100">
                                                <ShieldIcon />
                                                Secure Checkout Guarantee
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        <window.Footer />
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        setTimeout(() => {
            if (window.Header && window.Footer) { renderApp(); }
            else {
                const interval = setInterval(() => {
                    if (window.Header && window.Footer) {
                        clearInterval(interval);
                        renderApp();
                    }
                }, 100);
            }
        }, 50);
    </script>
</body>

</html>
