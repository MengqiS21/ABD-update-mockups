<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Account | NovaMart</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        indigo: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8',
                            500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script type="text/babel" src="shared.js"></script>
</head>

<body class="bg-gray-50 text-gray-900 antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { Header, Footer } = window;

        const renderApp = () => {
            const App = () => {
                const [activeTab, setActiveTab] = useState('dashboard');

                const UserIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>;
                const PackageIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2" /><rect width="6" height="6" x="9" y="9" rx="1" /><path d="M15 2v2" /><path d="M15 20v2" /><path d="M2 15h2" /><path d="M2 9h2" /><path d="M20 15h2" /><path d="M20 9h2" /><path d="M9 2v2" /><path d="M9 20v2" /></svg>;
                const MapPinIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></svg>;
                const CreditCardIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2" /><line x1="2" x2="22" y1="10" y2="10" /></svg>;
                const HeartIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" /></svg>;
                const SettingsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></svg>;
                const LogoutIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" x2="9" y1="12" y2="12" /></svg>;

                const tabs = [
                    { id: 'dashboard', label: 'Dashboard', icon: <UserIcon /> },
                    { id: 'orders', label: 'Order History', icon: <PackageIcon /> },
                    { id: 'addresses', label: 'Saved Addresses', icon: <MapPinIcon /> },
                    { id: 'payment', label: 'Payment Methods', icon: <CreditCardIcon /> },
                    { id: 'wishlist', label: 'Wishlist', icon: <HeartIcon /> },
                    { id: 'settings', label: 'Account Settings', icon: <SettingsIcon /> },
                ];

                return (
                    <div className="min-h-screen flex flex-col">
                        <window.Header active="account" />

                        <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
                            <div className="flex flex-col md:flex-row gap-10">
                                {/* Sidebar */}
                                <aside className="w-full md:w-64 flex-shrink-0">
                                    <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-6 flex items-center gap-4">
                                        <div className="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full flex items-center justify-center text-white text-xl font-bold shadow-md">
                                            JD
                                        </div>
                                        <div>
                                            <h2 className="font-bold text-gray-900 text-lg">Jane Doe</h2>
                                            <p className="text-gray-500 text-sm">jane.doe@example.com</p>
                                        </div>
                                    </div>

                                    <nav className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                        <ul className="flex flex-col">
                                            {tabs.map(tab => (
                                                <li key={tab.id}>
                                                    <button
                                                        onClick={() => setActiveTab(tab.id)}
                                                        className={`w-full flex items-center gap-3 px-6 py-4 text-left font-medium transition-colors border-l-4 ${activeTab === tab.id ? 'bg-indigo-50 text-indigo-700 border-indigo-600' : 'text-gray-600 border-transparent hover:bg-gray-50 hover:text-gray-900'}`}
                                                    >
                                                        <span className={activeTab === tab.id ? 'text-indigo-600' : 'text-gray-400'}>{tab.icon}</span>
                                                        {tab.label}
                                                    </button>
                                                </li>
                                            ))}
                                            <li className="border-t border-gray-100 mt-2">
                                                <button className="w-full flex items-center gap-3 px-6 py-4 text-left text-red-600 font-medium hover:bg-red-50 transition-colors border-l-4 border-transparent hover:border-red-600">
                                                    <LogoutIcon />
                                                    Log Out
                                                </button>
                                            </li>
                                        </ul>
                                    </nav>
                                </aside>

                                {/* Main Content Area */}
                                <div className="flex-1">
                                    {activeTab === 'dashboard' && (
                                        <div className="space-y-6">
                                            <h1 className="text-2xl font-bold text-gray-900">Welcome back, Jane!</h1>
                                            <p className="text-gray-600">From your account dashboard you can view your recent orders, manage your shipping and billing addresses, and edit your password and account details.</p>

                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
                                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer" onClick={() => setActiveTab('orders')}>
                                                    <div className="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4"><PackageIcon /></div>
                                                    <h3 className="font-bold text-gray-900 text-lg mb-1">Orders</h3>
                                                    <p className="text-sm text-gray-500">Check your order status, track shipments, and request returns.</p>
                                                </div>
                                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer" onClick={() => setActiveTab('addresses')}>
                                                    <div className="w-12 h-12 bg-green-50 text-green-600 rounded-xl flex items-center justify-center mb-4"><MapPinIcon /></div>
                                                    <h3 className="font-bold text-gray-900 text-lg mb-1">Addresses</h3>
                                                    <p className="text-sm text-gray-500">Manage shipping addresses for a faster checkout experience.</p>
                                                </div>
                                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer" onClick={() => setActiveTab('settings')}>
                                                    <div className="w-12 h-12 bg-purple-50 text-purple-600 rounded-xl flex items-center justify-center mb-4"><SettingsIcon /></div>
                                                    <h3 className="font-bold text-gray-900 text-lg mb-1">Account Info</h3>
                                                    <p className="text-sm text-gray-500">Update your name, email, password, and preference settings.</p>
                                                </div>
                                            </div>

                                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mt-8">
                                                <div className="flex justify-between items-center mb-6">
                                                    <h2 className="text-xl font-bold text-gray-900">Recent Order</h2>
                                                    <button onClick={() => setActiveTab('orders')} className="text-indigo-600 font-semibold hover:text-indigo-800 transition-colors">View All Orders</button>
                                                </div>
                                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-gray-50 p-6 rounded-xl border border-gray-200">
                                                    <div>
                                                        <p className="text-sm text-gray-500 mb-1">Order #ORD-894231</p>
                                                        <p className="font-bold text-gray-900 mb-1">Placed on October 15, 2025</p>
                                                        <p className="text-sm text-gray-500">Total: $124.99</p>
                                                    </div>
                                                    <div className="mt-4 md:mt-0 text-right">
                                                        <span className="inline-block bg-green-100 text-green-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-2">Delivered</span>
                                                        <button className="block w-full text-center bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 font-semibold py-2 px-4 rounded-lg transition-colors text-sm">Track Package</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'orders' && (
                                        <div>
                                            <h1 className="text-2xl font-bold text-gray-900 mb-6">Order History</h1>
                                            <div className="space-y-6">
                                                {[
                                                    { id: 'ORD-894231', date: 'Oct 15, 2025', total: 124.99, status: 'Delivered', items: 2 },
                                                    { id: 'ORD-759102', date: 'Sep 02, 2025', total: 499.00, status: 'Delivered', items: 1 },
                                                    { id: 'ORD-621389', date: 'Jul 18, 2025', total: 79.50, status: 'Returned', items: 3 },
                                                ].map((order, i) => (
                                                    <div key={i} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                                        <div className="bg-gray-50 p-4 border-b border-gray-100 flex flex-wrap justify-between items-center gap-4 text-sm">
                                                            <div className="flex gap-8">
                                                                <div>
                                                                    <p className="text-gray-500 font-medium">Order Placed</p>
                                                                    <p className="font-bold text-gray-900">{order.date}</p>
                                                                </div>
                                                                <div>
                                                                    <p className="text-gray-500 font-medium">Total</p>
                                                                    <p className="font-bold text-gray-900">${order.total.toFixed(2)}</p>
                                                                </div>
                                                            </div>
                                                            <div className="flex flex-col sm:flex-row gap-4 sm:items-center">
                                                                <p className="text-gray-500 font-medium">Order # {order.id}</p>
                                                                <a href="#" className="text-indigo-600 font-semibold hover:underline">View Invoice</a>
                                                            </div>
                                                        </div>
                                                        <div className="p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6">
                                                            <div>
                                                                <span className={`inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-3 ${order.status === 'Delivered' ? 'bg-green-100 text-green-800' : 'bg-gray-200 text-gray-800'}`}>
                                                                    {order.status}
                                                                </span>
                                                                <p className="font-medium text-gray-900">{order.items} item{order.items > 1 ? 's' : ''} in this order</p>
                                                            </div>
                                                            <div className="flex gap-3 w-full sm:w-auto">
                                                                <button className="flex-1 sm:flex-none border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 font-semibold py-2 px-6 rounded-lg transition-colors">Buy Again</button>
                                                                <button className="flex-1 sm:flex-none bg-gray-900 hover:bg-gray-800 text-white font-semibold py-2 px-6 rounded-lg transition-colors">Details</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'settings' && (
                                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 w-full max-w-3xl">
                                            <h1 className="text-2xl font-bold text-gray-900 mb-8 pb-4 border-b border-gray-100">Account Settings</h1>

                                            <form className="space-y-6" onSubmit={(e) => e.preventDefault()}>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                                    <div>
                                                        <label className="block text-sm font-semibold text-gray-700 mb-2">First Name</label>
                                                        <input type="text" defaultValue="Jane" className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-semibold text-gray-700 mb-2">Last Name</label>
                                                        <input type="text" defaultValue="Doe" className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                                                    <input type="email" defaultValue="jane.doe@example.com" className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                                </div>

                                                <div>
                                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Phone Number (Optional)</label>
                                                    <input type="tel" placeholder="+1 (555) 000-0000" className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                                </div>

                                                <div className="pt-6 mt-6 border-t border-gray-100">
                                                    <h3 className="font-bold text-gray-900 mb-4">Change Password</h3>
                                                    <div className="space-y-4">
                                                        <div>
                                                            <label className="block text-sm font-semibold text-gray-700 mb-2">Current Password</label>
                                                            <input type="password" placeholder="••••••••" className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm font-semibold text-gray-700 mb-2">New Password</label>
                                                            <input type="password" placeholder="Enter new password" className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="pt-8 flex justify-end">
                                                    <button type="submit" className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-md shadow-indigo-600/20">
                                                        Save Changes
                                                    </button>
                                                </div>
                                            </form>
                                        </div>
                                    )}

                                    {(activeTab === 'addresses' || activeTab === 'payment' || activeTab === 'wishlist') && (
                                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-12 text-center h-96 flex flex-col justify-center items-center">
                                            <div className="w-16 h-16 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center mb-4">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z" /><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z" /><path d="M7 21h10" /><path d="M12 3v18" /><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2" /></svg>
                                            </div>
                                            <h2 className="text-xl font-bold text-gray-900 mb-2 capitalize">{activeTab} section under construction</h2>
                                            <p className="text-gray-500 text-sm max-w-sm">This module is currently being built in this mockup. Check back soon for updates!</p>
                                            <button onClick={() => setActiveTab('dashboard')} className="mt-6 text-indigo-600 font-semibold hover:text-indigo-800 transition-colors">Return to Dashboard</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </main>

                        <window.Footer />
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        setTimeout(() => {
            if (window.Header && window.Footer) { renderApp(); }
            else {
                const interval = setInterval(() => {
                    if (window.Header && window.Footer) {
                        clearInterval(interval);
                        renderApp();
                    }
                }, 100);
            }
        }, 50);
    </script>
</body>

</html>
