    <link rel="preconnect" href="https://fonts.googleapis.com">

        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&display=swap"

<body>
    <div id="root"></div>

    

    <script type="text/babel">

    const { useState, useEffect } = React;
    const { Menu, Search, User, Facebook, Twitter, Instagram, PenTool, MessageCircle } = window.IconCompat;

    // --- Header Component ---
    function Header() {
      const [isScrolled, setIsScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => {
          setIsScrolled(window.scrollY > 20);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <header className={`fixed w-full top-0 z-50 transition-all duration-300 ${isScrolled ? 'bg-white shadow-md py-2' : 'bg-white/95 backdrop-blur-sm py-4 border-b border-gray-200'}`}>

            <div className="flex justify-between items-center">

              <div className="flex items-center space-x-4 flex-1">
                <button className="p-2 -ml-2 text-gray-700 hover:text-black focus:outline-none">
                  <Menu size={24} />
                </button>
                <span className="hidden md:block text-xs font-inter text-gray-500 uppercase tracking-wider">

              </div>

                <button className="p-2 text-gray-700 hover:text-black focus:outline-none hidden sm:block">
                  <Search size={20} />
                </button>
                <button className="text-gray-700 hover:text-black focus:outline-none flex items-center space-x-1">
                  <User size={20} />
                  <span className="hidden md:inline-block text-sm font-inter">Sign In</span>
                </button>
              </div>
            </div>

            {/* Global Navigation */}
            <nav className={`hidden md:block mt-4 pt-4 border-t border-gray-100 transition-all duration-300 ${isScrolled ? 'hidden' : 'block'}`}>

                <li><a href="opinion.html" className="hover:text-red-700 transition-colors">Opinion</a></li>

                <ul className="space-y-3 text-gray-400">
                  <li><a href="category.html" className="hover:text-white transition-colors">World</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">Politics</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">Business</a></li>
                  <li><a href="opinion.html" className="hover:text-white transition-colors">Opinion</a></li>
                </ul>
              </div>

              <div>
                <h4 className="font-bold uppercase tracking-wider mb-4 text-gray-200">About</h4>
                <ul className="space-y-3 text-gray-400">
                  <li><a href="#" className="hover:text-white transition-colors">Our Story</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">Careers</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">Journalistic Ethics</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">Contact Us</a></li>
                </ul>
              </div>
              
               <div>
                <h4 className="font-bold uppercase tracking-wider mb-4 text-gray-200">Legal</h4>
                <ul className="space-y-3 text-gray-400">
                  <li><a href="#" className="hover:text-white transition-colors">Terms of Service</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">Privacy Policy</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">Cookie Policy</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">Accessibility</a></li>
                </ul>

                  <li><a href="#" className="hover:text-white transition-colors">Help Center</a></li>
                </ul>

              <p className="mt-2 md:mt-0">Powered by Antigravity</p>
            </div>

                                <div className="lg:col-span-8">
                                    {/* Featured Essay */}

                                            <PenTool size={16} /> The Sunday Essay

                                        <a href="article.html" className="group block">

                                            </div>

                                                { author: "Sarah Jeong", role: "Technology & Culture", title: "AI's Data Hunger Cannot Go Unchecked Forever", snippet: "The extractive model of the major language models is colliding with the physical limits of the internet.", img: "https://ui-avatars.com/api/?name=Sarah+Jeong&background=random" },
                                                { author: "Paul Krugman", role: "Economics", title: "Why the Soft Landing Might Still Be Hard", snippet: "The inflation data looks promising, but structural weaknesses in commercial real estate remain deeply troubling.", img: "https://ui-avatars.com/api/?name=Paul+Krugman&background=random" },

                                                    <div className="flex items-center gap-3 mb-4">
                                                        <img src={col.img} className="w-12 h-12 rounded-full grayscale" alt={col.author} />
                                                        <div>
                                                            <div className="font-inter font-bold text-slate-900">{col.author}</div>
                                                            <div className="font-inter text-xs text-red-700 uppercase tracking-widest">{col.role}</div>
                                                        </div>
                                                    </div>
                                                    <h4 className="font-playfair font-bold text-2xl leading-snug mb-3 group-hover:text-slate-600 transition-colors">
                                                        <a href="article.html">{col.title}</a>

                                                    <p className="font-merriweather text-gray-600 text-sm leading-relaxed">
                                                        {col.snippet}

                                                </article>
                                            ))}
                                        </div>
                                    </div>

                                </div>

                                {/* Sidebar */}
                                <div className="lg:col-span-4">
                                    {/* Editorial Board */}
                                    <div className="bg-slate-900 text-white p-8 mb-10">
                                        <span className="font-inter text-xs font-bold uppercase tracking-wider text-red-500 mb-2 block">The Board</span>
                                        <h3 className="font-playfair font-black text-3xl mb-4 border-b border-slate-700 pb-4 text-white">

                                        <p className="font-merriweather text-gray-300 text-sm leading-relaxed mb-6">
                                            The proposed security pact compromises essential liberties while providing negligible tactical advantages in the region.
                                        </p>
                                        <a href="article.html" className="font-inter text-sm font-bold uppercase tracking-wider pb-1 border-b-2 border-red-500 hover:text-red-400 transition-colors">Read the Editorial</a>
                                    </div>

                                    {/* Letters to the Editor */}

                                        <h3 className="font-inter font-bold text-lg uppercase tracking-wider text-slate-900 flex items-center gap-2 border-b border-gray-200 pb-4 mb-6">

                                            <button className="font-inter text-xs font-bold uppercase tracking-widest text-slate-900 border border-slate-900 px-6 py-2 hover:bg-slate-900 hover:text-white transition-colors">
                                                Submit a Letter
                                            </button>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </main>

                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OpinionPage />);

</body>

</html>
