<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing | LearnPath</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-surface-50 antialiased text-surface-900 selection:bg-primary-500 selection:text-white">
    <div id="root"></div>

    <!-- Shared Components -->
    <script type="text/babel" src="shared.js"></script>

    <!-- Page Component -->
    <script type="text/babel">
        const { useState } = React;

        const FAQ = () => {
            const faqs = [
                { q: "Can I cancel my subscription at any time?", a: "Yes, you can cancel your subscription at any time from your account settings. You will continue to have access until the end of your billing period." },
                { q: "Do you offer refunds?", a: "We offer a 30-day money-back guarantee for all annual subscriptions and individual course purchases. If you're not satisfied, simply contact support." },
                { q: "Can I switch from monthly to annual billing?", a: "Absolutely. You can upgrade to an annual plan at any time, and we'll prorate the remainder of your current monthly cycle." },
                { q: "What's included in the Teams tier?", a: "The Teams tier includes everything in Pro, plus an admin dashboard to track team progress, centralized billing, and dedicated account management for teams of 10 or more." }
            ];

            const [openIdx, setOpenIdx] = useState(0);

            return (
                <div className="max-w-3xl mx-auto mt-24">
                    <h2 className="text-3xl font-display font-bold text-center mb-10">Frequently Asked Questions</h2>
                    <div className="space-y-4">
                        {faqs.map((faq, idx) => {
                            const isOpen = openIdx === idx;
                            return (
                                <div key={idx} className="bg-white border border-surface-200 rounded-xl overflow-hidden shadow-sm">
                                    <button
                                        className="w-full text-left p-6 font-bold text-lg text-surface-900 flex justify-between items-center focus:outline-none focus:bg-surface-50 hover:bg-surface-50 transition-colors"
                                        onClick={() => setOpenIdx(isOpen ? -1 : idx)}
                                    >
                                        {faq.q}
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-colors ${isOpen ? 'bg-primary-100 text-primary-600' : 'bg-surface-100 text-surface-500'}`}>
                                            <i className={`fas fa-${isOpen ? 'minus' : 'plus'} text-sm`}></i>
                                        </div>
                                    </button>
                                    {isOpen && (
                                        <div className="p-6 pt-0 text-surface-600 leading-relaxed bg-surface-50/50">
                                            {faq.a}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const PricingPage = () => {
            const [annual, setAnnual] = useState(true);

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header needs a dark background wrapper since it's transparent initially */}
                    <div className="bg-surface-900 relative">
                        <div className="absolute inset-0 bg-gradient-to-b from-primary-900/50 to-surface-900 overflow-hidden">
                            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=2000&q=80')] mix-blend-overlay opacity-10 bg-cover bg-center"></div>
                        </div>
                        <Header />

                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-32 pb-48 relative z-10 text-center animate-fade-in">
                            <Badge className="mb-6 bg-white/10 text-white border border-white/20">Simple, Transparent Pricing</Badge>
                            <h1 className="text-5xl md:text-6xl font-display font-bold text-white mb-6">Invest in Your Career</h1>
                            <p className="text-xl text-surface-300 max-w-2xl mx-auto mb-10">Choose the plan that fits your goals. Upgrade, downgrade, or cancel at any time.</p>

                            <div className="flex items-center justify-center gap-4">
                                <span className={`text-sm font-medium ${!annual ? 'text-white' : 'text-surface-400'}`}>Monthly</span>
                                <button
                                    className="relative inline-flex h-8 w-16 items-center rounded-full bg-primary-600 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 focus:ring-offset-surface-900 transition-colors"
                                    onClick={() => setAnnual(!annual)}
                                >
                                    <span className={`inline-block h-6 w-6 transform rounded-full bg-white transition-transform ${annual ? 'translate-x-9' : 'translate-x-1'}`} />
                                </button>
                                <span className={`flex items-center gap-2 text-sm font-medium ${annual ? 'text-white' : 'text-surface-400'}`}>
                                    Annually <Badge className="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30">Save 20%</Badge>
                                </span>
                            </div>
                        </div>
                    </div>

                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full -mt-32 relative z-20 pb-24">

                        {/* Pricing Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">

                            {/* Free Tier */}
                            <div className="bg-white rounded-3xl p-8 border border-surface-200 shadow-lg flex flex-col hover:-translate-y-2 transition-transform duration-300">
                                <h3 className="text-2xl font-display font-bold text-surface-900 mb-2">Free</h3>
                                <p className="text-surface-500 min-h-[48px]">Perfect for getting started and exploring the platform.</p>
                                <div className="my-6">
                                    <span className="text-5xl font-display font-bold">$0</span>
                                </div>
                                <Button variant="secondary" className="w-full py-3 mb-8">Get Started</Button>
                                <div className="flex-grow">
                                    <p className="font-bold text-surface-900 mb-4">What's included:</p>
                                    <ul className="space-y-4 text-surface-600">
                                        <li className="flex gap-3"><i className="fas fa-check text-emerald-500 mt-1"></i> Access to 50+ free starter courses</li>
                                        <li className="flex gap-3"><i className="fas fa-check text-emerald-500 mt-1"></i> Basic community forum access</li>
                                        <li className="flex gap-3"><i className="fas fa-check text-emerald-500 mt-1"></i> Sync progress across devices</li>
                                    </ul>
                                </div>
                            </div>

                            {/* Pro Tier */}
                            <div className="bg-primary-900 text-white rounded-3xl p-8 shadow-2xl shadow-primary-900/20 flex flex-col relative transform scale-105 border border-primary-700 z-10 hover:-translate-y-2 transition-transform duration-300">
                                <div className="absolute top-0 right-8 transform -translate-y-1/2 bg-gradient-to-r from-accent-500 to-accent-600 text-white text-xs font-bold uppercase tracking-wider py-1.5 px-4 rounded-full shadow-lg">
                                    Most Popular
                                </div>
                                <h3 className="text-2xl font-display font-bold mb-2">Pro</h3>
                                <p className="text-primary-200 min-h-[48px]">Everything you need to master new skills and land a job.</p>
                                <div className="my-6">
                                    <span className="text-5xl font-display font-bold">${annual ? '29' : '39'}</span>
                                    <span className="text-primary-300 ml-2">/month</span>
                                </div>
                                <Button variant="accent" className="w-full py-3 mb-8 text-lg font-bold shadow-accent-500/25">Start 7-Day Free Trial</Button>
                                <div className="flex-grow">
                                    <p className="font-bold text-white mb-4">Everything in Free, plus:</p>
                                    <ul className="space-y-4 text-primary-100">
                                        <li className="flex gap-3"><i className="fas fa-check text-accent-400 mt-1"></i> Full access to 5,000+ premium courses</li>
                                        <li className="flex gap-3"><i className="fas fa-check text-accent-400 mt-1"></i> Earn certificates of completion</li>
                                        <li className="flex gap-3"><i className="fas fa-check text-accent-400 mt-1"></i> Downloadable resources & offline viewing</li>
                                        <li className="flex gap-3"><i className="fas fa-check text-accent-400 mt-1"></i> Exclusive hands-on projects & labs</li>
                                        <li className="flex gap-3"><i className="fas fa-check text-accent-400 mt-1"></i> 1-on-1 career coaching session</li>
                                    </ul>
                                </div>
                            </div>

                            {/* Teams Tier */}
                            <div className="bg-white rounded-3xl p-8 border border-surface-200 shadow-lg flex flex-col hover:-translate-y-2 transition-transform duration-300">
                                <h3 className="text-2xl font-display font-bold text-surface-900 mb-2">Teams</h3>
                                <p className="text-surface-500 min-h-[48px]">For businesses looking to upskill their entire workforce.</p>
                                <div className="my-6">
                                    <span className="text-5xl font-display font-bold">${annual ? '49' : '59'}</span>
                                    <span className="text-surface-500 ml-2">/seat/mo</span>
                                </div>
                                <Button variant="secondary" className="w-full py-3 mb-8">Contact Sales</Button>
                                <div className="flex-grow">
                                    <p className="font-bold text-surface-900 mb-4">Everything in Pro, plus:</p>
                                    <ul className="space-y-4 text-surface-600">
                                        <li className="flex gap-3"><i className="fas fa-check text-emerald-500 mt-1"></i> Advanced admin analytics dashboard</li>
                                        <li className="flex gap-3"><i className="fas fa-check text-emerald-500 mt-1"></i> Centralized billing & license management</li>
                                        <li className="flex gap-3"><i className="fas fa-check text-emerald-500 mt-1"></i> Custom learning path creation</li>
                                        <li className="flex gap-3"><i className="fas fa-check text-emerald-500 mt-1"></i> SSO (Single Sign-On) integration</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        {/* Money Back Guarantee */}
                        <div className="mt-16 bg-surface-50 rounded-2xl border border-surface-200 p-8 flex flex-col md:flex-row items-center justify-center gap-8 text-center md:text-left">
                            <div className="w-20 h-20 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center text-3xl flex-shrink-0">
                                <i className="fas fa-shield-alt"></i>
                            </div>
                            <div>
                                <h4 className="text-xl font-bold text-surface-900 mb-2">30-Day Money-Back Guarantee</h4>
                                <p className="text-surface-600 max-w-2xl">We're confident you'll love LearnPath. If you're not fully satisfied with your Pro or Teams subscription within the first 30 days, we'll give you a full refund. No questions asked.</p>
                            </div>
                        </div>

                        {/* Feature Comparison Table */}
                        <div className="mt-24 hidden md:block overflow-x-auto">
                            <h2 className="text-3xl font-display font-bold text-center mb-10">Compare Features</h2>
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr>
                                        <th className="p-6 border-b border-surface-200 w-1/3"></th>
                                        <th className="p-6 border-b border-surface-200 text-center font-bold text-lg text-surface-900 w-1/5">Free</th>
                                        <th className="p-6 border-b border-surface-200 text-center font-bold text-lg text-primary-600 w-1/5 bg-primary-50 rounded-t-xl">Pro</th>
                                        <th className="p-6 border-b border-surface-200 text-center font-bold text-lg text-surface-900 w-1/5">Teams</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {[
                                        { feature: "Access to Free Courses", free: true, pro: true, teams: true },
                                        { feature: "Premium Course Library", free: false, pro: true, teams: true },
                                        { feature: "Certificates of Completion", free: false, pro: true, teams: true },
                                        { feature: "Downloadable Resources", free: false, pro: true, teams: true },
                                        { feature: "Offline Mobile Viewing", free: false, pro: true, teams: true },
                                        { feature: "1-on-[1] Career Coach", free: false, pro: true, teams: false },
                                        { feature: "Admin Dashboard", free: false, pro: false, teams: true },
                                        { feature: "SSO Integration", free: false, pro: false, teams: true },
                                    ].map((row, idx) => (
                                        <tr key={idx} className="hover:bg-surface-50 transition-colors">
                                            <td className="p-6 border-b border-surface-100 text-surface-700 font-medium">{row.feature}</td>
                                            <td className="p-6 border-b border-surface-100 text-center">
                                                {row.free ? <i className="fas fa-check text-emerald-500"></i> : <span className="text-surface-300">—</span>}
                                            </td>
                                            <td className="p-6 border-b border-surface-100 text-center bg-primary-50/50">
                                                {row.pro ? <i className="fas fa-check text-primary-600"></i> : <span className="text-surface-300">—</span>}
                                            </td>
                                            <td className="p-6 border-b border-surface-100 text-center">
                                                {row.teams ? <i className="fas fa-check text-emerald-500"></i> : <span className="text-surface-300">—</span>}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        {/* Testimonial Strip */}
                        <div className="mt-24 text-center">
                            <h2 className="text-3xl font-display font-bold mb-12">Don't just take our word for it</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {[1, 2, 3].map((_, idx) => (
                                    <div key={idx} className="bg-white p-8 rounded-2xl border border-surface-200 text-left shadow-sm">
                                        <div className="flex gap-1 text-amber-500 mb-4 text-sm">
                                            <i className="fas fa-star"></i><i className="fas fa-star"></i><i className="fas fa-star"></i><i className="fas fa-star"></i><i className="fas fa-star"></i>
                                        </div>
                                        <p className="text-surface-600 mb-6 italic">"Getting the Pro subscription was the best investment I ever made. The React courses helped me land my first Junior Dev role in 3 months."</p>
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-surface-200"></div>
                                            <div>
                                                <p className="font-bold text-surface-900 text-sm">Sarah Jenkins</p>
                                                <p className="text-xs text-surface-500">Frontend Developer</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <FAQ />

                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PricingPage />);
    </script>
</body>

</html>
