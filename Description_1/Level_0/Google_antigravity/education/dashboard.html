<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | LearnPath</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-surface-50 antialiased text-surface-900 selection:bg-primary-500 selection:text-white">
    <div id="root"></div>

    <!-- Shared Components -->
    <script type="text/babel" src="shared.js"></script>

    <!-- Page Component -->
    <script type="text/babel">
        const { useState } = React;

        const ProgressRing = ({ radius, stroke, progress, colorClass = "text-primary-500" }) => {
            const normalizedRadius = radius - stroke * 2;
            const circumference = normalizedRadius * 2 * Math.PI;
            const strokeDashoffset = circumference - progress / 100 * circumference;

            return (
                <div className="relative inline-flex items-center justify-center">
                    <svg height={radius * 2} width={radius * 2} className="transform -rotate-90">
                        <circle
                            stroke="currentColor"
                            fill="transparent"
                            strokeWidth={stroke}
                            r={normalizedRadius}
                            cx={radius}
                            cy={radius}
                            className="text-surface-100"
                        />
                        <circle
                            stroke="currentColor"
                            fill="transparent"
                            strokeWidth={stroke}
                            strokeDasharray={circumference + ' ' + circumference}
                            style={{ strokeDashoffset }}
                            strokeLinecap="round"
                            r={normalizedRadius}
                            cx={radius}
                            cy={radius}
                            className={`${colorClass} transition-all duration-1000 ease-out`}
                        />
                    </svg>
                    <div className="absolute flex items-center justify-center flex-col">
                        <span className="text-xl font-bold text-surface-900">{progress}%</span>
                    </div>
                </div>
            );
        };

        const DashboardPage = () => {
            const enrolledCourses = [
                {
                    title: "Python for Data Science — Intermediate",
                    progress: 33,
                    thumbnail: "https://images.unsplash.com/photo-1526379095098-d400fd0bfce8?auto=format&fit=crop&w=300&q=80",
                    nextLesson: "Module 2: Data Structures",
                    color: "text-primary-500"
                },
                {
                    title: "Machine Learning A-Z",
                    progress: 75,
                    thumbnail: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?auto=format&fit=crop&w=300&q=80",
                    nextLesson: "Final Project Preparation",
                    color: "text-emerald-500"
                },
                {
                    title: "Advanced React Patterns",
                    progress: 12,
                    thumbnail: "https://images.unsplash.com/photo-1555099962-4199c345e5dd?auto=format&fit=crop&w=300&q=80",
                    nextLesson: "Compound Components",
                    color: "text-accent-500"
                }
            ];

            const achievements = [
                { title: "Fast Learner", desc: "Complete 5 lessons in one day", icon: "fa-bolt", color: "bg-amber-100 text-amber-500" },
                { title: "7-Day Streak", desc: "Learn for 7 consecutive days", icon: "fa-fire", color: "bg-rose-100 text-rose-500" },
                { title: "First Certificate", desc: "Complete your first course", icon: "fa-certificate", color: "bg-primary-100 text-primary-500", locked: true },
                { title: "Social Butterfly", desc: "Answer 10 Q&A questions", icon: "fa-comments", color: "bg-purple-100 text-purple-500", locked: true }
            ];

            return (
                <div className="flex flex-col min-h-screen">
                    <div className="bg-surface-900 pb-20 pt-32 px-4 sm:px-6 lg:px-8">
                        <Header />
                        <div className="max-w-7xl mx-auto relative z-10 animate-fade-in flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="flex items-center gap-6">
                                <div className="relative">
                                    <div className="w-20 h-20 rounded-full border-4 border-surface-800 overflow-hidden shrink-0 shadow-xl">
                                        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80" alt="Jordan Wilson" className="w-full h-full object-cover" />
                                    </div>
                                    <div className="absolute bottom-0 right-0 w-6 h-6 bg-primary-500 rounded-full border-2 border-surface-900 flex items-center justify-center text-[10px] text-white" title="Pro Member">
                                        <i className="fas fa-crown"></i>
                                    </div>
                                </div>
                                <div>
                                    <h1 className="text-3xl md:text-4xl font-display font-bold text-white mb-1">Welcome back, Jordan</h1>
                                    <p className="text-surface-400">You're making great progress. Keep it up!</p>
                                </div>
                            </div>

                            <div className="flex gap-4">
                                <div className="bg-surface-800 rounded-2xl p-4 flex items-center gap-4 shadow-inner border border-surface-700">
                                    <div className="w-12 h-12 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center text-xl">
                                        <i className="fas fa-fire"></i>
                                    </div>
                                    <div>
                                        <div className="text-2xl font-bold text-white leading-none">5</div>
                                        <div className="text-xs text-surface-400 uppercase tracking-wider font-semibold mt-1">Day Streak</div>
                                    </div>
                                </div>
                                <div className="bg-surface-800 rounded-2xl p-4 flex items-center gap-4 shadow-inner border border-surface-700">
                                    <div className="w-12 h-12 rounded-full bg-primary-500/20 text-primary-400 flex items-center justify-center text-xl">
                                        <i className="fas fa-clock"></i>
                                    </div>
                                    <div>
                                        <div className="text-2xl font-bold text-white leading-none">12<span className="text-sm text-surface-400 ml-1">hrs</span></div>
                                        <div className="text-xs text-surface-400 uppercase tracking-wider font-semibold mt-1">Learned</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full flex flex-col lg:flex-row gap-8 relative z-20 -mt-10">

                        <div className="w-full lg:w-2/3 space-y-8 animate-slide-up">

                            {/* Continue Learning */}
                            <section>
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-2xl font-display font-bold text-surface-900">Continue Learning</h2>
                                    <a href="#" className="hidden sm:inline-block text-sm font-medium text-primary-600 hover:text-primary-700">View All Enrolled History</a>
                                </div>

                                <div className="space-y-4">
                                    {enrolledCourses.map((course, idx) => (
                                        <div key={idx} className="bg-white rounded-2xl border border-surface-200 p-5 flex flex-col md:flex-row items-center gap-6 shadow-sm hover:shadow-md transition-shadow">
                                            <div className="flex-shrink-0 w-full md:w-48 h-28 rounded-xl overflow-hidden relative">
                                                <img src={course.thumbnail} alt={course.title} className="w-full h-full object-cover" />
                                                <div className="absolute inset-0 bg-surface-900/30"></div>
                                                <div className="absolute absolute inset-0 flex items-center justify-center">
                                                    <div className="w-10 h-10 rounded-full bg-white/90 backdrop-blur-md flex items-center justify-center text-surface-900 shadow-lg cursor-pointer hover:scale-110 transition-transform">
                                                        <i className="fas fa-play text-sm ml-1"></i>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="flex-grow flex flex-col sm:flex-row items-center justify-between w-full gap-6">
                                                <div>
                                                    <h3 className="font-bold text-lg text-surface-900 mb-1 leading-tight">{course.title}</h3>
                                                    <p className="text-sm text-surface-500 mb-2">Next: {course.nextLesson}</p>
                                                    <div className="flex items-center gap-3">
                                                        <div className="flex-grow h-2 bg-surface-100 rounded-full overflow-hidden hidden sm:block w-32">
                                                            <div className={`h-full ${course.color.replace('text', 'bg')}`} style={{ width: `${course.progress}%` }}></div>
                                                        </div>
                                                        <span className="text-sm font-bold text-surface-700">{course.progress}% Completed</span>
                                                    </div>
                                                </div>

                                                <a href="lesson.html" className="flex-shrink-0 w-full sm:w-auto">
                                                    <Button variant={idx === 0 ? "primary" : "secondary"} className="w-full sm:w-auto px-6 py-2.5">Resume</Button>
                                                </a>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* Recommended Courses strip */}
                            <section className="pt-8">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-2xl font-display font-bold text-surface-900">Recommended for You</h2>
                                    <a href="courses.html" className="text-sm font-medium text-primary-600 hover:text-primary-700">Browse Catalog</a>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    <CourseCard
                                        title="Deep Learning Specialization"
                                        instructor="Andrew Ng"
                                        rating="4.9"
                                        duration="30 hours"
                                        level="Advanced"
                                        price="$149.99"
                                        badge="Popular in ML"
                                        image="https://images.unsplash.com/photo-1501504905252-473c47e087f8?auto=format&fit=crop&w=400&q=80"
                                    />
                                    <CourseCard
                                        title="SQL for Data Analysis"
                                        instructor="Jose Portilla"
                                        rating="4.7"
                                        duration="18 hours"
                                        level="Intermediate"
                                        price="$49.99"
                                        image="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=400&q=80"
                                    />
                                </div>
                            </section>

                        </div>

                        {/* Right Sidebar */}
                        <div className="w-full lg:w-1/3 space-y-8 animate-slide-up" style={{ animationDelay: '0.1s' }}>

                            <div className="bg-white rounded-2xl border border-surface-200 p-6 shadow-sm">
                                <h3 className="font-bold text-lg text-surface-900 mb-6">Learning Goals</h3>
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-xl bg-primary-50 text-primary-600 flex items-center justify-center text-xl">
                                            <i className="fas fa-bullseye"></i>
                                        </div>
                                        <div>
                                            <p className="font-bold text-surface-900">Weekly Goal</p>
                                            <p className="text-sm text-surface-500">2 of 5 days</p>
                                        </div>
                                    </div>
                                    <Button variant="ghost" className="text-sm px-3 py-1.5 h-auto">Edit</Button>
                                </div>
                                <div className="flex gap-2 justify-between">
                                    {['M', 'T', 'W', 'T', 'F', 'S', 'S'].map((day, dIdx) => {
                                        const completed = dIdx < 2;
                                        const active = dIdx === 2;
                                        return (
                                            <div key={dIdx} className="flex flex-col items-center gap-1">
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-colors ${completed ? 'bg-emerald-500 text-white shadow-md shadow-emerald-500/20' : active ? 'border-2 border-primary-500 text-primary-600 ring-2 ring-primary-100 ring-offset-1' : 'bg-surface-100 text-surface-400'}`}>
                                                    {completed ? <i className="fas fa-check"></i> : day}
                                                </div>
                                                {/* <span className="text-[10px] text-surface-400 font-medium">{day}</span> */}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl border border-surface-200 p-6 shadow-sm">
                                <h3 className="font-bold text-lg text-surface-900 mb-6">Achievements</h3>
                                <div className="space-y-4">
                                    {achievements.map((ach, idx) => (
                                        <div key={idx} className={`flex items-center gap-4 ${ach.locked ? 'opacity-50 grayscale' : ''}`}>
                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-sm ${ach.color}`}>
                                                <i className={`fas ${ach.icon}`}></i>
                                            </div>
                                            <div className="flex-grow">
                                                <p className="font-bold text-surface-900 text-sm">{ach.title}</p>
                                                <p className="text-xs text-surface-500">{ach.desc}</p>
                                            </div>
                                            {ach.locked && <i className="fas fa-lock text-surface-300 text-sm"></i>}
                                        </div>
                                    ))}
                                </div>
                                <Button variant="secondary" className="w-full mt-6 py-2 border-surface-300 text-sm font-bold text-surface-700">View All Badges</Button>
                            </div>

                            <div className="bg-gradient-to-br from-primary-900 to-primary-800 rounded-2xl p-6 shadow-lg text-white">
                                <div className="flex items-center gap-3 mb-4">
                                    <i className="fab fa-slack text-2xl"></i>
                                    <h3 className="font-bold text-lg">Join the Community</h3>
                                </div>
                                <p className="text-primary-100 text-sm line-clamp-2 leading-relaxed mb-6">Connect with fellow learners, share your progress, and get help from instructors on our exclusive Discord channel.</p>
                                <Button variant="accent" className="w-full shadow-accent-500/25 border-none">Join Discord Server</Button>
                            </div>

                        </div>

                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardPage />);
    </script>
</body>

</html>
