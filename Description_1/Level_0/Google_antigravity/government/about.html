<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - City of Lakewood</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700;900&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./shared/theme.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>

<body class="bg-gov-neutral-50 text-gov-neutral-900 flex flex-col min-h-screen">
    <div id="root" class="flex flex-col flex-1"></div>

    <script type="text/babel" src="./shared/components.jsx"></script>

    <script type="text/babel">
        const checkShared = setInterval(() => {
            if (window.SharedComponents) {
                clearInterval(checkShared);
                renderApp();
            }
        }, 50);

        function App() {
            const { Header, Footer, Icons } = window.SharedComponents;
            const { DocumentIcon } = Icons;

            const leaders = [
                { name: "Meghan Evans", title: "Mayor", img: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&h=400&q=80" },
                { name: "Robert Chen", title: "City Council President", img: "https://images.unsplash.com/photo-1560250097-0b93528c311a?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&h=400&q=80" },
                { name: "Alicia Rodriguez", title: "Council Member, Ward 1", img: "https://images.unsplash.com/photo-1580489944761-15a19d654956?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&h=400&q=80" },
                { name: "James Wilson", title: "Council Member, Ward 2", img: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&h=400&q=80" },
            ];

            return (
                <div className="flex flex-col min-h-screen">
                    <Header currentPath="about.html" />

                    <main className="flex-1">
                        {/* Page Header (Hero Style) */}
                        <div className="relative bg-gov-blue-900 text-white py-24 md:py-32 overflow-hidden">
                            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1449844908441-8829872d2607?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center mix-blend-overlay opacity-30"></div>
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
                                <h1 className="text-4xl md:text-5xl lg:text-6xl font-serif font-bold mb-6">About Lakewood</h1>
                                <p className="text-xl md:text-2xl text-gov-blue-100 max-w-3xl mx-auto">A vibrant, diverse community dedicated to innovation, progress, and maintaining a high quality of life for all 160,000 residents.</p>
                            </div>
                        </div>

                        {/* Mission Sidebar Design */}
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">

                                <div className="lg:col-span-8 space-y-12">
                                    <section>
                                        <h2 className="text-3xl font-serif font-bold text-gov-blue-900 mb-6 border-b border-gov-neutral-200 pb-2">Our History</h2>
                                        <div className="prose prose-lg text-gov-neutral-700">
                                            <p className="mb-4">Incorporated in 1889, the City of Lakewood began as a small agricultural hub before transitioning into a dense, bustling streetcar suburb in the early 20th century. Today, it stands as one of the most densely populated cities in the state.</p>
                                            <p>Our community is famous for its historic century homes, robust commercial corridors, and the sprawling Centennial Park that bridges our architectural heritage with vibrant natural spaces.</p>
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className="text-3xl font-serif font-bold text-gov-blue-900 mb-8 border-b border-gov-neutral-200 pb-2">City Leadership</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                                            {leaders.map((leader, idx) => (
                                                <div key={idx} className="flex flex-col items-center bg-white p-6 rounded-xl shadow-soft border border-gov-neutral-100">
                                                    <img src={leader.img} alt={leader.name} className="w-32 h-32 rounded-full object-cover mb-4 border-4 border-gov-blue-50" />
                                                    <h3 className="text-xl font-bold text-gov-neutral-900 text-center">{leader.name}</h3>
                                                    <p className="text-gov-blue-700 font-medium text-center text-sm uppercase tracking-wide mt-1">{leader.title}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>

                                <div className="lg:col-span-4 space-y-8">
                                    {/* Mission Module */}
                                    <div className="bg-gov-blue-50 border border-gov-blue-100 rounded-xl p-8">
                                        <h3 className="text-xl font-bold text-gov-blue-900 mb-4 uppercase tracking-wider text-sm">Our Mission</h3>
                                        <p className="text-lg font-serif text-gov-blue-900 italic leading-relaxed">
                                            "To deliver excellent public services, foster inclusive community development, and preserve the unique character of Lakewood while preparing robustly for the future."
                                        </p>
                                    </div>

                                    {/* Annual Report Callout */}
                                    <div className="bg-white border border-gov-neutral-200 rounded-xl p-8 shadow-soft">
                                        <DocumentIcon className="w-12 h-12 text-gov-blue-500 mb-4" />
                                        <h3 className="text-xl font-bold text-gov-neutral-900 mb-2">2026 Annual Report</h3>
                                        <p className="text-gov-neutral-600 mb-6 text-sm">Download our comprehensive review of city finances, major departmental achievements, and fiscal transparency mapping.</p>
                                        <a href="#" className="flex items-center justify-center gap-2 bg-gov-blue-700 hover:bg-gov-blue-800 text-white font-bold py-3 px-4 rounded transition-colors">
                                            Download PDF (4.2 MB)
                                        </a>
                                    </div>
                                </div>

                            </div>
                        </div>

                    </main>

                    <Footer />
                </div>
            );
        }

        function renderApp() {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }
    </script>
</body>

</html>
