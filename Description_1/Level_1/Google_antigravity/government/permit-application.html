        const Icon = ({ name, size = 24, className = "" }) => {
            const [iconHtml, setIconHtml] = React.useState('');

            React.useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const iconNode = window.lucide.icons[name];
                    const svgString = `<svg class="lucide lucide-${name} ${className}" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconNode.map(([tag, attrs]) => {
                        const attrsString = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                        return `<${tag} ${attrsString}></${tag}>`;
                    }).join('')}</svg>`;
                    setIconHtml(svgString);
                }
            }, [name, size, className]);

            return <span dangerouslySetInnerHTML={{ __html: iconHtml }} />;
        };
