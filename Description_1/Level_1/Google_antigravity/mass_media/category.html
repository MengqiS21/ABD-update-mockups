<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World News - The Meridian</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Libre Baskerville', 'serif'],
                    },
                    colors: {
                        meridian: {
                            50: '#fdfdfc',
                            100: '#f6f7f9',
                            800: '#1a1d24',
                            900: '#0f1115',
                            accent: '#d92323',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfdfc;
            color: #1a1d24;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .font-serif {
            font-family: 'Libre Baskerville', serif;
        }

        .focus-visible-outline:focus-visible {
            outline: 2px solid #d92323;
            outline-offset: 2px;
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #d92323;
            color: white;
            padding: 8px;
            z-index: 100;
            transition: top 0.2s;
        }

        .skip-link:focus {
            top: 0;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        // --- SHARED COMPONENTS (Copied) ---
        const NavLink = ({ href, children, isCurrent, className = "" }) => (
            <a href={href} className={`text-sm font-semibold tracking-wide uppercase transition-colors focus-visible-outline rounded-sm px-1 ${isCurrent ? 'text-meridian-accent border-b-2 border-meridian-accent pb-1' : 'text-meridian-800 hover:text-meridian-accent'} ${className}`} aria-current={isCurrent ? "page" : undefined}>
                {children}
            </a>
        );

        const Header = ({ currentPage }) => {
            const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);

            return (
                <header className="border-b border-gray-200 sticky top-0 bg-white z-50 shadow-sm relative">
                    <a href="#main-content" className="skip-link font-sans font-medium">Skip to main content</a>
                    <div className="bg-meridian-900 text-white text-xs py-1.5 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
                        <div className="flex space-x-4">
                            <span className="opacity-80"><i className="fas fa-sun mr-1"></i> Washington, 72°</span>
                            <span className="hidden sm:inline opacity-80">{new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
                        </div>
                        <div className="flex space-x-4">
                            <a href="subscription.html" className="font-semibold text-white hover:text-gray-300 focus-visible-outline">Subscribe</a>
                            <button className="opacity-80 hover:opacity-100 focus-visible-outline">Sign In</button>
                        </div>
                    </div>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-20 sm:h-24">
                            <div className="flex items-center lg:hidden">
                                <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-meridian-accent" aria-expanded={mobileMenuOpen} aria-label="Open menu">
                                    <i className={`fas ${mobileMenuOpen ? 'fa-times' : 'fa-bars'} text-xl`}></i>
                                </button>
                            </div>
                            <div className="flex-shrink-0 flex items-center justify-center lg:justify-start w-full lg:w-auto">
                                <a href="index.html" className="focus-visible-outline" aria-label="The Meridian Home">
                                    <h1 className="font-serif text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight text-meridian-900 leading-none">The Meridian</h1>
                                </a>
                            </div>
                            <div className="hidden lg:flex items-center space-x-4">
                                <div className="relative">
                                    <input type="text" placeholder="Search articles..." aria-label="Search" className="w-48 xl:w-64 bg-gray-100 border-transparent focus:bg-white focus:border-meridian-accent focus:ring-2 focus:ring-meridian-accent text-sm rounded-full py-2 px-4 shadow-sm transition-all focus-visible-outline" />
                                    <i className="fas fa-search absolute right-3 top-2.5 text-gray-400"></i>
                                </div>
                                <a href="subscription.html" className="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-sm shadow-sm text-white bg-meridian-accent hover:bg-red-700 focus:outline-none transition">Subscribe Now</a>
                            </div>
                        </div>
                    </div>
                    <nav aria-label="Primary" className="hidden lg:block border-t border-gray-100 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-center space-x-8 py-4">
                                <NavLink href="index.html" isCurrent={currentPage === 'home'}>Home</NavLink>
                                <NavLink href="category.html" isCurrent={currentPage === 'world'}>World</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'politics'}>Politics</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'tech'}>Tech</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'culture'}>Culture</NavLink>
                                <NavLink href="opinion.html" isCurrent={currentPage === 'opinion'}>Opinion</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'science'}>Science</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'health'}>Health</NavLink>
                            </div>
                        </div>
                    </nav>
                    {mobileMenuOpen && (
                        <div className="lg:hidden bg-white border-t border-gray-200 shadow-lg absolute w-full z-50">
                            <nav className="px-2 pt-2 pb-4 space-y-1 sm:px-3" aria-label="Mobile Navigation">
                                <a href="index.html" className="block px-3 py-2 rounded-md text-base font-medium font-serif text-gray-900 hover:bg-gray-50 focus-visible-outline">Home</a>
                                <a href="category.html" className="block px-3 py-2 rounded-md text-base font-medium font-serif text-gray-900 hover:bg-gray-50 focus-visible-outline">World</a>
                                <a href="opinion.html" className="block px-3 py-2 rounded-md text-base font-medium font-serif text-gray-900 hover:bg-gray-50 focus-visible-outline">Opinion</a>
                                <a href="subscription.html" className="block px-3 py-2 rounded-md text-base font-medium font-serif text-gray-900 hover:bg-gray-50 focus-visible-outline">Subscribe</a>
                            </nav>
                        </div>
                    )}
                </header>
            );
        };

        const Footer = () => (
            <footer className="bg-meridian-900 text-white mt-auto pt-16 pb-8 border-t-4 border-meridian-accent">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12 border-b border-gray-700 pb-12">
                        <div className="md:col-span-1">
                            <h3 className="font-serif text-2xl font-bold mb-4">The Meridian</h3>
                            <p className="text-gray-400 text-sm mb-6 leading-relaxed">Independent journalism for a complex world. We bring you the stories that matter, with depth, context, and clarity.</p>
                            <div className="flex space-x-4">
                                <a href="#" aria-label="Twitter" className="text-gray-400 hover:text-white transition-colors focus-visible-outline"><i className="fab fa-twitter text-lg"></i></a>
                                <a href="#" aria-label="Facebook" className="text-gray-400 hover:text-white transition-colors focus-visible-outline"><i className="fab fa-facebook text-lg"></i></a>
                                <a href="#" aria-label="Instagram" className="text-gray-400 hover:text-white transition-colors focus-visible-outline"><i className="fab fa-instagram text-lg"></i></a>
                                <a href="#" aria-label="LinkedIn" className="text-gray-400 hover:text-white transition-colors focus-visible-outline"><i className="fab fa-linkedin text-lg"></i></a>
                            </div>
                        </div>
                        <div>
                            <h4 className="font-serif font-bold text-lg mb-4 text-gray-200">Sections</h4>
                            <ul className="space-y-2 text-sm text-gray-400">
                                <li><a href="category.html" className="hover:text-white focus-visible-outline">World</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Politics</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Technology</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Culture</a></li>
                                <li><a href="opinion.html" className="hover:text-white focus-visible-outline">Opinion</a></li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="font-serif font-bold text-lg mb-4 text-gray-200">Company</h4>
                            <ul className="space-y-2 text-sm text-gray-400">
                                <li><a href="#" className="hover:text-white focus-visible-outline">About Us</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Careers</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Journalistic Ethics</a></li>
                                <li><a href="#" className="hover:text-white focus-visible-outline">Contact Us</a></li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="font-serif font-bold text-lg mb-4 text-gray-200">Newsletter</h4>
                            <form aria-label="Newsletter signup" className="flex">
                                <label htmlFor="newsletter-email" className="sr-only">Email address</label>
                                <input id="newsletter-email" type="email" placeholder="Your email" className="px-4 py-2 bg-gray-800 text-white border border-gray-700 rounded-l-sm focus:outline-none focus:ring-1 focus:ring-meridian-accent focus:border-meridian-accent w-full text-sm placeholder-gray-500" required />
                                <button type="submit" className="bg-meridian-accent hover:bg-red-700 text-white px-4 py-2 rounded-r-sm text-sm font-medium focus-visible-outline transition">Sign Up</button>
                            </form>
                        </div>
                    </div>
                    <div className="flex flex-col md:flex-row justify-between items-center text-sm text-gray-500">
                        <p>&copy; {new Date().getFullYear()} The Meridian Media Company.</p>
                    </div>
                </div>
            </footer>
        );

        const StoryCard = ({ title, author, time, image, href = "article.html" }) => (
            <article className="group flex flex-col h-full bg-white rounded-sm border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                <div className="aspect-w-16 aspect-h-10 overflow-hidden rounded-t-sm relative">
                    <a href={href} aria-hidden="true" tabIndex="-1">
                        <img src={image} alt={`Thumbnail for ${title}`} className="object-cover w-full h-40 md:h-48 group-hover:scale-105 transition-transform duration-500 ease-in-out" />
                    </a>
                </div>
                <div className="flex flex-col flex-grow p-4">
                    <a href={href} className="focus-visible-outline mb-3 group block flex-grow">
                        <h3 className="font-serif font-bold text-lg text-meridian-900 group-hover:text-meridian-accent transition-colors leading-snug line-clamp-3">
                            {title}
                        </h3>
                    </a>
                    <div className="flex items-center text-gray-500 text-xs mt-auto pt-3 border-t border-gray-50">
                        {author && <span>{author}</span>}
                        {author && time && <span className="mx-2">&bull;</span>}
                        {time && <span>{time}</span>}
                    </div>
                </div>
            </article>
        );

        const CategoryApp = () => {
            const filters = ["All", "Asia", "Europe", "Americas", "Middle East", "Africa"];
            const [activeFilter, setActiveFilter] = React.useState("All");

            return (
                <div className="min-h-screen flex flex-col">
                    <Header currentPage="world" />

                    <main id="main-content" className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 w-full" tabIndex="-1">

                        {/* Section Header */}
                        <div className="mb-10 text-center max-w-3xl mx-auto">
                            <h1 className="font-serif text-4xl md:text-5xl lg:text-6xl font-bold text-meridian-900 mb-4 tracking-tight drop-shadow-sm">World</h1>
                            <p className="text-lg md:text-xl text-gray-600 font-serif italic">In-depth reporting and international analysis from across the globe.</p>
                        </div>

                        {/* Topic Filter Bar */}
                        <div className="flex shadow-sm rounded-sm mb-12 overflow-x-auto pb-2 scrollbar-hide border border-gray-200">
                            <ul className="flex flex-nowrap min-w-full divide-x divide-gray-200 bg-white" role="tablist" aria-label="World regions">
                                {filters.map(filter => (
                                    <li key={filter} className="flex-1 whitespace-nowrap text-center" role="presentation">
                                        <button
                                            role="tab"
                                            onClick={() => setActiveFilter(filter)}
                                            aria-selected={activeFilter === filter}
                                            className={`w-full py-3 px-6 text-sm font-semibold transition-colors focus-visible-outline ${activeFilter === filter ? 'bg-meridian-50 text-meridian-accent border-b-2 border-meridian-accent' : 'text-gray-600 hover:bg-gray-50 hover:text-meridian-900'}`}
                                        >
                                            {filter}
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {/* Lead Story */}
                        <div className="mb-16">
                            <div className="border border-gray-200 bg-white rounded-sm shadow-sm hover:shadow-md transition-shadow group flex flex-col md:flex-row overflow-hidden relative">
                                <div className="md:w-2/3 h-64 md:h-auto min-h-[400px] relative overflow-hidden">
                                    <a href="article.html" aria-hidden="true" tabIndex="-1">
                                        <img src="https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80" alt="Diplomats gathered around a table" className="object-cover absolute inset-0 w-full h-full group-hover:scale-105 transition-transform duration-700 ease-out" />
                                    </a>
                                </div>
                                <div className="md:w-1/3 p-6 md:p-8 flex flex-col justify-center border-l border-gray-100 relative">
                                    <span className="text-meridian-accent font-bold text-xs uppercase tracking-wider mb-4 block">Europe</span>
                                    <a href="article.html" className="focus-visible-outline block mb-4 group">
                                        <h2 className="font-serif text-3xl md:text-4xl font-bold text-meridian-900 leading-tight group-hover:text-meridian-accent transition-colors">Treaty Revisions Stride Forward in Brussels Summit</h2>
                                    </a>
                                    <p className="text-gray-600 text-base md:text-lg mb-6 leading-relaxed font-serif">Member states have preliminarily agreed to amend specific articles governing common trade boundaries. Yet, nationalist factions threaten to stall ratification in local assemblies.</p>
                                    <div className="mt-auto border-t border-gray-100 pt-4 flex items-center text-sm font-medium text-gray-500">
                                        <span>By <strong className="text-meridian-900">Isabelle Laurent</strong></span>
                                        <span className="mx-2">&bull;</span>
                                        <span>Oct 14, 2023</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Story Grid (6-8 articles) */}
                        <h3 className="font-serif text-2xl font-bold text-meridian-900 mb-6 border-b-2 border-meridian-100 pb-2">Latest News</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                            <StoryCard
                                title="Monsoon Rains Exceed Historical Records in Southeast Asia"
                                author="Lin Chen"
                                time="4 hrs ago"
                                image="https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                            />
                            <StoryCard
                                title="African Union Launches Continental Free Trade Digital Infrastructure"
                                author="Amara Okafor"
                                time="6 hrs ago"
                                image="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                            />
                            <StoryCard
                                title="Elections in Argentina: Polarization Peaks Ahead of Runoff"
                                author="Mateo Rossi"
                                time="9 hrs ago"
                                image="https://images.unsplash.com/photo-1541872516768-45b6dbdc627c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                            />
                            <StoryCard
                                title="Japan's Central Bank Surprises Markets With Yield Curve Adjustment"
                                author="Kenji Sato"
                                time="12 hrs ago"
                                image="https://images.unsplash.com/photo-1528360983277-13d401cdc186?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                            />
                            <StoryCard
                                title="Peace Talks Resume in Bogota After Months of Stagnation"
                                author="Carlos Gutierrez"
                                time="14 hrs ago"
                                image="https://images.unsplash.com/photo-1620858546197-268e2786c071?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                            />
                            <StoryCard
                                title="Middle East Energy Pact Promises Solar Grids for Millions"
                                author="Omar Al-Fayed"
                                time="1 day ago"
                                image="https://images.unsplash.com/photo-1508514177221-188b1bcbf271?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                            />
                            <StoryCard
                                title="Cyberattack Disturbs Major Port Operations in Northern Europe"
                                author="Helena Mikkelsen"
                                time="1 day ago"
                                image="https://images.unsplash.com/photo-1518458028785-8fbcd101ebb9?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                            />
                            <StoryCard
                                title="New Delhi Implements Emergency Protocols Amid Soaring Air Pollution"
                                author="Ravi Sharma"
                                time="2 days ago"
                                image="https://images.unsplash.com/photo-1534088568595-a066f410cbda?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                            />
                        </div>

                        <div className="flex justify-center mt-10">
                            <button className="px-8 py-3 bg-white border border-gray-300 text-meridian-900 font-semibold rounded-sm shadow-sm hover:bg-gray-50 focus-visible-outline transition-colors text-sm uppercase tracking-wider">
                                Load More Stories
                            </button>
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CategoryApp />);
    </script>
</body>

</html>
