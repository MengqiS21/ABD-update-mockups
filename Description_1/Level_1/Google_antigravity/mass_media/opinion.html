<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opinion & Editorials - The Meridian</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Libre Baskerville', 'serif'],
                    },
                    colors: {
                        meridian: {
                            50: '#fdfdfc',
                            100: '#f6f7f9',
                            800: '#1a1d24',
                            900: '#0f1115',
                            accent: '#d92323',
                            opinion: '#15315E', // A distinctive color for Opinion section
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfdfc;
            color: #1a1d24;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .font-serif {
            font-family: 'Libre Baskerville', serif;
        }

        .focus-visible-outline:focus-visible {
            outline: 2px solid #15315E;
            outline-offset: 2px;
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #15315E;
            color: white;
            padding: 8px;
            z-index: 100;
            transition: top 0.2s;
        }

        .skip-link:focus {
            top: 0;
        }

        /* Specialized Opinion Theme Elements */
        .opinion-border {
            border-top: 4px solid #15315E;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        // --- SHARED COMPONENTS ---
        const NavLink = ({ href, children, isCurrent, className = "" }) => (
            <a href={href} className={`text-sm font-semibold tracking-wide uppercase transition-colors focus-visible-outline rounded-sm px-1 ${isCurrent ? 'text-meridian-opinion border-b-2 border-meridian-opinion pb-1' : 'text-meridian-800 hover:text-meridian-opinion'} ${className}`} aria-current={isCurrent ? "page" : undefined}>
                {children}
            </a>
        );

        const Header = ({ currentPage }) => {
            const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
            return (
                <header className="border-b border-gray-200 sticky top-0 bg-white z-50 shadow-sm relative">
                    <a href="#main-content" className="skip-link font-sans font-medium">Skip to main content</a>
                    <div className="bg-meridian-900 text-white text-xs py-1.5 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
                        <div className="flex space-x-4">
                            <span className="opacity-80"><i className="fas fa-sun mr-1"></i> Washington, 72°</span>
                            <span className="hidden sm:inline opacity-80">{new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
                        </div>
                        <div className="flex space-x-4">
                            <a href="subscription.html" className="font-semibold text-white hover:text-gray-300 focus-visible-outline">Subscribe</a>
                            <button className="opacity-80 hover:opacity-100 focus-visible-outline">Sign In</button>
                        </div>
                    </div>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-20 sm:h-24">
                            <div className="flex items-center lg:hidden">
                                <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-meridian-opinion" aria-expanded={mobileMenuOpen}>
                                    <i className={`fas ${mobileMenuOpen ? 'fa-times' : 'fa-bars'} text-xl`}></i>
                                </button>
                            </div>
                            <div className="flex-shrink-0 flex items-center justify-center lg:justify-start w-full lg:w-auto">
                                <a href="index.html" className="focus-visible-outline" aria-label="The Meridian Home">
                                    <h1 className="font-serif text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight text-meridian-900 leading-none">The Meridian</h1>
                                </a>
                            </div>
                            <div className="hidden lg:flex items-center space-x-4">
                                <a href="subscription.html" className="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-sm shadow-sm text-white bg-meridian-opinion hover:bg-blue-900 transition focus-visible-outline">Subscribe Now</a>
                            </div>
                        </div>
                    </div>
                    <nav aria-label="Primary" className="hidden lg:block border-t border-gray-100 bg-white shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-center space-x-8 py-4">
                                <NavLink href="index.html" isCurrent={currentPage === 'home'}>Home</NavLink>
                                <NavLink href="category.html" isCurrent={currentPage === 'world'}>World</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'politics'}>Politics</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'tech'}>Tech</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'culture'}>Culture</NavLink>
                                <NavLink href="opinion.html" isCurrent={currentPage === 'opinion'}>Opinion</NavLink>
                                <NavLink href="#" isCurrent={currentPage === 'science'}>Science</NavLink>
                            </div>
                        </div>
                    </nav>
                </header>
            );
        };

        const Footer = () => (
            <footer className="bg-meridian-900 text-white mt-auto pt-16 pb-8 opinion-border mt-16">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12 border-b border-gray-700 pb-12">
                        <div className="md:col-span-1">
                            <h3 className="font-serif text-2xl font-bold mb-4">The Meridian</h3>
                            <p className="text-gray-400 text-sm mb-6 leading-relaxed">Independent journalism for a complex world.</p>
                            <div className="flex space-x-4">
                                <a href="#" aria-label="Twitter" className="text-gray-400 hover:text-white transition-colors focus-visible-outline"><i className="fab fa-twitter text-lg"></i></a>
                                <a href="#" aria-label="Facebook" className="text-gray-400 hover:text-white transition-colors focus-visible-outline"><i className="fab fa-facebook text-lg"></i></a>
                            </div>
                        </div>
                        <div>
                            <h4 className="font-serif font-bold text-lg mb-4 text-gray-200">Sections</h4>
                            <ul className="space-y-2 text-sm text-gray-400">
                                <li><a href="category.html" className="hover:text-white focus-visible-outline">World</a></li>
                                <li><a href="opinion.html" className="hover:text-white focus-visible-outline">Opinion</a></li>
                            </ul>
                        </div>
                        <div className="md:col-span-2 text-right">
                            <p className="text-gray-400 text-sm mt-8">&copy; {new Date().getFullYear()} The Meridian Media Company.</p>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const ColumnistCard = ({ name, role, image, articleTitle, articleSummary }) => (
            <article className="flex space-x-5 py-6 border-b border-gray-200 last:border-0">
                <div className="flex-shrink-0">
                    <img src={image} alt={`Avatar for ${name}`} className="w-20 h-20 rounded-full border-2 border-gray-100 object-cover" />
                </div>
                <div className="flex-grow">
                    <a href="article.html" className="group block focus-visible-outline mb-2">
                        <h4 className="font-serif font-bold text-xl text-meridian-900 group-hover:text-meridian-opinion transition-colors leading-snug">{articleTitle}</h4>
                    </a>
                    <p className="text-sm text-gray-600 mb-2 line-clamp-2">{articleSummary}</p>
                    <div className="flex items-center text-xs font-semibold uppercase tracking-wide">
                        <span className="text-meridian-900">{name}</span>
                        {role && <span className="text-gray-400 ml-2">| {role}</span>}
                    </div>
                </div>
            </article>
        );

        const MiniOpinion = ({ title, author }) => (
            <article className="py-4 border-b border-gray-100 last:border-0">
                <a href="article.html" className="group block focus-visible-outline">
                    <h5 className="font-serif font-bold text-lg leading-tight text-meridian-900 group-hover:text-meridian-opinion transition-colors mb-1">{title}</h5>
                </a>
                <span className="text-sm text-gray-500 font-medium">{author}</span>
            </article>
        );

        const OpinionApp = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    <Header currentPage="opinion" />

                    <main id="main-content" className="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12" tabIndex="-1">

                        {/* Section Header */}
                        <div className="mb-10 lg:mb-16 flex items-center">
                            <div className="w-12 h-1 bg-meridian-opinion mr-4"></div>
                            <h1 className="font-serif text-4xl md:text-5xl lg:text-6xl font-bold text-meridian-900 tracking-tight">Opinion</h1>
                        </div>

                        {/* Featured Editorial */}
                        <section className="mb-16 bg-meridian-50 border border-gray-200 p-6 md:p-10 lg:p-14 rounded-sm relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-meridian-opinion opacity-5 rounded-bl-full -z-0"></div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 md:gap-16 relative z-10 items-center">
                                <div>
                                    <div className="flex items-center space-x-4 mb-6">
                                        <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="David Brooks" className="w-16 h-16 rounded-full border-2 border-white shadow-sm" />
                                        <div>
                                            <span className="block text-meridian-opinion font-bold text-xs uppercase tracking-widest mb-1">Featured Essay</span>
                                            <span className="block font-bold text-lg text-meridian-900">David Brooks</span>
                                        </div>
                                    </div>
                                    <a href="article.html" className="focus-visible-outline block group">
                                        <h2 className="font-serif text-4xl md:text-5xl font-bold text-meridian-900 leading-tight group-hover:text-meridian-opinion transition-colors mb-6">
                                            The Illusion of Productive Leisure in the Digital Era
                                        </h2>
                                    </a>
                                    <p className="text-gray-700 text-lg md:text-xl font-serif italic mb-8 leading-relaxed">
                                        We have commodified our downtime. What used to be periods of essential mental rest are now treated as opportunities for self-optimization, leaving us profoundly exhausted.
                                    </p>
                                    <a href="article.html" className="inline-flex items-center font-bold text-sm uppercase tracking-wider text-meridian-opinion hover:text-blue-900 focus-visible-outline transition-colors">
                                        Read Essay <i className="fas fa-arrow-right ml-2"></i>
                                    </a>
                                </div>

                                <div className="hidden lg:block relative">
                                    <img src="https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Person working on a laptop at a cafe" className="rounded-sm shadow-md object-cover h-[400px] w-full" />
                                    <div className="absolute inset-0 border-4 border-meridian-opinion max-w-[90%] max-h-[90%] m-auto pointer-events-none opacity-20 -rotate-3"></div>
                                </div>
                            </div>
                        </section>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">

                            {/* Columnists Grid */}
                            <div className="lg:col-span-8">
                                <h3 className="font-sans font-bold text-sm uppercase tracking-widest text-meridian-900 border-b-2 border-meridian-900 pb-2 mb-6">Our Columnists</h3>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-0">
                                    <ColumnistCard
                                        name="Elena Rodriguez"
                                        role="Global Affairs"
                                        image="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?ixlib=rb-1.2.1&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                                        articleTitle="Climate Summits Are Failing. It's Time for a New Playbook."
                                        articleSummary="The established framework of annual megaconferences isn't delivering the rapid carbon reductions promised."
                                    />
                                    <ColumnistCard
                                        name="Marcus Johnson"
                                        role="Domestic Politics"
                                        image="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?ixlib=rb-1.2.1&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                                        articleTitle="The Fading Center and the Rise of Partisan Ultimatum"
                                        articleSummary="Compromise used to be the engine of legislative progress. Today, it is treated as a political liability."
                                    />
                                    <ColumnistCard
                                        name="Sarah Chen"
                                        role="Technology & Society"
                                        image="https://images.unsplash.com/photo-1544005313-94ddf0286df2?ixlib=rb-1.2.1&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                                        articleTitle="Why Silicon Valley Wants to Regulate Itself Before Doing Harm"
                                        articleSummary="Tech giants are pushing for preemptive rules, but mostly to crowd out competition from smaller innovators."
                                    />
                                    <ColumnistCard
                                        name="Julian Varela"
                                        role="Culture Critic"
                                        image="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-1.2.1&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                                        articleTitle="The Death of the Mid-Budget Movie"
                                        articleSummary="Studios now only bet on massive intellectual property universes or micro-budget avant-garde indie films."
                                    />
                                    <ColumnistCard
                                        name="Amara Okafor"
                                        role="Economics"
                                        image="https://images.unsplash.com/photo-1531123897727-8f129e1688ce?ixlib=rb-1.2.1&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                                        articleTitle="Inflation is Down, So Why Does Everyone Still Feel Broke?"
                                        articleSummary="Macroeconomic indicators tell a story of recovery, but wallet-level reality paints a contrasting picture."
                                    />
                                    <ColumnistCard
                                        name="Thomas Reed"
                                        role="Guest Essayist"
                                        image="https://images.unsplash.com/photo-1519345182560-3f2917c472ef?ixlib=rb-1.2.1&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                                        articleTitle="Bring Back the Analog Hobby"
                                        articleSummary="We are losing the tactile pleasure of doing things simply for the sake of doing them."
                                    />
                                </div>
                            </div>

                            {/* Sidebar: Letters and Board Editorials */}
                            <div className="lg:col-span-4 space-y-12">

                                <div className="bg-white border border-gray-200 p-6 shadow-sm rounded-sm">
                                    <h3 className="font-sans font-bold text-sm uppercase tracking-widest text-meridian-900 border-b-2 border-gray-200 pb-2 mb-4">The Editorial Board</h3>
                                    <MiniOpinion title="We Must Protect the Independence of the Judiciary" author="The Editorial Board" />
                                    <MiniOpinion title="End the Antiquated Debt Limit Stand-offs Now" author="The Editorial Board" />
                                    <MiniOpinion title="A Bold Vision for High-Speed Rail in the Northeast" author="The Editorial Board" />
                                </div>

                                <div className="bg-meridian-50 border border-gray-200 p-6 shadow-sm rounded-sm">
                                    <div className="flex justify-between items-center border-b-2 border-meridian-opinion pb-2 mb-6">
                                        <h3 className="font-sans font-bold text-sm uppercase tracking-widest text-meridian-900">Letters to the Editor</h3>
                                        <i className="fas fa-envelope-open-text text-meridian-opinion"></i>
                                    </div>

                                    <div className="space-y-6">
                                        <article>
                                            <a href="#" className="group focus-visible-outline block mb-1">
                                                <h4 className="font-serif font-bold text-lg leading-snug group-hover:text-meridian-opinion transition-colors">On: The Education Crisis Narrative</h4>
                                            </a>
                                            <p className="text-gray-600 text-sm italic mb-2">"The real crisis is not funding, but the structural rigidity of curriculum that fails modern students."</p>
                                            <span className="text-xs font-semibold text-gray-500 uppercase tracking-widest">— Dr. Alan P., Chicago</span>
                                        </article>

                                        <article>
                                            <a href="#" className="group focus-visible-outline block mb-1">
                                                <h4 className="font-serif font-bold text-lg leading-snug group-hover:text-meridian-opinion transition-colors">On: Electric Vehicle Subsidies</h4>
                                            </a>
                                            <p className="text-gray-600 text-sm italic mb-2">"Subsidizing premium EVs only benefits upper-middle-class buyers while ignoring broader transit infrastructure needs."</p>
                                            <span className="text-xs font-semibold text-gray-500 uppercase tracking-widest">— Maria T., Austin</span>
                                        </article>
                                    </div>

                                    <div className="mt-6 pt-4 border-t border-gray-200">
                                        <button className="w-full bg-white border border-meridian-opinion text-meridian-opinion text-sm font-semibold py-2 rounded-sm hover:bg-meridian-opinion hover:text-white transition-colors focus-visible-outline">
                                            Submit a Letter
                                        </button>
                                    </div>
                                </div>

                                {/* Newsletter specific to Opinion */}
                                <div className="bg-meridian-opinion text-white p-6 rounded-sm shadow-sm relative overflow-hidden">
                                    <i className="fas fa-pen-nib absolute -right-6 -bottom-6 text-7xl opacity-10"></i>
                                    <h4 className="font-serif text-2xl font-bold mb-2">Arguable</h4>
                                    <p className="text-sm text-blue-100 mb-6">Our flagship opinion newsletter. Provocative essays and varied perspectives every weekday morning.</p>
                                    <form className="flex">
                                        <input type="email" aria-label="Email address" placeholder="Your email" className="w-full px-3 py-2 text-sm text-gray-900 rounded-l-sm focus:outline-none focus:ring-2 focus:ring-white" />
                                        <button className="bg-meridian-900 text-white px-3 py-2 text-sm font-bold uppercase tracking-wider rounded-r-sm hover:bg-gray-800 transition focus-visible-outline">Add</button>
                                    </form>
                                </div>
                            </div>

                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OpinionApp />);
    </script>
</body>

</html>
