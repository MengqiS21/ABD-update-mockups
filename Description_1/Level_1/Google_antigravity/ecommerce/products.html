                                    <i data-lucide="grid-3x3" className="w-5 h-5"></i>
                                </button>
                                <button className="p-1.5 hover:bg-gray-100 hover:text-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-primary transition-colors" aria-label="List view">
                                    <i data-lucide="list" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>

                        {/* Product Grid */}
                        <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
                            {products.map(p => (
                                <ProductCard key={p.id} {...p} />
                            ))}
                        </div>

                        {/* Pagination */}
                        <div className="mt-12 flex justify-center">
                            <nav aria-label="Page navigation">
                                <ul className="inline-flex -space-x-px text-sm">
                                    <li>
                                        <a href="#" className="flex items-center justify-center px-3 h-8 leading-tight text-gray-500 bg-white border border-gray-300 rounded-l-lg hover:bg-gray-100 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:z-10 relative">Previous</a>
                                    </li>
                                    <li>
                                        <a href="#" className="flex items-center justify-center px-3 h-8 leading-tight text-white bg-primary border border-primary hover:bg-primaryDark focus:outline-none focus:ring-2 focus:ring-primary focus:z-10 relative" aria-current="page">1</a>
                                    </li>
                                    <li>
                                        <a href="#" className="flex items-center justify-center px-3 h-8 leading-tight text-gray-500 bg-white border border-gray-300 hover:bg-gray-100 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:z-10 relative">2</a>
                                    </li>
                                    <li>
                                        <a href="#" className="flex items-center justify-center px-3 h-8 leading-tight text-gray-500 bg-white border border-gray-300 hover:bg-gray-100 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:z-10 relative">3</a>
                                    </li>
                                    <li>
                                        <span className="flex items-center justify-center px-3 h-8 leading-tight text-gray-500 bg-white border border-gray-300">...</span>
                                    </li>
                                    <li>
                                        <a href="#" className="flex items-center justify-center px-3 h-8 leading-tight text-gray-500 bg-white border border-gray-300 hover:bg-gray-100 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:z-10 relative">61</a>
                                    </li>
                                    <li>
                                        <a href="#" className="flex items-center justify-center px-3 h-8 leading-tight text-gray-500 bg-white border border-gray-300 rounded-r-lg hover:bg-gray-100 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary focus:z-10 relative">Next</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </section>
                </div>
            );
        };

        const App = () => {
            // Initialize Lucide icons on mount and after render since we generate products dynamically
            React.useEffect(() => {
                const initIcons = () => {
                    if (window.lucide) {
                        try {
                            window.lucide.createIcons();
                        } catch (e) {
                            console.error("Lucide icons error", e);
                        }
                    }
                };

                // Initial init
                initIcons();

                // Small delay to ensure generated content icons are formatted too
                setTimeout(initIcons, 100);
            }, []);

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow bg-[#f8fafc]">
                        <ProductsPage />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
