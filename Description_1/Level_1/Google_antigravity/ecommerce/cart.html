<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | NovaMart</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb', // Blue-600
                        primaryDark: '#1d4ed8', // Blue-700
                        secondary: '#475569', // Slate-600
                        accent: '#f59e0b', // Amber-500
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Shared Components --- //

        const Header = () => {
            return (
                <header className="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
                    <div className="bg-primaryDark text-white text-sm py-1.5 px-4 text-center font-medium">
                        Free shipping on orders over $50. <a href="#" className="underline hover:text-blue-200">Shop Now</a>
                    </div>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16">
                            <div className="flex-shrink-0 flex items-center gap-2">
                                <a href="index.html" className="flex items-center gap-2 text-2xl font-bold tracking-tight text-primaryDark focus:outline-none focus:ring-2 focus:ring-primary rounded" aria-label="NovaMart Homepage">
                                    <i data-lucide="shopping-bag" className="w-8 h-8 text-primary"></i>
                                    NovaMart
                                </a>
                            </div>
                            <div className="hidden md:flex flex-1 max-w-2xl mx-8">
                                <form className="w-full relative" onSubmit={(e) => e.preventDefault()}>
                                    <label htmlFor="search" className="sr-only">Search products</label>
                                    <input
                                        type="text"
                                        id="search"
                                        placeholder="Search for electronics, home goods, apparel..."
                                        className="w-full pl-4 pr-10 py-2.5 border border-gray-300 rounded-full bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                                    />
                                    <button
                                        type="submit"
                                        aria-label="Search"
                                        className="absolute right-0 top-0 mt-1 mr-1 p-2 text-gray-500 hover:text-primary rounded-full focus:outline-none focus:ring-2 focus:ring-primary"
                                    >
                                        <i data-lucide="search" className="w-5 h-5"></i>
                                    </button>
                                </form>
                            </div>
                            <div className="flex items-center gap-4 sm:gap-6">
                                <a href="account.html" className="flex flex-col items-center text-gray-600 hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary rounded p-1 transition-colors" aria-label="Account">
                                    <i data-lucide="user" className="w-6 h-6"></i>
                                    <span className="text-[11px] font-medium hidden sm:block mt-0.5">Account</span>
                                </a>
                                <a href="products.html" className="flex flex-col items-center text-gray-600 hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary rounded p-1 transition-colors" aria-label="Products">
                                    <i data-lucide="grid" className="w-6 h-6"></i>
                                    <span className="text-[11px] font-medium hidden sm:block mt-0.5">Shop</span>
                                </a>
                                <a href="cart.html" className="flex flex-col items-center text-primary focus:outline-none focus:ring-2 focus:ring-primary rounded p-1 relative transition-colors" aria-label="Cart with 2 items">
                                    <div className="relative">
                                        <i data-lucide="shopping-cart" className="w-6 h-6"></i>
                                        <span className="absolute -top-1.5 -right-2 bg-accent text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">2</span>
                                    </div>
                                    <span className="text-[11px] font-medium hidden sm:block mt-0.5">Cart</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-white border-t border-gray-200 pt-12 pb-8 mt-auto">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-8 mb-8">
                            <div className="col-span-1 md:col-span-1">
                                <a href="index.html" className="flex items-center gap-2 text-2xl font-bold tracking-tight text-primaryDark mb-4 focus:outline-none focus:ring-2 focus:ring-primary rounded inline-flex">
                                    <i data-lucide="shopping-bag" className="w-6 h-6 text-primary"></i>
                                    NovaMart
                                </a>
                                <p className="text-gray-500 text-sm mb-4 leading-relaxed">
                                    Your go-to destination for electronics, home goods, and apparel. Quality products, competitive prices.
                                </p>
                            </div>

                            <div>
                                <h3 className="font-semibold text-gray-900 mb-4">Shop</h3>
                                <ul className="space-y-2 text-sm text-gray-600">
                                    <li><a href="products.html" className="hover:text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded px-1 -mx-1">All Products</a></li>
                                    <li><a href="products.html" className="hover:text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded px-1 -mx-1">Electronics</a></li>
                                    <li><a href="products.html" className="hover:text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded px-1 -mx-1">Kitchen & Home</a></li>
                                    <li><a href="products.html" className="hover:text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded px-1 -mx-1">Apparel</a></li>
                                </ul>
                            </div>

                            <div>
                                <h3 className="font-semibold text-gray-900 mb-4">Customer Service</h3>
                                <ul className="space-y-2 text-sm text-gray-600">
                                    <li><a href="#" className="hover:text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded px-1 -mx-1">Contact Us</a></li>
                                    <li><a href="#" className="hover:text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded px-1 -mx-1">Shipping Policy</a></li>
                                    <li><a href="#" className="hover:text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded px-1 -mx-1">Returns & Exchanges</a></li>
                                    <li><a href="#" className="hover:text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded px-1 -mx-1">FAQ</a></li>
                                </ul>
                            </div>

                            <div>
                                <h3 className="font-semibold text-gray-900 mb-4">Stay Connected</h3>
                                <p className="text-gray-500 text-sm mb-3">Subscribe to our newsletter for exclusive offers.</p>
                                <form className="flex gap-2" onSubmit={e => e.preventDefault()}>
                                    <label htmlFor="email" className="sr-only">Email address</label>
                                    <input
                                        type="email"
                                        id="email"
                                        placeholder="Enter your email"
                                        className="flex-1 min-w-0 px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                                        required
                                    />
                                    <button
                                        type="submit"
                                        className="bg-primary text-white px-4 py-2 rounded font-medium hover:bg-primaryDark focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-colors text-sm"
                                    >
                                        Subscribe
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div className="border-t border-gray-200 pt-8 flex flex-col md:flex-row justify-between items-center gap-4">
                            <p className="text-gray-500 text-sm">© 2026 NovaMart. All rights reserved.</p>
                            <div className="flex space-x-4">
                                <a href="#" aria-label="Facebook" className="text-gray-400 hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary rounded p-1">
                                    <i data-lucide="facebook" className="w-5 h-5"></i>
                                </a>
                                <a href="#" aria-label="Twitter" className="text-gray-400 hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary rounded p-1">
                                    <i data-lucide="twitter" className="w-5 h-5"></i>
                                </a>
                                <a href="#" aria-label="Instagram" className="text-gray-400 hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary rounded p-1">
                                    <i data-lucide="instagram" className="w-5 h-5"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };

        // --- Page specific --- //

        const CartPage = () => {
            const initialItems = [
                {
                    id: 1,
                    title: "Sony WH-1000XM5 Wireless Noise Canceling Headphones",
                    variant: "Midnight Black",
                    price: 279.99,
                    originalPrice: 399.99,
                    quantity: 1,
                    image: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?auto=format&fit=crop&q=80&w=200&h=200",
                    inStock: true
                },
                {
                    id: 2,
                    title: "Men's Performance Fleece Hoodie",
                    variant: "Size: M, Color: Navy",
                    price: 34.99,
                    quantity: 2,
                    image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=200&h=200",
                    inStock: true
                }
            ];

            const [cartItems, setCartItems] = React.useState(initialItems);
            const [promoCode, setPromoCode] = React.useState('');
            const [promoApplied, setPromoApplied] = React.useState(false);

            const updateQuantity = (id, newQty) => {
                if (newQty < 1) return;
                setCartItems(cartItems.map(item => item.id === id ? { ...item, quantity: newQty } : item));
            };

            const removeItem = (id) => {
                setCartItems(cartItems.filter(item => item.id !== id));
            };

            const handlePromoApply = (e) => {
                e.preventDefault();
                if (promoCode.trim().length > 0) {
                    setPromoApplied(true);
                }
            };

            const subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = subtotal > 50 || subtotal === 0 ? 0 : 5.99;
            const tax = subtotal * 0.08; // 8% estimated tax
            const discount = promoApplied ? subtotal * 0.1 : 0; // 10% off
            const total = subtotal + shipping + tax - discount;

            React.useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }); // Re-run on state change to ensure icons in mapped elements render

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Shopping Cart</h1>

                    {cartItems.length === 0 ? (
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-12 text-center">
                            <i data-lucide="shopping-cart" className="w-16 h-16 mx-auto text-gray-300 mb-4"></i>
                            <h2 className="text-2xl font-semibold text-gray-900 mb-2">Your cart is empty</h2>
                            <p className="text-gray-500 mb-6">Looks like you haven't added anything to your cart yet.</p>
                            <a href="products.html" className="inline-flex items-center gap-2 bg-primary text-white px-6 py-3 rounded-lg font-medium hover:bg-primaryDark focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-colors">
                                Start Shopping
                            </a>
                        </div>
                    ) : (
                        <div className="flex flex-col lg:flex-row gap-8 items-start">
                            {/* Items List */}
                            <div className="lg:w-2/3 flex flex-col gap-6">
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
                                    <h2 className="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4">
                                        Cart Items <span className="text-gray-500 font-normal text-base ml-2">({cartItems.length} items)</span>
                                    </h2>

                                    <div className="space-y-6">
                                        {cartItems.map((item) => (
                                            <div key={item.id} className="flex flex-col sm:flex-row gap-4 sm:gap-6 py-6 border-b border-gray-100 last:border-0 last:pb-0 last:mb-0">
                                                {/* Image */}
                                                <div className="w-24 h-24 sm:w-32 sm:h-32 bg-gray-50 rounded-xl flex-shrink-0 border border-gray-100 p-2 focus-within:ring-2 focus-within:ring-primary cursor-pointer">
                                                    <a href="product-detail.html" className="block w-full h-full focus:outline-none">
                                                        <img src={item.image} alt={item.title} className="w-full h-full object-contain mix-blend-multiply" />
                                                    </a>
                                                </div>

                                                {/* Details */}
                                                <div className="flex-1 flex flex-col">
                                                    <div className="flex justify-between items-start">
                                                        <div>
                                                            <a href="product-detail.html" className="font-semibold text-gray-900 hover:text-primary transition-colors text-lg focus:outline-none focus:ring-2 focus:ring-primary rounded line-clamp-2">
                                                                {item.title}
                                                            </a>
                                                            <p className="text-gray-500 mt-1 text-sm">{item.variant}</p>
                                                            {item.inStock && (
                                                                <p className="text-green-600 text-xs font-medium mt-2 flex items-center gap-1">
                                                                    <i data-lucide="check" className="w-3 h-3"></i> In Stock
                                                                </p>
                                                            )}
                                                        </div>
                                                        <div className="text-right ml-4">
                                                            <p className="font-bold text-gray-900 text-lg">${item.price.toFixed(2)}</p>
                                                            {item.originalPrice && (
                                                                <p className="text-gray-400 text-sm line-through">${item.originalPrice.toFixed(2)}</p>
                                                            )}
                                                        </div>
                                                    </div>

                                                    {/* Actions (Qty + Remove) */}
                                                    <div className="mt-auto pt-4 flex items-center justify-between">
                                                        <div className="flex items-center border border-gray-300 rounded-lg h-9 w-28 bg-white">
                                                            <button
                                                                onClick={() => updateQuantity(item.id, item.quantity - 1)}
                                                                className="px-3 text-gray-500 hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded-l-lg h-full disabled:opacity-50"
                                                                aria-label="Decrease quantity"
                                                            >
                                                                <i data-lucide="minus" className="w-3.5 h-3.5"></i>
                                                            </button>
                                                            <span className="flex-1 text-center font-medium text-gray-900 text-sm">{item.quantity}</span>
                                                            <button
                                                                onClick={() => updateQuantity(item.id, item.quantity + 1)}
                                                                className="px-3 text-gray-500 hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded-r-lg h-full"
                                                                aria-label="Increase quantity"
                                                            >
                                                                <i data-lucide="plus" className="w-3.5 h-3.5"></i>
                                                            </button>
                                                        </div>
                                                        <div className="flex items-center gap-4">
                                                            <button
                                                                className="text-gray-400 hover:text-red-500 text-sm font-medium flex items-center gap-1 transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded px-1 -mx-1"
                                                                onClick={() => removeItem(item.id)}
                                                                aria-label={`Remove ${item.title} from cart`}
                                                            >
                                                                <i data-lucide="trash-2" className="w-4 h-4"></i> Remove
                                                            </button>
                                                            <button className="text-gray-400 hover:text-primary text-sm font-medium flex items-center gap-1 transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded px-1 -mx-1" aria-label="Save for later">
                                                                <i data-lucide="heart" className="w-4 h-4"></i> Save
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Delivery Info */}
                                <div className="bg-blue-50 border border-blue-100 rounded-2xl p-6 flex items-start gap-4">
                                    <div className="bg-white p-2 text-primary rounded-full shadow-sm">
                                        <i data-lucide="truck" className="w-6 h-6"></i>
                                    </div>
                                    <div>
                                        <h3 className="font-semibold text-primaryDark">Delivery Estimate: {new Date(new Date().setDate(new Date().getDate() + 3)).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</h3>
                                        <p className="text-gray-600 text-sm mt-1">Based on standard shipping. You have qualified for <strong>Free Shipping!</strong></p>
                                    </div>
                                </div>
                            </div>

                            {/* Summary Panel */}
                            <div className="lg:w-1/3 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 sticky top-24">
                                <h3 className="text-xl font-bold text-gray-900 mb-6">Order Summary</h3>

                                <div className="space-y-4 mb-6 text-sm text-gray-600 border-b border-gray-100 pb-6">
                                    <div className="flex justify-between">
                                        <span>Subtotal ({cartItems.reduce((acc, i) => acc + i.quantity, 0)} items)</span>
                                        <span className="font-medium text-gray-900">${subtotal.toFixed(2)}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span>Shipping estimate</span>
                                        <span className={shipping === 0 ? "text-green-600 font-medium" : "font-medium text-gray-900"}>{shipping === 0 ? 'Free' : `$${shipping.toFixed(2)}`}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span>Estimated Tax</span>
                                        <span className="font-medium text-gray-900">${tax.toFixed(2)}</span>
                                    </div>
                                    {promoApplied && (
                                        <div className="flex justify-between text-green-600">
                                            <span className="flex items-center gap-1"><i data-lucide="tag" className="w-3.5 h-3.5"></i> Discount applied</span>
                                            <span className="font-medium">-${discount.toFixed(2)}</span>
                                        </div>
                                    )}
                                </div>

                                <div className="flex justify-between items-center mb-6">
                                    <span className="font-bold text-lg text-gray-900">Total</span>
                                    <span className="font-bold text-2xl text-gray-900">${total.toFixed(2)}</span>
                                </div>

                                <button className="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg hover:bg-primaryDark focus:outline-none focus:ring-4 focus:ring-blue-500/30 transition-all flex items-center justify-center gap-2 shadow-lg mb-4">
                                    Proceed to Checkout
                                    <i data-lucide="arrow-right" className="w-5 h-5"></i>
                                </button>

                                {/* Promo Code */}
                                <div className="mt-6">
                                    <form onSubmit={handlePromoApply} className="flex gap-2">
                                        <label htmlFor="promo" className="sr-only">Promo Code</label>
                                        <input
                                            type="text"
                                            id="promo"
                                            value={promoCode}
                                            onChange={(e) => setPromoCode(e.target.value)}
                                            placeholder="Enter promo code"
                                            className="flex-1 px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-primary text-sm"
                                            disabled={promoApplied}
                                        />
                                        <button
                                            type="submit"
                                            className="bg-gray-100 text-gray-700 font-medium px-4 py-2 rounded border border-gray-200 hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-primary transition-colors text-sm disabled:opacity-50"
                                            disabled={promoApplied || promoCode.trim() === ''}
                                        >
                                            {promoApplied ? 'Applied' : 'Apply'}
                                        </button>
                                    </form>
                                </div>

                                {/* Trust Badges */}
                                <div className="mt-8 pt-6 border-t border-gray-100 flex justify-center gap-4 text-gray-400">
                                    <i data-lucide="shield-check" className="w-8 h-8" title="Secure Payment"></i>
                                    <i data-lucide="credit-card" className="w-8 h-8" title="All Major Cards Accepted"></i>
                                    <i data-lucide="lock" className="w-8 h-8" title="SSL Encrypted"></i>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            )
        }

        const App = () => {
            React.useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow bg-[#f8fafc]">
                        <CartPage />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
