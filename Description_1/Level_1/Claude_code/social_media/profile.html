  Heart:    ({ f }) => <svg className="w-4 h-4" fill={f?"currentColor":"none"} viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>,
  Comment:  () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>,

  Link:     () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>,
  Location: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,

  Img:      () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
  Lightning:() => <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>,
  Verified: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
  More:     () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2} aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" d="M5 12h.01M12 12h.01M19 12h.01" /></svg>,
};

/* ── AVATAR ─────────────────────────────────────────────── */
const AVATAR_COLORS = {
  AC:'from-violet-500 to-purple-700', MR:'from-rose-500 to-pink-700',
  JP:'from-blue-500 to-cyan-700',    ST:'from-emerald-500 to-teal-700',
  RK:'from-amber-500 to-orange-600', PK:'from-indigo-500 to-blue-700',
};
const SZ = { sm:'w-8 h-8 text-xs', md:'w-10 h-10 text-sm', xl:'w-24 h-24 text-3xl' };
const Avatar = ({ user, size='md' }) => {
  const initials = user.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const g = AVATAR_COLORS[initials] || 'from-violet-500 to-purple-700';
  return <div className={`${SZ[size]} rounded-full bg-gradient-to-br ${g} flex items-center justify-center font-bold text-white flex-shrink-0 select-none`} aria-hidden="true">{initials}</div>;
};

/* ── NAV ────────────────────────────────────────────────── */
const NAV_ITEMS = [
  { icon:'Home',    label:'Home',          href:'index.html' },
  { icon:'Compass', label:'Explore',       href:'explore.html' },
  { icon:'Bell',    label:'Notifications', href:'notifications.html', badge:3 },
  { icon:'Msg',     label:'Messages',      href:'messages.html', badge:5 },
  { icon:'User',    label:'Profile',       href:'profile.html' },
  { icon:'Gear',    label:'Settings',      href:'settings.html' },
];
const ME = { name:'Alex Chen', handle:'@alexchen' };

const Navigation = ({ cur }) => (
  <nav className="fixed left-0 top-0 h-full w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-4 z-40 hidden lg:flex" aria-label="Main navigation">
    <a href="index.html" className="flex items-center gap-2 mb-8 px-2" aria-label="Pulse — go to home feed">
      <span className="text-violet-500"><Ic.Lightning /></span>
      <span className="text-2xl font-extrabold tracking-tight text-white">Pulse</span>
    </a>
    <ul className="space-y-1 flex-1" role="list">
      {NAV_ITEMS.map(({ icon, label, href, badge }) => {
        const Icon = Ic[icon]; const active = cur === href;
        return (
          <li key={label}>
            <a href={href} className={`flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all ${active ? 'bg-violet-600 text-white shadow-lg shadow-violet-900/40' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`} aria-current={active ? 'page' : undefined}>
              <Icon /><span className="font-semibold">{label}</span>
              {badge > 0 && <span className="ml-auto bg-violet-500 text-white text-xs rounded-full min-w-[20px] h-5 flex items-center justify-center px-1" aria-label={`${badge} unread`}>{badge}</span>}
            </a>
          </li>
        );
      })}
    </ul>
    <button className="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-xl mb-4 flex items-center justify-center gap-2 transition-colors" aria-label="Create new post"><Ic.Plus /><span>New Post</span></button>
    <a href="profile.html" className="flex items-center gap-3 px-2 py-2 rounded-xl hover:bg-slate-800 transition-colors">
      <Avatar user={ME} size="sm" />
      <div className="flex-1 min-w-0"><p className="font-semibold text-sm text-white truncate">{ME.name}</p><p className="text-slate-500 text-xs truncate">{ME.handle}</p></div>
    </a>
  </nav>
);

const MobileNav = ({ cur }) => (
  <nav className="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur border-t border-slate-800 flex lg:hidden z-40" aria-label="Mobile navigation">
    {NAV_ITEMS.slice(0,5).map(({ icon, label, href, badge }) => {
      const Icon = Ic[icon]; const active = cur === href;
      return (
        <a key={label} href={href} className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 relative transition-colors ${active ? 'text-violet-400' : 'text-slate-500 hover:text-slate-300'}`}
          aria-label={label} aria-current={active ? 'page' : undefined}>
          <Icon /><span className="text-[10px] font-medium">{label}</span>
          {badge > 0 && <span className="absolute top-1.5 left-1/2 translate-x-1.5 bg-violet-500 text-white text-[9px] rounded-full min-w-[14px] h-3.5 flex items-center justify-center px-0.5" aria-label={`${badge} unread`}>{badge}</span>}
        </a>
      );
    })}
  </nav>
);

/* ── PROFILE POSTS DATA ─────────────────────────────────── */
const MY_POSTS = [
  { id:1,  text:"Just wrapped up a deep dive into the latest AI research papers. The progress in multimodal models is genuinely staggering. 🤖✨",                                    likes:847,  comments:124, time:'2h',  grad:null },
  { id:2,  text:"Hot take: The best debugging tool is still console.log. No shame. 😅 #DevLife",                                                                                     likes:3200, comments:445, time:'8h',  grad:null },
  { id:3,  text:"Climate Week is here! Did you know switching to plant-based meals twice a week can reduce your carbon footprint by 30%? 🌱 #ClimateWeek",                           likes:1400, comments:203, time:'2d',  grad:'from-emerald-900 to-teal-800' },
  { id:4,  text:"Five years of building in public — a thread on what I've learned about consistency, community, and shipping code that matters. 🧵",                                  likes:5200, comments:891, time:'1w',  grad:null },
  { id:5,  text:"The conference was incredible. Met so many brilliant people working on fascinating problems. The AI safety talks especially 🎙️",                                     likes:923,  comments:87,  time:'2w',  grad:'from-violet-900 to-indigo-900' },
  { id:6,  text:"Reminder that good documentation is a love letter to your future self. I just spent 30 minutes being grateful to past-me. 📝",                                      likes:7800, comments:612, time:'3w',  grad:null },
];
const MEDIA_POSTS = [
  { id:1, grad:'from-violet-900 to-purple-800',   alt:'Abstract AI visualization with glowing neural network nodes', likes:847  },
  { id:2, grad:'from-emerald-900 to-teal-800',    alt:'Lush forest path at dawn with soft green light filtering through trees', likes:2100 },
  { id:3, grad:'from-amber-800 to-orange-900',    alt:'City skyline at golden hour with warm amber tones', likes:1400 },
  { id:4, grad:'from-blue-900 to-cyan-800',       alt:'Ocean horizon at sunrise with soft blue gradient sky', likes:3200 },
  { id:5, grad:'from-rose-900 to-pink-800',       alt:'Evening city lights reflected in rain-slicked streets', likes:920  },
  { id:6, grad:'from-indigo-900 to-slate-800',    alt:'Dark conference room with a single laptop screen glowing in the dark', likes:614  },
];

const fmt = n => n >= 1000 ? (n/1000).toFixed(1).replace('.0','')+'K' : String(n);

/* ── PROFILE PAGE ───────────────────────────────────────── */
const ProfilePage = () => {
  const [tab, setTab] = useState('posts');
  const [likedP, setLikedP] = useState({});
  const [likedM, setLikedM] = useState({});
  const [editing, setEditing] = useState(false);
  const [bio, setBio] = useState("Software engineer & AI enthusiast. Building thoughtful tech. Occasional blogger. 🌍 Bay Area | he/him");

  const TABS = ['Posts','Replies','Media','Likes'];

  return (
    <div className="min-h-screen bg-slate-950">
      <Navigation cur="profile.html" />
      <MobileNav cur="profile.html" />
      <div className="lg:ml-64">
        <main id="main-content" className="max-w-2xl mx-auto pb-24 lg:pb-8">

          {/* Cover photo */}
          <div className="w-full h-44 sm:h-52 bg-gradient-to-br from-violet-900 via-purple-800 to-indigo-900 relative" role="img" aria-label="Profile cover photo with purple gradient">
            <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmZmZmYiIGZpbGwtb3BhY2l0eT0iMC4wMyI+PHBhdGggZD0iTTM2IDM0djZoNnYtNmgtNnptNiA2djZoNnYtNmgtNnptLTYgMHY2aDZ2LTZoLTZ6Ii8+PC9nPjwvZz48L3N2Zz4=')] opacity-40"></div>
          </div>

          {/* Profile header */}
          <div className="px-4 sm:px-6">
            <div className="flex items-end justify-between -mt-12 mb-4">
              <div className="ring-4 ring-slate-950 rounded-full">
                <Avatar user={ME} size="xl" />
              </div>
              <div className="flex gap-2 mt-14">
                <button className="text-slate-400 hover:text-white hover:bg-slate-800 border border-slate-700 p-2 rounded-xl transition-colors" aria-label="More options">
                  <Ic.More />
                </button>
                <button onClick={() => setEditing(!editing)}
                  className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-semibold px-4 py-2 rounded-xl text-sm transition-colors"
                  aria-label="Edit your profile" aria-pressed={editing}>
                  <Ic.Edit /><span>Edit Profile</span>
                </button>
              </div>
            </div>

            {/* Name and bio */}
            <div className="mb-4">
              <div className="flex items-center gap-1.5 mb-0.5">
                <h1 className="text-xl font-extrabold text-white">Alex Chen</h1>
                <span className="text-violet-400" aria-label="Verified account"><Ic.Verified /></span>
              </div>
              <p className="text-slate-400 text-sm mb-3">@alexchen</p>

              {editing ? (
                <div className="mb-3">
                  <label htmlFor="bio-edit" className="sr-only">Edit bio</label>
                  <textarea id="bio-edit" value={bio} onChange={e => setBio(e.target.value)} rows={3}
                    className="w-full bg-slate-800 border border-slate-700 text-slate-100 px-3 py-2 rounded-xl text-sm resize-none outline-none focus:ring-2 focus:ring-violet-500" />
                  <div className="flex gap-2 mt-2">
                    <button onClick={() => setEditing(false)} className="bg-violet-600 hover:bg-violet-700 text-white text-sm font-bold px-4 py-1.5 rounded-lg transition-colors">Save</button>
                    <button onClick={() => setEditing(false)} className="text-slate-400 hover:text-white text-sm font-semibold px-4 py-1.5 rounded-lg border border-slate-700 hover:bg-slate-800 transition-colors">Cancel</button>
                  </div>
                </div>
              ) : (
                <p className="text-slate-100 text-sm leading-relaxed mb-3">{bio}</p>
              )}

              <div className="flex flex-wrap gap-x-4 gap-y-1.5 text-sm text-slate-400">
                <span className="flex items-center gap-1.5"><Ic.Location /><span>San Francisco, CA</span></span>
                <span className="flex items-center gap-1.5"><Ic.Link /><a href="#" className="text-violet-400 hover:underline">alexchen.dev</a></span>
                <span className="flex items-center gap-1.5"><Ic.Calendar /><span>Joined January 2019</span></span>
              </div>
            </div>

            {/* Stats */}
            <div className="flex gap-5 mb-5 text-sm">
              <button className="hover:underline" aria-label="2,341 following"><span className="font-bold text-white">2,341</span> <span className="text-slate-400">Following</span></button>
              <button className="hover:underline" aria-label="48,200 followers"><span className="font-bold text-white">48.2K</span> <span className="text-slate-400">Followers</span></button>
              <div aria-label="1,847 posts"><span className="font-bold text-white">1,847</span> <span className="text-slate-400">Posts</span></div>
            </div>

            {/* Tabs */}
            <div className="flex border-b border-slate-800 mb-5 -mx-4 sm:-mx-6 px-4 sm:px-6" role="tablist" aria-label="Profile content tabs">
              {TABS.map(t => (
                <button key={t} role="tab" id={`ptab-${t.toLowerCase()}`} aria-selected={tab === t.toLowerCase()} aria-controls={`ppanel-${t.toLowerCase()}`}
                  onClick={() => setTab(t.toLowerCase())}
                  className={`flex-1 py-3 text-sm font-semibold transition-colors relative ${tab === t.toLowerCase() ? 'text-white' : 'text-slate-400 hover:text-slate-200'}`}>
                  {t}
                  {tab === t.toLowerCase() && <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-violet-500 rounded-full" aria-hidden="true"></span>}
                </button>
              ))}
            </div>

            {/* Tab panels */}
            <div role="tabpanel" id={`ppanel-${tab}`} aria-labelledby={`ptab-${tab}`}>
              {tab === 'posts' && (
                <section aria-label="Your posts">
                  <div className="space-y-4">
                    {MY_POSTS.map(p => (
                      <article key={p.id} className="bg-slate-900 border border-slate-800 rounded-2xl p-4 hover:border-slate-700 transition-colors">
                        {p.grad && <div className={`w-full h-40 rounded-xl mb-3 bg-gradient-to-br ${p.grad} flex items-center justify-center`} role="img" aria-label="Post image"><span className="text-white/20"><Ic.Img /></span></div>}
                        <p className="text-slate-100 text-sm leading-relaxed mb-3">{p.text}</p>
                        <div className="flex items-center gap-4 text-xs text-slate-400">
                          <button onClick={() => setLikedP(prev => ({ ...prev, [p.id]: !prev[p.id] }))}
                            className={`flex items-center gap-1 transition-colors ${likedP[p.id] ? 'text-rose-500' : 'hover:text-rose-400'}`}
                            aria-label={`${likedP[p.id]?'Unlike':'Like'} — ${p.likes} likes`} aria-pressed={!!likedP[p.id]}>
                            <Ic.Heart f={likedP[p.id]} />{fmt(p.likes + (likedP[p.id]?1:0))}
                          </button>
                          <button className="flex items-center gap-1 hover:text-violet-400 transition-colors" aria-label={`${p.comments} comments`}><Ic.Comment />{fmt(p.comments)}</button>
                          <span className="ml-auto text-slate-500">{p.time}</span>
                        </div>
                      </article>
                    ))}
                  </div>
                </section>
              )}
              {tab === 'replies' && (
                <section aria-label="Your replies">
                  <div className="text-center py-12">
                    <p className="text-slate-400 font-medium">No replies to show yet</p>
                    <p className="text-slate-500 text-sm mt-1">Your replies will appear here.</p>
                  </div>
                </section>
              )}
              {tab === 'media' && (
                <section aria-label="Your media posts">
                  <div className="grid grid-cols-3 gap-2">
                    {MEDIA_POSTS.map(p => (
                      <button key={p.id} className="aspect-square rounded-xl overflow-hidden relative group focus:ring-2 focus:ring-violet-500"
                        aria-label={`Media post: ${p.alt}. ${p.likes} likes`}>
                        <div className={`w-full h-full bg-gradient-to-br ${p.grad}`} role="img" aria-label={p.alt}></div>
                        <div className="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-colors flex items-center justify-center">
                          <span className="text-white/0 group-hover:text-white/90 flex items-center gap-1 text-xs font-bold transition-colors"><Ic.Heart f={true} />{fmt(p.likes)}</span>
                        </div>
                      </button>
                    ))}
                  </div>
                </section>
              )}
              {tab === 'likes' && (
                <section aria-label="Posts you've liked">
                  <div className="text-center py-12">
                    <p className="text-slate-400 font-medium">Liked posts are private</p>
                    <p className="text-slate-500 text-sm mt-1">Only you can see what you've liked.</p>
                  </div>
                </section>
              )}
            </div>
          </div>
        </main>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<ProfilePage />);
</script>
</body>
</html>
