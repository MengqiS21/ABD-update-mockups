            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
              {ts.map(t=>(
                <blockquote key={t.name} className="bg-gray-50 rounded-2xl p-8 border border-gray-100 hover:border-indigo-100 transition-colors">
                  <div className="flex gap-0.5 mb-5" aria-label={`${t.rating} out of 5 stars`}>
                    {Array(t.rating).fill(0).map((_,i)=><StarIcon key={i} cls="w-4 h-4 text-amber-400"/>)}
                  </div>
                  <p className="text-gray-700 leading-relaxed mb-6 italic text-sm">"{t.q}"</p>
                  <footer className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-bold text-sm shrink-0" aria-hidden="true">{t.initials}</div>
                    <div>
                      <cite className="font-semibold text-gray-900 not-italic text-sm block">{t.name}</cite>
                      <span className="text-xs text-gray-500">{t.role}</span>
                    </div>
                  </footer>
                </blockquote>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const CtaBanner = () => (
      <section className="py-20 bg-gradient-to-br from-indigo-700 to-purple-700 text-white" aria-labelledby="cta-heading">
        <div className="max-w-3xl mx-auto px-4 text-center">
          <h2 id="cta-heading" className="text-3xl md:text-4xl font-extrabold mb-4">Ready to accelerate your career?</h2>
          <p className="text-indigo-200 text-lg mb-10">Join millions of learners who chose LearnPath to build real-world skills that employers love.</p>
          <div className="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="#" className="inline-flex items-center justify-center bg-white text-indigo-700 font-bold px-8 py-4 rounded-xl hover:bg-indigo-50 transition-colors shadow-lg">
              Get Started Free <ArrowRightIcon />
            </a>
            <a href="courses.html" className="inline-flex items-center justify-center border-2 border-white/40 text-white font-bold px-8 py-4 rounded-xl hover:bg-white/10 transition-colors">
              Browse Courses
            </a>
          </div>
          <p className="text-indigo-300 text-sm mt-4">No credit card required · Cancel anytime</p>
        </div>
      </section>
    );

    /* ─── APP ────────────────────────────────────────────────── */
    const App = () => (
      <div className="min-h-screen flex flex-col">
        <Header current="index.html" />
        <main id="main-content" tabIndex="-1">
          <Hero />
          <Categories />
          <FeaturedCourses />
          <SocialProof />
          <HowItWorks />
          <Testimonials />
          <CtaBanner />
        </main>
        <Footer />
      </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
