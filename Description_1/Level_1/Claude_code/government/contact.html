const DEPT_OPTIONS = ['Select a department…', ...DEPARTMENTS.map(d => d.name), 'General Inquiry', 'Other'];

// ── Contact Form ──────────────────────────────────────────────
function ContactForm() {
  const [form, setForm]       = React.useState({ name: '', email: '', department: '', message: '' });
  const [errors, setErrors]   = React.useState({});
  const [submitted, setSubmit] = React.useState(false);

  const set = f => e => setForm(v => ({ ...v, [f]: e.target.value }));

  const validate = () => {
    const e = {};
    if (!form.name.trim())    e.name       = 'Name is required.';
    if (!form.email.trim())   e.email      = 'Email address is required.';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email.';
    if (!form.department || form.department === DEPT_OPTIONS[0]) e.department = 'Please select a department.';
    if (!form.message.trim()) e.message    = 'Message is required.';
    else if (form.message.trim().length < 10) e.message = 'Please provide a more detailed message.';
    return e;
  };

  const handleSubmit = e => {
    e.preventDefault();
    const e2 = validate();
    if (Object.keys(e2).length) {
      setErrors(e2);
      document.getElementById(`cf-${Object.keys(e2)[0]}`)?.focus();
      return;
    }
    setErrors({});
    setSubmit(true);
  };

  const inputCls = id =>
    `w-full px-4 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors ${
      errors[id] ? 'border-red-400 bg-red-50' : 'border-gray-300 bg-white hover:border-gray-400'
    }`;

  const Field = ({ id, label, required, children }) => (
    <div>
      <label htmlFor={`cf-${id}`} className="block text-sm font-semibold text-gray-700 mb-1.5">
        {label}{required && <span className="text-red-600 ml-1" aria-label="required">*</span>}
      </label>
      {children}
      {errors[id] && (
        <p role="alert" className="mt-1.5 text-sm text-red-600 flex items-center gap-1">
          <svg className="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
            <path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clipRule="evenodd" />
          </svg>
          {errors[id]}
        </p>
      )}
    </div>
  );

  if (submitted) {
    return (
      <div
        role="status"
        aria-live="polite"
        className="bg-green-50 border-2 border-green-300 rounded-2xl p-10 text-center"
      >
        <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-5" aria-hidden="true">
          <svg className="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h3 className="text-xl font-bold text-green-800 mb-2">Message Sent!</h3>
        <p className="text-green-700 text-sm mb-1">Thank you, <strong>{form.name}</strong>.</p>
        <p className="text-gray-600 text-sm">
          We've received your inquiry and will respond to <strong>{form.email}</strong> within 2 business days.
        </p>
        <button
          type="button"
          onClick={() => { setSubmit(false); setForm({ name: '', email: '', department: '', message: '' }); }}
          className="mt-6 px-6 py-2.5 bg-blue-700 text-white text-sm font-semibold rounded-xl hover:bg-blue-600 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
        >
          Send Another Message
        </button>
      </div>
    );
  }

  return (
    <form onSubmit={handleSubmit} noValidate aria-label="Contact inquiry form" className="space-y-6">
      <Field id="name" label="Full Name" required>
        <input
          id="cf-name"
          type="text"
          value={form.name}
          onChange={set('name')}
          autoComplete="name"
          aria-required="true"
          className={inputCls('name')}
        />
      </Field>
      <Field id="email" label="Email Address" required>
        <input
          id="cf-email"
          type="email"
          value={form.email}
          onChange={set('email')}
          autoComplete="email"
          aria-required="true"
          className={inputCls('email')}
        />
      </Field>
      <Field id="department" label="Department" required>
        <select
          id="cf-department"
          value={form.department}
          onChange={set('department')}
          aria-required="true"
          className={inputCls('department')}
        >
          {DEPT_OPTIONS.map(d => (
            <option key={d} value={d === DEPT_OPTIONS[0] ? '' : d}>{d}</option>
          ))}
        </select>
      </Field>
      <Field id="message" label="Message" required>
        <textarea
          id="cf-message"
          value={form.message}
          onChange={set('message')}
          rows={5}
          aria-required="true"
          placeholder="How can we help you? Please include relevant details such as addresses, permit numbers, or account numbers."
          className={`${inputCls('message')} resize-none`}
        />
        <p className="text-xs text-gray-400 mt-1 text-right">{form.message.length} characters</p>
      </Field>
      <button
        type="submit"
        className="w-full py-3 bg-blue-700 hover:bg-blue-600 text-white font-bold rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
      >
        Send Message
      </button>
      <p className="text-xs text-gray-500 text-center">
        For emergencies, always call <strong>911</strong>. For after-hours emergencies, call{' '}
        <a href="tel:3039877111" className="text-blue-600 hover:underline focus:outline-none focus:underline">(303) 987-7111</a>.
      </p>
    </form>
  );
}

        {[[10,60,20,15],[60,60,20,15],[10,15,20,15],[60,15,20,15],[10,40,15,10],[65,42,15,8]].map(([l,t,w,h], i) => (

      {/* Pin */}

        <div className="flex flex-col items-center">
          <div className="w-10 h-10 bg-blue-700 rounded-full border-4 border-white shadow-lg flex items-center justify-center">

      {/* Label */}
      <div className="absolute bottom-4 left-4 right-4 bg-white/95 backdrop-blur rounded-xl px-4 py-3 shadow-md">

        <a

          Open in Maps ↗

      </div>
    </div>
  );
}

// ── Page ─────────────────────────────────────────────────────

    <div className="min-h-screen flex flex-col">

      <main id="main-content" tabIndex={-1} className="flex-1 pb-16">

                    { icon: '𝕏',  label: 'X (Twitter)', handle: '@LakewoodGovCO',      href: '#' },
                    { icon: '◎',  label: 'Instagram',   handle: '@LakewoodColorado',   href: '#' },
                    { icon: '▶',  label: 'YouTube',     handle: 'City of Lakewood CO', href: '#' },

                    <a

            {/* Right: Department Directory + Map */}

              {/* Map */}
              <section aria-labelledby="map-heading">

                        <div className="flex flex-wrap gap-3 text-sm sm:text-right sm:flex-col sm:gap-1 sm:flex-shrink-0">

                            href={`tel:${dept.phone.replace(/[^\d]/g, '')}`}

                          >
                            {dept.email}
                          </a>
                          {dept.emergency && (

                          )}

                    ))}

                )}

            </div>
          </div>
        </div>

      </main>
      <CityFooter />
    </div>

}

ReactDOM.createRoot(document.getElementById('root')).render(<ContactPage />);
</script>
