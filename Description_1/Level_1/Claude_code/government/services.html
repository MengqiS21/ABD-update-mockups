<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="City of Lakewood services — utilities, permits, public safety, transportation, parks, and social services." />
  <title>Services — City of Lakewood, CO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { 'lk-navy': '#0d2340', 'lk-blue': '#1a3a6b', 'lk-brand': '#1a56db' } } }
    }
  </script>
  <style>
    :focus-visible { outline: 3px solid #3b82f6; outline-offset: 2px; }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="components.js"></script>

<script type="text/babel">

const CATEGORIES = [
  {
    id: 'utilities',
    icon: '💧',
    color: 'blue',
    title: 'Utilities & Billing',
    description: 'Manage your water, sewer, solid waste, and stormwater utility accounts.',
    services: [
      { label: 'Pay Water/Sewer Bill',    href: 'pay-bill.html', featured: true },
      { label: 'Start or Stop Service',   href: '#' },
      { label: 'Report Water Leak',        href: '#' },
      { label: 'Billing Assistance',       href: '#' },
      { label: 'Recycling & Trash',        href: '#' },
      { label: 'View Usage History',       href: '#' },
    ],
  },
  {
    id: 'permits',
    icon: '📋',
    color: 'amber',
    title: 'Permits & Licenses',
    description: 'Apply for building permits, business licenses, and special event authorizations.',
    services: [
      { label: 'Building Permit',          href: 'permits.html', featured: true },
      { label: 'Business License',         href: '#' },
      { label: 'Contractor License',       href: '#' },
      { label: 'Special Event Permit',     href: '#' },
      { label: 'Right-of-Way Permit',      href: '#' },
      { label: 'Sign Permit',              href: '#' },
    ],
  },
  {
    id: 'safety',
    icon: '🚒',
    color: 'red',
    title: 'Public Safety',
    description: 'Access police, fire, and emergency services, plus community safety resources.',
    services: [
      { label: 'Police Non-Emergency',     href: '#' },
      { label: 'Fire Prevention',          href: '#' },
      { label: 'Report a Crime',           href: '#' },
      { label: 'Emergency Preparedness',   href: '#' },
      { label: 'Community Watch',          href: '#' },
      { label: 'Traffic Safety',           href: '#' },
    ],
  },
  {
    id: 'transportation',
    icon: '🚌',
    color: 'indigo',
    title: 'Transportation',
    description: 'Roads, transit, parking, street lighting, and pedestrian infrastructure.',
    services: [
      { label: 'Report a Pothole',         href: '#', featured: true },
      { label: 'Street Sweeping Schedule', href: '#' },
      { label: 'Parking Permits',          href: '#' },
      { label: 'Transit Routes (RTD)',     href: '#' },
      { label: 'Bike & Pedestrian Trails', href: '#' },
      { label: 'Street Light Outage',      href: '#' },
    ],
  },
  {
    id: 'parks',
    icon: '🌳',
    color: 'green',
    title: 'Parks & Recreation',
    description: 'Parks, trails, recreation centers, sports facilities, and community programs.',
    services: [
      { label: 'Park Finder & Hours',      href: '#', featured: true },
      { label: 'Reserve a Facility',       href: '#' },
      { label: 'Recreation Programs',      href: '#' },
      { label: 'Pool & Aquatics',          href: '#' },
      { label: 'Senior Programs',          href: '#' },
      { label: 'Volunteer Opportunities',  href: '#' },
    ],
  },
  {
    id: 'social',
    icon: '🤝',
    color: 'purple',
    title: 'Social Services',
    description: 'Housing assistance, food resources, mental health support, and community programs.',
    services: [
      { label: 'Housing Assistance',       href: '#', featured: true },
      { label: 'Food Pantries',            href: '#' },
      { label: 'Mental Health Resources',  href: '#' },
      { label: 'Senior Services',          href: '#' },
      { label: 'Youth Programs',           href: '#' },
      { label: 'Disability Services',      href: '#' },
    ],
  },
];

const COLOR_MAP = {
  blue:   { bg: 'bg-blue-50',   border: 'border-blue-200',   icon: 'bg-blue-100 text-blue-700',   badge: 'bg-blue-100 text-blue-800',   btn: 'text-blue-700 hover:text-blue-900', featured: 'bg-blue-700 text-white hover:bg-blue-600' },
  amber:  { bg: 'bg-amber-50',  border: 'border-amber-200',  icon: 'bg-amber-100 text-amber-700', badge: 'bg-amber-100 text-amber-800', btn: 'text-amber-700 hover:text-amber-900', featured: 'bg-amber-600 text-white hover:bg-amber-500' },
  red:    { bg: 'bg-red-50',    border: 'border-red-200',    icon: 'bg-red-100 text-red-700',     badge: 'bg-red-100 text-red-800',     btn: 'text-red-700 hover:text-red-900',   featured: 'bg-red-700 text-white hover:bg-red-600' },
  indigo: { bg: 'bg-indigo-50', border: 'border-indigo-200', icon: 'bg-indigo-100 text-indigo-700', badge: 'bg-indigo-100 text-indigo-800', btn: 'text-indigo-700 hover:text-indigo-900', featured: 'bg-indigo-700 text-white hover:bg-indigo-600' },
  green:  { bg: 'bg-green-50',  border: 'border-green-200',  icon: 'bg-green-100 text-green-700', badge: 'bg-green-100 text-green-800', btn: 'text-green-700 hover:text-green-900', featured: 'bg-green-700 text-white hover:bg-green-600' },
  purple: { bg: 'bg-purple-50', border: 'border-purple-200', icon: 'bg-purple-100 text-purple-700', badge: 'bg-purple-100 text-purple-800', btn: 'text-purple-700 hover:text-purple-900', featured: 'bg-purple-700 text-white hover:bg-purple-600' },
};

function ServiceCard({ category }) {
  const c = COLOR_MAP[category.color];
  return (
    <article
      id={category.id}
      className={`bg-white rounded-2xl border-2 ${c.border} shadow-sm hover:shadow-md transition-shadow overflow-hidden flex flex-col`}
      aria-labelledby={`cat-${category.id}-title`}
    >
      <div className={`${c.bg} px-6 py-5 border-b ${c.border}`}>
        <div className="flex items-start gap-4">
          <div className={`w-12 h-12 rounded-xl ${c.icon} flex items-center justify-center text-2xl flex-shrink-0`} aria-hidden="true">
            {category.icon}
          </div>
          <div>
            <h2 id={`cat-${category.id}-title`} className="text-lg font-bold text-gray-900">{category.title}</h2>
            <p className="text-sm text-gray-600 mt-1 leading-snug">{category.description}</p>
          </div>
        </div>
      </div>

      <ul className="divide-y divide-gray-100 flex-1" role="list">
        {category.services.map(svc => (
          <li key={svc.label}>
            <a
              href={svc.href}
              className={`flex items-center justify-between px-6 py-3 text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-400 group
                ${svc.featured ? 'font-semibold' : 'text-gray-700 hover:bg-gray-50'}`}
            >
              <span className={svc.featured ? `${c.btn} font-semibold` : 'group-hover:text-gray-900'}>{svc.label}</span>
              <span className="flex items-center gap-2">
                {svc.featured && (
                  <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${c.badge}`}>Popular</span>
                )}
                <svg className="w-4 h-4 text-gray-400 group-hover:text-gray-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                </svg>
              </span>
            </a>
          </li>
        ))}
      </ul>

      <div className={`px-6 py-4 ${c.bg} border-t ${c.border}`}>
        <a
          href={`#${category.id}`}
          className={`text-sm font-semibold ${c.btn} hover:underline focus:outline-none focus:underline`}
          aria-label={`View all ${category.title} services`}
        >
          View all {category.title} services →
        </a>
      </div>
    </article>
  );
}

function ServicesPage() {
  const [searchQuery, setSearchQuery] = React.useState('');

  const allServices = CATEGORIES.flatMap(cat =>
    cat.services.map(svc => ({ ...svc, category: cat.title }))
  );

  const filtered = searchQuery.trim()
    ? allServices.filter(s =>
        s.label.toLowerCase().includes(searchQuery.toLowerCase()) ||
        s.category.toLowerCase().includes(searchQuery.toLowerCase())
      )
    : null;

  return (
    <div className="min-h-screen flex flex-col">
      <CityHeader currentPage="services" />

      <main id="main-content" tabIndex={-1} className="flex-1 pb-16">

        {/* Page header */}
        <div className="bg-gradient-to-r from-[#0d2340] to-[#1a3a6b] text-white py-14 px-4">
          <div className="max-w-7xl mx-auto">
            <nav aria-label="Breadcrumb" className="mb-4">
              <ol className="flex items-center gap-2 text-sm text-blue-300" role="list">
                <li><a href="index.html" className="hover:text-white focus:text-white focus:outline-none hover:underline">Home</a></li>
                <li aria-hidden="true"><span className="text-blue-500">›</span></li>
                <li><span className="text-white font-medium" aria-current="page">Services</span></li>
              </ol>
            </nav>
            <h1 className="text-4xl font-bold mb-3">City Services</h1>
            <p className="text-blue-200 text-lg max-w-2xl">
              All the services Lakewood provides — organized by category for easy access.
            </p>

            {/* Search */}
            <form
              role="search"
              aria-label="Search services"
              onSubmit={e => e.preventDefault()}
              className="mt-8 flex gap-3 max-w-xl"
            >
              <label htmlFor="service-search" className="sr-only">Search services</label>
              <input
                id="service-search"
                type="search"
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
                placeholder="Search services…"
                className="flex-1 px-4 py-2.5 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400"
              />
              <button
                type="submit"
                className="px-6 py-2.5 bg-amber-500 hover:bg-amber-400 focus:bg-amber-400 text-white font-semibold rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-amber-300"
              >
                Search
              </button>
            </form>
          </div>
        </div>

        {/* Jump links */}
        <nav aria-label="Jump to service category" className="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <ul className="flex overflow-x-auto gap-1 py-2.5 scrollbar-hide" role="list">
              {CATEGORIES.map(cat => (
                <li key={cat.id} className="flex-shrink-0">
                  <a
                    href={`#${cat.id}`}
                    className="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-gray-700 rounded-lg hover:bg-gray-100 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-colors whitespace-nowrap"
                  >
                    <span aria-hidden="true">{cat.icon}</span>
                    {cat.title}
                  </a>
                </li>
              ))}
            </ul>
          </div>
        </nav>

        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10">

          {/* Search results */}
          {filtered && (
            <div className="mb-10">
              <h2 className="text-lg font-bold text-gray-900 mb-4">
                {filtered.length > 0
                  ? `${filtered.length} result${filtered.length !== 1 ? 's' : ''} for "${searchQuery}"`
                  : `No results for "${searchQuery}"`}
              </h2>
              {filtered.length > 0 && (
                <ul className="bg-white rounded-2xl border border-gray-100 divide-y overflow-hidden shadow-sm" role="list">
                  {filtered.map(svc => (
                    <li key={svc.label}>
                      <a
                        href={svc.href}
                        className="flex items-center justify-between px-6 py-3.5 text-sm hover:bg-blue-50 focus:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-400 transition-colors group"
                      >
                        <span>
                          <span className="font-semibold text-gray-900 group-hover:text-blue-800">{svc.label}</span>
                          <span className="ml-2 text-xs text-gray-500">{svc.category}</span>
                        </span>
                        <svg className="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                        </svg>
                      </a>
                    </li>
                  ))}
                </ul>
              )}
              <button
                type="button"
                className="mt-4 text-sm text-blue-700 font-semibold hover:underline focus:outline-none focus:underline"
                onClick={() => setSearchQuery('')}
              >
                ← Clear search, show all categories
              </button>
            </div>
          )}

          {/* Category grid */}
          {!filtered && (
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
              {CATEGORIES.map(cat => (
                <ServiceCard key={cat.id} category={cat} />
              ))}
            </div>
          )}
        </div>

        {/* Help banner */}
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-16">
          <div className="bg-blue-50 border border-blue-200 rounded-2xl px-8 py-8 flex flex-col sm:flex-row items-center justify-between gap-6">
            <div>
              <h2 className="font-bold text-gray-900 text-lg mb-1">Can't find what you're looking for?</h2>
              <p className="text-gray-600 text-sm">Our customer service team is ready to help Monday–Friday, 8 am–5 pm.</p>
            </div>
            <div className="flex flex-col sm:flex-row gap-3 flex-shrink-0">
              <a href="contact.html" className="px-6 py-2.5 bg-blue-700 text-white font-semibold rounded-xl hover:bg-blue-600 focus:bg-blue-600 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 text-center text-sm">
                Contact Us
              </a>
              <a href="tel:3039877000" className="px-6 py-2.5 bg-white border border-blue-300 text-blue-700 font-semibold rounded-xl hover:bg-blue-50 focus:bg-blue-50 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-400 text-center text-sm">
                Call (303) 987-7000
              </a>
            </div>
          </div>
        </div>

      </main>
      <CityFooter />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ServicesPage />);
</script>
</body>
</html>
