<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World News — The Meridian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
            body: ['"Source Serif 4"', 'Georgia', 'serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #be123c;
      color: white;
      padding: 8px 16px;
      font-family: Inter, sans-serif;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      border-radius: 0 0 4px 0;
      transition: top 0.15s;
    }
    .skip-link:focus {
      top: 0;
    }
    @keyframes ticker-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .ticker-track {
      display: flex;
      animation: ticker-scroll 30s linear infinite;
      width: max-content;
    }
    @media (prefers-reduced-motion: reduce) {
      .ticker-track { animation: none; }
    }
  </style>
</head>
<body class="bg-gray-50 font-sans">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const NAV_LINKS = [
      { href: 'index.html', label: 'Home' },
      { href: 'world.html', label: 'World' },
      { href: '#', label: 'Politics' },
      { href: '#', label: 'Technology' },
      { href: '#', label: 'Culture' },
      { href: 'opinion.html', label: 'Opinion' },
    ];

    function MeridianHeader({ currentPage }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const [searchOpen, setSearchOpen] = useState(false);
      const searchInputRef = useRef(null);

      useEffect(() => {
        if (searchOpen && searchInputRef.current) {
          searchInputRef.current.focus();
        }
      }, [searchOpen]);

      return (
        <header role="banner" className="bg-slate-900 text-white sticky top-0 z-50 shadow-lg">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16">
              <div className="flex items-center gap-8">
                <a href="index.html" className="font-serif font-black text-2xl tracking-widest text-white hover:text-rose-400 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded" aria-label="The Meridian — Home">
                  THE MERIDIAN
                </a>
                <nav aria-label="Primary navigation" className="hidden lg:flex items-center gap-1">
                  {NAV_LINKS.map(link => (
                    <a
                      key={link.label}
                      href={link.href}
                      aria-current={currentPage === link.label ? 'page' : undefined}
                      className={`px-3 py-2 text-sm font-medium rounded transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 ${
                        currentPage === link.label
                          ? 'text-rose-400 border-b-2 border-rose-400'
                          : 'text-slate-300 hover:text-white hover:bg-slate-800'
                      }`}
                    >
                      {link.label}
                    </a>
                  ))}
                </nav>
              </div>
              <div className="flex items-center gap-2">
                {searchOpen && (
                  <div className="hidden sm:flex items-center bg-slate-800 rounded-full px-3 py-1">
                    <label htmlFor="header-search" className="sr-only">Search The Meridian</label>
                    <input
                      id="header-search"
                      ref={searchInputRef}
                      type="search"
                      placeholder="Search stories…"
                      className="bg-transparent text-white placeholder-slate-400 text-sm outline-none w-48 focus-visible:outline-none"
                    />
                  </div>
                )}
                <button
                  onClick={() => setSearchOpen(!searchOpen)}
                  aria-label={searchOpen ? 'Close search' : 'Open search'}
                  aria-expanded={searchOpen}
                  className="p-2 rounded text-slate-300 hover:text-white hover:bg-slate-800 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500"
                >
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                  </svg>
                </button>
                <a
                  href="subscription.html"
                  className="hidden sm:inline-flex items-center px-4 py-2 bg-rose-700 hover:bg-rose-600 text-white text-sm font-semibold rounded transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500"
                >
                  Subscribe
                </a>
                <button
                  onClick={() => setMenuOpen(!menuOpen)}
                  aria-label={menuOpen ? 'Close menu' : 'Open menu'}
                  aria-expanded={menuOpen}
                  aria-controls="mobile-menu"
                  className="lg:hidden p-2 rounded text-slate-300 hover:text-white hover:bg-slate-800 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500"
                >
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    {menuOpen
                      ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                      : <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                    }
                  </svg>
                </button>
              </div>
            </div>
          </div>
          {menuOpen && (
            <nav id="mobile-menu" aria-label="Mobile navigation" className="lg:hidden bg-slate-800 border-t border-slate-700">
              <div className="px-4 py-3 space-y-1">
                {NAV_LINKS.map(link => (
                  <a
                    key={link.label}
                    href={link.href}
                    aria-current={currentPage === link.label ? 'page' : undefined}
                    className={`block px-3 py-2 text-sm font-medium rounded transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 ${
                      currentPage === link.label
                        ? 'text-rose-400 bg-slate-700'
                        : 'text-slate-300 hover:text-white hover:bg-slate-700'
                    }`}
                  >
                    {link.label}
                  </a>
                ))}
                <a href="subscription.html" className="block px-3 py-2 text-sm font-semibold text-rose-400 hover:text-rose-300 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">
                  Subscribe →
                </a>
              </div>
            </nav>
          )}
        </header>
      );
    }

    function BreakingTicker() {
      const items = [
        "Houthi drone strike targets tanker in Gulf of Aden — third attack this week",
        "European Parliament reaches landmark AI governance agreement after marathon session",
        "Federal Reserve signals potential rate cut as inflation data surprises to downside",
        "Taiwan Strait tensions rise after PLA naval exercises near contested islands",
        "UN Security Council emergency meeting called over escalating Sahel violence",
        "Nobel laureate calls for immediate ceasefire in speech to Security Council",
      ];
      const doubled = [...items, ...items];

      return (
        <div className="bg-rose-700 text-white overflow-hidden py-2" role="region" aria-label="Breaking news ticker">
          <div className="flex items-center">
            <span className="flex-shrink-0 bg-white text-rose-700 text-xs font-black px-3 py-1 rounded ml-4 mr-4 uppercase tracking-wider" aria-hidden="true">
              BREAKING
            </span>
            <div className="overflow-hidden flex-1" aria-hidden="true">
              <div className="ticker-track">
                {doubled.map((item, i) => (
                  <span key={i} className="text-sm font-medium mr-16 whitespace-nowrap">{item}</span>
                ))}
              </div>
            </div>
          </div>
          <ul className="sr-only" aria-label="Breaking news items">
            {items.map((item, i) => <li key={i}>{item}</li>)}
          </ul>
        </div>
      );
    }

    function MeridianFooter() {
      const [email, setEmail] = useState('');
      const [submitted, setSubmitted] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (email) setSubmitted(true);
      };

      return (
        <footer role="contentinfo" className="bg-slate-900 text-white mt-16">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div className="grid grid-cols-1 lg:grid-cols-5 gap-10 pb-10 border-b border-slate-700">
              <div className="lg:col-span-2">
                <a href="index.html" className="font-serif font-black text-2xl tracking-widest text-white hover:text-rose-400 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">
                  THE MERIDIAN
                </a>
                <p className="mt-3 text-slate-400 text-sm leading-relaxed font-body">
                  Independent global journalism since 2008. We report without fear or favor, funded by readers who believe in the power of a free press.
                </p>
                <form onSubmit={handleSubmit} className="mt-5" aria-label="Newsletter signup">
                  <p className="text-sm font-semibold text-white mb-2">Get our Daily Brief newsletter</p>
                  {submitted ? (
                    <p className="text-rose-400 text-sm font-medium">Thanks! You're subscribed.</p>
                  ) : (
                    <div className="flex gap-2">
                      <label htmlFor="footer-email" className="sr-only">Your email address</label>
                      <input
                        id="footer-email"
                        type="email"
                        value={email}
                        onChange={e => setEmail(e.target.value)}
                        placeholder="your@email.com"
                        required
                        className="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-white placeholder-slate-500 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500"
                      />
                      <button type="submit" className="px-4 py-2 bg-rose-700 hover:bg-rose-600 text-white text-sm font-semibold rounded transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500">
                        Subscribe
                      </button>
                    </div>
                  )}
                </form>
              </div>
              <div>
                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">Sections</h3>
                <ul className="space-y-2">
                  {['World', 'Politics', 'Technology', 'Culture', 'Opinion', 'Science', 'Economy', 'Health'].map(s => (
                    <li key={s}><a href="#" className="text-slate-400 hover:text-white text-sm transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">{s}</a></li>
                  ))}
                </ul>
              </div>
              <div>
                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">Company</h3>
                <ul className="space-y-2">
                  {['About Us', 'Careers', 'Press', 'Advertise', 'Contact', 'Ethics Policy', 'Privacy Policy', 'Terms of Use'].map(s => (
                    <li key={s}><a href="#" className="text-slate-400 hover:text-white text-sm transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">{s}</a></li>
                  ))}
                </ul>
              </div>
              <div>
                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">Readers</h3>
                <ul className="space-y-2 mb-6">
                  {['Subscribe', 'Sign In', 'Newsletters', 'App — iOS', 'App — Android', 'Audio Edition', 'Gift a Subscription', 'Student Discount'].map(s => (
                    <li key={s}><a href={s === 'Subscribe' ? 'subscription.html' : '#'} className="text-slate-400 hover:text-white text-sm transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">{s}</a></li>
                  ))}
                </ul>
                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">Follow Us</h3>
                <div className="flex gap-3">
                  {['Twitter/X', 'Instagram', 'Facebook', 'YouTube'].map(s => (
                    <a key={s} href="#" aria-label={`Follow The Meridian on ${s}`} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded flex items-center justify-center transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500">
                      <span className="text-xs text-slate-400" aria-hidden="true">{s[0]}</span>
                    </a>
                  ))}
                </div>
              </div>
            </div>
            <div className="pt-6 flex flex-col sm:flex-row items-center justify-between gap-3">
              <p className="text-slate-500 text-xs">© 2026 The Meridian Media Group. All rights reserved.</p>
              <p className="text-slate-600 text-xs">Independent. Accountable. Essential.</p>
            </div>
          </div>
        </footer>
      );
    }

    const FILTERS = ['All', 'Asia', 'Europe', 'Americas', 'Middle East', 'Africa'];

    const WORLD_ARTICLES = [
      {
        seed: 'eumigration',
        alt: 'Migrants arriving on a Mediterranean shore, with aid workers and coast guard vessels visible',
        category: 'Europe',
        title: "EU Migration Pact Faces Crisis as Mediterranean Crossings Hit Record High",
        author: 'Ingrid Halvorsen',
        date: 'March 14, 2026',
        readTime: '8 min read',
      },
      {
        seed: 'southkorea',
        alt: 'Protesters gathered outside the South Korean National Assembly building in Seoul at night',
        category: 'Asia',
        title: "South Korea's Constitutional Earthquake: The President Who Refused to Leave",
        author: 'Ji-won Park',
        date: 'March 13, 2026',
        readTime: '10 min read',
      },
      {
        seed: 'nile',
        alt: 'Aerial view of the Grand Ethiopian Renaissance Dam on the Blue Nile river',
        category: 'Africa',
        title: "Water Wars: The Grand Ethiopian Renaissance Dam and Africa's Most Dangerous Dispute",
        author: 'Daniel Abebe',
        date: 'March 12, 2026',
        readTime: '11 min read',
      },
      {
        seed: 'nato',
        alt: 'NATO military vehicles and soldiers on parade in a Baltic state capital',
        category: 'Europe',
        title: "NATO's Eastern Fortress: Inside the $40 Billion Military Buildup Along Russia's Border",
        author: 'Hans Berger',
        date: 'March 11, 2026',
        readTime: '9 min read',
      },
      {
        seed: 'taiwan',
        alt: 'TSMC semiconductor fabrication facility in Hsinchu Science Park, Taiwan',
        category: 'Asia',
        title: "Taiwan's Semiconductor Supremacy: The Island That Controls the World's Most Critical Industry",
        author: 'Li Wei',
        date: 'March 10, 2026',
        readTime: '13 min read',
      },
      {
        seed: 'sahel',
        alt: 'Military soldiers in formation in a West African capital city plaza',
        category: 'Africa',
        title: "The Sahel Coup Belt: Why Military Takeovers Keep Succeeding in West Africa",
        author: 'Amara Diallo',
        date: 'March 9, 2026',
        readTime: '10 min read',
      },
      {
        seed: 'argentina',
        alt: 'Buenos Aires financial district with protesters holding signs on the street below',
        category: 'Americas',
        title: "Argentina's Radical Experiment: Six Months Into the Milei Revolution",
        author: 'Rosa Fernandez',
        date: 'March 8, 2026',
        readTime: '12 min read',
      },
      {
        seed: 'iran',
        alt: 'Iranian nuclear facility under satellite surveillance with UN inspectors vehicles parked outside',
        category: 'Middle East',
        title: "Iran's Nuclear Shadow: The Talks That Keep Failing and the Bomb That Keeps Getting Closer",
        author: 'Yasmin Rashidi',
        date: 'March 7, 2026',
        readTime: '14 min read',
      },
    ];

    const EDITORS_PICKS = [
      {
        seed: 'ukrainewar',
        alt: 'Ukrainian soldiers in a trench at dawn along the eastern front line',
        title: "Two Years of Attrition: What the Ukraine War Has Taught the World About Modern Conflict",
        author: 'Marcus Webb',
        readTime: '18 min read',
        label: "LONG READ",
      },
      {
        seed: 'climatecoast',
        alt: 'Flooded coastal village in Bangladesh with residents wading through water',
        title: "The Drowning Lands: Climate Migration and the Billion People Who Have No Plan B",
        author: 'Sofia Bernardi',
        readTime: '20 min read',
        label: "INVESTIGATION",
      },
      {
        seed: 'chinatech',
        alt: 'Chinese technology workers in a large AI research center in Shenzhen',
        title: "Inside China's AI Superstate: How Beijing Is Using Technology to Reshape Geopolitics",
        author: 'Li Wei',
        readTime: '16 min read',
        label: "FEATURE",
      },
    ];

    function App() {
      const [activeFilter, setActiveFilter] = useState('All');

      const filteredArticles = activeFilter === 'All'
        ? WORLD_ARTICLES
        : WORLD_ARTICLES.filter(a => a.category === activeFilter);

      return (
        <div>
          <MeridianHeader currentPage="World" />
          <BreakingTicker />
          <main id="main-content">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              {/* Category Header */}
              <div className="py-10 border-b border-gray-200">
                <p className="text-xs font-bold text-rose-700 uppercase tracking-widest mb-2">Section</p>
                <h1 className="font-serif font-black text-5xl text-slate-900 mb-3">World</h1>
                <p className="text-slate-500 font-body text-lg max-w-2xl">
                  Reporting from every corner of the globe — conflicts, diplomacy, and the forces reshaping our world.
                </p>
              </div>

              {/* Filter Bar */}
              <div className="py-5 border-b border-gray-200 overflow-x-auto">
                <div
                  role="radiogroup"
                  aria-label="Filter world news by region"
                  className="flex gap-2 min-w-max"
                >
                  {FILTERS.map(filter => (
                    <button
                      key={filter}
                      role="radio"
                      aria-pressed={activeFilter === filter}
                      aria-checked={activeFilter === filter}
                      onClick={() => setActiveFilter(filter)}
                      className={`px-4 py-2 text-sm font-medium rounded-full border transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 ${
                        activeFilter === filter
                          ? 'bg-slate-900 text-white border-slate-900'
                          : 'bg-white border-gray-300 text-gray-700 hover:bg-gray-50'
                      }`}
                    >
                      {filter}
                    </button>
                  ))}
                </div>
              </div>

              {/* Lead Story */}
              <section aria-labelledby="lead-story-heading" className="py-10 border-b border-gray-200">
                <article className="flex flex-col lg:flex-row gap-8 items-start">
                  <a href="article.html" className="block lg:w-1/2 overflow-hidden rounded-xl focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 flex-shrink-0">
                    <img
                      src="https://picsum.photos/seed/redsea/800/500"
                      alt="Container ships navigating through the Red Sea with military escort vessels in the background"
                      className="w-full h-72 lg:h-96 object-cover hover:scale-105 transition-transform duration-300"
                    />
                  </a>
                  <div className="lg:w-1/2 flex flex-col justify-center">
                    <span className="inline-block bg-rose-100 text-rose-700 text-xs font-black uppercase tracking-widest px-3 py-1 rounded mb-4 w-fit">Red Sea Crisis</span>
                    <h2 id="lead-story-heading" className="font-serif font-black text-3xl lg:text-4xl text-slate-900 leading-tight mb-4">
                      <a href="article.html" className="hover:text-rose-700 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">
                        The Shipping Lanes Under Siege: Inside the Houthi Campaign That Is Rewriting Global Trade
                      </a>
                    </h2>
                    <p className="text-slate-600 font-body text-lg leading-relaxed mb-5">
                      Drone attacks on commercial vessels have forced major carriers to reroute around the Cape of Good Hope, adding thousands of miles and weeks of delay to global supply chains.
                    </p>
                    <p className="text-sm text-slate-500 mb-2">
                      By <span className="font-semibold text-slate-700">Amir Khalil</span>, Middle East Correspondent
                    </p>
                    <p className="text-sm text-slate-400">March 15, 2026 · 12 min read</p>
                  </div>
                </article>
              </section>

              {/* Story Grid */}
              <section aria-labelledby="story-grid-heading" className="py-10">
                <h2 id="story-grid-heading" className="sr-only">World News Stories</h2>
                {filteredArticles.length === 0 ? (
                  <p className="text-slate-500 py-10 text-center font-body">No stories found for this region. Try another filter.</p>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                    {filteredArticles.map((article, i) => (
                      <article key={i} className="group flex flex-col">
                        <a href="#" className="block overflow-hidden rounded-lg mb-4 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500">
                          <img
                            src={`https://picsum.photos/seed/${article.seed}/400/260`}
                            alt={article.alt}
                            loading="lazy"
                            className="w-full h-44 object-cover group-hover:scale-105 transition-transform duration-300"
                          />
                        </a>
                        <span className="text-xs font-bold text-rose-700 uppercase tracking-wider mb-1">{article.category}</span>
                        <h3 className="font-serif font-bold text-slate-900 text-lg leading-snug mb-2 flex-1">
                          <a href="#" className="hover:text-rose-700 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">
                            {article.title}
                          </a>
                        </h3>
                        <div className="text-xs text-slate-500 mt-auto pt-2 flex items-center gap-2">
                          <span>By {article.author}</span>
                          <span aria-hidden="true">·</span>
                          <time dateTime={article.date}>{article.date}</time>
                          <span aria-hidden="true">·</span>
                          <span>{article.readTime}</span>
                        </div>
                      </article>
                    ))}
                  </div>
                )}
              </section>

              {/* Editors' Picks Strip */}
              <section aria-labelledby="editors-picks-heading" className="py-10 border-t border-gray-200">
                <div className="flex items-center justify-between mb-6">
                  <h2 id="editors-picks-heading" className="font-serif font-bold text-2xl text-slate-900">
                    Editors' Picks
                  </h2>
                  <span className="text-sm text-slate-500 font-body italic">Long reads &amp; investigations</span>
                </div>
                <div className="flex gap-6 overflow-x-auto pb-4 snap-x snap-mandatory">
                  {EDITORS_PICKS.map((pick, i) => (
                    <article key={i} className="flex-shrink-0 w-72 snap-start group">
                      <a href="#" className="block overflow-hidden rounded-xl mb-3 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500">
                        <img
                          src={`https://picsum.photos/seed/${pick.seed}/400/260`}
                          alt={pick.alt}
                          loading="lazy"
                          className="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300"
                        />
                      </a>
                      <span className="text-xs font-black text-rose-700 uppercase tracking-widest">{pick.label}</span>
                      <h3 className="font-serif font-bold text-slate-900 mt-1 mb-2 leading-snug">
                        <a href="#" className="hover:text-rose-700 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 rounded">
                          {pick.title}
                        </a>
                      </h3>
                      <p className="text-xs text-slate-500">By {pick.author} · {pick.readTime}</p>
                    </article>
                  ))}
                </div>
              </section>
            </div>
          </main>
          <MeridianFooter />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
