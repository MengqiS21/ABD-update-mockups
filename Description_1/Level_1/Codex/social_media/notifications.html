<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse | Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['"Manrope"', "sans-serif"] }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="pulse-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { useState } = React;
      const { Layout, notifications } = window.PulseShared;

      function App() {
        const [activeTab, setActiveTab] = useState("All");
        const tabs = ["All", "Mentions", "Likes", "Follows"];
        const visible = activeTab === "All" ? notifications : notifications.filter((item) => item.category === activeTab);

        return (
          <Layout activePath="notifications.html">
            <main id="main-content" className="mt-6">
              <section className="card-surface rounded-[1.75rem] p-6">
                <h1 className="text-3xl font-extrabold tracking-tight text-slate-950">Notifications</h1>
                <div className="mt-5 flex flex-wrap gap-2" role="tablist" aria-label="Notification categories">
                  {tabs.map((tab) => (
                    <button
                      key={tab}
                      type="button"
                      role="tab"
                      aria-selected={activeTab === tab}
                      onClick={() => setActiveTab(tab)}
                      className="tab-button rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-900"
                    >
                      {tab}
                    </button>
                  ))}
                </div>
                <div className="mt-6 space-y-4">
                  {visible.map((item, index) => (
                    <article key={item.name + item.time + index} className="notification-card rounded-[1.5rem] border border-slate-200 bg-white p-5 shadow-sm transition">
                      <div className="flex gap-4">
                        <img src={item.avatar} alt={item.alt} className="h-12 w-12 rounded-full object-cover" />
                        <div className="min-w-0">
                          <p className="text-sm text-slate-700">
                            <span className="font-bold text-slate-950">{item.name}</span> {item.action} · {item.time}
                          </p>
                          <p className="mt-2 rounded-2xl bg-slate-50 px-4 py-3 text-sm leading-7 text-slate-600">
                            {item.snippet}
                          </p>
                        </div>
                      </div>
                    </article>
                  ))}
                </div>
              </section>
            </main>
          </Layout>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
