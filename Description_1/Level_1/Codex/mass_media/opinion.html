<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Meridian | Opinion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', "sans-serif"],
              serif: ['"Source Serif 4"', "serif"]
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="news-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { Header, Footer, opinionWriters } = window.MeridianShared;

      const pieces = [
        "The problem with treating stability as a communications strategy",
        "Why local journalism cannot be rebuilt with one-time philanthropy",
        "A better climate politics starts with public works, not slogans",
        "Culture coverage is too timid about money and power"
      ];

      function App() {
        return (
          <>
            <a href="#main-content" className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0">
              Skip to main content
            </a>
            <Header activePath="opinion.html" />
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <section className="page-surface rounded-[2rem] p-8">
                <p className="text-sm font-semibold uppercase tracking-[0.2em] text-red-800">Opinion</p>
                <h1 className="mt-3 text-5xl font-bold text-slate-950">Arguments, essays, and letters</h1>
              </section>

              <section className="mt-8 grid gap-8 xl:grid-cols-[minmax(0,1fr)_320px]">
                <article className="page-surface rounded-[2rem] p-8">
                  <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Featured essay</p>
                  <h2 className="mt-3 text-5xl font-bold leading-tight text-slate-950">
                    The politics of “normal” are collapsing under the weight of permanent emergency
                  </h2>
                  <div className="mt-6 flex items-center gap-4">
                    <img src={opinionWriters[0].avatar} alt={opinionWriters[0].alt} className="h-14 w-14 rounded-full object-cover" />
                    <div>
                      <p className="text-lg font-bold text-slate-950">{opinionWriters[0].name}</p>
                      <p className="text-sm text-slate-600">{opinionWriters[0].role}</p>
                    </div>
                  </div>
                  <p className="mt-6 text-lg leading-8 text-slate-700">
                    Leaders keep promising a return to equilibrium while governing through overlapping crises. That mismatch is eroding public trust faster than any single scandal.
                  </p>
                  <a href="article.html" className="mt-6 inline-flex rounded-full bg-slate-950 px-5 py-3 text-sm font-semibold text-white no-underline hover:bg-slate-800">
                    Read the essay
                  </a>
                </article>

                <aside className="page-surface rounded-[1.75rem] p-6">
                  <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Columnists</p>
                  <div className="mt-5 space-y-4">
                    {opinionWriters.map((writer) => (
                      <article key={writer.name} className="flex items-center gap-4 rounded-2xl bg-slate-50 p-4">
                        <img src={writer.avatar} alt={writer.alt} className="h-12 w-12 rounded-full object-cover" />
                        <div>
                          <h3 className="text-base font-bold text-slate-950">{writer.name}</h3>
                          <p className="text-sm text-slate-600">{writer.role}</p>
                        </div>
                      </article>
                    ))}
                  </div>
                </aside>
              </section>

              <section className="mt-8">
                <h2 className="text-3xl font-bold text-slate-950">Recent opinion pieces</h2>
                <div className="mt-6 grid gap-5 md:grid-cols-2 xl:grid-cols-4">
                  {pieces.map((piece, index) => (
                    <article key={piece} className="opinion-card page-surface rounded-[1.5rem] p-5 transition">
                      <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">{opinionWriters[index % opinionWriters.length].name}</p>
                      <h3 className="mt-3 text-2xl font-bold leading-tight text-slate-950">{piece}</h3>
                      <a href="article.html" className="mt-4 inline-flex text-sm font-semibold text-red-800 no-underline hover:text-red-900">
                        Read column
                      </a>
                    </article>
                  ))}
                </div>
              </section>

              <section className="mt-8 page-surface rounded-[1.75rem] p-6">
                <h2 className="text-3xl font-bold text-slate-950">Letters to the Editor</h2>
                <div className="mt-5 space-y-4">
                  {[
                    "Readers respond to our coverage of housing affordability and city zoning reform.",
                    "A defense of slower journalism in an era of endless alerts.",
                    "What our subscribers expect from political endorsements."
                  ].map((item) => (
                    <article key={item} className="rounded-2xl bg-slate-50 p-4">
                      <p className="text-sm leading-7 text-slate-700">{item}</p>
                    </article>
                  ))}
                </div>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
