<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Meridian | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', "sans-serif"],
              serif: ['"Source Serif 4"', "serif"]
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="news-shell">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="shared.js"></script>
    <script type="text/babel">
      const { Header, Footer, StoryCard, topStories, secondarySections } = window.MeridianShared;

      function App() {
        return (
          <>
            <a href="#main-content" className="absolute left-4 top-4 z-50 -translate-y-20 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg focus:translate-y-0 focus-visible:translate-y-0">
              Skip to main content
            </a>
            <Header activePath="index.html" />
            <main id="main-content" className="mx-auto max-w-7xl px-4 py-8 lg:px-6">
              <section className="grid gap-8 xl:grid-cols-[minmax(0,1fr)_320px]">
                <div className="space-y-8">
                  <article className="page-surface overflow-hidden rounded-[2rem]">
                    <img src={topStories[0].image} alt={topStories[0].alt} className="h-[24rem] w-full object-cover" />
                    <div className="p-8">
                      <p className="text-sm font-semibold uppercase tracking-[0.2em] text-red-800">Lead Story</p>
                      <h1 className="mt-3 text-4xl font-bold leading-tight text-slate-950 md:text-5xl">{topStories[0].title}</h1>
                      <p className="mt-4 text-base font-medium text-slate-600">{topStories[0].byline}</p>
                      <p className="mt-4 max-w-3xl text-lg leading-8 text-slate-700">{topStories[0].summary}</p>
                      <a href="article.html" className="mt-6 inline-flex rounded-full bg-slate-950 px-5 py-3 text-sm font-semibold text-white no-underline hover:bg-slate-800">
                        Read full story
                      </a>
                    </div>
                  </article>

                  <section aria-labelledby="secondary-stories-title">
                    <div className="flex items-end justify-between gap-4">
                      <h2 id="secondary-stories-title" className="text-3xl font-bold text-slate-950">Top stories</h2>
                      <a href="world.html" className="text-sm font-semibold text-slate-700 hover:text-slate-950">View World section</a>
                    </div>
                    <div className="mt-6 grid gap-5 md:grid-cols-2 xl:grid-cols-3">
                      {topStories.slice(1).map((story, index) => (
                        <StoryCard key={story.title} story={story} kicker={secondarySections[index]} href={index === 0 ? "world.html" : "article.html"} />
                      ))}
                    </div>
                  </section>

                  <section className="grid gap-5 md:grid-cols-2 xl:grid-cols-4" aria-label="Section strips">
                    {secondarySections.map((section) => (
                      <a key={section} href={section === "World" ? "world.html" : "article.html"} className="page-surface rounded-[1.5rem] p-5 text-slate-950 no-underline hover:border-slate-300">
                        <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">{section}</p>
                        <h3 className="mt-3 text-2xl font-bold">{section} coverage</h3>
                        <p className="mt-3 text-sm leading-7 text-slate-700">Curated reporting, analysis, and dispatches from the Meridian newsroom.</p>
                      </a>
                    ))}
                  </section>
                </div>

                <aside className="space-y-6" aria-labelledby="most-read-title">
                  <section className="page-surface rounded-[1.75rem] p-6">
                    <p className="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Most read</p>
                    <h2 id="most-read-title" className="mt-2 text-2xl font-bold text-slate-950">Readers are following</h2>
                    <ol className="mt-5 space-y-4">
                      {[
                        "What a widening shipping crisis means for food prices",
                        "The cities testing AI rules before national lawmakers act",
                        "Inside the campaign memo reshaping the Senate map",
                        "Why awards-season films are becoming political battlegrounds"
                      ].map((item, index) => (
                        <li key={item} className="most-read-card rounded-2xl bg-slate-50 p-4 transition">
                          <p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">0{index + 1}</p>
                          <a href="article.html" className="mt-2 block text-base font-bold leading-7 text-slate-950 no-underline hover:text-red-800">{item}</a>
                        </li>
                      ))}
                    </ol>
                  </section>
                </aside>
              </section>
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
